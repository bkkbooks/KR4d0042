front:
  text: 直講李先生文集卷之五
  hash: sha256:1b460069767e608f7ca033dc33723b43c40619a4a4aabffdb748cdc38e9bdf2d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_015-1a}
body:
  text: 周禮致太平論五十一篇并序敘曰昔劉子駿鄭康成皆以周禮為周公致太平之迹而林碩謂末世之書何休云六國隂謀然鄭義獲伸故周官遂行覯竊觀六典之文其用心至悉如天焉有象者在如地焉有形者載非古聰明睿智誰能及此其曰周公致太平者信矣鄙儒俗士各滯所見林之學不著何説公羊誠不合禮盜憎主人夫何足怪今之不識者抑又譊譊將使人君何所取法是用托其大略而述之天下之理曰家道正女色階禍莫斯之甚述內治七篇利用厚生為政之本節以制度乃無傷害述國用十六篇備預不虞兵不可闕先王之制則得其宜述軍衛四篇刑以防姦古今通義唯其用之有所不至述刑禁六篇綱紀既立持之在人天工其代非賢罔又述官人八篇何以得賢教學為先經世軌俗能事以畢述教道九篇終焉并序凡五十一篇為十卷命之曰周禮致太平論噫豈徒解經而巳哉唯聖人君子知其有為言之也內治第一男女之際人道所重前哲固備言矣然而賢妃相成之道不世出亂國家者往往而是蓋婦人之性鮮克正也隂則昧柔則弱昧不足自見弱不足自立與物而遷直情忘反其體一也堯試舜觀厥刑于二女釐降二女于媯汭嬪于虞以堯之女其淵源非不善尚曰舜能以義理下其心是無聖人為之耦則不克使其行婦道也彼凡人子而不漸以教摩以禮其可乎哉今夫數口之家猶以婦傾或靡敝財用或離析骨肉速刑召禍至無可救者多矣况乎后妃同體于王其次嬪御亦所愛幸一發言一舉事足以旋轉天地薄蝕日月其為禍福可勝言哉貴則為驕富則為侈並寵則妬不答則怨憎則有讒言愛則有私謁府庫或為之空刑賞或為之濫姦邪或為之昌忠良或為之剝宗室或為之棄冡嗣或為之易帷薄或為之不修社稷或為之不食未喜之放桀妲已之殺紂此類豈少哉故內宰以隂禮教六宮隂禮婦人之禮六宫謂后也又以隂禮教九嬪不言教夫人世婦舉中以見上下省文也又以婦職之法教九御使各有屬以作二事正其服禁其竒邪展其功緒九嬪掌婦學之法以教九御婦德婦言婦容婦功后尊也不得不受教女御卑也而教亦及之在王宮者不可不知禮也如使后夫人九嬪世婦女御皆受教皆知禮德皆正言皆順無冶容無廢功無侈服無邪道則閨門之內何有不肅溥天之下何有不化關雎之不淫葛覃之躬儉樛木之無嫉妬螽斯之多子孫卷耳之輔佐求賢兔罝之莫不好德于斯見矣王道安得不成乎內治第二天官家宰其屬則有九嬪世婦女御女祝女史唯夫人之于后猶三公之于王坐而論婦禮無官職故不列且夫六宫內也如家人家人私也六官外也乃國事國事公也外內異處國家異分公私異宜然而使嬪婦屬天官無外內國家公私之辨者何哉聖人之意于是深矣彼婦人女子而當于至尊幽居九重人弗得見則驕蹇自恣無所不至也是故使之分職于內而附屬于外有職則當奉其法有屬則必考其功奉法則不敢不謹考功則不敢不慎舉宫中之人而知所勸勉者官有其長之效也而况內宰亦用大夫士春官世婦每宮卿二人蓋皆分命賢臣以參檢內事與夫婢妾賤人自相使令而無畏忌者不同年而語矣天子所御而服官政從官長是天子無私人天子無私人則群臣焉得不公庶事焉得不平無偏無黨王道蕩蕩此之謂也漢髙帝欲廢太子立戚夫人子趙王如意留侯曰骨肉之間雖臣等百人何益此大臣不得與內事之敝也爰盎引却慎夫人坐謂妾主豈可以同坐文帝怒説以人豕乃説如使盎輩得制宮中之事則尊卑有不序上下有不和者乎官失其守一女顓恣則公卿附離之不暇其何冡宰之能帥也悲夫內治第三昏義曰古者天子后立六官三夫人九嬪二十七世婦八十一御妻以聽天下之內治以明章婦順故天下內和而家理也至于天官序則世婦以下不言數謂君子不苟于色有婦德者充之無則闕世婦女御視大夫士尚惟其人則三夫人九嬪官不必備可知矣自古婦人之賢者蓋不易得故其生則寢之地以教其卑衣之裼以教其正弄之瓦以教其事既十年姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以共衣服觀于祭祀納酒漿籩豆𦵔醢禮相助奠十有五年而笄二十而嫁先嫁三月祖廟未毀教于公宮祖廟既毀教于宗室教以婦德婦言婦容婦功教成之祭牲用魚芼用蘋藻所以成婦順也如此而後備于從人之道况乎王之北宮當貫魚之寵者可以非其人哉故無德以色親則天有投蜆之異詩曰蝃蝀在東莫之敢指謂邪色之乘陽也曲禮納女于天子曰備百姓言以廣子姓耳深山大澤實生龍蛇母子傳類亦不可忽晉愍懷太子宫中為市使人屠酤手揣斤兩輕重不差蓋其母屠家女也先王之制百二十人猶以無人而闕之至難至慎若此武帝平吳之後掖庭殆將萬人復何義也人多則御幸不可遍怨恨由是興費廣則財物不足支民氓所以困國家之敗何莫由斯者邪內治第四女御掌御敘于王之燕寢凡群妃御見之法月與后妃其象也卑者宜先尊者宜後十五日而遍自望後反之其不使九嬪世婦掌之而使女御者防上之專妬也蓋以女御官卑不敢嫉妬自專則九九之法行矣九九之法行則內無怨女而子孫衆多矣夫飲食男女人之大欲一有失時則為怨曠七月女心傷悲東山婦歎于室君子撢于人情周道所以興也安得聚少艾之色幽于深宮之中而無進御之路則其性情之所感動何如哉四時何以能和百神何以降福至于繼嗣社稷之重事甚有寵之人或不宜子非廣其禮將無及也霍光欲上官皇后擅寵有子雖宫人使令皆為窮褲多其帶後宮莫有進者而昭帝無嗣成帝約不負趙昭儀掖庭中御幸生子者輒死飲藥傷墮者無數終以國統三絶王莾篡之愛有所偏之過也薄姬輸織室而生孝文為漢太宗晉簡文寵徐貴人彌年無子李后在織坊形長色黑謂之崑崙帝以大計召之乃生孝武天命所在不以貴賤美惡論也然則九九而御使無專妬者聖人之意逺矣內治第五哀公問曰冕而親迎不巳重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂巳重乎然則先王之所以重昏禮為其主祭祀也祭祀之禮豈唯致齋于內會君于廟服副褘于東房執璋瓉而亞祼酌瑶爵進玉齍薦徹豆籩以嘉魂魄而巳乎是禮之末節一日可為者也必竭力從事然後為至焉故內宰中春詔后帥外內命婦始蠶于北郊以為祭服又上春詔王后帥六宫之人而生穜稑之種獻之于王夫普天王土率土王臣蠶者非一女也將以為王服有不足乎而后且親蠶其夫以事先舅先姑敢不用力焉不可以為婦道也耕者非一男也將以為祭盛有不足乎而后且佐耕其夫以事先舅先姑敢不用力焉不可以為婦道也王后之尊而親蠶天下之女子有不遵微行求柔桑者乎王后之尊而佐耕天下之女子有不饁南畒喜田畯者乎王后之尊而為婦道天下之女子有不承先祖共祭祀者乎明王之以孝治天下此其一助也而况不知耕之勞則以為田自生榖不知蠶之苦則以為桑自生絲自古愚婦人糞土貨財焦爛府庫農夫病工女死而求之不巳者不知民事之難也于寶之論晉紀曰其婦女粧櫛織絍皆取成于婢僕未嘗知女工絲枲之業中饋酒食之事也晉之禮法于此大壞則周之興也宜矣內治第六春官內宗凡內女之有爵者內女王同姓之女有爵其嫁于大夫及士者其職掌宗廟之祭祀薦加豆籩及以樂徹則佐傳豆籩賔客之饗食亦如之王后有事則從外宗凡外女之有爵者外女王諸姑姊妹之女其職掌宗廟之祭祀佐王后薦玉豆眂豆籩及以樂徹亦如之王后以樂羞齍則贊凡王后之獻亦如之王后不與則贊宗伯小祭祀掌事賔客之事亦如之夫富貴驕人自然之勢苟非明哲其能免乎矧伊女子生于王族雖有葭莩之親者猶乘勢以輕其家不順于舅姑不和于室人庸奴其夫者多矣夫婦之道天地之象人之大倫也乃由宗室亂之非所以示天下也聖人有作安得不大為之坊夫禮禁亂之所由生猶坊止水之所自來也故以內女外女謂之內宗外宗列為禮官之屬其職禮則視必在禮聽必在禮言必在禮貌必在禮思必在禮視聽言貌思無不在禮則其人之智愚賢不肖何如也祭祀賔客非有切身之急而不敢不以禮則巳之所以為婦者敢有不恭乎觀后之事宗廟則知所以順其舅姑觀后之饗同姓諸侯則知所以和其室人觀后之亞王祼獻則知所以從其夫順于舅姑和于室人而當于夫是故婦順備而內和理內和理而家可長久也召南何彼穠矣美王姬之詩謂雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德彼天子所生而若此况于同姓姑姊妹之女乎是其所以為王化之基也內治第七媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁凡娶判妻入子者皆書之中春之月令會男女于是時也奔者不禁司男女之無夫家者而會之夫昏姻之禮要在及時故國無鰥民則桃夭之詠作喪其妃耦則有狐之刺興彼室家之好而繫之王者之風為人上者不可不察也孟子對齊宣王曰昔者大王好色愛厥妃詩云古公亶父來朝走馬率西水滸至于𡵨下爰及薑女聿來胥宇當是時也內無怨女外無曠夫王如好色與百姓同之于王何有誠哉是言也人主知漁色而不知下無室家知逞欲而不知下有怨曠其可乎哉天地不合萬物不生有夫有婦然後為家上得以養父母下得以育子孫生民之本于是乎在而人主慢之非計也是故聖人設官主判合之禮子生三月必書其名男自二十以及二十九女自十五以及十九皆為盛年其昏自季秋至于孟春惟其所用若男三十女二十為期盡雖中春猶可行所以蕃育人民是皆言其極也及此月而父母不娶不嫁之者相奔不禁若無故而不用令則罪罰之嘗有妃匹而鰥寡者亦察焉先王之道如此其至也既為之立其家又使之有其業國中則典婦功掌婦式之法野則鄼長稽其女功然而民不庶且富者未之信也越語女子十七不嫁丈夫二十不娶父母有罪雖于禮為蚤而句踐報吳亦以是也晉泰始中博選良家以充後宫先下書禁天下嫁娶噫大可笑也直講李先生文集卷之五終
