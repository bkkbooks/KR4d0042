body:
  text: 墓碑傷辭附進士陳君墓銘頴川陳君卒扵天聖九年六月十二日塟扵明年二月甲寅墓在南城縣太平鄊之壍陂将􅌾姪壻李覯敘而銘之君諱璆字仲温産富家年少獨奮好學蓄經籍求師講問晝夜不敢息長扵甲賦唐風詩時軰多所驚仰憙技藝無不該者尤精玉筯書得斯冰體勢覓薦王府一不中㑹家禍作輒棄去不復有仕宦意君為人篤扵孝慈幼孤事先夫人左右無違及居䘮捽茹飲水終三年匍匐致毀瘠落肌肉僅䏻自活既除之後殆十載言及其親未嘗不􅒣欷涕下此皆世俗所不能者性復倜儻重節義聞人急難與其所不足若巳當之族親友舊賴而濟者盖可指數江吴之間其人信鬼禍習忌諱疾病死䘮非其父母妻子率避逺之君雖扵無服之親亦必瞻視懃懃致藥物療治愈有恩意扵其死哭弔常先他人含襲歛殯多自經手其接人重厚有禮隆賤親踈訖不以顔色冷燠之然扵論議亦不隱其賢不肖非深得古君子之道者其孰能如是邪既退居鄊里益脩田宅羙池榭日召賔客飲酒逰宴賦詩相獻答亹亹不䏻自止鐫琢粉繪咀噍花葉務為深竒若新進争名者怡愉終日弗以他事亂其間雖術業不施扵時亦不為無所用其心矣卒時年四十六聞者無小大莫不嗟惋来哭必盡哀至于役養無知軰悉旁泣竊歎謂不復有斯人嗚呼可尚也已曽祖諱某祖諱某考諱某比三世俱不仕娶東平萬氏順惠荘飾有理内法生男女八人長子某襲父之志以文行稱識者謂慶在是矣次某警敏守生業某亦志學某方成童長女壻鄧某應進士舉次黄某范某幼女許嫁范某皆著姓子𥘉君之弟曰某既勝冠與其婦偕死息女始絶乳君愛養之如己子長以嫁李氏銘曰勤不獲禄善不克年謂天有知何死之亟謂天無知何後之賢嗚呼百世之下無敢壊其蔵焉䖏士陳君墓銘并序祭文附君諱文藻世家旴江實建昌南城也曽祖諱某祖諱某父諱某皆不仕君初以素門善治生終䏻憙事用儒術教子起家登朝其門既髙其行益篤沈厚有智多歴艱難故動而鮮過為鄉黨法将有事者亦来咨謀自用儉節至義可為則不有愛其所周急浹于䟽親性復謹禮雖幼而卑必待以賔客未嘗見其懈尤耻爭辨踰數十年無一人獄在州縣者而衆莫不服晩節授家事于子孫其中休休罔有不足閉門終日不與塵俗風窓月墀樂以忘老年八十二慶暦四年十一月庚午卒明年及此月丙申葬于郡東之龍池夫人周氏既葬十二年矣故不祔子男二人肅繇進士第在官為䏻濟之重慎得譽于薦紳間以憂觧殿中丞執䘮無失禮次雍孝友而外樂善諸孫學問甚謹無不令人源深㢤止而為淵行而為川未易窮也五女嫁鄭某朱某范某朱某聶某皆良族也既卜日孤以墓石来告乃銘之曰洪範五福六極為天賞罰之柄今君既夀且富無乆疾病教子義方不謂不好徳啓手足知免不謂不考終命天之勸人何其盛㢤何其盛㢤祭文嗚呼公之年徳逺出軰流子孫善良無身後憂人生及此何所不滿送往以哀情猶未免昔我年少孤貧里中惟公見遇與衆不同然諾之重有古人風薤露易乾隙駒難駐彭殤一揆瞬息千古設奠吿誠後期無䖏尚饗廣文陳生墓銘并序陳生予同郡君平其名某字也初以童子来學既冠㳺京師用進士入廣文館升扵禮部試下第歸而病後二年死盖年二十有四矣始吾竒其人神甚清氣甚和齒少而智老居今而好古其學業務廣其文體務大若馭長風中江而下假之日力則海不難到凡厥施為巖巖見頭額去其俗逺甚其父某又有行誼謂可以餘慶擬之不意其短命也病日革尚不舍業或導以博奕觧愁憂則曰我為此益不樂拳拳文字間以即死嗚呼吾之所好惡不類乎天之意邪抑天之意皆與人異邪或者天無有心而人妄責之邪人亦無有主宰而自生自死邪如何如何贈某官諱某王父也諱某曽王父也妻劉氏有二女其死孟夏其葬仲冬其歲辛卯實皇祐三年銘曰古石崇觀今葬其旁死者無知則何所傷若其有知則顔魯公記麻姑山謝靈運詩華子岡雲瓌水怪夕景晨光尋群仙之轍迹味古人之文章魂兮優㢤豈與夫愚鬼同鄊進士傳君墓銘并序皇祐五年冬傳氏之子野請銘其考曰先父諱垂範字祖徳娶鄧氏野中男長任少偁女嫁董張江氏夀六十有六今年七月癸亥卒十二月丙午葬墓在宅東北仙羊峯下曽王父封王父寀父逢皆不仕逺祖家信州今爲南城人銘曰君少篤學見稱其儕父隕兄落欲進不諧有田宅畔有宅山隈既耕且養曰優㳺㢤君之事母室爲便户夜再三起即訊安否君之事兄兄嘗病苦醫湏人肉爰割其股族有闘死将質于官礙君其間縮不忍言聞善巳若見惡愀然教子與孫居如師門維孝維悌於君罔闕他行雖百無乃其末命有夭夀時有窮逹含笑入泉糞土黄髪聶夫人墓銘并序夫人姓王氏歙州某縣人曽祖某祖某父某盖富家歸于鄊人聶某今爲南城主簿聶君之曽王父某王父某不仕考某贈禮部尚書兄某終翰林學士凡仕者數人族大以蕃而夫人宜之爲婦孝爲妻順爲母愛而不弛事姑三十年未嘗蔕芥既自治其家舉有法度扵鄰里鄊黨慶吉弔㓙以喜以憂若在已然見人乏絶志扵賙救力不足不䏻自巳教厥子必以禮義榮辱故克有成長男武仲進士及第其次南仲㣲仲恭仲皆好學女壻程某閔某注某亦為士季女未許嫁夫人毎敕諸子曰亟自立汝後顯榮吾不見矣皇祐三年来南城未及安宅夣人吿曰爾在此二年而巳五年疾病時武仲與禮部籍奏尚克聞之巳釋褐有書至不䏻言矣夏四月十一日卒年若干明年某月某日載其柩還鄊以某月某日葬于某銘曰死生命邪聖人罕言之雖其有命其可自知邪夫人教子謂不見其仕及其登科而母死矣豈知而言邪抑偶然邪二年之意形于夣寐彼何神靈而吿之丁寧邪武仲有文采諸子頗聰警姑務扵徳以求揚名則親之魂魄其不榮且幸邪草露溥兮松風凄兮生者䏻㡬時死者無窮期萬物皆如斯又何足悲邪鄒夫人墓銘并序前此者聞新淦鄒氏有子曰廸九齡以文求試于㙜遇疾罷去得神童稱今廸遺予以書且列其妣之行請銘于竁予未識迪靣矧非州黨婣族閨門之懿所不及知然觀庸俗富而溢則驕其子使淪扵欲若節信所謂以賄䘮精者往往而是廸生五六歲嗜讀書属詞句既毀齒西游仰視九門虎豹之威而不怯惑有披青雲捧白日之志事雖不果與夫冕弁而童心軰相去㡬十百倍苟非胎仁乳義沃染扵初如土斯瘠其奚以藝嘉榖也㢤則其善状宜不誣孔子之言孝者立身行道揚名扵後世以顯父母迪未冠未克光大于時懼其親之無傳求哀扵我盖亦孝子之節不可以巳故書之夫人姓楊氏盖鄒之邑人曽祖某不仕祖某亳州防禦推官父某亦不仕其夫某學不得官以貲為袁州助教夫人之性順而明憙篇籍略知大指書樂之藝多所該綜早孤事母以孝既嫁未嘗一日不念母念之至則號泣廢眠食善扵夫之黨外内無怨言羞服器玩舉有制節罔或踰侈唯迪一男不以恩克義且教且戒期于有立既不試而歸益敕之求師輔繼短増卑日取其効一女亦尚幼而夫人即世年四十有五至和二年某月某甲子也越某月某甲子葬于某鄊某地名噫昔陶偘母湛氏亦新淦人唯䏻資􅍏子交結勝已者然非偘強立以濟功名曷由致其母不朽之如此迪之齒未也誠䏻出溝瀆逐鯨鵬扵天海間則楊氏之賢當不媿于古且使吾言見信扵天下矣銘曰宜神之祉顧短以死不在其身維有子鉛山縣尉陳君墓銘并序君諱某字某與予同郡實建昌南城人曽祖某祖某爲郡著姓父某尤善士有二子君其仲也君幼而開爽多智慮以兄宦學膝下少人廼顓治生若親之意其先子豁逹而好義自放于詩酒間罕視家事而財用所出近得以賙親故逺得以及覉旅爲有識所貴者繄君之力是賴既孤而母老伯氏從王事温凊益謹而田里益修彼仕千里之外而無反顧之憂者抑君使然免䘮數年遊京師属河决以財佐公上補太廟齋郎選授邵武軍建寧縣尉于時盗賊多主名不見邑居患之君以機往所至輒禽郡守言其勞不報替授茂州司戸兼録事參軍兄為徳陽宰不宜俱入蜀改信州鉛山縣尉未行以疾終年五十一嘉祐元年夏四月癸亥也娶鄧氏生男光逺光道皆好學見稱于士友君之啓手足命以卒業而巳不語他事一女嫁黄某亦冠族其冬十一月壬寅葬于所居東北十有餘里太平鄊三異里符源銘曰世無灾兵以敝其生家有禮義以為之地衣冠揖讓優游以卒歲復何歉扵意㢤徐夫人墓銘并序宜黄徐復皇祐五年進士出身南郊放選得贑縣主簿明年改元至和将輦其母之官未及期夏四月辛酉母死秋九月来告曰吾母李氏生十有六年而歸于徐其居百口姑之繼者四人吾母事之亡蔕芥至于女妐叔長穉婦靡不得其歡心先人諱某宦學且乆吾母夙夜躬㸑烹以禮賔客未始厭倦復十八而孤方肄詩賦吾母請于先祖使之卒業舉不利将退而服田又朂遣之以獲齒于下士􅕛合之禄未登養器而遭大變平生惻隱以周急為上務斥衣賣飾一簮亡所愛死之日親踈外内皆哭出涕天蒼地黄何往何愬願得銘以相哀予與復非舊憐其意從之夫人之曽祖某祖某父某俱不仕復之兄曰某弟曰某曰某曰某豫亦好學姊妹三其長嫁杜某其次進士胥某其次戴某銘曰人之教子教成而親死天下多如此将為善思貽父母令名必果復也䏻之則欲報之徳誰曰不可鄭助教母陳氏墓銘并序鄭君名某字某建昌南城人吾母其從祖姑也夫人扵覯為舅之妻故常得見焉鄊里陳為冠族夫人之父某贈殿中丞祖某曽祖某不仕歸于鄭氏生二男裁數歲而寡姑老子弱門内外事一介畢委于其躬性嚴正䖏之有宜請謝姻戚意厚諄諄用福其家以不失舊夀六十有五皇祐五年夏四月乙未卒小子曰倫既蚤死君孤露一身延其世祀曽祖某父某盖皆善良䏻治生而君繼之抑管子所謂士工商農之子少而習焉其心安焉者矣廣源蠻犯嶺表朝廷以空名告身属江湖轉運使募入泉榖而郡縣風曉之君以此守撫州助教執親之䘮數月得疾未葬而卒年三十有七至和元年冬十二月也二男曰某七歲曰某三歲妻謝氏獨當家事闔門無五尺之童畧如夫人初寡時嗚呼可哀也巳明年三月乙酉以二䘮厝于其縣太平鄊之龍宴窠同塋而異壙君之姊妹六人嫁范某徐某胡某聶某陳某夏某五女嫁陳某鄧某張某其二尚幼銘曰吉㓙在人邪彼夀者何淑扵身而夭者何怒扵神其曰偶然邪何再世不天若摹而傳夫人之意常恤後嗣其死未㡬而禍猝至古人之言倚伏者猶可信而俟邪䖏士陳君墓銘君諱某字某建昌南城人曽祖某祖某父某自有誌君性慈和且憙事同産六七人身為之長當母在時一以家事属其弟無所前却闔門百口不識笞罵及官府召呼雖甚威怒必躬以進不移禍扵人為政者似察焉未嘗辱嗜酒從㳺或詬而或戯之其色自若子陟有詞學愛之欲其逹其在京國輒馳往視既及第為邵武縣尉至和三年春又就見之中道得疾入官舍而卒年五十四輓其䘮歸冬十一月乙酉葬于郡西太平鄊金塘凡兩娶陟出蔡氏其繼徐氏生防階附隱三女長嫁朱某其二尚幼銘曰古人以一世為夣一覺其間利害何足可道若君者其巳覺也㢤宋故贈都官郎中張公墓碑銘并序駕部張員外守旴之一年状其先君郎中之善属于覯願為文以表墓竊迹三代葬從死者之爵祭用生者之禄父為士子為大夫葬以士祭以大夫故勲勞不懋名位不尊雖子孫蕃大唯致羙乎宗廟彼窀穸之事無敢加焉後王損益有追贈之制恩漏泉裏咸同正官國家仁甚扵古賞徧于下凡在周行必寵貴其父母郊祀行慶踵以為常今郎中得官五品扵令宜立碑而員外出刺是邦覯小草民託寄宇下見命執筆其可以辭謹按所状而文之郎中諱某邢州沙河人曽祖諱某父諱某世不仕積善之澤漸于其躬状貌瓌偉人鮮䏻及性本孝弟且憙義烈自九族内外悉䏻和諧使無䦧很而鄊人羙之豈所謂施扵有政是亦為政者邪厚本力穡以給其家身雖肥遯言必詩禮克致嗣子策名于朝又豈所謂愛子教之以義方者邪其生五十有六年祥符癸丑夏四月卒即葬于所居西偏既而贈大理評事殿中丞屯田職方貟外郎都官郎中夫人柴氏某縣太君生男女五人貟外名某習孔氏尚書景徳中及第試于州縣無曠厥職由大理寺檢法陞審官籍其修天聖編敕與有勞焉歷鎮五郡稱為盡心四女伯仲皆嫁李氏叔趙氏季尹氏貟外之二子業進士今賦于太常矣後胙饒衍胡可量㢤銘曰大河之北土風朴渾公宅其間孝義終身閨門雍雍鄊黨欣欣生而不試沒乃推恩君仁有加子心罔極贈官五品立碑九尺慰彼顛靈光于墓域後昆之才孝思是則宋故朝散大夫守尚書屯田郎中上䡖車都尉賜緋魚袋江公墓碑銘并序孔子稱聴訟吾猶人也必也使無訟乎長人者不恤義教而一之刀筆雖聖與庸或無以異矧其人品中下云㢤世俗所以不甚相過者無足可恠士大夫不以賢自待蒙耻苟得習以為宜上亦不以賢待之動有法令不得行其意爵列扵朝而習史胥之業故愚者亦足尸一官賢人歛手于位就繩墨間有可道者則今之循吏也巳嗚呼江公非循吏而誰歟公諱鎬字某祥符五年進士及第得汀州推官繇興化軍判官除大理寺丞歴殿中丞太常博士屯田都官職方貟外郎屯田郎中其使知陵州仁夀婺州金華縣知英州通判潤宣州知建昌軍䖏州遂致事年七十卒時慶暦六年也公弱好文學性孝友既耆而執清河太君張氏之䘮尚致毀扵請老當得一子官舍其孫以與弟之子某人以是稱焉明且慎善聴治在興化常受命使府决諸郡之獄故僉薦之仁夀洪氏嘗為里胥利鄰人田紿之曰我為若稅免若役鄰喜剗其稅歸之名扵公上逾二十年且偽為劵茶染𥿄類逺年者以訟公取𥿄即伸之曰若逺年𥿄裏當白今表裏一色偽也訊之即服金華舊梗而說公之政粤民勤扵役其胥或世世與其族異財而同籍率一胥影戸數十公至英乃擿而旬用之轉運使指以示他郡下戸獲安在建昌擊豪褫敝嶷若山重于今有述焉娶同郡戴氏封萬年縣君生六子而卒長男某都官員外郎蚤有譽不幸死矣某著作佐郎某太廟齋郎皆有學行三女嫁進士毛某程某穎州推官馬某皆良奥也曽祖某不仕祖某泌水尉父某贈都官郎中自十六代祖世源因官占衢州開化其上不可知凡一姓多者數望俗以意稱之問其譜則亡或斥古之顯者以為祖是之謂誣故不書覯經為公甿著作使来吿䘮以既葬弗及誌惟令五品有碑請列兹文而繫以銘曰善不獨善既施於民福在子孫不止其身少進老退始卒無悔死而有知何慶之大宋故将仕郎守太子中舍致仕宋公及夫人夀昌縣君江氏墓碣銘并序公諱某字某其先江南宰相齊丘之族遭亂播遷自洪州南昌家建州建陽曽祖某祖某以是無聞焉父某讀書客死太平州公少時亦不顯既而有子曰咸字貫之受位扵朝例以公爲大理評事歴衞尉大理寺丞太子中舍致仕年八十一夫人江氏江南翰林學士文蔚之曽孫本朝職方員外郎翹之孫汝州龍興縣主簿湜之子累封長安夀昌縣君年八十慶暦八年冬十二月壬午卒越八日已丑又有公之䘮皇祐元年秋九月已酉合葬于所居壕南從先塋也公逮事祖父母䏻致其孝以寡兄弟其母程氏篤愛之欲無去其家故不使宦學然性憙事鄊之儒衣冠者多與之交見人子孫孝弟學文不啻出諸已有良𥿄筆必往遺之夫人善言語有識扵家内外靡不規正而姻族信之前失數子乃謂公曰積善餘慶今生子不育無乃父母有所闕歟姑自修而巳用是時異夣而生貫之總角好書不同群兒夫人曰此子必興宋氏吾叔父知南劒州可使從之學矣則司勲郎中名拯者也不數年而貫之大成應舉得官由州縣至常參皆補東南以便侍養公老而靜勝日扵官舍焚香誦佛書有佳山水未始出逰迹其所為亦足以逺嫌疑非苟然也夫人雅知子初貫之知尤溪在上位者嘗以憾故使爪牙吏求貫之之私将傳扵法及知瓊州亦如之聞者鮮不憂而夫人諗公吾兒志大且㢘决無私事為人所得不足憂也巳而果然耄年俱不病自知将死教令婦子亹亹如平常鄊人異之三男貫之為屯田員外郎有文章年逾五十學問不倦書非聖人作一切鋤去不問至于為吏亦多見稱此其功名未易知次曰某頗儁才蚤死曰某䏻治生得其母心二女嫁李氏饒氏覯辱貫之㳺而不獲拜其親扵葬又不克㑹今貫之乃来求文謹次所聞而属之銘曰夀考人之願而夫婦偕老有嗣家之幸而其子知道四者得之固巳足矣又申之以官邑之號苟為不善之人安䏻到此㢤宋故朝奉郎尚書都官員外郎上騎都尉賜緋魚袋陳公墓碣銘并序南城治之右麻姑山前左麻源東南其地曰某是惟邑人陳公之墓公諱某字某天聖五年進士及第歴郴寧洪州推官五遷為都官員外郎知宜春臨川貴溪豐城縣年六十有三而終實至和元年公少好學以其才有鄊曲譽性重慎不易出言視之若無白黒及逢其人則亹亹是非必中與人交外澹泊然其義分雖白首如初在官文理堅著㒺有罅兆其所持操亦不可奪郴有土茶既貢而儥其餘公言其賊民轉運使以聞及其貢者皆免洪有乆獄逮證不巳公與守争守怒而起終以公為䏻遂舉之臨川民有以庶弟為異姓者買吏得直莫克為辨公召語之不刑而服其行事多此類故在幕職時舉者十有七入張伯起吳安道蘇儀甫趙叔平皆世名臣居家孝友親既沒十年與其弟某居無間言若親若故或旁以生要之言行一有繩凖鄊人畏之晚憙吟詠乆而益工不善飲酒發懐散憂必以詩其存者若干首将老于山林未及言而疾作哀㢤葬禮有碣宜為之銘其繫世則誌諸壙銘曰楚之東兮吴之西山雄石俊兮旴之湄公将退兮隱扵詩轡鸞鵠兮裼蘭芝志不就兮以䘮歸曰天與命兮窈難知千萬年兮識者誰公之羙句其傳之宋故朝奉郎尚書都官員外郎上騎都尉賜緋魚袋陳公墓誌銘公諱某字某建昌南城人進士及第為郴州軍事推官罷得寧州未行以塩鐡判官舉監海州洛要塲遭母憂復常權洪州觀察推官除大理寺丞知袁州宜春移雅州盧山父老改撫州臨川除殿中丞又以憂觧既而知信州貴溪除太常博士明堂禮畢遷屯田員外郎替知洪州豐城除都官員外郎至和元年二月乙卯卒年六十三以其柩歸明年及此月某甲子葬于某鄊某里某地名曽王父某王父某不仕父某贈某官母周氏某縣君妻黄氏某縣君長男某廣文生再就禮部試次某不應舉次某一舉下第死于京師女嫁黄某范某黄某銘曰官六品非賤年六十非夭生而鮮悔後有紹左神右仙維宅兆天之福公夫豈少直講李先生文集卷之三十終直講李先生文集卷之三十一墓碑陳府君夫人聶氏墓誌銘并序府君諱某字某世籍南城曽王父某王父某父某皆不仕予六七歲時在山中有人從外氏所来言從毋之夫病且死其弟以股肉食不起既而事寡嫂有禮族姻善之及予長審知其人乃府君也景祐三年秋八月府君年五十三卒其冬十二月􅌾可封鄊安樂里源潭之陽後十八年至和甲午夏四月夫人聶氏年七十四卒明年春某月􅌾于其墓東南隅孤来求銘敢不聴吾邑陳氏為富家而幅之以善于今四五世智不以駕愚力不以鉏弱官無訟牒獄無繫人入埸屋得祿位者磊磊相望而府君以孝悌䖏其間喻子教孫蚤間暮燕以終其身不亦羙㢤夫人之曽祖某祖某父某亦不仕為人母者五十年主家事者三十年旁禮娣姒下法子婦儉故不乏用慈故不失恩属纊之日門内百口又何盛也生八男執䘮者五人曰某其人和䏻友群弟曰某善讀經書作詞賦郡薦新人嘗為之首曰某曰某曰某服産業一女嫁黄氏遜之子曰陟進士及第𥘉為邵武尉銘曰管仲有言倉廩實知禮節衣食足知榮辱今之愚者階其富以趍犴獄陳氏之良鄊所瞩君之夫婦全而復積善有慶兮後昆百禄進士傅君墓表亡友傳君代言字某生同鄊長同學心純行㓗而外不亢激見人善卑之若臣僕聞人過弗敢言其在巳則改不待頃故在家而和與衆無蔕芥好學有辭以進士得試于墀下兩舉不利歸而寝疾以書請覯願一言庶乎不泯沒病革矣書字㡬不成猶拳拳俟報而後死哀㢤其意何邪時年四十五慶暦甲申秋七月也後二年正月葬君家世善良曽祖某祖某未嘗筮仕父某在祥符以前用辭賦著稱不遇而死皆曰在後人至君又無禄識者益憐之娶鄧氏生二男某某然未有立􅌾巳其兄某使人来吿廼表其墓曰荘周論天曰自然吾以為妄言至于仁者夭鄙者夀禍福之来荒忽而不可䆒然後知周之言為不謬嗚呼吾友不幸而堂有老室有幼不然則大彭殤子亦何足道㢤陳伯英墓表吾嘗銘陳君仲温之􅌾以行髙故譜叙甚詳其子漢公字伯英𥘉名詠後十二年而死又從而表之噫逝者如斯徒使吾文不施於樂歌舞蹈而施扵墟墓間也伯英少從吾㳺俊健有智數頗多䏻應進士舉不售因放失繩墨衆非之終克自反扵親勤扵家儉扵人恭摩垢出光清議始變年四十得疾不治哀㢤妻聶氏有五男其三嚮成人曰汝羲汝士汝臣女許嫁鄧潤甫廖庭圭幼者二人其弟次公次山皆有學行庶㡬大其門噫天人果通邪善積必有慶不然未可知辭曰山可塵谷可堙謂余非妄人者無褻伯英之墳䖏士饒君墓表饒君諱某字彭年世占南城盖予同鄊曽祖某祖某父某皆不仕君耦周氏生男景先見先女嫁陳某李某吴某桂某其齒六十有四死􅌾里中之金灣後一年實慶暦七年景先礱石以待我故書其墓曰吾邑絶大江數百里與閩粤為腹背土地衍沃宜稻桑麻無大水旱飛蝗所不至故其人足衣食俗椎少機不肄文法為獄訟事吏惡政苛鏖之百端卒無敢言以豐富之資加自重惜而居之名山水之間花草禽魚日變時異使人見之心竅恢恢欲追騷人校江山醜好然則諸父兄行有不為禄仕而撙禮義探儒雅者固其宜彭年性温厚力治生以逺不足其餘唯務為詩與學者更倡和争錙銖亹亹不倦二子幼讀書不使叅外事故景先以其文再試于禮部見先亦嗜學多藝其壻陳吴桂皆應進士舉由此觀之抑好善之效晚節自除塟地築室其旁以待賔客為觀遊歌琴賦酒不覺老至自囂塵䖏聞其所為有足喜者往時相見領髪未素今兹復来墓草巳宿弔傷雲霞嗟嘆栢竹掲之墓門千載可讀醫博士周君墓表周君諱某字某鼎州桃源人以醫来建昌為博士年七十有一皇祐二年夏六月卒冬十有一月塟其孤播摠来求表之辭曰君之至是邦吾時未生及吾成人與之往還尚二十餘年其容體昂昂口辯多所䟦履凡荆楚問三川物象屈原宋玉嘗稱道者往往記憶上下巫峽見神女事迹言之鏗鏗可聴善飲酒要之坐花草醉倒歌舞不以年長辭趣為和同然未始以氣下扵物用醫藥交有位雖甚親比亦無所私謁吾以此知其人吾母曽病急不䏻言衆醫縮頸遯去唯君視之曰不死治數日起之吾以此知其藝命不謂短家不謂貧其教有義其嗣有人龍池之東負山為墳後来弗知信在斯文前進士廖君墓表君諱夷清字禮卿南劒州将樂縣人曽祖居素仕南唐以剛直見忌由校書郎二十年裁得大理司直建隆而後禀命我朝遂課其功累遷至瓊林光慶使檢校太保判三司驟諌後主不聴閉門却食服朝衣冠立死井中巳而得大手書扵篋曰吾不忍見國破耳故文士徐鍇弔之有三閭自投扵泳永羅浦伍相願棄扵江流之句不數月而金陵降迄今鄊人有記其事者皆叩頭稱之祖仲符少有志氣以詞學名兄弟䕃補獨不就及朝廷録忠臣後授汀州掾卒父知章亦秀士克世其家未及進而死君童子而孤力自樹立篤學有才作詩賦尚俊壮其扵啓事長調歌尢䏻動人性孝友常省其姑退必感泣謂人曰吾姑類先人其弟臣清得官而夭遺骸在唐州君時下第至江南聞之匍匐往收方大饑道遇刼吿以其故賊亦義之不害初舉觧頭好事者寫其賦扵屏今猶未絶五試禮部皆不耦慶暦二年特奏名賜同三禮出身未免選沒扵京師年四十八昭武李誥帥其友舊棺歛以歸其冬十二月葬于建昌軍南城縣太平鄊凋水實君之徙居邑也娶鄧氏生四男平噩可至一女嫁周翰夫人之死後君十二年扵其􅌾也平自為誌平十二齡而無父嶄嶄自然出扵泥滓間以濟其業聴髙眡逺有足嘉者群弟壹扵學問皆未易知積善之慶将在是㢤以石表未立捧其鄊先生屯田郎中李公之状来覯嘗辱君㳺謹撮其要託辭左方曰太保之忠貫神炙天當時不省其諌後世不聞其賢非君之才而平之孝孰䏻因而傳乎為人之子孫者其可不然乎李子髙墓表南城縣東北逺百里吾髙祖之父家焉天聖中嘗省松栢至扵子髙之室子髙業巳不仕有男冠卿生十三年習為歌詩教義諄諄無忝世儒後冠卿第進士試校秘書守臨川主簿代歸未㡬而孤来乞文曰惟先父好學篤善應舉不得官治衣食業不䏻貪以取餘醉吟山水間忘其老憙犇人之急里有争往往和觧之使不致獄訟衆亦愛恱用濟不肖子于宦學未始有報而舍去忽焉願得表其墳託以不腐姑取其譜而系之辭子髙諱喬年六十八慶暦四年四月庚子卒十一月乙酉􅌾考彦禨祖文遇曽祖捷皆布衣初娶盧氏生叔平叔良早死一女嫁饒贍繼陳氏生冠卿其季漢卿辭曰生無失宜死何足悲有子而竒其後焉可知邪先夫人墓誌有宋皇祐三年冬十有二月乙酉李氏之孤覯奉其母夫人柩塟于所居西先父府君墓東南隅實建昌軍南城縣鳯凰山之麓也夫人姓鄭氏其先盖鄊大姓曽祖某祖某考某皆不仕夫人初有二男為無服殤既而生覯十四年而先君沒是時家破貧甚屏居山中去城百里水田裁二三畒其餘髙陸故常不食者夫人剛正有計筭募僮客燒薙耕耨與同其利晝閱農事夜治女功斥賣所作以佐財用蠶月盖未嘗寝勤苦竭盡以免凍餒而覯也得出㳺求師友不為家事罔其心用卒業為成人不然蕞爾小子為傭保為負販供養猶不足何暇孳孳學問間邪復還舊居娶婦有孫如平人家夫人滋不倦門内細碎覯尚未及知慶暦中應科目罷歸廼自念親老矣而數棄去舟江湖客京國以為之憂抑又窮空無以備甘脆非人子所宜因决不求仕進忍耻業衣食庶乎終養無有憾焉既八九年而智淺力少不克如志夫人性多設施好義而信人祭祀賔客婚姻之禮不以貧故略之聞人緩急来有求者應之唯恐不逮衣服在身者必假飲食在前者必輟况扵泉榖固無吝心由此困乏百計不效夫人亦厭之覯惟易窮則變變則通所識公卿大夫多矣苟扶吾親往乞食焉尚可以濟廼用此言告之夫人喜曰是吾心也幸而離鄊非但謀食而巳且使雜人不到吾目前則煩惱自少况汝幼學巳而不進吾與汝俱西亦将有知汝者吾孫又漸長彼多英俊㳺聞見當逺大也謀之未集而及大故疾病猶數數問行期嗚呼夫人卒在塟前二百七旬有八日實其年春二月丁未夀六十有九後先君沒二十九年先君嘗學不應舉以教其子作詩賦亦樂施恵尤直信生平無所爭不識州縣廷終以不得意死年四十三嗚呼覯何人㢤有心不明有力不強父巳不待養天幸有母而方施施進不䏻為禄仕退不䏻求財利以足其欲使之顦顇晚廼悔之未及行而禍作矣嗚呼覯何人㢤天鬼不誅王法不治猶有靣目以視息世間復何人㢤誠懼乏祀不自引决敢因㐮事刻石以記其罪抑為事親者戒嗚呼哀㢤亡室墓誌亡室陳氏不知其先所自来今為南城人曽祖某祖某世大姓父某弱冠夫婦同時死唯是女生五年養于伯父某又十一年而嫁嫁十七年而卒扵戯吾家破乆及覯好自樹立與世不諧日益戹窮陳氏䖏之罔不寧雖晨夕費猶或巳出斥粧櫛賣之單盡執勞辱殆與臧獲等時復寒饑不可忍終無一言族親期㑹惡衣以往叅錦文珠象之間而不耻事姑瞻相顔色惟先意之為吾母固愛之覯行四方未嘗與謀亦不敢問在家有所嗇獨居常數月然不見怨望卑柔靜正亡世俗婦女之態訖不得報以死悲㢤長女許嫁陳某一男參魯僅毀齒中女五歲其少未免懐姑老䘮婦子幼失母號咷之聲簎耳酸骨校善惡則尤人論禍福則怨天復何言邪復何言邪龜告吉日用􅌾于城東二十有五里望州嶺之隂且刻石以識其墓于時歲在丁亥大宋慶暦七年亡女墓銘李覯之長女嫁為陳汝翼妻年二十六死其父傷之不䏻巳乃銘于墓曰巧以慧兮慎言語之汝家兮畏如䑕人生皆樂汝獨苦命之薄耶抑吾故汝来何為何以去墓無子孫乆誰護後人知汝吾之女幸掩汝骨無汝露鄧公儀傷辭并序亡友公儀名立姓鄧氏舉進士年三十二以死嗚呼公儀生數歲秀異不群諸兒善記誦聞扵鄊長而學成為文辭謹聲律主故實讀之温温可愛性賢深扵事理其道雖不著之䇿牘為訓具顧其身所履頗多矣事父母孝謹撫其弟愛而有法㢘不至狷儉不至菲氣堅正服義疾惡人不得巳而與居未嘗安若據棘芒也厭浮屠說斥巫祝邪媚逺之不使汙其門其意與予正同然予時有所避閉不出諸口公儀見事如不可忍雖在親戚多引繩墨彈直故予猶憚之也早苦氣逆藥之且平俄而執父䘮哀甚疾作不可治矣是以死嗚呼予自始學善之志合道一居甚驩衆不是吾行而公儀是之衆不聴吾言而公儀聴之樂未始不與共也憂未始不與謀也他雖甚厚弗之若也冤㢤失之矣復何言也公儀死前百餘日予将西㳺告之别時公儀病矣猶未知果至是也姑勉焉而去及其歸也而公儀塟矣不見其死友之不終也不銘其羙文之不公也吁墓之草再黄矣是皆弗可得而悔也徒傷之以辭云落落其實兮韡韡其華晣晣其鄊兮嗈嗈其家出䖏黙語兮禮而弗邪璞乎君子兮孰訾其瑕學優而仕兮維人之欲自巇而坦兮始圜其轂志愈張兮疾愈蹙老愛弱慕兮嗷嗷其哭嗚呼豈人不好善兮鬼之求不用于明兮用于幽不然何時未之知而命奪之善不獲福兮惟禍之随巳焉㢤鳥之飛兮隻其翼航之中流兮槳斯溺吾友之舍我兮不我力行焭焭兮将焉得自我不見兮再易其正心煩憂兮曷月而寧桂而酒兮以寫我誠路漫漫兮莫造其塋荘周之云兮息以死而勞以生斯言之信兮子無恨情吾道之不病兮吾文之行千秋之下兮庶存子名白石暹師塔銘并序佛法之行扵中國豈不雄健不校矣㢤天之生民靡不有事賢者效志愚者效力以有貿亡孳孳蚤夜而鮮䏻得志唯佛之徒去離逺甚安樂無筭王臣所嫗覆士女所合凑生則得其奉沒則得其歸而况人材有以超類者惟其心之所之而巳噫佛之法豈不雄健不校矣㢤今吾見恵暹師其人材超類者乎師南豐章氏子生十三年出家禮白石居壼長老誦法華經祥符中以恩得度壼既化去其住者恵通恵徳而師繼焉師有計慮䏻施為自通徳住時巳主院事殆今無曠性㓗特耻交凡俗積四十年不踐城市頗憙萹籍詠古人詩以對賔客吾少居山中嘗與往来慶暦五年復抵其居因告我以年老治送終之具院西有官隙地且買之以歸骨焉懼乆淪㓕無以旌識幸我之米請文以信之吾既善師之行又歎佛之徒䏻優㳺以卒也如此廼授之銘曰生也何来死也何歸神形一離曷封樹爲土石峩峩松檟差差惟門弟子是瞻是依直講李先生文集卷之三十一終直講李先生文集卷之三十二常語上或曰仲尼之徒無道桓文之事者吾子何爲曰衣裳之㑹十有一春秋也非仲尼脩乎木瓜衞風也非仲尼刪乎正而不譎魯論語也非仲尼言乎仲尼亟言之其徒雖不道無歉也嗚呼覇者豈易與㢤使齊桓䏻有終管仲䏻不侈則文王太公何恧焉詩曰采薱采菲無以下體盖聖人之意也或問伊尹廢太甲有諸曰是何言歟君何可廢也古者君薨百官総已以聴扵冡宰三年成湯既沒二十五月中伊尹之知政太甲之居憂固其常也不宮扵亳而宫扵桐近先王墓使其思念名之曰放儆之之至也故三祀十有二月朔伊尹以冕服奉嗣王歸于亳二十六月而即吉也則太甲之為君何嘗一日廢矣㢤或曰然則霍光廢昌邑王非歟曰霍光之罪㓕族晚矣知之不明行之不慎視君如玩物去取在諸掌董卓效之東京桓温用之江左宋齊以下覆車方軌職光之罪也敢問為光者宜如何曰皇曽孫髙材好學而光不知王賀放從而光不察既委質而臣事之矣庸可悔乎衞靈公之無道也有仲叔圉祝鮀王孫賈而不亡昌邑群臣有王吉龔遂忠直人也吉諌㳺獵而賀加禮遂捽大奴善属衞士長行法而賀不禁賀之資朴猶可為也况大将軍秉天下權其讒䛕者舉放逐之如吉遂者使居左右若夫漢廷固多士矣豈無輔弼之益㢤受皇帝璽綬二十七日而觧之何其暴也賀之言曰天子有争臣七人雖無道不失天下光而學也慙恨死矣或曰伊尹放太甲而天下厭然周公屏成王而國有流言何也曰周公武王弟也有次立之勢管蔡其至親也易以生怨以怨濟疑理固然也敢問太甲不䏻終允徳成王不見金縢之書則伊周柰何曰太甲賢也不得不改成王亦賢也不得不悟太甲成王果不賢耶則湯武不以託伊周伊周亦不受之扵湯武或曰知人盖未易也周公不知管蔡安知成王曰事有小有大有緩有急監武庚之國其任人也常事也天下之政多矣譬諸日月猶有所不照夫以新造之周而謀嗣焉其用心奚若堯不知四㓙可也至于丹朱其有不知者乎徐羡之傳亮謝晦廢宋少帝立文帝亮迎大駕扵江陵道路賦詩有悔懼之辭巳而果誅夫三子者有功扵文也何疾之爲曰疾之必也由其悲號嗚咽而後悔懼亮見事遲耳女之賊其夫而私扵我者其可以納之室乎是亦将賊我也宋文豈不謀其身不爾則爲後嗣也漢宣帝始立謁見髙廟大将軍光驂乗上内嚴憚之若有芒刺在背故曰威震主者不畜霍氏之禍萌扵驂乗也成濟刺殺髙貴鄊公司馬文王聞之自投扵地乃收濟家属付廷尉夫弑逆非文王意耶曰弑逆之名何可當也有其意者必假手扵人而歸罪焉養犬者固欲其禦人也客来而傷則擊犬慙扵客不得不有說也為大惡而得大利既外扵人倫矣况父母妻子狼籍都市者乎智矣㢤五僧辯也其對湘東王曰平賊之謀臣為巳任成濟之事請别舉人孰謂漢孝文恭儉而巳乎其有帝王之材者也知權者也周勃誅諸吕迎立之即日入未央宫夜拜宋昌為衛将軍領南北軍張武為郎中令行殿中然後坐前殿勃之掌握巳無物矣許勃歸相印既又使率列侯就國何其决也或曰孝宣之初曷不然曰勢未可也宣為庶人依許史而巳不若文之有代資也漢廷諸臣未始相識誰可與言㢤既踰年矣而光稽首歸政不因此謝之顧謙譲委任焉過也幸光速死不爾殆㢤敢問光雖無術其志忠矣抑可疑乎曰使光未死而隂妻之語泄則将何為權乎權君所以廢興國所以存亡戒之戒之一失之而不可復也惟至明然後可以權與人惟至忠然後䏻以權歸上敢問何謂也曰大權在已大禍随之夫其用事日乆刑人之父殺人之兄絀削人之爵位者多矣言而弗聴求而弗得者又多矣怨者㡬人邪怒者㡬人邪我一日而去其權則彼無動邪譬諸騎虎下則死矣富貴尚不足惜其如我身何其如我家何舍隆盛而就夷㓕人情之所難其附離者又欲尺寸功則斯人也䏻不異慮邪魏武有言曰不得慕虚名而䖏實禍信矣其惟君子無求生以害仁者斯可謂至忠也巳矣或曰古之至忠者誰歟曰其皇甫嵩朱儁乎平黄巾威震天下梁衍說之而不肯從陶謙推之而不肯應聞命馳走就拘朝廷其忠不可及也敢問不有郭子儀者乎曰子儀可人也然唐室雖衰人心未去程魚雖巧言肅代猶出命君命而違不反則叛矣反叛之名中人憚諸况子儀乎嵩儁則不然董卓李傕之猖狂獻帝雖在無獻帝矣因兵威乗衆欲以伐其罪孰不曰宜也彼以君命来遂不敢拒哀㢤二臣之心吾嘗為之痛哭矣或曰范曅評嵩儁以為舍格天之大業蹈匹夫之小諒卒狼狽虎口為智士笑何如曰申生不敢愛其死使天下知有父也嵩儁狼狽虎口使天下知有君也人以君命召我我以矯詔拒之其非矯者亦足以為之辭矣夫除君側之惡惡殛而君興可也不幸投䑕而器䘮焉安得靣目見天下㢤是二臣者所以自歸扵䧟穽也彼范曅弒君賊也宜乎其笑之矣直講李先生文集卷之三十二終直講李先生文集卷之三十三常語中晋明之明王導之忠其至矣乎或曰元帝固任導矣曰否王敦𥘉反導不足疑也而元帝疑之王敦再舉導乃可疑也而明帝不疑夫敦不以君爲君其肯以導爲君導既宰相矣藉令敦捷又何求焉在他人猶可無異志况導之爲腹心乎而劉隗用事導見踈逺且欲悉誅王氏當導之率昆弟子姪毎旦詣臺待罪也呼周顗以百口累之而不應也傷㢤唯恐其不免耳再舉則不然爲導者盍懲前事有不自安之心爲明帝者盍以前事疑之無委任之理而導詐哭敦使衆有奮志帝属導節使都督諸軍君臣之間若合符契遂平大難以濟中興非至明至忠其孰䏻㢤或問閻纉訟愍懐太子之枉皇太孫立復上䟽焉夫以惠帝愚賈后賊安䏻聴言徒觸死耳纉奚為㢤曰上聴言人誰不敢言佳㢤纉也是難䏻也豈一時之言萬世之言也惠帝雖愚萬世當不愚賈后雖賊萬世當無賊其言欲使著令諸有廢興倉卒東宫兵馬皆得輙嚴湏録詣殿前面受口詔然後為信聽其臣子得如邴吉距詔書周昌不遣王田叔孟舒隱親左右所以固儲副安後嗣誠㢤人主有喜怒宮掖多姦詐怒觧而後悔詐行而後覺無及矣如纉之言萬安計也嗚呼學者之忽也吾與士大夫接三十年矣未嘗有齒牙纉者也漢髙帝使陳平乗馳傳載周勃代樊噲将曰平至軍中即斬噲頭二人計曰樊噲帝之故人功多又呂后弟呂須夫有親且貴帝以忿怒故欲斬之即怒後悔寧囚而致上令上自誅之噲受詔即載檻車詣長安至則髙帝巳崩呂后釋噲或曰平畏吕后而巳矣曰不若是則髙帝以譛殺功臣吕后怒亦且報平勃平勃死則諸呂強又誰制矣㢤髙帝之不枉樊噲呂氏之不害平勃平勃得以誅諸呂安劉氏由燕之謀也不亦善乎或曰劉隗其亮直者歟曰敗中宗者此人也漢興至于孝景庶且富矣􅏯錯以天下壓山東卒動七國横屍東市中宗資王氏以有江左其強固宜帝不以術縻之隗方翾翾執刀筆以裁其末力不任兵而假鎮以亢斯足以速禍而巳矣魯昭公不忍季氏薨于乾侯晋元帝不忍王敦憂憤告謝子家駒諌而劉隗勸焉隗之罪著矣帝終不悟雪涕而遣之闇㢤孔子惡稱人之惡者子貢惡訐以爲直者夫有口才又有文法以羽翼之而忘忠恕何所不逮也其甚者干人骨肉不避父子時主以為忠識者以為賊國無釁焉則以自斃一有可為則危宗廟矣自斃者商鞅是也刑太子傳黥太子師惠王既立身裂車下危宗廟者江充是也太子家使行馳道中充以属吏謝之不聴階為巫蠱殺戾于湖武帝始以充忠直奉法不阿所言中意終則作思子宮歸来望思之㙜鳴呼噬臍也巳或問泉鳩里加兵刃扵戾太子者初為北地太守後族何變之暴也以為罪邪何以賞以為功邪何以誅賞之是邪誅之是邪曰理必然也夫骨肉之恩本諸天也怒有已時而愛無巳怒而欲殺則殺者功愛而不可得見則殺者罪矣夫豈不知殺之之由我也内無以慰其心外無以慰人心故歸咎云尓文帝逮諸縣傳淮南王不發封餽侍者皆棄市彼輜車封誰敢發邪非其人之罪也借其死以謝天下也小人因人喜怒以貪功而不度深淺禍其至矣故齊王自殺而主父偃族㓕魚復侯不得還闕而蕭順之憂卒聖人作議親之辟公族三宥所以養恩而小人間之亦不知量矣知其說者其田千秋乎其爰盎乎直講李先生文集卷之三十三終直講李先生文集卷之三十四常語下或問自漢迄唐孰王孰覇曰天子也安得覇㢤皇帝王覇者其人之號非其道之目也自王以上天子號也惟其所自稱耳帝亦稱皇書曰皇帝清問下民是也王亦稱帝易曰帝乙歸妺是也如其優劣之云則文王武王劣扵帝乙者乎覇諸侯號也覇之為言伯也所以長諸侯也豈天子之所得為㢤道有粹有駮其人之號不可以易之也世俗見古之王者粹則諸侯而粹者亦曰行王道見古之覇者駮則天子而駮者亦曰行覇道悖矣宣帝言漢家制度本以覇王道雜之由此也人固有父為士子為農者矣謂天下之士者曰行父道謂天下之農者曰行子道可乎父雖為農不失其為父也子雖為士不失其為子也世俗之言王覇者亦猶是矣若夫所謂父道則有之矣慈也所謂子道則有之矣孝也所謂王道則有之矣安天下也所謂覇道則有之矣尊京師也非粹與駮之謂也或曰詩人以后稷先公致王業之艱難其非諸侯矣乎曰武王既得天下詩人迹其世世脩徳始於后稷公劉以至于太王王季文王故云尔也當商之未䘮誰有此言乎如使紂䏻悔過武王不得天下則文王之為西伯覇之盛者而巳矣西伯覇而粹桓文覇而駮者也三代王而粹漢唐王而駮者也或曰祭法共工氏之覇九州說者以無録而王謂之覇在太昊炎帝之間然則覇非天子者乎曰說者之過也項籍亦嘗覇九州矣在秦漢之間矣尊懐王為義帝分天下以王諸侯自立為西楚伯王非覇九州而何也然謂籍曰天子可乎彼共工氏盖籍之類也敢問陽尊義帝俄自殺之亦足以為覇乎曰謂其號也不言其道也或曰文王受命稱王有諸曰否不得巳而伐紂可也紂猶未伐功未加扵民而遽自立以昭其私焉孰謂文王乃尓武王舉兵建大號追考虞芮訟息之年以為受命之始故曰惟九年大統未集十有三年春大㑹于盟津非西伯實改元也文王世子西方有九國焉君王其終撫諸後人追為之辭非西伯實稱王也大傳牧之野武王之大事也既事而退追王太王亶父王季歴文王昌是也康成取緯候以亂之過矣或問魯用王禮何如曰成王以周公勲勞命魯公世世祀周公以天子之禮樂周公尊矣故禰文王郊后稷皆倣王禮而不備焉周公而上王禮可也魯頌曰皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多安有非禮而頌之云乎周公而下則僣矣隱五年九月考仲子之宫初獻六羽公問扵衆仲始用諸侯禮也或曰地方七百里有諸曰信也然則孟子何言乎儉扵百里也曰閟宫頌僖公復周公之宇而曰公車千乗朱英緑縢千乗之地方三百一十六里有畸山陵林麓川澤溝瀆城郭宫室塗巷不與焉其何儉扵百里也世俗疑周官五百里以其大也是亦不思耳矣諸侯之扵天子非若敵國然也大國貢半次國三之一小國四之一諸侯有其地天子食其稅譬之一郡而巳矣魯七百里開方之而四十九殆半王畿也今之大郡不有半京畿者乎或曰紂囚文王七年諸侯皆從之囚紂扵是乎懼而歸之有諸曰紂以崇侯譛囚西伯謂其得衆也諸侯又從之囚其疑膠矣彼諸侯之力足以勝紂邪盟津之㑹者八百武王猶退師當此時也固未足以勝紂矣力不足而從之囚徒使其疑且怒耳紂䏻脯鬼侯而不能殺西伯邪是好事者之語也若夫三子獻寳則有之矣然則聖人以賂免邪曰狄人侵邠太王以皮幣犬馬珠玉事之矣文王曷不可况三子者之愛其君邪君親之難何所不為也或曰文王獻洛西之地赤壤之田請紂除炮烙之刑有諸曰以炮烙為是邪非邪是則不可以除之矣非而請除之則發紂之惡也賣恩扵民也羑里之囚既免又激怒之豈人情邪彼惟恐昭昭之不晦圭角之不刓也易曰内文明而外柔順以蒙大難文王以之其斯之謂矣或曰湯文王雖爲二伯其國不出百里也曰唐之刺史有一州耳其領節度觀察則連十數州有之矣彼中分天下而治之威權所及百里而巳乎後雖三分有二其益者未多也敢問湯崩太丁未立外丙二年仲壬四年則是太甲不繼湯也曰書序成湯既沒太甲元年不言仲壬也就令繼仲壬爲人後者爲之子太甲固三年也或問聖人之道固不容雜也何吾子之不一也曰天地之中一物邪抑萬物邪養人者不一物闕一則病矣聖人之道譬諸朝廷朝廷也者豈一種人㢤䖏之有禮故䏻一也女子在内男子在外貴者在上賤者在下親者在先䟽者在後府史徒胥工賈牧圉各有攸居而不相亂也夫所以謂之一也他人之不一則闤闠耳終日紛紛而無有定次也夫所以謂之雜也世俗患其雜則拘扵一是欲以一物養天下之人也白而不受采則人皆縞素矣何足以觀之㢤其歸扵諸子而巳矣聖人無髙行何謂也曰聖人之行必以禮也禮則無髙矣夫其髙者出扵禮也異扵人也故䏻赫赫之如彼也孔子事親無異稱居䘮無異聞立朝無異節何也安禮也出於禮者非聖人也矯世者之為之也敢問聖人有過歟曰加我數年五十以學易可以無大過矣夫豈無過㢤或曰孔子謙也曰仲虺之羙成湯改過不吝豈成湯之謙也㢤世俗之說者則謂聖人無過顔子不二猶或為之辭徒使人君之耻過也而不欲聞之也三代之政可得而言歟曰民不知之也商因扵夏周因扵商損之益之未嘗與衆忤也周公之制諸侯因舊國而大之百姓因舊田而廣之天下得不和乎㢤世俗之說者必曰復古古未易復也商鞅之除井田非道也而民從之各自便也王莾之更王田近古也而民怨之奪其有也孔子曰愚而好自用賤而好自專生乎今之世反古之道如此者烖及其身者也孔子之為司寇也不聞其改法度也沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏踰境而徙魯之粥牛馬者不豫賈必蚤正以待之也世俗之說者不曰正其身徒囂囂以疾人之法度其亦非孔子之志也大㢤孔子吾何䏻稱焉顔淵曰仰之彌髙鑚之彌堅瞻之在前忽焉在後仰之彌髙也則吾以為極星考之正之舍是則無四方矣鑚之彌堅也則吾以為磐石據之依之舍是則無安居矣瞻之在前忽焉在後也則吾以為鬼神生之歛之舍是則無庶物矣他人之道借曰善焉有之可也亡之可也夫子之道不可湏臾去也不聞之是無耳也不見之是無目也不言之是無口也不學之不思之是無心無精􅐩也尚可以為人乎㢤吾扵斯道夜而諷之矣晝而讀之矣髪斑斑而不知其疲矣終沒吾世而巳矣直講李先生文集卷之三十四終直講李先生文集卷之三十五古體後學南城左賛編輯三賢詠後學廣昌何喬新校正魯連誓蹈海夷齊甘采薇秦王不得帝周武終見非輕死議萬乗強哉三布衣凡人欺貧賤貧賤豈易欺和蘇著作麻姑十詠魯公碑他人工字書羙好若婦女猗嗟顔太師赳赳丈夫武麻姑有遺碑歲月亦巳古硬筆可破石鐫者疑虚語驚龍索雷鬪口唾天下雨怒虎突圍出不畏千强弩有海珠易求有山玉易取唯恐此碑壞此書難再覩安得同寳鎮收藏在天府自非大祭時莫教凡眼覷七星杉五行與萬類有象皆在天如何彼杉樹反更侔星躔予思古昔意欲媚兹山巔草木尚有斗人物誰非仙㘽培自何代衰老今多年大旱不減翠渉春無益鮮生當好世界過盡閑雲煙房心欲布政柱石安可捐煉丹井丹竈久巳毀井泉空獨存此地非常地今人非昔人我願刀圭藥輕舉朝明宸一言洗天日萬物㱕陽春群仙誰嫉妬使我身漂淪俯視廢井水欲飲礙荆榛徘徊片雲下泣涕霑衣巾少壯㡬何時且醉樽中醇玳瑁石前有縣大夫取此石為噐囂然夸謂予材與工俱羙如何爾鄕人器用曽莫備無乃居荒陬俗鄙不喜事荅云此石堅攻磨動時歲官用錢出民民用錢出已出民官不知喜一作憙事誠可貴岀已乃傷財誰䏻一作其不惜費大夫聞此言如有所忿戾今君倡是詩敢以報嘉恵秦人峯秦法雖甚苛秦吏若猶拙山林不數里俾爾逃得脫予觀後世事政役火烈烈苟非為鬼神何計避覊紲聖皇今在御百事咸均節常披詔書意苦念生財竭誰䏻将順者所望在賢哲無使峯中人笑我民屠裂流杯池幽居久不樂心死如濕灰聞言山有池仙客曽流杯披衫向西坐欲望無崇臺何當命遊宴盡聚不覊才顧恐狹隘地未足開吾懐仰手斸河漢決向天南来移舟復轉嶽壅遏成環廻横持北斗柄量盡酒星醅箕踞接下流一㰱空千罍八風助吟倡萬怪供嘲諧醉来散髪臥蠅聲視霆雷冷笑勢利子茫茫塵土堆碧蓮池碧蓮何歲開我時不得見于今到池上只有紅蓮綻紅蓮非醜惡物以多為賤阿蠻雖解舞不見真妃靣虎跑泉虎跑本何為彼將對以臆有如大丈夫卓爾抱剛直盗泉既不飲譛人亦不食山中小禽獸何足勞捉搦勇氣無所泄爪地成遺跡地神嘉乃誠水源如開闢尋常竊六畜夜傍人牆壁是與豺狼同聞此宜慙色丹霞洞山西十數里乃是丹霞洞直上窮雲霓中寛入罌甕紅塵生不識明月手可捧人家千里庭泉源六月凍風雨氣勢惡草木精神竦靈物少形見仙官何職貢俗縁易厭倦世事足愁痛寄語松上鶴他年期一控葛仙壇仙翁猶在時壇上何設施仙翁一去後夢草空離離下士固大笑言者多不知嗟嗟天壤内共是枯魚池穫稲朝陽過山来下田猶露濕餉婦念兒啼逢人不敢立靑黄先後收斷折傴僂拾鳥䑕滿官倉于今又租入哀老婦里中一老婦行行啼路隅自悼未亡人暮年從二夫寡時十八九嫁時六十餘昔日遺腹兒今兹垂白鬚子豈不欲飬母豈不懐居繇役及下户財盡無所輸異籍幸可免嫁母乃良圖牽車送出門急若盗賊驅兒孫孫有婦小大攀且呼回頭與永訣欲死無刑誅我時聞此言為之長嘆嗚天民固有窮鰥寡實其徒仁政先四者著在孟軻書吾君務復古旦旦師黄虞赦書求節婦許與旌門閭繄爾愚婦人豈曰禮所拘蓬茨四十年不知形影孤州縣莫䏻察詔㫖成徒虚而况賦役間群小所同趨姦欺至骨髓公利未錙銖良田歲歲賣存者唯萊汙兄弟欲離散母子因變渝天地豈非大曽不容爾軀嗟嗟孝治王早晚䏻聞諸吾言又無位反𬒮空漣如寄懐三首鳥獸死有用羽角筋革齒輦輓入工師飾作軍國器玉食白如瓠暝目巳腐穢生者不敢留埋藏與螻蟻百年富貴身孰若鳥獸類唯有令名人終古如不死又根生但為松翼飛但為鳯王侯尚可䡖道義本来重癡兒似婢妾寸歩矜恩寵傍人忍笑時佯把衣祛弄又齪齪復齪齪淺謀同燕雀不思明日憂但取今日樂俗儒抱書卷未去眼中瞙誰将古人淚更為今人落避暑富貴責且重慙耻心如何貧賤事易了飽煖幸巳多大熱火天下虚堂枕山阿㧞俗嫌人影考古分賢科潄冷齒雙噤飲香顔半酡一跣或移日遇狂還自歌去就各有志彼此無相訶原憲豈甞病賜也徒来過喜雨人皆喜膏澤我獨憂豐年歲㓙已賤糶年豐安得錢賦役忽驚駭倉廩甘弃捐銖銅苟可換富賈寧我憐歸来官事了相弔柴門邉農夫未盡死穀價應常然王心幸仁聖分職當忠賢謂榖賤為羙咄咄無欺天送上官直失意多怨尤有誰䏻自知遊人務乞丐之子唯求師成名在積善干禄先闕疑根本苟深固春風諒無私題昱師房三笑圖高僧不岀院屏畫三笑圖客子倦遊者欲去復踟蹰古人骨朽不可追今人相見如古時人間觸事入吾笑何必門前有虎谿寄祖祕丞我本山田人好尚與衆異平生重交遊所得國無㡬昨者應茂才西行覷朝羙時當慶暦𥘉選舉實多士茫茫帝王州栖栖逺行子携錢賃破屋乞火蒸陳米鞍馬到卽賣僮僕癡難使有時造公卿努力向廛市數歩則一歇長吁乃䏻起衣冠信質野言語欠婉媚閽人顧之笑將命見而避往往得所請蹌蹌向前跪何䏻剖懐抱浪自慕尊貴貴人如天神喘息生雲氣野夫等麋鹿芻豢非所兾㱕来坐空窻惆悵夕不睡塵埃滿鬚鬢臭惡入口鼻業已辭吾親中道豈可廢僶俛待報聞愁憂遂經歲二年正月晦閑房適假寐有奴来啄門手披上聲擇之刺承命驚下牀赤脚誤穿履從来未識靣只是聞髙第名顯宦且逹見我當何爲再拜請就席熟視知可畏昻昻貌甚古崖石掀氛翳渾渾氣甚和璞玉無芒銳髙談貫先哲雅意在兹世昔人相遇間一言猶合契今吾於擇之寧假再三計自此習往還中心蔑疑貳如熱息廣厦如飢享盛饋君授南康守舟維蔡河涘我館汴之隂前去路則邇時時結帽帶踽踽尋英軌衆人嬌綺羅相對紉蘭芷朱絃自三嘆笑殺彼鄭衛王命有期日都門一反𬒮君行劇鴻軒我䖏近匏繫曠日及孟秋皇慈始収試崇崇九門開窈窈三舘祕主司隔簾帷欲望不可跂中貴當棖闑蒐索徧靴底呼名授之坐敗席鋪冷地徤兒直我前武怒足防備少小學賢䏻謂可當賔禮一朝在檻阱兩目但􅌓眙捉筆析所問移時數千字讀書取大者纎悉或靡記炙背雖自竒寧當至尊意龍馬騰天衢駑駘合羞死量才與揣命坦蕩更何事振衣託㱕舟河流迅弧矢淮清江且平踰月在枕几及過廬山南聞君𥘉布治船檣旣入岸馬首巳来暨迎我到府署相見共欣喜嫩橘摘千苞肥魚斫千尾蕭晨徹骨淸佳境邀人醉髙㑹雖暫歡故園當速至草草成别愁悠悠渡湖水是時東方曙俄然北風厲陽烏畏威逃江神以儒戯氣象斗不同波濤大可悸長㠶張去声欲裂孤舟蕩無倚或從玉井出或自銀山墜篙工歛手立脉脉無窮淚從者閉目坐嗟嗟不敢視我時撫牀歌分去声作長江鬼所恨生劬勞不孝而巳矣禍福果無妄險難行可弭脫身得平康引領望鄊里厥後過挾日幸得見維􅎚入門何怡怡饌具有甘㫖稚女䏻紉針驕兒徧生齒芟除閑草萊䟽通舊沼沚君廬可終焉生計由此始郡守方仁賢學宫盛脩理踵門致勤恪命我論經藝麻衣何紛紛郷人子若弟不唯務章句所欲興禮義施為有本末動静有綱紀蚤與鷄同覺夜與月相值孶孳忘飲食􅣬􅣬在文史時附南康書或逢北来使尺素雖滿前話言難到耳殆及三年冬聞君受朝寄名稱按刑獄勢可平冤滯故人漸大任賤子差自慰軒車日已逺翰墨益難致薄命良可傷降灾渾未巳是年之季冬舉家纒疫癘老母尚委頓㣲軀盖螻蟻形骸非我有魂魄與心離權柄在鬼物功力非服餌曉突誰䏻炊午關猶未啓荏苒再周月幸㑹天不弃春風動枯槁甘雨澆根柢行行夏交秋吉微凶不替髙堂何戚戚疾病日攅萃一夕脾臓間發泄不復止詰朝問無言目瞑口齒閉號呶諸兒孫雜沓大鼎沸嗟哉當彼時誠恐弗可諱醫師相急熱巫覡兩經緯藥草極酸辛法術殫怪詭薄暮乃復蘇踰旬僅知味方兹戀庭闈旋已對獄吏試言其所由内省亦無媿有人同州閭發迹自徒隷竊𬒳儒衣裳曽亡小材技突如㳺京邑欲以干明叡朝家焉可欺覊旅謀自濟乃造黄紙書便取靑𫀆衣乘舩㱕南方歛板謁當位自言章奏竒因藉宦官勢詔文降自中宰府不預議旣云䏻占天且曰善興利江淮一經過郡府十不啻到䖏爭逢迎莫䏻思䖏置轉運苦愛竒得之如國器故使按坑冶庶可展才智小人靡忖度假寵愈放肆行符索吏卒圈印發傳逓閻閭望塵拜州縣從風靡遮道結繒綵鋪筵塞珠翠車騎前後呵給使數百指何者為典刑獨自誇瓜觜在昔秦無人繞朝贈之箠繄我非聾瞽碌碌寧不耻作書貽諌官姦詐患不細有詔令逮捕按驗取真偽是夫知計窮誣我以罪戾上官猶眩惑凖例皆拘係幽幽圄犴中憤憤爭競裏周旋二十日乃克見巧敝畫地尚不入叢棘曷可寘惟兹謝吾母㡬不全髪體教道亦難行凡庸豈同志吁哉養英才徒以釣積毀篋書㱕敝廬庠門任蕪穢去年仲夏後盛暑若火熾郊園有餘爽𬞞果聊可嗜時復觀田疇畢力奉耘耔人生但飽暖此外皆淫侈思君非一日欲去無雙翅俄聞遷黄州又說丁䘮制古来聖與賢誰不遭醜詆蜀日駭狗犬夏鼎愁魑魅人夀有短長孝子謾憂思㓕性經所貶節哀禮為是矧夫王佐才簡在唐虞際揚名以顯親報徳豈不韙加飯苟如願蒼生猶有恃適時匪我長不朽乃所擬道義果弗充富貴反爲累回憲本無官桀紂焉得此俗子但相非吾心巳居易近者游葛陂念君在衰枲作詩布幽懐讀之勿嗤鄙名男曰參魯以詩喻之孔門有高弟曽子以孝著求諸聖人言尚曰參也魯才敏誰不願顧恐難荷負苟無徳将之何盗於父母昔如呉起者善兵亞孫武齧臂㳺諸侯親䘮哀不舉楊彪有子脩器䏻頗可取一旦以罪誅䑛犢徒虚語吾生本薄祐略無兄弟助及汝又一身不絶如線縷祖母唯汝愛無異所生乳寧止託祭祀亦欲興門戸伎倆勿求名適時乃有𥙷計慮勿尚巧合義乃可䖏持重尚寡過摧剛庶無懼内以保家族外以揚名譽髙山在所仰今人豈殊古參魯爲汝名其字曰孝孺女色無定羙贈卿材女色無定羙寵至羙則多士才無定稱用顯稱巳過長安小家子粲粲秋池荷性慧不覺耻母憐不加訶出戸一囊麝見人雙眼波情動笑難止語嬌音屢訛都人口如沸觀者踵相摩因縁幸充選恩澤成偏頗少費萬金珠一呼千綺羅佯愁慘白日猛唾傾天河東鄰有賢女春緑涵脩蛾花艶不裁翦玉光無切磋自小固聞禮藏頭豈知他親戚尚未見媒官當柰何過時誰訪問生世就蹉跎豈不有配偶市里或山阿豈不有奉養舂饎與機梭列女不得傳樂府無人歌容華日衰落涕泣坐滂沱富貴易脩飾貧賤多笑呵柳下無仲尼小官終㓕磨進退在勇决遲疑两皆蹉退當事竒偉夙駕追雄軻進當取勢位徤筆為干戈胡然守一節獨自埋随和江亭醉後平生尚倜儻壯大苦摧折主人䏻結納佳境為鋪設渺㵿東江來谽谺暮雲裂倡女稍多藝市酒且供啜俠氣復何聊心朋幸相悅解冠從放蕩大呼誰輓掣咄哉千里足嗟呼三寸舌悔物喚龍取天葩令鬼折艶唱聲非雅戯談理當譎帷房笑私眤閭巷嘲瑣屑更皷莫催睡夜風纔去熱俗士鮮大志于今重小節内行豕在泥外貌犬伏紲吾儕古豪傑方寸浴日月𬒳謗肯自疑爲歡顧猶拙放飯彼不慙使我無齒决寄章友直人生何足貴貴在天資秀譬如沙石間金玉豈常有有才不善用多爲淫邪誘嗟哉棟梁材往往厄樵手章子吾不識羙在衆人口如何材藝多四十無所守所守者何為非貴亦非富古今聖與賢歴歴垂星斗景行苟有成進退無一繆不䏻攻天下尚可名身後百年随飄風白髪勇未闘良時且不反飲恨唯尸柩無謂學巳足大海難掬潄無謂過可文希珍尚磨垢智者當自知既往誠何咎西子蒙不潔見者掩鼻走惡人幸齋戒上帝必孚祐相如竊妻逃犢鼻從沽酒一朝賦上林在漢為稱首努力念前哲吾言非子詬中春苦雨書懐春秋書大雨三日巳為霖如何方春時終月常積隂淙空若泉瀉盪地成淵深曽無晝夜别顧恐山嶽沈疑是天上河底漏不可禁傍無女媧石欲𥙷難為針又疑坎宫水陽曜所不臨何等大鬼物戯把北斗斟誰籠三足烏冷臥空桑林勾芒失權柄羞耻啼盈襟枉殺㡬樹花恣許泥土浸一作侵或云天有意欲使誅荒淫田榖彼何罪芽頴當森森一粒且漂溺不啻千黄金路絶吊客行餒我一作死憂巢禽風聲怒打屋寒氣獰穿衾况我出山逺乆次茲江潯嗟嗟歲月晚悠悠金玉音無聊但詼笑有得還歌吟莫怪旅愁甚旅人千萬心弋陽縣學北堂見夾竹桃花有感而書暖碧覆晴殷依依近朱欄異類偶相合勁節何䏻安同時盡妖艶無地容檀欒移根既不可潔心誠爲難外貌任春色中心期歲寒正聲尚可聽誰是伶倫官孤懐智者在不惑君子貴知㡬彼昏有耳目無䏻辨是非蜀犬盡鳴吠羲輪自光輝古人不可作垂涕沾吾衣讀韓文公駑驥篇因廣其說主人渴良馬僕夫念駑駘行遲追易及力少牽易来時聞千里足百箭攅其懐主人雖欲買衆口大悠哉送陳次公茂材俗人無心胷貴偽不貴誠口吻當文學犇走成名聲之子出蒿萊行潔業且精中羙未外發樸質亡華英持此嚮廣衆詎免笑與憎况復覔薦舉路險豈易行所願天命泰因之主者明牙絃一皷時鍾子耳必傾蝦蟆蝦蟆爾奚為閤閤攪人耳在官不為去声官在私無私事徒将一寸口日夜相鳴吠豈䏻劖語言且欲譟夢寐何者孔稚珪愛之如皷吹誰論正與淫各自有知巳惜鷄詩曩予家居見鷄有異者為之動心甞欲作詩而不果戊寅夏五月學于山中乃追賦之曰吾家有鷄母乗春數子生生来踰六旬互覺羽翼成其母且再卯逐之使離散衆雛既不来一子獨戀戀戀戀不肯離逐之終不移母行無險易唧唧相追随卯生亦云足母伏窠中宿厥子苦無依攀背如悲哭窠中母所安忍渇復忘餐子於背上臥不捨須臾間我時見之喜異類䏻如此因欲觀其終其終諒何似一朝大長成乃知牝牡情膨脝娠在腹漸見東西行行行求飲食欲以助生息卵出子還多養子何勞役朝啄荆草林暮爪汙泥深昔時随母意今作愛雛心雛生誠可愛母老寧忍背物性乃不常使人心歎慨物類本無知無知孰責之斯鷄與衆異酷似有天資天資以仁孝變更何太早况彼本無知血毛安足道萬物靈者人孰不念其親少艾與妻子所以奪吾真五十慕父母虞舜稱稽古埋子得黄金邇來唯郭巨占人往莫追言之淚沾衣斯言足自警題作惜鷄詩日出吟日出百鳥喜覉人嬾舉眸長恨年光緩禄養未可求若至年光過髙堂又白頭羲和君有知柰我心悠悠聞女子瘧疾偶書二十四韻寄示昨日家人来言汝苦寒熱想由卑濕地頗失飲食節脾官驕不治氣馬癡如絏乃致四體煩故當雙日發江南此疾多理不憂顛越顧汝僅毀齒何力禁喘噎寄書詰醫師有藥且嚼啜方經固靈應病根終翦㓕但恐祟所為甞聞里中說兹地有罔兩乗時相罥結嗟哉鬼無知何於我為孽我本重脩飾胷中掬氷雪禍淫雖甚苛無所可挑抉疑是饕餮魂私求盤椀設盡室唯琴書何路致葷血無錢顧越巫刀劒百斬决徒恣彼昏邪公然敢抄撮吾聞上帝靈網目匪踈缺行當悉追捕汝苦旦夕歇慈愛早有加憶念今逾切塵勞差可畏歸計又云輟所生䏻劬勞祖母矧聰哲羸臥縦未蘇撫視諒非拙勉勉多自安風來信勿絶讀史子長漢良史筆鋒頗雄剛惜哉聞道寡氣志苦不常心如蟲絲輕随風東西揚一事若可喜不顧道所長公言絀原憲俠賊乃為良仁義謂足羞貨殖比君王黄老先六經斯言固猖狂吁嗟夫子没兩觀無刑章予懐班孟堅駮議何洋洋傳與後世人慎思其否臧和育王十二題筠州楊屯田以僧常坦詩俾予和之題之義坦自有解金沙池遥聞金在沙知是虚名號世人方競奢何兹有遺寳佛迹峯佛迹空在兹佛心無䖏所尋迹以求之似學邯鄲歩七佛石萬物雖散殊孰非道之體何必石岩岩方疑金色臂袈裟石𣑽教一来東群心日歸向土石至無情也作披緇狀明月臺月色固無改㙜基亦不壊嗟哉翫月人古来誰更在石屏風形模皆自然樹立豈人力松影與秋光掃成真水墨靈鰻井田苗自枯槁井鰻人所禱若教龍有靈此魚何足道供奉泉璘師鑿此泉晨夕奉親老因知逹者心豈甞離孝道育王塔甞聞有爲法佛說如夢幻胡然窣堵波香花耀凡眼八角殿晉後千百年茲殿儼如昔𣑽宇若皆然應須省民力晉年松典午旣陵夷群材共淪謝唯有靑青松于今𬒳王化重㙜蓮長疑佛界中天女來行樂為怕山風寒仙衣盡津忍重著羙女篇繁霜毒春木花開苦不早愚夫擇利婚羙女貧中老曷不冶顔色門前車馬道閨房有禮文自衒誰言好俗態競朱粉古心慕蘋藻所期君子恩卒以慰枯槁苦熱夜熒熒背明燈黯黯垂踈帷階庭豈不好蚊蟲苦相期壊扇無淸風暗樹多斜枝屈指山泉侣寂寥空所思丐僧靡靡歩康衢喋喋問流俗誰将今日財願易來世福休論身善惡佛眼重金玉閔俗君門若無禄陳編孰䏻讀公庭若無法穢徳誰不足煦煦儒者言沈沈小人腹傷心勿復道拂絃寄淸曲感歎二首世常羞貧賤貧賤非我羞道成不見取貧賤誰之由陛楯擁堯舜廊廟居伊周靣對豈無說咫尺路阻脩浮雲關太虚白日光逆流嗟爾臨人者蔽賢天所仇又得志萬罪消失志百醜生誰云王路寛枯槁不敢行出言到口角縮舌悔恨并自省由若此况乃蚩蚩氓故知當今賢未有非簮纓寄鄰父離山闕㱕期滯蹤如在獄他門一臠炙賤子萬端辱吟憶圃花盡夢知原麥熟公言富貴遲何似耕穫速竹齋題事低齋結空野小竹移孤林齋閑竹淨好日媚幽人心南方夏厭暑獨此留殘隂戞雨挫促夢穿風搜凉襟長茵展麗蘚亂歌奏歡禽侍奴褁村服語客抛塵簮志髙成利讐思爽生詩淫值聖喜盈卷感古悲入琴山迎穏履逺月勸澄柸深榮名雖未染幸亦非堙沈贈黄秀才别朝閨入有籍䟽逺難見君世眼不識道貧賤無高文蘭蕙生同草鴻鵠心在雲贈子喜别離兒女安得聞雨中作群隂侮陽徳雨陣春嘈嘈白曉慘成夜瓦口生飛濤凝雲列山韒冷氣攅衣刀徑閙有松竹庭臥唯蓬蒿花淫得罪隕鸎辯知時逃隰苗出水短木菌随日髙㣲吟雅於樂快飲甘如膏朱曦待未見天盖空牢牢獨居苔根跨階發白雨滿四簷春眠嬾下枕日午誰開簾浮塵裹酒榼餒蟲鏤書籖榮樂豈不欲非義固所嫌閔雨詩呉江之南是曰豐國五種之生天下食一歲不登吾民菜色如何天不仁縦彼旱孽稱其神矯矯赤龍推火軒来自東南山咸池愞水不敢沃陽侯失色愁烹煎况茲畎畂流涓涓何足吸之唇齒間但見禾與黍蓬勃紅塵起土伯勑其屬掃路迎飢鬼哀哉氓蚩蚩託身釡鬲惟蒸炊小人怨咨君子知天生天殺今其時我聞皇穹大徳在生育愛養萬物同嬰兒産民之身賦民食中道絶之何所為當時㝠㝠間委任非其宜山川之神各守土群龍受位司天池上帝當軒親戒勑十日一雨無愆期帝心仁且信臨下固不疑謂言庶事有分職屏去視聽思無為安知愚下鬼負徳孤恩難制指弄天之權侮人命貪嗜牛羊邀祭祀忽焉一物不稱情因教此旱灾生靈雷霆之官畏罪莫敢諌頭枕天皷眠不醒帝在紫微垣下隔千里雲徒勞銜血向空哭帝心雖聖安得聞北斗侍帝側斡運氣母均四時五星曁衆宿照曜亡偏私夫何容此鬼恣行胷臆輕天威定是機務繁耳目有所遺小臣亦何者草莾負竒節欲係神􅖪無長䋲欲斬龍頭劒鋒缺皇穹如未察凶邪空使小臣心欝結訪周道士豈無飲食奉歡樂亦有賔客相追逰宿酲在枕或時起俗話入耳令人羞偶随賢友訪仙子一臨花檻斟瓷甌塵埃何處是浮世松竹此地長淸秋古來擾擾富且貴天下茫茫公與侯盖棺事了何足數乗興嘯傲真良籌甘露亭詩乾坤父母莫匪慈胚胎億兆成角覊其間哺乳不及䖏有時泣殺􅈱呱兒南川上㳺號沃野景祐丙子嘗凶饑新田始苗舊榖罄十室八九無晨炊伏隂何者不仁甚釀作水灾来助之煙煤刷天雨汁黒嘔山泄谷爭奔馳横流一夜打城郭萬弩竊發穿毛皮東隅有洲尸揖揖如蟻欲走遭水圍屋根無力樹腰折蛟蜃食人猶擇肥濤波一望萬山阻六親不得相扶持國子劉公好仁者惟時假守茲軍麾民生在我不在命告舟往救無敢違童兒赤立婦女困載之刳木何纍纍泥沙外冷内飢渇口噤不語如狂癡牽攣坐臥滿府舍賦以酒飲加饘糜随流往往亦不死逺在百里無人知捐金購得問氏姓召使親族携之㱕司農倉廩盡發出不待奏報先施爲有餘况可補不足大賈蓄家如響随来瞻去察夜繼晝赤熱不忍䕃華榱由斯一郡十萬戸餓膚日月生膏脂存者相保没者葬唐虞仁夀重敺躋聖主養賢賢養物氣和郁郁通髙卑城西老宫古松徑一朝墜露甘如飴干柯萬葉結不解玉階瓊樹光離離甿俗奔走競觀覩手攀口吮同齎咨學老之人周氏子好善不類黄冠師欲令事迹絢久逺築亭其地髙巍巍公之㱕朝不可借松樹至今猶未衰我作此詩掲亭上他年堕淚如羊碑送丘寺丞嗟予兀兀何施爲學無異意唯傳師甞言先聖所述作人事而巳亡他𡵨安知歩歩有天道繄我丘師䏻識之春秋下應三千歲雅頌周流十二支闡幽大傳與隠旨圖寫轉匝成圎規勞兄示我復教我一字不曉如癡兒文侯聽樂唯恐臥今我幸免指目皮丘明子夏言不及我兄所得何神竒直疑前身是顔子獨受師說無人知又疑夢寐感靈怪常與周孔相追随不然悠悠千載後何傳何習遽如斯窮愁著書古有例昨官閩中今海涯海涯路逺學者少斯道未有施行時聖皇誅賞甚明白歸來奏牘無遲遲江南臈雪片如掌酒花上靣寒力衰是非得失從此止馬頭一别東西馳荅縁槩師見示草書千字文并名公所贈詩序佛繇西域漸中土欲使群心皆鼓舞若顓𣑽語及胡書昧者雖從明孰與其徒徃徃多材䏻暗結時賢為外助逺公自昔来廬山誇逞蓮花邀社侣吁嗟君子遭亂邦舍此未知何䖏去邇来一行善記覧齧破乾坤尋曆數或攻文苑掠芬香辭則貫休筆懐素其餘曲藝與小詩布在人間難悉數賢豪大抵多憐才引致門牆無齟齬其人既重法亦尊羽翼大成根本固我縁山谷見不逺緇褐憧憧盡愚魯坐量此去朋黨衰纎縞焉䏻拒强弩去年有使自番陽手藉一函来我所發函乃是縁㮣書千字滿前雲縷縷衆人飽食巳用心欲噍伯英肥羙䖏當時名士嘉其䏻長序短篇聮繡組因思幅員千萬里如師之䏻更㡬許以儒輔釋日益多何恤區區一韓愈春社詞并序寳元二年甞夢大雨震所居室驚而仆地既巳有一人甚長大紫衣而冠意謂雷之神也呼覯使前授之題曰春社詞詞或作篇字不能審覯懼栗栗援筆得八句與之及覺尚記其首三句頗怪麗今七年矣值暇日以五句足之呉䑓翫春鎻春色雨刷花光入龍國田邉大樹啼老鴉野雲癡醉寒查牙年華欲住風雷惡蘭臉知秋涙先落時榮時謝無了時扶起混沌須神醫聞訓狐昔年因讀昌黎文知有訓狐猶未真客堂昨夜㓕燭後一聲竊發誠驚人慈母入席匪虚語據此麄暴誰敢聞殺人之子養爾子天地不管胡爲仁豈無鷹隼善搏擊去路昏黒難相親亦有弓矢可彈射郤恐誤中東西鄰我今獨處雖無懼聒不得睡寧不嗔甞聞鳯凰百鳥君丹穴萬里誰䏻言行當整頓九韶樂奉迎綷羽掀重雲直前再拜列爾罪爾軀何足爲灰塵聞喜鵲翩翩者鵲何品流羽毛白黒林之幽生平智力可料度有巢往往輸鳴鳩天然郤㑹報人喜愚兒㓜婦唯爾求萬聲千噪幾曽驗聞者終是軒眉頭從来烏鳥愛反哺孝慈情性誰可儔其間於事最先見告人凶禍令人憂憂時不肯自脩飾禱請神鬼爭啾啾告之愈驗愈見惡去声共云灾患鵶之由彈丸瓦石相驅逐名園佳樹難依投忠言逆耳世罕用屬鏤曽割伍員喉莫笑後來司馬公事事稱好真良謀解湯延祖字仲尼作經授曽子明稽至孝之終始始於事親終立身以是揚名於後世大雅有言念爾祖述脩其徳乃爲羙聖訓昭昭十八章寫之琬琰千餘歲湯生本由義方教石磨沙盪求成器其名延祖有意哉吾以子立為之字立身之道将何如非曰凡人富與貴不賢而位何能為蠅蟲豈不披紅紫周公亦人舜亦人口衘日月坐天際勗哉見善勿遲疑往往後生誠可畏直講李先生文集卷之三十五終直講李先生文集卷之三十六近體五言二韻詠竹外邉雖節目内裏郤空虚從来汗流浹只爲寫經書霜夜落無人見朝看到䖏新非君有分别力不柰松筠氷水性本来弱漸寒成此堅東風有時到㡬日是殘年鵞逸少曽留翫人因喚右軍鳥名加爵號不離羽毛群鴨庶人常用贄貴在不飛遷飽食待庖宰虚教兩翅全惜才醜婦易爲潔愚兒多守純天將惡文采萬物恐無春五言四韻山舍寓止無計柰踈拙走逃雲水隈鶴飢雖厭夜龍睡却嫌雷師友關千古窮通付一杯啇巖版築者底䖏有梯媒東巖精舍像設彼何時髙僧白衲衣水寒吞日氣樹老慣霜威幡影捎天近鍾聲落谷㣲可憐成道易無事即無機閑夜披衣坐小亭夜氣拂人淸月暗先成暈蟲吟不識名舉杯期混沌開卷賞莖英此興知誰㑹松風鶴睡驚霧光明人所好幽暗此何為樹在谿無影禽来鶻未知愛花留潤與避日卷隂移底事偏相惱天涯欲望時自詠俗態共紛紛吾心誰與論幾因清夜夢還見古人魂聖域寧無樂文家别有尊此身聊自足獨恐累兒孫睡思俗語不入耳旅愁還到心坐多渾易厭夢好欲重尋暴雨撩蓬響殘陽過嶺隂廻看犇競苦此興貴南金愁熱江湖限南鄙秋令到還稀節換空看暦人閑未趁衣齊紈方得意厦燕莫言歸秪有松筠徑風髙暑氣微鑑湖夜泛以明月到樽前爲發句明月到樽前拏舟古岸邉亂山斜入霧逺水倒垂天酒氣薫龍戯歌聲弄鶴眠廻頭嗤李郭此外更無仙池亭小酌得和字客思都無著臨池一醉歌喚春呈物象移性入天和月影碎荆玉波紋緯蜀羅相看盡仙骨俗態巳無多廻胡舜元賦藁一把長篇讀驚嗟即過旬誰知後来者還似老成人古訓但時習英辭當日新慙無稱薦力空此見天麟迴黄通詩篇老杜没巳久嗟哉吾子心時人任詬病獨自革浮淫羙玉寧須琢朱絃豈在音鍾期如未見慎勿等閑吟送路拯北遊六月地欲赤驅車河朔行王師備戎羯㳺子念功名盡識山川險深窮彼我情㱕來具封奏直上請長纓感事太平無武備一動未䏻安廟筭何時勝人生到䖏難役頻農力耗賦重女工寒秪有旴江守憐民不愛官時國子慎慱士守本郡閑居無物可勞情空郊日閉扃雨吟春破碎貧飲客凋零世事重江險才名一夢醒同心秪松栢見我尚靑靑萍盡日看流萍誰原造化情可憐無用物偏解及時生泥滓根萌淺風波性質輕晚來堆岸曲猶得護蛙鳴送張鬷嘏人意皆懷土嗟君無故園欲行須盡室此去又他門静裏文章好貧来節行存振淹知有日倚伏豈虚言村行産業家家壊誅求歲歲新平時不為備執事彼何人朱戸仍奢侈柴門轉窶貧若非衢室畔無用說悲辛感懐寄擇之衆人皆銳進唯我復幽居慮逺夢多亂身閑氣不舒干求非禄位好尚豈詩書日夜又日夜霜寒鬢髪踈鷄嗟爾羽蟲類昻然冠距麄徒為識昏曉猶未免庖厨年少苦令闘主人頻見呼寧思避弋者天外去鴻孤堂西夜坐炎蒸得避處鋪席對西牆有月樹隂黒無風山氣凉聚蚊妨袒裼飲井當壷觴妻子詎知我笑言皆在傍寄題陳適追養亭築室先塋下哀心有所歸毎来開戸牗渾似戀庭闈丘木成風樹衰裳換綵衣吾生與君類東望涕交揮送宜黄柳尉荒郊人事絶歡喜見時髦舊業椽爲筆新官草染𫀆幽明終考績州縣豈徒勞况有松筠性凌寒節更髙送君俞之子来相問吾言豈不誠文章難得理聲律易求名貧甚須淸節親安莫逺行異時如有立宗族亦知榮送黄祕丞天下爲人子何人似慶門二親皆白首同日拜皇恩就養蘭生畹娯賔酒滿樽自嗟偏侍早相送只銷魂寄題廖說蒙亭聖人雖在上君子有窮時自得山居樂何須世俗知夜多松月分凉與水風期只恐亨通去淸閑却付誰晏起貧士無所務閑眠常起遲謾勞鷄口喚不柰睡魔欺宿酒猶薫腦朝飢未到脾誰䏻空汲汲肉食自謀惟養疾少小唯貪酒病来纔信醫問方逋客許尋藥野人疑夜擣全聽慣寒煎覺沸遲古賢曽愛死此意亦誰知遠山最䏻牽病眼天際一山横盡日是秋色無人知地名暗時雲自合缺䖏路應平才子霑衣淚千秋共此情送呉伯華典學淡無味畏塗来幾程舉家應好事努力為求名馨膳南陔逺連環昨夢驚夀觴何以薦經術抵金嬴次韻陳殿丞除夜懐感浮世因循過流年次第新廻思舊來事都似夢中人不飲偏嫌雪多愁却怕春星魁欲寅位五鼓莫頻頻早歸病馬不妨騎出門常便歸見人無事說是物與心違通塞元關命驅馳轉覺非莫教塵裏汗壊郤篋中衣晚聞角傾耳斜陽裏無聊拭淚頻平生慣聞䖏今日自愁人夜近歇不久風来聽得真胡笳更何物只此巳傷神庭樹不是㘽培力誰容此䖏生細聲饒客睡斜影與鄰淸地窄根猶迸秋遲葉未驚虞人雖欲伐郤怕損簷楹哭女二首妻死女巳病踰年成二䘮此生誰骨肉未識好衣裳看靣雖猶小聞言盡可傷最知憐祖母句句刮人膓又老樹枝葉薄先秋風雨過人間不善事身外想無多理遣誠如幻悲來豈柰何從前短鬢髪為爾漸雙皤贈端師十載寓都城人傳善相名一言知禍福相識盡公卿洪井舊鄊路紫衣歸計榮塵縁應漸了何日悟無生寄題鄒氏延夀亭一世躋仁夀君今更欲延山中想無事分外得長年松老多經雪雲閑不到天區區殉名者廻首倍凄然感秋徙倚重咨嗟非縁惜歲華關山異鄊客砧杵别人家天冷雲含日谿淸水獻沙屈魂終不返悲思更無涯次韻荅陳殿丞不䏻随薄俗非是向深山自喜道無屈所嗟心未閑酒鄊貧更入詩債病猶還一字成虚羙通宵只厚顔讀趙氏淳化詩集少年曽誦習誤認古人詩風雅世不重姓名誰得知髙情如隠者薄宦過明時地下尋才鬼應逢陸與皮小女惜汝今何恃言來淚滿襟死生雖分定襁褓累人心飢買鄰家乳寒勞祖母針豈知泉路隔時撥緦帷尋送呉著好學誠雖篤事親心不忘秋風滿黄葉㱕路正重陽力行宜無改脩辭况有方起家知可望蘭秀自聞香題靈陽宫費君投杖䖏行客過彷徨水靣風雷散沙頭草木荒一壷誰世界千古共凄凉大塊偏勞我燒丹未有方龜峯精舍去縣二十里路平時正春四山唯有石一寺更無塵融結疑天意經營憶古人但知安樂䖏何必是金身鳴蜩雨餘雲漏日蟲思巳喧喧時節驚𥘉夏聲音似故園為誰吟緑野相共送黄昏便是秋来信霜髯更幾根送張評事江上楚花鮮君行一黯然居官無藉手選部豈知賢㢘善雖由已亨通亦在天都人如問我踈嬾甚當年送春送爾歸天去天應解禍淫物生誰得所我見獨傷心楚詞有目極干里傷春心之句好景吟来徧芳樽醉不禁東風别無用百草巳成林君賜以新詩相示因成四十字荅之君詩三十首一一敵琅玕語近終非俗情閑不似官姑山蟠郡碧旴水蘸天寒景物将才思相期李杜壇送李侍禁三載旴江上軍和盗亦殱事煩終不惓貧極始知㢘别袖揮寒日歸舟載夜蟾懋功宜有賞天意在官占寄周寺丞我愛南豐宰天資舉措竒上官如不怒善政有誰知賦役貧中減鞭笞惡處施邑人多未悟去後始應思次韻閻判官除夜宻雪穿窻入孤燈向壁光老来人不覺夢斷酒猶香世事休思慮年華任短長朽株難長育空此見春陽送閻判官鄊樹江淮接軍籌嵗月深從公雖盡力當路少知音賦命休重問離觴且滿斟君言鵬與鷃何者是飛沈送彭昱應舉計偕千百數太半是虚名近日逢吾子中心歎筆精衆人皆禄位所貴在誠明努力唐虞際期於大有成送黄銳應舉先世宦不逹少年才巳雄何人為父執獨自振家風物色營求廣賔興禮數隆孤寒今有望太守漢呉公夏日郊園三徑是生涯朋㳺日已賖野情饒皓鶴寒氣入甘瓜移竹調風韻䟽泉浴月華塵埃應附勢不肯到貧家寄黄晞長憶黄夫子才髙行亦淳世情輕近事見慣即常人何力康時務将身役路塵七閩山水國是處好安貧送黄介夫短亭車馬地送子一盤桓不畏離群久所嗟行路難曬衣雲日薄撲面水風酸聖有中庸訓時時著意看送山甫喜爾年将壯為儒志可嘉鄊閭知行實塲屋見辭華公道方無壅君門况不遐直應千里足世世出吾家送沈郎中偽飾久終變真誠老益純官為郎位貴家似舊時貧去作吾民福㱕尋楚水濵他年名粗立林下願相親送江茂才少小尚英竒髙談與衆違久窮纔信命逺客合思歸簞食非無樂京塵誤入衣雲山仍舊好况是覲庭闈贈端上人佛法本無二誰論律與禪水行到䖏入月出有時圎事去何甞念忙中不廢眠松堂白日永幡影自飄然千福寺昧軒何人指蒙昧題作此軒名天理自晝夜道心無晦明用當群物化舍去一毛輕磊磊山前寺時聞鍾磬聲怡山長慶寺行行金碧裏氣象怳如春不記来時路自嫌衣上塵院香知有佛僧静似無人十載京華夢相逢一欠申傅翼甘圃老圃君何學中心切養親從来啜菽處便作采蘭人百行當無愧三牲未足珍孝㢘方察舉勉勉詎長貧林屯田思軒慮逺無如静茲軒得地幽一官雖智效萬仞更心㳺風月趋吟筆乾坤入坐籌延英期上對豈是為身謀廻明上人詩卷學佛有餘力吟詩過一生情閑氣𦦨少句好琢磨成栢竹門庭古氷霜筆硯淸輸他飽食者終日自無營聽周大師琴已解琴中意更加絃上聲他人鄭衞雜此手鬼神驚深夜衆籟息寒天孤月明四鄰應得睡濁酒且同傾送覺師西遊乞御書累聖多材藝留神翰墨間皇墳非小道玉版徧藏山上士持三學西行謁九關奎華如可棒歸伴白雲閒送分司呉太愽還鄊休官衆未許分政且歸閩名係金閨彦身為蕙帳人林泉新得主冠履漸無塵知足應常足安䏻更問津送任大中真偽少分别吁嗟此世情西施作老婢南郭逞新聲命合生来困詩應没後名旅㳺何所得赤日又徒行送杜奉職靑紫皆同道稀曽到薜蘿感君非我軰無事毎来過此别當貧病何年共醉歌人生有後㑹争柰鬢雙皤送陽曲蔡尉鳳皇貴在徳孔翠豈無文詩禮多承訓賢䏻逈出群談淸蛻塵滓志大躡烟雲更喜并州牧豪英天下聞送武陵令之子當為邑吾朝信擇人位卑難立事任重合憂民槃瓠多遺種桃源即近隣登臨如有見才思日應新送酸棗鄧主簿畿縣官雖小京華日可親文章成薄俗交結最難人典學應無廢存誠况巳純邦工尋尺用𣏌梓詎沉淪送仙逰知縣許延評策名曽未㡬奮迅出埃塵陋巷潜心久亨衢得意新君恩方責報民業近多貧莫學悠悠者謀身不為人送杜寺丞知永城薦表同時入天衢自此通弦歌新邑宰淸白舊家風官舍隋河北離觴華谷東朂哉松栢操咫尺是堯聰廻廖觧元所業昔者聞鄊舉良田恐甚蕪于今觀日益珍樹巳垂珠衆惡吾雖察謙卑孰敢踰聖賢明訓在只此是亨衢送張寺丞三載居鄰縣得聞金玉音路遥相見少道合受知深巳矣瓜時戍悠哉魏闕心歸舟望不及白日隠寒林送何秘丞呉人作蜀官萬里泝驚湍地俗雖云異民情想一般智明終戒察政惠不須寛前史多循吏乗閑更熟看送劒州張掾名在鄊書久恩由父任優從今紹清白即此是箕裘交結多良士經過半舊㳺舉知應有望鴻翼佇横秋送演教大師東逰野客相知久年来髮漸華衣冠從異教言行似儒家通塞随天命遨逰徧海涯武夷應有㑹好去醉流霞寄贈福山長老時世重因循師何獨苦辛潔齋徒衆散剛直里閭嗔㳺藝䏻濟物舊交多雅人雲山雖好住住久轉勞神五言六韻書樓夏晚地僻無他管樓危有剰凉逺流通越派殘日共秦光鳥道頑雲黑人家病葉黄髙情夢箕頴閑景畫瀟湘山藥香多桂漁歌濁少商太平知可喜何者是簮裳小杉小杉髙丈餘體直立還孤任過千年雪應無一節枯鬼狂從髮觧龍長怕鱗麄恠状春寧笑淸聲月所娯地終存古氣景合在仙圖不作明堂用良工莫厚誣乾元節群臣祝夀小人無位以詩繼之帝命當敷佑民生有厥𥘉千秋唐節日萬國禹朝車韶羙笙鏞外需亨飲食餘神仙似姑射夢想即華胥嘉㑹誠難得愚忠敢自疎古人誰最夀無逸在周書悶書行行四月晦絺綌未䏻裁天氣疑無定春寒恐再来襲衣從汗浹交扇取風回野秀深成黒鑪薫冷作媒年髙情巳淡俗薄意多猜李杜今何在芳樽誰與開同徐殿丞逰麻姑山陳屯田聞之以詩見寄次韻第一首良友嗟塵網相期物外逰求珠非赤水不死是丹丘机上麟交擗樽中蟻亂浮仙家一度醉人世㡬千秋藥氣多留鼎茶香細出甌堯人方曠蕩容易學巣由五言八韻送李著作知栁州到官十五月太半在他邦惠術未施一公心無與雙剖符新使粤盡室始浮江地理将分嶺行程即下瀧旅愁侵酒座秋色漏船窓属吏誰非懾群蠻不易降人稀財豈厚俗異性多惷自此觀賢業洪鍾且試撞五言十韻送知縣蘇秘丞移英州大邑曰南城唯君治道行何曽設鉤距到底是聰明鼎在神姦伏鷹来鳥雀驚詐窮多自笑刑重亦知平府史如㢘士農桑學頌聲在官嗟不久丕績巳垂成嶺路當過庾州圖喜得英逺人天與幸弊俗日将清逰刃非無地搏風别有程上心應窹寐彛器待書名夏日雨中一雨遂不止我行當此窮蜀東天亦漏堯後水猶洪大點有片重密濛無寸空曉唯壷箭覺暖似炭爐通書筆提梅洗征衣擘潤烘簾間稀去燕枕下即鳴蟲竹粉千腰白桃皮半頰紅物華嬌自衒天意猛相攻酒退愁城外吟興憤涌中遣誰咨畢宿留作旱時功七言二韻鄊思人言落日是天涯望極天涯不見家巳恨碧山相阻隔碧山還𬒳暮雲遮少年新翻曲調恐人傳不許髙聲唱玳筵金獸也嫌春態淺向風噴作緑楊烟自勉月欲東生日又西莫随兒女醉明時黄泉一向埋愚鬼不與人間史筆知戯題玉臺集江右君臣筆力雄一言宫體便移風始知姬旦無才思秪把豳詩詠女功讀皮襲羙病中書事詩有可憐真宰意偏觧困吾曹之句偶代答之刺虎屠龍古有名事於難䖏迭相矜要知真宰争功意困得英雄始是䏻雪中見梅花二首品物由来貌取難共言花卉易凋殘寜知姑射氷肌侣也學松筠耐歲寒數枝斜出短墻隂密雪無端苦見侵天意似憐群木妬盡教枯朽作瑶林和慎使君出城見梅花化工呈巧異尋常鏤月裁雲費刃芒莫恠使君曽立馬染衣渾似有天香雪中贈栁枝暖氣来時柳眼新一塲氷雪更愁人要知真宰無誠信取次東風未是春柳枝答春早寒餘豈足哀平生多難媿非材去年二月都城裏曽共花房帶雪来慶暦二年二月五日京師大雪和天慶觀瑞香花聞說仙花玉染紅别留春色在壷中瑶㙜若見飛瓊面不與人間夢寐同烏鵲烏鵲翩翩競羽毛南飛無樹過良宵就中管得他人事秪與天孫倩作橋方平五百餘年别恨多東征重得見靑娥擗麟始擬窮歡樂不柰閑人背痒何璧月璧月迢迢出暮山素娥心事問應難世間最觧悲圎缺秪有方諸淚不乾睡起簟卷鱗紋帳繫紗六龍西降樹隂斜秖應夢裏成胡蝶猶記南園數種花讀長恨辭二首玉輦迢迢别紫㙜繫環衣畔忽興哀臨卭謾道蓬山好争柰人間有馬嵬蜀道如天夜雨淫亂鈴聲裏倍霑襟當時更有軍中死自是君王不動心羿妻有窮兵死為遊畋惆悵佳人獨上仙試問單棲與同穴可䏻雲漢勝重泉梁帝凝旒南面總虚名廟祀何曽暫割牲但學禪心䏻忍辱莫羞侯景䧟㙜城鞦韆二首華郭春光欲暮時綵繩爭蹴夜忘歸佳人不道羅紈重擬共楊花苦闘飛風静髙標埋暗霧月明孤影落澄波狂心擬逐逰童上無柰春醪足困何朝漢武甲帳居神本妄言露盤猶在國東遷欲知千載金人淚爲耻君王不得仙戚夫人百子池頭一曲春君恩和淚落埃塵當時應恨秦皇帝不殺南山皓首人有感官家的的要寛征古時什一今更輕州縣酷嫌民漸富㡬多率歛是無名白刃刼君君勿言人生禍難俱由天君家歲計䏻多少未了官軍一飯錢庭下縲囚何忿爭刃筆少年𥘉醉醒黄金滿把未廻眼笑殺迂儒欲措刑自遣富貴浮雲畢竟空大都仁義最無窮一千八百周時國誰及顔回陋巷中睡思睡魔氣勢重千釣壓倒心閑食飽人莫笑坐間常似醉當年滿腹是精神遊寺醉歸却寄同坐江村古寺偶閑行一飲全疑酒有靈水底屈原應大笑我今獨醉衆人醒索酒不醉多愁醉多病㡬廻愛酒又停杯死生若是有天命莫放愁来任病来憶錢塘江昔年乗醉舉歸㠶隠隠前山日半銜好是滿江涵返照水仙齊著淡紅衫謝傳神平上人蕞陋徒煩妙筆傳呼兒看了獨凄然丹靑不觧随人老相似都来得㡬年次韻荅提刑孫都官二首病樹難随萬木榮閉門終日自愁縈繡衣使者知何取肯向民間問死生真賞由来世上稀㡬人相見不相知如今一字成華衮豈識龍章與鳳姿謝知縣徐殿丞示及新詩當時子賤好援琴千載誰傳治世音珍重南城多暇日盡将風化入清吟送流人人情自古怕遷移更去南方路險巇從此異鄊誰是侣只應明月觧相随送周山人鬼事無形尚可疑人倫有驗衆皆知武夷山路㡬百里歸去西風落葉時遣興境入東南䖏處淸不因辭客不傳名屈平豈要江山助郤是江山遇屈平詠桃方朔相逢阿母家别来㡬度換年華春風合是教伊笑開盡無名草木花閏正月三日偶書二首一歩寒郊一慘眉望春春色苦来遲東君未必私桃李只恐梅花謝有時無頼年年逐酒徒今年不飲興何如醉鄊若有人名籍但碩春風點檢踈論文二首今人徃徃號䏻文意熟辭陳未足云若見江魚須慟哭腹中曽有屈原墳天寳年中事事新長安還有謫仙人騎鯨去後無尋䖏輸與勾芒自管春送僧遊廬山行非為客住非家此去廬山况不遐要見南朝舊人物池中唯有白蓮花李郭元禮禍成鉤黨後林宗身免閉門時死非不智生非怯同室鄊鄰各有宜戯題荷花昔人詩筆說蓮花不嫁春風早可嗟今日倚欄添懊惱池㙜多是属僧家戯贈月夢中識路亦何為古詩有夢中不識路之句恰要逢人已自迷一月觧行天一匝嫦娥猶未免單棲葛彼懐古按費長房傳葛陂當在汶南今信州弋陽有之未明其故長房化去巳千年鬼魅紛紛不畏天老鼈若来為太守何人殺向葛陂邉七夕二首無柰家家乞巧何豈知天上拙人多喚他烏鵲辛勤殺纔得扶舁渡淺河一年一度暫和諧幽閉生心亦可猜莫道乗槎無徑路支機曽属客星来宗人宅折桂堂從来皎月印長空桂樹遥看影在中好問素娥多折取莫教閑占水晶宫麻源題壁一到麻源日又曛㡬廻欲起郤逡廵世間豈是無山水不柰閑人好聒人馬嵬驛六軍剛要罪楊妃空使君王血淚垂何事國忠誅死後不将林甫更鞭尸齊世家莫以荒淫便責君大都危亂為無臣若教管仲身長在何患夫人更六人漢宫哀平外立國權分只為當時乏嗣君試問莾新誰佐命最應飛燕是元勲景陽宫井以色從人自古然幸逢聖主得稱賢太王姜女来𡵨下應不相将堕井泉燕雀燕子從来巧語聲主人相愛是常情黄頭老雀何䏻觧飽食官倉過一生繡户珠簾見最頻暖来寒去但安身翟公門下時飛入全勝交情斗頓人張禹漢室尊儒未得真只求學藝不知人君王幸巳疑王氏苦把春秋助賊臣孔光王莾欲為先與草董賢將過自迎門省中樹木何閑事却對妻孥不肯言元紀二首孝宣應是不知書便謂先王似竪儒若使周家純任徳親如管蔡忍行誅君道乾剛豈易柔謬牽文義致優㳺髙皇馬上辛勤得緫被儒生㫁送休聞鸎纔轉歌喉碧樹枝驚飛還避巧丸兒可憐蜂蝶無言語入徧花房人未知學北堂有海棠一株顔色至佳凋落稍速憶而為詩来時𥘉見滿枝紅璧碎珠沉㡬日中宋玉有鄰誠耐事三年猶在短牆東玉胡蝶花胡蝶生来只愛花春工描様作竒葩荘周有夢何曽覺氷雪肌膚落㡬家次韻荅陳殿丞南塘觀魚見寄鱗鬛摧殘㡬許年水平風静得潜淵喜無羙味登君爼且學驪龍盡日眠陳丞以魚在深淵借喻鄙薄故有是答送傅野國學先生石與孫金鈴木舌士林間欲将天下觀諸掌之子從今上泰山送杜萬谷口生涯巳是貧素衣還擬冐京塵因風早寄登科信装點江南㡬日春儒行一死相從患難時何人䏻與古人齊酈生泉下還知否賣友而今價轉低感義懊惱常人只好儒古来忠義出屠沽試将朱亥相倫擬㡬箇衣冠是丈夫屈原秋来張翰偶思鱸滿筯鮮紅食有餘何事靈均不知退却将閑肉付江魚宋玉世間佳麗毎專房一顧多應萬事荒夢裏若無真實處不妨頻為賦髙唐贈日者鄒生賢不必通愚不窮悠悠無處問蒼穹可憐富貴君之柄斷在山人指掌中送夏旦赴舉嶺梅𥘉盡草𥘉生馬上春風酒易醒好共大鵬雙奮擊此行有路到南溟送春宜春㙜上送春歸淚滴金杯不自知懊惱黄鸎觧言語飛來唯見落花枝曉角膓斷城頭畫角聲燈靑月黒酒㣲醒濃香夢裏誰曽管只有離人夜夜聴送丁正臣鈆槧辛勤四十年搏風不上鬢霜寒朱門何處是知巳短褐空瓢行路難惜才子雲辭賦似相如自說雕蟲異壮夫何事犬羊誇質素患他人愛著貂狐登越山臘後梅花破碎香望中情地轉凄凉遊山只道尋髙䖏髙處何曽見故鄊送古山人喜聞吉事怕聞凶天下人心䖏䖏同乍出山来言語拙莫将刺字謁王公送毗師西逰望望王城十二門靑山行盡入紅塵近来富貴皆天與到䖏應多問命人送春寄呈祖袁州二首去年春盡在宜春醉送東風淚滿巾今日春歸倍惆悵相逢不是去年人東君此去㡬時来雪裏梅根待暖廻莫似仙家寥落甚蟠桃千嵗始重開酬陳屯田途中所寄封豕長蛇戰嶺南何人肉食不懐慙只今唯有髙眠好風弄松聲水濺庵正月二十日俗號天穿日以煎餅置屋上謂之𥙷天感而為詩媧皇没後㡬多年夏伏冬愆任自然只有人間閑婦女一枚煎餅𥙷天穿送薛經多䏻未必有相知况是東南義士稀京洛路長何日到風塵依舊化人衣僧志月碧雲軒改為景雲軒因書二首長見江淹雜體詩碧雲非是惠休詞誠言日暮佳人怨何事髙僧郤得知景雲持律冠當年遺迹雖沉古寺存釋子若䏻精進去便應題作景雲軒書景雲軒壁二江斜入似娥眉盡日凭髙把酒巵貧賤别應無好䖏猛忙中是我閑時因逰華子崗題麻源壁平生猶未識紅泉今日纔逰石磴邉宿雨半晴秋草濕困来無䖏可閑眠直講李先生文集卷之三十六終直講李先生文集卷之三十七近體七言四韻苦雨初霽積隂為患恐沈綿革去方驚造化權天放舊光還日月地将濃秀與山川泥途漸少車聲活林薄初乾果味全寄語殘雲好知足莫依河漢更油然野人村落蒼茫半草茅路無車轍水無橋婚姻取足唯春繭塩酪歸來待晚樵一様寛衣疑效古㡬人華髪未經徭相逢不㑹寒温語借問官家合是堯書麻姑廟流俗好仙方學道至人樂道自成仙飛昇若也由貪欲紫府還應用詐權塵裏笙歌千古夣洞中星斗㡬家天無心便是歸真日姹女河車總謾傳客有話故丁祕監京師舊宅因而傷之等閑榮謝巳愁聞况話三公極寵身靑史尚爲今世事朱門不是舊時人文章散入諸蕃口花藥留添上國春生死交情渾易見有誰過此爲霑巾五龍塘世傳鱗物有蟠時分得寒泉住翠㣲天命雖教爲潤澤神心終是索䖍祈一圍石岸刓無迹㡬族隂雲禁不飛風脚斗回波靣黒向人渾似逞嚴威寄小兒兩世㷀㷀各一人予無兄弟才生此児三歲矣生來且喜富精神欲教齠齔從師學秪恐文章誤爾身但有犂鋤終得飽莫看紈綺便嫌貧不知别後啼多少苦問家僮說未真季夏雨中宛有秋色四望之際百感生焉因題於𥿄粟花時節雨脩脩莫道如秋即是秋客路㡬千成大夣年華一半落東流眼存将聖生前筆心得騷人格外愁㣲物若教無所失塵埃猶願補嵩丘秋懐禇冠斜頂對清秋病骨支撑懶上樓輔世功夫何日是少年滋味此生休山含紅樹随時老天帶黄昏一例愁自笑酒腸空半在前村無處典鷞裘書松陵唱和天命相逢陸與皮當年才調兩權竒朝端未有輸忠處詩外應無用力時意古直摩軒昊頂言㣲都洩鬼神私近來此道中興也泉下英魂知不知七夕天孫何許是來時月意愔愔露氣㣲可道星河難得過自縁烏鵲合髙飛秋宵已勝春宵短今㑹還如古㑹稀早晚望夫䏻化石盡分人世作支機早起有懐草草西風動葛衣呼僮前啓竹間扉山僧好睡鐘聲晏社戸多貧酒氣㣲豈是客愁渾較可秪因書卷觧忘歸旴江百里清無滓枉属閑人坐釣磯留題歸安尉凝碧堂騷人得助是江山千里幽懐一凭欄野色豈唯春晚秀天風長似月邉寒身閑暫覺塵埃逺境勝纔知宇宙寛秪恐仙壷提挈去不教凡眼醉中看答張􅎦嘏㡬年江外恣荒唐偶脫荷衣覘國光自是狂言無可擇敢嗟賢路有相妨謾将文史為生業巳約漁樵共醉鄊多謝故人貽絶唱爰居寧觧聴鏗鏘清明日作遲遲日景坐成曛聞說清明在此晨花卉不宜愁眼看勾芒能為㡬人春銷磨志氣多因老點檢交㳺半作塵欲向醉鄕聊自適病來還厭舉杯頻晚思一檻東風小箔開亂山明暗水縈廽流年漸共春華去暴熱還随霽色來天氣濁多人欲睡地形卑甚物先梅因知楚客迷魂處不是江東不足哀暮春始逰城西病多無力逐紛華三月衡門未見花長恐後期成索寞果逢殘景獨咨嗟欄干倚望山空在杯酒遲留日易斜謾說明年更春色不知園囿属誰家寄傳代言交㳺散盡客來稀門掩城隅晝漏遲春地更無嫌草處雨天還有詐晴時輕量世事世不罪冷笑人言人豈知猶喜道途收拾早将閑對病最相宜丙子冬至夜酒醒盡道一陽初復時不期風雨更凄凄凌晨出去逢人飲沉醉歸來滿馬泥多恨恐成干斗氣欲言那得上天梯韓文公月蝕詩有無梯可上天之句燈青火冷睡半醒殘葉打窓烏夜啼南齋詠風懊惱南窓一道風只應天配與貧窮不歸羅綺飄颻處故入松篁冷淡中乆座披襟塵榻穏半醒吹面月帷空城邉菡蓞今多少偷得清香是爾功小雨巳是蛟龍未肯忙誰教螮蝀更相妨來時槁葉踈踈響過後浮雲片片光徑草㣲滋垂粉汗砌沙圎滴蔟蜂房嗟予不及髙飛鳥先得天邉㡬點凉題净居院寺門幽獨傍江城江水清含地氣清隔岸樓㙜人醉死遶堦松竹夏寒生路經橋逺塵難過僧占閑多俗不争唯有行吟憔悴客這廽須去濯長纓清暉亭池亭何處占清暉只在暉江更向西山上白雲如有雪水中明月似無泥郊原不改春來秀徑路終憂客到迷沈約東陽曽入詠使君才調好留題往山舍道中作截竹成輿不用輪東行盡日穏宜身前看疊嶂如無路毎到平田始見人下戸半曽差作役朽株多巳祀為神生涯一撮誠何有且免庸兒共拜塵秋晚悲懐漸老多憂百事忙天寒日短更心傷數分紅色上黄葉一瞬曙光成夕陽春水别來應到海小松生命合禁霜壷中若逐仙翁去待看年華幾許長殘葉一樹摧殘幾片存欄邉為汝最傷神休翻雨滴寒鳴夜曽抱花枝暖過春與影有情唯日月遇紅無禮是泥塵上陽宮女多詩思莫寄人間取次人哭十姪到官六月一作日寄書廻未病封題死後開一命至卑人盡得九泉何事獨相催唯憂旅櫬還郷逺况是親䘮繼踵来數世學文終若此可憐門戸轉墮頽秋隂一夜風聲曉更狂起來庭戸頓凄凉不知紅日在何處時見黒雲微有光天落水中兼鴈影露啼林罅帶楓香愁人莫苦登髙閣說著江山巳斷腸寄介夫天恨吾儕各一方夕陽千度到西窓因循流俗今皆是磊落如君信少雙書未隔年難得報心從薄宦始應降可憐漢水無拘係長與旴江㑹九江書懐寄介夫棄材幸免雜輿薪收拾緇衣出洛塵漸老得閑纔是性謾言成謔且随人䏻傳身後須文字要識胷中只鬼神俗子不勞䡖毀譽問天長乞醉鄕春關徐雲長不絶舊君情元直終随老母行立效報公何感槩指心辭主更分明三方本以兵攻戦一士能爲國重輕多謝曹劉存大度任教忠孝得成名送張宏下第南歸世家元是武夷孫四上觀光預國賔地底豈無干斗氣天邉争柰飲牛人田宜秫稻應多酒路入溪山漸少塵身計未諧歸計好一樽猶可醉鄊鄰葛陂逢何道士十數年前别我行相逢猶是舊顔形琴聲漸古聴來淡藥味雖凡試最靈出有酒錢天下富住無家地浪頭萍神仙可學應須學萬里蓬萊一點靑俞秀才山風亭小飲炎炎千室熱如烘亭壓山頭獨有風雨意生獰雲彩黒秋容細碎樹枝紅半天斜日歸心動一面平川醉眼空却是夣魂無所得人間豈少翠㣲宮謝宋屯田見示永平録海南編多少儒衣只假塗貴來誰肯更觀書其間或以文争勝未見如君識有餘長把六經為凖的最應三代是權輿可憐後世名空在直釣而今豈得魚閩中歲暮休道南人暖過冬苦寒今與北方同霜嚴欲裂地到底日短不行天正中誰使智愚相伴老便將榮辱斷還空鄕愁莫更欺閑客薄酒從來亦有功白樂天有酒功賛逬侯殿直之官吉州待詔何年别玉堂筆端渾欲繼鍾王官資未出風塵外蹤迹曽親日月光扶老只今非逺道薦䏻從此有封章廬陵若要高文寫争得滁州在故鄕滁州歐陽使君庐陵人也偶題饒秀才谿光亭北出城來駐馬蹄君家别舘幸臨谿雄虹見雨遏不斷潦水到秋㾗漸低萬事熱心成浩歎一樽撩眼怕長迷俗人誰㑹儒生意是處醉吟還日西宗人宅仁知閣江南盡是山水地君子固求仁知名可憐塵土不到眼只有雲泉相伴清人間擾擾知何在日暮悠悠空闘行明月一欄風一枕醉鄕猶可過浮生早夏偶作閑愁不覺過年光強半精神似醉鄕㡬度雨來成惡熱有時雲㫁見斜陽古人事業塵空滿故國園林草自長賴得南華憐我病一篇齊物勝醫方匈奴傳漢家經武意如何也信狼心欲偃戈豈是虜庭佳䴡少自縁婚禮貨財多女從宗室方掄擇賦出齊民更刮摩若向大臣求姪媵當時誰肯議通和忠武侯齊覇燕强舊有基當年管樂易為竒何如新野覊栖後正植曹公挾帝時指畫二州收漢燼安排八陣與天期才髙命短雖無祭猶勝隆中世不知次韻答陳殿丞見寄顛倒江湖二十春干時的是妄庸人先容不肯收蟠木髙足無從得要津衆與善名酬苦志莫将吟味養閑身食田飲井知誰力下有驕兒上有親贈韓侍禁閥閱山西舊将家一官淪落向天涯目皮相䖏應難識髀肉生來只自嗟野囿㡬年飢虎豹旱雷何日起龍蛇吴歌楚舞時相慰劍鋏梅乾鐡有花送沈秘校君家龍虎弟兄賢斗酒相逢楚水邉雨露自今榮一命塵埃未免困三年髙談欲出稠人右敏政當居俗吏前異日能來見逋客麻姑碧洞古時天寄題錢塘毛氏西湖園昔年曽泛西湖流君今更住西湖頭人生多是未得往地上有天何䖏求朱樓照影鐘磬曉畫船落手芙蓉秋鯉魚赤鱗應不少待與水仙相伴逰自觧人生何苦要多才百慮攅心摘不開夜月㡬曽無夣處春風只管送愁來秃毫強㑹悠悠事浮世無過滿滿盃看取秦坑烟焰裏是非同作一杯灰不寐四壁空空絶語聲困來終是睡難成孤燈要與人相背寒漏苦教天不明累月故園無信息㡬般閑事惱心情别愁若觧生華髪一夕應添一萬莖韓偓集有自撫州往南城縣舟行見拂水薔薇之詩南城吾鄊也因題八句韓偓當年赴七閩舟行過此倍凝神江邉石上知誰處緑戦紅酣别是春往事㡬多書不記仙源依舊地無塵花光柳色今何限更有才人勝古人代書荅陳次公咄咄休休一世閑百年都是浪悲歡髙談不待傍人笑立事須知自古難時見老顔來鑑裏已將生計託雲端六鼇未可揮刀斫肯便臨谿把釣竿來書以俗子異子求人慰薦故有是荅和君賜題堯輔齋壁書林老仙頭欲斑近日卜居吴楚間麻姑世界盡贏得羲皇興味先追還川流切對夏無暑山月出來門未關笑殺區區躁求者不因貧病不曽閑送王都曹古木亭邉夜嚮晨餞壷重疊擁雙輪高文徤筆科塲手白髪靑衫宦路人十月霜風還劈面六街塵土㑹欺貧麻源碧澗神仙地早晚歸來伴隱淪送危太博一片靈㙜衆共知宦途寧肯避危機至誠似有神明助盡室初從瘴海歸烈火豈能傷羙寳覆盆終是見炎暉人生未出功名外多少京塵待染衣題虞侍禁山亭嶺上櫩楹締構新我來登望倍凝神可憐韜畧真名将猶與谿山作主人㑹把松心欺過雪更憑花蕚占留春江南風物雖佳䴡争奈燕然有虜塵君錫宰夀春淪落多愁笑不成水邉還是送君行官為令長前程好地近鄕關喜氣生百里有人觀惠術三年唯我見交情山中後夜思賢䖏風月猶應似舊清錢寺丞知白州大邑歌謡日尚新忽驚千騎擁行塵宦㳺莫歎登長道天意先教福逺人城在海隅門少客地鍾陽氣景常春政成不患無知巳按察當今正直臣集賢杜公出使廣西次韻荅史太博驛使将詩訪逺山發函寧暇正衣冠秦城未割難論價燕谷纔吹巳不寒佔畢有心忘老至惰農無罰賀恩寛一枝數粒唯知分豈是明時學考槃蟬一蛻囂塵向此生柳枯槐老正傷情高吟盡日知誰聴零露充腸且獨清螳斧不勞隂致害貂冠猶可共傳名騷人若有遺魂在應放冤聲伴爾鳴寄史屯田秀汝清旴數舍中繫匏名謁竟難通只知俗吏隆官業不意髙文有古風朝請待趍天屏北家園歸省浙江東逺民利害聞應熟早晚嘉謀沃舜聡答丘寺丞示月蝕詩一夜吟公月蝕詩睡魔驚走醉魂飛如将混沌重區别要使君臣有等威天道至髙全指掌古人雖死合知非相思無計能相見何日軒車向北歸蓬屋長簷數尺庇堂東踈漏從來只有蓬日影碎如秋樹下雨聲初似夜船中竹經蠧了多垂地箬到乾時半棬空此䖏想非人所競衆言千萬莫相攻堦基堂前一級似堦墀無石無甎只舊基泥飾頃因年節近蹋崩唯是客行時誰曽羅櫗雙來上多謝蒼苔乆不離從此便成貧景致竹簾垂處最相宜宜春㙜謫官誰住小蓬萊唯有宜春有古臺千里待看毫末去萬家攅作畫圗來雲中羅綺香風落月底笙歌醉夣廻莫恠江山苦相助騷人沒後得真才東湖古郡城池巳瞰江重湖更在郡東方水仙坐下魚鱗赤龍女門前橘樹香路絶塵埃非􅎈掃地無風雨亦清凉使君待客多娱樂只有醒時覺異鄕送趙拊祖諱湘先朝名士有遺孫狼藉麻衣化洛塵筆下毎求千古意醉中曽過㡬廻春勞生只見年年老客路相逢事事新滿座狂歌時莫笑眼看燕市若無人太平州十詠亭客逰無日暫開顔姑孰谿邉偶得閑風景直疑圗畫岀古今都似夣魂間桓温罪逆休重問謝傳英靈已不還深羙謫仙遺世務酒船椎皷浪如山送王尉義激中心不再思宦途從此抱瑕疵誰憐君子篤親意况是明王孝治時靖節田園應乆廢尚平婚嫁豈宜遲一官塵土休廻顧海上群鷗舊有期野意亭福唐城郭掌中窺旭日登臨到落暉誰在畫簾沽酒處㡬多鳴櫓趂潮歸晴來海色依稀辨醉後鄉愁積漸㣲山鳥不知紅粉好纔聞歌板便驚飛靈源洞纔出塵來尚未知漸攀藤竹漸臨危伏流似是龍蔵處古樹應無春到時誰把石崖齊剗削直教雲氣當簾帷良工畫得猶宜秘莫與凡夫肉眼窺送陳司理平生直道耻求人下位沈英乆未伸齊吹古來偏有濫葉龍今更不宜真天邉奕世三台貴江上先廬一畝貧大抵窮通相倚伏這廻寒谷觧逢春送黄承伯君來别我向番陽時節初春曉尚霜茶褐園林新柳色鹿胎田地落梅香此行硯席多知己是處樓㙜可舉觴只恐詔書非乆下槐花又在眼前黄謝蔡十八丈相示詩卷昔年多幸枉髙軒示我新詩累百篇使者即時還趙璧夣魂今尚憶鈞天據鞍馬援誰云老陋巷顔回始是賢桂樹寒山風景好近來應更有長編清話堂詩至和元年秋九月與周伯逹宿景徳寺義明上人房予憙誦李渉詩云無限心中不平事一宵清話又成空其意與今夕相似因目其處為清話堂且題八句釋子相延暫觧冠一宵清話到更䦨􅃮盤香燼死蚯蚓紙瓦雨聲鳴弹丸往事莫将閑口笑勞生誰在定中看明朝頮靣還歸去依舊塗泥濺馬鞍送郴縣吴主簿數十年來預薦書當時文行聳群儒青衫近始霑王澤白首從新入宦途四壁生涯雖寂寞一官趨進轉﨑嶇楚南若是江山好閑日猶應咏道腴覽余堯輔詩因成七言四韻少年心苦向毛錐老大生涯只有詩哀樂萬端成畫繢江山太半入鑪鎚格如平易人多愛意到幽深鬼未知白髮尚新才不盡㡬時吟興是衰時次韻酬屯田陳丈見寄老年纔到病還催老病成叢撥不開腹冷有時如咽雪耳虚終日獨聞雷半生辛苦歸三徑萬恨銷磨向一桮賴得竹窓無事處清風頻共故人來同徐殿丞逰麻姑山陳屯田聞之以詩見寄次韻第二首塵寰漸逺漸凄清似向崑崙采玉英此地巳知鄰華子幾人猶道識方平歩髙那復肌膚重心逸都疑羽翼生苦恨俗縁無了䖏歸來依舊馬蹄聲和陳屯田送知縣徐殿氶次韻近年雙闕暫鳴珂出宰南城戸數多古道存心公道顯惡人鉗口善人歌登髙賦處英辭在垂槖歸時舊物鈋當比瑞金嚚訟後要移風俗擬如何和屯田陳丈寄唐休次韻白屋從來未有官一名湏作佛名看彦倫北谷重歸去安石東山足舊歡常調幾時趍鳯闕湛恩唯待立雞竿胷中况是多竒藴自比陽春退苦寒和王刑部逰仙都觀尋幽西去路非賖回首紅塵事可嗟不待鸞驂并鶴駕便分人世與仙家幾函道蔵金壷墨一片秋容玉井花還似武夷髙㑹日骨凢猶幸醉流霞和逰丹霞有懐歸之意暫時來訪道家流肯伴煙蘿滯一丘為憶長安瞻日下欲尋蓬島向鼇頭陶潜醉後雖眠石王粲憂多更上樓宣室嵗餘虚席在青山何路更重逰七言八韻送知軍曹比部移䖍州要知賢者善居官法自嚴明性自寛黠吏欲欺難作計愚民初懼乆方安獄辭大小情皆見市物公私價一般農力不聞供土木窮閻猶得免飢寒星為二使來巡撫攷未三年悉可觀劇郡便當煩鎮守君恩寧許更盤桓兩轓贑水行非逺五袴旴江日漸單從此天衢龍躍去野人懐徳謾悲酸直講李先生文集卷之三十七終
