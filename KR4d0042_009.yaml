front:
  text: 直講李先生文集卷之一
  hash: sha256:e394a129c8f17570d0d21bc3cd7c5e453cc594bf78ad79cabb124b146050a0f7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_009-1a}
body:
  text: 賦後學南城左贊編輯長江賦後學廣昌何喬新校正臣聞養萬物者惟地之大水居其上則地不能載以觸以齧以斷以掘深或無底逺或幾千萬里則江之為水臣不得而計之矣蜀焉我頂吳焉我腹淮我之腋海我之足朝溪暮谷刮骨磨肉委之填之而莫飽其欲萬山崔崔將裹將束如兒童之見奔馬縮頭斂手避路而躑躅時淸氣和無濤無波千丈一席可眠可歌變動頃刻四天怒色凶煙暴雲對靣漆黑誰為風師誰為水伯不軌不法無别無識風兮何聲水兮何形前雷後霆氷堆雪層操舟之老尚不能自保况乃逺而行客孰不椎心而太息出如登山入如沈泉退無所止進不得前龍螭蛇黿固執殺生之權蝦蟹瑣瑣猶或賈勇而爭先嗟乎生之難成之難父母君師之所愛而託命於其間幸而免者蓋有之矣不幸而死者何可勝紀魚腹未消櫓聲相繼豈非利欲之牽人而危亡之不避揚荆巴蜀交廣甌閩地有常産物有常珍衣者食者器者玩者歌童舞女詭異妖冶官所不取則掠之私舍孰賢孰才貪哉鄙哉重裝疊載踰江越淮然則視長鯨之怒東海不啻如蠛蠓之浮杯嗚呼山川之阻土地之富天下有道則王之外府天下無道則姦雄所處蓋足於財用而利於守禦故周之衰也有吳有楚漢之亂也曰策曰權琅琊因之以建大號劉𥙿得之以入中原道成蕭衍迄于霸先自取自守人誰敢言赤壁之敗曹操夀春之走符堅雖曆數之有在亦事勢之使然及夫孫皓之虐叔寶之昏而後能滅焉勞乎哉經幾代而幾年臣聞周書曰制治于未亂保邦于未危隂陽有消長日月有蔽虧在乎備之得所則禍何能為伏惟國家重西北而䡖東南臣何以知之彼之官也特舉此之官也纍資斂於此則莫知其竭輸於彼則唯恐不支官以資則庸人並進斂之竭則民業多隳為貪為暴為寒為飢如是而不為盜賊臣不知其所㱕諸夏內也為腹心夷狄外也為手足輕重之理豈神明之所不燭秦備胡而陳勝起事唐戍蠻而龎勛肆毒觀其土崩之由誠可為之痛哭古者有采詩之官惟賦亦古詩之流賤臣不獲言于朝敢賦心之憂愁安得為太平之草木蒙雨露兮千秋麻姑山賦巍乎髙哉兹山之為異也吾不知夫幾百千里之廣但見土老而石頑頂天而直上驗地勢之所極固亦東南之藩障者乎路蹊蟠鬱前後相失岡巒崒嵂左右馳突鳴泉百雷躍下雲窟喬杉萬矛舞破煙骨靈竒恍惚變見出沒匱耳目之觀聽曽不究夫萬一其間則有名天之洞禮神之堂髙臺層瑶吸日月之光繚垣築粉孕芝蘭之香偏門曲廊入迷其方斜軒亂窗或溫而凉况乎御龍膏之酒倚雲和之瑟一飲一石一醉千日安知億萬人塵衣飛蚤虱其或黯然而霧飄然而雨跬步之內則曚無所覩夜長漫漫山空月寒鶴群戲風舞羽􅘐􅘐老猿抱子吟聲欲乾怪物參差松柯水湄或步或馳或嘯而悲仙乎鬼乎千態萬狀而使人心疑别有澗石之迤邐圜潭之無底是曰蛟龍之所止懶而為早怒而為水嗟我力耕之民輟衣食之資而為禱祠之費巖岫冥冥古無人行百獸飢死虎狼夜鳴是何假上真之名而神姦之所慿也悲夫以地之竒以物之靈而逋客之經營全形養氣采术茹菁未嘗有笳簫之聲鸞鳯之迎謝人品而凌太清者徒見山寒兮青靑水秋兮冷冷雲路咫尺而不能以升豈非仙可得而不可求道可悟而不可學彼其叛稼穡之功遺室家之樂越天常而慕冥寞宜乎白首於丹竈之下幽死而無所託也疑仙賦并序覯家旴江其西十里則麻姑山顔太師真卿有記存焉少北則麻源謝靈運詩所謂入華子岡是麻源第三谷者也其山水清媚與神仙趾迹相附著在人口吻吾母𥘉無子凡有可禱無不至祥符元年夢二道士奕棋戶外往觀之其一人者取局之一子授焉遂娠及覯生十餘歲從先父適田間宿東郊既寐有人以書與覯方制如牘表用黃其目曰王狀元文集夢中以為沂公之文也就學以來果不甚魯或時開卷敞然憶念謂曽讀此書再思之未嘗見也墨筆著辭雖未善顧出自然不多勞力私心喜幸以所從受頗靈異而不敢言今兹年三十有八矣乃用自疑作疑仙賦儒者不言仙蓋患乎傷財舍生以學之者也苟異於彼宜無害賦曰噫噫仙乎為有為無為天之居為地之廬為山之國為水之都為古為今為智為愚為崇為卑為肥為臞與人類乎與人異乎將天下之利乎將一身而巳乎既匪聞而匪見我焉知其所如繄我之生卓犖瓌怪地氣殊絶神休合㑹導愚心之趨驟犯古人之畿界攀或無髙博或無大戲鈞天之遺音冒慶雲之渥彩意靈物之所右幸速成於當代難得而易失者時哉青春走兮素髮催衒金丹而不售撫道殣而銜哀然則何為而生何為而來巳矣夫嵩高降神生申甫收拾中興還聖主長庚入夢生李白呌噪江南為逐客今之生我豈無意二者他年終一得仙人若在金銀宮㱕去來兮誰阻隔直講李先生文集卷之一終
