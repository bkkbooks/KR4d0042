front:
  text: 直講李先生文集卷之八
  hash: sha256:6920b9158f8a24b9f567d3198cffef86a626c33c3415b9f4628d8a4285b9bcce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_018-1a}
body:
  text: 國用第十一泉府掌以市之征布斂市之不售貨之滯于民用者以其賈買之物揭而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後豫之凡賖者祭祀無過旬日喪紀無過三月凡民之貸者與其有司辨而授之以國服為之息物揭而書之物物書其賈也不時買者謂求急者也賖謂祭祀喪紀二者事大故賖與民不取利也貸者即今之舉物生利也與其有司别其所授之物所出之利各依其服事之稅若其人受園門里之田而貸萬泉則期出息五百他倣此也天之生物而不自用用之者人人之有財而不自治治之者君繫辭曰理財正辭禁民為非曰義是也君不理則權在商賈商賈操市井之權斷民物之命緩急人之所時有也雖賤不得不賣裁其價太半可矣雖貴不得不買倍其本什百可矣如此蚩蚩之氓何以能育是故不售之貨則斂之不時而買則與之物揭而書使知其價而况賖物以備禮貸本以治生皆所以紓貧窶而鉗并兼養民之政不亦善乎管仲通輕重而桓公以霸李悝平糴而魏國富強耿夀昌築常平而民便之師古之效也宜其流風遂及于今必也事責其實官得其人亦何愧彼哉國用第十二司市凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使微利利于民謂物實厚者害害于民謂物行苦者使有使阜起其賈以召之也使亡使微抑其賈以却之也侈靡細好使富民好奢微之而巳又偽飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二所以俱十有二者工不得作賈不得粥商不得資民不得畜王制曰用器不中度不粥于市兵車不中度不粥于市布帛精粗不中數幅廣狹不中量不粥于市姦色亂正色不粥于市五榖不時果實未熟不粥于市木不中伐不粥于市禽獸魚鱉不中殺不粥于市亦其類也夫理財之道去偽為先民之詐偽蓋其常心矧兹市井飾行儥慝何所不至哉姦偽惡物而可雜亂欺人以取利則人競趍之矣豈唯愚民見欺邪使人妨日廢業以作無用之物人廢業則本不厚矣物無用則國不實矣下去本而上失實禍自此始也至于侈靡皆為人費雖不可盡去亦當制節使微少矣孟冬之月令曰母或作為淫巧以蕩上心必功致為上書曰不貴異物賤用物民乃足此之謂也噫為國家者孰不有意哉言而必信令而必行鮮矣國用第十三遺人掌邦之委積以待施惠鄊里之委積以恤人之囏厄門關之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待凶荒委積者計九榖之數足國用以其餘共之也囏厄謂民有困乏則振恤之門關謂出入有稅足國用之外留之以養死政之老與其孤也郊里六鄊之民居郊者其委積以待賔客至郊與主國使者接因與之廪餼也野鄙謂六遂客有羇縶未得去者則于此惠之縣都謂四百里五百里中年榖不登則畿內畿外通給之也世之有飢穰天之行也禹湯之聖猶弗能免至於困窮孤獨寄客之人皆國所常有安坐而視其死則非仁人在上視民如傷者之意將推其惻隱則邦用有經倉之榖孰為間粒府之帛孰為羡縷如是而輟焉禍蓋博矣故宜于大有年時畜積以備之倉人有餘則藏之以待凶而頒之職內敘其財以待邦之移用亦謂此也然而洪範云臣無有作福晏子稱家施不及國使民弗知主恩而謂為巳力乃人臣之常過國家之大患也故鄉師以歲時巡國及野而賙萬民之囏厄以王命施惠此慮之深禮之至也然則義倉之法亦有取焉耳國用第十四司救凡歲時有天患民病則以節巡國中及郊野而以王命施惠由是觀之非直凶荒而後施與也疾疫亦有之矣夫四時之厲或連月不愈或闔門不起丁壯卧于牀蓐則老稚無能為飲食所不給醫藥所不濟以至于死者豈天命乎人主所宜動心矣賈師凡天患禁貴儥者使有常價亦為此也司關國凶札則無闕門之征猶幾由是觀之凶年非直除減田租彼貨賄之征皆舍之疾疫亦然夫阻飢之人營求衣食固無所不至又將籠其貨賄則何以措手足乎况于疾疫之世安得助天為虐邪人主所宜動心矣掌客凡禮賔客國新殺禮凶荒殺禮札喪殺禮禍災殺禮在野在外殺禮由是觀之非直以歲之下則殺邦用若新建國及札喪禍災在野在外皆殺禮也禮許儉不非無安得重困于無聊之民求備乎籩豆之事也人主所宜動心矣膳夫大荒則不舉大札則不舉天地有災則不舉邦有大故則不舉由是觀之非直于外事殺禮若王膳亦為之貶也譬諸父母其子之不哺而日餘膏粱可哉人主所宜動心矣故曲禮曰凶荒年榖不登君膳不祭肺馬不食榖馳道不除祭事不縣大夫不食粱士飲酒不樂皆自貶損憂民之道也如此天不為之感人不為之恱用度不足海內不安未之前聞也國用第十五鄉師以國比之法以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令紏禁聽其獄訟鄊大夫以歲時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以歲時入其書征之者謂給公上築作挽引道渠之役也國中復除者多役使者少人少則勞故晚役而早免之二十以及六十是也野復除者少役使者多人多則逸故早役而晚免之十五以及六十五是也君子之于人裁其勞逸而用之可不謂義乎世有仕學之鄉或舍役者半農其間者不亦難乎而上弗之恤悖矣貴者有爵命服公事者有功勞誠不可役然復其身而巳世有一戶皆免之若是則老者疾者亦可以闔門不使耶至于馬牛皆辨其可任善夫世有人未嘗芻秣而責以牽倣其僦費敗家者衆矣况乎水旱疾疫之歲飢餓之弗察死亡之弗圖而臨以定制驅之給使可乎故均人凡均力政以歲上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉凶札則無力政無財賦也古者使民歲不過三日而秦法月為更卒巳復為正一歲屯戍一歲力役三十倍于古何不仁之甚也天下畔之晚矣國用第十六大司徒以保息六養萬民六曰安富謂平其繇役不專取也大哉先王之法其所以有天下而民不斁者乎孔子謂既庶矣富之既富矣教之管子有言倉廩實知禮節衣食足知榮辱然則民不富倉廪不實衣食不足而欲教以禮節使之趍榮而避辱學者皆知其難也及其為國家則有反是者矣田皆可耕也桑皆可蠶也材皆可飭也貨皆可通也獨以是富者心有所知力有所勤夙興夜寐攻苦食淡以趣天時聽上令也如此而後可以為人之民反疾惡之何哉疾惡之則任之重求之多勞必于是費必于是富者幾何其不黜而貧也使天下皆貧則為之君者利不利乎故先王平其繇役不專取以安之也漢武帝時算賈人之緍匿不自占占不悉戍邉一歲沒入緍錢有能告者以其半卑之即治郡國緍錢得民財物以億計奴婢千萬數田大縣數百頃小縣百餘頃宅亦如之商賈中家以上大氐破民偷甘食好衣不事畜藏之業當是之時天下何如其不亡者幸也世俗不辨是非不别淑慝區區以擊疆為事噫富者乃疆邪彼椎埋而誅者果何人也直講李先生文集卷之八終
