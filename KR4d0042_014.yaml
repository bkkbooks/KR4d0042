body:
  text: 後學城左贊編輯後學廣昌何喬新校正刪定易圖序論覯嘗著易論十三篇援輔嗣之注以解義蓋急乎天下國家之用毫析幽微所未暇也世有治易根於劉牧者其説日不同因購牧所為易圖五十五首觀之則甚復重假令其説之善猶不出乎河圖洛書八卦三者之內彼五十二皆疣贅也而况力穿鑿以從傀異考之破辟鮮可信用大懼詿誤學子壞墮世教乃刪其圖而存之者三焉所謂河圖也洛書也八卦也于其序解之中撮舉而是正之諸所觸類亦復詳説成六論庶乎人事修而王道明也其小得失不足喜愠者不盡紏割别有一本黃黎獻為之序者頗增多誕謾自鄶以下可無譏焉牧又注易所以為新意者合牽象數而巳其餘則攘輔嗣之指而改其辭將不攻自破矣先代諸儒各自為家好同惡異有甚寇讎吾豈斯人之徒哉憂傷後學不得巳焉耳論一或問劉氏之説河圖洛書同出于伏羲之世何如曰信也繫辭稱河出圖洛出書聖人則之其指在作易也則不待禹而得之明矣其所圖者信乎曰洛書五十有五協于繫辭天地之數河圖四十有五雖于易無文然其數與其位灼有條理不可移易非妄也惜乎劉氏之辨則過矣或曰敢問河圖之數與位其條理何如曰一三五七九竒數陽也非中央則四正矣坎離震兊之位也二四六八耦數隂也不得其正而得四隅矣乾坤艮巽之位也乾坎艮震陽卦位也則左旋兊坤離巽隂卦位也則右轉竒則先左而後右耦則先右而後左坎一震三也兊七離九也坤二巽四也乾六艮八也抑又縱橫數之皆得十五此非灼有條理不可移易者乎或曰劉氏之辨其過焉在曰劉氏以河洛圖書合而為一但以河圖無十而謂水火木金不得土數未能成形乃謂之象至于洛書有十水火木金附于土而成形矣則謂之形以此為異耳其言四象生八卦則取河圖之七八九六以其有象字不可用洛書之形故也其下文又引水六金九火七木八而生八卦於此則通取洛書之形矣噫何其自相違也矧曰天五居中而主乎變化上駕天一而生地六下駕地二而生天七左駕天三而生地八右駕地四而生天九者不亦惑乎夫所謂生者言乎其始也苟河圖之象生八卦則洛書之形又生八卦者何也若以聖人既取河圖之數以畫卦而洛書之數止為揲蓍則其論云在河圖則老陽老隂少陽少隂之數此又巳言揲蓍矣反覆不通故曰自相違也夫天一至地十乃天地之氣降出之次第耳謂之五者非有五物謂之十者非有十枚而曰五十有五者蓋聖人假其積數以起算法非實數也如人兄弟行下浪反第一至第十者乃十人耳焉可謂有五十五人哉厥初太極之分天以陽髙于上地以隂卑于下天地之氣各亢所處則五行萬物何從而生故初一則天氣降于正北次二則地氣出于西南次三則天氣降于正東次四則地氣出于東南次五則天氣降于中央次六則地氣出于西北次七則天氣降于正西次八則地氣出于東北次九則天氣降于正南天氣雖降地氣雖出而猶各居一位未之會合亦未能生五行矣譬諸男未冠女未笄昏姻之禮未成則何孕育之有哉况中央八方九位既足而地十未出焉天地之氣誠不備也由是一與六合于北而生水二與七合于南而生火三與八合于東而生木四與九合于西而生金加之地十以合五于中而生土五行生而萬物從之矣二四易位而一三五如其初者當所王之方也夫物以隂陽二氣之會而後有象象而後有形象者胚胎是也形者耳目鼻口手足是也河圖之數二氣未會而劉氏謂之象悖矣若夫洛書之數五位既合則五行有象且有形矣象與形相因之物也其一二三四五為生數六七八九十為成數者徒以先後分之耳其實二者合而後能生生則成矣蓋非一生之待六而後成也假令河圖是象洛書是形則取洛書而為八卦者亦非酌水燃火伐木煆金而成之也直取其象耳以法象而言之不亦可乎何其固執形象之象也其曰天五駕一二三四而生六七八九者愈乖逺矣且隂陽會合而後能生今以天五駕天一天三乃是二陽相合安能生六生八哉天降陽地出隂隂陽合而生五行此理甚明白豈有陽與陽合而生隂哉况所謂五者乃次第當五非有五物也其一與六合之類皆隔五者蓋以一二三四五主五方而六七八九十合之周而復始必然之數非有取于天五也其不用五竒主五方而五耦合之者陽方則竒為之主而耦與之合隂方則耦為之主而竒與之合又昭昭矣至如劉氏所圖太極生兩儀一二三四其解曰畫天左旋畫地右動今按其畫天一在坎天三在震誠左旋也地二在離地四在兊亦左旋耳非右動也夫所謂左旋者如斗柄自寅向卯也右動者如日月五星自丑向子也今以自午向酉而為右動何哉若直以東北為左方西南為右方以分天地之位則又不可謂之旋且動也旋動者進前之意也設謂陽升隂降先兊四而後離二則繫辭所陳先二而後四未嘗倒言之也如是則劉氏之解果􅓎矣注易圖易自謂窮天地之理而乃未明左旋右動之法甚哉其可笑也論二或曰劉氏謂聖人以河圖七八九六而畫八卦而吾子之意乃取洛書何也曰繫辭稱八卦成列象在其中矣謂備天下之象也河圖之數二氣未合品物未生何所象乎洛書之數五行成矣萬物作矣于是象金而畫乾兊象土而畫坤艮象木而畫震巽象水而畫坎象火而畫離不言五而言四象者以土分王四時舉四行則土可知矣又以四行之數而揲蓍七少陽八少隂九老陽六老隂是也曰敢問畫卦皆取洛書矣其于河圖何所則也曰則其位也河圖有八方之位洛書有五行之象二者相須而卦成矣曰劉氏以為六居坎而生乾謂三為坎三為乾也九居兊而生坤謂三為兊六為坤也七居離而生巽謂三為離四為巽也八居震而生艮謂三為震五為艮也何如曰以位數之則乾坤艮巽亦三位也以畫數之則坎震亦五畫也離兊亦四畫也何其或以位數或以畫數反錯之甚也况説卦稱六畫而成卦六位而成章彼重卦然畫與位等耳未常析言之也苟析言之則坤六位而十二畫矣焉得曰六畫成卦也雖繫辭陽一君而二民蓋取隂耦以喻人臣代終之義非可積以為數也今謂人有二心者非可積十人以為二十心也且劉氏説天地之數六者有六物耳而乃以一爻分為二畫以當二物可乎歷觀諸卦以爻為人雖隂爻亦一人耳帝乙歸妹非有兩妹也箕子明夷非有兩箕子也然則劉氏畫卦之説其不可用明矣矧聰明睿智創制立法固不區區專決于圖書故曰古者包犧氏之王天下也仰則觀象于天俯則觀法于地觀鳥獸之文與地之宜近取諸身逺取諸物是不專決于圖書參互而後起之者也聖人既按河圖有八方將以八卦位焉洛書有五行將以八卦象焉于是觀隂陽而設竒耦二畫觀天地人而設上中下三位純陽為乾取至健也純隂為坤取至順也一陽處二隂之下剛不能屈于柔以動出而為震一隂處二陽之下柔不能犯于剛以入伏而為巽一陽處二隂之中上下皆弱罔克相濟以險難而為坎一隂處二陽之中上下皆強足以自託以麗著而為離一陽處二隂之上剛以駁下則止故為艮一隂處二陽之上柔以撫下則説故為兊也西北盛隂用事而陽氣盡矣非至健莫能與之爭故乾位焉爭勝則陽氣起故坎以一陽而位乎北坎者險也一陽而犯衆隂誠不為易而為險也艮者止也物芽地中將出而止也待春之謂也自此動出乎震潔齊乎巽離者明也萬物皆盛長得明而相見也坤厚以養成之成而説故取諸兊也畫八卦分八方之義如斯而巳也或曰説卦稱勞乎坎謂萬物閉藏納受為勞也成言乎艮謂萬物之所終也今吾子之言似不類者何也曰孔子據物終于地上而言也覯取諸物始于地下而言也所以就足先聖之論使人不疑耳或曰劉氏謂三畫象三才為不詳繫辭之義則以乾之三畫為天之竒數三一三五皆陽也坤之三畫為地之耦數三六八十皆隂也獨陽獨隂無韞三才之道者何如曰劉氏學易乃不知畫之與位各一事也畫者譬諸人也位者人所處之地也三畫雖純陽象天而三位有天地人之别何害也上中下三位譬如公也卿大夫也竒耦二畫譬如君子也小人也公卿大夫皆君子蓋有之矣皆小人亦有之矣或一君子而二小人或一小人而二君子猶行人之止傳舍何常之有安可見純天便曰無地位見純地便曰無天位哉且其引説卦兼三才而兩之故易六畫而成卦以為六畫包三才無三畫韞三才之説噫何其泥也三畫象三才矣重之為六又象三才何害也若三畫之時乾為天坤為地六畫之後亦不免為天為地也三畫之位則初為地二為人三為天六位則初二為地三四為人五上為天從宜改易何固執之為哉且劉氏論三才則引説卦六畫破先儒三畫以為不經及其論竒耦則用天三竒地三耦天地各減其二不顧繫辭五位有合之説是經乎不經也又其論乾元用九謂天一天三天五陽數也坤元用六謂地二地四隂數也至其下文以天五散在五行天一居尊不動餘有天三地四合而成九天三則乾之三畫地二地四則坤之六畫陽得兼隂故乾三兼坤六而乾元用九也噫陽不可兼隂乎則天三何以稱用九陽果得兼隂乎則天一天三天五當兼地二地四何以不稱乾元用十五也輕先儒九揲六揲之通義而務求新不虞錯亂之至此鄙哉論三或人敢問大衍之數五十諸儒異論何如曰京房馬季長荀爽之釋吾無取焉耳至於鄭康成姚信董遇以為天地之數五十有五減五而用之劉氏亦同此説吾有取焉耳此章上言大衍之數下言乾坤之䇿中言天地之數非衍之用而何也然所以減之之意或謂減五行或謂減六畫或謂減天五蓋未之思矣夫五行六畫天五減之之可否不足復詰吾直謂天地之數雖五十五至揲蓍之法止可用五十故取其整數而巳也只如期三百六旬有六日而乾坤之策三百六十當期之日又豈可言無六策以當六日者别有意也聖人揲蓍虗一分二挂一揲四歸竒再扐確然有法象非苟作也故五十而用四十九分于兩手挂其一則存者四十八以四楪之十二揲之數也左手滿四右手亦滿四矣乃扐其八而謂之多左手餘一則右手餘三左手餘三則右手餘一左手餘二右手亦餘二矣乃扐其四而謂之少三少則扐十二并挂而十三其存者三十六為老陽以四計之則九揲也故稱九三多則扐二十四并挂而二十五其存者二十四為老隂以四計之則六揲也故稱六一少兩多則扐二十并挂而二十一其存者二十八為少陽以四計之則七揲也故稱七一多兩少則扐十六并挂而十七其存者三十二為少隂以四計之則八揲也故稱八所謂七八九六者蓋取四象之數也以是五十之策不可增損增一損一則不可揲之矣故康伯述輔嗣之旨曰演天地之數所賴者五十也苟謂聖人以五行天五之故特減其五則未知不減之時如何揲也以五十五而虗其一又挂其一則兩手五十三十三揲之數而餘一也左手雖得四右手尚餘一左手三則右手二左手二則右手三左手一則右手四終無平時雖童子亦知不可為也五十之上唯五十四可矣虗一挂一則兩手五十二十三揲之數也然三少則存者四十三多則存者二十八一少兩多則存者三十二一多兩少則存者三十六乾元當用十坤元當用七少陽八而少隂九矣其下唯四十六虗一挂一則兩手四十四十一揲之數也然乾元當用八坤元當用五少陽六而少隂七矣不徒不應四象之數陽反而耦隂反而竒矣吾故謂揲蓍之法止可用五十故取其整數而巳也或曰虗其一者康伯以為太極劉氏以為天一何如曰究觀繫辭以四十九分而為二以象兩則是虗一在兩儀之前也下文太極生兩儀則又太極在兩儀之前太極與虗一相當則一非太極而何也且其謂大衍後天地之數則太極不可配虗其一之位此又不思之甚矣作大衍之法誠在數之後矣然其所取象固在數之先所謂分而為二以象兩者也蓋有兩儀而後有數也既可象兩儀于數之先豈不得配太極于兩儀之上哉若以一二三四便為兩儀則天非一天地非一地而巳也是知天地者其體也一二三四之類其氣也苟虗一以象天一之氣而分四十九以象兩儀之體則是逸其末而勞其本於義乖矣又破康伯之注無不可以無明必因于有以謂太極其氣巳兆非無之謂噫其氣雖兆然比天地之有容體可見則是無也又稱聖人之辭易有太極既言有則非無之謂也吾以為天地之先強名太極其言易有太極謂有此名曰太極者耳非謂太極便有形也如老子之言恍忽中有物有象不可一見有字便指為實物實象也凡此皆巧詆先儒不自知其罪也論四或曰劉氏謂坎生復卦離生姤卦何如曰磔裂爻位則巧矣義則未也聖人設卦觀象以陽潛地中故坎以一陽居二隂之中陽生隂下故復以一陽居五隂之下八卦配八方則坎當北十二卦配十二月則復當建子復之陽乃坎之陽也陽則無二而象之之卦有兩也何哉八方與十二月不同也三畫與六畫不同也是故陽則無二而象之之卦有兩也離與姤亦如之若謂坎之陽生復之陽離之隂生姤之隂則是十一月有兩陽也五月有兩隂也固不然矣且其説以復卦生于坎中動于震交于坤變二震二兊二乾而終姤卦生于離中消于巽交于乾變二巽二艮二坤而終自復至坤凡十二卦主十二月噫以十二月言之則自復以往歷臨泰大壯夬而後至乾此云二震二兊而後二乾者何也自姤以往歷遁否觀剝而後至坤此云二巽二艮而後二坤者何也以八方言之則自坎以往歷艮震至巽極矣陽一于子而六于巳也此云震兊乾者何也自離以往歷坤兊至乾極矣隂一于午而六于亥也此云巽艮坤者何也其意以復姤生于坎離而變初四變二五變三上每為二卦則八卦備謂之巧也宜矣然義不通也又以姤巽承于乾非四正之卦乃引歸妹之兊云妹係姊嫁故兊少女而用巽之長女主其卦噫何偽飾之多也彼其意欲以兊承于乾則成履非姤隂生之卦又不可數變故引兊于歸妹假託廣嗣之義而係巽于姤耳不徒義理迂怪以象論之大可笑也少女既嫁于震又係巽而嫁于乾乎長女既交于乾又從兊而交于震乎則是一女而事二夫也豈不可笑此所謂偽飾之多也聖人之意曷至是哉或曰劉氏之説七日來復不取易緯六日七分何如曰不取宜矣苟以十二月之卦論之則剝盡之後經坤一月非止七日也以六日七分言之則剝盡之後經艮既濟噬嗑大過坤未濟蹇頥中孚九卦每卦六日七分乃至于復非止七日也然劉氏更以七為少陽必經隂六之數盡至七日少陽乃生斯又未善也歷觀衆卦或言七日或言三日或言三年或言十年強為配合時或可言參相鉤考辭則易屈大抵言日逺者不過七日震六二既濟六二勿逐七日得不過七日而得也七日來復以復不可逺君子之道雖消不久不過七日而復彖曰天行也蓋言來復之義是天之行反覆如此亦非考案氣候實日而云也萬夀無疆豈實有萬哉愛而多之之辭也或曰臨至于八月有凶諸儒之論孰為得失曰何氏云建子陽生至建未為八月當矣臨二陽遁二隂合耦之卦也劉氏破之以為果建子則辭當在復卦之下此不明矣且復卦陽生其勢微弱未足矜也臨卦剛長強亢之漸故戒之以遁卦有凶也推其本而言之復生為一月臨長為二月至遁為八月不亦可乎而劉氏固守臨之建丑數至遁之建未則七月以不滿八之故遂用周正排建未為八月又念文王演卦在商之末正朔未改不可以未為八月乃稱周公述而成之故以周正為定且先儒以為文王作卦辭周公作爻辭劉氏既未有以破之安得謂卦辭亦周公所成以飾臨卦八月用周正之説乎其下文曰况乎易有三名夏曰連山商曰歸藏周曰周易易既題周以正名則不得不以周之正朔定其月也且周易書名周公設官可題周家以别餘代卦辭豈得擅改彼禮樂損益蓋從時之宜易之為書萬世無敝况文考之手澤周公改之何意也文王若曰七月有凶有何妨害而周公故以八月定之乎文王作易之時便題周字亦可矣何必周公也號國曰周其來久矣故曰周雖舊邦其命惟新雖紂在上而題易曰周以别夏商何害也魯頌次于周頌亦須周滅而後加魯字乎此類皆閭巷老生誑童耀騃之辨非天下之公議也論五或曰易緯以六十卦主三百六十五日四分日之一信乎曰吾觀于太元信矣所主之日取卦象乎取卦名乎曰取諸卦名而巳太元所以凖易者也起于冬至其首曰中陽氣潛萌于黃宫信無不在乎中謂是時萬物之萌信無不在地之中于易則中孚孚者信也亦謂信無不在地之中也其次曰周陽氣周神而反乎始于易則復復者反也亦謂反乎始也其次曰礥陽氣微動動而礥礥物之生難也於易則屯屯者物之始生也粗舉二三則知冬至之後其卦中孚復屯者題號此日之氣候曰中孚也曰復也曰屯也他皆倣此但元首八十一每首四日有半易卦六十每卦六日有竒故前後或參差蓋大同而小異也而劉氏以經乾坤之策三百六十當期之日不别起數謂易緯六日七分義無所出若是則劉氏凡言天五駕天一之貌亦出于經乎乾坤之策况其數六十卦况其名不相妨也又謂十二卦巳主十二月不可取雜書破經義今觀六十卦之次其十二卦仍在本月稱為辟卦則十二卦既總主一月又與諸卦分治六日如侯伯有功德者既作一州之牧亦未免為一國之君也而劉氏區區以月各有主日無用卦是欲立州牧而廢二百一十君也其可乎或曰敢問元亨利貞何謂也曰大哉乎乾之四德也而先儒解詁未能顯闡是使天道不大明君子無所法若夫元以始物亨以通物利以宜物正以幹物讀易者能言之矣然所以始之通之宜之幹之必有其狀竊嘗論之曰始者其氣也通者其形也宜者其命也幹者其性也走者得之以胎飛者得之以卵百榖草木得之以句萌此其始也胎者不殰卵者不殈句者以伸萌者以出此其通也人有衣食獸有山野蟲豸有陸鱗介有水此其宜也堅者可破而不可軟炎者可滅而不可冷流者不可使之止植者不可使之行此其幹也乾而不元則物無以始故女不孕也元而不亨則物無以通故孕不育也亨而不利則物失其宜故當視而育當聽而聾也利而不正則物不能幹故不孝不忠為逆為惡也是故文言曰元者善之長也亨者嘉之會也利者義之和也正者事之幹也唯君子為能法乾之德而天下治矣制夫田以飽之任婦功以暖之輕稅斂以富之恤刑罰以生之此其元也冠以成之昏以親之講學以材之擯接以交之此其亨也四民有業百官有職能者居上否者在下此其利也用善不復疑去惡不復悔令一出而不反事一行而不改此其貞也是故文言曰君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞論六或曰敢問五行相生則吉相克則凶信乎曰相生未必吉相克未必凶用之得其宜則雖相克而吉用之失其宜則雖相生而凶今夫水克于火則燔燒可救火克于金則器械可鑄金克于木則宮室可匠木克于土則萌芽可出土克于水則漂溢可防是用之得其宜雖相克而吉也以水浸木則腐以木入火則焚以火加土則焦以土埋金則鏉以金投水則沉是用之失其宜雖相生而凶也是以太元之贊決在晝夜當晝則相克亦吉當夜則相生亦凶元告曰五生不相殄五克不相逆不相殄乃能相繼也不相逆乃能相治也相繼則父子之道也相治則君臣之寶也今夫父之于子能食之弗能教之則恩害于義也君之于臣能賞之又能刑之則威克厥愛也恩害義則家法亂威克愛則國事修吾故曰相生未必吉相克未必凶也或曰吾子之言性命何其異也曰吾之言也折諸聖宜乎其異矣命者天之所以使民為善也性者人之所以明于善也觀其善則見人之性見其性則知天之命説卦曰昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦人之有仁義所以順性命也董仲舒曰天令之謂命命非聖人不行質朴之謂性性非教化不成人受命于天固超然異于群生入有父子兄弟之親出有君臣上下之誼會聚相遇則有耆老長幼之施粲然有文以相接歡然有恩以相愛此人之所以貴也生五榖以食之桑麻以衣之六畜以養之服牛乘馬圈豹檻虎是其得天之靈貴于物也然則本乎天謂之命在乎人謂之性非聖人則命不行非教化則性不成是以制民之法足民之用而命行矣導民以學節民以禮而性成矣則是聖人為天之所為也繫辭曰吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也由此觀之吉凶由人乃易之教也黃帝堯舜通其變使民不倦神而化之使民宜之是以自天祐之吉無不利若夫釋人事而責天道斯孔子所罕言古之龜筮雖質諸神明必參以行事南蒯將亂而得黃裳元吉穆薑棄位而遇元亨利正德之不稱知其無益後之儒生非史非巫而言稱運命矯舉經籍以緣飾邪説謂存亡得喪一出自然其聽之者亦已荒矣王制曰執左道以亂政殺假于鬼神時日卜筮以疑衆殺為人上者必以王制從事則易道明而君道成矣直講李先生文集卷之四終
