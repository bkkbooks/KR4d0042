  text: 直講李先生文集卷之十一
  hash: sha256:e55a6b0581693ae6942da5d0174ac273f5822fe756e929085a525b9f1e1d02a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_020-1a}
body:
  text: 官人第一為人上者孰不欲進賢而賢或不進孰不欲退不肖而不肖或不退豈知而縱之邪人未易知也知人則哲帝堯猶以為難彼色厲內荏言行不相顧者滔滔皆是也非久與居胡能睹其真偽耶久與居者非鄰里鄊黨而誰邪故閭胥凡春秋之祭祀役政喪紀之數聚衆庶既比則讀法書其恭敏任恤者族師月吉則屬民而讀法書其孝弟睦姻有學者春秋祭酺亦如之黨正正歲屬民讀法而書其德行道藝州長正月之吉各屬其州之民而讀法以考其德行道藝而勸之以紏其過惡而戒之若以歲時祭祀州社則屬其民而讀法亦如之鄊大夫三年則大比考其德行道藝而興賢者能者鄊老及鄊大夫帥其吏與其衆寡以禮禮賔之厥明鄊老及鄊大夫群吏獻賢能之書于王王再拜受之登于天府內史二之退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞閭胥二十五家之吏凡因會聚則書其人材族師每月朔書春秋祭輔又書黨正夏正之月書州長正月之朔考春秋社又考是一歲之中凡幾書凡幾考至于三歲鄊大夫乃考而興之獻其書于王退而又詢衆庶寧復有賢能者乎其詳如此其慎如此而官謗不戢治道不登未之有也孔子曰昔吾于人也聽其言而信其行今吾于人也察其言而觀其行不見其人之姓名不知其身之善惡才不才決于數百言難乎為無失矣官人第二司士掌群臣之版以德詔爵以功詔祿以能詔事以久奠食德謂賢者凡賢者能者皆先試以事久而有功然後授之以爵得祿食也爵以貴乎人天下之人共貴之祿以富乎人天下之人共富之髙冠大蓋吏民趍走事之恐不及天下共貴之也稟財給榖農桑賦貢奉之而不暇天下共富之也天下共貴之而貴非其人天下共富之而富非其人則君命果義乎衆心果服乎且人各有能有不能孟公綽不可以為滕薛大夫禆諶謀于國則否况其下者乎苟非試其事考其功而遽與之爵祿則曠天官敗公事何足道哉王制曰論定然後官之任官然後爵之位定然後祿之所謂官之者使試守也堯舜豈不聖而試臣以職慎之至也若是則賢者必用不肖者必舍能者必行否者必藏嗇夫之印綬不可以幸而得也奚髙位之辱哉夫位有髙卑祿有厚薄言其操柄則無所不重州縣之職前世以為徒勞者而民命繫之未聞明試其功而居位受祿一官之效則仕而後學之有美錦者不使人學制焉民所以死生貧富顧不重哉官人第三大宰歲終則令百官府各正其治受其會聽其致事而詔王廢置三歲則大計群吏之治而誅賞之宰夫歲終則令群吏正歲會月終則令正月要旬終則令正日成以考其治治不以時舉者以告而誅之司會以參互考日成以月要考月成以歲會考歲成以周知四國之治以詔王及冡宰廢置歲計曰會月計曰要日計曰成凡百官府旬終月終皆考其治狀若治不以時舉者宰夫以告冡宰而責之至于歲終又考非直責之而巳其有功無功司會以詔冡宰冡宰以詔王而廢置之置者進其爵廢者退其爵也及三歲則冢宰大計其治大無功不徒廢必罪之大有功不徒置必賞之也噫先王所以課吏考功如是其密也日入其成是無一日而可敖蕩歲終廢置是無一歲而不勸懲三年有成則申之以誅賞有功者驟獲其利無功者卒伏其辜雖能言之類亦知勸勉愧耻矣况智者乎舜典三載考績三考黜陟幽明彼三歲而一考九歲而後黜陟蓋帝道寬簡抑時世之然未若周公之典垂後昆之韙也董仲舒曰古所謂功者以任官稱職為差非謂積日絫久也故小材雖絫日不離于小官賢材雖未久不害為輔佐必也不求功實而以日月為限三年而遷一官則人而無死孰不可公卿者乎官人第四冬官考工注其曰某氏者官有世功若族有世業以氏名官者也官有世功則以官為氏若馮相氏保章氏師氏保氏韋氏裘氏冶氏之類是也族有世業則以氏名官若桃氏為劍築氏為削鳬氏為鍾栗氏為量之類是也甚矣事之不可以不常也易曰天地之道常久而不巳也日月得天而能久照四時變化而能久成聖人久于其道而天下化成孔子曰如有王者必世而後仁善人為邦百年可以勝殘去殺矣夫以聖人之德履天子之位尚曰久于其道必三十年必百年而後仁政可成殘殺可去况于中人以下分職授政而可以不久者乎是故先王建官有世守之至以為氏也漢文景至武帝之初國家無事為吏者長子孫居官者以為姓號倉氏庾氏是也然則古之治天下皆如此乎吏之于民必相知心然後治也吏知民心則明明則政平矣民知吏心則信信則令行矣欲相知心豈一朝一夕而可哉上下未相知或知之未久遽委而去之後來者亦如此則是吏未嘗知民心民未嘗知吏心吏以所治為傳舍事或不舉則曰以待後人民視所屬如過客理或不勝亦曰以待後人官何以修衆何以服謂其有功邪進其爵可也重其賞可也如其職事則久之為貴故漢有當遷而增秩留者矧伊無功之人而可虗受祿食往來于道路間邪直講李先生文集卷之十一終直講李先生文集卷之十二官人第五地官序鄉老二鄊則公一人老尊稱也王置六鄊則公有三人也三公者內與王論道中參六官之事外與六鄊之教其要為民是以屬之鄊焉誠哉民事之重宰相所宜躬親也以三公之爵而聮六鄊之吏非躬親而何召公為伯聽男女之訟不重煩勞百姓止舍小棠之下國人𬒳其德説其化思其人愛其樹甘棠之所為作也而陳平曰決獄責廷尉錢榖責治粟內史丙吉謂宰相不親小事何也苟決獄不平錢榖出入不節民鬪相殺傷不止而宰相不知尚可調和隂陽順四時遂萬物之宜也哉此皆華言誤天下事慎聽之也故先王以民惟邦本造次顛沛無或忘之既使大臣為鄊老又取其鄊之人為吏所謂使民興賢出使長之使民興能入使治之者也蓋使民自舉能者因入之而使之治民之貢稅田役于內謂為比長以上之官也夫能盡知人之情偽與其土所有其俗所宜莫若其鄊之人也因以為吏孰不治乎宓子賤為單父宰反命于孔子曰此國有賢不齊者五人教不齊所以治者孔子曰惜哉不齊所治者小所治者大則庶幾矣子賤受教于單父之人猶以至治况使單父之人躬為吏乎漢之賢人仕州郡者多矣刺史二千石往往有能名未必非其所助也東西南北之人言語猶未相通而責之善政難矣哉官人第六大司徒凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一大哉封建之禮此周之所以本支百世乎荀卿有言兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉富辰曰昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛𥅆郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之子也然則先王于其族類有不厚乎詩曰凡今之人莫如兄弟兄弟鬩于墻外禦其侮平王東遷而晉鄭是依其世與年過于所卜由此塗出也豈嘗有兄弟之國敢問鼎之輕重者哉故假灼表于晉武帝曰滅周者秦非姬姓也代漢者魏非劉氏也雖云割地譬猶囊漏貯中亦一家之有耳縱令後世子孫還自相并蓋亦楚人失繁弱于雲夢尚未為亡其弓也其于神器不移他族則始祖不遷之廟萬年不改其名矣善哉灼之知言也漢雖有七國之變而梁孝以睢陽城守晉雖有八王之亂而元帝以琅邪中興魏氏王公有名無實禁防壅隔同于囹圄曹爽一死而司馬家取之如運諸掌上灼之言不亦善乎官人第七大行人掌大賔之禮及大客之儀以親諸侯春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時會以發四方之禁殷同以施天下之政此六事者以王見諸侯為文圖比陳協皆考績之言王者春見諸侯則圖其事之可否秋見諸侯則比其功之髙下夏見諸侯則陳其謀之是非冬見諸侯則合其慮之異同六服以其朝歲四時分來更迭如此而遍時會無常期諸侯有不順服者王將有征討之事則既朝王命為壇于國外合諸侯而發禁命事焉王十二歲一巡狩若不巡守則衆同衆同者六服盡朝既朝王亦命為壇于國外合諸侯而命其政四時分來歲終則遍矣六服朝歲則下文侯服歲一見甸服二歲一見男服三歲一見采服四歲一見衛服五歲一見要服六歲一見是也夫君臣之禮不可以不接不接則上恩不下流下情不上通嫌疑易以生毀譽易以入在易天地不交則否柔進而上行則錫馬蕃庶晝日三接也先王知其如此故制諸侯之朝逺者不過六歲以之圖事比功陳謨協慮發禁施政則言何以不見納行何以不見知姦邪何以介其間左右何以塞其路漢刺史奏事京師其斯之謂乎石顯五鹿充宗疾京房欲逺之元帝以房為魏郡太守房自請歲盡乘傳奏事天子許焉房未發詔止無乘傳奏事房意愈恐由此觀之臣子不得見君父其禍何如詩曰彼采葛兮一日不見如三月兮一日之中尚曰如三月三秋三歲况其久者乎官人第八內小臣奄上士四人寺人王之正內五人內竪倍寺人之數酒人奄十人漿人奄五人籩人奄一人醢人奄一人醯人奄二人鹽人奄二人幂人奄一人內司服奄一人縫人奄二人春人奄二人饎人奄二人稿人奄八人守祧奄八人內小臣稱士者異其賢其餘蓋皆不命也夫宦官之位天象所有指其居次則或在帷薄之內論其職掌則或聞牀笫之言固不可以詘辱俊乂渾淆男女其用腐身之類是乃制事之宜矣然而先王不以恩奪義不以私廢公雖其褻臣無得過寵奄稱士者止于四人况可為卿大夫乎哉漢文帝時趙談驂乘爰盎伏車前曰天子所與共六尺輿者皆天下豪英今漢雖乏人獨奈何與刀鋸之餘共載如使之尸天官又非驂乘之比也自鄭衆謀誅竇憲為大長秋封侯其後孫程定立順之功曹騰參建桓之策續以五侯合謀梁冀受鉞髙冠長劍紆朱懷金者布滿宫闈苴茅分土南面臣人者蓋以十數故曰三世以嬖色取禍嬴氏以奢虐致災西京自外戚失祚東都緣閹尹傾國豈不哀哉唐之北司同歸于亂説命曰事不師古以克永世匪説攸聞信矣直講李先生文集卷之十二終直講李先生文集卷之十三教道第一立人以善成善以教教而不善邪是堯舜之民鄙夭矣不教而善邪是桀紂之民可封矣移風俗斂賢才未有不由此道也故大司徒以鄊三物教萬民而賔興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數物猶事也民三事教成鄉大夫舉其賢者能者以飲酒之禮賔客之既則獻其書于王矣知明于事仁愛人以及物聖通而先識義能斷時宜忠言以中心和不剛不柔善于父母為孝善于兄弟為友睦親于九族姻親于外親任信于友道恤振憂貧者禮五禮之義樂六樂之歌舞射五射之法御五御之節書六書之品數九數之計以鄊八刑紏萬民一曰不孝之刑二曰不睦之刑三曰不姻之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑不弟不事師長造言訛言惑衆亂民亂名改作執左道以亂政也大哉先王之所以驅民而納之于善也教以開其前如得大路終日行而弗迷失刑以策其後使不敢反顧而况賔興以勸之哉養天性滅人欲家可使得孝子國可使得忠臣矣學校不立教法不行人莫知何人可師道莫知何道可學耳何以為正聲目何以為正色口何以為正言身何以為正行明者幸而得之昧者不幸而失之將欲求腹心于中林訪忠信于十室不易得矣小雅菁菁者莪孟氏君子三樂善為國者可無意哉教道第二外饔邦饗耆老孤子則掌其割亨之事謂養國老庶老老也酒正凡有秩酒者以書契授之所秩者謂老臣九十日有秩也夫養老之禮自古帝王未始不隆之也王制曰凡養老有虞氏以燕禮夏后氏以饗禮商人以食禮周人修而兼用之五十養于鄊六十養于國七十養于學逹于諸侯有虞氏養國老于上庠養庶老于下庠夏后氏養國老于東序養庶老于西序商人養國老于右學養庶老于左學周人養國老于東膠養庶老于虞庠虞庠在國之西郊有虞氏皇而祭深衣而養老夏后收而祭燕衣而養老商人􅒐而祭縞衣而養老周人冕而祭黑衣而養老凡四代之制雖時有改然其道則莫之變也卿大夫之致仕者為國老士為庶老其餘非賢不可皆養亦引户校年以行復除八十者一子不從政九十者其家不從政也養老之禮有三老焉有五更焉天子無父矣欲為人子而不可得也無兄矣欲為人弟而不可得也是故父事三老所以教天下之為人子也兄事五更所以教天下之為人弟也親冕而總干袒而割牲執醬而饋執爵而獻祝䭇在前祝鯁在後公卿奉杖大夫進履天子之尊四海之內其意莫不為臣然而以父兄事人者孝弟之心無所用之因以教天下之孝弟也天子之尊且事他人為父兄天下之民敢遺其親父親兄乎是一舉而孝弟之風洋洋乎九州之外矣噫盛哉教道第三大司徒施十有二教二曰以陽禮教讓則民不爭陽禮謂鄊射飲酒之禮也黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位一命齒于鄊里再命齒于父族三命而不齒國索鬼神而祭祀謂歲十二月大蠟之時建亥之月也必正齒位者為民三時務農將闕于禮至此農隙而教之尊長養老見孝弟之道也凡射飲酒比鄊民雖為卿大夫必來觀禮齒于鄊里者以年與衆賔相次也齒于父族者父族有為賔者以年與之相次異姓雖有老者居于其上不齒者席于尊東所謂僎也大哉先王之所以和鄊黨睦親戚有如此夫彼一命者天子之下士公侯伯之上士子男之大夫也而與鄊里齒焉再命者天子之中士公侯伯之大夫子男之卿也而與父族齒焉三命者天子之上士公侯伯之卿也雖云不齒亦異席而巳非敢居其上也然則貴而驕人少而陵長者不容于其間矣鄊飲酒義曰六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也民知尊長養老而后乃能入孝弟民入孝弟出尊長養老而后成教成教而后國可安也經解曰鄊飲酒之禮廢則長幼之序失而爭鬪之獄繁矣夫二人同居亦一長一幼如使幼皆順長則爭何由興推此以及千萬人宜乎其獄訟之寡也而况尊人之長以及吾長養人之老以及吾老則輕重可知矣輕重可知而不孝不弟者其唯禽獸之心乎若是則教焉得不成國焉得不安也哉教道第四大宰以九兩繫邦國之民五曰宗以族得民宗繼别為大宗收族者也大宗者其先祖之負荷族人之紀綱乎大傳曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也别子謂公子若始來在此國者後世以為祖也别子之適子適孫世世繼别子為大宗百世不遷族人五世外者皆為之齊衰三月母妻亦然故大宗有族食族燕之禮所以收族也夫五服者人道之大治也然而上盡於髙祖旁盡於三從上盡於髙祖則逺者忘之矣旁盡於三從則疏者忘之矣故立大宗以承其祖族人五世外皆合之宗子之家序以昭穆則是始祖常祀而同姓常親也始祖常祀非孝乎同姓常親非睦乎內則曰適子庶子秪事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入子弟猶歸器衣服裘衾車馬則必獻其上而后敢服用其次也若非所獻則不敢以入於宗子之門若富則具二牲獻其賢者於宗子夫婦皆齊而助祭焉終事而后敢私祭然則族人之重宗子何如哉重宗者尊祖之義也噫所生猶或不孝况逺祖乎同産猶或不睦况族人乎是先王坊民有禮而刑不足以齊之也教道第五小司徒之職掌建邦之教法以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食喪紀之禁令鄼長各掌其鄼之政令以時校登其夫家比其衆寡以治其喪紀祭祀之事曾子曰慎終追逺民德歸厚矣喪祭之謂也哀哉死者乎為其形之將敗也而人惡之矣為其心之無知也而人倍之矣是故絞襟衾冒以周其內棺槨牆翣以文其外為使人勿惡也朝夕之奠以繼其養神明之器以備其用為使人勿倍也君子過哀則幾毀滅小人直情則將忽忘是故哭之有節服之有斷此聖人所以制喪禮也春履雨露而怵惕秋履霜露而悽愴孝子以天時之變念其親之不得見也是故散齋七日致齋三日隂幽以思而祭者可見矣祭之日入室必有見乎其位出户必有聞乎其聲事死者如事生思死者如不欲生蓋非牲牷肥腯粢盛豐備而巳此聖人所以制祭禮也人有貴有賤有富有貧而未有無親者也其禮雖異其情則同王制曰庶人繩封葬不為兩止不封不樹喪不二事亦其喪禮也庶人春薦韭夏薦麥秋薦黍冬薦稻亦其祭禮也然冥冥之民勸于利而懲于威苟非上之所財成則末由也已故小司徒有其禁令而鄼長治之也三年問曰將由夫患邪淫之人與則彼朝死而夕忘之矣然而從之則是曽鳥獸之不若也夫焉能相與群居而不亂乎楊子曰人而不祭豺獺乎是喪祭之禮廢則人不如禽為其上者所宜憂也直講李先生文集卷之十三終直講李先生文集卷之十四教道第六鄊師正歲稽其鄊器比共吉凶二服閭共祭器族共喪器黨共射器州共賔器鄊共吉凶禮樂之器吉服者祭服也凶服者吊服也比長主集為之祭器者簠簋鼎爼之屬閭胥主集為之喪器者夷盤素爼揭豆輁軸之屬族師主集為之此三者民所以相共也射器者弓矢楅中之屬黨正主集為之為州長或時射于此黨也賔器者尊爼笙瑟之屬州長主集為之為鄊大夫或時賔賢能于此州也吉器若閭祭器者也凶器若族喪器者也禮樂之器若州黨賔射之器者也鄊大夫備集此四者為州黨族閭有故而不共也此鄊器者旁使相共則無廢事上下相補則禮行而教成夫有其禮者必有其財而後可行也由士以上則田祿足矣庶人農力或不免凍餒而求其備禮不亦難乎故禮不下庶人者以此苟非乏財則人無禮不立何斯民之不得用哉先王患之乃使比長閭胥族師集罰物以為服器民有用者則共之若有故而不共則鄊大夫以公物補焉民無傷財而可得服器則夫能言者肯不行禮哉如是而不行禮則納之刑辟其又何辭宜乎其天下大服也任延為九真太守駱越之民無嫁娶禮法各因淫好無適對匹不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸祿以賑助之同時相娶者二千餘人其産子始知種姓彼一郡守猶能教人以禮而助之以財况四海之富乎哉教道第七典命上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宮室車旗衣服禮儀皆以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之公之孤四命其卿三命其大夫再命其士一命其宮室車旗衣服禮儀各視其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宮室車旗衣服各視其命之數夫宮室取以待風雨是則蓬茨足矣衣服取以禦寒暑是則紵絮足矣車馬取以代勞是則柴轂足矣器物取以利用是則瓦釡足矣然而耳目之欲雖窮壯極麗猶未足以厭之也先王因人之情而制之以為貴賤等級使貴者得以逞賤者無所覦則上下有體而朝廷以尊費用有節而財力不乏至于庶民亦有以防之故大司徒以本俗六安萬民六曰同衣服謂民雖有富者衣服不得獨異也不然則人人可以僣上上下一體則朝廷不尊家家可以大費費用無節則財力乃乏亂患所以作禮讓所以衰也仲叔于奚繁纓以朝而仲尼惜之庶人屋壁得為帝服倡優下賤得為后飾而賈誼長太息無意乎民則巳苟有意哉是所先急也教道第八大司樂凡建國禁其淫聲過聲凶聲慢聲淫聲若鄭衛也過聲失哀樂之節凶聲亡國之聲若桑間濮上慢聲惰慢不恭也大胥掌學士之版以待致諸子版籍也大胥主此籍以待當召聚學舞者卿大夫之諸子則案此籍以召之漢大樂律曰卑者之子不得舞宗廟之酎除吏二千石到六百石及關內侯到五大夫子先取適子髙七尺以上年十二到年三十顔色和順身體修治者以為舞人與古用卿大夫子同義也深矣乎聲之感人也如水之激如草之偃自生民以來莫之能免也樂記曰志微噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅廉直徑正莊誠之音作而民肅敬寬𥙿肉好順成和動之音作而民慈愛流辟邪散狄成滌濫之音作而民淫亂先王慎所以感之者故禁其淫過凶慢之聲而舞人又取卿大夫子有中和祗庸孝友之德者是聲與人無不正也聲與人無不正則聞之且見之者焉得不正乎子夏曰今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也噫舞者男女自相雜子夏巳疾之而况粉白黛黑笑言于尊爼間乎董仲舒所謂民之師師者宜不宜也然則天下多淫辟之罪有以矣夫教道第九師氏掌以􅍇詔王以三德教國子一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長保氏掌諌王惡而養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容以􅍇詔王告王以善道也諌者以禮義正之國子公卿大夫之子弟師氏教之而世子亦齒焉養國子以道者以師氏之德行審諭之而後教之以藝儀也師保詔王以善諌王之惡王者既立乎無過之地矣又使教養國子而世子與焉是策之上也王制曰樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王太子王子群后之太子卿大夫元士之適子國之俊選皆造焉則古之教人者世子無不在也文王世子曰行一物而三善皆得者唯世子而巳其齒于學之謂也故世子齒于學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆著於君臣之義也其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節矣故父在斯為子君在斯謂之臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而國治夫將以宗廟社稷屬之可不教乎賈誼有言天下之命繫于太子太子之善在于早諭教與選左右三代之所以長久者以其輔翼太子有此具也文中子曰儲后不訓而晉業墮矣觀惠帝之失天下可無寒心也哉荀卿曰聖王有百吾孰法焉欲觀聖王之迹則于其粲然者矣後王是也道過三代謂之蕩法二後王謂之不雅然則舍周其何適哉孔子曰甚矣吾衰也久矣吾不復夢見周公噫猶有望于今之世乎直講李先生文集卷之十四終直講李先生文集卷之十五明堂定制圖序五宗圖序明堂定制圖序臣伏以明堂者古聖王之大務也所以事上帝嚴先祖班時令合諸侯朝廷之儀莫盛于此然而年世久逺規模靡見經傳所出參差不同群儒譸張各信其習修墜補闕何所適從臣雖顓蒙嘗竊議于斯矣臣謹按周禮考工記曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵大戴禮盛德記曰明堂者自古有之凡九室一室有四戶八牖共三十六戶七十二牖禮記月令天子正月居青陽左個二月居青陽太廟三月居青陽右個四月居明堂左個五月居明堂太廟六月居明堂右個中央土居太廟太室七月居總章左個八月居總章太廟九月居總章右個十月居元堂左個十一月居元堂太廟十二月居元堂右個此三書者皆聖賢之所作述學者之所傳習而一事殊制乖逺如此注釋之家亦各未為精當考工記五室鄭康成解之木室于東北火室于東南金室于西南水室于西北土室于中央故聶崇義三禮圖其為明堂接太室四角以為四室蓋用此也且既以五室象五行矣則木火金水之王當在東南西北之正何乃置之四角而云木室兼水火室兼木若必如是則中央之室復何所兼哉此説誠未可用也盛德記九室蔡伯喈之徒傳之接四室之角又為四室聶崇義誤以為秦人明堂圖者是也按秦實無明堂但後儒見月令有天子居明堂之文以月令是秦相吕不韋所作春秋十二紀之首章疑為秦之明堂耳然今觀月令明堂十有三位無九室之説蓋崇義誤取大戴九室之堂以為秦制也又鄭康成亦駮大戴云九室三十六戶七十二牖似秦相吕不韋作春秋時所益者非古制也噫康成注禮記既知月令是吕不韋所作春秋矣而月令豈有九室之文哉何以輒駮大戴九室以為出于吕氏春秋乎誠舛􅓎之甚也然其四室之角復為四室未知何所施用將以象五行享五帝乎則五室足以備之矣安用其餘將以配十二辰乎則四隅各兩室重在一方之上核其意義反覆不安此説亦未可用也月令十三位本無此總數但以一大室四太廟八左右個其實十三位鄭康成注青陽左個則曰太寢東堂北偏云太寢者欲明明堂與太寢制同孔頴逹正義以為云東堂者則知聽朔皆堂不于五角之室中且夫謂之廟與個者當須各是一位豈同在一堂靡所限隔而可稱為廟與個也蓋康成既執明堂為五室若于此十三位又為限隔則是室數頗多與巳意相違故曲飾其辭以為三位同在一堂貴不害于五室之文耳此説固不可用也至唐李林甫等注月令青陽左個則曰寅上之室青陽太廟則曰卯上之室青陽右個則曰辰上之室明堂左個則曰巳上之室明堂太廟則曰午上之室明堂右個則曰未上之室太廟太室則曰太廟明堂總名太室中央室也總章左個則曰申上之室總章太廟則曰酉上之室總章右個則曰戌上之室元堂左個則曰亥上之室元堂太廟則曰子上之室元堂右個則曰丑上之室觀此言太室處中央餘十二位各置其辰之上誠合于理然其謂太廟明堂總名及十三位俱以為室則誤矣明堂之上既獨以子午卯酉為太廟則太廟安得為明堂捴名哉十三位不俱謂之室解見于後又其人但知十三室各在其辰之上而不謀所以建立之處且太室既居中矣若以餘室連太室而為之則四面各可置一室四角缺處又各可置一室復不能令各在其辰之上其餘四室更何所安就欲巧而成之愈乖于方位矣或將逺太室而為則未見有明文言之者是此説亦未可用也後魏時有李謐者愍大禮之淪亡憤先儒之異議作明堂制度論以折衷于世其指以月令為宗而采周禮大戴之言以參合之云其室居中者謂之太廟太室當太室之東者謂之青陽太廟當太室之南者謂之明堂太廟當太室之西者謂之總章太廟當太室之北者謂之元堂太廟以是為合于周禮之五室又云四面之室各有便房謂之左右個共三十六戶七十二牖以是為合于大戴戶牖之數今雖圖象莫存然按文察之謐之所言竊所未諭且太室四靣各為一室則四角缺處各方二筵二筵之地乃為兩便房如東南角二筵地便當為青陽右個及明堂左個矣他皆倣此基址既狹况地形斜角不知何以置之復何以能令各在其辰之上夫分十二辰之位當須尺步平均然後能正也豈有四靣之室既以二筵為一辰左右之個乃以二筵為兩辰哉舉兹一隅又知其不足取法也臣愚竊謂考工記盛德記月令三家所指制度誠大同但立言質略意義弗顯訓傳之士泥文太過因而背馳李謐之志稍欲搴而合之矣奈不得其旨尤而效之臣以月令之文最為明著輒亦取以為本而通之周戴月令雖秦人所作然皆追述古先聖王之道其中雖有官名時事不合周法者蓋吕氏欲以古道行之于時故稍或損益之豈可謂皆非古制歟夫以白虎通曰明堂上圎下方八窗四闥上圎法天下方法地八窗象八風四闥法四時九室法九州十二坐法十二月三十六戶法三十六雨七十二牖法七十二風斯言合于事理因亦取之臣謹詳考工記是言堂基修廣非謂立室之數東西九筵南北七筵是言堂上非謂室中東西之堂各深四筵半南北之堂各深三筵半若堂室共在九筵七筵之內則雖如鄭氏五室之制從東至西亦須三室巳據六筵之地外東堂止有一筵半西堂止有一筵半每筵深一丈三尺五寸從南至北又三室據六筵之地外南北之堂各才半筵深四尺五寸狹隘甚矣况室數更多豈可容哉蓋記者上言堂上之修廣次述室中之丈尺本非一貫而談也四堂東曰青陽南曰明堂西曰總章北曰元堂五室凡室二筵是言四堂中央有方十筵之地自東至西可營五室自南至北可營五室十筵中央方二筵之地既為太室矣欲連太室而作餘室則不能令十二位各直其辰當須于東南西北四靣各虛方二筵之地四角缺處又各虛方二筵之地周而通之以為太廟而太室正居中所謂太廟太室者言此太廟之中有太室也太廟之外當子午卯酉四位上各畫方二筵地以與太廟相通不為室所謂青陽明堂總章元堂等太廟者也以其當青陽之堂上故曰青陽太廟餘三靣皆倣此或問于臣曰經所謂太廟太室者當是青陽等四太廟居四方而太室在其中央故云太廟太室也子何須謂太室四旁虛地為太廟而云太室在其中哉臣對曰太室四旁既不得不有虛地既有虛地而經云太廟太室則太室四旁虛地非太廟而何且青陽等四太廟去太室猶隔二筵之地何以得云太室在四太廟中央乎又問曰子必云四太廟不為室而與十太廟相通者何哉臣對曰中既有太廟子午卯酉又各名太廟而地實相接則不得不相通也當寅申巳亥辰戌丑未八位上各畫方二筵地以為室所謂左個右個者也八個之室并太室而九所謂九室也室四面各有戶戶旁夾兩牖所謂三十六戶七十二牖也青陽明堂總章元堂四太廟前面各為一門出于堂上門旁夾兩窗所謂八窗四闥也以廟之與堂當有所限隔故各為一門也謂之闥者小門也以太廟所出故其制異于群室之戶耳窗牖異者亦以廟門旁變于室中之制也四廟九室共十三位而白虎通云十二坐當是略中央土所居矣左右之個其實皆室但以分處左右形如夾房故有個之名也太廟之內此謂太室四旁二筵地非青陽等太廟也以及太室其實祀文王配上帝之位也謂之廟者義當然矣土者分王四時負載萬物于五行最尊故天子當其時居太室用祭天之位以尊嚴之也四仲之月各得一時之中與餘月有異故復于子午卯酉之方取二筵地假太廟之名以聽其朔也此謂青陽等太廟也或問于臣曰太室四旁各二筵之地既為太廟又已當子午卯酉之正人君若尊嚴仲月何不止于此聽朔而乃復于其外别取二筵地假太廟之名哉臣對曰太室四旁各二筵地雖為太廟而當子午卯酉之正可以聽仲月之朔矣然若以此二筵地便為子午卯酉之位則餘辰又不正矣與夫連太室而為室何異哉秪如以太室東戶前二筵地便為卯位聽仲春之政南戶前二筵地便為午位聽仲夏之政則辰已二位須過在東南一角豈復能當青陽右個明堂左個之上哉故宜各于太廟之外别取二筵地與左右個並列而假太廟之名然後能使十二辰皆正也若是則三家之指曷有異哉但周禮言基而不及室大戴言室而不及廟稽之月令則備矣然非白虎通亦無以知窗闥之制也臣又詳鄭説明堂九階南靣三階三靣各兩階且每靣各三位而獨南靣三階其餘各兩階求其義則靡所法象揣于事則不便叔降今觀聶崇義所謂秦人明堂圖者其制有十二階似恐古之遺法也當亦取之禮記外傳曰明堂四面各五門今按明堂位曰九夷之國東門之外八蠻之國南門之外六戎之國西門之外五狄之國北門之外九采之國應門之外時天子負斧扆南嚮而立南門之外者北面東上應門之外者亦北靣東上是南門之外有應門也既有應門則不得不有臯庫雉門矣明堂者四時所居四面如一南靣既有五門則餘三靣皆有五門矣鄭康成注明堂位則云正門謂之應門孔頴逹正義曰正門謂之應門者以明堂更無重門非路門外之應門天子宮內有路寢故應門之內有路門明堂既無路寢故無路門及以外諸門但有應門耳且既有東南西北門矣而又有應門非重門而何歟觀其本意當謂變南門之文以為應門也又但見王宫有路門其次乃有應門今明堂無路門之名而但有應門便謂更無重門而南門即是應門矣且路寢之前則名路門其次有應門明堂非路寢乃變其內門之名為東門南門而次有應門夫復何害于義抑夷蠻戎狄之君既在四門之外而外無重門則是列于郊野道路之間矣豈朝會之儀而草草若是乎王宮常常所居猶設五門以限中外明堂者效天法地尊祖配帝而止一門以表之是豈協于事宜也則四靣各五門斷在不疑矣臣又詳鄭康成注考工記夏后氏世室則云世室者宗廟也商人重屋則云重屋者王宫正堂若太寢也周人明堂則云明堂者明政教之堂也此三者或舉宗廟或舉正寢或舉明堂互言之以明其同制又注玉藻曰天子廟及路寢皆如明堂制仍與諸儒抗答多方援引固以為三者同制後學承之莫有非者臣愚竊謂之不然矣苟路寢有四時之位則天子自可坐而聽朔奚用逺赴明堂若以尊嚴國政當假祭天之廟以聽之則事畢而還復于路寢居其時之堂何所為也宗廟之祭堂事室事一靣而足四方之堂未聞所施設也雖世室有五室之説亦未必如鄭注有四堂也既曰明堂將以事上帝也宗廟將以尊先祖也而以已之正寢與之同制蓋非尊祖事天之意也矧鄭之此説並由胸臆必謂明堂宗廟路寢同為五室三代皆然但修廣之度固時而變周監二代其為宗廟則法修廣于夏其為路寢則取尋尺于商其為明堂則自為度筵之制實皆不改于五室焉此説既非經見安用迂闊而談奚不直謂周家作宗廟則法于夏路寢則法于商明堂則自為之各求其制以示于世乎得非康成見世室有五室既以五行推之明堂之文復有五室求其説而不獲及重屋之下都無室數遂乃巧為之辭以謂其制皆同乎又當見明堂位稱太廟天子明堂庫門天子臯門雉門天子應門以為魯行天子之禮魯之太廟既如明堂則周之太廟亦如明堂矣臣謂若周之太廟制如明堂魯之太廟又如明堂則是魯之太廟如周之太廟也何不曰太廟天子太廟而云明堂哉斯蓋魯行天子禮樂享帝告朔當倣于周然以人臣不敢立天子政教之堂故于周公之廟略擬明堂之制以備其禮非周之宗廟如明堂也或問于臣曰路寢制如明堂雖經無明文然太史職云閏月詔王居門終月先儒皆以為天子閏月聽朔于明堂門中還而又處于路寢門也既閏月聽朔于明堂門中還而又處于路寢門則是常月聽朔于明堂之上還而處于路寢之上其居位亦當如在明堂中時也然則路寢亦如明堂有四時之位明矣臣對曰太史職閏月詔王居門終月蓋止是朔日詔王居明堂之門聽一月所當行之事終盡而返耳豈復有明文言還處路寢門哉蓋鄭氏之徒欲明三者同制妄生枝葉以言之也又况蔡伯喈以為明堂太廟太室太學辟雍雖名别而事同其為紕􅓎不已甚乎袁凖正論駮之詳矣大戴亦云其外有水名曰辟雍于斯則誤也若其建置之所則淳于登云明堂者在國之陽三里之外七里之內丙巳之地玉藻聽朔于南門之外康成之注亦與是相合夫稱明也宜在國之陽事天神也宜在城門之外建置之説兹焉可取于戲哲人既往禮器凋敝先王大法散在簡策而言近指逺學者多迷專門自用互相非毀故自漢興迄于有唐布政之宮屢曽營繕而規為鹵莾莫合聖制群議交鬪誰將正之明君賢士疚心久矣臣生長草野涵泳恩澤仰兹大典輒所究尋伏惟國家拓境踰四溟太平僅百載德義充溢禮教興行封泰山祀汾隂耕籍田郊見上帝遺文逸美于是交舉聖神之衷殆將經始于斯堂乎四方有識注望多矣臣身雖賤微亦願此時稍禆萬一自託不朽故今敢先以所見制度具圖以獻圖凡以九分當九尺之筵東西之堂共九筵南北之堂共七筵中央之地自東至西凡五室自南至北凡五室每室二筵則取于周禮考工記也一太室八左右個共九室室有四戶八牖共三十六戶七十二牖則協于大戴禮盛德記也九室四廟共十三位則本于禮記月令也四廟之靣各為一門門夾兩窗是為八窗四闥則稽于白虎通也十二階則采于聶崇義三禮圖也四靣各五門則酌于明堂位禮記外傳也堂之下門之內本無修廣之數故今但圖五重門即不計其丈尺舊説明堂宫方三百步自可因宜處置也或問于臣曰皋庫雉應門之號四靣皆同何也臣對曰四堂者皆天子所居所居之靣皆若王朝焉無東西南北之異也今但變其內門之名以志四方而應門以外諸門不改焉耳又問曰既云路寢不與明堂同制而明堂之門乃假王宮諸門之名何也臣對曰明堂之上所以事天尊祖布政教之所也故不與王寢同制門者限內外通出入而舊圖無所法象但以天子聽政所居象如王朝故假宮門之名亦何害于理況取諸書略無偏棄異同之論庶可息焉古先之模或在于是號曰眀堂定制圖鴻覆無私儻垂甄録施之于用必有可觀若夫棟宇之髙卑土木之文飾至尊所居之服御上神所享之儀物此禮官學士之職非小臣之能盡也輕議國容罪當殊死謹上五宗圖序大傳曰别子為祖注云别子謂公子若始來在此國者後世以為祖也又曰繼别為宗注云别子之世適也族人尊之謂之大宗是宗子也又曰繼禰者為小宗注云父之適也兄弟尊之謂之小宗又曰有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也注云遷猶變易也繼别子别子之世適也繼髙祖者亦小宗也先言繼禰者據别子子弟之子也以髙祖與禰皆有繼者則曽祖祖亦有也則小宗四與大宗凡五説者曰别子謂公子諸侯之庶子也若細别言之則妻之所生為適妾之所生為庶若秪據正體言之則妻之長子為適其次子以下及妾所生通得謂之庶子也諸侯之適子適孫繼世為君而庶子不得禰先君故自與其後世子孫為始祖也云若始來在此國者謂非君之親或是異姓始來在此國者亦得謂之别子自與其後世子孫為始祖也别子之適子世繼别子為大宗族人尊之雖五世以外皆為之齊衰三月為其母妻亦然所謂百世不遷者也其别子之庶子不得禰别子則自使其適子繼巳而為小宗所謂繼禰者為小宗也繼禰則與親兄弟為宗也又其適子則繼祖與同堂兄弟為宗也又其適子則繼曾祖與再從兄弟為宗也又其適子則繼髙祖與三從兄弟為宗也其庶子皆不得繼禰各自使其適子繼已而為小宗焉是自髙祖之後至玄孫凡四世就此第四世小宗之三從兄弟而言則其人有小宗四矣宗其繼禰者親兄弟也又與之共宗于繼祖者同堂兄弟也又與之共宗于繼曽祖者再從兄弟也又與之共宗于繼髙祖者三從兄弟也然則四宗備矣又與四宗共宗于大宗是為五宗也其于小宗各以本服服之親兄弟齊衰期也同堂兄弟大功也再從兄弟小功也三從兄弟緦麻也至第五世繼髙祖之父者與四從兄弟無服不復為之宗所謂五世則遷者也若世數尚少則小宗或有三或有二或有一其曰小宗四者蓋極言之耳不必皆然也凡人生子或衆或寡今此圖盡為二子以甲乙第之斯蓋設法貴于省文若庶子之多者可以此例推之也甲者皆適也乙者皆庶也適者皆為小宗庶者皆不繼禰其旨甚明弗復盡注贊曰吾于三宗見孝弟之至焉髙祖以上逺矣而數十百世尊其正體不忘祖也何孝如之袒免以外疏矣而合之以食序以昭穆厚同姓也何弟如之先王之所以治天下此其本歟周衰法弛斯道以亡庶匹適者有之矣幼陵長者有之矣祖以世斷逺則忘之矣族以服治疏則薄之矣骨肉或如行路尚何有于天下乎于戲書燔簡脫幸存其略而學者弗之察吾甚病焉故表之以圖云直講李先生文集卷之十五終直講李先生文集卷之十富國策十首後學南城左贊編輯後學廣昌何喬新校正富國策第一愚竊觀儒者之論鮮不貴義而賤利其言非道德教化則不出諸口矣然洪範八政一曰食二曰貨孔子曰足食足兵民信之矣是則治國之實必本于財用蓋城郭宫室非財不完羞服車馬非財不具百官群吏非財不養軍旅征戍非財不給郊社宗廟非財不事兄弟婚媾非財不親諸侯四夷朝覲聘問非財不接矜寡孤獨凶荒札瘥非財不恤禮以是舉政以是成愛以是立威以是行舍是而克為治者未之有也是故賢聖之君經濟之士必先富其國焉所謂富國者非曰巧籌算析毫末厚取于民以媒怨也在乎強本節用下無不足而上則有餘也節用之説何如曰凡言國計者未嘗不以儉德藉其口也而皆不得其説必以茅茨土階冬裘夏葛為帝王之德是乃非聖無法不近人情宜乎人主之弗聽也貴為天子富有四海而使齪齪吝嗇下同匹夫不得自廣則安用尊卑為哉周制王有六寢后有六宮內官百有二十人女奴不在其數食用六榖膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十甕衣有文繡器有寶玉次舍共具所至無闕用四代之禮備四夷之樂玩好有焉匪頒有焉好用有焉王及后之用財皆不會計其所以自廣何如哉若是而從墨翟之道晏嬰之學以儉陋為是則周公之制作果非乎故曰凡皆言儉德者皆不得其説也愚以為時有不同事有通變用之不足則禮從而殺亦聖人之意也有周而上兵農未分天子六軍諸侯大國三軍次國二軍小國一軍皆出于民居則為比閭族黨州鄊行則為伍兩卒旅師軍必耕而食必蠶而衣國之經費兹不與焉故以九州之財奉千八百君而有餘也秦漢而下兵農漸異衣食縣官者動數百萬內嚴宿衛外驅戎狄轉運千里賞賜巨萬國之經費日以廣焉故以九州之財奉一君而不足也當其有餘之時用之可以盈禮遇于不足之際則宜深自菲薄如周之制尚當裁減甚于周者非敢聞也小過曰君子以用過乎倫語曰奢則不孫儉則固與其不孫也寧固儉非聖人之中制有時而然不得巳也故孝文帝躬衣弋綈革舄韋帶所幸慎夫人衣不曵地欲為一臺度用百金廢而不為夫豈不知説耳目便身體極至尊之用哉蓋念不傷財不害民損上益下之道也故其十二年而賜民租稅之半明年遂除民田之租稅孝景之時乃令民半出田租三十而稅一至武帝之初七十年間人給家足都鄙廪庾盡滿而府庫餘財京師之錢貫朽而不可校大倉之粟陳陳相因語後世之盛王必稱文景其故何哉以能適時之變過自菲簿而然也于惟一祖二宗創業屬統功德至矣延洪于我后靡不勤且儉矣而今羌戎背惠邊境暴師勞費不息帑藏不實此其過自菲薄損上益下之時也伏惟日損之又損之以文景之心為心則天下幸甚富國䇿第二民之大命榖米也國之所寶租稅也天下久安矣生人既庶矣而榖米不益多租稅不益增者何也地力不盡田不墾闢也周制井田一夫百畒當今四十一畒有竒人無易業而一心于農農時不失農功不粗則地力可盡也既又賦之以萊或五十畒或百畒或二百畒課其餘力治其曠土則田可墾闢也經界既毀王法弗復然猶能者時出焉李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畒治田勤謹則畒益三斗不勤則損亦如之地方百里之增減輒為粟百八十萬石矣漢搜粟都尉趙過能為代田一畒三􅎌一夫三百􅎌而播種于􅎌中苗生葉以稍耨隴草因隤其土以附苗根盛暑隴盡而根深能風與旱一歲之收常過縵田一斛以上善者陪之此盡地力之效也孝景詔曰郡國或磽狹無所農桑或地饒廣薦草莾水泉利而不得徙其議民欲徙寬大地聽之此墾田之意也今者天下雖安矣生人雖庶矣而務本之法尚或寬弛何者貧民無立錐之地而富者田連阡陌富人雖有丁強而乘堅驅良食有梁肉其勢不能以力耕也專以其財役使貧民而巳貧民之黠者則逐末矣冗食矣其不能者乃依人莊宅為浮客耳田廣而耕者寡其用功必粗天期地澤風雨之急又莫能相救故地力不可得而盡也山林藪澤原隰之地可墾闢者往往而是貧者則食不自足或地非已有雖欲用力末由也巳富者則恃其財雄膏腴易致孰肯役慮于災畬之事哉故田不可得而墾闢也地力不盡則榖米不多田不墾闢則租稅不增理固然也今將救之則莫若先行抑末之術以驅遊民遊民既歸矣然後限人占田各有頃數不得過制遊民既歸而兼并不行則土價必賤土價賤則田易可得田易可得而無逐末之路冗食之幸則一心于農一心于農則地力可盡矣其不能者又依富家為浮客則富家之役使者衆役使者衆則耕者多耕者多則地力可盡矣然後于占田之外有能墾闢者不限其數昔眺錯言于文帝募天下入粟縣官得以拜爵今宜逺取秦漢權設爵級有墾田及若干頃者以次賞之富人既不得廣占田而可墾闢因以拜爵則皆將以財役傭務墾闢矣如是而人有遺力地有遺利倉廪不實頌聲不作未之信也管子曰與之在君奪之在君貧之在君富之在君惟上所裁擇富國策第三貨莫貴乎金賄莫重乎帛所貴乎金者以其器成而可革革之而不耗也所重乎帛者以其用功甚省而有益于寒也今兹乘輿之器享燕之用內賞賜群臣外交通四夷必不可毋用金銀百官在位六軍在籍夏有暑冬有寒必不可毋用絲帛何以使金多而足用帛賤而易致哉愚以為東南之郡山髙者鮮不鑿土深者鮮不掘失職之民網漏之姦晝夜合作足蹈重泉而不憂于陷首戴川澤而不虞于壓礦石雲涌爐炭之熖未之有熄一泥一沙蔑遺利矣是金非不出也平原沃土桑柘甚盛蠶女勤苦罔畏飢渴急采疾食如避盜賊繭簿山立繅車之聲連甍相聞非貴非驕靡不務此是絲非不多也金盡出而用不足蓋用之者衆也絲雖多而帛不賤蓋不專以為帛也古者以金銀為幣與泉布並行既而稍用為器飾然亦未甚著也今也翕然用之亡有品制守閭閻者唯財是視自飲食頮沐之器玩好之具或飾或作必以白金連斤絫鈞以多為愜財愈雄者則無所不至矣舉天下皆然故金雖盡出而用益不足也古者錦文不粥于市不示民以奢也今也庶民之家必衣重錦厚綾羅縠之衣名狀百出弗可勝窮工女機杼交臂營作爭為纎巧以漁倍息其為帛者盬工惡絲而巳故絲雖多而帛不賤也金不足則價騰躍價騰躍則出邦布而市之費日增焉猶不能登其數則率民而買之彼農民未嘗蓄金銀一旦當具則必資于豪黨資于豪黨則或壞其産焉官增其費民壞其産此實弊之大也帛不賤則貧民弗可得貧民弗可得則紵絮不足以禦冬而凍者多矣宮之稅買其價弗損而唯行濫之得帛行濫則軍吏之衣莫能完固而貧者多矣官價弗損人民多凍軍吏多貧此亦弊之大也今將救之則莫如明立制度其用金銀上下有等多少有數匹庶賤類毋得僣擬則金不可勝用也君子小人服章有别民非布帛毋得輒衣工機之功將復其本則帛不可勝用也果能此道矣是宿弊之源可坐而塞也孔子曰為政先禮禮其政之本乎制度禮之實也善為政者得無留意哉富國策第四或曰前所謂驅遊民而歸之謂逐末也冗食也末者何事冗者何名其所以驅之請言其術曰所謂末者工商也所謂冗者不在四民之列者也古者工不造雕琢商不通侈靡偽飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二故工之所作賈之所粥商之所資皆用物也用物有限則工商亦有數今也民間淫侈亡度以竒相曜以新相夸工以用物為鄙而競作機巧商以用物為凡而競通珍異或旬月之功而朝夕敝焉或萬里之來而墜地毀焉物亡益而利亡算故民優為之工商所以日多也古者祀天神祭地祗享人鬼它未聞也今也釋老用事率吾民而事之為緇焉為黃焉籍而未度者民之為役者無慮幾百萬廣占良田利宅媺衣飽食坐談空虛以誑曜愚俗此不在四民之列者也古者府史胥徒官有定數今也郡縣之治未免寬貸冒名待闕傭書雇納請囑之流動以千計內滿官府外填街陌交相贊助招權為姦狗偷蠶食竭人膏血此又不在四民之列者也古者執左道以亂政殺假于鬼神時日卜筮以疑衆殺周禮有醫師掌疾醫痬醫以治萬民之疾病疕痬其員不過十數今也巫醫卜相之類肩相摩轂相擊也或托淫邪之鬼或用亡驗之方或輕言天地之數或自許人倫之鑒迂怪矯妄獵取財物人之信之若司命焉此又不在四民之列者也古者天子諸侯大夫士用樂庶人無用樂之文况新樂之發子夏所不語匹夫熒惑諸侯孔子誅之今也里巷之中鼓吹無節歌舞相樂倡優擾雜角抵之戲木棊革鞠養玩鳥獸其徒之數群行類聚往來自恣仰給于人此又不在四民之列者也一夫不耕或受之飢一女不織或受之寒而不耕者凡幾夫不織者凡幾女奈何民不飢且寒也百姓不足君孰與足民飢寒而上不匱者未之有也欲驅工商則莫若復朴素而禁巧偽朴素復則物少價巧偽去則用有數利薄而不售則或罷歸矣如此則工商可驅也欲驅緇黃則莫若止度人而禁修寺觀止度人則未度者無所待而皆罷歸矣禁修寺觀則巳度者不安其居而或罷歸矣其不歸者後數十年物故盡矣如此則緇黃可驅也欲驅官府之姦則莫若申明憲令慎擇守宰法嚴而吏察則無所措手無所措手則不得不罷歸矣如此則官府之姦可驅也欲驅方術之濫則莫若立醫學以教生徒制其員數責以精深治人不愈書以為罪其餘妖妄託言禍福一切禁絶重以遘募論之如法為之既艱則不得不罷歸矣如此則方術之濫可驅也欲驅聲伎之賤則莫若令民家毋得用樂衣冠之會勿納俳戲申命關防呵其過往用之既少則不得不罷歸矣如此則聲伎之賤可驅也驅之有術復之有業然而不力于農者未之信也富國策第五或曰釋老之弊酷排者多矣然以修心養真化人以善或有益于世故聖賢相因重其改作今欲驅緇黃而歸之無乃巳甚乎曰夫所謂修心化人者舍吾堯舜之道將安之乎彼修心化人而不由于禮苟簡自恣而巳矣昔孟子之闢楊墨曰楊氏為我是無君也墨氏兼愛是無父也今山澤之臞務為無求于世呼吸服食謂夀可長非為我乎浮屠之法棄家違親鳥獸魚鱉毋得殺伐非兼愛乎為我是無君兼愛是無父無父無君不忠不孝况其弗及者則罪可知矣故韓愈曰釋老之弊過于楊墨也然而曰人其人火其書廬其居則言之太暴驅之貌漸何者飽食安居其習巳久一旦斂數十百萬人而冠之則警擾甚矣故前所謂止度人而禁修寺觀者漸而驅之之術也緇黃存則其害有十緇黃去則其利有十男不知耕而農夫食之女不知蠶而織婦衣之其害一也男則曠女則怨上感隂陽下長淫濫其害二也幼不為黃長不為丁坐逃繇役弗給公上其害三也俗不患貧而患不施不患惡而患不齋民財以殫國用以耗其害四也誘人子弟以披以削親老莫養家貧莫救其害五也不易之田樹藝之圃大山澤藪跨據略盡其害六也營繕之功歲月弗巳驅我貧民奪我農時其害七也材木瓦石兼收並采市價騰踊民無室廬其害八也門堂之飾器用之華刻畫丹漆末作以熾其害九也惰農之子避吏之猾以傭以役所至如歸其害十也果去之則男可使耕而農夫不輟食矣女可使蠶而織婦不輟衣矣其利一也男則有室女則有家和氣以臻風俗以正其利二也戶有增口籍有增丁繇役乃均民力不困其利三也財無所施食無所齋民有羡餘國以充實其利四也父保其子兄保其弟冠焉帶焉沒齒弗去其利五也土田之直有助經費山澤之富一歸衡虞其利六也營繕之勞悉巳禁止不驅貧民不奪農時其利七也良材密石亦既亡用民得築蓋官得繕完其利八也淫巧之工無所措手棄末反本盡緣南畝其利九也宮毀寺壞不傭不役惰者猾者靡所逋逃其利十也去十害而取十利民人樂業國家富強萬世之策也何憚而不為哉將以存而勿論乎則董仲舒以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣將以為民祈福乎則詩云豈弟君子求福不回此皆賢人之至論先聖之法言也少留神明孰禦焉富國策第六古人有言曰榖甚賤則傷農貴則傷末謂農常糶而末常糴也此一切之論也愚以為賤則傷農貴亦傷農賤則利末貴亦利末蓋農不常糶有時而糴也末不常糴有時而糶也以一歲之中論之大抵斂時多賤而種時多貴矣夫農勞于作劇于病也愛其榖甚于生也不得已而糶者則有由焉小則具服器大則營昏喪公有賦役之令私有稱貸之責故一榖始熟腰鎌未解而日輸于市焉糶者既多其價不得不賤賤則賈人乘勢而罔之輕其幣而大其量不然則不售矣故曰斂時多賤賤則傷農而利末也農人倉廩既不盈竇窖既不實多或數月少或旬時而用度竭矣土將生而或無種也耒將執而或無食也于是乎日取于市焉糴者既多其價不得不貴貴則賈人乘勢而閉之重其幣而小其量不然則不豫矣故曰種時多貴貴亦傷農而利末也農之糶也或闔頃而收連車而出不能以足用及其糴也或倍稱賤賣毀室伐樹不能以足食而坐賈常規人之餘幸人之不足所為甚逸而所得甚饒此農所以困窮而末所以兼恣也易繫辭曰何以聚人曰財理財正辭禁民為非曰義財者君之所理也君不理則蓄賈專行而制民命矣上之澤于是不下流而人無聊矣此平糴之法有為而作也管仲行于齊李悝行于魏耿夀昌行于漢國不失實人獲其利自晉迄隋時或興廢厥聞未昭唐天寶中天下平糴殆五百萬斛兹全盛之事也大宋受命將百年矣穀入之藏所在山積平糴之法行之久矣蓋平糴之法行則農人秋糶不甚賤春糴不甚貴大賈蓄家不得豪奪之矣而官之出息常什一二民既不困國且有利兹古聖賢之用心也然其所未至則有三焉數少也道逺也吏姦也一郡之糴不數千萬其餘畢入于賈人至春當糶寡出之則不足于飢也多出之則可計日而盡也于是賈人深藏而待其盡盡則權歸於賈人矣是數少之弊也倉儲之建皆在郡治縣之逺者或數百里其貧民多糴則無資少糴則非可朝行而暮歸也故終弗得而食之矣是道逺之弊也舉掌之人政或以賄概量不均行濫時有及其出也或減焉或雜焉名曰裁價實則貴矣是吏姦之弊也今若廣置本泉增其糴數則蓄賈無所專利矣倉儲之建各于其縣則逺民可以得食矣申命州部必使廉能則姦吏無以侵刻矣如此利國便人事可經久是謂通輕重之權不可不察富國策第七水旱之憂聖王所不免堯湯之事賢愚嘗共聞也故君人者務多蓄積以為之備王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色周禮遺人掌邦之委積以待施惠鄉里之委積以恤民之囏厄門關之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待凶荒此皆計國用之餘隨便蓄積以須乏困故時可災物可夭苗可稿地可赤而人不可飢也自井田法壞軍國務煩政取一切或未猶逺兵有儲邉有備則國之幸矣吏之能矣元元之民自為之而巳矣夫民之無知靡衣偷食豐嵗粒米狼戾有不愛也食之亡節用之亡度或委於糞土或腐于甑甗或以飫狗馬或以肥雞鶩計口論費幾何而不倍蓰也及其凶年則家不素蓄人不豫備室如罄矣突不黔矣草木之根實不足以飽矣于是強者為盜賊弱者轉而死溝􅊤父母妻子不能相保此禍亂之階善為國者所宜留意也嚮者天地嘗有災矣百姓嘗有飢矣使以安撫為號者擁節而宵征吏以勸誘為辭者弗絶于耳或出御府之金或下鬻爵之令君心勤止不翅慈母然而榖生有時不可以坐而待也儲峙有數不可以從天降也求之甚至得之幾希以此振民不亦難矣愚竊迹古制之宜于時者莫若義倉之為愈也蓋豐年損其有餘儉年救其不足事至纎悉功垂無窮故惰開皇中始立社倉終於文皇得無飢饉唐太宗曰既為百姓先作儲貯官為舉掌以備凶年非朕所須橫生賦斂利人之事深足可嘉今宜于天下縣治各建倉廪踵唐之制以義為名然唐之用心固善矣斂散之法則未盡得宜彼計民稼種以畝稅之及無田者亦各有差則能入粟之人非窮民也至凶年則入粟之家或自有貯備不當賙救于是窮民享之矣出此而入彼有喪而無得奚以異于厚斂乎今莫若以農末之民各分戶等每于秋成以次入粟謂之寄留至凶年則下戶之乏食者凖數給還其上戶則轉以給窮民書其轉給之數積以歲年數登若干者拜以爵級以寵異之則富人樂輸窮民受賜矣與夫臨事而鬻爵無粟而虛求不可同日而語也富國䇿第八昔在神農日中為市致民聚貨以有易無然輕重之數無所主宰故後世聖人造幣以權之其始以珠玉為上幣黃金為中幣白金為下幣但珠玉金銀其價重大不適小用惟泉布之作百王不易之道也根周苗漢蔓于隋唐或因或革模法亡常獨開元之號最得中制相承遂至于今斯固先史商之久矣大抵錢多則輕輕則物重錢少則重重則物輕物重則用或闕物輕則貨或滯一重一輕利病存乎民矣至以國計論之莫若多之為貴何者用有常數不可裁減故也朝家治平日久泉府之積嘗朽貫矣而近歲以來或以虛竭天下郡國亦罕餘見夫泉流布散通于上下不足于國則餘于民必然之勢也而今民間又鮮藏繦之家且舊泉既不毀新鑄復日多宜增而却損其故何也錢非溫也不可衣而弊之也非脆也不可食而盡之也然而安在哉是有姦人銷之也姦人所以得銷者以惡錢容于市銅像銅器容於寺觀也竊觀人間或銷法錢殽雜他巧以為惡錢其作必于重湖大江窮山深谷風濤所阻猛獸所在人不得見吏不得呵是法令無由而勝也銷一法錢或鑄四五市人易之猶以二三則常倍息矣民既蓄惡錢不可使勿用利之所在是法令亦無由而勝也國失法錢而民得惡錢惡錢終不可為國用此錢所以益少也又緇黃之家競禮銅像易模變巧動必滿堂鐃鉦鐘磬之器所在雷震謂取于官則有害冶鑄其私則以錢為之耳新故渾殽公私莫辨是法令亦無由而勝也用之廣矣利數倍矣故槖焉而熖煆焉而聲者往往而是披榛而行衷甲而商者不絶于道緩則恣所為急則鬪而死是法令亦無由而勝也像則日新器則日長其所銷者寧有紀極此錢所以益少也今欲絶盜鑄莫若去惡錢去惡錢非急誅之謂也欲辨銅像銅器莫若一取而銷之勿得復用也何謂絶盜鑄莫若去惡錢夫盜鑄之人散在幽逺卒以法繩之則吏必苛察獄必冤濫閭里之間將不安居焉苟有利矣雖死而必求苟無用矣雖縱之弗為惡錢去則盜鑄者無用無用則盜鑄自絶矣故曰絶盜鑄莫若去惡錢也何謂去惡錢非急誅之謂也今人間既多惡錢一旦急之則莫敢出莫敢出則是銷法錢之銅而積之無用之地國既失實民且傷財固莫若下令收惡錢而銷之除其殽雜償以銅價示之期日要之重典民既畏法而喜于得直將畢入于官官挾其銅因以資冶鑄則法錢益增惡錢盡去矣故曰去惡錢非急誅之謂也何謂欲辨銅像銅器莫若一取而銷之勿得復用也今寺觀擳比像器之設遽數不終必詰之曰作之新乎因之故乎取之官乎得之私乎則是增吏貟不足以按廣獄城不足以繫令愈急而姦愈生非術之善也若一取而銷之勿得復用則銅積足以資冶鑄工巧無所措其手銷錢之弊不禁而止故曰欲辨銅像銅器莫若一取而銷之勿得復用也至于蠻夷之國舟車所通竊我泉貨不可不察古之人曰錢者亡用器也而可以易富貴富貴者人主操柄也果慎斯術則操柄無失而群下服從有國之急務也富國策第九縣官食租衣稅古之道也自漢而下兵益興經費益不足日生他名猶罔克濟勢不可巳非上失也山澤之富天地所以養人者鬻鹽之利博矣故東郭咸陽致生纍千金吳王濞富埒天子孝武因置鹽鐡官是時國用饒給而民不益賦未必不由此也朝家酌古鹽法有因有革或引之池或汲之井或熬之海一出公上人不能私此其因者也東南列郡官自斥賣舟運銜尾倉儲如坻商旅之行斂手無措此其革者也然先王之制未有始善而末不弊者蓋作法之時上心切至吏皆圖功人皆畏法而姦謀未生始以是善也絫世之後事同凡常吏或解弛人或慣習而姦謀日生末以是弊也官初糶鹽時操其贏甚厚而郡國鹽積常不足于糶今之郡國昔之郡國也戶口蕃息則倍蓰矣而糶益少鹽益滯者何也是姦謀入焉耳彼鹽之來逺者逾江湖歲于波月于風焉近者亦百數十里維堤堰宿葭菼焉軍之窮吏之狡者家于是食于是私賣其什之幾而足以它物固其常也既輦而倉則舉掌之人又私賣其什之幾而足以它物無慮公鹽常失其半而半它物焉民之食鹽既多私賣者矣而公鹽之出不可賖貰故坐肆占賣者郡才數十以數萬家之食仰數十戶之鹽一銖一兩不可與官為市必取于斯人之徒其勢必小其權量增以糞土常不啻以倍價取半鹽矣公鹽貴而汙私鹽賤而潔山澤之氓城邑之豪競食之而竊販者亦交馳焉是則民雖衆多或食私鹽或食糞土利輸于姦而官之糶益少鹽益滯矣令非緩也法非輕也利之所誘雖日刑人號痛之聲動乎天地弗能禁也故今日之宜莫如通商商通則公利不減而鹽無滯也何謂商通則公利不減夫官自糶鹽利信厚矣然舟有壞倉有墮官有俸卒有糧費巳多矣若官鬻鹽而糶與商人使自行之既權其息因取關市之稅而費省焉是公利不減也何謂商通則鹽無滯夫商人衆而務售則鹽不殽雜所至之地又以貰于市人則列肆多得斥賣賣者多而務售則鹽亦不殽雜昔啖糞土者今皆食鹽昔喜竊販者今皆公行鹽之用益廣是以無滯也公利不減而鹽無滯財用以足刑罰以清治世之懿也或曰官鬻鹽而糶與商人有息焉有稅焉息寡而稅薄則公利損息多而稅厚則商不來何如曰不若寡薄之為愈也寡薄則何以使公利不損曰東南和糴幾二百萬轉漕之費不為不多矣今糴鹽與商以米榷折則數百萬斛可坐致淮海是于公利豈少也哉易曰通其變使民不倦此通變之時不可忽也富國策第十或曰天下之貨茶最後出而國用賴焉今兹有説乎曰茶非古也源于江左流于天下浸淫于近代君子小人靡不嗜也富貴貧賤靡不用也有國者從而籠之利一孔矣而世之所貴家之所蓄則非有公茶者何公茶濫惡不味于口故也每歲之春芽者既掇焙者既出則吏呼而買之民挽而輸之矣民之淳或以利而姦也吏之察或以賄而暗也于是乎行濫入焉草邪木邪唯恐器之不盈也塵邪煤邪唯恐行之不昂也商算而行或不售也則販者鮮矣倉儲之久或腐敗也則水火乘之矣是以邦之泉布竭于市估而積之亡用之地息未收而本或喪矣若東南列郡則吏自斥賣課不甚多時或不登焉而民之自用常數倍矣來有甚逺價有甚貴而人爭取之者味美也塗有甚險法有甚重而人爭販之者利厚也巡按之使逐捕之卒日馳于野黥額之吏鞭背之人日滿于庭愁怨愈多而姦不可禁督責愈重而財不可阜勢之所運末如之何也巳今日之宜亦莫如一切通商官勿賣買聽其自為而籍茶山之租科商人之稅以此校彼殊塗一致且商人自市則所擇必精所擇精則儥之必售儥之售則商人衆商人衆則入稅多矣又昔之所以披草莾懷兵刃務私販者禁嚴故也既巳通商則當安行夷路自實官府亦入稅多矣况不滯本泉不煩威獄利國便人莫善于此或曰子謂通茶鹽之商其如逐末何曰昔之未通商也文峻而網密富厚重慎之子罔遊其間故蚩蚩細民以身易財者入焉若法通商則大賈蓄家射時而趍細民何利焉非逐末之路也于戲鹽始于漢茶始于唐取以濟時事非師古異日邦財饒衍王道寖昌棄之于民不勝大願直講李先生文集卷之十六終直講李先生文集卷之十七強兵策十首強兵策第一兵之作尚矣黃帝堯舜以來未之有改也故國之于兵猶鷹隼之于羽翼虎豹之于爪牙也羽翼不徑鷙鳥不能以死尺鷃爪牙不鋭猛獸不能以肉食兵不強聖人不能以制褐夫矣所謂強兵者非曰日尋干戈暴骨萬里逞一朝之忿以求橫行天下也必有仁義存焉耳仁義之説何如曰歷觀世俗之論兵者多得其一體而未能具也儒生曰仁義而巳矣何必詐力武夫曰詐力而巳矣何必仁義是皆知其一未知其二也愚以為仁義者兵之本也詐力者兵之末也本末相權用之得所則無敵矣故君者純于本者也將者駮于末者也孫子曰主孰有道將孰有能道道德也能智能也又曰將者智也信也仁也勇也嚴也乃知君則專用道德將則智信仁勇嚴並用之矣昔大道之行與三代之英不敢逺引請以漢事明之韓信言于漢王曰項王所過無不殘滅者天下多怨百姓不親附名雖為霸實失天下心大王之入武關秋毫無所害除秦苛法與秦約法三章秦人無不欲得大王王秦者今大王舉而東三秦可傳檄而定也此項王失仁義而漢王得之之謂也及信為將以木罌缶渡而虜魏王背水陳立赤幟而破成安君成安君不聽廣武君䇿以為義兵不用詐謀竒計故身死泜水上此成安君失詐力而韓信得之之驗也然為將者多知詐力而為君者或不通仁義故雖百戰百勝而國愈不安敵愈不服也所謂仁義者亦非朝肆赦暮行賞姑息于人之謂也賢者興愚者廢善者觀惡者懲賦斂有法繇役有時人各有業而無乏用樂其生而親其上此仁義之凡也彼貧其民而我富之彼勞其民而我逸之彼虐其民而我寬之則敵人望之若赤子之號父母將匍匐而至矣彼雖有石城湯池誰與守也雖有堅甲利兵誰與執也是謂不戰而屈人之兵矣若彼貧其民我亦貧之彼勞其民我亦勞之彼虐其民我亦虐之而望敵人之來是猶以鴆漿待渴者以附子呼飢人彼寧無聊必死而巳孰為來哉敵無歸心而誓必死則我雖以太公為將孟賁為卒飛兔為騎太阿為兵未易可圖也而况吾民不附自生它變亦不可不慎也國家積德絫仁為之百年矣黎民懷惠且歌舞矣不幸戎心怙亂阻我王命師興三歲未獲振凱雖天衷勤恤而軍事惟煩或以財賦或以力征元元無知頗或愁怨而西方尤甚矣伏惟發德音為天下慮內以紓吾民外以誘來者則邉鄙可安大功可立有識之願也強兵策第二或曰天下之事宜何慮哉曰以天下為一身則諸夏腹心也夷狄手足也腹心安寧氣和而神王則手足之疾非吾禍也若腹心不寧役其氣而疲其神以專治手足手足未愈而腹心殆矣故用兵之法必修諸內而後行諸外彼戎狄豺狼罔知禮義強則犯上弱則離散執而誅之用力非少舍而弗問時復侵軼顧權制之何如耳故當今之慮若興屯田之利以積榖于邉外足兵食內免饋運民以息肩國以省費既安既飽以時訓練來則奮擊去則勿追以逸待勞以老其師此䇿之上也若宿兵于外仰給于內前不敢進後不敢退雖曰無功幸免于敗千里饋糧二十致一材木敝于車輦牛馬死于牽倣男女困餓室家空虛行之數年敵承其弊此策之中也若帥師深入贏糧而隨少人則攻戰不足多人則饋餉不繼道險而有伏勢孤而亡援與無知之俗爭一旦之命萬一蹉跌禍在不測此䇿之下也今將出上策則何如曰屯田之利建議者多矣而執事未之從者其以地少可耕之田乎軍無可耕之人乎今之郡國民既庶矣誠少曠土可以耕也今之禁衛卒素驕矣誠無勤者可以耕也然而可耕之田安取之哉曰邉郡之民有困者矣有不安其居者矣苟募其徙內地授以生業使之安堵乃以其故田宅隸于屯官則不患無田矣然而可耕之人安取之哉曰邉郡之兵自禁旅之外别置屯軍凡天下廂之冗役者法之流移者民之願從者合而籍之以隸于屯官則不患無人矣田既入人既聚然後辨其夫畝列之廬舍授之耒耜教之稼穡明立勸課時加督察勤則有賞惰則有刑然而農功集矣既又為之什伍立其長帥賦以兵器與其甲胄乘其間暇習之戰鬪是謂因內政以寄軍令也然而武事興矣食既足兵既練禁旅未動而屯軍固巳鋭矣以紅腐之積濟虎貔之師利則進戰否則堅守國不知耗民不知勞而邉將髙枕矣彼其不忠不孝愚弄其民于矢石間而我以餘力馭之亡有日矣或曰屯田固便矣徙民內地不亦擾乎抑其授以生業于國用何如哉曰民得去兵寇輕賦役而就善地若水之于下魚之于淵也今募其徙是順民之政也漢武帝徙關東貧人于隴西北地西河上郡凡七十餘萬口後加徙猾吏于關內當是之時弗聞其擾也且以輦運之費為徙民之生業不亦多乎輦運則連年不息民業則一與之而巳矣暫勞永逸其此之謂乎然則民樂內徙而邉郡虛如之何曰嚮者民多而兵少故鬪者寡而驚者衆如使民少而兵多則鬪者衆而民有賴矣以兵易民何虛之有哉在漢趙充國在唐婁師德皆以屯田利盡西土威震羌胡兹薦紳先生之所常言也惟熟圖之強兵策第三或曰屯軍之耕自養可矣禁旅坐食胡能給之曰古者制農田百畒百畒之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人其人之食上年則人四釜中年則人三釜下年則人二釜計一夫之耕其登榖不寡矣今屯軍之耕姑以下農夫為率一夫耕而食五人則十萬夫耕所食禁旅四十萬人矣以二十萬夫耕則餘四十萬人之食三年耕則有二年之蓄矣雖有凶旱水溢巖廊之上可無西顧之憂也然則屯田之利可施于天下乎曰今天下公田往往而是籍沒之産未嘗絶書或為豪黨占佃或以裁價斥賣公家之利亦云薄矣其勢莫若置屯官而領之舉力田之士以為之吏招浮寄之人以為之卒立其家室藝以桑麻三時治田一時講事男耕而後食女蠶而後衣撮粒不取于倉寸帛不取于府而帶甲之壯執兵之鋭出盈野入盈城矣其所輸粟又多于民而亡養士之費積之倉而巳矣此足食足兵之良算也或曰議者多稱鄊軍何如曰周禮小司徒會萬民之卒伍而用之家出一人比為伍閭為兩族為卒黨為旅州為師鄉為軍此先王之法也管子作寓令之政卒伍定乎里而軍政成乎郊連其什伍居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死故能外攘戎狄內尊天子以安諸夏也夫設鄊軍以自衛前哲之意深矣人之愛親戚重財物蓋天性也寇賊之來將殺我丁強虜我老弱蹂􅏳我田宅掠取我金帛則凡噍類皆有鬪心矣君人者因民心而利導之既訓練之又將領之則其守戰至死非賞罰使之然也竊觀近世鄊無軍目人不知武事家不藏兵器寇賊之來則以袒裼之軀投餌于虎口賊去信宿則吏卒至吏卒至而亡所獲益為勞弊矣雖然豈唯野而巳哉不曰郡乎曰縣乎自非方鎮多無備豫客軍百十僅如逆旅幸而治平矣萬一有狂夫大呼則奚以待之故鄊軍之名不可不察也近者亦籍戶而為之矣萬家五百亦巳多矣然恐將吏未得人訓習未得理何者統帥則縣令也縣令豈皆賢偏禆則戶民也戶民豈皆善撫御或失變故亡常此謂將吏未得人也令之所教姑令習射曽不知坐作進退之節心背左右之宜耳不辨金鼓目不别旌旗一旦用之驅市人耳此謂訓習未得理也如欲將吏得人莫若精擇縣令勿拘官序一以材能縣令得人則偏禆之選亦得人矣然後明戰陳之法以授之則訓習得理矣如此則鄉軍日強也屯軍以征戎鄊軍以守備郡國之勢皆王之藩屏也強兵䇿第四或曰地勢西北髙東南下地髙而寒其民體厚而力強氣剛而志果地下而溫其民體薄而力弱氣柔而志回故西北之兵能辛苦有成功而東南之士少所立此士大夫咸知之也而子謂郡國屯軍可以征伐意者非東南之謂歟曰是老生之論也夫民之情性有地氣矣是之謂風也教而使之在君長矣是之謂俗也聖王不擇民而教賢將不擇士而使擇民而教是國無顔冉未可學也擇士而使是世無賁育未可戰也水至柔也揚之以風則可使覆舟金至剛也冶之以火則可使成器顧所用之方略何如耳江南有卑薄之稱荆楚有剽輕之議其傳非一世矣然楚若敖篳路籃縷而其後世常與晉爭諸侯吳太伯斷髮文身而其後世亦先晉歃項籍以八千人起會稽而殺秦降王遷漢王于蜀分裂天下號稱為霸宋武帝以百餘人起丹徒而誅桓正晉遂平齊地長驅關洛是則東南之士亦嘗與西北校矣惟其將之才不才也然以今日之事言之則習有所多技有所長亦不可不察也若夫沙平草淺千里在目土不成丘水不成谷馬肥人輕來往電駭雙帶兩鞬左右馳射此非南軍之所長也山陵險厄草木蓊蔚江流吞天巨浪時起行人疑惑飛鳥不度徒步相搏短兵相擊此亦非北軍之所長也北征而用南軍衆則笑之矣南征而用北軍未有言其不可者竊所未諭也江海之濵或一盜肆虐一邦𬒳擾則命王人帥王卒以捕之以多擊少以短擊長費或甚厚而功或不立此亦一失也嚮者征南蠻溪洞則可監矣去平地而即險阻出中國而入瘴癘狡穴未堙而吾軍殆矣竊惟廟算之深未必不及此也蓋郡國無精兵不可不內發故也載使置軍屯田隨便興發則何征而不服何討而不誅哉至若以古名將將之以騎戰之法教之舍此所短從彼所長則運之天下亦猶袵席間也強兵策第五兵矢者軍之神靈也甲胄者人之司命也故一夫奮劍則千人披靡孟賁袒裼則童子關弓能殺之矣然兵不利不若無兵之愈也無兵則慎所擊而逺于敗矣甲不堅不若無甲之愈也無甲則知所避而免于死矣有兵而不利有甲而不堅而假之以求勝恃之以求生則誤大事取大禍莫斯之甚也故周官考工為器之法天有時地有氣材有美工有巧合此四者然後可以為良凡器皆然况于兵乎故其為弓也取六材必以其時凡相幹欲赤黑而陽聲角欲青白而豐末膠欲朱色而昔筋欲小簡而長大結而澤漆欲測絲欲沈六材之全然後冬析幹春液角夏治筋秋合三材寒奠體氷析灂春𬒳弦其為矢也前弱則俯後弱則翔中弱則紆中強則揚羽豐則遲羽殺則躁是故夾而搖之以視其豐殺之節橈之以視其鴻殺之稱凡相笴欲生而搏同搏欲重同重節欲疏同疏欲栗其為戈殳戟矛之祕也攻國欲短守國欲長置而搖之以視其蜎炙諸牆以視其橈之均橫而搖之以視其徑其為甲也視其鑽空欲其惌視其裏欲其易視其朕欲其直􅐤之欲其約舉而視之欲其豐衣之欲其無齘是先王之為兵甲必及其時必美其材工則必良事則必試如此其至也惟今郡國之貢兵器果何如哉聚工而作卒歲後巳未嘗試也連輿而出方舟而上無不受也簡閲不明則精粗不别精粗不别則制作必濫制作濫則工不必巧材不必美况天時乎况地氣乎加以師興之際卒然求取斬木以為努伐竹以為箭或取非其時或産非其地備數而止行濫固多暴之日則焦濡之雨則朽以之應敵不知其可矧新甲之制出于一切次𥿄為札索麻為縷費則省矣久將奈何凡此之類皆有識之所聞見也至于郡國兵庫或久不啓戰守之具未嘗修飾事至而慮亦非智者所能也愚以為天下造兵宜專命守臣以蒞之總置使名以督之工之選必難其人而進其食以優之材之取必善其物而增其價以來之取之有地來之有時為之有法日省之月試之善至多則賞惡雖少而刑上下檢察用為急務其舊兵革勿絶繕完以備豫為政則龍淵太阿不獨稱于古而蠻夷猾夏有血刃之期矣強兵策第六孫子曰將能而君不御者勝故古者天子遣將于太廟親操鉞持其首授其柄曰從是以上至天者將軍制之乃復操柄授與刃曰從是以下至淵者將軍制之故李牧之為趙將居邉軍市之租皆自用饗士賞賜決于外不從中御也周亞夫之軍細柳軍中唯聞將軍之命不聞天子之詔也夫古先哲后于王業亦艱難矣安不忘危其心亦至矣豈故欲示人以利器成人以威柄以天下之命屬之于一臣哉蓋任賢之道不得不然也馬之所以能千里者以其獨行也若使駕以輜車驂以蹇驢役夫罷羸執轡其上則未必不傾覆矣况乎致逺哉鳯之所以能千仞者以其自恣也若使繫之以線縷養之于園囿藩籬之類啁啾其側未必不憂死矣况乎沖天哉用兵之法一步百變見可則進知難則退而曰有王命焉是白大人以救火也未及反命而煨燼久矣曰有監軍焉是作舍道邉也謀無適從而終不可成矣竊迹其原蓋知之不盡信之不篤也知之不盡恐其不賢也信之不篤懼其不忠也不賢而無所制則或敗事矣不忠而無所監則或生變矣是故束之以詔令持之以親貴焉然恐其不賢胡不選賢而任之懼其不忠胡不擇忠而使之未見其賢而任之是國無賢邪未知其忠而使之是下無忠邪與其用之之疑曷若取之之慎孔子曰視其所以觀其所由察其所安人焉瘦哉必也授以節度使之遵行邪則王人之微者自足為之矣安用大臣哉大臣而尚可疑耶則小臣胡為而可信也彼誠不忠耶則不知有君矣何憚于一小臣哉昔韓信平齊七十餘城南靣稱孤與楚則楚重與漢則漢重鼎足之形可坐而定也而藉金石之交荷解衣推食之德蒯通之説弗忍從也當是之時豈有監之者哉及其削爵為侯居京師奉朝請乃欲外結陳狶內因諸官徒奴以行大事誠非嚮者三分之勢也而卒以叛逆者君恩不終而懷怨望也漢孝武之于霍子孟蜀先主之于諸葛孔明皆託以六尺之孤而弗聞有變者君臣之義至深國士之遇可懷也苟推赤心疇敢不順苟為疑之人亦無足信者今兹兵興矣將用矣惟上心曠然與忠賢為一體無置節目于其間則將才如神軍鋒如雷功業易可成也強兵䇿第七國之所以為國能擇將也將之所以為將能養士也人莫不愛身而以身當矢石莫不愛死而以死衛社稷者厚無所往也故曰視卒如嬰兒故可與之赴溪視卒如愛子故可與之俱死吳起吮疽而戰不旋踵李廣與士卒共飲食而愛樂為用親非父母也倫非兄弟也然而所以撫循盡得其歡心者非一朝一夕之事也故臨敵易將兵家所忌彼其推恩信分甘苦曠日持久上下親矣猶不能以有功一旦而易之則雖賢矣雖仁矣上恩不可一言而洽也下情不可一顧而通也卒然用之則安能有以為哉馬之馳矣而斷其蹄雖代以驥足弗能行也子之孩矣而逐其乳雖繼以毛嬙弗能育也昔燕以騎劫代樂毅遂有即墨之敗七十餘城盡反于齊趙以馬服子代廉頗遂有長平之降四十萬衆皆坑于秦功或不可早建事或不可速成亦明主所宜察也竊觀今之易將誠以敗衄不稱故也夫任人當審其賢不賢未可責其勝不勝也不賢而勝非國之福也適所以召敵也賢而不勝非國之患也適所以警之也使彼勝而驕我敗而怒以無功之將用無功之士竭智盡力以求灑耻則不知山之有髙石之有堅水之有溺火之有焚死之可畏生之可懷矣孰能當其鋒哉吳子謂魏武侯曰人有短長氣有盛衰君試發無功者三萬人臣率以嘗之其可乎今使一死賊于曠野千人追之莫不梟視狼顧何者恐其暴起而害巳也是則一人投命足懼千夫故其以三萬人而破秦十萬衆也今以敗而易之是古名將無敗者乎孟明視敗于崤而秦伯復其位方有焚舟之報荀林父敗于邲而晉侯赦其罪卒致曲梁之功棄瑕録用古之道也若賢而易之是雖有過人之略無所復用斯足以快盜心而巳矣不賢而易之是去劇就間如釋負簷斯足以遂其私而巳矣後之人將曰苟勝焉何恤乎富貴苟負焉不過一左遷而巳任之不甚久責之不甚重人或苟且將焉用之幸而天威在上盜不敢前如使易將之際群情未安約束未定謀未及周備未及設而犬羊乘之禍亦不可測也誠能注意賢才期之逺大一勝勿遽賞賊平之後則茅土存焉一敗勿遽罰事終不濟則鈇鉞存焉困獸猶鬪况大捋乎是則耻不足灑而賊不足平也強兵策第八或曰一敗勿罰過可略也一勝勿賞何以使人曰勝而勿賞是所以使人之術也愚嘗深迹有國者之行事未始不以賞使人也而或失使之之道焉夫爵者所以貴也祿者所以富也富貴者是人之所欲也仁非伯夷叔齊廉非于陵仲子孰能不動其心哉故智者竭慮勇者盡力辨者以説文者以檄不敢家其家不敢身其身不逺于蠻貊之外不威于矢石之間日不為暑風不為寒渴不暇飲飢不暇食孳孳焉從于王事者賞使之然也雖有至性自天至誠發中不待勸沮而決所去就者兹蓋非常之士豈可以衆人望之哉乃知賞之于使人至矣其為失者賞之大速而浮于功也徒知賞之可以使人而不知賞極則弗能使之矣舉億萬之衆贏千里之糧足未履于山川手未煩于枹鼓虜獲未盈車斬首未數級而幕府巳獻捷矣朝廷已議功矣爵等有數而敵人無數賜物有盡而賊衆無盡故天討未行而策命極矣尺地未收而府庫殫矣身既巳貴家既巳富子女玉帛所欲者陳于前矣兄弟親戚所愛者受其賜矣體習宴安志在驕佚勝則無以加敗則失其舊畫蛇之足世所戒也是賞典雖在安能復使之哉其間亦有矜功跋扈以求姑息國家之弊多或由之唐季五代可覆而視也此無他賞之太速而浮于功之咎也故曰勝而勿賞是所以使人之術也古者師還飲至策勳事成而賞誰云晚邪抑又聞之書曰德懋懋官功懋懋賞無德而官則官不足以勸有德無功而賞則賞不足以勸有功如使傝䢇受位私昵受賜則何以待功德之臣哉位雖髙與傝䢇同賜雖厚與私眤同是德不足貴而功不足重其誰勉之哉今者明明在上誠日慎于賞爵則師可使武臣可使力而四方無虞矣強兵䇿第九人莫不有才才莫不可用才取其長用當其宜則天下之士皆吾臂指也故曰使智使勇使貪使愚智者樂立其功勇者好行其志貪者決取其利愚者不愛其死因其至情而用之此軍之微權也昔伊尹之興土功也強脊者使之負土眇者使之推傴者使之塗各有所宜而人性齊矣竊觀世俗之論則有異于此不求于已而專責于人不用其長而專攻其短適時則謂之違禮從權則謂之壞法剛毅則謂之不遜倜儻則謂之不檢輕財則謂之不儉為生則謂之不廉見其一不問其二觀諸外不察諸內以帷幄之談而校之老生之議以戎馬之任而同之俗吏之選是猶責越客以騎射望胡人以乘舟雖其賢才何益于事哉蘇秦謂燕易王曰孝如曽參義不離其親宿昔于外王又安能使之步行千里而事弱燕之危王哉廉如伯夷義不為孤竹君之嗣不肯為武王之臣不受封侯而餓死于首陽之下有廉如此王又安能使之步行千里而進取于齊哉信如尾生與女子期于梁柱之下女子不來水至不去抱梁柱而死有信如此何肯揚燕秦之威却齊之強兵哉故知善不必皆可惡不必皆否置之有地使之有時一不可廢也小才之于大用是匹雛不能以舉千鈞也大才之于小用是堯舜不能以牧羊也故曰多言多語惡口惡舌終日言惡寢卧不絶為衆所憎為人所疾此可使要遮閭巷察姦伺禍也權數好事夜卧早起雖劇不悔此妻子之將也先語察事勸而與食實長希言財物平均此十人之將也切切截截垂意肅肅不用諌言數行刑􅓍刑必見血不避親戚此百人之將也訟辨好勝嫉賊侵陵斥人以刑欲整一衆此千人之將也外貌怍怍言語時出知人飢飽習人劇易此萬人之將也戰戰栗栗日慎一日近賢進謀使人知節言語不慢忠心誠畢此十萬人之將也溫良實長用心無兩見賢進之行法不枉此百萬人之將也明主誠能不牽于世俗之論而盡乎才用之宜則不視而形不聽而聲不降席而橫行乎四夷矣強兵䇿第十將之有兵法猶儒之有六經也儒莫不讀六經而知道者鮮矣將莫不讀兵法而適變者鮮矣世一賢士猶為踵武國一賢將猶為比肩其故何也性生于內而學成于外非學問之能移性也水之湍者決之也而聚鄭白之工不能以流涸澤刃之芒者礲之也而盡南山之石不能以利鉛刀本之弗善末無及也然值承平之世言堯舜者皆可以為善當有事之際學孫吳者未必能應敵緩急之勢異也夫兵者詭道有形或不可視有聲或不可聽合散如雷電隱見如鬼神而欲以昔人之餘論既往之陳迹擬議于其間不亦難乎苟非有髙世之識出類之才動如循環一步百變者其孰能與于此哉楚漢之時諸將多矣唯韓信起于餓隸戰而必勝攻而必取未嘗敗北者何也豈其兵法皆衆人之所未學者乎蓋其用之非衆人之所及也是謂反兵法而用兵法也兵法曰絶水必逺水客絶水而來迎之于水內令敵半渡而擊之利欲戰無附于水而迎客也及信與龍且夾濰水陳乃夜令人為萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也此反半渡之文也而卒以勝者雜于利而務可伸雜于害而患可解也兵法右背山陵前左水澤而信攻趙未至井陘口乃使萬人先行出背水陳趙軍望見大笑之此反前左之文而卒以勝者陷之死地而後生投之亡地而後存也反其顯而用其微人以為拙已以為工智者不能與其謀巧者不能同其伎用兵若此可以言學矣今以衆人之識讀衆人之書而求以勝彼亦巳疏矣昔趙奢之子括自少時學兵法言兵事以天下奠能當嘗與其父言兵事奢不能難然不謂善括母問奢其故奢曰兵死地也而括易言之使趙不將括則巳若必將之破趙軍者必括也及孝成王使括為將藺相如曰王以名使括若膠柱而鼓瑟耳括徒能讀其父書傳不知合變也趙王弗聽故有長平之敗乃知有將才者必習兵法習兵法者不必有將才况以言取人孔子病諸兵戰之埸立尸之地固明主所宜留意也直講李先生文集卷之十七終直講李先生文集卷之十八安民䇿十首安民䇿第一愚觀書至于天聰明自我民聰明夫明畏自我民明威未嘗不廢書而歎也嗟乎天生斯民矣能為民立君而不能為君飬民立君者天也養民者君也非天命之私一人為億萬人也民之所歸天之所右也民之所去天之所左也天命不易哉民心可畏哉是故古先哲王皆孳孳焉以安民為務也所謂安者非徒飲之食之治之令之而巳也必先于教化焉教化之説何如曰夫俗士之論未有不貴刑法而賤禮義也以為天下之大可域之于圄犴也群生之重可摩之以刀鋸也聞有稱王道誦教典也則衆共笑之矣必謂殺之而不懼尚何有于教化乎是皆不睹聖人之情者也獨不知教失而後惡化成而後刑刑所以不勝惡也善觀民者見刑之不勝惡也則反之曰是教之罪也焉可以刑不勝惡而謂教益不可用也譬諸人身導養得理則無疾疾作而後用藥藥所以不勝病也善觀身者見藥之不勝病也則反之曰是導飬之失也焉可以藥不勝病而謂導養益不可用也記曰昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬪之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣故禮之教化也微其止邪也于未形使人日徙善逺罪而不自知也是以先王隆之也居山者不知漁居澤者不知獵習之之異也今欲令禁漁人以罔罟詰獵者以從禽雖日撻之弗可改也巳民有以生之而無以教之未知為人子而責之以孝未知為人弟而責之以友未知為人臣而責之以忠未知為人朋友交遊而責之以信未知廉之為貴而罪以貪未知讓之為美而罪以爭未知男女之别而罪以淫未知上下之節而罪以驕是納民于阱也雖日誅之死者弗之悔而生者弗之悟也使民父子親夫婦和宗族相睦鄊黨相信財不以爭力不以鬪肅肅雍雍相從于禮讓之地是為安乎使民父子不親夫婦不和宗族不睦鄉黨不信財則必爭力則必鬪呼天扣心相從于刑戮之埸是為安乎此周所以長世而秦所以不祀也洪惟聖神掃五代之弊跨唐據漢拱揖三王教化之情靡不存乎中矣而或未明未具無以觀示于下幸而昭然垂日月之光俾穴隙之微咸有所見斯萬世之福也安民䇿第二或曰欲教化之明且具則奚由曰莫若學校之宜于時也夫士者衆之所仰望也服儒衣讀儒書而躬小人之行是塗民耳目也士之不德師非其師也師之不才學校不修之過也記曰君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也然則師者雖非人君之位必有人君之德也古者家有孰黨有庠術有序國有學仕焉而巳者歸教于閭里大夫為父師士為少師閭里之細猶以國之老臣為之師况其大者乎師有其人教有其業詩書禮樂以本之干戈羽籥以文之天子于是養老焉世子于是齒胄焉黨正于是飲酒焉鄊大夫于是賔賢能焉父子君臣長幼之道于是乎觀之六德六行六藝之教于是乎取之司馬辨論官材論定然後官之任官然後爵之位定然後祿之其不帥教者命國之右鄊移之左左鄊移之右不變移之郊不變移之遂不變屏之逺方終身不齒其教之也備其選之也至善者必興惡者必廢則其學者皆勸勉愧耻而求為君子矣士皆君子則衆人望之若景嚮焉奚不善之云乎故曰君子如欲化民成俗其必由學乎古之王者建國君民教學為先也後王多務古制未暇家自為學人自擇師學乎學孰孔孰墨在我而巳矣師乎師孰堯孰桀在我而巳矣故有以無用之文為學以不令之人為師聽其言則欲齊名于聖哲觀其行則或慙色于閭閻乘流一遷汗漫弗復往者不知其非來者以為當然蚩蚩之氓何以取法今者內有國子之館外有諸侯之學聖人之意有所在矣然師以講説為名而不掌于教育士以文辭為業而不舉其德行師不掌教育則解經之外人之賢不賢一不當知也士不舉德行則執筆之餘身之善不善一不足慮也是則何補于事哉誠宜申命學官以教育為職時無賢才則其咎也明著學版以德行為選鄊有善譽則可進也如此而人材不多俗化不美是六經群言皆欺後世也安民策第三或曰今兹京師首善每嵗論秀士矣轉而從德行其可也而州郡之學亡薦引之文欲一取之何如曰教而用之學校之興于古也不教而用之選舉之隆于今也教則易為善善而從正國之所以治也不教則易為惡惡而得位民之所以殃也試者其言也用者其行也言有偽善則取之矣行有真惡弗可得而知也然而授以操柄加之人上是以赤子之肉投卑虎穴也况繡繢雕琢之文又不足以為善言乎則其疇昔之志夙夜之學瀝盡于數刻之試而􅎍中未始有一毛可為效官之資也禮儀則習于同列政體則咨于老吏自受爵之日為學制之始奈何欲致治興化也惟今太學論士既不觀德行矣而學士之版徒記姓名而巳求試而來報罷而去以天子之辟雍與諸生假道而過耳郡國雖或興學而士之進取罔由于此是皆存學之名失學之實也按唐制自京師郡縣皆有學焉每嵗仲冬課試其成者長吏會屬僚設賔主陳爼豆備管弦牲用少牢行鄊飲酒禮歌鹿鳴之詩召耆艾敘少長而觀焉既餞而與計偕其不在學而舉者謂之鄊貢此近古旁求之法也而一出課試不由行實亦同歸于弊矣為朝家之計莫若斥大七館使薦紳之族咸造焉增修州學使士庶人之秀咸在焉擇賢以為之師分經以為之業限以積久毋得擅去日觀其德月課其藝賢邪非一時之賢久居而不變乃其賢也能邪非一時之能歷試而如一乃其能也如是而得人不精未之信也其有急于耕養或素巳成就不在學者則循舊貢舉先其名舉後其課試舉之非一人之舉必鄊曲共舉也用之非一人之用必天下共用也如是而得人不精亦未之信也古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功乃加九錫不貢士一則絀爵再則削池三則絀爵削地畢矣誠能以得士為賞失賢為罰則群下孰不一意于察舉乎尚慮有遺則莫若使大臣得舉所知漢法三公大將軍皆開府辟召豈虗言哉或曰嚮者亦嘗先名譽而後課試矣以其進者濫而取者私也今而復之其可乎曰進皆有濫取皆有私顧其利害何如耳糊其名而易其書有司不得輕重焉是吏之公也君子之道不逞于童子之雕蟲是法之私也以名取之則亦反是矣吏之私者則刑可速也法之私者雖聖人因之未如之何矣此賢者所以日削教法所以不競也惟解而更張之乃為邦之盛節也安民䇿第四天之生人有耳焉則聲入之矣有目焉則色居之矣有鼻焉則臭昏之矣有口焉則味壅之矣耳之好聲亡窮金石不足以聽也目之好色亡窮黼黻不足以觀也鼻之好臭亡窮鬱鬯非佳氣也口之好味亡窮太牢非盛饌也苟不節以制度則匹夫擬萬乘之富或未足以厭其心也故周禮大司徒之職施十有二教其九曰以度教節則民知足謂以法度教民使知尊卑之節則民之所用雖少自知以為足也又以保息六安萬民其六曰同衣服謂民雖有富者衣服不得異皆深衣而巳則貧者安也自周綱解結禮樂崩壞商賈大者衣必文采食必粱肉因其富厚交通王侯力過吏執以利相傾千里遊敖冠蓋相望乘堅策肥履絲曵縞兼并豪黨之徒以武斷于鄊曲宗室有土公卿大夫以下爭于奢侈室廬輿服僣于上無限度而貪人恣行矣凡風俗之所以薄獄訟之所以繁者民貪故也惟人之養生豈甚相逺哉食雖豐不過數人之榖也衣雖厚不過數人之帛也一夫之田五畒之桑亦足以自為矣然有粟腐倉而甚于飢錢朽貫而甚于貧藏姦挾詐晝爭夜奪如盜賊之為者有由然也天下之材其大者可室也天下之寶其貴者可器也天下之織其巧者可衣也天下之畜其珍者可食也駿可乘也良可御也鄭衛之哇可樂也燕趙之美可妃也昏姻之際賔客之接喪之有具祭之有品以多為貴以奢為禮婦人婢子愚夫小兒愛樂稱誦習以為俗如是雖窮天地之産安能以濟一民之欲哉故其甚富而貪不可熄也以此細民亦務相師法或有罄一年之蓄而費于數刻冒死亡之辟而資于宴好善士所不能化齊斧所不能威其故非他耻不若人也如使上下有等奢侈有制在藝則尊無列皆賤富不得獨文貧不得獨質萬金之居與下户為伍則飽食之餘無所復用庶乎廉讓可興而和平可致也安民䇿第五為國者未有不欲其民富且壽矣薄稅斂所以富之也而水旱乘之民亦弗可得而富也省刑罰所以壽之也而癘疫奪之民亦弗可得而壽也水旱癘疫之來隂陽之不和也夫陽一于復而六于乾隂生于午而成于亥消息有數進退有時非猖狂妄行之物也無形焉蓋非逸而動勞而止也無情焉又非與于喜奪于怒也然而不以其敘者有感而應有召而來也洪範九疇二五事一日貌二曰言三曰視四曰聽五曰思八庶驗曰雨曰暘曰燠曰寒曰風貌曰恭恭作肅肅時雨若謂君行恭則時雨順之言曰從從作乂乂時暘若謂君政治則時暘順之視曰明明作哲哲時燠若謂君能照哲則時暖順之聽曰聰聰作謀謀時寒若謂君能謀則時寒順之思曰􅌖睿作聖聖時風若謂君能通理則時風順之反是則狂常雨若謂君行狂妄則常雨順之僣常暘若謂君行僣差則常暘順之豫常燠若謂君行逸豫則常暖順之急常寒若謂君行急則常寒順之蒙常風若謂君行蒙暗則常風順之其傳又曰貌之不恭是謂不肅惟金沴木言之不從是謂不艾惟火沴金視之不明是謂不哲惟水沴火聽之不聰是謂不謀惟土沴水思之不睿是謂不聖惟金木水火土沴由是而言人君五事不修則雨暘燠寒風不以其時水火木金土交相為沴水旱所以狎至癘疫所以放行也然而君人者不以身為身以天下之身為身也不以心為心以天下之心為心也如使下皆狂則上誰與肅下皆僣則上誰與艾下皆豫則上誰與哲下皆急則上誰與謀下皆蒙則上誰與聖故明王欲肅則去下之狂欲艾則去下之僣欲哲則去下之豫欲謀則去下之急欲聖則去下之蒙君明臣忠百姓親睦然後可以致和氣也若能自知而不能知人能自治而不能治人愚者在位貪者在職以戕賊元元家愁戶怨靡所控告是雖堯為天子舜捴百揆其何以媚于上下神祗哉故去四凶舉十六相所以為大功也夫郡守縣令吾民之司命也漢孝宣與良二千石共治顯宗謂出宰百里有非其人則民受其殃豈徒語哉惟聰明􅌖智益垂意于任官則災害可消而富壽在矣安民策第大民之所從非從君也從其令也君之所守非守國也守其令也君端冕乎奧阼之位而民被堅執鋭履腸涉血赴死萬里者令使之也君夙駕乎囿遊之中而民居處笑語如不知者令不及故也是民從令非從君也封疆有固山川有險人猶踰之比閭小吏執三尺之法則老姦大豪無敢違者是君守國不如守令也君以令用民民以令事君令之所取民亦取之令之所去民亦去之故令可一而不可變也是萬物之四時也天之于物也春夏以出秋冬以內兹四時之常也如使柔風既扇疾雷既奮植者向榮動者起蟄而革之以沈隂亂之以繁霜則句萌者傷而蠉蠕者死矣唯其鈍而晚出者相賀得計也至秋冬則亦然是則句芒再至而品物不以為春黃落在兹而智者不以為秋也是故令之于民也與其出而中廢不若勿出之愈也善人見勸而莫肯進懼其令變而不必賞也惡人見禁而莫肯改幸其令變而不必罰也朝一命焉夕一命焉群吏奉承之弗暇愚民惶惑而失圖出令如此不若勿出之愈也先王慎乃出令謂審之于內而後行之于外也其不可乎雖稷契之言皋陶之謨不宜于時不足試也其可乎雖士傳言焉庶人謗焉志之先定不足疑也夫民可與樂成難與慮始昔子産治鄭其始也民疾之曰孰殺子産吾其與之及其久也民愛之曰子産而死誰其嗣之載使子産聞謗遽改小國之政將何如哉洪範曰庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨謂衆民所好不同而君臣政治各有常法不可失政教之常以從民欲也何者善人少而惡人多也明明后誠能謹令之所以出則群心洗濯知所適從矣安民䇿第七君者親也民者子也吏者其乳保也親不能自育其子育之者乳保也君不能自治其民治之者官吏也赤子之在襁褓知有乳不知有母也細民之在田野知有吏不知有君也乳之不才則飢之渴之驚之癎之親雖慈不能幸其子以生也吏之不才則窮之役之殺之害之君雖仁不能幸其民以安也然乳保之任不離帷房之間親之臥起可以接也官吏之職必逺畿疆之外君之視聽無由及也是故置吏不可不慎也竊思今之所謂良吏者多不得其衷焉不師古道不觀人情各是其所是非其所非而巳其務近名者則曰政必以猛其務隂德者則曰政必以寬其務自異者則曰前之政猛矣我必以寬前之政寬矣我必以猛其務自守者則曰何必以猛何必以寬斷諸法而巳矣是皆一方之論也政必以猛乎其如善人何多其逮捕峻其推鞠苛察則謂之智深文則謂之公火之炎矣無間玉石霜之隕矣孰分蘭蕙仁者之愛果如是哉政必以寬乎其如惡人何弛其囚繫輕其撻戮以容姦為大度以緩令為識體鴟梟鳴樹而弗忍言弋射虎豹食人而弗忍慮機陷義者之斷果如是哉政必改前乎則前人之猛治者皆惡人也我改以寬孰謂可哉前人之寬治者皆善人也我改以猛孰謂可哉政必以法乎則法輕而情重者何以威之哉法重而情輕者何以恩之哉是故近名者刻薄之人也隂德者柔邪之人也自異者詭激之人也自守者畏愞之人也皆不足以知治體矣仲尼曰寬以濟猛猛以濟寬政是以和蓋言寬猛不可偏任也失之于寬則濟以猛失之于猛則濟以寬寬猛並行然後為治也何謂寬猛並行哉于善則寬而于惡則猛也臯陶曰宥過無大刑故無小過雖大而宥其寬也故雖小而刑其猛也明主誠宜處寬猛之用以命群吏謹察其所為而廢興之則治道一致而百姓阜康矣安民䇿第八赦者所以恤其民也贖者所以優其臣也民之無狀自陷罪辜或銜刀于市或刻其肌膚蚤刑暮犯纒綿弗絶繞以叢棘被以五木託身獄吏畢命螻蟻聖人傷焉此赦之所以作也群公卿士盡瘁爾職以身從君以家徇國而子姪有過或麗于法撻之戮之同夫氓隸則耻及其門憂及其親聖人傷焉此贖之所以起也是則惻隱之至念功之著而儒先之論未有言其可者何也所利寡而所害衆也竊迹古先哲王之制刑法非耆殺人乃以生人也非欲作威乃以作福也夫物生有類類則有群群則相爭爭則相害是以強者脅弱衆者暴寡智者詐愚勇者苦怯或則以殺或則以傷不有王者作人之相食且盡矣故先王立禮則天之明因地之性刑罰威獄以類天之震曜殺􅓍也溫慈惠和以效天之生殖長育也大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽鑿薄刑用鞭朴大者陳諸原野小者致之市朝殺人者死然後人莫敢殺傷人者刑然後人莫敢傷弱寡愚怯之民有所賴矣故曰鞭朴不可弛于家刑罰不可廢于國征伐不可偃于天下也若曰有赦焉有贖焉是皆仁者之過也昔王符有言曰賊良民之甚者莫大于數赦贖赦贖數則惡人昌而善人傷矣其論甚詳前哲稱之然今日之事又甚于古且國之大祀皆有期日天下所與知也必以是時而赦是啓人以惡也狹其姦邪以逞其欲脫身而行避吏幽逺天波一灑復為編戶者所至而見也何百神受職之年有椎埋為姦之弊商旅或不敢越疆孤婺矛牙或不敢出戶此冥冥之民無告之甚也又衣冠子孫負勢馳騁禽虜下戶貪暴無厭巳之贖金無窮而人之肌肉有盡孰能以敲朴之苦易銖兩之罰哉此又冥冥之民無告之甚也與其赦之曷若使畏而不犯與其贖之曷若使耻而不為幸赦而姦卒以不悛人鬼以怒死亡以亟非所以恤之也幸贖而惡終以不悔辱其祖考墮其門閥非所以優之也文中子曰無赦之國其刑必平兹諸葛亮所以治蜀也古者公族其有死罪則磬于甸人其刑罪則纎剸亦告于甸人獄成有司讞于公公三宥之不對走出致刑于甸人故曰公族之罪雖親不以犯有司正術也所以體百姓也公族尚然况其下者乎儻留神眀以義割恩示天下以大公則萬世永賴矣安民策第九先王之道取于民有制計口發財曰賦收其田入曰稅賦共車馬兵甲士徒之役充實府庫賜豫之用稅給郊社宗廟百神之祀天子奉養百官祿食庶事之費諸侯亦什一而稅大國貢半于天子次國三之一小國四之一皆市取其州美物每歲貢之故太宰以九貢致邦國之用一曰祀貢謂荆州包茅之屬也二曰嬪貢謂青州之絲枲也三曰器貢謂梁州之銀鐡徐州之磬荆州之丹兖州之漆也四曰幣貢謂雍州之璆琳梁州之熊羆狐狸徐州之纎縞也五曰財貢謂荆州之杶幹栝柏揚州之篠簜也六曰貨貢謂揚州之金貝荆州之大龜也七曰服貢謂豫州之絺紵也八曰遊貢謂徐州之珠荆州之璣雍州之琅玕也九曰物貢謂徐州之魚青州之鹽揚州之橘柚也地之所生各有其宜貢之所入各有其常地宜則物得其性靡不可用也貢常則人知其期靡不必有也益于國而亡損于民兹先王之所以冒天下也地不以宜則物不美物不美而責之可用非市于他邦不足以用也貢不以常則人無備人無備而責之必有非買于蓄家不能以有也故取之于非其地求之于非其常皆農人之病而商賈之利也管子曰嵗有凶穰故榖有貴賤令有緩急則物有輕重人君不理則蓄賈遊于市乘人之不給百倍其本矣謂上令急于求是物則重緩于求是物則輕賈人務蓄積而須上令之所急求蓋有百倍之息也况乎師興之際事出多塗昨求今備猶以為晚市于他邦則民之常産納諸商人之槖買于蓄家則歲之常用抔諸賈竪之手飢寒之憂不逺而至矣竊惟仁人在上豈欲剿吾民哉以國無素蓄故也物無素蓄則事至而求事至而求則不得其常矣不得其常則懼乎一方不能給也故均之列郡均之列郡則不以其地矣古人有言曰旱則資舟水則資車物理然也夫能以不用為用不急為急物皆有備則國不憂而民不勞矣安民䇿第十前志有之王法必本于農嗟乎衣食之急生人之大患也仁君善吏所宜孳孳也昔周公遭變陳后稷先公風化之所由致王業之艱難者七月之詩是也其一章曰一之日觱發二之日栗烈無衣無褐何以卒歲此言寒氣至矣人之貴者無衣賤者無褐何以終嵗乎三之日于耜四之日舉趾同我婦子饁彼南畒田畯至喜此言夏正之月始修耒耜其二月舉足而耕耕者之婦子俱以餉耒至于南畒其見田大夫又為設酒食焉言勸其事又愛其吏也其三章則春日既溫倉庚既鳴可蠶之候女則遵牆下之徑而求柔桑又感事苦而有與公子同歸之志也其三章則鵙鳴將寒絲事畢而麻事起又染采以為祭服也其四章則取狐貉為裘以助女功既而君臣及民因習兵俱出田也其五章則穹窒熏鼠塞向墐户以避寒氣而居之也其六章則穫稻為酒以助養老之具又以瓜瓠麻實乾荼之菜惡木之薪以助男養農夫也其七章則築場圃納禾稼野功既畢入治宮中之事晝取茅夜索綯且治野廬之屋而祈來年百榖于公社也其八章則藏氷以備暑國君間于正事而饗群臣正齒位也是聖人為邦使民男女相助以業衣食田官臨視與在隴畒敘其傷悲時其嫁娶果菜必備室廬必葺憂思勤苦如此之至因其間暇然後講武事養耆老饗群臣正齒位禮義以興王業以成豳有雅頌不其至哉今天下之廣生民之庶天子坐乎法宫之中責成于諸吏之近民者果盡得人邪狃富貴者以田野為鄙事嗜儒雅者以離俗為清賢姦贓庸暗復甚于此纎悉之談何自入哉或獄訟不決經年逮捕或功役繁興連頭驅掠閭里之內煩費百端奪其農耕亂其蠶織往往而是也此其無故事有可假法有可誣也誠申命四方以吏課為後以農政為急勸農之官交舉其職時行屬縣問民疾苦土田墾闢稼穡蕃滋百姓樂業而無冤人則書以為功反是則劾以為罪或幾乎農時不違而頌聲可作也直講李先生文集卷之十八終直講李先生文集卷之十九平土書生民之道食為大有國者未始不聞此論也顧罕知其本焉不知其本而求其末雖盡智力弗可為巳是故土地本也耕穫末也無地而責之耕猶徒手而使戰也法制不立土田不均富者日長貧者日削雖有耒耜榖不可得而食也食不足心不常雖有禮義民不可得而教也堯舜復起末如之何矣故平土之法聖人先之夏商以前其傳太簡備而明者莫如周制自秦用商鞅廢井田開阡陌迄今數千百年學者因循鮮能道平土之謂雖道之猶鹵莾未見其詳于戲古之行王政必自此始儒有欲談三王可不盡心哉抑焉知其不復用也于是本諸經該諸傳記條而辨之云一曰按周禮大司徒職曰以土圭之法測土深正日景以求地中日至之景尺有五寸謂之地中乃建王國焉制其畿方千里而封樹之此王畿廣輪之數也二曰按司馬法曰王國百里為郊二百里為州三百里為野四百里為縣五百里為都又按周禮載師職曰以門里里任國中之地以埸圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地大都之田任疆地杜子春以五十里為近郊百里為逺郊鄭康成以二百里為甸地三百里為稍地四百里為縣地五百里為疆地鄭注不甚詳明其意然也先儒皆同周禮亦謂五百為都其日甸稍縣都者是也此王國逺近之别也然司馬法與周禮其言頗異意者文王在𡵨作司馬法及周公攝天子位從而增損之以為周禮乎今本周禮為定下意倣此三曰按大司徒職曰令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄊使之相賔又按遂人職曰五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為逐皆有地域而溝樹之鄭司農云百里內為六鄊外為六遂康成謂異其名者示相變耳今據百里內近郊逺郊之地也近郊逺郊既為六鄊其餘又以為埸圃宅田士田賈田官田牛田賞田牧田也場圃任園地郊甸皆有之今獨于郊言者略也百里外甸地也甸地既為六遂其餘又以為公邑之田也司農云賞田者賞賜之田也康成謂圃樹果蓏之屬季秋于中為埸樊圃謂之園宅田致仕者之家所受田也士田仕者亦受田所謂圭田也賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田也公邑謂六遂餘地天子使大夫治之自此以外皆然二百里三百里其上大夫如州長四百里五百里其下大夫如縣正是以或謂二百里為州四百里為縣遂人亦監焉家邑大夫之采地小都卿之采地大都公之采地王子弟所食邑也王子弟所食邑亦三等母弟及王之庶子與公同食地在疆稍疏者與卿同食地在縣又疏者與大夫同食地在稍故在下别言王子弟所食邑也然則稍地為家邑縣地為小都疆地為大都其餘亦皆以為公邑也此任地之異也四曰按司馬法曰六尺為步謂方六尺也步為方一尺者三十六步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同同方百里又按周禮小司徒職曰九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都康成曰此謂造都鄙也采地制井田異于鄊遂九夫為井方一里四井為邑方二里四邑為丘方四里四丘為甸方八里旁加一里則方十里為一成四甸為縣方二十里其實四成也四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也又按匠人職曰一耦之伐廣尺深尺謂之􅎌田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮康成謂井里之制小司徒經之匠人為之溝洫相包乃成耳又按遂人職曰夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路以逹于畿康成謂十夫二鄰之田百夫一鄼之田千夫二鄙之田萬夫四縣之田由斯而言是六遂之地所有田也舉六遂則六鄊自明矣此制田之例也然司馬法又與周禮之言有異司馬法有步畝夫屋井周禮如之但不别為屋耳司馬法十井為通十通為成周禮則四井為邑四邑為丘四丘為甸一甸旁加一里為成司馬法十成為終十終為同周禮則四成為縣四縣為都四都旁加十里為同又司馬法止為一制無逺近之殊周禮則三百里以外都鄙為井田鄭云都鄙王子弟公卿大夫采地其界日都鄙所居也二百里以內鄊遂為十夫百夫千夫萬夫則是殊制矣今亦本周禮為定五曰按康成注蓋依王制凡地除山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘以為曰覯謂王制之云抑未為得康成取之良誤矣夫山川之廣狹自非目見不可以億度者也地藝或數百里平易無山川者或聮屬有之城郭塗巷之類又不得知其多少載使山川之廣城郭塗巷之多則三分地或不止占一分也山川之狹城郭塗巷之少則三分地或不能占一分矣以是而云三分去一未知何從得之也今覯所計秪除王城及五溝五塗有成數可見者裁去之自餘悉以平地例為田其中所有山川城郭等占廢令執事者自依所占丈尺裁去之定法之始不宜豫言也且經所謂方十里為成方百里為同亦皆以平地例制之耳未嘗言有外物占其間也推此以往他可知矣六曰按匠人職遂廣二尺深二尺溝廣四尺深四尺洫廣八尺深八尺澮廣二尋八尺日尋鄭注重屋義然深二仞而遂人職遂溝洫澮川皆無尺數康成謂遂溝洫澮皆所以通水于川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仞以南畝圗之則遂從溝橫洫從澮橫九澮而川周其外焉其尺數皆依匠人是則經之互文明矣而川之廣深康成不解賈釋云此川亦人造雖無丈尺之數蓋亦倍澮耳是則川廣四尋深四仭也又遂人職遂上有徑溝上有畛洫上有塗澮上有道川上有路康成謂徑畛塗道路皆所以通車徒于國都也徑容牛馬畛容大車塗容乘車一軌入尺曰軌鄭法經塗義然道容二軌路容三軌覯謂塗容乘車一軌廣八尺也然則畛四尺徑二尺明矣鄭云徑容牛馬畛容大車謂容大車一軌廣六尺然皆無文可據以意言之耳既以塗依洫廣道依澮廣則徑畛自可依遂溝二尺四尺也而匠人職遂溝洫澮康成云遂上亦有徑覯謂既以互文觀之則溝上亦有畛洫上亦有塗澮上亦有道也其尺數亦如之矣然此五溝五塗所占不寡而康成之注止以萬夫為方三十三里少半里一甸為方八里旁加一里為一成絶不言溝塗所占若以溝瀆塗巷巳在三分去一之數則此五溝五塗者本經緯于田間固不别在一處苟田在于此而溝在于彼則云巳在三分去一之數可也今田與溝混在一處則萬夫不得止方三十三里少半里一甸不止方八里也若以溝塗不别出秪就減夫田為之則名為授田百畝而又以溝塗占之非所以損上益下之義也且遂徑至小而川路至大臨遂徑者則所減甚少臨川路者則所減甚多名曰平土其實不平至矣是豈聖人之意乎今覯悉計出之見于後然萬夫則于舊三十三里少半里之外有所增占一甸則雖于舊八里之外亦有所增占其如有旁加一里因就用之固猶不出一成之內其要皆在以官地為溝塗不害民田而已耳抑又鄊遂之地一統于公故三十三里少半里之外可以增占都鄙受封各有里數故一成之外不可别求雖封邑不止于一成然自一成為之始則其餘方免不足也七曰按萬夫舊方三十三里少半里凡數三分有一為少半則是三十三里一百步也三百步為一里萬夫之間自東至西九十遂九十徑遂廣二尺徑廣二尺則六十步也此步直謂廣六尺不言方也後以意察之九洫九塗洫廣八尺塗廣八尺則二十四步也兩旁二川三路川廣四尋為三十二尺路廣三軌為二十四尺則一十八步有四尺也東西計增一百二步有四尺自南至北九十溝九十畛溝廣四尺畛廣四尺則一百二十步也九澮九道澮廣二尋為一十六尺道廣二軌為一十六尺則四十八步也兩旁二川二路其廣同之則一十八步有四尺也南北計增一百八十六步有四尺東西增一百二步有四尺并舊三十三里一百步通計三十三里二百二步有四尺南北增一百八十六步有四尺并舊三十三里一百步通計三十三里二百八十六步有四尺又以所增之地拆之為夫以舊方三十三里一百步歸為萬夫外所增者併算之則東西所增從一百二步有四尺橫三十三里一百步求步得一百二萬步其竒以為尺則得二十四萬尺南北所增從一百八十六步有四尺橫三十三里二百二步有四尺求步得一百八十七萬八千九百七十二步其竒以為尺則得二十四萬六千九百二十八尺積尺得四十八萬六千九百二十八尺歸之為步又為一萬三千五百二十五步二十八尺此以三十六尺為方一步也積步得二百九十一萬二千四百九十七步二十八尺步百為畝畝百為夫是為二百九十一夫二十四畝九十七步二十八尺每萬夫并五溝五塗所占通計一萬二百九十一夫二十四畝九十七步二十八尺也八曰按五十里為近郊以兩靣合言之方百里也王城當中方九里自王城四靣拒于近郊之表各從四十五里有半其橫各百里以萬夫如舊方三十三里一百步則靣可置三萬夫今既增之則不能容適可置二萬夫矣且以城之外則有野塗每面三門固有三塗其藝必當中間直出于郊則二萬夫須避而處兩角以每靣而視之則各有二萬夫統而論之則四角才四萬夫也百里為逺郊以兩靣合言之方二百里也自近郊之表拒于逺郊之表各從五十里其橫各二百里東西二面各可置五萬夫南北二靣各可置三萬夫皆以地形相軋才足容此一十六萬夫也二百里為甸地以兩靣合言之方四百里也自逺郊之表拒于甸地之表各從一百里其橫各四里東西二面各可重行置二十萬夫外行一十一萬夫裏行九萬夫南北二靣各可重行置一十六萬夫外行九萬夫裏行七萬夫亦皆以地形相軋才足容此七十二萬夫也其餘皆不方正不可為萬夫之川其數見于後九曰按近郊之內方百里為方一里者萬凡里九夫則九萬夫也除王城九里為方一里者八十一是為七百二十九夫其餘方一里者九千九百一十九為八萬九千二百七十一夫四角置四萬夫之田每萬夫并五溝五塗所占共一萬二百九十一夫二十四畝九十七步二十八尺四假通計四萬一千一百六十四夫九十九畝九十一步有四尺外猶有四萬八千一百六夫有八步三十二尺此地不方正不可為萬夫之川也十曰按逺郊之內方二百里為方一里者四萬凡里九夫則三十六萬夫也除近郊之內巳占方一里者萬為九萬夫則此逺郊方一里者三萬為二十七萬夫四靣置一十六萬夫之田每萬夫并五溝五塗所占共一萬二百九十一夫二十四畝九十七步二十八尺十六假通計一十六萬四千六百五十九夫九十九畝六十四步一十六尺東西一行五萬夫前算每萬夫各有川路四周其外蓋如近郊四萬夫在四角不相接者也今此五萬夫成列則其間當省四川四路謂自西而東者凡一川一路南北之廣九步二尺東西之長三十三里二百二步有四尺求步得九萬九百一十八步其竒以為尺則得一十二萬一千四百四十八尺歸之于步又為三千三百七十三步二十又積步得九萬四千二百九十一步二十尺步百為畝畝百為夫是為九夫四十二畝九十一步二十尺此五萬夫之間所省四川四路共省三十七夫七十一畝六十六步有八尺西靣亦如之南靣一行三萬夫其間當省二川二路謂自北而南者凡一川一路東西之廣九步二尺南北之長三十三里二百八十六步有四尺求步得九萬一千六百七十四步其竒以為尺則得一十二萬二千四百五十六尺歸之于步又為三千四百有一步二十尺積步得九萬五千七十五步二十尺步百為畝畝百為夫是為九夫五十畝七十五步二十尺此三萬夫之間所省二川二路共省一十九夫有一畝五十一步四尺北靣亦如之四靣共省一百一十三夫四十六畝三十四步二十四尺卻于上十六假一十六萬四千六百五十九夫九十九畝六十四步一十六尺之內除此一百一十三夫四十六畝三十四步二十四尺外猶占一十六萬四千五百四十六夫五十三畝二十九步二十八尺逺郊二十七萬夫除此十六假占一十六萬四千五百四十六夫五十三畝二十九步二十八尺外猶占二十萬五千四百五十三夫四十六畝七十步有八尺此地亦不方正不可為萬夫之川也十一曰按甸地之內方四百里為方一里者一十六萬凡里九夫則一百四十四萬夫也除逺郊之內巳占方一里者四萬為三十六萬夫則此甸地方一里者一十二萬為一百八萬夫四靣置重行七十二萬夫之田每萬夫并五溝五塗所占共一萬二百九十一夫二十四畝九十七步二十八尺七十二假通計七十四萬九百六十九夫九十八畝四十步東西外行一十一萬夫其間省十川十路每一川一路計九夫四十二畝九十一步三十尺共省九十四夫二十九畝一十五步二十尺東西裏行九萬夫其間省八川八路共省七十五夫四十三畝三十二步一十六尺上兩行中間又省一橫川一橫路謂自北而南橫亘九萬夫前算每萬夫南北廣三十三里二百八十六步有四尺九萬夫南北共廣三百五里一百八十步今以其間先巳既省八川八路每一川一路南北廣九步二尺八川八路共巳省七十四步有四尺九萬夫七十四萬九百六十九夫九十八畝四十步東西外行一十一萬夫其間省十川十路每一川一路計九夫四十二畝九十一步三十尺共省九十四夫二十九畝一十五步二十尺東西裏行九萬夫其間省八川八路共省七十五夫四十三畝三十二步一十六尺上兩行中間又省一橫川一橫路謂自北而南橫亘九萬夫前算每萬夫南北廣三十三里二百八十六步有四尺九萬夫南北共廣三百五里一百八十步今以其間先巳既省八川八路每一川一路南北廣九步二尺八川八路共巳省七十四步有四尺九萬夫猶廣三百五里一百五步有二尺則此川路橫三百五里一百五步有二尺從九步有二尺求步得八十二萬四千四百四十五步其竒以為尺則得一百九萬九千三百七十二尺歸之于步又為三萬五百三十八步有四尺積步得八十五萬四千九百八十三步有四尺步百為畝畝百為夫則此一橫川一橫路所省八十五夫四十九畝八十三步有四尺凡東靣兩行二十假之間省十八川十八路及一橫川一橫路共省二百五十五夫二十二畝三十一尺有四步西靣亦如之南靣外行九萬夫其間省八川八路每一川一路計九夫五十畝七十五步二十尺共省七十六夫有六畝四步一十六尺南靣裏行七萬夫其間省六川六路共省五十七夫有四畝五十三步一十二尺上兩行中間又省一橫川一橫路謂自西而東橫亘七萬夫前算每萬夫東西廣三十三里二百二步有四尺七萬夫東西共廣二百三十五里二百一十八步有四尺今以其間先槩省六川六路每一川一路東西廣九步二尺六川六路共巳省五十六步七萬夫猶廣二百三十五里一百六十二步有四尺則此川路橫二百三十五里一百六十二步有四尺從九步有二尺求步得六十三萬五千九百五十八步其竒以為尺則得八十四萬八千一百六十八尺歸之于步又為三萬三千五百六十步有八尺積步得六十五萬九千五百一十八步有八尺步百為畝畝百為夫則此一橫川一橫路所省六十五夫九十五畝一十八步有八尺凡南靣兩行一十六假之間省十四川十四路及一橫川一撗路共省一百九十九夫有五畝七十六步北靣亦如之四靣共省九百八夫五十六畒一十四步有八尺郤于上七十二假七十四萬九百六十九夫九十八畝四十步之內除此九百八夫五十六畝一十四步有八尺外猶占七十四萬有六十一夫四十二畝二十五步二十八尺甸地一百八萬夫除此七十二假占七十四萬有六十一夫四十二畝二十五步二十八尺外猶有三十三萬九千九百三十八夫五十七畝七十四步有八尺此地亦不方正不可為萬夫之川也是鄉遂之田制備矣十二曰按一甸舊方八里旁加一里為成成方十里也一甸之田方八里中有六十四井自東至西八井也井有九夫自東至西三夫也三夫之間則有二遂二徑遂廣二尺徑亦二尺八井則有十六遂十六徑八井之間及兩旁則有九溝九畛溝廣四尺畛亦四尺遂徑溝畛共增二十二步有四尺南北亦如之凡此井田為溝洫異于鄉遂萬夫此每夫之四靣從橫皆為遂井之四靣從橫皆為溝以至于邑丘甸不復别為限隔旁加為成乃為洫焉成之四靣從橫皆為洫以至于縣都亦不復别為限隔四都旁加為同乃為澮周其外焉十里之中既取八里二十二步有四尺以為一甸之田及遂徑溝畛外止有一里二百七十七步有二尺每靣分得二百八十八步有四尺乃以二百步為二夫之田從二夫也二夫之間及其外又以一步二尺為二遂二徑則計二百一步二尺矣其餘更有八十七步二尺成之每靣又為一洫一塗洫廣八尺塗亦八尺然多是兩成相接平分之則此靣占一步二尺以八十七步二尺又除此一步二尺餘止有八十六步矣今以二夫之田為二行前以二百步為二夫者也又以八十六步為一行共三行也四靣每靣內第一行橫列二十四夫四角又四夫共一百夫每靣第二行二十六夫四角又四夫共一百八夫第三行不成夫者以畝言之四靣每靣橫一百步從八十六步者二十八假共一百一十二假每假為方一步者八千六百是為八十六畝四角每角方八十六步者一假共四假每假為方一步者七千三百九十六是為七十三畝九十六步積畝得九千九百二十七畝八十四步每假巳有遂徑溝畛間之不復計為夫矣一成之中除一甸之田及遂徑溝畛洫塗所占外旁加更得田二百八夫其不成夫者又得九千九百二十七畝八十四步鄭云旁加一里謂加一井也今此不得為井矣又計成之靣構百步者二十八橫八十六步者二共橫二千九百七十二步又其間為二十遂二十徑九溝九畛兩旁二半洫二半塗共橫二十八步通計三千步凡三百步為一里此橫十里略無差也四靣皆然四成為縣經曰四甸其實四成也四縣為都四都六十四成也方八十里旁加十里加一成也為百里謂之一同一同百成矣前算成法每一成合各為一洫一塗四周其外然以多是兩成相接故平分之各占半洫半塗今此一同百成其中六十四成四靣皆有接每靣各秪占半洫半塗如前法矣至于旁加三十六成則四旁三十二成各一靣無接四角四成各回曲兩靣無接也既無接則當為全洫全塗乎曰否凡一同之外當為澮與道也澮周于同道周于澮若是則須變半洫半塗以為一澮一道也半洫半塗其廣一步二尺一澮一道其廣五步二尺然則增四步也三十二成各一靣無接變其一靣半洫半塗以為一澮一道澮道所增之地橫十里從四步求步得一萬二千內除橫二十八步從四步前是二十遂二十徑九溝九畛二半洫二半塗皆為從者展計一百一十二步外猶占一萬一千八百八十八步步百為畝是為一百一十八畝八十八步前算一成之田其不成夫者猶得九千九百二十七畝八十四步今復增此澮道所占一百一十八畝八十八步外止有九千八百八畝九十六步四成皆回曲兩靣無接變其兩靣之半洫半塗以為一澮一道一靣如上所計增占一百一十八畝八十八步一靣橫九里二百九十六步本十里也其四步巳入右靣所計矣從四步求步得一萬一千九百八十四步內除橫二十六步四尺從四步前是二十遂二十徑九溝九畛一半洫一半塗一半洫一半塗巳在所刻退四步之地矣展計一百四步其竒以為尺則得九十六尺歸之于步又為二步二十四尺通計一百六步二十四尺外猶占一萬一千八百七十七步一十二尺步百為畝是為一百一十八畝七十七步一十二尺前算一成之田其不成夫者猶得九千九百二十七畝八十四步今復增此兩靣澮道所占共二百三十七畝六十五步一十二尺外止有九千六百九十畝一十八步二十四尺一同百里為方一里者萬凡里九夫則九萬夫也今此算一同百成成中一甸甸六十四井井九夫是為五百七十六夫旁加又得二百八夫總計七百八十四夫百成則七萬八千四百夫也其不成夫者于中六十四成成有九千九百二十七畝八十四步緣邊三十六成其三十二成成有九千八百八畝九十六步又四成成有九千六百九十畝一十八步二十四尺百成通計九十八萬八千二十九畝二十二步二十四尺一切以夫折之則又為九千八百八十夫二十九畝二十二步二十四尺統論之則一同之地為田八萬八千二百八十夫二十九畝二十二步二十四尺其餘盡以為遂徑溝畛洫塗澮道也以九萬夫言之則遂徑溝畛洫塗澮道所占一千七百一十九夫七十畝七十七步一十二尺雖然此獨以一同言之耳如兩同相接則又省焉别見于後今據稍縣都並是兩同相接無用此制然述法之始須先定一同而後可議其有接無接故特先為此制也亦恐山川隔破其間或有獨置一同之處焉耳經曰同間謂之澮誠謂兩同間為一澮也洫以下意亦同以都鄙而形鄊遂是以前二萬夫之間皆省一川也十三曰按稍地二十同其十六同各三靣有接一靣無接抵甸地也甸地雖有萬夫之川與之相接然其制度不同故此稍地别為澮道若無接然也其四同各四靣皆有接在四角也十六同各三靣有接一靣無接每同無接之靣凡十成中間八成每成之一靣變其半洫半塗以為一澮一道如前所計每成增占一百一十八畝八十八步外其不成夫之田猶有九千八百八畝九十六步左右二成每成之一靣變其半洫半塗以為一澮一道亦如前所計每成增占一百一十八畝八十八步又一靣變其半洫半塗以為半澮半道以回曲故此一靣又變之然與他同接故但為半澮半道半洫半塗共八尺半澮半道共一十六尺然則增一步二尺地矣所增之地橫九里二百九十六步本亦十里也其四步巳入右靣所計矣從一步二尺求步得二千九百九十六步其竒以為尺則得三萬五千九百五十二尺歸之于步又為九百九十八步二十四尺積步得三千九百九十四步二十四尺內除橫二十六步四尺從一步二尺前是二十遂二十徑九溝九畛一半洫一半塗一半洫一半塗巳在所刻退四步之地矣展計二十六步其竒以為尺則得三百四十四尺歸之于步又為九步二十尺通計三十五步二十尺外猶占三千九百五十九步有四尺步百為畝是為三十九畝五十九步有四尺每成兩靣增占一百五十八畝四十七步有四尺外其不成失之田猶有九千七百六十九畝三十六步三十二尺有接之靣凡二十六成二十四成處三靣每靣八成每成之一靣變其半洫半塗以為半澮半道所增之地橫十里從一步二尺求步得三千步其竒以為尺則得三萬六千尺歸之于步又為一千步積步得四千步內除橫二十八步從一步二尺前是二十遂二十徑九溝九畛二半洫二半塗展計二十八步其竒以為尺則得三百三十六尺歸之于步又為九步一十二尺通計三十七步一十二尺外猶占三千九百六十二步二十四尺步百為畝是為三十九畝六十二步二十四尺每成除此澮道增占三十九畝六十二步二十四尺外其不成夫之田猶有九千八百八十八畝二十一步一十二尺二成處兩角每成之一靣變其半洫半塗以為半澮半道如前所計增占三十九畒六十二步二十四尺又一靣亦變其半洫半塗以為半澮半道皆以回曲故又變之所增之地橫九里二百九十八步四尺本亦十里也其一步二尺巳入右靣所計矣從一步二尺求步得二千九百九十八步其竒以為尺則得三萬六千有八尺歸之于步又為一千步有八尺積步得三千九百九十八步有八尺內除橫二十六步四尺從一步二尺前是二十遂二十徑九溝九畛一半洫一半塗一半洫一半塗已在所刻退之一步二尺之地展計三十五步二十尺展步尺之詳見上此後凡不相算而但言成數者蓋前有類者矣覆尋之可見也外猶占三千九百六十二步二十四尺步百為畝是為三十九畝六十二步二十四尺每成兩靣增占七十九畝二十五步一十二尺外其不成夫之田猶有九千八百四十八畝五十八步二十四尺每同百成總計七萬八千四百夫其不成夫者于中六十四成成有九千九百二十七畝八十四步緣邉三十六成其八成成有九千八百八畝九十六步其二成成有九千七百六十九畝三十六步三十二尺又二十四成成有九千八百八十八畝二十一步一十二尺又二成成有九千八百四十八畝五十八步二十四尺百成通計九十九萬四百六畝四十七步有四尺一切以夫折之則又為九千九百四夫六畝四十七步有四尺統論之則此一同之地為田八萬八千三百四夫六畝四十七步有四尺其餘盡以為遂徑溝畛洫塗澮道也以九萬夫言之則遂徑溝畛洫塗澮道所占一千六百九十五夫九十三畝五十二步三十二尺四同各四靣皆有接每同四靣三十二成成之一靣變其半洫半塗以為半澮半道每成增占三十九畝六十二步二十四尺外其不成之田猶有九千八百八十八畝二十一步一十二尺四角四成各回曲兩靣變其半洫半塗以為半澮半道每成增占七十九畝二十五步一十二尺外其不成夫之田猶有九千八百四十八畝五十八步二十四尺每同百成總計七萬八千四百夫其不成夫者于中六十四成成有九千九百二十七畝八十四步緣邉三十六成其三十二成成有九千八百八十八畝二十一步一十二尺其四成成有九千八百四十八畝五十八步二十四尺百成通計九十九萬一千一百九十八畝九十三步一十二尺一切以夫折之則又為九千九百一十一夫九十八畝九十三步一十二尺統論之則此一同之地為田八萬八千三百一十一夫九十八畝九十三步一十二尺其餘盡以為遂徑溝畛洫塗澮道也以九萬夫言之則遂徑溝畛洫塗澮道所占一千六百八十八夫有一畝六步二十四尺凡稍地二十同同九萬夫合計一百八十萬夫今積得田一百七十六萬六千一百一十二夫九十九畒二十七步有四尺蓋其餘盡以為遂徑溝畛洫塗澮道也以一百八十萬夫言之則遂徑溝畛洫塗澮道所占三萬三千八百八十七夫十十二步三十三尺十四曰按縣地二十八同各四靣皆有接其制如稍地之角角置四同者也二十八同同九萬夫合計二百五十二萬夫今積得田二百四十七萬二千七百三十五夫七十畒一十三步一十二尺蓋其餘盡以為遂徑溝畛洫塗澮道也以二百五十二萬夫言之則遂徑溝畛洫塗澮道所占四萬十千二百六十四夫二十九畝八十六步二十四尺十五曰按疆地三十六同其三十二同各三靣有接一靣無接其制如稍地之正正置十六同者也四角四同各二靣有接二靣無接回曲故也每同前左右兩行一十六成以自內視角為前每成之一靣變其半洫半塗以為一澮一道計增占一百一十八畝八十八步外其不成夫之田猶有九千八百八畝九十六步後左右兩行一十六成每成之一靣變其半洫半塗以為半澮半道計增占三十九畝六十二步二十四尺外其不成夫之田猶有九千八百八十八畝二十一步一十二尺前角一成變其兩靣各半洫半塗以為一澮一道計共增占二百三十七畝六十五步一十二尺外其不成夫之田猶有九千六百九十畝一十八步二十四尺左右兩角二成每成之一靣變其半洫半塗以為一澮一道又一靣變其半洫半塗以為一澮一道又一靣變其半洫半塗以為半澮半道計共增占一百五十八畝四十七步有四尺外其不成夫之田猶有九千七百六十九畝三十六步三十二尺後一角一成其兩靣各變其半洫半塗以為半澮半道計共增占七十九畝二十五步一十二尺外其不成夫之田猶有九千八百四十八畝五十八步二十四尺每同百成總計七萬八千四百夫其不成夫者於中六十四成成有九千九百二十七畝八十四步緣邉三十六成其一十六成成有九千八百八畝九十六步又一十六成成有九千八百八十八畝二十一步一十二尺又一成有九千六百九十畝一十八步二十四尺又二成成有九千七百六十九畝三十六步三十二尺又一成有九千八百四十八畝五十八步二十四尺百成通計九十八萬九千六百一十四畝有四步一十六尺一切以夫折之則又為九千八百九十六夫一十四畝有四步一十六尺統論之則此一同之地為田八萬八千二百九十六夫一十四畝有四步一十六尺其餘盡以為遂徑溝畛洫塗澮道也以九萬夫言之則遂徑溝畛洫塗澮道所占一千七百有三夫八十五畝九十五步二十尺凡疆地三十六同同九萬夫合計三百二十四萬夫今積得田三百一十七萬八千九百一十四夫六十三畝二十五步一十二尺蓋其餘盡以為遂徑溝畛洫塗澮道也以三百二十四萬夫言之則遂徑溝畛洫塗澮道所占六萬一千八十五夫三十六畝七十四步二十四尺凡五塗各有所隔徑隔于溝畛隔于洫塗隔于澮道隔于川所隔之處必有橋焉川之水必決路而泄之以歸于大川各隨地藝所向不可定其隔處井田之徑畛塗道亦如鄊遂為橋澮之水亦泄而歸諸大川也司險職曰周知其山林川澤之阻而逹其道路康成謂川澤之阻則橋梁之下文曰設國之五溝五塗而逹其道路康或雖不復解然以上文觀之此為橋梁亦明矣匠人職澮之下曰專逹于川各載其名蓋謂大川也以此察彼知其皆然是都鄙之田制備矣十六曰或曰大哉王畿之廣輪王國之逺近任地之異制田之例山川之不億度溝塗之有增占自萬夫以至于一同自近郊以至于疆地繄子之論詳矣其所以授于民多少之數可得而聞與曰夫治民必先定其居處而後可使之樂業也故司空執度度地以居民正為此焉今六鄊六遂各七萬五千家也然此才謂農民其餘有百工商賈庶人在官者凡此之類抑又多矣載師職曰以㕓任國中之地康成謂㕓民居之區域也里居也遺人職曰掌鄊里之委積以恤民之囏厄康成謂鄊里鄊所居也縣師職曰掌邦國都鄙稍甸郊里之地域康成謂郊里郊所居也賈釋云鄉里據國中即六鄉之民居在國中載師以㕓里所任地是也郊里據在郊即六鄉之民所居郊者也然則六鄉之居布在國中外至近郊逺郊也遂入職曰辨其野之土以頒田里夫一㕓田百畝則六遂之居在甸地者也舊説㕓者二畝半一家之居孟子曰五畝之宅樹之以來當從孟子五畝為正甸地既一㕓五畝則郊內國中亦各五畝也然康成注遂人謂㕓城邑之居注載師云以㕓里任國中而遂人職授民田夫一㕓田百畒是㕓里不謂民之邑居在都城者與鄭意以六遂之民雖田在甸地而居于國中且甸地于國二百里也去家二百里而耕孰為便哉抑王城方九里為方一里者八十一凡里九百畝為七萬二千九百畝盡以為遂民之居一家五畝才可容萬四千五百八十家况王宮祖社朝市國宅之屬及鄊民所居在其中乎則六遂七萬五千家于何置之苟鄭意都城是都邑之城則六遂所管與都邑異遂民不可越在都邑也又其往來亦非近矣且康成既以六鄊之居有在于郊則六遂之民奚為不可居甸乎是失之甚矣大司徒職曰凡造都鄙制其地域而封溝之以其室數制之康成亦謂城郭之宅田室蓋鄭以六遂居在國中故于都邑亦云室在城郭也其經意但以室數為家數豈分于城之內外與其實采地之民或居城郭或在野焉其地蓋亦不出一㕓五畒之數也或曰敢問莫非王民也而吾子之論以六鄊為農人而百工商賈之類不與其數何哉曰覯觀鄭注則然且裁其理至當矣夫農人國之本也三時力耕隙而講武以之足食以之足兵或致之于庠序習禮義為賢才是天民之良者也故為之鄉為之遂以編著之而統于司徒司徒教官也若夫工問之類棄本逐末但以世資其用不可無之安足比于農人哉抑其各有所統工則統于司空賈則統於司市庶人在官者各統於其官府其餘皆然雖不繫于鄊遂可也曰既不繫於鄊遂則其所處郊乎國乎曰聖王敦本尚儉雖有工賈必不甚衆庶人在官者亦有常數其餘益寡矣國中或可以居之抑其朝夕有事於市朝當在國中乃為便也十七曰或曰奠民之居既承教矣耕田之數願聞其悉曰按大司徒職曰凡造都鄙制其地域而封溝之以其室數制之不易之地家百畝一易之地家二百畝再易之地家三百畒此都鄙授田之制也不易之地嵗種之故家百畝一易之地二嵗一種故家二百畝再易之地三嵗一種故家三百畝以地利有厚薄宜差之也又遂人職曰辨其野之土上地夫田百畝萊五十畝餘夫亦如之中地夫田百畝萊百畝餘夫亦如之下地夫田百畝萊二百畝餘夫亦如之此六遂授田之制也亦以地利有厚薄故差其萊數以平之萊田之休不耕者也至六鄊之田未見明文惟小司徒職云乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人以覯觀之若以為都鄙六遂乎則中地下地巳增其田萊畝數榷其收入必亦無偏不容更有七人六人五人所食之差也此蓋是六鄊授田之制以郊地狹隘而六鄉分之矧場圃宅田士田賈田官田牛田賞田牧田在其間則雖有中地下地不得更增其畝數但以其家人多少制之七口以上則授之以上地六口則授之以中地五口以下則授之以下地焉其實皆百畝也地有九等所養男女自二人以至十人七六五者舉中地之三等而言也今據逺郊之內田二十萬夫近郊四萬夫逺郊十六萬夫其不為萬夫之川者又有一十五萬三千五百五十九夫四十六畝七十九步四尺近郊四萬八千一百六夫有入步三十二尺逺郊一十萬五千四百五十三夫四十六畝七十步八尺蓋以為六鄊之田也里也里居也場圃也宅田也士田也賈田也官田也牛田也賞田也牧田也其餘則王城之外有環塗環塗七軌有野塗野塗五軌有郊四郊皆有神兆有明堂明堂在國之陽三里之外七里之內丙巳之地宮方三百步有籍田籍田千畝有學虞庠在國之西郊有榭榭所以講軍實足以臨見王之士卒而已其所不奪穡地瘠磽之地于是乎為之其藝須在城之外也亦或有山陵林麓川澤溝瀆之跨其地其不為萬夫之川者亦未計出五溝五塗所占也下同又其餘則以待餘夫也或曰郊內無餘夫之文子何以言之曰六鄊之人不得不有餘夫且舉遂則鄊可知矣亦計郊內地猶有以待之也甸地之田七十二萬夫其不為萬夫之川也又有三十二萬九千九百三十八夫五十七畝七十四步八尺蓋以為六遂之田也㕓也其餘亦或有山陵林麓川澤溝瀆之跨其地又其餘則以為公邑也或曰子既言鄊有餘夫而于遂何以不言且遂人職巳著之矣曰遂之餘夫所受之田屬公邑耳不可析言也遂之家數與田既有定限其地域且溝樹之矣若有餘夫其田何從而得必外取于公邑焉曰然則六鄊餘夫所受之田何以不為公邑曰郊內地狹其隙者必不甚多且近逼王國故雖以待餘夫不復别稱為公邑也或曰公邑獨遂之餘夫耕之乎曰不然康成謂士工商以事入在官而餘夫以力出耕公邑覯謂亦非獨士工商而巳也雖庶人在官者畜牧之家之餘夫亦出耕于此焉民之生息嵗月浸多積數世之後其餘夫豈可勝數公邑雖廣或弗能容矣是聖人先有以待之也若稍以外則八十四同稍地二十同縣地二十八同疆地三十六同除名山大澤不以朌凡當山陵林麓川澤溝瀆不廢悉以班之其餘以為王子弟食邑公卿大夫采地又其餘則以為公邑也其食邑采地之內則自以授其所𬋩之民其餘亦或有山陵林麓川澤溝瀆之跨其地又其餘則以待餘夫也又弗能容則亦當出耕于其所近公邑其人則繫于都鄙其田稅則歸于王官是公私兩利之意也或曰遂人云萬夫有川川上有路以逹于畿康成謂去山陵林麓川澤溝瀆城郭宮室塗巷三分之制其餘如此以至于畿康成固知都鄙為井田矣則其意謂公邑自稍以外亦如甸地為萬夫之川與曰是康成之誤也此川上有路以逹于畿止謂由此路而往可通于畿耳以明其所以為道路于田間者非妄也將以利往來之人內通于國外通于畿國近而畿逺逺之可逹近可知矣是以省文言畿而不言國也非謂一概為萬夫之川以至畿也且自稍以外公邑誠以采邑之餘一切使大夫治之後復欲爵祿于人又取之以為采邑也公卿大夫實有定貟若有王子弟則世世生息安有紀極是采邑之增無世無之苟今公邑盡為萬夫之川他日造都鄙為井田又當改作乎何勞力之甚也若造都鄙而循用萬夫之川非制也以覯論之甸地公邑自依六遂萬夫之川稍縣疆地公邑亦循都鄙井田之制或近或逺隨宜而變于義當矣或曰都鄙授田則有不易百畝一易二百畝再易三百畝凡三等遂地授田則有上地田百畝萊五十畝中地田百畝萊百畝下地田百畝萊二百畝凡三等鄊地授田則有上地家七人中地家六人下地家五人雖以地利差其口數其田實皆百畝凡一等而康成之義自六鄉以及甸稍縣都悉以不易一易再易通率之云一家受二夫且不易一易再易獨是都鄙授田之制豈可以包鄊遂乎曰康成固妄矣非徒不可以包鄊遂也雖都鄙之制有不易一易再易然須定有一百畝不易者二百畝一易者三百畝再易者合六百畝而三家受之此則可云通率一家受二夫也若多少稍差則巳失之矣况其積算數百萬夫而乃公言通率一家受二夫何其徒用心哉今則皆不取焉但備舉鄊遂都鄙授田之明制使執事者躬相地宜而頒之不敢以預言也十八曰或問田里之論則然矣其王子弟食邑公卿大夫采地小大之法何如曰康成謂其制三等百里之國凡四都一都之田稅入于王五十里之國凡四縣一縣之田稅入于王二十五里之國凡四甸一甸之田稅入于王其意以公采地為一等百里之國也王之母弟及庶子同卿采地為一等五十里之國也稍疏者同大夫采地為一等二十五里之國也最疏者同又其注載師謂家邑大夫之采地小都卿之采地大都公之采地王子弟所食邑然則三公百里之國在疆地卿五十里之國在縣地大夫二十五里之國在稍地也疆地三十六同同為百里之國一是為三十六國也縣地二十八同同為五十里之國四是為一百一十二國也稍地二十同同為二十五里之國十有六是為三百二十國也此其大略耳苟有名山大澤占之則依所占減焉或王子弟公卿大夫人數少食之不盡則以其餘為公邑以俟後耳然今按周禮公三人其鄉老二鄉則公一人蓋此三公兼之卿十有五人三孤六官及六卿大夫每鄉卿一人大夫則冬官巳亡唯五官在五官之屬大夫三百三十七人煩不備舉若加以冬官之屬及公邑又别有大夫治之其數蓋不下四百人也今稍地為二十五里之國三百二十或有名山大澤占之則從而減焉又王子弟最疏者之所食在其中若是大夫之邑其不足者多矣然縣地為五十里之國一百一十二雖或有名山大澤占之及王子弟稍疏者之所食在其中而卿止于十有五人其餘地蓋尚多也大夫之邑不足其取諸此乎雖王之母弟庶子衆多疆地弗能容之取于此亦可也又其餘乃以為公邑焉或曰禮云天子立三公九卿二十七大夫八十一元士于周禮何其不同也曰此夏禮而商因之者也其田則公百里卿七十里大夫五十里至周則自卿以下增其員而減其祿蓋後世政事漸繁事繁則官不得不增官多則祿不得不減勢使然也十九曰或人請問賦稅之法覯對曰按太宰職以九賦斂財賄一曰邦中之賦二曰四郊之賦三日邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦餘三者不出于田里故不舉康成謂賦口率出泉也今之算泉民或謂之賦此其舊名與鄉大夫以嵗時登其夫家之衆寡辨其可任者皆征之遂師之職亦云以令其財征皆謂此賦也是則周時已如漢算泉但漢法算泉人百二十周之賦泉數則未聞矣又按載師職曰凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五此征則皆指田稅也康成謂國宅凡官所有宮室吏所治者也周稅輕近而重逺近者多役也園㕓亦輕之者㕓無榖園少利也經又曰凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征康成亦謂宅不毛者罰以一里二十五家之泉今詳司農注引孟子云㕓無夫里之布其意可取蓋凡稅者各隨其地所出田有榖則輸其榖宅有桑麻則輸其布帛唯㕓里在國中者人衆宇廣無所樹藝則課之出泉布亦料其㕓地所可樹藝多少二十之價而取其一焉若城外之宅可樹桑麻而怠廢不為者則依國中例課之出泉布蓋樹桑麻易為功而出泉布難為力所以罰之使其勤耳故曰宅不毛者有里布也田不耕者出屋粟康成謂罰以三家之稅粟周禮不為屋但以三家之稅粟借文以稱之焉蓋不耕一夫之田則納三夫之稅粟倍重之亦以罰其怠也民無職事者出夫家之征康成謂出夫稅家稅夫稅者百畝之稅家稅者出士徒車輦給繇役蓋勤而就田業則有夫家之稅間而無職事者亦有夫家之稅與其無地而輸財孰若受田之獲利也此亦以勸其勤耳大略自國以至于畿稅輕者不減二十而一重者不逾十二􅃮林雖重顧亦少焉皆以役多少參折之也此賦稅之定令也或曰古者皆謂周稅什一今此論何其等級之多乎曰其謂什一舉近郊而言也古之言質舉近而略逺也後儒耳目不接得其略而失其詳因謂皆什一也夫周禮豈可誣哉抑不獨于周然也其言夏商什一者亦猶是也後凡言什一者意同或人又問曰幸卒業于賦稅矣其所以制軍旅具車甲願因言焉曰按夏官司馬曰凡制軍萬有二千五百人為軍王六軍軍將皆命卿二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長康成謂軍師旅卒兩伍皆衆名也伍一比兩一閭卒一族旅一黨師一州軍一鄊家所出一人此則六鄊為六軍七萬五千人也又按遂人職曰以嵗時稽其人民而授之田野簡其兵器教之稼穡康成謂遂之軍法追胥起徒役如六鄊若是則六遂亦為六軍七萬五千人也但以王家迭而用之則其興發常六軍耳故止言六軍也此鄊遂制軍之法也又按司馬法通三十家出匹馬士一人徒二人成三百家出革車一乘士十人徒二十人終三千家出革車十乘士百人徒二百人同三萬家出革車百乘士千人徒二千人此雖井田顧未與周制同今按春秋成元年三月作丘甲杜氏注以為丘出戎馬一匹牛三頭甸出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之譏重斂故書左傳哀十一年季孫欲以田賦使冉有訪諸仲尼仲尼不對而私于冉有曰君子之行也度于禮施取其厚事舉其中斂從其薄如是則以丘亦足矣杜氏亦謂丘出戎馬一匹牛三頭是賦之常法若不度于禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之興在若欲苟而行之又何訪焉以是觀則丘賦實周公之典舉丘則甸明矣如此一同百甸甸旁加為成則百成也亦百乘也百乘則戎馬四百匹牛一千二百頭甲士三百人步卒七千二百人乘數雖同而士卒之制多少異矣今亦本周制為定蓋甸以內六鄊六遂則為十二軍迭用其六軍稍以外八十四同則為八千四百乘亦逺近異制矣如有名山大澤占之同數不滿則亦依數減之矣以一切而言則畿內千里合當百同故古謂天子萬乘也大凡康成謂成之一甸同之四都出田稅其旁加者甸旁以治成之洫都旁以治同之澮覯謂溝洫始為之也則用力多後治之也則用力寡矣曷足免其田稅乎今觀車賦止于甸不言成豈非旁加者不與車賦但主為治洫乎總百成之旁加者既各盡治其洫又共治其同之澮以役折役于事為宜且其治洫澮一嵗中豈數數然哉是賦稅軍旅車甲之議盡矣二十曰或曰古之人皆謂周為公田公田百畝其二十畝以為八家之居八家各受百畝以為私田通九百畝為一井公田借民力以耕不稅其私田詩春秋論語孟子之説皆然特周禮為異稅夫無公田康成以為周之畿內用貢法稅夫無公田夏之貢法也邦國用助法制公田不稅夫商之助法也畿內用貢法者鄊遂及公邑之吏旦夕從民事為其促之以公使不得恤其私邦國用助法者諸侯專一國之政為其貪暴稅民無藝此論何如曰天子之政自國而形天下者也豈有天子之國自稅民田而令諸侯但為公田而不稅哉雖其嵗入同歸于什一然非所以身率之謂也且畿內有鄊遂公邑之吏旦夕促之以公而諸侯之國豈無其吏能促之者乎苟為其貪暴稅民無藝則若王政明諸侯奉法雖使之稅敢過制乎若王政不眀諸侯不奉法雖為公田彼不能外取乎是皆非通理之論也覯謂周之畿內以及天下諸侯一用貢法稅夫無公田也公田商禮也抑文王之時雖巳受命尚為商之諸侯其田猶依商禮至武王得天下周公攝政作禮樂方遂變之故言周為公田者其原在聞之于文武之時而不知周公巳變之也孟子曰夏后氏五十而貢商人七十而助周人百畒而徹其實皆什一也徹者徹也助者藉也則孟子既知周制與商異矣其下文又曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也孟子雖知周制與商異然見詩有公田之文其詩又是周雅故復疑周亦為公田如商之助也其曰由此觀之雖周亦助則疑之之辭也既疑周為公田故至滕文公使畢戰問井地乃對以圭田餘夫公田之説謂今可行也夫圭田亦商禮也周則曰士田矣餘夫二十五畝蓋亦商禮也周則皆百畝矣然則孟子所稱悉是所聞商時之禮徒見周詩引公田乃復疑是周制耳不然何以上文云周人百畝而徹如徹取之謂與至如周詩所引公田亦非指言當時之事蓋以幽王政煩賦重君子傷今而思古故引古公田以諷之亦不言之公田果在何王之時也獨其上章云播厥百榖既庭且碩曽孫是若鄭箋云曽孫謂成王也若以成王之時則周公巳作禮樂矣而曰雨我公田是周制果為公田也然康成何以專指曾孫為成王夫孝孫曾孫抑是事宗廟之通稱禮曰祭稱孝子孝孫以其義稱也其稱曽孫某謂國家也若是則人君能繼先祖有國家君子取其廟中之稱而稱之曰曾孫皆可也豈成王得專之哉安知詩人所指不謂武王也文王也苟詩人所指謂武王以上則自是周公未制禮之前誠無害于周禮之夫稅也且孟子對齊宣王亦曰昔者文王之治𡵨也耕者九一是乃正指九一公田在文王也文王則依商禮決矣獨至周詩而疑之疑之又不明辨從而遂其疑謂答畢戰也顧亦先後反矣先言徹後言公田也春秋宣十五年初稅畝左傳曰初稅畝非禮也榖出不過藉以豐財也覯謂魯之先田稅既定矣然山林川澤之旁歷世之後或頗墾闢以有餘畝宣公又履而稅之傳稱榖出不過藉蓋丘明謂周家雖不謂公田然其井邑之所出稅榖亦不過商時藉數如孟子所謂其實皆什一之義也非謂周有公田而借民力以耕也公羊曰古者什一而藉榖梁曰古者公田為居井竈蔥韭盡焉是皆舉商禮以言之也大凡先儒多稱商禮抑非止聞之于文武之時而不知周公巳變之也蓋亦孔子商之子孫其服行尚依商禮檀弓夫子日夏后氏殯於東惜之上則猶在作也商人殯于兩楹之間則與賔主夾之也周人殯于西階之上則猶賔之也而丘也商人也豫疇昔之夜夢坐奠于兩楹之間夫明王不興而天下其孰能宗豫豫殆將死也而論語曰周監于二代郁郁乎文哉吾從周誠夫子其身之私則法先祖天下之公則從時王且周制文于商也其可忽諸先儒徒見夫子行商禮因謂天下之法盡當從商則其所言多稱商禮傳之積久後世莫知其本源誤謂之為周制故言周制者或以商禮雜亂其間則後世之言益不可信也如有若之對哀公盍徹與實止謂周家什一之徹法不足更疑其道公田也夫如是則詩春秋論語孟子皆不謂周公之制有公田後世諸儒解之者非也康成惑之亦非也自王國以至于藩服一也或曰助法不善與周公故變之也曰助法善之大也周公變之慮之深也夫周公以民益頑吏益猾公田之耕或不盡力藉榖之入或有隱欺不如一委之民而制其賦稅稅有所常責有所在安坐而視其入也禮制愈崇國用愈廣何暇從容如上世乎雖然無所增重也第謹其定數耳于民既無傷于國則不乏是聖人慮之深制之中也或曰敢問司馬法既為井田而周公變之何也曰司馬法雖為井田然其未方也唯井方一里成方十里同方百里焉其餘十井為通則長十里廣一里十成為終則長百里廣十里皆不方也周公欲以封邑諸侯群臣故自井以上皆方之邑方二里丘方四里甸方八里縣方二十里都方四十里成與同則仍依司馬法方者依之不方者改之無小無大皆方也舉而用之之易也井田既變則車賦亦不得復依司馬法矣故以丘甸制焉且一甸六十四井雖盡再易之地猶可授一百九十二家其出甲士步卒共七十五人不為多矣抑征討有時非常常而用也故士卒之數增焉皆聖人以義制事預備不虞之道也或曰司馬法文王時所作而周公敢變之何也曰夫孝者謂能承其志意非必盡循其政令膠柱而不改也况文王雖作司馬法而未之施行乎文王在岐為諸侯見商祚將盡知天命在巳故經始司馬法待其即天子位而行之文王大勳未集武王克紂而崩周公攝政乃取其書而述傳之可則因否則革廣以衆制而為周禮焉益無過也曰文王聖人也其為書安有否而可革者乎曰聖人因時制宜文王之時與周公之時異故文王以其時而言周公以其時而變也或曰諸侯之國亦井田也其制何若曰亦猶都鄙而巳矣始之為鄊遂次之為都鄙或滿以萬夫或極以一同至于諸侯則不言其田制其取諸都鄙亡疑矣欲知外者觀諸內欲知逺者本諸近兹不待備言而可鑒也大哉周公乎接文武之聖救商人之敝以之為禮禮無不中以之為政政無不和土天下之廣也而一塊莫敢爭先為之限也口天下之衆也而勺飲無所闕先為之業也率飽暖之民而納之于仁義歡焉可不反顧矣其曰兼三王不亦宜乎後雖有作者周公其弗可改也巳曰然則如之何則可曰法而行之復為一周乎右定著二十章經析其微注擇其善極數明用會異于同徑正備具無越此書矣猶懼其未可以灼見也作三圖以翼之一曰王畿千里之圗二曰鄉遂萬夫之圗三曰都鄙一同之圗圖之矩畫頗髙廣故别行不綴于篇明明后如欲舉周公之制觀是書按是圗以令之其如取諸掌乎若猶未也敢私于學禮者故書直講李先生文集卷之十九終
