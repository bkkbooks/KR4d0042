front:
  text: 直講李先生文集卷之八
  hash: sha256:6920b9158f8a24b9f567d3198cffef86a626c33c3415b9f4628d8a4285b9bcce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_018-1a}
body:
  text: 國用第十一泉府掌以市之征布歛市之不售貨之滯扵民用者以其賈買之物揭而書之以待不時而買者買者各􅀙其抵都鄙從其主國人郊人􅀙其有司然後予之凡賖者祭祀無過旬日䘮紀無過三月凡民之貸者與其有司辨而授之以國服為之息物掲而書之物物書其賈也不時買者謂求急者也賖謂祭祀䘮紀二者事大故賖與民不取利也貸者即今之舉物生利也與其有司别其􅀁授之物􅀁出之利各依其服事之稅若其人受園􅌀之田而貸萬泉則朞出息五百他倣此也天之生物而不自用用之者人人之有財而不自治治之者君繫辭曰理財正辭禁民為非曰義是也君不理則權在商賈商賈操市井之權㫁民物之命緩急人之􅀁時有也雖賤不得不賣裁其價太半可矣雖貴不得不買倍其本什百可矣如此􅃖􅃖之氓何以􅀎育是故不售之貨則歛之不時而買則與之物揭而書使知其價而况賖物以備禮貸本以治生皆􅀁以紓貧窶而鉗并兼養民之政不亦善乎管仲通輕重而桓公以覇李悝平糴而魏國富彊耿夀昌築常平而民便之師古之效也宜其流風遂及于今必也事責其實官得其人亦何媿彼㢤國用第十二司市凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使㣲利利扵民謂物實厚者害害扵民謂物行苦者使有使阜起其賈以召之也使亡使㣲抑其賈以却之也侈靡細好使富民好奢㣲之而巳又偽飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二􅀁以俱十有二者工不得作賈不得粥商不得資民不得畜王制曰用器不中度不粥扵市兵車不中度不粥扵市布帛精麤不中數幅廣狹不中量不粥扵市姦色亂正色不粥扵市五榖不時果實未熟不粥扵市木不中伐不粥扵市禽獸魚鼈不中殺不粥扵市亦其􅀋也夫理財之道去偽為先民之詐偽盖其常心矧兹市井飾行儥慝何􅀁不至㢤姦偽惡物而可雜亂欺人以取利則人競趍之矣豈唯愚民見欺邪使人妨日廢業以作無用之物人廢業則本不厚矣物無用則國不實矣下去本而上失實禍自此始也至扵侈靡皆為人費雖不可盡去亦當制節使㣲少矣孟冬之月令曰母或作為􅁋巧以蕩上心必功致為上書曰不貴異物賤用物民乃足此之謂也噫為國家者孰不有意㢤言而必信令而必行鮮矣國用第十三遺人掌􅀖之委積以待施惠鄊里之委積以恤人之囏阨門􅀜之委積以養老􅀌郊里之委積以待賔客野鄙之委積以待覉旅縣都之委積以待㐫荒委積者計九榖之數足國用以其餘共之也囏阨謂民有困乏則振恤之門􅀜謂出入有稅足國用之外留之以養死政之老與其􅀌也郊里六鄊之民居郊者其委積以待賔客至郊與主國使者接因與之廪餼也野鄙謂六遂客有覉縶未得去者則扵此惠之縣都謂四百里五百里中年榖不登則畿内畿外通給之也世之有饑穣天之行也禹湯之聖猶弗􅀎免至於困窮􅀌獨􅀉客之人皆國􅀁常有安坐而視其死則非仁人在上視民如傷者之意􅀅推其惻􅀮則􅀖用有􅀴倉之榖孰為閑粒府之帛孰為羡縷如是而輟焉禍盖博矣故宜扵大有年時畜積以􅇱之倉人有餘則蔵之以待㐫而頒之職内敘其財以待􅀖之移用亦謂此也然而洪範云臣無有作福晏子稱家施不及國使民弗知主恩而謂為巳力乃人臣之常過國家之大患也故郷師以􅀊時廵國及野而賙萬民之囏阨以王命施惠此慮之深禮之至也然則義倉之法亦有取焉耳國用第十四司救凡􅀊時有天患民病則以節廵國中及郊野而以王命施惠由是觀之非直凶荒而後施與也疾疫亦有之矣夫四時之厲或連月不愈或闔門不起丁壮卧于牀蓐則老稚無􅀎為飲食􅀁不給醫藥􅀁不濟以至于死者豈天命乎人主􅀁宜動心矣賈師凡天患禁貴儥者使有常價亦為此也司􅀜國㓙札則無闕門之征猶㡬由是觀之㐫年非直除减田租彼貨賄之征皆舎之疾疫亦然夫阻饑之人營求衣食固無􅀁不至又􅀅籠其貨賄則何以措手足乎况扵疾疫之世安得助天為虐邪人主􅀁宜動心矣掌客凡禮賔客國新殺禮凶荒殺禮札䘮殺禮禍烖殺禮在野在外殺禮由是觀之非直以􅀊之下則殺􅀖用若新建國及札䘮禍烖在野在外皆殺禮也禮許儉不非無安得重困扵無􅂓之民求􅇱乎􅇼豆之事也人主􅀁宜動心矣膳夫大荒則不舉大札則不舉天地有烖則不舉􅀖有大故則不舉由是觀之非直扵外事殺禮若王膳亦為之貶也譬諸父母其子之不哺而日餘膏粱可㢤人主􅀁宜動心矣故曲禮曰㓙荒年榖不登君膳不祭肺馬不食榖馳道不除祭事不縣大夫不食粱士飲酒不樂皆自貶損憂民之道也如此天不為之感人不為之恱用度不足海内不安未之前聞也國用第十五郷師以國比之法以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令紏禁聽其獄訟鄊大夫以􅀊時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者􅀎者服公事者老者疾者皆舍以􅀊時入其書征之者謂給公上築作挽引道渠之役也國中復除者多役使者少人少則勞故晚役而早免之二十以及六十是也野復除者少役使者多人多則逸故早役而晚免之十五以及六十五是也君子之扵人裁其勞逸而用之可不謂義乎世有仕學之郷或舍役者半農其間者不亦難乎而上弗之恤悖矣貴者有爵命服公事者有功勞誠不可役然復其身而巳世有一戸皆免之若是則老者疾者亦可以闔門不使耶至扵馬牛皆辨其可任善夫世有人未嘗芻秣而責以牽徬其僦費敗家者衆矣况乎水旱疾疫之􅀊饑餓之弗察死亡之弗圖而臨以定制敺之給使可乎故均人凡均力政以􅀊上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉㓙札則無力政無財賦也古者使民􅀊不過三日而秦法月為更卒巳復為正一􅀊屯戍一􅀊力役三十倍扵古何不仁之甚也天下畔之晚矣國用第十六大司徒以保息六養萬民六曰安富謂平其繇役不專取也大㢤先王之法其􅀁以有天下而民不斁者乎孔子謂既庶矣富之既富矣教之管子有言倉􅅒實知禮節衣食足知榮辱然則民不富倉廪不實衣食不足而欲教以禮節使之趍榮而避辱學者皆知其難也及其為國家則有反是者矣田皆可耕也桑皆可􅅙也材皆可飭也貨皆可通也獨以是富者心有􅀁知力有􅀁勤夙興夜寐攻苦食淡以趣天時聽上令也如此而後可以為人之民反疾惡之何㢤疾惡之則任之重求之多勞必扵是費必扵是富者㡬何其不黜而貧也使天下皆貧則為之君者利不利乎故先王平其繇役不專取以安之也漢武帝時筭賈人之緍匿不自占占不悉戍邉一􅀊沒入緍錢有􅀎告者以其半􅂌之即治郡國緍錢得民財物以億計奴婢千萬數田大縣數百頃小縣百餘頃宅亦如之商賈中家以上大氐破民媮甘食好衣不事畜蔵之業當是之時天下何如其不亡者幸也世俗不辨是非不别淑慝區區以擊􅆠為事噫富者乃􅆠邪彼椎埋而誅者果何人也直講李先生文集卷之八終
