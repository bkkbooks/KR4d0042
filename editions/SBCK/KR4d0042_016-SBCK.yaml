front:
  text: 直講李先生文集卷之六
  hash: sha256:872492f0b7ceb1e78c15716ab61adfabdc5beae627d6223b69aa3891e6ca8dd0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_016-1a}
body:
  text: 國用第一人􅀁以為人足食也國所以為國足用也然而天不常生其生有時地不徧産其産有宜人不皆作其作有􅀎國不盡得其得有數一榖之稅一錢之賦給公上者各有定制苟不量入以為出節用而愛人則哀公云二猶不足公羊謂大桀小桀誅求無巳怨刺並興亂世之政也故大府凡頒財以式法授之王日一舉其膳六牲祀兵朝甸其服有九故􅀜市之賦以待王之膳服諸侯来朝卿大夫来聘致之則有積飱饔接之則有饗食燕故􅀖中之賦以待賔客牛馬之食其用芻禾車秅之數皆眡牢禮故四郊之賦以待稍秣功懋懋賞以馭其幸􅀁受之物􅀖之大用故家削之賦以待匪頒冬官百工取材非一五庫之量母或不良故􅀖甸之賦以待工事問勞贈賄酬爵侑食皆為篚實􅀅其厚意故􅀖縣之賦以待弊帛大祀小祭事神之禮牲弊玊器不奢不儉故􅀖都之賦以待祭祀股肱或􅃜君之􅀁痛賵禭含􅉠闕一不可故山澤之賦以待䘮紀王及􅃁宰時有􅀁善燕好之用亦以推恩故弊餘之賦以待賜予王扵諸侯分烖救患㐫禮五事其費則多故􅀖國之貢以待吊用國家閒暇要在多積積貯之道天下大命故萬民之貢以充府庫難得之貨饑不可食燕㳺􅀁用非國之急故式貢之餘財以共玩好之用凡其一賦之出則給一事之費費之多少一以式法如是而國安財阜非偶然也國用第二玉府掌王之金玉玩好兵器凡良貨賄之蔵燕衣服祍席牀第凡䙝器凡王之獻金玉兵器文織良貨賄之物受而蔵之凡王之好賜共其貨賄内府掌受九貢九賦九功之貨賄良兵良器以待􅀖之大用凡四方之幣獻之金玉齒革兵器凡良貨賄人焉凡適四方使者共其􅀁受之物而奉之凡王及􅃁宰之好賜予則共之按其職文掌天子器用財賄燕私之物及受貢獻以備賞賜此帑蔵之在宫中官職之最私䙝者然而為􅃁宰之屬列大府之下與凡治蔵之官不異者何也盖王者無外以天下為家尺地莫非其田一民莫非其子財物之在海内如在槖中况扵貢賦之入何彼我之云㢤歴觀書傳自禹貢以来未聞天子有私財者漢湯沐邑為私奉養不領扵􅀴費靈帝西園萬金常聚為私蔵皆衰亂之俗非先王之法也故雖天子器用財賄燕私之物受貢獻俻賞賜之職皆屬于大府屬于大府則日有成月有要􅀊有㑹職内之入職􅀊之出司書之要貳司㑹之鉤考廢置誅賞之典存焉如此用安得不節財安得不聚若以御府禁錢􅂢之親幸之手省闥之中外人弗睹法制􅀁不行校比􅀁不及則傷財害民非細事也國用第三太宰以九職任萬民一曰三農生九榖二曰園圃毓草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工􅅚化八材六曰商賈阜通貨賄七曰嬪婦化治􅁝枲八曰臣妾聚歛䟽材九曰間民無常職轉移執事天之生民未有無􅀎者也􅀎其事而後可以食無事而食是衆之殃政之害也是故聖人制天下之民各從其􅀎以服扵事取有利扵國家然後可也太宰授之職閭師責其功故曰任農以耕事貢九榖任圃以樹事貢草木任工以􅅚材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物凡無職者出夫布也人各有事事各有功以興材征以濟經用無惰而自安無賊扵糧食是富民之大本為國之上務雖􅀜百聖何以易此昔胥臣對晋文公謂戚施植鏄蘧蒢蒙璆侏儒扶廬矇瞍脩聲聾聵司火王制瘖聾跛躃斷者侏儒各以其器食之古者廢疾之人猶有􅀁役後之㳺民作無益以害有益者肩相摩毂相擊而吏不以是罪之主不以是棄之謂之何㢤國用第四言井田之善者皆以均則無貧各自足也此知其一未知其二必也人無遺力地無遺利一手一足無不耕一歩一畮無不稼榖出多而民用富民用富而􅀖財豐者乎大司徒凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮不易之地􅀊種之地羙故家百畮一易之地休一􅀊乃復種地薄故家二百畮再易之地休二􅀊乃復種故家三百畮遂人辨其野之土上地中地下地以頒田里上地夫一㕓田百畮萊五十畮餘夫亦如之中地夫一㕓田百畮莱百畮餘夫亦如之下地夫一㕓田百畮莱二百畮餘夫亦如之萊謂休不耕者戸計一夫一婦而賦之田其一戸有數口者餘夫亦受此田也載師以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地宅田致仕者之家􅀁受田也士田仕者亦受田賈田在市賈人其家􅀁受田也官田庶人在官者其家􅀁受田也牛田牧田畜牧者之家􅀁受田也若餘夫致仕者仕者賈人庶人在官者畜牧者之家皆受田則是人無不耕無不耕則力豈有遺㢤一易再易莱皆頒之則是地無不稼無不稼則利豈有遺㢤自阡陌之制行兼并之禍起貧者欲耕而或無地富者有地而或乏人野夫有作惰㳺况邑居乎沃壤猶爲蕪穢况瘠土乎饑饉􅀁以不支貢賦􅀁以日削孟子曰仁政必自經界始師丹言宜畧爲限不可不察也國用第五地利之食扵人􅀶㦲農既得其時種既得其宜然且不熟者水旱賊之也水旱之灾雖天􅀁為至扵人力亦有可及矣故遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路此鄊遂之田制也匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之甽田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮此都鄙之田制也川大扵澮澮大扵洫洫大扵溝溝大扵遂遂大扵甽甽通水以入于遂遂入于溝溝入于洫洫入于澮澮入于川然則雖大雨霖其水有􅀁渫􅀎爲害者希矣稻人掌稼下地以豬畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水以渉􅀭其芟作田豬謂畜流水之陂防豬旁隄也然則雖乆不雨其水可以得􅀎爲害者希矣聖人之扵水旱不其有􅇱㢤蒍掩規偃豬君子以爲禮史起引漳水舄鹵生稻粱鄭國鑿涇水􅀜中爲沃野古之賢人未有不留意者也水官不修川澤溝瀆無有舉掌機巧趍利之民得行其私日侵月削往往障塞雨則易以溢謂之大水豈天乎霽則易以涸謂之大旱豈天乎如是而望有年未之思矣直講李先生文集卷之六終
