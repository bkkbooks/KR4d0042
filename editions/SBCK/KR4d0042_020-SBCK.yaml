front:
  text: 直講李先生文集卷之十一
  hash: sha256:e55a6b0581693ae6942da5d0174ac273f5822fe756e929085a525b9f1e1d02a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_020-1a}
body:
  text: 官人第一為人上者孰不欲進賢而賢或不進孰不欲退不肖而不肖或不退豈知而縦之邪人未易知也知人則哲帝堯猶以為難彼色厲内荏言行不相顧者㴞滔皆是也非乆與居胡􅀎睹其真偽耶乆與居者非鄰里鄊黨而誰邪故閭胥凡春秋之祭祀役政䘮紀之數聚衆庶既比則讀法書其恭敏任恤者族師月吉則属民而讀法書其孝弟睦婣有學者春秋祭酺亦如之黨正正􅀊属民讀法而書其徳行道藝州長正月之吉各属其州之民而讀法以攷其徳行道藝而􅂆之以紏其過惡而戒之若以􅀊時祭祀州社則属其民而讀法亦如之鄊大夫三年則大比攷其徳行道藝而興賢者􅀎者鄊老及鄊大夫帥其吏與其衆寡以禮禮賔之厥明鄊老及鄊大夫群吏獻賢􅀎之書于王王再拜受之登于天府内史貳之退而以郷射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞閭胥二十五家之吏凡因㑹聚則書其人材族師毎月朔書春秋祭輔又書黨正夏正之月書州長正月之朔攷春秋社又攷是一􅀊之中凡㡬書凡㡬攷至于三􅀊鄊大夫乃攷而興之獻其書于王退而又詢衆庶寕復有賢􅀎者乎其詳如此其慎如此而官謗不戢治道不登未之有也孔子曰昔吾扵人也聴其言而信其行今吾扵人也察其言而􅀚其行不見其人之姓名不知其身之善惡才不才决扵數百言難乎為無失矣官人第二司士掌群臣之版以徳詔爵以功詔禄以能詔事以久奠食徳謂賢者凡賢者能者皆先試以事久而有功然後授之以爵得禄食也爵以貴乎人天下之人共貴之禄以富乎人天下之人共富之髙􅃣大盖吏民趍走事之恐不及天下共貴之也禀財給榖農桒賦貢奉之而不暇天下共富之也天下共貴之而貴非其人天下共富之而富非其人則君命果義乎衆心果服乎且人各有􅀎有不􅀎孟公綽不可以為滕薛大夫禆諶謀扵國則否况其下者乎苟非試其事考其功而遽與之爵禄則曠天官敗公事何足道㢤王制曰論定然後官之任官然後爵之位定然後禄之􅀁謂官之者使試守也堯舜豈不聖而試臣以職慎之至也若是則賢者必用不肖者必舍􅀎者必行否者必蔵嗇夫之印綬不可以幸而得也奚髙位之辱㢤夫位有髙卑禄有厚薄言其操柄則無􅀁不重州縣之職前世以為徒勞者而民命繫之未聞明試其功而居位受禄一官之效則仕而後學之有羙錦者不使人學制焉民􅀁以死生貧富顧不重㢤官人第三大宰􅀊終則令百官府各正其治受其㑹聴其致事而詔王廢置三􅀊則大計群吏之治而誅賞之宰夫􅀊終則令群吏正􅀊㑹月終則令正月要旬終則令正日成以攷其治治不以時舉者以告而誅之司㑹以參互攷日成以月要攷月成以􅀊㑹攷􅀊成以周知四國之治以詔王及冡宰廢置􅀊計曰㑹月計曰要日計曰成凡百官府旬終月終皆考其治状若治不以時舉者宰夫以吿􅃁宰而責之至于􅀊終又考非直責之而巳其有功無功司㑹以詔􅃁宰􅃁宰以詔王而廢置之置者進其爵廢者退其爵也及三􅀊則冢宰大計其治大無功不徒廢必罪之大有功不徒置必賞之也噫先王􅀁以課吏考功如是其宻也日入其成是無一日而可敖盪􅀊終廢置是無一􅀊而不􅂆懲三年有成則申之以誅賞有功者驟􅀗其利無功者卒伏其辜雖􅀎言之􅀋亦知勸勉媿耻矣况智者乎舜典三載考績三考黜陟幽明彼三􅀊而一考九􅀊而後黜陟盖帝道寛簡抑時世之然未若周公之典垂後昆之韙也董仲舒曰古􅀁謂功者以任官穪職為差非謂積日絫乆也故小材雖絫日不離扵小官賢材雖未乆不害為輔佐必也不求功實而以日月為限三年而遷一官則人而無死孰不可公卿者乎官人第四冬官考工注其曰某氏者官有世功若族有世業以氏名官者也官有世功則以官為氏若馮相氏保章氏師氏保氏韋氏裘氏冶氏之􅀋是也族有世業則以氏名官若桃氏為劍築氏為削鳬氏為鍾㮚氏為量之􅀋是也甚矣事之不可以不常也易曰天地之道常乆而不巳也日月得天而􅀎乆照四時変化而􅀎乆成聖人乆扵其道而天下化成孔子曰如有王者必世而後仁善人為􅀖百年可以勝殘去殺矣夫以聖人之徳履天子之位尚曰乆扵其道必三十年必百年而後仁政可成殘殺可去况扵中人以下分職授政而可以不乆者乎是故先王建官有世守之至以爲氏也漢文景至武帝之初國家無事爲吏者長子孫居官者以爲姓號倉氏􅁃氏是也然則古之治天下皆如此乎吏之扵民必相知心然後治也吏知民心則明明則政平矣民知吏心則信信則令行矣欲相知心豈一朝一夕而可㢤上下未相知或知之未乆遽委而去之後来者亦如此則是吏未嘗知民心民未嘗知吏心吏以􅀁治爲􅀓舍事或不舉則曰以待後人民視􅀁属如過客理或不勝亦曰以待後人官何以􅁱衆何以服謂其有功邪進其爵可也重其賞可也如其職事則乆之爲貴故漢有當遷而增秩留者矧伊無功之人而可虗受禄食往来扵道路間邪直講李先生文集卷之十一終直講李先生文集卷之十二官人第五地官序郷老二鄊則公一人老尊稱也王置六鄊則公有三人也三公者内與王論道中參六官之事外與六鄊之教其要為民是以属之鄊焉誠㢤民事之重宰相􅀁宜躬親也以三公之爵而聮六鄊之吏非躬親而何召公為伯聴男女之訟不重煩勞百姓止􅃕小棠之下國人􅀍其徳􅀃其化思其人愛其􅀣甘棠之􅀁為作也而陳平曰决獄責廷尉錢榖責治粟内史丙吉謂宰相不親小事何也苟决獄不平錢榖出入不節民闘相殺傷不止而宰相不知尚可調和隂陽順四時遂萬物之宜也㢤此皆華言誤天下事慎聴之也故先王以民惟􅀖本造次顛沛無或忘之既使大臣為鄊老又取其鄊之人為吏􅀁謂使民興賢出使長之使民興􅀎入使治之者也盖使民自舉􅀎者因入之而使之治民之貢稅田役扵内謂為比長以上之官也夫􅀎盡知人之情偽與其土􅀁有其俗􅀁宜莫若其鄊之人也因以為吏孰不治乎宓子賤為單父宰反命扵孔子曰此國有賢不齊者五人教不齊􅀁以治者孔子曰惜㢤不齊􅀁治者小􅀁治者大則庶㡬矣子賤受教扵單父之人猶以至治况使單父之人躬為吏乎漢之賢人仕州郡者多矣刺史二千石往往有􅀎名未必非其􅀁助也東西南北之人言語猶未相通而責之善政難矣㢤官人第六大司徒凡建􅀖國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封􅆠方四百里其食者參之一諸伯之地封􅆠方三百里其食者參之一諸子之地封􅆠方二百里其食者四之一諸男之地封􅆠方百里其食者四之一大㢤封建之禮此周之􅀁以本支百世乎荀卿有言兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉富辰曰昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衞毛􅆅郜雍曹滕畢原酆郇文之昭也邘晋應韓武之穆也凡􅃽邢茅胙祭周公之子也然則先王扵其族􅀋有不厚乎詩曰凡今之人莫如兄弟兄弟䦧于墻外禦其侮平王東迁而晋鄭是依其世與年過于􅀁卜由此􅂗出也豈嘗有兄弟之國敢問鼎之䡖重者㢤故叚灼表于晋武帝曰㓕周者秦非姬姓也代漢者魏非劉氏也雖云割地譬猶囊漏貯中亦一家之有耳縦令後世子孫還自相并盖亦楚人失繁弱扵雲夣尚未爲亡其弓也其扵神器不移他族則始祖不遷之廟萬年不改其名矣善㢤灼之知言也漢雖有七國之變而梁孝以睢陽城守晋雖有八王之亂而元帝以琅邪中興魏氏王公有名無實禁防壅隔同扵囹圄曹爽一死而司馬家取之如運諸掌上灼之言不亦善乎官人第七大行人掌大賔之禮及大客之儀以親諸侯春朝諸侯而圖天下之事秋覲以比􅀖國之功夏宗以陳天下之謨冬遇以協諸侯之慮時㑹以發四方之禁殷同以施天下之政此六事者以王見諸侯為文圖比陳協皆考績之言王者春見諸侯則圖其事之可否秋見諸侯則比其功之髙下夏見諸侯則陳其謀之是非冬見諸侯則合其慮之異同六服以其朝􅀊四時分来更迭如此而徧時㑹無常期諸侯有不順服者王􅀅有征討之事則既朝王命為壇扵國外合諸侯而發禁命事焉王十二􅀊一廵狩若不廵守則衆同衆同者六服盡朝既朝王亦命為壇扵國外合諸侯而命其政四時分来􅀊終則徧矣六服朝􅀊則下文侯服􅀊一見甸服二􅀊一見男服三􅀊一見采服四􅀊一見衞服五􅀊一見要服六􅀊一見是也夫君臣之禮不可以不接不接則上恩不下流下情不上通嫌疑易以生毀譽易以入在易天地不交則否柔進而上行則錫馬蕃庶晝日三接也先王知其如此故制諸侯之朝逺者不過六􅀊以之圖事比功陳謨協慮發禁施政則言何以不見納行何以不見知奸邪何以介其間左右何以塞其路漢刺史奏事京師其斯之謂乎石顯五鹿充宗疾京房欲逺之元帝以房為魏郡太守房自請􅀊盡乗􅀓奏事天子許焉房未發詔止無乗傳奏事房意愈恐由此􅀚之臣子不得見君父其禍何如詩曰彼采􅁑兮一日不見如三月兮一日之中尚曰如三月三秋三􅀊况其乆者乎官人第八内小臣奄上士四人寺人王之正内五人内竪倍寺人之數酒人奄十人􅄴人奄五人􅇼人奄一人醢人奄一人醯人奄二人塩人奄二人幂人奄一人内司服奄一人縫人奄二人春人奄二人饎人奄二人槀人奄八人守祧奄八人内小臣稱士者異其賢其餘盖皆不命也夫宦官之位天象􅀁有指其居次則或在帷薄之内論其職掌則或聞牀笫之言固不可以詘辱俊乂渾淆男女其用腐身之􅀋是乃制事之宜矣然而先王不以恩奪義不以私廢公雖其䙝臣無得過寵奄称士者止扵四人况可為卿大夫乎㢤漢文帝時趙談􅆖乗爰盎伏車前曰天子􅀁與共六尺輿者皆天下豪英今漢雖乏人獨柰何與刀鋸之餘共載如使之尸天官又非􅆖乗之比也自鄭衆謀誅竇憲為大長秋封侯其後孫程定立順之功曹騰叅建桓之策續以五侯合謀梁冀受鉞髙􅃣長劍紆朱懐金者布滿宫闈苴茅分土南面臣人者盖以十數故曰三世以嬖色取禍嬴氏以奢虐致災西京自外戚失祚東都縁閹尹傾國豈不哀㢤唐之北司同㱕于亂􅀃命曰事不師古以克永世匪􅀃攸聞信矣直講李先生文集卷之十二終直講李先生文集卷之十三教道第一立人以善成善以教教而不善邪是堯舜之民鄙夭矣不教而善邪是桀紂之民可封矣移風俗歛賢才未有不由此道也故大司徒以鄊三物教萬民而賔興之一曰六徳知仁聖義忠和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數物猶事也民三事教成郷大夫舉其賢者􅀎者以飲酒之禮賔客之既則獻其書扵王矣知明扵事仁愛人以及物聖通而先識義􅀎断時宜忠言以中心和不剛不柔善扵父母為孝善扵兄弟為友睦親扵九族婣親扵外親任信扵友道恤振憂貧者禮五禮之義樂六樂之歌舞射五射之法御五御之節書六書之品數九數之計以鄊八刑紏萬民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑不弟不事師長造言訛言惑衆亂民亂名改作執左道以亂政也大㢤先王之􅀁以􅇌民而納之扵善也教以開其前如得大路終日行而弗迷失刑以策其後使不敢反顧而况賔興以􅂆之㢤養天性㓕人欲家可使得孝子國可使得忠臣矣學校不立教法不行人莫知何人可師道莫知何道可學耳何以為正聲目何以為正色口何以為正言身何以為正行明者幸而得之昧者不幸而失之􅀅欲求腹心扵中林訪忠信扵十室不易得矣小雅菁菁者莪孟氏君子三樂善為國者可無意㢤教道第二外饔􅀖饗耆老􅀌子則掌其割亨之事謂養國老庶老老也酒正凡有秩酒者以書契授之􅀁秩者謂老臣九十日有秩也夫養老之禮自古帝王未始不隆之也王制曰凡養老有虞氏以燕禮夏后氏以饗禮商人以食禮周人􅁱而兼用之五十養扵鄊六十養扵國七十養扵學逹扵諸侯有虞氏養國老扵上庠養庶老扵下庠夏后氏養國老扵東序養庶老扵西序商人養國老扵右學養庶老扵左學周人養國老扵東􅑟養庶老扵虞庠虞庠在國之西郊有虞氏皇而祭深衣而養老夏后收而祭燕衣而養老商人􅒐而祭縞衣而養老周人冕而祭黒衣而養老凡四代之制雖時有改然其道則莫之變也卿大夫之致仕者為國老士為庶老其餘非賢不可皆養亦引户校年以行復除八十者一子不從政九十者其家不從政也養老之禮有三老焉有五更焉天子無父矣欲為人子而不可得也無兄矣欲為人弟而不可得也是故父事三老􅀁以教天下之為人子也兄事五更􅀁以教天下之為人弟也親冕而總干􅃝而割牲執醤而饋執爵而獻祝䭇在前祝鯁在後公卿奉杖大夫進履天子之尊四海之内其意莫不為臣然而以父兄事人者孝弟之心無所用之因以教天下之孝弟也天子之尊且事他人為父兄天下之民敢遺其親父親兄乎是一舉而孝弟之風洋洋乎九州之外矣噫盛㢤教道第三大司徒施十有二教二曰以陽禮教譲則民不争陽禮謂鄊射飲酒之禮也黨正國索􅀑神而祭祀則以禮屬民而飲酒于序以正齒位一命齒于鄊里再命齒于父族三命而不齒國索􅀑神而祭祀謂􅀊十二月大蜡之時建亥之月也必正齒位者為民三時務農􅀅闕扵禮至此農􅂩而教之尊長養老見孝弟之道也凡射飲酒比鄊民雖為卿大夫必来觀禮齒于鄊里者以年與衆賔相次也齒扵父族者父族有為賔者以年與之相次異姓雖有老者居扵其上不齒者席扵尊東􅀁謂僎也大㢤先王之􅀁以和鄊黨睦親戚有如此夫彼一命者天子之下士公侯伯之上士子男之大夫也而與鄊里齒焉再命者天子之中士公侯伯之大夫子男之卿也而與父族齒焉三命者天子之上士公侯伯之卿也雖云不齒亦異席而巳非敢居其上也然則貴而驕人少而陵長者不容扵其間矣鄊飲酒義曰六十者坐五十者立侍以聴政役􅀁以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆􅀁以明養老也民知尊長養老而后乃􅀎入孝弟民入孝弟出尊長養老而后成教成教而后國可安也經觧曰鄊飲酒之禮廢則長幼之序失而争闘之獄繁矣夫二人同居亦一長一幼如使幼皆順長則争何由興推此以及千萬人宜乎其獄訟之寡也而况尊人之長以及吾長養人之老以及吾老則䡖重可知矣輕重可知而不孝不弟者其唯禽獸之心乎若是則教焉得不成國焉得不安也㢤教道第四大宰以九兩繫􅀖國之民五曰宗以族得民宗繼别為大宗收族者也大宗者其先祖之􅀒荷族人之紀綱乎大傳曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之􅀁自出者百世不遷者也宗其繼髙祖者五世則遷者也别子謂公子若始来在此國者後世以為祖也别子之適子適孫世世繼别子為大宗百世不遷族人五世外者皆為之齊衰三月母妻亦然故大宗有族食族燕之禮􅀁以收族也夫五服者人道之大治也然而上盡於髙祖旁盡於三從上盡於髙祖則逺者忘之矣旁盡於三從則䟽者忘之矣故立大宗以承其祖族人五世外皆合之宗子之家序以昭穆則是始祖常祀而同姓常親也始祖常祀非孝乎同姓常親非睦乎内則曰適子庶子秪事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入子弟猶歸器衣服裘衾車馬則必獻其上而后敢服用其次也若非􅀁獻則不敢以入於宗子之門若富則具二牲獻其賢者於宗子夫婦皆齊而助祭焉終事而后敢私祭然則族人之重宗子何如哉重宗者尊祖之義也噫所生猶或不孝况逺祖乎同産猶或不睦况族人乎是先王坊民有禮而刑不足以齊之也教道第五小司徒之職掌建􅀖之教法以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食䘮紀之禁令鄼長各掌其鄼之政令以時校登其夫家比其衆寡以治其䘮紀祭祀之事曾子曰慎終追逺民徳㱕厚矣䘮祭之謂也哀㢤死者乎為其形之􅀅敗也而人惡之矣為其心之無知也而人倍之矣是故絞紟衾冒以周其内棺槨牆翣以文其外為使人勿惡也朝夕之奠以繼其養神明之器以備其用為使人勿倍也君子過哀則㡬毀㓕小人直情則􅀅忽忘是故哭之有節服之有斷此聖人􅀁以制䘮禮也春履雨露而怵惕秋履霜露而悽愴孝子以天時之變念其親之不得見也是故散齋七日致齋三日隂幽以思而祭者可見矣祭之日入室必有見乎其位出户必有聞乎其聲事死者如事生思死者如不欲生盖非牲牷肥腯粢盛豐􅇱而巳此聖人􅀁以制祭禮也人有貴有賤有富有貧而未有無親者也其禮雖異其情則同王制曰庶人繩封葬不為兩止不封不樹䘮不貳事亦其䘮禮也庶人春薦韭夏薦麥秋薦黍冬薦稻亦其祭禮也然㝠㝠之民􅂆扵利而懲扵威苟非上之􅀁財成則末由也已故小司徒有其禁令而鄼長治之也三年問曰􅀅由夫患邪􅁋之人與則彼朝死而夕忘之矣然而從之則是曽鳥獸之不若也夫焉􅀎相與群居而不亂乎楊子曰人而不祭豺獺乎是䘮祭之禮廢則人不如禽為其上者􅀁宜憂也直講李先生文集卷之十三終直講李先生文集卷之十四教道第六鄊師正􅀊稽其鄊器比共吉㓙二服閭共祭器族共䘮器黨共射器州共賔器鄊共吉㓙禮樂之器吉服者祭服也㓙服者吊服也比長主集為之祭器者簠簋鼎爼之屬閭胥主集為之䘮器者夷盤素爼掲豆輁軸之屬族師主集為之此三者民􅀁以相共也射器者弓矢楅中之屬黨正主集為之為州長或時射扵此黨也賔器者尊爼笙瑟之屬州長主集為之為鄊大夫或時賔賢􅀎扵此州也吉器若閭祭器者也㐫器若族䘮器者也禮樂之器若州黨賔射之器者也鄊大夫備集此四者為州黨族閭有故而不共也此鄊器者旁使相共則無廢事上下相補則禮行而教成夫有其禮者必有其財而後可行也由士以上則田禄足矣庶人農力或不免凍餒而求其備禮不亦難乎故禮不下庶人者以此苟非乏財則人無禮不立何斯民之不得用㢤先王患之乃使比長閭胥族師集罰物以為服器民有用者則共之若有故而不共則鄊大夫以公物補焉民無傷財而可得服器則夫􅀎言者肯不行禮㢤如是而不行禮則納之刑辟其又何辭宜乎其天下大服也任延爲九真太守駱越之民無嫁娶禮法各因􅁋好無適對匹不識父子之性夫婦之道延乃移書属縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸禄以賑助之同時相娶者二千餘人其産子始知種姓彼一郡守猶􅀎教人以禮而助之以財况四海之富乎㢤教道第七典命上公九命爲伯其國家宫室車旗衣服禮儀皆以九爲節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宮室車旗衣服禮儀皆以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之公之􅀌四命其卿三命其大夫再命其士一命其宮室車旗衣服禮儀各眡其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宮室車旗衣服各眡其命之數夫宮室取以待風雨是則蓬茨足矣衣服取以禦寒暑是則紵絮足矣車馬取以代勞是則柴轂足矣器物取以利用是則瓦釡足矣然而耳目之欲雖窮壮極麗猶未足以厭之也先王因人之情而制之以為貴賤等級使貴者得以逞賤者無􅀁覦則上下有體而朝廷以尊費用有節而財力不乏至于庶民亦有以防之故大司徒以本俗六安萬民六曰同衣服謂民雖有富者衣服不得獨異也不然則人人可以僣上上下一體則朝廷不尊家家可以大費費用無節則財力乃乏亂患􅀁以作禮讓􅀁以衰也仲叔于奚繁纓以朝而仲尼惜之庶人屋壁得為帝服倡優下賤得為后飾而賈誼長太息無意乎民則巳苟有意㢤是􅀁先急也教道第八大司樂凡建國禁其􅁋聲過聲㓙聲慢聲􅁋聲若鄭衞也過聲失哀樂之節㓙聲亡國之聲若桒間濮上慢聲惰慢不恭也大胥掌學士之版以待致諸子版籍也大胥主此籍以待當召聚學舞者卿大夫之諸子則案此籍以召之漢大樂律曰卑者之子不得舞宗廟之酎除吏二千石到六百石及􅀜内侯到五大夫子先取適子髙七尺以上年十二到年三十顔色和順身體􅁱治者以為舞人與古用卿大夫子同義也深矣乎聲之感人也如水之激如草之偃自生民以来莫之􅀎免也樂記曰志㣲噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅㢘直勁正荘誠之音作而民肅敬寛􅁉肉好順成和動之音作而民慈愛流辟邪散狄成滌濫之音作而民􅁋亂先王慎􅀁以感之者故禁其􅁋過㐫慢之聲而舞人又取卿大夫子有中和祗庸孝友之徳者是聲與人無不正也聲與人無不正則聞之且見之者焉得不正乎子夏曰今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也噫舞者男女自相雜子夏巳疾之而况粉白黛黒笑言扵尊爼間乎董仲舒􅀁謂民之師師者宜不宜也然則天下多􅁋辟之罪有以矣夫教道第九師氏掌以􅍇詔王以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以亊師長保氏掌諌王惡而養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰䘮紀之容五曰軍旅之容六曰車馬之容以􅍇詔王告王以善道也諌者以禮義正之國子公卿大夫之子弟師氏教之而世子亦齒焉養國子以道者以師氏之徳行審諭之而後教之以藝儀也師保詔王以善諌王之惡王者既立乎無過之地矣又使教養國子而世子與焉是策之上也王制曰樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王太子王子群后之太子卿大夫元士之適子國之俊選皆造焉則古之教人者世子無不在也文王世子曰行一物而三善皆得者唯世子而巳其齒扵學之謂也故世子齒扵學國人觀之曰􅀅君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰将君我而與我齒讓何也曰有君在則禮然然而衆著於君臣之義也其三曰􅀅君我而與我齒讓何也曰長長也然而衆知長幼之節矣故父在斯為子君在斯謂之臣居子與臣之節􅀁以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而國治夫􅀅以宗廟社稷屬之可不教乎賈誼有言天下之命繫扵太子太子之善在扵早諭教與選左右三代之􅀁以長乆者以其輔翼太子有此具也文中子曰儲后不訓而晋業􅈥矣觀惠帝之失天下可無寒心也㢤荀卿曰聖王有百吾孰法焉欲觀聖王之跡則扵其粲然者矣後王是也道過三代謂之蕩法貳後王謂之不雅然則􅃕周其何適㢤孔子曰甚矣吾衰也乆矣吾不復夣見周公噫猶有望扵今之世乎直講李先生文集卷之十四終直講李先生文集卷之十五明堂定制圖序五宗圖序明堂定制圖序臣伏以明堂者古聖王之大務也􅀁以事上帝嚴先祖班時令合諸侯朝廷之儀莫盛扵此然而年世乆逺規模靡見經傳􅀁出參差不同群儒譸張各信其習脩墜補闕何􅀁適􅀙臣雖顓蒙嘗竊議扵斯矣臣謹按周禮考工記曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵大戴禮盛徳記曰明堂者自古有之凡九室一室有四戸八牖共三十六戸七十二牖禮記月令天子正月居青陽左个二月居青陽太廟三月居青陽右个四月居明堂左个五月居明堂太廟六月居明堂右个中央土居太廟太室七月居總章左个八月居總章太廟九月居總章右个十月居元堂左个十一月居元堂太廟十二月居元堂右个此三書者皆聖賢之􅀁作述學者之􅀁傳習而一事殊制乖逺如此注釋之家亦各未為精當考工記五室鄭康成觧之木室扵東北火室扵東南金室扵西南水室扵西北土室扵中央故聶崇義三禮圖其為明堂接太室四角以為四室盖用此也且既以五室象五行矣則木火金水之王當在東南西北之正何乃置之四角而云木室兼水火室兼木若必如是則中央之室復何􅀁兼㢤此􅀃誠未可用也盛徳記九室蔡伯喈之徒傳之接四室之角又為四室聶崇義誤以為秦人明堂圖者是也按秦實無明堂但後儒見月令有天子居明堂之文以月令是秦相吕不韋􅀁作春秋十二紀之首章疑為秦之明堂耳然今觀月令明堂十有三位無九室之說盖崇義誤取大戴九室之堂以為秦制也又鄭康成亦駮大戴云九室三十六戸七十二牖似秦相吕不韋作春秋時􅀁益者非古制也噫康成注禮記既知月令是吕不韋􅀁作春秋矣而月令豈有九室之文㢤何以􅂺駮大戴九室以為出扵吕氏春秋乎誠舛􅓎之甚也然其四室之角復為四室未知何􅀁施用􅀅以象五行享五帝乎則五室足以備之矣安用其餘􅀅以配十二辰乎則四隅各兩室重在一方之上覈其意義反覆不安此􅀃亦未可用也月令十三位本無此総数但以一大室四太庙八左右个其實十三位鄭康成注青陽左个則曰太寝東堂北偏云太寝者欲明明堂與太寝制同孔頴逹正義以為云東堂者則知聴朔皆堂不扵五角之室中且夫謂之廟與个者當湏各是一位豈同在一堂靡􅀁限隔而可稱為廟與个也盖康成既執明堂為五室若扵此十三位又為限隔則是室數頗多與巳意相違故曲飾其辭以為三位同在一堂貴不害扵五室之文耳此􅀃固不可用也至唐李林甫等注月令青陽左个則曰寅上之室青陽太廟則曰卯上之室青陽右个則曰辰上之室明堂左个則曰巳上之室明堂太廟則曰午上之室明堂右个則曰未上之室太廟太室則曰太廟明堂総名太室中央室也総章左个則曰申上之室総章太廟則曰酉上之室総章右个則曰戌上之室元堂左个則曰亥上之室元堂太廟則曰子上之室元堂右个則曰丑上之室􅀚此言太室䖏中央餘十二位各置其辰之上誠合扵理然其謂太廟明堂総名及十三位俱以為室則誤矣明堂之上既獨以子午卯酉為太廟則太廟安得為明堂捴名㢤十三位不俱謂之室觧見扵後又其人但知十三室各在其辰之上而不謀􅀁以建立之䖏且太室既居中矣若以餘室連太室而為之則四面各可置一室四角缺䖏又各可置一室復不􅀎令各在其辰之上其餘四室更何􅀁安就欲巧而成之愈乖扵方位矣或􅀅逺太室而為則未見有明文言之者是此􅀃亦未可用也後魏時有李謐者愍大禮之淪亡憤先儒之異議作明堂制度論以折􅂨扵世其指以月令為宗而采周禮大戴之言以參合之云其室居中者謂之太廟太室當太室之東者謂之青陽太廟當太室之南者謂之明堂太廟當太室之西者謂之総章太廟當太室之北者謂之元堂太廟以是為合扵周禮之五室又云四面之室各有便房謂之左右个共三十六戸七十二牖以是為合扵大戴戸牖之數今雖圖象莫存然按文察之謐之􅀁言竊􅀁未諭且太室四靣各為一室則四角缺䖏各方二筵二筵之地乃為兩便房如東南角二筵地便當為青陽右个及明堂左个矣他皆倣此基址既狹况地形斜角不知何以置之復何以􅀎令各在其辰之上夫分十二辰之位當湏尺歩平均然後􅀎正也豈有四靣之室既以二筵為一辰左右之个乃以二筵為兩辰㢤舉兹一隅又知其不足取法也臣愚竊謂考工記盛徳記月令三家􅀁指制度誠大同但立言質略意義弗􅂋訓傳之士泥文太過因而背馳李謐之志稍欲搴而合之矣柰不得其㫖尤而效之臣以月令之文最為明著􅂺亦取以為本而通之周戴月令雖秦人所作然皆追述古先聖王之道其中雖有官名時事不合周法者盖吕氏欲以古道行之扵時故稍或損益之豈可謂皆非古制欤夫以白虎通曰明堂上圎下方八窓四闥上圎法天下方法地八窓象八風四闥法四時九室法九州十二坐法十二月三十六戸法三十六雨七十二牖法七十二風斯言合扵事理因亦取之臣謹詳考工記是言堂基􅁱廣非謂立室之數東西九筵南北七筵是言堂上非謂室中東西之堂各深四筵半南北之堂各深三筵半若堂室共在九筵七筵之内則雖如鄭氏五室之制􅀙東至西亦湏三室巳據六筵之地外東堂止有一筵半西堂止有一筵半毎筵􅀷一丈三尺五寸従南至北又三室據六筵之地外南北之堂各􅅻半筵深四尺五寸狹隘甚矣况室數更多豈可容㢤盖記者上言堂上之􅁱廣次述室中之丈尺本非一貫而談也四堂東曰青陽南曰明堂西曰総章北曰元堂五室凡室二筵是言四堂中央有方十筵之地自東至西可營五室自南至北可營五室十筵中央方二筵之地既為太室矣欲連太室而作餘室則不􅀎令十二位各直其辰當湏扵東南西北四靣各虚方二筵之地四角缺䖏又各虚方二筵之地周而通之以為太廟而太室正居中􅀁謂太廟太室者言此太廟之中有太室也太廟之外當子午卯酉四位上各畫方二筵地以與太廟相通不為室􅀁謂青陽明堂総章元堂等太廟者也以其當青陽之堂上故曰青陽太廟餘三靣皆倣此或問扵臣曰􅀴􅀁謂太廟太室者當是青陽等四太廟居四方而太室在其中央故云太廟太室也子何湏謂太室四旁虚地為太廟而云太室在其中㢤臣對曰太室四旁既不得不有虚地既有虚地而經云太廟太室則太室四旁虚地非太廟而何且青陽等四太廟去太室猶隔二筵之地何以得云太室在四太廟中央乎又問曰子必云四太廟不為室而與十太廟相通者何㢤臣對曰中既有太廟子午卯酉又各名太廟而地實相接則不得不相通也當寅申巳亥辰戌丑未八位上各畫方二筵地以為室􅀁謂左个右个者也八个之室并太室而九􅀁謂九室也室四面各有戸戸旁夾兩牖􅀁謂三十六戸七十二牖也青陽明堂総章元堂四太廟前面各為一門出扵堂上門旁夾兩窓􅀁謂八窓四闥也以廟之與堂當有􅀁限隔故各為一門也謂之闥者小門也以太廟􅀁出故其制異扵群室之戸耳窓牖異者亦以廟門旁変扵室中之制也四廟九室共十三位而白虎通云十二坐當是畧中央土􅀁居矣左右之个其實皆室但以分䖏左右形如夾房故有个之名也太廟之内此謂太室四旁二筵地非青陽等太廟也以及太室其實祀文王配上帝之位也謂之廟者義當然矣土者分王四時􅀒載萬物扵五行最尊故天子當其時居太室用祭天之位以尊嚴之也四仲之月各得一時之中與餘月有異故復扵子午卯酉之方取二筵地假太廟之名以聴其朔也此謂青陽等太廟也或問扵臣曰太室四旁各二筵之地既為太廟又已當子午卯酉之正人君若尊嚴仲月何不止扵此聴朔而乃復扵其外别取二筵地假太廟之名㢤臣對曰太室四旁各二筵地雖為太廟而當子午卯酉之正可以聴仲月之朔矣然若以此二筵地便為子午卯酉之位則餘辰又不正矣與夫連太室而為室何異㢤秪如以太室東戸前二筵地便為卯位聴仲春之政南戸前二筵地便為午位聴仲夏之政則辰已二位湏過在東南一角豈復􅀎當青陽右个明堂左个之上㢤故宜各扵太廟之外别取二筵地與左右个並列而假太廟之名然後􅀎使十二辰皆正也若是則三家之指􅂚有異㢤但周禮言基而不及室大戴言室而不及廟稽之月令則􅇱矣然非白虎通亦無以知窓闥之制也臣又詳鄭􅀃明堂九階南靣三階三靣各兩階且毎靣各三位而獨南靣三階其餘各兩階求其義則靡􅀁法象揣扵事則不便􅅩降今􅀚聶崇義􅀁謂秦人明堂圖者其制有十二階似恐古之遺法也當亦取之禮記外傳曰明堂四面各五門今按明堂位曰九夷之國東門之外八蛮之國南門之外六戎之國西門之外五狄之國北門之外九采之國應門之外時天子􅀒斧扆南嚮而立南門之外者北面東上應門之外者亦北靣東上是南門之外有應門也既有應門則不得不有臯庫雉門矣明堂者四時􅀁居四面如一南靣既有五門則餘三靣皆有五門矣鄭康成注明堂位則云正門謂之應門孔頴逹正義曰正門謂之應門者以明堂更無重門非路門外之應門天子宮内有路寝故應門之内有路門明堂既無路寝故無路門及以外諸門但有應門耳且既有東南西北門矣而又有應門非重門而何歟􅀚其本意當謂變南門之文以爲應門也又但見王宫有路門其次乃有應門今明堂無路門之名而但有應門便謂更無重門而南門即是應門矣且路寝之前則名路門其次有應門明堂非路寝乃變其内門之名爲東門南門而次有應門夫復何害扵義抑夷蠻戎狄之君既在四門之外而外無重門則是列扵郊野道路之間矣豈朝㑹之儀而草草若是乎王宮常常􅀁居猶設五門以限中外明堂者效天法地尊祖配帝而止一門以表之是豈恊扵亊宜也則四靣各五門斷在不疑矣臣又詳鄭康成注考工記夏后氏世室則云世室者宗廟也商人重屋則云重屋者王宫正堂若太寝也周人明堂則云明堂者明政教之堂也此三者或舉宗廟或舉正寝或舉明堂互言之以明其同制又注玉藻曰天子廟及路寝皆如明堂制仍與諸儒抗荅多方援引固以為三者同制後學承之莫有非者臣愚竊謂之不然矣苟路寝有四時之位則天子自可坐而聴朔奚用逺赴明堂若以尊嚴國政當假祭天之廟以聴之則事畢而還復扵路寝居其時之堂何􅀁為也宗廟之祭堂事室事一靣而足四方之堂未聞􅀁施設也雖世室有五室之􅀃亦未必如鄭注有四堂也既曰明堂􅀅以事上帝也宗廟􅀅以尊先祖也而以已之正寝與之同制盖非尊祖事天之意也矧鄭之此􅀃並由胷臆必謂明堂宗廟路寝同為五室三代皆然但􅁱廣之度固時而變周監二代其為宗廟則法􅁱廣扵夏其為路寝則取尋尺扵商其為明堂則自為度筵之制實皆不改扵五室焉此􅀃既非經見安用迂闊而談奚不直謂周家作宗廟則法扵夏路寝則法扵商明堂則自為之各求其制以示扵世乎得非康成見世室有五室既以五行推之明堂之文復有五室求其􅀃而不􅀗及重屋之下都無室數遂乃巧為之辭以謂其制皆同乎又當見明堂位稱太廟天子明堂庫門天子臯門雉門天子應門以為魯行天子之禮魯之太廟既如明堂則周之太廟亦如明堂矣臣謂若周之太廟制如明堂魯之太廟又如明堂則是魯之太廟如周之太廟也何不曰太廟天子太廟而云明堂㢤斯盖魯行天子禮樂享帝吿朔當倣扵周然以人臣不敢立天子政教之堂故扵周公之廟畧擬明堂之制以備其禮非周之宗廟如明堂也或問扵臣曰路寝制如明堂雖經無明文然太史職云閏月詔王居門終月先儒皆以為天子閏月聴朔扵明堂門中還而又䖏扵路寝門也既閏月聴朔扵明堂門中還而又䖏扵路寝門則是常月聴朔扵明堂之上還而䖏扵路寝之上其居位亦當如在明堂中時也然則路寝亦如明堂有四時之位明矣臣對曰太史職閏月詔王居門終月盖止是朔日詔王居明堂之門聴一月􅀁當行之事終盡而返耳豈復有明文言還䖏路寝門㢤盖鄭氏之徒欲明三者同制妄生枝葉以言之也又况蔡伯喈以爲明堂太廟太室太學辟廱雖名别而事同其爲紕􅓎不已甚乎􅀽凖正論駮之詳矣大戴亦云其外有水名曰辟廱扵斯則誤也若其建置之􅀁則淳于登云明堂者在國之陽三里之外七里之内丙巳之地玉藻聴朔扵南門之外康成之注亦與是相合夫稱明也宜在國之陽事天神也宜在城門之外建置之􅀃兹焉可取扵戯􅈒人既往禮器凋敝先王大法散在簡策而言近指逺學者多迷專門自用互相非毀故自漢興迄于有唐布政之宮屡曽營繕而規爲鹵莾莫合聖制群議交闘誰􅀅正之明君賢士疚心乆矣臣生長草野涵泳恩澤仰兹大典輙􅀁究尋伏惟國家拓境踰四溟太平僅百載徳義充溢禮教興行封泰山祀汾隂耕籍田郊見上帝遺文逸羙扵是交舉聖神之􅂨殆􅀅經始扵斯堂乎四方有識注望多矣臣身雖賤㣲亦願此時稍禆萬一自託不朽故今敢先以􅀁見制度具圖以獻圖凡以九分當九尺之筵東西之堂共九筵南北之堂共七筵中央之地自東至西凡五室自南至北凡五室毎室二筵則取扵周禮考工記也一太室八左右个共九室室有四戸八牖共三十六戸七十二牖則恊扵大戴禮盛徳記也九室四廟共十三位則本扵禮記月令也四廟之靣各為一門門夾兩窓是為八窓四闥則稽扵白虎通也十二階則采扵聶崇義三禮圖也四靣各五門則酌扵明堂位禮記外傳也堂之下門之内本無脩廣之數故今但圖五重門即不計其丈尺舊􅀃明堂宫方三百歩自可因宜䖏置也或問扵臣曰皐庫雉應門之號四靣皆同何也臣對曰四堂者皆天子􅀁居􅀁居之靣皆若王朝焉無東西南北之異也今但変其内門之名以誌四方而應門以外諸門不改焉耳又問曰既云路寝不與明堂同制而明堂之門乃假王宮諸門之名何也臣對曰明堂之上􅀁以事天尊祖布政教之􅀁也故不與王寝同制門者限内外通出入而舊圖無􅀁法象但以天子聴政􅀁居象如王朝故假宮門之名亦何害扵理況取諸書畧無偏棄異同之論庶可息焉古先之模或在扵是號曰眀堂定制圖鴻覆無私儻垂甄録施之扵用必有可􅀚若夫棟宇之髙卑土木之文飾至尊􅀁居之服御上神􅀁享之儀物此禮官學士之職非小臣之􅀎盡也輕議國容罪當殊死謹上五宗圖序大傳曰别子為祖注云别子謂公子若始来在此國者後世以為祖也又曰繼别為宗注云别子之世適也族人尊之謂之大宗是宗子也又曰繼禰者為小宗注云父之適也兄弟尊之謂之小宗又曰有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之􅀁自出者百世不遷者也宗其繼髙祖者五世則遷者也注云遷猶變易也繼别子别子之世適也繼髙祖者亦小宗也先言繼禰者據别子子弟之子也以髙祖與禰皆有繼者則曽祖祖亦有也則小宗四與大宗凡五􅀃者曰别子謂公子諸侯之庶子也若細别言之則妻之􅀁生為適妾之􅀁生為庶若秪據正體言之則妻之長子為適其次子以下及妾􅀁生通得謂之庶子也諸侯之適子適孫繼世為君而庶子不得禰先君故自與其後世子孫爲始祖也云若始来在此國者謂非君之親或是異姓始来在此國者亦得謂之别子自與其後世子孫爲始祖也别子之適子世繼别子爲大宗族人尊之雖五世以外皆爲之齊衰三月爲其母妻亦然􅀁謂百世不遷者也其别子之庶子不得禰别子則自使其適子繼巳而爲小宗􅀁謂繼禰者爲小宗也繼禰則與親兄弟爲宗也又其適子則繼祖與同堂兄弟爲宗也又其適子則繼曾祖與再從兄弟爲宗也又其適子則繼髙祖與三􅀙兄弟爲宗也其庶子皆不得繼禰各自使其適子繼已而爲小宗焉是自髙祖之後至玄孫凡四世就此第四世小宗之三從兄弟而言則其人有小宗四矣宗其繼禰者親兄弟也又與之共宗扵繼祖者同堂兄弟也又與之共宗扵繼曽祖者再􅀙兄弟也又與之共宗扵繼髙祖者三從兄弟也然則四宗備矣又與四宗共宗扵大宗是爲五宗也其扵小宗各以本服服之親兄弟齊衰期也同堂兄弟大功也再􅀙兄弟小功也三從兄弟緦麻也至第五世繼髙祖之父者與四從兄弟無服不復爲之宗􅀁謂五世則遷者也若世數尚少則小宗或有三或有二或有一其曰小宗四者盖極言之耳不必皆然也凡人生子或衆或寡今此圖盡為二子以甲乙第之斯盖設法貴扵省文若庶子之多者可以此例推之也甲者皆適也乙者皆庶也適者皆為小宗庶者皆不繼禰其旨甚明弗復盡注賛曰吾扵三宗見孝弟之至焉髙祖以上逺矣而數十百世尊其正體不忘祖也何孝如之􅃝免以外䟽矣而合之以食序以昭穆厚同姓也何弟如之先王之􅀁以治天下此其本歟周衰法弛斯道以亡庶匹適者有之矣幼陵長者有之矣祖以世斷逺則忘之矣族以服治䟽則薄之矣骨肉或如行路尚何有扵天下乎扵戯書燔簡脫幸存其畧而學者弗之察吾甚病焉故表之以圖云直講李先生文集卷之十五終直講李先生文集卷之十富國策十首後學南城左賛編輯後學廣昌何喬新校正富國策第一愚竊􅀚儒者之論鮮不貴義而賤利其言非道徳教化則不出諸口矣然洪範八政一曰食二曰貨孔子曰足食足兵民信之矣是則治國之實必本扵財用盖城郭宫室非財不完羞服車馬非財不具百官群吏非財不養軍旅征戍非財不給郊社宗廟非財不事兄弟婚媾非財不親諸侯四夷朝覲聘問非財不接矜寡􅀌獨凶荒札瘥非財不恤禮以是舉政以是成愛以是立威以是行舍是而克為治者未之有也是故賢聖之君經濟之士必先富其國焉􅀁謂富國者非曰巧籌筭析毫末厚取扵民以媒怨也在乎強本節用下無不足而上則有餘也節用之􅀃何如曰凡言國計者未嘗不以儉徳藉其口也而皆不得其􅀃必以茅茨土階冬裘夏􅁑為帝王之徳是乃非聖無法不近人情宜乎人主之弗聴也貴為天子富有四海而使齪齪吝嗇下同匹夫不得自廣則安用尊卑為㢤周制王有六寝后有六宮内官百有二十人女奴不在其數食用六榖膳用六牲飲用六清羞用百有二十品珍用八物醤用百有二十罋衣有文繡器有寳玉次舍共具􅀁至無闕用四代之禮􅇱四夷之樂玩好有焉匪頒有焉好用有焉王及后之用財皆不㑹計其􅀁以自廣何如㢤若是而従墨翟之道晏嬰之學以儉陋為是則周公之制作果非乎故曰凡皆言儉徳者皆不得其􅀃也愚以為時有不同事有通変用之不足則禮􅀙而殺亦聖人之意也有周而上兵農未分天子六軍諸侯大國三軍次國二軍小國一軍皆出扵民居則為比閭族黨州鄊行則為伍兩卒旅師軍必耕而食必􅅙而衣國之經費兹不與焉故以九州之財奉千八百君而有餘也秦漢而下兵農漸異衣食縣官者動數百萬内嚴宿衞外驅戎狄轉運千里賞賜鉅萬國之經費日以廣焉故以九州之財奉一君而不足也當其有餘之時用之可以盈禮遇于不足之際則宜深自菲薄如周之制尚當裁减甚扵周者非敢聞也小過曰君子以用過乎倫語曰奢則不孫儉則固與其不孫也寧固儉非聖人之中制有時而然不得巳也故孝文帝躬衣弋綈革舄韋帶􅀁幸慎夫人衣不曵地欲為一臺度用百金廢而不為夫豈不知􅀃耳目便身體極至尊之用㢤盖念不傷財不害民損上益下之道也故其十二年而賜民租稅之半明年遂除民田之租稅孝景之時乃令民半出田租三十而稅一至武帝之初七十年間人給家足都鄙廪􅁃盡滿而府庫餘財京師之錢貫朽而不可校大倉之粟陳陳相因語後世之盛王必稱文景其故何㢤以䏻適時之変過自菲簿而然也扵惟一祖二宗創業属統功徳至矣延洪于我后靡不勤且儉矣而今羗戎背惠邊境暴師勞費不息帑蔵不實此其過自菲薄損上益下之時也伏惟日損之又損之以文景之心為心則天下幸甚富國䇿第二民之大命榖米也國之􅀁寳租稅也天下乆安矣生人既庶矣而榖米不益多租稅不益増者何也地力不盡田不墾闢也周制井田一夫百畒當今四十一畒有竒人無易業而一心扵農農時不失農功不粗則地力可盡也既又賦之以莱或五十畒或百畒或二百畒課其餘力治其曠土則田可墾闢也經界既毀王法弗復然猶􅀎者時出焉李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畒治田勤謹則畒益三斗不勤則損亦如之地方百里之増减􅂺為粟百八十萬石矣漢搜粟都尉趙過􅀎為代田一畒三􅎌一夫三百􅎌而播種扵􅎌中苗生葉以稍耨隴草因隤其土以附苗根盛暑隴盡而根深􅀎風與旱一􅀊之􅀵常過縵田一斛以上善者陪之此盡地力之效也孝景詔曰郡國或磽狹無􅀁農桑或地饒廣薦草莾水泉利而不得徙其議民欲徙寛大地聴之此墾田之意也今者天下雖安矣生人雖庶矣而務本之法尚或寛弛何者貧民無立錐之地而富者田連阡陌富人雖有丁強而乗堅驅良食有梁肉其勢不􅀎以力耕也專以其財役使貧民而巳貧民之􅃛者則逐末矣冗食矣其不􅀎者乃依人荘宅為浮客耳田廣而耕者寡其用功必粗天期地澤風雨之急又莫􅀎相救故地力不可得而盡也山林藪澤原隰之地可墾闢者往往而是貧者則食不自足或地非已有雖欲用力末由也巳富者則恃其財雄膏􅃾易致孰肯役慮扵菑畬之事㢤故田不可得而墾闢也地力不盡則榖米不多田不墾闢則租稅不増理固然也今􅀅救之則莫若先行抑末之術以􅇌㳺民㳺民既㱕矣然後限人占田各有頃數不得過制㳺民既㱕而兼并不行則土價必賤土價賤則田易可得田易可得而無逐末之路冗食之幸則一心扵農一心扵農則地力可盡矣其不􅀎者又依富家為浮客則富家之役使者衆役使者衆則耕者多耕者多則地力可盡矣然後扵占田之外有􅀎墾闢者不限其數昔􅄯錯言扵文帝募天下入粟縣官得以拜爵今宜逺取秦漢􅁠設爵級有墾田及若干頃者以次賞之富人既不得廣占田而可墾闢因以拜爵則皆􅀅以財役傭務墾闢矣如是而人有遺力地有遺利倉廪不實頌聲不作未之信也管子曰與之在君奪之在君貧之在君富之在君惟上􅀁裁擇富國策第三貨莫貴乎金賄莫重乎帛􅀁貴乎金者以其器成而可革革之而不耗也􅀁重乎帛者以其用功甚省而有益扵寒也今兹乗輿之器享燕之用内賞賜群臣外交通四夷必不可毋用金銀百官在位六軍在籍夏有暑冬有寒必不可毋用􅁝帛何以使金多而足用帛賤而易致㢤愚以爲東南之郡山髙者鮮不鑿土深者鮮不掘失職之民網漏之姦晝夜合作足蹈重泉而不憂扵䧟首戴川澤而不虞扵壓鑛石雲涌鑪炭之熖未之有熄一泥一沙蔑遺利矣是金非不出也平原沃土桑柘甚盛􅅙女勤苦罔畏飢渇急采疾食如避盗賊繭簿山立繰車之聲連甍相聞非貴非驕靡不務此是􅁝非不多也金盡出而用不足盖用之者衆也􅁝雖多而帛不賤盖不專以為帛也古者以金銀為幣與泉布並行既而稍用為器飾然亦未甚著也今也翕然用之亡有品制守閭閻者唯財是視自飲食頮沐之器玩好之具或飾或作必以白金連斤絫鈞以多為愜財愈雄者則無􅀁不至矣舉天下皆然故金雖盡出而用益不足也古者錦文不粥扵市不示民以奢也今也庶民之家必衣重錦厚綾羅縠之衣名状百出弗可勝窮工女機杼交臂營作爭為纎巧以漁倍息其為帛者盬工惡􅁝而巳故􅁝雖多而帛不賤也金不足則價騰躍價騰躍則出􅀖布而市之費日増焉猶不􅀎登其數則率民而買之彼農民未嘗蓄金銀一旦當具則必資扵豪黨資扵豪黨則或壞其産焉官增其費民壊其産此實弊之大也帛不賤則貧民弗可得貧民弗可得則紵絮不足以禦冬而凍者多矣宮之稅買其價弗損而唯行濫之得帛行濫則軍吏之衣莫􅀎完固而貧者多矣官價弗損人民多凍軍吏多貧此亦弊之大也今􅀅救之則莫如明立制度其用金銀上下有等多少有數匹庶賤􅀋毋得僣擬則金不可勝用也君子小人服章有别民非布帛毋得輙衣工機之功􅀅復其本則帛不可勝用也果􅀎此道矣是宿弊之源可坐而塞也孔子曰為政先禮禮其政之本乎制度禮之實也善為政者得無留意㢤富國策第四或曰前􅀁謂􅇌㳺民而㱕之謂逐末也冗食也末者何事冗者何名其􅀁以􅇌之請言其術曰􅀁謂末者工商也􅀁謂冗者不在四民之列者也古者工不造琱琢商不通侈靡偽飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二故工之􅀁作賈之􅀁粥商之􅀁資皆用物也用物有限則工商亦有數今也民間􅁋侈亡度以竒相曜以新相夸工以用物為鄙而競作機巧商以用物為凡而競通珍異或旬月之功而朝夕敝焉或萬里之来而墜地毀焉物亡益而利亡筭故民優為之工商􅀁以日多也古者祀天神祭地祗享人􅀑它未聞也今也釋老用事率吾民而事之為緇焉為黄焉籍而未度者民之為役者無慮㡬百萬廣占良田利宅媺衣飽食坐談空虚以誑曜愚俗此不在四民之列者也古者府史胥徒官有定數今也郡縣之治未免寛貸冐名待闕傭書雇納請嘱之流動以千計内滿官府外填街陌交相賛助招􅁠為姦狗偷􅅙食竭人膏血此又不在四民之列者也古者執左道以亂政殺假扵􅀑神時日卜筮以疑衆殺周禮有醫師掌疾醫痬醫以治萬民之疾病疕痬其員不過十數今也巫醫卜相之􅀋肩相摩轂相擊也或托􅁋邪之􅀑或用亡驗之方或䡖言天地之數或自許人倫之鑒迂恠矯妄獵取財物人之信之若司命焉此又不在四民之列者也古者天子諸侯大夫士用樂庶人無用樂之文况新樂之發子夏􅀁不語匹夫熒惑諸侯孔子誅之今也里巷之中皷吹無節􅁔舞相樂倡優擾雜角觝之戯木棊革鞠養玩鳥獸其徒之數群行􅀋聚往来自恣仰給扵人此又不在四民之列者也一夫不耕或受之飢一女不織或受之寒而不耕者凡㡬夫不織者凡㡬女柰何民不飢且寒也百姓不足君孰與足民飢寒而上不匱者未之有也欲􅇌工商則莫若復樸素而禁巧偽樸素復則物少價巧偽去則用有數利薄而不售則或罷㱕矣如此則工商可􅇌也欲􅇌緇黄則莫若止度人而禁修寺􅀚止度人則未度者無􅀁待而皆罷㱕矣禁修寺􅀚則巳度者不安其居而或罷㱕矣其不㱕者後數十年物故盡矣如此則緇黄可􅇌也欲􅇌官府之姦則莫若申明憲令慎擇守宰法嚴而吏察則無􅀁措手無􅀁措手則不得不罷㱕矣如此則官府之姦可􅇌也欲􅇌方術之濫則莫若立醫學以教生徒制其員數責以精深治人不愈書以為罪其餘妖妄託言禍福一切禁絶重以遘募論之如法為之既艱則不得不罷㱕矣如此則方術之濫可􅇌也欲􅇌聲伎之賤則莫若令民家毋得用樂衣􅃣之㑹勿納俳戯申命􅀜防呵其過往用之既少則不得不罷㱕矣如此則聲伎之賤可􅇌也􅇌之有術復之有業然而不力扵農者未之信也富國策第五或曰釋老之弊酷排者多矣然以脩心養真化人以善或有益扵世故聖賢相因重其改作今欲􅇌緇黄而㱕之無乃巳甚乎曰夫􅀁謂修心化人者舍吾堯舜之道􅀅安之乎彼修心化人而不由扵禮苟簡自恣而巳矣昔孟子之闢楊墨曰楊氏為我是無君也墨氏兼愛是無父也今山澤之臞務為無求扵世呼吸服食謂夀可長非為我乎浮屠之法棄家違親鳥獸魚鼈毋得殺伐非兼愛乎為我是無君兼愛是無父無父無君不忠不孝况其弗及者則罪可知矣故韓愈曰釋老之弊過扵楊墨也然而曰人其人火其書廬其居則言之太􅁀􅇌之㒵漸何者飽食安居其習巳乆一旦歛數十百萬人而􅃣之則警擾甚矣故前􅀁謂止度人而禁修寺􅀚者漸而􅇌之之術也緇黄存則其害有十緇黄去則其利有十男不知耕而農夫食之女不知􅅙而織婦衣之其害一也男則曠女則怨上感隂陽下長􅁋濫其害二也幼不為黄長不為丁坐逃繇役弗給公上其害三也俗不患貧而患不施不患悪而患不齋民財以殫國用以耗其害四也誘人子弟以披以削親老莫養家貧莫救其害五也不易之田樹藝之圃大山澤藪跨據畧盡其害六也營繕之功􅀊月弗巳驅我貧民奪我農時其害七也材木瓦石兼􅀵並采市價騰踊民無室廬其害八也門堂之􅅚器用之華刻畫丹漆末作以熾其害九也惰農之子避吏之猾以傭以役􅀁至如㱕其害十也果去之則男可使耕而農夫不輟食矣女可使􅅙而織婦不輟衣矣其利一也男則有室女則有家和氣以臻風俗以正其利二也戸有増口籍有増丁繇役乃均民力不困其利三也財無􅀁施食無􅀁齋民有羡餘國以充實其利四也父保其子兄保其弟􅃣焉帶焉沒齒弗去其利五也土田之直有助經費山澤之富一㱕衡虞其利六也營繕之勞悉巳禁止不驅貧民不奪農時其利七也良材宻石亦既亡用民得築蓋官得繕完其利八也􅁋巧之工無􅀁措手棄末反本盡縁南畮其利九也宮毀寺壊不傭不役惰者猾者靡􅀁逋逃其利十也去十害而取十利民人樂業國家富強萬世之策也何惮而不為㢤􅀅以存而勿論乎則董仲舒以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之􅀃滅息然後統紀可一而法度可明民知􅀁􅀙矣􅀅以為民祈福乎則詩云豈弟君子求福不回此皆賢人之至論先聖之法言也少留神明孰禦焉富國策第六古人有言曰榖甚賤則傷農貴則傷末謂農常糶而末常糴也此一切之論也愚以為賤則傷農貴亦傷農賤則利末貴亦利末盖農不常糶有時而糴也末不常糴有時而糶也以一􅀊之中論之大抵歛時多賤而種時多貴矣夫農勞扵作劇扵病也愛其榖甚扵生也不得已而糶者則有由焉小則具服器大則營昬䘮公有賦役之令私有稱貸之責故一榖始熟腰鎌未觧而日輸扵市焉糶者既多其價不得不賤賤則賈人乗􅀔而罔之䡖其幣而大其量不然則不售矣故曰歛時多賤賤則傷農而利末也農人倉􅅒既不盈竇窖既不實多或數月少或旬時而用度竭矣土􅀅生而或無種也耒􅀅執而或無食也扵是乎日取扵市焉糴者既多其價不得不貴貴則賈人乗􅀔而閉之重其幣而小其量不然則不予矣故曰種時多貴貴亦傷農而利末也農之糶也或闔頃而􅀵連車而出不䏻以足用及其糴也或倍稱賤賣毀室伐樹不􅀎以足食而坐賈常規人之餘幸人之不足􅀁為甚逸而􅀁得甚饒此農􅀁以困窮而末􅀁以兼恣也易繫辭曰何以聚人曰財理財正辭禁民為非曰義財者君之􅀁理也君不理則蓄賈專行而制民命矣上之澤扵是不下流而人無􅂓矣此平糴之法有為而作也管仲行扵齊李悝行扵魏耿夀昌行扵漢國不失實人􅀗其利自晋迄隋時或興廢厥聞未昭唐天寳中天下平糴殆五百萬斛兹全盛之事也大宋受命􅀅百年矣穀入之蔵􅀁在山積平糴之法行之乆矣盖平糴之法行則農人秋糶不甚賤春糴不甚貴大賈蓄家不得豪奪之矣而官之出息常什一二民既不困國且有利兹古聖賢之用心也然其􅀁未至則有三焉數少也道逺也吏姦也一郡之糴不數千萬其餘畢入扵賈人至春當糶寡出之則不足扵饑也多出之則可計日而盡也扵是賈人深蔵而待其盡盡則􅁠㱕於賈人矣是數少之弊也倉儲之建皆在郡治縣之逺者或數百里其貧民多糴則無資少糴則非可朝行而暮㱕也故終弗得而食之矣是道逺之弊也舉掌之人政或以賄㮣量不均行濫時有及其出也或减焉或雜焉名曰裁價實則貴矣是吏姦之弊也今若廣置本泉増其糴數則蓄賈無􅀁專利矣倉儲之建各扵其縣則逺民可以得食矣申命州部必使㢘􅀎則姦吏無以侵刻矣如此利國便人事可經乆是謂通􅁿重之􅁠不可不察富國策第七水旱之憂聖王􅀁不免堯湯之事賢愚嘗共聞也故君人者務多蓄積以為之備王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通雖有㓙旱水溢民無菜色周禮遺人掌􅀖之委積以待施惠郷里之委積以恤民之囏阨門􅀜之委積以養老􅀌郊里之委積以待賔客野鄙之委積以待覉旅縣都之委積以待凶荒此皆計國用之餘随便蓄積以湏乏困故時可灾物可夭苗可稿地可赤而人不可飢也自井田法壊軍國務煩政取一切或未猶逺兵有儲邉有備則國之幸矣吏之􅀎矣元元之民自為之而巳矣夫民之無知靡衣媮食豐嵗粒米狼戾有不愛也食之亡節用之亡度或委於糞土或腐扵甑甗或以飫狗馬或以肥雞䳱計口論費㡬何而不倍蓰也及其㓙年則家不素蓄人不豫備室如罄矣突不黔矣草木之根實不足以飽矣扵是強者為盗賊弱者轉而死溝􅊤父母妻子不􅀎相保此禍亂之階善為國者􅀁宜留意也嚮者天地嘗有灾矣百姓嘗有飢矣使以安撫為號者擁節而宵征吏以勸誘為辭者弗絶扵耳或出御府之金或下鬻爵之令君心勤止不翅慈母然而榖生有時不可以坐而待也儲峙有數不可以􅀙天降也求之甚至得之㡬希以此振民不亦難矣愚􅀼跡古制之宜扵時者莫若義倉之為愈也盖豐年損其有餘儉年救其不足事至纎悉功垂無窮故惰開皇中始立社倉終於文皇得無飢饉唐太宗曰既為百姓先作儲貯官為舉掌以備㓙年非朕􅀁湏横生賦歛利人之事深足可嘉今宜扵天下縣治各建倉廪踵唐之制以義為名然唐之用心固善矣歛散之法則未盡得宜彼計民稼種以畮稅之及無田者亦各有差則䏻入粟之人非窮民也至㓙年則入粟之家或自有貯俻不當賙救扵是窮民享之矣出此而入彼有䘮而無得奚以異扵厚歛乎今莫若以農末之民各分戸等毎扵秋成以次入粟謂之􅀉留至㐫年則下戸之乏食者凖數給還其上戸則轉以給窮民書其轉給之數積以􅀊年數登若干者拜以爵級以寵異之則富人樂輸窮民受賜矣與夫臨事而鬻爵無粟而虚求不可同日而語也富國䇿第八昔在神農日中爲市致民聚貨以有易無然䡖重之數無􅀁主宰故後世聖人造幣以􅁠之其始以珠玉爲上幣黄金爲中幣白金爲下幣但珠玉金銀其價重大不適小用惟泉布之作百王不易之道也根周苗漢蔓于隋唐或因或革模法亡常獨開元之號最得中制相承遂至于今斯固先史商之乆矣大抵錢多則䡖䡖則物重錢少則重重則物䡖物重則用或闕物䡖則貨或滯一重一䡖利病存乎民矣至以國計論之莫若多之為貴何者用有常數不可裁减故也朝家治平日乆泉府之積嘗朽貫矣而近􅀊以来或以虚竭天下郡國亦罕餘見夫泉流布散通扵上下不足扵國則餘扵民必然之􅀔也而今民間又鮮蔵繦之家且舊泉既不毀新鑄復日多宜增而却損其故何也錢非温也不可衣而弊之也非脆也不可食而盡之也然而安在㢤是有姦人銷之也姦人􅀁以得銷者以惡錢容扵市銅像銅器容於寺觀也竊􅀚人間或銷法錢殽雜他巧以為惡錢其作必扵重湖大江窮山深谷風濤􅀁阻猛獸􅀁在人不得見吏不得呵是法令無由而勝也銷一法錢或鑄四五市人易之猶以二三則常倍息矣民既蓄惡錢不可使勿用利之􅀁在是法令亦無由而勝也國失法錢而民得惡錢惡錢終不可為國用此錢􅀁以益少也又緇黄之家競禮銅像易模変巧動必滿堂鐃鉦鐘磬之器􅀁在雷震謂􅂑扵官則有害冶鑄其私則以錢為之耳新故渾殽公私莫辨是法令亦無由而勝也用之廣矣利數倍矣故槖焉而熖鍜焉而聲者往往而是披榛而行􅂨甲而商者不絶扵道緩則恣􅀁為急則闘而死是法令亦無由而勝也像則日新器則日長其􅀁銷者寧有紀極此錢􅀁以益少也今欲絶盗鑄莫若去惡錢去惡錢非急誅之謂也欲辨銅像銅器莫若一取而銷之勿得復用也何謂絶盗鑄莫若去惡錢夫盗鑄之人散在幽逺卒以法繩之則吏必苛察獄必􅁈濫閭里之間􅀅不安居焉苟有利矣雖死而必求苟無用矣雖縦之弗為惡錢去則盗鑄者無用無用則盗鑄自絶矣故曰絶盗鑄莫若去惡錢也何謂去惡錢非急誅之謂也今人間既多惡錢一旦急之則莫敢出莫敢出則是銷法錢之銅而積之無用之地國既失實民且傷財固莫若下令收惡錢而銷之除其殽雜償以銅價示之期日要之重典民既畏法而喜扵得直􅀅畢入扵官官挾其銅因以資冶鑄則法錢益増惡錢盡去矣故曰去惡錢非急誅之謂也何謂欲辨銅像銅器莫若一取而銷之勿得復用也今寺觀擳比像器之設遽數不終必詰之曰作之新乎因之故乎取之官乎得之私乎則是増吏貟不足以按廣獄城不足以繫令愈急而姦愈生非術之善也若一取而銷之勿得復用則銅積足以資冶鑄工巧無􅀁措其手銷錢之弊不禁而止故曰欲辨銅像銅器莫若一取而銷之勿得復用也至扵蠻夷之國舟車􅀁通竊我泉貨不可不察古之人曰錢者亡用器也而可以易富貴富貴者人主操柄也果慎斯術則操柄無失而群下服􅀙有國之急務也富國策第九縣官食租衣稅古之道也自漢而下兵益興經費益不足日生他名猶罔克濟􅀔不可巳非上失也山澤之富天地􅀁以養人者鬻塩之利博矣故東郭咸陽致生累千金吴王濞富埒天子孝武因置鹽鐡官是時國用饒給而民不益賦未必不由此也朝家酌古鹽法有因有革或引之池或汲之井或熬之海一出公上人不􅀎私此其因者也東南列郡官自斥賣舟運銜尾倉儲如坻商旅之行歛手無措此其革者也然先王之制未有始善而末不弊者盖作法之時上心切至吏皆圖功人皆畏法而姦謀未生始以是善也絫世之後事同凡常吏或觧弛人或慣習而姦謀日生末以是弊也官初糶鹽時操其贏甚厚而郡國鹽積常不足扵糶今之郡國昔之郡國也戸口蕃息則倍蓰矣而糶益少鹽益滯者何也是姦謀入焉耳彼鹽之来逺者逾江湖􅀊扵波月扵風焉近者亦百數十里維堤堰宿葭菼焉軍之窮吏之狡者家扵是食扵是私賣其什之㡬而足以它物固其常也既輦而倉則舉掌之人又私賣其什之㡬而足以它物無慮公鹽常失其半而半它物焉民之食鹽既多私賣者矣而公鹽之出不可賖貰故坐肆占賣者郡􅅻數十以數萬家之食仰數十戸之鹽一銖一兩不可與官為市必取扵斯人之徒其􅀔必小其權量増以糞土常不啻以倍價取半鹽矣公鹽貴而汙私鹽賤而潔山澤之甿城邑之豪競食之而竊販者亦交馳焉是則民雖衆多或食私鹽或食糞土利輸扵姦而官之糶益少鹽益滯矣令非緩也法非䡖也利之􅀁誘雖日刑人號痛之聲動乎天地弗􅀎禁也故今日之宜莫如通商商通則公利不减而鹽無滯也何謂商通則公利不减夫官自糶鹽利信厚矣然舟有壊倉有堕官有俸卒有糧費巳多矣若官鬻鹽而糶與商人使自行之既權其息因取􅀜市之稅而費省焉是公利不减也何謂商通則鹽無滯夫商人衆而務售則鹽不殽雜􅀁至之地又以貰于市人則列肆多得斥賣賣者多而務售則鹽亦不殽雜昔啖糞土者今皆食鹽昔憙竊販者今皆公行鹽之用益廣是以無滯也公利不减而鹽無滯財用以足刑罰以清治世之懿也或曰官鬻鹽而糶與商人有息焉有稅焉息寡而稅薄則公利損息多而稅厚則商不来何如曰不若寡薄之爲愈也寡薄則何以使公利不損曰東南和糴㡬二百萬轉漕之費不爲不多矣今糴鹽與商以米㩁折則數百萬斛可坐致淮海是扵公利豈少也㢤易曰通其變使民不倦此通變之時不可忽也富國策第十或曰天下之貨茶最後出而國用賴焉今兹有􅀃乎曰茶非古也源扵江左流扵天下浸􅁋扵近代君子小人靡不􅄝也富貴貧賤靡不用也有國者􅀙而籠之利一孔矣而世之􅀁貴家之􅀁蓄則非有公茶者何公茶濫惡不味扵口故也毎􅀊之春芽者既掇焙者既出則吏呼而買之民輓而輸之矣民之淳或以利而姦也吏之察或以賄而闇也扵是乎行濫入焉草邪木邪唯恐器之不盈也塵邪煤邪唯恐行之不昂也商筭而行或不售也則販者鮮矣倉儲之乆或腐敗也則水火乗之矣是以􅀖之泉布竭扵市估而積之亡用之地息未收而本或䘮矣若東南列郡則吏自斥賣課不甚多時或不登焉而民之自用常數倍矣来有甚逺價有甚貴而人爭取之者味羙也􅂗有甚險法有甚重而人爭販之者利厚也廵按之使逐捕之卒日馳扵野黥額之吏鞭背之人日滿扵庭愁怨愈多而姦不可禁督責愈重而財不可阜􅀔之􅀁運末如之何也巳今日之宜亦莫如一切通商官勿賣買聴其自為而籍茶山之租科商人之稅以此校彼殊􅂗一致且商人自市則􅀁擇必精􅀁擇精則儥之必售儥之售則商人衆商人衆則入稅多矣又昔之􅀁以披草莾懐兵刃務私販者禁嚴故也既巳通商則當安行夷路自實官府亦入稅多矣况不滯本泉不煩威獄利國便人莫善扵此或曰子謂通茶鹽之商其如逐末何曰昔之未通商也文峻而網宻富厚重慎之子罔㳺其間故􅃖􅃖細民以身易財者入焉若法通商則大賈蓄家射時而趍細民何利焉非逐末之路也扵戯鹽始扵漢茶始扵唐取以濟時事非師古異日􅀖財饒衍王道寖昌棄之扵民不勝大願直講李先生文集卷之十六終直講李先生文集卷之十七強兵策十首強兵策第一兵之作尚矣黄帝堯舜以来未之有改也故國之扵兵猶鷹隼之扵羽翼虎豹之扵爪牙也羽翼不勁鷙鳥不䏻以死尺鷃爪牙不銳猛獸不􅀎以肉食兵不強聖人不􅀎以制􅄄夫矣􅀁謂強兵者非曰日尋干戈暴骨萬里逞一朝之忿以求横行天下也必有仁義存焉耳仁義之􅀃何如曰􅊗􅀚世俗之論兵者多得其一體而未􅀎具也儒生曰仁義而巳矣何必詐力武夫曰詐力而巳矣何必仁義是皆知其一未知其二也愚以爲仁義者兵之本也詐力者兵之末也本末相􅁠用之得􅀁則無敵矣故君者純扵本者也􅀅者駮扵末者也孫子曰主孰有道􅀅孰有􅀎道道徳也􅀎智􅀎也又曰􅀅者智也信也仁也勇也嚴也乃知君則專用道徳􅀅則智信仁勇嚴並用之矣昔大道之行與三代之英不敢逺引請以漢事明之韓信言扵漢王曰項王􅀁過無不殘滅者天下多怨百姓不親附名雖爲覇實失天下心大王之入武闗秋毫無􅀁害除秦苛法與秦約法三章秦人無不欲得大王王秦者今大王舉而東三秦可傳檄而定也此項王失仁義而漢王得之之謂也及信為􅀅以木罌􅇲渡而虜魏王背水陣立赤幟而破成安君成安君不聴廣武君䇿以為義兵不用詐謀竒計故身死泜水上此成安君失詐力而韓信得之之驗也然為􅀅者多知詐力而為君者或不通仁義故雖百戦百勝而國愈不安敵愈不服也􅀁謂仁義者亦非朝肆赦暮行賞姑息扵人之謂也賢者興愚者廢善者􅀚惡者懲賦歛有法繇役有時人各有業而無乏用樂其生而親其上此仁義之凡也彼貧其民而我富之彼勞其民而我逸之彼虐其民而我寛之則敵人望之若赤子之號父母􅀅匍匐而至矣彼雖有石城湯池誰與守也雖有堅甲利兵誰與執也是謂不戰而屈人之兵矣若彼貧其民我亦貧之彼勞其民我亦勞之彼虐其民我亦虐之而望敵人之来是猶以鴆􅄴待渇者以附子呼飢人彼寧無􅂓必死而巳孰為来㢤敵無㱕心而誓必死則我雖以太公為􅀅孟賁為卒飛兎為􅀐太阿為兵未易可圖也而况吾民不附自生它變亦不可不慎也國家積徳絫仁為之百年矣黎民懐惠且歌舞矣不幸戎心怙亂阻我王命師興三􅀊未􅀗振凱雖天􅂨勤恤而軍事惟煩或以財賦或以力征元元無知頗或愁怨而西方尤甚矣伏惟發徳音爲天下慮内以紓吾民外以誘来者則邉鄙可安大功可立有識之願也强兵策第二或曰天下之事宜何慮㢤曰以天下爲一身則諸夏腹心也夷狄手足也腹心安寧氣和而神王則手足之疾非吾禍也若腹心不寧役其氣而疲其神以專治手足手足未愈而腹心殆矣故用兵之法必脩諸内而後行諸外彼戎狄豺狼罔知禮義強則犯上弱則離散執而誅之用力非少舍而弗問時復侵軼顧􅁠制之何如耳故當今之慮若興屯田之利以積榖扵邉外足兵食内免饋運民以息肩國以省費既安既飽以時訓練来則奮擊去則勿追以逸待勞以老其師此䇿之上也若宿兵扵外仰給扵内前不敢進後不敢退雖曰無功幸免扵敗千里饋糧二十致一材木敝扵車輦牛馬死扵牽徬男女困餓室家空虚行之數年敵承其弊此策之中也若帥師深入贏粮而随少人則攻戰不足多人則饋饟不􅁇道險而有伏􅀔􅀌而亡援與無知之俗爭一旦之命萬一蹉跌禍在不測此䇿之下也今􅀅出上策則何如曰屯田之利建議者多矣而執事未之從者其以地少可耕之田乎軍無可耕之人乎今之郡國民既庶矣誠少曠土可以耕也今之禁衞卒素驕矣誠無勤者可以耕也然而可耕之田安取之㢤曰邉郡之民有困者矣有不安其居者矣苟募其徙内地授以生業使之安堵乃以其故田宅隷于屯官則不患無田矣然而可耕之人安取之㢤曰邉郡之兵自禁旅之外别置屯軍凡天下廂之冗役者法之流移者民之願從者合而籍之以隷于屯官則不患無人矣田既入人既聚然後辨其夫畮列之廬舍授之耒耜教之稼穡明立􅂆課時加督察勤則有賞惰則有刑然而農功集矣既又為之什伍立其長帥賦以兵器與其甲胄乗其閑暇習之戰闘是謂因内政以􅀉軍令也然而武事興矣食既足兵既練禁旅未動而屯軍固巳銳矣以紅腐之積濟虎􅆛之師利則進戰否則堅守國不知耗民不知勞而邉􅀅髙枕矣彼其不忠不孝愚弄其民扵矢石間而我以餘力馭之亡有日矣或曰屯田固便矣徙民内地不亦擾乎抑其授以生業扵國用何如㢤曰民得去兵寇䡖賦役而就善地若水之扵下魚之扵淵也今募其徙是順民之政也漢武帝徙闗東貧人扵隴西北地西河上郡凡七十餘萬口後加徙猾吏扵􅀜内當是之時弗聞其擾也且以輦運之費為徙民之生業不亦多乎輦運則連年不息民業則一與之而巳矣暫勞永逸其此之謂乎然則民樂内徙而邉郡虚如之何曰嚮者民多而兵少故闘者寡而驚者衆如使民少而兵多則闘者衆而民有賴矣以兵易民何虚之有㢤在漢趙充國在唐婁師徳皆以屯田利盡西土威震羗胡兹薦紳先生之􅀁常言也惟熟圖之強兵策第三或曰屯軍之耕自養可矣禁旅坐食胡􅀎給之曰古者制農田百畒百畒之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人其人之食上年則人四鬴中年則人三鬴下年則人二鬴計一夫之耕其登榖不寡矣今屯軍之耕姑以下農夫為率一夫耕而食五人則十萬夫耕􅀁食禁旅四十萬人矣以二十萬夫耕則餘四十萬人之食三年耕則有二年之蓄矣雖有凶旱水溢巖廊之上可無西顧之憂也然則屯田之利可施扵天下乎曰今天下公田往往而是籍沒之産未嘗絶書或爲豪黨占佃或以裁價斥賣公家之利亦云薄矣其􅀔莫若置屯官而領之舉力田之士以爲之吏招浮􅀉之人以爲之卒立其家室藝以桑麻三時治田一時講事男耕而後食女蠶而後衣撮粒不取扵倉寸帛不取扵府而帶甲之壮執兵之銳出盈野入盈城矣其􅀁輸粟又多扵民而亡養士之費積之倉而巳矣此足食足兵之良筭也或曰議者多稱鄊軍何如曰周禮小司徒㑹萬民之卒伍而用之家出一人比爲伍閭爲兩族爲卒黨爲旅州爲師郷爲軍此先王之法也管子作寓令之政卒伍定乎里而軍政成乎郊連其什伍居䖏同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死故􅀎外攘戎狄内尊天子以安諸夏也夫設鄊軍以自衞前哲之意深矣人之愛親戚重財物盖天性也寇賊之来􅀅殺我丁強虜我老弱蹂􅏳我田宅掠取我金帛則凡噍􅀋皆有闘心矣君人者因民心而利􅋚之既訓練之又􅀅領之則其守戰至死非賞罰使之然也竊觀近世鄊無軍目人不知武事家不蔵兵器寇賊之来則以袒裼之軀投餌扵虎口賊去信宿則吏卒至吏卒至而亡􅀁􅀗益為勞弊矣雖然豈唯野而巳㢤不曰郡乎曰縣乎自非方鎮多無備豫客軍百十僅如逆旅幸而治平矣萬一有狂夫大呼則奚以待之故鄊軍之名不可不察也近者亦籍戸而為之矣萬家五百亦巳多矣然恐􅀅吏未得人訓習未得理何者統帥則縣令也縣令豈皆賢偏禆則戸民也戸民豈皆善撫御或失變故亡常此謂􅀅吏未得人也令之􅀁敎姑令習射曽不知坐作進退之節心背左右之宜耳不辨金皷目不别旌旗一旦用之􅇌市人耳此謂訓習未得理也如欲􅀅吏得人莫若精擇縣令勿拘官序一以材􅀎縣令得人則偏禆之選亦得人矣然後明戰陣之法以授之則訓習得理矣如此則郷軍日強也屯軍以征戎鄊軍以守備郡國之􅀔皆王之藩屏也強兵䇿第四或曰地􅀔西北髙東南下地髙而寒其民體厚而力強氣剛而志果地下而温其民體薄而力弱氣柔而志囬故西北之兵􅀎辛苦有成功而東南之士少􅀁立此士大夫咸知之也而子謂郡國屯軍可以征伐意者非東南之謂歟曰是老生之論也夫民之情性有地氣矣是之謂風也教而使之在君長矣是之謂俗也聖王不擇民而教賢􅀅不擇士而使擇民而敎是國無顔冉未可學也擇士而使是世無賁育未可戰也水至柔也􅀭之以風則可使覆舟金至剛也冶之以火則可使成器顧􅀁用之方畧何如耳江南有卑薄之稱荆楚有剽䡖之議其傳非一世矣然楚若敖篳路籃縷而其後世常與晋爭諸侯吴太伯断髪文身而其後世亦先晋歃項籍以八千人起㑹稽而殺秦降王遷漢王扵蜀分裂天下號稱為覇宋武帝以百餘人起丹徒而誅桓正晋遂平齊地長驅關洛是則東南之士亦嘗與西北校矣惟其􅀅之才不才也然以今日之事言之則習有所多技有􅀁長亦不可不察也若夫沙平草淺千里在目土不成丘水不成谷馬肥人䡖来往電駭雙帶兩鞬左右馳射此非南軍之􅀁長也山陵險阨草木蓊蔚江流吞天巨浪時起行人疑惑飛鳥不度徒歩相􅅮短兵相擊此亦非北軍之􅀁長也北征而用南軍衆則笑之矣南征而用北軍未有言其不可者竊􅀁未諭也江海之濵或一盗肆虐一􅀖􅀍擾則命王人帥王卒以捕之以多擊少以短擊長費或甚厚而功或不立此亦一失也嚮者征南蠻谿洞則可監矣去平地而即險阻出中國而入瘴癘狡穴未堙而吾軍殆矣竊惟廟筭之􅀷未必不及此也盖郡國無精兵不可不内發故也載使置軍屯田随便興發則何征而不服何討而不誅㢤至若以古名􅀅􅀅之以􅀐戰之法教之舍此所短從彼􅀁長則運之天下亦猶袵席間也強兵策第五兵矢者軍之神靈也甲胄者人之司命也故一夫奮劍則千人披靡孟賁􅃝裼則童子􅀜弓􅀎殺之矣然兵不利不若無兵之愈也無兵則慎􅀁擊而逺扵敗矣甲不堅不若無甲之愈也無甲則知􅀁避而免扵死矣有兵而不利有甲而不堅而假之以求勝恃之以求生則誤大事取大禍莫斯之甚也故周官考工為器之法天有時地有氣材有羙工有巧合此四者然後可以為良凡器皆然况扵兵乎故其為弓也取六材必以其時凡相幹欲赤黒而陽聲角欲青白而豐末膠欲朱色而昔筋欲小簡而長大結而澤漆欲測絲欲沈六材之全然後冬析幹春液角夏治筋秋合三材寒奠體氷析灂春􅀍弦其為矢也前弱則俛後弱則翔中弱則紆中強則􅀭羽豐則遲羽殺則趮是故夾而摇之以眡其豐殺之節橈之以眡其鴻殺之稱凡相笴欲生而􅅮同􅅮欲重同重節欲䟽同䟽欲㮚其為戈殳㦸矛之秘也攻國欲短守國欲長置而揺之以眡其蜎炙諸牆以眡其橈之均横而揺之以眡其勁其為甲也眡其鑚空欲其惌眡其裏欲其易眡其朕欲其直􅐤之欲其約舉而眡之欲其豐衣之欲其無齘是先王之為兵甲必及其時必羙其材工則必良事則必試如此其至也惟今郡國之貢兵器果何如㢤聚工而作卒􅀊後巳未嘗試也連輿而出方舟而上無不受也簡閱不明則精粗不别精粗不别則制作必濫制作濫則工不必巧材不必羙况天時乎况地氣乎加以師興之際卒然求取斬木以為努伐竹以為箭或取非其時或産非其地備數而止行濫固多暴之日則焦濡之雨則朽以之應敵不知其可矧新甲之制出扵一切次􅁓為札索麻為縷費則省矣乆􅀅奈何凡此之類皆有識之􅀁聞見也至扵郡國兵庫或乆不啓戰守之具未嘗􅁱飾事至而慮亦非智者􅀁􅀎也愚以為天下造兵宜專命守臣以蒞之總置使名以督之工之選必難其人而進其食以優之材之取必善其物而増其價以来之取之有地来之有時為之有法日省之月試之善至多則賞惡雖少而刑上下檢察用為急務其舊兵革勿絶繕完以備豫為政則龍淵太阿不獨稱扵古而蠻夷猾夏有血刃之期矣強兵策第六孫子曰􅀅􅀎而君不御者勝故古者天子遣􅀅扵太廟親操鉞持其首授其柄曰從是以上至天者􅀅軍制之乃復操柄授與刃曰從是以下至淵者􅀅軍制之故李牧之為趙􅀅居邉軍市之租皆自用饗士賞賜决扵外不􅀙中御也周亞夫之軍細柳軍中唯聞􅀅軍之命不聞天子之詔也夫古先􅈒后扵王業亦艱難矣安不忘危其心亦至矣豈故欲示人以利器成人以威柄以天下之命属之扵一臣㢤盖任賢之道不得不然也馬之􅀁以􅀎千里者以其獨行也若使駕以輜車􅆖以蹇驢役夫罷羸執轡其上則未必不傾覆矣况乎致逺㢤鳯之􅀁以􅀎千仞者以其自恣也若使繫之以線縷養之扵園囿藩籬之􅀋啁啾其側未必不憂死矣况乎冲天㢤用兵之法一歩百變見可則進知難則退而曰有王命焉是白大人以救火也未及反命而煨燼乆矣曰有監軍焉是作舍道邉也謀無適從而終不可成矣竊跡其原盖知之不盡信之不篤也知之不盡恐其不賢也信之不篤懼其不忠也不賢而無􅀁制則或敗事矣不忠而無􅀁監則或生變矣是故束之以詔令持之以親貴焉然恐其不賢胡不選賢而任之懼其不忠胡不擇忠而使之未見其賢而任之是國無賢邪未知其忠而使之是下無忠邪與其用之之疑􅂚若取之之慎孔子曰視其􅀁以􅀚其􅀁由察其􅀁安人焉瘦㢤必也授以節度使之遵行邪則王人之㣲者自足為之矣安用大臣㢤大臣而尚可疑耶則小臣胡為而可信也彼誠不忠耶則不知有君矣何憚扵一小臣㢤昔韓信平齊七十餘城南靣稱􅀌與楚則楚重與漢則漢重鼎足之形可坐而定也而藉金石之交荷觧衣推食之徳蒯通之􅀃弗忍從也當是之時豈有監之者㢤及其削爵為侯居京師奉朝請乃欲外結陳狶内因諸官徒奴以行大事誠非嚮者三分之􅀔也而卒以叛逆者君恩不終而懐怨望也漢孝武之扵霍子孟蜀先主之扵諸􅁑孔明皆託以六尺之􅀌而弗聞有變者君臣之義至深國士之遇可懐也苟推赤心疇敢不順苟為疑之人亦無足信者今兹兵興矣􅀅用矣惟上心曠然與忠賢為一體無置節目扵其間則􅀅才如神軍鋒如雷功業易可成也強兵䇿第七國之􅀁以爲國􅀎擇􅀅也􅀅之􅀁以爲􅀅􅀎養士也人莫不愛身而以身當矢石莫不愛死而以死衞社稷者厚無􅀁往也故曰視卒如嬰児故可與之赴溪視卒如愛子故可與之俱死吴起吮疽而戰不旋踵李廣與士卒共飲食而愛樂爲用親非父母也倫非兄弟也然而􅀁以撫循盡得其􅂬心者非一朝一夕之事也故臨敵易􅀅兵家􅀁忌彼其推恩信分甘苦曠日持乆上下親矣猶不􅀎以有功一旦而易之則雖賢矣雖仁矣上恩不可一言而洽也下情不可一顧而通也卒然用之則安􅀎有以為㢤馬之馳矣而斷其蹄雖代以􅂹足弗􅀎行也子之孩矣而逐其乳雖繼以毛嬙弗􅀎育也昔燕以􅀐劫代樂毅遂有即墨之敗七十餘城盡反扵齊趙以馬服子代㢘頗遂有長平之降四十萬衆皆阬扵秦功或不可早建事或不可速成亦明主􅀁宜察也竊􅀚今之易􅀅誠以敗衂不稱故也夫任人當審其賢不賢未可責其勝不勝也不賢而勝非國之福也適􅀁以召敵也賢而不勝非國之患也適􅀁以儆之也使彼勝而驕我敗而怒以無功之􅀅用無功之士竭智盡力以求洒耻則不知山之有髙石之有堅水之有溺火之有焚死之可畏生之可懐矣孰􅀎當其鋒㢤吴子謂魏武侯曰人有短長氣有盛衰君試發無功者三萬人臣率以嘗之其可乎今使一死賊扵曠野千人追之莫不梟視狼顧何者恐其暴起而害巳也是則一人投命足懼千夫故其以三萬人而破秦十萬衆也今以敗而易之是古名􅀅無敗者乎孟明視敗扵崤而秦伯復其位方有焚舟之報荀林父敗扵邲而晉侯赦其罪卒致曲梁之功棄瑕録用古之道也若賢而易之是雖有過人之畧無􅀁復用斯足以快盗心而巳矣不賢而易之是去劇就閑如釋􅀒檐斯足以遂其私而巳矣後之人􅀅曰苟勝焉何恤乎富貴苟􅀒焉不過一左遷而巳任之不甚乆責之不甚重人或苟且􅀅焉用之幸而天威在上盗不敢前如使易􅀅之際群情未安約束未定謀未及周備未及設而犬羊乗之禍亦不可測也誠􅀎注意賢才期之逺大一勝勿遽賞賊平之後則茅土存焉一敗勿遽罰事終不濟則鈇鉞存焉困獸猶闘况大捋乎是則耻不足洒而賊不足平也強兵策第八或曰一敗勿罰過可畧也一勝勿賞何以使人曰勝而勿賞是􅀁以使人之術也愚嘗深跡有國者之行事未始不以賞使人也而或失使之之道焉夫爵者􅀁以貴也禄者􅀁以富也富貴者是人之􅀁欲也仁非伯夷􅅩齊㢘非扵陵仲子孰􅀎不動其心㢤故智者竭慮勇者盡力辯者以􅀃文者以檄不敢家其家不敢身其身不逺扵蠻貊之外不威扵矢石之間日不為暑風不為寒渇不暇飲飢不暇食孳孳焉從扵王事者賞使之然也雖有至性自天至誠發中不待􅂆沮而决􅀁去就者兹盖非常之士豈可以衆人望之㢤乃知賞之扵使人至矣其為失者賞之大速而浮扵功也徒知賞之可以使人而不知賞極則弗䏻使之矣舉億萬之衆贏千里之糧足未履扵山川手未煩扵枹鼓虜􅀗未盈車斬首未數級而幕府巳獻捷矣朝廷已議功矣爵等有數而敵人無數賜物有盡而賊衆無盡故天討未行而策命極矣尺地未收而府庫殫矣身既巳貴家既巳富子女玉帛􅀁欲者陳扵前矣兄弟親戚􅀁愛者受其賜矣體習宴安志在驕佚勝則無以加敗則失其舊􅀞虵之足世􅀁戒也是賞典雖在安􅀎復使之㢤其間亦有矜功䟦扈以求姑息國家之弊多或由之唐季五代可覆而視也此無他賞之太速而浮扵功之咎也故曰勝而勿賞是􅀁以使人之術也古者師還飲至策勲事成而賞誰云晚邪抑又聞之書曰徳懋懋官功懋懋賞無徳而官則官不足以勸有徳無功而賞則賞不足以􅂆有功如使傝䢇受位私昵受賜則何以待功徳之臣㢤位雖髙與傝䢇同賜雖厚與私眤同是徳不足貴而功不足重其誰勉之㢤今者明明在上誠日慎扵賞爵則師可使武臣可使力而四方無虞矣強兵䇿第九人莫不有才才莫不可用才取其長用當其宜則天下之士皆吾臂指也故曰使智使勇使貪使愚智者樂立其功勇者好行其志貪者决取其利愚者不愛其死因其至情而用之此軍之㣲權也昔伊尹之興土功也強脊者使之􅀒土眇者使之推傴者使之􅂗各有􅀁宜而人性齊矣竊􅀚世俗之論則有異扵此不求扵已而專責扵人不用其長而專攻其短適時則謂之違禮從􅁠則謂之壊法剛毅則謂之不遜倜儻則謂之不檢䡖財則謂之不儉為生則謂之不㢘見其一不問其二觀諸外不察諸内以帷幄之談而校之老生之議以戎馬之任而同之俗吏之選是猶責越客以􅀐射望胡人以乗舟雖其賢才何益扵事㢤蘇秦謂燕易王曰孝如曽參義不離其親宿昔扵外王又安􅀎使之歩行千里而事弱燕之危王㢤廉如伯夷義不為􅀌竹君之嗣不肯為武王之臣不受封侯而餓死于首陽之下有㢘如此王又安􅀎使之歩行千里而進取扵齊㢤信如尾生與女子期扵梁柱之下女子不来水至不去抱梁柱而死有信如此何肯􅀭燕秦之威却齊之強兵㢤故知善不必皆可惡不必皆否置之有地使之有時一不可廢也小才之扵大用是匹雛不􅀎以舉千鈞也大才之扵小用是堯舜不􅀎以牧羊也故曰多言多語惡口惡舌終日言惡寝卧不絶爲衆􅀁憎爲人􅀁疾此可使要遮閭巷察姦伺禍也權數好事夜卧早起雖劇不悔此妻子之􅀅也先語察事勸而與食實長希言財物平均此十人之􅀅也切切截截垂意肅肅不用諌言數行刑􅓍刑必見血不避親戚此百人之􅀅也訟辯好勝嫉賊侵陵斥人以刑欲整一衆此千人之􅀅也外貌怍怍言語時出知人飢飽習人劇易此萬人之􅀅也戰戰慄慄日慎一日近賢進謀使人知節言語不慢忠心誠畢此十萬人之􅀅也温良實長用心無兩見賢進之行法不枉此百萬人之􅀅也明主誠􅀎不牽扵世俗之論而盡乎才用之宜則不視而形不聴而聲不降席而横行乎四夷矣強兵䇿第十􅀅之有兵法猶儒之有六經也儒莫不讀六經而知道者鮮矣􅀅莫不讀兵法而適變者鮮矣世一賢士猶為踵武國一賢􅀅猶為比肩其故何也性生扵内而學成扵外非學問之􅀎移性也水之湍者决之也而聚鄭白之工不􅀎以流涸澤刃之芒者礲之也而盡南山之石不􅀎以利鈆刀本之弗善末無及也然值承平之世言堯舜者皆可以為善當有事之際學孫吴者未必􅀎應敵緩急之􅀔異也夫兵者詭道有形或不可視有聲或不可聴合散如雷電􅀮見如􅀑神而欲以昔人之餘論既往之陳迹擬議扵其間不亦難乎苟非有髙世之識出􅀋之才動如循環一歩百變者其孰􅀎與扵此㢤楚漢之時諸􅀅多矣唯韓信起扵餓隷戰而必勝攻而必取未嘗敗北者何也豈其兵法皆衆人之􅀁未學者乎盖其用之非衆人之􅀁及也是謂反兵法而用兵法也兵法曰絶水必逺水客絶水而来迎之扵水内令敵半渡而擊之利欲戰無附扵水而迎客也及信與龍且夾濰水陣乃夜令人爲萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也此反半渡之文也而卒以勝者雜扵利而務可伸雜扵害而患可觧也兵法右背山陵前左水澤而信攻趙未至井陘口乃使萬人先行出背水陣趙軍望見大笑之此反前左之文而卒以勝者䧟之死地而後生投之亡地而後存也反其顯而用其㣲人以爲拙已以爲工智者不􅀎與其謀巧者不􅀎同其伎用兵若此可以言學矣今以衆人之識讀衆人之書而求以勝彼亦巳䟽矣昔趙奢之子括自少時學兵法言兵事以天下奠􅀎當嘗與其父言兵事奢不􅀎難然不謂善括母問奢其故奢曰兵死地也而括易言之使趙不􅀅括則巳若必􅀅之破趙軍者必括也及孝成王使括為􅀅藺相如曰王以名使括若膠柱而皷瑟耳括徒􅀎讀其父書傳不知合變也趙王弗聴故有長平之敗乃知有􅀅才者必習兵法習兵法者不必有􅀅才况以言取人孔子病諸兵戰之􅂣立尸之地固明主􅀁宜留意也直講李先生文集卷之十七終直講李先生文集卷之十八安民䇿十首安民䇿第一愚觀書至扵天聰明自我民聰明夫明畏自我民明威未嘗不廢書而歎也嗟乎天生斯民矣􅀎為民立君而不􅀎為君飬民立君者天也養民者君也非天命之私一人為億萬人也民之􅀁㱕天之􅀁右也民之􅀁去天之􅀁左也天命不易㢤民心可畏㢤是故古先哲王皆孳孳焉以安民為務也􅀁謂安者非徒飲之食之治之令之而巳也必先扵教化焉教化之􅀃何如曰夫俗士之論未有不貴刑法而賤禮義也以爲天下之大可域之扵圄犴也群生之重可摩之以刀鋸也聞有稱王道誦敎典也則衆共笑之矣必謂殺之而不懼尚何有扵敎化乎是皆不睹聖人之情者也獨不知教失而後惡化成而後刑刑􅀁以不勝惡也善觀民者見刑之不勝惡也則反之曰是敎之罪也焉可以刑不勝惡而謂教益不可用也譬諸人身導養得理則無疾疾作而後用藥藥􅀁以不勝病也善觀身者見藥之不勝病也則反之曰是導飬之失也焉可以藥不勝病而謂導養益不可用也記曰昏姻之禮廢則夫婦之道苦而滛辟之罪多矣郷飲酒之禮廢則長幼之序失而爭闘之獄繁矣䘮祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣故禮之教化也㣲其止邪也扵未形使人日徙善逺罪而不自知也是以先王隆之也居山者不知􅈄居澤者不知獵習之之異也今欲令禁􅈄人以罔􅅈詰獵者以從禽雖日撻之弗可改也巳民有以生之而無以教之未知為人子而責之以孝未知為人弟而責之以友未知為人臣而責之以忠未知為人朋友交㳺而責之以信未知廉之為貴而罪以貪未知譲之為羙而罪以爭未知男女之别而罪以滛未知上下之節而罪以驕是納民扵阱也雖日誅之死者弗之悔而生者弗之悟也使民父子親夫婦和宗族相睦鄊黨相信財不以爭力不以闘肅肅雍雍相從扵禮譲之地是為安乎使民父子不親夫婦不和宗族不睦郷黨不信財則必爭力則必闘呼天扣心相從扵刑戮之􅂣是為安乎此周􅀁以長世而秦􅀁以不祀也洪惟聖神掃五代之弊跨唐據漢拱揖三王敎化之情靡不存乎中矣而或未明未具無以觀示于下幸而昭然垂日月之光俾穴􅂩之微咸有􅀁見斯萬世之福也安民䇿第二或曰欲教化之明且具則奚由曰莫若學校之宜扵時也夫士者衆之􅀁仰望也服儒衣讀儒書而躬小人之行是塗民耳目也士之不徳師非其師也師之不才學校不脩之過也記曰君子知至學之難易而知其羙惡然後􅀎博喻􅀎博喻然後􅀎為師􅀎為師然後􅀎為長􅀎為長然後􅀎為君故師也者􅀁以學為君也是故擇師不可不慎也然則師者雖非人君之位必有人君之徳也古者家有塾黨有庠術有序國有學仕焉而巳者㱕敎扵閭里大夫為父師士為少師閭里之細猶以國之老臣為之師况其大者乎師有其人教有其業詩書禮樂以本之干戈羽籥以文之天子扵是養老焉世子扵是齒胄焉黨正扵是飲酒焉鄊大夫扵是賔賢􅀎焉父子君臣長幼之道扵是乎觀之六徳六行六藝之教扵是乎取之司馬辯論官材論定然後官之任官然後爵之位定然後禄之其不帥教者命國之右鄊移之左左鄊移之右不變移之郊不變移之遂不變屏之逺方終身不齒其教之也備其選之也至善者必興惡者必廢則其學者皆勸勉媿耻而求為君子矣士皆君子則衆人望之若景嚮焉奚不善之云乎故曰君子如欲化民成俗其必由學乎古之王者建國君民教學為先也後王多務古制未暇家自為學人自擇師學乎學孰孔孰墨在我而巳矣師乎師孰尭孰桀在我而巳矣故有以無用之文為學以不令之人為師聴其言則欲齊名扵聖哲觀其行則或慙色扵閭閻乗流一遷汗漫弗復往者不知其非来者以為當然􅃖􅃖之氓何以取法今者内有國子之舘外有諸侯之學聖人之意有􅀁在矣然師以講說為名而不掌扵敎育士以文辭為業而不舉其徳行師不掌敎育則觧經之外人之賢不賢一不當知也士不舉徳行則執筆之餘身之善不善一不足慮也是則何補扵事㦲誠宜申命學官以教育為職時無賢才則其咎也明著學版以徳行為選鄊有善譽則可進也如此而人材不多俗化不羙是六經群言皆欺後世也安民策第三或曰今兹京師首善毎嵗論秀士矣轉而從徳行其可也而州郡之學亡薦引之文欲一取之何如曰教而用之學校之興扵古也不教而用之選舉之隆扵今也教則易爲善善而從正國之􅀁以治也不教則易爲惡惡而得位民之􅀁以殃也試者其言也用者其行也言有偽善則取之矣行有真惡弗可得而知也然而授以操柄加之人上是以赤子之肉投􅂌虎穴也况綉繢雕􅅣之文又不足以爲善言乎則其疇昔之志夙夜之學􅄋盡扵數刻之試而􅎍中未始有一毛可爲效官之資也禮儀則習扵同列政體則咨扵老吏自受爵之日爲學制之始柰何欲致治興化也惟今太學論士既不觀徳行矣而學士之版徒記姓名而巳求試而来報罷而去以天子之辟雍與諸生假道而過耳郡國雖或興學而士之進取罔由扵此是皆存學之名失學之實也按唐制自京師郡縣皆有學焉毎嵗仲冬課試其成者長吏會属僚設賔主陳爼豆備管弦牲用少牢行鄊飲酒禮歌鹿鳴之詩召􅂄艾敘少長而觀焉既餞而與計偕其不在學而舉者謂之鄊貢此近古旁求之法也而一出課試不由行實亦同㱕于弊矣爲朝家之計莫若斥大七舘使薦紳之族咸造焉増修州學使士庶人之秀咸在焉擇賢以為之師分經以為之業限以積乆毋得擅去日觀其徳月課其藝賢邪非一時之賢乆居而不變乃其賢也􅀎邪非一時之􅀎歴試而如一乃其􅀎也如是而得人不精未之信也其有急扵耕養或素巳成就不在學者則循舊貢舉先其名舉後其課試舉之非一人之舉必鄊曲共舉也用之非一人之用必天下共用也如是而得人不精亦未之信也古者諸侯貢士一適謂之好徳再􅃴謂之賢賢三􅃴謂之有功廼加九錫不貢士一則絀爵再則削池三則絀爵削地畢矣誠􅀎以得士為賞失賢為罰則群下孰不一意扵察舉乎尚慮有遺則莫若使大臣得舉􅀁知漢法三公大􅀅軍皆開府辟召豈虗言㢤或曰嚮者亦嘗先名譽而後課試矣以其進者濫而取者私也今而復之其可乎曰進皆有濫取皆有私顧其利害何如耳糊其名而易其書有司不得䡖重焉是吏之公也君子之道不逞扵童子之雕蟲是法之私也以名取之則亦反是矣吏之私者則刑可速也法之私者雖聖人因之未如之何矣此賢者􅀁以日削敎法􅀁以不競也惟觧而更張之乃為邦之盛節也安民䇿第四天之生人有耳焉則聲入之矣有目焉則色居之矣有鼻焉則臭昏之矣有口焉則味壅之矣耳之好聲亡窮金石不足以聴也目之好色亡窮黼黻不足以觀也鼻之好臭亡窮鬰鬯非佳氣也口之好味亡窮太牢非盛饌也苟不節以制度則匹夫擬萬乗之富或未足以厭其心也故周禮大司徒之職施十有二敎其九曰以度教節則民知足謂以法度敎民使知尊卑之節則民之􅀁用雖少自知以為足也又以保息六安萬民其六曰同衣服謂民雖有富者衣服不得異皆􅀷衣而巳則貧者安也自周綱觧結禮樂崩壊商賈大者衣必文采食必􅆝肉因其富厚交通王侯力過吏執以利相傾千里㳺敖冠盖相望乗堅策肥履絲曵縞兼并豪黨之徒以武斷扵鄊曲宗室有土公卿大夫以下爭于奢侈室廬輿服僣于上無限度而貪人恣行矣凡風俗之􅀁以薄獄訟之􅀁以繁者民貪故也惟人之養生豈甚相逺㢤食雖豐不過數人之榖也衣雖厚不過數人之帛也一夫之田五畒之桑亦足以自為矣然有粟腐倉而甚扵飢錢朽貫而甚扵貧蔵姦挾詐晝爭夜奪如盗賊之為者有由然也天下之材其大者可室也天下之寳其貴者可器也天下之織其巧者可衣也天下之畜其珍者可食也駿可乗也良可御也鄭衞之哇可樂也燕趙之羙可妃也昏姻之際賔客之接喪之有具祭之有品以多爲貴以奢爲禮婦人婢子愚夫小兒愛樂稱誦習以爲俗如是雖窮天地之産安􅀎以濟一民之欲㢤故其甚富而貪不可熄也以此細民亦務相師法或有罄一年之蓄而費扵數刻冐死亡之辟而資扵宴好善士􅀁不􅀎化齊斧􅀁不􅀎威其故非他耻不若人也如使上下有等奢侈有制在埶則尊無列皆賤富不得獨文貧不得獨質萬金之居與下户爲伍則飽食之餘無􅀁復用庶乎㢘讓可興而和平可致也安民䇿第五為國者未有不欲其民富且壽矣薄稅歛􅀁以富之也而水旱乗之民亦弗可得而富也省刑罰􅀁以壽之也而癘疫奪之民亦弗可得而壽也水旱癘疫之来隂陽之不和也夫陽一扵復而六扵乾隂生扵午而成扵亥消息有數進退有時非猖狂妄行之物也無形焉盖非逸而動勞而止也無情焉又非與扵喜奪扵怒也然而不以其敘者有感而應有召而來也洪範九疇二五事一日貌二曰言三曰視四曰聴五曰思八庶驗曰雨曰暘曰燠曰寒曰風貌曰恭恭作肅肅時雨若謂君行恭則時雨順之言曰從從作乂乂時暘若謂君政治則時􅊙順之視曰明明作哲哲時燠若謂君􅀎照哲則時暖順之聴曰聡聡作謀謀時寒若謂君􅀎謀則時寒順之思曰􅌖睿作聖聖時風若謂君􅀎通理則時風順之反是則狂常雨若謂君行狂妄則常雨順之僣常􅊙若謂君行僣差則常􅊙順之豫常燠若謂君行逸豫則常煖順之急常寒若謂君行急則常寒順之蒙常風若謂君行蒙暗則常風順之其傳又曰貌之不恭是謂不肅惟金沴木言之不從是謂不艾惟火沴金視之不明是謂不􅈒惟水沴火聴之不聰是謂不謀惟土沴水思之不睿是謂不聖惟金木水火土沴由是而言人君五事不脩則雨􅊙燠寒風不以其時水火木金土交相為沴水旱􅀁以狎至癘疫􅀁以放行也然而君人者不以身為身以天下之身為身也不以心為心以天下之心為心也如使下皆狂則上誰與肅下皆僣則上誰與艾下皆豫則上誰與哲下皆急則上誰與謀下皆蒙則上誰與聖故明王欲肅則去下之狂欲艾則去下之僣欲哲則去下之豫欲謀則去下之急欲聖則去下之蒙君明臣忠百姓親睦然後可以致和氣也若􅀎自知而不􅀎知人􅀎自治而不􅀎治人愚者在位貪者在職以戕賊元元家愁戸怨靡􅀁控告是雖尭為天子舜捴百揆其何以媚于上下神祗㢤故去四㓙舉十六相􅀁以為大功也夫郡守縣令吾民之司命也漢孝宣與良二千石共治顯宗謂出宰百里有非其人則民受其殃豈徒語㢤惟聡明􅌖智益垂意扵任官則烖害可消而富壽在矣安民策第大民之􅀁従非􅀙君也從其令也君之􅀁守非守國也守其令也君端冕乎奥阼之位而民被堅執銳􅂂膓渉血赴死萬里者令使之也君夙駕乎囿㳺之中而民居䖏笑語如不知者令不及故也是民從令非從君也封疆有固山川有險人猶踰之比閭小吏執三尺之法則老姦大豪無敢違者是君守國不如守令也君以令用民民以令事君令之􅀁取民亦取之令之􅀁去民亦去之故令可一而不可變也是萬物之四時也天之扵物也春夏以出秋冬以内兹四時之常也如使柔風既扇疾雷既奮植者向榮動者起蟄而革之以沈隂亂之以繁霜則句萌者傷而蠉蝡者死矣唯其鈍而晚出者相賀得計也至秋冬則亦然是則句芒再至而品物不以為春黄落在兹而智者不以為秋也是故令之扵民也與其出而中廢不若勿出之愈也善人見勸而莫肯進懼其令變而不必賞也惡人見禁而莫肯改幸其令變而不必罰也朝一命焉夕一命焉群吏奉承之弗暇愚民惶惑而失圖出令如此不若勿出之愈也先王慎乃出令謂審之扵内而後行之扵外也其不可乎雖稷契之言皐陶之謨不宜扵時不足試也其可乎雖士傳言焉庶人謗焉志之先定不足疑也夫民可與樂成難與慮始昔子産治鄭其始也民疾之曰孰殺子産吾其與之及其乆也民愛之曰子産而死誰其嗣之載使子産聞謗遽改小國之政􅀅何如㢤洪範曰庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨謂衆民􅀁好不同而君臣政治各有常法不可失政敎之常以從民欲也何者善人少而惡人多也明明后誠􅀎謹令之􅀁以出則群心洗濯知􅀁適從矣安民䇿第七君者親也民者子也吏者其乳保也親不􅀎自育其子育之者乳保也君不䏻自治其民治之者官吏也赤子之在襁褓知有乳不知有母也細民之在田野知有吏不知有君也乳之不才則飢之渇之驚之癎之親雖慈不􅀎幸其子以生也吏之不才則窮之役之殺之害之君雖仁不䏻幸其民以安也然乳保之任不離帷房之間親之臥起可以接也官吏之職必逺畿􅆠之外君之視聴無由及也是故置吏不可不慎也竊思今之􅀁謂良吏者多不得其􅂨焉不師古道不觀人情各是其􅀁是非其􅀁非而巳其務近名者則曰政必以猛其務隂徳者則曰政必以寛其務自異者則曰前之政猛矣我必以寛前之政寛矣我必以猛其務自守者則曰何必以猛何必以寛斷諸法而巳矣是皆一方之論也政必以猛乎其如善人何多其逮捕峻其推鞠苛察則謂之智􅀷文則謂之公火之炎矣無間玉石霜之隕矣孰分蘭蕙仁者之愛果如是㢤政必以寛乎其如惡人何弛其囚繫䡖其撻戮以容姦為大度以緩令為識體鴟梟鳴􅀣而弗忍言弋射虎豹食人而弗忍慮機䧟義者之斷果如是㢤政必改前乎則前人之猛治者皆惡人也我改以寛孰謂可㢤前人之寛治者皆善人也我改以猛孰謂可㢤政必以法乎則法䡖而情重者何以威之㢤法重而情䡖者何以恩之㢤是故近名者刻薄之人也隂徳者柔邪之人也自異者詭􅈭之人也自守者畏愞之人也皆不足以知治體矣仲尼曰寛以濟猛猛以濟寛政是以和盖言寛猛不可偏任也失之扵寛則濟以猛失之扵猛則濟以寛寛猛並行然後為治也何謂寛猛並行㢤扵善則寛而扵惡則猛也臯陶曰宥過無大刑故無小過雖大而宥其寛也故雖小而刑其猛也明主誠宜䖏寛猛之用以命群吏謹察其􅀁為而廢興之則治道一致而百姓阜康矣安民䇿第八赦者􅀁以恤其民也贖者􅀁以優其臣也民之無状自䧟罪辜或銜刀扵市或刻其肌膚蚤刑暮犯纒綿弗絶繞以叢􅁄被以五木託身獄吏畢命螻蟻聖人傷焉此赦之􅀁以作也群公卿士盡瘁爾職以身從君以家狥國而子姪有過或麗扵法撻之戮之同夫甿隷則耻及其門憂及其親聖人傷焉此贖之􅀁以起也是則惻􅀮之至念功之著而儒先之論未有言其可者何也􅀁利寡而􅀁害衆也竊迹古先􅈒王之制刑法非􅂄殺人乃以生人也非欲作威乃以作福也夫物生有類類則有群群則相爭爭則相害是以強者脅弱衆者暴寡智者詐愚勇者苦怯或則以殺或則以傷不有王者作人之相食且盡矣故先王立禮則天之明因地之性刑罰威獄以類天之震曜殺􅓍也温慈惠和以效天之生殖長育也大刑用甲兵其次用斧􅃏中刑用刀鋸其次用鑚鑿薄刑用鞭朴大者陳諸原野小者致之市朝殺人者死然後人莫敢殺傷人者刑然後人莫敢傷弱寡愚怯之民有􅀁頼矣故曰鞭朴不可弛扵家刑罰不可廢扵國征伐不可偃扵天下也若曰有赦焉有贖焉是皆仁者之過也昔王符有言曰賊良民之甚者莫大扵數赦贖赦贖數則惡人昌而善人傷矣其論甚詳前􅈒稱之然今日之事又甚扵古且國之大祀皆有期日天下􅀁與知也必以是時而赦是啓人以惡也狹其姦邪以逞其欲脫身而行避吏幽逺天波一洒復爲編戸者􅀁至而見也何百神受職之年有椎埋爲姦之弊商旅或不敢越􅆠孤􅊔或不敢出戸此㝠㝠之民無告之甚也又衣冠子孫􅀒􅀔馳騁禽虜下戸貪暴無厭巳之贖金無窮而人之肌肉有盡孰䏻以敲朴之苦易銖兩之罰㢤此又㝠冥之民無告之甚也與其赦之􅂚若使畏而不犯與其贖之􅂚若使耻而不為幸赦而姦卒以不悛人􅀑以怒死亡以亟非􅀁以恤之也幸贖而惡終以不悔辱其祖考堕其門閥非􅀁以優之也文中子曰無赦之國其刑必平兹諸葛亮􅀁以治蜀也古者公族其有死罪則磬于甸人其刑罪則纎剸亦告于甸人獄成有司讞于公公三宥之不對走出致刑于甸人故曰公族之罪雖親不以犯有司正術也􅀁以體百姓也公族尚然况其下者乎儻留神眀以義割恩示天下以大公則萬世永頼矣安民策第九先王之道取扵民有制計口發財曰賦收其田入曰稅賦共車馬兵甲士徒之役充實府庫賜予之用稅給郊社宗廟百神之祀天子奉養百官禄食庶事之費諸侯亦什一而稅大國貢半扵天子次國三之一小國四之一皆市取其州羙物毎􅀊貢之故太宰以九貢致邦國之用一曰祀貢謂荆州包茅之屬也二曰嬪貢謂青州之絲枲也三曰器貢謂梁州之銀鐡徐州之磬荆州之丹兖州之漆也四曰幣貢謂雍州之璆琳梁州之熊羆狐狸徐州之纎縞也五曰財貢謂荆州之杶􅆬栝栢􅀭州之篠簜也六曰貨貢謂揚州之金貝荆州之大􅀛也七曰服貢謂豫州之絺紵也八曰㳺貢謂徐州之珠荆州之璣雍州之琅玕也九曰物貢謂徐州之魚青州之塩􅀭州之橘柚也地之􅀁生各有其宜貢之􅀁入各有其常地宜則物得其性靡不可用也貢常則人知其期靡不必有也益扵國而亡損扵民兹先王之􅀁以冐天下也地不以宜則物不羙物不羙而責之可用非市扵他邦不足以用也貢不以常則人無備人無備而責之必有非買扵蓄家不􅀎以有也故取之扵非其地求之扵非其常皆農人之病而商賈之利也管子曰嵗有凶穰故榖有貴賤令有緩急則物有䡖重人君不理則蓄賈㳺扵市乗人之不給百倍其本矣謂上令急扵求是物則重緩扵求是物則䡖賈人務蓄積而湏上令之􅀁急求盖有百倍之息也况乎師興之際事出多􅂗昨求今備猶以為晚市扵他􅀖則民之常産納諸商人之槖買扵蓄家則􅀊之常用抔諸賈竪之手飢寒之憂不逺而至矣竊惟仁人在上豈欲剿吾民㢤以國無素蓄故也物無素蓄則事至而求事至而求則不得其常矣不得其常則懼乎一方不􅀎給也故均之列郡均之列郡則不以其地矣古人有言曰旱則資舟水則資車物理然也夫䏻以不用為用不急為急物皆有備則國不憂而民不勞矣安民䇿第十前志有之王法必本扵農嗟乎衣食之急生人之大患也仁君善吏􅀁宜孳孳也昔周公遭變陳后稷先公風化之􅀁由致王業之艱難者七月之詩是也其一章曰一之日觱發二之日栗烈無衣無􅄄何以卒􅀊此言寒氣至矣人之貴者無衣賤者無􅄄何以終嵗乎三之日于耜四之日舉趾同我婦子饁彼南畒田畯至喜此言夏正之月始修耒耜其二月舉足而耕耕者之婦子俱以饟耒至扵南畒其見田大夫又為設酒食焉言勸其事又愛其吏也其三章則春日既温倉庚既鳴可􅅙之候女則遵牆下之徑而求柔桑又感事苦而有與公子同歸之志也其三章則鵙鳴􅀅寒􅁝事畢而麻事起又染采以為祭服也其四章則取狐貉為裘以助女功既而君臣及民因習兵俱出田也其五章則穹窒熏鼠塞向墐户以避寒氣而居之也其六章則穫稻為酒以助養老之具又以􅀲瓠麻實乾荼之菜惡木之薪以助男養農夫也其七章則築塲圃納禾稼野功既畢入治宮中之事晝取茅夜索綯且治野廬之屋而祈来年百榖于公社也其八章則蔵氷以備暑國君間扵正事而饗群臣正齒位也是聖人為邦使民男女相助以業衣食田官臨視與在隴畒敘其傷悲時其嫁娶果菜必備室廬必葺憂思勤苦如此之至因其閑暇然後講武事養􅂄老饗群臣正齒位禮義以興王業以成􅃎有雅頌不其至㢤今天下之廣生民之庶天子坐乎法宫之中責成扵諸吏之近民者果盡得人邪狃富貴者以田野為鄙事嗜儒雅者以離俗為清賢姦􅂍庸闇復甚扵此纎悉之談何自入哉或獄訟不决經年逮捕或功役繁興連頭驅掠閭里之内煩費百端奪其農耕亂其􅅙織往往而是也此其無故事有可假法有可誣也誠申命四方以吏課為後以農政為急勸農之官交舉其職時行属縣問民疾苦土田墾闢稼穡蕃滋百姓樂業而無􅁈人則書以為功反是則劾以為罪或㡬乎農時不違而頌聲可作也直講李先生文集卷之十八終直講李先生文集卷之十九平土書生民之道食爲大有國者未始不聞此論也顧罕知其本焉不知其本而求其末雖盡智力弗可爲巳是故土地本也耕穫末也無地而責之耕猶徒手而使􅀾也法制不立土田不均富者日長貧者日削雖有耒耜榖不可得而食也食不足心不常雖有禮義民不可得而敎也尭舜復起末如之何矣故平土之法聖人先之夏商以前其傳太簡備而明者莫如周制自秦用商鞅廢井田開阡陌迄今數千百年學者因循鮮􅀎道平土之謂雖道之猶鹵莾未見其詳扵戯古之行王政必自此始儒有欲談三王可不盡心㢤抑焉知其不復用也扵是本諸經該諸傳記條而辯之云一曰按周禮大司徒職曰以土圭之法測土深正日景以求地中日至之景尺有五寸謂之地中乃建王國焉制其畿方千里而封􅀣之此王畿廣輪之數也二曰按司馬法曰王國百里為郊二百里為州三百里為野四百里為縣五百里為都又按周禮載師職曰以􅌀里任國中之地以􅂣圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地大都之田任畺地杜子春以五十里為近郊百里為逺郊鄭康成以二百里為甸地三百里為稍地四百里為縣地五百里為畺地鄭注不甚詳明其意然也先儒皆同周禮亦謂五百為都其日甸稍縣都者是也此王國逺近之别也然司馬法與周禮其言頗異意者文王在􅄮作司馬法及周公攝天子位從而増損之以為周禮乎今本周禮為定下意倣此三曰按大司徒職曰令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄊使之相賔又按遂人職曰五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為逐皆有地域而溝樹之鄭司農云百里内為六鄊外為六遂康成謂異其名者示相變耳今據百里内近郊逺郊之地也近郊逺郊既為六鄊其餘又以為􅂣圃宅田士田賈田官田牛田賞田牧田也場圃任園地郊甸皆有之今獨扵郊言者畧也百里外甸地也甸地既為六遂其餘又以為公邑之田也司農云賞田者賞賜之田也康成謂圃􅀣果蓏之屬季秋扵中為􅂣樊圃謂之園宅田致仕者之家􅀁受田也士田仕者亦受田􅀁謂圭田也賈田在市賈人其家􅀁受田也官田庶人在官者其家􅀁受田也牛田牧田畜牧者之家􅀁受田也公邑謂六遂餘地天子使大夫治之自此以外皆然二百里三百里其上大夫如州長四百里五百里其下大夫如縣正是以或謂二百里為州四百里為縣遂人亦監焉家邑大夫之采地小都卿之采地大都公之采地王子弟􅀁食邑也王子弟􅀁食邑亦三等母弟及王之庶子與公同食地在畺稍䟽者與卿同食地在縣又䟽者與大夫同食地在稍故在下别言王子弟所食邑也然則稍地為家邑縣地為小都畺地為大都其餘亦皆以為公邑也此任地之異也四曰按司馬法曰六尺為歩謂方六尺也歩爲方一尺者三十六歩百為畮畮百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同同方百里又按周禮小司徒職曰九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都康成曰此謂造都鄙也采地制井田異扵鄊遂九夫為井方一里四井為邑方二里四邑為丘方四里四丘為甸方八里旁加一里則方十里為一成四甸為縣方二十里其實四成也四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也又按匠人職曰一耦之伐廣尺深尺謂之􅎌田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮康成謂井里之制小司徒經之匠人為之溝洫相包乃成耳又按遂人職曰夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以逹于畿康成謂十夫二鄰之田百夫一鄼之田千夫二鄙之田萬夫四縣之田由斯而言是六遂之地􅀁有田也舉六遂則六鄊自明矣此制田之例也然司馬法又與周禮之言有異司馬法有歩畮夫屋井周禮如之但不别為屋耳司馬法十井為通十通為成周禮則四井為邑四邑為丘四丘為甸一甸旁加一里為成司馬法十成為終十終為同周禮則四成為縣四縣為都四都旁加十里為同又司馬法止為一制無逺近之殊周禮則三百里以外都鄙為井田鄭云都鄙王子弟公卿大夫采地其界日都鄙􅀁居也二百里以内鄊遂為十夫百夫千夫萬夫則是殊制矣今亦本周禮為定五曰按康成注盖依王制凡地除山陵林麓川澤溝瀆城郭宫室涂巷三分去一其餘以為曰覯謂王制之云抑未為得康成取之良誤矣夫山川之廣狹自非目見不可以億度者也地埶或數百里平易無山川者或聮属有之城郭涂巷之類又不得知其多少載使山川之廣城郭涂巷之多則三分地或不止占一分也山川之狹城郭涂巷之少則三分地或不􅀎占一分矣以是而云三分去一未知何􅀙得之也今覯􅀁計秪除王城及五溝五涂有成數可見者裁去之自餘悉以平地例為田其中􅀁有山川城郭等占廢令執事者自依􅀁占丈尺裁去之定法之始不宜豫言也且經􅀁謂方十里為成方百里為同亦皆以平地例制之耳未嘗言有外物占其間也推此以往他可知矣六曰按匠人職遂廣二尺􅀷二尺溝廣四尺􅀷四尺洫廣八尺􅀷八尺澮廣二㝷八尺日尋鄭注重屋義然􅀷二仞而遂人職遂溝洫澮川皆無尺數康成謂遂溝洫澮皆􅀁以通水扵川也遂廣􅀷各二尺溝倍之洫倍溝澮廣二尋􅀷二仞以南畮圗之則遂從溝横洫從澮橫九澮而川周其外焉其尺數皆依匠人是則經之互文明矣而川之廣深康成不觧賈釋云此川亦人造雖無丈尺之數盖亦倍澮耳是則川廣四尋深四仭也又遂人職遂上有徑溝上有畛洫上有涂澮上有道川上有路康成謂徑畛涂道路皆􅀁以通車徒扵國都也徑容牛馬畛容大車涂容乗車一􅁤入尺曰􅁤鄭法經涂義然道容二􅁤路容三􅁤覯謂涂容乗車一􅁤廣八尺也然則畛四尺徑二尺明矣鄭云徑容牛馬畛容大車謂容大車一􅁤廣六尺然皆無文可據以意言之耳既以涂依洫廣道依澮廣則徑畛自可依遂溝二尺四尺也而匠人職遂溝洫澮康成云遂上亦有徑覯謂既以互文觀之則溝上亦有畛洫上亦有涂澮上亦有道也其尺數亦如之矣然此五溝五涂􅀁占不寡而康成之注止以萬夫為方三十三里少半里一甸為方八里旁加一里為一成絶不言溝涂􅀁占若以溝瀆涂巷巳在三分去一之數則此五溝五涂者本經緯扵田間固不别在一䖏苟田在扵此而溝在扵彼則云巳在三分去一之數可也今田與溝混在一䖏則萬夫不得止方三十三里少半里一甸不止方八里也若以溝涂不别出秪就减夫田為之則名為授田百畮而又以溝涂占之非􅀁以損上益下之義也且遂徑至小而川路至大臨遂徑者則􅀁減甚少臨川路者則􅀁減甚多名曰平土其實不平至矣是豈聖人之意乎今覯悉計出之見扵後然萬夫則扵舊三十三里少半里之外有􅀁増占一甸則雖扵舊八里之外亦有􅀁増占其如有旁加一里因就用之固猶不出一成之内其要皆在以官地為溝涂不害民田而已耳抑又鄊遂之地一統扵公故三十三里少半里之外可以増占都鄙受封各有里數故一成之外不可别求雖封邑不止于一成然自一成為之始則其餘方免不足也七曰按萬夫舊方三十三里少半里凡數三分有一為少半則是三十三里一百歩也三百歩為一里萬夫之間自東至西九十遂九十徑遂廣二尺徑廣二尺則六十歩也此歩直謂廣六尺不言方也後以意察之九洫九涂洫廣八尺涂廣八尺則二十四歩也兩旁二川三路川廣四尋為三十二尺路廣三􅁤為二十四尺則一十八歩有四尺也東西計増一百二歩有四尺自南至北九十溝九十畛溝廣四尺畛廣四尺則一百二十歩也九澮九道澮廣二㝷為一十六尺道廣二􅁤為一十六尺則四十八歩也兩旁二川二路其廣同之則一十八歩有四尺也南北計増一百八十六歩有四尺東西增一百二歩有四尺并舊三十三里一百歩通計三十三里二百二歩有四尺南北増一百八十六歩有四尺并舊三十三里一百歩通計三十三里二百八十六歩有四尺又以􅀁增之地拆之為夫以舊方三十三里一百歩㱕為萬夫外所增者併筭之則東西􅀁增從一百二歩有四尺横三十三里一百歩求歩得一百二萬歩其竒以為尺則得二十四萬尺南北􅀁増從一百八十六歩有四尺橫三十三里二百二歩有四尺求歩得一百八十七萬八千九百七十二歩其竒以為尺則得二十四萬六千九百二十八尺積尺得四十八萬六千九百二十八尺㱕之為歩又為一萬三千五百二十五歩二十八尺此以三十六尺為方一歩也積歩得二百九十一萬二千四百九十七歩二十八尺歩百為畮畮百為夫是為二百九十一夫二十四畮九十七歩二十八尺毎萬夫并五溝五涂􅀁占通計一萬二百九十一夫二十四畮九十七歩二十八尺也八曰按五十里為近郊以兩靣合言之方百里也王城當中方九里自王城四靣拒于近郊之表各從四十五里有半其橫各百里以萬夫如舊方三十三里一百歩則靣可置三萬夫今既増之則不􅀎容適可置二萬夫矣且以城之外則有野涂毎面三門固有三涂其埶必當中間直出于郊則二萬夫湏避而䖏兩角以毎靣而視之則各有二萬夫統而論之則四角􅂊四萬夫也百里為逺郊以兩靣合言之方二百里也自近郊之表拒于逺郊之表各從五十里其横各二百里東西二面各可置五萬夫南北二靣各可置三萬夫皆以地形相軋􅂊足容此一十六萬夫也二百里為甸地以兩靣合言之方四百里也自逺郊之表拒于甸地之表各從一百里其横各四里東西二面各可重行置二十萬夫外行一十一萬夫裏行九萬夫南北二靣各可重行置一十六萬夫外行九萬夫裏行七萬夫亦皆以地形相軋纔足容此七十二萬夫也其餘皆不方正不可為萬夫之川其數見扵後九曰按近郊之内方百里為方一里者萬凡里九夫則九萬夫也除王城九里為方一里者八十一是為七百二十九夫其餘方一里者九千九百一十九為八萬九千二百七十一夫四角置四萬夫之田毎萬夫并五溝五涂􅀁占共一萬二百九十一夫二十四畮九十七歩二十八尺四叚通計四萬一千一百六十四夫九十九畮九十一歩有四尺外猶有四萬八千一百六夫有八歩三十二尺此地不方正不可為萬夫之川也十曰按逺郊之内方二百里為方一里者四萬凡里九夫則三十六萬夫也除近郊之内巳占方一里者萬為九萬夫則此逺郊方一里者三萬為二十七萬夫四靣置一十六萬夫之田毎萬夫并五溝五涂􅀁占共一萬二百九十一夫二十四畮九十七歩二十八尺十六叚通計一十六萬四千六百五十九夫九十九畮六十四歩一十六尺東西一行五萬夫前筭毎萬夫各有川路四周其外盖如近郊四萬夫在四角不相接者也今此五萬夫成列則其間當省四川四路謂自西而東者凡一川一路南北之廣九歩二尺東西之長三十三里二百二歩有四尺求歩得九萬九百一十八歩其竒以為尺則得一十二萬一千四百四十八尺㱕之扵歩又為三千三百七十三歩二十又積歩得九萬四千二百九十一歩二十尺歩百為畮畮百為夫是為九夫四十二畮九十一歩二十尺此五萬夫之間􅀁省四川四路共省三十七夫七十一畮六十六歩有八尺西靣亦如之南靣一行三萬夫其間當省二川二路謂自北而南者凡一川一路東西之廣九歩二尺南北之長三十三里二百八十六歩有四尺求歩得九萬一千六百七十四歩其竒以為尺則得一十二萬二千四百五十六尺歸之扵歩又為三千四百有一歩二十尺積歩得九萬五千七十五歩二十尺歩百為畮畮百為夫是為九夫五十畮七十五歩二十尺此三萬夫之間􅀁省二川二路共省一十九夫有一畮五十一歩四尺北靣亦如之四靣共省一百一十三夫四十六畮三十四歩二十四尺卻扵上十六叚一十六萬四千六百五十九夫九十九畮六十四歩一十六尺之内除此一百一十三夫四十六畮三十四歩二十四尺外猶占一十六萬四千五百四十六夫五十三畮二十九歩二十八尺逺郊二十七萬夫除此十六叚占一十六萬四千五百四十六夫五十三畮二十九歩二十八尺外猶占二十萬五千四百五十三夫四十六畮七十歩有八尺此地亦不方正不可為萬夫之川也十一曰按甸地之内方四百里為方一里者一十六萬凡里九夫則一百四十四萬夫也除逺郊之内巳占方一里者四萬為三十六萬夫則此甸地方一里者一十二萬為一百八萬夫四靣置重行七十二萬夫之田毎萬夫并五溝五涂所占共一萬二百九十一夫二十四畮九十七歩二十八尺七十二叚通計七十四萬九百六十九夫九十八畮四十歩東西外行一十一萬夫其間省十川十路毎一川一路計九夫四十二畮九十一歩三十尺共省九十四夫二十九畮一十五歩二十尺東西裏行九萬夫其間省八川八路共省七十五夫四十三畮三十二歩一十六尺上兩行中間又省一横川一橫路謂自北而南横亘九萬夫前􅄸毎萬夫南北廣三十三里二百八十六歩有四尺九萬夫南北共廣三百五里一百八十歩今以其間先巳既省八川八路毎一川一路南北廣九歩二尺八川八路共巳省七十四歩有四尺九萬夫七十四萬九百六十九夫九十八畮四十歩東西外行一十一萬夫其間省十川十路毎一川一路計九夫四十二畮九十一歩三十尺共省九十四夫二十九畮一十五歩二十尺東西裏行九萬夫其間省八川八路共省七十五夫四十三畮三十二歩一十六尺上兩行中間又省一横川一橫路謂自北而南横亘九萬夫前􅄸毎萬夫南北廣三十三里二百八十六歩有四尺九萬夫南北共廣三百五里一百八十歩今以其間先巳既省八川八路毎一川一路南北廣九歩二尺八川八路共巳省七十四歩有四尺九萬夫猶廣三百五里一百五歩有二尺則此川路横三百五里一百五歩有二尺從九歩有二尺求歩得八十二萬四千四百四十五歩其竒以爲尺則得一百九萬九千三百七十二尺歸之扵歩又爲三萬五百三十八歩有四尺積歩得八十五萬四千九百八十三歩有四尺歩百爲畮畮百爲夫則此一横川一横路􅀁省八十五夫四十九畮八十三歩有四尺凡東靣兩行二十叚之間省十八川十八路及一横川一橫路共省二百五十五夫二十二畮三十一尺有四歩西靣亦如之南靣外行九萬夫其間省八川八路毎一川一路計九夫五十畮七十五歩二十尺共省七十六夫有六畮四歩一十六尺南靣裏行七萬夫其間省六川六路共省五十七夫有四畮五十三歩一十二尺上兩行中間又省一横川一横路謂自西而東横亘七萬夫前􅄸毎萬夫東西廣三十三里二百二歩有四尺七萬夫東西共廣二百三十五里二百一十八歩有四尺今以其間先槩省六川六路毎一川一路東西廣九歩二尺六川六路共巳省五十六歩七萬夫猶廣二百三十五里一百六十二歩有四尺則此川路横二百三十五里一百六十二歩有四尺從九歩有二尺求歩得六十三萬五千九百五十八歩其竒以為尺則得八十四萬八千一百六十八尺歸之扵歩又為三萬三千五百六十歩有八尺積歩得六十五萬九千五百一十八歩有八尺歩百為畮畮百為夫則此一横川一横路􅀁省六十五夫九十五畮一十八歩有八尺凡南靣兩行一十六叚之間省十四川十四路及一橫川一撗路共省一百九十九夫有五畮七十六歩北靣亦如之四靣共省九百八夫五十六畒一十四歩有八尺郤扵上七十二叚七十四萬九百六十九夫九十八畮四十歩之内除此九百八夫五十六畮一十四歩有八尺外猶占七十四萬有六十一夫四十二畮二十五歩二十八尺甸地一百八萬夫除此七十二叚占七十四萬有六十一夫四十二畮二十五歩二十八尺外猶有三十三萬九千九百三十八夫五十七畮七十四歩有八尺此地亦不方正不可為萬夫之川也是郷遂之田制俻矣十二曰按一甸舊方八里旁加一里為成成方十里也一甸之田方八里中有六十四井自東至西八井也井有九夫自東至西三夫也三夫之間則有二遂二徑遂廣二尺徑亦二尺八井則有十六遂十六徑八井之間及兩旁則有九溝九畛溝廣四尺畛亦四尺遂徑溝畛共增二十二歩有四尺南北亦如之凡此井田為溝洫異扵郷遂萬夫此毎夫之四靣從横皆為遂井之四靣從横皆為溝以至于邑丘甸不復别為限隔旁加為成乃為洫焉成之四靣從横皆為洫以至于縣都亦不復别為限隔四都旁加為同乃為澮周其外焉十里之中既取八里二十二歩有四尺以為一甸之田及遂徑溝畛外止有一里二百七十七歩有二尺毎靣分得二百八十八歩有四尺乃以二百歩為二夫之田從二夫也二夫之間及其外又以一歩二尺為二遂二徑則計二百一歩二尺矣其餘更有八十七歩二尺成之毎靣又為一洫一涂洫廣八尺涂亦八尺然多是兩成相接平分之則此靣占一歩二尺以八十七歩二尺又除此一歩二尺餘止有八十六歩矣今以二夫之田爲二行前以二百歩爲二夫者也又以八十六歩爲一行共三行也四靣毎靣内第一行横列二十四夫四角又四夫共一百夫每靣第二行二十六夫四角又四夫共一百八夫第三行不成夫者以畮言之四靣每靣横一百歩從八十六歩者二十八叚共一百一十二叚毎叚爲方一歩者八千六百是爲八十六畮四角毎角方八十六歩者一叚共四叚毎叚爲方一歩者七千三百九十六是爲七十三畮九十六歩積畮得九千九百二十七畮八十四歩每叚巳有遂徑溝畛間之不復計為夫矣一成之中除一甸之田及遂徑溝畛洫涂􅀁占外旁加更得田二百八夫其不成夫者又得九千九百二十七畮八十四歩鄭云旁加一里謂加一井也今此不得爲井矣又計成之靣構百歩者二十八横八十六歩者二共横二千九百七十二歩又其間為二十遂二十徑九溝九畛兩旁二半洫二半涂共横二十八歩通計三千歩凡三百歩為一里此横十里畧無差也四靣皆然四成為縣經曰四甸其實四成也四縣為都四都六十四成也方八十里旁加十里加一成也為百里謂之一同一同百成矣前筭成法毎一成合各為一洫一涂四周其外然以多是兩成相接故平分之各占半洫半涂今此一同百成其中六十四成四靣皆有接毎靣各秪占半洫半涂如前法矣至扵旁加三十六成則四旁三十二成各一靣無接四角四成各囬曲兩靣無接也既無接則當為全洫全涂乎曰否凡一同之外當為澮與道也澮周扵同道周扵澮若是則須變半洫半涂以為一澮一道也半洫半涂其廣一歩二尺一澮一道其廣五歩二尺然則增四歩也三十二成各一靣無接變其一靣半洫半涂以為一澮一道澮道􅀁増之地横十里從四歩求歩得一萬二千内除横二十八歩從四歩前是二十遂二十徑九溝九畛二半洫二半涂皆為從者展計一百一十二歩外猶占一萬一千八百八十八歩歩百為畮是為一百一十八畮八十八歩前筭一成之田其不成夫者猶得九千九百二十七畮八十四歩今復增此澮道􅀁占一百一十八畮八十八歩外止有九千八百八畮九十六歩四成皆囬曲兩靣無接變其兩靣之半洫半涂以為一澮一道一靣如上􅀁計增占一百一十八畮八十八歩一靣横九里二百九十六歩本十里也其四歩巳入右靣所計矣從四歩求歩得一萬一千九百八十四歩内除横二十六歩四尺從四歩前是二十遂二十徑九溝九畛一半洫一半涂一半洫一半涂巳在所刻退四歩之地矣展計一百四歩其竒以為尺則得九十六尺歸之扵歩又為二歩二十四尺通計一百六歩二十四尺外猶占一萬一千八百七十七歩一十二尺歩百為畮是為一百一十八畮七十七歩一十二尺前筭一成之田其不成夫者猶得九千九百二十七畮八十四歩今復增此兩靣澮道􅀁占共二百三十七畮六十五歩一十二尺外止有九千六百九十畮一十八歩二十四尺一同百里為方一里者萬凡里九夫則九萬夫也今此筭一同百成成中一甸甸六十四井井九夫是為五百七十六夫旁加又得二百八夫総計七百八十四夫百成則七萬八千四百夫也其不成夫者扵中六十四成成有九千九百二十七畮八十四歩縁􅁁三十六成其三十二成成有九千八百八畮九十六歩又四成成有九千六百九十畮一十八歩二十四尺百成通計九十八萬八千二十九畮二十二歩二十四尺一切以夫折之則又爲九千八百八十夫二十九畮二十二歩二十四尺綂論之則一同之地爲田八萬八千二百八十夫二十九畮二十二歩二十四尺其餘盡以爲遂徑溝畛洫涂澮道也以九萬夫言之則遂徑溝畛洫涂澮道所占一千七百一十九夫七十畮七十七歩一十二尺雖然此獨以一同言之耳如兩同相接則又省焉别見扵後今據稍縣都並是兩同相接無用此制然述法之始須先定一同而後可議其有接無接故特先爲此制也亦恐山川隔破其間或有獨置一同之䖏焉耳經曰同間謂之澮誠謂兩同間爲一澮也洫以下意亦同以都鄙而形鄊遂是以前二萬夫之間皆省一川也十三曰按稍地二十同其十六同各三靣有接一靣無接抵甸地也甸地雖有萬夫之川與之相接然其制度不同故此稍地别爲澮道若無接然也其四同各四靣皆有接在四角也十六同各三靣有接一靣無接毎同無接之靣凡十成中間八成毎成之一靣變其半洫半涂以爲一澮一道如前􅀁計毎成増占一百一十八畮八十八歩外其不成夫之田猶有九千八百八畮九十六歩左右二成毎成之一靣變其半洫半涂以為一澮一道亦如前􅀁計毎成増占一百一十八畮八十八歩又一靣變其半洫半涂以為半澮半道以回曲故此一靣又変之然與他同接故但為半澮半道半洫半涂共八尺半澮半道共一十六尺然則増一歩二尺地矣􅀁増之地横九里二百九十六歩本亦十里也其四歩巳入右靣所計矣從一歩二尺求歩得二千九百九十六歩其竒以為尺則得三萬五千九百五十二尺㱕之扵歩又為九百九十八歩二十四尺積歩得三千九百九十四歩二十四尺内除横二十六歩四尺從一歩二尺前是二十遂二十徑九溝九畛一半洫一半涂一半洫一半涂巳在所刻退四歩之地矣展計二十六歩其竒以爲尺則得三百四十四尺㱕之扵歩又爲九歩二十尺通計三十五歩二十尺外猶占三千九百五十九歩有四尺歩百爲畮是爲三十九畮五十九歩有四尺毎成兩靣増占一百五十八畮四十七歩有四尺外其不成失之田猶有九千七百六十九畮三十六歩三十二尺有接之靣凡二十六成二十四成䖏三靣每靣八成毎成之一靣變其半洫半涂以爲半澮半道􅀁增之地横十里從一歩二尺求歩得三千歩其竒以爲尺則得三萬六千尺㱕之扵歩又爲一千歩積歩得四千歩内除横二十八歩從一歩二尺前是二十遂二十徑九溝九畛二半洫二半涂展計二十八歩其竒以爲尺則得三百三十六尺㱕之扵歩又爲九歩一十二尺通計三十七歩一十二尺外猶占三千九百六十二歩二十四尺歩百爲畮是爲三十九畮六十二歩二十四尺毎成除此澮道増占三十九畮六十二歩二十四尺外其不成夫之田猶有九千八百八十八畮二十一歩一十二尺二成䖏兩角每成之一靣變其半洫半涂以爲半澮半道如前􅀁計增占三十九畒六十二歩二十四尺又一靣亦變其半洫半涂以為半澮半道皆以回曲故又變之􅀁増之地横九里二百九十八歩四尺本亦十里也其一歩二尺巳入右靣所計矣從一歩二尺求歩得二千九百九十八歩其竒以為尺則得三萬六千有八尺㱕之扵歩又為一千歩有八尺積歩得三千九百九十八歩有八尺内除横二十六歩四尺從一歩二尺前是二十遂二十徑九溝九畛一半洫一半涂一半洫一半涂已在所刻退之一歩二尺之地展計三十五歩二十尺展歩尺之詳見上此後凡不相筭而但言成数者盖前有類者矣覆尋之可見也外猶占三千九百六十二歩二十四尺歩百為畮是為三十九畮六十二歩二十四尺毎成兩靣増占七十九畮二十五歩一十二尺外其不成夫之田猶有九千八百四十八畮五十八歩二十四尺毎同百成総計七萬八千四百夫其不成夫者扵中六十四成成有九千九百二十七畮八十四歩縁邉三十六成其八成成有九千八百八畮九十六歩其二成成有九千七百六十九畮三十六歩三十二尺又二十四成成有九千八百八十八畮二十一歩一十二尺又二成成有九千八百四十八畮五十八歩二十四尺百成通計九十九萬四百六畮四十七歩有四尺一切以夫折之則又為九千九百四夫六畮四十七歩有四尺統論之則此一同之地為田八萬八千三百四夫六畮四十七歩有四尺其餘盡以為遂徑溝畛洫涂澮道也以九萬夫言之則遂徑溝畛洫涂澮道所占一千六百九十五夫九十三畮五十二歩三十二尺四同各四靣皆有接毎同四靣三十二成成之一靣變其半洫半涂以為半澮半道毎成増占三十九畮六十二歩二十四尺外其不成之田猶有九千八百八十八畮二十一歩一十二尺四角四成各回曲兩靣變其半洫半涂以為半澮半道毎成増占七十九畮二十五歩一十二尺外其不成夫之田猶有九千八百四十八畮五十八歩二十四尺毎同百成総計七萬八千四百夫其不成夫者扵中六十四成成有九千九百二十七畮八十四歩縁邉三十六成其三十二成成有九千八百八十八畮二十一歩一十二尺其四成成有九千八百四十八畮五十八歩二十四尺百成通計九十九萬一千一百九十八畮九十三歩一十二尺一切以夫折之則又為九千九百一十一夫九十八畮九十三歩一十二尺統論之則此一同之地為田八萬八千三百一十一夫九十八畮九十三歩一十二尺其餘盡以為遂徑溝畛洫涂澮道也以九萬夫言之則遂徑溝畛洫涂澮道所占一千六百八十八夫有一畮六歩二十四尺凡稍地二十同同九萬夫合計一百八十萬夫今積得田一百七十六萬六千一百一十二夫九十九畒二十七歩有四尺盖其餘盡以為遂徑溝畛洫涂澮道也以一百八十萬夫言之則遂徑溝畛洫涂澮道所占三萬三千八百八十七夫十十二歩三十三尺十四曰按縣地二十八同各四靣皆有接其制如稍地之角角置四同者也二十八同同九萬夫合計二百五十二萬夫今積得田二百四十七萬二千七百三十五夫七十畒一十三歩一十二尺盖其餘盡以為遂徑溝畛洫涂澮道也以二百五十二萬夫言之則遂徑溝畛洫涂澮道所占四萬十千二百六十四夫二十九畮八十六歩二十四尺十五曰按畺地三十六同其三十二同各三靣有接一靣無接其制如稍地之正正置十六同者也四角四同各二靣有接二靣無接回曲故也毎同前左右兩行一十六成以自内視角為前毎成之一靣變其半洫半涂以為一澮一道計増占一百一十八畮八十八歩外其不成夫之田猶有九千八百八畮九十六歩後左右兩行一十六成毎成之一靣變其半洫半涂以為半澮半道計増占三十九畮六十二歩二十四尺外其不成夫之田猶有九千八百八十八畮二十一歩一十二尺前角一成變其兩靣各半洫半涂以為一澮一道計共増占二百三十七畮六十五歩一十二尺外其不成夫之田猶有九千六百九十畮一十八歩二十四尺左右兩角二成毎成之一靣變其半洫半涂以為一澮一道又一靣變其半洫半涂以為一澮一道又一靣變其半洫半涂以為半澮半道計共増占一百五十八畮四十七歩有四尺外其不成夫之田猶有九千七百六十九畮三十六歩三十二尺後一角一成其兩靣各變其半洫半涂以為半澮半道計共增占七十九畮二十五歩一十二尺外其不成夫之田猶有九千八百四十八畮五十八歩二十四尺每同百成総計七萬八千四百夫其不成夫者於中六十四成成有九千九百二十七畮八十四歩縁邉三十六成其一十六成成有九千八百八畮九十六歩又一十六成成有九千八百八十八畮二十一歩一十二尺又一成有九千六百九十畮一十八歩二十四尺又二成成有九千七百六十九畮三十六歩三十二尺又一成有九千八百四十八畮五十八歩二十四尺百成通計九十八萬九千六百一十四畮有四歩一十六尺一切以夫折之則又為九千八百九十六夫一十四畮有四歩一十六尺統論之則此一同之地為田八萬八千二百九十六夫一十四畮有四歩一十六尺其餘盡以為遂徑溝畛洫涂澮道也以九萬夫言之則遂徑溝畛洫涂澮道所占一千七百有三夫八十五畮九十五歩二十尺凡畺地三十六同同九萬夫合計三百二十四萬夫今積得田三百一十七萬八千九百一十四夫六十三畮二十五歩一十二尺盖其餘盡以為遂徑溝畛洫涂澮道也以三百二十四萬夫言之則遂徑溝畛洫涂澮道所占六萬一千八十五夫三十六畮七十四歩二十四尺凡五涂各有所隔徑隔扵溝畛隔扵洫涂隔扵澮道隔扵川所隔之䖏必有橋焉川之水必决路而􅂥之以㱕于大川各随地埶所向不可定其隔䖏井田之徑畛涂道亦如鄊遂爲橋澮之水亦􅂥而㱕諸大川也司險職曰周知其山林川澤之阻而逹其道路康成謂川澤之阻則橋梁之下文曰設國之五溝五涂而逹其道路康或雖不復觧然以上文觀之此爲橋梁亦明矣匠人職澮之下曰專逹扵川各載其名盖謂大川也以此察彼知其皆然是都鄙之田制􅇱矣十六曰或曰大㢤王畿之廣輪王國之逺近任地之異制田之例山川之不億度溝涂之有増占自萬夫以至于一同自近郊以至于畺地繄子之論詳矣其􅀁以授扵民多少之數可得而聞與曰夫治民必先定其居䖏而後可使之樂業也故司空執度度地以居民正爲此焉今六鄊六遂各七萬五千家也然此􅂊謂農民其餘有百工商賈庶人在官者凡此之類抑又多矣載師職曰以㕓任國中之地康成謂㕓民居之區域也里居也遺人職曰掌鄊里之委積以恤民之囏阨康成謂鄊里鄊􅀁居也縣師職曰掌􅀖國都鄙稍甸郊里之地域康成謂郊里郊􅀁居也賈釋云郷里據國中即六郷之民居在國中載師以㕓里所任地是也郊里據在郊即六郷之民所居郊者也然則六郷之居布在國中外至近郊逺郊也遂入職曰辨其野之土以頒田里夫一㕓田百畮則六遂之居在甸地者也舊說㕓者二畮半一家之居孟子曰五畮之宅􅀣之以来當從孟子五畮為正甸地既一㕓五畮則郊内國中亦各五畮也然康成注遂人謂㕓城邑之居注載師云以㕓里任國中而遂人職授民田夫一㕓田百畒是㕓里不謂民之邑居在都城者與鄭意以六遂之民雖田在甸地而居扵國中且甸地扵國二百里也去家二百里而耕孰為便㢤抑王城方九里為方一里者八十一凡里九百畮為七萬二千九百畮盡以為遂民之居一家五畮􅂊可容萬四千五百八十家况王宮祖社朝市國宅之属及鄊民􅀁居在其中乎則六遂七萬五千家扵何置之苟鄭意都城是都邑之城則六遂􅀁管與都邑異遂民不可越在都邑也又其往来亦非近矣且康成既以六鄊之居有在扵郊則六遂之民奚為不可居甸乎是失之甚矣大司徒職曰凡造都鄙制其地域而封溝之以其室數制之康成亦謂城郭之宅田室盖鄭以六遂居在國中故扵都邑亦云室在城郭也其經意但以室數為家數豈分扵城之内外與其實采地之民或居城郭或在野焉其地盖亦不出一㕓五畒之數也或曰敢問莫非王民也而吾子之論以六鄊為農人而百工商賈之􅀋不與其數何㢤曰覯觀鄭注則然且裁其理至當矣夫農人國之本也三時力耕􅂩而講武以之足食以之足兵或致之扵庠序習禮義為賢才是天民之良者也故為之郷為之遂以編著之而統于司徒司徒教官也若夫工問之類棄本逐末但以世資其用不可無之安足比扵農人㢤抑其各有􅀁統工則統扵司空賈則統於司市庶人在官者各統於其官府其餘皆然雖不繫于鄊遂可也曰既不繫於鄊遂則其􅀁䖏郊乎國乎曰聖王敦本尚儉雖有工賈必不甚衆庶人在官者亦有常数其餘益寡矣國中或可以居之抑其朝夕有事於市朝當在國中乃為便也十七曰或曰奠民之居既承教矣耕田之數願聞其悉曰按大司徒職曰凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畒此都鄙授田之制也不易之地嵗種之故家百畮一易之地二嵗一種故家二百畮再易之地三嵗一種故家三百畮以地利有厚薄宜差之也又遂人職曰辨其野之土上地夫田百畮莱五十畮餘夫亦如之中地夫田百畮莱百畮餘夫亦如之下地夫田百畮莱二百畮餘夫亦如之此六遂授田之制也亦以地利有厚薄故差其莱數以平之莱田之休不耕者也至六鄊之田未見明文惟小司徒職云乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人以覯觀之若以為都鄙六遂乎則中地下地巳増其田莱畮數榷其收入必亦無偏不容更有七人六人五人􅀁食之差也此盖是六鄊授田之制以郊地狹隘而六郷分之矧塲圃宅田士田賈田官田牛田賞田牧田在其間則雖有中地下地不得更増其畮數但以其家人多少制之七口以上則授之以上地六口則授之以中地五口以下則授之以下地焉其實皆百畮也地有九等所養男女自二人以至十人七六五者舉中地之三等而言也今據逺郊之内田二十萬夫近郊四萬夫逺郊十六萬夫其不為萬夫之川者又有一十五萬三千五百五十九夫四十六畮七十九歩四尺近郊四萬八千一百六夫有入歩三十二尺逺郊一十萬五千四百五十三夫四十六畮七十歩八尺盖以為六鄊之田也里也里居也塲圃也宅田也士田也賈田也官田也牛田也賞田也牧田也其餘則王城之外有環涂環涂七􅁤有野涂野涂五􅁤有郊四郊皆有神兆有明堂明堂在國之陽三里之外七里之内丙巳之地宮方三百歩有籍田籍田千畮有學虞庠在國之西郊有榭榭所以講軍實足以臨見王之士卒而已其所不奪穡地瘠磽之地扵是乎為之其埶須在城之外也亦或有山陵林麓川澤溝瀆之跨其地其不為萬夫之川者亦未計出五溝五涂所占也下同又其餘則以待餘夫也或曰郊内無餘夫之文子何以言之曰六鄊之人不得不有餘夫且舉遂則鄊可知矣亦計郊内地猶有以待之也甸地之田七十二萬夫其不為萬夫之川也又有三十二萬九千九百三十八夫五十七畮七十四歩八尺盖以為六遂之田也㕓也其餘亦或有山陵林麓川澤溝瀆之跨其地又其餘則以為公邑也或曰子既言鄊有餘夫而扵遂何以不言且遂人職巳著之矣曰遂之餘夫􅀁受之田属公邑耳不可析言也遂之家數與田既有定限其地域且溝􅀣之矣若有餘夫其田何從而得必外取扵公邑焉曰然則六鄊餘夫􅀁受之田何以不為公邑曰郊内地狹其􅂩者必不甚多且近偪王國故雖以待餘夫不復别稱為公邑也或曰公邑獨遂之餘夫耕之乎曰不然康成謂士工商以事入在官而餘夫以力出耕公邑覯謂亦非獨士工商而巳也雖庶人在官者畜牧之家之餘夫亦出耕扵此焉民之生息嵗月浸多積數世之後其餘夫豈可勝數公邑雖廣或弗􅀎容矣是聖人先有以待之也若稍以外則八十四同稍地二十同縣地二十八同畺地三十六同除名山大澤不以朌凡當山陵林麓川澤溝瀆不廢悉以班之其餘以為王子弟食邑公卿大夫采地又其餘則以為公邑也其食邑采地之内則自以授其􅀁􅃹之民其餘亦或有山陵林麓川澤溝瀆之跨其地又其餘則以待餘夫也又弗䏻容則亦當出耕扵其􅀁近公邑其人則繫扵都鄙其田稅則㱕扵王官是公私兩利之意也或曰遂人云萬夫有川川上有路以逹于畿康成謂去山陵林麓川澤溝瀆城郭宮室涂巷三分之制其餘如此以至于畿康成固知都鄙為井田矣則其意謂公邑自稍以外亦如甸地為萬夫之川與曰是康成之誤也此川上有路以逹于畿止謂由此路而往可通扵畿耳以明其􅀁以為道路扵田間者非妄也􅀅以利往来之人内通扵國外通扵畿國近而畿逺逺之可逹近可知矣是以省文言畿而不言國也非謂一㮣為萬夫之川以至畿也且自稍以外公邑誠以采邑之餘一切使大夫治之後復欲爵祿扵人又取之以為采邑也公卿大夫寔有定貟若有王子弟則世世生息安有紀極是采邑之增無世無之苟今公邑盡為萬夫之川他日造都鄙為井田又當改作乎何勞力之甚也若造都鄙而循用萬夫之川非制也以覯論之甸地公邑自依六遂萬夫之川稍縣畺地公邑亦循都鄙井田之制或近或逺随宜而變扵義當矣或曰都鄙授田則有不易百畮一易二百畮再易三百畮凡三等遂地授田則有上地田百畮萊五十畮中地田百畮萊百畮下地田百畮萊二百畮凡三等鄊地授田則有上地家七人中地家六人下地家五人雖以地利差其口數其田實皆百畮凡一等而康成之義自六郷以及甸稍縣都悉以不易一易再易通率之云一家受二夫且不易一易再易獨是都鄙授田之制豈可以包鄊遂乎曰康成固妄矣非徒不可以包鄊遂也雖都鄙之制有不易一易再易然須定有一百畮不易者二百畮一易者三百畮再易者合六百畮而三家受之此則可云通率一家受二夫也若多少稍差則巳失之矣况其積筭數百萬夫而乃公言通率一家受二夫何其徒用心㢤今則皆不取焉但􅇱舉鄊遂都鄙授田之明制使執事者躬相地宜而頒之不敢以預言也十八曰或問田里之論則然矣其王子弟食邑公卿大夫采地小大之法何如曰康成謂其制三等百里之國凡四都一都之田稅入扵王五十里之國凡四縣一縣之田稅入扵王二十五里之國凡四甸一甸之田稅入扵王其意以公采地為一等百里之國也王之母弟及庶子同卿采地為一等五十里之國也稍䟽者同大夫采地為一等二十五里之國也最䟽者同又其注載師謂家邑大夫之采地小都卿之采地大都公之采地王子弟􅀁食邑然則三公百里之國在畺地卿五十里之國在縣地大夫二十五里之國在稍地也畺地三十六同同為百里之國一是為三十六國也縣地二十八同同為五十里之國四是為一百一十二國也稍地二十同同為二十五里之國十有六是為三百二十國也此其大畧耳苟有名山大澤占之則依􅀁占减焉或王子弟公卿大夫人數少食之不盡則以其餘為公邑以俟後耳然今按周禮公三人其郷老二郷則公一人盖此三公兼之卿十有五人三􅀌六官及六卿大夫毎郷卿一人大夫則冬官巳亡唯五官在五官之屬大夫三百三十七人煩不俻舉若加以冬官之屬及公邑又别有大夫治之其數盖不下四百人也今稍地為二十五里之國三百二十或有名山大澤占之則從而减焉又王子弟最䟽者之􅀁食在其中若是大夫之邑其不足者多矣然縣地為五十里之國一百一十二雖或有名山大澤占之及王子弟稍䟽者之􅀁食在其中而卿止扵十有五人其餘地盖尚多也大夫之邑不足其取諸此乎雖王之母弟庶子衆多畺地弗􅀎容之取扵此亦可也又其餘乃以爲公邑焉或曰禮云天子立三公九卿二十七大夫八十一元士扵周禮何其不同也曰此夏禮而商因之者也其田則公百里卿七十里大夫五十里至周則自卿以下増其員而减其禄盖後世政事漸繁事繁則官不得不增官多則禄不得不减􅀔使然也十九曰或人請問賦稅之法覯對曰按太宰職以九賦歛財賄一曰􅀖中之賦二曰四郊之賦三日邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦餘三者不出扵田里故不舉康成謂賦口率出泉也今之筭泉民或謂之賦此其舊名與郷大夫以嵗時登其夫家之衆寡辨其可任者皆征之遂師之職亦云以令其財征皆謂此賦也是則周時已如漢筭泉但漢法筭泉人百二十周之賦泉數則未聞矣又按載師職曰凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五此征則皆指田稅也康成謂國宅凡官􅀁有宮室吏􅀁治者也周稅䡖近而重逺近者多役也園㕓亦輕之者㕓無榖園少利也經又曰凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征康成亦謂宅不毛者罰以一里二十五家之泉今詳司農注引孟子云㕓無夫里之布其意可取盖凡稅者各随其地􅀁出田有榖則輸其榖宅有桑麻則輸其布帛唯㕓里在國中者人衆宇廣無所􅀣藝則課之出泉布亦料其㕓地所可􅀣藝多少二十之價而取其一焉若城外之宅可􅀣桑麻而怠廢不為者則依國中例課之出泉布盖􅀣桑麻易為功而出泉布難為力所以罰之使其勤耳故曰宅不毛者有里布也田不耕者出屋粟康成謂罰以三家之稅粟周禮不爲屋但以三家之稅粟借文以稱之焉盖不耕一夫之田則納三夫之稅粟倍重之亦以罰其怠也民無職事者出夫家之征康成謂出夫稅家稅夫稅者百畮之稅家稅者出士徒車輦給繇役盖勤而就田業則有夫家之稅間而無職事者亦有夫家之稅與其無地而輸財孰若受田之􅀗利也此亦以勸其勤耳大畧自國以至于畿税輕者不減二十而一重者不逾十二􅃮林雖重顧亦少焉皆以役多少叅折之也此賦稅之定令也或曰古者皆謂周稅什一今此論何其等級之多乎曰其謂什一舉近郊而言也古之言質舉近而畧逺也後儒耳目不接得其畧而失其詳因謂皆什一也夫周禮豈可誣㢤抑不獨扵周然也其言夏商什一者亦猶是也後凡言什一者意同或人又問曰幸卒業扵賦稅矣其所以制軍旅具車甲願因言焉曰按夏官司馬曰凡制軍萬有二千五百人爲軍王六軍軍􅀅皆命卿二千五百人爲師師帥皆中大夫五百人爲旅旅帥皆下大夫百人爲卒卒長皆上士二十五人爲兩兩司馬皆中士五人爲伍伍皆有長康成謂軍師旅卒兩伍皆衆名也伍一比兩一閭卒一族旅一黨師一州軍一鄊家􅀁出一人此則六鄊為六軍七萬五千人也又按遂人職曰以嵗時稽其人民而授之田野簡其兵器敎之稼穡康成謂遂之軍法追胥起徒役如六鄊若是則六遂亦為六軍七萬五千人也但以王家迭而用之則其興發常六軍耳故止言六軍也此鄊遂制軍之法也又按司馬法通三十家出匹馬士一人徒二人成三百家出革車一乗士十人徒二十人終三千家出革車十乗士百人徒二百人同三萬家出革車百乗士千人徒二千人此雖井田顧未與周制同今按春秋成元年三月作丘甲杜氏注以為丘出戎馬一匹牛三頭甸出長轂一乗戎馬四匹牛十二頭甲士三人歩卒七十二人此甸所賦今魯使丘出之譏重歛故書左傳哀十一年季孫欲以田賦使冉有訪諸仲尼仲尼不對而私扵冉有曰君子之行也度扵禮施取其厚事舉其中歛從其薄如是則以丘亦足矣杜氏亦謂丘出戎馬一匹牛三頭是賦之常法若不度扵禮而貪冐無厭則雖以田賦􅀅又不足且子季孫若欲行而法則周公之興在若欲苟而行之又何訪焉以是觀則丘賦實周公之典舉丘則甸明矣如此一同百甸甸旁加為成則百成也亦百乗也百乗則戎馬四百匹牛一千二百頭甲士三百人歩卒七千二百人乗數雖同而士卒之制多少異矣今亦本周制為定盖甸以内六鄊六遂則為十二軍迭用其六軍稍以外八十四同則為八千四百乗亦逺近異制矣如有名山大澤占之同數不滿則亦依數减之矣以一切而言則畿内千里合當百同故古謂天子萬乗也大凡康成謂成之一甸同之四都出田稅其旁加者甸旁以治成之洫都旁以治同之澮覯謂溝洫始為之也則用力多後治之也則用力寡矣􅂚足免其田稅乎今觀車賦止扵甸不言成豈非旁加者不與車賦但主為治洫乎總百成之旁加者既各盡治其洫又共治其同之澮以役折役扵事為宜且其治洫澮一嵗中豈數數然㢤是賦稅軍旅車甲之議盡矣二十曰或曰古之人皆謂周為公田公田百畮其二十畮以為八家之居八家各受百畮以為私田通九百畮為一井公田借民力以耕不稅其私田詩春秋論語孟子之􅀃皆然特周禮為異稅夫無公田康成以為周之畿内用貢法稅夫無公田夏之貢法也􅀖國用助法制公田不稅夫商之助法也畿内用貢法者鄊遂及公邑之吏旦夕從民事為其促之以公使不得恤其私邦國用助法者諸侯專一國之政為其貪􅁀稅民無藝此論何如曰天子之政自國而形天下者也豈有天子之國自稅民田而令諸侯但為公田而不稅㢤雖其嵗入同歸于什一然非􅀁以身率之謂也且畿内有鄊遂公邑之吏旦夕促之以公而諸侯之國豈無其吏􅀎促之者乎苟為其貪暴稅民無藝則若王政明諸侯奉法雖使之稅敢過制乎若王政不眀諸侯不奉法雖為公田彼不􅀎外取乎是皆非通理之論也覯謂周之畿内以及天下諸侯一用貢法稅夫無公田也公田商禮也抑文王之時雖巳受命尚為商之諸侯其田猶依商禮至武王得天下周公攝政作禮樂方遂變之故言周爲公田者其原在聞之扵文武之時而不知周公巳變之也孟子曰夏后氏五十而貢商人七十而助周人百畒而徹其實皆什一也徹者徹也助者藉也則孟子既知周制與商異矣其下文又曰詩云雨我公田遂及我私惟助爲有公田由此觀之雖周亦助也孟子雖知周制與商異然見詩有公田之文其詩又是周雅故復疑周亦爲公田如商之助也其曰由此觀之雖周亦助則疑之之辭也既疑周爲公田故至滕文公使畢戰問井地乃對以圭田餘夫公田之􅀃謂今可行也夫圭田亦商禮也周則曰士田矣餘夫二十五畮盖亦商禮也周則皆百畮矣然則孟子􅀁稱悉是所聞商時之禮徒見周詩引公田乃復疑是周制耳不然何以上文云周人百畮而徹如徹取之謂與至如周詩所引公田亦非指言當時之事盖以幽王政煩賦重君子傷今而思古故引古公田以諷之亦不言之公田果在何王之時也獨其上章云播厥百榖既庭且碩曽孫是若鄭箋云曽孫謂成王也若以成王之時則周公巳作禮樂矣而曰雨我公田是周制果為公田也然康成何以專指曾孫為成王夫孝孫曾孫抑是事宗廟之通稱禮曰祭稱孝子孝孫以其義稱也其稱曽孫某謂國家也若是則人君䏻繼先祖有國家君子取其廟中之稱而稱之曰曾孫皆可也豈成王得專之㢤安知詩人􅀁指不謂武王也文王也苟詩人􅀁指謂武王以上則自是周公未制禮之前誠無害扵周禮之夫稅也且孟子對齊宣王亦曰昔者文王之治􅄮也耕者九一是乃正指九一公田在文王也文王則依商禮决矣獨至周詩而疑之疑之又不明辨從而遂其疑謂荅畢􅀾也顧亦先後反矣先言徹後言公田也春秋宣十五年初稅畮左傳曰初稅畮非禮也榖出不過藉以豐財也覯謂魯之先田稅既定矣然山林川澤之旁歴世之後或頗墾闢以有餘畮宣公又履而稅之傳稱榖出不過藉盖丘明謂周家雖不謂公田然其井邑之􅀁出稅榖亦不過商時藉數如孟子􅀁謂其實皆什一之義也非謂周有公田而借民力以耕也公羊曰古者什一而藉榖梁曰古者公田爲居井􅍳葱韭盡焉是皆舉商禮以言之也大凡先儒多稱商禮抑非止聞之扵文武之時而不知周公巳變之也盖亦孔子商之子孫其服行尚依商禮檀弓夫子日夏后氏殯於東惜之上則猶在作也商人殯于兩楹之間則與賔主夾之也周人殯扵西階之上則猶賔之也而丘也商人也予疇昔之夜夣坐奠扵兩楹之間夫明王不興而天下其孰􅀎宗予予殆􅀅死也而論語曰周監扵二代郁郁乎文㢤吾從周誠夫子其身之私則法先祖天下之公則從時王且周制文扵商也其可忽諸先儒徒見夫子行商禮因謂天下之法盡當從商則其􅀁言多稱商禮傳之積乆後世莫知其本源誤謂之為周制故言周制者或以商禮雜亂其間則後世之言益不可信也如有若之對哀公盍徹與實止謂周家什一之徹法不足更疑其道公田也夫如是則詩春秋論語孟子皆不謂周公之制有公田後世諸儒觧之者非也康成惑之亦非也自王國以至于藩服一也或曰助法不善與周公故變之也曰助法善之大也周公變之慮之深也夫周公以民益頑吏益猾公田之耕或不盡力藉榖之入或有􅀮欺不如一委之民而制其賦稅稅有􅀁常責有􅀁在安坐而視其入也禮制愈崇國用愈廣何暇從容如上世乎雖然無􅀁増重也第謹其定數耳扵民既無傷扵國則不乏是聖人慮之深制之中也或曰敢問司馬法既為井田而周公變之何也曰司馬法雖為井田然其未方也唯井方一里成方十里同方百里焉其餘十井為通則長十里廣一里十成為終則長百里廣十里皆不方也周公欲以封邑諸侯群臣故自井以上皆方之邑方二里丘方四里甸方八里縣方二十里都方四十里成與同則仍依司馬法方者依之不方者改之無小無大皆方也舉而用之之易也井田既變則車賦亦不得復依司馬法矣故以丘甸制焉且一甸六十四井雖盡再易之地猶可授一百九十二家其出甲士歩卒共七十五人不為多矣抑征討有時非常常而用也故士卒之數增焉皆聖人以義制事預備不虞之道也或曰司馬法文王時所作而周公敢變之何也曰夫孝者謂􅀎承其志意非必盡循其政令膠柱而不改也况文王雖作司馬法而未之施行乎文王在岐為諸侯見商祚􅀅盡知天命在巳故經始司馬法待其即天子位而行之文王大勲未集武王克紂而崩周公攝政乃取其書而述傳之可則因否則革廣以衆制而為周禮焉益無過也曰文王聖人也其為書安有否而可革者乎曰聖人因時制宜文王之時與周公之時異故文王以其時而言周公以其時而變也或曰諸侯之國亦井田也其制何若曰亦猶都鄙而巳矣始之為鄊遂次之為都鄙或滿以萬夫或極以一同至扵諸侯則不言其田制其取諸都鄙亡疑矣欲知外者觀諸内欲知逺者本諸近兹不待備言而可鑒也大㢤周公乎接文武之聖救商人之敝以之為禮禮無不中以之為政政無不和土天下之廣也而一塊莫敢爭先為之限也口天下之衆也而勺飲無􅀁闕先為之業也率飽煖之民而納之扵仁義驩焉可不反顧矣其曰兼三王不亦宜乎後雖有作者周公其弗可改也巳曰然則如之何則可曰法而行之復為一周乎右定著二十章經析其㣲注擇其善極數明用㑹異扵同勁正備具無越此書矣猶懼其未可以灼見也作三圖以翼之一曰王畿千里之圗二曰鄉遂萬夫之圗三曰都鄙一同之圗圖之矩畫頗髙廣故别行不綴于篇明明后如欲舉周公之制觀是書按是圗以令之其如取諸掌乎若猶未也敢私扵學禮者故書直講李先生文集卷之十九終
