front:
  text: 直講李先生文集卷之九
  hash: sha256:46835b1fc75c2f28b0390066327373ebb3458b0474a5f1709ca27a9a3a49de0f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_019-1a}
body:
  text: 軍衞第一兵者國之大事人知之矣然先王足兵而未嘗有兵後世有兵而未嘗足兵何以言之小司徒㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役母過家一人唯田與追胥竭作夏官序凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍􅀅皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長凡民在鄊則五家為比家出一人故在軍五人為伍比長因為伍長五比為閭故五伍為兩閭胥因為兩司馬四閭為族故四兩為卒族師因為卒長五族為黨故五卒為旅黨正因為旅帥五黨為州故五旅為師州長因為師帥五州為鄊故五師為軍鄊大夫因為軍􅀅士不特選皆吾民也􅀅不改置皆吾吏也有事則敺之扵行陣事巳則㱕之扵田里無招􅀵之煩而數不闕無禀給之費而食自飽故曰先王足兵而未嘗有兵也壘壁以聚之倉庫以生之群眠􅀋坐而不使補死填亡之不暇故曰後世有兵而未嘗足兵也管仲相齊桓公作内政而寓軍令焉故卒伍定乎里而軍政成乎郊連其什伍居䖏同樂死生同憂禍福共之故夜􅀾則其聲相聞晝􅀾則其目相見緩急足以相死其教巳成外攘夷狄内尊天子以安諸夏然則鄊軍之法固嘗試矣善㢤軍衛第二大司馬中春教振旅遂以蒐田火弊獻禽以祭社中夏教苃舍遂以苗田車弊獻禽以享礿中秋教治兵遂以獮田羅弊致禽以祀祊中冬教大閱遂以狩田徒弊致禽饁獸于郊入獻禽以享烝夫守國之備不可以不素習也不素習則敺市人而􅀾之未足爲喻也是故春教兵入平列陳如戰之陳辨鼓鐸鐲鐃之用以教坐作進退疾徐䟽數之節夏教草止如振旅之陳辨號名之用以辨軍之夜事秋教師出如振旅之陳辨旗物之用至冬大閱簡軍實焉然而不祥之器不得巳而用之若無故而習是習殺人也非示天下不復用兵之意也故因春蒐夏苗秋獮冬狩而教焉鳥獸魚鼈皆函血氣若無故而殺是暴天物也作禽荒也故因祭社享礿祀祊享蒸而行焉明非好兵也為田獵也非好田獵也為祭祀也其名甚羙其實甚利外以彰事神之禮非羙乎内以作不虞之俻非利乎聖人之動其順如此顧不足為後世法乎天下無事則卒伍放于冗􅀙器械束于故府學軍旅者指為㓙人一方有警則旦收而暮教之暮教而旦發之人情焉得不驚戰陣焉得不敗至有以講武為戯樂用相夸視先王之禮沒扵􅁋樂中者亦不足算也軍衞第三宫伯掌王宫之士庶子凡在板者掌其政令行其秩敘作其徒役之事授八次八􅃕之職事若􅀖有大事作宫衆則令之王宫之士謂王宮中諸吏之適子也庶子其支庶也秩謂依班秩受禄敘者其才藝髙下為次第以作其徒役者士庶子属太子随其􅀁用使役之也八次八􅃕衞王宮者必居四角四中扵徼􅀱便也大事謂寇戎之事起宫中之衆使士庶子行則宫伯戒令之也宮正掌王宫之戒令紏禁去其􅁋怠與其竒衰之民㑹其什伍而教之道藝民謂宫中吏之家人也宮正掌宫中卿大夫士亦兼掌子弟若有為􅁋放怠慢譎觚非常之行則去之又㑹合之五人為伍二伍為什欲使宿衞時語言相體服容相識及其學問又相親切磋琢磨道藝謂三徳三行六藝也若是則宫中諸吏之子弟必當備宿衞􅀙征役且聴太子之令也豈唯宫中諸吏之子弟而巳㢤凡公卿大夫元士之子亦然故諸子掌國子之倅掌其戒令與其教治辨其等正其位國有大事則帥國子而致扵太子唯􅀁用之若有兵甲之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正也大㢤王者之師其備矣乎非直興扵閭里抑又取諸世族彼以父祖貴富宜有報上之心而况學習徳行道藝孰不知忠孝之羙任之以金革則與夫干賞蹈利庸徒鬻賣者盖有間矣且太子􅀅為君國子􅀅為臣君臣之分未定而恩義固巳接矣則今日之逰倅未必不為嗣王之􅀅帥也轡長馭逺有如是㢤文王世子曰公若有出􅆠之政庶子以公族之無事者守扵公宫正室守太廟諸父守貴宫貴室諸子諸孫守下宫下室此諸侯禮也豈天子之事而有不用力者乎軍衞第四槀人掌受財于職金以賫其工弓六物為三等弩四物亦如之矢八物皆三等箙亦如之春獻素秋獻成書其等以饗工乗其事試其弓弩以下上其食而誅賞饗謂酒肴勞之也上工作上等其饗厚下工作下等其饗薄乗者計其事之成功也善則上其食尤善又賞之否者反此先王之扵造兵其事必計之其物必試之非直饗有厚薄食有上下又臨之誅賞則工有不勉者乎作有不慎者乎故弓人為弓取六材必以其時凡相幹欲赤黒而陽聲角欲青白而豐末􅑟欲朱色而昔筋欲小簡而長大結而澤漆欲測􅁝欲沈冬析幹而春液角夏治筋秋合三材寒奠体氷析灂春􅀍弦則一年之事矢人爲矢前弱則俛後弱則翔中弱則紆中強則􅀭羽豐則遲羽殺則趮是故夾而揺之以眡其豐殺之節也撓之以眡其鴻殺之稱也凡相笴欲生而搏同搏欲重同重節欲䟽同䟽欲㮚廬人爲戈祕車㦸酋矛夷矛句兵欲無弹刺兵欲無蜎是故句兵椑刺兵搏􅌛兵同強舉圍欲細凡試廬事置而揺之以眡其蜎也灸諸牆以眡其橈之均也横而揺之以眡其勁也函人爲甲凡察革之道眡其鑚空欲其惌也眡其裏欲其易也眡其眹欲其直也櫜之欲其約也舉而眡之欲其豐也衣之欲無齘也其作巧其試明擐之者無不堅執之者無不銳以此戰何不勝以此攻何不取以此守何不固楚之鐡劒利而秦王色憂謂鐡劒利則士勇焉耳為國家者苟不留聡明則有司以常事䖏之郡國之貢姑備名物府蔵之約唯謹簿書而欲用之立尸之地此可為太息者也直講李先生文集卷之九終
