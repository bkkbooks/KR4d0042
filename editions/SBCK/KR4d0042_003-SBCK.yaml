body:
  text: 賢太守之為􅀖崇鄕賢風後學凡以因敬梓者之心而教易行肆泰伯先生於我旴有常祀七八年來乃或撤厥祠亭為堂偪厥宰壠為院而置先生於雜祀或􅏌然不知有先生惟先生嘗言人於夫子之道不聞之是無耳也不見之是無目也不言之是無口也不學之不思之是無心無精爽也今有仕是􅀖而不知有先生不亦猶之無耳目口心精爽者乎往弗諌景定􅀄元太守雪軒魏矦峙祠墓乃復建亭朔吿必躬頓異乎前時觀又取遺書讀嘆其言足經世興太平獨恨年譜有闕遺字畫有訛脫更與旴之士參以它書讎正二年鋟之梓其􅀅以開世之無耳目口心精爽人矣乎予方服侯之為㑹天子嘉侯治状改守􅀽州因誦泰伯􅀽學記爾􅀽得賢君之句而有感遂書其後三年上巳日里中子張淵㣲敬書
