body:
  text: 建昌新建李泰伯祠堂記天下之羙恒興於賢明而廢於愚暗使賢明迭繼雖百世可也設不幸而值愚暗焉雖有鉅羙且廢于成况望其䏻興夫既廢也㢤又望其䏻崛然興起也㢤柰何賢明者之不常有宜乎天下之羙之難成也旴江宋儒泰伯李先生存心髙古履行剛方竭力養親不求榮逹倡立旴江書院講明正學從而師之者恒數十百人范文正公稱其講論六經辯愽明逹釋然聖人之㫖著書立言有孟軻􅀭雄之風今草澤中未見其比并上其􅀁業禮論明堂定制圖序平土書易論凡二十四篇皇祐初與余襄公交章薦為試太學􅂇教後􅀘􅀅仕􅀰海門簿召為太學說書而卒熈寧中其門人尚書左丞鄧潤甫奏上其退居􅀋藁皇祐續集并後集請官其子參魯為郊社齋􅀰其墓在鳯凰山麓維時守令同學官春秋拜掃􅀊以為常不知自何時廢而不講延至于今墳墓雖存率為草莾之區樵牧之􅀁蹂􅏳狐狸之􅀁棲息過者千百誰復致慮幸而邑人吏部驗封主事左君時翊過而見之慨然興感乃䟽其􅀁以且曰臣伏覩詔㫖名臣賢士墳墓毀􅀤即為修治仍復近民一人以守恩至渥也若李覯者信非常儒􅀹可矜式若得一如詔㫖封其塋域禁其樵牧立祠􅀊祀其於風化不為無􅀘䟽入翼日下詔允之禮部定制􅀊一春祭祀以少牢有司行禮如式并復守者時建昌守長樂謝侯仲仁謂事干風化首􅂢俸資以倡繕修塋域乃建祠堂堂凡三楹縱廣如干尺甫踰時落成髙亢靚深堅緻完好中妥神主外繚周垣隂以嘉木别爲子屋以居守者時成化戊子之秋九月也工既訖功時翊過予請言識諸石爲永永圖扵乎二三百年巳廢之典不有賢明孰知其爲羙而興舉之且先生扵世官列甚庳未乆而逝徒以空言託諸文字而巳既無氣熖以凌爍人又無功徳以覆冐人若未足以爲羙也而賢名之垂訖今不巳雖有氣熖有功徳者亦不若是烈也學問之有益於人如此信乎君子不可以不學也時翊是舉非特􅀁以崇先賢亦􅀁以儀後進俾鄊之人景慕興起皆知績學絫行如先生雖在草澤名猶不泯况通顯乎其扵世教誠非小􅀘若夫一塋之封一祠之作雖不􅀎加重扵先生而後學景仰之心不如是不足以遂此時翊􅀁以為賢且明也仲仁亦克樂其羙而速成之謂非賢且明不可也故并書之為来者勸慎勿􅅴為愚暗而􅈥其成也詩曰風雨攸除鳥䑕攸去君子攸芋今之君子信􅀎成其羙矣又曰夙與夜􅄰洒掃庭内後之君子尚繼羙於無窮㢤時翊又嘗編輯先生詩文三十七卷附録三卷行世可謂盡心焉爾巳成化六年􅀊庚寅春三月下浣朝列大夫國子􅀕酒經筵官前翰林侍讀學士兼修國史古吳陳鑑撰禮部為陳言崇儒事於禮科抄出吏部驗封清吏司主事左賛奏伏覩天順八年正月二十二日詔書内一欵各䖏帝王陵􅃦及名臣賢士墳墓有􅀍人毀發者所在有司即時修理如舊令附近人民一丁看護免其差役其餘墳墓但有露棺􅁀骨者悉與掩埋此皇上仁厚之盛心曠古􅀁無之令典也臣原籍江西建昌府南城縣人切見本縣有宋太學􅀃書李覯墓在鳯凰山麓祝穆方輿勝覽紀覯無子孫毎􅀊春秋守貳同學官拜掃以為故事歴年既乆不惟拜掃之典巳廢而其墳墓亦為樵牧踐蹂若更數年必致毀夷臣考得李覯立心髙古履行脩整竭力養親雅尚恬退倡立旴江書院講明正學訓迪生徒學者稱為泰伯先生其􅀁著述有易論禮論共二十篇富國安民強兵䇿各十篇明堂定制圖序周禮致太平論皆足以羽翼聖經發明治體又有平土書二十章得井田之遺意慶暦民言三十篇論時政之得失其他文字若太學議􅀽州學記之􅀋皆可矜式當時名臣范仲淹余靖交薦其賢先儒朱熹稱覯周禮論與其意合聖朝纂􅁱五經大全覯所立言亦見采録臣聞古者鄕先生沒則祭于社如覯者可謂一代之名儒後學之師表不但如古所謂鄊先生而巳今墳墓荒蕪爼豆不及臣􅀼惜之欽惟國家崇儒重道以夀斯文之脉以衍太平之運如􅂪准言乞􅃙該部行移有司封其塋域禁約樵牧照例令附近人民一丁看護仍於墳所量立祠宇􅀊時致祭則扵風化不爲無􅀘縁係陳言崇儒事理具本親齎具奏成化三年九月二十日該通政使司官扵奉天門奏奉聖㫖該部知道欽此欽遵抄出到部看得吏部驗封清吏司主事左賛奏稱要􅀅先儒李覯墳墓令有
