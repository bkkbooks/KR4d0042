body:
  text: 直講李先生文集序孔子没千有餘祀斯文衰敝其間作者孟軻荀卿賈􅁩董仲舒􅀭雄王通之徒異代相望而不能興衰捄敝者位不得而志不行也茍得位以行其志則三代之風吾知其必復嗟乎秦漢以来禮樂則不為而任刑以毆其民􅀅納於治適􅀁以亂之也歴世寖乆皆謂天下當如是可以致治而不治者時耳故有􅁬筆舌為章句卒不及於禮樂者末哉文也旴江李泰伯其有孟軻氏六君子之深心焉年少志大常憤疾斯文衰敝曰墜地巳甚誰其拯之扵是夙夜討論文武周公孔子之遺文舊制兼明乎當世之務悉著于篇且又歎曰生䖏僻遐不自進孰進哉因徒歩二千里入京師以文求通于天子乃舉茂材異等得召第一既而試于有司有司黜之嗚呼豈有司之過邪其泰伯之命邪或者天徒付泰伯以其文而命則否邪亦􅀅位得志行後有時邪吾不得而知已泰伯退居之明年􅁼其文藁第為十有二卷以􅀉南康祖無擇且屬為序無擇既受之讀之朞月不休善乎文武周公孔子之遺文舊制與夫當世之務言之備矣務學君子可不景行於斯慶暦三年冬至日序李覯泰伯以舉茂材罷歸其明年􅂟暦癸未秋因料􅀁著文自冠迄兹十五年得草藁二百三十三首􅀅恐亡散姑以􅁼辯為十二卷寫之間或應用而為未能盡無媿閔其力之勞􅂺不棄去至於妖􅁋刻餙􅀹無用者雖傅在人口皆􅀁弗取噫天􅀅壽我乎􅀁為固未足也不然斯十二卷庶可籍手見古人矣故自序云
