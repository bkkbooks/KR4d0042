front:
  text: 直講李先生文集卷之七
  hash: sha256:46f07bb9a76acc25d7f2a059db435cedc420cbc36e6fcacd8e5b93a9ac14d778
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_017-1a}
body:
  text: 國用第六繫辭曰包犧氏沒神農氏作斵木為耜揉木為耒耒耜之利以教天下盖取諸益是聖人之扵農必制器以利其用也舜典曰棄􅀺民阻饑汝后稷播時百榖是聖人之扵農必命官以掌其政也故遂大夫正􅀊簡稼器􅁱稼政稼器耒耜鎡基之屬稼政孟春之月今􅀁云皆脩封􅆠審端徑術善相丘􅁜阪險原隰土地􅀁宜五榖􅀁殖以教道民必躬親之之比也器不簡則貧人或不􅀎備物政不􅁱則愚者或不􅀎得宜不備物則雖良田􅀅不耕不得宜則雖嘉種􅀅不穫若是不可不慎也至如二耜為耦一夫不足獨舉必通㓛易事兩人相助而後可也故里宰以􅀊時合耦于耡以治稼穡趍其耕耨行其秩敘耡者里宰治䖏扵此合耦使相佐助秩敘相佐助之次第也又五穀熟時有風雨之急是謂力耕數耘􅀵穫如寇盗之至者也然一夫又不足為故遂師廵其稼穡而移用其民以救其時事謂使轉相助救時急事也古之治天下至纎至悉之如此奈何民不富國不實也漢趙過􅀎為代田一畮三甽一夫三百甽而播種扵甽中苗生葉稍耨隴草因隤其土以附苗根比盛暑隴盡而根深􅀎風與旱其耕耘下種田器皆有便巧用耦犂二牛三人一􅀊之􅀵常過縵田畮一斛以上善者倍之民或苦少牛過奏故平都令光以為丞教民相與庸輓犂以故田多墾闢用力少而得榖多斯近古之事效驗甚明而歴代莫以為意何也國用第七載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征謂宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟民雖有間無職事者猶出夫稅家稅夫稅者百畮之稅家稅者出士徒車輦給繇役也閭師凡庶民不畜者祭無牲不耕者祭無盛不􅀣者無椁不􅅙者不帛不績者不衰謂庶人五母雞二母􅇾無失其時是以不畜者罰之死後祭無牲也黍稷曰盛耕者􅀁以殖黍稷今田不耕非直罰以屋粟又死後祭無盛也五畮之宅􅀣以桒麻今宅不毛非直罰以里布死後又無椁也􅅙則得帛不蠶故身不得衣帛績則得布不績故死則不為之着衰以罰之也夫財賦力征人􅀁吝嗇與其無事而重孰若有業而䡖以此罰之敢或不勉者乎帛􅀁以養老衰􅀁以送死塟禮祭禮乃為令終一有觧惰則不得用以此罰之敢或不勉者乎是聖人􅇌民以反本之術也漢髙祖令賈人不得衣􅁝乗車重稅租以困辱之孝惠髙后時為天下初定復弛商賈之律然市井子孫亦不得為官吏商賈乃在四民之目而前代且謫之後之㳺惰去四民逺甚者其􅀋不可勝數為國者非徒凾容或尊寵之傷㢤國用第八一夫之耕食有餘也一婦之􅅙衣有餘也衣食且有餘而家不以富者内以給吉㓙之用外以奉公上之求也而况用之無節求之無藝則死扵凍餒者固其􅀔然也故土均掌和􅀖國都鄙之政令刑禁與其施舍禮俗䘮紀祭祀皆以地㜫惡為䡖重之法而行之掌其禁令禮俗􅀖國都鄙民之􅀁行先王舊禮也君子行禮不求變俗随其土地厚薄為之制豐省之節耳司書三􅀊則大計群吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆群吏之政令逆謂鉤考也恐其群吏濫稅歛萬民故知此本數乃鉤考其政令也夫奢則以為榮儉則以為辱不顧家之有亡汲汲以􅀙俗為事者民之常情也是故為之禁令地􅍇􅀵多則用之豐地惡􅀵少則用之省如此民皆知惜費矣􅃜下以益上貪功以求賞不恤人之困乏皇皇以言利為先者吏之常態也是故為之鉤考雖器械六畜山林川澤必知其數如此吏不敢厚歛矣民皆知惜費吏不敢厚歛而不免凍餒者未嘗聞也禮器曰居山以魚鼈為禮居澤以鹿豕為禮君子謂之不知禮然則地之惡禮不可䡖耶有若曰百姓不足君孰與足然則民之財官可不知耶是先王之􅀁以得後世之􅀁以失也國用第九職方氏凡􅀖國小大相維王設其牧制其職各以􅀁􅀎制其貢各以其􅀁有謂國之地物􅀁有也諸侯得稅大國半次國三之一小國四之一皆市取當國􅀁有以貢扵王也土訓掌道地圖以詔地事道地慝以辨地物而原其生以詔地求辨地物者别其􅀁有􅀁無原其生生有時也以此二者告王雖是當州􅀁有而生有時地􅀁無及物未生則不求也大㢤聖人念民勤恤財匱如是其著也地􅀁有而官不用則物必賤地􅀁無而反求之則價必貴况天時􅀁不生則雖有如無矣買賤賣貴乗人之急必刼倍蓰之利者大賈蓄家之幸也為民父母奈何不計本末㒺農夫以附商賈令下之日吏旁為姦公不􅀗皮毛而私啄其髓矣壞民家敗民産此其甚也夏書任土作貢厥貢厥篚九州不同前聖後聖豈非一揆者乎漢桒都尉領大農以諸官各自市相争物以故騰躍而天下賦輸或不償其僦費廼請置大農部丞數十人分部主郡國令逺方各以其物如異時商賈􅀁轉販者為賦置平凖扵京師都受天下委輸大農諸官盡籠天下之貨物如此富商大賈亡􅀁牟大利則反本而萬物不得騰躍故抑天下之物名曰平凖桒雖聚歛之臣然此一役豈無法耶孝武時國用饒給而民不益賦誠有以也國用第十司稼廵野觀稼以年之上下出歛法歛法者豐年従正㓙年則損也廪人掌九榖之數以􅀊之上下數􅀖用以知足否以詔榖用以治年之豐㓙凡萬民之食食者人四鬴上也人三鬴中也人二鬴下也若食不􅀎人二鬴則令􅀖移民就榖詔王殺􅀖用謂以􅀊之豐㓙得稅物多少之帳計國之用以知足否若􅀊㐫稅物少而用多則不足廪人既知多少足否乃詔吿在上用榖之法也夫什一而稅天下中正是故謂之徹徹者通也然耕穫之事豐儉亡常不􅄑㓙旱水溢或螟螣蟊賊農雖盡力榖有不登而有司必求如法扵理安乎孟子道龍子之言曰治地莫善扵助莫不善扵貢貢者校􅀊之中以為常樂􅀊粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然􅀅終􅀊勤動不得以養其父母又稱貸而益之使老稚轉乎溝􅊤惡在其為民父母也故聖人設官必扵榖之􅀅熟廵扵田野觀其豐凶而後制稅歛焉豐年􅀙正亦不多取也凶荒則損何取盈之有㢤然則龍子􅀁見盖周之末世周公雖貢未嘗聞其不善也然而取之少則用不得不殺取少而用不殺則國不􅀎自濟非反乎民􅀅焉得也宜其知足否而詔榖用焉王制曰􅃁宰制國用必扵􅀊之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出由此道也後世作者除减歛法則既聞之矣至扵􅀖用其可忽諸直講李先生文集卷之七終
