front:
  text: 直講李先生外集卷第二
  hash: sha256:afd88d1de569d927273886f6446d00940a3bace919811d03a3be6cd548bacef5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_005-1a}
body:
  text: 名公手書范文正公仲淹白秀才李君在鄱陽勞惠訪尋以改郡不敢奉邀今潤州初建郡學可能屈節教授又慮逺來難為􅀅家蘇州掌學胡瑗祕校見明堂圗亦甚奉仰或䏻挈家必有經畫請先示音為幸保愛保愛不宣仲淹上李君竒士足下八月十九日仲淹頓首秀才仁弟别來傾渇無巳想至仙鄕拜慶外無恙此中佳山水府學中有三十餘人闕講貫與監郡諸官議無如請先生之來必不奉誤誠於禮中大有請益處至願至願不宣仲淹上秀才仁弟十月十九日小簡此地比丹陽又似閑暇可以卜居請一來講􅀃因以圗之誠衆望也誠衆望也兒子在蘇州足下可䏻早來今冬欲行鄕飲俟先生講求也仲淹上仲淹白中間辱教承巳拜恩命雖徳業雅逺未稱人望而朝廷奨善鴻漸于時惟聡明精至曉之􅀷矣未相㑹間千萬自愛自愛不宣仲淹上太學先生閏十一月二十八日小簡仲淹巳受􅃙改青州見理舟行次希善侍加愛孫觀文􅃆啓錢塘幸􅀗瞻對以扶護過江不果欵接後聞談經于府中恨不得執卷座末益為企戀企戀近日諒雅􅀱無恙􅃆冬中襄事畢正初詣杭如文盖盤旋必良㑹矣冬温旅次希保愛保愛因王先生行草草上問不次􅃆拜上建昌李君先生之右二十三日夜􅃆白人來捧書伏知旅中無恙示及南歸未知奉㑹之時企戀企戀途中慎護冬寒希保愛保愛人廻草草奉此咨問兼謝伏惟照察不次􅃆拜上先生李君之右二十一日􅃆白錢塘之别又二載餘後未􅀗良㑹復踈致問專介逺來惠書且知居憂無恙示教民病數十條非留心博愛何以及此以賊未定過嶺經制必未及一一行下當擇要以施之春後賊定方到江西奉見矣示及事不須如此何害冬寒保愛保愛草草上問兼謝不宣􅃆上太學先生李君十二月九日希文夏中過徐遂不肯行以後事見託一一如其志哀痛哀痛行状乃勉為述之忙中未及以草􅀉去余侍郎靖頓首李君秀才别來毎増翹渇忽枉手跡備荷勤至於邑鄙吝渙釋懐抱所示禮論七篇推進禮經凖的世教派仁義贅刑政正其本於禮成一家之言工古人之未工導明王之要道豈止獨歩江表校聲名於後俊者㢤開益蒙蔽不勝降歎人回謹此為謝不宣􅀅作監丞余靖白正月十四日靖頓首近接緒言止于再見蘭㳺霧息未盡雅懐所示上豫章守書可以激昂士範支梧頽圮徤羡徤羡别來欝欝動不如意邈然風規毎益牢吝忽枉手牘􅀷認勤勤木脫火流切希進道外保愛是祝謹奉簡陳謝不宣大匠丞余靖頓首李君秀才七月二十八日靖啓靖屏居南夏乆不相知及今得書乃審有太學之授國家誠有憐才之意而不寘於可用之途何㢤道逺未由胥㑹徒益傾渇耳冬寒保重人廻謹此爲謝不宣靖手啓助教執事十月十日如有朝命召赴成均供職亦可行道不宜辭免或令赴選須詳去就也靖啓歐陽内翰􅁱啓冗事牽迫乆踈奉長者之論不知兩辱過門甚媿甚媿􅁱來日有少事須出即今幸家居可以拂席奉俟軒盖顒企顒企不然當别拜聞貴不失約也􅁱頓首賢良先生蔡宻學襄頓首啓襄才識不能過人天子誤知擢置諌列毎自念孤賤之迹旁無尋尺之助一旦名徹萬乗而收録之此宜如何論報効之誠也示及庸奴非所謂難言但未得其詳耳足下業巳發之當為予䆒之至詢他人果詐不虚必逃去矣就令不逃亦生姦計莫如宻得其詳擿之以寘于法於時不為無補行路疲憊草草裁荅足下取其意畧其禮也襄頓首啓二十三日夜襄啓近承從者之勞過臨海郡適以乆疾無悰為禮踈畧遽此離間豈勝慚􅉥慚􅉥春寒道上愛護為佳不宣襄頓首李君足下二十日馬雜端遵頓首啓曏吏京邑日與權幸人為敵􅃐了目前力有不逮千里脩問病未䏻也未㡬以罪逆復丁家難扶挽南歸備嘗囏厄甫逹里中即襄大事即日僅餘殘息無復生意忽辱來諭承家居安甚併為慰也知非乆㳺錢塘且有迂顧之意何幸如之遵近得彼信􅀅來亦當一詣目即有私冗未幹兼本郡守尉故人同年累書相招受代伊邇若捨饒而趍杭不免去就厚薄之責頗非人情當暫謁之不知行期遲疾近逺掃榻聮鑣俱未敢必靈􅀮西湖之㑹當不蹉跌矣秋暑自愛倉遽草此不次遵頓首上答泰伯先生足下七月十一日手啓遵再拜奉别數年居常企咏以家禍屏居僻左無階􅁱問比見卿材具得起居之實所慰多也遵無他竒區區徇禄食當求南中一官以便安輿旴江乃素心未知所願果否前月已被㙜移明日上路咫尺不克一趍師坐少冀誨言為恨甚􅀷因風示字欲知動止忩卒􅂓此上謝夏暑切自愛傾渇傾渇遵不勝私心不宣遵再拜泰伯先生書几十五日謹簡遵悚仄遵到淮南二年矣署而居者不數月犇走之勞不可勝道以故僅了目前四方交㳺書問闕如也或云先生居􅀝廬聞問不審有失陳慰人來得書伏承孝􅂂攴裕先生未起有識惋惜遵素性朴愚上下窘困之際乃佐此局咎責日􅀷先生有聞無惜見教渉夏勉抑自愛人回􅂓此為謝餘俟後信多悉多悉不宣遵悚仄再拜泰伯先生大孝服次三月二十八日蕭閣副十一月望日長沙野人蕭注致書隴西泰伯先生足下注昨偕弟英求舉于京師聞足下應賢良預第一人召試是時萬口一發萬意一同未有不心思目願欲識其靣者一日英請於叟曰李泰伯預賢良召未知其道果如何􅅱曰今之賢良異於古泰伯其為今之賢良古之賢良耶若為今之賢良則天下可車載為古之賢良則覆載無三四英曰敢原其賢良之今古曰今之賢良所學者羙身之具也口誦之心記之然後分句讀辨訓詁數條目駕虚辭而強名曰策曰論主司既不䏻别白則互曰彼人之富於學也此人之富其才也上既取之下思習之中其選者十年間往往陶天下之民嗚呼以斯術而致吾君陶吾民則䖝蝗水旱盗賊不作其可得乎古之賢良發其言則為箴為䂓為教為化明隂陽􅀝伏灾異變盈之事提耳萬乗擯斥􅇯黨亂臣賊子不敢正目而視使三王之風復見于當世故漢之文景可比周之成康者由斯道也叟尋與英下第南歸聞足下不中選二心頗疑後得足下退居集啓而讀之則知足下果非今之所舉賢良之人其不中選則宜夫人之相知患其道不同道同雖夷貊亦可為兄弟注鄙人然而有志扵聖賢之術心銘足下之道故發此書以聞非今之趍炎附􅀔軰聞足下有大名而沽相知之幸足下其以為是非里人葉國器歸旅中草草非書冀留意不宣注再拜小簡注頓首前書寫意兹不云云相慕之極旦夕常在家貧至甚僕馬無具因而辜見賢之望噫進不得地退無以居丈夫之心於此􅀅盡有風西來書以為􅀉則野人之請餘希自愛注再啓祖學士無擇再拜泰伯先生酷􅀬以來氣體何如驛置相望不逺千里無階披奉祗増詹企法􅁺連君錫僕之故人有文而善與人交泰伯見之當相得以驩矣千萬善愛慰此多憶無擇手記頓首泰伯先生六月十七日無擇啓累日前軍校過敝邑得泰伯所示書承起居無它為慰甚􅀷也慶暦民言皆極當時之病真醫國之書耳使今相天子宰天下者聞其言而行之何憂乎獯粥何患乎拓䟦氏邪無擇踈賤不得言於朝泰伯又俾附􅀉永叔即須良便致之也君錫行日曽託奉書必得通上無擇近作愛堂銘與文􅐩序在君錫處宜枉觀覽因風幸示可否之教秋暑千萬善愛不宣無擇再拜二十六日無擇自來淮楚以地逺且少便復吏事無餘暇故不得時時拜書徒日思頌亡巳足下之門人髙第者曰陳生過聴不侫遣介走數千里惠然以書見抵且示之策捧覽之際􅌤生靣目兹足下之不鄙遺我而俾之相示也顧愚何足以當之推轂之教豈敢不勉趨奉未由惟祝善愛諸懇可期靣㑹兹不䏻布萬一無擇再拜泰伯足下四月九日淮上書無擇再拜泰伯先生無擇嚮者居憂丹陽辱書者再兼承見􅀉長篇及賦不任感仰然以道􅂗阻逺少遇信便無階致誠而望風依依靡忘終食也去嵗過洪井見建昌牙校首詢動止且􅀅附問乃先生赴范杭州召巳行矣又不得通區區于左右今陳秀才人來捧所貺手尺具悉起居如宜差慰詹渇萬一無擇方此奔走披晤未日仰蘄千萬爲道自愛愚懐􅀁望無擇再拜泰伯先生無擇再拜泰伯先生言念乆不附問惟劇詹馳夏末抵􅀽即欲致記竊承軒車寓泊洪井及詢諸相識乃云它適盖傳聞之不得審的耳介至忽捧手墨承體局休佳殊慰區區敝郡巳作學更三兩月可成當須坐邀長者來此為後生唱導也乃時專遣人禮請次謹先此咨露秋凉希千萬若時加愛懇懇無擇再拜八月二十三日李侍郎淑白近承雅顧􅀗奉嘉談兼摯雄文重􅀅厚意欽降之切昕夕以之忽辱手緘承有小疾戒舟渉逺幸保冲􅁭惟精學之邁倫固懵迷之詎測汶圗魯議空祕家楹之蔵洞蕭上林猶慙侍臣之薦興言瞻聳交集下誠不宣淑頓首孔宗旦宗旦啓自京師為别迨四年矣毎聆風聲鄙氣銷爍伏承日來體休道洽師表江左􅂢棄名􅂣沉藴事業易曰肥道無不利惟泰伯之道乎甚善甚善今二十二日徂徠石守道卒嗚呼天喪吾道俾我先生短命死矣泰伯䏻不痛悼㢤秋風蕭條江山脩邈願固顔色以厭忉怛子静行次􅂓此起居惟少垂察不宣曲阜孔宗旦啓上泰伯先生坐前直講李先生外集卷第二終
