body:
  text: 軍衞第一兵者國之大事人知之矣然先王足兵而未嘗有兵後世有兵而未嘗足兵何以言之小司徒會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人唯田與追胥竭作夏官序凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長凡民在鄉則五家為比家出一人故在軍五人為伍比長因為伍長五比為閭故五伍為兩閭胥因為兩司馬四閭為族故四兩為卒族師因為卒長五族為黨故五卒為旅黨正因為旅帥五黨為州故五旅為師州長因為師帥五州為鄉故五師為軍鄉大夫因為軍將士不特選皆吾民也將不改置皆吾吏也有事則敺之於行陣事已則歸之於田里無招收之煩而數不闕無禀給之費而食自飽故曰先王足兵而未嘗有兵也壘壁以聚之倉庫以生之羣眠類坐而不使補死填亡之不暇故曰後世有兵而未嘗足兵也管仲相齊桓公作内政而寓軍令焉故卒伍定乎里而軍政成乎郊連其什伍居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死其教已成外攘夷狄内尊天子以安諸夏然則鄉軍之法固嘗試矣善哉軍衞第二大司馬中春教振旅遂以蒐田火弊獻禽以祭社中夏教茇舍遂以苗田車弊獻禽以享礿中秋教治兵遂以獮田羅弊致禽以祀祊中冬教大閲遂以狩田徒弊致禽饁獸于郊入獻禽以享烝夫守國之備不可以不素習也不素習則敺市人而戰之未足為喻也是故春教兵入平列陳如戰之陳辨鼔鐸鐲鐃之用以教坐作進退疾徐疏數之節夏教草止如振旅之陳辨號名之用以辨軍之夜事秋教師出如振旅之陳辨旗物之用至冬大閲簡軍實焉然而不祥之器不得已而用之若無故而習是習殺人也非示天下不復用兵之意也故因春蒐夏苖秋獮冬狩而教焉鳥獸魚鼈皆函血氣若無故而殺是暴天物也作禽荒也故因祭社享礿祀祊享蒸而行焉明非好兵也為田獵也非好田獵也為祭祀也其名甚美其實甚利外以彰事神之禮非美乎内以作不虞之偹非利乎聖人之動其順如此顧不足為後世法乎天下無事則卒伍放于冗從器械束于故府學軍旅者指為凶人一方有警則旦收而暮教之暮教而旦發之人情焉得不驚戰陣焉得不敗至有以講武為戲樂用相夸示先王之禮沒於淫樂中者亦不足算也軍衞第三宫伯掌王宫之士庶子凡在版者掌其政令行其秩敘作其徒役之事授八次八舍之職事若邦有大事作宫衆則令之王宫之士謂王宫中諸吏之適子也庶子其支庶也秩謂依班秩受禄敘者其才藝髙下為次第以作其徒役者士庶子屬太子隨其所用使役之也八次八舍衞王宫者必居四角四中於徼候便也大事謂寇戎之事起宫中之衆使士庶子行則宫伯戒令之也宫正掌王宫之戒令糾禁去其淫怠與其竒衺之民㑹其什伍而教之道藝民謂宫中吏之家人也宫正掌宫中卿大夫士亦兼掌子弟若有為淫放怠慢譎觚非常之行則去之又㑹合之五人為伍二伍為什欲使宿衞時語言相體服容相識及其學問又相親切磋琢磨道藝謂三徳三行六藝也若是則宫中諸吏之子弟必當備宿衞從征役且聽太子之令也豈唯宫中諸吏之子弟而已哉凡公卿大夫元士之子亦然故諸子掌國子之倅掌其戒令與其教治辨其等正其位國有大事則帥國子而致於太子唯所用之若有兵甲之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正也大哉王者之師其備矣乎非直興於閭里抑又取諸世族彼以父祖貴富宜有報上之心而况學習徳行道藝孰不知忠孝之美任之以金革則與夫干賞蹈利庸徒鬻賣者蓋有間矣且太子將為君國子將為臣君臣之分未定而恩義固已接矣則今日之遊倅未必不為嗣王之將帥也轡長馭逺有如是哉文王世子曰公若有出疆之政庶子以公族之無事者守於公宫正室守太廟諸父守貴宫貴室諸子諸孫守下宫下室此諸侯禮也豈天子之事而有不用力者乎軍衞第四槀人掌受財于職金以齎其工弓六物為三等弩四物亦如之矢八物皆三等箙亦如之春獻素秋獻成書其等以饗工乘其事試其弓弩以下上其食而誅賞饗謂酒肴勞之也上工作上等其饗厚下工作下等其饗薄乘者計其事之成功也善則上其食尤善又賞之否者反此先王之於造兵其事必計之其物必試之非直饗有厚薄食有上下又臨之誅賞則工有不勉者乎作有不慎者乎故弓人為弓取六材必以其時凡相幹欲赤黑而陽聲角欲青白而豐末膠欲朱色而昔筋欲小簡而長大結而澤漆欲測絲欲沈冬析幹而春液角夏治筋秋合三材寒奠體氷析灂春被弦則一年之事矢人為矢前弱則俛後弱則翔中弱則紆中强則揚羽豐則遲羽殺則趮是故夾而揺之以眡其豐殺之節也橈之以眡其鴻殺之稱也凡相笴欲生而搏同搏欲重同重節欲疏同疏欲㮚廬人為戈柲車㦸酋矛夷矛句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶􅌛兵同强舉圍欲細凡試廬事置而揺之以眡其蜎也灸諸牆以眡其橈之均也横而揺之以眡其勁也函人為甲凡察革之道眡其鑽空欲其惌也眡其裏欲其易也眡其朕欲其直也櫜之欲其約也舉而眡之欲其豐也衣之欲其無齘也其作巧其試明擐之者無不堅執之者無不鋭以此戰何不勝以此攻何不取以此守何不固楚之鐵劒利而秦王色憂謂鐵劒利則士勇焉耳為國家者苟不留聰明則有司以常事處之郡國之貢姑備名物府藏之約唯謹簿書而欲用之立尸之地此可為太息者也旴江集卷九欽定四庫全書旴江集卷十宋李覯撰刑禁第一刑罰之行尚矣積聖累賢未有能去者也非好殺人欲民之不相殺也非使畏已欲民之自相畏也然而憲令所加寛猛或異苟失權時之制則致逺恐泥矣故大司寇之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典新國者新辟地立君之國用輕法者為其民未習於教二曰刑平國用中典平國承平守成之國用中典者常行之法三曰刑亂國用重典亂國篡弑叛逆之國用重典者以其化惡伐滅之蓋四海之内千八百國國政或異人心豈同苟執一以御之是膠柱而鼓瑟欲盡五聲之變不可得也夫新辟地立君之國居處未安衣食未足君臣之義未固上下之情未接從而急之則魚淰鳥獝不復聚矣其可不用輕法邪篡殺叛逆之國紀綱大壊風俗大惡强弱相勝衆寡相暴從而緩之則羊很狼貪難以制矣其可不伐滅之邪承平守成之國人各有業事各有制緩之將恐縱急之將恐擾其可不用常行之法邪以大言之則天下之理亦然漢興高祖初入關約法三章曰殺人者死傷人及盜抵罪蠲削煩苛兆民大説此非刑新國用輕典者邪周道既衰穆王眊荒命甫侯度時作刑以詰四方五刑之屬三千蓋多於司刑所職五百章此非刑亂國用重典者邪洪範三徳一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克皆聖人所以適時之變也奈何以三尺之書齊萬邦之政俗雖殊而弗察事雖變而弗知治之不及古豈不有由也哉刑禁第二小司寇以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民聽民之所刺宥以施上服下服之刑刺殺也宥寛也民言殺殺之言寛寛之上服劓墨下服宫刖是四刑亦三刺也羣臣士以上羣吏府史胥徒萬民民間有徳行不仕者朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後此則所訊之人也噫凡有血氣之類莫不愛其生君大夫士之於牛羊犬豕猶無故不殺况於人者萬物之靈父母生之拊畜長育顧復之恩至而後免於其懐刑之大者伏鈇鑕其次亦斷支體刻肌膚終身不息何其痛哉刑期無刑蓋不獲已苟得其情亦哀矜而勿喜矧可不慎以及于非辜者乎故聖人求之以五聽麗之以八議三宥以卹其非意三赦以異於全人猶恐聰有所不聞明有所不見下情有所不達議法有所不平於是有外朝之位以詢于衆焉必羣臣羣吏萬民之意同然後刑殺可不謂慎乎孟子曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮古之王者於有事且與下民共之後之效一官者往往自用同官為僚或疑其賣已閉口不與論職事况他人乎斷獄弊訟一出其臆如是而刑不濫邪賢於先王逺矣刑禁第三鄉士掌國中辨其獄訟異其死刑之罪而要之旬而職聽于朝司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺若欲免之則王㑹其期遂士掌四郊二旬而職聽于朝若欲免之則王令三公㑹其期縣士掌野三旬而職聽于朝若欲免之則王命六卿㑹其期期謂鄉士遂士縣士職聽于朝司寇聽之日王欲赦之則用此時親往議或命三公六卿往議之也君之於民猶親之於子也親則不忍其子君焉得忍其民哉推其不忍之心則人無有可戮罪無有可刑王欲赦之固其理也然而天討有罪王者奉之以作五刑刑者非王之意天之意也非天之意天下之人之意也殺人者死而民猶有相殺傷人者刑而民猶有相傷苟有以不忍而赦之則殺人者不死傷人者不刑殺傷之者無以懲其惡被殺傷者無以伸其寃此不近於帥賊而攻人者乎是故先王雖有不忍之心而不敢輙赦必於外朝與掌事者議其可否焉赦者非王赦之情可赦也否者非王不赦情不可赦也如此民何有不服令何有不行王符述赦曰養稂莠者害禾稼惠姦宄者賊良民誠哉不可不慎也刑禁第四掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪及刑殺告刑于王奉而適朝士加明梏以適市而刑殺之凡有爵者與王之同族奉而適甸師氏以待刑殺由此觀之先王之制雖同族雖有爵其犯法當刑與庶民無以異也法者天子所與天下共也如使同族犯之而不刑殺是為君者私其親也有爵者犯之而不刑殺是為臣者私其身也君私其親臣私其身君臣皆自私則五刑之屬三千止謂民也賞慶則貴者先得刑罰則賤者獨當上不媿於下下不平於上豈適治之道邪故王者不辨親疎不異貴賤一致於法其所以不肆諸市朝而適甸師氏者為其有恥毋使人見之也文王世子曰公族其有死罪則磬于甸人其刑罪則纎剸亦告于甸人公族無宫刑獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉為之變如其倫之喪無服親哭之公族之罪雖親不以犯有司正術也所以體百姓也刑于隱者不與國人慮兄弟也弗弔弗為服哭于異姓之廟為忝祖逺之也素服居外不聽樂私喪之也骨肉之親無絶也公族無宫刑不翦其類也古者諸侯之禮亦如是之懿哉孟子謂舜為天子臯陶為士瞽瞍殺人則執之舜視棄天下猶棄敝蹝也竊負而逃遵海濵而處終身訢然樂而忘天下彼天子父猶不可曲法而况官之子孫乃用䕃乎刑禁第五司救掌萬民之衺惡過失而誅讓之以禮防禁而救之凡民之有衺惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空其有過失者三讓而罰三罰而歸于圜土衺惡謂侮慢長老語言無忌而未麗於罪者過失亦由衺惡酗醟好訟若抽拔兵器誤以行傷害人麗於罪者誅誅責也罰撻擊之也加明刑者去其冠飾而書其衺惡之狀著之背也嘉石在外朝之門左使坐焉以恥辱之既而役諸司空也圜土獄城過失近罪晝日任之以事而收之夜藏於獄亦加明刑以恥之故大司寇以圜土聚教罷民凡害人者寘之圜土而施職事焉以明刑恥之其能改者反于中國不齒三年其不能改而出圜土者殺以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之司圜掌收教罷民凡害人者不使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒凡圜土之刑人也不虧體其罰人也不虧財善哉為國乎人之大惡豈一朝一夕必有漸也放僻邪侈之情動而無所畏忌則涓涓以成江河毫末以尋斧柯或伏尸市朝或流血刀鋸雖其悔之猶噬臍也是故先王之馭民必早為之所過輕者則坐諸嘉石稍重者則歸于圜土皆未入于五刑也若因兹困辱遂能自新則復為齊民何刑殺之及哉此亦使民遷善逺罪之術也孔子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡易曰屨校滅趾无咎此之謂也成康所以刑錯不用非一助邪刑禁第六萍氏幾酒謂苛察沽買過多及非時者謹酒謂使民節用酒也司虣掌憲市之禁令禁以屬遊飲食于市者若不可禁則搏而戮之以屬遊飲食謂羣飲食者也夫酒之為禍久矣君子以覆其邦家小人以不免刑戮可稱數哉酒誥曰文王誥教小子有正有事無彛酒越庶國飲惟祀徳將無醉又曰妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒此言文王告其民之小子與羣吏無得常飲酒若庶國君臣民衆飲酒亦唯祭祀以徳自將無令至醉故戒康叔當以文王之法往使妹土之人為純一之行勤種黍稷奔走事其父兄農功既畢始牽車牛逺行賈賣用其所得珍異孝養其父母其父母善子之行子乃自潔厚致用酒養也文王之法民之置酒唯祭與養耳而小人用之疏數無其時多少無其節羣飲食於市井以妨其業以費其財以興淫邪以起鬭訟是以禁之也然則聖人之於天下事為之制曲為之防果如何哉昔曹參去齊屬其後相以齊獄市為寄謂獄市者所以并容擾之姦人安所容乎蓋是時天下初定故從民之欲而不擾亂豈常行之道邪獄市不可以不治姦人不可以不禁大司徒以荒政十有二聚萬民其三曰緩刑而十有二曰除盜賊是救饑之政雖則緩刑至於盜賊不可不急其刑以除之也噫酒𣙜之官未罷則萍氏之禁司虣之令不復行矣然而緩刑仁也除盜賊義也凶年饑饉而仁義存焉亦不减於先王矣旴江集卷十欽定四庫全書旴江集卷十一宋李覯撰
