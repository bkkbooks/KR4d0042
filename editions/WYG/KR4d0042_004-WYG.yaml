  text: 外集卷一
  hash: sha256:fa329a1e705daf2a525cab69aa63f92206f1c3bf3eeadb4235343c5a03071471
body:
  text: 告劄告詞二劄子四薦章三首告詞勅建昌軍草澤李覯藩臣仲淹以覯所著文二十四篇來上予俾禁掖近侍詳較皆曰學業優議論正有立言之體且履行修整誠如薦章所云故特以一命及爾爾其益自進于道勿患朝廷之不知也可特授將仕郎試太學助教不理選限皇祐二年七月日勅將仕郎試太學助教説書李覯夫太學者朕所以出教化而賢士之所由進行誼也師儒之官可輕授乎爾醇明茂美通于經術東南士人推以為冠自佐學政逾年于兹孜孜渠渠務恪厥守祭酒司業以為博士之職莫宜于爾是用推恩爾其悉心使諸生兟兟興于廉讓而服于教訓則其善也可特授通州海門縣主簿太學説書散官如故嘉祐三年七月日劄子國子監奏伏覩試太學助教李覯素負才學博通經史嘗應制科舉雖因名臣薦論命以試官不霑政禄而養道丘壑聚徒教授南方士流皆宗師之欲望朝廷特與注授一官差充太學説書所兾有裨庠序風化之職如䝉擢用後犯入已贓及不如舉其本監主判管幹官並甘同罪候勅㫖㑹問到國子監稱李覯在建昌軍或在撫州奉聖㫖李覯令赴太學供職劄下江南西路轉運司指揮發來赴闕仍仰見在處支賜盤纒錢伍拾貫文右劄付李覯國子監奏據屯田員外郎充直講楚泰等狀伏見大理寺丞篆石經張次立素有學術深通經義俾居講席足厚素風泰等欲乞補充直講填殿中丞孫復闕當監體量得本官實有學行深明經藝可補講員伏乞朝廷特賜差補如䝉擢用後犯入已贓管幹主判官並甘同罪候勅㫖續據國子監奏已保舉張次立充直講填孫復闕竊慮未依得自來條制竊見試祕書省校書郎文勸劉棐素有履行通經術堪充國子監直講填孫復闕候勅㫖勘㑹太學助教李覯已奉聖㫖令赴太學供職檢㑹令文太學助教掌貳博士事分經教授右奉聖㫖宜令李覯依前降指揮赴學供職其孫復名闕更不差人所舉張次立等不行右劄付李覯准此太子中允充天章閣侍講兼管幹太學胡瑗奏為臣多疾乞於通州泰州秀州漣水軍無為軍江隂軍廣徳軍除臣一差遣候勅㫖奉聖㫖胡瑗再與假將理仍差李覯權同管幹太學右劄付李覯國子監奏據通州海門縣主簿太學説書權同管幹太學李覯狀為有祖母墳在建昌軍未祔先塋今欲請假往彼遷葬申乞指揮所據李覯狀候勅㫖奉聖㫖依奏除程給假一月不得有違日限所有太學公事仍仰鄭穆權管幹李覯回日仍舊右劄付李覯准此薦章范文正公二首右臣聞聖人坐以待旦旁求俊乂蓋將盡天下之才成天下之務故為臣者以舉善為忠亦將竭知人之明副待旦之意也臣親逢聖辰嘗忝近輔輙慕前修之節少答非常之遇臣伏見建昌軍草澤李覯前應制科首被召試有司失之遂退而隱竭力養親不復干禄鄉曲俊異從而師之善講論六經辯博明達釋然見聖人之㫖著書立言有孟軻揚雄之風義實無愧於天下之士而朝廷未賜采收識者嗟惜可謂遺逸者矣臣竊見往年處州草澤周啓明工於詞藻又江寧府草澤張元用及近年益州草澤龍昌期並老於經術此三人者皆䝉朝廷特除京官以示奬勸臣觀李覯於經術文章實能兼富今草澤中未見其比非獨臣知此人朝廷士大夫亦多知之臣今取到本人所業禮論七篇明堂定制圖序一篇平土書三篇易論十三篇共二十四篇編為一十卷謹繕寫上進伏乞聖慈當乙夜之勤一賜御覽則知斯人之才之學非常儒也其人以母老不願仕宦伏乞朝廷優賜就除一官許令侍養亦可光其道業榮於閭里以明聖人在上下無遺才若不如舉狀臣甘重受朝典謹具狀奏聞伏候勅㫖皇祐元年十一月二十日臣伏見建昌軍草澤李覯十餘年前曾撰明堂圖并序一首大約言周家之制見於月令及考工記大戴禮而三家之説少異古今惑之覯能研精其書㑹同大義按而視之可以制作臣於去年十一月録進前人所業十卷其明堂圖序為一卷必在兩制看詳今朝廷行此大禮千載一時何斯人學古之心上契聖作臣今再録其圖并序上進伏望特賜聖覽於朝廷討論之際庶有所補仍乞羣臣前奏殊加天奬以勸儒林取進止六月日余侍郎一首具銜臣余靖伏覩先降勅節文賢良方正能直言極諫并高蹈丘園等科並許少卿監已上及本路轉運使副逐處長吏奏舉者右謹具如前臣竊見建昌軍草澤李覯博學通識包括古今潛心著書研極治亂江南儒士共所師法曾於慶厯元年應茂材異等科祕閣召試下第退居鄉里四方生徒從之講習有此寒畯淹在草萊於臣鄰封不敢緘蔽臣又伏見草澤邵亢與覯同時就試後來亢以臣寮奏舉已授職官今覯退居獨未䝉用伏乞朝廷特與召試以廣得賢之路謹具狀奏聞伏候勅㫖旴江外集卷一欽定四庫全書旴江外集卷二
