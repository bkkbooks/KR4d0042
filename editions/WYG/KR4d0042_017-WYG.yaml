body:
  text: 國用第六繫辭曰包犧氏沒神農氏作斵木為耜揉木為耒耒耜之利以教天下盖取諸益是聖人之於農必制器以利其用也舜典曰棄黎民阻饑汝后稷播時百榖是聖人之於農必命官以掌其政也故遂大夫正嵗簡稼器脩稼政稼器耒耜鎡基之屬稼政孟春之月令所云皆脩封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之之比也器不簡則貧人或不能備物政不脩則愚者或不能得宜不備物則雖良田将不耕不得宜則雖嘉種将不穫若是不可不慎也至如二耜為耦一夫不足獨舉必通功易事兩人相助而後可也故里宰以嵗時合耦于耡以治稼穡趍其耕耨行其秩敘耡者里宰治處於此合耦使相佐助秩敘相佐助之次第也又五榖熟時有風雨之急是謂力耕數耘收穫如寇盜之至者也然一夫又不足為故遂師廵其稼穡而移用其民以救其時事謂使轉相助救時急事也古之治天下至纎至悉之如此奈何民不富國不實也漢趙過能為代田一畮三􅍒一夫三百􅍒而播種於􅍒中苗生葉稍耨隴草因隤其土以附苗根比盛暑隴盡而根深能風與旱其耕耘下種田器皆有便巧用耦犂二牛三人一嵗之收常過縵田畮一斛以上善者倍之民或苦少牛過奏故平都令光以為丞教民相與庸輓犂以故田多墾闢用力少而得榖多斯近古之事效驗甚明而歴代莫以為意何也國用第七載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征謂宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟民雖有間無職事者猶出夫稅家稅夫稅者百畮之稅家稅者出士徒車輦給繇役也閭師凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰謂庶人五母雞二母彘無失其時是以不畜者罰之死後祭無牲也黍稷曰盛耕者所以殖黍稷今田不耕非直罰以屋粟又死後祭無盛也五畮之宅樹以桑麻今宅不毛非直罰以里布死後又無椁也蠶則得帛不蠶故身不得衣帛績則得布不績故死則不為之着哀以罰之也夫財賦力征人所吝嗇與其無事而重孰若有業而輕以此罰之敢或不勉者乎帛所以養老衰所以送死葬禮祭禮乃為令終一有解惰則不得用以此罰之敢或不勉者乎是聖人敺民以反本之術也漢髙祖令賈人不得衣絲乗車重稅租以困辱之孝恵髙后時為天下初定復弛商賈之律然市井子孫亦不得為官吏商賈乃在四民之目而前代且謫之後之㳺惰去四民逺甚者其類不可勝數為國者非徒函容或尊寵之傷哉國用第八一夫之耕食有餘也一婦之蠶衣有餘也衣食且有餘而家不以富者内以給吉㓙之用外以奉公上之求也而况用之無節求之無藝則死於凍餒者固其勢然也故土均掌和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地媺惡為輕重之法而行之掌其禁令禮俗邦國都鄙民之所行先王舊禮也君子行禮不求變俗隨其土地厚薄為之制豐省之節耳司書三嵗則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之政令逆謂鉤考也恐其羣吏濫稅斂萬民故知此本數乃鉤考其政令也夫奢則以為榮儉則以為辱不顧家之有亡汲汲以從俗為事者民之常情也是故為之禁令地媺收多則用之豐地惡收少則用之省如此民皆知惜費矣虧下以益上貪功以求賞不恤人之困乏皇皇以言利為先者吏之常態也是故為之鉤考雖器械六畜山林川澤必知其數如此吏不敢厚斂矣民皆知恤費吏不敢厚斂而不免凍餒者未甞聞也禮器曰居山以魚鼈為禮居澤以鹿豕為禮君子謂之不知禮然則地之惡禮不可輕耶有若曰百姓不足君孰與足然則民之財官可不知耶是先王之所以得後世之所以失也國用第九職方氏凡邦國小大相維王設其牧制其職各以所能制其貢各以其所有謂國之地物所有也諸侯得稅大國半次國三之一小國四之一皆市取當國所有以貢於王也土訓掌道地圖以詔地事道地慝以辨地物而原其生以詔地求辨地物者别其所有所無原其生生有時也以此二者告王雖是當州所有而生有時地所無及物未生則不求也大哉聖人念民勤恤財匱如是其著也地所有而官不用則物必賤地所無而反求之則價必貴况天時所不生則雖有如無矣買賤賣貴乗人之急必刼倍徙之利者大賈蓄家之幸也為民父母奈何不計本末罔農夫以附商賈令下之日吏旁為姦公不獲皮毛而私啄其髓矣壊民家敗民産此其甚也夏書任土作貢厥貢厥篚九州不同前聖後聖豈非一揆者乎漢桑都尉領大農以諸官各自市相争物以故騰躍而天下賦輸或不償其僦費廼請置大農部丞數十人分部主郡國令逺方各以其物如異時商賈所轉販者為賦置平準於京師都受天下委輸大農諸官盡籠天下之貨物如此富商大賈亡所牟大利則反本而萬物不得騰躍故抑天下之物名曰平準桑雖聚斂之臣然此一役豈無法耶孝武時國用饒給而民不益賦誠有以也國用第十司稼廵野觀稼以年之上下出斂法斂法者豐年從正㓙年則損也廪人掌九榖之數以嵗之上下數邦用以知足否以詔榖用以治年之凶豐凡萬民之食食者人四鬴上也人三鬴中也人二鬴下也若食不能人二鬴則令邦移民就榖詔王殺邦用謂以嵗之豐㓙得稅物多少之帳計國之用以知足否若嵗㓙稅物少而用多則不足廪人既知多少足否乃詔告在上用榖之法也夫什一而稅天下中正是故謂之徹徹者通也然耕穫之事豐儉亡常不幸㓙旱水溢或螟螣蟊賊農雖盡力榖有不登而有司必求如法於理安乎孟子道龍子之言曰治地莫善於助莫不善於貢貢者校嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然将終嵗勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也故聖人設官必於榖之将熟廵於田野觀其豐凶而後制稅斂焉豐年從正亦不多取也凶荒則損何取盈之有哉然則龍子所見盖周之末世周公雖貢未甞聞其不善也然而取之少則用不得不殺取少而用不殺則國不能自濟非反乎民将焉得也宜其知足否而詔榖用焉王制曰冡宰制國用必於嵗之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出由此道也後世作者除減斂法則既聞之矣至於邦用其可忽諸旴江集卷七欽定四庫全書旴江集卷八宋李覯撰
