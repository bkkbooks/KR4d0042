front:
  text: 直講李先生外集卷第三
  hash: sha256:dd8f7692611907dcf725cf3bd8d02e865d35d94629909ae0ee483261ba684e75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_006-1a}
body:
  text: 序詩墓銘張學士送李君南歸序宗古三代以還漢唐為盛孝武雖講求三雍之制而迂儒駕説怪誕而不經有唐正觀開元幾于治古雖希闊畢講而明堂之議寂寥而無詔國家承百王之餘夷僣黜暴典章法則洪鬯純備然往者挾佞之臣讀儒書被儒服一旦得貴位則誘導上心務極土木以崇釋老斤斧既息流竄亦至後之卿相勤恤民力以實邦本合宫之作我故未暇也惜乎自周室距今曠千餘載此禮廢絶隔于耳目所以學者各是已見競牽師習若詩分傳離愈失愈逺天豈使三王經制將遂泯乎故復出泰伯以明其本泰伯家江西嗜古學以謂今天子享上帝朝諸侯雖有其禮而無其位乃潛心憤悱貫覽數家之説自周官考工記大戴禮盛德篇禮記月令漢白虎諸儒及歷代論議參總會一稽同合異曲者暢之滯者通之為明堂定制圗一篇并序凡數千言朅來京師摯見時彥若李宋二紫微左史聶長孺集賢葉道卿皆旴衡接納鄭重推許可獻公車登乙攬補朝廷之闕當晨奏而暮召泰伯猶謙謙不處罔敢露才而自薦也會貢舉罷詔拂髦有懷親之感歸艎泊渚拱袂言别余恐江西英俊未盡知泰伯之道及中朝士大夫稱詠所以然故筆為序以送之異日舉修墜典咨謀折衷泰伯必攘袂危冠群立髙議與宿儒故老較辨于赤墀矣斯言不誣故乏輝潤謹序葉內翰詩清臣啓纍日前伏蒙袖書臨訪并小文編及明堂圗披玩尋繹彌增景服偶書二百四十言以伸謝臆伏惟采攬進士不讀書明經不根義詬病君子儒于今作文弊禮部右詞賦諸生竊科第從道不違人追趍斯近利李生何為者力學務遜志羞耻事章句深湛刺經藝常惟天子貴無大明堂位邈焉三代風鮮矣百世繼去聖日逾逺攻端非共致公玉既妄圗戴德亦􅓎記漢唐盛容典規畫不足示其間區區者何暇盛德事確論無甚髙闊講寖而墜披文會今古援筆考同異靣勢本周官纎悉探吕氏俯拾林甫長仰擲康成盩昭發老生矇冥符作者意聖期接千統縟禮恢萬祀無文既巳秩同節此云備寧當總章法未攬雲臺議廢興有時合聰明自民視成厦繄衆材致理豈一士南闕朝奏書中朝夕鳴佩行矣無自遺日中今可熭祖學士詩奉和泰伯送春絶句繕寫寄呈幸垂笑覽范陽祖無擇上憶昨相逢甲午年與君同賦送春篇等間又見春風老更捧新吟一惘然萬樹紅芳落漸稀浮榮能得幾多時孤根未識陽和力春去春來兩不知送春長句呈泰伯先生晝日臨風把酒巵宜春臺上送春歸巳看緑樹愔愔靜猶有殘花怗怗飛歲月任從隨手過功名未必與心違我緣客宦無常處後會如今亦恐稀無擇啓前日承泰伯先生寵示新詩三首謹依嚴韻奉和幸賜采覽異鄉何處散幽懷賴得城中百尺臺還向天涯經歲住那知春色為誰來雪消江上看梅發風暖衡陽有鴈回強擬登髙聊賦詠再三愧乏楚人才右宜春臺晴煙羃歷淡湖光勢勝居然占一方拂水萬絲楊柳弱倚風千蓋芰荷香縱逰間泛蘭舟穩半醉狂眠石席涼公退每來須度日却疑身出利名鄉右東湖九十日春今日盡送春何况我偏知後期只在經殘臘重探梅開雪裏枝右送春寄李先生黃先生晞久不見泰伯中心頻損和近聞束書卷更卜好山阿學古成儒癖敦風蕩俗訛周公法巳矣原憲事如何母老祿未及身間鬢不皤新文海裔播舊業釣竿拖寧戚歌寧發麻姑叟屢過時人一握小吾道片雲多友弟俱遊宦池樊自樜莎聞猿詩興逸敲戶酒徒羅鄉里名光也朝廷禮後麼年來魚信至怪我客蹉跎麻姑山一首贈陳仲父賢良兼泰伯先生黃寺丞通麻姑山直斗牛角形勝擁斷東南隅五百年來畜英氣特為吾宋生真儒李姓覯名泰伯字風骨古秀飄髯鬚其人於世少似者無乃稷契荀孟徒自傷出處苦竒剝不得寸祿遮妻孥歸來築室郡北郭反關唯作文字娛先生之門足髙第中間仲父有輩無曽繼先生列科舉簡編滿載三十車先生不遇子亦退髙文懿行夸江湖麻源谷口田數頃歲計取足無嬴餘生涯俯就隱意決便棄城邑廬郊墟上有慈親享甘旨下有子弟森庭除平生胸臆渺溟渤惟學虞卿窮著書平生志氣薄雲漢惟學子陵間釣魚每當春秋社時候萬象瀟灑神仙居巖野卉照几席溪風谷靄清襟𥚑先生乘興或還往殺雞炊黍開尊壷共評古今正經史不知口角清涎濡名教果有如是樂彥輔之言誠豈誣蓮社竹溪詫髙逸究竟未免歸狂愚爭如仲父與泰伯相樂以道情愈愈文酒逢迎二十載一日不見巳為踈松門大開俗不到水雲軒檻空清虛仰愛二友嗟不與欲别仙墅猶踟蹰先生墓志銘并序門人陳次公撰有宋經明行修道德沈純用則任公卿尸教化而不用以夫子之道教授學者門人升録千有餘人有如遊夏者則其賢可知也巳文章髙於當世版而行之凡數集每為歌詩志表未嘗以一字借人而人自求而得之皆自言曰如此為父兄求而得之皆自言曰父兄如此下筆多典故世莫及也天下皆曰泰伯先生士大夫爭識其面其為當世推伏也若此先生姓李氏諱覯字泰伯南城人也其實如秋其受如海外示發舒中以直正其於道也如天焉無不覆如地焉無不載天地以萬物遂成為功先生以四海咸若為功用則任公卿尸教化而不用以夫子之道教授學者後之覽其遺書則如其所以然曽充茂才有富國安民強兵三策易禮二論合五十首天下傳誦及退居為周禮致太平論并序五十一首其敵天命又有潛書慶曆民言寄范富孫公四書長江賦蓋不忍夫一世之傷而兩臂幾廢常語其徒其略曰大哉孔子吾何能稱焉顔淵曰仰之彌髙鑽之彌堅瞻之在前忽焉在後仰之彌髙也則吾以為極星考之正之舍是則無四方矣鑽之彌堅也則吾以為磐石據之依之舍是則無安居矣瞻之在前忽焉在後也則吾以為鬼神生之斂之舍是則無庶物矣他人之道借曰善焉有之可也亡之可也夫子之道不可須叟去也不聞之是無耳也不見之是無目也不言之是無口也不學之不思之是無心無精􅐩也尚可以為人乎哉吾於斯道夜而諷之矣晝而讀之矣髮斑斑而不知其疲矣終沒吾世而巳矣其語如此衆驚而萃非之先生之志益堅然則不非之不足以為泰伯先生也先生燕申講解嚴重慎密弟子畏之有駴則對之以狀察無溢美然後進之今為墓刻畏比神靈自祖禰以往丘蓋不言只於集中得子髙墓表曰南城縣東北逺百里吾髙祖之父家焉先夫人墓志曰先君嘗學不應舉尤直信生平無所爭不識州縣廷終以不得意死又於官簿得曽祖諱某祖諱某父諱某母鄭氏始娶陳氏再娶饒氏有男參魯三女長適陳汝翼而卒先生之生也以已酉而卒也以已亥年五十有一其卒仲秋其􅌾季冬實嘉祐四年祔先君之塋在鳯凰山足夫南城載于西漢地理志唐屬撫州臨川國朝别建軍曰建昌縣隸焉鳯凰山在縣西北城背之塋在麓東松檟萬株山川如畫乃真宅也然而其抱負如此天之報之止如此其後焉有不逹者乎嗚呼先生之名大顯世之顯人及有道之士莫不知者下至農工負販士女釋老盡能誦其文章天子亦聞之乃以將仕郎試太學助教就門官之末年又召入太學説書復以通州海門縣主簿祿之權管幹太學非其好也逾年以告歸歸逾月而卒臨終無他言獨執次公手以明堂制圗為託又以為三禮論未成為恨其孜孜為學者如此何哉次公夙荷教育過於強仕之年哲人既殞復何聊哉泣而銘曰余侍先生得堯舜禹湯文武周公孔子之事甚詳皆本書詩非諸子之緒言也於是浩歎魏晉之際莾卓之間惠慎之時聖人之道已大壞有由然及究莊生之言今世之仁人蒿目而憂世之患不仁之人決性命之情而叨富貴焉知曽史之不為桀跖之嚆矢曰儒者未嘗是之而余獨是之嗚呼天乎其意不在斯文乎何奪先生之速哉何奪先生之速哉直講李先生外集卷第三終
