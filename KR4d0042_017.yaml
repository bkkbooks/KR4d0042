front:
  text: 直講李先生文集卷之七
  hash: sha256:46f07bb9a76acc25d7f2a059db435cedc420cbc36e6fcacd8e5b93a9ac14d778
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_017-1a}
body:
  text: 國用第六繫辭曰包犧氏沒神農氏作斫木為耜揉木為耒耒耜之利以教天下蓋取諸益是聖人之于農必制器以利其用也舜典曰棄黎民阻饑汝后稷播時百榖是聖人之于農必命官以掌其政也故遂大夫正歲簡稼器修稼政稼器耒耜鎡基之屬稼政孟春之月今所云皆修封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之之比也器不簡則貧人或不能備物政不修則愚者或不能得宜不備物則雖良田將不耕不得宜則雖嘉種將不穫若是不可不慎也至如二耜為耦一夫不足獨舉必通㓛易事兩人相助而後可也故里宰以歲時合耦于鋤以治稼穡趍其耕耨行其秩敘鋤者里宰治處于此合耦使相佐助秩敘相佐助之次第也又五穀熟時有風雨之急是謂力耕數耘收穫如寇盜之至者也然一夫又不足為故遂師巡其稼穡而移用其民以救其時事謂使轉相助救時急事也古之治天下至纎至悉之如此奈何民不富國不實也漢趙過能為代田一畝三甽一夫三百甽而播種于甽中苗生葉稍耨隴草因隤其土以附苗根比盛暑隴盡而根深能風與旱其耕耘下種田器皆有便巧用耦犂二牛三人一歲之收常過縵田畝一斛以上善者倍之民或苦少牛過奏故平都令光以為丞教民相與庸挽犂以故田多墾闢用力少而得榖多斯近古之事效驗甚明而歷代莫以為意何也國用第七載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征謂宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟民雖有間無職事者猶出夫稅家稅夫稅者百畝之稅家稅者出士徒車輦給繇役也閭師凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰謂庶人五母雞二母彘無失其時是以不畜者罰之死後祭無牲也黍稷曰盛耕者所以殖黍稷今田不耕非直罰以屋粟又死後祭無盛也五畝之宅樹以桑麻今宅不毛非直罰以里布死後又無椁也蠶則得帛不蠶故身不得衣帛績則得布不績故死則不為之著衰以罰之也夫財賦力征人所吝嗇與其無事而重孰若有業而䡖以此罰之敢或不勉者乎帛所以養老衰所以送死葬禮祭禮乃為令終一有解惰則不得用以此罰之敢或不勉者乎是聖人驅民以反本之術也漢髙祖令賈人不得衣絲乘車重稅租以困辱之孝惠髙后時為天下初定復弛商賈之律然市井子孫亦不得為官吏商賈乃在四民之目而前代且謫之後之遊惰去四民逺甚者其類不可勝數為國者非徒函容或尊寵之傷哉國用第八一夫之耕食有餘也一婦之蠶衣有餘也衣食且有餘而家不以富者內以給吉凶之用外以奉公上之求也而况用之無節求之無藝則死于凍餒者固其勢然也故土均掌和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地㜫惡為䡖重之法而行之掌其禁令禮俗邦國都鄙民之所行先王舊禮也君子行禮不求變俗隨其土地厚薄為之制豐省之節耳司書三歲則大計群吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆群吏之政令逆謂鉤考也恐其群吏濫稅斂萬民故知此本數乃鉤考其政令也夫奢則以為榮儉則以為辱不顧家之有亡汲汲以從俗為事者民之常情也是故為之禁令地􅍇收多則用之豐地惡收少則用之省如此民皆知惜費矣虧下以益上貪功以求賞不恤人之困乏皇皇以言利為先者吏之常態也是故為之鉤考雖器械六畜山林川澤必知其數如此吏不敢厚斂矣民皆知惜費吏不敢厚斂而不免凍餒者未嘗聞也禮器曰居山以魚鱉為禮居澤以鹿豕為禮君子謂之不知禮然則地之惡禮不可䡖耶有若曰百姓不足君孰與足然則民之財官可不知耶是先王之所以得後世之所以失也國用第九職方氏凡邦國小大相維王設其牧制其職各以所能制其貢各以其所有謂國之地物所有也諸侯得稅大國半次國三之一小國四之一皆市取當國所有以貢于王也土訓掌道地圖以詔地事道地慝以辨地物而原其生以詔地求辨地物者别其所有所無原其生生有時也以此二者告王雖是當州所有而生有時地所無及物未生則不求也大哉聖人念民勤恤財匱如是其著也地所有而官不用則物必賤地所無而反求之則價必貴况天時所不生則雖有如無矣買賤賣貴乘人之急必劫倍蓰之利者大賈蓄家之幸也為民父母奈何不計本末罔農夫以附商賈令下之日吏旁為姦公不獲皮毛而私啄其髓矣壞民家敗民産此其甚也夏書任土作貢厥貢厥篚九州不同前聖後聖豈非一揆者乎漢桑都尉領大農以諸官各自市相爭物以故騰躍而天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國令逺方各以其物如異時商賈所轉販者為賦置平凖于京師都受天下委輸大農諸官盡籠天下之貨物如此富商大賈亡所牟大利則反本而萬物不得騰躍故抑天下之物名曰平凖桑雖聚斂之臣然此一役豈無法耶孝武時國用饒給而民不益賦誠有以也國用第十司稼巡野觀稼以年之上下出斂法斂法者豐年從正凶年則損也廪人掌九榖之數以歲之上下數邦用以知足否以詔榖用以治年之豐凶凡萬民之食食者人四釜上也人三釜中也人二釜下也若食不能人二釜則令邦移民就榖詔王殺邦用謂以歲之豐凶得稅物多少之帳計國之用以知足否若歲凶稅物少而用多則不足廪人既知多少足否乃詔告在上用榖之法也夫什一而稅天下中正是故謂之徹徹者通也然耕穫之事豐儉亡常不幸凶旱水溢或螟螣蟊賊農雖盡力榖有不登而有司必求如法于理安乎孟子道龍子之言曰治地莫善于助莫不善于貢貢者校歲之中以為常樂歲粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然將終歲勤動不得以養其父母又稱貸而益之使老稚轉乎溝􅊤惡在其為民父母也故聖人設官必于榖之將熟巡于田野觀其豐凶而後制稅斂焉豐年從正亦不多取也凶荒則損何取盈之有哉然則龍子所見蓋周之末世周公雖貢未嘗聞其不善也然而取之少則用不得不殺取少而用不殺則國不能自濟非反乎民將焉得也宜其知足否而詔榖用焉王制曰冡宰制國用必于歲之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出由此道也後世作者除减斂法則既聞之矣至于邦用其可忽諸直講李先生文集卷之七終
