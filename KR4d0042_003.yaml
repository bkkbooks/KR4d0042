body:
  text: 賢太守之為邦崇鄉賢風後學凡以因敬梓者之心而教易行肆泰伯先生於我旴有常祀七八年來乃或撤厥祠亭為堂逼厥宰壠為院而置先生於雜祀或􅏌然不知有先生惟先生嘗言人於夫子之道不聞之是無耳也不見之是無目也不言之是無口也不學之不思之是無心無精爽也今有仕是邦而不知有先生不亦猶之無耳目口心精爽者乎往弗諌景定𥘉元太守雪軒魏矦峙祠墓乃復建亭朔告必躬頓異乎前時觀又取遺書讀嘆其言足經世興太平獨恨年譜有闕遺字畫有訛脫更與旴之士參以它書讎正二年鋟之梓其將以開世之無耳目口心精爽人矣乎豫方服侯之為㑹天子嘉侯治狀改守袁州因誦泰伯袁學記爾袁得賢君之句而有感遂書其後三年上巳日里中子張淵微敬書
