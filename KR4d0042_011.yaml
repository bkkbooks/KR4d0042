  text: 直講李先生文集卷之二
  hash: sha256:c6be59198845f5b83bc8dd2f86497b4a93f91576722c515fcd07ed6ce0b10021
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_011-1a}
body:
  text: 禮論七篇豫幼而好古誦味經籍窺測教意然卒未能語其綱條至于今兹年二十四思之熟矣比因多病退伏廬下身無他役得近紙筆故作禮論七篇推其本以見其末正其名以責其實崇先聖之遺制攻後世之乖缺邦國之龜筮生民之耳目在乎此矣禮論第一或問聖人之言禮奚如是之大也曰夫禮人道之凖世教之主也聖人之所以治天下國家修身正心無他一於禮而巳矣曰嘗聞之禮樂刑政天下之大法也仁義禮智信天下之至行也八者並用傳之者久矣而吾子一本於禮無乃不可乎曰是皆禮也飲食衣服宫室器皿夫婦父子長幼君臣上下師友賔客死喪祭祀禮之本也曰樂曰政曰刑禮之攴也而刑者又政之屬矣曰仁曰義曰智曰信禮之别名也是七者蓋皆禮矣敢問何謂也曰夫禮之初順人之性欲而為之節文者也人之始生飢渴存乎內寒暑交乎外飢渴寒暑生民之大患也食草木之實鳥獸之肉茹其毛而飲其血不足以養口腹也𬒳髮衣皮不足以稱肌體也聖王有作於是因土地之宜以殖百榖因水火之利以為炮燔烹炙泊其犬豕牛羊及醬酒醴酏以為飲食藝麻為布繅絲為帛以為衣服夏居橧巢則有顛墜之憂冬入營窟則有隂寒重膇之疾於是為之棟宇取材於山取土於地以為宮室手足不能以獨成事也飲食不可以措諸地也於是范金斫木或為陶瓦脂膠丹漆以為器皿夫婦不正則男女無别父子不親則人無所本長幼不分則強弱相犯於是為之婚姻以正夫婦為之左右奉養以親父子為之伯仲叔季以分長幼君臣不辨則事無統上下不列則群黨爭於是為之朝覲㑹同以辨君臣為之公卿大夫士庶人以列上下人之心不學則懵也于是為之庠序講習以立師友人之道不接則離也於是為之宴享苞苴以交賔客死者人之終也不可以不厚也于是為之衣衾棺槨衰麻哭踊以奉死喪神者人之本也不可以不事也於是為之禘嘗郊社山川中霤以修祭祀豐殺有等疏數有度貴有常奉賤有常守賢者不敢過不肖者不敢不及此禮之大本也飲食既得衣服既備宮室既成器皿既利夫婦既正父子既親長幼既分君臣既辨上下既列師友既立賔客既交死喪既厚祭祀既修而天下大和矣人之和必有發也於是因其發而節之和久必怠也於是率其怠而行之率之不從也於是罰其不從以威之是三者禮之大用也同出于禮而輔於禮者也不别不異不足以大行於世是故節其和者命之曰樂行其怠者命之曰政威其不從者命之曰刑此禮之三支也在禮之中有溫厚而廣愛者有斷决而從宜者有疏逹而能謀者有固守而不變者是四者禮之大㫖也同出於禮而不可缺者也於是乎又别而異之溫厚而廣愛者命之曰仁斷决而從宜者命之曰義疏逹而能謀者命之曰智固守而不變者命之曰信此禮之四名也三支者譬諸手足焉同生於人而輔於人者也手足不具頭腹豈可動哉手足具而人身舉三支立而禮本行四名者譬諸筋骸之類焉是亦同生於人而異其稱者也言乎人則手足筋骸在其中矣言乎禮則樂刑政仁義智信在其中矣故曰夫禮人道之凖世教之主也聖人之所以治天下國家修身正心無他一於禮而已矣禮論第二或人不諭曰節其和者謂之樂行其怠者謂之政威其不從者謂之刑信然矣其所以統於禮者願聞其指曰昔者聖人之制禮也因十二月之氣分而為律吕因六律六吕作為十二管因其清濁與其䡖重配而為五聲因其五聲變而雜之以為八音或為歌詩或𬒳於金石絲竹匏土革木之器爰及干戚羽旄以導人之和心以舞人之手足小大有所終始有經倡和有秩節奏有差詘伸俯仰必有齊也綴兆行列必有正也宫軒特縣各當其位四六八羽各昭其數以範五行以調八風以均百度以象德行以明功業以觀政治以和人神此禮之一攴樂著矣出號令立官府制軍旅聚食貨號令所以明約束官府所以正職掌軍旅所以待不虞食貨所以贍不足是故為之符璽節旄以信號令為之掾屬胥徒以備官府為之甲胄五兵以成軍旅為之井田賦貢以興食貨為之城郭溝池所以限內外也為之度量權衡所以平多少也為之書契版圖所以窮變詐備遺忘也為之圄犴桎梏所以嚴推劾禁奔逸也官各有守事各有程先後有次遲速有檢以辨國之大事以平天下之民以躋至治此禮之二支政成矣伐不義侵不庭刺有罪或以鈇鉞或以刀鋸為大辟為宫為刖為墨為劓為剕為鞭為撲為流為贖輕有其等重有其常用之有地决之有時所以懲天下之人使皆遷善而逺罪此禮之三支刑行矣夫所謂禮者為而節之之謂也是三者其自成乎果有為之者乎其自治乎果有節之者乎苟不為也不節也則十二管不作五聲不辨八音之器不具干戚羽旄不設小大無其所終始無其經倡和無其秩節奏無其差詘伸俯仰不齊也綴兆行列不正也縣之靣不殊也羽之數不分也如此則何以見樂哉不為也不節也則號令不出官府不立軍旅不制食貨不聚符璽節旄不作掾屬胥徒不備甲胃五兵不成井田賦貢不興城郭溝池不修度量權衡不均書契版圖不著圄犴桎梏不嚴官無其守事無其程先後無其次遲速無其檢如此則何以見政哉不為也不節也則不義不伐不庭不侵有罪不刺鈇鉞無其凖力鋸無其平大辟宫刖墨劓剕鞭撲流贖皆無其法輕無其等重無其常用之無其地决之無其時如此則何以見刑哉由是而言故知三者果有為而節之者然後能成也能治也為乎飲食衣服宫室器皿夫婦父子長幼君臣上下師友賔客死喪祭祀而節之者既謂之禮矣為乎十二管五聲八音干戚羽旄號令官府軍旅食貨符璽節旄掾屬胥徒甲胄五兵井田賦貢城郭溝池度量權衡書契版圖圄犴桎梏鈇鉞刀鋸大辟宫刖墨劓剕鞭撲流贖而節之者反不謂之禮可乎若是則三者果禮之攴也而强其名者也禮論第三或曰樂刑政之說既承教矣敢問溫厚而廣愛者仁也斷决而從宜者義也疏逹而能謀者智也固守而不變者信也則然矣其何繫於禮哉曰百畒之田不奪其時而民不飢矣五畒之宅樹之以桑而民不寒矣逹孝悌則老者有㱕病者有養矣正喪紀則死者得其藏修祭祀則鬼神得其饗矣征伐有節誅殺有度而民不橫死矣此溫厚而廣愛者也仁之道也君為君焉主政令必生殺不得不從矣臣為臣焉守職事死干戈不得少變矣男女有别不得相亂矣長幼有序不得相陵矣興廉讓則財不得苟取位不得妄受矣立諌諍則不得諱其惡矣設選舉則賢者不遺矣正刑法則有罪者必誅矣此斷决而從宜者也義之道也為衣食起宫室具器皿而人不乏用矣異親疏次上下而人不興亂矣列官府紀文書而姦詐可窮矣築城郭治軍旅而冦賊不作矣親師傅廣學問而百慮畢矣此疏逹而能謀者也智之道也號令律式以約民心蔑有欺矣祿位班次以等賢愚蔑相犯矣車馬服御以章貴賤而人不疑矣百官不易其守四民不改其業而事不愆矣言必中行必果而天下率從矣此固守而不變者也信之道也若夫百畒之田不奪其時五畒之宅樹之以桑逹孝悌以養老病正喪紀以藏其死修祭祀以饗鬼神征伐有節誅殺有度定君臣别男女序長幼興廉讓立諌諍設選舉正刑法為衣食起宫室具器皿異親疏次上下列官府紀文書築城郭治軍旅親師傅廣學問為號令律式祿位班次車馬服御官守民業言而必中行而必果者謂之非禮可乎既曰仁矣曰義矣曰智矣曰信矣總而言之又皆禮矣若是則仁義智信果禮之别名也禮論第四或曰仁義智信疑若根諸性者也以吾子之言必學禮而後能乎曰聖人者根諸性者也賢人者學禮而後能者也聖人率其仁義智信之性㑹而為禮禮成而後仁義智信可見矣仁義智信者聖人之性也禮者聖人之法制也性畜於內法行于外雖有其性不以為法則曖昧而不章今夫木大者可以為棟梁小者可以為榱桷不以為屋室則朽于深山之中與朴樕同安得為棟梁榱桷也溫厚可以為仁斷决可以為義疏逹可以為智固守可以為信不以為禮則滯于心胸之內與無識同安得謂之仁義智信也屋既成雖拙者必指之曰此棟也此梁也此榱也此桷也禮既行雖愚者必知之曰此仁也此義也此智也此信也賢人者知乎仁義智信之美而學禮以求之者也禮得而後仁義智信亦可見矣聖與賢其終一也始之所以異者性與學之謂也中庸曰自誠明謂之性自明誠謂之教誠則明矣明則誠矣自誠明者聖人也自明誠者賢人也然則賢人之性果無仁義智信乎曰賢人之性中也楊雄所謂善惡混者也安有仁義智信哉性之品有三上智不學而自能者也聖人也下愚雖學而不能者也具人之體而巳矣中人者又可以為三焉學而得其本者為賢人與上智同學而失其本者為迷惑守於中人而巳矣兀然而不學者為固陋與下愚同是則性之品三而人之類五也請問學之得失曰所謂本者禮也知乎仁義智信之美而不知求之於禮率私意附邪說蕩然而不反此失其本者也故世有非禮之仁矣有非禮之義矣有非禮之智矣有非禮之信矣是皆失其本而然也敢問其目曰奪其常産廢其農時重其賦稅以至飢寒憔悴而時賜米帛以為哀人之困憲章煩密官吏枉酷殺戮無數而時發赦宥以為愛人之命軍旅屢動流血滿野民人疲極不知喪葬而收斂骸骨以為惠及死者若是類者非禮之仁也背其君親疏其兄弟而連結私黨以死相赴以為共人之患諂諛機巧以動上心而數辭其爵位及其貨財以為謙讓君有過失而不能諌正而暴揚於外身有隱惡不能自改而専攻人之短以為强直賢才果勇不能用於公家而私相援舉以為巳力下民之愚而不能教訓陷之於惡然後峻刑以誅之以為奉法若是類者非禮之義也為智不能以制民用修世教起政事以治人齊師旅以禦亂以為天下國家久長之策而專為姦詐巧辨以徼一時之利若是類者非禮之智也為信不能以一號令重班爵明車服以辨等守職業以興事使天下之人仰之而不疑而專為因循顧望以死兒女之言若是類者非禮之信也今有欲為仁義智信而不知求之於禮是將失其本者矣禮論第五或人請問樂刑政亦有非禮者乎曰善哉爾之問也夫夷蠻戎狄荒淫靡曼之音雜其倡優輔以子女諧笑顛亂以動人耳目移人心氣若是類者非禮之樂也或重刑辟變法律伺人小過鉤人微隱以為明察或悲哀怯愞容貸姦宄以為慈愛或急征橫賦多方揉索抔聚畜積以為强國或時起土功驅人為卒用於無用以為豫備若是類者非禮之政也或為轘裂鼎鑊炮烙菹醢剝靣夷族以威天下若是類者非禮之刑也曰子所謂禮者為之節之者也若是三者豈無為之者乎豈盡無其節乎曰夫所謂為者先王之為也所謂節者先王之節也先王之所以為而節之者非妄也必有仁義智信之善存乎其間矣不念古昔不師先王是皆妄為也妄節也君子不以為禮也或曰樂刑政皆禮也先儒之述何以不止於禮而言禮樂刑政曰樂刑政雖統於禮蓋以聖人既别異其名世傳巳久止言禮則人不知樂刑政故並列之使人得以兼用然首之以禮而樂刑政次之意者謂樂刑政咸統於禮歟譬諸孔門四教曰文行忠信忠信豈非行乎蓋以止言行則人不知忠信故並列之然先之以行而次以忠信謂忠信咸統於行也然則所謂仁義禮智信者亦猶是哉曰非矣樂刑政者禮之攴也未盡於禮之道也其本存焉亦猶忠信者未盡於行也舉禮之本而與樂刑政並列可矣今言乎仁義智信則禮之道靡有遺焉禮與仁義智信豈並列之物歟仁義智信者實用也禮者虛稱也法制之總名也然而所以與仁義智信並列而其次在三者意者謂雖有仁義智信必須以禮制中而行之乎曰鄭氏注中庸性命之說謂木神則仁金神則義火神則禮水神則信土神則智疑若五者並生於聖人之性然後㑹而為法制法制既成則禮為主而仁義智信統乎其間若君臣之類焉曰爾謂禮之性果何如也曰豈非能節者乎有溫厚斷决疏逹固守之性而加之以節遂成法制焉曰節之者義之性也義斷决而從宜豈非能節者哉法制之作其本在太古之時民無所識飢寒亂患罔有救止天生聖人而授之以仁義智信之性仁則憂之智則謀之謀之既得不可以不節也於是乎義以節之節之既成不可以有變也於是乎信以守之四者大備而法制立矣法制既立而命其總名曰禮安有禮之性哉鄭氏之學其實不能該禮之本但隨章句而解之句東則東句西則西百端千緒莫有統率故至乎性命之說而廣求人事以配五行不究其端不揣其末是豈知禮也哉或曰月令之推五性亦然矣何如曰月令之書蓋本於戰國之時吕氏門人所作至唐增修之未足以觀聖人之㫖也後之人見仁義禮智信列名而齊齒謂五者之用各有分區故為仁義智信則不取於禮而任其私心為禮則不能辨仁義智信但以器服物色升降辭語為玩以為聖人作禮之方止於窮奢極富炫人聽覽而已矣行其事不知其本觀其象不知其意因謂禮有質文可隨時而用先王有作我可以作先王有變我可以變而不知先王之所以作而變者有所為于僞反也此之所以作而變者復何以哉苟禮之所之止於器服物色升降辭語而無仁義智信之大則是瑣瑣有司之職耳何聖人拳拳之若是乎郊特牲曰禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而謹守之天子之所以治天下也或曰吾子所稱先儒並列禮樂刑政及仁義禮智信之意曷以知先儒之意果若吾子之言乎曰以豫度之先儒之意當若是也若是則善矣或異於此則先儒之言者皆不知禮而妄言也豫何咎哉曰先儒既並列之而吾子乃論而為一敢問何謂也曰並列之使人記其條目用之而不遺先儒之事也論而為一使人知其本根學之而不失豫之志也或曰前所謂節其和者命之曰樂行其怠者命之曰政威其不從者命之曰刑溫厚而廣愛者命之曰仁斷决而從宜者命之曰義疏逹而能謀者命之曰智固守而不變者命之曰信徇是而言則七者似皆禮之别名也何以樂刑政則謂之支而強其名仁義智信則止謂之别名也曰樂刑政各有其物與禮本分局而治十二管五聲八音干戚羽旄樂之物也號令官府軍旅食貨政之物也鈇鉞刀鋸大辟宫刖墨劓剕鞭撲流贖刑之物也是三者之物與飲食衣服宮室器皿夫婦父子長幼君臣上下師友賔客死喪祭祀之目少異故得謂之支而強其名也夫仁義智信豈有其物哉總乎禮樂刑政而命之則是仁義智信矣故止謂之别名也有仁義智信然後有法制法制者禮樂刑政也有法制然後有其物無其物則不得以見法制無法制則不得以見仁義智信備其物正其法而後仁義智信炳然而章矣或曰前所謂刑者政之屬誠然矣而吾子復並列之何謂也曰因先儒之言從而論之不遑變易耳其㫖既明其辭雖在奚有害於事哉曰敢問吾子之列禮樂刑政之物仁義智信之用盡于吾子之言乎抑有所遺者乎曰凡豫所言者大也不及其細也略也不及其詳也從其類而推之苟合乎禮本乎聖者皆是也奚待豫之盡言哉禮論第六或曰樂記曰聖人作樂以應天制禮以配地禮樂明備天地官矣又以天地卑髙動靜方物在天成象在地成形以為禮者天地之别也地氣上齊天氣下降隂陽相摩天地相蕩雷霆風雨四時日月百化之興以為樂者天地之和也由此觀之則禮樂之比隆競大蓋已著矣而吾子統之於禮益有疑焉曰彼以禮為辨異樂為統同推其象類以極于天地之間非能本禮樂之所出者也禮也者豈止於辨異而巳哉樂也者豈止於統同而巳哉是皆見其一而忘其二者也曰古之言禮樂者必窮乎天地隂陽今吾子之論何其小也曰天地隂陽者禮樂之象也人事者禮樂之實也言其象止於尊大其教言其實足以軌範於人前世之言教道者衆矣例多闊大其意汪洋其文以舊說為陳熟以虛辭為微妙出入混沌上下鬼神使學者觀之耳目驚眩不知其所取是亦教人者之罪也或問孟子曰惻隱之心人皆有之羞惡之心人皆有之辭讓之心人皆有之是非之心人皆有之惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也孟子既言人皆有仁義之性而吾子之論獨謂聖人有之何如曰孟子以為人之性皆善故有是言耳古之言性者四孟子謂之皆善荀卿謂之皆惡楊雄謂之善惡混韓退之謂性之品三上焉者善也中焉者善惡混也下焉者惡而巳矣今觀退之之辨誠為得也孟子豈能專之曰性之說既盡之矣然其以禮與仁義智並列何如曰是皆據世俗而言不及為之統率耳辭讓者義之一節也又淳于髠問曰男女授受不親禮也嫂溺則援之以手乎孟子曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手權也夫權智之動義之㑹也詳孟氏此言則義而智者不在先王之禮歟曰孟子據所聞為禮以已意為權而不謂先王之禮固有其權也自今言之則必曰男女授受不親禮也嫂溺援之以手亦禮也喪服四制曰父在為母齊衰期者見無二尊也百官備百物具不言而事行者扶而起言而后事行者杖而起身自執事而后行者靣垢而已秃者不髽傴者不袒跛者不踊老病不止酒肉凡此八者以權制者也若是則先王之禮豈無權乎然其上文則曰恩者仁也理者義也節者禮也權者智也於此則是言之者惑矣其所謂恩者為父斬衰三年也所謂理者為君亦斬衰三年也若兹二服與父在為母齊衰扶杖靣垢不髽不袒不踊不止酒肉之事非禮何以著之自今言之則必總四制以為禮而分仁義智於其間可也或人變色而作曰善哉吾子之論樂刑政仁義智信咸統於禮也其始得之于心歟抑嘗聞聖人之言及此者歟曰豫聞諸聖人矣禮運記孔子之言曰禹湯文武成王周公此六君子者未有不謹於禮者也以著其義以考其信著有過刑仁講讓示民有常其下文曰禮者君之大柄也所以别嫌明微儐鬼神考制度别仁義所以治政安居也周公作六官之典曰治典曰教典曰禮典曰政典曰刑典曰事典而并謂之周禮今之禮記其創意命篇有不為威儀制度者中庸緇衣儒行大學之類是也及其成書總而謂之禮記是其本傳之者亦知禮矣不獨此二書而巳也韓宣子適魯見易象與魯春秋曰周禮盡在魯矣則當時亦謂易象春秋為禮經也故知禮者生民之大也樂得之而以成政得之而以行刑得之而以淸仁得之而不廢義得之而不誣智得之而不惑信得之而不渝聖人之所以作賢者之所以述天子之所以正天下諸侯之所以治其國卿大夫士之所以守其位庶人之所以保其生無一物而不以禮也窮天地亘萬世不可須臾而去也或曰曲禮謂禮不下庶人而吾子及之何哉曰豫所言者道也道者無不備無不至也彼所言者貨財而已耳謂人貧富不均不可一以齊之焉然而王制曰庶人縣封葬不為雨止不封不樹喪不二事此亦庶人之喪禮也庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卯麥以魚黍以豚稻以鴈此亦庶人之祭禮也既庶人喪祭皆有其禮而謂禮不下庶人者抑述曲禮者之妄也禮論第七或人敢問禮之所興自於何聖曰楊子雲謂法始於伏犧而成乎堯今觀易繫辭其制器取象信自伏犧神農黃帝以來也禮本之興其在三皇可知矣大章章之也咸池備矣咸池者黃帝之事上古結繩而治後世聖人易之以書契百官以治萬民以察此亦黃帝之事也弦木為弧剡木為矢弧矢之利以威天下此亦黃帝之事也則樂政刑之興亦在三皇矣及夫堯舜繼禪禹成其功成湯文武翦其禍難周公坐而修之孔子著之于冊七十子之徒奉之以為教而後禮樂刑政之物仁義智信之用囊括而無遺矣或曰周道其盛矣然魯諸侯也而用天子之禮樂何如曰昔者武王既崩成王幼不能涖阼周公攝天子之位作禮樂朝諸侯而天下大定七年致政於成王成王以周公為有勳勞於天下于是封之曲阜地方七百里革車千乘命魯公世世祀周公以天子之禮樂此蓋成王謂周公有王者之德攝王者之位輔周室致太平者周公之為也故于其死用王禮祀之以尊之焉若是則魯以此祀周公可也豈及其餘哉至其子孫遂徹而用之凡制宫廟設官職祭祀喪紀車馬服器率倣於周此則非矣周君也魯臣也人臣而用其君之禮樂何以示民哉成王必欲其臣行天子禮樂則當賜之周公俾其身用之不須命魯公世世以此祀之也生則臣也死則鬼也鬼與人異用之非僣故知魯以此祀周公可也穆公之母卒使人問於曽子曰如之何曽子曰哭泣之哀齊斬之情饘粥之食自天子逹布幕衛也縿幕魯也夫布幕諸侯禮也縿幕天子禮也疾魯之僣故舉諸侯以示之焉隱公考仲子之宫將萬焉問羽數于衆仲對曰天子八諸侯六大夫四士二公從之書曰九月考仲子之宮初獻六羽觀春秋之旨蓋謂僣上既久賢君能詳問而更始之故書也彼杞宋者各自為一王之後耳其祖天子禮樂異於周使行之可也周尚在而魯倣之則僣矣孔子曰唯名與器不可以假人夫魯之事假人孰甚焉或曰議者以三代之後漢唐為盛如之何可比隆於古昔也曰漢唐其卑矣髙帝起於隴畒草創天下法制未修文景繼立齪齪守成公卿多武人而黃老刑名之學熾于其間賈生之徒稱先聖誦仁義眊焉而不知所從也武帝聰明特逹攘𬒮而作聘賢良尊文學改正朔易制度有志于先王矣然而黷兵好勝竭天下之財以事四夷延方士築宮館以求神仙用不經之言以東封泰山禪梁父光武憂勤民事而不務大體專求俗吏之課不師經籍而聽用圖䜟之書以疑天下耳目唐髙祖凡庸之材乘運而起太宗有非常之度而殘殺長適以取其位不能純用先王之制而因循駮雜浮屠亂法而不知禁進士壞文而不知革易置儲二依違不决明皇親見禍亂心思矯正而興起老子莊周之說以害教化寵任武功注意兵食鑾輿展狩出入不時進用女色間以讒賊以紊經紀自此數君其餘蓋不足數矣曰封泰山禪梁父前世之大典也而吾子以為不經之言何如曰所謂經者二帝三王之事而孔子述之者也六籍是矣而封禪之文安在哉獨司馬遷封禪書稱自古受命帝王曷嘗不封禪蓋有無其應而用事者矣未有睹符瑞見而不臻乎泰山者也於是引尚書舜歲二月東巡狩至于岱宗柴似以此為封禪事斯禮也蓋繫巡狩矣天子巡狩至于方嶽祭天告至爰及名山大川皆以其秩望祭之乃事鬼神之常道非封禪之謂也且舜自正月上日受終于文祖孔氏謂上日朔日也後至輯五瑞既月乃日覲四嶽群牧班瑞于群后孔氏謂盡以正月中日日見四嶽及九州牧監還其瑞歲二月東巡狩至于岱宗孔氏謂既班瑞之明月乃順春東巡至于岱宗若是則舜攝帝位才朞月耳德未必遽洽於人也功未必遽濟于世也符瑞之見未必如此之速也况又未真即帝位則將何辭以封禪哉五載一巡狩巡狩而封禪則舜之在位凡幾年凡幾封禪其禮儀必有可采何以不廣記之乃獨言柴而巳乎封禪之禮固不止于柴也夫摯見生死之物蓋其微者猶列之于後矧封禪之盛乃得略之乎其不然必矣又稱齊桓公既霸㑹諸侯于葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉曰無懷氏曰伏羲曰神農曰炎帝曰黃帝曰顓頊曰帝嚳曰堯曰舜曰禹曰湯曰周成王夷吾此言亦無所證孔子修六經祖述堯舜憲章文武豈前世有封禪之言管氏聞之而孔子不得聞乎雖誠有之孔子削而不書是亦不足取也子必謂稱古帝王封禪者皆妄也未知此說根于何時至秦始皇遂舉而行之逮孝武即位又議封禪事齊人公孫卿稱其師申公書曰封禪七十二王唯黃帝得上封又稱申公之言曰漢主亦得上封上封則能仙登天孝武後乃登封無風雨災於是自喜幸庶幾遇神仙矣吁可怪哉文中子曰封禪之費非古也以夸天下其秦漢之侈心乎是誠知言矣或曰子謂漢唐數君訛雜之如此然其所以闡基緒致升平者何也曰其始皆能求輔佐納諌諍夙興夜寐以安天下濟生人為意此其所以興也及其後世則放逐忠良眤近邪辟或婦人用事或外戚專政或宦竪竊命官爵授於匪人貨財散於無用兵革疲於不急荒淫怠慢厭棄民物皇天震怒奸雄並起而海內土崩矣嗚呼漢唐之盛猶不足觀漢唐之衰萬世之鑑也禮論後語吾為禮論七篇既十五年學者有持章望之論一篇來以吾為好怪率天下之人為禮不求諸內而競諸外人之內不充而惟外之飾焉終亦必亂而已矣亦猶老子之言禮者忠信之薄蓋不知禮之本徒以其節制文章獻酬揖讓登降俯仰之繁而罪之也嗚呼章子有耳目邪抑矇且聵邪有則奚不視吾文聽吾言吾之論則曰後之人見仁義禮智信列名而齊齒謂五者之用各有分區故為仁義智信則不取於禮而任其私心為禮則不能辨仁義智信但以器服物色升降辭語為玩以為聖人作禮之方止於窮奢極富炫人聽覽而巳矣繇是推本之曰仁義智信者實用也禮者虛稱也法制之總名也聖人率其仁義智信之性㑹而為禮禮成而後仁義智信可見矣賢人者知乎仁義智信之美而學禮以求之者也禮得而後仁義智信亦可見矣吾之論如此豈嘗使人為禮不求諸內而競諸外邪豈嘗以節制文章之類為禮之實邪章子有耳目不至乎此也夫章子以仁義禮智信為內猶饑而求食渴而求飲飲食非自外來也發於吾心而巳矣禮樂刑政為外猶冠辨之在首衣裳之在身必使正之耳衣冠非自內出也嗚呼章子之惑甚矣夫有諸內者必出於外有諸外者必由於內孰謂禮樂刑政之大不發於心而僞飾云乎且謂衣冠非自內出則寒而𬒳之葛熱而𬒳之裘可乎夏則求輕冬則求暖固出於吾心與饑渴之求飲食一也而章子異之不巳惑乎故天下之善無非內者也聖人㑹其仁義智信而為法制固由於內也賢人學法制以求仁義亦內也謂藍之青朱之赤固其質也布帛之青赤則染矣然染之而受者亦布帛之質也以染鐡石則不入矣是故賢人學法制以求仁義亦內也下愚雖學弗之得矣中庸曰或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也然則吾之論何嘗有外邪何憂乎終之必亂邪吾之論則曰聞諸聖人于是引禮運周公六典之類以明之今章子乃曰學乎聖人者何必易其言是未嘗讀吾之論也趙簡子問子太叔揖讓周旋之禮焉對曰是儀也非禮也夫禮天之經也地之義也民之行也天地之經而民實則之是故為九歌八風七音六律以奉五聲為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮以是言之樂政刑非禮者乎顔淵問仁孔子曰克已復禮為仁請問其目曰非禮勿視非禮勿聽非禮勿言非禮勿動以是言之仁非禮者乎章子尚未讀左氏傳論語宜其病吾言也聖人之于禮其言蓋參差言其大則無事不包言其小則庶事之一耳故周官三百六十職題曰周禮以該之言其大也其次則曰禮典與治教政刑事配焉其小則曰五禮與射御書數並焉章子得其小而不得其大宜其病吾言也故其說曰走百步外以救人隕溺難也趨百步外以揖人易也趨則為之走則不為之矣巳後鄉人一日之生拜之能也坐其下行其後能也聞其急難則不為之死矣是仁義難于禮也又曰順父禮也違父非禮也有人蹈于水火之中巳將救之而父在側曰勿救匍匐救之無避也違父可也夫婦異列禮也如妻踣于舅姑之前傷而不興盡力以扶之可也又曰心則愛兄而拜先仲叔此禮之易者固勝仁也千金之寶分則多伯兄是禮不勝仁也吾兄與嫂鬪則不救有嫂之嫌也此禮之易者固勝義也鄊人之長者鬪于兄救兄不勝則佐之鬪是禮不勝義也嗚呼章子以揖拜為禮宜乎其下得以兼仁義也且章子焉知仁義哉萬物之生無不遂吾所謂仁也萬事之理無不當吾所謂義也而章子方區區以救隕溺死急難為事不亦小乎以一人之力而見隕溺必救見急難必死吾懼章子之仁義所及者寡而天年不獲終也其所謂仁吾曰浮屠而巳耳其所謂義吾曰遊俠而巳耳孔子曰父在觀其志父沒觀其行三年無改于父之道可謂孝矣父沒三年尚不忍改其道父在側曰勿救人于水火而違之可乎巳以救為仁而父曰勿救則父不仁矣巳欲仁而彰父之不仁未見可以為仁也父不仁則違之兄之鬪則不辨是非而佐之是父輕而兄重乎兄與嫂鬪則以嫌而不救懼失禮也妻踣而傷則扶之不顧禮焉是妻厚而嫂薄乎厚于妻而薄于嫂茲小人之情䡖其父而重其兄雖小人亦不為也章子以是為仁義非吾所敢聞也抑其所謂禮之在內者喪哀祭恭忠君孝父蓋皆仁義之目而不諭焉悖矣人不知而不愠謂之君子吾不得已而申之者為其惑衆也吾言止是矣章子雖復言吾不愠也直講李先生文集卷之二終
