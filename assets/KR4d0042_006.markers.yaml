  - {type: variant, offset: 0, length: 9, content: 直講李先生外集卷第, WYG: ''}
  - {type: variant, offset: 10, length: 2668, content: 序詩墓銘張學士送李君南歸序宗古三代以還漢唐爲盛孝武雖講求三雍之制而迂儒駕說恠誕而不經有唐正觀開元㡬于治古雖希闊畢講而明堂之議寂寥而無詔國家承百王之餘夷僣黜暴典章法則洪鬯純備然往者挾佞之臣讀儒書被儒服一旦得貴位則誘導上心務極土木以崇釋老斤斧既息流竄亦至後之卿相勤恤民力以實邦本合宫之作我故未暇也惜乎自周室距今曠千餘載此禮廢絶隔于耳目所以學者各是已見競牽師習若詩分傳離愈失愈逺天豈使三王經制将遂泯乎故復岀泰伯以明其本泰伯家江西嗜古學以謂今天子享上帝朝諸侯雖有其禮而無其位廼潜心憤悱貫覽數家之說自周官考工記大戴禮盛徳篇禮記月令漢白虎諸儒及歴代論議㕘総㑹一稽同合異曲者暢之滯者通之為明堂定制圗一篇并序凡數千言朅來京師摯見時彦若李宋二紫㣲左史聶長孺集賢葉道卿皆旴衡接納鄭重推許可獻公車登乙擥補朝廷之闕當晨奏而暮召泰伯猶謙謙不處罔敢露才而自薦也㑹貢舉罷詔拂髦有懐親之感歸艎泊渚拱袂言别余恐江西英俊未盡知泰伯之道及中朝士大夫稱詠所以然故筆爲序以送之異日舉脩墜典咨謀折衷泰伯必攘袂危冠群立髙議與宿儒故老較辨于赤墀矣斯言不誣故乏輝潤謹序葉内翰詩清臣啓累日前伏蒙袖書臨訪并小文編及明堂圗披玩尋繹彌増景服偶書二百四十言以伸謝臆伏惟采㩜進士不讀書明經不根義詬病君子儒于今作文弊禮部右詞賦諸生竊科第從道不違人追趍斯近利李生何為者力學務遜志羞耻事章句深湛刺經藝常惟天子貴無大明堂位邈焉三代風尠矣百世繼去聖日逾逺攻端非共致公玉既妄圗戴徳亦􅓎記漢唐盛容典規畫不足示其間區區者何暇盛徳事確論無甚髙闊講寖而墜披文㑹今古援筆攷同異靣勢本周官纎悉探吕氏俛拾林甫長仰擿康成盭昭發老生矇㝠符作者意聖期接千統縟禮恢萬祀無文既巳秩同節此云備寧當総章法未擥雲㙜議廢興有時合聡明自民視成厦繄衆材致理豈一士南闕朝奏書中朝夕鳴佩行矣無自遺日中今可熭祖學士詩奉和泰伯送春絶句繕寫寄呈幸垂笑覽范陽祖無擇上憶昨相逢甲午年與君同賦送春篇等閑又見春風老更捧新吟一惘然萬樹紅芳落漸稀浮榮䏻得幾多時孤根未識陽和力春去春來兩不知送春長句呈泰伯先生晝日臨風把酒巵宜春㙜上送春歸巳看綠樹愔愔静猶有殘花怗怗飛歲月任從随手過功名未必與心違我縁客宦無常處後㑹如今亦恐稀無擇啓前日承泰伯先生寵示新詩三首謹依嚴韻奉和幸賜采覽異鄕何處散幽懐賴得城中百尺臺還向天涯經歲住那知春色為誰來雪消江上看梅發風暖衡陽有鴈回强擬登髙聊賦詠再三愧乏楚人才右宜春臺晴煙羃歴澹湖光勢勝居然占一方拂水萬絲楊柳弱倚風千盖芰荷香縱逰閑汎蘭舟穏半醉狂眠石席凉公退毎來須度日却疑身出利名鄕右東湖九十日春今日盡送春何况我偏知後期只在經殘臘重探梅開雪裏枝右送春寄李先生黄先生晞乆不見泰伯中心頻損和近聞束書卷更卜好山阿學古成儒癖敦風蕩俗訛周公法巳矣原憲事如何母老禄未及身閑鬢不皤新文海裔播舊業釣竿拖寗戚歌寧發麻姑傁屢過時人一握小吾道片雲多友弟俱㳺宦池樊自樜莎聞猿詩興逸㪣戸酒徒羅鄕里名光也朝廷禮後麽年來魚信至怪我客蹉跎麻姑山一首贈陳仲父賢良兼泰伯先生黄寺丞通麻姑山直斗牛角形勝擁斷東南隅五百年來畜英氣特爲吾宋生真儒李姓覯名泰伯字風骨古秀飄髯鬚其人於世少似者無乃稷契荀孟徒自傷出處苦竒剥不得寸禄遮妻孥歸來築室郡北郭反關唯作文字娱先生之門足髙第中間仲父有輩無曽繼先生列科舉簡編滿載三十車先生不遇子亦退髙文懿行夸江湖麻源谷口田數頃歲計取足無嬴餘生涯俯就隱意决便棄城邑廬郊墟上有慈親享甘㫖下有子弟森庭除平生胷臆渺溟㴾惟學虞卿窮著書平生志氣薄雲漢惟學子陵閑釣魚毎當春秋社時候萬象瀟洒神仙居喦野卉照几席溪風谷靄清襟𥚑先生乗興或還往殺雞炊黍開尊壷共評古今正經史不知口角清涎濡名教果有如是樂彦輔之言誠豈誣蓮社竹谿詫髙逸究竟未免歸狂愚争如仲父與泰伯相樂以道情愉愉文酒逢迎二十載一日不見巳為踈松門大開俗不到水雲軒檻空清虚仰愛二友嗟不與欲别仙墅猶踟蹰先生墓誌銘并序門人陳次公撰有宋經明行脩道徳沈純用則任公卿尸教化而不用以夫子之道教授學者門人陞録千有餘人有如㳺夏者則其賢可知也巳文章髙於當世版而行之凡數集毎為歌詩誌表未嘗以一字借人而人自求而得之皆自言曰如此為父兄求而得之皆自言曰父兄如此下筆多典故世莫及也天下皆曰泰伯先生士大夫争識其面其為當世推伏也若此先生姓李氏諱覯字泰伯南城人也其實如秋其受如海外示發舒中以直正其於道也如天焉無不覆如地焉無不載天地以萬物遂成為功先生以四海咸若為功用則任公卿尸教化而不用以夫子之道教授學者後之覽其遺書則如其所以然曽充茂才有富國安民強兵三策易禮二論合五十首天下傳誦及退居為周禮致太平論并序五十一首其敵天命又有潜書慶暦民言寄范富孫公四書長江賦盖不忍夫一世之傷而兩臂㡬廢常語其徒其畧曰大㢤孔子吾何䏻稱焉顔淵曰仰之彌髙鑚之彌堅瞻之在前忽焉在後仰之彌髙也則吾以爲極星考之正之舍是則無四方矣鑚之彌堅也則吾以爲磐石據之依之舍是則無安居矣瞻之在前忽焉在後也則吾以爲鬼神生之歛之舍是則無庶物矣他人之道借曰善焉有之可也亡之可也夫子之道不可須叟去也不聞之是無耳也不見之是無目也不言之是無口也不學之不思之是無心無精􅐩也尚可以爲人乎㢤吾於斯道夜而諷之矣晝而讀之矣髪斑斑而不知其疲矣終沒吾世而巳矣其語如此衆驚而萃非之先生之志益堅然則不非之不足以為泰伯先生也先生燕申講觧嚴重慎宻弟子畏之有駴則對之以状察無溢羙然後進之今為墓刻畏比神靈自祖禰以往丘盖不言只於集中得子髙墓表曰南城縣東北逺百里吾髙祖之父家焉先夫人墓誌曰先君嘗學不應舉尤直信生平無所争不識州縣廷終以不得意死又於官簿得曽祖諱某祖諱某父諱某母鄭氏始娶陳氏再娶饒氏有男參魯三女長適陳汝翼而卒先生之生也以已酉而卒也以已亥年五十有一其卒仲秋其􅌾季冬實嘉祐四年祔先君之塋在鳯凰山足夫南城載于西漢地理志唐属撫州臨川國朝别建軍曰建昌縣隷焉鳯凰山在縣西北城背之塋在麓東松檟萬株山川如畫乃真宅也然而其抱負如此天之報之止如此其後焉有不逹者乎嗚呼先生之名大顯世之顯人及有道之士莫不知者下至農工負販士女釋老盡䏻誦其文章天子亦聞之乃以将仕郎試太學助教就門官之末年又召入太學說書復以通州海門縣主簿禄之權管幹太學非其好也逾年以吿歸歸逾月而卒臨終無他言獨執次公手以明堂制圗為託又以為三禮論未成為恨其孜孜為學者如此何㢤次公夙荷教育過於強仕之年哲人既殞復何聊㢤泣而銘曰余侍先生得堯舜禹湯文武周公孔子之事甚詳皆本書詩非諸子之緒言也於是浩歎魏晉之際莾卓之間惠慎之時聖人之道已大壊有由然及䆒荘生之言今世之仁人蒿目而憂世之患不仁之人决性命之情而饕富貴焉知曽史之不為桀跖之嚆矢曰儒者未嘗是之而余獨是之嗚呼天乎其意不在斯文乎何奪先生之速㢤何奪先生之速㢤直講李先生外集卷第三終, WYG: ''}
