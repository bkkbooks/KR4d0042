  - {type: variant, offset: 40, length: 0, content: '', WYG: 古君子佩弦之流也玉光無瑕綱目無漏完粹精宻可勝道哉覯邑外草萊之民也落魄不肖生年二十三身不被一命之寵家不蔵擔石之榖雞鳴而起誦孔子孟軻羣聖人之言纂成文章以康國濟民為意餘力讀孫吳書學耕戰法以備朝廷犬馬驅指膚寒熱腹饑渇顛倒而不變非獨人之云云坐而自歎且自笑者也今者進不敢祈執事尺書之薦退不敢受里閭啓齒之囑以希幸於左右觴酒臠炙非所懐也唯其公論末策思得自陳以增盛德之分寸故為之一來執事以為何哉不宣覯再拜上余監丞書監丞執事覯南城小草民也竊聞執事以文辭判是非取先天下豪俊馬首南嚮尹兹大邑盛名之下不獲愛坐卧越四百里奔走來見嘗所著文家貧弗及更寫謹獻舊藁一䇿凡九十五首約萬餘言以請命階闥伏念覯十歲知聲律十二近文章思慮猖狂耳目病困者既十年矣而公不舉於州郡私不信於閭里梯天莫見明主窮海未遇知已朝談仁義暮學計策云云雖多徒取笑恠老母坐堂親愛盈屋耒耜不供升斗之食桑麻不足一帶之衣塵埃四走乞丐無地此亦立節丈夫所宜歎惜者也今執事識量足以鑒臧否位望足以為升黜亦奚吝開巻一覽思其所以哉夫驅馬而賣之者為市人所貴賤未足以為駑良遇伯樂而弗一顧則雖日馳千里皆驢材也伏惟少留念焉他日執事得位將相洗濯四表𤨏𤨏之力一獻門下以託名於本傳之末顧不美歟古之相遇者}
