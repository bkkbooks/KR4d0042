  - {type: variant, offset: 14, length: 0, content: '', WYG: 陽潛地中故坎以一陽居二隂之中陽生隂下故復以一陽居五隂之下八卦配八方則坎當北十二卦配十二月則復當建子復之陽乃坎之陽也陽則無二而象之之卦有兩也何哉八方與十二月不同也三畫與六畫不同也是故陽則無二而象之之卦有兩也離與姤亦如之若謂坎之陽生復之陽離之隂生垢之隂則是十一月有兩陽也五月有兩隂也固不然矣且其説以復卦生於坎中動於震交於坤變二震二兊二乾而終姤卦生於離中消於巽交於乾變二巽二艮二坤而終自復至坤凡十二卦主十二月噫以十二月言之則自復以往歴臨泰大壮夬而後至乾此云二震二兊而後二乾者何也自姤以往歴遯否觀剥而後至坤此云二巽二艮而後二坤者何也以八方言之則自坎以往歴艮震至巽極矣陽一於子而六於已也此云震兊乾者何也自離以往歴坤兊至乾極矣隂一於午而六於亥也此云巽艮坤者何也其意以復姤生於坎離而變初四變二五變三上毎為二卦則八卦備謂之巧也宜矣然義不通也又以姤巽承於乾非四正之卦乃引歸妹之兊云妹係姊嫁故兊少女而用巽之長女主其卦噫何偽飾之多也彼其意欲以兊承於乾則成履非姤隂生之卦又不可數變故引兊於歸妹假託廣嗣之義而係巽於姤耳不徒義理迂恠以象論之大可笑也少女既嫁於震又係巽而嫁於乾乎長女既交於乾又從兊而交於震乎則是一女而事二夫也豈不可笑此所謂偽飾之多也聖人之意曷至是哉或曰劉氏之説七日來復不取易緯六日七分何如曰不取宜矣苟以十二月之卦論之則剥盡之後經坤一月非止七日也以六日七分言之則剥盡之後經艮既濟噬嗑大過坤未濟蹇頥中孚九卦毎卦六日七分乃至於復非止七日也然劉氏更以七為少陽必經隂六之數盡至七日少陽乃生斯又未善也歴觀衆卦或言七日或言三日或言三年或言十年强為配合時或可言參相鉤考辭則易屈大抵言日逺者不過七日震六二既濟六二勿逐七日得不過七日而得也七日來復以復不可逺君子之道雖消不久不過七日而復彖曰天行也盖言來復之義是天之行反覆如此亦非考案氣候實日而云也萬夀無疆豈實有萬哉愛而多之之辭也或曰臨至於八月有凶諸儒之論孰為得失曰何氏云建子陽生至建未為八月當矣臨二陽遯二隂合耦之卦也劉氏破之以為果建子則辭當在復卦之下此不明矣且復卦陽生其勢㣲弱未足矜也臨卦剛長強亢之漸故戒之以遯卦有凶也推其本而言之復生為一月臨長為二月至遯為八月不亦可乎而劉氏固守臨之建丑數至遯之建未則七月以不滿八之故遂用周正排建未為八月又念文王演卦在商之末正朔未改不可以未為八月乃稱周公述而成之故以周正為定且先儒以為文王作卦辭周公作爻辭劉氏既未有以破之安得謂卦辭亦周公所成以飾臨卦八月用周正之説乎其下文曰况乎易有三名夏曰連山商曰歸藏周曰周易易既題周以正名則不得不以周之正朔定其月也且周易書名周公設官可題周家以别餘代卦辭豈得擅改彼禮樂損益盖從時之宜易之為書萬世無敝况文考之手澤周公改之何意也文王若曰七月有凶有何妨害而周公故以八月定之乎文王作易之時便題周字亦可矣何必周公也號國曰周其來久矣故曰周雖舊邦其命惟新雖紂在上而題易曰周以别夏商何害也魯頌次於周頌亦須周滅而後加魯字乎此類皆閭巷老生誑童耀騃之辨非天下之公議也論五或曰易緯以六十卦主三百六十五日四分日之一信乎曰吾觀於太𤣥信矣所主之日取卦象乎取卦名乎曰取諸卦名而已太𤣥所以凖易者也起於冬至其首曰中陽氣潛萌於黄宫信無不在乎中謂是時萬物之萌信無不在地之中於易則中孚孚者信也亦謂信無不在地之中也其次曰周陽氣周神而反乎始於易則復復者反也亦謂反乎始也其次曰礥陽氣㣲動動而礥礥物生之難也於易則屯屯者物之始生也粗舉二三則知冬至之後其卦中孚復屯者題號此日之氣候曰中孚也曰復也曰屯也他皆倣此但元首八十一毎首四日有半易卦六十毎卦六日有竒故前後或參差盖大同而小異也而劉氏以經乾坤之䇿三百六十當期之日不别起數謂易緯六日七分義無所出若是則劉氏凡言天五駕天一之類亦出於經乎乾坤之策况其數六十卦况其名不相妨也又謂十二卦已主十二月不可取雜書破經義今觀六十卦之次其十二卦仍在本月稱為辟卦則十二卦既總主一月又與諸卦分治六日如侯伯有功德者既作一州之牧亦未免為一國之君也而劉氏區區以月各有主日無用卦是欲立州牧而廢二百一十君也其可乎或曰敢問元亨利貞何謂也曰大哉乎乾之四德也而先儒解詁未能顯闡是使天道不大明君子無所法若夫元以始物亨以通物利以宜物貞以幹物讀易者能言之矣然所以始之通之宜之幹之必有其狀竊嘗論之曰始者其氣也通者其形也宜者其命也幹者其性也走者得之以胎飛者得之以卵百榖草木得之以句萌此其始也胎者不殰卵者不殈句者以伸萌者以出此其通也人有衣食獸有山野蟲豸有陸鱗介有水此其宜也堅者可破而不可輭炎者可滅而不可冷流者不可使之止植者不可使之行此其幹也乾而不元則物無以始故女不孕也元而不亨則物無以通故孕不育也亨而不利則物失其宜故當視而盲當聴而聾也利而不貞則物不能幹故不孝不忠為逆為惡也是故文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也唯君子為能法乾之德而天下治矣制夫田以飽之任婦功以煖之輕稅斂以富之恤刑罰以生之此其元也冠以成之昏以親之講學以材之擯接以交之此其亨也四民有業百官有職能者居上否者在下此其利也用善不復疑去惡不復悔令一出而不反事一行而不改此其貞也是故文言曰君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞論六或曰敢問五行相生則吉相克則㓙信乎曰相生未必吉相克未必㓙用之得其宜則雖相克而吉用之失其宜則雖相生而㓙今夫水克於火則燔燒可救火克於金則器械可鑄金克於木則宫室可匠木克於土則萌芽可出土克於水則漂溢可防是用之得其宜雖相克而吉也以水浸木則腐以木入火則焚以火加土則焦以土埋金則鏉以金投水則沈是用之失其宜雖相生而㓙也是以太𤣥之贊決在晝夜當晝則相克亦吉當夜則相生亦㓙𤣥告曰五生不相殄五克不相逆不相殄乃能相繼也不相逆乃能相治也相繼則父子之道也相治則君臣之寳也今夫父之於子能食之弗能教之則恩害於義也君之於臣能賞之又能刑之則威克厥愛也恩害義則家法亂威克愛則國事脩吾故曰相生未必吉相克未必㓙也或曰吾子之言性命何其異也曰吾之言也折諸聖宜乎其異矣命者天之所以使民為善也性者人之所以明於善也觀其善則見人之性見其性則知天之命説卦曰昔者聖人之作易也将以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦人之有仁義所以順性命也董仲舒曰天令之謂命命非聖人不行質朴之謂性性非教化不成人受命於天固超然異於羣生入有父子兄弟之親出有君臣上下之誼㑹聚相遇則有耆老長㓜之施粲然有文以相接驩然有恩以相愛此人之所以貴也生五榖以食之桑麻以衣之六畜以養之服牛乗馬圈豹檻虎是其得天之靈貴於物也然則本乎天謂之命在乎人謂之性非聖人則命不行非教化則性不成是以制民之法足民之用而命行矣導民以學節民以禮而性成矣則是聖人為天之所為也繫辭曰吉㓙者言乎其失得也悔吝者言乎其小疵也無咎者善補過也由此觀之吉㓙由人乃易之教也黄帝堯舜通其變使民不倦神而化之使民宜之是以自天祐之吉無不利若夫釋人事而責天道斯孔子所罕言古之龜筮雖質諸神明必參以行事南蒯将亂而得黄裳元吉穆姜棄位而遇元亨利貞德之不稱知其無益後之儒生非史非巫而言稱運命矯舉經籍以縁飾邪説謂存亡得喪一出自然其聴之者亦已荒矣王制曰執左道以亂政殺假於鬼神時日卜筮以疑衆殺為人上者必以王制從事則易道明而君道成矣旴江集巻四欽定四庫全書旴江集卷五宋李覯撰周禮致太平論五十一篇并序敘曰昔劉子駿鄭康成皆以周禮為周公致太平之迹而林碩謂末世之書何休云六國隂謀然鄭義獲伸故周官遂行覯竊觀六典之文其用心至悉如天焉有象者在如地焉有形者載非古聪明睿智誰能及此其曰周公致太平者信矣鄙儒俗士各滯所見林之學不著何説公羊誠不合禮盗憎主人夫何足恠今之不識者抑又譊譊将使人君何所取法是用摭其大畧而述之天下之理由家道正女色階禍莫斯之甚述内治七篇利用厚生為政之本節以制度乃無傷害述國用十六篇備預不虞兵不可闕先王之制則得其宜述軍衞四篇刑以防姦古今通義唯其用之有所不至述刑禁六篇綱紀既立持之在人天工其代非賢罔乂述官人八篇何以得賢教學為先經世軌俗能事以畢述教道九篇終焉并序凡五十一篇為十巻命之曰周禮致太平論噫豈徒觧經而已哉唯聖人君子知其有為言之也内治第一男女之際人道所重前哲固備言矣然而賢妃相成之道不世出亂國家者往往而是盖婦人之性鮮克正也隂則昧柔則弱昧不足自見弱不足自立與物而遷直情㤀反其體一也堯試舜觀厥刑于二女釐降二女於嬀汭嬪於虞以堯之女其淵源非不善尚曰舜能以義理下其心是無聖人為之耦則不克使其行婦道也彼凡人子而不漸以教摩以禮其可乎哉今夫數口之家猶以婦傾或靡敝財用或離析骨肉速刑召禍至無可救者多矣况乎后妃同體於王其次嬪御亦所愛幸一發言一舉事足以旋轉天地薄蝕日月其為禍福可勝言哉貴則為驕富則為侈並寵則妬不荅則怨憎則有讒言愛則有私謁府庫或為之空刑賞或為之濫姦邪或為之昌忠良或為之剥宗室或為之棄冡嗣或為之易帷簿或為之不脩社稷或為之不食妺喜之放桀妲已之殺紂此類豈少哉故内宰以隂禮教六宫隂禮婦人之禮六宮謂后也又以隂禮教九嬪不言教夫人世婦舉中以見上下省文也又以婦職之法教九御使各有屬以作二事正其服禁其竒衺展其功緒九嬪掌婦學之法以教九御婦德婦言婦容婦功后尊也不得不受教女御卑也而教亦及之在王宫者不可不知禮也如使后夫人九嬪世婦女御皆受教皆知禮德皆正言皆順無冶容無廢功無侈服無衺道則閨門之内何有不肅溥天之下何有不化關睢之不淫葛覃之躬儉樛木之無嫉妬螽斯之多子孫巻耳之輔佐求賢兔罝之莫不好德於斯見矣王道安得不成乎内治第二天官冢宰其屬則有九嬪世婦女御女祝女史唯夫人之於后猶三公之於王坐而論婦禮無官職故不列且夫六宫内也如家人家人私也六官外也乃國事國事公也外内異處國家異分公私異宜然而使嬪婦屬天官無外内國家公私之辨者何哉聖人之意於是深矣彼婦人女子而當於至尊幽居九重人弗得見則驕蹇自恣無所不至也是故使之分職於内而附屬於外有職則當奉其法有屬則必攷其功奉法則不敢不謹攷功則不敢不慎舉宫中之人而知所勸勉者官有其長之效也而况内宰亦用大夫士春官世婦毎宫卿二人盖皆分命賢臣以參檢内事與夫婢妾賤人自相使令而無畏忌者不同年而語矣天子所御而服官政從官長是天子無私人天子無私人則羣臣焉得不公庶事焉得不平無偏無黨王道蕩蕩此之謂也漢髙帝欲廢太子立戚夫人子趙王如意留侯曰骨肉之間雖臣等百人何益此大臣不得與内事之敝也爰盎引却慎夫人坐謂妾主豈可以同坐文帝怒説以人豕迺説如使盎軰得制宫中之事則尊卑有不序上下有不和者乎官失其守一女顓恣則公卿附離之不暇其何冢宰之能帥也悲夫内治第三昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章婦順故天下内和而家理也至於天官序則世婦以下不言數謂君子不苟於色有婦德者充之無則闕世婦女御視大夫士尚惟其人則三夫人九嬪官不必備可知矣自古婦人之賢者盖不易得故其生則寢之地以教其卑衣之裼以教其正弄之瓦以教其事既十年姆教婉娩聴從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆葅醢禮相助奠十有五年而笄二十而嫁先嫁三月祖廟未毁教於公宫祖廟既毁教於宗室教以婦德婦言婦容婦功教成之祭牲用魚芼用蘋藻所以成婦順也如此而後備於從人之道况乎王之北宫當貫魚之寵者可以非其人哉故無德以色親則天有投蜺之異詩曰蝃蝀在東莫之敢指謂邪色之乗陽也曲禮納女於天子曰備百姓言以廣子姓耳深山大澤實生龍蛇母子傳類亦不可忽晉愍懐太子宫中為市使人屠酤手揣斤兩輕重不差盖其母屠家女也先王之制百二十人猶以無人而闕之至難至慎若此武帝平吳之後掖庭殆将萬人復何義也人多則御幸不可徧怨恨由是興費廣則財物不足支民甿所以困國家之敗何莫由斯者邪内治第四女御掌御敘於王之燕寝凡羣妃御見之法月與后妃其象也卑者宜先尊者宜後十五日而徧自望後反之其不使九嬪世婦掌之而使女御者防上之專妬也盖以女御官卑不敢嫉妬自專則九九之法行矣九九之法行則内無怨女而子孫衆多矣夫飲食男女人之大欲一有失時則為怨曠七月女心傷悲東山婦歎于室君子撢於人情周道所以興也安得聚少艾之色幽於深宫之中而無進御之路則其性情之所感動何如哉四時何以能和百神何以降福至於繼嗣社稷之重事甚有寵之人或不宜子非廣其禮将無及也霍光欲上官皇后擅寵有子雖宫人使令皆為窮絝多其帶後宫莫有進者而昭帝無嗣成帝約不負趙昭儀掖庭中御幸生子者輒死飲藥傷墮者無數終以國統三絶王莽簒之愛有所偏之過也薄姬輸織室而生孝文為漢太宗晉簡文寵徐貴人彌年無子李后在織坊形長色黒謂之崑崙帝以大計召之乃生孝武天命所在不以貴賤美惡論也然則九九而御使無專妬者聖人之意逺矣内治第五哀公問曰冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎然則先王之所以重昏禮為其主祭祀也祭祀之禮豈唯致齋於内㑹君於廟服副褘於東房執璋瓚而亞祼酌瑤爵進玉齍薦徹豆籩以嘉魂魄而已乎是禮之末節一日可為者也必竭力從事然後為至焉故内宰中春詔后帥外内命婦始蠶於北郊以為祭服又上春詔王后帥六宫之人而生穜稑之種獻之於王夫普天王土率土王臣蠶者非一女也将以為王服有不足乎而后且親蠶其夫以事先舅先姑敢不用力焉不可以為婦道也耕者非一男也将以為祭盛有不足乎而后且佐耕其夫以事先舅先姑敢不用力焉不可以為婦道也王后之尊而親蠶天下之女子有不遵㣲行求柔桑者乎王后之尊而佐耕天下之女子有不饁南畆喜田畯者乎王后之尊而為婦道天下之女子有不承先祖共祭祀者乎明王之以孝治天下此其一助也而况不知耕之勞則以為田自生榖不知蠶之苦則以為桑自生絲自古愚婦人糞土貨財焦爛府庫農夫病工女死而求之不已者不知民事之難也干寳之論晉紀曰其婦女粧櫛織絍皆取成於婢僕未甞知女工絲枲之業中饋酒食之事也晉之禮法於此大壊則周之興也宜矣内治第六春官内宗凡内女之有爵者内女王同姓之女有爵其嫁於大夫及士者其職掌宗廟之祭祀薦加豆籩及以樂徹則佐傳豆籩賔客之饗食亦如之王后有事則從外宗凡外女之有爵者外女王諸姑姊妹之女其職掌宗廟之祭祀佐王后薦玉豆眂豆籩及以樂徹亦如之王后以樂羞齍則贊凡王后之獻亦如之王后不與則贊宗伯小祭祀掌事賔客之事亦如之夫富貴驕人自然之勢苟非明哲其能免乎矧伊女子生於王族雖有葭莩之親者猶乗勢以輕其家不順於舅姑不和於室人庸奴其夫者多矣夫婦之道天地之象人之大倫也乃由宗室亂之非所以示天下也聖人有作安得不大為之坊夫禮禁亂之所由生猶坊止水之所自來也故以内女外女謂之内宗外宗列為禮官之屬其職禮則視必在禮聽必在禮言必在禮貌必在禮思必在禮視聽言貌思無不在禮則其人之智愚賢不肖何如也祭祀賔客非有切身之急而不敢不以禮則己之所以為婦者敢有不恭乎觀后之事宗廟則知所以順其舅姑觀后之饗同姓諸侯則知所以和其室人觀后之亞王祼獻則知所以從其夫順於舅姑和於室人而當於夫是故婦順備而内和理内和理而家可長久也召南何彼襛矣美王姬之詩謂雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德彼天子所生而若此况於同姓姑姊妹之女乎是其所以為王化之基也内治第七媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁凡娶判妻入子者皆書之中春之月令㑹男女於是時也奔者不禁司男女之無夫家者而㑹之夫昏姻之禮要在及時故國無鰥民則桃夭之詠作喪其妃耦則有狐之刺興彼室家之好而繫之王者之風為人上者不可不察也孟子對齊宣王曰昔者大王好色愛厥妃詩云古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇當是時也内無怨女外無曠夫王如好色與百姓同之於王何有誠哉是言也人主知漁色而不知下無室家知逞欲而不知下有怨曠其可乎哉天地不合萬物不生有夫有婦然後為家上得以養父母下得以育子孫生民之本於是乎在而人主慢之非計也是故聖人設官主判合之禮子生三月必書其名男自二十以及二十九女自十五以及十九皆為盛年其昏自季秋至於孟春惟其所用若男三十女二十為期盡雖中春猶可行所以蕃育人民是皆言其極也及此月而父母不娶不嫁之者相奔不禁若無故而不用令則罪罰之甞有妃匹而鰥寡者亦察焉先王之道如此其至也既為之立其家又使之有其業國中則典婦功掌婦式之法野則酇長稽其女功然而民不庶且富者未之信也越語女子十七不嫁丈夫二十不娶父母有罪雖於禮為蚤而句踐報吳亦以是也晉泰始中博選良家以充後宫先下書禁天下嫁娶噫大可笑也旴江集卷五欽定四庫全書旴江集卷六宋李覯撰國用第一人所以為人足食也國所以為國足用也然而天不常生其生有時地不徧産其産有宜人不皆作其作有能國不盡得其得有數一榖之稅一錢之賦給公上者各有定制苟不量入以為出節用而愛人則哀公云二猶不足公羊謂大桀小桀誅求無巳怨刺並興亂世之政也故大府凡頒財以式法授之王日一舉其膳六牲祀兵朝甸其服有九故關市之賦以待王之膳服諸侯來朝卿大夫來聘致之則有積飱饔接之則有饗食燕故邦中之賦以待賔客牛馬之食其用芻禾車秅之數皆眡牢禮故四郊之賦以待稍秣功懋懋賞以馭其幸所受之物邦之大用故家削之賦以待匪頒冬官百工取材非一五庫之量毋或不良故邦甸之賦以待工事問勞贈賄酬爵侑食皆為篚實将其厚意故邦縣之賦以待幣帛大祀小祭事神之禮牲幣玉器不奢不儉故邦都之賦以待祭祀股肱或虧君之所痛賵禭含賻闕一不可故山澤之賦以待喪紀王及冢宰時有所善燕好之用亦以推恩故幣餘之賦以待賜予王於諸侯分烖救患㓙禮五事其費則多故邦國之貢以待吊用國家閒暇要在多積積貯之道天下大命故萬民之貢以充府庫難得之貨饑不可食燕㳺所用非國之急故式貢之餘財以共玩好之用凡其一賦之出則給一事之費費之多少一以式法如是而國安財阜非偶然也國用第二玉府掌王之金玉玩好兵器凡良貨賄之蔵燕衣服衽席牀第凡䙝器凡王之獻金玉兵器文織良貨賄之物受而蔵之凡王之好賜共其貨賄内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉凡適四方使者共其所受之物而奉之凡王及冢宰之好賜予則共之按其職文掌天子器用財賄燕私之物及受貢獻以備賞賜此帑蔵之在宫中官職之最私䙝者然而為冢宰之屬列大府以下與凡治蔵之官不異者何也盖王者無外以天下為家尺地莫非其田一民莫非其子財物之在海内如在槖中况於貢賦之入何彼我之云哉歴觀書傳自禹貢以來未聞天子有私財者漢湯沐邑為私奉養不領於經費靈帝西園萬金常聚為私蔵皆衰亂之俗非先王之法也故雖天子器用財賄燕私之物受貢獻備賞賜之職皆屬於大府屬於大府則日有成月有要嵗有㑹職内之入職嵗之出司書之要貳司㑹之鉤考廢置誅賞之典存焉如此用安得不節財安得不聚若以御府禁錢捐之親幸之手省闥之中外人弗睹法制所不行校比所不及則傷財害民非細事也國用第三太宰以九職任萬民一曰三農生九榖二曰園圃毓草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚歛疏材九曰閒民無常職轉移執事天之生民未有無能者也能其事而後可以食無事而食是衆之殃政之害也是故聖人制天下之民各從其能以服於事取有利於國家然後可也太宰授之職閭師責其功故曰任農以耕事貢九榖任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物凡無職者出夫布也人各有事事各有功以興材征以濟經用無惰而自安無賊於糧食是富民之大本為國之上務雖關百聖何以易此昔胥臣對晉文公謂戚施植鏄蘧蒢蒙璆侏儒扶廬矇瞍脩聲聾瞶司火王制瘖聾跛躃㫁者侏儒各以其器食之古者廢疾之人猶有所役後之㳺民作無益以害有益者肩相摩轂相撃而吏不以是罪之主不以是棄之謂之何哉國用第四言井田之善者皆以均則無貧各自足也此知其一未知其二必也人無遺力地無遺利一手一足無不耕一步一畮無不稼榖出多而民用富民用富而邦財豐者乎大司徒凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮不易之地嵗種之地美故家百畮一易之地休一嵗乃復種地薄故家二百畮再易之地休二嵗乃復種故家三百畮遂人辨其野之土上地中地下地以頒田里上地夫一㕓田百畮萊五十畮餘夫亦如之中地夫一㕓田百畮萊百畮餘夫亦如之下地夫一㕓田百畮萊二百畮餘夫亦如之萊謂休不耕者戸計一夫一婦而賦之田其一戸有數口者餘夫亦受此田也載師以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地宅田致仕者之家所受田也士田仕者亦受田賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田也若餘夫致仕者仕者賈人庶人在官者畜牧者之家皆受田則是人無不耕無不耕則力豈有遺哉一易再易萊皆頒之則是地無不稼無不稼則利豈有遺哉自阡陌之制行兼并之禍起貧者欲耕而或無地富者有地而或乏人野夫有作惰㳺况邑居乎沃壤猶為蕪穢况瘠土乎饑饉所以不支貢賦所以日削孟子曰仁政必自經界始師丹言宜畧為限不可不察也國用第五地利之食於人博哉農既得其時種既得其宜然且不熟者水旱賊之也水旱之灾雖天所為至於人力亦有可及矣故遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路此鄉遂之田制也匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二㝷深二仞謂之澮此都鄙之田制也川大於澮澮大於洫洫大於溝溝大於遂遂大於􅍒􅍒通水以入於遂遂入於溝溝入於洫洫入於澮澮入於川然則雖大雨霖其水有所渫能為害者希矣稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水以渉揚其芟作田瀦謂畜流水之陂防瀦旁隄也然則雖久不雨其水可以得能為害者希矣聖人之於水旱不其有備哉蒍掩規偃豬君子以為禮史起引漳水舄鹵生稻粱鄭國鑿涇水關中為沃野古之賢人未有不留意者也水官不修川澤溝瀆無有舉掌機巧趍利之民得行其私日侵月削往往障塞雨則易以溢謂之大水豈天乎霽則易以涸謂之大旱豈天乎如是而望有年未之思矣旴江集卷六欽定四庫全書旴江集卷七宋李覯撰國用第六繫辭曰包犧氏沒神農氏作斵木為耜揉木為耒耒耜之利以教天下盖取諸益是聖人之於農必制器以利其用也舜典曰棄黎民阻饑汝后稷播時百榖是聖人之於農必命官以掌其政也故遂大夫正嵗簡稼器脩稼政稼器耒耜鎡基之屬稼政孟春之月令所云皆脩封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之之比也器不簡則貧人或不能備物政不脩則愚者或不能得宜不備物則雖良田将不耕不得宜則雖嘉種将不穫若是不可不慎也至如二耜為耦一夫不足獨舉必通功易事兩人相助而後可也故里宰以嵗時合耦于耡以治稼穡趍其耕耨行其秩敘耡者里宰治處於此合耦使相佐助秩敘相佐助之次第也又五榖熟時有風雨之急是謂力耕數耘收穫如寇盜之至者也然一夫又不足為故遂師廵其稼穡而移用其民以救其時事謂使轉相助救時急事也古之治天下至纎至悉之如此奈何民不富國不實也漢趙過能為代田一畮三􅍒一夫三百􅍒而播種於􅍒中苗生葉稍耨隴草}
