  - {type: variant, offset: 142, length: 1, content: 𥘉, SBCK: 􅀄}
  - {type: variant, offset: 145, length: 2, content: 守雪, WYG: 博驛使將詩訪逺山發函寧暇正衣冠秦城未割難論價燕谷纔吹已不寒佔畢有心忘老至惰農無罰賀恩寛一枝數粒唯知分豈是明時學考槃蟬一蛻囂塵向此生柳枯槐老正傷情高吟盡日知誰聽零露充腸且獨清螳斧不勞隂致害貂冠猶可共傳名騷人若有遺魂在應放寃聲伴爾鳴寄史屯田秀汝清旴數舍中繫匏名謁竟難通只知俗吏隆官業不意高文有古風朝請待趍天屏北家園歸省浙江東逺民利害聞應熟早晚嘉謀沃舜聰答丘寺丞示月蝕詩一夜吟公月蝕詩睡魔驚走醉魂飛如將混沌重區别要使君臣有等威天道至高全指掌古人雖死合知非相思無計能相見何日}
  - {type: page-break, offset: 145, content: '', id: KR4d0042_WYG_037-15b}
  - {type: page-break, offset: 145, content: '', id: KR4d0042_WYG_037-16a}
  - {type: variant, offset: 148, length: 14, content: 魏矦峙祠墓乃復建亭朔吿必躬頓, WYG: 車向北歸蓬屋長簷數尺庇堂東疎漏從來只有蓬日影碎如秋樹下雨聲初似夜船中竹經蠧了多垂地箬到乾時半捲空此處想非人所競衆言千萬莫相攻堦基堂前一級似堦墀無石無甎只舊基泥飾頃因年節近蹋崩唯是客行時誰曾羅襪雙來上多謝蒼苔久不離從此便成貧景致竹簾垂處最相宜宜春臺謫官誰住小蓬萊唯有宜春有古臺千里待看毫末去萬家攢作畫圖來雲中羅綺香風落月底笙歌醉夢迴莫恠江山苦相助騷人没後得真才東湖古郡城池已瞰江重湖更在郡東方水仙坐下魚鱗赤龍女門前橘樹香路絶塵埃非灑掃地無風雨亦清凉使君待客多娯樂只有醒時覺}
