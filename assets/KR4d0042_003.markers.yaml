  - {type: variant, offset: 24, length: 0, content: '', WYG: 也無若聖人之徒之安以榮也親我所愛也而孝存焉長我所畏也而悌著焉夫婦莫不欲和也而義生焉男女莫不欲别也而禮成焉敎子飬孫飲觴食豆以善鄉黨僚友心平而體胖内明而外治憂患以除耻辱以逺推之國放之天下莫之能逆也已孰若是蕩蕩者乎拾小而遺大瞭利而眊害神罷扵詐筋絶扵争日之樂而月之憂慶未徹席而弔位焉吁我有之誠易行也而安榮繼之屈己以從物盖難能也而憂辱終之然猶世俗輕去此而適彼是不忍再精思而咻之者衆也受命扵天乎受命扵人乎受命扵天性善是也受命扵人從俗是也背國而從偽者謂之叛其得罪死背天而從人者始雖得志天其不討乎人誰無過與孔門髙弟自宰我子貢冉有季路或不免扵譏今兹雖有罪庶可以辭乎曰大圭嘗玷不害其為寳也若碔砆甚粹宻焉猶為石也石而缺斯棄之矣賢者之責也偹故小過孔子譏之今兹之所謂是者折諸賢門猶有罪也今兹之所謂罪者刑戮而未施刀鋸焉奚竊議扵彼哉易曰閑有家悔亡家之不閑未始能無悔也彼莫不惡其家之亂也而罔念所以啟之者妾婢寡則無怨女婚姻時則無曠夫怨女曠夫亂由是出也欲戕扵性女什扵士閨門之内不見徳而見色吁巳則為之而謂人巳乎浮屠法其有功扵兹乎何也曰天生民而胙之畎畆其庳則手扵工足扵商為有益扵人而後食其報不然父母不得私其子放諸餓莩而已矣今夫閒民童其首而衣之緇所之飽煗而安}
