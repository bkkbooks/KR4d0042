  - {type: line-break, offset: 60, content: '', id: KR4d0042_SBCK_003-1a04}
  - {type: variant, offset: 61, length: 1, content: 􅏌, WYG: 者年少時作漂流人間而不可追者乎不}
  - {type: variant, offset: 63, length: 0, content: '', WYG: 幸察其區區竊觀原禮篇曰民之於禮也如獸之於囿也禽之於紲也魚之於沼也豈其所樂哉勉强而制爾民之於侈縱奔放也如獸之於山藪也禽之於飛翔也魚之於江湖也豈有所使哉情之自然爾云云覯不敏大懼此說之行則先王之道不得復用天下之人將以聖君賢師為讎敵寧肯俛首而從之哉民之於禮既非所樂則勉强而制者何歟君與師之教也去自然之情而就勉強人之所難也而君欲以為功師欲以為名命之曰讎敵不妄也且制作之意本不如此唯禮為能順人情豈嘗勉强之哉人之生也莫不愛其親然後為父子之禮莫不畏其長然後為兄弟之禮少則欲色長則謀嗣然後為夫婦之禮争則思决患則待救然後為君臣之禮童子人所慢也求所以成人然後為之冠禮愚者人所賤也求所以多知然後為之學禮死者必哀之然後為之䘮禮哀而不可得見也然後為之祭禮推事父之恩而為養老之禮廣事兄之義而為鄉飲酒之禮凡此之類難以遽數皆因人之情而把持之使有所成就耳有是情而無是禮則過惡襲之情雖善末如之何故父子之禮廢則子將失其孝兄弟之禮廢則弟將失其悌夫婦之禮廢則夫將失其義君臣之禮廢則臣將失其忠一失之則為罪辜為離散嚮之所謂情者雖積於中安得復施設哉故曰因人之情而把持之使有所成就者也其大畧如此然則有禮者得遂其情以孝以悌以忠以義身尊名榮罔有後患是謂獸之於山藪鳥之於飛翔魚之於江湖也無禮者不得遂其情為罪辜為離散窮苦怨悔弗可振起是謂獸之於囿鳥之於紲魚之於沼也而先生倒之何謂也若以人之情皆不善須禮以變化之則先生之視天下不啻如蛇豕如蟲蛆何不恭之甚也幸深思之萬一愚言可取則願告於}
  - {type: page-break, offset: 63, content: '', id: KR4d0042_WYG_028-24b}
  - {type: page-break, offset: 63, content: '', id: KR4d0042_WYG_028-25a}
  - {type: page-break, offset: 63, content: '', id: KR4d0042_WYG_028-25b}
  - {type: page-break, offset: 63, content: '', id: KR4d0042_WYG_028-26a}
  - {type: variant, offset: 65, length: 0, content: '', WYG: 禮者曰無近於囿汝}
  - {type: variant, offset: 66, length: 0, content: '', WYG: 山藪無從於紲汝有飛翔無入於沼汝有江湖云爾則先王之道庶乎復用天下之人其仰聖君賢師若司命焉又觀送程令序斥言今之縣令不得其人而末一句乃曰與家君有代授之契如是則尊公亦今之縣令耳盖文之大病不可不察若尊公之治有異於前之云云者願少稱述不然則削此一句以存有隐無犯之義甚善覯非好辯者顧}
  - {type: page-break, offset: 66, content: '', id: KR4d0042_WYG_028-26b}
  - {type: variant, offset: 68, length: 0, content: '', WYG: 之文學者所信一有玷缺為患不細故敢陳之}
  - {type: variant, offset: 69, length: 0, content: '', WYG: 以情恕未相見千萬自愛覯再拜答宋屯田書屯田宋公執事覯近者刪定劉牧易圖繼之六論僅草具未甚行一來貴土日接髙誼乃知執事舊有王劉易辯其大畧不異故不敢自疑以塵于席次執事忘其陋寡遽貺以書謂聖人之道晦而復明劉氏猶大盗既逸而成禽豈復能為梗然六經近為狂妄人所椎埋如是者甚衆且使覯堅其壁主其盟執事當竒所謀鳴鼔而陣焉主盟之命雖不可當若狂妄椎埋豈惟執事患之抑愚心未始釋然也孔子曰吾猶及史闕文盖喜其本末為世人所損益也至於漢儒若鄭康成注禮記其字誤處但云某當為某玉藻全失次序亦止於注下發明未嘗便就經文改正於周禮則備舉}
  - {type: page-break, offset: 69, content: '', id: KR4d0042_WYG_028-27a}
  - {type: page-break, offset: 69, content: '', id: KR4d0042_WYG_028-27b}
  - {type: variant, offset: 70, length: 0, content: '', WYG: 鄭杜子春解此盖尊經重師不敢自謂已見為得姑兩存之以俟後聖耳况夫一家之學必由君命而後可行以劉歆之才在哀帝之側嘗欲以左氏春秋列於學官尚為諸儒不肯置對光武之世議立左氏而公羊之徒上書訟之至和帝時始得立學其難而慎也如此未聞有不請於帝不謀於朝而能以一人之私鼓舞天下者也歴觀五經傳注及正義誠有未盡善志於道者宜其致詰然但當著為私書或言於同志庶幾其說不泯絶後有知我者則先王之道明如是足矣彼官為博士居天子辟雍將造成多士以待官使者也初不奏立某氏易某氏春秋俾有司策試一用斯義而乃專肆已欲棄傳違注敺學者從之其可乎哉學者顧師資之禮不得不從有司執注疏之義不得不黜無乃非長育人材之意邪矧博士之官靡常其人苟各用所見不為定凖今博士說如此後慱士又如彼則更數十百年天下之士為儒為墨為釋為老未可知也此患甚大不可不救而覯也貧賤委頓無錙銖重雖學者稍稍聽信然悠悠之流衆寡何如哉覯與人作一記一序猶未免在勢者或蚩蚩輩有所改易陳言䙝語塗穢金石後人弗知將以我為戯焉况能主盟聖域集第一之功乎誠尊命之不可當也執事文學豐富爵位進長既有其道且得用焉指撝人士將無不可苟鳴鼓而陣則覯雖不勇請當一隊必有藉手以報不宣覯再拜答李觀書覯白宗人祕校足下八月初徐秀才至得所寓書甚大惠覯不肖且未識君子之容而屈辱厚意以道藝見咨顧無以當之雖然敢不薦其說來書謂孔子之後有孟荀揚王韓栁國朝栁如京王黄州孫丁張晦之及今范歐陽皆其繼者也而自謙譲以為畚土壌築太山欲登於前賢之閫而問其何如足下年少初仕不汲汲於進取而轉從寂寞之道此非今人之心古人之心也曽子曰尊其所聞則髙明矣行其所知則廣大矣苟取之以明守之以誠尚可為聖人之徒矧曰前賢之閫哉然謂之賢者豈非所論列十數公乎足下欲以為法當考其所為工拙不宜但徇其名也孟氏荀揚醇疵之說聞之舊矣不可復輕重文中子之書已泯絶唯中說行然出於門人所記觀其意義往往有竒奥處而陷在虚夸腐脆之間隋書無本傳又不得案其行事退之之文如大饗祖廟天下之物苟可薦者莫不在焉佐平淮西解深州圍功徳卓犖在聽聞者不一誠哉其命世也子厚得韓之竒於正則劣矣以黨王叔文不得為善士於朝近者如京先倡古道以志氣聞黄州學而未之得然其人諤諤有風標彼孫丁之文舉人之雄者耳其立朝不聞有所建明而胎天下之禍為吾徒羞晦之之辭不竒諸所著文未足可嘉至於議論則識精才健無逺不到若洪範王霸篇籠絡天人錘鍜古今雖子厚好為論尚未及也先朝文士唯此人耳惜其踈俊得罪于世故立身不可不慎若子厚晦之皆非凡人被惡名雖欲自新而死期至矣范公歐陽盖為賈誼劉向之事業窮髙致逺未易量也足下以愚言為不妄則可法與否昭昭然矣路逺不獲相見勉之李覯白答黄著作書覯再拜漢傑著作兄足下前日辱書以覯所為景徳寺及邵武軍學記言浮屠事來討覯不肖然其為文有新意處恐學者疑唯欲人問因詳說之而譊譊之徒背憎是務莫肯告者吾心恨此乆矣今漢傑乃惠然移書使之明辨不勝幸甚覯排浮屠固乆於潜書於富國策人皆見之矣豈期年近四十氣志益堅之時而輙渝哉惟漢傑觀厥二記不甚熟耳吾於此言乃責儒者之深非尊浮屠也民之欲善盖其天性古之儒者用於世必有以教導之民之耳目鼻口心知百體皆有所主其於異端何暇及哉後之儒者用於世則無以教導之民之耳目鼻口心知百體皆無所主將舎浮屠何適哉漢傑兩執親䘮矣亦嘗禮佛飯僧矣如使周禮尚行朝夕朔月月半薦新啓祖遣有奠虞卒哭祔小祥大祥禫有祭日月時嵗皆有禮以行之哀情有所洩則漢傑必不暇曰七七曰百日曰周年曰三年齋也吾故曰儒失其守教化墜於地凡所以修身正心養}
