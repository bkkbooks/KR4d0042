  - {type: variant, offset: 10, length: 0, content: '', WYG: 以均百度以象德行以明功業以觀政治以和人神此禮之一支樂著矣出號令立官府制軍旅聚食貨號令所以明約束官府所以正職掌軍旅所以待不虞食貨所以贍不足是故為之符璽節旄以信號令為之掾属胥徒以備官府為之甲胄五兵以成軍旅為之井田賦貢以興食貨為之城郭溝池所以限内外也為之度量權衡所以平多少也為之書契版圖所以窮變詐備遺忘也為之圄犴桎梏所以嚴推劾禁犇逸也官各有守事各有程先後有次遲速有檢以辨國之大事以平天下之民以躋至治此禮之二支政成矣伐不義侵不庭刺有罪或以鈇鉞或以刀鋸為大辟為宫為刖為墨為劓為剕為鞭為扑為流為贖輕有其等重有其常用之有地决之有時所以懲天下之人使皆遷善而逺罪此禮之三支刑行矣夫所謂禮者為而節之之謂也是三者其自成乎果有為之者乎其自治乎果有節之者乎苟不為也不節也則十二管不作五聲不辨八音之器不具干戚羽旄不設小大無其所終始無其經倡和無其秩節奏無其差詘伸俯仰不齊也綴兆行列不正也縣之面不殊也羽之數不分也如此則何以見樂哉不為也不節也則號令不出官府不立軍旅不制食貨不聚符璽節旄不作掾属胥徒不備甲胄五兵不成井田賦貢不興城郭溝池不修度量權衡不均書契版圖不著圄犴桎梏不嚴官無其守事無其程先後無其次遲速無其檢如此則何以見政哉不為也不節也則不義不伐不庭不侵有罪不刺鈇鉞無其凖刀鋸無其平大辟宫刖墨劓剕鞭扑流贖皆無其法輕無其等重無其常用之無其地决之無其時如此則何以見刑哉由是而言故知三者果有為而節之者然後能成也能治也為乎飲食衣服宫室器皿夫婦父子長㓜君臣上下師友賓客死喪祭祀而節之者既謂之禮矣為乎十二管五聲八音干戚羽旄號令官府軍旅食貨符璽節旄掾属胥徒甲胄五兵井田賦貢城郭溝池度量權衡書契版圖圄犴桎梏鈇鉞刀鋸大辟宫刖墨劓剕鞭扑流贖而節之者反不謂之禮可乎若是則三者果禮之支也而强其名者也禮論第三或曰樂刑政之説既承教矣敢問温厚而廣愛者仁也斷决而從宜者義也疏逹而能謀者智也固守而不變者信也則然矣其何繫於禮哉曰百畝之田不奪其時而民不饑矣五畝之宅樹之以桑而民不寒矣逹孝悌則老者有歸病者有養矣正喪紀則死者得其藏修祭祀則鬼神得其饗矣征伐有節誅殺有度而民不横死矣此温厚而廣愛者也仁之道也君為君焉主政令必生殺不得不從矣臣為臣焉守職事死干戈不得少變矣男女有别不得相亂矣長㓜有序不得相陵矣興㢘讓則財不得苟取位不得妄受矣立諌諍則不得諱其惡矣設選舉則賢者不遺矣正刑法則有罪者必誅矣此斷决而從宜者也義之道也為衣食起宫室具器皿而人不乏用矣異親疏次上下而人不興亂矣列官府紀文書而姦詐可窮矣築城郭治軍旅而冦賊不作矣親師傅廣學問而百慮畢矣此疏逹而能謀者也智之道也號令律式以約民心蔑有欺矣禄位班次以等賢愚蔑相犯矣車馬服御以章貴賤而人不疑矣百官不易其守四民不改其業而事不諐矣言必中行必果而天下率從矣此固守而不變者也信之道也若夫百畆之田不奪其時五畆之宅樹之以桑逹孝悌以養老病正喪紀以藏其死脩祭祀以饗鬼神征伐有節誅殺有度定君臣别男女序長㓜興㢘讓立諫諍設選舉正刑法為衣食起宫室具器皿異親疏次上下列官府紀文書築城郭治軍旅親師傅廣學問為號令律式禄位班次車馬服御官守民業言而必中行而必果者謂之非禮可乎既曰仁矣曰義矣曰智矣曰信矣總而言之又皆禮矣若是則仁義智信果禮之别名也禮論第四或曰仁義智信疑若根諸性者也以吾子之言必學禮而後能乎曰聖人者根諸性者也賢人者學禮而後能者也聖人率其仁義智信之性㑹而為禮禮成而後仁義智信可見矣仁義智信者聖人之性也禮者聖人之法制也性畜於内法行於外雖有其性不以為法則曖昧而不章今夫木大者可以為棟梁小者可以為榱桷不以為屋室則朽扵深山之中與樸樕同安得為棟梁榱桷也温厚可以為仁斷决可以為義疏逹可以為智固守可以為信不以為禮則滯於心胷之内與無識同安得謂之仁義智信也屋既成雖拙者必指之曰此棟也此梁也此榱也此桷也禮既行雖愚者必知之曰此仁也此義也此智也此信也賢人者知乎仁義智信之美而學禮以求之者也禮得而後仁義智信亦可見矣聖與賢其終一也始之所以異者性與學之謂也中庸曰自誠明謂之性自明誠謂之教誠則明矣明則誠矣自誠明者聖人也自明誠者賢人也然則賢人之性果無仁義智信乎曰賢人之性中也揚雄所謂善惡混者也安有仁義智信哉性之品有三上智不學而自能者也聖人也下愚雖學而不能者也具人之體而已矣中人者又可以為三焉學而得其本者為賢人與上智同學而失其本者為迷惑守於中人而已矣兀然而不學者為固陋與下愚同是則性之品三而人之類五也請問學之得失曰所謂本者禮也知乎仁義智信之美而不知求之於禮率私意附邪説蕩然而不反此失其本者也故世有非禮之仁矣有非禮之義矣有非禮之智矣有非禮之信矣是皆失其本而然也敢問其目曰奪其常産廢其農時重其賦税以至饑寒憔悴而時賜米帛以為哀人之困憲章煩宻官吏枉酷殺戮無數而時發赦宥以為愛人之命軍旅屢動流血滿野民人疲極不知喪葬而收歛骸骨以為惠及死者若是類者非禮之仁也背其君親疏其兄弟而連結私黨以死相赴以為共人之患諂諛機巧以動上心而數辭其爵位及其貨財以為謙讓君有過失而不能諌正而暴揚於外身有隠惡不能自改而專攻人之短以為强直賢才果勇不能用於公家而私相援舉以為已力下民之愚而不能教訓䧟之於惡然後峻刑以誅之以為奉法若是類者非禮之義也為智不能以制民用修世教起政事以治人齊師旅以禦亂以為天下國家久長之䇿而專為姦詐巧辯以徼一時之利若是類者非禮之智也為信不能以一號令重班爵明車服以辯等守職業以興事使天下之人仰之而不疑而專為因循顧望以死兒女之言若是類者非禮之信也今有欲為仁義智信而不知求之於禮是将失其本者矣禮論第五或人請問樂刑政亦有非禮者乎曰善哉爾之問也夫夷蠻戎狄荒滛靡曼之音雜其倡優輔以子女諧笑顛亂以動人耳目移人心氣若是類者非禮之樂也或重刑辟變法律伺人小過鉤人㣲隠以為明察或悲哀怯愞容貸姦宄以為慈愛或急征横賦多方揉索抔聚畜積以為强國或時起土功敺人為卒用於無用以為豫備若是類者非禮之政也或為轘裂鼎鑊炮烙菹醢剥面夷族以威天下若是類者非禮之刑也曰子所謂禮者為之節之者也若是三者豈無為之者乎豈盡無其節乎曰夫所謂為者先王之為也所謂節者先王之節也先王之所以為而節之者非妄也必有仁義智信之善存乎其間矣不念古昔不師先王是皆妄為也妄節也君子不以為禮也或曰樂刑政皆禮也先儒之述何以不止於禮而言禮樂刑政曰樂刑政雖統於禮盖以聖人既别異其名世傳已久止言禮則人不知樂刑政故並列之使人得以兼用然首之以禮而樂刑政次之意者謂樂刑政咸統於禮歟譬諸孔門四教曰文行忠信忠信豈非行乎盖以止言行則人不知忠信故並列之然先之以行而次以忠信謂忠信咸統於行也然則所謂仁義禮智信者亦猶是哉曰非矣樂刑政者禮之支也未盡於禮之道也其本存焉亦猶忠信者未盡於行也舉禮之本而與樂刑政並列可矣今言乎仁義智信則禮之道靡有遺焉禮與仁義智信豈並列之物歟仁義智信者實用也禮者虚稱也法制之總名也然而所以與仁義智信並列而其次在三者意者謂雖有仁義智信必須以禮制中而行之乎曰鄭氏注中庸性命之説謂木神則仁金神則義火神則禮水神則智土神則信疑若五者並生於聖人之性然後㑹而為法制法制既成則禮為主而仁義智信統乎其間若君臣之類焉曰爾謂禮之性果何如也曰豈非能節者乎有温厚斷决疏逹固守之性而加之以節遂成法制焉曰節之者義之性也義斷决而從宜豈非能節者哉法制之作其本在太古之時民無所識饑寒亂患罔有救止天生聖人而授之以仁義智信之性仁則憂之智則謀之謀之既得不可以不節也於是乎義以節之節之既成不可以有變也於是乎信以守之四者大備而法制立矣法制既立而命其總名曰禮安有禮之性哉鄭氏之學其實不能該禮之本但隨章句而解之句東則東句西則西百端千緒莫有統率故至乎性命之説而廣求人事以配五行不究其端不揣其末是豈知禮也哉或曰月令之推五性亦然矣何如曰月令之書盖本於戰國之時吕氏門人所作至唐増修之未足以觀聖人之㫖也後之人見仁義禮智信列名而齊齒謂五者之用各有分區故為仁義智信則不取於禮而任其私心為禮則不能辯仁義智信但以器服物色升降辭語為玩以為聖人作禮之方止於窮奢極富炫人聽覽而已矣行其事不知其本觀其象不知其意因謂禮有質文可隨時而用先王有作我可以作先王有變我可以變而不知先王之所以作而變者有所為于偽反也此之所以作而變者復何以哉苟禮之所之止於器服物色升降辭語而無仁義智信之大則是𤨏𤨏有司之職耳何聖人拳拳之若是乎郊特牲曰禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而謹守之天子之所以治天下也或曰吾子所稱先儒並列禮樂刑政及仁義禮智信之意曷以知先儒之意果若吾子之言乎曰以予度之先儒之意當若是也若是則善矣或異於此則先儒之言者皆不知禮而妄言也予何咎哉曰先儒既並列之而吾子乃論而為一敢問何謂也曰並列之使人記其條目用之而不遺先儒之事也論而為一使人知其本根學之而不失予之志也或曰前所謂節其和者命之曰樂行其怠者命之曰政威其不從者命之曰刑温厚而廣愛者命之曰仁斷决而從宜者命之曰義䟽逹而能謀者命之曰智固守而不變者命之曰信徇是而言則七者似皆禮之别名也何以樂刑政則謂之支而强其名仁義智信則止謂之别名也曰樂刑政各有其物與禮本分局而治十二管五聲八音干戚羽旄樂之物也號令官府軍旅食貨政之物也鈇鉞刀鋸大辟宫刖墨劓剕鞭扑流贖刑之物也是三者之物與飲食衣服宫室器皿夫婦父子長㓜君臣上下師友賔客死喪祭祀之目少異故得謂之支而强其名也夫仁義智信豈有其物哉總乎禮樂刑政而命之則是仁義智信矣故止謂之别名也有仁義智信然後有法制法制者禮樂刑政也有法制然後有其物無其物則不得以見法制無法制則不得以見仁義智信備其物正其法而後仁義智信炳然而章矣或曰前所謂刑者政之属誠然矣而吾子復並列之何謂也曰因先儒之言從而論之不遑變易耳其㫖既明其辭雖在奚有害於事哉曰敢問吾子之列禮樂刑政之物仁義智信之用盡於吾子之言乎抑有所遺者乎曰凡予所言者大也不及其細也畧也不及其詳也從其類而推之苟合乎禮本乎聖者皆是也奚待予之盡言哉禮論第六或曰樂記曰聖人作樂以應天制禮以配地禮樂明備天地官矣又以天地卑髙動靜方物在天成象在地成形以為禮者天地之别也地氣上齊天氣下降隂陽相摩天地相蕩雷霆風雨四時日月百化之興以為樂者天地之和也由此觀之則禮樂之比隆競大蓋已著矣而吾子統之於禮益有疑焉曰彼以禮為辨異樂為統同推其象類以極于天地之間非能本禮樂之所出者也禮也者豈止於辨異而已哉樂也者豈止於統同而已哉是皆見其一而忘其二者也曰古之言禮樂者必窮乎天地隂陽今吾子之論何其小也曰天地隂陽者禮樂之象也人事者禮樂之實也言其象止於尊大其教言其實足以軌範於人前世之言教道者衆矣例多濶大其意汪洋其文以舊説為陳熟以虚辭為㣲妙出入混沌上下鬼神使學者觀之耳目驚眩不知其所取是亦教人者之罪也或問孟子曰惻隠之心人皆有之羞惡之心人皆有之辭讓之心人皆有之是非之心人皆有之惻隠之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也孟子既言人皆有仁義之性而吾子之論獨謂聖人有之何如曰孟子以為人之性皆善故有是言耳古之言性者四孟子謂之皆善荀卿謂之皆惡揚雄謂之善惡混韓退之謂性之品三上焉者善也中焉者善惡混也下焉者惡而已矣今觀退之之辯誠為得也孟子豈能專之曰性之説既盡之矣然其以禮與仁義智並列何如曰是皆據世俗而言不及為之統率耳辭讓者義之一節也又淳于髠問曰男女授受不親禮也嫂溺則援之以手乎孟子曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手權也夫權智之動義之㑹也詳孟子此言則義而智者不在先王之禮歟曰孟子據所聞為禮以已意為權而不謂先王之禮固有其權也自今言之則必曰男女授受不親禮也嫂溺援之以手亦禮也喪服四制曰父在為母齊衰期者見無二尊也百官備百物具不言而事行者扶而起言而后事行者杖而起身自執事而后行者面垢而已秃者不髽傴者不袒跛者不踊老病不止酒肉凡此八者以權制者也若是則先王之禮豈無權乎然其上文則曰恩者仁也理者義也節者禮也權者智也於此則是言之者惑矣其所謂恩者為父斬衰三年也所謂理者為君亦斬衰三年也若兹二服與父在為母齊衰扶杖面垢不髽不袒不踊不止酒肉之事非禮何以著之自今言之則必總四制以為禮而分仁義智於其間可也或人變色而作曰善哉吾子之論樂刑政仁義智信咸統於禮也其始得之於心歟抑嘗聞聖人之言及此者歟曰予聞諸聖人矣禮運記孔子之言曰禹湯文武成王周公此六君子者未有不謹於禮者也以著其義以考其信著有過刑仁講讓示民有常其下文曰禮者君之大柄也所以别嫌明㣲儐鬼神考制度别仁義所以治政安君也周公作六官之典曰治典曰教典曰禮典曰政典曰刑典曰事典而并謂之周禮今之禮記其創意命篇有不為威儀制度者中庸緇衣儒行大學之類是也及其成書總而謂之禮記是其本傳之者亦知禮矣不獨此二書而已也韓宣子適魯見易象與魯春秋曰周禮盡在魯矣則當時亦謂易象春秋為禮經也故知禮者生民之大也樂得之而以成政得之而以行刑得之而以清仁得之而不廢義得之而不誣智得之而不惑信得之而不渝聖人之所以作賢者之所以述天子之所以正天下諸侯之所以治其國卿大夫士之所以守其位庶人之所以保其生無一物而不以禮也窮天地亘萬世不可須㬰而去也或曰曲禮謂禮不下庶人而吾子及之何哉曰予所言者道也道者無不備無不至也彼所言者貨財而已耳謂人貧富不均不可一以齊之焉然而王制曰庶人縣封葬不為雨止不封不樹喪不貳事此亦庶人之喪禮也庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卯麥以魚黍以豚稻以鴈此亦庶人之祭禮也既庶人喪祭皆有其禮而謂禮不下庶人者抑述曲禮者之妄也禮論第七或人敢問禮之所興自於何聖曰揚子雲謂法始於伏羲而成乎堯今觀易繫辭其制器取象信自伏羲神農黄帝以來也禮本之興其在三皇可知矣大章章之也咸池備矣咸池者黄帝之事上古結繩而治後世聖人易之以書契百官以治萬民以察此亦黄帝之事也弦木為弧剡木為矢弧矢之利以威天下此亦黄帝之事也則樂政刑之興亦在三皇矣及夫堯舜繼禪禹成其功成湯文武翦其禍難周公坐而修之孔子著之於冊七十子之徒奉之以為教而後禮樂刑政之物仁義智信之用囊括而無遺矣或曰周道其盛矣然魯諸侯也而用天子之禮樂何如曰昔者武王既崩成王㓜不能涖阼周公攝天子之位作禮樂朝諸侯而天下大定七年致政於成王成王以周公為有勲勞於天下於是封之曲阜地方七百里革車千乘命魯公世世祀周公以天子之禮樂此盖成王謂周公有王者之德攝王者之位輔周室致太平者周公之為也故於其死用王禮祀之以尊之焉若是則魯以此祀周公可也豈及其餘哉至其子孫遂徹而用之凡制宫廟設官職祭祀喪紀車馬服器率倣於周此則非矣周君也魯臣也人臣而用其君之禮樂何以示民哉成王必欲其臣行天子禮樂則當賜之周公俾其身用之不須命魯公世世以此祀之也生則臣也死則鬼也鬼與人異用之非僣故知魯以此祀周公可也穆公之母卒使人問於曽子曰如之何曽子曰哭泣之哀齊斬之情饘粥之食自天子逹布幕衞也縿幕魯也夫布幕諸侯禮也縿幕天子禮也疾魯之僣故舉諸侯以示之焉隠公考仲子之宫将萬焉問羽數於衆仲對曰天子八諸侯六大夫四士二公從之書曰九月考仲子之宫初獻六羽觀春秋之㫖盖謂僣上既久賢君能詳問而更始之故書也彼杞宋者各自為一王之後耳其祖天子禮樂異於周使行之可也周尚在而魯倣之則僣矣孔子曰唯名與器不可以假人夫魯之事假人孰甚焉或曰議者以三代之後漢唐為盛如之何可比隆於古昔也曰漢唐其卑矣髙帝起於隴畆草創天下法制未修文景繼立齪齪守成公卿多武人而黄老刑名之學熾於其間賈生之徒稱先聖誦仁義眊焉而不知所從也武帝聰明特逹攘袂而作聘賢良尊文學改正朔易制度有志於先王矣然而黷兵好勝竭天下之財以事四夷延方士築宫館以求神仙用不經之言以東封泰山禪梁父光武憂勤民事而不務大體專求俗吏之課不師經籍而聽用圖䜟之書以疑天下耳目唐髙祖凡庸之材乘運而起太宗有非常之度而殘殺長適以取其位不能純用先王之制而因循駮雜浮屠亂法而不知禁進士壊文而不知革易置儲貳依違不决明皇親見禍亂心思矯正而興起老子荘周之説以害教化寵任武功注意兵食鑾輿展狩出入不時進用女色間以讒賊以紊經紀自此數君其餘蓋不足數矣曰封泰山禪梁父前世之大典也而吾子以為不經之言何如曰所謂經者二帝三王之事而孔子述之者也六籍是矣而封禪之文安在哉獨司馬遷封禪書稱自古受命帝王曷嘗不封禪盖有無其應而用事者矣未有睹符瑞見而不臻乎泰山者也於是引尚書舜嵗二月東廵狩至于岱宗柴似以此為封禪事斯禮也盖繫廵狩矣天子廵狩至于方岳祭天告至爰及名山大川皆以其秩望祭之乃事鬼神之常道非封禪之謂也且舜自正月上日受終于文祖孔氏謂上日朔日也後至輯五瑞既月乃日覲四岳羣牧班瑞于羣后孔氏謂盡以正月中日日見四岳及九州牧監還其瑞嵗二月東廵狩至于岱宗孔氏謂既班瑞之明月乃順春東廵至於岱宗若是則舜攝帝位纔朞月耳德未必遽洽於人也功未必遽濟於世也符瑞之見未必如此之速也况又未真即帝位則将何辭以封禪哉五載一廵狩廵狩而封禪則舜之在位凡幾年凡幾封禪其禮儀必有可采何以不廣記之乃獨言柴而已乎封禪之禮固不止於柴也夫摰見生死之物蓋其㣲者猶列之于後矧封禪之盛乃得畧之乎其不然必矣又稱齊桓公既霸㑹諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉曰無懐氏曰伏羲曰神農曰炎帝曰黄帝曰顓頊曰帝嚳曰堯曰舜曰禹曰湯曰周成王夷吾此言亦無所證孔子修六經祖述堯舜憲章文武豈前世有封禪之言管氏聞之而孔子不得聞乎雖誠有之孔子削而不書是亦不足取也子必謂稱古帝王封禪者皆妄也未知此説根於何時至秦始皇遂舉而行之逮孝武即位又議封禪事齊人公孫卿稱其師申公書曰封禪七十二王唯黄帝得上封又稱申公之言曰漢主亦得上封上封則能僊登天孝武後乃登封無風雨災於是自喜幸庶幾遇神仙矣吁可怪哉文中子曰封禪之費非古也以夸天下其秦漢之侈心乎是誠知言矣或曰子謂漢唐數君訛雜之如此然其所以闡基緒致昇平者何也曰其始皆能求輔佐納諌諍夙興夜寐以安天下濟生人為意此其所以興也及其後世則放逐忠良昵近邪辟或婦人用事或外戚專政或宦豎竊命官爵授於匪人貨財散於無用兵革疲於不急荒滛怠慢厭棄民物皇天震怒奸雄並起而海内土崩矣嗚呼漢唐之盛猶不足觀漢唐之衰萬世之鑑也禮論後語吾為禮論七篇既十五年學者有持章望之論一篇來以吾為好恠率天下之人為禮不求諸内而競諸外人之内不充而惟外之飾焉終亦必亂而已矣亦猶老子之言禮者忠信之薄盖不知禮之本徒以其節制文章獻酬揖讓登降俯仰之繁而罪之也嗚呼章子有耳目邪抑矇且瞶邪有則奚不視吾文聽吾言吾之論則曰後之人見仁義禮智信列名而齊齒謂五者之用各有分區故為仁義智信則不取於禮而任其私心為禮則不能辯仁義智信但以器服物色升降辭語為玩以為聖人作禮之方止於窮奢極富炫人聽覽而巳矣繇是推本之曰仁義智信者實用也禮者虚稱也法制之總名也聖人率其仁義智信之性㑹而為禮禮成而後仁義智信可見矣賢人者知乎仁義智信之美而學禮以求之者也禮得而後仁義智信亦可見矣吾之論如此豈嘗使人為禮不求諸内而競諸外邪豈嘗以節制文章之類為禮之實邪章子有耳目不至乎此也夫章子以仁義禮智信為内猶饑而求食渴而求飲飲食非自外來也發於吾心而已矣禮樂刑政為外猶冠弁之在首衣裳之在身必使正之耳衣冠非自内出也嗚呼章子之惑甚矣夫有諸内者必出於外有諸外者必由於内孰謂禮樂刑政之大不發於心而偽飾云乎且謂衣冠非自内出則寒而被之葛熱而被之裘可乎夏則求輕冬則求暖固出於吾心與饑渴之求飲食一也而章子異之不已惑乎故天下之善無非内者也聖人㑹其仁義智信而為法制固由於内也賢人學法制以求仁義亦内也謂藍之青朱之赤固其質也布帛之青赤則染矣然染之而受者亦布帛之質也以染鐵石則不入矣是故賢人學法制以求仁義亦内也下愚雖學弗之得矣中庸曰或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也然則吾之論何嘗有外邪何憂乎終之必亂邪吾之論則曰聞諸聖人於是引禮運周公六典之類以明之今章子乃曰學乎聖人者何必易其言是未嘗讀吾之論也趙簡子問子太叔揖讓周旋之禮焉對曰是儀也非禮也夫禮天之經也地之義也民之行也天地之經而民實則之是故為九歌八風七音六律以奉五聲為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮以是言之樂政刑非禮者乎顔淵問仁孔子曰克已復禮為仁請問其目曰非禮勿視非禮勿聽非禮勿言非禮勿動以是言之仁非禮者乎章子尚未讀左氏傳論語宜其病吾言也聖人之於禮其言盖參差言其大則無事不包言其小則庶事之一耳故周官三百六十職題曰周禮以該之言其大也其次則曰禮典與治教政刑事配焉其小則曰五禮與射御書數並焉章子得其小而不得其大宜其病吾言也故其説曰走百步外以救人隕溺難也趨百步外以揖人易也趨則為之走則不為之矣已後鄉人一日之生拜之能也坐其下行其後能也聞其急難則不為之死矣是仁義難於禮也又曰順父禮也違父非禮也有人蹈於水火之中已将救之而父在側曰勿救匍匐救之無避也違父可也夫婦異列禮也如妻踣於舅姑之前傷而不興盡力以扶之可也又曰心則愛兄而拜先仲叔此禮之易者固勝仁也千金之寳分則多伯兄是禮不勝仁也吾兄與嫂鬭則不救有嫂之嫌也此禮之易者固勝義也鄉人之長者鬭扵兄救兄不勝則佐之鬭是禮不勝義也嗚呼章子以揖拜為禮宜乎其不得以兼仁義也且章子焉知仁義哉萬物之生無不遂吾所謂仁也萬事之理無不當吾所謂義也而章子方區區以救隕溺死急難為事不亦小乎以一人之力而見隕溺必救見急難必死吾懼章子之仁義所及者寡而天年不獲終也其所謂仁吾曰浮屠而已耳其所謂義吾曰㳺俠而已耳孔子曰父在觀其志父没觀其行三年無改於父之道可謂孝矣父没三年尚不忍改其道父在側曰勿救人於水火而違之可乎已以救為仁而父曰勿救則父不仁矣已欲仁而彰父之不仁未見可以為仁也父不仁則違之兄之鬭則不辯是非而佐之是父輕而兄重乎兄與嫂鬭則以嫌而不救懼失禮也妻踣而傷則扶之不顧禮焉是妻厚而嫂薄乎厚於妻而薄於嫂茲小人之情輕其父而重其兄雖小人亦不為也章子以是為仁義非吾所敢聞也抑其所謂禮之在内者喪哀祭恭忠君孝父蓋皆仁義之目而不諭焉悖矣人不知而不愠謂之君子吾不得已而申之者為其惑衆也吾言止是矣章子雖復言吾不愠也旴江集巻二欽定四庫全書旴江集巻三宋李覯撰易論十三篇易論第一或曰易之為書也其不可學邪何其㣲而不顯也曰學者之過也聖人作易本以教人而世之鄙儒忽其常道競習異端有曰我明其象則卜筮之書未為泥也有曰我通其意則釋老之學未為荒也晝讀夜思疲心於無用之説其以惑也不亦宜乎包犧畫八卦而重之文王周公孔子繫之辭輔嗣之賢從而為之注炳如秋陽坦如大逵君得之以為君臣得之以為臣萬事之理猶輻之於輪靡不在其中矣爾欲聞之乎曰然則請問為君之道曰夫用貴莫若恭用富莫若儉恭則衆歸焉儉則財阜焉恭儉者先王之所以保四海也損六五曰或益之十朋之龜弗克違元吉龜可决疑喻明智也以柔居尊而為損道明智之士皆樂為用矣非徒人助天且福之故象曰六五元吉自上祐也恭之得衆也如此賁六五曰賁于丘園束帛戔戔吝終吉丘園謂質素之地也處得尊位為飾之主而每事質素與丘園相似則費財物束帛乃戔戔衆多也儉之足用也如此非徒儉於身也祭祀鬼神尚可菲薄既濟九五曰東鄰殺牛不如西鄰之禴祭實受其福禴祭之薄者也謂修德以祭雖薄而受福也夫上之利民以財則不足也百姓安堵而不敗其業利之大者也益九五曰有孚惠心勿問元吉有孚惠我德謂因民所利而利之惠而不費則不須疑問必獲大吉而物亦以信惠歸於我也夫溥愛無私君之德也反是則非益之謂也屯九五曰屯其膏小貞吉大貞㓙膏謂恩惠也處屯難之時居尊位之上不能博施羣小而繫應在二所惠偏狹於有司之貞則吉於大人之貞則㓙也比九五曰顯比王用三驅失前禽邑人不誡吉謂為比之主而有應在二顯比者也不能无私於物唯賢是與愛於來而惡於去用三驅之道者也伐不加邑動必討叛雖得乎顯比之吉而可以為上之使非為上之道故象曰邑人不誡上使中也夫執剛莫如體柔責人莫如自脩尚力取勝亦已勞矣同人九五曰同人先號咷而後笑大師克相遇謂不能使物自歸而用其强直故必大師克之然後得志也困九五曰劓刖困于赤紱乃徐有説利用祭祀赤紱謂異方之物也五以剛猛物所不附忿物不附而行威刑則異方愈不懐矣而體在中直能不遂迷乃徐脩德則得喜説履夫尊位過而能改以斯祭祀必受福也夫以至尊敵至賤勝之不足為武也夬九五曰莧陸夬夬中行无咎莧陸草之柔脆者謂上六也夬之時以君子决除小人而五處尊位躬自决之雖其克勝未足多也處中而行足以免咎而已故象曰中行无咎中未光也夫安非福也危非禍也知危而懼安莫如之否九五曰休否大人吉其亡其亡繫于苞桑處君子道消之時已當尊位能施否於小人而自戒其将亡則得苞桑之固也夫救弊之術莫大乎通變然民可與樂成難與慮始非斷而行之不足以有為矣巽初六曰進退利武人之貞謂處令之初未能服令故進退也則宜用武威以整齊之乃能成命也革上六曰君子豹變小人革面謂居變之終變道已成則小人變面以順上也夫治國始於齊家王化本乎夫婦百代不易之道也家人九五曰王假有家勿恤吉謂居於尊位而明家道則下莫不化矣父父子子兄兄弟弟夫夫婦婦六親和睦交相愛樂而家道正正家而天下定故勿恤而吉也凡此皆為君之道也或曰子謂執剛莫如體柔責人莫如自脩而乃以威武成命何也曰同人九五敵剛也困九五來異方也其欲勝敵懐逺不可暴也舜於有苗文王於崇乃其迹也巽之初六行令於吾人也令善而衆疑不濟以威是終不可為也周官凡出教令必徇以木鐸曰不用法者國有常刑乃其事也盖所施之異胡可結以一言哉易論第二或曰為君之道任官其急也請言其要曰井九五曰井冽寒泉食謂五居中得正而體剛直不食汙穢必須井㓗而寒泉然後乃食以言剛正之主不納非賢必須行㓗才髙然後乃用也兊九五曰孚于剥有厲謂處尊貞之位不説信乎君子而説信乎小人則小人道長而國有危也剥六五曰貫魚以宫人寵无不利謂施寵小人但同之於宫人勿使害正則終无尤也然則人君所任宜得賢才不可説信小人雖未能不加以寵亦當處之散地无俾乘勢以消君子可也或曰人君有不自為國而委之大臣可乎曰茲禍福之機也事有不可不然亦不可必然在度宜而行之耳蒙六五曰童蒙吉謂委於二也夫蒙之時隂昧而陽明五以隂質居於尊位不敢以其蒙昧自任而委之剛陽付物以能故獲吉也師六五曰田有禽利執言无咎長子帥師弟子輿尸貞㓙謂柔非軍帥隂非剛武故不躬行必以授也授不得主衆猶不從故長子則可弟子則㓙盖九二得中可以任也自閫以外将軍制之用兵之法亦其宜矣臨六五曰知臨大君之宜吉夫臨剛浸而長君子道盛之時也因而納之委以其事則不勞而成功矣任得君子庸非智乎大壮六五曰喪羊于易无悔羊壮也君大壮之時以隂處陽以柔乘剛用壮之甚敵冦之來将失其居故不待險難而先舍其壮委任於二則得无悔也此皆事之宜不得不然也歴觀衆卦此類頗多率由隂居尊位未得剛正在上而廢其聰明委政於下也得其人則民受其賜非其人則職為亂階此不得不然也恒六五曰恒其德貞婦人吉夫子凶謂居得尊位不能制斷而係應於二專從其唱以此為恒則婦人之吉非夫子之道也以言人君在位苟不能獨斷而牽於臣下權時則可矣以之為恒則非君之道也坤初六曰履霜堅氷至戒其漸也上六曰龍戰于野辨之不早疑盛乃動故必戰也此任官之要先王其慎之也易論第三或人請問為臣之道曰君子之進也難哉苟進則諂諂則何有於君唯利而已矣否初六曰㧞茅茹以其彚貞吉亨象曰㧞茅貞吉志在君也謂居否之時動則入邪三隂同道皆不可進故茅茹以類貞而不諂志在於君故不苟進也夫執剛用直進不為利忠誠所志鬼神享之升九二曰孚乃利用禴无咎謂與五為應往必見任體夫剛德進不求寵閑邪存誠志在大業故乃利用納約于神明也夫君臣之交初未見親未信而諌人以為謗損初九曰已事遄往无咎酌損之謂剛以奉柔當自酌損其剛乃得合志志既合則道可行也然剛德之長不可全削志意既合當自守貞九二曰利貞征凶弗損益之謂初已損剛以順柔二復損已以益柔則剥道成焉故不可遄往而利貞也夫道雖貞矣宜得其中不可過也小畜上九曰既雨既處尚德載婦貞厲月幾望君子征凶謂體巽處上剛不敢犯尚德者也為隂之長能畜剛健德積載者也婦制其夫臣制其君雖貞近危故曰婦貞厲也滿而又進必失其道隂疑於陽必見戰伐雖復君子以征必凶故曰君子征凶也恒初六曰浚恒貞凶无攸利象曰浚恒之凶始求深也謂求深窮底物无餘藴以此為恒凶貞害德無施而利盖人不可以至察也節上六曰苦節貞㓙悔亡謂過節之中以至亢極苦節者也以斯施貞物所不勝貞之㓙也以斯脩身行在無妄故得悔亡盖政不可以峻刻也雖不可過亦不可未至而止也晉初六曰晉如摧如貞吉罔孚裕无咎謂進明退順不失其正而處卦之始功業未著物未之信若以此為足自喪其長者也故必裕之然後无咎也夫為君耳目所以司聰明也不能去邪人使至君側誰之罪也兊九四曰商兊未寧介疾有喜謂三為佞説将近至尊四以剛德裁而隔之初則未寧終則有喜也此之為喜乃為至尊所善天下所頼故象曰九四之喜有慶也夫事君盡禮致恭存位古之道也履九四曰履虎尾愬愬終吉謂逼近至尊處多懼之地然以陽居隂以謙為本雖處危懼終獲其志也夫君唱臣和理之常也專而見疑鮮不及矣坤六三曰含章可貞或從王事無成有終謂含美於内待命而發不為事首順上而終可謂智矣故象曰含章可貞以時發也或從王事知光大也无妄六二曰不耕穫不菑畬則利有攸往亦謂代終已成而不造也不擅其美乃盡臣道故利有攸往也雖不獲自專而時有未安不可不憂也渙六四曰渙其羣元吉渙有丘匪夷所思謂與五合志内掌機密外宣化命能為羣物散其險害然處上體之下不可自專猶有丘墟未平之慮雖已得大功所思不可忘也若時不我用不與於政則宜巻而懐之毋使動而之悔也坤六四曰括囊无咎无譽謂以隂居隂不與陽事隠其賢徳乃可免咎故象曰括囊无咎慎不害也或竭其忠信志在立功圖國忘身雖慎可也隨九四曰隨有獲貞㓙有孚在道以明何咎謂居於臣地以擅其民失於臣道違貞者也體剛居説而得民心能幹其事而成其功者也雖違常義志在濟物著信在道以明其功何咎之有哉夫權之所在衆之所附不守以正速禍而已矣益六二曰或益之十朋之龜弗克違永貞吉謂居中得位益自外來朋龜獻䇿同於損卦六五之位位不當尊故永貞乃吉也夫忠臣之分雖處險難義不忘君也蹇六二曰王臣蹇蹇匪躬之故謂居位應五不以五在難中私身逺害執心不回志救王室者也故象曰王臣蹇蹇終無尤也凡此皆為臣之道也孔子曰為臣不易豈虚言哉易論第四或曰大哉君臣之道既得而聞之矣請問凡所以治其身何如曰性不能自賢必有習也事不能自知必有見也習之是而見之廣君子所以有成也蒙六四曰困蒙吝謂獨逺於陽處兩隂之中困於蒙昧不能比賢以發其志故曰吝也觀初六曰童觀小人无咎君子吝謂處於觀時而最逺朝美體於隂柔不能自進无所鑒見故曰童觀在小人則无咎君子處之吝道也夫道之於人不可斯須去之也進則飾其行退則不勉焉是為利者也君子恥之履九二曰履道坦坦幽人貞吉謂在内卦幽隠之地而履其中道不以居外為榮處内為屈隠顯皆同常行其貞宜其吉也中孚九二曰鳴鶴在隂其子和之我有好爵吾與爾靡之謂處内而居重隂之下履不失中不徇於外立誠篤至雖在闇昧物亦應之也晉六二曰晉如愁如貞吉受兹介福于其王母謂進而无應其德不昭不以无應而回其志處晦而能致其誠故得貞之吉也其初愁如履正不回則乃受兹大福于其母也井九三曰井渫不食為我心惻可用汲王明並受其福謂井渫而不見食猶人脩已全㓗而不見用故使我心惻也不下注而應止是可汲也井之可汲也猶人可用若逢明王則既嘉其行又欽其用故曰並受其福也夫欲不可逞强不可恃放其私心罔知戒懼㓙之道也震初九曰震來虩虩後笑言啞啞吉謂體夫剛徳為卦之先能以恐懼而脩其德乃致福也豫初六曰鳴豫㓙謂處豫之初而特得志於上樂過則滛志窮則㓙也大壮九三曰小人用壮君子用罔貞厲羝羊觸藩羸其角謂處健之極以陽處陽用其壮者也故小人用之以為壮君子用之以為羅已者也雖復羝羊以之觸藩必拘羸其角矣益上九曰莫益之或擊之立心勿恒㓙謂處益之極過盈者也求益无厭人弗之與怨者非一故或擊之也夫静以俟時則无悔躁而求利則有恥不可不慎也頥初九曰舍爾靈龜觀我柔頥㓙謂居養賢之世不能正其所履而舍其靈龜之明德羡我朶頥而躁求不足貴也咸六二曰咸其腓㓙居吉腓謂動躁者也感物以躁㓙之道也由躁故㓙居則吉矣夫遵道而行不牽於俗明哲之任也與衆雷同善柔之事也豫六二曰介于石不終日貞吉謂順不苟從豫不違中不改其操是以吉也咸九三曰咸其股執其隨往吝謂志在隨人所執亦已賤矣用斯以往吝其宜也小過九三曰弗過防之從或戕之㓙謂居下體之上以陽當位而不能先過防之至令小者咸過而復應而從焉其從之也則戕之㓙至矣然而絶類離倫衆之所非毀方瓦合亦儒之權也萃六二曰引吉无咎謂處坤之中已獨處正與衆殊異民之多僻獨正者未能變體以逺於害故必見引然後乃吉而无咎也凡此皆治身之道也或曰脩身及家自天子逹庶人一也請問家道曰蠱初六曰幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也謂幹父之事不可大小損益一依父命當量事制宜以意承考而已九二曰幹母之蠱不可貞象曰幹母之蠱得中道也謂婦人之性難可全貞宜屈已剛既幹且順故曰不可貞也雖不宜全貞亦不可納之於邪故曰得中道也家人初九曰閑有家悔亡謂治家之法及其志之未變而豫防之則悔亡也家瀆而後嚴之則无逮矣九三曰家人嗃嗃悔厲吉婦子嘻嘻終吝謂家人雖嗃嗃悔其酷厲猶保其吉婦子嘻嘻乃失其節也是威克厥愛家道之善者矣易論第五或曰脩身及家前聞之矣請問凡所以遇於人何如曰夫上之遇下有道屯初九曰盤桓利居貞利建侯象曰雖盤桓志行正也以貴下賤大得民也貴謂陽賤謂隂也初九之陽在三隂之下是以貴下賤故大得民心也无妄初九曰无妄往吉象曰无妄之往得志也亦謂體剛處下以貴下賤行不犯妄故往得其志也困九二曰困于酒食朱紱方來利用亨祀征㓙無咎謂以陽居隂尚謙者也體夫剛質而用中履謙應不在一心無所私雖以處困物莫不至不勝豐衍故曰困于酒食也能招異方故曰朱紱方來也然而不可以瀆也頥六四曰顛頥吉虎視耽耽其欲逐逐無咎謂居得其位以上養下得頥之義而下交不可以瀆故虎視耽耽威而不猛不惡而嚴也夫下之遇上有道大過初六曰藉用白茅無咎謂以柔處下心能謹慎故得無咎也訟六三曰食舊徳貞厲終吉或從王事無成謂體夫柔弱以順於上不為九二自下訟上不見侵奪保全其有故得食其舊徳而不失也然而不可以諂也頥六三曰拂頥貞㓙十年勿用無攸利謂履夫不正以養於上納上以諂者也處頥而為此行十年見弃者也立行於斯無施而利也兊六三曰來兊㓙謂以不正而來求説邪佞之道故㓙也巽九二曰巽在牀下用史巫紛若吉无咎謂處巽之中既在下位而復以陽居隂卑巽之甚故曰巽在牀下也若惟施至卑於神祗而不用之於威勢則得吉而無咎也夫陽為君子隂為小人同於君子則吉附於小人則㓙臨九二曰咸臨吉无不利謂有應在五而五體柔若順於五則剛徳不長矣雖感應之時不可全與相違必未順其命乃得吉无不利也六四曰至臨无咎謂處順履正不忌剛長而乃應之故得無咎也剥六三曰剥之无咎謂與上為應羣隂剥陽我獨協焉雖處於剥可以无咎也夬九三曰壮于頄有㓙君子夬夬獨行遇雨若濡有愠无咎謂夬為剛長而三獨應上六助於小人是以㓙也君子處之必能棄夫情累决之不疑故曰君子夬夬也若不與衆陽為羣而獨行殊志應於小人則受其困焉遇雨若濡有恨而無所咎也夫心貴乎公而量貴乎大公則視人如一大則無物不包視人如一則惟善是從也無物不包則雖愚有處也比初六曰有孚比之无咎有孚盈缶終來有它吉謂處比之首應不在一心無私吝則莫不比之故必有它吉也同人初九曰同人于門无咎謂為同人之首而無應於上心無係吝通夫大同出門皆同誰與為咎也兊初九曰和兊吉謂居兊之初應不在一無所黨係和兊之謂也説不在諂履斯而行未見有疑之者吉其宜矣大過九四曰棟隆吉有它吝謂雖能拯其弱不為下所撓而應在初用心不廣故有它吝也蒙九二曰包蒙吉納婦吉子克家謂以剛居中童蒙所歸也包而不距則逺近咸至故包蒙吉也泰九二曰包荒用馮河不遐遺朋亡得尚于中行謂體健居中而用乎泰能包含荒穢受納馮河者也用心廣大無所遐弃無所朋黨乃可以得配于五也凡此皆遇人之道也易論第六或曰吉㓙悔吝生乎動者也請問動而無悔則奚由曰時乎時智者弗能違矣先時而動者妄也後時而不進者怠也妄者過之媒怠者功之賊也蹇初六曰往蹇來譽謂處難之始居止之初獨見前識覩險而止以待其時故往則遇蹇來則譽也歸妹六三曰歸妹以須反歸以娣謂室主猶存而求進焉進未值時故有須也不可以進故反歸待時以娣乃行也凡此不可先時者也豐上六曰豐其屋蔀其家闚其户閴其無人三歳不覿㓙謂處於明動尚大之時而深自幽隠以髙其行大道既濟而猶不見隠不為賢更為反道㓙其室也三年豐道之成治道未濟隠猶可也既濟而隠以治為亂也節九二曰不出門庭㓙謂初已造之至二宜宣其制矣而故匿之失時之極則遂廢矣故不出門庭則㓙也凡此不可後時者也嗚呼進取之時易見退避之時難知盖利者人之所欲欲則存諸心存諸心則計之熟矣害者人之所惡惡則幸其無之而不知為謀矣或人請問退避之道曰君子見機而作愚者闇於成事禍至而避亦無及也渙初六曰用拯馬壮吉謂處散之初乖散未甚故可以逰行得其志而違於難也不在危劇而後乃逃竄故曰用拯馬壮吉也遯初六曰遯尾厲勿用有攸往謂處遯之時而為遯尾禍所及也危至而後求行難可免乎故勿用有攸往也然而矯枉過正衆之所憎和而不同身乃無患明夷初九曰明夷于飛垂其翼君子于行三日不食有攸往主人有言謂處卦之始最逺於難逺難過甚明夷逺遯絶跡匿形不由軌路殊類過甚以斯適人人必疑之故曰有攸往主人有言也六二曰明夷夷于左股用拯馬壮吉夷于左股示不能行也以柔居中用夷其明進不殊類退不逃難故可用拯馬而壮吉也夫有所避者不可有所顧也以欲而忘患鱗属所以死於餌也遯九三曰係遯有疾厲畜臣妾吉謂在内近二以陽附隂宜遯而繫故曰繫遯遯之為義宜逺小人以陽附隂繫於所在不能逺害亦已憊矣宜其屈辱而危厲也繫於所在畜臣妾可也施於大事㓙之道也九四曰好遯君子吉小人否謂處於外而有應於内君子好遯故能舍之小人繫戀是以否也若夫分有所定義不可去則莫若守正之為利也泰九三曰無平不陂無往不復艱貞无咎勿恤其孚于食有福謂處天地之將閉平路之将陂時将大變世将大革而居不失其正動不失其應艱而能正不失其義故无咎也信義誠著故勿恤其孚于食有福也明夷六五曰箕子之明夷利貞謂最近於晦與難為比猶闇不能沒明不可息正不憂危故利貞也凡此避禍之道也詩曰既明且哲以保其身此之謂也易論第七或曰獨隂孰始獨陽孰生萬事云為未有不因人以成故大則有君臣之交小則有同志之㑹變故非一願聞其詳曰人事之變或逺而相應或近而相得逺而相應君臣之分定也近而相得以各無應同志者也然而應於逺者或為近所困承於上者或為下所逼臣欲應君而冦難阻之君欲應臣而讒邪制之惟其明哲决所去就秉心不回終乃無過也屯六二曰屯如邅如乗馬班如匪寇婚媾女子貞不字十年乃字謂志在乎五不從於初與初相近而不相得困於侵害時方屯難正道未通涉逺而行難可以進屯難之世勢不過十年十年則反常反常則本志斯獲矣大有九四曰匪其彭无咎謂既失其位而上近至尊之威下比分權之臣其為懼也可謂危矣唯夫有聖知者乃能免斯咎也三雖至盛五不可舎能辨斯數專心承五常匪其彭則无咎矣睽六三曰見輿曳其牛掣其人天且劓魚器反无初有終謂以隂居陽以柔乘剛志在於上而不和於四二應於五則近而不相比故滯隔所在不獲進也四從上取二從下取而應在上九執志不回初雖受困終獲剛助也漸九五曰鴻漸于陵婦三嵗不孕終莫之勝吉謂進得中位而隔乎三四不得與其應合然各履正而居中三四不能久塞其塗不過三歳必得所願矣九三曰鴻漸于陸夫征不復婦孕不育㓙謂以陽爻為下卦之主而棄其羣醜與四相得遂乃不反夫征不復樂於邪配則婦亦不能執正矣然小人之心惡直醜正近不相得亦宜備之既濟六四曰繻有衣袽終日戒謂履得其正而近不與三五相得鄰於不親而得全者終日戒也抑又交際之間理非一致或名雖為應而實不相接或義有可合而情不相同智者三思故往而必納愚者徑行則動而多悔也屯六四曰乘馬班如求婚媾往吉无不利謂二雖比初執正不從不害已志者也求與合好往必見納矣故象曰求而往明也小畜初九曰復自道何其咎吉謂處乾之始以升巽初四為已應不距已者也以陽升隂復自其道順而無違何所犯咎得義之吉也隨六三曰係丈夫失小子隨有求得利居貞謂雖體下卦二已據初将何所附故舍初係四志在丈夫四俱無應亦欲於已隨之則得其所求也睽六五曰悔亡厥宗噬膚往无咎謂有應在二三雖比二二之所噬非妨已應者也以斯而往何咎之有往必合也凡此智者之慮能見彼情者也屯六三曰即鹿無虞惟入于林中君子幾不如舍往吝謂三既近五而無冦難四雖比五其志在初不妨已路可以進而無屯邅也見路之易不揆其志五應在三往必不納何異無虞以從禽其可獲乎故不如舍往吝窮也大畜九二曰輿説輹謂五處畜盛未可犯也遇斯而進故與説輹也凡此愚者之動不知彼情者也故亦有非應比各亢一方而渙然合好罔有猜嫌者同患相恤勢使之然也睽九四曰睽孤遇元夫交孚厲無咎謂無應獨處而初亦無應特立處睽之時俱在獨立同處體下故求其疇類而自託焉相得無疑故曰交孚雖在乖革志可得行雖危無咎也故曰苟識其情不憂乖逺苟明其趣不煩彊武能説諸心能硏諸慮睽而知其類異而知其通其唯明爻者乎易論第八或曰天有常故四時行地有常故萬物生人有常故德行成而事或有變勢或有異以常待之其可乎曰常者道之紀也道不以權弗能濟矣是故權者反常者也事變矣勢異矣而一本於常猶膠柱而鼓瑟也履九五曰夬履貞厲謂履道尚謙不憙處盈而五以陽處陽正當其位是以危也豐六二曰豐其蔀日中見斗往得疑疾有孚發若吉謂處明動之時爻皆以居陽位乂不應隂為美而二以隂居隂常於厥位故幽而無覩不能自發也若夫排患解紛量時制宜事出一切愈不可常也益六三曰益之用㓙事無咎有孚中行告公用圭謂以隂居陽處下卦之上壮之甚也語以謙冲則罪可戮用救衰危則物所恃故以此告公國主所任也大過九二曰枯楊生稊老夫得其女妻無不利謂以陽處隂能過其本而救其弱者也上無其應心無係吝處過以此無衰不濟也九三曰棟橈㓙謂居大過之時處下體之極不能救危拯弱以隆其棟而以陽處陽自守所居又應於上係心在一宜其淹溺而㓙衰也或曰甚哉幹蠱之難也才不勝任亦可勉乎哉曰駑駘疾走不如良馬之安行也小人飾智不能及君子之任真也天命之性有限乎中苟非其宜是以身釣禍也大有九二曰大車以載有攸往無咎謂健不違中為五所任任重不危致逺不泥故可以往而無咎也鼎九四曰鼎折足覆公餗其形渥㓙謂處上體之下而又應初既承且施非已所勝故曰鼎折足覆公餗也既覆公餗體為渥沾智小謀大不勝其任受其至辱灾及其身故曰其形渥㓙也解六三曰負且乗致冦至謂處非其位履非其正乗二負四以容其身小人而乗君子之器盜思奪之矣凡此皆以身釣禍者也亦有才可適用德可及物而勢不可為者必謹察之也井九二曰井谷射鮒甕敝漏謂處上宜下處下宜上而二無應於上反下與初故莫之與也是卑者不可以有為也旅九三曰旅焚其次喪其僮僕貞厲謂居下體之上與二相得以寄旅之身而為施下之道與萌侵權主之所疑故次焚僕喪而身危也是疏者不可以有為也凡此亦所以釣禍也或有不量其力悖道逆理以圖非望兹又罪之至也履六三曰眇能視跛能履履虎尾咥人㓙武人為于大君謂以隂居陽以柔乗剛志在剛健不脩所履欲以陵武於人為于大君行未能免於㓙而志存于王頑之甚也同人九三曰伏戎于莽升其髙陵三嵗不興謂貪於所比據上之應其敵剛健非力所當故伏戎于莽不敢顯亢也升其髙陵望不敢進量斯勢也三嵗不能興者也三嵗不能興則五道亦已成矣安所行焉隨上六曰拘係之乃從維之王用亨于西山謂隨之為體隂順陽者也最處上極不從者也隨道已成而時不從故拘係之乃從也離九四曰突如其來如焚如死如弃如謂逼近至尊履非其位欲進其盛以炎其上命必不終也噫天不可違人不可欺忠孝之美有生者所宜拳拳也易論第九或曰如此乎禍福之猶影響也何從而慎諸曰火之生也一勺之勝及其燎也川流莫競是故君子慎乎始也節初九曰不出户庭無咎謂為節之初将整離散而立制度者也故明於通塞慮於險偽不出户庭慎宻不失然後事濟而无咎也夬初九曰壮于前趾往不勝為咎謂居健之初為决之始宜審其䇿以行其事壮其前趾往而不勝宜其咎也然則不慎而失之者尚可及乎曰亦在人之明與昧也明者則辨之於早過而能改故可及也昧者則以智飾非至于貫盈雖悔無及矣復初九曰不逺復無祇悔元吉謂最處復初始復者也不逺而復幾悔而反以此脩身患難逺矣錯之於事其殆庶幾乎故元吉也需九三曰需于泥致寇至象曰需于泥灾在外也自我致寇敬慎不敗也謂以剛逼難欲進其道所以招寇而致敵也猶有須焉不陷其剛寇之來也自我所招敬慎防備可以不敗也訟九四曰不克訟復即命渝安貞吉謂處上訟下可以改變者也故其咎不大若能反從本理變前之命安貞不犯不失其道為仁由已故吉從之也噬嗑初九曰屨校滅趾无咎謂過輕戮薄足懲而已小懲大誡乃得無咎也同人九四曰乘其墉弗克攻吉謂履非其位以與人爭二自五應三非犯已攻三求二尤而效之違義傷理衆所不與故雖乘墉而不克也不克則反自思過以從法則故得吉也臨六三曰甘臨無攸利既憂之无咎謂履非其位居剛長之世而以邪説臨物宜其無攸利也若能盡憂其危改脩其道剛不害正故咎不長也凡此辨之於早可及者也復上六曰迷復㓙有灾眚用行師終有大敗以其國君㓙至于十年不克征謂最處復後是迷者也以迷求復故曰迷復也用之行師難用有克終必大敗用之於國則反乎君道也大敗乃復量斯勢也雖復十年脩之猶未能征也噬嗑上九曰何校滅耳㓙謂處罰之極惡積不改者也罪非所懲故刑及其首至于滅耳及首非誡滅耳非懲㓙莫甚焉凡此至于貫盈雖悔無及者也亦有勢猶可救而弗用謀言遂及敗覆者茲又不明之甚也夬九四曰臀無膚其行次且牽羊悔亡聞言不信謂下剛而進非已所據必見侵食失其所安而五為夬主非下所侵若牽於五則可得悔亡而已剛亢不能納言自任所處聞言不信以斯而行㓙可知矣噫過而不能知是不智也知而不能改是不勇也持疑猶豫目以無害古之亡國敗家未嘗不以此也易論第十或曰文王之囚箕子之奴豈其所自取哉曰患自已招斯可患也患非已招斯不足患也其必免矣如其不免是有命焉非智之過也節六三曰不節若則嗟若無咎謂以隂處陽以柔乗剛違節之道以至哀嗟自已所致故無所怨咎也此患自已招者也漸初六曰鴻漸于干小子厲有言無咎謂始進而未得其位則困於小子窮於謗言故曰小子厲有言也困於小子讒謬之言未傷君子之義故曰無咎也姤九三曰臀無膚其行次且厲無大咎謂處下體之極而二據於初不為已乗居不獲安行無其應不能牽據以固所處故曰臀無膚其行次且也於履得其位非為妄處不遇其時故使危厲灾非巳招是以無大咎也此患非已招必免者也蹇六四曰往蹇來連謂往則無應來則乗剛往來皆難故曰往蹇來連然得位履正當其本實難遇於難非妄所招也此患非已招不可免者也是有命焉非智之過也亦有進不違私志在救難以危其身此又君子之大義非智者之羞也大過上六曰過涉滅頂㓙無咎謂處大過之極過之甚也涉難過甚故至于滅頂㓙志在救時故不可咎也古之人曰貪夫徇財烈士徇名夸者死權有所欲者必得所惡也闗龍逄死於夏王子比干死於商人臣之義不得不然也是故知幾之賢少欲之士拂衣塵外髙蹈不還鴻飛㝠㝠非弋人之所簒也蠱上九曰不事王侯髙尚其事謂最處事上而不累於職位不承事王侯但自髙尚其事故志可則也漸上九曰鴻漸于陸其羽可用為儀吉謂進處髙潔不累於位無物可以屈其心而亂其志峨峨清逺儀可貴也賁初九曰賁其趾舍車而徒謂在賁之始以剛處下居於無位棄於不義安夫徒步以從其志者也此二疏以免於漢四皓以免於秦特立獨行非凡所及也噫天道之變日星循環占之而不舛者以知其數也人事之動情偽交錯應之而不謬者以知其勢也持之以正用之以中百禄之來弗可辭也已噫非天下之至變其孰能與於此哉易論第十一或曰卦者時也爻者適時之變者也時既不一事亦不同不可相假者也今子統而論之毋乃咈於時乎曰時雖異矣事雖殊矣然事以時變者其迹也統而論之者其心也迹或萬殊而心或一揆也若夫湯湯洪水禹以是時而濬川黎民阻饑稷以是時而播種百姓不親契以是時而敷五教蠻夷猾夏臯陶以是時而明五刑其迹殊其所以為心一也統而論之謂之有功可也亦有因時立事事不局於一時可為百代常行之法者如仁義忠信之例是也故夫子於上下繫所稱者十有九爻未有言其時者盖事不局於一時也是故時有小大有以一世為一時者此其大也有以一事為一時者此其小也以一世為一時者否泰之類是也天下之人共得之也以一事為一時者訟師之類是也當事之人獨得之也借如今之世泰之時也天下所共矣而所遇之事人各不同若其倥侗之質求師辯惑蒙之時也立身嚮道非禮勿行履之時也居其德義以待施惠井之時也自逺之近觀鑒朝美觀之時也量能受任各當其分鼎之時也夙夜在公幹君之事蠱之時也用其剛正辯物之事訟之時也斷其刑罰無有不當噬嗑之時也出軍遣将以討不庭師之時也險難在前按兵觀釁需之時也民有困窮從而養之頥之時也事有所失知而改之復之時也禮有過差議而定之節之時也逸樂之情約之以正豫之時也文飾之盛反之於素賁之時也人有解慢示之以威震之時也夫此之類皆以一事為一時而諸卦之時君之所遇者多以事無不統也臣之所遇者寡以事有分職也或一人之身而兼數事或終食之久而移數時時既屢遷迹亦皆變苟不求其心之所歸而專視其迹則散漫簡策百紐千結豈中材之所了邪子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮謂少則得多則惑也然則統而論之不亦可乎易論第十二或人請問乾坤何時也曰乾者聖人進取天位非承平之時也故初則潜二則見三則乾乾四則或躍五則飛上則亢也坤者聖人防閑臣下非大通之時也故初則履霜上則龍戰三則含章而不敢為首四則括囊而後無咎五則黄裳而後元吉唯二居於下卦履其中正乃可任其自然也又問大過之時則務在救危遯明夷之時則貴乎避難何其不同也曰大過之時本末雖弱而未見君之昏亂臣之讒邪是國家之難何世無之君子之義不得不救也遯則小人得志明夷則闇主在上忠良之士徒見害而已無足可為也君子之智不得不避也又問隂爻浸長皆小人道盛也剥之五隂否之三隂小人衆多矣而不見君子避之之意二隂始進而君子之遯猶恐為尾何也曰君子之道知幾其神故云二隂用事小人将盛而亟避之則無患矣苟至于否塞至于剥落而後退焉不已晩乎易之為遯所以示先見也然則剥與明夷孰為大禍曰小人雖盛制之在君故貫魚以宫人寵則無不利是禍之小也主之闇則末如之何故南狩得其大首是禍之大也又問屯也蹇也困也名相近也請言其别曰屯者動乎險中可為之世也然而足以有功矣蹇者見險而止不可為之世也然而足以無過矣困者剛見揜於柔君子為小人所蔽窮厄委頓者也人之所患莫斯之甚也比也同人也隨也義相類也請言其異曰比者剛得尊位上下應之天下之人皆親其君也同人者柔履中正而應乎乾同志相合物各有黨也隨者剛來下柔動而之説謂能下於人動則人説莫不從其所為也上之所務莫斯之大也謙也巽也奚若曰謙者内陽外隂屈其剛德以下於物者也巽者内外皆隂心貌如一情實卑順者也豫也兊也奚若曰豫者主於逸樂兊者喜恱而已也晉也升也奚若曰升者升得位晉者進見於君也泰也既濟也奚若曰泰者君臣合好君子在位小人在野之世也然物既大通多失其節故不具利貞之德也若夫物皆得其所事皆得其宜未有如既濟之盛者也堯舜其猶病諸然安不忘危戒在終止故曰初吉終亂也泰之極則城復于隍既濟之極則濡其首禍福倚伏誠可畏也昔大禹之訓曰予臨兆民懔乎若朽索之馭六馬夫能保萬世無疆之休其唯知懼者乎易論第十三或曰八卦成列象在其中矣謂備天下之象也請言其畧曰天地萬物存乎説卦矣姑以人事明之八卦之道在人靡不有之也但賢者得其正不肖者處其偏矣夫剛而不暴乾之正也順而不邪坤之正也動而不妄震之正也卑而不辱巽之正也險而不可犯坎之正也明而不可欺離之正也静而不可誘以利艮之正也和而不可撓以怒兊之正也若剛而不容於物乾之偏也順而不守其道坤之偏也動而為躁震之偏也卑而為佞巽之偏也險而為賊害坎之偏也明而為苛細離之偏也止而不及其時艮之偏也説而不由於禮兊之偏也是故賢者以功不肖者以過賢者以福不肖者以禍由所用之道名同而實異也然賢者之道也或其數不備或所施者狹夫能具八者之用發之乎身充之乎天地之間者其唯聖人乎故用之於國則邇人安用之於軍則逺人服鼓之舞之無物不得其宜矣純精勁正造成庶事旰食忘倦終而復始用乾於國也含藏黄大靡物不愛隤然和順無有煩擾用坤於國也甲兵斧鉞以重其威無敢奸宄無敢怠惰用震於國也適時之變權宜在已以貴下賤士争歸之用巽於國也封疆阻固山河分限貴在常尊無得褻近用坎於國也善靡不照惡靡不見人文化成上下肅雍用離於國也脩其典禮止邪未形慢易之心無自而入用艮於國也行慶施惠洽于羣心罔有小大翕然欣戴用兊於國也以剛决事以勇臨敵變動不息罔失其正用乾於軍也撫養士卒如母親子雖其柔仁不害方直用坤於軍也先聲後實威聞敵國動於九天物莫能亢用震於軍也隠其形勢示之不能始如處女後如脫兎用巽於軍也深溝髙壘逺其斥堠敵人不得襲刺客不得近用坎於軍也部曲分辯各有麗著號令明白衆罔疑惑用離於軍也退北佯為不追見利佯為不知持重有待嶷如山立用艮於軍也誅其渠魁弔其民人簞食壺漿以迎王師用兊於軍也故知八卦之道大矣有髙焉必乗其上有深焉必載其底有旁焉必環其外幽無不貫㣲無不徹惟所用之何如耳噫作易者既有憂患矣讀易者其無憂患乎苟安而不忘危存而不忘亡治而不忘亂以憂患之心思憂患之故通其變使民不倦神而化之使民宜之則自天祐之吉無不利矣旴江集巻三欽定四庫全書旴江集卷四宋李覯撰刪定易圖序論覯甞著易論十三篇援輔嗣之注以解義盖急乎天下國家之用毫柝幽㣲所未暇也世有治易根於劉牧者其説日不同因購牧所為易圖五十五首觀之則甚複重假令其説之善猶不出乎河圖洛書八卦三者之内彼五十二皆疣贅也而况力穿鑿以從傀異考之破碎鮮可信用大懼詿誤學子壊隳世教乃刪其圖而存之者三焉所謂河圖也洛書也八卦也於其序解之中撮舉而是正之諸所觸類亦復詳説成六論庶乎人事脩而王道明也其小得失不足喜愠者不盡糾割别有一本黄黎獻為之序者頗増多誕謾自鄶以下可無譏焉牧又注易所以為新意者合牽象數而已其餘則攘輔嗣之指而改其辭将不攻自破矣先代諸儒各自為家好同惡異有甚冦讎吾豈斯人之徒哉憂傷}
