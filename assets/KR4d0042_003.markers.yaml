  - {type: page-break, offset: 35, content: '', id: KR4d0042_WYG_027-18b}
  - {type: variant, offset: 36, length: 0, content: '', WYG: 六經固蒸人之宗主而學者之指南也竊念覯家於江表生而嗜學誦古書為古文不敢稍逗撓行年二十八未獲薦用于時謗讟益多窮困益甚怳然自疑其業之非是輙敢决正于左右未知蓍蔡之仁肯錫之一言哉謂之是則區區姓名當由此而顯謂之非則齒少氣盛猶足以改習然則謂執事為文章宗主而指南於學者良不虚矣生平為文謹采其二十四篇寫成一冊及所著明堂定制圗一道并序草具其副辱諸侍者演暢多暇一賜觀覽千萬幸甚千萬幸甚藪澤庸微干犯崇貴曷任畏罪不宣覯再拜上宋舎人書脩撰舎人執事覯不肖竊謂文之於化人也深矣雖五聲八音或雅或鄭納諸聽聞而淪入心竅不是過也嘗試從事於簡䇿間其讀虚無之書則心頽然而厭於世觀軍陣之法則心奮起而輕其生味縱横之說則思譎詭而忘忠信熟刑名之學則憙苛刻而泥㢘隅誦隠遁之篇則意先馳於水石詠宫體之辭則志不出於匳匣文見於外心動乎内百變而百從之矣諒非淳氣素具通識旁照則為其所敗壊如覆手耳韓子有言曰儒以文亂徳豈謂是乎然則聖君賢輔將以使民遷善而逺罪得不謹於文哉有周而上去古未逺而濬哲時起以綱領之彬彬之盛如天地日月不可復譽其大而褒其明也至于漢初老師大儒未盡凋落嗣而興者皆知稱先聖本仁義數百年中其秉筆者多有可采魏晉之後渉于南北斯道積羸日劇一日髙冠立朝不恤治具而相高老佛無用之談世主儲王而争誇姦聲亂色以為才思虛荒巧偽滅去義理俾元元之民雖有耳目弗能復視聽矣頼天相唐室生大賢以維持之李杜稱兵於前韓栁主盟於後誅邪賞正方内嚮服堯舜之道晦而復明周孔之教枯而復榮逮於朝家文章之懿高視前古者階於此也不意天宇之廣頽風未絶近年以來新進之士重為其所扇動不求經術而摭小說以為新不思理道而專雕鎪以為麗句千言萬莫辨首尾覧之若㳺於都市但見其晨而合夜而散紛紛藉藉不知其何氏也逺近傳習四方一體有司以備官之故姑用汎取𤨏辭謬舉無如之何聖人之門將復榛蕪矣所幸明后在阼賢臣在位慨然興念思遏其波凡曰有識孰不抃慰然詢於輿人則僉謂執事與禁掖數公謀救斯弊用心最切至覯僻逺之民也獲聞是語信之不疑誠以執事負大才業角馳英俊之塲疊為天下第一遭時結主坐致嚴近苟協咨同僚翊起正道鑿吾人之胷而歸以中和之氣固其職矣雖然世俗之仕難以道諭易以名誘誘之之術不在辭費胡不於廣衆之中擇其好古知道有出於人者浴其塵垢被以羽翼使奮飛於天衢庶夫聞見之者知所勸勉乎記曰以義度人則難為人以人望人則賢者可知矣若必求徳行如顔閔文學如㳺夏者而後取之則是待飛兎腰褭而乗車也伏惟稍卑其論而聽小人之請覯家扵南楚生二十有}
