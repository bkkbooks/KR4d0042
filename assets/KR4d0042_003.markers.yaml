  - {type: variant, offset: 9, length: 0, content: '', WYG: 者不敢過不肖者不敢不及此禮之大本也飲食既得衣服既備宫室既成器皿既利夫婦既正父子既親長㓜既分君臣既辨上下既列師友既立賓客既交死喪既厚祭祀既脩而天下大和矣人之和必有發也於是因其發而節之和久必怠也於是率其怠而行之率之不從也於是罰其不從以威之是三者禮之大用也同出扵禮而輔於禮者也不别不異不足以大行於世是故節其和者命之曰樂行其怠者命之曰政威其不從者命之曰刑此禮之三支也在禮之中有温厚而廣愛者有斷决而從宜者有疏逹而能謀者有固守而不變者是四者禮之大㫖也同出於禮而不可缺者也於是乎又别而異之温厚而廣愛者命之曰仁斷决而從宜者命之曰義疏逹而能謀者命之曰智固守而不變者命之曰信此禮之四名也三支者譬諸手足焉同生於人而輔於人者也手足不具頭腹豈可動哉手足具而人身舉三支立而禮本行四名者譬諸筋骸之類焉是亦同生於人而異其稱者也言乎人則手足筋骸在其中矣言乎禮則樂刑政仁義智信在其中矣故曰夫禮人道之凖世教之主也聖人之所以治天下國家脩身正心無他一於禮而已矣禮論第二或人不諭曰節其和者謂之樂行其怠者謂之政威其不從者謂之刑信然矣其所以統於禮者願聞其指曰昔者聖人之制禮也因十二月之氣分而為律吕因六律六吕作為十二管因其清濁與其輕重配而為五聲因其五聲變而雜之以為八音或為歌詩或被於金石絲竹匏土革木之器爰及干戚羽旄以導人之和心以舞人之手足小大有所終始有經倡和有秩節奏有差詘伸俯仰必有齊也綴兆行列必有正也宫軒特縣各當其位四六八羽各昭其數以範五行以調八}
