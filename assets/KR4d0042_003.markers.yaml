  - {type: variant, offset: 187, length: 3, content: 遺字畫, WYG: 湛恩唯待立雞竿胷中况是多竒藴自此陽春退苦寒和王刑部遊仙都觀尋幽西去路非賖回首紅塵事可嗟不待鸞驂并鶴駕便分人世與仙家幾函道藏金壺墨一片秋容玉井花還似武夷高㑹日骨凡猶幸醉流霞和遊丹霞}
