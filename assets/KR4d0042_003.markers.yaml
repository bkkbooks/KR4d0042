  - {type: variant, offset: 122, length: 0, content: '', WYG: 遺碑歳月亦已古硬筆可破石鐫者疑虚語驚龍索雷鬭口唾天下雨怒虎突圍出不畏千強弩有海珠易求有山玉易取唯恐此碑壊此書難再覩安得同寶鎮收藏在天府自非大祭時莫教凡眼覷七星杉五行與萬類有象皆在天如何彼杉樹反更侔星躔予思古昔意欲媚兹山巔草木尚有斗人物誰非仙栽培自何代衰老今多年大旱不減翠渉春無益鮮生當好世界過盡閒雲煙房心欲布政柱石安可捐煉丹井丹竈久巳毁井泉空獨存此地非常地今人非昔人我願刀圭藥輕舉朝明宸一言洗天日萬物歸陽春羣仙誰嫉妬使我身漂淪俯視廢井水欲飲礙荆榛徘徊片雲下泣涕沾衣巾少壯幾何時且醉樽中醇玳瑁石前有縣大夫取此石為器囂然夸謂予材與工俱美如何爾鄉人器用曽莫備無乃居荒陬俗鄙不喜事答云此石堅攻磨動時歳官用錢出民民用錢出巳出民官不知喜一作憙事誠可貴出已乃傷財誰能一作其不惜費大夫聞此言如有所忿戾今君倡是詩敢以報嘉惠秦人峯秦法雖甚苛秦吏若猶拙山林不數里俾爾逃得脱予觀後世事政役火烈烈苟非為鬼神何計避羈紲聖皇今在御百事咸均節常披詔書意苦念生財竭誰能将順者所望在賢哲無使峯中人笑我民屠裂流杯池幽居久不樂心死如濕灰聞言山有池仙客曽流杯披衫向西坐欲望無崇臺何當命遊宴盡聚不羈才顧恐狹隘地未足開吾懐仰手斸河漢決向天南來移舟復轉嶽壅遏成環廻横持北斗柄量盡酒星醅箕踞接下流一歃空千罍八風助吟倡萬怪供嘲諧醉來散髮卧蠅聲視霆雷冷笑勢利子茫茫塵土堆碧蓮池碧蓮何歳開我時不得見于今到池上只有紅蓮綻紅蓮非醜惡物以多為賤阿蠻雖解舞不見真妃面虎跑泉虎跑本何為彼将對以臆有如大丈夫卓爾抱剛直盗泉既不飲譛人亦不食山中小禽獸何足勞捉搦勇氣無所泄爪地成遺跡地神嘉乃誠水源如開闢尋常竊六畜夜傍人牆壁是與豺狼同聞此宜慙色丹霞洞山西十數里乃是丹霞洞直上窮雲霓中寛入罌甕紅塵生不識明月手可捧人家千里庭泉源六月凍風雨氣勢惡草木精神竦靈物少形見仙官何職貢俗縁易厭倦世事足愁痛寄語松上鶴他年期一控葛仙壇仙翁猶在時壇上何設施仙翁一去後夢草空離離下士固大笑言者多不知嗟嗟天壤内共是枯魚池穫稻朝陽過山來下田猶露濕餉婦念兒啼逢人不敢立靑黃先後收斷折傴僂拾鳥䑕滿官倉于今又租入哀老婦里中一老婦行行啼路隅自悼未亡人暮年從二夫寡時十八九嫁時六十餘昔日遺腹兒今兹垂曰鬚子豈不欲養母豈不懐居繇役及下户財盡無所輸異籍幸可免嫁母乃良圗牽車送出門急若盗賊驅兒孫孫有婦小大攀且呼回頭與永訣欲死無刑誅我時聞此言為之長嘆嗚天民固有窮鰥寡實其徒仁政先四者著在孟氏書吾君務復古旦旦師黄虞赦書求節婦許與旌門閭繄爾愚婦人豈曰禮所拘蓬茨四十年不知形影孤州縣莫能察詔㫖徒成虚而况賦役間羣小所同趨姦欺至骨髓公利未錙銖良田歳歳賣存者唯萊汙兄弟欲離散母子因變渝天地豈非大曽不容爾軀嗟嗟孝治王早晩能聞諸吾言又無位反袂空漣如寄懐三首鳥獸死有用羽角筋革齒輦輓入工師飾作軍國器玉食白如瓠瞑目已腐穢生者不敢留埋藏與螻蟻百年富貴身孰若鳥獸類唯有令名人終古如不死又根生但為松翼飛但為鳳王侯尚可輕道義本來重癡兒似婢妾寸歩矜恩寵傍人忍笑時佯把衣袪弄又齪齪復齪齪淺謀同燕雀不思明日憂但取今日樂俗儒抱書巻未去眼中瞙誰将古人淚更為今人落避暑富貴責且重慙恥心如何貧賤事易了飽煖幸已多大熱火天下虚堂枕山阿㧞俗嫌人影考古分賢科潄冷齒雙噤飲香顔半酡一跣或移日遇狂還自歌去就各有志彼此無相訶原憲豈嘗病賜也徒來過喜雨人皆喜膏澤我獨憂豐年歳㐫巳賤糶年豐安得錢賦役忽驚駭倉廩甘棄捐銖銅苟可換富貴寧我憐歸來官事了相弔柴門邊農夫未盡死穀價應常然王心幸仁聖分職當忠賢謂榖賤為美咄咄無欺天送上官直失意多怨尤有誰能自知逰人務乞丐之子唯求師成名在積善干禄先闕疑根本苟深固春風諒無私題昱師房三笑圖髙僧不出院屏畫三笑圖客子倦逰者欲去復踟蹰古人骨朽不可追今人相見如古時人間觸事入吾笑何必門前有虎谿寄祖祕丞我本山田人好尚與衆異平生重交逰所得固無幾昨者應茂才西行覷朝美時當慶厯初選舉實多士茫茫帝王州栖栖逺行子携錢賃破屋乞火蒸陳米鞍馬到即賣僮僕癡難使有時造公卿努力向㕓市數歩則一歇長吁乃能起衣冠信質野言語欠婉媚閽人顧之笑将命見而避往往得所請蹌蹌向前跪何能剖懐抱浪自慕尊貴貴人如天神喘息生雲氣野夫等麋鹿芻豢非所兾歸來坐空窻惆悵夕不睡塵埃滿鬚鬢臭惡入口鼻業巳辭吾親中道豈可廢僶俛待報聞愁憂遂經歳二年正月晦閒房適假寐有奴來啄門手披上聲擇之刺承命驚下牀赤脚誤穿履從來未識面只是聞髙第名顯宦且逹見我當何為再拜請就席熟視知可畏昻昻貌甚古崖石掀氛翳渾渾氣甚和璞玉無芒銳髙談貫先哲雅意在兹世昔人相遇間一言猶合契今吾於擇之寧假再三計自此習往還中心蔑疑貳如熱息廣厦如飢享盛饋君授南康守舟維蔡河涘我館汴之隂前去路則邇時時結帽帶踽踽尋英軌衆人嬌綺羅相對紉蘭芷朱絃自三嘆笑殺彼鄭衛王命有期日都門一反袂君行劇鴻軒我處近匏繫曠日及孟秋皇慈始收試崇崇九門開窈窈三館袐主司隔簾帷欲望不可跂中貴當棖闑蒐索徧靴底呼名授之坐敗席鋪冷地健兒直我前武怒足防備少小學賢能謂可當賔禮一朝在檻阱兩目但􅌓眙捉筆析所問移時數千字讀書取大者纎悉或靡記炙背雖自竒寧當至尊意龍馬騰天衢駑駘合羞死量才與揣命坦蕩更何事振衣託歸舟河流迅弧矢淮清江且平踰月在枕几及過廬山南聞君初布治船檣既入岸馬首已來暨迎我到府署相見共欣喜嫩橘摘千苞肥魚斫干尾蕭晨徹骨清佳境邀人醉髙㑹雖暫歡故園當速至草草成别愁悠悠渡湖水是時東方曙俄然北風厲陽烏畏威逃江神以儒戯氣象斗不同波濤大可悸長㠶張去聲欲裂孤舟蕩無倚或從玉井出或自銀山墜篙工斂手立脉脉無窮淚從者閉目坐嗟嗟不敢視我時撫牀歌分去聲作長江鬼所恨生劬勞不孝而巳矣禍福果無妄險難行可弭脫身得平康引領望鄉里厥後過浹日幸得見維梓入門何怡怡饌具有甘㫖稚女能紉針驕兒徧生齒芟除閒草萊疏通舊沼沚吾廬可終焉生計由此始郡守方仁賢學宫盛脩理踵門致勤恪命我論經藝麻衣何紛紛鄉人子若弟不唯務章句所欲興禮義施為有本末動静有綱紀蚤與鷄同覺夜與月相值孳孶忘飲食􅣬􅣬在文史時附南康書或逢北來使尺素雖滿前話言難到耳殆及三年冬聞君受朝寄名稱按刑獄勢可平寃滯故人漸大任賤子差自慰軒車日巳逺翰墨益難致薄命良可傷降灾渾未巳是年之季冬舉家纒疫癘老母尚委頓㣲軀盖螻蟻形骸非我有魂魄與心離權柄在鬼物功力非服餌曉突誰能炊午闗猶未啓荏苒再周月幸㑹天不棄春風動枯槁甘雨澆根柢行行夏交秋吉微㐫不替高堂何戚戚疾病日攅萃一夕脾臟間發泄不復止詰朝問無言目瞑口齒閉號呶諸兒孫雜沓大鼎沸嗟哉當彼時誠恐弗可諱醫師相急熱巫覡兩經緯藥草極酸辛法術殫怪詭薄暮乃復蘇踰旬僅知味方兹戀庭闈旋巳對獄吏試言其所由内省亦無媿有人同州閭發迹自徒𨽻竊被儒衣裳曽亡小材技突如㳺京邑欲以干明叡朝家焉可欺羈旅謀自濟乃造黃紙書便取靑袍衣乗船歸南方斂板謁當位自言章奏竒因藉宦官勢詔文降自中宰府不預議既云能占天且曰善興利江淮一經過郡府十不啻到處爭逢迎莫能思處置轉運苦愛竒得之如國器故使按坑冶庶可展才智小人靡忖度假寵愈放肆行符索吏卒圈印發傳遞閻閭望塵拜州縣從風靡遮道結繒綵鋪筵塞珠翠車騎前後呵給使數百指何者為典刑獨自誇爪觜在昔秦無人繞朝贈之箠繄我非聾瞽碌碌寧不耻作書貽諫官姦詐患不細有詔令逮捕按驗取真偽是夫知計窮誣我以罪戾上官猶眩惑凖例皆拘係幽幽圄犴中憤憤爭競裏周旋二十日乃克見巧敝畫地尚不入叢棘曷可寘惟兹謝吾母幾不全髪體教道亦難行凡庸豈同志吁哉養英才徒以釣積毁篋書歸敝廬庠門任蕪穢去年仲夏後盛暑若火熾郊園有餘爽蔬果聊可嗜時復觀田疇畢力奉耘耔人生但飽暖此外皆淫侈思君非一日欲去無雙翅俄聞遷黄州又說丁䘮制古來聖與賢誰不遭醜詆蜀日駭狗犬夏鼎愁魑魅人壽有短長孝子謾憂思滅性經所貶節哀禮為是矧夫王佐才簡在唐虞際揚名以顯親報徳豈不韙加飯苟如願蒼生猶有恃適時匪我長不朽乃所擬道義果弗充富貴反為累回憲本無官桀紂焉得此俗子但相非吾心巳居易近者游葛陂念君在衰枲作詩布幽懐讀之勿嗤鄙名男曰參魯以詩喻之孔門有髙弟曽子以孝著求諸聖人言尚曰參也魯才敏誰不願顧恐難荷負苟無徳将之何益於父母昔如呉起者善兵亞孫武齧臂㳺諸侯親䘮哀不舉楊彪有子脩器能頗可取一旦以罪誅䑛犢徒虚語吾生本薄祐略無兄弟助及汝又一身不絶如線縷祖母唯汝愛無異所生乳寧止託祭祀亦欲興門户伎倆勿求名適時乃有補計慮勿尚巧合義乃可處持重尚寡過摧剛庶無懼内以保家族外以揚名譽髙山在所仰今人豈殊古參魯為汝名其字曰孝孺女色無定美贈卿材女色無定美寵至美則多士才無定稱用顯稱巳過長安小家子粲粲秋池荷性慧不覺耻母憐不加訶出户一囊麝見人雙眼波情動笑難止語嬌音屢訛都人口如沸觀者踵相摩因縁幸充選恩澤成偏頗少費萬金珠一呼干綺羅佯愁慘白日猛唾傾天河東鄰有賢女春緑涵脩蛾花艶不裁翦玉光無切磋自小固聞禮藏頭豈知他親戚尚未見媒官當奈何過時誰問訪生世就蹉跎豈不有配偶市里或山阿豈不有奉養舂饎與機梭列女不得傳樂府無人歌容華日衰落涕泣坐滂沱富貴易脩飾貧賤多笑呵柳下無仲尼小官終滅磨進退在勇决遲疑兩皆蹉退當事竒偉夙駕追雄軻進當取勢位健筆為干戈胡然守一節獨自埋随和江亭醉後平生尚倜儻壯大苦摧折主人能結納佳境為鋪設渺㵿東江來谽谺暮雲裂倡女稍多藝市酒且供啜俠氣復何聊心朋幸相悅解冠從放蕩大呼誰輓掣咄哉千里足嗟乎三寸舌海物喚龍取天葩令鬼折艶唱聲非雅戯談理當譎帷房笑私昵閭巷嘲𤨏屑更皷莫催睡夜風纔去熱俗士鮮大志于今重小節内行豕在泥外貌犬伏紲吾儕古豪傑方寸浴日月被謗肯自疑為歡顧猶拙放飯彼不慙使我無齒决寄章友直人生何足貴貴在天資秀譬如沙石間金玉豈常有有才不善用多為淫邪誘嗟哉棟梁材往往厄樵手章子吾不識美在衆人口如何材藝多四十無所守所守者何為非貴亦非富古今聖與賢歴歴垂星斗景行苟有成進退無一繆不能攻天下尚可名身後百年随飄風白髪勇未鬭良時且不反飲恨唯尸柩無謂學巳足大海難掬潄無謂過可文希珍尚磨垢智者當自知既往誠何咎西子蒙不潔見者掩鼻走惡人幸齋戒上帝必孚祐相如竊妻逃犢鼻從沽酒一朝賦上林在漢為稱首努力念前哲吾言非子詬中春苦雨書懐春秋書大雨三日巳為霖如何方春時終月常積隂淙空若泉瀉盪地成淵深曽無晝夜别顧恐山嶽沈疑是天上河底漏不可禁傍無女媧石欲補難為針又疑坎宫水陽曜所不臨何等大鬼物戯把北斗斟誰籠三足烏泠卧空桑林勾芒失權柄羞耻啼盈襟枉殺幾樹花恣許泥土浸一作侵或云天有意欲使誅荒淫田穀彼何罪芽頴當森森一粒且漂溺不啻千黄金路絶弔客行餒我一作死憂巢禽風聲怒打屋寒氣獰穿衾况我出山逺久次兹江潯嗟嗟嵗月晩悠悠金玉音無聊但詼笑有得還歌吟莫怪旅愁甚旅人千萬心弋陽縣學北堂見夾竹桃花有感而書暖碧覆晴殷依依近朱欄異類偶相合勁節何能安同時盡妖艶無地容檀欒移根既不可潔心誠為難外貌任春色中心期歳寒正聲尚可聽誰是伶倫官孤懐智者在不惑君子貴知幾彼昏有耳目無能辨是非蜀犬盡鳴吠羲輪自光輝古人不可作垂涕沾吾衣讀韓文公駑驥篇因廣其説主人渇良馬僕夫念駑駘行遲追易及力少牽易來時聞千里足百箭攅其懐主人雖欲買衆口大悠哉送陳次公茂材俗人無心胷貴偽不貴誠口吻當文學犇走成名聲之子出蒿萊行潔業且精中美未外發樸質亡華英持此嚮廣衆詎免笑與憎况復覔薦舉路險豈易行所願天命泰因之主者明牙絃一皷時鍾子耳必傾蝦蟆蝦蟆爾奚為閤閤攪人耳在官不為去聲官在私無私事徒将一寸口日夜相鳴吠豈能劖語言且欲譟夢寐何者孔稚珪愛之如鼓吹誰論正與淫各自有知已惜鷄詩曩予家居見鷄有異者為之動心甞欲作詩而不果戊寅夏五月學于山中乃追賦之曰吾家有雞母乗春數子生生來踰六旬互覺羽翼成其母且再卵逐之使離散衆雛既不來一子獨戀戀戀戀不肯離逐之終不移母行無險易唧唧相追随卵生亦云足母伏窠中宿厥子苦無依攀背如悲哭窠中母所安忍渇復忘餐子於背上卧不捨須臾間我時見之喜異類能如此因欲觀其終其終諒何似一朝大長成乃知牝牡情膨脝娠在腹漸見東西行行行求飲食欲以助生息卵出子還多養子何勞役朝啄荆草林暮爪汙泥深昔時随母意今作愛雛心雛生誠可愛母老寧忍背物性乃不常使人心歎慨物類本無知無知孰責之斯鷄與衆異酷似有天資天資以仁孝變更何太早况彼本無知血毛安足道萬物靈者人孰不念其親少艾與妻子所以奪吾真五十慕父母虞舜稱稽古埋子得黄金邇來唯郭巨古人往莫追言之淚沾衣斯言足自警題作惜鷄詩日出吟日出百鳥喜羇人嬾舉眸長恨年光緩禄養未可求若至年光過高堂又白頭羲和君有知奈我心悠悠聞女子瘧疾偶書二十四韻寄示昨日家人來言汝苦寒熱想由卑濕地頗失飲食節脾官驕不治氣馬癡如絏乃致四體煩故當雙日發江南此疾多理不憂顛越顧汝僅毁齒何力禁喘噎寄書詰醫師有藥且嚼啜方經固靈應病根終翦滅但恐祟所為甞聞里中説兹地有罔兩乗時相罥結嗟哉鬼無知何於我為孽我本重脩飾胷中掬氷雪禍淫雖甚苛無所可挑抉疑是饕餮魂私求盤椀設盡室唯琴書何路致葷血無錢顧越巫刀劍百斬决徒恣彼昏邪公然敢抄撮吾聞上帝靈網目匪疎缺行當悉追捕汝苦旦夕歇慈愛早有加憶念今逾切塵勞差可畏歸計又云輟所生能劬勞祖母矧聰哲羸卧縱未蘇撫視諒非拙勉勉多自安風來信勿絶讀史子長漢良史筆鋒頗雄剛惜哉聞道寡氣志苦不常心如蟲絲輕随風東西揚一事若可喜不顧道所長公言絀原憲俠賊乃為良仁義謂足羞貨殖比君王黄老先六經斯言固猖狂吁嗟夫子沒兩觀無刑章予懐班孟堅駮議何洋洋傳與後世人慎思其否臧和育王十二題筠州楊屯田以僧常坦詩俾予和之題之義坦自有解金沙池遥聞金在沙知是虚名號世人方競奢何兹有遺寶佛迹峯佛迹空在兹佛心無處所尋迹以求之似學邯鄲歩七佛石萬物雖散殊孰非道之體何必石岩岩方疑金色臂袈裟石梵教一來東羣心日歸向土石至無情也作披緇狀明月臺月色固無改臺基亦不壊嗟哉翫月人古來誰更在石屏風形模皆自然樹立豈人力松影與秋光掃成真水墨靈鰻井田苖自枯槁井鰻人所禱若教龍有靈此魚何足道供奉泉璘師鑿此泉晨夕奉親老因知達者心豈甞離孝道育王塔甞聞有為法佛説如夢幻胡然窣堵波香花耀凡眼八角殿晉後千百年茲殿儼如昔梵宇若皆然應須省民力晉年松典午既陵夷羣材共淪謝唯有靑靑松于今被王化重臺蓮長疑佛界中天女來行樂為怕山風寒仙衣盡津忍重著美女篇繁霜毒春木花開苦不早愚夫擇利婚美女貧中老曷不冶顔色門前車馬道閨房有禮文自衒誰言好俗態競朱粉古心慕蘋藻所期君子恩卒以慰枯槁苦熱夜熒熒背明燈黯黯垂疎帷階庭豈不好蚊蟲苦相期壊扇無清風暗樹多斜枝屈指山泉侣寂寥空所思丐僧靡靡歩康衢喋喋問流俗誰将今日財願易來世福休論身善惡佛眼重金玉閔俗君門若無禄陳編孰能讀公庭若無法穢徳誰不足煦煦儒者言沈沈小人腹傷心勿復道拂絃寄淸曲感歎二首世常羞貧賤貧賤非我羞道成不見取貧賤誰之由陛楯擁堯舜廊廟居伊周面對豈無説咫尺路阻脩浮雲闗太虚白日光逆流嗟爾臨人者蔽賢天所仇又得志萬罪消失志百醜生誰云王路寛枯槁不敢行出言到口角縮舌悔恨并自省猶若此况乃蚩蚩氓故知當今賢未有非簮纓寄鄰父離山闕歸期滯蹤如在獄他門一臠炙賤子萬端辱吟憶圃花盡夢知原麥熟公言富貴遲何似耕穫速竹齋題事低齋結空野小竹移孤林齋閒竹淨好日媚幽人心南方夏厭暑獨此留殘隂戞雨挫促夢穿風搜涼襟長茵展麗蘚亂歌奏歡禽侍奴裹村服語客抛塵簮志髙成利讐思爽生詩淫值聖喜盈巻感古悲入琴山迎穏履逺月勸澄杯深榮名雖未染幸亦非堙沈贈黃秀才别朝閨入有籍疏逺難見君世眼不識道貧賤無髙文蘭蕙生同草鴻鵠心在雲贈子喜别離兒女安得聞雨中作羣隂侮陽徳雨陣春嘈嘈白曉慘成夜瓦口生飛濤凝雲列山韒冷氣攅衣刀徑閙有松竹庭卧唯蓬蒿花淫得罪隕鸎辯知時逃隰苖出水短木菌随日髙㣲吟雅於樂快飲甘如膏朱曦待未見天盖空牢牢獨居苔根跨階發白雨滿四簷春眠嬾下枕日午誰開簾浮塵裹酒榼餒蟲鏤書籖榮樂豈不欲非義固所嫌閔雨詩吳江之南是曰豐國五種之生天下食一歳不登吾民菜色如何天不仁縱彼旱孽稱其神矯矯赤龍推火軒來自東南山咸池愞水不敢沃陽侯失色愁烹煎况兹畎畝流涓涓何足吸之唇齒間但見禾與黍蓬勃紅塵起土伯勑其屬掃路迎飢鬼哀哉氓蚩蚩託身釡鬲惟蒸炊小人怨咨君子知天生天殺今其時我聞皇穹大徳在生育愛養萬物同嬰兒産民之身賦民食中道絶之何所為當時㝠㝠間委任非其宜山川之神各守土羣龍受位司天池上帝當軒親戒勑十日一雨無愆期帝心仁且信臨下固不疑謂言庶事有分職屏去視聽思無為安知愚下鬼負徳孤恩難制指㺯天之權侮人命貪嗜牛羊邀祭祀忽焉一物不稱情因教此旱灾生靈雷霆之官畏罪莫敢諫頭枕天皷眠不醒帝在紫微垣下隔千里雲徒勞銜血向空哭帝心雖聖安得聞北斗侍帝側斡運氣母均四時五星暨衆宿照曜亡偏私夫何容此鬼恣行胷臆輕天威定是機務繁耳目有所遺小臣亦何者草莽負竒節欲係神頸無長繩欲斬龍頭劒鋒缺皇穹如未察凶邪空使小臣心鬱結訪周道士豈無飲食奉歡樂亦有賔客相追逰宿酲在枕或時起俗話入耳令人羞偶随賢友訪仙子一臨花檻斟瓷甌塵埃何處是浮世松竹此地長清秋古來擾擾富且貴天下茫茫公與侯盖棺事了何足數乗興嘯傲真良籌甘露亭詩乾坤父母莫匪慈胚胎億兆成角羈其間哺乳不及處有時泣殺呱呱兒南川上游號沃野景祐丙子甞凶饑新田始苖舊穀罄十室八九無晨炊伏隂何者不仁甚釀作水灾來助之煙煤刷天雨汁黑嘔山泄谷爭奔馳横流一夜打城郭萬弩竊發穿毛皮東隅有洲尸揖揖如蟻欲走遭水圍屋根無力樹腰折蛟蜃食人猶擇肥濤波一望萬山阻六親不得相扶持國子劉公好仁者惟時假守茲軍麾民生在我不在命告舟往救無敢違童兒赤立婦女困載之刳木何纍纍泥沙外冷内飢渇口噤不語如狂癡牽攣坐卧滿府舍賦以酒飲加饘糜随流往往亦不死逺在百里無人知捐金購得問姓氏召使親族携之歸司農倉廩盡發出不待奏報先施為有餘况可補不足大賈蓄家如響随來瞻去察夜繼晝赤熱不忍䕃華榱由斯一郡十萬户餓膚日月生膏脂存者相保沒者𦵏唐虞仁壽重敺躋聖主養賢賢養物氣和郁郁通髙卑城西老宫古松徑一朝墜露甘如飴千柯萬葉結不解玉階瓊樹光離離甿俗奔走競觀覩手攀口吮同齎咨學老之人周氏子好善不類黄冠師欲令事迹絢久逺築亭其地髙巍巍公之歸朝不可借松樹至今猶未衰我作此詩掲亭上他年堕淚如羊碑送丘寺丞嗟予兀兀何施為學無異意唯傳師甞言先聖所述作人事而巳無他岐安知歩歩有天道繄我丘師能識之春秋下應三千歳雅頌周流十二支闡幽大傳與隠㫖圖冩轉匝成圎規勞兄示我復教我一字不曉如癡兒文侯聽樂唯恐卧今我幸免指目皮丘明子夏言不及我兄所得何神竒直疑前身是顔子獨受師説無人知又疑夢寐感靈怪常與周孔相追随不然悠悠千載後何傳何習遽如斯窮愁著書古有例昨官閩中今海涯海涯路逺學者少斯道未有施行時聖皇誅賞甚明白歸來奏牘無遲遲江南臈雪片如掌酒花上面寒力衰是非得失從此止馬頭一别東西馳答縁槩師見示草書千字文并名公所贈詩序佛繇西域漸中土欲使羣心皆鼔舞若顓梵語及梵書昧者雖從明孰與其徒往往多材能暗結時賢為外助逺公自昔來廬山誇逞蓮花邀社侣吁嗟君子遭亂邦舍此未知何處去邇來一行善記覽齧破乾坤尋厯數或攻文苑掠芬香辭則貫休筆懷素其餘曲藝與小詩布在人間難悉數賢豪大抵多憐才引致門牆無齟齬其人既重法亦尊羽翼大成根本固我縁山谷見不逺緇褐憧憧盡愚魯坐量此去朋黨衰纎縞焉能拒強弩去年有使自番陽手藉一函來我所發函乃是縁槩書千字滿前雲縷縷衆人飽食已用心欲噍伯英肥美處當時名士嘉其能長序短篇聫繡組因思幅員千萬里如師之能更幾許以儒輔釋日益多何恤區區一韓愈春社詞并序寶元二年甞夢大雨震所居室驚而仆地既已有一人甚長大紫衣而冠意謂雷之神也呼覯使前授之題曰春社詞詞或作篇字不能審覯懼栗栗援筆得八句與之及覺尚記其首三句頗怪麗今七年矣值暇日以五句足之呉臺翫春鎖春色雨刷花光入龍國田邊大樹啼老鴉野雲癡醉寒查牙年華欲住風雷惡蘭臉知秋淚先落時榮時謝無了時扶起混沌須神醫聞訓狐昔年因讀昌黎文知有訓狐猶未真客堂昨夜滅燭後一聲竊發誠驚人慈母入席匪虚語據此麄暴誰敢聞殺人之子養爾子天地不管胡為仁豈無鷹隼善搏擊去路昏黑難相親亦有弓矢可彈射郤恐誤中東西鄰我今獨處雖無懼聒不得睡寧不嗔甞聞鳳凰百鳥君丹穴萬里誰能言行當整頓九韶樂奉迎綷羽掀重雲直前再拜列爾罪爾軀何足為灰塵聞喜鵲翩翩者鵲何品流羽毛白黑林之幽生平智力可料度有巢往往輸鳴鳩天然郤㑹報人喜愚兒㓜婦唯爾求萬聲千噪幾曽驗聞者終是軒眉頭從來烏鳥愛反哺孝慈情性誰可儔其間於事最先見告人凶禍令人憂憂時不肯自脩飾禱請神鬼爭啾啾告之愈驗愈見惡去聲共云灾患鵶之由彈丸瓦石相驅逐名園佳樹難依投忠言逆耳世罕用屬鏤曾割伍員喉莫笑後來司馬公事事稱好真良謀解湯延祖字仲尼作經授曾子明稽至孝之終始始於事親終立身以是揚名於後世大雅有言念爾祖述脩其徳乃為美聖訓昭昭十八章冩之琬琰千餘歳湯生本由義方教石磨沙盪求成器其名延祖有意哉吾以子立為之字立身之道将何如非曰凡人富與貴不賢而位何能為蠅蟲豈不披紅紫周公亦人舜亦人口銜日月坐天際勗哉見善勿遲疑往往後生誠可畏旴江集巻三十五欽定四庫全書旴江集巻三十六宋李覯撰近體五言二韻詠竹外邊雖節目内裏郤空虚從來汗流浹只為寫經書霜夜落無人見朝看到處新非君有分别力不柰松筠氷水性本來弱漸寒成此堅東風有時到㡬日是殘年鵞逸少曾留翫人因喚右軍鳥名加爵號不離羽毛羣鴨庶人常用贄貴在不飛遷飽食待庖宰虚教兩翅全惜才醜婦易為潔愚兒多守純天将惡文采萬物恐無春五言四韻山舍寓止無計奈踈拙走逃雲水隈鶴飢雖厭夜龍睡却嫌雷師友關千古窮通付一杯商巖版築者底處有梯媒東巖精舍像設彼何時髙僧白衲衣水寒吞日氣樹老慣霜威幡影捎天近鐘聲落谷微可憐成道易無事即無機閒夜披衣坐小亭夜氣拂人清月暗先成暈蟲吟不識名舉杯期混沌開巻賞莖英此興知誰㑹松風鶴睡驚霧光眀人所好幽暗此何為樹在谿無影禽来鶻未知愛花留潤與避日巻隂移底事偏相惱天涯欲望時自詠俗態共紛紛吾心誰與論㡬因清夜夢還見古人魂聖域寧無樂文家别有尊此身聊自足獨恐累兒孫睡思俗語不入耳旅愁還到心坐多渾易厭夢好欲重尋暴雨撩蓬響殘陽過嶺隂迴看奔競苦此興貴南金秋熱江湖限南鄙秋令到還稀節換空看厯人閒未趁衣齊紈方得意厦燕莫言歸秪有松筠徑風髙暑氣微鑑湖夜泛以明月到樽前為發句明月到樽前拏舟古岸邉亂山斜入霧逺水倒垂天酒氣薰龍戲歌聲弄鶴眠迴頭嗤李郭此外更無仙池亭小酌得和字客思都無著臨池一醉歌喚春呈物象移性入天和月影碎荆玉波紋緯蜀羅相看盡仙骨俗態巳無多迴胡舜元賦稿一把長篇讀驚嗟即過旬誰知後来者還似老成人古訓但時習英辭當日新慙無稱薦力空此見天麟逥黄通詩篇老杜没巳久嗟哉吾子心時人任詬病獨自革浮淫美玉寧須琢朱絃豈在音鍾期如未見慎勿等閒吟送路拯北遊六月地欲赤驅車河朔行王師備戎狄㳺子念功名盡識山川險深窮彼我情歸來具封奏直上請長纓感事太平無武備一動未能安廟筭何時勝人生到處難役頻農力耗賦重女工寒秪有旴江守憐民不愛官時國子慎博士守本郡閒居無物可勞情空郊日閉扃雨吟春破碎貧飲客凋零世事重江險才名一夢醒同心秪松栢見我尚青青萍盡日看流萍誰原造化情可憐無用物偏解及時生泥滓根萌淺風波性質輕晩来堆岸曲猶得䕶蛙鳴送張鬷嘏人意皆懐土嗟君無故園欲行須盡室此去又他門静裏文章好貧来節行存振淹知有日倚伏豈虚言村行産業家家壊誅求嵗嵗新平時不為備執事彼何人朱户仍奢侈柴門轉窶貧若非衢室畔無用說悲辛感懐寄擇之衆人皆銳進唯我復幽居慮逺夢多亂身閒氣不舒干求非禄位好尚豈詩書日夜又日夜霜寒鬢髪疎雞嗟爾羽蟲類昂然冠距麄徒為識昏曉猶未免庖厨年少苦令鬪主人頻見呼寧思避弋者天外去鴻孤堂西夜坐炎蒸得避處鋪席對西牆有月樹隂黒無風山氣凉聚蚊妨袒裼飲井當壺觴妻子詎知我笑言皆在傍寄題陳適追養亭築室先塋下哀心有所歸每来開户牖渾似戀庭闈丘木成風樹衰裳換綵衣吾生與君類東望涕交揮送宜黄栁尉荒郊人事絶歡喜見時髦舊業椽為筆新官草染袍幽明終考績州縣豈徒勞况有松筠性凌寒節更髙送君俞之子来相問吾言豈不誠文章難得理聲律易求名貧甚須清節親安莫逺行異時如有立宗族亦知榮送黄祕丞天下為人子何人似慶門二親皆白首同日拜皇恩就養蘭生畹娛賔酒滿樽自嗟偏侍早相送只銷魂寄題廖說䝉亭聖人雖在上君子有窮時自得山居樂何須世俗知夜多松月分凉與水風期只恐亨通去清閒却付誰晏起貧士無所務閒眠常起遲謾勞雞口喚不奈睡魔欺宿酒猶薰腦朝飢未到脾誰能空汲汲肉食自謀惟養疾少小唯貪酒病来纔信醫問方逋客許尋藥野人疑夜𢷬全聽慣寒煎覺沸遲古賢曾愛死此意亦誰知逺山最能牽病眼天際一山横盡日是秋色無人知地名暗時雲自合缺處路應平才子霑衣淚千秋共此情送吳伯華典學淡無味畏塗来㡬程舉家應好事努力為求名馨膳南陔逺連環昨夢驚夀觴何以薦經術抵金籝次韻陳殿丞除夜感懷浮世因循過流年次第新迴思舊来事都似夢中人不飲偏嫌雪多愁却怕春星魁欲寅位五鼓莫頻頻早歸病馬不妨騎出門常便歸見人無事說是物與心違通塞元關命驅馳轉覺非莫教塵裏汗壊郤篋中衣晩聞角傾耳斜陽裏無聊拭淚頻平生慣聞處今日自愁人夜近歇不久風来聽得真胡笳更何物只此已傷神庭樹不是栽培力誰容此處生細聲饒客睡斜影與鄰清地窄根猶迸秋遲葉未驚虞人雖欲伐郤怕損簷楹哭女二首妻死女巳病踰年成二喪此生誰骨肉未識好衣裳看面雖猶小聞言盡可傷最知憐祖母句句刮人腸又老樹枝葉薄先秋風雨過人間不善事身外想無多理遣誠如幻悲来豈奈何從前短鬢髪為爾漸雙皤贈端師十載寓都城人傳善相名一言知禍福相識盡公卿洪井舊鄉路紫衣歸計榮塵縁應漸了何日悟無生寄題鄒氏延夀亭一世躋仁夀君今更欲延山中想無事分外得長年松老多經雪雲閒不到天區區殉名者囘首倍凄然感秋徙倚重咨嗟非縁惜嵗華關山異鄉客砧杵别人家天冷雲􅅤日谿清水獻沙屈魂終不返悲思更無涯次韻答陳殿丞不能隨薄俗非是向深山自喜道無屈所嗟心未閒酒鄉貧更入詩債病猶還一字成虛美通宵只厚顔讀趙氏淳化詩集少年曽誦習誤認古人詩風雅世不重姓名誰得知髙情如隱者薄宦過明時地下尋才鬼應逢陸與皮小女惜汝今何恃言来淚滿襟死生雖分定襁褓累人心飢買鄰家乳寒勞祖母針豈知泉路隔時撥繐帷尋送呉著好學誠雖篤事親心不忘秋風滿黄葉歸路正重陽力行宜無改脩辭况有方起家知可望蘭秀自聞香題靈陽宫費君投杖處行客過彷徨水面風雷散沙頭草木荒一壺誰世界千古共凄凉大塊偏勞我燒丹未有方龜峯精舍去縣二十里路平時正春四山唯有石一寺更無塵融結疑天意經營憶古人但知安樂處何必是金身鳴蜩雨餘雲漏日蟲思巳喧喧時節驚初夏聲音似故園為誰吟緑野相共送黄昏便是秋来信霜髯更㡬根送張評事江上楚花鮮君行一黯然居官無藉手選部豈知賢亷善雖由巳亨通亦在天都人如問我疎嬾甚當年送春送爾歸天去天應觧禍淫物生誰得所我見獨傷心楚詞有目極千里傷春心之句好景吟来徧芳樽醉不禁東風别無用百草巳成林君賜以新詩相示因成四十字答之君詩三十首一一敵琅玕語近終非俗情閒不似官姑山蟠郡碧旴水蘸天寒景物將才思相期李杜壇送李侍禁三載旴江上軍和盗亦殱事煩終不倦貧極始知亷别袖揮寒日歸舟載夜蟾懋功宜有賞天意在官占寄周寺丞我愛南豐宰天資舉措竒上官如不怒善政有誰知賦役貧中減鞭笞惡處施邑人多未悟去後始應思次韻閻判官除夜宻雪穿忩入孤燈向壁光老來人不覺夢斷酒猶香世事休思慮年華任短長朽株難長育空此見春陽送閻判官鄉樹江淮接軍籌嵗月深從公雖盡力當路少知音賦命休重問離觴且滿斟君言鵬與鷃何者是飛沈送彭昱應舉計偕千百數太半是虗名近日逢吾子中心歎筆精衆人皆禄位所貴在誠明努力唐虞際期於大有成送黄銑應舉先世宦不達少年才巳雄何人為父執獨自振家風物色營求廣賔興禮數隆孤寒今有望太守漢呉公夏日郊園三徑是生涯朋游日巳賖野情饒皓鶴寒氣入甘𤓰移竹調風韻疏泉浴月華塵埃應附勢不肯到貧家寄黄晞長憶黄夫子才髙行亦淳世情輕近事見慣即常人何力康時務將身役路塵七閩山水國是處好安貧送黄介夫短亭車馬地送子一盤桓不畏離羣久所嗟行路難曬衣雲日薄撲面水風酸聖有中庸訓時時著意看送山甫喜爾年將壯為儒志可嘉鄉閭知行實場屋見辭華公道方無壅君門况不遐直應千里足世世出吾家送沈郎中偽飾久終變眞誠老益純官為郎位貴家似舊時貧去作吾民福歸尋楚水濵他年名粗立林下願相親送江茂才少小尚英奇髙談與衆違乆窮纔信命逺客合思歸簞食非無樂京塵誤入衣雲山仍舊好况是覲庭闈贈端上人佛法本無二誰論律與禪水行到處入月出有時圓事去何嘗念忙中不廢眠松堂白日永幡影自飄然千福寺昧軒何人指䝉昧題作此軒名天理自晝夜道心無晦明用當羣物化舍去一毛輕磊磊山前寺時聞鐘磬聲怡山長慶寺行行金碧裏氣象怳如春不記来時路自嫌衣上塵院香知有佛僧静似無人十載京華夢相逢一欠申傅翼甘圃老圃君何學中心切養親從来啜菽處便作采蘭人百行當無愧三牲未足珍孝亷方察舉勉勉詎長貧林屯田思軒慮逺無如静兹軒得地幽一官雖智效萬仭更心㳺風月趨吟筆乾坤入坐籌延英期上對豈是為身謀回明上人詩巻學佛有餘力吟詩過一生情閒氣燄少句好琢磨成栢竹門庭古氷霜筆硯清輸他飽食者終日自無營聽周大師琴已解琴中意更加絃上聲他人鄭衛雜此手鬼神驚深夜衆籟息寒天孤月明四鄰應得睡濁酒且同傾送覺師西㳺乞御書累聖多材藝㽞神翰墨間皇墳非小道玉版徧藏山上士持三學西行謁九闗奎華如可捧歸伴白雲閒送分司吴太博還鄉休官衆未許分政且歸閩名係金閨彦身為蕙帳人林泉新得主冠履漸無塵知足應常足安能更問津送任大中真偽少分别吁嗟此世情西施作老婢南郭逞新聲命合生来困詩應沒後名旅㳺何所得赤日又徒行送杜奉職青紫皆同道稀曾到薜蘿感君非我軰無事每来過此别當貧病何年共醉歌人生有後㑹争奈鬢雙皤送陽曲蔡尉鳯皇貴在徳孔翠豈無文詩禮多承訓賢能逈出羣談清蛻塵滓志大躡􅃄雲更喜并州牧豪英天下聞送武陵令之子當為邑吾朝信擇人位卑難立事任重合憂民槃瓠多遺種桃源即近鄰登臨如有見才思日應新送酸棗鄧主簿畿縣官雖小京華日可親文章成薄俗交結最難人典學應無廢存誠况已純邦工尋尺用杞梓詎沉淪送仙遊知縣許延評䇿名曽未㡬奮迅出埃塵陋巷濳心久亨衢得意新君恩方責報民業近多貧莫學悠悠者謀身不為人送杜寺丞知永城薦表同時入天衢自此通弦歌新邑宰清白舊家風官舍隋河北離觴華谷東朂哉松柏操咫尺是堯聰回廖觧元所業昔者聞鄉舉良田恐甚蕪于今觀日益珍樹已垂珠衆惡吾雖察謙卑孰敢踰聖賢明訓在只此是亨衢送張寺丞三載居鄰縣得聞金玉音路遥相見少道合受知深已矣𤓰時戍悠哉魏闕心歸舟望不及白日隱寒林送何秘丞呉人作蜀官萬里泝驚湍地俗雖云異民情想一般智明終戒察政惠不須寛前史多循吏乗閒更熟看送劍州張掾名在鄉書久㤙由父任優從今紹清白即此是箕裘交結多良士經過半舊㳺舉知應有望鴻翼佇横秋送演教大師東遊野客相知久年来髪漸華衣冠從異教言行似儒家通塞随天命遨逰徧海涯武夷應有㑹好去醉流霞寄贈福山長老時世重因循師何獨苦辛潔齋徒衆散剛直里閭嗔㳺藝能濟物舊交多雅人雲山雖好住住久轉勞神五言六韻書樓夏晚地僻無他管樓危有剰凉逺流通越𣲖殘日共秦光鳥道頑雲黑人家病葉黄髙情夢箕潁閒景畫瀟湘山藥香多桂漁歌濁少商太平知可喜何者是簮裳小杉小杉髙文餘體直立還孤任過千年雪應無一莭枯鬼狂從髮解龍長怕鱗麄怪狀春寧笑清聲月所娯地終存古氣景合在仙圖不作明堂用良工莫厚誣乾元節羣臣祝夀小人無位以詩繼之帝命當敷佑民生有厥初千秋唐節日萬國禹朝車韶美笙鏞外需亨飲食餘神仙似姑射夢想即華胥嘉㑹誠難得愚忠敢自疎古人誰最夀無逸在周書悶書行行四月晦絺綌未能裁天氣疑無定春寒恐再来襲衣從汗浹交扇取風回野秀深成黒鑪薰冷作媒年髙情巳淡俗薄意多猜李杜今何在芳樽誰與開同徐殿丞遊麻姑山陳屯田聞之以詩見寄次韻第一首良友嗟塵網相期物外遊求珠非赤水不死是丹丘机上麟交擗樽中蟻亂浮仙家一度醉人世㡬千秋藥氣多留鼎茶香細出甌堯人方曠蕩容易學巢由五言八韻送李著作知栁州到官十五月太半在他邦恵術未施一公心無與雙剖符新使粤盡室始浮江地理將分嶺行程即下瀧旅愁侵酒座秋色漏船窓屬吏誰非懾羣蠻不易降人稀財豈厚俗異性多惷自此觀賢業洪鐘且試撞五言十韻送知縣蘇秘丞移英州大邑曰南城唯君治道行何曾設鉤距到底是聰明鼎在神姦伏鷹来鳥雀驚詐窮多自笑刑重亦知平府史如亷士農桑學頌聲在官嗟不久丕績已垂成嶺路當過庾州圗喜得英逺人天與幸弊俗日將清逰刃非無地搏風别有程上心應寤寐彛器待書名夏日雨中一雨遂不止我行當此窮蜀東天亦漏堯後水猶洪大㸃有片重宻濛無寸空曉唯壺箭覺暖似炭爐通書筆提梅洗征衣擘潤烘簾間稀去燕枕下即鳴蟲竹粉千腰白桃皮半頰紅物華嬌自衒天意猛相攻酒退愁城外吟興憤涌中遣誰咨畢宿留作旱時功七言二韻鄉思人言落日是天涯望極天涯不見家已恨碧山相阻隔碧山還被暮雲遮少年新翻曲調恐人傳不許髙聲唱玳筵金獸也嫌春態淺向風噴作緑楊烟自勉月欲東生日又西莫隨兒女醉明時黄泉一向埋愚鬼不與人間史筆知戲題玉臺集江右君臣筆力雄一言宫體便移風始知姬旦無才思秪把豳詩詠女功讀皮襲美病中書事詩有可憐眞宰意偏解困吾曹之句偶代答之刺虎屠龍古有名事於難處迭相矜要知真宰争功意困得英雄始是能雪中見梅花二首品物由来貌取難共言花卉易凋殘寧知姑射氷肌侣也學松筠耐嵗寒數枝斜出短墻隂宻雪無端苦見侵天意似憐羣木妬盡教枯朽作瑶林和慎使君出城見梅花化工呈巧異尋常鏤月裁雲費刃芒莫恠使君曽立馬染衣渾似有天香雪中贈栁枝暖氣来時栁眼新一塲氷雪更愁人要知真宰無誠信取次東風未是春栁枝答春早寒餘豈足哀平生多難愧非材去年二月都城裏曾共花房帶雪来慶歴二年二月五日京師大雪和天慶觀瑞香花聞説仙花玉染紅别㽞春色在壺中瑶臺若見飛瓊面不與人間夢寐同烏鵲烏鵲翩翩競羽毛南飛無樹過良宵就中管得他人事秪與天孫倩作橋方平五百餘年别恨多東征重得見青娥擗麟始擬窮歡樂不奈閒人背癢何璧月璧月迢迢出暮山素娥心事問應難世間最解悲圎缺秪有方諸淚不乾睡起簟巻鱗紋帳繫紗六龍西降樹隂斜秪應夢裏成胡蝶猶記南園數種花讀長恨辭二首玉輦迢迢别紫臺繫環衣畔忽興哀臨卭謾道蓬山好争奈人間有馬嵬蜀道如天夜雨滛亂鈴聲裏倍霑襟當時更有軍中死自是君王不動心羿妻有窮兵死為㳺畋惆悵佳人獨上仙試問單棲與同穴可能雲漢勝重泉梁帝凝旒南面總虚名廟祀何曽暫割牲但學禪心能忍辱莫羞侯景䧟臺城鞦韆二首華郭春光欲暮時綵繩争蹴夜忘歸佳人不道羅紈重擬共楊花苦鬭飛風静髙標埋暗霧月眀孤影落澄波狂心擬逐㳺童上無奈春醪足困何嘲漢武甲帳居神本妄言露盤猶在國東遷欲知千載金人淚為恥君王不得仙戚夫人百子池頭一曲春君恩和淚落埃塵當時應恨秦皇帝不殺南山皓首人有感官家的的要寛征古時什一今更輕州縣酷嫌民漸富㡬多率斂是無名白刃刼君君勿言人生禍難俱由天君家嵗計能多少未了官軍一飯錢庭下縲囚何忿争刀筆少年初醉醒黄金滿把未囘眼笑殺迂儒欲措刑自遣富貴浮雲畢竟空大都仁義最無窮一千八百周時國誰及顔回陋巷中睡思睡魔氣勢重千鈞壓倒心閒食飽人莫笑坐間常似醉當年滿腹是精神遊寺醉歸却寄同坐江村古寺偶閒行一飲全疑酒有靈水底屈原應大笑我今獨醉衆人醒索酒不醉多愁醉多病㡬囘愛酒又停杯死生若是有天命莫放愁来任病来憶錢塘江昔年乗醉舉歸帆隠隠前山日半銜好是滿江涵返照水仙齊著淡紅衫謝傳神平上人蕞陋徒煩妙筆傳呼兒㸔了獨凄然丹青不解随人老相似都来得㡬年次韻答提刑孫都官二首病樹難隨萬木榮閉門終日自愁縈繡衣使者知何取肯向民間問死生眞賞由来世上稀㡬人相見不相知如今一字成華衮豈識龍章與鳳姿謝知縣徐殿丞示及新詩當時子賤好援琴千載誰傳治世音珍重南城多暇日盡將風化入清吟送流人人情自古怕遷移更去南方路險􅇖從此異鄉誰是侣只應明月解相隨送周山人鬼事無形尚可疑人倫有驗衆皆知武夷山路㡬百里歸去西風落葉時遣興境入東南處處清不因辭客不傳名屈平豈要江山助郤是江山遇屈平詠桃方朔相逢阿母家别来㡬度換年華春風合是教伊笑開盡無名草木花閏正月三日偶書二首一歩寒郊一惨眉望春春色苦来遲東君未必私桃李只恐梅花謝有時無頼年年逐酒徒今年不飲興何如醉鄉若有人名籍但願春風㸃檢疎論文二首今人徃徃號能文意熟辭陳未足云若見江魚須慟哭腹中曽有屈原墳天寶年中事事新長安還有謫仙人騎鯨去後無尋處輸與勾芒自管春送僧遊廬山行非為客住非家此去廬山况不遐要見南朝舊人物池中唯有白蓮花李郭元禮禍成鉤黨後林宗身免閉門時死非不智生非怯同室鄉鄰各有宜戯題荷花昔人詩筆說蓮花不嫁春風早可嗟今日倚欄添懊惱池臺多是屬僧家戯贈月夢中識路亦何為古詩有夢中不識路之句恰要逢人巳自迷一月解行天一匝嫦娥猶未免單棲葛陂懐古按費長房傳葛陂當在汶南今信州弋陽有之未明其故長房化去巳千年鬼魅紛紛不畏天老鼈若来為太守何人殺向葛陂邉七夕二首無奈家家乞巧何豈知天上拙人多喚他烏鵲辛勤殺纔得扶舁渡淺河一年一度暫和諧幽閉生心亦可猜莫道乗槎無徑路支機曽屬客星来宗人宅折桂堂從来皎月印長空桂樹遥看影在中好問素娥多折取莫教閒占水晶宫麻源題壁一到麻源日又曛㡬回欲起郤逡巡世間豈是無山水不奈閒人好聒人馬嵬驛六軍剛要罪楊妃空使君王血淚垂何事國忠誅死後不將林甫更鞭尸齊世家莫以荒淫便責君大都危亂為無臣若教管仲身長在何患夫人更六人漢宫哀平外立國權分只為當時乏嗣君試問莽新誰佐命最應飛燕是元勲景陽宫井以色從人自古然幸逢聖主得穪賢太王姜女来岐下應不相將墮井泉燕雀燕子從来巧語聲主人相愛是常情黄頭老雀何能解飽食官倉過一生繡户珠簾見最頻暖来寒去但安身翟公門下時飛入全勝交情斗頓人張禹漢室尊儒未得真只求學藝不知人君王幸已疑王氐苦把春秋助賊臣孔光王莽欲為先與草董賢將過自迊門省中樹木何閒事却對妻孥不肯言元紀二首孝宣應是不知書便謂先王似豎儒若使周家純任徳親如管蔡忍行誅君道乾剛豈易柔謬牽文義致優游髙皇馬上辛勤得總被儒生斷送休聞鸎纔轉歌喉碧樹枝驚飛還避巧丸兒可憐蜂蝶無言語入徧花房人未知學北堂有海棠一株顔色至佳凋落稍速憶而為詩来時初見滿枝紅璧碎珠沉㡬日中宋玉有鄰誠耐事三年猶在短牆東玉胡蝶花胡蝶生来只愛花春工描様作竒葩莊周有夢何曽覺氷雪肌膚落㡬家次韻答陳殿丞南塘觀魚見寄鱗鬛摧殘㡬許年水平風靜得濳淵喜無美味登君俎且學驪龍盡日眠陳丞以魚在深淵借喻鄙薄故有是答送傅野國學}
