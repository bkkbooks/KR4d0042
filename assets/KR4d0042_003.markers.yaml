  - {type: variant, offset: 126, length: 0, content: '', WYG: 有功白樂天有酒功贊送侯殿直之官吉州待詔何年别玉堂筆端渾欲繼鍾王官資未出風塵外蹤迹曾親日月光扶老只今非逺道薦能從此有封章廬陵若耍高文寫爭得滁州在故鄉滁州歐陽使君廬陵人也偶題饒秀才谿光亭北出城來駐馬蹄君家别館幸臨谿雄虹見雨遏不斷潦水到秋痕漸低萬事熱心成浩歎一樽撩眼怕長迷俗人誰㑹儒生意是處醉吟還日西宗人宅仁知閣江南盡是山水地君子固求仁知名可憐塵土不到眼只有雲泉相伴清人間擾擾知何在日暮悠悠空鬬行明月一欄風一枕醉鄉}
  - {type: page-break, offset: 126, content: '', id: KR4d0042_WYG_037-10b}
  - {type: variant, offset: 127, length: 0, content: '', WYG: 可過浮生早夏偶作閒愁不覺過年光强半精神似醉鄉幾度雨來成惡熱有時雲斷見斜陽古人事業塵空滿故國園林草自長賴得南華憐我病一篇齊物勝醫方匈奴傳漢家經武意如何也信狼心欲偃戈豈是虜庭佳麗少自縁婚禮貨財多女從宗室方掄擇賦出齊民更刮摩若向大臣求姪媵當時誰肯議通和忠武侯齊霸燕强舊有基當年管樂易為竒何如新野羇栖後正值曹公挾帝時指畫二州收漢燼安排八陣與天期才高命短雖無奈猶勝隆中世不知次韻答陳殿丞見寄顛倒江湖二十春干時的是妄庸人先容不肯收蟠木高足無從得要津衆與善名酬苦志莫將吟味養閒身食田飲井知誰力下有驕兒上有親贈韓侍禁閥閲山西舊將家一官淪落向天涯目皮相處應難識髀肉生來只自嗟野囿幾年飢虎豹旱雷何日起龍蛇呉歌楚舞時相慰劍鋏梅乾鐵有花送沈秘校君家龍虎弟兄賢斗酒相逢楚水邊雨露自今榮一命塵埃未免困三年高談欲出稠人右敏政當居俗吏前異日能來見逋客麻姑碧洞古時天寄題錢塘毛氏西湖園昔年曾泛西湖流君今更住西湖頭人生多是未得往地上有天何處求朱樓照影鐘磬曉畫船落手芙蓉秋鯉魚赤鱗應不少待與水仙相伴遊自解人生何苦要多才百慮攢心摘不開夜月幾曾無夢處春風只管送愁來秃毫强㑹悠悠事浮世無過滿滿盃看取秦坑烟焰裏是非同作一抔灰不寐四壁空空絶語聲困來終是睡難成孤燈要與人相背寒漏苦教天不明累月故園無信息幾般閒事惱心情别愁若解生華髮一夕應添一萬莖韓偓集有自撫州往南城縣舟行見拂水薔薇}
