  - {type: variant, offset: 45, length: 0, content: '', WYG: 之吏知而諱之不告于公上故使長惡不悛積小成大蔓草難圖有自來矣鄉亭之吏諱之何也凡今賊發之地必責以賞錢縣尉未下馬耆壯已賣田破人之家前後不少}
  - {type: variant, offset: 46, length: 3, content: 堂偪厥, WYG: 耆壯者懲其若此湏求被刼之人願陪所䘮之物與其賞一二百千孰若陪一二十貫但知惜費豈復畏罪哉賞所以得賊亦所以失賊諱之之謂也然非厚賞則賊不可得矣官不能備必出於民顧當改制耳愚謂莫若鄉置賞社計戸等以斂之命富人以掌之用盡更斂以此為常今夫大鄉或二三千戸小者亦數百戸與其使耆壯三五人出泉孰若使一鄉千百戸同力其數則少其斂則緩既免破家誰肯縱賊五曰茶鹽之禁本非便人經費所須盖不獲已江嶺之交最多鹽賊起而為大害者往往有之矣此本良民但為衣食與商賈何異哉惟其犯禁耳俗吏不明事體武卒又貪賞錢不料形勢多方伺捕彼自以其罪重寧鬭而死幸而不死豈得復為平人哉求活草間固其宜矣愚謂當少緩之百姓日用不可使知姑以用度不足某事某事權住給賞如此則伺捕者宜其縮手犯禁者得以安心苟能加以仁恩亦可錄為死士六曰大抵東南土田美好雖其饑饉之歲亦有豐熟之地比來諸郡各自為謀縱有餘糧不令出境昨見十程之内或一斗米糶五六十價或八九十或一百二三十或二百二三十價雞犬之聲相聞而舟楫不許上下是使賤䖏農不得錢貴䖏人不得食此非計也况於境内又有禁焉止民糴以待官糴是也且賈人在市農人在野糴之則米聚州縣不糴則榖留鄉村徒為日日修城池而不筭其中蓄積亦可笑矣若曰官糴數足然後放民糴俟河之清耳官糴價一定民糴價漸髙難易如何哉愚謂當弛一切之禁聽民自便仍為著令以告後來七曰古之貴者舎征止其身耳今之品官及有䕃子孫當戸差役例皆免之何其優也承平滋乆仕宦寔繁况朝臣之先又在贈典一人通籍則旁及兄弟下至曽孫之子安坐而已比屋多是衣冠素門方係繇役日衰月少朝替夕差為今之民盖亦難矣愚謂三丞以上官及正郎以上子孫若贈官兩省以上自可且從舊制其餘一例給使如此則農夫稍得息肩世胄亦無自惰八曰今之賦稅較古則輕唯諸攤配大為煩費夫攤配之物皆受直于官比之市價不甚相逺然而村民或去州縣一二百里既難裹足且畏後期故有市井之人代幹其事官未得銖兩民已出斤鈞執耒者所以無聊㳺手者所以專利愚謂莫若使諸縣凡有求物則選邑中富而好善者一人委之集事仍須令佐躬行檢校事畢之日計其實所費錢使民償之如此財用可以無枉困窮可以更生九曰今之卒伍餼廪甚厚而人不願為者何也徒見其貧窮耳餼廪厚而貧窮者患在兼并卒伍而可兼并者亦勢之然大凡從軍多是單獨初來營壘未有妻孥居則無屋用則無器於是兼并者得將養女召為贅壻今朝有室明日上綱在路日多住家時少故其一女可當數夫既以家口為名即是衣糧入已嘗見一家養十二三女請五十餘分而所養女日夜紡績與其家作婢耳餼廪歸於他族貧窮切於已身不死則逃非偶然也愚謂莫若使諸州凡招到人官為昏娶及置屋宇什物使得成家然後逺役如此則不唯存恤見兵亦足招延來者十曰今之發解謄録封彌雖曰至公諒非逺慮識平側者昂昂哂笑談王霸者往往退藏寃苦之聲逺近如一愚謂宜復祖宗之法以求郡里之譽凡諸征鎮亦許辟除如此則人望有歸學者知勸原夫之輩得之何補跅弛之士失之可惜飢寒不如兵死寧免生心英雄落我彀中乃為上䇿嗟乎弱甚矣憂至矣非立大竒不足以救愚言雖未竒節下亦無忽勿與儒生言儒生必罪我勿與俗士知俗士且笑人管仲復生商君不死天下乃安矣覯慶厯四年有上樞宻富諫議書一首俄聞富公出使河朔未知其書逹與不逹慶厯六年又有長江賦一首天險難升無路通進今各寫一本去願節下覽之足以知愚心之憂非一日也嗟乎行年四十四矣結髪脩學自謂非常人老大栖栖便是常人耳然昔應制科辱召第一今為試助教雖云冗散猶望朝廷以詞學進之必不於風塵之際以㳺說徼幸節下明察知其無意於酬賞也嘗著周禮致太平論十巻此乃愚心所自憙可以備乙夜之觀者節下幸問焉當獻其藁忉忉之懐未盡於此儻容白帶以見宜有面言不宣覯再拜上蔡學士書日月應茂材異等科李覯謹再拜奉書諫院學士從者伏以王佐之資在言責之地有行下國將歸于朝志義之士靡不欲效肝膽於車下矣覯不肖郡縣之得失軍民之利害非所能知然有事雖似小而患則甚大憤憤於心弗能自已者願一言焉同郡有鄒子房自前年㳺京師去年秋寄書于其家自言因奏封事得恩為齋郎鄉人以其無行也初未甚信及見北來者且問諸邸吏皆曰無之於是鄉人愈疑其詐矣今兹來歸果無禮部補牒獨執御藥院文書一紙以為符驗而沿路郡府僉以衣冠待之本屬轉運不疑其欺又給憑由使興置銀銅坑冶因縁形勢蒙蔽州閭萬目蚩蚩無敢明辨噫可怪也覯竊評之曰以御藥院文書可行耶不可行耶子房已受補牒而不以隨身耶且三者皆可為之切齒也御藥院文書可行則國家之禍耳其不可行或已受補牒而不以隨身皆子房之罪也夫爵人於朝與衆共之示天官之不敢私也况武祖文宗防萌杜漸上設中書樞宻院下分臺省寺監所以夾輔聖政互相關防齋郎雖微然須勑下禮部而後給牒收補今秪欲憑御藥院文字不必朝省指揮則是宦者奪}
