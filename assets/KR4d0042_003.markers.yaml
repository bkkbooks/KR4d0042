  - {type: variant, offset: 3, length: 0, content: '', WYG: 慎公作新亭于軍門之南孟秋告成郡人李覯為記三清殿及麻姑殿記皆是康定年號梓山佛殿記亦云康定二年秋九月則是數記皆作於康定未改元之前也上慎殿丞書蓋慎公釴其時以殿中丞守旴江此書當作於未入京之先上呉舍人王内翰富舍人劉集賢書蓋呉公肅王公堯臣富公弼劉公敞其時皆居朝此書當作於入京之日然是年郡舉先生應茂材異等科有㫖召試故入京上諸公書乂寄祖祕丞無擇詩歴序應科本末則云憂愁經歲是先生留京一年也慶厯二年壬午三十四歲是年先生試制科得召第一長沙蕭注與先生書云昨偕弟英求舉於京師聞足下應賢良預第一召試未有不心思目願欲識其面者秋七月試制科不第歸過南康見郡守祖祕丞按皇祐類稿與祖祕丞詩云及過廬山南聞君初布治又曰高㑹雖暫歡故園當速至是先生留康廬日淺而歸興濃矣是年又有寄小兒詩送余疇若序與章望之祕校書與楊屯田書楊文公億之子麻姑山賦寄周寺丞詩惜才詩送侯殿直知吉州詩按寄小兒詩注云此兒纔三歲蓋庚辰得男至壬午恰三歲送余疇若序寄周寺丞詩蓋周燮以是年宰南豐請余疇若南豐主學故先生以序送其行楊屯田其時守筠州故有書與之麻姑山賦乃述高臺層瑶繚垣築粉之美必是修麻姑殿後所作當在是年送侯殿直詩曽得滁州在故鄉按國史歐公以慶厯二年知滁州此詩之作亦當在是年也惜才詩恐亦是作於下第之後慶厯三年癸未三十五歲是年集退居類稿十二卷慶厯民言三十篇作周禮致太平論三十篇撫州菜園院記雪中贈柳枝及柳枝荅詩寄周寺丞詩送錢寺丞知白州詩三賢詠上蔡學士詩寄祖祕丞詩按先生集所為文名退居類稿云自弱冠迨今十五歲得草稿二百三十五首類為十二巻是年冬至日南康守祖無擇為先生作序則知先生是年下第退居既集退居類稿又有周禮致太平論焉其後陳次公述先生墓誌云及退居為周禮致太平論并序則實作於是年也上蔡學士書言鄒子房事蓋蔡公以慶厯三年為諫官此書亦作於是年周寺丞燮時為南豐宰錢寺丞得臣時以南城宰知白州故先生有詩送之又寄祖祕丞詩云郡守方仁賢學宫盛修理踵門致勤恪命我談經藝余襄公薦章云下第退居四方生徒從之講習鄧溫伯云慶厯三年南城始詔立學先生為之師四方來學嘗數百人則知先生以是年退居于家故郡守請主學事柳枝詩蓋因是年二月入京遇雪而作也是年中女生按丁亥年先生作陳夫人墓誌云中女五歲其少未免懐蓋中女之生在是年也先生作周禮致太平論三十篇而内治七篇居其首其畧曰内宰以隂禮教六宫六宫后也又以隂禮教九嬪九嬪掌婦學之法以教九御后尊也不得不受教女御卑也而教亦及之是在王宫者不可不知禮也余按此篇三歎成王周公致太平之書其精神心術盡在於是使先生之志獲行如有用我執此以往豈特王河汾能言之惜夫其不果也先生作慶厯民言三十篇開諱而下言言藥石字字規戒先生斯時無官守言責少露梗槩一二年間杜富韓范歐余王蔡君明臣忠三陽道泰公既不能為三諫之詩以効君謨又不能為濃墨之頌以効石介雖在畎畝惓惓忠赤不能自已作為此篇天子聖明芻蕘博採持此上聞言者無罪四十二年之治實嘉賴之故祖無擇曰真醫國之書爾慶厯四年甲申三十六歲是年上富公范公書作麻姑山真君殿記李子高墓表陳伯英墓表寄祖祕丞書除夜感懐詩南塘觀魚詩二詩並次陳殿丞肅韻按上富范書蓋獻慶厯民言及言國事故也李子高墓表云卒於慶厯四年則墓表想亦作於是年陳伯英墓表云吾嘗銘陳仲溫之葬其子漢公字伯英後十二年而死又從而表之仲溫乃先生之伯丈伯英乃郎舅也仲溫之葬在壬申年伯英以甲申年死故曰後十二年則墓表亦當作於是也寄祖祕丞書云教道亦難行徒以釣積毀篋書歸敝廬庠門任蕪穢先生此言蓋因上蔡學士書言鄒子房事鄒因誣織先生同入郡圄其事既白先生乃棄學事而復家居也慶厯五年乙酉三十七歲是年有與胡安定書寄祖祕丞詩南城縣㕔記處士陳君墓誌銘及祭文白石暹師塔銘按與安定書云康定初錢塘别後二年自京師歸中途曽寫書今又四年則此書當作於是年是年余襄公薦先生于朝其章畧曰李覯博學通識包括古今潛心著書研極治亂江南儒士共所師法閩中名士黄通以書與范文正公曰李覯生聖時三十七年也其徳行文學其智識材術疑三代英靈復生于今大江而南皆呼曰先生暨應詔來都下今副樞富公諫省歐陽公紫微余正言三班田紫微淮南祖提刑皆當世之名儒莫不競造其門而優禮之若吾公者知泰伯為最深惟其知之也深故嘗有論薦泰伯之心慶厯六年丙戌三十八歲是年作長江賦集皇祐續稿作序足成夢中春社詩上王刑部書次王刑部遊麻姑山詩及唱和詩序傅代言墓表按先生乙未年再上富公書云慶厯四年以書言南方事後二年作長江賦則此賦當作於是年王刑部乃漕使逵也是年游信州作弋陽縣學銘聞女子瘧寄詩弋陽縣堂北見夾竹桃海棠二詩題靈陽宫龜峯精舍葛陂懐古詩逢何道士詩按先生皇祐三年作新成院記云前此予歸自信又云既去五六年自此年至皇祐三年約五六年則游信必在是年若銘若詩皆作於在信之時也慶厯七年丁亥三十九歲是年作禮論後語刪定劉牧易圖序宋屯田延平集序亡室陳氏墓誌處士饒君墓表建昌知軍㕔記景徳寺重修大殿及造彌陀閣記邵武軍學莊田記小女詩海南編集題韓偓詩後答黄漢傑書按禮論作於明道元年而後語云吾為禮論後十五年有持章望之論一篇以吾為好怪則禮論後語當作於是年刪定劉牧易圖序論見於答宋屯田書亦當作於是年宋屯田延平集蓋因入閩訪福帥蔡學士路經昭武而作也宋屯田咸字貫之時為延平倅假守昭武海南編詩因宋屯田見示海南編而作題韓偓詩後因游閩而作答黄漢傑書以漢傑貽書言景徳寺記及邵武軍學記言浮屠事故先生答漢傑書云覯排浮屠固久於潛書於富國策人皆見之矣豈年近四十而輙渝哉惟漢傑觀厥二記不甚熟爾吾於此言乃責儒者之深非尊浮屠也先生言年近四十則此書當作於是年是年夫人陳氏卒按陳次公述先生墓誌云再娶饒氏不知娶於何年慶厯八年戊子四十歲是年中女子死有哭女詩云妻死女已病踰年成二喪曰踰年者蓋去年陳夫人卒今年中女死也冬十一月作建昌軍儀門記太平寺浴室記寄祖祕丞詩皇祐元年已丑四十一歲是年作宋中舍及江夫人墓碣銘送李山甫詩是年范文正公薦于朝其章畧曰李覯著書立言有孟軻揚雄之風義臣今取到本人所業禮論七篇明堂定制圖序一篇平土書三篇易論十三篇共二十四篇編為十巻繕寫上進乞賜御覽則知斯人之才之學非常儒也其人以母老不願仕乞就除一官許令便養皇祐二年庚寅四十二歲是年作周醫博墓表迴向院記謝官表謝范資政啓怡山長慶寺詩是年赴范文正公招于杭州范公再薦于朝其章曰臣去年録進李覯所業十巻其明堂圖序一卷今朝廷行此大禮千載一時斯人學古之心上契聖作再錄上進乞加天奬以勸儒林㫖授將仕郎太學助教誥詞云學業優議論正有立言之體且履行修正誠如薦章特以一命及爾其益進于道勿患朝廷之不知也皇祐三年辛卯四十三歲是年作廣文陳生墓銘承天院記麻姑山仙都觀御書閣記新成院記送知軍曹比部移之䖍州詩按旴志曹公觀以皇祐三年守旴此詩當作於是年是年丁母鄭夫人憂十二月葬于先府君墓東南隅實建昌鳳凰山之麓按墓誌云方謀扶親西遊夫人許之未及行而遭大故皇祐四年壬辰四十四歲是年集皇祐續稿八巻作序刋行周禮致太平論十巻上孫觀文書酬陳屯田詩按續稿序云行年四十四疾疹時發作其於文字間尚克有進也歟又云慶厯癸未錄退居稿後三年復出百餘篇當在是年上孫觀文書蓋是年儂志高寇廣西孫觀文沔持節討之先生寄書陳利害十事孫公答書云示教民病非留心博愛何以及此酬陳屯田詩云封豕長蛇戰嶺南蓋指儂寇也此詩亦當作於是年皇祐五年癸巳四十五歲是年著常語上中下三卷承天院羅漢閣記栢林溫氏書樓記傅進士墓銘皇祐六年甲午四月改至和元年四十六歲是年除鄭夫人服作常語後序袁州學記清話堂詩送嚴介序聶夫人徐夫人張都官墓誌袁州雜詩三首先生作袁州學記河東柳淇書京兆章友直篆天下號為三絶其學記畧曰惟四代之學攷諸經可見天下治則撢禮樂以陶吾民一有不幸猶當仗大節為臣死忠為子死孝詳味斯言此豈特為袁州學校重且將為天下國家重故曰君子化民成俗其必由學乎袁州雜詩郡守祖無擇皆賡其韻清話堂詩蓋與周伯達宿景徳寺而作其詩云無限中心不平事一宵清話又成空遂目其處為清話堂且題八句云至和二年乙未四十七歲是年寄富公書并長江賦一首皆論東南利害寄祖祕丞詩送春二絶送陳司理序江屯田墓誌陳都官墓碣銘鄒夫人墓誌銘鄭助教母陳氏墓銘陳府君夫人聶氏墓銘至和三年丙申九月改嘉祐元年四十八歲是年有鉛山縣尉陳君墓銘嘉祐二年丁酉四十九歲是年國子監奏乞差太學助教李覯充太學説書㫖令赴太學供職按奏劄云雖因名儒論薦命試一官未沾政禄而養道丘壑欲望朝廷差充太學説書冀有禆庠序風化嘉祐三年戊戌五十歲是年除通州海門主簿太學説書作太學議一篇景徳寺修院記按誥詞云爾醇明茂美通于經術東南士人推以為冠自佐學政逾年于兹孜孜渠渠務恪厥守祭酒司業以為博士之職莫宜於爾可特授通州海門縣主簿太學説書如故㫖令詳究太學制度故有學議嘉祐四年已亥五十一歲是年權同管勾太學蓋因胡瑗以病告假故有斯命尋以祖母未祔先塋請假歸遷㫖給假一月先生遂歸八月卒于家十二月祔葬于鳳凰山府君之塋按陳次公作先生墓誌云臨終無他言惟執次公手以明堂圖為託三禮未成為恨是先生又作三禮論未成而絶筆也欽定四庫全書旴江集卷一宋李覯撰賦長江賦臣聞養萬物者惟地之大水居其上則地不能載以觸以齧以斷以掘深或無底逺或幾千萬里則江}
