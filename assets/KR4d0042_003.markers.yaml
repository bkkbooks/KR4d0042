  - {type: line-break, offset: 0, content: '', id: KR4d0042_SBCK_003-1a01}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 江集原序孔子沒千有餘祀斯文衰敝其間作者孟軻荀卿賈誼董仲舒揚雄王通之徒異代相望而不能興衰捄敝者位不得而志不行也苟得位以行其志則三代之風吾知其必復嗟乎秦漢以來禮樂則不為而任刑以敺其民將納於治適所以亂之也歴世寖久皆謂天下當如是可以致治而不治者時耳故有奮筆舌為章句卒不及於禮樂者末哉文也旴江李泰伯其有孟軻氏六君子之深心焉年少志大常憤疾斯文衰敝曰墜地已甚誰其拯之於是夙夜討論文武周公孔子之遺文舊制兼明乎當世之務悉著于篇且又歎曰生處僻遐不自進孰進哉因徒步二千里入京師以文求通于天子乃舉茂材異等得召第一既而試于有司有司黜之嗚呼豈有司之過邪其泰伯之命邪或者天徒付泰伯以其文而命則否邪亦將位得志行後有時邪吾不得而知已泰伯退居之明年類其文藁第為十有二巻以寄南康祖無擇且屬為序無擇既受之讀之朞月不休善乎文武周公孔子之遺文舊制與夫當世之務言之備矣務學君子可不景行於斯慶厯三年冬至日序李覯泰伯以舉茂材罷歸其明年慶厯癸未秋因料所著文自冠迄兹十五年得草藁二百三十三首將恐亡散姑以類辯為十二巻寫之間或應用而為未能盡無媿閔其力之勞輒不棄去至於妖淫刻飾尤無用者雖傳在人口皆所弗取噫天將壽我乎所為固未足也不然斯十二巻庶可藉手見古人矣故自序云李直講年譜宋魏峙撰真宗皇帝大中祥符二年已酉先生始生祥符三年庚戌二歲祥符四年辛亥三歲祥符五年壬子四歲祥符六年癸丑五歲祥符七年甲寅六歲祥符八年乙卯七歲按先生見蘇祠部書云六七歲時調聲韻習字書勉勉不忘則知先生一二年間知向學矣蘇祠部舜欽祥符九年丙辰八歲天禧元年丁巳九歲天禧二年戊午十歲按先生見余監丞書云十歲知聲律則知先生於是年知習舉業矣余監丞時為南城宰天禧三年已未十一歲按先生作疑仙賦序云吾母無子徧禱無不至祥符元年夢二道士奕棋於户外往觀之其一取一子授焉遂娠又云生十餘歲從先父適田間宿東郊夢人以書褾與之曰王狀元文集夢中以為沂公之文也既而就學果不甚魯或時開卷􅐞然憶念謂曽讀此書再思之未嘗見也詳此二夢則知天生}
