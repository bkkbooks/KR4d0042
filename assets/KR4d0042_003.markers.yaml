  - {type: variant, offset: 181, length: 0, content: '', WYG: 州十詠亭客遊無日暫開顔姑孰谿邊偶得閒風景直疑圖畫出古今都似夢魂間桓溫罪逆休重問謝傅英靈已不還深美謫仙遺世務酒船椎皷浪如山送王尉義激中心不再思宦途從此抱瑕疵誰憐君子篤親意况是明王孝治時靖節田園應久廢尚平婚嫁豈宜遲一官塵土休迴顧海上羣鷗舊有期野意亭福唐城郭掌中窺旭日登臨到落暉誰在畫簾沽酒處幾多鳴櫓趂潮歸晴來海色依稀辨醉後鄉愁積漸微山鳥不知紅粉好纔聞歌板便驚飛靈源洞纔出塵來尚未知漸攀藤竹漸臨危伏流似是龍藏處古樹應無春到時誰把石崖齊剗削直教雲氣當簾帷良工畫得猶宜秘莫與凡夫肉眼窺送陳司理平生直道恥求人下位沈英久未伸齊吹古來偏有濫葉龍今更不宜真天邊奕世三台貴江上先廬一畝貧大抵窮通相倚伏這迴寒谷解逢春送黄承伯君來别我向番陽時節初春曉尚霜茶褐園林新柳色鹿胎田地落梅香此行硯席多知巳是處樓臺可舉觴只恐詔書非久下槐花又在眼前黄謝蔡十八丈相示詩巻昔年多幸枉髙軒示我新詩累百篇使者即時還趙璧夢魂今尚憶鈞天據鞍馬援誰云老陋巷顔回始是賢桂樹寒山風景好近來應更有長編清話堂詩至和元年秋九月與周伯逹宿景徳寺義明上人房予憙誦李涉詩云無限心中不平事一宵清話又成空其意與今夕相似因目其處為清話堂且題八句釋子相延暫解冠一宵清話到更䦨漆盤香燼死蚯蚓紙瓦雨聲鳴彈丸往事莫將閒口笑勞生誰在定中看明朝頮面還歸去依舊塗泥濺馬鞍送郴縣呉主簿數十年來預薦書當時文行聳羣儒青衫近始霑王澤白首從新入宦途四壁生涯雖寂寞一官趨進轉﨑嶇楚南若是江山好閒日猶應味道腴覽余堯輔詩因成七言四韻少年心苦向毛錐老大生涯只有詩哀樂萬端成畫繢江山太半入鑪鎚格如平易人多愛意到幽深鬼未知白髮尚新才不盡幾時吟興是衰時次韻酬屯田陳丈見寄老年纔到病還催老病成叢撥不開腹冷有時如咽雪耳虚終日}
