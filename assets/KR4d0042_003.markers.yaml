  - {type: variant, offset: 133, length: 7, content: 精爽者乎往弗諌, WYG: 欺過雪更憑花蕚占留春江南風物雖佳麗爭奈燕然有虜塵君錫宰夀春淪落多愁笑不成水邊還是送君行官為令長前程好地近鄉關喜氣生百里有人觀惠術三年唯我見交情山中後夜思賢處風月猶應似舊清錢寺丞知白州大邑歌謡日尚新忽驚千騎擁行塵宦游莫歎登長道天意先教福逺人城在海隅門少客地鍾陽氣}
