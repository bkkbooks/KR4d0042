  - {type: variant, offset: 39, length: 0, content: '', WYG: 拜於廡下古之君子居易以俟命不患人之不已知今覯也踽踽而來若行賈之為者其故何哉伏念家世貧乏㓜孤無兄弟老母年近六十饑焉而無田寒焉而無桑喁喁科舉求不可望之禄以為養抑疎濶矣每朝夕進側則見髪班體臞而食淡衣粗烏鳥之情痛劈骨髓王城百舎天門九關銖銅不畜何路自逹遐方小郡知已斷絶姦邪所怒哆冶所笑身無油脂日就乾腊往時多事勤苦成疾今兹憂愁益復發作長恐醫餌不繼忽沉溝壑内孤慈母上負明時所懐不伸抱恨泉壌以此計校不宜黙黙是以來也伏惟執事以文學名家以公忠許國封書言事及於母子夫婦間無所隠諱庭辯宰相而辭不可屈此其心將大有為者也不日祗奉明詔歸于帝右持衡制事當不因循然則仕籍未甚清俗化未甚修賦役未甚等兵守未甚完異方之法亂中國夷狄之君抗天子長驅大割用工非一肘腋諮議豈宜少人漸而收之盍自今日覯雖不才以備一人之數顧不可乎苟取其窮而通之取其賤而貴之補罅續斷粗當益國不徒矯世俗騰舉士之名而已此在高明熟慮之也弗復云云嘗所著明堂定制圖一道并序前日度支魏公以列于座隅兹不再獻潜書十五篇野記二篇禮論七篇共一冊謹用塵瀆常行所業五巻亦以資閒暇一笑皆舊寫不精致恕而憐之可也不宣覯再拜上孫寺丞書寺丞執事當今天下職官孰輕重哉去於民不逺事之一介必折諸其庭莫如縣大夫者吾邑之在江表亦繁鉅矣戸口櫛比賦米之以斛入者歲且數萬自政不得人二三年來尤為昏亂公庭攘攘塞耳不聞怨聲民錢獄理交手為市刺史弗之恤㢘使弗之問裹粮北走路宿一月然後至京師天門沈沈虎士交㦸朝無親黨袖無金貝有能自逹其寃者乎是以窮夫細人拷棒且死噤不得言唯仰首拜天以願雪活嗟乎聖人在上此何罪也不意復有執事取而正之民之瘡痍洗刷鍼療吏之宿贓奪諸其懐書牒訟争者不持尺布斗粟喜捷而返里胥大徭隨候衙喝無土工木材之責綰弊布衣食菜飲水晨而出暮不敢休勉勉哀矜與赤子為父母貪人侈婦之所竊笑守道君子嗟嘆之不暇嗚呼仕今之世處今之俗其心皎皎追古人為徒伏惟執事之事業其小大何如也但恐聽詳則事滯愛極則姦生髙明多見當自知矣小人無位請賛言之押券書移畝稅者立判時遣無淹乆以匱其力則農不傷䑕竊狗偷得情則已無姑息以枝其辭則捕逐之吏敢奉其職村氓僻陋逺者二百里負米為食十捐六七以足薪芻房賃之費旦入郭門夜馳而出往返猶且數日若必求其根待其蔓或旬或月然後罷歸則將顛躓乞假之無地耒耜不得深其田斧斤不得采其山矣賊徒狡獪心豈㢘恥昨鞭今戮猶或不悛若必撫而哀之則將沿上官之語以誣捕已者如此則雖白晝解人之衣貝者掩目而過矣仰惟執事以明易慎以義奪仁情見則勿疑罪當則勿恤}
