  - {type: variant, offset: 5, length: 0, content: '', WYG: 水臣不得而計之矣蜀焉我頂呉焉我腹淮我之腋海我之足朝谿暮谷刮骨磨肉委之填之而莫飽其欲萬山崔崔將裹將束如兒童之見犇馬縮頭斂手避路而躑躅時清氣和無濤無波千丈一席可眠可歌變動頃刻四天怒色凶煙暴雲對面漆黒誰為風師誰為水伯不軌不法無别無識風兮何聲水兮何形前雷後霆氷堆雪層操舟之老尚不能自保况乃逺而行客孰不椎心而太息出如登山入如沈泉退無所止進不得前龍螭蛇黿固執殺生之權蝦蟹瑣瑣猶或賈勇而爭先嗟乎生之難成之難父母君師之所愛而託命於其間幸而免者蓋有之矣不幸而死者何可勝紀魚腹未消艣聲相繼豈非利欲之牽人而危亡之不避揚荆巴蜀交廣甌閩地有常産物有常珍衣者食者器者玩者歌童舞女詭異妖冶官所不取則掠之私舍孰賢孰才貪哉鄙哉重裝疊載踰江越淮然則視長鯨之怒東海不啻如蠛蠓之浮杯嗚呼山川之阻土地之富天下有道則王之外府天下無道則姦雄所處蓋足於財用而利於守禦故周之衰也有呉有楚漢之亂也曰策曰權琅琊因之以建大號劉裕得之以入中原道成蕭衍迄于霸先自取自守人誰敢言赤壁之敗曹操夀春之走苻堅雖厯數之有在亦事勢之使然及夫孫皓之虐叔寳之昏而後能滅焉勞乎哉經幾代而幾年臣聞周書曰制治于未亂保}
