  - {type: variant, offset: 41, length: 2, content: 撤厥, WYG: 以一言之善或目擊而道存意氣所合唇齒後也不復浮辭唯増媿畏而已不宣覯再拜上蘇}
  - {type: variant, offset: 44, length: 0, content: '', WYG: 部書通判祠部執事覯毎習觀書傳見古人有先後相因貴賤相取刷浴塵穢挈而致之功名之境者未嘗不廢書太息已或泣下何者兹道寂寥為日逺矣士之褐衣革帶顛倒風塵時無不扼肘歎望曰我無知己一旦成大聲享大任則復因循自守鮮能知人盖處賤而求人知也則利在乎已既貴而知人也則利歸於人為已而不為人是以然也繇此逹者自逹窮者自窮上下背馳不翅胡越見天球河圖委在溝瀆不肯一濡足振起之而安行自若者皆是也欲望張皇古道聳勸士類使碌碌者聞風而勇善不亦難哉是皆假道義以自進其身身既進則忘之矣真有道者果不如是伏惟執事以佐王之才應期而出第進士為能官中賢良受清秩治道二十五策霆轟風飛震伏天下非真有道者安能卓犖如此是則夷高翦蕪為後進開路誠有望於執事也覯南城賤民自以家世儒素生長好學由六七嵗時調聲韻習字書勉勉不忘逮于今兹年二十七矣其間染采薫香附合時律外尤存心於古學沉酣鼓舞其志不甚眇小然而進不得州郡舉退不得鄉曲譽饑寒病瘁日就顛仆抱其空文四顧而無所之今者竊嚮執事風采不辭道路暑濕之勤夙夜奔走求通於門下以執事之明其亦為之動心哉覯生平所著力弱貨殫不能盡寫今所摯者舊文五巻盖備舉子常禮禮論七篇潜書十五篇别寫為浄本一冊政治餘間首乞觀覽其餘篋帙細碎苟蒙顧取續當具其藁以獻雖然猶未足以盡覯所懐也覯往者毎見邦國政敎有玷缺不完者下民疾害有酸楚未復者摭其條目雜然甚多因欲作狂夫策五巻既成其五篇矣自以意切言直懼為世俗所忿誚執筆瞻顧逗撓而止又以明堂者古先帝王之大事而去聖乆逺規模莫見周禮考工記大戴禮盛徳篇吕氏春秋十二記室个之說參差不齊繇漢迄唐老師大儒各執一經相為矛楯有國者不知所以裁定遂使布政之宫缺而不立雖有作者皆取臨時處置非復先王之法象覯謂周禮大戴禮呂氏春秋皆聖人賢人之所作述不宜輙有乖異反復究省則制度果同但立言質畧意義不顯鄭康成蔡伯喈輩泥文太過遂成派分故嘗挾而正之决而通之不以文害辭不以辭害意三家之說坦然大同堂室之度靡所回惑的的然如見成王周公享帝視朔朝諸侯於其上因欲作明堂定制圗一道并序遇病中廢未克成之復謂易者三聖之所以教人因時動静而終之以徳義五經特是為深矣古今解者唯王輔嗣尤得其㫖然亦未免缺誤况此經變動無常學者不能知所凖的覯常撮其爻卦各有部分仍辨輔嗣之失因欲作易論十篇然非汰思慮旬月間不可以措筆是三書者他日即成就跪致於几席之側則夏時坤乾未必不為仲尼所取也今之獻者聊可味其一臠耳仰惟執事思古人相因相取之道而念其所以來之意羽凡骨為飛仙起涸魚為雲龍藥石哺乳使其銜恩則他日執事入坐廟堂出擁旄鉞遂大勲於時覯雖不才東西指顧必有可用今也不敢豫自道幸執事裁之不宣覯恐懼再拜寄上范㕘政書慶厯四年六月四日應茂材異等科李覯謹西望再拜奉書㕘政諫議明公閤下覯一二年來竄遯山谷竊聞明公歸自塞垣㕘預朝政無似之人辱知最厚延頸下風憂喜交戰喜者何謂冀明公立天下之功憂者何謂恐明公失天下之名夫以明哲之性樹剛中之徳裁量古今愍測衰敝昔者言之而不得行之誠無可奈何今在行之之位矣盖當築邦家之基天不足為高地不足為牢此所謂冀明公立天下之功也然塞孟津者非捧土可足治膏肓者非苦口不宜遺闕之原豈是眇小若曰患更張之難以因循為便揚湯止沸日甚一日則士林稱頌不復得如司諫待制時矣此所謂恐眀公失天下之名也嗟乎當今天下可試言之歟儒生之論但恨不及王道耳而不知霸也強國也豈易可及哉管仲之相齊桓公是霸也外攘戎狄内尊京師較之於今何如商鞅之相秦孝公是強國也明法術耕戰國以富而兵以強較之於今何如是天子有帝王之質而天下無強國之資為忠為賢可不深計洪範八政首以食貨天下之事未有若斯之急者也既至窮空豈無憂患而不聞節用以取足但見廣求以供用夫財物不自天降亦非神化雖太公復出於齊桑羊更生於漢不損於下而能益上者未之信也况今言利之臣乎農不添田蠶不加桑而聚斂之數歲月增倍輟衣止食十室九空本之既苦則去而逐末矣又從而籠其末不為盗賊將何適也况旱災荐至衆心悲愁亂患之來不可不戒明公何不從容為上言之國奢示儉抑有前聞動人以行不煩虚語必也省宫室之繕完徹服玩之淫靡放宫女以從伉儷罷樂人以歸農業後庭愛幸使衣無曳地羣下賜予使賞必當賢戒逸樂之蕩心慕淳樸之為德不唯惜費亦足移風至於昭事神祗尊奉釋老務從中道無徇末流郊祀天地禮之大者先王立法實有明文謂天下之物無可以稱其德故牲用繭栗器尚陶匏大路越席以昭其儉愚儒在野不覩大祀聞之道路有異於斯費鉅禮煩願留意也寺觀所須未嘗盡見唯前年在京值修開寳寺耳觀其所用誠難定數然以意論之害亦大矣且時賣官雖大理評事無慮一萬緡耳假如此寺秪費十萬緡亦當十貟京官矣彼十貟京官以常例任使數年之後便當臨民以為萬戸縣尹則十萬家之禍又以為十萬戸郡守則百萬家之禍矣若輟一寺之費而不賣十貟京官是免百萬家之禍佛如有靈豈不歡喜一寺尚爾其他可知孔子曰禮與其奢也寧儉矯枉過正此其時也設謂復于質略虧損國容無以觀示于下則未知瑶臺瓊室孰若茅茨土階之榮也若以逺古之道難為比擬則近世豈無其事哉隋之文皇既可為吾君法矣唐之楊綰亦足作吾相師也此事尤淺近盖在明公術内乆矣然恐富貴娛樂有以移人故敢告于左右嗟乎人夀幾何時不可失無嗜眼前之爵禄而忘身後之刺譏也覯才不適時體復多病非有望于仕進者也所願草茅之下復見太平瞑目黃泉蔑遺恨矣所著慶厯民言三十篇謹録上獻伏惟稍賜觀覽干犯鈞台寔增慙汗不宣覯再拜旴江集巻二十七欽定四庫全書旴江集巻二十八宋李覯撰書寄上富樞宻書慶厯四年六月四日應茂才異等科李覯謹西望再拜奉書樞宻諫議明公閤下伏以天時否結海内煩費力支王業屬在賢人况樞宻擥軍國之權明公通古今之道才位相稱功德可圖此有志之士所以願忠於僕人也覯江南人請言南方事當今天下根本在於江淮天下無江淮不能以足用江淮無天下自可以為國何者汴口之入嵗常數百萬斛金錢布帛百物之備不可勝計而度支經費尚聞有闕是天下無江淮不能以足用也吳楚之地方數千里耕有餘食織有餘衣工有餘材商有餘貨鑄山煑海財用何窮水行陸走饋運而去而不聞有一物由北來者是江淮無天下自可以為國也萬一有變得不為廟堂之憂而姦雄之幸乎議者多輕東南謂為怯弱而不知為官軍則怯為亂賊則勇矣今之卒伍例非勁健必也少有材力自已别營衣食安肯􅄺墨而就拘哉唯無聊之人填壑是懼不得已而為之耳謂之怯也不亦宜乎若夫驍悍之資狡猾之性因縁怨憤過有覬覦則安知其無勇也世俗但見藝祖取之之易而謂事勢常然殊不知以我宋應天之始乗李氏失政之餘殘殺忠臣熒惑羣小兵叩城下猶未知之而今而後焉得此愚暗之賊又焉得此神武之師乎以治討亂尚難為計以亂攻治將如之何曹公用兵不謂不善而弗能以一矢加於孫權者非特山川之險亦以馬超韓遂在關西故也今之輟耕壟上豈無鴻鵠之志者然且伏而未起有所待也不幸一旦邊鄙戒嚴而荆揚乗釁廟堂之上何以謀之長淮大江壍其前狐鳴烏合猾其後畏首畏尾力屈貨殫當是之時雖周公為相太公為將恐無及也幸今無事何不早為之所三四年前閱人為弓手鄉閭之内驚擾百端曽未幾時已聞停廢而募諸宣毅繼以土軍聖朝用心小子何見然以意論之弓手雖無取而宣毅土軍又不如弓手逺矣豈唯無益且有害焉昔者之籍弓手也自成丁以上皆守令親擇之稍有強壮悉無逃匿彼宣毅土軍既曰募人須從所願當職之吏務登其數雖甚駑怯亦預收録此一不如也夫弓手本乃良民徭於公上或田園富厚或骨肉衆多自重其身不為罪惡彼黥額之徒率多無頼階於窮困旋置妻孥一動其心復何所顧此二不如也夫弓手訓練有時團結有處散歸廬井無預廪給彼宣毅之名殆十餘萬一歲之費無慮三百萬矣加之土軍未知其籍是取無用之人為匱財之本此三不如也觀其罷輭之容動皆取笑驕盈之氣已欲􅁜人雖無武功自謂禁旅若主將無惠失於撫循姦回矯詔卒令起發因其怨恨讋以訛言不出城闉自為蝥賊未可知矣此所謂豈唯無益且有害也朝廷徒見名籍之夥且聞講習之勤謂為有備盖未之思矣夫用兵之道豈特武藝而已哉先在治其心次可用其力昔晉文公始入而教其民二年欲用之子犯曰民未知義於是乎出定襄王入務利民又曰民未知信於是乎伐原以示之信又曰民未知禮於是乎大蒐以示之禮民聽不惑而後用之故能一戰而霸後雖不及猶有吳起吮疽而戰不旋踵李廣與士卒共飲食而愛樂為用上下相得豈徒然哉今之守郡監兵職為將帥奉行邦典豈敢他言恩意不通路人而已立尸之地何以使之矧將帥之材在乎竒偉而今所謂良吏者小心畏忌之士耳彼欲笞人數十猶顧文法捉筆不敢斷而望其一歩百變赴死如歸何可得也嗟乎既往不咎來者可追宣毅土軍聚之已乆誠不可去然宜於不可去之中刪其尤無用者降𨽻于廂既减資糧且實役使其存者則析其部伍易地而居名之駐泊離其黨則無搆扇之姦去其鄉則為興發之漸仍使稍供差遣以代舊之屯駐屯駐者又還故郡則廂軍可省招收矣此亦防患之微意而節用之一端也其於章示武威備禦他盗無勞益衆惟在選賢商周不敵自古然矣何不於朝野之間舉守郡監兵之職勿拘資級務取英才至如荆潭揚夀昇洪杭福廣桂諸部宜命大臣為之節制重其操柄許以便宜辟召豪傑咨詢計策淹之歲月庶可鎮安若謂假以威權事當疑阻則小白重耳非無土地陳勝吳廣豈是侯王或以霸主而尊周室或以匹夫而亡秦族逆順之心豈皆形勢使然也况今賦斂之煩數倍常法旱灾之作絶異曩時民力罷羸衆心愁怨造形而悟其可忽諸明公受國厚恩為世賢輔解絃易調正在此時謀人之軍師邦邑苟有危敗是誰過歟覯自惟迂闊之流實無榮祿之望但恨養生之地僻在一方憧憧衆人無可與計事者常恐小才為累白刃相臨守死則無名脅從則有罪所以夙夜憂懼寝食弗皇不知我者謂我何也語有之可為智者道難與俗人言瀝血書辭敢告執事幸而帷幄之籌不舎庶人之議敺我元元躋於仁夀則覯也得保首領以沒受賜多矣所著慶厯民言三十篇謹錄上獻伏惟少賜觀覽仰犯鈞台豈勝慚懼不宣覯再拜寄上富相公書至和二年八月十七日將仕郎試太學助教李覯謹西望再拜奉書集賢相公閤下鄉者相公偃息于外十有一年天下之士憤懣者無所吐天下之民窮苦者無所愬宗廟有神社稷有靈佑啓聖心廓然日出擯讒說於九地之底登舊德於赤天之上含氣之類孰不相慶千萬幸甚千萬幸甚議者曰賢人當位矣恢儒復古此其時矣覯以為不然周公相成王必先有討於管蔡商奄而後制禮作樂孔子為魯司冦亦且殺少正卯㑹夾谷以懼齊侯取汶陽田未聞區區以文字為先何哉緩急之節然也今之大患患在夷狄士大夫之耳目屬於相公乆矣謂排難解紛不在他人才如斯位如斯籌深䇿逺盖非小子所難窺也若夫禍以忽而生勢以激而動亦不可不知朝廷憂西北而不憂東南無冦賊之備是所謂忽也用力於西北則勢不救東南生姦雄之心是所謂激也竊恐燕趙有舉烽之變則荆揚無安堵之氓其曰無備者非兵非食官不得人之謂也今之取才既不盡善而南國卑薄隔以江湖朝士亦不欲來比於四方最為少人近者儂智高之亂足以觀之矣智高之起於邕也非若鬼神出自恍惚盖有萌漸可見人或言之而主者如不聞及其至於廣也非有羽翼降自空虚盖已旬月之行衆欲距之而主者閉門之不暇遂使百越之地千里無煙積尸成山流血成川非他也官不得人之弊也凡今任官貴在科名彼嶺南郡守不知幾人非但無功又不能死唯趙師旦曹覲以節義自顯夫二人者皆無出身孔宗旦以負謗之故謫掾于邕事未起而言言不用而死夫人豈有科名哉凡今用法小過不宥而大刑不行小過不宥故跅弛者廢大刑不行故首䑕者安嶺南之吏或不備不虞或偷生惜死而不聞有伏鈇鑕者以不忍之政馭無恥之人如乗駑駘而舎鞭䇿欲其致逺何可得哉所幸智髙豎子本無逺畧如使匹馬尺䥫踰嶺而北則江表生靈已魚肉矣當是時數百千里之中無一人可與計事者或云修城池或云教士卒秪以行破公文何曽得似兒戯令人見之不覺大笑賊若能來誰有今日相公非常之人固不為常人之事見幾而作今也其時若謂才之難得道在馴致則凡守大藩如古方伯連帥者且宜慎柬毎十數郡得一俊傑以臨制之亦足以有為矣如此雖天駕登單于臺元帥勒燕然山無南顧之勞擾况當平世誰敢動哉覯慶厯四年嘗以書言南方事必逹左右矣後二年作長江賦欲干衢室之聽而無路以通謹錄一本塵玷台座草茅之愚行年四十有竒一事不成百病俱發未知餘年有幾唯未死間不逢亂賊是所願也故復呫囁上凟威尊伏惟哀其狂而寛其罪不宣覯恐懼再拜寄上孫安撫書皇祐四年十一月十三日丁憂人李覯謹再拜奉書安撫宻學諫議節下覯病卧草中聞朝廷委節下一方之事載驚載喜已而泣下嗟乎自嶺表有變數千里間火熱湯沸而未見有左右前後之臣負大名於天下者一來鎮撫竊疑江湖之民獲罪上帝不復得為周家草木在行葦之詩矣今也傳言節下當来有如司命仙官將自天降荒陬士女罕識貴人賢人孰知所以來之㫖愚心耿耿實異於衆輙縁漆室憂魯之義願有以控告不幸酷罰在身未經祥禫請見則非禮寄書則不恭日夜惟思罔知所措忽覩牓示令實封齎來何幸如之然而開設數路許以酬賞苟應募而言是傭徒鬻賣之道高㓗之士得不唾其面哉退又念古之人有殺身以成仁安得避干賞之嫌沮願忠之意由此奮發節下試聽之嗟乎今之天下何其少人哉人材髙下未敢輕量若夫至公至忠圖國忘身者誠不易得凡居位者何異一曹司但行文書不責事實但求免罪不問成功前後相推上下相蔽事到今日猶不知非昔西戎叛時數年間天下之民破骨出髓而不能取元昊一塊土今南蠻又叛數月間江湖之人拆衣賣絮而智高方擁美女在珠玉堆中坐耳何者十羊九牧朝令夕改作無益以害有益故也彼智髙者豈英雄哉打刼之尤者耳愚嘗謂彼失扵乆而我失於速彼若能速廣東非我有也我若能乆彼焉得跳梁若是哉何謂彼失于乆當其自邕而來所過諸郡突如破竹若能因其倉庫撫其民人分留同惡合聚亡命以守之避實攻虚直趨英韶南雄以扼大庾使江南之兵不得過雖廣西兵來而東路之勢已盛則五羊孤城仲子怯師囊橐中物耳舎此不為而為持乆之計豈有人作賊深入主國無饋糧無外援而可頓於堅城之下連月不去以待王師之來哉此所謂彼失於乆也何謂我失於速當賊在五羊城下時王師幸得到英州若能分兵屯守要害堅壁清野以待之彼將何如梁孝王天子母弟周亞夫尚不可救况廣州仲簡何足可惜彼求戰則不聽欲走則無路糧食當有限寳貨豈可餐越月踰時自當乾死况蕃漢烏合其心不一力盡勢窮寧無疑貳購賞在其前斧鉞在其後智高之首何難可致不戰而屈人之兵古今一也豈有人為將乗驛㑹師與士卒未嘗相識昏至晨戰挺身入賊如此雖豫讓為軍貟要離作節級有何恩義能使之用命也以侯伯富貴之身落豺狼腥臭之手逺近聞之莫知所由皆以賊為鬼將神兵非人可敵故鋒刃未交而心膽已碎後敗甚於前敗今日甚於昨日徒使狂童謂天無網此所謂我失於速也自有事以來江湖之間誠宜設備然所以備之豈其道哉豈作無益以害有益者哉居是邦不非其大夫不得為節下盡言也嗟乎疾在四支皆知護心腹矣恐風氣之内入也而不知用藥無節則心腹自生疾敵在嶺表皆知備江湖矣恐蠻冦之内攻也而不知作事無術則江湖自生變四支之於心腹嶺表之於江湖其逺近𦂳慢以節下之明固不待人言也嗟乎彼智高者終何為哉歴觀自古豈有如彼等人能成事也彼之所至奪人財物燒人室宇食人老弱妻人婦女人之仇讎無甚於彼者安能成事哉但恐嶺表未定江湖日貧而羣盗起耳夫羣盗者初不足畏或數人或數十人或數火或數十火然後以小合大以近合逺遂成千人萬人耳雖然此等亦安能成事哉賊殺既已甚天誅所未及於是乎有長材大力假忠借義以討賊為功以要王爵以歸民望如孫堅父子漸不可制此愚心之憂也嗟乎江淮而南天府之國周世宗之威武我太祖之神聖非一朝一夕而得奈何因循不以賢才守之今日之事可謂急矣誠得左右前後之臣負大名如節下者數人使居潭洪荆昇揚杭福州兼節制一路屬郡官吏得自廢置然後可以言利害官不得人雖言之誰為行哉朝上千疏暮降百勑付之曹司適煩擾耳如曰得人請試言其畧今之先務莫若使甲兵不闕盗賊不起民不至無告士不至失職如此者凡十事一曰諸州舊有宣毅百數雖云不武悉已南征昨者調鄉弓手將以為衛縱今未罷復何可憑且勿論其人勇怯彼弓手之家固不在城安有盡室已落賊中而肯一身更為官守鳥驚魚駭事灼然矣愚謂守城當須城中之人人生尚氣愚智皆同嘗觀角觝與競渡之類一坊一巷互爭勝負千百為羣至相殺害何者恥居人下故也官之使民曽無激勸㸃簿呼召若牽牛羊彼何興味而為之哉今若為廣場於邑居之中先取有勇力為衆服者寵異之使率其黨以閒暇習諸兵仗勿為名籍各任去來既不妨其業又得以自由於是制為勸賞之法凡若干日一試其藝有地稅者常憂執役試中則與移下名有市利者唯患當行胡剛切試中則與免一次胥徒以此差補僧道以此披剃凡百施為必先武力至于有罪亦當原情苟非害人得以功贖如此則人可以日添藝可以日進比屋之民皆為甲士可也然後柬置帥長潜加部勒志定氣剛誰不可用况家貲在内血屬滿眼倉卒之時必得死力二曰昨者鄉弓手萬家五百人大縣至一二千人不謂不多然而驅之來就郡邑廢其耕耘離其骨肉負米擔錢闔門在路是不便於私也手執戎器心在閨門藉此虚名影其色役是有累於公也今若於村落之中毎十數里為一教場使其人貟各以閒暇就便集之既不妨農且無所費當戸差役勿復與免或其有故則許兄弟子姪逓代乃是一人在籍數人習兵其餘戸口及寺觀童行願教者亦聽勸賞之法一如城中如此則保全鄉里扞禦疆界求之人情必可倚頼三曰古之治民唯欲富庶今之治民特惡豪右夫富豪者智力或有以出衆財用亦足以使人將濟艱難豈無其效今之浮客佃人之田居人之地者盖多於主户矣若許富人置為部曲私自訓練凡幾度試勝兵至若干人或擒盗至若干火者授以某官仍寝進納之令以一其志凡人既得以兵自防又得以官自進苟有餘財其誰不勉歲年之後千夫長百夫長不難得矣周禮鄉為一軍未聞反叛秦人功賞相長何患豪強大有為者宜無猜忌四曰人之為賊亦有其漸始則黒面夜行僅如狗䑕或掠小家子或刼獨行客鄉}
