  - {type: page-break, offset: 71, content: '', id: KR4d0042_WYG_028-34a}
  - {type: variant, offset: 72, length: 0, content: '', WYG: 害於正哉聖賢之}
  - {type: variant, offset: 73, length: 0, content: '', WYG: 翕張取與無有定體其初殊塗歸則一焉猶李漢所謂千態萬貌卒澤於道徳仁義炳如也何須開口便隨古}
  - {type: variant, offset: 74, length: 0, content: '', WYG: 漢傑使我效李習之膠柱矣今之學者誰不為文大抵摹勒孟子刼掠昌黎若為文之道止此而已則但誦得古文十數篇拆南補北染舊作新盡可為名士矣何工拙之辨哉覯之施為異}
  - {type: page-break, offset: 74, content: '', id: KR4d0042_WYG_028-34b}
  - {type: variant, offset: 75, length: 0, content: '', WYG: 是矣既使明辨敢不盡言漢傑察之十二月十三日從表弟李覯再拜再答黄著作書覯再拜漢傑前書以言浮屠事求問覯不才不能多自引過輙求義理塵於左右漢傑又以書稔吾之罪不勝大慙覯行於天下日聞其美不聞其惡於鄊黨惟仲容老丈時賜教誨然其人慎宻雖終日請問猶未一言今漢傑不惜累紙之書以為大惠而覯如頑石焉雖有雨澤毋所受入而今而後不得聞過矣覯何人哉覯何人哉尚頼君子之心愍其孤陋苟有聞見更掛齒牙則蕞爾之人猶有望也以多故未及請見答陳特書覯啓今日吳君坐中見僕夫捧三書以授我問克譲乃知其子姪以此為惠讀之皆今賢士大夫之文甚善甚善夫贈送之作惟師與友若老耼孔子顔淵子路言者受者皆非偶然今覯與足下兄弟無一日之雅鄉井不同年齒差倍又非當大位言得失之地弗問弗求獲此惠貺私自惟念莫知所來無乃足下負大術業潜於山藪心之焰焰無所發泄假我以為題目乎不然未敢當凡所教誨皆我心思慮之熟者然}
