  - {type: variant, offset: 183, length: 0, content: '', WYG: 銷磨向一桮賴得竹窻無事處清風頻共故人來同徐殿丞遊麻姑山陳屯田聞之以詩見寄次韻第二首塵寰漸逺漸凄清似向崑崙采玉英此地已知鄰華子幾人猶道識方平步高那復肌膚重心逸都疑羽翼生苦恨俗縁無了處歸來依舊馬蹄聲和陳屯田送知縣徐殿丞次韻近}
