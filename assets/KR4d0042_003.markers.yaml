  - {type: variant, offset: 29, length: 0, content: '', WYG: 記張丞相詩欣歎久之恐丞相未知泰伯之志也作絶句題於後云泰伯文章自昔傳虹霓白日貫青天先生欲作酕醄醉㪷酒何妨受十千撫州菜園院記浮屠師曰可栖居建昌之交陽山善持其佛之法而言行不妄且長於醫故士大夫禮之慶厯三年秋八月來抵予曰栖臨川人母固無恙而異父弟亦學佛今住菜園院曰智賓者是也兹院之廢數十年矣寳元中其鄉人請於邑大夫願得智賓居之賓之來則四顧梗莽無一瓦尺木之業栖告之曰吾嘗患吾佛之徒將遊吾州而未能進必休於近郊之逆旅乞錢炊食雜於博徒倡女間甚汙吾法今兹院與城相望果能興之以舍吾徒豈不滿志矧吾弟主之而吾母居其旁足以躬晨夕之養外張吾教内便吾家是不資他人吾力可為由此盡散槖中凡醫之所得者給之説法者曰堂事佛者曰殿館僧有位具饌有所大抵墻屋器用皆栖之為也工將畢矣幸為栖志之予曰浮屠人盡心於塔廟固其職耳能不以禍福誘脅殫吾民之力者蓋未之見今栖以醫售其得財乃自奉其法而不掠於人且厚其弟以安乎母不離吾孝友之道言乎其黨抑可尚巳故書以授之使掲諸石云修梓山寺殿記天下名山水域為佛墜者什有八九其次一泉一石含清吐寒粗逺塵俗處靡不為桑門所蹈藉蓋佛之威靈赫赫於世僧之辯慧有以得之故國不愛其土民不愛其財以割以裂奉事之弗暇建昌軍江表之上游也地靈源長筆不可譜由治城東走十餘里峰者如引岡者如頓渟者影毛髮噴者化雲霧其間據形勝起塔廟者往往而有梓山院乃其一焉道阻而僻游從之士罕至目不睹紛華耳不聞勢利惟松君竹侯鼓舞風韻猿悲鳥哀將送歲月宅於是者苟有以存諸心其安稳何如哉然殿宇之作其來積久築者以圯蓋者以坼莊嚴不充瞻禮無地軍教練使吳臻家故饒財心且喜事由景祐中始謀營建凡立屋四楹塑像九軀所以奉經教福祖考也噫佛以大智慧獨見性情之本將敺羣迷納之正覺其道深至固非悠悠者可了若夫有為之法曰因與果謂可變苦而樂自人而天誠孝子慈孫所不能免也則斯殿之成與吳氏之用心亦可嘉已見屬為記其何以辭時則歲在辛已康定二年秋九月也邵氏神祠記李覯曰天子之祀曰泰厲諸侯曰公厲大夫曰族厲謂古之有天下國家而滅絶無後其鬼無歸故與人為厲耳江南地熱濕四時多癘疾其病者謝去醫藥閉門不與親戚通而歸死於神神之號名則曰某王某王無乃所謂古之有天下國家而滅絕無後者邪當其氣盛而病革禳祈不可解則皆謂神曰五通者能有力於其間故牲毛酒滓狼戾於五通之室矣建昌治城北有民邵氏世奉五通禱祠之人日累什百景祐元年冬里中大疫而吾家與焉乃使人請命於五通神不能言决之以竹杯珓時老母病不識人妻子暨予相繼困甚唯五通諗以無害疾之解去皆約日時雖寳龜泰筮弗是過巳噫五通之為神不名於舊文不次於典祀正人君子未之嘗言而有功於予其可以廢巖巖者石可伐可磨惟德之報焉知其他旴江集巻二十四欽定四庫全書旴江集巻二十五宋李覯撰序皇祐續藁序覯慶厯癸未秋録所著文曰退居類藁十二巻後三年復出百餘首不知阿誰盜去刻印既甚差謬且題外集尤不韙心常惡之而未能正於今又六年所得復百餘首暇日取之合二百三十八首以續所謂類藁者噫行年四十四疾疹日發作其於文字間尚克有進也歟續藁凡八巻時又有周禮致太平論十巻孤行焉皇祐四年八月庚子序延平集序世俗見孔子不用而作經乃言聖賢得志則在行事不在書也噫孔子誠不用矣堯舜禹湯時聖賢有不得志者乎奚其為典謨訓誥哉成王周公時有不得志者乎奚其為雅頌哉心之志志之言言之文若凍餒然孰謂得志而不衣食哉用之大其言者愈大虞書之厯象日月星辰夏后之賦貢九州周人之職三百六十官不已大乎今之君子固多靳儒至於布衣閭巷尚曰賢者行而已不必文也彼顔閔氏時夫子在蓋無可復言非為有德行不著書也游夏之徒不在德行科亦不措一辭子思孟軻豈無德行乎是皆不才子無功於文而雷同此說以自慰耳建安宋貫之仕逾二十年用雖不大志亦未得然有君親之奉有政事之勤在他人投筆久矣而貫之拳拳不翅褐博其學要諸仲尼餘鮮取焉多聞而敏所嚮靡不克故集而行之者四五去年秋以南劍監郡假守昭武既期又成十巻目以示覯曰延平集覯嘆今人之異乎古美貫之之異乎今孰告吾君而大用之其言又有大於此者因序以冠其首時則慶厯七年冬十有二月也送余疇若南豐掌學序工必以般者為其材巨木作寢廟也彼環堵則何工不可御必以良者為其策天驥逐光景也彼一駑則何御不可師必以孔子之徒者為其敺善性入訓典也彼曲藝則何師不可今天下號多士而南豐大邑也讀儒書者蓋百數薦於鄉第於廷往往有之大理丞周君出宰之一年乃立學於先聖之廟命吾友余堯輔掌其教夫周丞之明豈曰邑之人未嘗學且師邪若是則服大袂之衣與令長抗賓主禮者何自出也是其有學有師久矣然猶汲汲於斯者其將以先王之道浴而薰之耳其將使其聞仁義忠信之說知夫古之所謂儒者如彼其大也然後進可以治乎國退可以齊乎家出乎已而加乎人罔不曰宜者是周丞上為天子育人材下為一邑減爭鬭之獄也不然何地不可居何人不可法何必縣學之興而堯輔教之邪堯輔好古博學慷慨有行義斯足以應周丞之指惟學者何如耳至之日以吾言告之謂之是邪請在下風以賀謂之非邪敢因是而弔焉故為序送嚴介序景祐中建陽嚴君以經術有名客授於兹邑予時多故未始與游而見之者數矣一别不相聞今兹復來乃知其久於江淮間自楚徂宿所至為人師以親老故歸養焉善哉昔申生不行而死君子不以為孝章子得罪於父出妻屏子而孟軻禮貎之必不得巳以情恕可也嚴君在外二十餘年蓋亦不得巳者矣舜號泣於旻天負罪引慝見瞽瞍瞽亦信順之唯聖人能以至誠感動其親嚴君嚮時既不能感動然而人情老且病則憶念子孫雖有忿怒宜自消釋嚴君之歸養此其時也若是則經術之名固不謬其為人師益無愧矣至和元年秋八月丁未旴江李覯序敘陳公燮字陳公燮初字思道以避耆舊諱請改焉予命之曰中道夫道者通也無不通也孰能通之中之謂也居東焉則逺於西南焉則逺於北立乎中則四方均焉故易曰黄中通理凡卦以得中為貴兹聖人之意也有問身之安者必對以導養也有問食之美者必對以牲牢也言不可不先其大者也病偃於牀而不肯納藥石曰人教我以導養矣可乎餓踣於地而不肯受糗糒曰人教我以牲牢矣可乎緩急之勢異也古之言王道者是亦先其大者也後之執王道者是以輕藥石賤糗糒病餓且不救者也王莽亦嘗井田矣房琯亦嘗車戰矣豈不取笑孔子謂微管仲吾其被髮左袵而曰無道桓文之事者過也荀卿之非孟子畧法先王而不知其統太史公論儒者博而寡要勞而無功亦有以也吾觀夫子之行如天焉其變化非凡可測於鄉黨恂恂居是邦不非其大夫對問陣以俎豆至為司冦㑹夾谷時則不同也謂賜也億則屢中由也不得其死至存父母之國則使子貢惡言不入於耳則取子路使二子生乎今之世則暴人也詐人也掌教化者將不齒焉其何髙第之有哉夫子多能鄙事以博奕為賢乎已辭人之作或因於物或發乎情雖不有用幸愈乎博奕也而俗儒必非之五子之歌韻矣繫辭首章對矣使今世為之將以聲律坐矣禮有本末用有先後本末副焉固醇矣有其本以慢其末古人或不免焉畧其本而詳其末今人豈少哉雖然自治可也父兄之於子弟師之於徒亦可也欲以區區之有而齊天下之人汰哉見人一動作一笑語衣冠裳履之間則斷夫賢不肖張目大言以不恤彊禦為烈此今人之敝也道之不行蓋儒者自取之秦燔書漢鈎黨使典章淪陷人士闉厄到今恨之豈唯在上者之過有由然也夫知道者無古無今無王無霸無治無亂惟用與不用耳公燮自閩來學志厲而材美庶乎其有成閩之後生多好學者或傳其文有可愛恱而未獲與之語因公燮請字而教焉且使之歸以告敘張延之字張君延之解官鉛山遇我於葛陂神清氣和其言語可聽雖一面知其非俗子以立字未善責}
