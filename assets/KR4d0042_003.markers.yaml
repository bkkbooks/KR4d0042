  - {type: variant, offset: 50, length: 1, content: 壠, WYG: 相之權王命出小臣之手禍亂之本莫斯}
  - {type: variant, offset: 52, length: 1, content: 院, WYG: 大女主幼君尚不及此陛下明聖焉得有之此可為切齒者也若以其書不可行用則安得執為符驗藍衫木簡便稱官人乗馬從徒平接有位國之常刑將焉用也且齪齪一夫飾以巧言自淮徂江若履無人之地設有大姦大賊造為妖妄誘脅州縣則孰能辨之哉太宗時李飛雄詐取驛馬騎之稱奉詔縛清水諸將入秦州將斬之以叛頼宗社之靈使自漏泄耳萬一復有此事其將奈何此又可為切齒者也若謂已受補牒}
  - {type: page-break, offset: 52, content: '', id: KR4d0042_WYG_028-21a}
  - {type: variant, offset: 54, length: 0, content: '', WYG: 寄留在外或質當錢物則是輕我君命重乎貨財輕君命則無為臣之禮重貨賄則非奉公之人以此入官未知安用此又可為切齒者也凡此三者干渉大體不可不言而西望帝閽邈數千里言可及乎誰能執熱逝不以濯學士其惜一勺水以快我心哉覯與子房舊相往來别無嫌隙齋郎職位非佳覯誠不肯嫉妬子房名位未著覯又不與爭能言之至此盖公議也况子房不慙妄冒惟務驕矜齎逺近書題假轉漕符牒以興}
  - {type: page-break, offset: 54, content: '', id: KR4d0042_WYG_028-21b}
  - {type: variant, offset: 55, length: 0, content: '', WYG: 銅銀之號結太廟齋郎之銜當大路卓彩棚椎鉦鼓引百戯周㳺城市朝謁聖祖而後歸呵止行人凌壓尊老意氣滿溢無復忌憚是可忍也孰不可忍伏惟學士有名於時以道賛國如此等事寧不動心萬乗之貴尚當規正矧此蕞微豈難辨理昔者學士未作諫官時常刺諫官之不直今既作諫官矣無為他人所刺伏恐朝車到此迫於人事無暇省覽謹遣人投書道左試財擇焉不宣覯再拜上王刑部書轉運刑部明公執事覯天生愚魯棄置藪澤鱗鬐坐枯風波不到伏承明公以臺郎之貴領州伯之重才名所震曜賢德所煦嫗姦回醉心良善吐氣如九鎮之柱天羣山莫不仰四瀆之紀地衆流莫不赴士之歸者唯恐在後而覯貧煎其家病縲其身隔數百里無階請見自甘屏逺何所願望不意近日一二有位自北來者乃言明公過垂聼察深録姓名不唯寘之齒牙且欲引諸門下一聞髙義慙媿累日人之不遇者必曰時命若覯也獨命窮耳於時豈有不遇哉自古正身立行負抱才業而遭值昏亂不為人知辱在餓𨽻或老死岩石名字磨滅銜寃厚夜者夫豈少歟小人無似幸生明時當路無朞功之戚舉家無拳握之貨馳騖無力請託無縁而賢卿大夫雖未相識往往知其所為何不遇之有哉君子疾没世而名不稱苟由當代豪傑共相采色使得光顯于後則萬鍾不足校也豫讓一家僕耳以衆人遇之則以衆人報國士遇之則以國士報吾黨之受知者宜何如哉既未得謁於閽人且欲窮極紙筆鋪張其言冀明公多見其藴積則又念今之進者假儒之言已進而言不驗故真為儒者羞自言明公徐而察之可也何遽言哉聊寓書以謝左右伏惟照其心無責其禮千萬幸甚不宣覯再拜與胡}
