  - {type: variant, offset: 124, length: 0, content: '', WYG: 石與孫金鈴木舌士林間欲將天下觀諸掌之子從今上泰山送杜萬谷口生涯巳是貧素衣還擬冐京塵因風早寄登科信裝㸃江南㡬日春儒行一死相從患難時何人能與古人齊酈生泉下還知否賣友而今價轉低感義懊惱常人只好儒古来忠義出屠沽試將朱亥相倫擬㡬箇衣冠是丈夫屈原秋来張翰偶思鱸滿筯鮮紅食有餘何事靈均}
  - {type: page-break, offset: 124, content: '', id: KR4d0042_WYG_036-32b}
  - {type: variant, offset: 125, length: 0, content: '', WYG: 知退却將閒肉付江魚宋玉世間佳麗每專房一顧多應萬事荒夢裏若無眞實處不妨頻為賦髙唐贈日者鄒生賢不必通愚不窮悠悠無處問蒼穹可憐富貴君之柄斷在山人指掌中送夏旦赴舉嶺梅初盡草初生馬上春風酒易醒好共大鵬雙奮擊此行有路到南溟送春宜春臺上送春歸淚滴金杯不自知懊惱黄鸎解言語飛来唯見落花枝曉角腸斷城頭畫角聲燈青月黑酒㣲醒濃香夢裏誰曽管只有離人夜夜聽送丁正臣鉛槧辛勤四十年摶風不上鬢霜寒朱門何處是知巳短褐空瓢行路難惜才子雲辭賦似相如自說雕蟲異壯夫何事犬羊誇質素患他人愛著貂狐登越山臘後梅花破碎香望中情地轉凄凉遊山只道尋髙處髙處何曽見故鄉送古山人喜聞吉事怕聞凶天下人心處處同乍出山来言語拙莫將刺字謁王公送毘師西遊望望王城十二門青山行盡入紅塵近来富貴皆天與到處應多問命人送春寄呈祖袁州二首去年春盡在宜春醉送東風淚滿巾今日春歸倍惆悵相逢不是去年人東君此去㡬時來雪裏梅根待暖囘莫似仙家寥落甚蟠桃千嵗始重開酬陳屯田途中所寄封豕長蛇戰嶺南何人肉食不懐慙只今唯有髙眠好風弄松聲水濺庵正月二十日俗號天穿日以煎餅置屋上謂之補天感而為詩媧皇没後㡬多年夏伏冬愆任自然只有人間閒婦女一枚煎餅補天穿送薛經多能未必有相知况是東南義士稀京洛路長何日到風塵依舊化人衣僧志月碧雲軒改為景雲軒因書二首長見江淹雜體詩碧雲非是惠休詞試言日暮佳人怨何事髙僧郤得知景雲持律冠當年遺迹雖沈古寺存釋子若能精進去便應題作景雲軒書景雲軒壁二江斜入似娥眉盡日凭髙把酒巵貧賤别應無好處猛忙中是我閒時因遊華子崗題麻源壁平生猶未識紅泉今日纔遊石磴邉宿雨半晴秋草濕困来無處可閒眠旴江集巻三十六欽定四庫全書旴江集卷三十七宋李覯撰近體七言四韻苦雨初霽積隂為患恐沈綿革去方驚造化權天放舊光還日月地將濃秀與山川泥途漸少車聲活林薄初乾果味全寄語殘雲好知足莫依河漢更油然野人村落蒼茫半草茅路無車轍水無橋婚姻取足唯春繭鹽酪歸來待晩樵一様寛衣疑效古幾人華髮未經徭相逢不㑹寒溫語借問官家合是堯書麻姑廟流俗好仙方學道至人樂道自成仙飛昇若也由貪欲紫府還應用詐權塵裏笙歌千古夢洞中星斗幾家天無心便是歸真日姹女河車總謾傳客有話故丁祕監京師舊宅因而傷之等閒榮謝已愁聞况話三公極寵身青史尚為今世事朱門不是舊時人文章散入諸蕃口花藥留添上國春生死交情渾易見有誰過此為霑巾五龍塘世傳鱗物有蟠時分得寒泉住翠微天命雖教為潤澤神心終是索䖍祈一圍石岸刓無迹幾族隂雲禁不飛風脚斗回波面黑向人渾似逞嚴威寄小兒兩世㷀㷀各一人予無兄弟才生此兒三歲矣生來且喜富精神欲教齠齔從師學秪恐文章誤爾身但有犂鋤終得飽莫看紈綺便嫌貧不知别後啼多少苦問家僮説未真季夏雨中宛有秋色四望之際百感生焉因題於紙粟花時節雨脩脩莫道如秋即是秋客路幾千成大夢年華一半落東流眼存將聖生前筆心得騷人格外愁微物若教無所失塵埃猶願補嵩丘秋懐褚冠斜頂對清秋病骨支撑懶上樓輔世功夫何日是少年滋味此生休山含紅樹隨時老天帶黄昏一例愁自笑酒腸空半在前村無處典鷞裘書松陵唱和天命相逢陸與皮當年才調兩權竒朝端未有輸忠處詩外應無用力時意古直摩軒昊頂言微都洩鬼神私近來此道中興也泉下英魂知不知七夕天孫何許是來時月意愔愔露氣微可道星河難得過自縁烏鵲合高飛秋宵已勝春宵短今會還如古會稀早晩望夫能化石盡分人世作支機早起有懐草草西風動葛衣呼僮前啓竹間扉山僧好睡鐘聲晏社户多貧酒氣微豈是客愁渾較可秪因書巻解忘歸旴江百里清無滓枉屬閒人坐釣磯留題歸安尉凝碧堂騷人得助是江山千里幽懐一凭欄野色豈唯春晩秀天風長似月邊寒身閒暫覺塵埃逺境勝纔知宇宙寛秪恐仙壺提挈去不教凡眼醉中看答張鬷嘏幾年江外恣荒唐偶脱荷衣覘國光自是狂言無可擇敢嗟賢路有相妨謾將文史為生業已約漁樵共醉鄉多謝故人貽絶唱爰居寧解聽鏗鏘清明日作遲遲日景坐成曛聞説清明在此晨花卉不宜愁眼看勾芒能為幾人春銷磨志氣多因老㸃檢交游半作塵欲向醉鄉聊自適病來還厭舉杯頻晩思一檻東風小箔開亂山明暗水縈迴流年漸共春華去暴熱還隨霽色來天氣濁多人欲睡地形卑甚物先梅因知楚客迷魂處不是江東不足哀暮春始遊城西病多無力逐紛華三月衡門未見花長恐後期成索寞果逢殘景獨咨嗟欄干倚望山空在杯酒遲留日易斜謾説明年更春色不知園囿屬誰家寄傅代言交游散盡客來稀門掩城隅晝漏遲春地更無嫌草處雨天還有詐晴時輕量世事世不罪冷笑人言人豈知猶喜道途收拾早將閒對病最相宜丙子冬至夜酒醒盡道一陽初復時不期風雨更凄凄凌辰出去逢人飲沈醉歸來滿馬泥多恨恐成干斗氣欲言那得上天梯韓文公月蝕詩有無梯可上天之句燈青火冷睡半醒殘葉打窻烏夜啼南齋詠風懊惱南窻一道風只應天配與貧窮不歸羅綺飄颻處故入松篁冷淡中久座披襟塵榻穩半醒吹面月帷空城邊菡萏今多少偷得清香是爾功小雨已是蛟龍未肯忙誰教螮蝀更相妨來時槁葉疎疎響過後浮雲片片光徑草微滋垂粉汗砌沙圓滴簇蜂房嗟予不及高飛鳥先得天邊幾㸃凉題净居院寺門幽獨傍江城江水清含地氣清隔岸樓臺人醉死遶堦松竹夏寒生路經橋逺塵難過僧占閒多俗不爭唯有行吟憔悴客這迴須去濯長纓清暉亭池亭何處占清暉只在暉江更向西山上白雲如有雪水中明月似無泥郊原不改春來秀徑路終憂客到迷沈約東陽曾入詠使君才調好留題往山舍道中作截竹成輿不用輪東行盡日穩宜身前看疊嶂如無路毎到平田始見人下户半曾差作役朽株多已祀為神生涯一撮誠何有且免庸兒共拜塵秋晚悲懐漸老多憂百事忙天寒日短更心傷數分紅色上黄葉一瞬曙光成夕陽春水别來應到海小松生命合禁霜壺中若逐仙翁去待看年華幾許長殘葉一樹摧殘幾片存欄邊為汝最傷神休翻雨滴寒鳴夜曾抱花枝暖過春與影有情唯日月遇紅無禮是泥塵上陽宫女多詩思莫寄人間取次人哭十姪到官六月一作日寄書迴未病封題死後開一命至卑人盡得九泉何事獨相催唯憂旅櫬還鄉逺况是親喪繼踵來數世學文終若此可憐門户轉隳頺秋隂一夜風聲曉更狂起來庭户頓凄凉不知紅日在何處時見黑雲微有光天落水中兼鴈影露啼林罅帶楓香愁人莫苦登高閣説著江山已斷腸寄介夫天恨吾儕各一方夕陽千度到西窻因循流俗今皆是磊落如君信少雙書未隔年難得報心從薄宦始應降可憐漢水無拘係長與旴江㑹九江書懐寄介夫棄材幸免雜輿薪收拾緇衣出洛塵漸老得閒纔是性謾言成謔且隨人能傳身後須文字要識胷中只鬼神俗子不勞輕毀譽問天長乞醉鄉春關徐雲長不絶舊君情元直終隨老母行立效報公何感慨指心辭主更分明三方本以兵攻戰一士能為國重輕多謝曹劉存大度任教忠孝得成名送張宏下第南歸世家元是武夷孫四上觀光預國賔地底豈無干斗氣天邊爭奈飲牛人田宜秫稻應多酒路入溪山漸少塵身計未諧歸計好一樽猶可醉鄉鄰葛陂逢何道士十數年前别我行相逢猶是舊顔形琴聲漸古聽來淡藥味雖凡試最靈出有酒錢天下富住無家地浪頭萍神仙可學應須學萬里蓬萊一㸃青俞秀才山風亭小飲炎炎千室熱如烘亭壓山頭獨有風雨意生獰雲彩黑秋容細碎樹枝紅半天斜日歸心動一面平川醉眼空却是夢魂無所得人間豈少翠微宫謝宋屯田見示永平録海南編多少儒衣只假塗貴來誰肯更觀書其間或以文爭勝未見如君識有餘長把六經為準的最應三代是權輿可憐後世名空在直釣而今豈得魚閩中歲暮休道南人暖過冬苦寒今與北方同霜嚴欲裂地到底日短不行天正中誰使智愚相伴老便將榮辱斷還空鄉愁莫更欺閒客薄酒從來}
