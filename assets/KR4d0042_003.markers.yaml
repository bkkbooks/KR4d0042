  - {type: variant, offset: 7, length: 1, content: 鄕, WYG: 為卑為肥為臞與人類乎與人異乎將天下之利乎將一身而已乎既匪聞而匪見我焉知其所如繄我之生卓犖瓌怪地氣殊絶神休合㑹導愚心之趨驟犯古人之畿界攀或無高博或無大戲鈞天之遺音冒慶雲之渥彩意靈物之所右幸速成於當代難得而易失者時哉青春走兮素髮催衒金丹而不售撫道殣而銜哀然則何為而生何為而來已矣夫嵩高降神生申甫收拾中興還聖主長庚入夢生李白呌噪江南為逐客今之生我豈無意二者他年終一得仙人若在金銀宫歸去來兮誰阻隔旴江集巻一欽定四庫全書旴江集巻二宋李覯撰禮論七篇予㓜而好古誦味經籍窺測教意然卒未能語其綱條至于今兹年二十四思之熟矣比因多病退伏廬下身無他役得近紙筆故作禮論七篇推其本以見其末正其名以責其實崇先聖之遺制攻後世之乖缺邦國之龜筮生民之耳目在乎此矣禮論第一或問聖人之言禮奚如是之大也曰夫禮人道之凖世教之主也聖人之所以治天下國家脩身正心無他一於禮而已矣曰嘗聞之禮樂刑政天下之大法也仁義禮智信天下之至行也八者並用傳之者久矣而吾子一本於禮無乃不可乎曰是皆禮也飲食衣服宫室器皿夫婦父子長㓜君臣上下師友賓客死喪祭祀禮之本也曰樂曰政曰刑禮之支也而刑者又政之屬矣曰仁曰義曰智曰信禮之别名也是七者盖皆禮矣敢問何謂也曰夫禮之初順人之性欲而為之節文者也人之始生饑渴存乎内寒暑交乎外饑渴寒暑生民之大患也食草木之實鳥獸之肉茹其毛而飲其血不足以養口腹也被髪衣皮不足以稱肌體也聖王有作於是因土地之宜以殖百榖因水火之利以為炮燔烹炙治其犬豕牛羊及醤酒醴酏以為飲食藝麻為布繰絲為帛以為衣服夏居橧巢則有顛墜之憂冬入營窟則有隂寒重膇之疾於是為之棟宇取材於山取土於地以為宫室手足不能以獨成事也飲食不可以措諸地也於是范金斵木或為陶瓦脂膠丹漆以為器皿夫婦不正則男女無别父子不親則人無所本長㓜不分則强弱相犯於是為之婚姻以正夫婦為之左右奉養以親父子為之伯仲叔季以分長㓜君臣不辨則事無統上下不列則羣黨争於是為之朝覲㑹同以辨君臣為之公卿大夫士庶人以列上下人之心不學則懵也於是為之庠序講習以立師友人之道不接則離也於是為之宴享苞苴以交賓客死者人之終也不可以不厚也於是為之衣衾棺槨衰麻哭踊以奉死喪神者人之本也不可以不事也於是為之禘嘗郊社山川中霤以脩祭祀豐殺有等疏數有度貴有常奉賤有常守}
