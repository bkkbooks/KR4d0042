  - {type: variant, offset: 33, length: 0, content: '', WYG: 辨馮衍之孺人稚子皆笑歸田周顒之芰製荷衣遂成習隠自兹潜伏何可覬覦豈期天幸之來偶被藩臣之薦深虞累氣難用升聞快炙羙芹敢望獻尊之賞油雲霈雨俄瞻旱稿之苗雖釋褐之有光然事親而甚便不離郷井巳脫民編斯蓋伏遇尊號皇帝陛下道貫幾深仁兼煦嫗時文再郁將令三代同風多士巳寧猶恐一夫不獲故兹狂簡亦預采收敢不䖍奉訓辭益敦學行庭闈是戀幸申為子之誠犬馬未衰庻有報君之日啓謝范資政啓右覯昨奉制命授前件官草茅之愚久不謀於仕進雨露之澤俄下及於賤微俯伏承命銘感在心竊念覯門地孤寒智識遲鈍學問近三紀奔走遍四方昔者充賦報聞而罷數年退居閉闗却掃老母日見皓首雉子未能應門苟非躬親難得衣食况思戴記啜菽盡歡之訓且畏魯經逺遊有方之誡出疆載質自知不諧修身俟死亦何敢怨伏遇某官以周召左右之賢當申甫蕃宣之任棄席疲馬不忘舊物菅蒯顦顇必欲兼用特形慰薦備聞朝廷致此妄庸亦蒙齒録夫冗散一官品秩至下在他人視之則輕然衰族得之已幸稍殊編户便可安居敢不祗承惠貺益進學藝大鈞播物非久具瞻蟠木為器更當有望仰企牆仞下情無任感知荷恩激切之至寄周禮致太平論上諸公啓右覯啓伏以王者之法人必有業梓匠輪輿則當通功易事瘖聾跛躃亦以其器食之故終日無所用心孔子以為誡􅢟斯賊夫糧食揚雄之所惡覯也蚤以薄祐不能及時上乏騏驥千里之力下無鈆刀一割之效退藏山野日就衰老雖然用農夫之榖分工女之帛既得以不死而無益於人平生技能唯在筆硯矧可不勉竭其狂愚伏惟明公嘗以文知今也敢以文請十數年来篋帙所存瑣瑣著述不復有獻謹録周禮致太平論十巻塵於下風世之儒者以異於注疏為學以竒其詞句為文而覯此書於注疏則不異何足謂之學於詞句則不竒何足謂之文惟大君子有心於天下國家者少停左右觀其意義所歸則文學也者筌蹄而已日月光明固不待燈燭之助至於豐屋之下幽室之中照臨所不到處雖銖油寸蠟豈無頃刻之功邪聖人在阼賢人在庭而小子言焉庻有補於萬一也臨啓慚惶何所逃責旴江集巻二十六欽定四庫全書旴江集巻二十七宋李覯撰書上富舎人書舎人執事士之不見禮於世乆矣古之君子以天下為務故思與天下之明共視與天下之聰共聽與天下之智共謀孳孳焉唯恐失一士以病吾元元也如是安得不急於見賢哉後之君子以一身為務故思以一身之貴窮天下之爵以一身之富盡天下之禄以一身之能擅天下之功名望望焉唯恐人之先已也如是誰暇於求賢哉嗟乎天下至公也一身至私也循公而滅私是五尺豎子咸知之也然而鮮能者道不勝乎欲也今夫卜相下藝先民之所不齒者也而所居之室重冠累盖名卿大人引領而願見若饑之食焉以其能言已之禍福故也士之能言天下國家之禍福而未嘗有人欲見焉門未入而閽人拒之者有矣謁既上而辭以事者有矣或貌若恭而情不在焉或言雖交而意不通焉遇之以}
