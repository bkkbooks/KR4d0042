  - {type: variant, offset: 128, length: 0, content: '', WYG: 詩南城吾鄉也因題八句韓偓當年赴七閩舟行過此倍凝神江邊石上知誰處緑戰紅酣别是春往事幾多書不記仙源依舊地}
  - {type: variant, offset: 129, length: 3, content: 耳目口, WYG: 塵花光柳色今何限更有才人勝古人代書答陳次公咄咄休休一世閒百年都是浪悲歡高談不待傍人笑立事須知自古難時見老顔來鑑裏已將生計託雲端六鼇未可揮刀斫肯便臨谿把釣竿來書以俗子疑予求人慰薦故有是答和君賜題堯輔齋壁書林老仙頭欲斑近日卜居呉楚間麻姑世界盡贏得羲皇興味先追還川流切對夏無暑山月出來門未關笑殺區區躁求者不因貧病不曾閒送王都曹古木亭邊夜響晨餞壺重疊擁雙輪高文健筆科塲手白髮青衫宦路人十月霜風還劈面六街塵土㑹欺貧麻源碧澗神仙地早晚歸來伴隱淪送危太博一片靈臺衆共知宦途寧肯避危機至誠似有神明助盡室初從瘴海歸烈火豈能傷美寳覆盆終是見炎暉人生未出功名外多少京塵待染衣題虞侍禁山亭嶺上櫩楹締構新我來登望倍凝神可憐韜畧真名將猶與谿山作主人㑹把松}
  - {type: page-break, offset: 129, content: '', id: KR4d0042_WYG_037-13b}
