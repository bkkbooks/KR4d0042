  - {type: variant, offset: 34, length: 0, content: '', WYG: 人問之以常事一面而去有如道路吁可怪也彼卜相之言禍福受之天而不可變者也雖其知之無益於事士之言禍福在乎人而足以有為者也幸而聞之則禍可轉而為福危可復安亂可復治兹有益之大也貴無益而賤有益為一身而忘天下果其人之忠且賢邪有志之士果宜𤨏𤨏於其間邪覯逺方之人弛擔都下再期月矣惟其山林之狀而魚鳥之心懼取辱於形勢之塗非舊相識曾未敢踵其門將求夫有古君子之道者而為之依歸尚未能也今者友人董士廉自陳之秦相遇於道既稱執事之德髙出於世且言誤聽嘗得區區之姓名有與進之意伏而思之以執事之負雄材得美仕是於其心靡有所不足矣而以草茅之微寘在齒牙豈非有古君子之道以天下為務而急於見賢者乎覯雖非賢焉敢自匿故兹浣濯衣冠請問左右竊念覯資朴不美其生三十餘年所務唯學所好唯經於當時之文誠未有以過人者至若周公之作孔子之述先儒之所未逹歴代之所不行者嘗用功焉其志將以昭聖人之法拯王道之綱製為圖書以備施用明王有作舉而措之四海之内庶乎斯民之復有知也不幸寒餓之鋒刼而去之有懐未果中夜長歎今兹箱篋草具畧有存者旅窮無資弗及繕録執事若於暇日賜之從容當挈其一二陳諸座隅必有可觀者矣吁古之所謂知已者信其道也非徒利其身也不然何山之深而不可廬何水之廣而不可漁著書傳道求聞於後世不猶愈於碌碌食衆人之食乎不宣覯慚汗再拜上劉舍人書舎人執事伏以今之學者露其才業日干於兩制之門者誠以輕重斯文進退多士遇其知則朽株為春華咈其意則夷路為太行故書不憚手之胝言不恤脣之腐拳拳俯伏于下風唯恐不得請也覯誠愚闇竊謂不然且吾君以兩制為賢使主天下之士士之得失天下之本繫焉得一士為天下利繄兩制之功失一士為天下害繄兩制之罪不得罪于君將得罪于民不見非于今將見非于後賢人君子有位有名其肯舍功而趍罪以自貽媿耻哉如是果才邪雖未嘗識面其必不棄矣果不才邪雖日拜乎前其必不取矣則有志之士何足屑屑於其門哉故自弛擔京師于今累月足迹罕及名卿之堂者為是故也然今日所以請見於明公者盖亦有說伏念覯生江南去明公之居不數百里自成童已知讀明公之文辭矣繼聞决髙第效美官立朝廷正色直言磊磊有烈丈夫之氣小人不佞抑好義者也聞古人之風恨不得見况今人之得見而可不請見乎惄如於心為日乆矣昨值明公銜命北方往來數月及節旄之至則抱病邸舍倦於趨走幸今有間輙塵㸃賔次生平所著貧無紙筆弗及自陳明公試引之座隅徐觀其用心可也伏慮左右不察以覯為趍利而來者敢奉書以為先不宣覯恐懼再拜上吳舎人書舎人執事覯家江南結髪學問讀古人之書竊慕其所為而不可得見將求今人之似古者而宗之蚤瞻暮望唯恐弗獲天聖中聞執事以進士舉為太常第一詞章卓異風動逺邇腐儒老生骨醉心死時則見執事之才其後數年天子脩先帝故事親策賢良而執事褎然為舉首推考經術以戴翼世務疑亡闕補言到聖處時則見執事之識居山寥寥去上國三千里望風長懐無路請謁有如衰根病芽棄置幽谷雖知有陽春之和皎日之光不得與尋常草木並受其賜歉然於中積有年矣今兹竊幸詔舉茂才州郡不明以妄庸人充賦弛擔以來博聞髙誼心馳門闑若渇於飲故擇令日塵㸃賔次重念覯性質無似不能與時世爭利捐造化之術而甘於寂寞之道行思坐誦垂二十年其志幸一試用就尺寸之效以章其身千載之後不與碌碌者同泯没為凡鬼於地下聖人當天俊乂雲合有志如此豈敢自必執事當世儒首言重蓍蔡可稱邪為天下稱之可進耶為天下進之不敢求哀以犯公義所業䇿論五十首謹獻諸左右潤色之暇稍賜觀覽千萬幸甚不宣覯再拜上王内翰書内翰學士明公覯江湖凡人生得至愚之性天以六經羣言煨燼之餘以成其愚而不與白雲清泉衣食之奉以養之家貧事親漁釣樵斧不足以具甘㫖朅來人間學習世務續鳬之脛乆而無成今兹聞國家求賢良文學之士蒙不知今竊况於古謂版築飯牛之微或不為時君所棄因出草廬從州郡之舉乞錢為食陸走三千里西嚮轂下京塵㝠㝠勢利相軋既貧且病財不能以備簡墨力不能以事趨走弊衣徒行僮僕楚語誠難以候閽人之顔色以附名卿之焰也非夫烈丈夫抱義慷慨不好苛禮者安能為覯之地哉伏惟明公盛德大名震曜四海仕者學者以為依歸矧曩昔之幸嘗一拜於門下今日之來不敢伏匿自絶髙義輙請見於賔客之後明公亦留意乎所業䇿論五十道姑飾其藁以籍手應用之文未免蕪累觀其大畧可也生平著明堂定制圖一道并序平土書并圖三道皆繩先儒之誤以章聖人大法施諸儒林粗可稱述舊本漫滅未敢自陳暇日一􅂷問焉當指畫於座隅也質野之人言無遜避惟輕其罪而已不宣覯再拜與章秘校書秘校章君足下昨暮枉駕告以東南行徒歩不能送别豈任依依覯初未相識每與丘思語頗得足下之為人及問歐陽校理益信之他日足下顧我於邸舎氣和而言正其辨說駸駸到義理憤世疾惡有大丈夫之芒角此固不待觀文辭而後知其業也噫昔三代之人自非大頑頓盡可以為君子何者仁義禮樂之教浸滛於下自鄉徂國則皆有學師必賢友必善所以養耳目鼻口百體之具莫非至正也足下生今世敎化風俗既無可道况在公相貴富之家非愚且諛孰肯辱於門下是所與居者又可料矣而能自立如此非天資超然異於衆人乎夫將有為之士常憙其類盖類同則志合志合則力并力并則事可行功可成禽邪人獵邪道或掎或角庶乎有備也覯不肖承足下之風歡慰無極詩曰是藨是蓘必有豐年抑強勉而已矣吳越美山水出囂塵臭處而居之者飄飄若僊去然其人物愈衰少安定胡先生瑗往來於其地思古人而不得見姑從之㳺可也逺道慎飲食以適親意幸甚幸甚六月五日旴江李覯白上江職方書知郡職方執事覯伏以新進俗儒樂㳺貴富之門者莫不有求也或崇飾紙筆以希稱譽或邀結勢援以干薦舉或丐禄粟之餘以免困餓或借威柄之末以欺愚弱奴言婢笑情狀百出上之人以其求之私也作為關鍵唯恐拒之之弗絶耳其間雖為有道義而來者亦多以是疑之疑之不釋則所以待之之禮與衆無異故好古㓗㢘之士拂衣逺遁羞與薦紳相聞者可勝道哉覯小人世宅田野上天哀憐以古人之性授之讀書属文務到聖處其言周公之作孔子之述盖多得其根本漢以來諸儒曲見蕪說頗或擊去以此著書數萬言矣不幸少年繆計屢乞鄉舉求而不得祗自穢汚今兹行年三十餘固知非矣方將削迹塵路屏居林藪張皇本心洗滌外慮未明者明之未備者備之使三代之道珠連玉積盡在掌上所大願也若夫毁譽用舎計之已熟譽邪惟天下自譽之覯不求譽也用邪惟天下自用之覯不求用也懐姦攫利所弗忍聞頭斷胷裂直氣不死故常望形勢之塗而不欲一舉趾以趨進於其中誠恐以常人疑之以常人待之則㳺河蹈海不足洒恥近者訪舊吳越彷徉而歸竊承明公以儒學吏術作鎮于此因念今二千石當古諸侯之位而覯幸得尺寸地在治下為居人苟復耿介自異不能一至門左以謝仁政則失所以事邦君之禮輙敢䇿羸馬襲敝衣以貽閽人羞伏惟明公聽其言察其意知其非有求而來者則覯也可無悔矣不宣覯再拜上慎殿丞書知郡殿丞執事覯伏以佩有青幨有彤生善殺惡為天之工斯士之甚通策無馬呼無僮衣麻食菽于山之中斯士之甚窮於戯以勢言之則弗類以道言之則無間故吳公之治河南而賈誼薦陳蕃之守豫章而徐穉禮風流未逺學者稱之今兹請謁敢以藉口竊念覯郡之衣冠家也數十年來禄禀中絶天恤私門不惜中和一㸃氣造為蕞爾之微躬生年未幾不憙他習惟文惟學如哺如乳媚于耳目貫于心胷蚤夜專一其樂無筭勝冠以還盖有成矣其或刮簡含墨騁騖文苑金無鑛堅玉無璞頑尋英取華所嚮皆得至於仁義之淵禮樂之源顧嘗吞吐堯舜掲厲商周先代諸儒或有慚德雖州郡齟齬莫肯聞薦而縉紳先生當名路者多賜賞激謂非凡人以此自信若當大任且貧且賤不怨不悔上事老母旁無昆弟乞錢為食來往江湖零丁孤苦積有年矣今者竊嚮明公以賢人之業仕聖王之時激昻朝著指取郡寄惟兹桑梓輙枉旌斾雖壺漿之迎曽未至止而愛民之譽樂善之稱隨風北來襲滿人耳此誠有志之士剖堙鬱祈顧遇之秋林澤雖廣豈敢伏竄謹與諸生犇問羈靮前之所陳固失謙讓但以渦沈俗間幸遇明哲不能自言誰為言者郊次煩猥非敢願見視事之後惟賜接納乃問乃聽騐其所有苟復碌碌與常儒同則面欺之罪委于吏議可也不宣覯再拜上楊屯田書知郡屯田執事竊以唐有天下垂二十世明皇文治之盛也而燕公佐之宋有天下今數十年真宗文治之盛也而文公佐之二公之才相似其遇時得君樹功立業亦復不異然燕公既沒而均垍從偽隕其家世文公既沒而執事之名籍甚當代其故何哉愚以為至忠大節抑姦與正王家所頼天鬼所信惟文公有焉傳曰君子善善也長惡惡也短善善及子孫惡惡止其身以文公之賢其後世固當得志矣况執事聰明多識剛中能斷為儒有學術歴官有政績盖如孔子之後而生伋文中之後而生勃宜夫士大夫服膺之弗暇也覯草野之人未得仕進頃因薄逰毎聽髙義前年冬龍圖髙平公在㑹稽嘗以尺書來召且言執事監郡留意講學促令見之屬以窮愁多故辨装不早及其至彼則執事西行且數日矣高平公一見深以小人不得侍坐於長者為歎羇旅之心悔恨多矣昨者還鄉竊聞車騎布惠兹土且以水陸之逺才數百里敢求寧居以咈所願謹正衣纓來伏賔位恭惟執事之明必有所以待之之道矣生平志業未敢自陳苟賜從容當稍布于左右輕犯明哲伏深媿畏不宣覯再拜上聶學士書省判記注學士執事伏以哲人既沒禮樂失其師而竒衺戰之雅正大潰遺音舊器殘破畧盡典經所志什不存一儒其服者莫肯蹔寄目於其間將何以格天神召和氣隂陽之錯行風俗之不脩職此故也吾王以一統之大再造聖法與民惟新爰募儒林俾言大樂詔下之日有識慰抃然古道廢乆能者誰何執事才兼萬人心照億載聲音之道蚤所詳明因與一二君子專制其事歴時未幾改作大備諒已韻莖英之啞起韶夏之僵后䕫足蹈於幽墟師曠耳傾於鬼部朝之鴻碩疇敢措辭覯江南賤夫行年二十八矣唯學古憙事其志燄然竊聞朝家興復治世之作第恨其身不獲齒廷臣之末得以升太廟侍圎丘聽八音之發不徒破堙鬱洗邪辟抑以觀先聖王所以應天感人其法度何如也所懐未果嗟憤何極雖然姑願一拜先生之容側聆至言以辨大方因以卜已道之臧否幸亦多矣昨始至都下盖曾候問僕人然卒未克吐其區區今兹是用有言於左右執事其亦少留意乎覯嘗以明堂者古帝王之大事也而去聖乆逺規模莫見周禮考工記大戴禮盛德篇禮記月令室个之說參差不齊繇漢及唐老師大儒各執一經相為矛楯有國者不知所以裁定遂使布政之宫缺而不立雖有作者皆取臨時處置非復先王之法象覯謂周禮大戴禮禮記皆聖人賢人之所作述不宜輙有乖異反復思念則三家所指制度果同但立言質略意義弗顯訓傳之士泥文太過遂成派分故嘗挾而正之决而通之不以文害辭不以辭害意三家之說坦然大同堂室之度靡所回惑的的然如見成王周公享帝視朔朝諸侯於其上因作明堂定制圖一道并序約五千言非執事牽古知變不牽於世俗之論則不能以别此書然恐計府少暇重以煩暑未逮熟觀之謹先以所著潜書十五篇野記二篇禮論七篇塵穢几上試加一覽可粗見其存心苟不以菲薄而棄之時因休沐曲賜甄問則當奉法宫之議鋪陳於席次然後足以盡其才謂其善則薦之可也譽之可也其未至者則教而成之固儒師之職耳羇旅貧困無紙墨傭寫之資止於具草本而已伏惟仁賢畧其常禮而鑒其苦心幸甚幸甚不宣覯恐懼再拜上葉學士書省判學士執事覯生江楚間始數歲竊習其家書見晁董公孫之對問决科皆所以發天人之秘而彌縫國家之務漢往而唐聯幾百}
