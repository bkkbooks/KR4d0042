  - {type: variant, offset: 194, length: 10, content: 與旴之士參以它書讎正, WYG: 上樓宣室歲餘虚席在青山何路更重遊七言八韻送知軍曹比部移䖍州要知賢者善居官法自嚴明性自寛黠吏欲欺難作計愚民初懼久方安獄辭大小情皆見市物公私價一般農力不聞供土木窮閻猶得免飢寒星為}
