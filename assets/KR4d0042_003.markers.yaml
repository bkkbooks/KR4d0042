  - {type: variant, offset: 15, length: 2, content: 敬梓, WYG: 隤其土以附苗根比盛暑隴盡而根深能風與旱其耕耘下種田器皆有便巧用耦犂二牛三人一嵗之收常過縵田畮一斛以上善}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 倍之民或苦少牛過奏故平都令光以為丞教民相與庸輓犂以故田多墾闢用力少而得榖多斯近古之事效驗甚明而歴代莫以為意何也國用第七載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征謂宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟民雖有間無職事者猶出夫稅家稅夫稅者百畮之稅家稅者出士徒車輦給繇役也閭師凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰謂庶人五母雞二母彘無失其時是以不畜者罰之死後祭無牲也黍稷曰盛耕者所以殖黍稷今田不耕非直罰以屋粟又死後祭無盛也五畮之宅樹以桑麻今宅不毛非直罰以里布死後又無椁也蠶則得帛不蠶故身不得衣帛績則得布不績故死則不為之着哀以罰之也夫財賦力征人所吝嗇與其無事而重孰若有業而輕以此罰之敢或不勉者乎帛所以養老衰所以送死葬禮祭禮乃為令終一有解惰則不得用以此罰之敢或不勉者乎是聖人敺民以反本之術也漢髙祖令賈人不得衣絲乗車重稅租以困辱之孝恵髙后時為天下初定復弛商賈之律然市井子孫亦不得為官吏商賈乃在四民之目而前代且謫之後之㳺惰去四民逺甚者其類不可勝數為國者非徒函容或尊寵之傷哉國用第八一夫之耕食有餘也一婦之蠶衣有餘也衣食且有餘而家不以富者内以給吉㓙之用外以奉公上之求也而况用之無節求之無藝則死於凍餒者固其勢然也故土均掌和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地媺惡為輕重之法而行之掌其禁令禮俗邦國都鄙民之所行先王舊禮也君子行禮不求變俗隨其土地厚薄為之制豐省之節耳司書三嵗則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之政令逆謂鉤考也恐其羣吏濫稅斂萬民故知此本數乃鉤考其政令也夫奢則以為榮儉則以為辱不顧家之有亡汲汲以從俗為事者民之常情也是故為之禁令地媺收多則用之豐地惡收少則用之省如此民皆知惜費矣虧下以益上貪功以求賞不恤人之困乏皇皇以言利為先者吏之常態也是故為之鉤考雖器械六畜山林川澤必知其數如此吏不敢厚斂矣民皆知恤費吏不敢厚斂而不免凍餒者未甞聞也禮器曰居山以魚鼈為禮居澤以鹿豕為禮君子謂之不知禮然則地之惡禮不可輕耶有若曰百姓不足君孰與足然則民之財官可不知耶是先王之所以得後世之所以失也國用第九職方氏凡邦國小大相維王設其牧制其職各以所能制其貢各以其所有謂國之地物所有也諸侯得稅大國半次國三之一小國四之一皆市取當國所有以貢於王也土訓掌道地圖以詔地事道地慝以辨地物而原其生以詔地求辨地物者别其所有所無原其生生有時也以此二者告王雖是當州所有而生有時地所無及物未生則不求也大哉聖人念民勤恤財匱如是其著也地所有而官不用則物必賤地所無而反求之則價必貴况天時所不生則雖有如無矣買賤賣貴乗人之急必刼倍徙之利者大賈蓄家之幸也為民父母奈何不計本末罔農夫以附商賈令下之日吏旁為姦公不獲皮毛而私啄其髓矣壊民家敗民産此其甚也夏書任土作貢厥貢厥篚九州不同前聖後聖豈非一揆者乎漢桑都尉領大農以諸官各自市相争物以故騰躍而天下賦輸或不償其僦費廼請置大農部丞數十人分部主郡國令逺方各以其物如異時商賈所轉販者為賦置平準於京師都受天下委輸大農諸官盡籠天下之貨物如此富商大賈亡所牟大利則反本而萬物不得騰躍故抑天下之物名曰平準桑雖聚斂之臣然此一役豈無法耶孝武時國用饒給而民不益賦誠有以也國用第十司稼廵野觀稼以年之上下出斂法斂法者豐年從正㓙年則損也廪人掌九榖之數以嵗之上下數邦用以知足否以詔榖用以治年之凶豐凡萬民之食食者人四鬴上也人三鬴中也人二鬴下也若食不能人二鬴則令邦移民就榖詔王殺邦用謂以嵗之豐㓙得稅物多少之帳計國之用以知足否若嵗㓙稅物少而用多則不足廪人既知多少足否乃詔告在上用榖之法也夫什一而稅天下中正是故謂之徹徹者通也然耕穫之事豐儉亡常不幸㓙旱水溢或螟螣蟊賊農雖盡力榖有不登而有司必求如法於理安乎孟子道龍子之言曰治地莫善於助莫不善於貢貢者校嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然将終嵗勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也故聖人設官必於榖之将熟廵於田野觀其豐凶而後制稅斂焉豐年從正亦不多取也凶荒則損何取盈之有哉然則龍子所見盖周之末世周公雖貢未甞聞其不善也然而取之少則用不得不殺取少而用不殺則國不能自濟非反乎民将焉得也宜其知足否而詔榖用焉王制曰冡宰制國用必於嵗之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出由此道也後世作者除減斂法則既聞之矣至於邦用其可忽諸旴江集卷七欽定四庫全書旴江集卷八宋李覯撰國用第十一泉府掌以市之征布斂市之不售貨之滯於民用者以其賈買之物楬而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後予之凡賖者祭祀無過旬日喪紀無過三月凡民之貸者與其有司辨而授之以國服為之息物楬而書之物物書其賈也不時買者謂求急者也賖謂祭祀喪紀二者事大故賖與民不取利也貸者即今之舉物生利也與其有司别其所授之物所出之利各依其服事之稅若其人受園㕓之田而貸萬泉則朞出息五百他倣此也天之生物而不自用用之者人人之有財而不自治治之者君繫辭曰理財正辭禁民為非曰義是也君不理則權在商賈商賈操市井之權斷民物之命緩急人之所時有也雖賤不得不賣裁其價太半可矣雖貴不得不買倍其本什百可矣如此蚩蚩之氓何以能育是故不售之貨則斂之不時而買則與之物楬而書使知其價而况賖物以備禮貸本以治生皆所以紓貧窶而鉗并兼養民之政不亦善乎管仲通輕重而桓公以覇李悝平糴而魏國富彊耿夀昌築常平而民便之師古之效也宜其流風遂及於今必也事責其實官得其人亦何媿彼哉國用第十二司市凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使㣲利利於民謂物實厚者害害於民謂物行苦者使有使阜起其賈以徴之也使亡使㣲抑其賈以却之也侈靡細好使富民好奢㣲之而已又偽飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二所以俱十有二者工不得作賈不得粥商不得資民不得畜王制曰用器不中度不粥於市兵車不中度不粥於市布帛精麤不中數幅廣狹不中量不粥於市姦色亂正色不粥於市五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鼈不中殺不粥於市亦其類也夫理財之道去偽為先民之詐偽盖其常心矧兹市井飾行儥慝何所不至哉姦偽惡物而可雜亂欺人以取利則人競趍之矣豈唯愚民見欺邪使人妨日廢業以作無用之物人廢業則本不厚矣物無用則國不實矣下去本而上失實禍自此始也至於侈靡皆為人費雖不可盡去亦當制節使㣲少矣孟冬之月令曰毋或作為淫巧以蕩上心必功致為上書曰不貴異物賤用物民乃足此之謂也噫為國家者孰不有意哉言而必信令而必行鮮矣國用第十三遺人掌邦之委積以待施惠郷里之委積以恤人之囏阨門關之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待㓙荒委積者計九榖之數足國用以其餘共之也囏阨謂民有困乏則振恤之門關謂出入有稅足國用之外留之以養死政之老與其孤也郊里六鄉之民居郊者其委積以待賔客至郊與王國使者接因與之廪餼也野鄙謂六遂客有羇縶未得去者則於此惠之縣都謂四百里五百里中年榖不登則畿内畿外通給之也世之有饑穣天之行也禹湯之聖猶弗能免至於困窮孤獨寄客之人皆國所常有安坐而視其死則非仁人在上視民如傷者之意皆推其惻隱則邦用有經倉之榖孰為閒粒府之帛孰為羨縷如是而輟焉禍盖博矣故宜於大有年時畜積以備之倉人有餘則蔵之以待㓙而頒之職内敘其財以待邦之移用亦謂此也然而洪範云臣無有作福晏子稱家施不及國使民弗知主恩而謂為已力乃人臣之常過國家之大患也故郷師以嵗時廵國及野而賙萬民之囏阨以王命施惠此慮之深禮之至也然則義倉之法亦有取焉耳國用第十四司救凡嵗時有天患民病則以節廵國中及郊野而以王命施惠由是觀之非直凶荒而後施與也疾疫亦有之矣夫四時之厲或連月不愈或闔門不起丁壯卧於牀蓐則老稚無能為飲食所不給醫藥所不濟以至於死者豈天命乎人主所宜動心矣賈師凡天患禁貴儥者使有常價亦為此也司關國㓙札則無關門之征猶㡬由是觀之凶年非直除減田租彼貨賄之征皆舍之疾疫亦然夫阻饑之人營求衣食固無所不至又将籠其貨賄則何以措手足乎况於疾疫之世安得助天為虐耶人主所宜動心矣掌客凡禮賔客國新殺禮凶荒殺禮札喪殺禮禍烖殺禮在野在外殺禮由是觀之非直以嵗之下則殺邦用若新建國及札喪禍烖在野在外皆殺禮也禮許儉不非無安得重困於無聊之民求備乎籩豆之事也人主所宜動心矣膳夫大荒則不舉大札則不舉天地有烖則不舉邦有大故則不舉由是觀之非直於外事殺禮若王膳亦為之貶也譬諸父母其子之不哺而日餘膏粱可哉人主所宜動心矣故曲禮曰凶荒年榖不登君膳不祭肺馬不食榖馳道不除祭事不縣大夫不食粱士飲酒不樂皆自貶損憂民之道也如此天不為之感人不為之悦用度不足海内不安未之前聞也國用第十五鄉師以國比之法以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令糾禁聽其獄訟鄉大夫以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以嵗時入其書征之者謂給公上築作挽引道渠之役也國中復除者多役使者少人少則勞故晚役而早免之二十以及六十是也野復除者少役使者多人多則逸故早役而晚免之十五以及六十五是也君子之於人裁其勞逸而用之可不謂義乎世有仕學之鄉或舍役者半農其間者不亦難乎而上弗之恤悖矣貴者有爵命服公事者有功勞誠不可役然復其身而已世有一戸皆免之若是則老者疾者亦可以闔門不使耶至於馬牛皆辨其可任善夫世有人未嘗芻秣而責以牽徬其僦費敗家者衆矣况乎水旱疾疫之嵗饑餓之弗察死亡之弗圖而臨以定制敺之給使可乎故均人凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉㓙札則無力政無財賦也古者使民嵗不過三日而秦法月為更卒已復為正一嵗屯戍一嵗力役三十倍於古何不仁之甚也天下畔之晚矣國用第十六大司徒以保息六養萬民六曰安富謂平其繇役不專取也大哉先王之法其所以有天下而民不斁者乎孔子謂既庶矣富之既富矣教之管子有言倉廪實知禮節衣食足知榮辱然則民不富倉廪不實衣食不足而欲教以禮節使之趍榮而避辱學者皆知其難也及其為國家則有反是者矣田皆可耕也桑皆可蠶也材皆可飭也貨皆可通也獨以是富者心有所知力有所勤夙興夜寐攻苦食淡以趣天時聽上令也如此而後可以為人之民反疾惡之何哉疾惡之則任之重求之多勞必於是費必於是富者幾何其不黜而貧也使天下皆貧則為之君者利不利乎故先王平其繇役不專取以安之也漢武帝時筭賈人之緡匿不自占占不悉戍邉一嵗沒入緡錢有能告者以其半畀之即治郡國緡錢得民財物以億計奴婢千萬數田大縣數百頃小縣百餘頃宅亦如之商賈中家以上大氐破民媮甘食好衣不事畜蔵之業當是之時天下何如其不亡者幸也世俗不辨是非不别淑慝區區以擊彊為事噫富者乃彊邪彼椎埋而誅者果何人也旴江集卷八欽定四庫全書旴江集卷九宋李覯撰軍衞第一兵者國之大事人知之矣然先王足兵而未嘗有兵後世有兵而未嘗足兵何以言之小司徒會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人唯田與追胥竭作夏官序凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長凡民在鄉則五家為比家出一人故在軍五人為伍比長因為伍長五比為閭故五伍為兩閭胥因為兩司馬四閭為族故四兩為卒族師因為卒長五族為黨故五卒為旅黨正因為旅帥五黨為州故五旅為師州長因為師帥五州為鄉故五師為軍鄉大夫因為軍將士不特選皆吾民也將不改置皆吾吏也有事則敺之於行陣事已則歸之於田里無招收之煩而數不闕無禀給之費而食自飽故曰先王足兵而未嘗有兵也壘壁以聚之倉庫以生之羣眠類坐而不使補死填亡之不暇故曰後世有兵而未嘗足兵也管仲相齊桓公作内政而寓軍令焉故卒伍定乎里而軍政成乎郊連其什伍居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死其教已成外攘夷狄内尊天子以安諸夏然則鄉軍之法固嘗試矣善哉軍衞第二大司馬中春教振旅遂以蒐田火弊獻禽以祭社中夏教茇舍遂以苗田車弊獻禽以享礿中秋教治兵遂以獮田羅弊致禽以祀祊中冬教大閲遂以狩田徒弊致禽饁獸于郊入獻禽以享烝夫守國之備不可以不素習也不素習則敺市人而戰之未足為喻也是故春教兵入平列陳如戰之陳辨鼔鐸鐲鐃之用以教坐作進退疾徐疏數之節夏教草止如振旅之陳辨號名之用以辨軍之夜事秋教師出如振旅之陳辨旗物之用至冬大閲簡軍實焉然而不祥之器不得已而用之若無故而習是習殺人也非示天下不復用兵之意也故因春蒐夏苖秋獮冬狩而教焉鳥獸魚鼈皆函血氣若無故而殺是暴天物也作禽荒也故因祭社享礿祀祊享蒸而行焉明非好兵也為田獵也非好田獵也為祭祀也其名甚美其實甚利外以彰事神之禮非美乎内以作不虞之偹非利乎聖人之動其順如此顧不足為後世法乎天下無事則卒伍放于冗從器械束于故府學軍旅者指為凶人一方有警則旦收而暮教之暮教而旦發之人情焉得不驚戰陣焉得不敗至有以講武為戲樂用相夸示先王之禮沒於淫樂中者亦不足算也軍衞第三宫伯掌王宫之士庶子凡在版者掌其政令行其秩敘作其徒役之事授八次八舍之職事若邦有大事作宫衆則令之王宫之士謂王宫中諸吏之適子也庶子其支庶也秩謂依班秩受禄敘者其才藝髙下為次第以作其徒役者士庶子屬太子隨其所用使役之也八次八舍衞王宫者必居四角四中於徼候便也大事謂寇戎之事起宫中之衆使士庶子行則宫伯戒令之也宫正掌王宫之戒令糾禁去其淫怠與其竒衺之民㑹其什伍而教之道藝民謂宫中吏之家人也宫正掌宫中卿大夫士亦兼掌子弟若有為淫放怠慢譎觚非常之行則去之又㑹合之五人為伍二伍為什欲使宿衞時語言相體服容相識及其學問又相親切磋琢磨道藝謂三徳三行六藝也若是則宫中諸吏之子弟必當備宿衞從征役且聽太子之令也豈唯宫中諸吏之子弟而已哉凡公卿大夫元士之子亦然故諸子掌國子之倅掌其戒令與其教治辨其等正其位國有大事則帥國子而致於太子唯所用之若有兵甲之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正也大哉王者之師其備矣乎非直興於閭里抑又取諸世族彼以父祖貴富宜有報上}
