  - {type: variant, offset: 12, length: 0, content: '', WYG: 不得巳焉耳論一或問劉氏之説河圖洛書同出於伏羲之世何如曰信也繫辭稱河出圖洛出書聖人則之其指在作易也則不待禹而得之明矣其所圖者信乎曰洛書五十有五協於繫辭天地之數河圖四十有五雖於易無文然其數與其位灼有條理不可移易非妄也惜乎劉氏之辯則過矣或曰敢問河圖之數與位其條理何如曰一三五七九竒數陽也非中央則四正矣坎離震兊之位也二四六八耦數隂也不得其正而得四隅矣乾坤艮巽之位也乾坎艮震陽卦位也則左旋兊坤離巽隂卦位也則右轉竒則先左而後右耦則先右而後左坎一震三也兊七離九也坤二巽四也乾六艮八也抑又縱横數之皆得十五此非灼有條理不可移易者乎或曰劉氏之辯其過焉在曰劉氏以河圖洛書合而為一但以河圖無十而謂水火木金不得土數未能成形乃謂之象至於洛書有十水火木金附於土而成形矣則謂之形以此為異耳其言四象生八卦則取河圖之七八九六以其有象字不可用洛書之形故也其下文又引水六金九火七木八而生八卦於此則通取洛書之形矣噫何其自相違也矧曰天五居中而主乎變化上駕天一而生地六下駕地二而生天七左駕天三而生地八右駕地四而生天九者不亦惑乎夫所謂生者言乎其始也苟河圖之象生八卦則洛書之形又生八卦者何也若以聖人既取河圖之數以畫卦而洛書之數止為揲蓍則其論云在河圖則老陽老隂少陽少隂之數此又已言揲蓍矣反覆不通故曰自相違也夫天一至地十乃天地之氣降出之次第耳謂之五者非有五物謂之十者非有十枚而曰五十有五者盖聖人假其積數以起筭法非實數也如人兄弟行下浪反第一至第十者乃十人耳焉可謂有五十五人哉厥初太極之分天以陽髙於上地以隂卑於下天地之氣各亢所處則五行萬物何從而生故初一則天氣降於正北次二則地氣出於西南次三則天氣降於正東次四則地氣出於東南次五則天氣降於中央次六則地氣出於西北次七則天氣降於正西次八則地氣出於東北次九則天氣降於正南天氣雖降地氣雖出而猶各居一位未之㑹合亦未能生五行矣譬諸男未冠女未笄昏姻之禮未成則何孕育之有哉况中央八方九位既足而地十未出焉天地之氣誠不備也由是一與六合於北而生水二與七合於南而生火三與八合於東而生木四與九合於西而生金加之地十以合五於中而生土五行生而萬物從之矣二四易位而一三五如其初者當所王之方也夫物以隂陽二氣之㑹而後有象象而後有形象者胚胎是也形者耳目鼻口手足是也河圖之數二氣未㑹而劉氏謂之象悖矣若夫洛書之數五位既合則五行有象且有形矣象與形相因之物也其一二三四五為生數六七八九十為成數者徒以先後分之耳其實二者合而後能生生則成矣盖非一生之待六而後成也假令河圖是象洛書是形則取洛書而為八卦者亦非酌水燃火伐木鍛金而成之也直取其象耳以法象而言之不亦可乎何其固執形象之象也其曰天五駕一二三四而生六七八九者愈乖逺矣且隂陽㑹合而後能生今以天五駕天一天三乃是二陽相合安能生六生八哉天降陽地出隂隂陽合而生五行此理甚明白豈有陽與陽合而生隂哉况所謂五者乃次第當五非有五物也其一與六合之類皆隔五者盖以一二三四五主五方而六七八九十合之周而復始必然之數非有取於天五也其不用五竒主五方而五耦合之者陽方則竒為之主而耦與之合隂方則耦為之主而竒與之合又昭昭矣至如劉氏所圖太極生兩儀一二三四其解曰畫天左旋畫地右動今按其畫天一在坎天三在震誠左旋也地二在離地四在兊亦左旋耳非右動也夫所謂左旋者如斗柄自寅向卯也右動者如日月五星自丑向子也今以自午向酉而為右動何哉若直以東北為左方西南為右方以分天地之位則又不可謂之旋且動也旋動者進前之意也設謂陽升隂降先兊四而後離二則繫辭所陳先二而後四未甞倒言之也如是則劉氏之解果繆矣注易圖易自謂窮天地之理而乃未明左旋右動之法甚哉其可笑也論二或曰劉氏謂聖人以河圖七八九六而畫八卦而吾子之意乃取洛書何也曰繫辭稱八卦成列象在其中矣謂備天下之象也河圖之數二氣未合品物未生何所象乎洛書之數五行成矣萬物作矣於是象金而畫乾兊象土而畫坤艮象木而畫震巽象水而畫坎象火而畫離不言五而言四象者以土分王四時舉四行則土可知矣又以四行之數而揲蓍七少陽八少隂九老陽六老隂是也曰敢問畫卦皆取洛書矣其於河圖何所則也曰則其位也河圖有八方之位洛書有五行之象二者相須而卦成矣曰劉氏以為六居坎而生乾謂三為坎三為乾也九居兊而生坤謂三為兊六為坤也七居離而生巽謂三為離四為巽也八居震而生艮謂三為震五為艮也何如曰以位數之則乾坤艮巽亦三位也以畫數之則坎震亦五畫也離兊亦四畫也何其或以位數或以畫數反錯之甚也况説卦稱六畫而成卦六位而成章彼重卦然畫與位等耳未常析言之也苟析言之則坤六位而十二畫矣焉得曰六畫成卦也雖繫辭陽一君而二民盖取隂耦以喻人臣代終之義非可積以為數也今謂人有二心者非可積十人以為二十心也且劉氏説天地之數六者有六物耳而乃以一爻分為二畫以當二物可乎歴觀諸卦以爻為人雖隂爻亦一人耳帝乙歸妹非有兩妹也箕子明夷非有兩箕子也然則劉氏畫卦之説其不可用明矣矧聰明睿智創制立法固不區區專決於圖書故曰古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之冝近取諸身逺取諸物是不專決於圖書參互而後起之者也聖人既按河圖有八方将以八卦位焉洛書有五行将以八卦象焉於是觀隂陽而設竒耦二畫觀天地人而設上中下三位純陽為乾取至健也純隂為坤取至順也一陽處二隂之下剛不能屈於柔以動出而為震一隂處二陽之下柔不能犯於剛以入伏而為巽一陽處二隂之中上下皆弱罔克相濟以險難而為坎一隂處二陽之中上下皆強足以自託以麗著而為離一陽處二隂之上剛以駁下則止故為艮一隂處二陽之上柔以撫下則説故為兊也西北盛隂用事而陽氣盡矣非至健莫能與之争故乾位焉争勝則陽氣起故坎以一陽而位乎北坎者險也一陽而犯衆隂誠不為易而為險也艮者止也物芽地中将出而止也待春之謂也自此動出乎震絜齊乎巽離者明也萬物皆盛長得明而相見也坤厚以養成之成而説故取諸兊也畫八卦分八方之義如斯而已也或曰説卦稱勞乎坎謂萬物閉蔵納受為勞也成言乎艮謂萬物之所終也今吾子之言似不類者何也曰孔子據物終於地上而言也覯取諸物始於地下而言也所以就足先聖之論使人不疑耳或曰劉氏謂三畫象三才為不詳繫辭之義則以乾之三畫為天之竒數三一三五皆陽也坤之三畫為地之耦數三六八十皆隂也獨陽獨隂無韞三才之道者何如曰劉氏學易乃不知畫之與位各一事也畫者譬諸人也位者人所處之地也三畫雖純陽象天而三位有天地人之别何害也上中下三位譬如公也卿大夫也竒耦二畫譬如君子也小人也公卿大夫皆君子盖有之矣皆小人亦有之矣或一君子而二小人或一小人而二君子猶行人之止傳舍何常之有安可見純天便曰無地位見純地便曰無天位哉且其引説卦兼三才而兩之故易六畫而成卦以為六畫包三才無三畫韞三才之説噫何其􅅺也三畫象三才矣重之為六又象三才何害也若三畫之時乾為天坤為地六畫之後亦不免為天為地也三畫之位則初為地二為人三為天六位則初二為地三四為人五上為天從宜改易何固執之為哉且劉氏論三才則引説卦六畫破先儒三畫以為不經及其論竒耦則用天三竒地三耦天地各減其二不顧繫辭五位有合之説是經乎不經也又其論乾元用九謂天一天三天五陽數也坤元用六謂地二地四隂數也至其下文以天五散在五行天一居尊不動餘有天三地四合而成九天三則乾之三畫地二地四則坤之六畫陽得兼隂故乾三兼坤六而乾元用九也噫陽不可兼隂乎則天三何以稱用九陽果得兼隂乎則天一天三天五當兼地二地四何以不稱乾元用十五也輕先儒九揲六揲之通義而務求新不虞錯亂之至此鄙哉論三或人敢問大衍之數五十諸儒異論何如曰京房馬季長荀爽之釋吾無取焉耳至於鄭康成姚信董遇以為天地之數五十有五減五而用之劉氏亦同此説吾有取焉耳此章上言大衍之數下言乾坤之策中言天地之數非衍之用而何也然所以減之之意或謂減五行或謂減六畫或謂減天五盖未之思矣夫五行六畫天五減之之可否不足復詰吾直謂天地之數雖五十五至揲蓍之法止可用五十故取其整數而已也只如期三百六旬有六日而乾坤之策三百六十當期之日又豈可言無六策以當六日者别有意也聖人揲蓍虚一分二掛一揲四歸竒再扐確然有法象非苟作也故五十而用四十九分於兩手掛其一則存者四十八以四揲之十二揲之數也左手滿四右手亦滿四矣乃扐其八而謂之多左手餘一則右手餘三左手餘三則右手餘一左手餘二右手亦餘二矣乃扐其四而謂之少三少則扐十二并掛而十三其存者三十六為老陽以四計之則九揲也故稱九三多則扐二十四并掛而二十五其存者二十四為老隂以四計之則六揲也故稱六一少兩多則扐二十并掛而二十一其存者二十八為少陽以四計之則七揲也故稱七一多兩少則扐十六并掛而十七其存者三十二為少隂以四計之則八揲也故稱八所謂七八九六者盖取四象之數也以是五十之策不可増損増一損一則不可揲之矣故康伯述輔嗣之㫖曰演天地之數所賴者五十也苟謂聖人以五行天五之故特減其五則未知不減之時如何揲也以五十五而虚其一又掛其一則兩手五十三十三揲之數而餘一也左手雖得四右手尚餘一左手三則右手二左手二則右手三左手一則右手四終無平時雖童子亦知不可為也五十之上唯五十四可矣虚一掛一則兩手五十二十三揲之數也然三少則存者四十三多則存者二十八一少兩多則存者三十二一多兩少則存者三十六乾元當用十坤元當用七少陽八而少隂九矣其下唯四十六虛一掛一則兩手四十四十一揲之數也然乾元當用八坤元當用五少陽六而少隂七矣不徒不應四象之數陽反而耦隂反而竒矣吾故謂揲蓍之法止可用五十故取其整數而已也或曰虚其一者康伯以為太極劉氏以為夭一何如曰究觀繫辭以四十九分而為二以象兩則是虚一在兩儀之前也下文太極生兩儀則又太極在兩儀之前太極與虚一相當則一非太極而何也且其謂大衍後天地之數則太極不可配虚其一之位此又不思之甚矣作大衍之法誠在數之後矣然其所取象固在數之先所謂分而為二以象兩者也盖有兩儀而後有數也既可象兩儀於數之先豈不得配太極於兩儀之上哉若以一二三四便為兩儀則天非一天地非一地而已也是知天地者其體也一二三四之類其氣也苟虚一以象天一之氣而分四十九以象兩儀之體則是逸其末而勞其本於義乖矣又破康伯之注無不可以無明必因於有以謂太極其氣已兆非無之謂噫其氣雖兆然比天地之有容體可見則是無也又稱聖人之辭易有太極既言有則非無之謂也吾以為天地之先強名太極其言易有太極謂有此名曰太極者耳非謂太極便有形也如老子之言恍忽中有物有象不可一見有字便指為實物實象也}
