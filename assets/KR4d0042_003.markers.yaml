  - {type: variant, offset: 71, length: 0, content: '', WYG: 送死舉無其柄天下之人若饑渇之於飲食苟得而已當是時也釋之徒以其道鼓行之焉往而不利云云至於叙其傳法始卒甚詳此誠文勢不得不然吾自無思無為之義晦而心法勝以下言儒不能明其道而釋以其說象之故嗣迦葉者師子達摩以下言此衰致彼盛也非習聞其說樂其誕而自小如孔子吾師之弟子之類也若夫按白居易碑迹景雲大師之事盖取其與顔太師真卿等友善魯公之大節古今鮮儷而善於一浮屠必若澄觀受知於韓吏部之比其人材有足稱者也而景雲乃景德之舊因使其徒有所矜式焉然則取信於白居易何尤哉又覯所謂及味其言有可愛者盖不出吾易繫辭樂記中庸數句間漢傑以為仲尼子思羣聖人之作述豈與此等說較論而爭衡邪是誠漢傑之不思也且吾謂儒者困于滛辟恤乎罪疾欲聞性命之趣不知吾儒自有至要反從釋氏而求之然後乃曰及味其言有可愛者盖不出吾易繫辭樂記中庸數句間苟不得已猶有老子荘周書在何遽冕弁匍匐於戎人前邪請詳此意豈謂仲尼子思與之較且争乎盖以釋之言雖有可愛者亦吾聖人先已言之矣何必去吾儒而師事戎狄哉苟不得已尚不如學老荘其意亦昭昭矣彼釋之書數千百巻而不出吾數句間其輕重如何哉漢傑責於人無若是之暴也夫所賤鄭衞者非謂全無五聲十二律不與雅樂相似也唯其不中正耳毛嬙西施面目亦與人同豈彼數千百巻書而無與吾聖人一句一字合者哉九流百家同出於聖人而有所偏耳聖人之備其於用也交相濟故得中焉諸子之偏其於用也執一而已故有過有不及也亦非謂無一句一字與聖人合者也譬諸良醫之治疾實者則瀉之虚者則補之熱者使之服涼冷者使之服暖故天下之疾無不治也聖人之道如此諸子則不然見瀉而愈者則謂天下之疾皆可瀉見補而愈者則謂天下之疾皆可補於熱於冷亦然故用藥失宜而療病多死也非謂其方不與良醫相似也學者之視諸子若異類焉是亦過矣漢傑罪我不如李習之不為僧作鐘銘習之之論信美矣然使唐來文士皆效習之所為則金園寳刹碑版若林果誰作也來書謂張景原道頗正漢傑何不視景集中所記浮屠事凡㡬篇其稱述何如又謂設不得已猶可謹嵗月誌工用亦不害於正若但嵗月工用而已凡人皆能之何必吾文吾所是非灼見如彼豈}
