  - {type: variant, offset: 35, length: 0, content: '', WYG: 雖治亂相變而異人時有其稱得士之盛者率由是道及稍長鄉先生敎以速化之術則謂當今取人一出於辭賦曰策若論姑以備數因歴觀塲屋得雋者誠皆聲病靡靡之文而已借有材之髙識之通以禄仕故不敢放其絶足越邪徑而趍大道腐儒愞筆喜幸多矣私心憤疾往往竊垂義士之涕將恐古道萎絶不能復萌芽至年十六時聞禮部奏貢士之可者賜第於殿廷所得多當世豪俊而執事之五䇿實流行於天下募其本而觀之則審刑政之㑹達權利之變將以富國便人而納之於禮義良今日之急務而衆賢之所未知者也其辭典而贍其意正而通洋洋乎古人之風復歸於筆下覯雖不肖用是感激竊喜囂譊流宕中亦有賢士大夫毅然執戈刜滛辭而遵理道者重遇主上之明有司之公擢致髙等足以風四表而移士心矣自時而後積十餘年㳺目於書肆則熟執事之文采侍坐於先進則飽執事之治聲窈然如望梧桐之宫聽鳯凰之鳴徒知其諧和中律噰噰盈耳而雲霧隔之終不克一見其容狀不意今兹旅食都下而執事方在省局門牆伊邇有請見之路是用上問興居以適所願昔人有言曰唯賢知賢小人不敢自稱道顧可以當執事之知乎伏念覯草茅匹夫受性不甚魯唯其心志耿耿不忍自溺於流俗為學必欲見根本為文必欲先義理晨夜探劚力盡弗已而州郡不肯薦鄉黨不見稱年近三十隕穫日甚昨者因謂京師忠賢所萃䇿試亡私奔走西嚮將覬覦其萬一未及弛擔而貢舉已罷矣羇栖輦轂兩經晦朔親老食盡又當歸寧踽踽而來恓恓而返士林不鑑其道有位不知其名背仕進之門而復入於寒餓之水火此亦烈夫好義所宜惜之也生平為文謹擇其二十四篇寫成一冊及所著明堂定制圖一道并序草具其副塵諸左右莅事之暇時賜觀覽足知覯心之所存焉冐黷威重伏增慙怖不宣覯再拜上李舎人書脩撰舎人執事洪惟天之清地之淳矞雲膏露所禀無幾甘泉紫芝僅承其餘是故其正氣也升之則為神降之則為賢神所以造萬物賢所以治萬物其致一也賢人之業莫先乎文文者豈徒筆札章句而已誠治物之器焉其大則核禮之序宣樂之和繕政典飾刑書上之為史則怙亂者懼下之為詩則失徳者戒發而為詔誥則國體明而官守備列而為奏議則闕政修而民隠露周還委曲非文曷濟禹益稷臯陶之謨虺之誥尹之訓周公之制作咸曰興國家靖生民矣自周道消孔子無位而死而秦嬴以烈火刼之漢由武定晚知儒術至今越千載其間文教一盛一衰大抵天下治則文教盛而賢人逹天下亂則文敎衰而賢人窮欲觀國者觀文而可矣吾君接三后之遺烈對皇天之駿命身居九清横制四海獷俗庭而兵革偃年榖豐而禮讓作太平盛事漸而無纇繇是下明詔戒文弊抑末世之流宕復先王之炳蔚方内豪傑翕然承風援毫者悉本三代㳺談者羞聞五霸始自薦紳逮于韋布盡雍雍如也雖然羽者必有鳯毛者必有麟文章之囿則宗主存焉伏惟執事以大臣子知聖人道䇿名天階從事冊府竒辭髙識日新又新潤色之任拾取如芥誠將輔君政而主師教四三皇而}
