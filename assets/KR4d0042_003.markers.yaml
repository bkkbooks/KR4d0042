  - {type: variant, offset: 57, length: 0, content: '', WYG: 書覯再拜先生胡君足下康定初錢塘相别後二年自京師歸中道曾寓書今又四年雖不有教誨而衣冠往來毎知動靜俗衰禮壊用力者鮮先生發憤呌呼手提古道以陂障末流使東南之士有所模法其功用何如哉覯}
  - {type: page-break, offset: 57, content: '', id: KR4d0042_WYG_028-24a}
  - {type: variant, offset: 58, length: 2, content: 雜祀, WYG: 先生齒卑德薄然其所留心何嘗不在天下國家故聞先生之風驩虞詠舞唯恐其舉之不髙馳之不疾也苟有聞見敢不盡愚於左右伏念曩者為㑹以羇旅迫促聽言觀行什不一二慕賢之心且醉飽矣至於紙筆之間所以剴今而垂後者尚未得請近到弋陽乃有以先生所著文為惠者喜而讀讀而疑謂先生之辭}
