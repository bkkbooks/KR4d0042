  - {type: variant, offset: 38, length: 0, content: '', WYG: 矣自総髪讀書羞以耿耿之心為流俗所昏醉開巻執筆輙欲闚見古作者之狀貌為之浸乆非敢自謂有所得然其用意不為不專矣家貧親老弗獲禄仕或怒其介或笑其迂左排右擠溝壑是虞今兹旅食上國日聞髙義不慚賤陋奉累閽守必欲招延雋傑激勸頑鄙顧可以隗為始乎昔牛竒章見稱於韓吏部而名遂籍甚退之非僧儒所可跂及也然而所以稱之者急於教道欲其行之者多庸兹奨勵而已耳今覯雖不才抑猶未肯與僧孺等列執事不為退之之事則已若其為之幸少留意焉嘗所著明堂定制圖一道并序其意在賛明經義以埤益一王之盛禮天門祕䆳未敢通獻謹繕其副陳諸座隅并以雜文二十四篇録為一冊繼用塵凟潤色多暇時賜財擇是所願也志切言直有犯威尊俯伏待罪不宣覯再拜上范待制書知府待制執事覯嘗聞之鶡冠子曰賤生於無所用中流失船一壺千金始猶未信今乃知之嗟乎古之為士者何其顯榮哉身弊緼而寵踰華衮腹藜糗而富埓千乗故有以南面之王而擁篲於匹夫公子國相而執轡於羸老兹戰國之事尚未足法漢有天命四履之逺化戎為華而猶求賢如不及州郡察焉四府辟焉一介之善無敢漏畧縣鄉小吏名汙賤者也翼之而仕角之而朝者往往有焉此無他盖有國者慮下情之壅遏得人以快耳目當塗者畏曠官之罪以舉賢為稱職習俗相尚氣焰薫灼而然也故于時能言以上多自琢飾閨門為仕進之階鄉黨乃榮名之路奨助風教夫豈小歟厥後古道不逞辭科浸長不由經濟一出聲病源而海之以至今日矧惟真帝在上皇天乃睠太平之根穏貫坤厚四鄙酣寝無雞鳴犬吠之警法令流暢罔或牴牾役夫賤類馳一乗之傳則足以呼舞諸侯矣三尺童子據案弄筆則足以斬决强梗矣不待偉人深智而職事已治故雖浮華淺陋之輩率為可用聲律取士孰不曰宜學小則易工利近則可欲貟位有數而求之者多國朝患其或私謁也於是糊其名易其書混致於考官之手固不知其立身之行幹蠱之才雖有仁如伯夷孝如曽參直如史魚㢘如於􅁜一語不中則生平委地况執其柄者時或非人聲律之中又有遺焉薦於鄉奏於禮部第於殿庭偶失偶得如奕棊耳名卿大臣以其無舉知之責也閉其口不復言天下士俛視同術疏若秦越養威重崇愛惡管庫之隸洒掃之僕皆得以保任而惜一言以舉遺逸雖然好古㓗㢘之士寧忍餓而死耳安能仰面以希其咳唾於戯學道之無益也如此夫宜其腐儒小生去本逐末父詔其子曰何必讀書姑誦賦而已矣兄教其弟曰何必有名姑程試而已矣故有縑緗凝塵不記篇目而致甲科帷薄汙辱市井不齒而諧美仕勸善懲惡將安在邪萬一史臣示書法於後世則赤墀之下當有任其責者矣噫非大賢君子其曷能矯之覯建昌南城人也生二十有九年矣齠齓憙事以進士自業摘花蕊寫雲煙為世俗辭語頗甚可取愚不惟道之隆替時之向背輙㳺心於聖人之藴志將以堯吾君羲吾民晨夜精思頗為有得視闕政如已之疾視惡吏如已之讐恨無斗水以洗濯瑕穢四顧悲歌時或涕洟然而命薄計拙動成顛仆鄉書之不録况爵命乎孤貧無依載其空文走南北楫焉而川竭蹄焉而路窮嘗㳺京邑凡時之所謂文宗儒師者多請謁焉但伏執事之名時最乆矣謀之於儒林則又謂執事表知樂之士有自褐衣而得召者如覯等軰庶可依歸不幸未及弛擔而執事以言左遷時異事變卒無所遇彷徨而歸又黜鄉舉身病矣力窮矣仰喜朝車適留兹土故不逺五百里犯風雨寒苦}
