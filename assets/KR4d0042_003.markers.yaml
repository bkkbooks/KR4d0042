  - {type: variant, offset: 25, length: 0, content: '', WYG: 是有功扵惰也古之敎者曰天道福善禍淫今夫大猾隂賊恤其謫之及乃美僧飯大佛屋謂之懴悔因施施無復色憂是有功扵惡也宫室之度非財不侈巨木丹碧庶人鮮或用淫巧無所彈其繩惟宅浮屠無藝不憚窮山裂石必致之淫巧日富焉是有功扵末作且寵奇貨也苟去浮屠氏是使惰者苦惡者懼未作窮奇貨賤是天下不可一日而無浮屠也宜乎其排之而不見聽也嘗學斷獄乎吾為子舉其要坐獄而問之曰功爾言之罪爾言之從而詰之曰功信矣而罪如此其大也尺寸之功不足以贖也是其人雖欲不服何辭哉若功不及齒牙而惟罪是詰雖滔天其人將曰我有功而弗問而専咎予欲其無辭難矣昔之排浮屠者盖猶有過徒非其非而弗及其是雖栁宗元尚不聽退之況其庳者乎胡不窮之曰爾之道以慈悲普濟率民講報應以威之使不敢放扵惡其大者則曰見性也吁亦是矣雖然爾之慈悲普濟而不以禮節之六畜蠢動壹意是不知父子之可親而他人之可疏也親疏不别是夷狄也爾之報應而不以信守之一財媚佛則反禍為福是招權鬻獄汚吏事也爾之見性而不漸諸訓典左右如其真是赤子不得成人也見丹而丹見素而素不肯一御其心而之他率斯道則上不得正其下下不得忠其上絶其維而逸之野鹿焉疾子䘮心焉孰謂天下國家也以是窮之而弗聽者是偶人也與偶人語尚何取其聽哉孟子有言曰男女居室人之大倫也雖聖人未之有異而浮屠何其介哉彼此盡能泊然以循其法者也惟人之愚父母徒惑其富厚安閒捐孺子而奴之厥初未有知也既長而悔盍歸乎無業以衣食也不得巳而終焉其心豈異人哉是鍾梵不足以樂怨曠奈何其欲隂陽之和也為禮不為財先王以是鑿人耳目中下之世人不知禮而利之圗雖在埶或可以貨取故囂囂者舉疑其上浮屠氏睨其機也又使之疑天地夫古之事上下神祗也惟天子二王周公後諸侯雖大國弗敢及因吉土而壇牛必在滌三月然後用齊明盛服惴惴惟恐其不稱也今浮屠埽民家而召之且賛之謁佛畫坐誦累譯之言謂之加持吁孰謂天地之大而為一飲食若臣僕然乎盖疑之者漸也善賊者必搏人之親愛而質之攻之則并殺縱之則幸而生孰忍以其貨故而血所愛也善贓者必誘時之貴仕而質之飾情以為亷借力以為勤一釣而得舉則負其埶而馳攻之則連坐縱之則幸而免孰敢以其民故而病貴臣也舉一人而刳剔億萬人其罪在此不在彼也戒之戒之無為賊子所質後之俗何其粲粲乎相髙以富相矜以侈吾財之所可貿易雖國寳必用之財之不給帷帟粧櫛之不逮人則妻妾詬其無能女子羞泣不肯升車以嫁故民刑扵争吏禽扵貪豈曰不愛身耻其不若人也正其禮謹其禁㧞其僣本而域之扵三代畜財千萬朽貫而無所施設或㡬乎其亷且讓也婦人從人者也從之斯尊之矣卑其夫未有能從命也夫弱扵外婦強扵内下上其心而莫之制何所弗及哉舉天下而漸其風亂矣王化之存者㡬何是故婦人扵夫家不可不使之盡禮也必待其敵而後禮焉則周之女前嫁商而後嫁秦乎往者不可追來者不可期是無地而致婦道也然則何彼襛矣之詩斯妄言乎仁義曷居乎䘮禮仁義之盡也今也求諸篇盖彬彬焉而士大夫諱讀職敎化者不以是病也遇哀而哀哀忘則己賢者無以節不肖者不勉焉吁㣲三尺法㡬何其不錦衣而舞柩也法禁怯而不禁豪禮則左右而勝焉知禮而違曰吾能不自愧乎知禁而犯曰誰敢言哉雖然士大夫未見其尊親也夫燕雀必有啁噍之頃焉哀而不以禮是以燕雀送其親也周之季樂敗矣而夷音篡之流連遂至扵今彼邪人者猶以為歉也又取而歌其淫辭音之動人也多矣而其言及牀笫焉中材兒曹狂舞怨泣之弗暇人道扵是愈無别矣忍人哉吾民何罪而以是蠱也吁仲尼弗復司寇矣是螻蟻不得飲血扵兩觀也法言曰大人之學為道也小人之學為利也吾嘗策之矣為道乎實不待率也為利乎以利輔道斯嚮道矣誘之嚮道漢事然也察州郡辟公府句小吏賤人或勉為善也誘之違道近事然也不求其徳而試其言冠緌之下或屠販之器也吁今之立乎道義之門者聞人足音葢欣然矣善之本在敎敎之本在師師者所以制民命其可以非其人哉古者家有塾黨有庠術有序國有學為民立師也學校廢師不命扵上而學者自擇焉識不至擇不精是能言之類莫不可師也然則父儒而子墨朝華而暮戎不足恠矣嗚呼君子如欲化民成俗其照之末光乎野記二篇并序予居東郊外耳目所得有可以為世戒者作野記二篇里之氓有慕都邑之侈者以其畜牛易人之乘馬既數嵗矣土田之腴舍牛而不獲倉廩菽粟耗于馬腹饑餓且不救而馬之能卒無益扵甑釡噫今之絶故賤而友新勢忽講習而嚮奔走有不病其田而空其菽粟者乎春陽既作草之百名生扵穹陵扵絶澤扵不迹之地霧雨所盥風氣所弄苖堅蔓驕生理自若舍是而入田畆者則根與稻争潤葉與粟誇暖角長等碧疑過者之目農人之父病其為稼害也掘而去之不遺種火變水腐狼藉道側願為糞土蕪弗可得矣噫安爾類計爾材不自齒扵嘉穀則奚禍之來旴江集巻二十欽定四庫全書旴江集巻二十一宋李覯撰慶厯民言三十篇并序慶厯三年屏居里中自念生而宦學其秉心也勞其慮事也多既不克進且為編戸以死終無一言其何補於世記曰上酌民言則下天上施故為慶厯民言凡三十篇開諱備亂審姦防蔽效實慮永謹聽辯儒廣意損欲本仁愼令考能止幸裁舉精課懋節崇衛省盗釋禁南畧敵患柬士儲將逺私正局厚農復教孝原天諭開諱身莫不惡死而未嘗有不死國莫不惡亡而未嘗有不亡等死耳殤不若彭之壽等亡耳秦不若周之世壽雖髙而歸之死世雖永而歸之亡然而以死亡為諱者是不智也聞死而愠則醫不敢斥其疾言亡而怒則臣不敢爭其失疾不治則死或非命失不改則亡或非數是諱死而速死諱亡而速亡智者果如是哉故古者天子即位卿授之策曰慶者在堂弔者在閭誡亳社忌子卯惴惴唯恐如桀紂也鄙諺有之厲人憐王謂絞纓射股擢筋餓死甚於腫胞之疾嗚呼君人者得聞此言也則寢不瞑食不㫖尚何從欲之有乎備亂治之民思亂亂之民思治何也生無事之時身安而意侈刑弛矣急之則驚斂輕矣加之則怨力未嘗鬭自謂勇心未嘗謀自謂智知兵之利而未見兵之害小不得意則欲翼而飛矣故曰治之民思亂也處多難之世城者不肆野者不稼彊者僵於戰弱者斃於餓父母妻子刼束屠膾然後見兵之害而不獲兵之利幸而有主則將雨其槁矣故曰亂之民思治也思治矣雖中才可得其歡思亂矣非聖人不能弭其漸大禹之戒曰予臨兆民懔乎若朽索之馭六馬故智者慮亂於治愚者謂治不復亂悲哉審姦盗之未泄也日與之接而不知其盗姦之未露也日與之居而不知其姦衣纓言動與人同而盗姦在其心知之固未易也及夫贓出械見刑殺於市而衆人皆知其盗謀行亂作國家敝敗而後世皆知其姦知其盗非衆之智由獄吏之讞也知其姦非後之賢由史臣之筆也觀書者睹曩時之禍皆笑其不知姦矣而不曰我之姦者亦待史筆而後知也漢元帝謂幽厲任巧佞自以石顯愈於彼故京房曰臣恐後之視今如今之視前嗚呼安得敢言如房者乎防蔽人主不知亂作者左右蔽之也彼豈不愛於君幸其滅亡耶蓋懼誅耳平居以佞邪席其身養君之欲迎君之非君有問焉必曰安於㤗山也然而亂且起國且危是昔者欺吾君也君一怒焉則死不待頃於是纊君之耳不使聞危亂姑緩吾死何暇慮長久也陳後主之沈客卿隋煬帝之虞世基勢敺之然曷足怪也故邪臣非不愛其君不得其事君之道也昏主非不愛其國不得其守國之術也不得事君之道者始不正也不得守國之術者終不明也若曰臣之愛君而終用之不照之以明則雖欲孝宗廟其如宗廟何效實官名也事實也有名而無實天下之大患也上弛而下偷文書具口舌給而信其行事是見駑稱驥而不考之千里也國不一官官不一事何從而得其實盍責之主者乎縣焉何實責之郡郡焉何實責之諸道諸道外也羣司内也内外之實責之宰相宰相之實上觀之天而下察之人乎上觀之天隂陽調乎下察之人國富乎兵强乎百姓康樂乎四夷協服乎此不待下席而灼見矣責有所在罪有所當故曰四郊多壘卿大夫之辱地廣大荒而不治亦士之辱如是人人莫敢不自盡昔唐徳宗不知盧杞姦邪蓋不思其實矣去四海之廣而投諸奉天非姦非邪誰使然也彼誠有所合合則信信則惑惑則非是而是非矣嗚呼君人者其亦愼其合乎其亦愼其合乎慮永亡國之君不皆惡非桀非紂則所由漸矣漸者何也基禍於彼而受禍於此也天下之勢一往而不反若決河堤使東流也基禍之主外久安而内自賢道失於心而弗思權移於人而弗寤然祖德或未没民心或未解故有幸而免也受禍之主乗亂得位名雖為帝治不在已囚拘旒纊之下弗獲忠義之助故不幸而及也漢獻帝唐昭宗其何罪歟故明者舍近而謀逺無謂未足患將為子孫患彼具臣者寄位如邸舍幸當其時無事不暇念身後也人主為萬世計不可溺苟且之議禍不在身而在子孫既足動其心矣而况倉卒之可虞哉謹聽讒者沮善者也諫者抑惡者也名之諫者皆知好焉名之讒者皆知惡焉然而人主不免於信讒者讒似乎諌也愎諫者諫似乎讒也君曰可用臣曰不可用不可之辭同而情則異矣用君子而小人沮之是為讒用小人而君子抑之則為諫君子小人之心忽怳而不可見是讒諫所以亂也好諫而不愼則姦臣進惡讒而不察則正人退世有信讒則衆非之矣愎諫則衆笑之矣彼非狂易病惑豈不知諫之利而讒之害顧謂之諫者非諫謂之讒者非讒也太甲曰有言逆於汝心必求諸道有言遜於汝志必求諸非道讒與諫皆逆心之物姑以道求之而已不如是則貝錦之文或起於青蒲之上而刳肝瀝血未必不疑其間我也嗚呼艱哉辨儒儒者關治亂乎曰然用則治不用則亂乎曰非也用儒而治者有之矣用儒而亂者有之矣故儒得其人則為福不得其人則為賊以小人之質而被聖賢之文如虎斯翼固攫人於都市耳夫古之事多矣或同而異各有為去聲也小人用之則稱其一而隠其二以罔上而行私矣飾灾異則曰堯水湯旱而不曰宋景退熒惑解多壘則曰獫狁至太原而不曰守在四夷欲擅其權則曰舜德無為而不曰明目達聰治不如古則曰帝王不相沿襲而不曰一變至道此類如物怪變化不可勝窮故助王鳯者數稱燕王蓋主以疑上心避諱吕霍而弗肯稱也嗚呼用儒至此是秦之湯火有不妄也廣意人感隂陽氣以生陽主動隂主静動則為謀為慮為决斷為事業静則為懈惰為因仍為逸樂動勝静則昭静勝動則聾理必然也升髙居廣出外行逺明視逹聽博覽詳問親賢臨衆講禮播樂如是者宜於陽陽得其宜則勝隂深宫重闈時坐數卧治容巧笑厚酒邪聲俳戱伎巧説媚譖愬如是者宜於隂隂得其宜則勝陽是故君子朝聽政晝訪問夕修令而夜乃安身非九女當御不得進鄭聲佞人舉放逺之懼隂之勝陽也五載一廵守至於四嶽毎歲祀天九祭地二明堂聽朔十有二孟春耕籍四仲教戰皆在國之外廟則有四時十二月之享社則有春秋祈報學則有合樂養老之禮皆天子躬親之外朝則有三詢三刺大廷則謀及庶人欲陽之勝隂也夫心官於耳目耳目狹而心廣者未之有也耳目有得則感於心感則思思則無所不盡矣人臣飾其辨以誣上一降席則指為過舉是背經違古而閉其君之思也損欲形同則性同性同則情同聖人之形與衆同而性情豈有異哉然則衆多欲而聖寡欲非寡欲也知其欲之生禍也五霸莫盛於齊桓公以内嬖亢夫人者六豎刁以自宫愛易牙以蒸子幸終於五公子爭立死六十七日而殯七雄莫大於秦始皇以殿阿房塟驪山終於項籍燔其宫室牧兒燒其藏椁禍生於欲誠足畏也如使欲而無禍堯舜固爲之矣何自苦如是彼多欲之君莫不自謂無禍恃四海之力矜一人之智以天地未足為長久而不知智力非禦禍之器也聖人寡欲故能得所欲衆人多欲以所欲奉他人耳孟子曰昔者太王好色愛厥妃文王以民力為臺為沼而民樂其有麋鹿魚鼈夫能損上益下與百姓偕樂其誰曰不可本仁術於仁者皆知愛人矣而或不得愛之說彼仁者愛善不愛惡愛衆不愛寡不愛惡恐其害善也不愛寡恐其妨衆也如使愛惡而害善愛寡而妨衆則是仁者天下之賊也安得聖賢之號哉舜去四㓙而諡以仁聖湯初征自葛放桀南巢而仲虺謂之寛仁武王梟紂白旗而孟子曰以至仁伐不仁仁者固嘗殺矣世俗之仁則諱刑而忌戮欲以全安罪人此釋之慈悲墨之兼愛非吾聖人所謂仁也夫守國在政行政在人人不忠而亂乎政政亂則國將從之而且以不誅為仁是輕國而重仁也故明主持法以信馭臣以威信著則法行威克則臣懼而後治可圖也愼令君出令而臣沮之何如曰下制其上也民從令而君改之何如曰上欺其下也上欺下則民心惑下制上則君權輕民既惑則不聽君既輕則不威上不威而下不聽其漸亦足憂也夫為令之弊有四初不審終不斷言者矜聞者爭也洪範有大疑則謀及卿士庶人卜筮彼作事不咨於衆慮不待盡而輙行使人有以詬病是初不審也日月之行則有冬有夏月之從星則以風雨謂政治不可從民欲耳彼有沮之則不計利害大小而遽改是終不斷也君陳以謀猷入告而順之於外曰惟我后之德彼議一事則夸以為功使其黨間而疾之是言者矜也秦誓曰人之彦聖其心好之不啻如自其口出彼聞人之功恥居其下雖善必沮是聞者爭也人主能知弊之所在則可以行令矣考能言一也而所由生者異或生於心或生於耳生於心者帥志而言言則必形於事生於耳者剽人之言施之事則悖矣故上不好言則利不在言言者皆志也上之好言則言可近利無志者亦言矣鈔古書畧今文變白為素析一為二以希世願用一易其褐則言且忘矣何有於事而况偶句諧韻言非其言者豈足問哉嗚呼天下皆以言進未能不以言取既取矣胡不試之以事事讎於言然後命以其官可也王制曰論定然後官之試此職也任官然後爵之以能而命也如是則無曠官矣止幸亂始於恩怨始於幸亂始於恩進非其人也怨始於幸有望而弗獲也選舉所以籲賢能而曰必多取則不肖入之矣賢者寡用之可盡而不肖滿天下用一不肖舍一不肖尚有怨矧用一不肖舍百不肖乎夫萬物以類動彼能是我亦能是用彼而舍我宜其怨也器玉者純於玉則碈知其賤不免於用碈則山石皆待沽矣有國者啓人之幸而欲人不怨人之類盡官而後可也傳曰民之多幸國之不幸寵不肖以敗其官不幸大矣而况怨且怒哉裁舉唯善能舉其類不善亦能舉其類以堯之聖而問諸朝驩兠共工尚相歎美矧郡縣之逺聰明所不接邪賢人在下位不使賢人舉之而必曰長吏長吏皆賢邪彼不肖之相好亦若賢之於賢不肖之惡賢固如賢之惡不肖好同而惡異也不肖位乎上而望其進賢難矣賢知賢不幸而非其屬又不得舉然則賢人不遇豈天命哉故責所舉之賢不若責舉者之賢舉者賢則所舉賢舉者不肖則所舉不肖一不肖達而舉十不肖十舉百百舉千如此則剥道成矣旴江集卷二十一欽定四庫全書旴江集巻二十二宋李覯撰精課虞書三載考績三考黜陟幽明此百代常行之制也有功者升有過者黜無功無過者職其舊如是可以勸功而懲過世之考績則異於此無功無過者升是升不必功也有過者職其舊是過不至黜也功無益而過無損懲勸安在哉故妄庸人一出選部雖梏其手雖鉗其口而尊爵自至此董生所謂累日以取貴積久以致官廉耻賢不肖所以無辨也夫進人不問其功而問其久彼草木久則長大可用人之材不能日夜生息亦已明矣三歲而進一官是三歲而材一變乎如此則牛馬走抑可以久而用之矣懋節使人以賞罰衆人之使人也使人以禮義聖人之使人也賞罰外也可去可就禮義内也一中其心天地四方無所逃矣有賞罰而無禮義安則可非濟危之具也誘之以賞利有厚於賞者脅之以罰禍有大於罰者利厚於賞則去賞禍大於罰則就罰叛國之利或厚於賞死戰之禍或大於罰有以動小人之心矣學以禮行以義交游之讐尚復之况君乎杯酒失意尚死之况國乎名焉吾賞耻焉吾罰意氣感發非有令之者也世俗誠大壊矣學者為官不為道仕者為身不為君見得其虎聞䘮去聲其鼠父子昆弟之詔告妻妾之耳語非富非貴如舉其諱上之人又從而啓之賞先於功而功不立罸輕於過而過不改無事而禄有事而賞位孺稚輿貨財而後行則是禄為我有而事以賞傭也禮義既銷矣而賞罰且玩階之者其誰乎孔子曰君子學道則愛人小人學道則易使信矣嗚呼三代不可作安得六國之士而與歸乎崇衛圖國在忠用忠在力濟力在權力者兵也食也權者所以制兵食也忠而無力則忠非其忠力而無權則力非其力忠非其忠死無益也力非其力令不從也奬周室者豈特桓文之忠齊晉之力也豈特齊晉之力覇王之權也無力無權則豫譲一劍徒自快耳天下古之天下也而彊弱異謂秦曰彊者非也彼秦取以彊而守以弱罷侯置守是也秦亡積千載而天下之弱彌甚刺史郡守寄客於外兵非吾兵食非吾食以服人者三尺法耳一旦當事則刑罰鞭扑非亂賊所畏也授首且不暇孰為勤王哉義苟在焉胙之以國何害苟為不義陳勝吳廣豈嘗據大權也省盜盜不能禍天下而召天下之禍彼殺人以求食人固讐之安能禍天下盜既多殺既極讐者弗能報而後姦雄起焉盜者人之讐也而姦雄以誅盜為名是孝子慈孫夫婦之相哭者望之不啻如濯熱因天下之心收天下之權如此乃能禍天下人主知盜而不憂者以其舉錯非姦雄之利也而不知姦雄不為盜故防姦雄莫若除盜賊姦雄不得盜賊之資則不敢起嗚呼殺人者人之賊而巳矣惡殺人者誠國之賊也釋禁與衆同利則利良民不與衆同利則利㓙人㓙人嗜利盜之所由興也山海之貨職在商賈久矣而曰屬之吏屬之吏則衆不得錯手足法重矣而利亦重法重則良民憚利重則㓙人入然而董之以法是敺其為盜也彼㓙人者豈曰死可欲而生可惡哉過在歆諸利而謂不必死耳不幸而幾於死則莫若為盜為盜又不必死也夫能弛其禁達其利則㓙得與良齒胡為苟免於兵刃間哉南畧南北離合繫天下盛衰漢之衰則離逮晉而合晉之衰又離逮隋而合近者唐之衰又離逮宋而合距長江之固因中原之擾擾則自救且不給胡治於彼哉後雖有明王興彼業巳成彼守已完非數十百年不可取此前事之驗也北擾矣而南又離離則米帛金錢之漕弗復跨淮而上如疾將病而絶之食耳此後事之憂也俗人皆以吳楚之兵弗如北而不知姦雄謀事常伺天下之衰當其盛時尚可論彊弱及其衰也雖曹公用兵弗能與孫權爭馬超韓遂在關西為後患故也然則如之何則可曰宿師樹賢以扼其咽然後可也敵患夷夏奚若曰所謂夷者豈被髮衣皮之謂哉所謂夏者豈衣冠裳履之謂哉以德刑政事為差耳德勉刑中政修事舉雖夷曰夏可也反是則謂之夏可乎愚儒之咤則曰彼夷我夏而不曰内自修内自修則德刑政事四者備當而後曰夏勝夷可矣是謂知彼知已百戰不殆彼欲虛吾國困吾民應之以儉則國可富民可逸然猶不能是堕其術内也嗚呼夷夏非古之夷夏也先為不可勝以待彼可勝善矣不然禍且日至豈徒由余所笑柬士天下有攻守草昧之時攻天下者也繼體之君守天下者也攻之兵雖怯而勇乗勝也守之兵雖勇而怯未之試也不試巳然况敗歟夫戰在氣三皷而竭曹劌所以克齊然而人不見勝唯敗是聞怯則宜也爲政者務兵多以彊國而不知其弱國兵多則不擇不擇則大抵怯耳勇者尚怯况眞怯哉敺十怯以向一勇敗不足疑言之者必曰某以若干敗於若干以為彼太公孫子勢不可校後雖勇士固心醉矣非弱國而何胡不芟其冗轉其資以厚敢死使以寡勝衆而後氣可復庶乎彊國矣儲將死生存亡在將將之難也百夫長猶不可虛矧其上者乎資舟於旱資車於水先事而求則詳以實驗也事至而求則粗以言擇也用人者皆曰以能不以行彼閭巷細謹誠不足問豈大節之可違哉孫子語將能則曰智信仁勇嚴不信而任事則事反不仁而御衆則衆殃如是而曰能不必行可乎矧彼言者又非能也以言擇將天下皆欲言婢兒庸保亦知誦書傳學計策以自進進者多矣可盡用乎兵蓋不祥之器學者未得其千一而志意已壯壯則思用不用則聚而怨怨則無不為是有國者教之叛也獨奈何逺私晉侯以勃鞮用趙衰趙王以繆賢得藺相如皆奄人也謂奄之賤而能進賢何也曰賤故能進賢貴則疾之而已矣古之奄給房闥使令蓋甚賤賤則雖賢人當國何害故進之後之奄為帝王耳目蓋甚貴貴則有威福玉食之罪婞然唯恐賢者之繩已故疾之豈古之奄才而後之奄不才勢不便耳使勃鞮繆賢復生且不免為譛人夫非晉趙之時而垂晉趙之聽是賢者弗可得而不肖售矣正局周官内宰大夫士十有四人九嬪世婦妾御屬焉彼天子后妃猶以大夫士治之矧羞服匪頒好用之式而有不在有司者乎外自省寺重之以殿中六局所以奉乗輿者備矣顧奪而歸諸奄何哉有司奉法而奄人阿意奉法則用節阿意則欲逞此利害甚明白然而弗思者夫其殘民乎厚農先王之馭民也節其所為後王之馭民也極其所為夫惰之志在逸先王節之則不得逸農之業在勞先王節之則不甚勞宅不毛者有里布田不耕者有屋粟閒民無職事者出夫家之征誰謂其逸哉什一而稅用其力歲不過三日春耕則田畯饎焉秋斂則蜡祭息焉誰謂其勞哉王道消政出苟簡賦乎曰農役乎曰農田有榖而桑有繭非敢愛也五兵之用百工之材皆農無有而必責之是行商蓄家籍農之産廪農之食矣彼惰游未始及於政且開宂食之路以進之逸者極其逸勞者極其勞勞而不貳者戅而巳矣嗚呼使天下皆戅則可不幸而有心則羣入於惰欲望九年之蓄難矣復教樂正以詩書禮樂造士王太子王子羣后之太子卿大夫元士之適子皆造焉說者必曰為化民也為選賢也而不曰愛諸臣之子保諸臣之家也人不教不善不善則罪罪則烖其親墜其祀是身及家以不教壊也故明主推恩羣臣必先教學與其寵於今孰若無辱於後不務教而務官之以市井言未學而仕其幸大矣智者慮之則為禍亦大彼不善之資而假之位鮮不及也嗚呼官者上之所輕雖曠何損家者下之所重可不自為謀哉齠齓腰印組鼓篋齒庠序勞逸誠不同而禍福存焉耳孝原禮職於儒儒㣲而禮不宗故釋老奪之孝子念親必歸於寺觀而宗廟不跡矣夫祭祀豈徒自盡其心以交神明而巳蓋有君臣父子夫婦親疏長幼貴賤上下爵賞政事之義是謂教之本也彼寺觀何義哉嗚呼釋老不存則寺觀不屋非宗廟何適儒之彊則禮可復雖釋老其若我何天諭畏天者昌習天者亡何謂畏天髙宗成王是也何謂習天元成是也人之情非所常見而見之必懼懼必思懼之情同而所思不同明主思之以為在德德修而灾異消然後愈知天之明而德之益也闇主思之以為在數故任數而不修德德不修而禍未至然後愈知天無心而數有定也惟天之仁又出灾異以申勑之彼必曰前既無害此奚為哉亦數而已矣灾異愈多不懼愈甚耳習於聞目習於見心習於思習之久則不聞不見不思焉耳然而上帝之怒不足獨當下延衆庶上累廟社甚可痛也嗚呼人不可玩况天乎天而可玩君命何足道哉此孤臣正士所以泣血於地下也旴江集巻二十二欽定四庫全書旴江集巻二十三宋李覯撰記袁州學記皇帝二十有三年制詔州縣立學惟時守令有哲有愚有屈力單慮秪順德意有假官借師苟具文書或連數城亡誦弦聲倡而不和教尼不行三十有二年范陽祖君無擇知袁州始至進諸生知學官闕狀大懼人材放失儒效闊疏亡以稱上㫖通判潁川陳君侁聞而是之議以克合相舊夫子廟陿隘不足改為廼營治之東北隅厥土燥剛厥位面陽厥材孔良瓦甓黝堊丹漆舉以法故殿堂室房廡門各得其度百爾器備並手偕作工善吏勤晨夜展力越明年成舍菜且有日旴江李覯諗於衆曰惟四代之學攷諸經可見已秦以山西鏖六國欲帝萬世劉氏一呼而關門不守武夫健將賣降恐後何邪詩書之道廢人唯見利而不聞義焉耳孝武乘豐富世祖出戎行皆孳孳學術俗化之厚延於靈獻草茅危言者折首而不悔功烈震主者聞命而釋兵羣雄相視不敢去臣位尚數十年教道之結人心如此今代遭聖神爾袁得賢君俾爾由庠序踐古人之迹天下治則撢禮樂以陶吾民一有不幸猶當仗大節為臣死忠為子死孝使人有所法且有所頼是惟朝家教學之意若其㺯筆以徼利逹而巳豈徒二三子之羞抑為國者之憂此年實至和甲午夏某月甲子記建昌知軍㕔記人得擇官久矣天下唯股肱郡簡於帝念其餘在所欲夫食飽居安人情所不免故分田之廣狹公膳之有亡官舍之媺惡凡仕者鮮不以為言建昌軍距行在三千里浮汴淮江湖不幾月不至吏巳禄縣官無古圭田之比厨無子錢以勞賔客屋數十个蓋偽李氏時作其壽將百年度制卑陬尤不稱事是以當世髙足之人聞之憮然莫肯為來有不幸而至者什不一二過此則物故不容於它取自竄焉政以是厖民以是創秋陽炙天井底或凌噫匪夷匪蠻匪海山瘴蠱之地獨無富侈之資以奉俊良使永永來為人父母誠可歎已今虞部張公其不幸而至者乎公本於質直而文無害嘗治四郡左官是邦惟思昔人必葺之義廼更浮橋遷集賓亭作廻車院而本㕔及焉㕔之築土方五丈架梁三十有五尺取材於山因役於軍蚩蚩斯人不費不勞自春徂夏厥功以濟民不有勞惟公之勞公不有利惟民之利有問焉者必告之曰官舍羙矣則其去就之心宜稍異於昔所謂民之父母或數來其為利豈少哉草茅生請書以見意慶厯七年六月丁巳記建昌軍儀門記觀古君臣之間近則禮為之厭逺則尊得以伸故畿外諸侯門阿之制與天子凖宫隅城隅各下一等天子五門諸侯有三門臺而道屏於中為宗廟朝廷大抵不甚異蓋南靣之君分土而治不若是無以貴於一國民知其君之貴然後知王室之尊堂陛之言亦此類也自罷侯置守於今幾世弱權削威居無常人有地數百千里而宫室輿服靡所張顯唯中門立㦸非出入不開東西兩夾門趨走之士紳笏磬折於其外非召呼不敢前以此異於他官舍謂之儀者有意也哉太常博士吳公使建昌既視事曰神人在上萬事有經萬民有業吾守臣布行詔書奉順德意而吏職修矣披牒治訟若人四支雖終日運動不為勞心廼行府署唯㕔事葺其餘屋古老卑小或如翼覆地其中無光或如衣之敝随補随破郡治所在而陋於一邑不務改作俾民何觀謀於僚屬其心同聽於輿人其言樂自儀門始以及内寢不日而備君子謂吳公以文學進宜其知治道父兄皆大臣其耳目固不隘官為博士宜用心於禮位當刺史在可行之地此一役也以儀門為始夫豈徒哉盍書之以示後覯應曰唯慶厯八年冬十一月甲子記建昌軍集賓亭記康定二年夏六月太守慎公作新亭於軍門之南越孟秋工告成事郡人李覯請為記曰惟兹軍築於閏唐額於吾宋同之列郡數十年矣然規摹儉固未始斥大雖視事有㕔罷休有堂而僚屬之所㑹賓客之所交以宴以游舉無其地公臨郡數月政既巳成事既巳省因謀别館以為賓榮詢諸耇老則僉以郡署之前昔嘗有亭號三善者毁徹雖久基兆可指公乃相其地而築之且取籍沒之材以足其用不賦一錢不役一丁而厥功以成飛飛其櫩角角其楹達以重關周以階櫺姑山右顧積翠在掌旴水前來鑑裏萬象乃位賓主乃列尊爼有緌有紳以笑以語心澄欲仙意逺還古噫誠太平君子好事之一端也然民隠之不恤主恩之不宣而汲汲於厨傳則何以為政室漏之不補庭草之不剪而區區於簿領則何以為禮合是二者蓋鮮能焉今公之所治多務大體明而不苛斷而不酷得政之和公之所居罔不畢葺作而不費飾而不奢得禮之至兹亭之興率是道也慄慄其威如風之凄民之服之千里弗違煦煦其仁在物為春民之戴之千載如新召伯聽訟勿伐其棠矧兹攸宇其誰敢忘君命不駕匪夙則夜敢圖兹石以告來者南城縣署記慶厯二年㑹稽錢得臣仲基以大理丞為南城宰西安周夢臣旻臨川滕平叔夷甫佐之於是改作主簿尉署及縣㕔之兩翼既訖功得臣受命刺白州夢臣監雩都銀冶而平叔考且滿使覯記其事覯曰古者諸侯卿大夫士其宫室以命數為之等示民有尊也今之郡縣有社有民雖九品僚屬皆命於天子其勢固不得居陋室如閭閻氓然世以土木為難事者財民之財力民之力也是以亷吏善人或憚而不為乃至隘不可容壊不可支巻席避雨露坐迎涼者有之矣吾邑三君子以居之所不安為人之所難為捃官之餘用假吏之餘力木材如涌而民不出一簮築作再朞而民未嘗舉趾非奢非儉可次可舍事成而去豈曰自為蓋將壯官府利來者是可記也若夫舞智恃巧陵民匱財已欲佚而忘人之勞已欲樂而遺人以憂則有識者當伐鼔於其門豈吾之所得記哉謹用斯言諗於好事時則五年春正月也邵武軍學置莊田記慶厯七年春三月幾望武陽假守宋公以治學官成識之巳詳後三甲子有竒教授龔君與其學子授使者以幣走三百里謁於余曰敝邑得天故吾公來昔昏以旦昔寒以燠視人如其身視學如有神言必於是行必於是雖牒訴盈庭簡墨在前而與士大夫講解對問猶燕居時故自庠門開不幾月慕焉而來者不絶將恐褊小弗能容又翼中門築兩齋矣鄉之善良喜公之為子弟之有屬也不愛其貲願易土田以備糧用凡出泉若干萬得田若干頃歲食若干人既有成矣而公之記所未書吾惟子之望覯聞命竊商之曰儒者詬釋氏為其籠於世也而不解其所以然釋之徒善自大其法内雖不韙而外彊焉童而老約而泰無日不在乎佛民用是信事用是立儒者則不然其未得之借儒以干上既得之則謂政事與文學異孳孳唯府史之師顧其舊如蟬蛻及其困於淫辟恤乎罪疾欲聞性命之趣不知吾儒自有至要反從釋氏而求之吾游江淮而南不一日有庠序者不一邦踵其地而問之棟字修歟或曰為去官之舎館矣委積完歟曰充郡府之庖厨矣刺史在歟日某院叅禪某寺聽講矣噫釋之行固久始吾聞之疑及味其言有可愛者蓋不出吾易繫辭樂記中庸數句間苟不得巳猶有老子莊周書在何遽冕弁匍匐於戎人前邪􅃖􅃖之氓尚克有夫婦父子不盡㧞髮為寺奴則幸矣何暇彼之詬哉今宋公之仕唯其本之培下應其誠優為之備教化之效也如此吾所謂學非若釋夸莊嚴吾所謂田非與釋埓供養誠以今兹學者或自逺來居處不寕則愁飲食外取則勞去愁與勞人雖下中得以自盡於術况其卓者哉厲文之津茁道之芽入可以正其家出可以表天下為民教子為國養材莫之尚已龔君以道藝立其中又欲揚公之美於無窮皆應於義敢不書公之學問無不該而其是非一之聖人故文辭可法施於吏道民大恱蓋將揮之廟朝一郡一學乃其觕聞命後三日冬十月辛酉書云䖍州栢林温氏書樓記南川自豫章右上其大州曰吉又其大曰䖍二州之賦貢與其治訟世以為劇則其民甿衆夥可識已雖然吉多君子執瑞玉登降帝所者接跡䖍無有也疑其偩南越襲瘴蠱餘氣去京師愈逺風化之及者愈疏乘其豐富以放於逸欲宜矣故人許某家石城䖍屬邑也此年夏踵予門道其鄉進士温某之為人曰温君少時求禄而莫之得慨然自謂不得諸外盍求諸内不在吾身宜在吾子孫乃圖山泉美好處奠居栢林因作講學堂房數十其楹攻位之日𫉬五銖錢五萬於地士友珍之或以青錢名其館凡書在國子監者皆市取且爲樓以藏之性寛靜用地利自足不與俗人爭訟買直孳孳以教子弟禮賓客為巳任琴歌酒賦夜以繼日許君不妄人也今其所稱與嚮之疑者不類是䖍之福歟自古聖人之徳業舉在於書聖人者非其智造而巧為之也天之常道地之常理萬物之常情也天地萬物之常而聖人順之發乎言見乎行事君得之以為君臣得之以為臣父得之以為父子得之以為子兄得之以為兄弟得之以為弟夫得之以為夫婦得之以為婦長得之以為長幼得之以為幼反是則爭奪相殺未有能巳者也今温君聚書勤勤是有意於聖人有意於聖人則豈一家而巳鄰里鄉黨庶乎偃伏之矣然則䖍人之成大名至大官盖未易知尚何吉之媿哉栁子厚於楚越間山水如小丘小石潭袁家碣石渠石澗猶有記以啟好遊者今有人為藏書之樓非特山水之勝記之以啟好書者不亦可乎予欲一至欄邊四顧天外江山進前文史相對清風兮我扇白雲兮我盖召屈原於湘魚之口呼李白於海鯨之背潄寳玉之餘潤拭明珠使去纇酒酣興盡交揖而退其樂可言邪而未之得也皇祐五年秋七月庚子記麻姑山重修三清殿記覯幼時讀顔魯公麻姑仙壇記觀其稱道壤地之殊絶人物之瓌怪目想其處謂如鈞天帝庭非下土所髣髴也及長游山縱觀所有則歌吟雲煙饜飫水石而已其餘古屋數百楹或腐或濕無足可居惟仙若神何以顧享噫物有愈衰而後復理之常也則所謂三清殿者今爲復之先乎按是殿之作背山嚮陽得地之正由五代迄兹載祀逺矣雖其營繕頗甚盛壯而木窮於蠧瓦困於雨日壊月堕幾將壓焉潁川陳公某鄉之耆德勇於為善一見其事惻然於中乃發家財以葺之工之巧者必至材之良者必備或改以新或完其舊昔撓以隆昔卑以崇赭焉而霞烘堊焉而雲溶眞儀之位得以如禮山英水靈若喜若慰雖大道之要本乎澹泊安在土木之華而後張顯然名山之景列在圖籍非有游覽之盛不足稱述故言神仙者必曰崑崙之墟海中洲島宫闕之侈視珠玉不啻如土芥世俗相承以為美談若麻姑山著稱久矣元和辭人白樂天軰咸有詠歌粲於屋壁自爾以來言者溢口書者滿牘天下靈境兹不後焉苟非崇飾棟宇嚴事上靈其何足觀之則潁川公之意豈徒然哉覯之視公大父行也見命為記謹書其略於時歲在辛巳大宋康定二年重修麻姑殿記三代之英既往禮教不競人欲大勝欲莫甚乎生惡莫甚乎死而道家流誦秘書稱不死法以啖之故秦漢之際神仙之學入於王公而方士甚尊寵然或云延年或云輕舉皆人耳目間事久而未驗衆則非之矣佛之徒後出而言愈幽逺其稱天宫之樂地獄之苦鬼神之為非人可見雖明者猶或疑焉是故浮屠之居貨賄竭天下宫室僭王者而黄冠師窮智役辯終弗能及自非當世好事慕方外之游者孰克廻面於眞靈之境哉麻姑之名聞之於葛稚川傳申之以顔魯公記峩峩兹山得道之所始也自唐而下祀禮不絶築宫度人以嚴其事而殿屋之設歲月積久雨淫風虐撑拄弗暇將無以布几席陳香燭為鸞鶴戾止之地羣目蚩蚩莫肯營救故潁川陳君策字嘉謀博識之士肥遯州里頃嘗游山周覽及是將命工徒一新其制言未果行而卒其子今山陽司冦諫弟詢不忘孝思盡禀先志乃出家貲以幹厥事斬木而山空伐石而雲愁役不逾時營繕以畢脩廣有度奢儉有宜禮神之位兹亡所媿論者謂真帝在上庶方無虞歲不凶灾物不疵癘故其人得厚本節用爲富家者往往而是内和親戚外禮鄉黨餘力乃以奉釋老求善祥兹亦平時之盛觀也可無傳歟巖巖有堅請勒其志於時歲在辛已大宋康定二年麻姑山仙都觀御書閣後記皇祐三年以御書明堂及明堂之門篆飛白二體藏諸名山麻姑仙都與焉夏六月道士黄太和為覯言今者聖人肆筆而山藪得之其奚翅金簡玉字蓋猶嵎夷昧谷天象所出入撮土勺水罔不光華非復與塵俗等幸哉願有志焉以示後何如覯伏思念王者制作史書樂歌幽則物鬽逺則夷貉耳者必聞口者必誦安在愚儒識之况禮不斥尊其可以犯已而又念江南卑薄與上國人不日接異時故老既没傳聞將失實史官記注祕莫得見則吾君之行禮彼山之受賜曷從而知之先正盛公亦嘗為御書閣記所以述太宗之事殆可繼也矧兹嚴父配天古之大事漢收秦燼失其根萌冉冉至唐名在實去五代魚肉誠所不暇祖武宗文志亦未集佑啓我王及此希闊如廢斯起如斷斯續合符天鬼匪自羣議禮明樂備又申之以翰墨河圖大訓永以華國周公宗祀而文字無傳宣王蒐岐陽而石鼔非手書未有華實相副若是之彬彬者也昔漢武帝封泰山太史公留滯周南不得與從事曰命也犬廼者季秋大饗而知其說者有不在焉則謂之何尚從仙宇見是寳書抑天幸也故就叙其語俾刻之云眞君殿記峩峩西屏神之山下根無地髙出天百靈有位有几筵樓殿靡迆紘紫煙眞君之名世所傳來斯為賢去為仙玉京路險不可攀凡肉欲飛無羽翰崇堂設像鼎以新再拜怳若登天門借問經始其何人吾邑陳侯字仲温後十五歲維甲申李覯泰伯為之文旴江集巻二十三欽定四庫全書旴江集巻二十四宋李覯撰大平興國禪院十方住持記佛教初由梵僧至中國不知其道而務駕其說師徒相承積數百年日言天宫地獄善惡報應使人作塔廟禮佛飰僧而巳厥後菩提達磨以化縁在此土始傳佛之道以來其道無怪譎無刓飾不離尋常自有正覺思而未嘗思故心不滯於事動而未嘗動故形不礙於物物有萬類何物而非已性有萬品何性而非佛佛非度我而我自度經非明我而我自明無緇素才拙一言開釋皆得成道繇兹立大精舍聚徒説法以衣鉢相傳授居無彼我來者受之嗣無親疏能者當之諸祖既没其大弟子各以所聞分化海内自源而瀆一本千支羣居之儀率從其素故崇山廣野通都大城院稱禪者往往而是庸俾邪妄無識洗心從學王臣好事稽首承教蓋與夫老氏之無為莊周之自然義雖或近我其盛哉然末俗多敝護其法者有非其人或以往時叢林私於院之子弟閉門治産誦經求利堂虛不登食以自飽則一方之民失所信嚮矣通人髙士疾之兹久而未克以澄清逮宋有天下兵革既已息禮樂刑政治世之器既已完備推愛民之心以佛法之有益也廣祠度衆不懈益勤聖上莅阼體聞釋部之缺因詔凡禪居為子弟前旅有者與終其身後當擇人以主之意將補鏬漏鋤榛蕪使宗門愈髙大則建昌軍太平興國禪院復十方住持者奉此制也院按舊記唐天祐丙子制置使陳暉所創號顯源永興始有可幽師杖錫來居推輪法事逮李氏僣江表其别子景達以齊王守臨川乃命德琳師以張大其業琳師道行峭潔知解雄俊圜廻千里瞻仰弗暇樹稼數十頃立屋累百楹至太宗時例以年號更賜今額衆安法行刹此邦者莫與為等琳既化去道䘮不傳而其徒以僥倖居之垂四紀矣凡鄉之學釋者雖知有眞乗法印當迷而疑何所扣决今年夏主者元皓病物故時侍禁馮君德宣光禄寺丞李君虞卿同權軍政深惟天聖詔書求可以長是院為人師者粤有桑門上首耆老識逹之士相與謀曰嘗聞建安崇儼師得法於石霜楚圓和尚廵禮所至學者圍繞師避而處行今在邇抑可以致之乎因列名以舉郡然其言乃就迎於撫州景德院讓不可得而後至升堂之日㑹者萬計師據牀安坐有問斯荅如鐘之鳴如谷之響重昏宿蒙氷解雪釋歡喜讃歎洶動街陌論者謂國朝嚴佛事俾擇知識表於禪林太平郡之福地也而儼師以正真道臨之燈燈繼照曷有窮己然非吾儒文之不足以謹事始而信後裔僉來謁予曰文子職也其可以辭重違父兄意故為之一説時則景祐三年秋九月也太平院浴室記釋氏東行乘風御霆山聞海驚言善言惡知死知生天人之好地獄之暴有作斯報刑淫癸辛力過羿奡維彼慈悲如童䝉師如膏肓醫還愚以智解囚於縲伊貴伊富或士或女承流蹈舞涵淹肌髄繫絡心膂何土敢皮何木敢枝以輦以歸繩者目亂斧者手胝彌國亘野川邪谷哆筆不可畫雲霓出中日月走下冬温夏涼為隂為光食甘寢香百事有備一物必良惟天之啓惟神之契人不得議孰為禮經肯顧文吏江之南城風和氣靈鐘鳴梵聲爰有禪居號稱太平太平之聚儼師是主以訓以撫疑者得明饑者得哺堂房以新器備以陳霞朝卉春唯是温室缺然將榛大冶陳宰儒兼佛解法與心㑹斥其餘財成此勝槩材美石堅重雕複鐫圭方璧圓下不居濕旁無見賢遍天吾願釋子母意於水將意於理爾身以澡爾心以洗洗心謂何匪塵匪沙匪刮匪摩去爾美欲任爾平和無可不可所遇皆我萬物一馬何者為因孰謂之果道不離人吾身佛身吾偽亦真門前舟梁自失要津慶厯之歲是維戊子月云窮紀野夫言焉以振厥始建昌軍景德寺重修大殿并造彌陀閣記儒失其守教化墜於地凡所以修身正心養生送死舉無其柄天下之人若饑渇之於飲食苟得而已當是時也釋之徒以其道鼔行之焉往而不利無思無為之義晦而心法勝積善積惡之誡冺而因縁作空假中則道器之云戒定慧則明誠之别至於虞祔練祥春秋祭祀之儀不競則七日三年地獄刼化之辯亦随而進蕃衍光大繄此之由故嗣迦葉者師子達摩流為東山牛頭傳龍樹者惠文惠思熾於天台灌頂二家之學並用於世若夫律戒之盛凡出家者當由此塗按白居易撫州景雲寺律和尚碑文如來十弟子中優波離善持律波離滅南嶽大師得之南嶽滅景雲大師得之師南城人初𨽻景雲寺徙洪州龍興終廬山東林度娑婆男女萬五千人姜相國公輔顔太師真卿本道亷使楊憑韋丹皆與友善樂天之敘如此南城於宋為建昌軍景雲為景德寺律和尚之迹已無見土木之堅久者唯殿與門殿之制不靡而其材良乃今所無基高而旁臝入風雨者四靣如一將恐腐折後難為功寺僧義明乃營屋若干柱以翼之且作彌陀閣於其前右兼壯與麗為永永計先共謀者文憲宗正既而憲住他院正亦遂輟克有終者唯明殿之財集於衆閣成於孀何氏始卒凡八年明講經論頗憙事以雅於予來乞文因論釋之所由興亦使其徒知此寺昔嘗有僧為律戒師於江之南度人以萬數當世賢者與之游以為寺之榮而有所慕焉慶厯七年冬十月已未記景德寺新院記院墟於火力弗能復者數年矣壽安縣君黄氏以其夫故都官陳員外所服若器斥賣以濟之其所謂殿堂及諸棟宇之切於用者罔不備具此誠念死者之不可見庶有益於㝠㝠間也凡大精舍之焚相望於天下浮屠人難去聲言其灾乃以為宫室之媺天人所欲得故取以去且佛之説諸天之樂非人間所可髣髴是以其徒布因求果願生彼界今乃悦人之土木而奪之則是人間之美物諸天亦無有尚何足慕邪而悠悠者或信之餘燼未寒新宫已圖往往是矣兹院僧固不辯不能飾其説以驚俗殆廢不起非陳氏之喜事而壽安發之何以及此嘉祐三年九月庚午記廻向院記皇祐二年夏六月旴江大水龍安其東南鄉蓋菑之所自始視其山破壊如擊甕盎泄所畜百源一道且怒且鬭斬大樹瀦大屋當之者父母妻子廻靣相失不得其屍以斂於是有去平而就高以避其復來者廻向院其一也院之墟曰兵湖民寰而居甚卑以喧當水之來則數十百家悉聚殿閣坐甍騎桷將顛者數僧徒嗷嗷乞命魚鼈既免院主海元即其儕為久安計有德文者願易之高燥地謂其别墅曰昇平相距五六里盍經營之文守律戒知游藝士君子多與之語故列於官府而從諗於里人而恱貧者輸其力而地以除富者效其貲而屋以徹斂故材就新基曾未踰年厥功備具足之泥塗今為崇高耳之喧囂今為寂寥後山如懐前谿如蟠晨鐘夜梵夢寐天半松霜竹月繡畫秋色自危而安去苦得樂昔人未知勝事在我噫民之欲善蓋天性然顧無以道之爾夫水潦之後田里傷創斗粟百錢上農蓄家且無餘食而文師以其情言非能取佛説以自照耀使人惑之而衆莫不竭盡以受事若夫豐富之世而豪僧辯口先焉雖圖天宫何足怪也為人上者常病於教化謂不可為亦過矣昔吾遊其地今聞有成喜之是以記時則三年秋某月也承天院記慶厯中歸自京師有僧來訪曰自堯是為承天上首乃言其院吾先君子嘗至焉今兹又新作往往有留題者因責吾為詩厥後多故不果應近者復來且介秦氏甥以院記為言覯伏念先人舊遊不勝燕雀啁噍之情其僧又憙事吾甥又貧而為之請義不可拒問其所由來則舊崇德院為尼媪宅間籍没當太平興國中有德琳師迹其事為蓋古所謂豪僧者自閩來旴住太平院徹草廬成大禪居是時禁令疏釋氏方騁與民交利琳致資甚髙得請公上以崇德故名遷於雲山淳化三年斬山木營繕使其徒元立主之大中祥符元年先帝封禪例賜今額立死堯繼之於時景祐三年瞻相闔門鞠為老屋木之腐者將折石之裂者將堕不有改作誰嗣前人願與有力者圖之誠意一發和者日至曰殿曰堂曰僧堂曰水陸堂曰羅漢閣曰厨曰庫曰廊曰門始終數年繪素畢備於事勤矣而耻無聞故徼吾言以永之噫浮屠人坐新宫享備器者皆是然而知子墨翰林之為貴者幾何人邪或蹙於威力而後貨俗子取陳言以辱金石者豈少邪堯師能不憚煩以來乞詩不獲又屬以記傍吾親戚間求人為言唯謝絕之憂其指何邪安知百千萬年後吾文將不行邪彼蚩蚩者將有聞而堯師泯滅耶皇祐三年冬十有一月乙丑記承天院羅漢閣記吾爲承天院記巳二年丘文遂來言院之羅漢閣身所為也願復得一辭刻之始吾童子時與令佐著作陳微之讀書湖上丘君乃其鄰以久游貫人事日與笑語無忤及此見之髮色則異而顔靣益壯使之年實七十矣少為賈人上下百越走兩川而歸克有貨財治土田築室教子孫終之淑愼以從士大夫游又能精信於釋損其贏以補之果若釋之云則雖老而死死且復生其得意何有窮邪噫漢代初傳佛道西域人得立寺都邑以奉其神漢人皆不出家魏亦循漢制石季龍僣位以其出自邉戎應從本俗百姓有樂事佛者特聽之當是時謂之何哉外國之神而已及東晉宋氏其法乃大蓋慧逺居廬山名雖為釋實挾儒術故宗少文就之考尋文義周續之通五經五緯而事之雷次宗亦從而明三禮毛詩儒者嘗為弟子其人得不尊乎諸部佛經華藻爛爛豈西域之文宜有所助焉者也今之釋樂乞言於文士者亦將借助矣乎文士不必有古人之才足以埤釋就令有之而民耳目日異矣庸可行哉丘君以舊故勉而為之言時則皇祐五年秋七月也新城院記出旴江門陸行數十里無善邸舎足容食息求之僧家唯章山其庳則新城院焉前此予歸自信時秋大熱夜發金谿日昃不到從者請息肩得兹院以宿下馬據牀汲井泉飲且盥清風在竹不待呼召紅塵在路不敢随入坐未安定意已順適仰而視其梁則毛姓繢名者作焉有頃而繢至其禮甚卑立於堂下若吏民見官長之為予既辭因揖而進之與之語蓋古力田敦樸之流及院之本末則對曰殿興於開寳中則繢之王父母嘗有勞焉堂鐘樓廊門成於景祐康定間則繢與婦徐實同力焉予嘆曰民財有餘不以備鬭訟買直於圄犴而能奉佛法徼福於窈㝠斯世俗以為難矣况於卑己尊賢此道甚大誰宜知之凡人衣食足者或聞馬蹄聲在百歩外閉門唯恐不及今吾亦布衣姑弛擔於此且無一介與爾相聞爾何取於我而拳拳若是乎吾無乃克謹名節未始得罪於鄉黨乎抑爾之聞見有異於衆人乎既嘆而去五六年矣而不忘於心近者予有䘮繢又使其子來賻辭益遜意益勤顧無以荅遂録嚮所言者贈之使刻石為新城院記云時則皇祐三年冬十有二月也元祐辛未轉運副使張商英天覺過新城院題詩云昔讀旴川集嘗聞㤗伯賢新成文刻在往事野僧傳氣格終驚俗光芒合貫天田翁不知價只得十千錢宣和庚子朱褒世德自國門待次還郷道過新成院讀}
