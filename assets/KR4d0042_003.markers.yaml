  - {type: variant, offset: 31, length: 0, content: '', WYG: 我應之曰所謂延者於兒豈不欲延其年以及髦期耶於家豈不欲延其寵禄世世無有窮耶如是無他力於仁而已矣孔子有仁壽積善餘慶之說夫仁天下之美道殺身尚為之矧夫嚮勸甚明歴觀前志多有效驗可不務哉故字之曰伯仁酒困不能執筆姑告其畧敘陳司理字豫章陳君名世南南方之卦離離者明也字之曰公明明之義廣矣哉其在天也為日為月為星為晝為暘在水為止在火為燎在金為鑑其在人也為視為思為智為文為見善為知過為應變為待時事親明則孝事君明則忠治事明則姦無所容聽言明則讒無所入臨財明則貧不失廉臨難明則死不失義凡天下之事未有不須明以濟者也然而聖人約之以道曰䝉以養正明夷以蒞衆貴乎明於内而晦於外也陳君公相子孫克守家法儒雅幹正久次無悶斯有得於明者矣故敘以告至和二年冬十二月戊子}
