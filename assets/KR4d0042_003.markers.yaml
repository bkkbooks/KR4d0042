  - {type: variant, offset: 6, length: 0, content: '', WYG: 于未危隂陽有消長日月有蔽虧在乎備之得所則禍何能為伏惟國家重西北而輕東南臣何以知之彼之官也特舉此之官也累資斂於此則莫知其竭輸於彼則唯恐不支官以資則庸人並進斂之竭則民業多隳為貪為暴為寒為飢如是而不為盜賊臣不知其所歸諸夏内也為腹心夷狄外也為手足輕重之理豈神明之所不燭秦備胡而陳勝起事唐戍蠻而龎勛肆毒觀其土崩之由誠可為之痛哭古者有采詩之官惟賦亦古詩之流賤臣不獲言于朝敢賦心之憂愁安得為太平之草木䝉雨露兮千秋麻姑山賦巍乎高哉兹山之為異也吾不知夫幾百千里之廣但見土老而石頑頂天而直上驗地勢之所極固亦東南之藩障者乎路蹊蟠鬱前後相失岡巒崒嵂左右馳突鳴泉百雷躍下雲窟喬杉萬矛舞破煙骨靈竒怳惚變見出没匱耳目之觀聽曽不究夫萬一其間則有名天之洞禮神之堂高臺層瑶吸日月之光繚垣築粉孕芝蘭之香偏門曲廊入迷其方斜軒亂窓或溫而凉况乎御龍膏之酒倚雲和之瑟一飲一石一醉千日安知億萬人塵衣飛蚤虱其或黯然而霧飄然而雨跬步之内則曚無所覩夜長漫漫山空月寒鶴羣戲風舞羽跚跚老猨抱子吟聲欲乾怪物參差松柯水湄或步或馳或嘯而悲仙乎鬼乎千態萬狀而使人心疑别有澗石之迤邐圜潭之無底是曰蛟龍之所止嬾而為旱怒而為水嗟我力耕之民輟衣食之資而為禱祠之費巖岫㝠㝠古無人行百獸飢死虎狼夜鳴是何假上真之名而神姦之所慿也悲夫以地之竒以物之靈而逋客之經營全形養氣采术茹菁未嘗有笳簫之聲鸞鳳之迎謝人品而凌太清者徒見山寒兮青青水秋兮泠泠雲路咫尺而不能以升豈非仙可得而不可求道可悟而不可學彼其叛稼穡之功遺室家之樂越天常而慕㝠寞宜乎白首於丹竈之下幽死而無所託也疑仙賦并序覯家旴江其西十里則麻姑山顔太師真卿有記存焉少北則麻源謝靈運詩所謂入華子崗是麻源第三谷者也其山水清媚與神仙趾迹相附著在人口吻吾母初無子凡有可禱無不至祥符元年夢二道士奕棋户外往觀之其一人者取局之一子授焉遂娠及覯生十餘歲從先父適田間宿東郊既寐有人以書與覯方制如牘表用黄其目曰王狀元文集夢中以為沂公之文也就學以來果不甚魯或時開卷􅐞然憶念謂曾讀此書再思之未嘗見也墨筆著辭雖未善顧出自然不多勞力私心喜幸以所從受頗靈異而不敢言今兹年三十有八矣乃用自疑作疑仙賦儒者不言仙蓋患乎傷財舍生以學之者也苟異於彼宜無害賦曰噫噫仙乎為有為無為天之居為地之廬為山之國為水之都為古為今為智為愚為}
