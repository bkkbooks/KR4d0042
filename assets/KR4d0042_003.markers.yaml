  - {type: variant, offset: 1, length: 0, content: '', WYG: 哲以壽斯文之氣脉豈偶然哉天禧四年庚申十二歲按先生見余監丞書云年十二近文章則知先生於是年能文矣天禧五年辛酉十三歲乾興元年壬戌十四歲是年丁府君憂按鄭夫人墓誌云年十四而先君沒又云先君嘗學不應舉教其子作詩賦亦樂施惠尤直信則知先生家學有源委矣仁宗皇帝天聖元年癸亥十五歲天聖二年甲子十六歲天聖三年乙丑十七歲是年府君服除按鄭夫人墓誌云稍出游求師友則知先生出游必在府君服除之後天聖四年丙寅十八歲天聖五年丁卯十九歲天聖六年戊辰二十歲天聖七年已巳二十一歲天聖八年庚午二十二歲是年娶夫人陳氏按慶厯七年先生作夫人墓誌云陳氏今為南城人生五年養于伯父又十一年而嫁嫁十一年而卒又云復還舊居娶婦蓋先生前此出游至是年始還家歟又有見余監丞書云十歳知聲律十二近文章思慮猖狂耳目病困者既十年矣此書當作於是年天聖九年辛未二十三歲是年著潛書十五篇又有見孫寺丞書云年二十三雞鳴而起誦孔孟羣聖人之書纂成文章以康國濟民為意文章蓋指潛書也孫寺丞時為南城宰明道元年壬申二十四歲是年著禮論七篇其後余襄公有書與先生曰所示禮論七篇推進禮經準的世教派仁義贅刑政豈止獨步江表校聲名於後俊哉先生之有功於禮經也如此又作陳仲溫進士墓誌按陳仲溫諱璆先生之伯丈也故墓誌序之末曰初君之弟與其婦偕死息女始絶乳君愛養之如已子長以嫁李氏明道二年癸酉二十五歲景祐元年甲戌二十六歲是年有邵氏神祠記其畧曰建昌城北有民邵氏世奉五通禱祀之人日累什百景祐元年里中大疫而吾家與焉唯五通諗以無害疾之解去皆約日時有功於予其可廢而不載作記恐是此年景祐二年乙亥二十七歲按先生見蘇祠部書云由六七歲時調聲律習字書勉勉不忘逮于今兹年二十七矣此書當作於是年景祐三年丙子二十八歲是年作明堂定制圖并序平土書上聶記注書上李修撰書上宋修撰書太平院住持記冬至夜酒醒詩甘露亭詩按見聶記注書云行年二十八矣當在是年見李修撰書云生平為文謹採二十四篇寫成一冊及明堂定制圖一道并序草具其副辱諸侍者見宋修撰書云嘗著明堂定制圖并序其意在贊明經義以禆益一王之盛禮謹繕其副陳諸座隅則明堂圖之作亦在是年也獨平土書不著所作歲月然先生明年見范公而范公他日薦先生必以禮論易論明堂定制圖平土書共獻必同作於此一二年之間張宗古送先生南歸序其畧曰自周室距今曠千餘載此禮廢絶所以學者各是已見競牽師習故復出泰伯以明其本蓋指明堂圖也是年入京贄見宋修撰李修撰聶記注葉集賢諸公皆許可宋公庠李公淑聶公冠卿葉公清臣也㑹貢舉罷遂歸景祐四年丁丑二十九歲是年往鄱陽見范文正公其書云年二十九嘗遊京邑彷徨而歸又黜鄉舉其後范公與先生書云在鄱陽勞惠訪尋以改郡不敢奉邀則知先生是年鄉舉不利而往鄱陽訪范公也寳元元年戊寅三十歲是年作廣潛書十五篇命箴野記鄧公儀傷辭縁槩師詩惜雞詩按廣潛書自序云歲辛未泰伯以潛名書後七年羈栖山巖即而廣之復為十五篇則此書當作於是年命箴云三十曰壯聖人以立則此箴亦當作於是年廣潛書云羈栖山巖則野記亦作於是年寳元二年已卯三十一歲是年先生夢大雨震所居室有一人紫衣而冠謂之雷神呼先生使前授之題曰春社詞援筆得八句與之及覺記其首三句頗怪麗後七年以五句足之按此夢與疑仙序二夢而三一為誕彌厥月之祥二為神授斯文之印天生賢哲豈虚其證是三夢皆可書富國彊兵安民三十策按先生以康定二年試制科則此策必作於是年康定元年庚辰三十二歲是年得男參魯有上江職方書又往越州赴范高平公招故有登越山詩按丁亥年先生作亡室墓誌云一男參魯僅毀齒蓋自庚辰至丁亥凡八年故曰僅毀齒也按先生上江職方書云行年三十餘近訪呉越而歸曰三十餘則當在是年曰訪呉越而歸則訪范公也江公鎬寳元元年以職方守旴康定二年十一月改慶厯元年辛巳三十三歲是年作建昌軍集賢亭記修麻姑殿記麻姑山仙都觀修三清殿記梓山院修佛殿記上呉舍人王内翰富舍人劉集賢慎殿丞書日出詩感事詩和慎史君出城見梅詩按集賢亭記序曰康定二年夏六月}
