  - {type: variant, offset: 121, length: 0, content: '', WYG: 其疲矣終沒吾世而巳矣旴江集巻三十四欽定四庫全書旴江集巻三十五宋李覯撰古體三賢詠魯連誓蹈海夷齊甘采薇秦王不得帝周武見終非輕死議萬乗強哉三布衣凡人欺貧賤貧賤豈易欺和蘇著作麻姑十詠魯公碑他人工字書美好若婦女猗嗟顔太師赳赳丈夫武麻姑}
