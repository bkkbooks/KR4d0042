  - {type: variant, offset: 32, length: 0, content: '', WYG: 江李覯序旴江集巻二十五欽定四庫全書旴江集巻二十六宋李覯撰表謝授官表臣覯言今月十九日建昌軍進奏院逓到勑牒一道官告一道伏䝉聖恩特授臣將仕郎試大學助教者畎畆之中耕鑿殆忘於帝力蓬茨之下絲綸遽捧於王言身未識於九重名巳參於一命閨門交慶鄉里知榮臣覯中謝伏念臣生長荒陬世家寒士徒際恢儒之運謬懐榮古之心四十無聞早畏仲尼之戒三千奏牘終慚曼倩之才嘗策足於上都願刳肝於詔舉過䝉嘉惠首命試言繄遼豕之自矜奈齊竽之}
