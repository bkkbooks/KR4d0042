  - {type: variant, offset: 21, length: 0, content: '', WYG: 况學習徳行道藝孰不知忠孝之美任之以金革則與夫干賞蹈利庸徒鬻賣者蓋有間矣且太子將為君國子將為臣君臣之分未定而恩義固已接矣則今日之遊倅未必不為嗣王之將帥也轡長馭逺有如是哉文王世子曰公若有出疆之政庶子以公族之無事者守於公宫正室守太廟諸父守貴宫貴室諸子諸孫守下宫下室此諸侯禮也豈天子之事而有不用力者乎軍衞第四槀人掌受財于職金以齎其工弓六物為三等弩四物亦如之矢八物皆三等箙亦如之春獻素秋獻成書其等以饗工乘其事試其弓弩以下上其食而誅賞饗謂酒肴勞之也上工作上等其饗厚下工作下等其饗薄乘者計其事之成功也善則上其食尤善又賞之否者反此先王之於造兵其事必計之其物必試之非直饗有厚薄食有上下又臨之誅賞則工有不勉者乎作有不慎者乎故弓人為弓取六材必以其時凡相幹欲赤黑而陽聲角欲青白而豐末膠欲朱色而昔筋欲小簡而長大結而澤漆欲測絲欲沈冬析幹而春液角夏治筋秋合三材寒奠體氷析灂春被弦則一年之事矢人為矢前弱則俛後弱則翔中弱則紆中强則揚羽豐則遲羽殺則趮是故夾而揺之以眡其豐殺之節也橈之以眡其鴻殺之稱也凡相笴欲生而搏同搏欲重同重節欲疏同疏欲㮚廬人為戈柲車㦸酋矛夷矛句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶􅌛兵同强舉圍欲細凡試廬事置而揺之以眡其蜎也灸諸牆以眡其橈之均也横而揺之以眡其勁也函人為甲凡察革之道眡其鑽空欲其惌也眡其裏欲其易也眡其朕欲其直也櫜之欲其約也舉而眡之欲其豐也衣之欲其無齘也其作巧其試明擐之者無不堅執之者無不鋭以此戰何不勝以此攻何不取以此守何不固楚之鐵劒利而秦王色憂謂鐵劒利則士勇焉耳為國家者苟不留聰明則有司以常事處之郡國之貢姑備名物府藏之約唯謹簿書而欲用之立尸之地此可為太息者也旴江集卷九欽定四庫全書旴江集卷十宋李覯撰刑禁第一刑罰之行尚矣積聖累賢未有能去者也非好殺人欲民之不相殺也非使畏已欲民之自相畏也然而憲令所加寛猛或異苟失權時之制則致逺恐泥矣故大司寇之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典新國者新辟地立君之國用輕法者為其民未習於}
