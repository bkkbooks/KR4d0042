  - {type: variant, offset: 79, length: 0, content: '', WYG: 如天如神變化不測恨行計速不得與足下論其萬一若皆如來示則指掌而已何必從師而後知哉有言於覯者多矣如虚舟焉未嘗輙愠今足下兄弟言古而志髙於愚心未忍舎焉故此奉告且以為謝不宣覯白旴江集巻二十八欽定四庫全書旴江集巻二十九宋李覯撰雜文原文利可言乎曰人非利不生曷為不可言欲可言乎曰欲者人之情曷為不可言言而不以禮是貪與滛罪矣不貪不滛而曰不可言無乃賊人之生反人之情世俗之不憙儒以此孟子謂何必曰利激也焉有仁義而不利者乎其書數稱湯武将以七十里百里而王天下利豈小哉孔子七十所欲不踰矩非無欲也於詩則道男女之時容貌之美悲感念望以見一國之風其順人也至矣學者大抵雷同古之所是則謂之是古之所非則謂之非詰其所以是非之状或不能知古人之言豈一端而已矣夫子於管仲三歸具官則小之合諸侯正天下則仁之不以過掩功也韓愈有取於墨翟荘周而學者乃疑噫夫二子皆妄言耶今之所謂賢士大夫其超然異於二子者邪抑有同於二子而不自知者邪何訾彼之甚也原正祭非其鬼而求福焉人知其不正矣考之經則禱祠之禮煩設祝史巫覡其術近乎怪孰謂聖人而為不正哉君親人所甚爱也死亡人所甚惡也以所甚愛而之所甚惡有告之曰禱可以免雖聖人其如何孔子曰丘之禱久矣為已故也周公冊祝請代武王臣子之心也今之學者自以為正人視其親愛之疾則曰有命噫正可矣曰孝與慈則未也不孝不慈而得正焉吾不願也讀儒行儒行非孔子言也盖戰國時豪士所以髙世之節耳其條雖十有五然指意重複要其歸不過三數塗而已平居自慎重能處貧約一曰道塗不争險易之利冬夏不争隂陽之和愛其死以有待也養其身以有為也二曰其居處不淫其飲食不溽三曰一畮之宫環堵之室蓽門圭竇蓬户甕牖易衣而出并日而食四曰幽居不滛臨事有守奮發不顧忌一曰刼之以衆沮之以兵見死不更其守鷙蟲攫搏不程勇者引重鼎不程其力二曰可親而不可刼也可近而不可迫也可殺而不可辱也三曰雖有暴政不更其所四曰讒謟之民有比黨而危之者身可危也而志不可奪也五曰世亂不沮不苟合於君視利禄如土芥一曰難得而易禄也易禄而難畜也二曰委之以貨財淹之以樂好見利不􅃜其義三曰上不答不敢以謟四曰陳言而伏静而正之上弗知也麤而翹之又不急為也五曰上不臣天子下不事諸侯雖分國如錙銖容人愛士以身徇朋友一曰慕賢而容衆毁方而瓦合二曰内稱不辟親外舉不辟怨程功積事推賢而進逹之不望其報三曰爵位相先也患難相死也四曰並立則樂相下不厭久不相見聞流言不信其餘亦常事如席上之珍以待聘衣冠中之類考一篇之内雖時與聖人合而稱説多過其施於父子兄弟夫婦若家若國若天下粹美之道則無見矣聖人之行如斯而已乎或曰哀公輕儒孔子有為而言也曰多自夸大以揺其君豈所謂孔子者哉讀文中子文中子之言聖人之徒也傳之者非其人為之癰創而已耳吾觀中説謂所傳者姦詐無禮之人也世誚房魏輩不稱師顧諸公如何人也竊人之財猶謂之盗學焉而不知所由來固小人矣然其佐唐命基太平行事灼見非小人也非小人而不稱師未嘗以為師也明矣隋書魏公所述常人或得一傳而無王通云者豈躬為弟子而忽忘若是乎或謂以長孫無忌怒故句夫魏公引義諫諍不為天子屈豈憚一無忌而削其師哉盖文中子教授河汾間迹未甚顯沒後門人欲尊寵之故扳太宗時公卿以欺後世耳懼其語之泄乃溢辭以求媚若杜如晦於萬民猶天百姓日用而不知之類其媚於唐帝則下文曰堯舜者是也孔子之時周王魯公非有道也至脩春秋尊京師别内外戀戀不能已江都弑煬帝而文中子曰天其或者将啓堯舜之運吾不與焉命也其如君臣之禮何孔子於孟懿子季康子稱對稱名孟孫問孝於我我對曰云云康子饋藥拜而受之曰丘未逹云云楊素蘇䕫李徳林隋之大臣且非弟子而謂之請見又名之素與吾言䕫與吾言徳林與吾言云云其如上下之禮何吾故謂所傳者姦詐無禮之人也雖然不姦詐不無禮文中子之道不如是之光也流俗之視中説如視佛書夫焉知佛之道可尊而尊之哉徒聞其未死時天地鬼神夷狄之君無不尊之者耳或曰文中子之道不如是之光則奈何曰不害為聖人之徒弔揚子嵗隂在戍兮其月季春望前三日兮是惟壬辰面書林以齋慄兮敢行弔于子雲嗚呼哀哉高廟不神兮借人以權新都大盗兮舂國之􅍋㓙邪得志兮明哲偷安天爐熾炭兮璞玉不燃斂佐王之刀尺兮迴智巧乎簡篇何諸儒之䘮明兮復培塿乎泰山夫聖者通之謂兮可名而名之豈有常人昔成湯號伊尹曰元聖兮固商書之所不刪夷之清而惠之和兮孟氏亦以為聖焉謂子雲之非聖兮何啻乎膠柱而操絃韓退之云大醇而小疵兮所論止于法言兹對問之細碎兮如入宫始見其堧垣伊太廟明堂之巨麗兮則盡在于太𤣥兼三材而用五行兮取度數於渾天日如蟻而右轉兮斗揭柄而左旋隂陽晝夜之㑹合兮非弄筆之所磨鐫其指在於三綱兮尤切切於君臣君道光而臣道滅兮尊卑之分以陳消與息而相乘兮無盛滿之不疾顛言行禍福同出於罔兮貴思慮乎未然必稱孝而稱忠兮異乎劇秦而美新既廣且深兮浩浩東溟之瀦百川自哲人之萎於魯兮獨子雲之書誰得而及肩惟視之八曰翡翠干飛離其翼狐鼦之毛躬之賊盖小才之足以殺其身兮俾愚心之愬愬奉新語以周旋兮庶全歸於窀穸彼叔明之為注兮間或失而或得矧科指之不甚明兮匪後生之能識今之從事於此書兮其説溺乎數術隠怪之士借以為已有兮學者欲求而弗獲繄小子之不敏兮将大為之解釋下以行諸講學兮上以及夫邦國計其業之勤勞兮豈一朝而一夕困于内者疾病兮廹于外者衣食念一家之言兮終成之於何日天有意於此書兮使我壽考而强力不然子雲之道兮或幾乎息我思古人兮淚漣漣而霑臆復説孔子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉噫顔氏之賢肖夫聖者也猶有不善乎曰衆人之不善不至乎善也賢人之不善善而過者也孔門髙弟師也過由也兼人有姊之䘮而弗除曽子執親之䘮水漿不入於口者七日皆善而過者也而未聞其復也中庸曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣復而得中者顔氏而已乎故曰用之則行舍之則蔵唯我與爾有是夫人之患不在乎不及而在乎過之不及則下於人下於人則憤憤則知進矣過之則出乎類出乎類則矜矜則不知其反矣伯夷與鄉人立其􅃣不正望望然去之過於正者也叔向三數叔魚之罪過於直者也於陵仲子不食兄之禄過於亷者也魯隠公攝位過於讓者也徐偃王不忍鬭其民過於仁者也尾生期女子過於信者也聖人則不然子見南子似不正昭公知禮似不直将之荆先之以子夏申之以冉有不欲速貧似不亷文王既沒用我者其為東周似不讓誅少正卯似不仁諾陽貨曰将仕似不信應時遷徙各得其所禮所以制乎中義所以謂之宜也可與適道未可與立可與立未可與權聖人之情也義之不存而苟變焉然後為小人矣䕫教胄子臯陶陳九德曰直而温寛而栗柔而立是亦復之一端也天台王幾好學而多䏻将有所就焉者也幾之字曰復之故為之作復説命箴宜失而失斯謂之正宜得而失斯謂之命身之不脩責命可乎謹爾攸趍惟道之圖命之不諧躁乎則惑慎爾食息躁爾之賊得失不言吾道孰辨臧之否之繄我之願言不以道幸其哀已食而揺尾彼獸之耻非道而哀尚盍耻之矧其無益祗辱奚為三十曰壮聖人以立先迷無悔今是猶及蚤詩夜書以遨以娛戒之勿渝天其舍諸畫賛工有圖貴人之像者予哀其賢而無所遂也為之辭云道之可行君子乃出行而無成君子之疾位以名得名以位失古人丘壑豈徒自逸嗚呼弋陽縣學銘慶厯恢儒首自東都爰及郡縣築宫授徒地不患小權不在大繫乎其人乃勤乃懈葛陂之南縣廷之東令异尉字經始其中居室以嚴用器以利曰藝曰儀一為品制事則有變衆則有散非志之􅃀誰足之踐易美知幾孔戒已甚太學三萬黨人以禁興雖有功廢或為福敝漏之下誦弦亦足朂哉斯道無與乎世儒之全安宜億萬祀嘿堂銘黄介夫尉鄖鄉作嘿堂以居使人來告故為之銘曰衆人之嘿不材於天賢人之嘿保身以權止則為澤行将為川雖欲勿言安得不言太學議覯伏以古今時異沿革事殊凡有設施當求折衷若曰上法周室作為辟雍詢於儒者諒無異議行之本朝或似不便何者雖作辟雍必不欲廢國子監未聞古者辟雍之上更有國子監也况辟雍之設非徒講授而已便當行視學之禮養老之事國家大禮如籍田明堂鸞輿未動六軍之士已希賞賜竊恐惜費未能盡行有其器而無其用天下之望寧不歉耶若欲太學不與國子監相妨又無行禮之責則宜近取唐制國子監太學四門律書筭廣文凡七館皆屬國子監太學則七館之一其於國子監猶吏部兵部之於尚書省也不相妨明矣萬一遭遇帝暉下臨乃吾道之光耳若猶未也亦不為朝廷之闕至於楝宇之度在唐無聞如使講習有位生徒有次量事制宜誰曰不可然亦須見地之廣狹而後計之若豫為廣大之制而地或褊小則是空文無所施用或謂周人立四代之學今若以國子監為唐學又立辟雍以法於周有何害耶覯謂不然周之四學並立各有所用如養國老於東膠養庶老於虞庠學干戈羽籥於東序禮在瞽宗之類是也今教學之職盡在辟雍若不使國子監統之則祭酒司業當治何事如使辟雍屬於國子監則古者辟雍之上更無官司故覯以為不便果能廢國子監而興辟雍且脩視學養老之禮以飾之則非覯之所敢議也䇿問三首問孟子稱舜為天子臯陶為士瞽瞍殺人則執之舜竊負而逃海濵以有所受之也觀諸周禮則有議親之辟夫宗室有罪尚在八議彼為天子父而吏得執之是邪非邪抑異代之法不可同條邪二三子極言之問夏之有徳逺方圖物以鑄九鼎使民入山澤不逢不若其功大矣然所謂神姦者固為傀異之形而求近人邪抑能變化與人亂邪果其傀異則民之見者雖無有鼎亦知懼矣苟能變化與人亂則何形之可鑄邪當王孫滿之時鼎猶在周其所象物盖嘗目見非虚語也顧言之失其義耳然則禹之為是鼎其何意也問周官六屬其職三百六十而貟數則多如六鄉七萬五千家耳自比長以上卿大夫士萬八千餘人此大可怪學者毎非之而未見其說抑序官之妄邪則鄉州黨族閭比皆有職又不可闕然則守其官者何等人也䇿問六首問太史公叙術學崇黄老而薄六經其論以道家與時遷徙應物變化故曰聖人不巧時變是守以吾觀之盖不出夫易易非六經乎何其不察而遽薄之也二三子試言焉問韓退之有言老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其説樂其誕而自小也亦曰吾師亦嘗云爾佛之説吾不能詳曽子問老子列傳則有問禮之事史未足盡信禮記經之屬也亦有妄乎明辨之無牽舊説問韓退之謂楊墨之書尚有存者今之學者有學於彼者乎有近於彼者乎其已無傳乎其無乃化而不自知乎吾考於墨彊本節用誠其所長楊則無見矣然乃孟子所謂為我者也歴觀士大夫之所以高人者儉陋為先儉非墨之流乎其施於天下國家恨未及也至於先已而後人持祿保位不以治亂累其心者亦楊氏為我之决矣及其論議尚囂囂然曰闢楊墨豈非化而不自知者哉噫時有變事有宜則夫二者為是乎為非乎将盖而勿問乎将折以先王之制乎各言其畫問春秋書王所以見王者上奉時承天而下統正萬國吾習諸此未始不舍業而嘆深矣先王之法也然公羊子曰王者孰謂謂文王杜元凱曰所書之王即平王學者往往未知所傳今之儒生又有異意謂春秋以天下無王而作盖號令賞罰天子之事孔子不敢私之故書王以著號令賞罰之所由出若是則王非周也孔子藉之云爾吾心亦不安兹用商于二三子繹聖人之心懋君臣之義吾有望焉問周禮周公致太平之迹也而於大司馬見師不功之文小司寇有詢國危之目諸如此類盖非周公所嘗行若春秋舊凡亦曰周公之制而弑君之例存焉豈成王時有是也哉故學者疑周官凡例皆不出于周公二三子以為如何問孟子曰未有仁而遺其親者也未有義而後其君者也是時天子在上而孟氏游於諸侯皆説以王道湯文武所以得天下之說未聞一言奨周室者庸非後其君乎賢人之言必不徒爾盍各求其意旴江集巻二十九欽定四庫全書旴江集巻三十宋李覯撰墓碑傷辭附進士陳君墓銘潁川陳君卒於天聖九年六月十二日塟於明年二月甲寅墓在南城縣太平鄉之壍陂将塟姪壻李覯叙而銘之君諱璆字仲温産富家年少獨奮好學蓄經籍求師講問晝夜不敢息長於甲賦唐風詩時輩多所驚仰憙技藝無不該者尤精玉筯書得斯冰體勢覓薦王府一不中㑹家禍作輙棄去不復有仕宦意君為人篤於孝慈幼孤事先夫人左右無違及居䘮捽茹飲水終三年匐匍致毁瘠落肌肉僅能自活既除之後殆十載言及其親未嘗不􅒣欷涕下此皆世俗所不能者性復倜儻重節義聞人急難與其所不足若已當之族親友舊頼而濟者盖可指數江吳之間其人信鬼禍習忌諱疾病死䘮非其父母妻子率避逺之君雖於無服之親亦必瞻視懃懃致藥物療治愈有恩意於其死哭弔常先他人含襲斂殯多自經手其接人重厚有禮隆賤親疎訖不以顔色冷燠之然於論議亦不隠其賢不肖非深得古君子之道者其孰能如是邪既退居鄉里益脩田宅美池榭日召賔客飲酒逰宴賦詩相獻答亹亹不能自止鐫琢粉繪咀噍花葉務為深竒若新進争名者怡愉終日弗以他事亂其間雖術業不施於時亦不為無所用其心矣卒時年四十六聞者無小大莫不嗟惋來哭必盡哀至于役養無知輩悉旁泣竊嘆謂不復有斯人嗚呼可尚也已曽祖諱某祖諱某考諱某比三世皆不仕娶東平萬氏順惠荘飭有理内法生男女八人長子某襲父之志以文行稱識者謂慶在是矣次某警敏守生業某亦志學某方成童長女壻鄧某應進士舉次黄某范某㓜女許嫁范某皆著姓子初君之弟曰某既勝冠與其婦偕死息女始絶乳君愛養之如巳子長以嫁李氏銘曰勤不獲禄善不克年謂天有知何死之亟謂天無知何後之賢嗚呼百世之下無敢壊其藏焉處士陳君墓銘并序祭文附君諱文藻世家旴江實建昌南城也曽祖諱某祖諱某父諱某皆不仕君初以素門善治生終能憙事用儒術教子起家登朝其門既髙其行益篤沈厚有智多歴艱難故動而鮮過為鄉黨法将有事者亦來咨謀自用儉節至義可為則不有愛其所周急浹于疏親性復謹禮雖幼而卑必待以賔客未嘗見其懈尤耻争辨踰數十年無一人獄在州縣者而衆莫不服晩節授家事于子孫其中休休㒺有不足閉門終日不與塵俗風忩月墀樂以忘老年八十二慶厯四年十一月庚午卒明年及此月丙申葬于郡東之龍池夫人周氏既葬十二年矣故不祔子男二人肅繇進士第在官為能濟之重慎得譽于薦紳間以憂解殿中丞執䘮無失禮次雍孝友而外樂善諸孫學問甚謹無不令人源深哉止而為淵行而為川未易窮也五女嫁鄭某朱某范某朱某聶某皆良族也既卜日孤以墓石來告乃銘之曰洪範五福六極為天賞罰之柄今君既夀且富無乆疾病教子義方不謂不好德啓手足知免不謂不考終命天之勸人何其盛哉何其盛哉祭文嗚呼公之年德逺出輩流子孫善良無身後憂人生及此何所不滿送往以哀情猶未免昔我年少孤貧里中惟公見遇與衆不同然諾之重有古人風薤露易乾隙駒難駐彭殤一揆瞬息千古設奠告誠後期無處尚饗廣文陳生墓銘并序陳生予同郡君平其名某字也初以童子來學既冠游京師用進士入廣文館升於禮部試下第歸而病後二年死盖年二十有四矣始吾竒其人神甚清氣甚和齒少而智老居今而好古其學業務廣其文體務大若馭長風中江而下假之日力則海不難到凡厥施為巖巖見頭額去其俗逺甚其父某又有行誼謂可以餘慶擬之不意其短命也病日革尚不舍業或導以博奕解愁憂則曰我為此益不樂拳拳文字間以即死嗚呼吾之所好惡不類乎天之意邪抑天之意皆與人異邪或者天無有心而人妄責之邪人亦無有主宰而自生自死邪如何如何贈某官諱某王父也諱某曽王父也妻劉氏有二女其死孟夏其葬仲冬其嵗辛夘實皇祐三年銘曰古石崇觀今葬其旁死者無知則何所傷若其有知則顔魯公記麻姑山謝靈運詩華子岡雲瓌水怪夕景晨光尋羣仙之轍迹味古人之文章魂兮優哉豈與夫愚鬼同鄉進士傳君墓銘并序皇祐五年冬傅氏之子野請銘其考曰先父諱垂範字祖徳娶鄧氏野中男長任少偁女嫁董張江氏夀六十有六今年七月癸亥卒十二月丙午葬墓在宅東北仙羊峯下曾王父封王父寀父逢皆不仕逺祖家信州今為南城人銘曰君少篤學見稱其儕父隕兄落欲進不諧有田宅畔有宅山隈既耕且養曰優游哉君之事母室為便户夜再三起即訊安否君之事兄兄嘗病苦醫須人肉爰割其股族有鬭死将質于官礙君其間縮不忍言聞善已若見惡愀然教子與孫居如師門維孝與悌於君罔闕他行雖百無乃其末命有夭夀時有窮達含笑入泉糞土黄髮聶夫人墓銘并序夫人姓王氏歙州某縣人曽祖某祖某父某盖富家歸于鄉人聶某今為南城主簿聶君之曽王父某王父某不仕考某贈禮部尚書兄某終翰林學士凡仕者數人族大以蕃而夫人宜之為婦孝為妻順為母愛而不弛事姑三十年未嘗蔕芥既自治其家舉有法度於鄰里鄉黨慶吉弔凶以喜以憂若在已然見人乏絶志於賙救力不足不能自巳教厥子必以禮義榮辱故克有成長男武仲進士及第其次南仲微仲恭仲皆好學女壻程某閔某汪某亦為士季女未許嫁夫人毎敕諸子曰亟自立汝後顯榮吾不見矣皇祐三年來南城未及安宅夢人告曰爾在此二年而已五年疾病時武仲與禮部籍奏尚克聞之已釋褐有書至不能言矣夏四月十一日卒年若干明年某月某日載其柩還鄉以某月某日𦵏于某銘曰死生命邪聖人罕言之雖其有命其可自知邪夫人教子謂不見其仕及其登科而母死矣豈知而言邪抑偶然邪二年之意形於夢寐彼何神靈而告之丁寧邪武仲有文采諸子頗聰警姑務於徳以求揚名則親之魂魄其不榮且幸邪草露漙兮松風凄兮生者能幾時死者無窮期萬物皆如斯又何足悲邪鄒夫人墓銘并序前此者聞新淦鄒氏有子曰廸九齡以文求試於䑓遇疾罷去得神童稱今廸遺予以書且列其妣之行請銘于竁予未識廸面矧非州黨婣族閨門之懿所不及知然觀庸俗富而溢則驕其子使淪於欲若節信所謂以賄䘮精者往往而是廸生五六歲嗜讀書屬詞句既毁齒西游仰視九門虎豹之威而不怯惑有披青雲捧白日之志事雖不果與夫冕弁而童心輩相去幾十百倍苟非胎仁乳義沃染於初如土斯瘠其奚以藝嘉榖也哉則其善状宜不誣孔子之言孝者立身行道揚名於後世以顯父母廸未冠未克光大于時懼其親之無傳求哀於我盖亦孝子之節不可以已故書之夫人姓楊氏盖鄒之邑人曽祖某不仕祖某亳州防禦推官父某亦不仕其夫某學不得官以貲為袁州助教夫人之性順而明憙篇籍略知大指書樂之藝多所該綜早孤事母以孝既嫁未嘗一日不念母念之至則號泣廢眠食善於夫之黨外内無怨言羞服器玩舉有制節罔或踰侈唯廸一男不以恩克義且教且戒期于有立既不試而歸益敕之求師輔繼短増卑日取其効一女亦尚幼而夫人即世年四十有五至和二年某月某甲子也越某月某甲子葬于某鄉某地名噫昔陶偘母湛氏亦新淦人唯能資厥子交結勝已者然非偘强立以濟功名曷由致其母不朽之如此廸之齒未也誠能出溝瀆逐鯨鵬於天海間則楊氏之賢當不媿于古且使吾言見信於天下矣銘曰宜神之祉顧短以死不在其身維有子鉛山縣尉陳君墓銘并序君諱某字某與予同郡實建昌南城人曽祖某祖某為郡著姓父某尤善士有二子君其仲也君幼而開爽多智慮以兄宦學膝下少人廼顓治生若親之意其先子豁逹而好義自放于詩酒間罕視家事而財用所出近得以賙親故逺得以及羇旅為有識所貴者繄君之力是賴既孤而母老伯氏從王事温凊益謹而田里益修彼仕千里之外而無反顧之憂者抑君使然免䘮數年遊京師屬河决以財佐公上補太廟齋郎選授邵武軍建寧縣尉于時盗賊多主名不見邑居患之君以機往所至輙禽郡守言其勞不報替授茂州司户兼録事參軍兄為德陽宰不宜俱入蜀改信州鉛山縣尉未行以疾終年五十一嘉祐元年夏四月癸亥也娶鄧氏生男光逺光道皆好學見稱于士友君之啓手足命以卒業而已不語他事一女嫁黄某亦冠族其冬十一月壬寅葬于所居東北十有餘里太平鄉三異里符源銘曰世無灾兵以敝其生家有禮義以為之地衣冠揖讓優游以卒嵗復何歉於意哉徐夫人墓銘并序宜黄徐復皇祐五年進士出身南郊放選得贛縣主簿明年改元至和将輦其母之官未及期夏四月辛酉母死秋九月来告曰吾母李氏生十有六年而歸于徐其居百口姑之繼者四人吾母事之無蔕芥至于女妐叔長穉婦靡不得其歡心先人諱某宦學且乆吾母夙夜躬爨烹以禮賔客未始厭倦復十八而孤方肄詩賦吾母請于先祖使之卒業舉不利将退而服田又勗遣之以獲齒于下士龠合之禄未登養器而遭大變平生惻隠以周急為上務斥衣賣飾一簮亡所愛死之日親疎外内皆哭出涕天蒼地黄何往何愬願得銘以相哀予與復非舊憐其意從之夫人之曽祖某祖某父某俱不仕復之兄曰某弟曰某曰某曰某豫亦好學姊妹三其長嫁杜某其次進士胥某其次戴某銘曰人之教子教成而親死天下多如此将為善思貽父母令名必果復也能之則欲報之徳誰曰不可鄭助教母陳氏墓銘并序鄭君名某字某建昌南城人吾母其從祖姑也夫人於覯為舅之妻故常得見焉鄉里陳為冠族夫人之父某贈殿中丞祖某曽祖某不仕歸于鄭氏生二男裁數嵗而寡姑老子弱門内外事一介畢委于其躬性嚴正處之有宜請謝姻戚意厚諄諄用福其家以不失舊夀六十有五皇祐五年夏四月乙未卒小子曰倫既蚤死君孤露一身延其世祀曽祖某父某盖皆善良能治生而君繼之抑管子所謂士工商農之子少而習焉其心安焉者矣廣源蠻犯嶺表朝廷以空名告身屬江湖轉運使募入泉穀而郡縣風曉之君以此守撫州助教執親之䘮數月得疾未葬而卒年三十有七至和元年冬十二月也二男曰某七嵗曰某三嵗妻謝氏獨當家事闔門無五尺之童畧如夫人初寡時嗚呼可哀也已明年三月乙酉以二䘮厝于其縣太平鄉之龍宴窠同塋而異壙君之姊妹六人嫁范某徐某胡某聶某陳某夏某五女嫁陳某鄧某張某其二尚幼銘曰吉㓙在人邪彼夀者何淑於身而夭者何怒於神其曰偶然邪何再世不天若摹而傳夫人之意常恤後嗣其死未幾而禍猝至古人之言倚伏者猶可信而俟邪處士陳君墓銘君諱某字某建昌南城人曽祖某祖某父某自有誌君性慈和且憙事同産六七人身為之長當母在時一以家事屬其弟無所前却闔門百口不識笞罵及官府召呼雖甚威怒必躬以進不移禍於人為政者似察焉未嘗辱嗜酒從游或詬而或􅃧之其色自若子陟有詞學愛之欲其逹其在京國輙馳往視既及第為邵武縣尉至和三年春又就見之中道得疾入官舍而卒年五十四輓其䘮歸冬十一月乙酉葬於郡西太平鄉金塘凡兩娶陟出蔡氏其繼徐氏生防階附隠三女長嫁朱某其二尚幼銘曰古人以一世為夢一覺其間利害何足可道若君者其已覺也哉宋故贈都官郎中張公墓碑銘并序駕部張員外守旴之一年状其先君郎中之善屬於覯願為文以表墓竊迹三代葬從死者之爵祭用生者之禄父為士子為大夫葬以士祭以大夫故勲勞不懋名位不尊雖子孫蕃大唯致美乎宗廟彼窀穸之事無敢加焉後王損益有追贈之制恩漏泉壤咸同正官國家仁甚於古賞徧於下凡在周行必寵貴其父母郊祀行慶踵以為常今郎中得官五品於令宜立碑而員外出刺是邦覯小草民託寄宇下見命執筆其可以辭謹按所状而文之郎中諱某邢州沙河人曽祖諱某父諱某世不仕積善之澤漸于其躬状貌瓌偉人鮮能及性本孝弟且憙義烈自九族内外悉能和諧使無䦧很而鄉人美之豈所謂施於有政是亦為政者邪厚本力穯以給其家身雖肥遯言必詩禮克致嗣子䇿名于朝又豈所謂愛子教之以義方者邪其生五十有六年祥符癸丑夏四月卒即葬于所居西偏既而贈大理評事殿中丞屯田職方貟外郎都官郎中夫人柴氏某縣太君生男女五人貟外名某習孔氏尚書景徳中及第試于州縣無曠厥職由大理寺檢法陞審官籍其脩天聖編勑與有勞焉歴鎮五郡稱為盡心四女伯仲皆嫁李氏叔趙氏季尹氏貟外之二子業進士今賦于太常矣後祚饒衍胡可量哉銘曰大河之北土風朴渾公宅其間孝義終身閨門雍雍鄉黨欣欣生而不試沒乃推恩君仁有加子心罔極贈官五品立碑九尺慰彼顛靈光于墓域後昆之才孝思是則宋故朝散大夫守尚書屯田郎中上輕車都尉賜緋魚袋江公墓碑銘并序孔子稱聽訟吾猶人也必也使無訟乎長人者不恤義教而一之刀筆雖聖與庸或無以異矧其人品中下云哉世俗所以不甚相過者無足可􅏜士大夫不以賢自待䝉耻苟得習以為宜上亦不以賢待之動有法令不得行其意爵列於朝而習史胥之業故愚者亦足尸一官賢人斂手于位就繩墨間有可道者則今之循吏也已嗚呼江公非循吏而誰歟公諱鎬字某祥符五年進士及第得汀州推官繇興化軍判官除大理寺丞歴殿中丞太常博士屯田都官職方貟外郎屯田郎中其使知陵州仁壽婺州金華縣知英州通判潤宣州知建昌軍處州遂致事年七十卒時慶厯六年也公弱好文學性孝友既耆而執清河太君張氏之喪尚致毁於請老當得一子官舍其孫以與弟之子某人以是稱焉明且慎善聽治在興化常受命使府决諸郡之獄故僉薦之仁壽洪氏常為里胥利鄰人田紿之曰我為若税免若役鄰喜剗其税歸之名於公上逾二十年且偽為劵茶染紙類逺年者以訟公取紙即伸之曰若逺年紙𠂻當白今表裏一色偽也訊之即服金華舊梗而説公之政粤民勤於役其胥或世世與其族異財而同籍率一胥影户數十公至英乃擿而旬用之轉運使指以示他郡下户獲安在建昌擊豪褫敝嶷若山重于今有述焉娶同郡戴氏封萬年縣君生六子而卒長男某都官員外郎蚤有譽不幸死矣某著作佐郎某太廟齋郎皆有學行三女嫁進士毛某程某潁州推官馬某皆良奥也曽祖某不仕祖某泌水尉父某贈都官郎中自十六代祖世源因官占衢州開化其上不可知凡一姓多者數望俗以意稱之問其譜則亡或斥古之顯者以為祖是之謂誣故不書覯經為公甿著作使來告䘮以既葬弗及誌惟令五品有碑請列茲文而繫以銘曰善不獨善既施於民福在子孫不止其身少進老退始卒無悔死而有知何慶之大宋故将仕郎守太子中舍致仕宋公及夫人壽昌縣君江氏墓碣銘并序公諱某字某其先江南宰相齊丘之族遭亂播遷自洪州南昌家建州建陽曽祖某祖某以是無聞焉父某讀書客死太平州公少時亦不顯既而有子曰咸字貫之受位於朝例以公為大理評事歴衛尉大理寺丞太子中舍致仕年八十一夫人江氏江南翰林學士文蔚之曽孫本朝職方員外郎翹之孫汝州龍興縣主簿湜之子累封長安壽昌縣君年八十慶歴八年冬十二月壬午卒越八日己丑又有公之䘮皇祐元年秋九月己酉合𦵏于所居壕南從先塋也公逮事祖父母能致其孝以寡兄弟其母程氏篤愛之欲無去其家故不使宦學然性憙事鄉之儒衣冠者多與之交見人子孫孝弟學文不啻出諸已有良紙筆必往遺之夫人善言語有識於家内外靡不規正而􅊚族信之前失數子乃謂公曰積善餘慶今生子不育無乃父母有所闕歟姑自修而已用是時異夢而生貫之總角好書不同羣兒夫人曰此子必興宋氏吾叔父知南劔州可使從之學矣則司勲郎中名拯者也不數年而貫之大成應舉得官由州縣至常參皆補東南以便侍養公老而静勝日於官舍焚香誦佛書有佳山水未始出遊迹其所為亦足以逺嫌疑非苟然也夫人雅知子初貫之知尤溪在上位者嘗以憾故使爪牙吏求貫之之私将傅於法及知瓊州亦如之間者鮮不憂而夫人諗公吾兒志大且亷决無私事為人所得不足憂也已而果然耄年俱不病自知将死教令婦子亹亹如平常郷人異之三男貫之為屯田員外郎有文章年逾五十學問不倦書非聖人作一切鋤去不問至于為吏亦多見稱此其功名未易知次曰某頗儁才蚤死曰某能治生得其母心二女嫁李氏饒氏覯辱貫之遊而不獲拜其親於葬又不克㑹今貫之乃來求文謹次所聞而属之銘曰壽考人之願而夫婦偕老有嗣家之幸而其子知道四者得之固已足矣又申之以官邑之號苟為不善之人安能到此哉宋故朝奉郎尚書都官員外郎上騎都尉賜緋魚袋陳公墓碣銘并序南城治之右麻姑山前左麻源東南其地曰某是惟邑人陳公之墓公諱某字某天聖五年進士及第歴郴寧洪州推官五遷為都官員外郎知宜春臨川貴溪豐城縣年六十有三而終實至和元年公少好學以其才有鄉曲譽性重愼不易出言視之若無白黒及逢其人則亹亹是非必中與人交外澹泊然其義分雖白首如初在官文理堅著罔有罅兆其所持操亦不可奪郴有土茶既貢而賣其餘公言其賊民轉運使以聞及其貢者皆免洪有乆獄逮證不已公與守争守怒而起終以公為能遂舉之臨川民有以庶弟為異姓者買吏得直莫克為辨公召語之不刑而服其行事多此類故在幕職時舉者十有七人張伯起吳安道蘇儀甫趙叔平皆世名臣居家孝友親既沒十年與其弟某居無間言若親若故或旁以生要之言行一有繩凖鄉人畏之晚憙吟詠乆而益工不善飲酒發懐散憂必以詩其存者若干首将老于山林未及言而疾作哀哉葬禮有碣宜為之銘其繫世則誌諸壙銘曰楚之東兮吳之西山雄石俊兮旴之湄公将退兮隱於詩轡鸞鵠兮裼蘭芝志不就兮以䘮歸曰天與命兮窈難知千萬年兮識者誰公之美句其傳之宋故朝奉郎尚書都官員外郎上騎都尉賜緋魚袋陳公墓誌銘公諱某字某建昌南城人進士及第為郴州軍事推官罷得寧州未行以鹽鐡判官舉監海州洛要塲遭母憂復常權洪州觀察推官除大理寺丞知袁州宜春移雅州盧山父老改撫州臨川除殿中丞又以憂解既而知信州貴溪除太常博士明堂禮畢遷屯田員外郎替知洪州豐城除都官員外郎至和元年二月乙卯卒年六十三以其柩歸明年及此月某甲子葬于某郷某里某地名曽王父某王父某不仕父某贈某官母周氏某縣君妻黄氏某縣君長男某廣文生再就禮部試次某不應舉次某一舉下第死于京師女嫁黄某范某黄某銘曰官六品非賤年六十非夭生而鮮悔後有紹左神右仙維宅兆天之福公夫豈少旴江集巻三十欽定四庫全書旴江集巻三十一宋李覯撰墓碑陳府君夫人聶氏墓誌銘并序府君諱某字某世籍南城曽王父某王父某父某皆不仕予六七嵗時在山中有人從外氏所來言從母之夫病且死其弟以股肉食不起既而事寡嫂有禮族姻善之及予長審知其人乃府君也景祐三年秋八月府君年五十三卒其冬十二月葬可封鄉安樂里源潭之陽後十八年至和甲午夏四月夫人聶氏年七十四卒明年春某月葬于其墓東南隅孤來求銘敢不聽吾邑陳氏為富家而幅之以善于今四五世智不以駕愚力不以鉏弱官無訟牒獄無繫人入塲屋得祿位者磊磊相望而府君以孝悌處其間喻子教孫蚤間暮燕以終其身不亦美哉夫人之曽祖某祖某父某亦不仕為人母者五十年主家事者三十年旁禮娣姒下法子婦儉故不乏用慈故不失恩属纊之日門内百口又何盛也生八男執䘮者五人曰某其人和能友羣弟曰某善讀經書作詞賦郡薦新人嘗為之首曰某曰某曰某服産業一女嫁黄氏遜之子曰陟進士及第初為邵武尉銘曰管仲有言倉廪實知禮節衣食足知榮辱今之愚者階其富以趍扞獄陳氏之良鄉所矚君之夫婦全而復積善有慶兮後昆百䘵進士傅君墓表亡友傅君代言字某生同鄉長同學心純行潔而外不亢激見人善卑之若臣僕聞人過弗敢言其在已則改不待頃故在家而和與衆無蔕芥好學有辭以進士得試於墀下兩舉不利歸而寝疾以書請覯願一言庶乎不冺沒病革矣書字幾不成猶拳拳俟報而後死哀哉其意何邪時年四十五慶厯甲申秋七月也後二年正月葬君家世善良曽祖某祖某未嘗筮仕父某在祥符以前用辭賦著稱不遇而死皆曰在後人至君又無禄識者益憐之娶鄧氏生二男某某然未有立葬已其兄某使人來告廼表其墓曰荘周論天曰自然吾以為妄言至于仁者夭鄙者壽禍福之來荒忽而不可究然後知周之言為不謬嗚呼吾友不幸而堂有老室有幼不然則大彭殤子亦何足道哉陳伯英墓表吾嘗銘陳君仲温之葬以行髙故譜叙甚詳其子漢公字伯英初名詠後十二年而死又從而表之噫逝者如斯徒使吾文不施於樂歌舞蹈而施於墟墓間也伯英少從吾游俊健有智數頗多能應進士舉不售因放失繩墨衆非之終克自反於親勤於家儉於人恭摩垢出光清議始變年四十得疾不治哀哉妻聶氏有五男其三嚮成人曰汝羲汝士汝臣女許嫁鄧潤甫廖庭圭幼者二人其弟次公次山皆有學行庶幾大其門噫天人果通邪善積必有慶不然未可知辭曰山可塵谷可堙謂余非妄人者無䙝伯英之墳處士饒君墓表饒君諱某字彭年世占南城盖予同鄉曽祖某祖某父某皆不仕君耦周氏生男景先見先女嫁陳某李某吳某桂某其齒六十有四死葬里中之金灣後一年實慶厯七年景先礱石以待我故書其墓曰吾邑絶大江數百里與閩粤為腹背土地衍沃宜稻桑麻無大水旱飛蝗所不至故其人足衣食俗椎少機不肄文法為獄訟事吏惡政苛鏖之百端卒無敢言以豐富之資加自重惜而居之名山水之間花草禽魚日變時異使人見之心竅恢恢欲追騷人校江山醜好然則諸父兄行有不為禄仕而撙禮義探儒雅者固其宜彭年性温厚力治生以逺不足其餘唯務為詩與學者更唱和争錙銖亹亹不倦二子幼讀書不使叅外事故景先以其文再試於禮部見先亦嗜學多藝其壻陳吳桂皆應進士舉由此觀之抑好善之效晩節自除葬地築室其旁以待賔客為觀遊歌琴賦酒不覺老至自囂塵處聞其所為有足喜者往時相見領髪未素今茲復來墓草已宿弔傷雲霞嗟嘆栢竹揭之墓門千載可讀醫博士周君墓表周君諱某字某鼎州桃源人以醫來建昌為博士年七十有一皇祐二年夏六月卒冬十有一月葬其孤播總來求表之辭曰君之至是邦吾時未生及吾成人與之往還尚二十餘年其容體昂昂口辯多所䟦履凡荆楚間山川物象屈原宋玉嘗稱道者往往記憶上下巫峽見神女事迹言之鏗鑑可聽善飲酒要之坐花草醉倒歌舞不以年長辭趣為和同然未始以氣下於物用醫藥交有位雖甚親比亦無所私謁吾以此知其人吾母曽病急不能言衆醫縮頸遁去唯君視之曰不死治數日起之吾以此知其藝命不謂短家不謂貧其教有義其嗣有人龍池之東負山為墳後來弗知信在斯文前進士廖君墓表君諱夷清字禮卿南劍州将樂縣人曽祖居素仕南唐以剛直見忌由校書郎二十年裁得大理司直建隆而後禀命我朝遂課其功累遷至瓊林光慶使檢校太保判三司驟諌後主不聼閉門却食服朝衣冠立死井中已而得大手書於篋曰吾不忍見國破耳故文士徐鍇弔之有三閭自投於􅚒浦伍相願棄於江流之句不數月而金陵降迄今鄉人有記其事者皆叩頭稱之祖仲符少有志氣以詞學名兄弟䕃補獨不就及朝廷録忠臣後授汀州掾卒父知章亦秀士克世其家未及進而死君童子而孤力自樹立篤學有才作詩賦尚俊壮其於啓事長調歌尤能動人性孝友常省其姑退必感泣謂人曰吾姑類先人其弟臣清得官而天遺骸在唐州君時下第至江南聞之匍匐往收方大饑道遇刼告以其故賊亦義之不害初舉解頭好事者寫其賦於屏今猶未絶五試禮部皆不偶慶厯二年特奏名賜同三禮出身未免選沒於京師年四十八昭武李誥帥其友舊棺斂以歸其冬十二月葬于建昌軍南城縣太平鄉凋水實君之徙居邑也娶鄧氏生四男平噩可至一女嫁周翰夫人之死後君十三年於其葬也平自為誌平十二齡而無父嶄嶄自然出於泥滓間以濟其業聽高眡逺有足嘉者羣弟壹於學問皆未易知積善之慶将在是哉以石表未立捧其鄉先生屯田郎中李公之状來覯嘗辱君游謹撮其要託辭左方曰太保之忠貫神炙天當時不省其諫後世不聞其賢非君之才而平之孝孰能因而傳乎為人之子孫者其可不然乎李子高墓表南城縣東北逺百里吾高祖之父家焉天聖中嘗省松栢至於子高之室子髙業已不仕有男冠卿生十三年習為歌詩教義諄諄無忝世儒後冠卿第進士試校秘書守臨川主簿代歸未幾而孤來乞文曰惟先父好學篤善應舉不得官治衣食業不能貪以取餘醉吟山水間忘其老憙犇人之急里有争往往和解之使不致獄訟衆亦爱悦用濟不肖子于宦學未始有報而舍去忽焉願得表其墳託以不腐姑取其譜而系之辭子高諱喬年六十八慶歴四年四月庚子卒十一月乙酉葬考彦禨祖文遇曽祖㨗皆布衣初娶盧氏生叔平叔良早死一女嫁饒贍繼陳氏生冠卿其季漢卿辭曰生無失宜死何足悲有子而竒其後焉可知邪先夫人墓誌有宋皇祐三年冬十有二月乙酉李氏之孤覯奉其母夫人柩葬于所居西先父府君墓東南隅實建昌軍南城縣鳯凰山之麓也夫人姓鄭氏其先盖鄉大姓曽祖某祖某考某皆不仕夫人初有二男為無服殤既而生覯十四年而先君沒是時家破貧甚屏居山中去城百里水田裁二三畝其餘高陸故常不食者夫人剛正有計筭募僮客燒薙耕耨與同其利晝閲農事夜治女功斥賣所作以佐財用蠺月盖未嘗寢勤苦竭盡以免凍餒而覯也得出游求師友不為家事㒺其心用卒業為成人不然蕞爾小子為傭保為負販供養猶不足何暇孳孳學問間邪復還舊居娶婦有孫如平人家夫人滋不倦門内細碎覯尚未及知慶厯中應科目罷歸廼自念親老矣而數棄去舟江湖客京國以為之憂抑又窮空無以備甘脆非人子所宜因决不求仕進忍恥業衣食庶乎終養無有憾焉既八九年而智淺力少不克如志夫人性多設施好義而信人祭祀賔客婚姻之禮不以貧故累之聞人緩急來有求者應之唯恐不逮衣服在身者必假飲食在前者必輟况於錢穀固無吝心由此困乏百計不效夫人亦厭之覯惟易窮則變變則通所識公卿大夫多矣苟扶吾親往乞食焉尚可以濟廼用此言告之夫人喜曰是吾心也幸而離鄉非但謀食而已且使雜人不到吾目前則煩惱自少况汝幼學已而不進吾與汝俱西亦将有知汝者吾孫又漸長彼多英俊游聞見當逺大也謀之未集而及大故疾病猶數數問行期嗚呼夫人卒在塟前二百七旬有八日實其年春二月丁未壽六十有九後先君沒二十九年先君甞學不應舉以教其子作詩賦亦樂施惠尤直信生平無所争不識州縣廷終以不得意死年四十三嗚呼覯何人哉有心不明有力不彊父已不待養天幸有母而方施施進不能為禄仕退不能求財利以足其欲使之顦顇晩廼悔之未及行而禍作矣嗚呼覯何人哉天鬼不誅王法不治猶有靣目以視息世間復何人哉誠懼乏祀不自引决敢因襄事刻石以記其罪抑為事親者戒嗚呼哀哉亡室墓誌亡室陳氏不知其先所自來今為南城人曽祖某祖某世大姓父某弱冠夫婦同時死唯是女生五年養于伯父某又十一年而嫁嫁十七年而卒於􅃧吾家破乆及覯好自樹立與世不諧日益戹窮陳氏處之罔不寧雖晨夕費猶或已出斥粧櫛賣之單盡執勞辱殆與臧獲等時復寒饑不可忍終無一言族親期㑹惡衣以往叅錦文珠象之間而不耻事姑瞻相顔色惟先意之為吾母固愛之覯行四方未甞與謀亦不敢問在家有所嗇獨居常數月然不見怨望卑柔静正亡世俗婦女之態訖不得報以死悲哉長女許嫁陳某一男參魯僅毁齒中女五嵗其少未免懐姑老䘮婦子幼失母號咷之聲簎耳酸骨校善惡則尤人論禍福則怨天復何言邪龜告吉日用葬於城東二十有五里望州嶺之隂且刻石以識其墓于時嵗在丁亥大宋慶厯七年亡女墓銘李覯之長女嫁為陳汝翼妻年二十六死其父傷之不能已乃銘于墓曰巧以慧兮慎言語之汝家兮畏如䑕人生皆樂汝獨苦命之薄兮抑吾故汝來何為何以去墓無子孫乆誰䕶後人知汝吾之女幸掩汝骨無汝露鄧公儀傷辭并序亡友公儀名立姓鄧氏舉進士年三十二以死嗚呼公儀生數嵗秀異不羣諸兒善記誦聞於鄉長而學成為文辭謹聲律主故實讀之温温可愛性賢深於事理其道雖不著之䇿牘為訓具顧其身所履頗多矣事父母孝謹撫其弟愛而有法㢘不至狷儉不至菲氣堅正服義疾惡人不得已而與居未嘗安若據棘芒也厭浮屠説斥巫祝邪媚逺之不使汙其門其意正與予同然予時有所避閉不出諸口公儀見事如不可忍雖在親戚多引繩墨彈直故予猶憚之也早苦氣逆藥之且平俄而執父䘮哀甚疾作不可治矣是以死嗚呼予自始學善之志合道一居甚驩衆不是吾行而公儀是之衆不聴吾言而公儀聴之樂未始不與共也憂未始不與謀也他雖甚厚弗之若也寃哉失之矣復何言也公儀死前百餘日予将西游告之别時公儀病矣猶未知果至是也姑勉焉而去及其歸也而公儀塟矣不見其死友之不終也不銘其美文之不公也吁墓之草再黄矣是皆弗可得而悔也徒傷之以辭云落落其實兮韡韡其華晣晣其鄉兮嗈嗈其家出處黙語兮禮而弗邪璞乎君子兮孰訾其瑕學優而仕兮維人之欲自巇而坦兮始圜其轂志愈張兮疾愈蹙老愛弱慕兮嗷嗷其哭嗚呼豈人不好善兮鬼之求不用于明兮用于幽不然何時未之知而命奪之善不獲福兮惟祸之隨已焉哉鳥之飛兮隻其翼航之中流兮槳斯溺吾友之舍我兮不我力行煢煢兮将焉得自我不見兮再易其正心煩憂兮曷月而寧桂而酒兮以冩我誠路漫漫兮莫造其塋荘周之云兮息以死而勞以生斯言之信兮子無恨情吾道之不病兮吾文之行干秋之下兮庶存子名白石暹師塔銘并序佛法之行於中國豈不雄健不校矣哉天之生民靡不有事賢者效志愚者效力以有貿亡孳孳蚤夜而鮮能得志唯佛之徒去離逺甚安樂無筭王臣所嫗覆士女所合凑生則得其奉沒則得其歸而况人材有以超類者惟其心之所之而已噫佛之法豈不雄健不校矣哉今吾見惠暹師其人材超類者乎師南豐章氏子生十三年出家禮白石居壼長老誦法華經祥符中以恩得度壼既化去其住者惠通惠徳而師繼焉師有計慮能施為自通徳住時已主院事殆今無曠性㓗特恥交凡俗積四十年不踐城市頗憙篇籍詠古人詩以對賔客吾少居山中嘗與往來慶厯五年復抵其居因告我以年老治送終之具院西有官隙地且買之以歸骨焉懼久淪㓕無以旌識幸我之来請文以信之吾既善師之行又歎佛之徒能優㳺以卒也如此迺授之銘曰生也何來死也何歸神形一離曷封樹為土石峩峩松檟差差惟門弟子是瞻是依旴江集巻三十一欽定四庫全書旴江集巻三十二宋李覯撰常語上或曰仲尼之徒無道桓文之事者吾子何為曰衣裳之㑹十有一春秋也非仲尼脩乎木瓜衞風也非仲尼刪乎正而不譎魯論語也非仲尼言乎仲尼亟言之其徒雖不道無歉也嗚呼霸者豈易與哉使齊桓能有終管仲能不侈則文王太公何恧焉詩曰采葑采菲無以下體盖聖人之意也或問伊尹廢太甲有諸曰是何言歟君何可廢也古者君薨百官総己以聽於冡宰三年成湯既沒二十五月中伊尹之知政太甲之居憂固其常也不宫於亳而宫於桐近先王墓使其思念名之曰放儆之之至也故三祀十有二月朔伊尹以冕服奉嗣王歸于亳二十六月而即吉也則太甲之為君何嘗一日廢矣哉或曰然則霍光廢昌邑王非歟曰霍光之罪滅族晩矣知之不明行之不慎視君如玩物去取在諸掌董卓效之東京桓温用之江左宋齊以下覆車方軌職光之罪也敢問為光者宜如何曰皇曾孫髙材好學而光不知王賀放從而光不察既委質而臣事之矣庸可悔乎衞靈公之無道也有仲叔圉祝鮀王孫賈而不亡昌邑羣臣有王吉龔遂忠直人也吉諫遊獵而賀加禮遂捽大奴善屬衞士長行法而賀不禁賀之資朴猶可為也况大将軍秉天下權其讒䛕者舉放逐之如吉遂者使居左右若夫漢廷固多士矣豈無輔弼之益哉受皇帝璽綬三十七日而解之何其暴也賀之言曰天子有争臣七人雖無道不失天下光而學也慙恨死矣或曰伊尹放太甲而天下厭然周公屏成王而國有流言何也曰周公武王弟也有次立之勢管蔡其至親也易以生怨以怨濟疑理固然也敢問太甲不能終允德成王不見金縢之書則伊周奈何曰太甲賢也不得不改成王亦賢也不得不悟太甲成王果不賢耶則湯武不以託伊周伊周亦不受之於湯武或曰知人盖未易也周公不知管蔡安知成王曰事有小有大有緩有急監武庚之國其任人也常事也天下之政多矣譬諸日月猶有所不照夫以新造之周而謀嗣焉其用心奚若堯不知四㐫可也至于丹朱其有不知者乎徐羡之傅亮謝晦廢宋少帝立文帝亮迎大駕於江陵道路賦詩有悔懼之辭巳而果誅夫三子者有功於文也何疾之為曰疾之必也由其悲號嗚咽而後悔懼亮見事遲耳女之賊其夫而私於我者其可以納之室乎是亦将賊我也宋文豈不謀其身不爾則為後嗣也漢宣帝始立謁見髙廟大将軍光驂乗上内嚴憚之若有芒刺在背故曰威震主者不畜霍氏之禍萌於驂乘也成濟刺殺髙貴鄉公司馬文王聞之自投於地乃收濟家屬付廷尉夫弑逆非文王意耶曰弑逆之名何可當也有其意者必假手於人而歸罪焉養犬者固欲其禦人也客來而傷則擊犬慙於客不得不有説也為大惡而得大利既外於人倫矣况父母妻子狼籍都市者乎智矣哉王僧辯也其對湘東王曰平賊之謀臣為巳任成濟之事請别舉人孰謂漢孝文恭儉而巳乎其有帝王之材者也知權者也周勃誅諸吕迎立之即日入未央宫夜拜宋昌為衞将軍領南北軍張武為郎中令行殿中然後坐前殿勃之掌握巳無物矣許勃歸相印既又使率列侯就國何其决也或曰孝宣之初曷不然曰勢未可也宣為庶人依許史而巳不若文之有代資也漢廷諸臣未始相識誰可與言哉既踰年矣而光稽首歸政不因此謝之顧謙讓委任焉過也幸光速死不爾殆哉敢問光雖無術其志忠矣抑可疑乎曰使光未死而隂妻之語泄則将何為權乎權君所以廢興國所以存亡戒之戒之一失之而不可復也惟至明然後可以權與人惟至忠然後能以權歸上敢問何謂也曰大權在已大禍随之夫其用事日乆刑人之父殺人之兄絀削人之爵位者多矣言而弗聽求而弗得者又多矣怨者幾人邪怒者幾人邪我一日而去其權則彼無動邪譬諸騎虎下則死矣富貴尚不足惜其如我身何其如我家何舍隆盛而就夷滅人情之所難其附離者又欲尺寸功則斯人也能不異慮邪魏武有言曰不得慕虚名而處實禍信矣其惟君子無求生以害仁者斯可謂至忠也巳矣或曰古之至忠者誰歟曰其皇甫嵩朱儁乎平黄巾威震天下梁衍說之而不肯從陶謙推之而不肯應聞命馳走就拘朝廷其忠不可及也敢問不有郭子儀者乎曰子儀可人也然唐室雖衰人心未去程魚雖巧言肅代猶出命君命而違不反則叛矣反叛之名中人憚諸况子儀乎嵩儁則不然董卓李傕之猖狂獻帝雖在無獻帝矣因兵威乗衆欲以伐其罪孰不曰宜也彼以君命來遂不敢拒哀哉二臣之心吾嘗為之痛哭矣或曰范曄評嵩儁以為舍格天之大業蹈匹夫之小諒卒狼狽虎口為智士笑何如曰申生不敢愛其死使天下知有父也嵩儁狼狽虎口使天下知有君也人以君命召我我以矯詔拒之其非矯者亦足以為之辭矣夫除君側之惡惡殛而君興可也不幸投䑕而器䘮焉安得面目見天下哉是二臣者所以自歸於陷穽也彼范曄弑君賊也宜乎其笑之矣旴江集巻三十二欽定四庫全書旴江集巻三十三宋李覯撰常語中晉明之明王導之忠其至矣乎或曰元帝固任導矣曰否王敦初反導不足疑也而元帝疑之王敦再舉導乃可疑也而明帝不疑夫敦不以君為君其肯以導為君導既宰相矣藉令敦捷又何求焉在他人猶可無異志况導之為腹心乎而劉隗用事導見疎遠且欲悉誅王氏當導之率昆弟子姪毎旦詣臺待罪也呼周顗以百口累之而不應也傷哉唯恐其不免耳再舉則不然為導者盍懲前事有不自安之心為明帝者盍以前事疑之無委任之理而導詐哭敦使衆有奮志帝屬導節使都督諸軍君臣之間若合符契遂平大難以濟中興非至明至忠其孰能哉或問閻纉訟愍懐太子之枉皇太孫立復上疏焉夫以惠帝愚賈后賊安能聽言徒觸死耳纉奚為哉曰上聴言人誰不敢言佳哉纉也是難能也豈一時之言萬世之言也惠帝雖愚萬世當不愚賈后雖賊萬世當無賊其言欲使著令諸有廢興倉卒東宫兵馬皆得輒嚴須録詣殿前面受口詔然後為信聽其臣子得如邴吉距詔書周昌不遣王田叔孟舒隠親左右所以固儲副安後嗣誠哉人主有喜怒宫掖多姦詐怒解而後悔詐行而後覺無及矣如纉之言萬安計也嗚呼學者之忽也吾與士大夫接三十年矣未嘗有齒牙纉者也漢髙帝使陳平乗馳傳載周勃代樊噲将曰平至軍中即斬噲頭二人計曰樊噲帝之故人功多又吕后弟吕須夫有親且貴帝以忿怒故欲斬之即怒後悔寧囚而致上令上自誅之噲受詔即載檻車詣長安至則髙帝已崩吕后釋噲或曰平畏吕后而已矣曰不若是則髙帝以譛殺功臣吕后怒亦且報平勃平勃死則諸吕強又誰制矣哉髙帝之不枉樊噲吕氏之不害平勃平勃得以誅諸吕安劉氏由燕之謀也不亦善乎或曰劉隗其亮直者歟曰敗中宗者此人也漢興至于孝景庶且富矣鼂錯以天下壓山東卒動七國横屍東市中宗資王氏以有江左其強固宜帝不以術縻之隗方翾翾執刀筆以裁其末力不任兵而假鎮以亢斯足以速禍而巳矣魯昭公不忍季氏薨于乾侯晉元帝不忍王敦憂憤告謝子家駒諌而劉隗勸焉隗之罪著矣帝終不悟雪涕而遣之闇哉孔子惡稱人之惡者子貢惡訐以為直者夫有口才又有文法以羽翼之而忘忠恕何所不逮也其甚者干人骨肉不避父子時主以為忠識者以為賊國無釁焉則以自斃一有可為則危宗廟矣自斃者商鞅是也刑太子傅黥太子師惠王既立身裂車下危宗廟者江充是也太子家使行馳道中充以屬吏謝之不聽階為巫蠱殺戾于湖武帝始以充忠直奉法不阿所言中意終則作思子宫歸來望思之臺嗚呼噬臍也已或問泉鳩里加兵刃於戾太子者初為北地太守後族何變之暴也以為罪邪何以賞以為功邪何以誅賞之是邪誅之是邪曰理必然也夫骨肉之恩本諸天也怒有巳時而愛無巳怒而欲殺則殺者功愛而不可得見則殺者罪矣夫豈不知殺之之由我也内無以慰其心外無以慰人心故歸咎云爾文帝逮諸縣傳淮南王不發封餽侍者皆棄市彼輜車封誰敢發邪非其人之罪也借其死以謝天下也小人因人喜怒以貪功而不度深淺禍其至矣故齊王自殺而主父偃族滅魚復侯不得還闕而蕭順之憂卒聖人作議親之辟公族三宥所以養恩而小人間之亦不知量矣知其説者其田千秋乎其爰盎乎旴江集巻三十三欽定四庫全書旴江集巻三十四宋李覯撰常語下或問自漢迄唐孰王孰霸曰天子也安得霸哉皇帝王覇者其人之號非其道之目也自王以上天子號也惟其所自稱耳帝亦稱皇書曰皇帝清問下民是也王亦稱帝易曰帝乙歸妺是也如其優劣之云則文王武王劣於帝乙者乎霸諸侯號也霸之為言伯也所以長諸侯也豈天子之所得為哉道有粹有駮其人之號不可以易之也世俗見古之王者粹則諸侯而粹者亦曰行王道見古之霸者駮則天子而駮者亦曰行霸道悖矣宣帝言漢家制度本以霸王道雜之由此也人固有父為士子為農者矣謂天下之士者曰行父道謂天下之農者曰行子道可乎父雖為農不失其為父也子雖為士不失其為子也世俗之言王霸者亦猶是矣若夫所謂父道則有之矣慈也所謂子道則有之矣孝也所謂王道則有之矣安天下也所謂霸道則有之矣尊京師也非粹與駮之謂也或曰詩人以后稷先公致王業之艱難其非諸侯矣乎曰武王既得天下詩人迹其世世脩徳始於后稷公劉以至于太王王季文王故云爾也當商之未䘮誰有此言乎如使紂能悔過武王不得天下則文王之為西伯霸之盛者而已矣西伯霸而粹桓文霸而駮者也三代王而粹漢唐王而駮者也或曰祭法共工氏之霸九州說者以無録而王謂之霸在太昊炎帝之間然則霸非天子者乎曰說者之過也項籍亦嘗霸九州矣在秦漢之間矣尊懐王為義帝分天下以王諸侯自立為西楚伯王非霸九州而何也然謂籍曰天子可乎彼共工氏盖籍之類也敢問陽尊義帝俄自殺之亦足以為霸乎曰謂其號也不言其道也或曰文王受命稱王有諸曰否不得已而伐紂可也紂猶未伐功未加於民而遽自立以昭其私焉孰謂文王乃爾武王舉兵建大號追考虞芮訟息之年以為受命之始故曰惟九年大統未集十有三年春大㑹于盟津非西伯實改元也文王世子西方有九國焉君王其終撫諸後人追為之辭非西伯實稱王也大傳牧之野武王之大事也既事而退追王太王亶父王季歴文王昌是也康成取緯候以亂之過矣或問魯用王禮何如曰成王以周公􅈴勞命魯公世世祀周公以天子之禮樂周公尊矣故禰文王郊后稷皆倣王禮而不備焉周公而上王禮可也魯頌曰皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多安有非禮而頌之云乎周公而下則僣矣隠五年九月考仲子之宫初獻六羽公問於衆仲始用諸侯禮也或曰地方七百里有諸曰信也然則孟子何言乎儉於百里也曰閟宫頌僖公復周公之宇而曰公車千乗朱英緑縢千乗之地方三百一十六里有畸山陵林麓川澤溝瀆城郭宫室塗巷不與焉其何儉於百里也世俗疑周官五百里以其大也是亦不思耳矣諸侯之於天子非若敵國然也大國貢半次國三之一小國四之一諸侯有其地天子食其稅譬之一郡而巳矣魯七百里開方之而四十九殆半王畿也今之大郡不有半京畿者乎或曰紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之有諸曰紂以崇侯譛囚西伯謂其得衆也諸侯又從之囚其疑膠矣彼諸侯之力足以勝紂邪盟津之㑹者八百武王猶退師當此時也固未足以勝紂矣力不足而從之囚徒使其疑且怒耳紂能脯鬼侯而不能殺西伯邪是好事者之語也若夫三子獻寶則有之矣然則聖人以賂免邪曰狄人侵邠太王以皮幣犬馬珠玉事之矣文王曷不可况三子者之愛其君邪君親之難何所不為也或曰文王獻洛西之地赤壤之田請紂除炮烙之刑有諸曰以炮烙為是邪非邪是則不可以除之矣非而請除之則發紂之惡也賣恩於民也羑里之囚既免又激怒之豈人情邪彼惟恐昭昭之不晦圭角之不刓也易曰内文明而外柔順以䝉大難文王以之其斯之謂矣或曰湯文王雖為二伯其國不出百里也曰唐之刺史有一州耳其領節度觀察則連十數州有之矣彼中分天下而治之威權所及百里而已乎後雖三分有二其益者未多也敢問湯崩太丁未立外丙二年仲壬四年則是太甲不繼湯也曰書序成湯既沒太甲元年不言仲壬也就令繼仲壬為人後者為之子太甲固三年也或問聖人之道固不容雜也何吾子之不一也曰天地之中一物邪抑萬物邪養人者不一物闕一則病矣聖人之道譬諸朝廷朝廷也者豈一種人哉處之有禮故能一也女子在内男子在外貴者在上賤者在下親者在先疏者在後府史徒胥工賈牧圉各有攸居而不相亂也夫所以謂之一也他人之不一則闤闠耳終日紛紛而無有定次也夫所以謂之雜也世俗患其雜則拘於一是欲以一物養天下之人也白而不受采則人皆縞素矣何足以觀之哉其歸於諸子而巳矣聖人無髙行何謂也曰聖人之行必以禮也禮則無髙矣夫其髙者出於禮也異於人也故能赫赫之如彼也孔子事親無異稱居䘮無異聞立朝無異節何也安禮也出於禮者非聖人也矯世者之為之也敢問聖人有過歟曰加我數年五十以學易可以無大過矣夫豈無過哉或曰孔子謙也曰仲虺之美成湯改過不吝豈成湯之謙也哉世俗之說者則謂聖人無過顔子不二猶或為之辭徒使人君之耻過也而不欲聞之也三代之政可得而言歟曰民不知之也商因於夏周因於商損之益之未嘗與衆忤也周公之制諸侯因舊國而大之百姓因舊田而廣之天下得不和乎哉世俗之說者必曰復古古未易復也商鞅之除井田非道也而民從之各自便也王莽之更王田近古也而民怨之奪其有也孔子曰愚而好自用賤而好自專生乎今之世反古之道如此者烖及其身者也孔子之為司寇也不聞其改法度也沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏踰境而徙魯之粥牛馬者不豫賈必蚤正以待之也世俗之說者不曰正其身徒囂囂以疾人之法度其亦非孔子之志也大哉孔子吾何能稱焉顔淵曰仰之彌髙鑚之彌堅瞻之在前忽焉在後仰之彌髙也則吾以為極星考之正之舍是則無四方矣鑚之彌堅也則吾以為磐石據之依之舍是則無安居矣瞻之在前忽焉在後也則吾以為鬼神生之斂之舍是則無庶物矣他人之道借曰善焉有之可也亡之可也夫子之道不可須㬰去也}
