  - {type: variant, offset: 0, length: 168, content: 建昌府重修李泰伯先生墓記生而必死聖賢無異扵衆人也死而不亡與天地並乆日月並明其惟聖賢乎泰伯先生其亦聖賢之徒乎先生姓李氏諱覯字泰伯學通五經尤長扵禮以文辭自立其言大而正郡治北有鳯凰岡先生剏書院其下學者餘千人南豐曽子固其髙弟也范公仲淹余襄公靖交薦之召為太學說書卒年五十一葬鳯凰岡之麓寳祐二年郡守楊鎮立興文堂以祀之開慶元年郡守曽埜更其堂曰思賢右立, WYG: ''}
