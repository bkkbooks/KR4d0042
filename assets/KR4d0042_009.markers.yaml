  - {type: variant, offset: 1655, length: 0, content: '', WYG: 之所常言也惟熟圖之强兵䇿第三或曰屯軍之耕自養可矣禁旅坐食胡能給之曰古者制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人其人之食上年則人四鬴中年則人三鬴下年則人二鬴計一夫之耕其登穀不寡矣今屯軍之耕姑以下農夫為率一夫耕而食五人則十萬夫耕所食禁旅四十萬人矣以二十萬夫耕則餘四十萬人之食三年耕則有二年之蓄矣雖有凶旱水溢巖廊之上可無西顧之憂也然則屯田之利可施於天下乎曰今天下公田往往而是籍沒之産未嘗絶書或為豪黨占佃或以裁價斥賣公家之利亦云薄矣其勢莫若置屯官而領之舉力田之士以為之吏招浮寄之人以為之卒立其家室藝以桑麻三時治田一時講事男耕而後食女蠶而後衣撮粒不取於倉寸帛不取於府而帶甲之壯執兵之鋭出盈野入盈城矣其所輸粟又多於民而無養士之費積之倉而已矣此足食足兵之良筭也或曰議者多稱鄉軍何如曰周禮小司徒㑹萬民之卒伍而用之家出一人比為伍閭為兩族為卒黨為旅州為師鄉為軍此先王之法也管子作寓令之政卒伍定乎里而軍政成乎郊連其什伍居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死故能外攘戎狄内尊天子以安諸夏也夫設鄉軍以自衛前哲之意深矣人之愛親戚重財物盖天性也冦賊之來將殺我丁强虜我老弱蹂躪我田宅掠取我金帛則凡噍類皆有鬭心矣君人者因民心而利𨗳之既訓練之又將領之則其守戰至死非賞罰使之然也竊觀近世鄉無軍目人不知武事家不藏兵器寇賊之來則以袒裼之軀投餌於虎口賊去信宿則吏卒至吏卒至而無所獲益為勞敝矣雖然豈唯野而巳哉不曰郡乎曰縣乎自非方鎮多無備豫客軍百十僅如逆旅幸而治平矣萬一有狂夫大呼則奚以待之故鄉軍之名不可不察也近者亦籍戸而為之矣萬家五百亦巳多矣然恐將吏未得人訓習未得理何者統帥則縣令也縣令豈皆賢偏禆則戸民也戸民豈皆善撫御或失變故無常此謂將吏未得人也令之所教姑令習射曽不知坐作進退之節心背左右之冝耳不辨金鼓目不别旌旗一旦用之敺市人耳此謂訓習未得理也如欲將吏得人莫若精擇縣令勿拘官序一以材能縣令得人則偏禆之選亦得人矣然後明戰陣之法以授之則訓習得理矣如此則鄉軍日强也屯軍以征戎鄉軍以守備郡國之勢皆王之藩屏也强兵䇿第四或曰地勢西北髙東南下地髙而寒其民體厚而力强氣剛而志果地下而温其民體薄而力弱氣柔而志回故西北之兵能辛苦有成功而東南之士少所立此士大夫咸知之也而子謂郡國屯軍可以征伐意者非東南之謂歟曰是老生之論也夫民之性情有地氣矣是之謂風也教而使之在君長矣是之謂俗也聖王不擇民而教賢將不擇士而使擇民而教是國無顔冉未可學也擇士而使是世無賁育未可戰也水至柔也揚之以風則可使覆舟金至剛也冶之以火則可使成器頋所用之方畧何如耳江南有卑薄之稱荆楚有剽輕之議其傳非一世矣然楚若敖篳路籃縷而其後世常與晉争諸侯吴太伯㫁髮}
