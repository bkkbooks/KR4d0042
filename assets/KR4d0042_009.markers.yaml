  - {type: variant, offset: 1652, length: 0, content: '', WYG: 讓示民有常其下文曰禮者君之大柄也所以别嫌明㣲儐鬼神考制度别仁義所以治政安君也周公作六官之典曰治典曰教典曰禮典曰政典曰刑典曰事典而并謂之周禮今之禮記其創意命篇有不為威儀制度者中庸緇衣儒行大學之類是也及其成書總而謂之禮記是其本傳之者亦知禮矣不獨此二書而已也韓宣子適魯見易象與魯春秋曰周禮盡在魯矣則當時亦謂易象春秋為禮經也故知禮者生民之大也樂得之而以成政得之而以行刑得之而以清仁得之而不廢義得之而不誣智得之而不惑信得之而不渝聖人之所以作賢者之所以述天子之所以正天下諸侯之所以治其國卿大夫士之所以守其位庶人之所以保其生無一物而不以禮也窮天地亘萬世不可須㬰而去也或曰曲禮謂禮不下庶人而吾子及之何哉曰予所言者道也道者無不備無不至也彼所言者貨財而已耳謂人貧富不均不可一以齊之焉然而王制曰庶人縣封葬不為雨止不封不樹喪不貳事此亦庶人之喪禮也庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卯麥以魚黍以豚稻以鴈此亦庶人之祭禮也既庶人喪祭皆有其禮而謂禮不下庶人者抑述曲禮者之妄也禮論第七或人敢問禮之所興自於何聖曰揚子雲謂法始於伏羲而成乎堯今觀易繫辭其制器取象信自伏羲神農黄帝以來也禮本之興其在三皇可知矣大章章之也咸池備矣咸池者黄帝之事上古結繩而治後世聖人易之以書契百官以治萬民以察此亦黄帝之事也弦木為弧剡木為矢弧矢之利以威天下此亦黄帝之事也則樂政刑之興亦在三皇矣及夫堯舜繼禪禹成其功成湯文武翦其禍難周公坐而修之孔子著之於冊七十子之徒奉之以為教而後禮樂刑政之物仁義智信之用囊括而無遺矣或曰周道其盛矣然魯諸侯也而用天子之禮樂何如曰昔者武王既崩成王㓜不能涖阼周公攝天子之位作禮樂朝諸侯而天下大定七年致政於成王成王以周公為有勲勞於天下於是封之曲阜地方七百里革車千乘命魯公世世祀周公以天子之禮樂此盖成王謂周公有王者之德攝王者之位輔周室致太平者周公之為也故於其死用王禮祀之以尊之焉若是則魯以此祀周公可也豈及其餘哉至其子孫遂徹而用之凡制宫廟設官職祭祀喪紀車馬服器率倣於周此則非矣周君也魯臣也人臣而用其君之禮樂何以示民哉成王必欲其臣行天子禮樂則當賜之周公俾其身用之不須命魯公世世以此祀之也生則臣也死則鬼也鬼與人異用之非僣故知魯以此祀周公可也穆公之母卒使人問於曽子曰如之何曽子曰哭泣之哀齊斬之情饘粥之食自天子逹布幕衞也縿幕魯也夫布幕諸侯禮也縿幕天子禮也疾魯之僣故舉諸侯以示之焉隠公考仲子之宫将萬焉問羽數於衆仲對曰天子八諸侯六大夫四士二公從之書曰九月考仲子之宫初獻六羽觀春秋之㫖盖謂僣上既久賢君能詳問而更始之故書也彼杞宋者各自為一王之後耳其祖天子禮樂異於周使行之可也周尚在而魯倣之則僣矣孔子曰唯名與器不可以假人夫魯之事假人孰甚焉或曰議者以三代之後漢唐為盛如之何可比隆於古昔也曰漢唐其卑矣髙帝起於隴畆草創天下法制未修文景繼立齪齪守成公卿多武人而黄老刑名之學熾於其間賈生之徒稱先聖誦仁義眊焉而不知所從也武帝聰明特逹攘袂而作聘賢良尊文學改正朔易制度有志於先王矣然而黷兵好勝竭天下之財以事四夷延方士築宫館以求神仙用不經之言以東封泰山禪梁父光武憂勤民事而不務大體專求俗吏之課不師經籍而聽用圖䜟之書以疑天下耳目唐髙祖凡庸之材乘運而起太宗有非常之度而殘殺長適以取其位不能純用先王之制而因循駮雜浮屠亂法而不知禁進士壊文而不知革易置儲貳依違不决明皇親見禍亂心思矯正而興起老子荘周之説以害教化寵任武功注意兵食鑾輿展狩出入不時進用女色間以讒賊以紊經紀自此數君其餘蓋不足數矣曰封泰山禪梁父前世之大典也而吾子以為不經之言何如曰所謂經者二帝三王之事而孔子述之者也六籍是矣而封禪之文安在哉獨司馬遷封禪書稱自古受命帝王曷嘗不封禪盖有無其應而用事者矣未有睹符瑞見而不臻乎泰山者也於是引尚書舜嵗二月東廵狩至于岱宗柴似以此為封禪事斯禮也盖繫廵狩矣天子廵狩至于方岳祭天告至爰及名山大川皆以其秩望祭之乃事鬼神之常道非封禪之謂也且舜自正月上日受終于文祖孔氏謂上日朔日也後至輯五瑞既月乃日覲四岳羣牧班瑞于羣后孔氏謂盡以正月中日日見四岳及九州牧監還其瑞嵗二月東廵狩至于岱宗孔氏謂既班瑞之明月乃順春東廵至於岱宗若是則舜攝帝位纔朞月耳德未必遽洽於人也功未必遽濟於世也符瑞之見未必如此之速也况又未真即帝位則将何辭以封禪哉五載一廵狩廵狩而封禪則舜之在位凡幾年凡幾封禪其禮儀必有可采何以不廣記之乃獨言柴而已乎封禪之禮固不止於柴也夫摰見生死之物蓋其㣲者猶列之于後矧封禪之盛乃得畧之乎其不然必矣又稱齊桓公既霸㑹諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉曰無懐氏曰伏羲曰神農曰炎帝曰黄帝曰顓頊曰帝嚳曰堯曰舜曰禹曰湯曰周成王夷吾此言亦無所證孔子修六經祖述堯舜憲章文武豈前世有封禪之言管氏聞之而孔子不得聞乎雖誠有之孔子削而不書是亦不足取也子必謂稱古帝王封禪者皆妄也未知此説根於何時至秦始皇遂舉而行之逮孝武即位又議封禪事齊人公孫卿稱其師申公書曰封禪七十二王唯黄帝得上封又稱申公之言曰漢主亦得上封上封則能僊登天孝武後乃登封無風雨災於是自喜幸庶幾遇神仙矣吁可怪哉文中子曰封禪之費非古也以夸天下其秦漢之侈心乎是誠知言矣或曰子謂漢唐數君訛雜之如此然其所以闡基緒致昇平者何也曰其始皆能求輔佐納諌諍夙興夜寐以安天下濟生人為意此其所以興也及其後世則放逐忠良昵近邪辟或婦人用事或外戚專政或宦豎竊命官爵授於匪人貨財散於無用兵革疲於不急荒滛怠慢厭棄民物皇天震怒奸雄並起而海内土崩矣嗚呼漢唐之盛猶不足觀漢唐之衰萬世之鑑也禮論後語吾為禮論七篇既十五年學者有持章望之論一篇來以吾為好恠率天下之人為禮不求諸内而競諸外人之内不充而惟外之飾焉終亦必亂而已矣亦猶老子之言禮者忠信之薄盖不知禮之本徒以其節制文章獻酬揖讓登降俯仰之繁而罪之也嗚呼章子有耳目邪抑矇且瞶邪有則奚不視吾文聽吾言吾之論則曰後之人見仁義禮智信列名而齊齒謂五者之用各有分區故為仁義智信則不取於禮而任其私心為禮則不能辯仁義智信但以器服物色升降辭語為玩以為聖人作禮之方止於窮奢極富炫人聽覽而巳矣繇是推本之曰仁義智信者實用也禮者虚稱也法制之總名也聖人率其仁義智信之性㑹而為禮禮成而後仁義智信可見矣賢人者知乎仁義智信之美而學禮以求之者也禮得而後仁義智信亦可見矣吾之論如此豈嘗使人為禮不求諸内而競諸外邪豈嘗以節制文章之類為禮之實邪章子有耳目不至乎此也夫章子以仁義禮智信為内猶饑而求食渴而求飲飲食非自外來也發於吾心而已矣禮樂刑政為外猶冠弁之在首衣裳之在身必使正之耳衣冠非自内出也嗚呼章子之惑甚矣夫有諸内者必出於外有諸外者必由於内孰謂禮樂刑政之大不發於心而偽飾云乎且謂衣冠非自内出則寒而被之葛熱而被之裘可乎夏則求輕冬則求暖固出於吾心與饑渴之求飲食一也而章子異之不已惑乎故天下之善無非内者也聖人㑹其仁義智信而為法制固由於内也賢人學法制以求仁義亦内也謂藍之青朱之赤固其質也布帛之青赤則染矣然染之而受者亦布帛之質也以染鐵石則不入矣是故賢人學法制以求仁義亦内也下愚雖學弗之得矣中庸曰或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也然則吾之論何嘗有外邪何憂乎終之必亂邪吾之論則曰聞諸聖人於是引禮運周公六典之類以明之今章子乃曰學乎聖人者何必易其言是未嘗讀吾之論也趙簡子問子太叔揖讓周旋之禮焉對曰是儀也非禮也夫禮天之經也地之義也民之行也天地之經而民實則之是故為九歌八風七音六律以奉五聲為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮以是言之樂政刑非禮者乎顔淵問仁孔子曰克已復禮為仁請問其目曰非禮勿視非禮勿聽非禮勿言非禮勿動以是言之仁非禮者乎章子尚未讀左氏傳論語宜其病吾言也聖人之於禮其言盖參差言其大則無事不包言其小則庶事之一耳故周官三百六十職題曰周禮以該之言其大也其次則曰禮典與治教政刑事配焉其小則曰五禮與射御書數並焉章子得其小而不得其大宜其病吾言也故其説曰走百步外以救人隕溺難也趨百步外以揖人易也趨則為之走則不為之矣已後鄉人一日之生拜之能也坐其下行其後能也聞其急難則不為之死矣是仁義難於禮也又曰順父禮也違父非禮也有人蹈於水火之中已将救之而父在側曰勿救匍匐救之無避也違父可也夫婦異列禮也如妻踣於舅姑之前傷而不興盡力以扶之可也又曰心則愛兄而拜先仲叔此禮之易者固勝仁也千金之寳分則多伯兄是禮不勝仁也吾兄與嫂鬭則不救有嫂之嫌也此禮之易者固勝義也鄉人之長者鬭扵兄救兄不勝則佐之鬭是禮不勝義也嗚呼章子以揖拜為禮宜乎其不得以兼仁義也且章子焉知仁義哉萬物之生無不遂吾所謂仁也萬事之理無不當吾所謂義也而章子方區區以救隕溺死急難為事不亦小乎以一人之力而見隕溺必救見急難必死吾懼章子之仁義所及者寡而天年不獲終也其所謂仁吾曰浮屠而已耳其所謂義吾曰㳺俠而已耳孔子曰父在觀其志父没觀其行三年無改於父之道可謂孝矣父没三年尚不忍改其道父在側曰勿救人於水火而違之可乎已以救為仁而父曰勿救則父不仁矣已欲仁而彰父之不仁未見可以為仁也父不仁則違之兄之鬭則不辯是非而佐之是父輕而兄重乎兄與嫂鬭則以嫌而不救懼失禮也妻踣而傷則扶之不顧禮焉是妻厚而嫂薄乎厚於妻而薄於嫂茲小人之情輕其父而重其兄雖小人亦不為也章子以是為仁義非吾所敢聞也抑其所謂禮之在内者喪哀祭恭忠君孝父蓋皆仁義之目而不諭焉悖矣人不知而不愠謂之君子吾不得已而申之者為其惑衆也吾言止是矣章子雖復言吾不愠也旴江集巻二欽定四庫全書旴江集巻三宋}
