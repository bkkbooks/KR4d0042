  - {type: variant, offset: 1650, length: 0, content: '', WYG: 旴江集巻一欽定四庫全書旴江集巻二宋李覯撰禮論七篇予㓜而好古誦味經籍窺測教意然卒未能語其綱條至于今兹年二十四思之熟矣比因多病退伏廬下身無他役得近紙筆故作禮論七篇推其本以見其末正其名以責其實崇先聖之遺制攻後世之乖缺邦國之龜筮生民之耳目在乎此矣禮論第一或問聖人之言禮奚如是之大也曰夫禮人道之凖世教之主也聖人之所以治天下國家脩身正心無他一於禮而已矣曰嘗聞之禮樂刑政天下之大法也仁義禮智信天下之至行也八者並用傳之者久矣而吾子一本於禮無乃不可乎曰是皆禮也飲食衣服宫室器皿夫婦父子長㓜君臣上下師友賓客死喪祭祀禮之本也曰樂曰政曰刑禮之支也而刑者又政之屬矣曰仁曰義曰智曰信禮之别名也是七者盖皆禮矣敢問何謂也曰夫禮之初順人之性欲而為之節文者也人之始生饑渴存乎内寒暑交乎外饑渴寒暑生民之大患也食草木之實鳥獸之肉茹其毛而飲其血不足以養口腹也被髪衣皮不足以稱肌體也聖王有作於是因土地之宜以殖百榖因水火之利以為炮燔烹炙治其犬豕牛羊及醤酒醴酏以為飲食藝麻為布繰絲為帛以為衣服夏居橧巢則有顛墜之憂冬入營窟則有隂寒重膇之疾於是為之棟宇取材於山取土於地以為宫室手足不能以獨成事也飲食不可以措諸地也於是范金斵木或為陶瓦脂膠丹漆以為器皿夫婦不正則男女無别父子不親則人無所本長㓜不分則强弱相犯於是為之婚姻以正夫婦為之左右奉養以親父子為之伯仲叔季以分長㓜君臣不辨則事無統上下不列則羣黨争於是為之朝覲㑹同以辨君臣為之公卿大夫士庶人以列上下人之心不學則懵也於是為之庠序講習以立師友人之道不接則離也於是為之宴享苞苴以交賓客死者人之終也不可以不厚也於是為之衣衾棺槨衰麻哭踊以奉死喪神者人之本也不可以不事也於是為之禘嘗郊社山川中霤以脩祭祀豐殺有等疏數有度貴有常奉賤有常守賢者不敢過不肖者不敢不及此禮之大本也飲食既得衣服既備宫室既成器皿既利夫婦既正父子既親長㓜既分君臣既辨上下既列師友既立賓客既交死喪既厚祭祀既脩而天下大和矣人之和必有發也於是因其發而節之和久必怠也於是率其怠而行之率之不從也於是罰其不從以威之是三者禮之大用也同出扵禮而輔於禮者也不别不異不足以大行於世是故節其和者命之曰樂行其怠者命之曰政威其不從者命之曰刑此禮之三支也在禮之中有温厚而廣愛者有斷决而從宜者有疏逹而能謀者有固守而不變者是四者禮之大㫖也同出於禮而不可缺者也於是乎又别而異之温厚而廣愛者命之曰仁斷决而從宜者命之曰義疏逹而能謀者命之曰智固守而不變者命之曰信此禮之四名也三支者譬諸手足焉同生於人而輔於人者也手足不具頭腹豈可動哉手足具而人身舉三支立而禮本行四名者譬諸筋骸之類焉是亦同生於人而異其稱者也言乎人則手足筋骸在其中矣言乎禮則樂刑政仁義智信在其中矣故曰夫禮人道之凖世教之主也聖人之所以治天下國家脩身正心無他一於禮而已矣禮論第二或人不諭曰節其和者謂之樂行其怠者謂之政威其不從者謂之刑信然矣其所以統於禮者願聞其指曰昔者聖人之制禮也因十二月之氣分而為律吕因六律六吕作為十二管因其清濁與其輕重配而為五聲因其五聲變而雜之以為八音或為歌詩或被於金石絲竹匏土革木之器爰及干戚羽旄以導人之和心以舞人之手足小大有所終始有經倡和有秩節奏有差詘伸俯仰必有齊也綴兆行列必有正也宫軒特縣各當其位四六八羽各昭其數以範五行以調八風以均百度以象德行以明功業以觀政治以和人神此禮之一支樂著矣出號令立官府制軍旅聚食貨號令所以明約束官府所以正職掌軍旅所以待不虞食貨所以贍不足是故為之符璽節旄以信號令為之掾属胥徒以備官府為之甲胄五兵以成軍旅為之井田賦貢以興食貨為之城郭溝池所以限内外也為之度量權衡所以平多少也為之書契版圖所以窮變詐備遺忘也為之圄犴桎梏所以嚴推劾禁犇逸也官各有守事各有程先後有次遲速有檢以辨國之大事以平天下之民以躋至治此禮之二支政成矣伐不義侵不庭刺有罪或以鈇鉞或以刀鋸為大辟為宫為刖為墨為劓為剕為鞭為扑為流為贖輕有其等重有其常用之有地决之有時所以懲天下之人使皆遷善而逺罪此禮之三支刑行矣夫所謂禮者為而節之之謂也是三者其自成乎果有為之者乎其自治乎果有節之者乎苟不為也不節也則十二管不作五聲不辨八音之器不具干戚羽旄不設小大無其所終始無其經倡和無其秩節奏無其差詘伸俯仰不齊也綴兆行列不正也縣之面不殊也羽之數不分也如此則何以見樂哉不為也不節也則號令不出官府不立軍旅不制食貨不聚符璽節旄不作掾属胥徒不備甲胄五兵不成井田賦貢不興城郭溝池不修度量權衡不均書契版圖不著圄犴桎梏不嚴官無其守事無其程先後無其次遲速無其檢如此則何以見政哉不為也不節也則不義不伐不庭不侵有罪不刺鈇鉞無其凖刀鋸無其平大辟宫刖墨劓剕鞭扑流贖皆無其法輕無其等重無其常用之無其地决之無其時如此則何以見刑哉由是而言故知三者果有為而節之者然後能成也能治也為乎飲食衣服宫室器皿夫婦父子長㓜君臣上下師友賓客死喪祭祀而節之者既謂之禮矣為乎十二管五聲八音干戚羽旄號令官府軍旅食貨符璽節旄掾属胥徒甲胄五兵井田賦貢城郭溝池度量權衡書契版圖圄犴桎梏鈇鉞刀鋸大辟宫刖墨劓剕鞭扑流贖而節之者反不謂之禮可乎若是則三者果禮之支也而强其名者也禮論第三或曰樂刑政之説既承教矣敢問温厚而廣愛者仁也斷决而從宜者義也疏逹而能謀者智也固守而不變者信也則然矣其何繫於禮哉曰百畝之田不奪其時而民不饑矣五畝之宅樹之以桑而民不寒矣逹孝悌則老者有歸病者有養矣正喪紀則死者得其藏修祭祀則鬼神得其饗矣征伐有節誅殺有度而民不横死矣此温厚而廣愛者也仁之道也君為君焉主政令必生殺不得不從矣臣為臣焉守職事死干戈不得少變矣男女有别不得相亂矣長㓜有序不得相陵矣興㢘讓則財不得苟取位不得妄受矣立諌諍則不得諱其惡矣設選舉則賢者不遺矣正刑法則有罪者必誅矣此斷决而從宜者也義之道也為衣食起宫室具器皿而人不乏用矣異親疏次上下而人不興亂矣列官府紀文書而姦詐可窮矣築城郭治軍旅而冦賊不作矣親師傅廣學問而百慮畢矣此疏逹而能謀者也智之道也號令律式以約民心蔑有欺矣禄位班次以等賢愚蔑相犯矣車馬服御以章貴賤而人不疑矣百官不易其守四民不改其業而事不諐矣言必中行必果而天下率從矣此固守而不變者也信之道也若夫百畆之田不奪其時五畆之宅樹之以桑逹孝悌以養老病正喪紀以藏其死脩祭祀以饗鬼神征伐有節誅殺有度定君臣别男女序長㓜興㢘讓立諫諍設選舉正刑法為衣食起宫室具器皿異親疏次上下列官府紀文書築城郭治軍旅親師傅廣學問為號令律式禄位班次車馬服御官守民業言而必中行而必果者謂之非禮可乎既曰仁矣曰義矣曰智矣曰信矣總而言之又皆禮矣若是則仁義智信果禮之别名也禮論第四或曰仁義智信疑若根諸性者也以吾子之言必學禮而後能乎曰聖人者根諸性者也賢人者學禮而後能者也聖人率其仁義智信之性㑹而為禮禮成而後仁義智信可見矣仁義智信者聖人之性也禮者聖人之法制也性畜於内法行於外雖有其性不以為法則曖昧而不章今夫木大者可以為棟梁小者可以為榱桷不以為屋室則朽扵深山之中與樸樕同安得為棟梁榱桷也温厚可以為仁斷决可以為義疏逹可以為智固守可以為信不以為禮則滯於心胷之内與無識同安得謂之仁義智信也屋既成雖拙者必指之曰此棟也此梁也此榱也此桷也禮既行雖愚者必知之曰此仁也此義也此智也此信也賢人者知乎仁義智信之美而學禮以求之者也禮得而後仁義智信亦可見矣聖與賢其終一也始之所以異者性與學之謂也中庸曰自誠明謂之性自明誠謂之教誠則明矣明則誠矣自誠明者聖人也自明誠者賢人也然則賢人之性果無仁義智信乎曰賢人之性中也揚雄所謂善惡混者也安有仁義智信哉性之品有三上智不學而自能者也聖人也下愚雖學而不能者也具人之體而已矣中人者又可以為三焉學而得其本者為賢人與上智同學而失其本者為迷惑守於中人而已矣兀然而不學者為固陋與下愚同是則性之品三而人之類五也請問學之得失曰所謂本者禮也知乎仁義智信之美而不知求之於禮率私意附邪説蕩然而不反此失其本者也故世有非禮之仁矣有非禮之義矣有非禮之智矣有非禮之信矣是皆失其本而然也敢問其目曰奪其常産廢其農時重其賦税以至饑寒憔悴而時賜米帛以為哀人之困憲章煩宻官吏枉酷殺戮無數而時發赦宥以為愛人之命軍旅屢動流血滿野民人疲極不知喪葬而收歛骸骨以為惠及死者若是類者非禮之仁也背其君親疏其兄弟而連結私黨以死相赴以為共人之患諂諛機巧以動上心而數辭其爵位及其貨財以為謙讓君有過失而不能諌正而暴揚於外身有隠惡不能自改而專攻人之短以為强}
