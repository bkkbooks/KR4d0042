  - {type: variant, offset: 1651, length: 0, content: '', WYG: 賢才果勇不能用於公家而私相援舉以為已力下民之愚而不能教訓䧟之於惡然後峻刑以誅之以為奉法若是類者非禮之義也為智不能以制民用修世教起政事以治人齊師旅以禦亂以為天下國家久長之䇿而專為姦詐巧辯以徼一時之利若是類者非禮之智也為信不能以一號令重班爵明車服以辯等守職業以興事使天下之人仰之而不疑而專為因循顧望以死兒女之言若是類者非禮之信也今有欲為仁義智信而不知求之於禮是将失其本者矣禮論第五或人請問樂刑政亦有非禮者乎曰善哉爾之問也夫夷蠻戎狄荒滛靡曼之音雜其倡優輔以子女諧笑顛亂以動人耳目移人心氣若是類者非禮之樂也或重刑辟變法律伺人小過鉤人㣲隠以為明察或悲哀怯愞容貸姦宄以為慈愛或急征横賦多方揉索抔聚畜積以為强國或時起土功敺人為卒用於無用以為豫備若是類者非禮之政也或為轘裂鼎鑊炮烙菹醢剥面夷族以威天下若是類者非禮之刑也曰子所謂禮者為之節之者也若是三者豈無為之者乎豈盡無其節乎曰夫所謂為者先王之為也所謂節者先王之節也先王之所以為而節之者非妄也必有仁義智信之善存乎其間矣不念古昔不師先王是皆妄為也妄節也君子不以為禮也或曰樂刑政皆禮也先儒之述何以不止於禮而言禮樂刑政曰樂刑政雖統於禮盖以聖人既别異其名世傳已久止言禮則人不知樂刑政故並列之使人得以兼用然首之以禮而樂刑政次之意者謂樂刑政咸統於禮歟譬諸孔門四教曰文行忠信忠信豈非行乎盖以止言行則人不知忠信故並列之然先之以行而次以忠信謂忠信咸統於行也然則所謂仁義禮智信者亦猶是哉曰非矣樂刑政者禮之支也未盡於禮之道也其本存焉亦猶忠信者未盡於行也舉禮之本而與樂刑政並列可矣今言乎仁義智信則禮之道靡有遺焉禮與仁義智信豈並列之物歟仁義智信者實用也禮者虚稱也法制之總名也然而所以與仁義智信並列而其次在三者意者謂雖有仁義智信必須以禮制中而行之乎曰鄭氏注中庸性命之説謂木神則仁金神則義火神則禮水神則智土神則信疑若五者並生於聖人之性然後㑹而為法制法制既成則禮為主而仁義智信統乎其間若君臣之類焉曰爾謂禮之性果何如也曰豈非能節者乎有温厚斷决疏逹固守之性而加之以節遂成法制焉曰節之者義之性也義斷决而從宜豈非能節者哉法制之作其本在太古之時民無所識饑寒亂患罔有救止天生聖人而授之以仁義智信之性仁則憂之智則謀之謀之既得不可以不節也於是乎義以節之節之既成不可以有變也於是乎信以守之四者大備而法制立矣法制既立而命其總名曰禮安有禮之性哉鄭氏之學其實不能該禮之本但隨章句而解之句東則東句西則西百端千緒莫有統率故至乎性命之説而廣求人事以配五行不究其端不揣其末是豈知禮也哉或曰月令之推五性亦然矣何如曰月令之書盖本於戰國之時吕氏門人所作至唐増修之未足以觀聖人之㫖也後之人見仁義禮智信列名而齊齒謂五者之用各有分區故為仁義智信則不取於禮而任其私心為禮則不能辯仁義智信但以器服物色升降辭語為玩以為聖人作禮之方止於窮奢極富炫人聽覽而已矣行其事不知其本觀其象不知其意因謂禮有質文可隨時而用先王有作我可以作先王有變我可以變而不知先王之所以作而變者有所為于偽反也此之所以作而變者復何以哉苟禮之所之止於器服物色升降辭語而無仁義智信之大則是𤨏𤨏有司之職耳何聖人拳拳之若是乎郊特牲曰禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而謹守之天子之所以治天下也或曰吾子所稱先儒並列禮樂刑政及仁義禮智信之意曷以知先儒之意果若吾子之言乎曰以予度之先儒之意當若是也若是則善矣或異於此則先儒之言者皆不知禮而妄言也予何咎哉曰先儒既並列之而吾子乃論而為一敢問何謂也曰並列之使人記其條目用之而不遺先儒之事也論而為一使人知其本根學之而不失予之志也或曰前所謂節其和者命之曰樂行其怠者命之曰政威其不從者命之曰刑温厚而廣愛者命之曰仁斷决而從宜者命之曰義䟽逹而能謀者命之曰智固守而不變者命之曰信徇是而言則七者似皆禮之别名也何以樂刑政則謂之支而强其名仁義智信則止謂之别名也曰樂刑政各有其物與禮本分局而治十二管五聲八音干戚羽旄樂之物也號令官府軍旅食貨政之物也鈇鉞刀鋸大辟宫刖墨劓剕鞭扑流贖刑之物也是三者之物與飲食衣服宫室器皿夫婦父子長㓜君臣上下師友賔客死喪祭祀之目少異故得謂之支而强其名也夫仁義智信豈有其物哉總乎禮樂刑政而命之則是仁義智信矣故止謂之别名也有仁義智信然後有法制法制者禮樂刑政也有法制然後有其物無其物則不得以見法制無法制則不得以見仁義智信備其物正其法而後仁義智信炳然而章矣或曰前所謂刑者政之属誠然矣而吾子復並列之何謂也曰因先儒之言從而論之不遑變易耳其㫖既明其辭雖在奚有害於事哉曰敢問吾子之列禮樂刑政之物仁義智信之用盡於吾子之言乎抑有所遺者乎曰凡予所言者大也不及其細也畧也不及其詳也從其類而推之苟合乎禮本乎聖者皆是也奚待予之盡言哉禮論第六或曰樂記曰聖人作樂以應天制禮以配地禮樂明備天地官矣又以天地卑髙動靜方物在天成象在地成形以為禮者天地之别也地氣上齊天氣下降隂陽相摩天地相蕩雷霆風雨四時日月百化之興以為樂者天地之和也由此觀之則禮樂之比隆競大蓋已著矣而吾子統之於禮益有疑焉曰彼以禮為辨異樂為統同推其象類以極于天地之間非能本禮樂之所出者也禮也者豈止於辨異而已哉樂也者豈止於統同而已哉是皆見其一而忘其二者也曰古之言禮樂者必窮乎天地隂陽今吾子之論何其小也曰天地隂陽者禮樂之象也人事者禮樂之實也言其象止於尊大其教言其實足以軌範於人前世之言教道者衆矣例多濶大其意汪洋其文以舊説為陳熟以虚辭為㣲妙出入混沌上下鬼神使學者觀之耳目驚眩不知其所取是亦教人者之罪也或問孟子曰惻隠之心人皆有之羞惡之心人皆有之辭讓之心人皆有之是非之心人皆有之惻隠之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也孟子既言人皆有仁義之性而吾子之論獨謂聖人有之何如曰孟子以為人之性皆善故有是言耳古之言性者四孟子謂之皆善荀卿謂之皆惡揚雄謂之善惡混韓退之謂性之品三上焉者善也中焉者善惡混也下焉者惡而已矣今觀退之之辯誠為得也孟子豈能專之曰性之説既盡之矣然其以禮與仁義智並列何如曰是皆據世俗而言不及為之統率耳辭讓者義之一節也又淳于髠問曰男女授受不親禮也嫂溺則援之以手乎孟子曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手權也夫權智之動義之㑹也詳孟子此言則義而智者不在先王之禮歟曰孟子據所聞為禮以已意為權而不謂先王之禮固有其權也自今言之則必曰男女授受不親禮也嫂溺援之以手亦禮也喪服四制曰父在為母齊衰期者見無二尊也百官備百物具不言而事行者扶而起言而后事行者杖而起身自執事而后行者面垢而已秃者不髽傴者不袒跛者不踊老病不止酒肉凡此八者以權制者也若是則先王之禮豈無權乎然其上文則曰恩者仁也理者義也節者禮也權者智也於此則是言之者惑矣其所謂恩者為父斬衰三年也所謂理者為君亦斬衰三年也若兹二服與父在為母齊衰扶杖面垢不髽不袒不踊不止酒肉之事非禮何以著之自今言之則必總四制以為禮而分仁義智於其間可也或人變色而作曰善哉吾子之論樂刑政仁義智信咸統於禮也其始得之於心歟抑嘗聞聖人之言及此者歟曰予聞諸聖人矣禮運記孔子之言曰禹湯文武成王周公此六君子者未有不謹於禮者也以著其義以考其信著有過刑仁}
