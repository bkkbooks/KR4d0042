  - {type: variant, offset: 1656, length: 0, content: '', WYG: 身而其後世亦先晉歃項籍以八千人起㑹稽而殺秦降王遷漢王於蜀分裂天下號稱為霸宋武帝以百餘人起丹徒而誅桓正晉遂平齊地長驅闗洛是則東南之士亦甞與西北校矣惟其將之才不才也然以今日之事言之則習有所多技有所長亦不可不察也若夫沙平草淺千里在目土不成丘水不成谷馬肥人輕來往電駭雙帶兩鞬左右馳射此非南軍之所長也山陵險阨草木蓊蔚江流吞天巨浪時起行人疑惑飛鳥不度徒歩相搏短兵相擊此亦非北軍之所長也北征而用南軍衆則笑之矣南征而用北軍未有言其不可者竊所未諭也江海之濵或一盗肆虐一邦被擾則命王人帥王卒以捕之以多擊少以短擊長費或甚厚而功或不立此亦一失也嚮者征南蠻谿洞則可監矣去平地而即險阻出中國而入瘴癘狡穴未堙而吾軍殆矣竊惟廟筭之深未必不及此也盖郡國無精兵不可不内發故也載使置軍屯田隨便興發則何征而不服何討而不誅哉至若以古名將將之以騎戰之法教之舎此所短從彼所長則運之天下亦猶袵席間也强兵䇿第五兵矢者軍之神靈也甲胄者人之司命也故一夫奮劍則千人披靡孟賁袒裼則童子闗弓能殺之矣然兵不利不若無兵之愈也無兵則慎所擊而逺於敗矣甲不堅不若無甲之愈也無甲則知所避而免於死矣有兵而不利有甲而不堅而假之以求勝恃之以求生則誤大事取大禍莫斯之甚也故周官考工為器之法天有時地有氣材有美工有巧合此四者然後可以為良凡器皆然况於兵乎故其為弓也取六材必以其時凡相幹欲赤黒而陽聲角欲青白而豐末膠欲朱色而昔筋欲小簡而長大結而澤漆欲測絲欲沈六材之全然後冬析幹春液角夏治筋秋合三材寒奠體氷析灂春被弦其為矢也前弱則俛後弱則翔中弱則紆中强則揚羽豐則遲羽殺則趮是故夾而揺之以眡其豐殺之節橈之以眡其鴻殺之稱凡相笴欲生而摶同摶欲重同重節欲疏同疏欲㮚其為戈殳㦸矛之柲也攻國欲短守國欲長置而揺之以眡其蜎炙諸墻以眡其橈之均横而揺之以眡其勁其為甲也眡其鑚空欲其惌眡其裏欲其易眡其朕欲其直櫜之欲其約舉而眡之欲其豐衣之欲其無齘是先王之為兵甲必及其時必美其材工則必良事則必試如此其至也惟今郡國之貢兵器果何如哉聚工而作卒嵗後巳未甞試也連輿而出方舟而上無不受也簡閲不明則精粗不别精粗不别則制作必濫制作濫則工不必巧材不必美况天時乎况地氣乎加以師興之際卒然求取斬木以為弩伐竹以為箭或取非其時或産非其地備數而止行濫固多暴之日則焦濡之雨則朽以之應敵不知其可矧新甲之制出於一切次紙為札索麻為縷費則省矣乆將奈何凡此之類皆有識之所聞見也至於郡國兵庫或乆不啟戰守之具未嘗修飾事至而慮亦非智者所能也愚以為天下造兵宜専命守臣以蒞之總置使名以督之工之選必難其人而進其食以優之材之取必善其物而増其價以來之取之有地來之有時為之有法日省之月試之善至多則賞惡雖少而刑上下檢察用為急務其舊兵革勿絶繕完以備豫為政則龍淵太阿不獨稱於古而蠻夷猾夏有血刃之期矣强兵䇿第六孫子曰將能而君不御者勝故古者天子遣將於太廟親操鉞持其首授其柄曰從是以上至天者將軍制之乃復操柄授與刃曰從是以下至淵者將軍制之故李牧之為趙將居邊軍市之租皆自用饗士賞賜决於外不從中御也周亞夫之軍細栁軍中唯聞將軍之命不聞天子之詔也夫古先哲后於王業亦艱難矣安不㤀危其心亦至矣豈故欲示人以利器成人以威柄以天下之命屬之於一臣哉蓋任賢之道不得不然也馬之所以能千里者以其獨行也若使駕以輜車驂以蹇驢役夫罷羸執轡其上則未必不傾覆矣况乎致逺哉鳳之所以能千仞者以其自恣也若使繫之以線縷飬之於園囿藩籬之類啁啾其側未必不憂死矣况乎冲天哉用兵之法一歩百變見可則進知難則退而曰有王命焉是白大人以救火也未及反命而煨燼乆矣曰有監軍焉是作舎道邊也謀無適從而終不可成矣竊跡其原蓋知之不盡信之不篤也知之不盡恐其不賢也信之不篤懼其不忠也不賢而無所制則或敗事矣不忠而無所監則或生變矣是故束之以詔令持之以親貴焉然恐其不賢胡不選賢而任之懼其不忠胡不擇忠而使之未見其賢而任之是國無賢耶未知其忠而使之是下無忠耶與其用之之疑曷若取之之慎孔子曰視其所以觀其所由察其所安人焉廋哉必也授以節度使之遵行耶則王人之微者自足為之矣安用大臣哉大臣而尚可疑耶則小臣胡為而可信也彼誠不忠耶則不知有君矣何憚於一小臣哉昔韓信平齊七十餘城南靣稱孤與楚則楚重與漢則漢重鼎足之形可坐而定也而藉金石之交荷解衣推食之徳蒯通之説弗忍從也當是之時豈有監之者哉及其削爵為侯居京師奉朝請乃欲外結陳豨内因諸官徒奴以行大事誠非嚮者三分之勢也而卒以叛逆者君恩不終而懐怨望也漢孝武之於霍子孟蜀先主之於諸葛孔明皆託以六尺之孤而弗聞有變者君臣之義至深國士之遇可懐也苟推赤心疇敢不順苟為疑之人亦無足信者今兹兵興矣將用矣惟上心曠然與忠賢為一體無置節目於其間則將才如神軍鋒如雷功業易可成也强兵䇿第七國之所以為國能擇將也將之所以為將能養士也人莫不愛身而以身當矢石莫不愛死而以死衛社稷者厚無所往也故曰視卒如嬰兒故可與之赴溪視卒如愛子故可與之俱死呉起吮疽而戰不旋踵李廣與士卒共飲食而愛樂為用親非父母也倫非兄弟也然而所以撫循盡得其歡心者非一朝一夕之事也故臨敵易將兵家所忌彼其推恩信分甘苦曠日持乆上下親矣猶不能以有功一旦而易之則雖賢矣雖仁矣上恩不可一言而洽也下情不可一顧而通也卒然用之則安能以有為哉馬之馳矣而斷其蹄雖代以驥足弗能行也子之孩矣而逐其乳雖繼以毛嬙弗能育也昔燕以騎刼代樂毅遂有即墨之敗七十餘城盡反於齊趙以馬服子代㢘頗遂有長平之降四十萬衆皆阬於秦功或不可早建事或不可速成亦明主所宜察也竊觀今之易將誠以敗衂不稱故也夫任人當審其賢不賢未可責其勝不勝也不賢而勝非國之福也適所以召敵也賢而不勝非國之患也適所以儆之也使彼勝而驕我敗而怒以無功之將用無功之士竭智盡力以求洒恥則不知山之有髙石之有堅水之有溺火之有焚死之可畏生之可懐矣孰能當其鋒哉吳子謂魏武侯曰人有短長氣有盛衰君試發無功者三萬人臣率以甞之其可乎今使一死賊於曠野千人追之莫不梟視狼顧何者恐其暴起而害已也是則一人投命足懼千夫故其以三萬人而破秦十萬衆也今以敗而易之是古名將無敗者乎孟明視敗於崤而秦伯復其位方有焚舟之報荀林父敗於邲而晉侯赦其罪卒致曲梁之功棄瑕錄用古之道也若賢而易之是雖有過人之畧無所復用斯足以快盗心而巳矣不賢而易之是去劇就閒如釋負擔斯足以遂其私而巳矣後之人將曰苟勝焉何恤乎富貴苟負焉不過一左遷而巳任之不甚乆責之不甚重人或苟且將焉用之幸而天威在上盗不敢前如使易將之際羣情未安約束未定謀未及周備未及設而犬羊乗之禍亦不可測也誠能注意賢才期之逺大一勝勿遽賞賊平之後則茅土存焉一敗勿遽罰事終不濟則鈇鉞存焉困獸猶鬭况大將乎是則恥不足洒而賊不足平也强兵䇿第八或曰一敗勿罰過可畧也一勝勿賞何以使人曰勝而勿賞是所以使人之術也愚甞深跡有國者之行事未始不以賞使人也而或失使之之道焉夫爵者所以貴也祿者所以富也富貴者是人之所欲也仁非伯夷叔齊㢘非於陵仲子孰能不動其心哉故智者竭慮勇者盡力辨者以説文者以檄不敢家其家不敢身其身不逺於蠻貊之外不威於矢石之間日不為暑風不為寒渴不暇飲飢不暇食孳孳焉從於王事者賞使之然也雖有至性自天至誠發中不待勸沮而决所去就者兹蓋非常之士豈可以衆人望之哉乃知賞之於使人至矣其為失者賞之太速而浮於功也徒知賞之可以使人而不知賞極則弗能使之矣舉億萬之衆贏千里之糧足未履於山川手未煩於枹皷虜獲未盈車斬首未數級而幕府巳獻捷矣朝廷已議功矣爵等有數而敵人無數賜物有盡而賊衆無盡故天討未行而䇿命極矣尺地未収而府庫殫矣身既已貴家既已富子女玉帛所欲者陳於前矣兄弟親戚所愛者受其賜矣體習宴安志在驕佚勝則無以加敗則失其舊畫虵之足世所戒也是賞典雖在安能復使之哉其間亦有矜功䟦扈以求姑息國家之弊多或由之唐季五代可覆而視也此無他賞之太速而浮於功之咎也故曰勝而勿賞是所以使人之術也古者師還飲至䇿勲事成而賞誰云晩耶抑又聞之書曰徳懋懋官功懋懋賞無徳而官則官不足以勸有徳無功而賞則賞不足以勸有功如使傝􅀈受位私昵受賜則何以待功徳之臣哉位雖髙與傝􅀈同賜雖厚與私昵同是徳不足貴而功不足重其誰勉之哉今者明明在上誠日慎於賞爵則師可使武臣可使力而四方無虞矣强兵䇿第九人莫不有才才莫不可用才取其長用當其宜則天下之士皆吾臂指也故曰使智使勇使貪使愚智者樂立其功勇者好行其志貪者决取其利愚者不愛其死因其至情而用之此軍之微權也昔伊尹之興土功也强脊者使之負土眇者使之推傴者使之塗各有所宜而人性齊矣竊觀世俗之論則有異於此不求於巳而專責於人不用其長而專攻其短適時則謂之違禮從權則謂之壊法剛毅則謂之不遜倜儻則謂之不檢輕財則謂之不儉為生則謂之不㢘見其一不問其二觀諸外不察諸内以帷幄之談而校之老生之議以戎馬之任而同之俗吏之選是猶責越客以騎射望燕卒以乗舟雖其賢才何益於事哉蘇秦謂燕易王曰孝如曽参義不離其親宿息於外王又安能使之歩行千里而事弱燕之危王哉㢘如伯夷義不為孤竹君之嗣不肯為武王之臣不受封侯而餓死於首陽之下有㢘如此王又安能使之歩行千里而進取於齊哉信如尾生與女子期於梁柱之下女子不來水至不去抱梁柱而死有信如此何肯揚燕秦之威却齊之强兵哉故知善不必皆可惡不必皆否置之有地使之有時一不可廢也小才之於大用是匹雛不能以舉千鈞也大才之於小用是堯舜不能以牧羊也故曰多言多語惡口惡舌終日言惡寢卧不絶為衆所憎為人所疾此可使要遮閭巷察姦伺禍也權數好事夜卧早起雖劇不悔此妻子之將也先語察事勸而與食實長希言財物平均此十人之將也切切截截垂意肅肅不用諌言數行刑戮刑必見血不避親戚此百人之將也訟辨好勝嫉賊侵陵斥人以刑欲整一衆此千人之將也外貎怍怍言語時出知人飢飽習人劇易此萬人之將也戰戰慄慄日慎一日近賢進謀使人知節言語不慢忠心誠畢此十萬人之將也温良實長用心無兩見賢進之行法不枉此百萬人之將也明主誠能不牽於世俗之論而盡乎才用之宜則不視而形不聽而聲不降席而横行乎四夷矣强兵䇿第十將之有兵法猶儒之有六經也儒莫不讀六經而知道者鮮矣將莫不讀兵法而適變者鮮矣世一賢士猶為踵武國一賢將猶為比肩其故何也性生於内而學成於外非學問之能移性也水之湍者决之也而聚鄭白之工不能以流涸澤刃之芒者礲之也而盡南山之石不能以利鉛刀本之不善末無及也然值承平之世言堯舜者皆可以為善當有事之際學孫吳者未必能應敵緩急之勢異也夫兵者詭道有形或不可視有聲或不可聽合散如雷電隠見如鬼神而欲以昔人之餘論既往之陳迹擬議於其間不亦難乎苟非有髙世之識出類之才動如循環一歩百變者其孰能與於此哉楚漢之時諸將多矣唯韓信起於餓𨽻戰而必勝攻而必取未甞敗北者何也豈其兵法皆衆人之所未學者乎蓋其用之非衆人之所及也是謂反兵法而用兵法也兵法曰絶水必逺水客絶水而來迎之於水内令敵半渡而擊之利欲戰無附於水而迎客也及信與龍且夾濰水陣乃夜令人為萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯也此反半渡之文也而卒以勝者雜於利而務可伸雜於害而患可解也兵法右背山陵前左水澤而信攻趙未至井陘口乃使萬人先行出背水陣趙軍望見大笑之此反前左之文而卒以勝者䧟之死地而後生投之亡地而後存也反其顯而用其微人以為拙已以為工智者不能與其謀巧者不能同其伎用兵若此可以言學矣今以衆人之識讀衆人之書而求以勝彼亦已疏矣昔趙奢之子括自少時學兵法言兵事以天下莫能當甞與其父言兵事奢不能難然不謂善括母問奢其故奢曰兵死地也而括易言之使趙不將括則已若必將之破趙軍者必括也及孝成王使括為將藺相如曰王以名使括若膠柱而皷瑟耳括徒能讀其父書傳不知合變也趙王弗聽故有長平之敗乃知有將才者必習兵法習兵法者不必有將才况以言取人孔子病諸兵戰之場立尸之地固明主所宜留意也旴江集巻十七欽定四庫全書旴江集巻十八宋李覯撰安民策十首安民策第一愚觀書至於天聰明自我民聰明天明畏自我民明威未嘗不廢書而歎也嗟乎天生斯民矣能為民立君而不能為君養民立君者天也養民者君也非天命之私一人為億萬人也民之所歸天之所右也民之所去天之所左也天命不易哉民心可畏哉是故古先哲王皆孳孳焉以安民為務也所謂安者非徒飲之食之治之令之而已也必先於教化焉教化之説何如曰夫俗士之論未有不貴刑法而賤禮義也以為天下之大可域之於圄犴也羣生之重可摩之以刀鋸也聞有稱王道誦教典也則衆共笑之矣必謂殺之而不懼尚何有於教化乎是皆不睹聖人之情者也獨不知教失而後惡化成而後刑刑所以不勝惡也善觀民者見刑之不勝惡也則反之曰是教之罪也焉可以刑不勝惡而謂教益不可用也譬諸人身導飬得理則無疾疾作而後用藥藥所以不勝病也善觀身者見藥之不勝病也則反之曰是導飬之失也焉可以藥不勝病而謂導飬益不可用也記曰昏姻之禮廢則夫婦之道苦而滛辟之罪多矣鄉飲酒之禮廢則長㓜之序失而争鬭之獄繁矣䘮祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣故禮之教化也微其止邪也於未形使人日徙善逺罪而不自知也是以先王隆之也居山者不知􅈄居澤者不知獵習之之異也今欲令禁􅈄人以網罟詰獵者以從禽雖日撻之弗可改也已民有以生之而無以教之未知為人子而責之以孝未知為人弟而責之以友未知為人臣而責之以忠未知為人朋友交㳺而責之以信未知亷之為貴而罪以貪未知讓之為美而罪以争未知男女之别而罪以滛未知上下之節而罪以驕是納民於阱也雖日誅之死者弗之悔而生者弗之悟也使民父子親夫婦和宗族相睦郷黨相信財不以争力不以鬬肅肅雍雍相從於禮譲之地是為安乎使民父子不親夫婦不和宗族不睦鄉黨不信財則必争力則必鬭呼天扣心相從於刑戮之埸是為安乎此周所以長世而秦所以不祀也洪惟聖神掃五代之弊跨唐據漢拱揖三王教化之情靡不存乎中矣而或未明未具無以觀示於下幸而昭然垂日月之光俾穴隙之㣲咸有所見斯萬世之福也安民策第二或曰欲教化之明且具則奚由曰莫若學校之宜於時也夫士者衆之所仰望也服儒衣讀儒書而躬小人之行是塗民耳目也士之不徳師非其師也師之不才學校不脩之過也記曰君子知至學之難易而知其羙惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也然則師者雖非人君之位必有人君之徳也古者家有塾黨有庠術有序國有學仕焉而已者歸教於閭里大夫為父師士為少師閭里之細猶以國之老臣為之師况其大者乎師有其人教有其業詩書禮樂以本之干戈羽籥以文之天子於是養老焉世子於是齒胄焉黨正於是飲酒焉郷大夫於是賔賢能焉父子君臣長㓜之道於是乎觀之六徳六行六藝之教於是乎取之司馬辨論官材論定然後官之任官然後爵之位定然後祿之其不帥教者命國之右鄉移之左左鄉移之右不變移之郊不變移之遂不變屏之逺方終身不齒其教之也􅇱其選之也至善者必興惡者必廢則其學者皆勸勉媿耻而求為君子矣士皆君子則衆人望之若景嚮焉奚不善之云乎故曰君子如欲化民成俗其必由學乎古之王者建國君民教學為先也後王多務古制未暇家自為學人自擇師學乎學孰孔孰墨在我而巳矣師乎師孰堯孰桀在我而已矣故有以無用之文為學以不令之人為師聽其言則欲齊名於聖哲觀其行則或慙色於閭閻乗流一遷汗漫弗復往者不知其非来者以為當然蚩蚩之氓何以取法今者内有國子之館外有諸侯之學聖人之意有所在矣然師以講説為名而不掌於教育士以文辭為業而不舉其徳行師不掌教育則觧經之外人之賢不賢一不當知也士不舉徳行則執筆之餘身之善不善一不足慮也是則何補於事哉誠宜申命學官以教育為職時無賢才則其咎也明著學版以徳行為選郷有善譽則可進也如此而人材不多俗化不美是六經羣言皆欺後世也安民策第三或曰今茲京師首善每嵗論秀士矣轉而從徳行其可也而州郡之學無薦引之文欲一取之何如曰教而用之學校之興於古也不教而用之選舉之隆於今也教則易為善善而從正國之所以治也不教則易為惡惡而得位民之所以殃也試者其言也用者其行也言有偽善則取之矣行有真惡弗可得而知也然而授以操柄加之人上是以赤子之肉投畀虎穴也况綉繢雕琢之文又不足以為善言乎則其疇昔之志夙夜之學瀝盡於數刻之試而胷中未始有一毫可為效官之資也禮儀則習於同列政體則咨於老吏自受爵之日為學製之始奈何欲致治興化也惟今太學論士既不觀徳行矣而學士之版徒記姓名而巳求試而來報罷而去以天子之辟雍與諸生假道而過耳郡國雖或興學而士之進取罔由於此是皆存學之名失學之實也按唐制自京師郡縣皆有學焉每嵗仲冬課試其成者長吏㑹屬僚設賔主陳俎豆備管弦牲用少牢行鄉飲酒禮歌鹿鳴之詩召耆艾叙少長而觀焉既餞而與計偕其不在學而舉者謂之鄉貢此近古旁求之法也而一出課試不由行實亦同歸於弊矣為朝家之計莫若斥大七館使薦紳之族咸造焉増修州學使士庻人之秀咸在焉擇賢以為之師分經以為之業限以積乆毋得擅去日觀其徳月課其藝賢邪非一時之賢乆居而不變乃其賢也能邪非一時之能歴試而如一乃其能也如是而得人不精未之信也其有急於耕飬或素已成就不在學者則循舊貢舉先其名譽後其課試舉之非一人之舉必鄉曲共舉也用之非一人之用必天下共用也如是而得人不精亦未之信也古者諸侯貢士一適謂之好徳再適謂之賢賢三適謂之有功迺加九錫不貢士一則絀爵再則削地三則絀爵削地畢矣誠能以得士為賞失賢為罰則羣下孰不一意於察舉乎尚慮有遺則莫若使大臣得舉所知漢法三公大將軍皆開府辟召豈虚言哉或曰嚮者亦嘗先名譽而後課試矣以其進者濫而取者私也今而復之其可乎曰進皆有濫取皆有私顧其利害何如耳糊其名而易其書有司不得輕重焉是吏之公也君子之道不逞於童子之雕蟲是法之私也以名取之則亦反是矣吏之私者則刑可速也法之私者雖聖人因之末如之何矣此賢者所以日削教法所以不競也惟觧而更張之乃為邦之盛節也安民策第四天之生人有耳焉則聲入之矣有目焉則色居之矣有鼻焉則臭昏之矣有口焉則味壅之矣耳之好聲無窮金石不足以聽也目之好色無窮黼黻不足以觀也鼻之好臭無窮鬱鬯非佳氣也口之好味無窮太牢非盛饌也苟不節以制度則匹夫擬萬乗之富或未足以厭其心也故周禮大司徒之職施十有二教其九曰以度教節則民知足謂以法度教民使知尊卑之節則民之所用雖少自知以為足也又以保息六安萬民其六曰同衣服謂民雖有富者衣服不得異皆深衣而巳則貧者安也自周綱觧結禮樂崩壊商賈大者衣必文采食必粱肉因其富厚交通王侯力過吏勢以利相傾千里㳺敖冠盖相望乗堅策肥履絲曵縞兼并豪黨之徒以武斷於鄉曲宗室有土公卿大夫以下争於奢侈室廬輿服僣於上無限度而貪人恣行矣凡風俗之所以薄獄訟之所以繁者民貪故也惟人之飬生豈甚相逺哉食雖豐不過數人之榖也衣雖厚不過數人之帛也一夫之田五畆之桑亦足以自為矣然有粟腐倉而甚於饑錢朽貫而甚於貧藏姦挾詐晝争夜奪如盗賊之為者有由然也天下之材其大者可室也天下之寳其貴者可器也天下之織其巧者可衣也天下之畜其珍者可食也駿可乗也良可御也鄭衛之哇可樂也燕趙之美可妃也昏姻之際賔客之接䘮之有具祭之有品以多為貴以奢為禮婦人婢子愚夫小兒愛樂稱誦習以為俗如是雖窮天地之産安能以濟一民之欲哉故其甚富而貪不可熄也以此細民亦務相師法或有罄一年之蓄而費於數刻冐死亡之辟而資於宴好善士所不能化齊斧所不能威其故非他耻不若人也如使上下有等奢侈有制在埶則尊無列皆賤富不得獨文貧不得獨質萬金之居與下戸為伍則飽食之餘無所復用庶乎亷譲可興而和平可致也安民策第五為國者未有不欲其民富且夀矣薄稅斂所以富之也而水旱乗之民亦弗可得而富也省刑罰所以夀之也而癘疫奪之民亦弗可得而夀也水旱癘疫之來隂陽之不和也夫陽一於復而六於乾隂生於午而成於亥消息有數進退有時非猖狂妄行之物也無形焉盖非逸而動勞而止也無情焉又非與於喜奪於怒也然而不以其叙者有感而應有召而來也洪範九疇二五事一曰貎二曰言三曰視四曰聽五曰思八庶徵曰雨曰暘曰燠曰寒曰風貎曰恭恭作肅肅時雨若謂君行恭則時雨順之言曰從從作乂乂時暘若謂君政治則時暘順之視曰明明作哲哲時燠若謂君能照哲則時暖順之聽曰聰聰作謀謀時寒若謂君能謀則時寒順之思曰睿睿作聖聖時風若謂君能通理則時風順之反是則狂恒雨若謂君行狂妄則恒雨順之僣恒暘若謂君行僣差則恒暘順之豫恒燠若謂君行逸豫則恒煖順之急恒寒若謂君行急則恒寒順之䝉恒風若謂君行蒙暗則恒風順之其傳又曰貎之不恭是謂不肅惟金沴木言之不從是謂不乂惟火沴金視之不明是謂不哲惟水沴火乂之不聰是謂不謀惟土沴水思之不睿是謂不聖惟金木水火土沴由是而言人君五事不修則雨暘燠寒風不以其時水火木金土交相為沴水旱所以狎至癘疫所以放行也然而君人者不以身為身以天下之身為身也不以心為心以天下之心為心也如使下皆狂則上誰與肅下皆僣則上誰與乂下皆豫則上誰與哲下皆急則上誰與謀下皆䝉則上誰與聖故明王欲肅則去下之狂欲乂則去下之僣欲哲則去下之豫欲謀則去下之急欲聖則去下之䝉君明臣忠百姓親睦然後可以致和氣也若能自知而不能知人能自治而不能治人愚者在位貪者在職以戕賊元元家愁戸怨靡所控告是雖堯為天子舜總百揆其何以媚於上下神祗哉故去四㓙舉十六相所以為大功也夫郡守縣令吾民之司命也漢孝宣與良二千石共治顯宗謂出宰百里苟非其人則民受其殃豈徒語哉惟聰明睿智益垂意於任官則烖害可消而富夀在矣安民策第六民之所從非從君也從其令也君之所守非守國也守其令也君端冕乎奥阼之位而民被堅執鋭履膓渉血赴死萬里者令使之也君夙駕乎囿㳺之中而民居處笑語如不知者令不及故也是民從令非從君也封疆有固山川有險人猶踰之比閭小吏執三尺之法則老姦大豪無敢違者是君守國不如守令也君以令用民民以令事君令之所取民亦取之令之所去民亦去之故令可一而不可變也是萬物之四時也天之於物也春夏以出秋冬以内兹四時之常也如使柔風既扇疾雷既奮植者向榮動者起蟄而革之以沈隂亂之以繁霜則勾萌者傷而蠉蝡者死矣唯其鈍而晩出者相賀得計也至秋冬則亦然是則勾芒再至而品物不以為春黄落在兹而智者不以為秋也是故令之於民也與其出而中廢不若勿出之愈也善人見勸而莫肯進懼其令變而不必賞也惡人見禁而莫肯改幸其令變而不必罰也朝一命焉夕一命焉羣吏奉承之不暇愚民惶惑而失圖出令如此不若勿出之愈也先王慎乃出令謂審之於内而後行之於外也其不可乎雖稷契之言臯陶之謨不宜於時不足試也其可乎雖士傳言焉庻人謗焉志之先定不足疑也夫民可與樂成難與慮始昔子産治鄭其始也民疾之曰孰殺子産吾其與之及其乆也民愛之曰子産而死誰其嗣之載使子産聞謗遽改小國之政將何如哉洪範曰庻民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨謂衆民所好不同而君臣政治各有常法不可失政教之常以從民欲也何者善人少而惡人多也明明后誠能謹令之所以出則羣心洗濯知所適從矣安民策第七君者親也民者子也吏者其乳保也親不能自育其子育之者乳保也君不能自治其民治之者官吏也赤子之在襁褓知有乳不知有母也細民之在田野知有吏不知有君也乳之不才則飢之渇之驚之癎之親雖慈不能幸其子以生也吏之不才則窮之役之殺之害之君雖仁不能幸其民以安也然乳保之任不離帷房之間親之卧起可以接也官吏之職必逺畿疆之外君之視聽無由及也是故置吏不可不慎也竊思今之所謂良吏者多不得其𠂻焉不思古道不觀人情各是其所是非其所非而巳其務近名者則曰政必以猛其務隂徳者則曰政必以寛其務自異者則曰前之政猛矣我必以寛前之政寛矣我必以猛其務自守者則曰何必以猛何必以寛斷諸法而已矣是皆一方之論也政必以猛乎其如善人何多其逮捕峻其推鞫苛察則謂之智深文則謂之公火之炎矣無間玉石霜之隕矣孰分蘭蕙仁者之愛果如是哉政必以寛乎其如惡人何弛其囚繫輕其撻戮以容姦為大度以緩令為識體鴟梟鳴樹而弗忍言弋射虎豹食人而弗忍慮機陷義者之斷果如是哉政必改前乎則前人之猛治者皆惡人也我改以寛孰謂可哉前人之寛治者皆善人也我改以猛孰謂可哉政必以法乎則法輕而情重者何以威之哉法重而情輕者何以恩之哉是故近名者刻薄之人也隂徳者柔邪之人也自異者詭激之人也自守者畏愞之人也皆不足以知治體矣仲尼曰寛以濟猛猛以濟寛政是以和盖言寛猛不可偏任也失之於寛則濟以猛失之於猛則濟以寛寛猛並行然後為治也何謂寛猛並行哉於善則寛而於惡則猛也臯陶曰宥過無大刑故無小過雖大而宥其寛也故雖小而刑其猛也明主誠宜處寛猛之用以命羣吏謹察其所為而廢興之則治道一致而百姓阜康矣安民策第八赦者所以恤其民也贖者所以優其臣也民之無狀自䧟罪辜或銜刀於市或刻其肌膚蚤刑暮犯纒綿弗絶繞以叢棘被以五木託身獄吏畢命螻蟻聖人傷焉此赦之所以作也羣公卿士盡瘁爾職以身從君以家徇國而子姪有過或麗於法撻之戮之同夫甿𨽻則耻及其門憂及其親聖人傷焉此贖之所以起也是則惻隠之至念功之著而儒先之論未有言其可者何也所利寡而所害衆也竊迹古先哲王之制刑法非期殺人乃以生人也非欲作威乃以作福也夫物生有類類則有羣羣則相争争則相害是以强者脅弱衆者暴寡智者詐愚勇者苦怯或則以殺或則以傷不有王者作人之相食且盡矣故先王立禮則天之明因地之性刑罰威獄以類天之震曜殺戮也温慈恵和以效天之生殖長育也大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑚鑿薄刑用鞭扑大者陳諸原野小者致之市朝殺人者死然後人莫敢殺傷人者刑然後人莫敢傷弱寡愚怯之民有所頼矣故曰鞭扑不可弛於家刑罰不可廢於國征伐不可偃於天下也若曰有赦焉有贖焉是皆仁者之過也昔王符有言曰賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣其論甚詳前哲稱之然今日之事又甚於古且國之大祀皆有期日天下所與知也必以是時而赦是啓人以惡也挾其姦邪以逞其欲脱身而行避吏幽逺天波一洒復為編戸者所至而見也何百神受職之年有椎埋為姦之弊商旅或不敢越疆孤嫠或不敢出戸此㝠㝠之民無告之甚也又衣冠子孫負勢馳騁禽虜下戸貪暴無厭已之贖金無窮而人之肌肉有盡孰能以敲扑之苦易銖兩之罰哉此又㝠㝠之民無告之甚也與其赦之曷若使畏而不犯與其贖之曷若使耻而不為幸赦而姦卒以不悛人鬼以怒死亡以亟非所以恤之也幸贖而惡終以不悔辱其祖考堕其門閥非所以優之也文中子曰無赦之國其刑必平兹諸葛亮所以治蜀也古者公族其有死罪則磬於甸人其刑罪則纎剸亦告於甸人獄成有司讞於公公三宥之不對走出致刑於甸人故曰公族之罪雖親不以犯有司正術也所以體百姓也公族尚然况其下者乎儻留神明以義割㤙示天下以大公則萬世永頼矣安民策第九先王之道取於民有制計口發財曰賦収其田入曰税賦共車馬兵甲士徒之役充實府庫賜予之用稅給郊社宗廟百神之祀天子奉飬百官禄食庶事之費諸侯亦什一而税大國貢半於天子次國三之一小國四之一皆市取其州美物每嵗貢之故太宰以九貢致邦國之用一曰祀貢謂荆州包茅之屬也二曰嬪貢謂青州之絲枲也三曰器貢謂梁州之銀鐵徐州之磬荆州之丹兖州之漆也四曰幣貢謂雍州之璆琳梁州之熊羆狐狸徐州之纎縞也五曰財貢謂荆州之杶幹栝栢楊州之篠簜也六曰貨貢謂揚州之金貝荆州之大龜也七曰服貢謂豫州之絺紵也八曰斿貢謂徐州之珠荆州之璣雍州之琅玕也九曰物貢謂徐州之魚青州之鹽揚州之橘柚也地之所生各有其宜貢之所入各有其常地宜則物得其性靡不可用也貢常則人知其期靡不必有也益於國而無損於民兹先王之所以冐天下也地不以宜則物不美物不美而責之可用非市於他邦不足以用也貢不以常則人無備人無備而責之必有非買於蓄家不能以有也故取之於非其地求之於非其常皆農人之病而商賈之利也管子曰嵗有凶穣故榖有貴賤令有緩急則物有輕重人君不理則蓄賈游於市乗人之不給百倍其本矣謂上令急於求是物則重緩於求是物則輕賈人務蓄積而須上令之所急求盖有百倍之息也况乎師興之際事出多塗昨求今備猶以為晩市於他邦則民之常産納諸商人之槖買於蓄家則嵗之常用抔諸賈豎之手饑寒之憂不逺而至矣竊惟仁人在上豈欲剿吾民哉以國無素蓄故也物無素蓄則事至而求事至而求則不得其常矣不得其常則懼乎一方不能給也故均之列郡均之列郡則不以其地矣古人有言曰旱則資車水則資舟物理然也夫能以不用為用不急為急物皆有備則國不憂而民不勞矣安民策第十前志有之王法必本於農嗟乎衣食之急生人之大患也仁君善吏所宜孳孳也昔周公遭變陳后稷先公風化之所由致王業之艱難者七月之詩是也其一章曰一之日􅕚發二之日栗烈無衣無褐何以卒嵗此言寒氣至矣人之貴者無衣賤者無褐何以終嵗乎三之日于耜四之日舉趾同我婦子饁彼南畆田畯至喜此言夏正之月始修耒耜其二月舉足而耕耕者之婦子俱以饟耒至於南畆其見田大夫又為設酒食焉言勸其事又愛其吏也其三章則春日既温倉庚既鳴可蠺之候女則遵墻下之徑而求柔桑又感事苦而有與公子同歸之志也其三章則鵙鳴將寒絲事畢而麻事起又染采以為祭服也其四章則取狐貉為裘以助女功既而君臣及民因習兵俱出田也其五章則穹窒熏䑕塞向墐戸以避寒氣而居之也其六章則穫稻為酒以助飬老之具又以瓜瓠麻實乾荼之菜惡木之薪以助男飬農夫也其七章則築塲圃納禾稼野功既畢入治宫中之事晝取茅夜索綯且治野廬之屋而祈來年百榖於公社也其八章則藏氷以備暑國君間於正事而饗羣臣正齒位也是聖人為邦使民男女相助以業衣食田官臨視與在隴畆叙其傷悲時其嫁娶果菜必備室廬必葺憂思勤苦如此之至因其閒暇然後講武事飬耆老饗羣臣正齒位禮義以興王業以成豳有雅頌不其至哉今天下之廣生民之庻天子坐乎法宫之中責成於諸吏之近民者果盡得人耶狃富貴者以田野為鄙事嗜儒雅者以離俗為清賢姦贓庸闇復甚於此纎悉之談何自入哉或獄訟不决經年逮捕或功役繁興連頭驅掠閭里之内煩費百端奪其農耕亂其蠺織徃徃而是也此其無故事有可假法有可誣也誠申命四方以吏課為後以農政為急勸農之官交舉其職時行屬縣問民疾苦土田墾闢稼穡蕃滋百姓樂業而無寃人則書以為功反是則劾以為罪或幾乎農時不違而頌聲可作也旴江集巻十八欽定四庫全書旴江集巻十九宋李覯撰平土書生民之道食為大有國者未始不聞此論也顧罕知其本焉不知其本而求其末雖盡智力弗可為巳是故土地本也耕穫末也無地而責之耕猶徒手而使戰也法制不立土田不均富者日長貧者日削雖有耒耜糓不可得而食也食不足心不常雖有禮義民不可得而教也堯舜復起末如之何矣故平土之法聖人先之夏商以前其傳太簡備而明者莫如周制自秦用商鞅廢井田開阡陌迄今數千百年學者因循鮮能道平土之謂雖道之猶鹵莽未見其詳於戯古之行王政必自此始儒有欲談三王可不盡心哉抑焉知其不復用也於是本諸經該諸傳記條而辯之云一曰按周禮大司徒職曰以土圭之法測土深正日景以求地中日至之景尺有五寸謂之地中乃建王國焉制其畿方千里而封樹之此王畿廣輪之數也二曰按司馬法曰王國百里為郊二百里為州三百里為野四百里為縣五百里為都又按周禮載師職曰以㕓里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地大都之田任畺地杜子春以五十里為近郊百里為逺郊鄭康成以二百里為甸地三百里為稍地四百里為縣地五百里為畺地鄭注不甚詳明其意然也先儒皆同周禮亦謂五百為都其曰甸稍縣都者是也此王國逺近之别也然司馬法與周禮其言頗異意者文王在岐作司馬法及周公攝天子位從而增損之以為周禮乎今本周禮為定下意倣此三曰按大司徒職曰令五家為比使之相保五比為閭使之相受四閭為族使之相𦵏五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔又按遂人職曰五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂皆有地域而溝樹之鄭司農云百里内為六鄉外為六遂康成謂異其名者示相變耳今據百里内近郊逺郊之地也近郊逺郊既為六鄉其餘又以為場圃宅田士田賈田官田牛田賞田牧田也場圃任園地郊甸皆冇之今獨於郊言者畧也百里外甸地也甸地既為六遂其餘又以為公邑之田也司農云賞田者賞賜之田也康成謂圃樹果蓏之屬季秋於中為場樊圃謂之園宅田致仕者之家所受田也士田仕者亦受田所謂圭田也賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田也公邑謂六遂餘地天子使大夫治之自此以外皆然二百里三百里其上大夫如州長四百里五百里其下大夫如縣正是以或謂二百里為州四百里為縣遂人亦監焉家邑大夫之采地小都卿之采地大都公之采地王子弟所食邑也王子弟所食邑亦三等母弟及王之庶子與公同食地在畺稍疏者與卿同食地在縣又疏者與大夫同食地在稍故在下別言王子弟所食邑也然則稍地為家邑縣地為小都畺地為大都其餘亦皆以為公邑也此任地之異也四曰按司馬法曰六尺為歩謂方六尺也歩為方一尺者三十六歩百為畮畮百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同同方百里又按周禮小司徒職曰九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都康成曰此謂造都鄙也采地制井田異於鄉遂九夫為井方一里四井為邑方二里四邑為丘方四里四丘為甸方八里旁加一里則方十里為一成四甸為縣方二十里其實四成也四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也又按匠人職曰一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮康成謂井里之制小司徒經之匠人為之溝洫相包乃成耳又按遂人職曰夫間有遂遂上有徑十夫有溝溝上有畛百夫冇洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿康成謂十夫二鄰之田百夫一鄼之田千夫二鄙之田萬夫四縣之田由斯而言是六遂之地所有田也舉六遂則六鄉自明矣此制田之例也然司馬法又與周禮之言有異司馬法有歩畮夫屋井周禮如之但不别為屋耳司馬法十井為通十通為成周禮則四井為邑四邑為丘四丘為甸一甸旁加一里為成司馬法十成為終十終為同周禮則四成為縣四縣為都四都旁加十里為同又司馬法止為一制無逺近之殊周禮則三百里以外都鄙為井田鄭云都鄙王子弟公卿大夫采地其界曰都鄙所居也二百里以内鄉遂為十夫百夫千夫萬夫則是殊制矣今亦本周禮為定五曰按康成注葢依王制凡地除山陵林麓川澤溝瀆城郭宫室涂巷三分去一其餘以為田覯謂王制之云抑未為得康成取之良誤矣夫山川之廣狹自非目見不可以億度者也地埶或數百里平易無山川者或聫屬有之城郭涂巷之類又不得知其多少載使山川之廣城郭涂巷之多則三分地或不止占一分也山川之狹城郭涂巷之少則三分地或不能占一分矣以是而云三分去一未知何從得之也今覯所計秪除王城及五溝五涂有成數可見者裁去之自餘悉以平地例為田其中所有山川城郭等占廢令執事者自依所占丈尺裁去之定法之始不宜豫言也且經所謂方十里為成方百里為同亦皆以平地例制之耳未嘗言有外物占其間也推此以往他可知矣六曰按匠人職遂廣二尺深二尺溝廣四尺深四尺洫廣八尺深八尺澮廣二尋八尺曰尋鄭注重屋義然深二仞而遂人職遂溝洫澮川皆無尺數康成謂遂溝洫澮皆所以通水於川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仞以南畮圗之則遂從溝横洫從澮横九澮而川周其外焉其尺數皆依匠人是則經之互文明矣而川之廣深康成不解賈釋云此川亦人造雖無丈尺之數葢亦倍澮耳是則川廣四尋深四仞也又遂人職遂上有徑溝上有畛洫上有涂澮上有道川上有路康成謂徑畛涂道路皆所以通車徒於國都也徑容牛馬畛容大車涂容乘車一軌八尺曰軌鄭注經涂義然道容二軌路容三軌覯謂涂容乘車一軌廣八尺也然則畛四尺徑二尺明矣鄭云徑容牛馬畛容大車謂容大車一軌廣六尺然皆無文可據以意言之耳既以涂依洫廣道依澮廣則徑畛自可依遂溝二尺四尺也而匠人職遂溝洫澮康成云遂上亦有徑覯謂既以互文觀之則溝上亦有畛洫上亦有涂澮上亦有道也其尺數亦如之矣然此五溝五涂所占不寡而康成之注止以萬夫為方三十三里少半里一甸為方八里旁加一里為一成絶不言溝涂所占若以溝瀆涂巷巳在三分去一之數則此五溝五涂者本經緯於田間固不別在一處苟田在於此而溝在於彼則云巳在三分去一之數可也今田與溝混在一處則萬夫不得止方三十三里少半里一甸不止方八里也若以溝涂不别出秪就減夫田為之則名為授田百畮而又以溝涂占之非所以損上益下之義也且遂徑至小而川路至大臨遂徑者則所減甚少臨川路者則所減甚多名曰平土其實不平至矣是豈聖人之意乎今覯悉計出之見於後然萬夫則於舊三十三里少半里之外有所増占一甸則雖於舊八里之外亦有所増占其如有旁加一里因就用之固猶不出一成之内其要皆在以官地為溝涂不害民田而已耳抑又鄉遂之地一統於公故三十三里少半里之外可以増占都鄙受封各有里數故一成之外不可别求雖封邑不止于一成然自一成為之始則其餘方免不足也七曰按萬夫舊方三十三里少半里凡數三分有一為少半則是三十三里一百歩也三百歩為一里萬夫之間自東至西九十遂九十徑遂廣二尺徑廣二尺則六十歩也此歩直謂廣六尺不言方也後以意察之九洫九涂洫廣八尺涂廣八尺則二十四歩也兩旁二川三路川廣四尋為三十二尺路廣三軌為二十四尺則一十八歩有四尺也東西計増一百二歩有四尺自南至北九十溝九十畛溝廣四尺畛廣四尺則一百二十歩也九澮九道澮廣二尋為一十六尺道廣二軌為一十六尺則四十八歩也兩旁二川二路其廣同之則一十八歩有四尺也南北計増一百八十六歩有四尺東西増一百二歩有四尺并舊三十三里一百歩通計三十三里二百二歩有四尺南北増一百八十六歩有四尺并舊三十三里一百歩通計三十三里二百八十六歩有四尺又以所増之地拆之為夫以舊方三十三里一百歩歸為萬夫外所増者并筭之則東西所増從一百二歩有四尺横三十三里一百歩求歩得一百二萬歩其竒以為尺則得二十四萬尺南北所増從一百八十六歩有四尺横三十三里二百二歩有四尺求歩得一百八十七萬八千九百七十二歩其竒以為尺則得二十四萬六千九百二十八尺積尺得四十八萬六千九百二十八尺歸之為歩又為一萬三千五百二十五歩二十八尺此以三十六尺為方一歩也積歩得二百九十一萬二千四百九十七歩二十八尺歩百為畮畮百為夫是為二百九十一夫二十四畮九十七歩二十八尺每萬夫并五溝五涂所占通計一萬二百九十一夫二十四畮九十七歩二十八尺也八曰按五十里為近郊以兩面合言之方百里也王城當中方九里自王城四面拒于近郊之表各從四十五里有半其横各百里以萬夫如舊方三十三里一百歩則面可置三萬夫今既増之則不能容適可置二萬夫矣且以城之外則有野涂毎面三門固有三涂其埶必當中間直出于郊則二萬夫須避而處兩角以每面而視之則各有二萬夫統而論之則四角纔四萬夫也百里為逺郊以兩面合言之方二百里也自近郊之表拒于逺郊之表各從五十里其横各二百里東西二面各可置五萬夫南北二面各可置三萬夫皆以地形相軋纔足容此一十六萬夫也二百里為甸地以兩面合言之方四百里也自逺郊之表拒于甸地之表各從一百里其横各四里東西二面各可重行置二十萬夫外行一十一萬夫裏行九萬夫南北二面各可重行置一十六萬夫外行九萬夫裏行七萬夫亦皆以地形相軋纔足容此七十二萬夫也其餘皆不方正不可為萬夫之川其數見於後九曰按近郊之内方百里為方一里者萬凡里九夫則九萬夫也除王城九里為方一里者八十一是為七百二十九夫其餘方一里者九千九百一十九為八萬九千二百七十一夫四角置四萬夫之田每萬夫并五溝五涂所占共一萬二百九十一夫二十四畮九十七歩二十八尺四段通計四萬一千一百六十四夫九十九畮九十一歩有四尺外猶有四萬八千一百六夫有八歩三十二尺此地不方正不可為萬夫之川也十曰按逺郊之内方二百里為方一里者四萬凡里九夫則三十六萬夫也除近郊之内巳占方一里者萬為九萬夫則此逺郊方一里者三萬為二十七萬夫四面置一十六萬夫之田每萬夫并五溝五涂所占共一萬二百九十一夫二十四畮九十七歩二十八尺十六段通計一十六萬四千六百五十九夫九十九畮六十四歩一十六尺東面一行五萬夫前筭每萬夫各有川路四周其外葢如近郊四萬夫在四角不相接者也今此五萬夫成列則其間當省四川四路謂自西而東者凡一川一路南北之廣几歩二尺東西之長三十三里二百二歩有四尺求歩得九萬九百一十八歩其竒以為尺則得一十二萬一千四百四十八尺歸之於歩又為三千三百七十三歩二十尺積歩得九萬四千二百九十一歩二十尺歩百為畮畮百為夫是為九夫四十二畮九十一歩二十尺此五萬夫之間所省四川四路共省三十七夫七十一畮六十六歩有八尺西面亦如之南面一行三萬夫其間當省二川二路謂自北而南者凡一川一路東西之廣九歩二尺南北之長三十三里二百八十六歩有四尺求歩得九萬一千六百七十四歩其竒以為尺則得一十二萬二千四百五十六尺歸之於歩又為三千四百有一歩二十尺積歩得九萬五千七十五歩二十尺歩百為畮畮百為夫是為九夫五十畮七十五歩二十尺此三萬夫之間所省二川二路共省一十九夫有一畮五十一歩四尺北面亦如之四面共省一百一十三夫四十六畮三十四歩二十四尺卻於上十六段一十六萬四千六百五十九夫九十九畮六十四歩一十六尺之内除此一百一十三夫四十六畮三十四歩二十四尺外猶占一十六萬四千五百四十六夫五十三畮二十九歩二十八尺逺郊二十七萬夫除此十六段占一十六萬四千五百四十六夫五十三畮二十九歩二十八尺外猶占二十萬五千四百五十三夫四十六畮七十歩有八尺此地亦不方正不可為萬夫之川也十一曰按甸地之内方四百里為方一里者一十六萬凡里九夫則一百四十四萬夫也除逺郊之内已占方一里者四萬為三十六萬夫則此甸地方一里者一十二萬為一百八萬夫四面置重行七十二萬夫之田每萬夫并五溝五涂所占共一萬二百九十一夫二十四畮九十七歩二十八尺七十二段通計七十四萬九百六十九夫九十八畮四十歩東面外行一十一萬夫其間省十川十路每一川一路計九夫四十二畮九十一歩三十尺共省九十四夫二十九畮一十五歩二十尺東面裏行九萬夫其間省八川八路共省七十五夫四十三畮三十二歩一十六尺上兩行中間又省一横川一横路謂自北而南横亘九萬夫前筭每萬夫南北廣三十三里二百八十六歩有四尺九萬夫南北共廣三百五里一百八十歩今以其間先巳既省八川八路每一川一路南北廣九歩二尺八川八路共巳省七十四歩有四尺九萬夫猶廣三百五里一百五歩有二尺則此川路横三百五里一百五歩有二尺從九歩有二尺求歩得八十二萬四千四百四十五歩其竒以為尺則得一百九萬九千三百七十二尺歸之於歩又為三萬五百三十八歩有四尺積歩得八十五萬四千九百八十三歩有四尺歩百為畮畮百為夫則此一横川一横路所省八十五夫四十九畮八十三歩有四尺凡東面兩行二十段之間省十八川十八路及一横川一横路共省二百五十五夫二十二畮三十一尺有四步西面亦如之南面外行九萬夫其間省八川八路每一川一路計九夫五十畮七十五歩二十尺共省七十六夫有六畮四歩一十六尺南面裏行七萬夫其間省六川六路共省五十七夫有四畮五十三歩一十二尺上兩行中間又省一横川一横路謂自西而東横亘七萬夫前筭每萬夫東西廣三十三里二百二歩有四尺七萬夫東西共廣二百三十五里二百一十八歩有四尺今以其間先槩省六川六路每一川一路東西廣九歩二尺六川六路共巳省五十六歩七萬夫猶廣二百三十五里一百六十二歩有四尺則此川路横二百三十五里一百六十二歩有四尺從九歩有二尺求歩得六十三萬五千九百五十八步其竒以為尺則得八十四萬八千一百六十八尺歸之於歩又為三萬三千五百六十歩有八尺積歩得六十五萬九千五百一十八歩有八尺歩百為畮畮百為夫則此一横川一横路所省六十五夫九十五畮一十八歩有八尺凡南面兩行一十六段之間省十四川十四路及一横川一横路共省一百九十九夫有五畮七十六歩北面亦如之四面共省九百八夫五十六畮一十四歩有八尺卻於上七十二段七十四萬九百六十九夫九十八畮四十歩之内除此九百八夫五十六畮一十四歩有八尺外猶占七十四萬有六十一夫四十二畮二十五歩二十八尺甸地一百八萬夫除此七十二段占七十四萬有六十一夫四十二畮二十五歩二十八尺外猶有三十三萬九千九百三十八夫五十七畮七十四歩有八尺此地亦不方正不可為萬夫之川也是鄉遂之田制備矣十二曰按一甸舊方八里旁加一里為成成方十里也一甸之田方八里中有六十四井自東至西八井也井有九夫自東至西三夫也三夫之間則有二遂二徑遂廣二尺徑亦二尺八井則有十六遂十六徑八井之間及兩旁則有九溝九畛溝廣四尺畛亦四尺遂徑溝畛共増二十二歩有四尺南北亦如之凡此井田為溝洫異於鄉遂萬夫此每夫之四面從横皆為遂井之四面從横皆為溝以至於邑丘甸不復別為限隔旁加為成乃為洫焉成之四面從横皆為洫以至於縣都亦不復别為限隔四都旁加為同乃為澮周其外焉十里之中既取八里二十二歩有四尺以為一甸之田及遂徑溝畛外止有一里二百七十七歩有二尺每面分得二百八十八歩有四尺乃以二百歩為二夫之田從二夫也二夫之間及其外又以一歩二尺為二遂二徑則計二百一歩二尺矣其餘更有八十七歩二尺成之每面又為一洫一涂洫廣八尺涂亦八尺然多是兩成相接平分之則此面占一歩二尺以八十七歩二尺又除此一歩二尺餘止有八十六歩矣今以二夫之田為二行前以二百歩為二夫者也又以八十六歩為一行共三行也四面每面内第一行横列二十四夫四角又四夫共一百夫每面第二行二十六夫四角又四夫共一百八夫第三行不成夫者以畮言之四面每面横一百歩從八十六歩者二十八段共一百一十二段每段為方一歩者八千六百是為八十六畮四角每角方八十六歩者一段共四段每段為方一歩者七千三百九十六是為七十三畮九十六歩積畮得九千九百二十七畮八十四歩每段巳有遂徑溝畛間之不復計為夫矣一成之中除一甸之田及遂徑溝畛洫涂所占外旁加更得田二百八夫其不成夫者又得九千九百二十七畮八十四歩鄭云旁加一里謂加一井也今此不得為井矣又計成之面横百歩者二十八横八十六歩者二共横二千九百七十二歩又其間為二十遂二十徑九溝九畛兩旁二半洫二半涂共横二十八歩通計三千歩凡三百歩為一里此横十里畧無差也四面皆然四成為縣經曰四甸其實四成也四縣為都四都六十四成也方八十里旁加十里加一成也為百里謂之一同一同百成矣前筭成法每一成合各為一洫一涂四周其外然以多是兩成相接故平分之各占半洫半涂今此一同百成其中六十四成四面皆有接每面各秪占半洫半涂如前法矣至於旁加三十六成則四旁三十二成各一面無接四角四成各回曲兩面無接也既無接則當為全洫全涂乎曰否凡一同之外當為澮與道也澮周於同道周於澮若是則須變半洫半涂以為一澮一道也半洫半涂其廣一歩二尺一澮一道其廣五歩二尺然則増四歩也三十二成各一面無接變其一靣半洫半涂以為一澮一道澮道所増之地横十里從四歩求歩得一萬二千内除横二十八歩從四歩前是二十遂二十徑九溝九畛二半洫二半涂皆為從者展計一百一十二歩外猶占一萬一千八百八十八歩歩百為畮是為一百一十八畮八十八歩前筭一成之田其不成夫者猶得九千九百二十七畮八十四歩今復増此澮道所占一百一十八畮八十八歩外止有九千八百八畮九十六歩四成皆囬曲兩面無接變其兩面之半洫半涂以為一澮一道一面如上所計増占一百一十八畮八十八歩一面横九里二百九十六歩本十里也其四歩已人右面所計矣從四歩求歩得一萬一千九百八十四歩内除横二十六歩四尺從四歩前是二十遂二十徑九溝九畛一半洫一半涂一半洫一半涂已在所刻退四歩之地矣展計一百四歩其竒以為尺則得九十六尺歸之於歩又為二歩二十四尺通計一百六歩二十四尺外猶占一萬一千八百七十七歩一十二尺歩百為畮是為一百一十八畮七十七歩一十二尺前筭一成之田其不成夫者猶得九千九百二十七畮八十四歩今復増此兩面澮道所占共二百三十七畮六十五歩一十二尺外止有九千六百九十畮一十八歩二十四尺一同百里為方一里者萬凡里九夫則九萬夫也今此筭一同百成成中一甸甸六十四井井九夫是為五百七十六夫旁加又得二百八夫總計七百八十四夫百成則七萬八千四百夫也其不成夫者於中六十四成成有九千九百二十七畮八十四歩縁邉三十六成其三十二成成有九千八百八畮九十六歩又四成成有九千六百九十畮一十八歩二十四尺百成通計九十八萬八千二十九畮二十二歩二十四尺一切以夫折之則又為九千八百八十夫二十九畮二十二歩二十四尺統論之則一同之地為田八萬八千二百八十夫二十九畮二十二歩二十四尺其餘盡以為遂徑溝畛洫涂澮道也以九萬夫言之則遂徑溝畛洫涂澮道所占一千七百一十九夫七十畮七十七歩一十二尺雖然此獨以一同言之耳如兩同相接則又省焉别見於後今據稍縣都並是兩同相接無用此制然述法之始須先定一同而後可議其有接無接故特先為此制也亦恐山川隔破其間或有獨置一同之處焉耳經曰同間謂之澮誠謂兩同間為一澮也洫以下意亦同以都鄙而形鄉遂是以前二萬夫之間皆省一川也十三曰按稍地二十同其十六同各三面有接一面無接抵甸地也甸地雖有萬夫之川與之相接然其制度不同故此稍地別為澮道若無接然也其四同各四面皆有接在四角也十六同各三面有接一面無接每同無接之面凡十成中間八成每成之一面變其半洫半涂以為一澮一道如前所計每成増占一百一十八畮八十八歩外其不成夫之田猶有九千八百八畮九十六歩左右二成每成之一面變其半洫半涂以為一澮一道亦如前所計每成増占一百一十八畮八十八歩又一面變其半洫半涂以為半澮半道以囘曲故此一面又變之然與他同接故但為半澮半道半洫半涂共八尺半澮半道共一十六尺然則増一歩二尺地矣所増之地横九里二百九十六歩本亦十里也其四歩巳入右面所計矣從一歩二尺求歩得二千九百九十六歩其竒以為尺則得三萬五千九百五十二尺歸之於歩又為九百九十八歩二十四尺積歩得三千九百九十四歩二十四尺内除横二十六歩四尺從一歩二尺前是二十遂二十徑九溝九畛一半洫一半涂一半洫一半涂已在所刻退四歩之内矣展計二十六歩其竒以為尺則得三百四十四尺歸之於歩又為九歩二十尺通計三十五歩二十尺外猶占三千九百五十九歩有四尺歩百為畮是為三十九畮五十九歩有四尺每成兩面増占一百五十八畮四十七歩有四尺外其不成夫之田猶有九千七百六十九畮三十六歩三十二尺有接之面凡二十六成二十四成處三面每面八成每成之一面變其半洫半涂以為半澮半道所増之地横十里從一歩二尺求歩得三千歩其竒以為尺則得三萬六千尺歸之於歩又為一千歩積歩得四千歩内除横二十八歩從一歩二尺前是二十遂二十徑九溝九畛二半洫二半涂展計二十八歩其竒以為尺則得三百三十六尺歸之於歩又為九歩一十二尺通計三十七歩一十二尺外猶占三千九百六十二歩二十四尺歩百為畮是為三十九畮六十二歩二十四尺每成除此澮道増占三十九畮六十二歩二十四尺外其不成夫之田猶有九千八百八十八畮二十一歩一十二尺二成處兩角每成之一面變其半洫半涂以為半澮半道如前所計増占三十九畮六十二歩二十四尺又一面亦變其半洫半涂以為半澮半道皆以囘曲故又變之所増之地横九里二百九十八歩四尺本亦十里也其一歩二尺巳入右面所計矣從一歩二尺求歩得二千九百九十八歩其竒以為尺則得三萬六千有八尺歸之於歩又為一千歩有八尺積歩得三千八百九十八歩有八尺内除横二十六歩四尺從一歩二尺前是二十遂二十徑九溝九畛一半洫一半涂一半洫一半涂已在所刻退之一歩二尺之地展計三十五歩二十尺展歩尺之詳見上此後凡不相筭而但言成數者葢前有類者矣覆尋之可見也外猶占三千九百六十二歩二十四尺歩百為畮是為三十九畮六十二歩二十四尺每成兩面増占七十九畮二十五歩一十二尺外其不成夫之田猶有九千八百四十八畮五十八歩二十四尺每同百成總計七萬八千四百夫其不成夫者於中六十四成成有九千九百二十七畮八十四歩縁邉三十六成其八成成有九千八百八畮九十六歩其二成成有九千七百六十九畮三十六歩三十二尺又二十四成成有九千八百八十八畮二十一歩一十二尺又二成成有九千八百四十八畮五十八歩二十四尺百成通計九十九萬四百六畮四十七歩有四尺一切以夫折之則又為九千九百四夫六畮四十七歩有四尺統論之則此一同之地為田八萬八千三百四夫六畮四十七歩有四尺其餘盡以為遂徑溝畛洫涂澮道也以九萬夫言之則遂徑溝畛洫涂澮道所占一千六百九十五夫九十三畮五十二歩三十二尺四同各四面皆有接每同四面三十二成成之一面變其半洫半涂以為半澮半道每成増占三十九畮六十二歩二十四尺外其不成夫之田猶有九千八百八十八畮二十一歩一十二尺四角四成各回曲兩面變其半洫半涂以為半澮半道每成増占七十九畮二十五歩一十二尺外其不成夫之田猶有九千八百四十八畮五十八歩二十四尺每同百成總計七萬八千四百夫其不成夫者於中六十四成成有九千九百二十七畮八十四歩縁邉三十六成其三十二成成有九千八百八十八畮二十一歩一十二尺其四成成有九千八百四十八畮五十八歩二十四尺百成通計九十九萬一千一百九十八畮九十三歩一十二尺一切以夫折之則又為九千九百一十一夫九十八畮九十三歩一十二尺統論之則此一同之地為田八萬八千三百一十一夫九十八畮九十三歩一十二尺其餘盡以為遂徑溝畛洫涂澮道也以九萬夫言之則遂徑溝畛洫涂澮道所占一千六百八十八夫有一畮六歩二十四尺凡稍地二十同同九萬夫合計一百八十萬夫今積得田一百七十六萬六千一百一十二夫九十九畮二十七歩有四尺葢其餘盡以為遂徑溝畛洫涂澮道也以一百八十萬夫言之則遂徑溝畛洫涂澮道所占三萬三千八百八十七夫七十二歩三十三尺十四曰按縣地二十八同各四面皆有接其制如稍地之角角置四同者也二十八同同九萬夫合計二百五十二萬夫今積得田二百四十七萬二千七百三十五夫七十畮一十三歩一十二尺葢其餘盡以為遂徑溝畛洫涂澮道也以二百五十二萬夫言之則遂徑溝畛洫涂澮道所占四萬七千二百六十四夫二十九畮八十六歩二十四尺十五曰按畺地三十六同其三十二同各三面有接一面無接其制如稍地之正正置十六同者也四角四同各二面有接二面無接囘曲故也每同前左右兩行一十六成以自内視角為前每成之一面變其半洫半涂以為一澮一道計増占一百一十八畮八十八歩外其不成夫之田猶有九千八百八畮九十六歩後左右兩行一十六成每成之一面變其半洫半涂以為半澮半道計増占三十九畮六十二歩二十四尺外其不成夫之田猶有九千八百八十八畮二十一歩一十二尺前角一成變其兩面各半洫半涂以為一澮一道計其増占二百三十七畮六十五歩一十二尺外其不成夫之田猶有九千六百九十畮一十八歩二十四尺左右兩角二成每成之一面變其半洫半涂以為一澮一道又一面變其半洫半涂以為一澮一道又一面變其半洫半涂以為半澮半道計共増占一百五十八畮四十七歩有四尺外其不成夫之田猶有九千七百六十九畮三十六歩三十二尺後一角一成其兩面各變其半洫半涂以為半澮半道計共増占七十九畮二十五歩一十二尺外其不成夫之田猶有九千八百四十八畮五十八歩二十四尺每同百成總計七萬八千四百夫其不成夫者於中六十四成成有九千九百二十七畮八十四歩縁邉三十六成其一十六成成有九千八百八畮九十六歩又一十六成成有九千八百八十八畮二十一歩一十二尺又一成有九千六百九十畮一十八歩二十四尺又二成成有九千七百六十九畮三十六歩三十二尺又一成有九千八百四十八畮五十八歩二十四尺百成通計九十八萬九千六百一十四畮有四歩一十六尺一切以夫折之則又為九千八百九十六夫一十四畮有四歩一十六尺統論之則此一同之地為田八萬八千二百九十六夫一十四畮有四歩一十六尺其餘盡以為遂徑溝畛洫涂澮道也以九萬夫言之則遂徑溝畛洫涂澮道所占一千七百有三夫八十五畮九十五歩二十尺凡畺地三十六同同九萬夫合計三百二十四萬夫今積得田三百一十七萬八千九百一十四夫六十三畮二十五歩一十二尺葢其餘盡以為遂徑溝畛洫涂澮道也以三百二十四萬夫言之則遂徑溝畛洫涂澮道所占六萬一千八十五夫三十六畮七十四歩二十四尺凡五涂各有所隔徑隔於溝畛隔於洫涂隔於澮道隔於川所隔之處必有橋焉川之水必决路而洩之以歸於大川各随地埶所向不可定其隔處井田之徑畛涂道亦如鄉遂為橋澮之水亦洩而歸諸大川也司險職曰周知其山林川澤之阻而達其道路康成謂川澤之阻則橋梁之下文曰設國之五溝五涂而達其道路康成雖不復解然以上文觀之此為橋梁亦明矣匠人職澮之下曰専逹於川各載其名盖謂大川也以此察彼知其皆然是都鄙之田制備矣十六曰或曰大哉王畿之廣輪王國之逺近任地之異制田之例山川之不億度溝涂之有増占自萬夫以至于一同自近郊以至于畺地繄子之論詳矣其所以授於民多少之數可得而聞與曰夫治民必先定其居處而後可使之樂業也故司空執度度地以居民正為此焉今六鄉六遂各七萬五千家也然此纔謂農民其餘有百工商賈庶人在官者凡此之類抑又多矣載師職曰以㕓里任國中之地康成謂㕓民之區域也里居也遺人職曰掌鄉里之委積以恤民之囏阨康成謂鄉里鄉所居也縣師職曰掌邦國都鄙稍甸郊里之地域康成謂郊里郊所居也賈釋云鄉里據國中即六鄉之民居在國中載師以㕓里所任地是也郊里據在郊即六鄉之民所居郊者也然則六鄉之居布在國中外至近郊逺郊也遂人職曰辨其野之土以頒田里夫一㕓田百畮則六遂之居在甸地者也舊說㕓者二畮半一家之居孟子曰五畮之宅樹之以桑當從孟子五畮為正甸地既一㕓五畮則郊内國中亦各五畮也然康成注遂人謂㕓城邑之居注載師云以㕓里任國中而遂人職授民田夫一㕓田百畮是㕓里不謂民之邑居在都城者與鄭意以六遂之民雖田在甸地而居於國中且甸地於國二百里也去家二百里而耕孰為便哉抑王城方九里為方一里者八十一凡里九百畮為七萬二千九百畮盡以為遂民之居一家五畮纔可容萬四千五百八十家况王宫祖社朝市國宅之屬及鄉民所居在其中乎則六遂七萬五千家於何置之苟鄭意都城是都邑之城則六遂所管與都邑異遂民不可越在都邑也又其往來亦非近矣且康成既以六鄉之居有在於郊則六遂之民奚為不可居甸乎是失之甚矣大司徒職曰凡造都鄙制其地域而封溝之以其室數制之康成亦謂城郭之宅曰室葢鄭以六遂居在國中故於都邑亦云室在城郭也其經意但以室數為家數豈分於城之内外與其實采地之民或居城郭或在野焉其地葢亦不出一㕓五畮之數也或曰敢問莫非王民也而吾子之論以六鄉為農人而百工商賈之類不與其數何哉覯觀鄭注則然且裁其理至當矣夫農人國之本也三時力耕隙而講武以之足食以之足兵或致之於庠序習禮義為賢才是天民之良者也故為之鄉為之遂以編著之而統于司徒司徒教官也若夫工商之類棄本逐末但以世資其用不可無之安足比於農人哉抑其各有所統工則統於司空賈則統於司市庶人在官者各統於其官府其餘皆然雖不繫於鄉遂可也曰既不繫於鄉遂則其所處郊乎國乎曰聖王敦本尚儉雖有工賈必不甚衆庶人在官者亦有常數其餘益寡矣國中或可以居之抑其朝夕有事於市朝當在國中乃為便也十七曰或曰奠民之居既承教矣耕田之數願聞其悉曰按大司徒職曰凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮此都鄙授田之制也不易之地嵗種之故家百畮一易之地二嵗一種故家二百畮再易之地三嵗一種故家三百畮以地利有厚薄宜差之也又遂人職曰辨其野之土上地夫田百畮萊五十畮餘夫亦如之中地夫田百畮萊百畮餘夫亦如之下地夫田百畮萊二百畮餘夫亦如之此六遂授田之制也亦以地利有厚薄故差其萊數以平之萊田之休不耕者也至六鄉之田未見明文惟小司徒職云乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人以覯觀之若以為都鄙六遂乎則中地下地巳増其田萊畮數榷其收入亦必無偏不容更有七人六人五人所食之差也此盖是六鄉授田之制以郊地狹隘而六鄉分之矧塲圃宅田士田賈田官田牛田賞田牧田在其間則雖有中地下地不得更増其畮數但以其家人多少制之七口以上則授之以上地六口則授之以中地五口以下則授之以下地焉其實皆百畮也地有九等所養男女自二人以至十人七六五者舉中地之三等而言也今據逺郊之内田二十萬夫近郊四萬夫逺郊十六萬夫其不為萬夫之川者又有一十五萬三千五百五十九夫四十六畮七十九歩四尺近郊四萬八千一百六夫有八歩三十二尺逺郊一十萬五千四百五十三夫四十六畮七十歩八尺葢以為六鄉之田也里也里居也塲圃也宅田也士田也賈田也官田也牛田也賞田也牧田也其餘則王城之外有環涂環涂七軌有野涂野涂五軌有郊四郊皆有神兆有明堂明堂在國之陽三里之外七里之内丙已之地宫方三百歩有藉田藉田千畮有學虞庠在國之西郊有榭榭所以講軍實足以臨見王之士卒而已其所不奪穯地瘠磽之地於是乎為之其埶須在城之外也亦或有山陵林麓川澤溝瀆之跨其地其不為萬夫之川者亦未計出五溝五涂所占也下同又其餘則以待餘夫也或曰郊内無餘夫之文子何以言之曰六鄉之人不得不有餘夫且舉遂則鄉可知矣亦計郊内地猶有以待之也甸地之田七十二萬夫其不為萬夫之川也又有三十二萬九千九百三十八夫五十七畮七十四歩八尺盖以為六遂之田也㕓也其餘亦或有山陵林麓川澤溝瀆之跨其地又其餘則以為公邑也或曰子既言鄉有餘夫而於遂何以不言且遂人職巳著之矣曰遂之餘夫所受之田屬公邑耳不可析言也遂之家數與田既有定限其地域且溝樹之矣若有餘夫其田何從而得必外取於公邑焉曰然則六鄉餘夫所受之田何以不為公邑曰郊内地狹其隙者必不甚多且近偪王國故雖以待餘夫不復別稱為公邑也或曰公邑獨遂之餘夫耕之乎曰不然康成謂士工商以事入在官而餘夫以力出耕公邑覯謂亦非獨士工商而已也雖庶人在官者畜牧之家之餘夫亦出耕於此焉民之生息嵗月浸多積數世之後其餘夫豈可勝數公邑雖廣或弗能容矣是聖人先有以待之也若稍以外則八十四同稍地二十同縣地二十八同畺地三十六同除名山大澤不以朌凡當山陵林麓川澤溝瀆不廢悉以班之其餘以為王子弟食邑公卿大夫采地又其餘則以為公邑也其食邑采地之内則自以授其所管之民其餘亦或有山陵林麓川澤溝瀆之跨其地又其餘則以待餘夫也又弗能容則亦當出耕於其所近公邑其人則繫於都鄙其田稅則歸於王官是公私兩利之意也或曰遂人云萬夫有川川上有路以達於畿康成謂去山陵林麓川澤溝瀆城郭宫室涂巷三分之制其餘如此以至於畿康成固知都鄙為井田矣則其意謂公邑自稍以外亦如甸地為萬夫之川與曰是康成之誤也此川上有路以達於畿止謂由此路而往可通於畿耳以明其所以為道路於田間者非妄也將以利往來之人内通於國外通於畿國近而畿逺逺之可達近可知矣是以省文言畿而不言國也非謂一槩為萬夫之川以至於畿也且自稍以外公邑誠以采邑之餘一切使大夫治之後復欲爵禄於人又取之以為采邑也公卿大夫寔有定員若有王子弟則世世生息安有紀極是采邑之増無世無之苟今公邑盡為萬夫之川他日造都鄙為井田又當改作乎何勞力之甚也若造都鄙而循用萬夫之川非制也以覯論之甸地公邑自依六遂萬夫之川稍縣畺地公邑亦循都鄙井田之制或近或逺隨宜而變於義當矣或曰都鄙授田則有不易百畮一易二百畮再易三百畮凡三等遂地授田則有上地田百畮萊五十畮中地田百畮萊百畮下地田百畮萊二百畮凡三等鄉地授田則有上地家七人中地家六人下地家五人雖以地利差其口數其田實皆百畮凡一等而康成之義自六鄉以及甸稍縣都悉以不易一易再易通率之云一家受二夫且不易一易再易獨是都鄙授田之制豈可以包鄉遂乎曰康成固妄矣非徒不可以包鄉遂也雖都鄙之制有不易一易再易然須定有一百畮不易者二百畮一易者三百畮再易者合六百畮而三家受之此則可云通率一家受二夫也若多少稍差則巳失之矣况其積筭數百萬夫而乃公言通率一家受二夫何其徒用心哉今則皆不取焉但備舉鄉遂都鄙授田之明制使執事者躬相地宜而頒之不敢以預言也十八曰或問田里之論則然矣其王子弟食邑公卿大夫采地小大之法何如曰康成謂其制三等百里之國凡四都一都之田稅入於王五十里之國凡四縣一縣之田稅入於王二十五里之國凡四甸一甸之田稅入於王其意以公采地為一等百里之國也王之母弟及庶子同卿采地為一等五十里之國也稍疏者同大夫采地為一等二十五里之國也最疏者同又其注載師謂家邑大夫之采地小都卿之采地大都公之采地王子弟所食邑然則三公百里之國在畺地卿五十里之國在縣地大夫二十五里之國在稍地也畺地三十六同同為百里之國一是為三十六國也縣地二十八同同為五十里之國四是為一百一十二國也稍地二十同同為二十五里之國十有六是為三百二十國也此其大畧耳苟有名山大澤占之則依所占減焉或王子弟公卿大夫人數少食之不盡則以其餘為公邑以俟後耳然今按周禮公三人其鄉老二鄉則公一人盖此三公兼之卿十有五人三孤六官及六卿大夫每鄉卿一人大夫則冬官巳亡唯五官在五官之屬大夫三百三十七人煩不備舉若加以冬官之屬及公邑又别有大夫治之其數盖不下四百人也今稍地為二十五里之國三百二十或有名山大澤占之則從而減焉又王子弟最疏者之所食在其中若是大夫之邑其不足者多矣然縣地為五十里之國一百一十二雖有名山大澤占之及王子弟稍疏者之所食在其中而卿止於十有五人其餘地盖尚多也大夫之邑不足其取諸此乎雖王之母弟庶子衆多畺地弗能容之取於此亦可也又其餘乃以為公邑焉或曰禮云天子立三公九卿二十七大夫八十一元士於周禮何其不同也曰此夏禮而商因之者也其地則公百里卿七十里大夫五十里至周則自卿以下增其員而減其祿盖後世政事漸繁事繁則官不得不増官多則祿不得不減勢使然也十九曰或人請問賦稅之法覯對曰按太宰職以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦餘三者不出於田里故不舉康成謂賦口率出泉也今之筭泉民或謂之賦此其舊名與鄉大夫以嵗時登其夫家之衆寡辨其可任者皆征之遂師之職亦云以令其財征皆謂此賦也是則周時巳如漢筭泉但漢法筭泉人百二十周之賦泉數則未聞矣又按載師職曰凡任地國宅無征園㕓二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五此征則皆指田稅也康成謂國宅凡官所有宫室吏所治者也周稅輕近而重逺近者多役也園㕓亦輕之者㕓無榖園少利也經又曰凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征康成亦謂宅不毛者罰以一里二十五家之泉今詳司農注引孟子云㕓無夫里之布其意可取盖凡稅者各随其地所出田有穀則輸其穀宅有桑麻則輸其布帛唯㕓里在國中者人衆宇廣無所樹藝則課之出泉布亦料其㕓地所可樹藝多少二十之價而取其一焉若城外之宅可樹桑麻而怠廢不為者則依國中例課之出泉布盖樹桑麻易為功而出泉布難為力所以罰之使其勤耳故曰宅不毛者有里布也田不耕者出屋粟康成謂罰以三家之稅粟周禮不為屋但以三家之稅粟借文以稱之焉葢不耕一夫之田則納三夫之稅粟倍重之亦以罰其怠也民無職事者出夫家之征康成謂出夫稅家稅夫稅者百畮之稅家稅者出士徒車輦給繇役盖勤而就田業則有夫家之稅間而無職事者亦有夫家之稅與其無地而輸財孰若受田之獲利也此亦以勸其勤耳大畧自國以至於畿稅輕者不减二十而一重者不逾十二漆林雖重顧亦少焉皆以役多少叅折之也此賦稅之定令也或曰古者皆謂周稅什一今此論何其等級之多乎曰其謂什一舉近郊而言也古之言質舉近而畧逺也後儒耳目不接得其畧而失其詳因謂皆什一也夫周禮豈可誣哉抑不獨於周然也其言夏商什一者亦猶是也後凡言什一者意同或人又問曰幸卒業於賦稅矣其所以制軍旅具車甲願因言焉曰按夏官司馬曰凡制軍萬有二千五百人為軍王六軍軍將皆命卿二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長康成謂軍師旅卒兩伍皆衆名也伍一比兩一閭卒一族旅一黨師一州軍一鄉家所出一人此則六鄉為六軍七萬五千人也又按遂人職曰以嵗時稽其人民而授之田野簡其兵器教之稼穡康成謂遂之軍法追胥起徒役如六鄉若是則六遂亦為六軍七萬五千人也但以王家迭而用之則其興發常六軍耳故止言六軍也此鄉遂制軍之法也又按司馬法通三十家出匹馬士一人徒二人成三百家出革車一乘士十人徒二十人終三千家出革車十乘士百人徒二百人同三萬家出革車百乘士千人徒二千人此雖井田顧未與周制同今按春秋成元年三月作丘甲杜氏注以為丘出戎馬一匹牛三頭甸出長轂一乘戎馬四匹牛十二頭甲士三人歩卒七十二人此甸所賦今魯使丘出之譏重斂故書左傳哀十一年季孫欲以田賦使冉有訪諸仲尼仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣杜氏亦謂丘出戎馬一匹牛三頭是賦之常法若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行之又何訪焉以是觀則丘賦實周公之典舉丘則甸明矣如此一同百甸甸旁加為成則百成也亦百乘也百乘則戎馬四百匹牛一千二百頭甲士三百人歩卒七千二百人乘數雖同而士卒之制多少異矣今亦本周制為定葢甸以内六鄉六遂則為十二軍迭用其六軍稍以外八十四同則為八千四百乘亦逺近異制矣如有名山大澤占之同數不滿則亦依數減之矣以一切而言則畿内千里合當百同故古謂天子萬乘也大凡康成謂成之一甸同之四都出田稅其旁加者甸旁以治成之洫都旁以治同之澮覯謂溝洫始為之也則用力多後治之也則用力寡矣曷足免其田稅乎今觀車賦止於甸不言成豈非旁加者不與車賦但主為治洫乎總百成之旁加者既各盡治其洫又共治其同之澮以役折役於事為宜且其治洫澮一嵗中豈數數然哉是賦稅軍旅車甲之議盡矣二十曰或曰古之人皆謂周為公田公田百畮其二十畮以為八家之居八家各受百畮以為私田通九百畮為一井公田借民力以耕不稅其私田詩春秋論語孟子之說皆然特周禮為異稅夫無公田康成以為周之畿内用貢法稅夫無公田夏之貢法也邦國用助法制公田不稅夫商之助法也畿内用貢法者鄉遂及公邑之吏旦夕從民事為其促之以公使不得恤其私邦國用助法者諸侯専一國之政為其貪暴稅民無藝此論何如曰天子之政自國而形天下者也豈有天子之國自稅民田而令諸侯但為公田而不稅哉雖其嵗入同歸於仆一然非所以身率之謂也且畿内有鄉遂公邑之吏旦夕促之以公而諸侯之國豈無其吏能促之者乎苟為其貪暴稅民無藝則若王政明諸侯奉法雖使之稅敢過制乎若王政不明諸侯不奉法雖為公田彼不能外取乎是皆非通理之論也覯謂周之畿内以及天下諸侯一用貢法稅夫無公田也公田商禮也抑文王之時雖已受命尚為商之諸侯其田猶依商禮至武王得天下周公攝政作禮樂方遂變之故言周為公田者其原在聞之於文武之時而不知周公已變之也孟子曰夏后氏五十而貢商人七十而助周人百畮而徹其實皆什一也徹者徹也助者藉也則孟子既知周制與商異矣其下文又曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也孟子雖知周制與商異然見詩有公田之文其詩又是周雅故復疑周亦為公田如商之助也其曰由此觀之雖周亦助則疑之之辭也既疑周為公田故至滕文公使畢戰問井地乃對以圭田餘夫公田之說謂今可行也夫圭田亦商禮也周則曰士田矣餘夫二十五畮葢亦商禮也周則皆百畮矣然則孟子所稱悉是所聞商時之禮徒見周詩引公田乃復疑是周制耳不然何以上文云周人百畮而徹如徹取之謂與至如周詩所引公田亦非指言當時之事葢以幽王政煩賦重君子傷今而思古故引古公田以諷之亦不言之公田果在何王之時也獨其上章云播厥百榖既庭且碩曽孫是若鄭箋云曽孫謂成王也若以成王之時則周公巳作禮樂矣而曰雨我公田是周制果為公田也然康成何以専指曽孫為成王夫孝孫曽孫抑是事宗廟之通稱禮曰稱孝子孝孫以其義稱也其稱曽孫某謂國家也若是則人君能繼先祖有國家君子取其廟中之稱而稱之曰曽孫皆可也豈成王得専之哉安知詩人所指不謂武王也文王也苟詩人所指謂武王以上則自是周公未制禮之前誠無害於周禮之夫稅也且孟子對齊宣王亦曰昔者文王之治岐也耕者九一是乃正指九一公田在文王也文王則依商禮决矣獨至周詩而疑之疑之又不明辨從而遂其疑謂答畢戰也顧亦先後反矣先言徹後言公田也春秋宣十五年初稅畮左傳曰初稅畮非禮也榖出不過藉以豐財也覯謂魯之先田稅既定矣然山林川澤之旁歴世之後或頗墾闢以有餘畮宣公又履而稅之傳稱穀出不過藉葢丘明謂周家雖不謂公田然其井邑之所出稅穀亦不過商時藉數如孟子所謂其實皆什一之義也非謂周有公田而借民力以耕也公羊曰古者什一而藉穀梁曰古者公田為居井竈葱韭盡焉是皆舉商禮以言之也大凡先儒多稱商禮抑非止聞之於文武之時而不知周公巳變之也葢亦孔子商之子孫其服行尚依商禮檀弓夫子曰夏后氏殯扵東階之上則猶在阼也殷人殯扵兩楹之間則與賔主夾之也周人殯扵西階之上則猶賔之也而丘也商人也予疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗予予殆將死也而論語曰周監於二代郁郁乎文哉吾從周誠夫子其身之私則法先祖天下之公則從時王且周制文於商也其可忽諸先儒徒見夫子行商禮因謂天下之法盡當從商則其所言多稱商禮傳之積乆後世莫知其本源誤謂之為周制故言周制者或以商禮雜亂其間則後世之言益不可信也如有若之對哀公盍徹與實止謂周家什一之徹法不足更疑其道公田也夫如是則詩春秋論語孟子皆不謂周公之制有公田後世諸儒解之者非也康成惑之亦非也自王國以至於藩服一也或曰助法不善與周公故變之也曰助法善之大也周公變之慮之深也夫周公以民益頑吏益猾公田之耕或不盡力藉榖之入或有隠欺不如一委之民而制其賦稅稅有所常責有所在安坐而視其入也禮制愈崇國用愈廣何暇從容如上世乎雖然無所増重也第謹其定數耳於民既無傷於國則不乏是聖人慮之深制之中也或曰敢問司馬法既為井田而周公變之何也曰司馬法雖為井田然其未方也唯井方一里成方十里同方百里焉其餘十井為通則長十里廣一里十成為終則長百里廣十里皆不方也周公欲以封邑諸侯羣臣故自井以上皆方之邑方二里丘方四里甸方八里縣方二十里都方四十里成與同則仍依司馬法方者依之不方者改之無小無大皆方也舉而用之之易也井田既變則車賦亦不得復依司馬法矣故以丘甸制焉且一甸六十四井雖盡再易之地猶可授一百九十二家其出甲士歩卒共七十五人不為多矣抑征討有時非常常而用也故士卒之數増焉皆聖人以義制事預備不虞之道也或曰司馬法文王時所作而周公敢變之何也曰夫孝者謂能承其志意非必盡循其政令膠柱而不改也况文王雖作司馬法而未之施行乎文王在岐為諸侯見商祚將盡知天命在巳故經始司馬法待其即天子位而行之文王大勲未集武王克紂而崩周公攝政乃取其書而述傳之可則因否則革廣以衆制而為周禮焉益無過也曰文王聖人也其為書安有否而可革者乎曰聖人因時制宜文王之時與周公之時異故文王以其時而言周公以其時而變也或曰諸侯之國亦井田也其制何若曰亦猶都鄙而巳矣始之為鄉遂次之為都鄙或滿以萬夫或極以一同至於諸侯則不言其田制其取諸都鄙亡疑矣欲知外者觀諸内欲知逺者本諸近兹不待備言而可鑑也大哉周公乎接文武之聖救商人之敝以之為禮禮無不中以之為政政無不和土天下之廣也而一塊莫敢争先為之限也口天下之衆也而勺飲無所闕先為之業也率飽煖之民而納之於仁義驩焉可不反顧矣其曰兼三王不亦宜乎後雖有作者周公其弗可改也巳曰然則如之何則可曰法而行之復為一周乎右定著二十章經析其㣲注擇其善極數明用㑹異於同勁正備具無越此書矣猶懼其未可以灼見也作三圗以翼之一曰王畿千里之圗二曰鄉遂萬夫之圗三曰都鄙一同之圗圗之矩畫頗髙廣故别行不綴於篇明明后如欲舉周公之制觀是書按是圗以令之其如取諸掌乎若猶未也敢私於學禮者故書旴江}
