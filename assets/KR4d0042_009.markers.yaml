  - {type: variant, offset: 1653, length: 0, content: '', WYG: 覯撰易論十三篇易論第一或曰易之為書也其不可學邪何其㣲而不顯也曰學者之過也聖人作易本以教人而世之鄙儒忽其常道競習異端有曰我明其象則卜筮之書未為泥也有曰我通其意則釋老之學未為荒也晝讀夜思疲心於無用之説其以惑也不亦宜乎包犧畫八卦而重之文王周公孔子繫之辭輔嗣之賢從而為之注炳如秋陽坦如大逵君得之以為君臣得之以為臣萬事之理猶輻之於輪靡不在其中矣爾欲聞之乎曰然則請問為君之道曰夫用貴莫若恭用富莫若儉恭則衆歸焉儉則財阜焉恭儉者先王之所以保四海也損六五曰或益之十朋之龜弗克違元吉龜可决疑喻明智也以柔居尊而為損道明智之士皆樂為用矣非徒人助天且福之故象曰六五元吉自上祐也恭之得衆也如此賁六五曰賁于丘園束帛戔戔吝終吉丘園謂質素之地也處得尊位為飾之主而每事質素與丘園相似則費財物束帛乃戔戔衆多也儉之足用也如此非徒儉於身也祭祀鬼神尚可菲薄既濟九五曰東鄰殺牛不如西鄰之禴祭實受其福禴祭之薄者也謂修德以祭雖薄而受福也夫上之利民以財則不足也百姓安堵而不敗其業利之大者也益九五曰有孚惠心勿問元吉有孚惠我德謂因民所利而利之惠而不費則不須疑問必獲大吉而物亦以信惠歸於我也夫溥愛無私君之德也反是則非益之謂也屯九五曰屯其膏小貞吉大貞㓙膏謂恩惠也處屯難之時居尊位之上不能博施羣小而繫應在二所惠偏狹於有司之貞則吉於大人之貞則㓙也比九五曰顯比王用三驅失前禽邑人不誡吉謂為比之主而有應在二顯比者也不能无私於物唯賢是與愛於來而惡於去用三驅之道者也伐不加邑動必討叛雖得乎顯比之吉而可以為上之使非為上之道故象曰邑人不誡上使中也夫執剛莫如體柔責人莫如自脩尚力取勝亦已勞矣同人九五曰同人先號咷而後笑大師克相遇謂不能使物自歸而用其强直故必大師克之然後得志也困九五曰劓刖困于赤紱乃徐有説利用祭祀赤紱謂異方之物也五以剛猛物所不附忿物不附而行威刑則異方愈不懐矣而體在中直能不遂迷乃徐脩德則得喜説履夫尊位過而能改以斯祭祀必受福也夫以至尊敵至賤勝之不足為武也夬九五曰莧陸夬夬中行无咎莧陸草之柔脆者謂上六也夬之時以君子决除小人而五處尊位躬自决之雖其克勝未足多也處中而行足以免咎而已故象曰中行无咎中未光也夫安非福也危非禍也知危而懼安莫如之否九五曰休否大人吉其亡其亡繫于苞桑處君子道消之時已當尊位能施否於小人而自戒其将亡則得苞桑之固也夫救弊之術莫大乎通變然民可與樂成難與慮始非斷而行之不足以有為矣巽初六曰進退利武人之貞謂處令之初未能服令故進退也則宜用武威以整齊之乃能成命也革上六曰君子豹變小人革面謂居變之終變道已成則小人變面以順上也夫治國始於齊家王化本乎夫婦百代不易之道也家人九五曰王假有家勿恤吉謂居於尊位而明家道則下莫不化矣父父子子兄兄弟弟夫夫婦婦六親和睦交相愛樂而家道正正家而天下定故勿恤而吉也凡此皆為君之道也或曰子謂執剛莫如體柔責人莫如自脩而乃以威武成命何也曰同人九五敵剛也困九五來異方也其欲勝敵懐逺不可暴也舜於有苗文王於崇乃其迹也巽之初六行令於吾人也令善而衆疑不濟以威是終不可為也周官凡出教令必徇以木鐸曰不用法者國有常刑乃其事也盖所施之異胡可結以一言哉易論第二或曰為君之道任官其急也請言其要曰井九五曰井冽寒泉食謂五居中得正而體剛直不食汙穢必須井㓗而寒泉然後乃食以言剛正之主不納非賢必須行㓗才髙然後乃用也兊九五曰孚于剥有厲謂處尊貞之位不説信乎君子而説信乎小人則小人道長而國有危也剥六五曰貫魚以宫人寵无不利謂施寵小人但同之於宫人勿使害正則終无尤也然則人君所任宜得賢才不可説信小人雖未能不加以寵亦當處之散地无俾乘勢以消君子可也或曰人君有不自為國而委之大臣可乎曰茲禍福之機也事有不可不然亦不可必然在度宜而行之耳蒙六五曰童蒙吉謂委於二也夫蒙之時隂昧而陽明五以隂質居於尊位不敢以其蒙昧自任而委之剛陽付物以能故獲吉也師六五曰田有禽利執言无咎長子帥師弟子輿尸貞㓙謂柔非軍帥隂非剛武故不躬行必以授也授不得主衆猶不從故長子則可弟子則㓙盖九二得中可以任也自閫以外将軍制之用兵之法亦其宜矣臨六五曰知臨大君之宜吉夫臨剛浸而長君子道盛之時也因而納之委以其事則不勞而成功矣任得君子庸非智乎大壮六五曰喪羊于易无悔羊壮也君大壮之時以隂處陽以柔乘剛用壮之甚敵冦之來将失其居故不待險難而先舍其壮委任於二則得无悔也此皆事之宜不得不然也歴觀衆卦此類頗多率由隂居尊位未得剛正在上而廢其聰明委政於下也得其人則民受其賜非其人則職為亂階此不得不然也恒六五曰恒其德貞婦人吉夫子凶謂居得尊位不能制斷而係應於二專從其唱以此為恒則婦人之吉非夫子之道也以言人君在位苟不能獨斷而牽於臣下權時則可矣以之為恒則非君之道也坤初六曰履霜堅氷至戒其漸也上六曰龍戰于野辨之不早疑盛乃動故必戰也此任官之要先王其慎之也易論第三或人請問為臣之道曰君子之進也難哉苟進則諂諂則何有於君唯利而已矣否初六曰㧞茅茹以其彚貞吉亨象曰㧞茅貞吉志在君也謂居否之時動則入邪三隂同道皆不可進故茅茹以類貞而不諂志在於君故不苟進也夫執剛用直進不為利忠誠所志鬼神享之升九二曰孚乃利用禴无咎謂與五為應往必見任體夫剛德進不求寵閑邪存誠志在大業故乃利用納約于神明也夫君臣之交初未見親未信而諌人以為謗損初九曰已事遄往无咎酌損之謂剛以奉柔當自酌損其剛乃得合志志既合則道可行也然剛德之長不可全削志意既合當自守貞九二曰利貞征凶弗損益之謂初已損剛以順柔二復損已以益柔則剥道成焉故不可遄往而利貞也夫道雖貞矣宜得其中不可過也小畜上九曰既雨既處尚德載婦貞厲月幾望君子征凶謂體巽處上剛不敢犯尚德者也為隂之長能畜剛健德積載者也婦制其夫臣制其君雖貞近危故曰婦貞厲也滿而又進必失其道隂疑於陽必見戰伐雖復君子以征必凶故曰君子征凶也恒初六曰浚恒貞凶无攸利象曰浚恒之凶始求深也謂求深窮底物无餘藴以此為恒凶貞害德無施而利盖人不可以至察也節上六曰苦節貞㓙悔亡謂過節之中以至亢極苦節者也以斯施貞物所不勝貞之㓙也以斯脩身行在無妄故得悔亡盖政不可以峻刻也雖不可過亦不可未至而止也晉初六曰晉如摧如貞吉罔孚裕无咎謂進明退順不失其正而處卦之始功業未著物未之信若以此為足自喪其長者也故必裕之然後无咎也夫為君耳目所以司聰明也不能去邪人使至君側誰之罪也兊九四曰商兊未寧介疾有喜謂三為佞説将近至尊四以剛德裁而隔之初則未寧終則有喜也此之為喜乃為至尊所善天下所頼故象曰九四之喜有慶也夫事君盡禮致恭存位古之道也履九四曰履虎尾愬愬終吉謂逼近至尊處多懼之地然以陽居隂以謙為本雖處危懼終獲其志也夫君唱臣和理之常也專而見疑鮮不及矣坤六三曰含章可貞或從王事無成有終謂含美於内待命而發不為事首順上而終可謂智矣故象曰含章可貞以時發也或從王事知光大也无妄六二曰不耕穫不菑畬則利有攸往亦謂代終已成而不造也不擅其美乃盡臣道故利有攸往也雖不獲自專而時有未安不可不憂也渙六四曰渙其羣元吉渙有丘匪夷所思謂與五合志内掌機密外宣化命能為羣物散其險害然處上體之下不可自專猶有丘墟未平之慮雖已得大功所思不可忘也若時不我用不與於政則宜巻而懐之毋使動而之悔也坤六四曰括囊无咎无譽謂以隂居隂不與陽事隠其賢徳乃可免咎故象曰括囊无咎慎不害也或竭其忠信志在立功圖國忘身雖慎可也隨九四曰隨有獲貞㓙有孚在道以明何咎謂居於臣地以擅其民失於臣道違貞者也體剛居説而得民心能幹其事而成其功者也雖違常義志在濟物著信在道以明其功何咎之有哉夫權之所在衆之所附不守以正速禍而已矣益六二曰或益之十朋之龜弗克違永貞吉謂居中得位益自外來朋龜獻䇿同於損卦六五之位位不當尊故永貞乃吉也夫忠臣之分雖處險難義不忘君也蹇六二曰王臣蹇蹇匪躬之故謂居位應五不以五在難中私身逺害執心不回志救王室者也故象曰王臣蹇蹇終無尤也凡此皆為臣之道也孔子曰為臣不易豈虚言哉易論第四或曰大哉君臣之道既得而聞之矣請問凡所以治其身何如曰性不能自賢必有習也事不能自知必有見也習之是而見之廣君子所以有成也蒙六四曰困蒙吝謂獨逺於陽處兩隂之中困於蒙昧不能比賢以發其志故曰吝也觀初六曰童觀小人无咎君子吝謂處於觀時而最逺朝美體於隂柔不能自進无所鑒見故曰童觀在小人則无咎君子處之吝道也夫道之於人不可斯須去之也進則飾其行退則不勉焉是為利者也君子恥之履九二曰履道坦坦幽人貞吉謂在内卦幽隠之地而履其中道不以居外為榮處内為屈隠顯皆同常行其貞宜其吉也中孚九二曰鳴鶴在隂其子和之我有好爵吾與爾靡之謂處内而居重隂之下履不失中不徇於外立誠篤至雖在闇昧物亦應之也晉六二曰晉如愁如貞吉受兹介福于其王母謂進而无應其德不昭不以无應而回其志處晦而能致其誠故得貞之吉也其初愁如履正不回則乃受兹大福于其母也井九三曰井渫不食為我心惻可用汲王明並受其福謂井渫而不見食猶人脩已全㓗而不見用故使我心惻也不下注而應止是可汲也井之可汲也猶人可用若逢明王則既嘉其行又欽其用故曰並受其福也夫欲不可逞强不可恃放其私心罔知戒懼㓙之道也震初九曰震來虩虩後笑言啞啞吉謂體夫剛徳為卦之先能以恐懼而脩其德乃致福也豫初六曰鳴豫㓙謂處豫之初而特得志於上樂過則滛志窮則㓙也大壮九三曰小人用壮君子用罔貞厲羝羊觸藩羸其角謂處健之極以陽處陽用其壮者也故小人用之以為壮君子用之以為羅已者也雖復羝羊以之觸藩必拘羸其角矣益上九曰莫益之或擊之立心勿恒㓙謂處益之極過盈者也求益无厭人弗之與怨者非一故或擊之也夫静以俟時則无悔躁而求利則有恥不可不慎也頥初九曰舍爾靈龜觀我柔頥㓙謂居養賢之世不能正其所履而舍其靈龜之明德羡我朶頥而躁求不足貴也咸六二曰咸其腓㓙居吉腓謂動躁者也感物以躁㓙之道也由躁故㓙居則吉矣夫遵道而行不牽於俗明哲之任也與衆雷同善柔之事也豫六二曰介于石不終日貞吉謂順不苟從豫不違中不改其操是以吉也咸九三曰咸其股執其隨往吝謂志在隨人所執亦已賤矣用斯以往吝其宜也小過九三曰弗過防之從或戕之㓙謂居下體之上以陽當位而不能先過防之至令小者咸過而復應而從焉其從之也則戕之㓙至矣然而絶類離倫衆之所非毀方瓦合亦儒之權也萃六二曰引吉无咎謂處坤之中已獨處正與衆殊異民之多僻獨正者未能變體以逺於害故必見引然後乃吉而无咎也凡此皆治身之道也或曰脩身及家自天子逹庶人一也請問家道曰蠱初六曰幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也謂幹父之事不可大小損益一依父命當量事制宜以意承考而已九二曰幹母之蠱不可貞象曰幹母之蠱得中道也謂婦人之性難可全貞宜屈已剛既幹且順故曰不可貞也雖不宜全貞亦不可納之於邪故曰得中道也家人初九曰閑有家悔亡謂治家之法及其志之未變而豫防之則悔亡也家瀆而後嚴之則无逮矣九三曰家人嗃嗃悔厲吉婦子嘻嘻終吝謂家人雖嗃嗃悔其酷厲猶保其吉婦子嘻嘻乃失其節也是威克厥愛家道之善者矣易論第五或曰脩身及家前聞之矣請問凡所以遇於人何如曰夫上之遇下有道屯初九曰盤桓利居貞利建侯象曰雖盤桓志行正也以貴下賤大得民也貴謂陽賤謂隂也初九之陽在三隂之下是以貴下賤故大得民心也无妄初九曰无妄往吉象曰无妄之往得志也亦謂體剛處下以貴下賤行不犯妄故往得其志也困九二曰困于酒食朱紱方來利用亨祀征㓙無咎謂以陽居隂尚謙者也體夫剛質而用中履謙應不在一心無所私雖以處困物莫不至不勝豐衍故曰困于酒食也能招異方故曰朱紱方來也然而不可以瀆也頥六四曰顛頥吉虎視耽耽其欲逐逐無咎謂居得其位以上養下得頥之義而下交不可以瀆故虎視耽耽威而不猛不惡而嚴也夫下之遇上有道大過初六曰藉用白茅無咎謂以柔處下心能謹慎故得無咎也訟六三曰食舊徳貞厲終吉或從王事無成謂體夫柔弱以順於上不為九二自下訟上不見侵奪保全其有故得食其舊徳而不失也然而不可以諂也頥六三曰拂頥貞㓙十年勿用無攸利謂履夫不正以養於上納上以諂者也處頥而為此行十年見弃者也立行於斯無施而利也兊六三曰來兊㓙謂以不正而來求説邪佞之道故㓙也巽九二曰巽在牀下用史巫紛若吉无咎謂處巽之中既在下位而復以陽居隂卑巽之甚故曰巽在牀下也若惟施至卑於神祗而不用之於威勢則得吉而無咎也夫陽為君子隂為小人同於君子則吉附於小人則㓙臨九二曰咸臨吉无不利謂有應在五而五體柔若順於五則剛徳不長矣雖感應之時不可全與相違必未順其命乃得吉无不利也六四曰至臨无咎謂處順履正不忌剛長而乃應之故得無咎也剥六三曰剥之无咎謂與上為應羣隂剥陽我獨協焉雖處於剥可以无咎也夬九三曰壮于頄有㓙君子夬夬獨行遇雨若濡有愠无咎謂夬為剛長而三獨應上六助於小人是以㓙也君子處之必能棄夫情累决之不疑故曰君子夬夬也若不與衆陽為羣而獨行殊志應於小人則受其困焉遇雨若濡有恨而無所咎也夫心貴乎公而量貴乎大公則視人如一大則無物不包視人如一則惟善是從也無物不包則雖愚有處也比初六曰有孚比之无咎有孚盈缶終來有它吉謂處比之首應不在一心無私吝則莫不比之故必有它吉也同人初九曰同人于門无咎謂為同人之首而無應於上心無係吝通夫大同出門皆同誰與為咎也兊初九曰和兊吉謂居兊之初應不在一無所黨係和兊之謂也説不在諂履斯而行未見有疑之者吉其宜矣大過九四曰棟隆吉有它吝謂雖能拯其弱不為下所撓而應在初用心不廣故有它吝也蒙九二曰包蒙吉納婦吉子克家謂以剛居中童蒙所歸也包而不距則逺近咸至故包蒙吉也泰九二曰包荒用馮河不遐遺朋亡得尚于中行謂體健居中而用乎泰能包含荒穢受納馮河者也用心廣大無所遐弃無所朋黨乃可以得配于五也凡此皆遇人之道也易論第六或曰吉㓙悔吝生乎動者也請問動而無悔則奚由曰時乎時智者弗能違矣先時而動者妄也後時而不進者怠也妄者過之媒怠者功之賊也蹇初六曰往蹇來譽謂處難之始居止之初獨見前識覩險而止以待其時故往則遇蹇來則譽也歸妹六三曰歸妹以須反歸以娣謂室主猶存而求進焉進未值時故有須也不可以進故反歸待時以娣乃行也凡此不可先時者也豐上六曰豐其屋蔀其家闚其户閴其無人三歳不覿㓙謂處於明動尚大之時而深自幽隠以髙其行大道既濟而猶不見隠不為賢更為反道㓙其室也三年豐道之成治道未濟隠猶可也既濟而隠以治為亂也節九二曰不出門庭㓙謂初已造之至二宜宣其制矣而故匿之失時之極則遂廢矣故不出門庭則㓙也凡此不可後時者也嗚呼進取之時易見退避之時難知盖利者人之所欲欲則存諸心存諸心則計之熟矣害者人之所惡惡則幸其無之而不知為謀矣或人請問退避之道曰君子見機而作愚者闇於成事禍至而避亦無及也渙初六曰用拯馬壮吉謂處散之初乖散未甚故可以逰行得其志而違於難也不在危劇而後乃逃竄故曰用拯馬壮吉也遯初六曰遯尾厲勿用有攸往謂處遯之時而為遯尾禍所及也危至而後求行難可免乎故勿用有攸往也然而矯枉過正衆之所憎和而不同身乃無患明夷初九曰明夷于飛垂其翼君子于行三日不食有攸往主人有言謂處卦之始最逺於難逺難過甚明夷逺遯絶跡匿形不由軌路殊類過甚以斯適人人必疑之故曰有攸往主人有言也六二曰明夷夷于左股用拯馬壮吉夷于左股示不能行也以柔居中用夷其明進不殊類退不逃難故可用拯馬而壮吉也夫有所避者不可有所顧也以欲而忘患鱗属所以死於餌也遯九三曰係遯有疾厲畜臣妾吉謂在内近二以陽附隂宜遯而繫故曰繫遯遯之為義宜逺小人以陽附隂繫於所在不能逺害亦已憊矣宜其屈辱而危厲也繫於所在畜臣妾可也施於大事㓙之道也九四曰好遯君子吉小人否謂處於外而有應於内君子好遯故能舍之小人繫戀是以否也若夫分有所定義不可去則莫若守正之為利也泰九三曰無平不陂無往不復艱貞无咎勿恤其孚于食有福謂處天地之將閉平路之将陂時将大變世将大革而居不失其正動不失其應艱而能正不失其義故无咎也信義誠著故勿恤其孚于食有福也明夷六五曰箕子之明夷利貞謂最近於晦與難為比猶闇不能沒明不可息正不憂危故利貞也凡此避禍之道也詩曰既明且哲以保其身此之謂也易論第七或曰獨隂孰始獨陽孰生萬事云為未有不因人以成故大則有君臣之交小則有同志之㑹變故非一願聞其詳曰人事之變或逺而相應或近而相得逺而相應君臣之分定也近而相得以各無應同志者也然而應於逺者或為近所困承於上者或為下所逼臣欲應君而冦難阻之君欲應臣而讒邪制之惟其明哲决所去就秉心不回終乃無過也屯六二曰屯如邅如乗馬班如匪寇婚媾女子貞不字十年乃字謂志在乎五不從於初與初相近而不相得困於侵害時方屯難正道未通涉逺而行難可以進屯難之世勢不過十年十年則反常反常則本志斯獲矣大有九四曰匪其彭无咎謂既失其位而上近至尊之威下比分權之臣其為懼也可謂危矣唯夫有聖知者乃能免斯咎也三雖至盛五不可舎能辨斯數專心承五常匪其彭則无咎矣睽六三曰見輿曳其牛掣其人天且劓魚器反无初有終謂以隂居陽以柔乘剛志在於上而不和於四二應於五則近而不相比故滯隔所在不獲進也四從上取二從下取而應在上九執志不回初雖受困終獲剛助也漸九五曰鴻漸于陵婦三嵗不孕終莫之勝吉謂進得中位而隔乎三四不得與其應合然各履正而居中三四不能久塞其塗不過三歳必得所願矣九三曰鴻漸于陸夫征不復婦孕不育㓙謂以陽爻為下卦之主而棄其羣醜與四相得遂乃不反夫征不復樂於邪配則婦亦不能執正矣然小人之心惡直醜正近不相得亦宜備之既濟六四曰繻有衣袽終日戒謂履得其正而近不與三五相得鄰於不親而得全者終日戒也抑又交際之間理非一致或名雖為應而實不相接或義有可合而情不相同智者三思故往而必納愚者徑行則動而多悔也屯六四曰乘馬班如求婚媾往吉无不利謂二雖比初執正不從不害已志者也求與合好往必見納矣故象曰求而往明也小畜初九曰復自道何其咎吉謂處乾之始以升巽初四為已應不距已者也以陽升隂復自其道順而無違何所犯咎得義之吉也隨六三曰係丈夫失小子隨有求得利居貞謂雖體下卦二已據初将何所附故舍初係四志在丈夫四俱無應亦欲於已隨之則得其所求也睽六五曰悔亡厥宗噬膚往无咎謂有應在二三雖比二二之所噬非妨已應者也以斯而往何咎之有往必合也凡此智者之慮能見彼情者也屯六三曰即鹿無虞惟入于林中君子幾不如舍往吝謂三既近五而無冦難四雖比五其志在初不妨已路可以進而無屯邅也見路之易不揆其志五應在三往必不納何異無虞以從禽其可獲乎故不如舍往吝窮也大畜九二曰輿説輹謂五處畜盛未可犯也遇斯而進故與説輹也凡此愚者之動不知彼情者也故亦有非應比各亢一方而渙然合好罔有猜嫌者同患相恤勢使之然也睽九四曰睽孤遇元夫交孚厲無咎謂無應獨處而初亦無應特立處睽之時俱在獨立同處體下故求其疇類而自託焉相得無疑故曰交孚雖在乖革志可得行雖危無咎也故曰苟識其情不憂乖逺苟明其趣不煩彊武能説諸心能硏諸慮睽而知其類異而知其通其唯明爻者乎易論第八或曰天有常故四時行地有常故萬物生人有常故德行成而事或有變勢或有異以常待之其可乎曰常者道之紀也道不以權弗能濟矣是故權者反常者也事變矣勢異矣而一本於常猶膠柱而鼓瑟也履九五曰夬履貞厲謂履道尚謙不憙處盈而五以陽處陽正當其位是以危也豐六二曰豐其蔀日中見斗往得疑疾有孚發若吉謂處明動之時爻皆以居陽位乂不應隂為美而二以隂居隂常於厥位故幽而無覩不能自發也若夫排患解紛量時制宜事出一切愈不可常也益六三曰益之用㓙事無咎有孚中行告公用圭謂以隂居陽處下卦之上壮之甚也語以謙冲則罪可戮用救衰危則物所恃故以此告公國主所任也大過九二曰枯楊生稊老夫得其女妻無不利謂以陽處隂能過其本而救其弱者也上無其應心無係吝處過以此無衰不濟也九三曰棟橈㓙謂居大過之時處下體之極不能救危拯弱以隆其棟而以陽處陽自守所居又應於上係心在一宜其淹溺而㓙衰也或曰甚哉幹蠱之難也才不勝任亦可勉乎哉曰駑駘疾走不如良馬之安行也小人飾智不能及君子之任真也天命之性有限乎中苟非其宜是以身釣禍也大有九二曰大車以載有攸往無咎謂健不違中為五所任任重不危致逺不泥故可以往而無咎也鼎九四曰鼎折足覆公餗其形渥㓙謂處上體之下而又應初既承且施非已所勝故曰鼎折足覆公餗也既覆公餗體為渥沾智小謀大不勝其任受其至辱灾及其身故曰其形渥㓙也解六三曰負且乗致冦至謂處非其位履非其正乗二負四以容其身小人而乗君子之器盜思奪之矣凡此皆以身釣禍者也亦有才可適用德可及物而勢不可為者必謹察之也井九二曰井谷射鮒甕敝漏謂處上宜下處下宜上而二無應於上反下與初故莫之與也是卑者不可以有為也旅九三曰旅焚其次喪其僮僕貞厲謂居下體之上與二相得以寄旅之身而為施下之道與萌侵權主之所疑故次焚僕喪而身危也是疏者不可以有為也凡此亦所以釣禍也或有不量其力悖道逆理以圖非望兹又罪之至也履六三曰眇能視跛能履履虎尾咥人㓙武人為于大君謂以隂居陽以柔乗剛志在剛健不脩所履欲以陵武於人為于大君行未能免於㓙而志存于王頑之甚也同人九三曰伏戎于莽升其髙陵三嵗不興謂貪於所比據上之應其敵剛健非力所當故伏戎于莽不敢顯亢也升其髙陵望不敢進量斯勢也三嵗不能興者也三嵗不能興則五道亦已成矣安所行焉隨上六曰拘係之乃從維之王用亨于西山謂隨之為體隂順陽者也最處上極不從者也隨道已成而時不從故拘係之乃從也離九四曰突如其來如焚如死如弃如謂逼近至尊履非其位欲進其盛以炎其上命必不終也噫天不可違人不可欺忠孝之美有生者所宜拳拳也易論第九或曰如此乎禍福之猶影響也何從而慎諸曰火之生也一勺之勝及其燎也川流莫競是故君子慎乎始也節初九曰不出户庭無咎謂為節之初将整離散而立制度者也故明於通塞慮於險偽不出户庭慎宻不失然後事濟而无咎也夬初九曰壮于前趾往不勝為咎謂居健之初為决之始宜審其䇿以行其事壮其前趾往而不勝宜其咎也然則不慎而失之者尚可及乎曰亦在人之明與昧也明者則辨之於早過而能改故可及也昧者則以智飾非至于貫盈雖悔無及矣復初九曰不逺復無祇悔元吉謂最處復初始復者也不逺而復幾悔而反以此脩身患難逺矣錯之於事其殆庶幾乎故元吉也需九三曰需于泥致寇至象曰需于泥灾在外也自我致寇敬慎不敗也謂以剛逼難欲進其道所以招寇而致敵也猶有須焉不陷其剛寇之來也自我所招敬慎防備可以不敗也訟九四曰不克訟復即命渝安貞吉謂處上訟下可以改變者也故其咎不大若能反從本理變前之命安貞不犯不失其道為仁由已故吉從之也噬嗑初九曰屨校滅趾无咎謂過輕戮薄足懲而已小懲大誡乃得無咎也同人九四曰乘其墉弗克攻吉謂履非其位以與人爭二自五應三非犯已攻三求二尤而效之違義傷理衆所不與故雖乘墉而不克也不克則反自思過以從法則故得吉也臨六三曰甘臨無攸利既憂之无咎謂履非其位居剛長之世而以邪説臨物宜其無攸利也若能盡憂其危改脩其道剛不害正故咎不長也凡此辨之於早可及者也復上六曰迷復㓙有灾眚用行師終有大敗以其國君㓙至于十年不克征謂最處復後是迷者也以迷求復故曰迷復也用之行師難用有克終必大敗用之於國則反乎君道也大敗乃復量斯勢也雖復十年脩之猶未能征也噬嗑上九曰何校滅耳㓙謂處罰之極惡積不改者也罪非所懲故刑及其首至于滅耳及首非誡滅耳非懲㓙莫甚焉凡此至于貫盈雖悔無及者也亦有勢猶可救而弗用謀言遂及敗覆者茲又不明之甚也夬九四曰臀無膚其行次且牽羊悔亡聞言不信謂下剛而進非已所據必見侵食失其所安而五為夬主非下所侵若牽於五則可得悔亡而已剛亢不能納言自任所處聞言不信以斯而行㓙可知矣噫過而不能知是不智也知而不能改是不勇也持疑猶豫目以無害古之亡國敗家未嘗不以此也易論第十或曰文王之囚箕子之奴豈其所自取哉曰患自已招斯可患也患非已招斯不足患也其必免矣如其不免是有命焉非智之過也節六三曰不節若則嗟若無咎謂以隂處陽以柔乗剛違節之道以至哀嗟自已所致故無所怨咎也此患自已招者也漸初六曰鴻漸于干小子厲有言無咎謂始進而未得其位則困於小子窮於謗言故曰小子厲有言也困於小子讒謬之言未傷君子之義故曰無咎也姤九三曰臀無膚其行次且厲無大咎謂處下體之極而二據於初不為已乗居不獲安行無其應不能牽據以固所處故曰臀無膚其行次且也於履得其位非為妄處不遇其時故使危厲灾非巳招是以無大咎也此患非已招必免者也蹇六四曰往蹇來連謂往則無應來則乗剛往來皆難故曰往蹇來連然得位履正當其本實難遇於難非妄所招也此患非已招不可免者也是有命焉非智之過也亦有進不違私志在救難以危其身此又君子之大義非智者之羞也大過上六曰過涉滅頂㓙無咎謂處大過之極過之甚也涉難過甚故至于滅頂㓙志在救時故不可咎也古之人曰貪夫徇財烈士徇名夸者死權有所欲者必得所惡也闗龍逄死於夏王子比干死於商人臣之義不得不然也是故知幾之賢少欲之士拂衣塵外髙蹈不還鴻飛㝠㝠非弋人之所簒也蠱上九曰不事王侯髙尚其事謂最處事上而不累於職位不承事王侯但自髙尚其事故志可則也漸上九曰鴻漸于陸其羽可用為儀吉謂進處髙潔不累於位無物可以屈其心而亂其志峨峨清逺儀可貴也賁初九曰賁其趾舍車而徒謂在賁之始以剛處下居於無位棄於不義安夫徒步以從其志者也此二疏以免於漢四皓以免於秦特立獨行非凡所及也噫天道之變日星循環占之而不舛者以知其數也人事之動情偽交錯應之而不謬者以知其勢也持之以正用之以中百禄之來弗可辭也已噫非天下之至變其孰能與於此哉易論第十一或曰卦者時也爻者適時之變者也時既不一事亦不同不可相假者也今子統而論之毋乃咈於時乎曰時雖異矣事雖殊矣然事以時變者其迹也統而論之者其心也迹或萬殊而心或一揆也若夫湯湯洪水禹以是時而濬川黎民阻饑稷以是時而播種百姓不親契以是時而敷五教蠻夷猾夏臯陶以是時而明五刑其迹殊其所以為心一也統而論之謂之有功可也亦有因時立事事不局於一時可為百代常行之法者如仁義忠信之例是也故夫子於上下繫所稱者十有九爻未有言其時者盖事不局於一時也是故時有小大有以一世為一時者此其大也有以一事為一時者此其小也以一世為一時者否泰之類是也天下之人共得之也以一事為一時者訟師之類是也當事之人獨得之也借如今之世泰之時也天下所共矣而所遇之事人各不同若其倥侗之質求師辯惑蒙之時也立身嚮道非禮勿行履之時也居其德義以待施惠井之時也自逺之近觀鑒朝美觀之時也量能受任各當其分鼎之時也夙夜在公幹君之事蠱之時也用其剛正辯物之事訟之時也斷其刑罰無有不當噬嗑之時也出軍遣将以討不庭師之時也險難在前按兵觀釁需之時也民有困窮從而養之頥之時也事有所失知而改之復之時也禮有過差議而定之節之時也逸樂之情約之以正豫之時也文飾之盛反之於素賁之時也人有解慢示之以威震之時也夫此之類皆以一事為一時而諸卦之時君之所遇者多以事無不統也臣之所遇者寡以事有分職也或一人之身而兼數事或終食之久而移數時時既屢遷迹亦皆變苟不求其心之所歸而專視其迹則散漫簡策百紐千結豈中材之所了邪子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮謂少則得多則惑也然則統而論之不亦可乎易論第十二或人請問乾坤何時也曰乾者聖人進取天位非承平之時也故初則潜二則見三則乾乾四則或躍五則飛上則亢也坤者聖人防閑臣下非大通之時也故初則履霜上則龍戰三則含章而不敢為首四則括囊而後無咎五則黄裳而後元吉唯二居於下卦履其中正乃可任其自然也又問大過之時則務在救危遯明夷之時則貴乎避難何其不同也曰大過之時本末雖弱而未見君之昏亂臣之讒邪是國家之難何世無之君子之義不得不救也遯則小人得志明夷則闇主在上忠良之士徒見害而已無足可為也君子之智不得不避也又問隂爻浸長皆小人道盛也剥之五隂否之三隂小人衆多矣而不見君子避之之意二隂始進而君子之遯猶恐為尾何也曰君子之道知幾其神故云二隂用事小人将盛而亟避之則無患矣苟至于否塞至于剥落而後退焉不已晩乎易之為遯所以示先見也然則剥與明夷孰為大禍曰小人雖盛制之在君故貫魚以宫人寵則無不利是禍之小也主之闇則末如之何故南狩得其大首是禍之大也又問屯也蹇也困也名相近也請言其别曰屯者動乎險中可為之世也然而足以有功矣蹇者見險而止不可為之世也然而足以無過矣困者剛見揜於柔君子為小人所蔽窮厄委頓者也人之所患莫斯之甚也比也同人也隨也義相類也請言其異曰比者剛得尊位上下應之天下之人皆親其君也同人者柔履中正而應乎乾同志相合物各有黨也隨者剛來下柔動而之説謂能下於人動則人説莫不從其所為也上之所務莫斯之大也謙也巽也奚若曰謙者内陽外隂屈其剛德以下於物者也巽者内外皆隂心貌如一情實卑順者也豫也兊也奚若曰豫者主於逸樂兊者喜恱而已也晉也升也奚若曰升者升得位晉者進見於君也泰也既濟也奚若曰泰者君臣合好君子在位小人在野之世也然物既大通多失其節故不具利貞之德也若夫物皆得其所事皆得其宜未有如既濟之盛者也堯舜其猶病諸然安不忘危戒在終止故曰初吉終亂也泰之極則城復于隍既濟之極則濡其首禍福倚伏誠可畏也昔大禹之訓曰予臨兆民懔乎若朽索之馭六馬夫能保萬世無疆之休其唯知懼者乎易論第十三或曰八卦成列象在其中矣謂備天下之象也請言其畧曰天地萬物存乎説卦矣姑以人事明之八卦之道在人靡不有之也但賢者得其正不肖者處其偏矣夫剛而不暴乾之正也順而不邪坤之正也動而不妄震之正也卑而不辱巽之正也險而不可犯坎之正也明而不可欺離之正也静而不可誘以利艮之正也和而不可撓以怒兊之正也若剛而不容於物乾之偏也順而不守其道坤之偏也動而為躁震之偏也卑而為佞巽之偏也險而為賊害坎之偏也明而為苛細離之偏也止而不及其時艮之偏也説而不由於禮兊之偏也是故賢者以功不肖者以過賢者以福不肖者以禍由所用之道名同而實異也然賢者之道也或其數不備或所施者狹夫能具八者之用發之乎身充之乎天地之間者其唯聖人乎故用之於國則邇人安用之於軍則逺人服鼓之舞之無物不得其宜矣純精勁正造成庶事旰食忘倦終而復始用乾於國也含藏黄大靡物不愛隤然和順無有煩擾用坤於國也甲兵斧鉞以重其威無敢奸宄無敢怠惰用震於國也適時之變權宜在已以貴下賤士争歸之用巽於國也封疆阻固山河分限貴在常尊無得褻近用坎於國也善靡不照惡靡不見人文化成上下肅雍用離於國也脩其典禮止邪未形慢易之心無自而入用艮於國也行慶施惠洽于羣心罔有小大翕然欣戴用兊於國也以剛决事以勇臨敵變動不息罔失其正用乾於軍也撫養士卒如母親子雖其柔仁不害方直用坤於軍也先聲後實威聞敵國動於九天物莫能亢用震於軍也隠其形勢示之不能始如處女後如脫兎用巽於軍也深溝髙壘逺其斥堠敵人不得襲刺客不得近用坎於軍也部曲分辯各有麗著號令明白衆罔疑惑用離於軍也退北佯為不追見利佯為不知持重有待嶷如山立用艮於軍也誅其渠魁弔其民人簞食壺漿以迎王師用兊於軍也故知八卦之道大矣有髙焉必乗其上有深焉必載其底有旁焉必環其外幽無不貫㣲無不徹惟所用之何如耳噫作易者既有憂患矣讀易者其無憂患乎苟安而不忘危存而不忘亡治而不忘亂以憂患之心思憂患之故通其變使民不倦神而化之使民宜之則自天祐之吉無不利矣旴江集巻三欽定四庫全書旴江集卷四宋李覯撰刪定易圖序論覯甞著易論十三篇援輔嗣之注以解義盖急乎天下國家之用毫柝幽㣲所未暇也世有治易根於劉牧者其説日不同因購牧所為易圖五十五首觀之則甚複重假令其説之善猶不出乎河圖洛書八卦三者之内彼五十二皆疣贅也而况力穿鑿以從傀異考之破碎鮮可信用大懼詿誤學子壊隳世教乃刪其圖而存之者三焉所謂河圖也洛書也八卦也於其序解之中撮舉而是正之諸所觸類亦復詳説成六論庶乎人事脩而王道明也其小得失不足喜愠者不盡糾割别有一本黄黎獻為之序者頗増多誕謾自鄶以下可無譏焉牧又注易所以為新意者合牽象數而已其餘則攘輔嗣之指而改其辭将不攻自破矣先代諸儒各自為家好同惡異有甚冦讎吾豈斯人之徒哉憂傷後學不得巳焉耳論一或問劉氏之説河圖洛書同出於伏羲之世何如曰信也繫辭稱河出圖洛出書聖人則之其指在作易也則不待禹而得之明矣其所圖者信乎曰洛書五十有五協於繫辭天地之數河圖四十有五雖於易無文然其數與其位灼有條理不可移易非妄也惜乎劉氏之辯則過矣或曰敢問河圖之數與位其條理何如曰一三五七九竒數陽也非中央則四正矣坎離震兊之位也二四六八耦數隂也不得其正而得四隅矣乾坤艮巽之位也乾坎艮震陽卦位也則左旋兊坤離巽隂卦位也則右轉竒則先左而後右耦則先右而後左坎一震三也兊七離九也坤二巽四也乾六艮八也抑又縱横數之皆得十五此非灼有條理不可移易者乎或曰劉氏之辯其過焉在曰劉氏以河圖洛書合而為一但以河圖無十而謂水火木金不得土數未能成形乃謂之象至於洛書有十水火木金附於土而成形矣則謂之形以此為異耳其言四象生八卦則取河圖之七八九六以其有象字不可用洛書之形故也其下文又引水六金九火七木八而生八卦於此則通取洛書之形矣噫何其自相違也矧曰天五居中而主乎變化上駕天一而生地六下駕地二而生天七左駕天三而生地八右駕地四而生天九者不亦惑乎夫所謂生者言乎其始也苟河圖之象生八卦則洛書之形又生八卦者何也若以聖人既取河圖之數以畫卦而洛書之數止為揲蓍則其論云在河圖則老陽老隂少陽少隂之數此又已言揲蓍矣反覆不通故曰自相違也夫天一至地十乃天地之氣降出之次第耳謂之五者非有五物謂之十者非有十枚而曰五十有五者盖聖人假其積數以起筭法非實數也如人兄弟行下浪反第一至第十者乃十人耳焉可謂有五十五人哉厥初太極之分天以陽髙於上地以隂卑於下天地之氣各亢所處則五行萬物何從而生故初一則天氣降於正北次二則地氣出於西南次三則天氣降於正東次四則地氣出於東南次五則天氣降於中央次六則地氣出於西北次七則天氣降於正西次八則地氣出於東北次九則天氣降於正南天氣雖降地氣雖出而猶各居一位未之㑹合亦未能生五行矣譬諸男未冠女未笄昏姻之禮未成則何孕育之有哉况中央八方九位既足而地十未出焉天地之氣誠不備也由是一與六合於北而生水二與七合於南而生火三與八合於東而生木四與九合於西而生金加之地十以合五於中而生土五行生而萬物從之矣二四易位而一三五如其初者當所王之方也夫物以隂陽二氣之㑹而後有象象而後有形象者胚胎是也形者耳目鼻口手足是也河圖之數二氣未㑹而劉氏謂之象悖矣若夫洛書之數五位既合則五行有象且有形矣象與形相因之物也其一二三四五為生數六七八九十為成數者徒以先後分之耳其實二者合而後能生生則成矣盖非一生之待六而後成也假令河圖是象洛書是形則取洛書而為八卦者亦非酌水燃火伐木鍛金而成之也直取其象耳以法象而言之不亦可乎何其固執形象之象也其曰天五駕一二三四而生六七八九者愈乖逺矣且隂陽㑹合而後能生今以天五駕天一天三乃是二陽相合安能生六生八哉天降陽地出隂隂陽合而生五行此理甚明白豈有陽與陽合而生隂哉况所謂五者乃次第當五非有五物也其一與六合之類皆隔五者盖以一二三四五主五方而六七八九十合之周而復始必然之數非有取於天五也其不用五竒主五方而五耦合之者陽方則竒為之主而耦與之合隂方則耦為之主而竒與之合又昭昭矣至如劉氏所圖太極生兩儀一二三四其解曰畫天左旋畫地右動今按其畫天一在坎天三在震誠左旋也地二在離地四在兊亦左旋耳非右動也夫所謂左旋者如斗柄自寅向卯也右動者如日月五星自丑向子也今以自午向酉而為右動何哉若直以東北為左方西南為右方以分天地之位則又不可謂之旋且動也旋動者進前之意也設謂陽升隂降先兊四而後離二則繫辭所陳先二而後四未甞倒言之也如是則劉氏之解果繆矣注易圖易自謂窮天地之理而乃未明左旋右動之法甚哉其可笑也論二或曰劉氏謂聖人以河圖七八九六而畫八卦而吾子之意乃取洛書何也曰繫辭稱八卦成列象在其中矣謂備天下之象也河圖之數二氣未合品物未生何所象乎洛書之數五行成矣萬物作矣於是象金而畫乾兊象土而畫坤艮象木而畫震巽象水而畫坎象火而畫離不言五而言四象者以土分王四時舉四行則土可知矣又以四行之數而揲蓍七少陽八少隂九老陽六老隂是也曰敢問畫卦皆取洛書矣其於河圖何所則也曰則其位也河圖有八方之位洛書有五行之象二者相須而卦成矣曰劉氏以為六居坎而生乾謂三為坎三為乾也九居兊而生坤謂三為兊六為坤也七居離而生巽謂三為離四為巽也八居震而生艮謂三為震五為艮也何如曰以位數之則乾坤艮巽亦三位也以畫數之則坎震亦五畫也離兊亦四畫也何其或以位數或以畫數反錯之甚也况説卦稱六畫而成卦六位而成章彼重卦然畫與位等耳未常析言之也苟析言之則坤六位而十二畫矣焉得曰六畫成卦也雖繫辭陽一君而二民盖取隂耦以喻人臣代終之義非可積以為數也今謂人有二心者非可積十人以為二十心也且劉氏説天地之數六者有六物耳而乃以一爻分為二畫以當二物可乎歴觀諸卦以爻為人雖隂爻亦一人耳帝乙歸妹非有兩妹也箕子明夷非有兩箕子也然則劉氏畫卦之説其不可用明矣矧聰明睿智創制立法固不區區專決於圖書故曰古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之冝近取諸身逺取諸物是不專決於圖書參互而後起之者也聖人既按河圖有八方将以八卦位焉洛書有五行将以八卦象焉於是觀隂陽而設竒耦二畫觀天地人而設上中下三位純陽為乾取至健也純隂為坤取至順也一陽處二隂之下剛不能屈於柔以動出而為震一隂處二陽之下柔不能犯於剛以入伏而為巽一陽處二隂之中上下皆弱罔克相濟以險難而為坎一隂處二陽之中上下皆強足以自託以麗著而為離一陽處二隂之上剛以駁下則止故為艮一隂處二陽之上柔以撫下則説故為兊也西北盛隂用事而陽氣盡矣非至健莫能與之争故乾位焉争勝則陽氣起故坎以一陽而位乎北坎者險也一陽而犯衆隂誠不為易而為險也艮者止也物芽地中将出而止也待春之謂也自此動出乎震絜齊乎巽離者明也萬物皆盛長得明而相見也坤厚以養成之成而説故取諸兊也畫八卦分八方之義如斯而已也或曰説卦稱勞乎坎謂萬物閉蔵納受為勞也成言乎艮謂萬物之所終也今吾子之言似不類者何也曰孔子據物終於地上而言也覯取諸物始於地下而言也所以就足先聖之論使人不疑耳或曰劉氏謂三畫象三才為不詳繫辭之義則以乾之三畫為天之竒數三一三五皆陽也坤之三畫為地之耦數三六八十皆隂也獨陽獨隂無韞三才之道者何如曰劉氏學易乃不知畫之與位各一事也畫者譬諸人也位者人所處之地也三畫雖純陽象天而三位有天地人之别何害也上中下三位譬如公也卿大夫也竒耦二畫譬如君子也小人也公卿大夫皆君子盖有之矣皆小人亦有之矣或一君子而二小人或一小人而二君子猶行人之止傳舍何常之有安可見純天便曰無地位見純地便曰無天位哉且其引説卦兼三才而兩之故易六畫而成卦以為六畫包三才無三畫韞三才之説噫何其􅅺也三畫象三才矣重之為六又象三才何害也若三畫之時乾為天坤為地六畫之後亦不免為天為地也三畫之位則初為地二為人三為天六位則初二為地三四為人五上為天從宜改易何固執之為哉且劉氏論三才則引説卦六畫破先儒三畫以為不經及其論竒耦則用天三竒地三耦天地各減其二不顧繫辭五位有合之説是經乎不經也又其論乾元用九謂天一天三天五陽數也坤元用六謂地二地四隂數也至其下文以天五散在五行天一居尊不動餘有天三地四合而成九天三則乾之三畫地二地四則坤之六畫陽得兼隂故乾三兼坤六而乾元用九也噫陽不可兼隂乎則天三何以稱用九陽果得兼隂乎則天一天三天五當兼地二地四何以不稱乾元用十五也輕先儒九揲六揲之通義而務求新不虞錯亂之至此鄙哉論三或人敢問大衍之數五十諸儒異論何如曰京房馬季長荀爽之釋吾無取焉耳至於鄭康成姚信董遇以為天地之數五十有五減五而用之劉氏亦同此説吾有取焉耳此章上言大衍之數下言乾坤之策中言天地之數非衍之用而何也然所以減之之意或謂減五行或謂減六畫或謂減天五盖未之思矣夫五行六畫天五減之之可否不足復詰吾直謂天地之數雖五十五至揲蓍之法止可用五十故取其整數而已也只如期三百六旬有六日而乾坤之策三百六十當期之日又豈可言無六策以當六日者别有意也聖人揲蓍虚一分二掛一揲四歸竒再扐確然有法象非苟作也故五十而用四十九分於兩手掛其一則存者四十八以四揲之十二揲之數也左手滿四右手亦滿四矣乃扐其八而謂之多左手餘一則右手餘三左手餘三則右手餘一左手餘二右手亦餘二矣乃扐其四而謂之少三少則扐十二并掛而十三其存者三十六為老陽以四計之則九揲也故稱九三多則扐二十四并掛而二十五其存者二十四為老隂以四計之則六揲也故稱六一少兩多則扐二十并掛而二十一其存者二十八為少陽以四計之則七揲也故稱七一多兩少則扐十六并掛而十七其存者三十二為少隂以四計之則八揲也故稱八所謂七八九六者盖取四象之數也以是五十之策不可増損増一損一則不可揲之矣故康伯述輔嗣之㫖曰演天地之數所賴者五十也苟謂聖人以五行天五之故特減其五則未知不減之時如何揲也以五十五而虚其一又掛其一則兩手五十三十三揲之數而餘一也左手雖得四右手尚餘一左手三則右手二左手二則右手三左手一則右手四終無平時雖童子亦知不可為也五十之上唯五十四可矣虚一掛一則兩手五十二十三揲之數也然三少則存者四十三多則存者二十八一少兩多則存者三十二一多兩少則存者三十六乾元當用十坤元當用七少陽八而少隂九矣其下唯四十六虛一掛一則兩手四十四十一揲之數也然乾元當用八坤元當用五少陽六而少隂七矣不徒不應四象之數陽反而耦隂反而竒矣吾故謂揲蓍之法止可用五十故取其整數而已也或曰虚其一者康伯以為太極劉氏以為夭一何如曰究觀繫辭以四十九分而為二以象兩則是虚一在兩儀之前也下文太極生兩儀則又太極在兩儀之前太極與虚一相當則一非太極而何也且其謂大衍後天地之數則太極不可配虚其一之位此又不思之甚矣作大衍之法誠在數之後矣然其所取象固在數之先所謂分而為二以象兩者也盖有兩儀而後有數也既可象兩儀於數之先豈不得配太極於兩儀之上哉若以一二三四便為兩儀則天非一天地非一地而已也是知天地者其體也一二三四之類其氣也苟虚一以象天一之氣而分四十九以象兩儀之體則是逸其末而勞其本於義乖矣又破康伯之注無不可以無明必因於有以謂太極其氣已兆非無之謂噫其氣雖兆然比天地之有容體可見則是無也又稱聖人之辭易有太極既言有則非無之謂也吾以為天地之先強名太極其言易有太極謂有此名曰太極者耳非謂太極便有形也如老子之言恍忽中有物有象不可一見有字便指為實物實象也凡此皆巧詆先儒不自知其罪也論四或曰劉氏謂坎生復卦離生姤卦何如曰磔裂爻位則巧矣義則未也聖人設卦觀象以陽潛地中故坎以一陽居二隂之中陽生隂下故復以一陽居五隂之下八卦配八方則坎當北十二卦配十二月則復當建子復之陽乃坎之陽也陽則無二而象之之卦有兩也何哉八方與十二月不同也三畫與六畫不同也是故陽則無二而象之之卦有兩也離與姤亦如之若謂坎之陽生復之陽離之隂生垢之隂則是十一月有兩陽也五月有兩隂也固不然矣且其説以復卦生於坎中動於震交於坤變二震二兊二乾而終姤卦生於離中消於巽交於乾變二巽二艮二坤而終自復至坤凡十二卦主十二月噫以十二月言之則自復以往歴臨泰大壮夬而後至乾此云二震二兊而後二乾者何也自姤以往歴遯否觀剥而後至坤此云二巽二艮而後二坤者何也以八方言之則自坎以往歴艮震至巽極矣陽一於子而六於已也此云震兊乾者何也自離以往歴坤兊至乾極矣隂一於午而六於亥也此云巽艮坤者何也其意以復姤生於坎離而變初四變二五變三上毎為二卦則八卦備謂之巧也宜矣然義不通也又以姤巽承於乾非四正之卦乃引歸妹之兊云妹係姊嫁故兊少女而用巽之長女主其卦噫何偽飾之多也彼其意欲以兊承於乾則成履非姤隂生之卦又不可數變故引兊於歸妹假託廣嗣之義而係巽於姤耳不徒義理迂恠以象論之大可笑也少女既嫁於震又係巽而嫁於乾乎長女既交於乾又從兊而交於震乎則是一女而事二夫也豈不可笑此所謂偽飾之多也聖人之意曷至是哉或曰劉氏之説七日來復不取易緯六日七分何如曰不取宜矣苟以十二月之卦論之則剥盡之後經坤一月非止七日也以六日七分言之則剥盡之後經艮既濟噬嗑大過坤未濟蹇頥中孚九卦毎卦六日七分乃至於復非止七日也然劉氏更以七為少陽必經隂六之數盡至七日少陽乃生斯又未善也歴觀衆卦或言七日或言三日或言三年或言十年强為配合時或可言參相鉤考辭則易屈大抵言日逺者不過七日震六二既濟六二勿逐七日得不過七日而得也七日來復以復不可逺君子之道雖消不久不過七日而復彖曰天行也盖言來復之義是天之行反覆如此亦非考案氣候實日而云也萬夀無疆豈實有萬哉愛而多之之辭也或曰臨至於八月有凶諸儒之論孰為得失曰何氏云建子陽生至建未為八月當矣臨二陽遯二隂合耦之卦也劉氏破之以為果建子則辭當在復卦之下此不明矣且復卦陽生其勢㣲弱未足矜也臨卦剛長強亢之漸故戒之以遯卦有凶也推其本而言之復生為一月臨長為二月至遯為八月不亦可乎而劉氏固守臨之建丑數至遯之建未則七月以不滿八之故遂用周正排建未為八月又念文王演卦在商之末正朔未改不可以未為八月乃稱周公述而成之故以周正為定且先儒以為文王作卦辭周公作爻辭劉氏既未有以破之安得謂卦辭亦周公所成以飾臨卦八月用周正之説乎其下文曰况乎易有三名夏曰連山商曰歸藏周曰周易易既題周以正名則不得不以周之正朔定其月也且周易書名周公設官可題周家以别餘代卦辭豈得擅改彼禮樂損益盖從時之宜易之為書萬世無敝况文考之手澤周公改之何意也文王若曰七月有凶有何妨害而周公故以八月定之乎文王作易之時便題周字亦可矣何必周公也號國曰周其來久矣故曰周雖舊邦其命惟新雖紂在上而題易曰周以别夏商何害也魯頌次於周頌亦須周滅而後加魯字乎此類皆閭巷老生誑童耀騃之辨非天下之公議也論五或曰易緯以六十卦主三百六十五日四分日之一信乎曰吾觀於太𤣥信矣所主之日取卦象乎取卦名乎曰取諸卦名而已太𤣥所以凖易者也起於冬至其首曰中陽氣潛萌於黄宫信無不在乎中謂是時萬物之萌信無不在地之中於易則中孚孚者信也亦謂信無不在地之中也其次曰周陽氣周神而反乎始於易則復復者反也亦謂反乎始也其次曰礥陽氣㣲動動而礥礥物生之難也於易則屯屯者物之始生也粗舉二三則知冬至之後其卦中孚復屯者題號此日之氣候曰中孚也曰復也曰屯也他皆倣此但元首八十一毎首四日有半易卦六十毎卦六日有竒故前後或參差盖大同而小異也而劉氏以經乾坤之䇿三百六十當期之日不别起數謂易緯六日七分義無所出若是則劉氏凡言天五駕天一之類亦出於經乎乾坤之策况其數六十卦况其名不相妨也又謂十二卦已主十二月不可取雜書破經義今觀六十卦之次其十二卦仍在本月稱為辟卦則十二卦既總主一月又與諸卦分治六日如侯伯有功德者既作一州之牧亦未免為一國之君也而劉氏區區以月各有主日無用卦是欲立州牧而廢二百一十君也其可乎或曰敢問元亨利貞何謂也曰大哉乎乾之四德也而先儒解詁未能顯闡是使天道不大明君子無所法若夫元以始物亨以通物利以宜物貞以幹物讀易者能言之矣然所以始之通之宜之幹之必有其狀竊嘗論之曰始者其氣也通者其形也宜者其命也幹者其性也走者得之以胎飛者得之以卵百榖草木得之以句萌此其始也胎者不殰卵者不殈句者以伸萌者以出此其通也人有衣食獸有山野蟲豸有陸鱗介有水此其宜也堅者可破而不可輭炎者可滅而不可冷流者不可使之止植者不可使之行此其幹也乾而不元則物無以始故女不孕也元而不亨則物無以通故孕不育也亨而不利則物失其宜故當視而盲當聴而聾也利而不貞則物不能幹故不孝不忠為逆為惡也是故文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也唯君子為能法乾之德而天下治矣制夫田以飽之任婦功以煖之輕稅斂以富之恤刑罰以生之此其元也冠以成之昏以親之講學以材之擯接以交之此其亨也四民有業百官有職能者居上否者在下此其利也用善不復疑去惡不復悔令一出而不反事一行而不改此其貞也是故文言曰君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞論六或曰敢問五行相生則吉相克則㓙信乎曰相生未必吉相克未必㓙用之得其宜則雖相克而吉用之失其宜則雖相生而㓙今夫水克於火則燔燒可救火克於金則器械可鑄金克於木則宫室可匠木克於土則萌芽可出土克於水則漂溢可防是用之得其宜雖相克而吉也以水浸木則腐以木入火則焚以火加土則焦以土埋金則鏉以金投水則沈是用之失其宜雖相生而㓙也是以太𤣥之贊決在晝夜當晝則相克亦吉當夜則相生亦㓙𤣥告曰五生不相殄五克不相逆不相殄乃能相繼也不相逆乃能相治也相繼則父子之道也相治則君臣之寳也今夫父之於子能食之弗能教之則恩害於義也君之於臣能賞之又能刑之則威克厥愛也恩害義則家法亂威克愛則國事脩吾故曰相生未必吉相克未必㓙也或曰吾子之言性命何其異也曰吾之言也折諸聖宜乎其異矣命者天之所以使民為善也性者人之所以明於善也觀其善則見人之性見其性則知天之命説卦曰昔者聖人之作易也将以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦人之有仁義所以順性命也董仲舒曰天令之謂命命非聖人不行質朴之謂性性非教化不成人受命於天固超然異於羣生入有父子兄弟之親出有君臣上下之誼㑹聚相遇則有耆老長㓜之施粲然有文以相接驩然有恩以相愛此人之所以貴也生五榖以食之桑麻以衣之六畜以養之服牛乗馬圈豹檻虎是其得天之靈貴於物也然則本乎天謂之命在乎人謂之性非聖人則命不行非教化則性不成是以制民之法足民之用而命行矣導民以學節民以禮而性成矣則是聖人為天之所為也繫辭曰吉㓙者言乎其失得也悔吝者言乎其小疵也無咎者善補過也由此觀之吉㓙由人乃易之教也黄帝堯舜通其變使民不倦神而化之使民宜之是以自天祐之吉無不利若夫釋人事而責天道斯孔子所罕言古之龜筮雖質諸神明必參以行事南蒯将亂而得黄裳元吉穆姜棄位而遇元亨利貞德之不稱知其無益後之儒生非史非巫而言稱運命矯舉經籍以縁飾邪説謂存亡得喪一出自然其聴之者亦已荒矣王制曰執左道以亂政殺假於鬼神時日卜筮以疑衆殺為人上者必以王制從事則易道明而君道成矣旴江集巻四欽定四庫全書旴江集卷五宋李覯撰周禮致太平論五十一篇并序敘曰昔劉子駿鄭康成皆以周禮為周公致太平之迹而林碩謂末世之書何休云六國隂謀然鄭義獲伸故周官遂行覯竊觀六典之文其用心至悉如天焉有象者在如地焉有形者載非古聪明睿智誰能及此其曰周公致太平者信矣鄙儒俗士各滯所見林之學不著何説公羊誠不合禮盗憎主人夫何足恠今之不識者抑又譊譊将使人君何所取法是用摭其大畧而述之天下之理由家道正女色階禍莫斯之甚述内治七篇利用厚生為政之本節以制度乃無傷害述國用十六篇備預不虞兵不可闕先王之制則得其宜述軍衞四篇刑以防姦古今通義唯其用之有所不至述刑禁六篇綱紀既立持之在人天工其代非賢罔乂述官人八篇何以得賢教學為先經世軌俗能事以畢述教道九篇終焉并序凡五十一篇為十巻命之曰周禮致太平論噫豈徒觧經而已哉唯聖人君子知其有為言之也内治第一男女之際人道所重前哲固備言矣然而賢妃相成之道不世出亂國家者往往而是盖婦人之性鮮克正也隂則昧柔則弱昧不足自見弱不足自立與物而遷直情㤀反其體一也堯試舜觀厥刑于二女釐降二女於嬀汭嬪於虞以堯之女其淵源非不善尚曰舜能以義理下其心是無聖人為之耦則不克使其行婦道也彼凡人子而不漸以教摩以禮其可乎哉今夫數口之家猶以婦傾或靡敝財用或離析骨肉速刑召禍至無可救者多矣况乎后妃同體於王其次嬪御亦所愛幸一發言一舉事足以旋轉天地薄蝕日月其為禍福可勝言哉貴則為驕富則為侈並寵則妬不荅則怨憎則有讒言愛則有私謁府庫或為之空刑賞或為之濫姦邪或為之昌忠良或為之剥宗室或為之棄冡嗣或為之易帷簿或為之不脩社稷或為之不食妺喜之放桀妲已之殺紂此類豈少哉故内宰以隂禮教六宫隂禮婦人之禮六宮謂后也又以隂禮教九嬪不言教夫人世婦舉中以見上下省文也又以婦職之法教九御使各有屬以作二事正其服禁其竒衺展其功緒九嬪掌婦學之法以教九御婦德婦言婦容婦功后尊也不得不受教女御卑也而教亦及之在王宫者不可不知禮也如使后夫人九嬪世婦女御皆受教皆知禮德皆正言皆順無冶容無廢功無侈服無衺道則閨門之内何有不肅溥天之下何有不化關睢之不淫葛覃之躬儉樛木之無嫉妬螽斯之多子孫巻耳之輔佐求賢兔罝之莫不好德於斯見矣王道安得不成乎内治第二天官冢宰其屬則有九嬪世婦女御女祝女史唯夫人之於后猶三公之於王坐而論婦禮無官職故不列且夫六宫内也如家人家人私也六官外也乃國事國事公也外内異處國家異分公私異宜然而使嬪婦屬天官無外内國家公私之辨者何哉聖人之意於是深矣彼婦人女子而當於至尊幽居九重人弗得見則驕蹇自恣無所不至也是故使之分職於内而附屬於外有職則當奉其法有屬則必攷其功奉法則不敢不謹攷功則不敢不慎舉宫中之人而知所勸勉者官有其長之效也而况内宰亦用大夫士春官世婦毎宫卿二人盖皆分命賢臣以參檢内事與夫婢妾賤人自相使令而無畏忌者不同年而語矣天子所御而服官政從官長是天子無私人天子無私人則羣臣焉得不公庶事焉得不平無偏無黨王道蕩蕩此之謂也漢髙帝欲廢太子立戚夫人子趙王如意留侯曰骨肉之間雖臣等百人何益此大臣不得與内事之敝也爰盎引却慎夫人坐謂妾主豈可以同坐文帝怒説以人豕迺説如使盎軰得制宫中之事則尊卑有不序上下有不和者乎官失其守一女顓恣則公卿附離之不暇其何冢宰之能帥也悲夫内治第三昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章婦順故天下内和而家理也至於天官序則世婦以下不言數謂君子不苟於色有婦德者充之無則闕世婦女御視大夫士尚惟其人則三夫人九嬪官不必備可知矣自古婦人之賢者盖不易得故其生則寢之地以教其卑衣之裼以教其正弄之瓦以教其事既十年姆教婉娩聴從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆葅醢禮相助奠十有五年而笄二十而嫁先嫁三月祖廟未毁教於公宫祖廟既毁教於宗室教以婦德婦言婦容婦功教成之祭牲用魚芼用蘋藻所以成婦順也如此而後備於從人之道况乎王之北宫當貫魚之寵者可以非其人哉故無德以色親則天有投蜺之異詩曰蝃蝀在東莫之敢指謂邪色之乗陽也曲禮納女於天子曰備百姓言以廣子姓耳深山大澤實生龍蛇母子傳類亦不可忽晉愍懐太子宫中為市使人屠酤手揣斤兩輕重不差盖其母屠家女也先王之制百二十人猶以無人而闕之至難至慎若此武帝平吳之後掖庭殆将萬人復何義也人多則御幸不可徧怨恨由是興費廣則財物不足支民甿所以困國家之敗何莫由斯者邪内治第四女御掌御敘於王之燕寝凡羣妃御見之法月與后妃其象也卑者宜先尊者宜後十五日而徧自望後反之其不使九嬪世婦掌之而使女御者防上之專妬也盖以女御官卑不敢嫉妬自專則九九之法行矣九九之法行則内無怨女而子孫衆多矣夫飲食男女人之大欲一有失時則為怨曠七月女心傷悲東山婦歎于室君子撢於人情周道所以興也安得聚少艾之色幽於深宫之中而無進御之路則其性情之所感動何如哉四時何以能和百神何以降福至於繼嗣社稷之重事甚有寵之人或不宜子非廣其禮将無及也霍光欲上官皇后擅寵有子雖宫人使令皆為窮絝多其帶後宫莫有進者而昭帝無嗣成帝約不負趙昭儀掖庭中御幸生子者輒死飲藥傷墮者無數終以國統三絶王莽簒之愛有所偏之過也薄姬輸織室而生孝文為漢太宗晉簡文寵徐貴人彌年無子李后在織坊形長色黒謂之崑崙帝以大計召之乃生孝武天命所在不以貴賤美惡論也然則九九而御使無專妬者聖人之意逺矣内治第五哀公問曰冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎然則先王之所以重昏禮為其主祭祀也祭祀之禮豈唯致齋於内㑹君於廟服副褘於東房執璋瓚而亞祼酌瑤爵進玉齍薦徹豆籩以嘉魂魄而已乎是禮之末節一日可為者也必竭力從事然後為至焉故内宰中春詔后帥外内命婦始蠶於北郊以為祭服又上春詔王后帥六宫之人而生穜稑之種獻之於王夫普天王土率土王臣蠶者非一女也将以為王服有不足乎而后且親蠶其夫以事先舅先姑敢不用力焉不可以為婦道也耕者非一男也将以為祭盛有不足乎而后且佐耕其夫以事先舅先姑敢不用力焉不可以為婦道也王后之尊而親蠶天下之女子有不遵㣲行求柔桑者乎王后之尊而佐耕天下之女子有不饁南畆喜田畯者乎王后之尊而為婦道天下之女子有不承先祖共祭祀者乎明王之以孝治天下此其一助也而况不知耕之勞則以為田自生榖不知蠶之苦則以為桑自生絲自古愚婦人糞土貨財焦爛府庫農夫病工女死而求之不已者不知民事之難也干寳之論晉紀曰其婦女粧櫛織絍皆取成於婢僕未甞知女工絲枲之業中饋酒食之事也晉之禮法於此大壊則周之興也宜矣内治第六春官内宗凡内女之有爵者内女王同姓之女有爵其嫁於大夫及士者其職掌宗廟之祭祀薦加豆籩及以樂徹則佐傳豆籩賔客之饗食亦如之王后有事則從外宗凡外女之有爵者外女王諸姑姊妹之女其職掌宗廟之祭祀佐王后薦玉豆眂豆籩及以樂徹亦如之王后以樂羞齍則贊凡王后之獻亦如之王后不與則贊宗伯小祭祀掌事賔客之事亦如之夫富貴驕人自然之勢苟非明哲其能免乎矧伊女子生於王族雖有葭莩之親者猶乗勢以輕其家不順於舅姑不和於室人庸奴其夫者多矣夫婦之道天地之象人之大倫也乃由宗室亂之非所以示天下也聖人有作安得不大為之坊夫禮禁亂之所由生猶坊止水之所自來也故以内女外女謂之内宗外宗列為禮官之屬其職禮則視必在禮聽必在禮言必在禮貌必在禮思必在禮視聽言貌思無不在禮則其人之智愚賢不肖何如也祭祀賔客非有切身之急而不敢不以禮則己之所以為婦者敢有不恭乎觀后之事宗廟則知所以順其舅姑觀后之饗同姓諸侯則知所以和其室人觀后之亞王祼獻則知所以從其夫順於舅姑和於室人而當於夫是故婦順備而内和理内和理而家可長久也召南何彼襛矣美王姬之詩謂雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德彼天子所生而若此况於同姓姑姊妹之女乎是其所以為王化之基也内治第七媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁凡娶判妻入子者皆書之中春之月令㑹男女於是時也奔者不禁司男女之無夫家者而㑹之夫昏姻之禮要在及時故國無鰥民則桃夭之詠作喪其妃耦則有狐之刺興彼室家之好而繫之王者之風為人上者不可不察也孟子對齊宣王曰昔者大王好色愛厥妃詩云古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇當是時也内無怨女外無曠夫王如好色與百姓同之於王何有誠哉是言也人主知漁色而不知下無室家知逞欲而不知下有怨曠其可乎哉天地不合萬物不生有夫有婦然後為家上得以養父母下得以育子孫生民之本於是乎在而人主慢之非計也是故聖人設官主判合之禮子生三月必書其名男自二十以及二十九女自十五以及十九皆為盛年其昏自季秋至於孟春惟其所用若男三十女二十為期盡雖中春猶可行所以蕃育人民是皆言其極也及此月而父母不娶不嫁之者相奔不禁若無故而不用令則罪罰之甞有妃匹而鰥寡者亦察焉先王之道如此其至也既為之立其家又使之有其業國中則典婦功掌婦式之法野則酇長稽其女功然而民不庶且富者未之信也越語女子十七不嫁丈夫二十不娶父母有罪雖於禮為蚤而句踐報吳亦以是也晉泰始中博選良家以充後宫先下書禁天下嫁娶噫大可笑也旴江集卷五欽定四庫全書旴江集卷六宋李覯撰國用第一人所以為人足食也國所以為國足用也然而天不常生其生有時地不徧産其産有宜人不皆作其作有能國不盡得其得有數一榖之稅一錢之賦給公上者各有定制苟不量入以為出節用而愛人則哀公云二猶不足公羊謂大桀小桀誅求無巳怨刺並興亂世之政也故大府凡頒財以式法授之王日一舉其膳六牲祀兵朝甸其服有九故關市之賦以待王之膳服諸侯來朝卿大夫來聘致之則有積飱饔接之則有饗食燕故邦中之賦以待賔客牛馬之食其用芻禾車秅之數皆眡牢禮故四郊之賦以待稍秣功懋懋賞以馭其幸所受之物邦之大用故家削之賦以待匪頒冬官百工取材非一五庫之量毋或不良故邦甸之賦以待工事問勞贈賄酬爵侑食皆為篚實将其厚意故邦縣之賦以待幣帛大祀小祭事神之禮牲幣玉器不奢不儉故邦都之賦以待祭祀股肱或虧君之所痛賵禭含賻闕一不可故山澤之賦以待喪紀王及冢宰時有所善燕好之用亦以推恩故幣餘之賦以待賜予王於諸侯分烖救患㓙禮五事其費則多故邦國之貢以待吊用國家閒暇要在多積積貯之道天下大命故萬民之貢以充府庫難得之貨饑不可食燕㳺所用非國之急故式貢之餘財以共玩好之用凡其一賦之出則給一事之費費之多少一以式法如是而國安財阜非偶然也國用第二玉府掌王之金玉玩好兵器凡良貨賄之蔵燕衣服衽席牀第凡䙝器凡王之獻金玉兵器文織良貨賄之物受而蔵之凡王之好賜共其貨賄内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉凡適四方使者共其所受之物而奉之凡王及冢宰之好賜予則共之按其職文掌天子器用財賄燕私之物及受貢獻以備賞賜此帑蔵之在宫中官職之最私䙝者然而為冢宰之屬列大府以下與凡治蔵之官不異者何也盖王者無外以天下為家尺地莫非其田一民莫非其子財物之在海内如在槖中况於貢賦之入何彼我之云哉歴觀書傳自禹貢以來未聞天子有私財者漢湯沐邑為私奉養不領於經費靈帝西園萬金常聚為私蔵皆衰亂之俗非先王之法也故雖天子器用財賄燕私之物受貢獻備賞賜之職皆屬於大府屬於大府則日有成月有要嵗有㑹職内之入職嵗之出司書之要貳司㑹之鉤考廢置誅賞之典存焉如此用安得不節財安得不聚若以御府禁錢捐之親幸之手省闥之中外人弗睹法制所不行校比所不及則傷財害民非細事也國用第三太宰以九職任萬民一曰三農生九榖二曰園圃毓草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚歛疏材九曰閒民無常職轉移執事天之生民未有無能者也能其事而後可以食無事而食是衆之殃政之害也是故聖人制天下之民各從其能以服於事取有利於國家然後可也太宰授之職閭師責其功故曰任農以耕事貢九榖任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物凡無職者出夫布也人各有事事各有功以興材征以濟經用無惰而自安無賊於糧食是富民之大本為國之上務雖關百聖何以易此昔胥臣對晉文公謂戚施植鏄蘧蒢蒙璆侏儒扶廬矇瞍脩聲聾瞶司火王制瘖聾跛躃㫁者侏儒各以其器食之古者廢疾之人猶有所役後之㳺民作無益以害有益者肩相摩轂相撃而吏不以是罪之主不以是棄之謂之何哉國用第四言井田之善者皆以均則無貧各自足也此知其一未知其二必也人無遺力地無遺利一手一足無不耕一步一畮無不稼榖出多而民用富民用富而邦財豐者乎大司徒凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮不易之地嵗種之地美故家百畮一易之地休一嵗乃復種地薄故家二百畮再易之地休二嵗乃復種故家三百畮遂人辨其野之土上地中地下地以頒田里上地夫一㕓田百畮萊五十畮餘夫亦如之中地夫一㕓田百畮萊百畮餘夫亦如之下地夫一㕓田百畮萊二百畮餘夫亦如之萊謂休不耕者戸計一夫一婦而賦之田其一戸有數口者餘夫亦受此田也載師以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地宅田致仕者之家所受田也士田仕者亦受田賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田也若餘夫致仕者仕者賈人庶人在官者畜牧者之家皆受田則是人無不耕無不耕則力豈有遺哉一易再易萊皆頒之則是地無不稼無不稼則利豈有遺哉自阡陌之制行兼并之禍起貧者欲耕而或無地富者有地而或乏人野夫有作惰㳺况邑居乎沃壤猶為蕪穢况瘠土乎饑饉所以不支貢賦所以日削孟子曰仁政必自經界始師丹言宜畧為限不可不察也國用第五地利之食於人博哉農既得其時種既得其宜然且不熟者水旱賊之也水旱之灾雖天所為至於人力亦有可及矣故遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路此鄉遂之田制也匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二㝷深二仞謂之澮此都鄙之田制也川大於澮澮大於洫洫大於溝溝大於遂遂大於􅍒􅍒通水以入於遂遂入於溝溝入於洫洫入於澮澮入於川然則雖大雨霖其水有所渫能為害者希矣稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水以渉揚其芟作田瀦謂畜流水之陂防瀦旁隄也然則雖久不雨其水可以得能為害者希矣聖人之於水旱不其有備哉蒍掩規偃豬君子以為禮史起引漳水舄鹵生稻粱鄭國鑿涇水關中為沃野古之賢人未有不留意者也水官不修川澤溝瀆無有舉掌機巧趍利之民得行其私日侵月削往往障塞雨則易以溢謂之大水豈天乎霽則易以涸謂之大旱豈天乎如是而望有年未之思矣旴江集卷六欽定四庫全書旴江集卷七宋李覯撰國用第六繫辭曰包犧氏沒神農氏作斵木為耜揉木為耒耒耜之利以教天下盖取諸益是聖人之於農必制器以利其用也舜典曰棄黎民阻饑汝后稷播時百榖是聖人之於農必命官以掌其政也故遂大夫正嵗簡稼器脩稼政稼器耒耜鎡基之屬稼政孟春之月令所云皆脩封疆審端徑術善相丘陵阪險原隰土地所宜五榖所殖以教道民必躬親之之比也器不簡則貧人或不能備物政不脩則愚者或不能得宜不備物則雖良田将不耕不得宜則雖嘉種将不穫若是不可不慎也至如二耜為耦一夫不足獨舉必通功易事兩人相助而後可也故里宰以嵗時合耦于耡以治稼穡趍其耕耨行其秩敘耡者里宰治處於此合耦使相佐助秩敘相佐助之次第也又五榖熟時有風雨之急是謂力耕數耘收穫如寇盜之至者也然一夫又不足為故遂師廵其稼穡而移用其民以救其時事謂使轉相助救時急事也古之治天下至纎至悉之如此奈何民不富國不實也漢趙過能為代田一畮三􅍒一夫三百􅍒而播種於􅍒中苗生葉稍耨隴草因隤其土以附苗根比盛暑隴盡而根深能風與旱其耕耘下種田器皆有便巧用耦犂二牛三人一嵗之收常過縵田畮一斛以上善者倍之民或苦少牛過奏故平都令光以為丞教民相與庸輓犂以故田多墾闢用力少而得榖多斯近古之事效驗甚明而歴代莫以為意何也國用第七載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征謂宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟民雖有間無職事者猶出夫稅家稅夫稅者百畮之稅家稅者出士徒車輦給繇役也閭師凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰謂庶人五母雞二母彘無失其時是以不畜者罰之死後祭無牲也黍稷曰盛耕者所以殖黍稷今田不耕非直罰以屋粟又死後祭無盛也五畮之宅樹以桑麻今宅不毛非直罰以里布死後又無椁也蠶則得帛不蠶故身不得衣帛績則得布不績故死則不為之着哀以罰之也夫財賦力征人所吝嗇與其無事而重孰若有業而輕以此罰之敢或不勉者乎帛所以養老衰所以送死葬禮祭禮乃為令終一有解惰則不得用以此罰之敢或不勉者乎是聖人敺民以反本之術也漢髙祖令賈人不得衣絲乗車重稅租以困辱之孝恵髙后時為天下初定復弛商賈之律然市井子孫亦不得為官吏商賈乃在四民之目而前代且謫之後之㳺惰去四民逺甚者其類不可勝數為國者非徒函容或尊寵之傷哉國用第八一夫之耕食有餘也一婦之蠶衣有餘也衣食且有餘而家不以富者内以給吉㓙之用外以奉公上之求也而况用之無節求之無藝則死於凍餒者固其勢然也故土均掌和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地媺惡為輕重之法而行之掌其禁令禮俗邦國都鄙民之所行先王舊禮也君子行禮不求變俗隨其土地厚薄為之制豐省之節耳司書三嵗則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之政令逆謂鉤考也恐其羣吏濫稅斂萬民故知此本數乃鉤考其政令也夫奢則以為榮儉則以為辱不顧家之有亡汲汲以從俗為事者民之常情也是故為之禁令地媺收多則用之豐地惡收少則用之省如此民皆知惜費矣虧下以益上貪功以求賞不恤人之困乏皇皇以言利為先者吏之常態也是故為之鉤考雖器械六畜山林川澤必知其數如此吏不敢厚斂矣民皆知恤費吏不敢厚斂而不免凍餒者未甞聞也禮器曰居山以魚鼈為禮居澤以鹿豕為禮君子謂之不知禮然則地之惡禮不可輕耶有若曰百姓不足君孰與足然則民之財官可不知耶是先王之所以得後世之所以失也國用第九職方氏凡邦國小大相維王設其牧制其職各以所能制其貢各以其所有謂國之地物所有也諸侯得稅大國半次國三之一小國四之一皆市取當國所有以貢於王也土訓掌道地圖以詔地事道地慝以辨地物而原其生以詔地求辨地物者别其所有所無原其生生有時也以此二者告王雖是當州所有而生有時地所無及物未生則不求也大哉聖人念民勤恤財匱如是其著也地所有而官不用則物必賤地所無而反求之則價必貴况天時所不生則雖有如無矣買賤賣貴乗人之急必刼倍徙之利者大賈蓄家之幸也為民父母奈何不計本末罔農夫以附商賈令下之日吏旁為姦公不獲皮毛而私啄其髓矣壊民家敗民産此其甚也夏書任土作貢厥貢厥篚九州不同前聖後聖豈非一揆者乎漢桑都尉領大農以諸官各自市相争物以故騰躍而天下賦輸或不償其僦費廼請置大農部丞數十人分部主郡國令逺方各以其物如異時商賈所轉販者為賦置平準於京師都受天下委輸大農諸官盡籠天下之貨物如此富商大賈亡所牟大利則反本而萬物不得騰躍故抑天下之物名曰平準桑雖聚斂之臣然此一役豈無法耶孝武時國用饒給而民不益賦誠有以也國用第十司稼廵野觀稼以年之上下出斂法斂法者豐年從正㓙年則損也廪人掌九榖之數以嵗之上下數邦用以知足否以詔榖用以治年之凶豐凡萬民之食食者人四鬴上也人三鬴中也人二鬴下也若食不能人二鬴則令邦移民就榖詔王殺邦用謂以嵗之豐㓙得稅物多少之帳計國之用以知足否若嵗㓙稅物少而用多則不足廪人既知多少足否乃詔告在上用榖之法也夫什一而稅天下中正是故謂之徹徹者通也然耕穫之事豐儉亡常不幸㓙旱水溢或螟螣蟊賊農雖盡力榖有不登而有司必求如法於理安乎孟子道龍子之言曰治地莫善於助莫不善於貢貢者校嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然将終嵗勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也故聖人設官必於榖之将熟廵於田野觀其豐凶而後制稅斂焉豐年從正亦不多取也凶荒則損何取盈之有哉然則龍子所見盖周之末世周公雖貢未甞聞其不善也然而取之少則用不得不殺取少而用不殺則國不能自濟非反乎民将焉得也宜其知足否而詔榖用焉王制曰冡宰制國用必於嵗之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出由此道也後世作者除減斂法則既聞之矣至於邦用其可忽諸旴江集卷七欽定四庫全書旴江集卷八宋李覯撰國用第十一泉府掌以市之征布斂市之不售貨之滯於民用者以其賈買之物楬而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後予之凡賖者祭祀無過旬日喪紀無過三月凡民之貸者與其有司辨而授之以國服為之息物楬而書之物物書其賈也不時買者謂求急者也賖謂祭祀喪紀二者事大故賖與民不取利也貸者即今之舉物生利也與其有司别其所授之物所出之利各依其服事之稅若其人受園㕓之田而貸萬泉則朞出息五百他倣此也天之生物而不自用用之者人人之有財而不自治治之者君繫辭曰理財正辭禁民為非曰義是也君不理則權在商賈商賈操市井之權斷民物之命緩急人之所時有也雖賤不得不賣裁其價太半可矣雖貴不得不買倍其本什百可矣如此蚩蚩之氓何以能育是故不售之貨則斂之不時而買則與之物楬而書使知其價而况賖物以備禮貸本以治生皆所以紓貧窶而鉗并兼養民之政不亦善乎管仲通輕重而桓公以覇李悝平糴而魏國富彊耿夀昌築常平而民便之師古之效也宜其流風遂及於今必也事責其實官得其人亦何媿彼哉國用第十二司市凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使㣲利利於民謂物實厚者害害於民謂物行苦者使有使阜起其賈以徴之也使亡使㣲抑其賈以却之也侈靡細好使富民好奢㣲之而已又偽飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二所以俱十有二者工不得作賈不得粥商不得資民不得畜王制曰用器不中度不粥於市兵車不中度不粥於市布帛精麤不中數幅廣狹不中量不粥於市姦色亂正色不粥於市五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鼈不中殺不粥於市亦其類也夫理財之道去偽為先民之詐偽盖其常心矧兹市井飾行儥慝何所不至哉姦偽惡物而可雜亂欺人以取利則人競趍之矣豈唯愚民見欺邪使人妨日廢業以作無用之物人廢業則本不厚矣物無用則國不實矣下去本而上失實禍自此始也至於侈靡皆為人費雖不可盡去亦當制節使㣲少矣孟冬之月令曰毋或作為淫巧以蕩上心必功致為上書曰不貴異物賤用物民乃足此之謂也噫為國家者孰不有意哉言而必信令而必行鮮矣國用第十三遺人掌邦之委積以待施惠郷里之委積以恤人之囏阨門關之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待㓙荒委積者計九榖之數足國用以其餘共之也囏阨謂民有困乏則振恤之門關謂出入有稅足國用之外留之以養死政之老與其孤也郊里六鄉之民居郊者其委積以待賔客至郊與王國使者接因與之廪餼也野鄙謂六遂客有羇縶未得去者則於此惠之縣都謂四百里五百里中年榖不登則畿内畿外通給之也世之有饑穣天之行也禹湯之聖猶弗能免至於困窮孤獨寄客之人皆國所常有安坐而視其死則非仁人在上視民如傷者之意皆推其惻隱則邦用有經倉之榖孰為閒粒府之帛孰為羨縷如是而輟焉禍盖博矣故宜於大有年時畜積以備之倉人有餘則蔵之以待㓙而頒之職内敘其財以待邦之移用亦謂此也然而洪範云臣無有作福晏子稱家施不及國使民弗知主恩而謂為已力乃人臣之常過國家之大患也故郷師以嵗時廵國及野而賙萬民之囏阨以王命施惠此慮之深禮之至也然則義倉之法亦有取焉耳國用第十四司救凡嵗時有天患民病則以節廵國中及郊野而以王命施惠由是觀之非直凶荒而後施與也疾疫亦有之矣夫四時之厲或連月不愈或闔門不起丁壯卧於牀蓐則老稚無能為飲食所不給醫藥所不濟以至於死者豈天命乎人主所宜動心矣賈師凡天患禁貴儥者使有常價亦為此也司關國㓙札則無關門之征猶㡬由是觀之凶年非直除減田租彼貨賄之征皆舍之疾疫亦然夫阻饑之人營求衣食固無所不至又将籠其貨賄則何以措手足乎况於疾疫之世安得助天為虐耶人主所宜動心矣掌客凡禮賔客國新殺禮凶荒殺禮札喪殺禮禍烖殺禮在野在外殺禮由是觀之非直以嵗之下則殺邦用若新建國及札喪禍烖在野在外皆殺禮也禮許儉不非無安得重困於無聊之民求備乎籩豆之事也人主所宜動心矣膳夫大荒則不舉大札則不舉天地有烖則不舉邦有大故則不舉由是觀之非直於外事殺禮若王膳亦為之貶也譬諸父母其子之不哺而日餘膏粱可哉人主所宜動心矣故曲禮曰凶荒年榖不登君膳不祭肺馬不食榖馳道不除祭事不縣大夫不食粱士飲酒不樂皆自貶損憂民之道也如此天不為之感人不為之悦用度不足海内不安未之前聞也國用第十五鄉師以國比之法以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令糾禁聽其獄訟鄉大夫以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以嵗時入其書征之者謂給公上築作挽引道渠之役也國中復除者多役使者少人少則勞故晚役而早免之二十以及六十是也野復除者少役使者多人多則逸故早役而晚免之十五以及六十五是也君子之於人裁其勞逸而用之可不謂義乎世有仕學之鄉或舍役者半農其間者不亦難乎而上弗之恤悖矣貴者有爵命服公事者有功勞誠不可役然復其身而已世有一戸皆免之若是則老者疾者亦可以闔門不使耶至於馬牛皆辨其可任善夫世有人未嘗芻秣而責以牽徬其僦費敗家者衆矣况乎水旱疾疫之嵗饑餓之弗察死亡之弗圖而臨以定制敺之給使可乎故均人凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉㓙札則無力政無財賦也古者使民嵗不過三日而秦法月為更卒已復為正一嵗屯戍一嵗力役三十倍於古何不仁之甚也天下畔之晚矣國用第十六大司徒以保息六養萬民六曰安富謂平其繇役不專取也大哉先王之法其所以有天下而民不斁者乎孔子謂既庶矣富之既富矣教之管子有言倉廪實知禮節衣食足知榮辱然則民不富倉廪不實衣食不足而欲教以禮節使之趍榮而避辱學者皆知其難也及其為國家則有反是者矣田皆可耕也桑皆可蠶也材皆可飭也貨皆可通也獨以是富者心有所知力有所勤夙興夜寐攻苦食淡以趣天時聽上令也如此而後可以為人之民反疾惡之何哉疾惡之則任之重求之多勞必於是費必於是富者幾何其不黜而貧也使天下皆貧則為之君者利不利乎故先王平其繇役不專取以安之也漢武帝時筭賈人之緡匿不自占占不悉戍邉一嵗沒入緡錢有能告者以其半畀之即治郡國緡錢得民財物以億計奴婢千萬數田大縣數百頃小縣百餘頃宅亦如之商賈中家以上大氐破民媮甘食好衣不事畜蔵之業當是之時天下何如其不亡者幸也世俗不辨是非不别淑慝區區以擊彊為事噫富者乃彊邪彼椎埋而誅者果何人也旴江集卷八欽定四庫全書旴江集卷九宋李覯撰軍衞第一兵者國之大事人知之矣然先王足兵而未嘗有兵後世有兵而未嘗足兵何以言之小司徒會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人唯田與追胥竭作夏官序凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長凡民在鄉則五家為比家出一人故在軍五人為伍比長因為伍長五比為閭故五伍為兩閭胥因為兩司馬四閭為族故四兩為卒族師因為卒長五族為黨故五卒為旅黨正因為旅帥五黨為州故五旅為師州長因為師帥五州為鄉故五師為軍鄉大夫因為軍將士不特選皆吾民也將不改置皆吾吏也有事則敺之於行陣事已則歸之於田里無招收之煩而數不闕無禀給之費而食自飽故曰先王足兵而未嘗有兵也壘壁以聚之倉庫以生之羣眠類坐而不使補死填亡之不暇故曰後世有兵而未嘗足兵也管仲相齊桓公作内政而寓軍令焉故卒伍定乎里而軍政成乎郊連其什伍居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死其教已成外攘夷狄内尊天子以安諸夏然則鄉軍之法固嘗試矣善哉軍衞第二大司馬中春教振旅遂以蒐田火弊獻禽以祭社中夏教茇舍遂以苗田車弊獻禽以享礿中秋教治兵遂以獮田羅弊致禽以祀祊中冬教大閲遂以狩田徒弊致禽饁獸于郊入獻禽以享烝夫守國之備不可以不素習也不素習則敺市人而戰之未足為喻也是故春教兵入平列陳如戰之陳辨鼔鐸鐲鐃之用以教坐作進退疾徐疏數之節夏教草止如振旅之陳辨號名之用以辨軍之夜事秋教師出如振旅之陳辨旗物之用至冬大閲簡軍實焉然而不祥之器不得已而用之若無故而習是習殺人也非示天下不復用兵之意也故因春蒐夏苖秋獮冬狩而教焉鳥獸魚鼈皆函血氣若無故而殺是暴天物也作禽荒也故因祭社享礿祀祊享蒸而行焉明非好兵也為田獵也非好田獵也為祭祀也其名甚美其實甚利外以彰事神之禮非美乎内以作不虞之偹非利乎聖人之動其順如此顧不足為後世法乎天下無事則卒伍放于冗從器械束于故府學軍旅者指為凶人一方有警則旦收而暮教之暮教而旦發之人情焉得不驚戰陣焉得不敗至有以講武為戲樂用相夸示先王之禮沒於淫樂中者亦不足算也軍衞第三宫伯掌王宫之士庶子凡在版者掌其政令行其秩敘作其徒役之事授八次八舍之職事若邦有大事作宫衆則令之王宫之士謂王宫中諸吏之適子也庶子其支庶也秩謂依班秩受禄敘者其才藝髙下為次第以作其徒役者士庶子屬太子隨其所用使役之也八次八舍衞王宫者必居四角四中於徼候便也大事謂寇戎之事起宫中之衆使士庶子行則宫伯戒令之也宫正掌王宫之戒令糾禁去其淫怠與其竒衺之民㑹其什伍而教之道藝民謂宫中吏之家人也宫正掌宫中卿大夫士亦兼掌子弟若有為淫放怠慢譎觚非常之行則去之又㑹合之五人為伍二伍為什欲使宿衞時語言相體服容相識及其學問又相親切磋琢磨道藝謂三徳三行六藝也若是則宫中諸吏之子弟必當備宿衞從征役且聽太子之令也豈唯宫中諸吏之子弟而已哉凡公卿大夫元士之子亦然故諸子掌國子之倅掌其戒令與其教治辨其等正其位國有大事則帥國子而致於太子唯所用之若有兵甲之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正也大哉王者之師其備矣乎非直興於閭里抑又取諸世族彼以父祖貴富宜有報上之心而况學習徳行道藝孰不知忠孝之美任之以金革則與夫干賞蹈利庸徒鬻賣者蓋有間矣且太子將為君國子將為臣君臣之分未定而恩義固已接矣則今日之遊倅未必不為嗣王之將帥也轡長馭逺有如是哉文王世子曰公若有出疆之政庶子以公族之無事者守於公宫正室守太廟諸父守貴宫貴室諸子諸孫守下宫下室此諸侯禮也豈天子之事而有不用力者乎軍衞第四槀人掌受財于職金以齎其工弓六物為三等弩四物亦如之矢八物皆三等箙亦如之春獻素秋獻成書其等以饗工乘其事試其弓弩以下上其食而誅賞饗謂酒肴勞之也上工作上等其饗厚下工作下等其饗薄乘者計其事之成功也善則上其食尤善又賞之否者反此先王之於造兵其事必計之其物必試之非直饗有厚薄食有上下又臨之誅賞則工有不勉者乎作有不慎者乎故弓人為弓取六材必以其時凡相幹欲赤黑而陽聲角欲青白而豐末膠欲朱色而昔筋欲小簡而長大結而澤漆欲測絲欲沈冬析幹而春液角夏治筋秋合三材寒奠體氷析灂春被弦則一年之事矢人為矢前弱則俛後弱則翔中弱則紆中强則揚羽豐則遲羽殺則趮是故夾而揺之以眡其豐殺之節也橈之以眡其鴻殺之稱也凡相笴欲生而搏同搏欲重同重節欲疏同疏欲㮚廬人為戈柲車㦸酋矛夷矛句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶􅌛兵同强舉圍欲細凡試廬事置而揺之以眡其蜎也灸諸牆以眡其橈之均也横而揺之以眡其勁也函人為甲凡察革之道眡其鑽空欲其惌也眡其裏欲其易也眡其朕欲其直也櫜之欲其約也舉而眡之欲其豐也衣之欲其無齘也其作巧其試明擐之者無不堅執之者無不鋭以此戰何不勝以此攻何不取以此守何不固楚之鐵劒利而秦王色憂謂鐵劒利則士勇焉耳為國家者苟不留聰明則有司以常事處之郡國之貢姑備名物府藏之約唯謹簿書而欲用之立尸之地此可為太息者也旴江集卷九欽定四庫全書旴江集卷十宋李覯撰刑禁第一刑罰之行尚矣積聖累賢未有能去者也非好殺人欲民之不相殺也非使畏已欲民之自相畏也然而憲令所加寛猛或異苟失權時之制則致逺恐泥矣故大司寇之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典新國者新辟地立君之國用輕法者為其民未習於教二曰刑平國用中典平國承平守成之國用中典者常行之法三曰刑亂國用重典亂國篡弑叛逆之國用重典者以其化惡伐滅之蓋四海之内千八百國國政或異人心豈同苟執一以御之是膠柱而鼓瑟欲盡五聲之變不可得也夫新辟地立君之國居處未安衣食未足君臣之義未固上下之情未接從而急之則魚淰鳥獝不復聚矣其可不用輕法邪篡殺叛逆之國紀綱大壊風俗大惡强弱相勝衆寡相暴從而緩之則羊很狼貪難以制矣其可不伐滅之邪承平守成之國人各有業事各有制緩之將恐縱急之將恐擾其可不用常行之法邪以大言之則天下之理亦然漢興高祖初入關約法三章曰殺人者死傷人及盜抵罪蠲削煩苛兆民大説此非刑新國用輕典者邪周道既衰穆王眊荒命甫侯度時作刑以詰四方五刑之屬三千蓋多於司刑所職五百章此非刑亂國用重典者邪洪範三徳一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克皆聖人所以適時之變也奈何以三尺之書齊萬邦之政俗雖殊而弗察事雖變而弗知治之不及古豈不有由也哉刑禁第二小司寇以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民聽民之所刺宥以施上服下服之刑刺殺也宥寛也民言殺殺之言寛寛之上服劓墨下服宫刖是四刑亦三刺也羣臣士以上羣吏府史胥徒萬民民間有徳行不仕者朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後此則所訊之人也噫凡有血氣之類莫不愛其生君大夫士之於牛羊犬豕猶無故不殺况於人者萬物之靈父母生之拊畜長育顧復之恩至而後免於其懐刑之大者伏鈇鑕其次亦斷支體刻肌膚終身不息何其痛哉刑期無刑蓋不獲已苟得其情亦哀矜而勿喜矧可不慎以及于非辜者乎故聖人求之以五聽麗之以八議三宥以卹其非意三赦以異於全人猶恐聰有所不聞明有所不見下情有所不達議法有所不平於是有外朝之位以詢于衆焉必羣臣羣吏萬民之意同然後刑殺可不謂慎乎孟子曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮古之王者於有事且與下民共之後之效一官者往往自用同官為僚或疑其賣已閉口不與論職事况他人乎斷獄弊訟一出其臆如是而刑不濫邪賢於先王逺矣刑禁第三鄉士掌國中辨其獄訟異其死刑之罪而要之旬而職聽于朝司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺若欲免之則王㑹其期遂士掌四郊二旬而職聽于朝若欲免之則王令三公㑹其期縣士掌野三旬而職聽于朝若欲免之則王命六卿㑹其期期謂鄉士遂士縣士職聽于朝司寇聽之日王欲赦之則用此時親往議或命三公六卿往議之也君之於民猶親之於子也親則不忍其子君焉得忍其民哉推其不忍之心則人無有可戮罪無有可刑王欲赦之固其理也然而天討有罪王者奉之以作五刑刑者非王之意天之意也非天之意天下之人之意也殺人者死而民猶有相殺傷人者刑而民猶有相傷苟有以不忍而赦之則殺人者不死傷人者不刑殺傷之者無以懲其惡被殺傷者無以伸其寃此不近於帥賊而攻人者乎是故先王雖有不忍之心而不敢輙赦必於外朝與掌事者議其可否焉赦者非王赦之情可赦也否者非王不赦情不可赦也如此民何有不服令何有不行王符述赦曰養稂莠者害禾稼惠姦宄者賊良民誠哉不可不慎也刑禁第四掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪及刑殺告刑于王奉而適朝士加明梏以適市而刑殺之凡有爵者與王之同族奉而適甸師氏以待刑殺由此觀之先王之制雖同族雖有爵其犯法當刑與庶民無以異也法者天子所與天下共也如使同族犯之而不刑殺是為君者私其親也有爵者犯之而不刑殺是為臣者私其身也君私其親臣私其身君臣皆自私則五刑之屬三千止謂民也賞慶則貴者先得刑罰則賤者獨當上不媿於下下不平於上豈適治之道邪故王者不辨親疎不異貴賤一致於法其所以不肆諸市朝而適甸師氏者為其有恥毋使人見之也文王世子曰公族其有死罪則磬于甸人其刑罪則纎剸亦告于甸人公族無宫刑獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉為之變如其倫之喪無服親哭之公族之罪雖親不以犯有司正術也所以體百姓也刑于隱者不與國人慮兄弟也弗弔弗為服哭于異姓之廟為忝祖逺之也素服居外不聽樂私喪之也骨肉之親無絶也公族無宫刑不翦其類也古者諸侯之禮亦如是之懿哉孟子謂舜為天子臯陶為士瞽瞍殺人則執之舜視棄天下猶棄敝蹝也竊負而逃遵海濵而處終身訢然樂而忘天下彼天子父猶不可曲法而况官之子孫乃用䕃乎刑禁第五司救掌萬民之衺惡過失而誅讓之以禮防禁而救之凡民之有衺惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空其有過失者三讓而罰三罰而歸于圜土衺惡謂侮慢長老語言無忌而未麗於罪者過失亦由衺惡酗醟好訟若抽拔兵器誤以行傷害人麗於罪者誅誅責也罰撻擊之也加明刑者去其冠飾而書其衺惡之狀著之背也嘉石在外朝之門左使坐焉以恥辱之既而役諸司空也圜土獄城過失近罪晝日任之以事而收之夜藏於獄亦加明刑以恥之故大司寇以圜土聚教罷民凡害人者寘之圜土而施職事焉以明刑恥之其能改者反于中國不齒三年其不能改而出圜土者殺以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之司圜掌收教罷民凡害人者不使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒凡圜土之刑人也不虧體其罰人也不虧財善哉為國乎人之大惡豈一朝一夕必有漸也放僻邪侈之情動而無所畏忌則涓涓以成江河毫末以尋斧柯或伏尸市朝或流血刀鋸雖其悔之猶噬臍也是故先王之馭民必早為之所過輕者則坐諸嘉石稍重者則歸于圜土皆未入于五刑也若因兹困辱遂能自新則復為齊民何刑殺之及哉此亦使民遷善逺罪之術也孔子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡易曰屨校滅趾无咎此之謂也成康所以刑錯不用非一助邪刑禁第六萍氏幾酒謂苛察沽買過多及非時者謹酒謂使民節用酒也司虣掌憲市之禁令禁以屬遊飲食于市者若不可禁則搏而戮之以屬遊飲食謂羣飲食者也夫酒之為禍久矣君子以覆其邦家小人以不免刑戮可稱數哉酒誥曰文王誥教小子有正有事無彛酒越庶國飲惟祀徳將無醉又曰妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒此言文王告其民之小子與羣吏無得常飲酒若庶國君臣民衆飲酒亦唯祭祀以徳自將無令至醉故戒康叔當以文王之法往使妹土之人為純一之行勤種黍稷奔走事其父兄農功既畢始牽車牛逺行賈賣用其所得珍異孝養其父母其父母善子之行子乃自潔厚致用酒養也文王之法民之置酒唯祭與養耳而小人用之疏數無其時多少無其節羣飲食於市井以妨其業以費其財以興淫邪以起鬭訟是以禁之也然則聖人之於天下事為之制曲為之防果如何哉昔曹參去齊屬其後相以齊獄市為寄謂獄市者所以并容擾之姦人安所容乎蓋是時天下初定故從民之欲而不擾亂豈常行之道邪獄市不可以不治姦人不可以不禁大司徒以荒政十有二聚萬民其三曰緩刑而十有二曰除盜賊是救饑之政雖則緩刑至於盜賊不可不急其刑以除之也噫酒𣙜之官未罷則萍氏之禁司虣之令不復行矣然而緩刑仁也除盜賊義也凶年饑饉而仁義存焉亦不减於先王矣旴江集卷十欽定四庫全書旴江集卷十一宋李覯撰官人第一為人上者孰不欲進賢而賢或不進孰不欲退不肖而不肖或不退豈知而縱之邪人未易知也知人則哲帝堯猶以為難彼色厲内荏言行不相顧者滔滔皆是也非久與居胡能睹其真偽耶久與居者非鄰里鄉黨而誰邪故閭胥凡春秋之祭祀役政喪紀之數聚衆庶既比則讀法書其敬敏任恤者族師月吉則屬民而讀法書其孝弟睦婣有學者春秋祭酺亦如之黨正正歲屬民讀法而書其徳行道藝州長正月之吉各屬其州之民而讀法以攷其徳行道藝而勸之以糾其過惡而戒之若以歲時祭祀州社則屬其民而讀法亦如之鄉大夫三年則大比攷其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府内史貳之退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞閭胥二十五家之吏凡因㑹聚則書其人材族師毎月朔書春秋祭酺又書黨正夏正之月書州長正月之朔攷春秋社又攷是一歲之中凡幾書凡幾攷至于三歲鄉大夫乃攷而興之獻其書于王退而又詢衆庶寧復有賢能者乎其詳如此其慎如此而官謗不戢治道不登未之有也孔子曰昔吾於人也聽其言而信其行今吾於人也察其言而觀其行不見其人之姓名不知其身之善惡才不才决於數百言難乎為無失矣官人第二司士掌羣臣之版以徳詔爵以功詔禄以能詔事以久奠食徳謂賢者凡賢者能者皆先試以事久而有功然後授之以爵得禄食也爵以貴乎人天下之人共貴之禄以富乎人天下之人共富之高冠大蓋吏民趍走事之恐不及天下共貴之也稟財給榖農桑賦貢奉之而不暇天下共富之也天下共貴之而貴非其人天下共富之而富非其人則君命果義乎衆心果服乎且人各有能有不能孟公綽不可以為滕薛大夫禆諶謀於國則否况其下者乎苟非試其事考其功而遽與之爵禄則曠天官敗公事何足道哉王制曰論定然後官之任官然後爵之位定然後禄之所謂官之者使試守也堯舜豈不聖而試臣以職慎之至也若是則賢者必用不肖者必舍能者必行否者必藏嗇夫之印綬不可以幸而得也奚高位之辱哉夫位有高卑禄有厚薄言其操柄則無所不重州縣之職前世以為徒勞者而民命繫之未聞明試其功而居位受禄一官之效則仕而後學之有美錦者不使人學製焉民所以死生貧富顧不重哉官人第三大宰歲終則令百官府各正其治受其㑹聽其致事而詔王廢置三歲則大計羣吏之治而誅賞之宰夫歲終則令羣吏正歲㑹月終則令正月要旬終則令正日成以攷其治治不以時舉者以告而誅之司㑹以參互攷日成以月要攷月成以歲㑹攷歲成以周知四國之治以詔王及冡宰廢置歲計曰㑹月計曰要日計曰成凡百官府旬終月終皆考其治狀若治不以時舉者宰夫以告冢宰而責之至于歲終又考非直責之而已其有功無功司㑹以詔冢宰冢宰以詔王而廢置之置者進其爵廢者退其爵也及三歲則冢宰大計其治大無功不徒廢必罪之大有功不徒置必賞之也噫先王所以課吏考功如是其宻也日入其成是無一日而可敖盪歲終廢置是無一歲而不勸懲三年有成則申之以誅賞有功者驟獲其利無功者卒伏其辜雖能言之類亦知勸勉媿恥矣况智者乎舜典三載考績三考黜陟幽明彼三歲而一考九歲而後黜陟蓋帝道寛簡抑時世之然未若周公之典垂後昆之韙也董仲舒曰古所謂功者以任官稱職為差非謂積日絫久也故小材雖絫日不離於小官賢材雖未久不害為輔佐必也不求功實而以日月為限三年而遷一官則人而無死孰不可公卿者乎官人第四冬官考工注其曰某氏者官有世功若族有世業以氏名官者也官有世功則以官為氏若馮相氏保章氏師氏保氏韋氏裘氏冶氏之類是也族有世業則以氏名官若桃氏為劍築氏為削鳬氏為鍾㮚氏為量之類是也甚矣事之不可以不常也易曰天地之道常久而不已也日月得天而能久照四時變化而能久成聖人久於其道而天下化成孔子曰如有王者必世而後仁善人為邦百年可以勝殘去殺矣夫以聖人之徳履天子之位尚曰久於其道必三十年必百年而後仁政可成殘殺可去况於中人以下分職授政而可以不久者乎是故先王建官有世守之至以為氏也漢文景至武帝之初國家無事為吏者長子孫居官者以為姓號倉氏庾氏是也然則古之治天下皆如此乎吏之於民必相知心然後治也吏知民心則明明則政平矣民知吏心則信信則令行矣欲相知心豈一朝一夕而可哉上下未相知或知之未久遽委而去之後來者亦如此則是吏未嘗知民心民未嘗知吏心吏以所治為傳舍事或不舉則曰以待後人民視所屬如過客理或不勝亦曰以待後人官何以修衆何以服謂其有功邪進其爵可也重其賞可也如其職事則久之為貴故漢有當遷而増秩留者矧伊無功之人而可虚受禄食往來於道路間邪旴江集卷十一欽定四庫全書旴江集卷十二宋李覯撰官人第五地官序鄉老二鄉則公一人老尊稱也王置六鄉則公有三人也三公者内與王論道中參六官之事外與六鄉之教其要為民是以屬之鄉焉誠哉民事之重宰相所宜躬親也以三公之爵而聯六鄉之吏非躬親而何召公為伯聽男女之訟不重煩勞百姓止舍小棠之下國人被其徳説其化思其人愛其樹甘棠之所為作也而陳平曰决獄責廷尉錢榖責治粟内史丙吉謂宰相不親小事何也苟决獄不平錢榖出入不節民鬭相殺傷不止而宰相不知尚可調和隂陽順四時遂萬物之宜也哉此皆華言誤天下事慎聽之也故先王以民惟邦本造次顛沛無或忘之既使大臣為鄉老又取其鄉之人為吏所謂使民興賢出使長之使民興能入使治之者也蓋使民自舉能者因入之而使之治民之貢税田役於内謂為比長以上之官也夫能盡知人之情偽與其土所有其俗所宜莫若其鄉之人也因以為吏孰不治乎宓子賤為單父宰反命於孔子曰此國有賢不齊者五人教不齊所以治者孔子曰惜哉不齊所治者小所治者大則庶幾矣子賤受教於單父之人猶以至治况使單父之人躬為吏乎漢之賢人仕州郡者多矣刺史二千石往往有能名未必非其所助也東西南北之人言語猶未相通而責之善政難矣哉官人第六大司徒凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一大哉封建之禮此周之所以本支百世乎荀卿有言兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉富辰曰昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衞毛聃郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之子也然則先王於其族類有不厚乎詩曰凡今之人莫如兄弟兄弟䦧于墻外禦其侮平王東遷而晉鄭是依其世與年過于所卜由此塗出也豈嘗有兄弟之國敢問鼎之輕重者哉故段灼表于晉武帝曰滅周者秦非姬姓也代漢者魏非劉氏也雖云割地譬猶囊漏貯中亦一家之有耳縱令後世子孫還自相并蓋亦楚人失繁弱於雲夢尚未為亡其弓也其於神器不移他族則始祖不遷之廟萬年不改其名矣善哉灼之知言也漢雖有七國之變而梁孝以睢陽城守晉雖有八王之亂而元帝以琅邪中興魏氏王公有名無實禁防壅隔同於囹圄曹爽一死而司馬家取之如運諸掌上灼之言不亦善乎官人第七大行人掌大賔之禮及大客之儀以親諸侯春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時㑹以發四方之禁殷同以施天下之政此六事者以王見諸侯為文圖比陳協皆考績之言王者春見諸侯則圖其事之可否秋見諸侯則比其功之高下夏見諸侯則陳其謀之是非冬見諸侯則合其慮之異同六服以其朝歲四時分來更迭如此而徧時㑹無常期諸侯有不順服者王將有征討之事則既朝王命為壇於國外合諸侯而發禁命事焉王十二歲一巡狩若不巡狩則衆同衆同者六服盡朝既朝王亦命為壇於國外合諸侯而命其政四時分來歲終則徧矣六服朝歲則下文侯服歲一見甸服二歲一見男服三歲一見采服四歲一見衞服五歲一見要服六歲一見是也夫君臣之禮不可以不接不接則上恩不下流下情不上通嫌疑易以生毀譽易以入在易天地不交則否柔進而上行則錫馬蕃庶晝日三接也先王知其如此故制諸侯之朝逺者不過六歲以之圖事比功陳謨協慮發禁施政則言何以不見納行何以不見知奸邪何以介其間左右何以塞其路漢刺史奏事京師其斯之謂乎石顯五鹿充宗疾京房欲逺之元帝以房為魏郡太守房自請歲盡乘傳奏事天子許焉房未發詔止無乘傳奏事房意愈恐由此觀之臣子不得見君父其禍何如詩曰彼采葛兮一日不見如三月兮一日之中尚曰如三月三秋三歲况其久者乎官人第八内小臣奄上士四人寺人王之正内五人内竪倍寺人之數酒人奄十人漿人奄五人籩人奄一人醢人奄一人醯人奄二人鹽人奄二人幂人奄一人内司服奄一人縫人奄二人舂人奄二人饎人奄二人槀人奄八人守祧奄八人内小臣稱士者異其賢其餘蓋皆不命也夫宦官之位天象所有指其居次則或在帷薄之内論其職掌則或聞牀第之言固不可以詘辱俊乂渾淆男女其用腐身之類是乃制事之宜矣然而先王不以恩奪義不以私廢公雖其䙝臣無得過寵奄稱士者止於四人况可為卿大夫乎哉漢文帝時趙談驂乘爰盎伏車前曰天子所與共六尺輿者皆天下豪英今漢雖乏人獨奈何與刀鋸之餘共載如使之尸天官又非驂乘之比也自鄭衆謀誅竇憲為大長秋封侯其後孫程定立順之功曹騰參建桓之策續以五侯合謀梁冀受鉞高冠長劍紆朱懐金者布滿宫闈苴茅分土南面臣人者蓋以十數故曰三世以嬖色取禍嬴氏以奢虐致災西京自外戚失祚東都縁閹尹傾國豈不哀哉唐之北司同歸于亂説命曰事不師古以克永世匪説攸聞信矣旴江集巻十二欽定四庫全書旴江集卷十三宋李覯撰教道第一立人以善成善以教教而不善邪是堯舜之民鄙夭矣不教而善邪是桀紂之民可封矣移風俗斂賢才未有不由此道也故大司徒以鄉三物教萬民而賔興之一曰六徳知仁聖義忠和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數物猶事也民三事教成鄉大夫舉其賢者能者以飲酒之禮賔客之既則獻其書於王矣知明於事仁愛人以及物聖通而先識義能斷時宜忠言以中心和不剛不柔善於父母為孝善於兄弟為友睦親於九族婣親於外親任信於友道恤振憂貧者禮五禮之義樂六樂之歌舞射五射之法御五御之節書六書之品數九數之計以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑不弟不事師長造言訛言惑衆亂民亂名改作執左道以亂政也大哉先王之所以敺民而納之於善也教以開其前如得大路終日行而弗迷失刑以策其後使不敢反顧而况賔興以勸之哉養天性滅人欲家可使得孝子國可使得忠臣矣學校不立教法不行人莫知何人可師道莫知何道可學耳何以為正聲目何以為正色口何以為正言身何以為正行明者幸而得之昧者不幸而失之將欲求腹心於中林訪忠信於十室不易得矣小雅菁菁者莪孟氏君子三樂善為國者可無意哉教道第二外饔邦饗耆老孤子則掌其割亨之事謂養國老庶老也酒正凡有秩酒者以書契授之所秩者謂老臣九十日有秩也夫養老之禮自古帝王未始不隆之也王制曰凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之五十養於鄉六十養於國七十養於學達於諸侯有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序商人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊有虞氏皇而祭深衣而養老夏后收而祭燕衣而養老商人冔而祭縞衣而養老周人冕而祭𤣥衣而養老凡四代之制雖時有改然其道則莫之變也卿大夫之致仕者為國老士為庶老其餘非賢不可皆養亦引户校年以行復除八十者一子不從政九十者其家不從政也養老之禮有三老焉有五更焉天子無父矣欲為人子而不可得也無兄矣欲為人弟而不可得也是故父事三老所以教天下之為人子也兄事五更所以教天下之為人弟也親冕而總干袒而割牲執醬而饋執爵而獻祝䭇在前祝鯁在後公卿奉杖大夫進履天子之尊四海之内其意莫不為臣然而以父兄事人者孝弟之心無所用之因以教天下之孝弟也天子之尊且事他人為父兄天下之民敢遺其親父親兄乎是一舉而孝弟之風洋洋乎九州之外矣噫盛哉教道第三大司徒施十有二教二曰以陽禮教讓則民不爭陽禮謂鄉射飲酒之禮也黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位一命齒于鄉里再命齒于父族三命而不齒國索鬼神而祭祀謂歲十二月大蜡之時建亥之月也必正齒位者為民三時務農將闕於禮至此農隙而教之尊長養老見孝弟之道也凡射飲酒比鄉民雖為卿大夫必來觀禮齒于鄉里者以年與衆賔相次也齒於父族者父族有為賔者以年與之相次異姓雖有老者居於其上不齒者席於尊東所謂僎也大哉先王之所以和鄉黨睦親戚有如此夫彼一命者天子之下士公侯伯之上士子男之大夫也而與鄉里齒焉再命者天子之中士公侯伯之大夫子男之卿也而與父族齒焉三命者天子之上士公侯伯之卿也雖云不齒亦異席而已非敢居其上也然則貴而驕人少而陵長者不容於其間矣鄉飲酒義曰六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也民知尊長養老而后乃能入孝弟民入孝弟出尊長養老而后成教成教而后國可安也經解曰鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣夫二人同居亦一長一幼如使幼皆順長則爭何由興推此以及千萬人宜乎其獄訟之寡也而况尊人之長以及吾長養人之老以及吾老則輕重可知矣輕重可知而不孝不弟者其唯禽獸之心乎若是則教焉得不成國焉得不安也哉教道第四大宰以九兩繫邦國之民五曰宗以族得民宗繼别為大宗收族者也大宗者其先祖之負荷族人之紀綱乎大傳曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼高祖者五世則遷者也别子謂公子若始來在此國者後世以為祖也别子之適子適孫世世繼别子為大宗百世不遷族人五世外者皆為之齊衰三月母妻亦然故大宗有族食族燕之禮所以收族也夫五服者人道之大治也然而上盡於高祖旁盡於三從上盡於高祖則逺者忘之矣旁盡於三從則疏者忘之矣故立大宗以承其祖族人五世外皆合之宗子之家序以昭穆則是始祖常祀而同姓常親也始祖常祀非孝乎同姓常親非睦乎内則曰適子庶子祗事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入子弟猶歸器衣服裘衾車馬則必獻其上而后敢服用其次也若非所獻則不敢以入於宗子之門若富則具二牲獻其賢者於宗子夫婦皆齊而助祭焉終事而后敢私祭然則族人之重宗子何如哉重宗者尊祖之義也噫所生猶或不孝况逺祖乎同産猶或不睦况族人乎是先王坊民有禮而刑不足以齊之也教道第五小司徒之職掌建邦之教法以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食喪紀之禁令酇長各掌其酇之政令以時校登其夫家比其衆寡以治其喪紀祭祀之事曽子曰慎終追逺民徳歸厚矣喪祭之謂也哀哉死者乎為其形之將敗也而人惡之矣為其心之無知也而人倍之矣是故絞紟衾冒以周其内棺槨牆翣以文其外為使人勿惡也朝夕之奠以繼其養神明之器以備其用為使人勿倍也君子過哀則幾毀滅小人直情則將忽忘是故哭之有節服之有斷此聖人所以制喪禮也春履雨露而怵惕秋履霜露而悽愴孝子以天時之變念其親之不得見也是故散齋七日致齋三日隂幽以思而祭者可見矣祭之日入室必有見乎其位出户必有聞乎其聲事死者如事生思死者如不欲生蓋非牲牷肥腯粢盛豐備而已此聖人所以制祭禮也人有貴有賤有富有貧而未有無親者也其禮雖異其情則同王制曰庶人縣封葬不為雨止不封不樹喪不貳事亦其喪禮也庶人春薦韭夏薦麥秋薦黍冬薦稻亦其祭禮也然㝠㝠之民勸於利而懲於威苟非上之所財成則末由也已故小司徒有其禁令而酇長治之也三年問曰將由夫患邪淫之人與則彼朝死而夕忘之矣然而從之則是曽鳥獸之不若也夫焉能相與羣居而不亂乎揚子曰人而不祭豺獺乎是喪祭之禮廢則人不如禽為其上者所宜憂也旴江集卷十三欽定四庫全書旴江集卷十四宋李覯撰教道第六鄉師正歲稽其鄉器比共吉凶二服閭共祭器族共喪器黨共射器州共賔器鄉共吉凶禮樂之器吉服者祭服也凶服者弔服也比長主集為之祭器者簠簋鼎俎之屬閭胥主集為之喪器者夷槃素俎掲豆輁軸之屬族師主集為之此三者民所以相共也射器者弓矢楅中之屬黨正主集為之為州長或時射於此黨也賔器者尊俎笙瑟之屬州長主集為之為鄉大夫或時賔賢能於此州也吉器若閭祭器者也凶器若族喪器者也禮樂之器若州黨賔射之器者也鄉大夫備集此四者為州黨族閭有故而不共也此鄉器者旁使相共則無廢事上下相補則禮行而教成夫有其禮者必有其財而後可行也由士以上則田禄足矣庶人農力或不免凍餒而求其備禮不亦難乎故禮不下庶人者以此苟非乏財則人無禮不立何斯民之不得用哉先王患之乃使比長閭胥族師集罰物以為服器民有用者則共之若有故而不共則鄉大夫以公物補焉民無傷財而可得服器則夫能言者肯不行禮哉如是而不行禮則納之刑辟其又何辭宜乎其天下大服也任延為九真太守駱越之民無嫁娶禮法各因淫好無適對匹不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸禄以賑助之同時相娶者二千餘人其産子始知種姓彼一郡守猶能教人以禮而助之以財况四海之富乎哉教道第七典命上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宫室車旗衣服禮儀皆以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之公之孤四命其卿三命其大夫再命其士一命其宫室車旗衣服禮儀各眡其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宫室車旗衣服各眡其命之數夫宫室取以待風雨是則蓬茨足矣衣服取以禦寒暑是則紵絮足矣車馬取以代勞是則柴轂足矣器物取以利用是則瓦釡足矣然而耳目之欲雖窮壯極麗猶未足以厭之也先王因人之情而制之以為貴賤等級使貴者得以逞賤者無所覦則上下有體而朝廷以尊費用有節而財力不乏至于庶民亦有以防之故大司徒以本俗六安萬民六曰同衣服謂民雖有富者衣服不得獨異也不然則人人可以僭上上下一體則朝廷不尊家家可以大費費用無節則財力乃乏亂患所以作禮讓所以衰也仲叔于奚繁纓以朝而仲尼惜之庶人屋壁得為帝服倡優下賤得為后飾而賈誼長太息無意乎民則已苟有意哉是所先急也教道第八大司樂凡建國禁其淫聲過聲凶聲慢聲淫聲若鄭衞也過聲失哀樂之節凶聲亡國之聲若桑間濮上慢聲惰慢不恭也大胥掌學士之版以待致諸子版籍也大胥主此籍以待當召聚學舞者卿大夫之諸子則案此籍以召之漢大樂律曰卑者之子不得舞宗廟之酎除吏二千石到六百石及關内侯到五大夫子先取適子高七尺以上年十二到年三十顔色和順身體修治者以為舞人與古用卿大夫子同義也深矣乎聲之感人也如水之激如草之偃自生民以來莫之能免也樂記曰志微噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅廉直勁正莊誠之音作而民肅敬寛裕肉好順成和動之音作而民慈愛流辟邪散狄成滌濫之音作而民淫亂先王慎所以感之者故禁其淫過凶慢之聲而舞人又取卿大夫子有中和祇庸孝友之徳者是聲與人無不正也聲與人無不正則聞之且見之者焉得不正乎子夏曰今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也噫舞者男女自相雜子夏已疾之而况粉白黛黒笑言於尊俎間乎董仲舒所謂民之師師者宜不宜也然則天下多淫辟之罪有以矣夫教道第九師氏掌以媺詔王以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長保氏掌諫王惡而養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賔客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容以媺詔王告王以善道也諫者以禮義正之國子公卿大夫之子弟師氏教之而世子亦齒焉養國子以道者以師氏之徳行審諭之而後教之以藝儀也師保詔王以善諫王之惡王者既立乎無過之地矣又使教養國子而世子與焉是策之上也王制曰樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王太子王子羣后之太子卿大夫元士之適子國之俊選皆造焉則古之教人者世子無不在也文王世子曰行一物而三善皆得者唯世子而已其齒於學之謂也故世子齒於學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆著於君臣之義也其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節矣故父在斯為子君在斯謂之臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而國治夫將以宗廟社稷屬之可不教乎賈誼有言天下之命繫於太子太子之善在於早諭教與選左右三代之所以長久者以其輔翼太子有此具也文中子曰儲后不訓而晉業隳矣觀惠帝之失天下可無寒心也哉荀卿曰聖王有百吾孰法焉欲觀聖王之跡則於其粲然者矣後王是也道過三代謂之蕩法貳後王謂之不雅然則舍周其何適哉孔子曰甚矣吾衰也久矣吾不復夢見周公噫猶有望於今之世乎旴江集卷十四欽定四庫全書旴江集卷十五宋李覯撰明堂定制圖序五宗圖序明堂定制圖序臣伏以明堂者古聖王之大務也所以事上帝嚴先祖班時令合諸侯朝廷之儀莫盛於此然而年世久逺規模靡見經傳所出參差不同羣儒譸張各信其習修墜補闕何所適從臣雖顓䝉嘗竊議於斯矣臣謹按周禮考工記曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵大戴禮盛徳記曰明堂者自古有之凡九室一室有四户八牖共三十六户七十二牖禮記月令天子正月居青陽左个二月居青陽太廟三月居青陽右个四月居明堂左个五月居明堂太廟六月居明堂右个中央土居太廟太室七月居總章左个八月居總章太廟九月居總章右个十月居𤣥堂左个十一月居𤣥堂太廟十二月居𤣥堂右个此三書者皆聖賢之所作述學者之所傳習而一事殊制乖逺如此注釋之家亦各未為精當考工記五室鄭康成解之木室於東北火室於東南金室於西南水室於西北土室於中央故聶崇義三禮圖其為明堂接太室四角以為四室蓋用此也且既以五室象五行矣則木火金水之王當在東南西北之正何乃置之四角而云木室兼水火室兼木若必如是則中央之室復何所兼哉此説誠未可用也盛徳記九室蔡伯喈之徒傳之接四室之角又為四室聶崇義誤以為秦人明堂圖者是也按秦實無明堂但後儒見月令有天子居明堂之文以月令是秦相吕不韋所作春秋十二紀之首章疑為秦之明堂耳然今觀月令明堂十有三位無九室之説蓋崇義誤取大戴九室之堂以為秦制也又鄭康成亦駮大戴云九室三十六户七十二牖似秦相吕不韋作春秋時所益者非古制也噫康成注禮記既知月令是吕不韋所作春秋矣而月令豈有九室之文哉何以輙駮大戴九室以為出於吕氏春秋乎誠舛繆之甚也然其四室之角復為四室未知何所施用將以象五行享五帝乎則五室足以備之矣安用其餘將以配十二辰乎則四隅各兩室重在一方之上覈其意義反覆不安此説亦未可用也月令十三位本無此總數但以一大室四太廟八左右个其實十三位鄭康成注青陽左个則曰太寢東堂北偏云太寢者欲明明堂與太寢制同孔穎達正義以為云東堂者則知聽朔皆堂不於五角之室中且夫謂之廟與个者當須各是一位豈同在一堂靡所限隔而可稱為廟與个也蓋康成既執明堂為五室若於此十三位又為限隔則是室數頗多與已意相違故曲飾其辭以為三位同在一堂貴不害於五室之文耳此説固不可用也至唐李林甫等注月令青陽左个則曰寅上之室青陽太廟則曰卯上之室青陽右个則曰辰上之室明堂左个則曰巳上之室明堂太廟則曰午上之室明堂右个則曰未上之室太廟太室則曰太廟明堂總名太室中央室也總章左个則曰申上之室總章太廟則曰酉上之室總章右个則曰戍上之室𤣥堂左个則曰亥上之室𤣥堂太廟則曰子上之室𤣥堂右个則曰丑上之室觀此言太室處中央餘十二位各置其辰之上誠合於理然其謂太廟明堂總名及十三位俱以為室則誤矣明堂之上既獨以子午卯酉為太廟則太廟安得為明堂摠名哉十三位不俱謂之室解見於後又其人但知十三室各在其辰之上而不謀所以建立之處且太室既居中矣若以餘室連太室而為之則四面各可置一室四角缺處又各可置一室復不能令各在其辰之上其餘四室更何所安就欲巧而成之愈乖於方位矣或將逺太室而為則未見有明文言之者是此説亦未可用也後魏時有李謐者愍大禮之淪亡憤先儒之異議作明堂制度論以折衷於世其指以月令為宗而采周禮大戴之言以參合之云其室居中者謂之太廟太室當太室之東者謂之青陽太廟當太室之南者謂之明堂太廟當太室之西者謂之總章太廟當太室之北者謂之𤣥堂太廟以是為合於周禮之五室又云四面之室各有便房謂之左右个共三十六户七十二牖以是為合於大戴户牖之數今雖圖象莫存然按文察之謐之所言竊所未諭且太室四面各為一室則四角缺處各方二筵二筵之地乃為兩便房如東南角二筵地便當為青陽右个及明堂左个矣他皆倣此基址既狹况地形斜角不知何以置之復何以能令各在其辰之上夫分十二辰之位當須尺步平均然後能正也豈有四面之室既以二筵為一辰左右之个乃以二筵為兩辰哉舉兹一隅又知其不足取法也臣愚竊謂考工記盛徳記月令三家所指制度誠大同但立言質略意義弗顯訓傳之士泥文太過因而背馳李謐之志稍欲搴而合之矣奈不得其㫖尤而效之臣以月令之文最為明著輙亦取以為本而通之周戴月令雖秦人所作然皆追述古先聖王之道其中雖有官名時事不合周法者蓋吕氏欲以古道行之於時故稍或損益之豈可謂皆非古制歟夫以白虎通曰明堂上圓下方八窓四闥上圓法天下方法地八窓象八風四闥法四時九室法九州十二坐法十二月三十六户法三十六雨七十二牖法七十二風斯言合於事理因亦取之臣謹詳考工記是言堂基修廣非謂立室之數東西九筵南北七筵是言堂上非謂室中東西之堂各深四筵半南北之堂各深三筵半若堂室共在九筵七筵之内則雖如鄭氏五室之制從東至西亦須三室已據六筵之地外東堂止有一筵半西堂止有一筵半毎筵深一丈三尺五寸從南至北又三室據六筵之地外南北之堂各纔半筵深四尺五寸狹隘甚矣况室數更多豈可容哉蓋記者上言堂上之修廣次述室中之丈尺本非一貫而談也四堂東曰青陽南曰明堂西曰總章北曰𤣥堂五室凡室二筵是言四堂中央有方十筵之地自東至西可營五室自南至北可營五室十筵中央方二筵之地既為太室矣欲連太室而作餘室則不能令十二位各直其辰當須於東南西北四面各虚方二筵之地四角缺處又各虚方二筵之地周而通之以為太廟而太室正居中所謂太廟太室者言此太廟之中有太室也太廟之外當子午卯酉四位上各畫方二筵地以與太廟相通不為室所謂青陽明堂總章𤣥堂等太廟者也以其當青陽之堂上故曰青陽太廟餘三面皆倣此或問於臣曰經所謂太廟太室者當是青陽等四太廟居四方而太室在其中央故云太廟太室也子何須謂太室四旁虚地為太廟而云太室在其中哉臣對曰太室四旁既不得不有虚地既有虚地而經云太廟太室則太室四旁虚地非太廟而何且青陽等四太廟去太室猶隔二筵之地何以得云太室在四太廟中央乎又問曰子必云四太廟不為室而與十太廟相通者何哉臣對曰中既有太廟子午卯酉又各名太廟而地實相接則不得不相通也當寅申已亥辰戌丑未八位上各畫方二筵地以為室所謂左入右个者也八个之室并太室而九所謂九室也室四面各有户户旁夾兩牖所謂三十六户七十二牖也青陽明堂總章𤣥堂四太廟前面各為一門出於堂上門旁夾兩窓所謂八窓四闥也以廟之與堂當有所限隔故各為一門也謂之闥者小門也以太廟所出故其制異於羣室之户耳窓牖異者亦以廟門旁變於室中之制也四廟九室共十三位而白虎通云十二坐當是畧中央土所居矣左右之个其實皆室但以分處左右形如夾房故有个之名也太廟之内此謂太室四旁二筵地非青陽等太廟也以及太室其實祀文王配上帝之位也謂之廟者義當然矣土者分王四時負載萬物於五行最尊故天子當其時居太室用祭天之位以尊嚴之也四仲之月各得一時之中與餘月有異故復於子午卯酉之方取二筵地假太廟之名以聽其朔也此謂青陽等太廟也或問於臣曰太室四旁各二筵之地既為太廟又已當子午卯酉之正人君若尊嚴仲月何不止於此聽朔而乃復於其外别取二筵地假太廟之名哉臣對曰太室四旁各二筵地雖為太廟而當子午卯酉之正可以聽仲月之朔矣然若以此二筵地便為子午卯酉之位則餘辰又不正矣與夫連太室而為室何異哉秪如以太室東户前二筵地便為卯位聽仲春之政南户前二筵地便為午位聽仲夏之政則辰已二位須過在東南一角豈復能當青陽右个明堂左个之上哉故宜各於太廟之外别取二筵地與左右个並列而假太廟之名然後能使十二辰皆正也若是則三家之指曷有異哉但周禮言基而不及室大戴言室而不及廟稽之月令則備矣然非白虎通亦無以知窓闥之制也臣又詳鄭説明堂九階南面三階三面各兩階且毎面各三位而獨南面三階其餘各兩階求其義則靡所法象揣於事則不便升降今觀聶崇義所謂秦人明堂圖者其制有十二階似恐古之遺法也當亦取之禮記外傳曰明堂四面各五門今按明堂位曰九夷之國東門之外八蠻之國南門之外六戎之國西門之外五狄之國北門之外九采之國應門之外時天子負斧扆南嚮而立南門之外者北面東上應門之外者亦北面東上是南門之外有應門也既有應門則不得不有臯庫雉門矣明堂者四時所居四面如一南面既有五門則餘三面皆有五門矣鄭康成注明堂位則云正門謂之應門孔穎達正義曰正門謂之應門者以明堂更無重門非路門外之應門天子宫内有路寢故應門之内有路門明堂既無路寢故無路門及以外諸門但有應門耳且既有東南西北門矣而又有應門非重門而何歟觀其本意當謂變南門之文以為應門也又但見王宫有路門其次乃有應門今明堂無路門之名而但有應門便謂更無重門而南門即是應門矣且路寢之前則名路門其次有應門明堂非路寢乃變其内門之名為東門南門而次有應門夫復何害於義抑夷蠻戎狄之君既在四門之外而外無重門則是列於郊野道路之間矣豈朝㑹之儀而草草若是乎王宫常常所居猶設五門以限中外明堂者效天法地尊祖配帝而止一門以表之是豈協於事宜也則四面各五門斷在不疑矣臣又詳鄭康成注考工記夏后氏世室則云世室者宗廟也商人重屋則云重屋者王宫正堂若太寢也周人明堂則云明堂者明政教之堂也此三者或舉宗廟或舉正寢或舉明堂互言之以明其同制又注玉藻曰天子廟及路寢皆如明堂制仍與諸儒抗荅多方援引固以為三者同制後學承之莫有非者臣愚竊謂之不然矣苟路寢有四時之位則天子自可坐而聽朔奚用逺赴明堂若以尊嚴國政當假祭天之廟以聽之則事畢而還復於路寢居其時之堂何所為也宗廟之祭堂事室事一面而足四方之堂未聞所施設也雖世室有五室之説亦未必如鄭注有四堂也既曰明堂將以事上帝也宗廟將以尊先祖也而以已之正寢與之同制蓋非尊祖事天之意也矧鄭之此説並由胷臆必謂明堂宗廟路寢同為五室三代皆然但修廣之度因時而變周監二代其為宗廟則法修廣於夏其為路寢則取尋尺於商其為明堂則自為度筵之制實皆不改於五室焉此説既非經見安用迂闊而談奚不直謂周家作宗廟則法於夏路寢則法於商明堂則自為之各求其制以示於世乎得非康成見世室有五室既以五行推之明堂之文復有五室求其説而不獲及重屋之下都無室數遂乃巧為之辭以謂其制皆同乎又當見明堂位稱太廟天子明堂庫門天子臯門雉門天子應門以為魯行天子之禮魯之太廟既如明堂則周之太廟亦如明堂矣臣謂若周之太廟制如明堂魯之太廟又如明堂則是魯之太廟如周之太廟也何不曰太廟天子太廟而云明堂哉斯蓋魯行天子禮樂享帝告朔當倣於周然以人臣不敢立天子政教之堂故於周公之廟畧擬明堂之制以備其禮非周之宗廟如明堂也或問於臣曰路寢制如明堂雖經無明文然太史職云閏月詔王居門終月先儒皆以為天子閏月聽朔於明堂門中還而又處於路寢門也既閏月聽朔於明堂門中還而又處於路寢門則是常月聽朔於明堂之上還而處於路寢之上其居位亦當如在明堂中時也然則路寢亦如明堂有四時之位明矣臣對曰太史職閏月詔王居門終月蓋止是朔日詔王居明堂之門聽一月所當行之事終盡而返耳豈復有明文言還處路寢門哉蓋鄭氏之徒欲明三者同制妄生枝葉以言之也又况蔡伯喈以為明堂太廟太室太學辟廱雖名别而事同其為紕繆不已甚乎袁準正論駮之詳矣大戴亦云其外有水名曰辟廱於斯則誤也若其建置之所則淳于登云明堂者在國之陽三里之外七里之内丙已之地玉藻聽朔於南門之外康成之注亦與是相合夫稱明也宜在國之陽事天神也宜在城門之外建置之説兹焉可取於戲哲人既往禮器凋敝先王大法散在簡策而言近指逺學者多迷專門自用互相非毀故自漢興迄于有唐布政之宫屢曽營繕而規為鹵莽莫合聖制羣議交鬭誰將正之明君賢士疚心久矣臣生長草野涵泳恩澤仰兹大典輙所究尋伏惟我國家拓境踰四溟太平僅百載徳義充溢禮教興行封泰山祀汾隂耕藉田郊見上帝遺文逸美於是交舉聖神之衷殆將經始於斯堂乎四方有識注望多矣臣身雖賤微亦願此時稍禆萬一自託不朽故今敢先以所見制度具圖以獻圖凡以九分當九尺之筵東西之堂共九筵南北之堂共七筵中央之地自東至西凡五室自南至北凡五室毎室二筵則取於周禮考工記也一太室八左右个共九室室有四户八牖共三十六户七十二牖則協於大戴禮盛徳記也九室四廟共十三位則本於禮記月令也四廟之面各為一門門夾兩窓是為八窓四闥則稽於白虎通也十二階則采於聶崇義三禮圖也四面各五門則酌於明堂位禮記外傳也堂之下門之内本無修廣之數故今但圖五重門即不計其丈尺舊説明堂宫方三百步自可因宜處置也或問於臣曰臯庫雉應門之號四面皆同何也臣對曰四堂者皆天子所居所居之而皆若王朝焉無東西南北之異也今但變其内門之名以誌四方而應門以外諸門不改焉耳又問曰既云路寢不與明堂同制而明堂之門乃假王宫諸門之名何也臣對曰明堂之上所以事天尊祖布政教之所也故不與王寢同制門者限内外通出入而舊圖無所法象但以天子聽政所居象如王朝故假宫門之名亦何害於理况取諸書畧無偏棄異同之論庶可息焉古先之模或在於是號曰明堂定制圖鴻覆無私儻垂甄録施之於用必有可觀若夫棟宇之高卑土木之文飾至尊所居之服御上神所享之儀物此禮官學士之職非小臣之能盡也輕議國容罪當殊死謹上五宗圖序大傳曰别子為祖注云别子謂公子若始來在此國者後世以為祖也又曰繼别為宗注云别子之世適也族人尊之謂之大宗是宗子也又曰繼禰者為小宗注云父之適也兄弟尊之謂之小宗又曰有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼高祖者五世則遷者也注云遷猶變易也繼别子别子之世適也繼高祖者亦小宗也先言繼禰者據别子子弟之子也以高祖與禰皆有繼者則曽祖祖亦有也則小宗四與大宗凡五説者曰别子謂公子諸侯之庶子也若細别言之則妻之所生為適妾之所生為庶若秪據正體言之則妻之長子為適其次子以下及妾所生通得謂之庶子也諸侯之適子適孫繼世為君而庶子不得禰先君故自與其後世子孫為始祖也云若始來在此國者謂非君之親或是異姓始來在此國者亦得謂之别子自與其後世子孫為始祖也别子之適子世繼别子為大宗族人尊之雖五世以外皆為之齊衰三月為其母妻亦然所謂百世不遷者也其别子之庶子不得禰别子則自使其適子繼已而為小宗所謂繼禰者為小宗也繼禰則與親兄弟為宗也又其適子則繼祖與同堂兄弟為宗也又有適子則繼曽祖與再從兄弟為宗也又其適子則繼高祖與三從兄弟為宗也其庶子皆不得繼禰各自使其適子繼已而為小宗焉是自高祖之後至𤣥孫凡四世就此第四世小宗之三從兄弟而言則其人有小宗四矣宗共繼禰者親兄弟也又與之共宗於繼祖者同堂兄弟也又與之共宗於繼曽祖者再從兄弟也又與之共宗於繼高祖者三從兄弟也然則四宗備矣又與四宗共宗於大宗是為五宗也其於小宗各以本服服之親兄弟齊衰期也同堂兄弟大功也再從兄弟小功也三從兄弟緦麻也至第五世繼高祖之父者與四從兄弟無服不復為之宗所謂五世則遷者也若世數尚少則小宗或有三或有二或有一其曰小宗四者蓋極言之耳不必皆然也凡人生子或衆或寡今此圖盡為二子以甲乙第之斯蓋設法貴於省文若庶子之多者可以此例推之也甲者皆適也乙者皆庶也適者皆為小宗庶者皆不繼禰其㫖甚明弗復盡注贊曰吾於三宗見孝弟之至焉高祖以上逺矣而數十百世尊其正體不忘祖也何孝如之袒免以外疏矣而合之以食序以昭穆厚同姓也何弟如之先王之所以治天下此其本歟周衰法弛斯道以亡庶匹適者有之矣幼陵長者有之矣祖以世斷逺則忘之矣族以服治疏則薄之矣骨肉或如行路尚何有於天下乎於戲書燔簡脫幸存其畧而學者弗之察吾甚病焉故表之以圖云旴江集卷十五欽定四庫全書旴江集巻十六宋李覯撰富國策十首富國策第一愚竊觀儒者之論鮮不貴義而賤利其言非道徳教化則不出諸口矣然洪範八政一曰食二曰貨孔子曰足食足兵民信之矣是則治國之實必本於財用葢城郭宫室非財不完羞服車馬非財不具百官羣吏非財不養軍旅征戍非財不給郊社宗廟非財不事兄弟婚媾非財不親諸侯四夷朝覲聘問非財不接矜寡孤獨凶荒札瘥非財不恤禮以是舉政以是成愛以是立威以是行舍是而克為治者未之有也是故賢聖之君經濟之士必先富其國焉所謂富國者非曰巧籌筭析毫末厚取於民以媒怨也在乎强本節用下無不足而上則有餘也節用之説何如曰凡言國計者未嘗不以儉徳藉其口也而皆不得其説必以茅茨土階冬裘夏葛為帝王之徳是乃非聖無法不近人情宜乎人主之弗聽也貴為天子富有四海而使齪齪吝嗇下同匹夫不得自廣則安用尊卑為哉周制王有六寢后有六宫内官百有二十人女奴不在其數食用六榖膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋衣有文繡器有寳玉次舍共具所至無闕用四代之禮備四夷之樂玩好有焉匪頒有焉好用有焉王及后之用財皆不㑹計其所以自廣何如哉若是而從墨翟之道晏嬰之學以儉陋為是則周公之制作果非乎故曰凡皆言儉徳者皆不得其説也愚以為時有不同事有通變用之不足則禮從而殺亦聖人之意也有周而上兵農未分天子六軍諸侯大國三軍次國二軍小國一軍皆出於民居則為比閭族黨州鄉行則為伍兩卒旅師軍必耕而食必蠶而衣國之經費兹不與焉故以九州之財奉千八百君而有餘也秦漢而下兵農漸異衣食縣官者動數百萬内嚴宿衛外驅戎狄轉運千里賞賜鉅萬國之經費日以廣焉故以九州之財奉一君而不足也當其有餘之時用之可以盈禮遇於不足之際則宜深自菲薄如周之制尚當裁减甚於周者非敢聞也小過曰君子以用過乎儉語曰奢則不孫儉則固與其不孫也寜固儉非聖人之中制有時而然不得已也故孝文帝躬衣弋綈革舄韋帶所幸慎夫人衣不曵地欲為一臺度用百金廢而不為夫豈不知説耳目便身體極至尊之用哉葢念不傷財不害民損上益下之道也故其十二年而賜民租税之半明年遂除民田之租税孝景之時乃令民半出田租三十而稅一至武帝之初七十年間人給家足都鄙廪庾盡滿而府庫餘財京師之錢貫朽而不可校大倉之粟陳陳相因語後世之盛王必稱文景其故何哉以能適時之變過自菲薄而然也於惟一祖二宗創業屬統功徳至矣延洪於我后靡不勤且儉矣而今羌戎背恵邊境暴師勞費不息帑藏不實此其過自菲薄損上益下之時也伏惟日損之又損之以文景之心為心則天下幸甚富國策第二民之大命榖米也國之所寳租稅也天下乆安矣生人既庻矣而榖米不益多租稅不益増者何也地力不盡田不懇闢也周制井田一夫百畆當今四十一畆有竒人無易業而一心於農農時不失農功不粗則地力可盡也既又賦之以萊或五十畆或百畆或二百畆課其餘力治其曠土則田可墾闢也經界既毁王法弗復然猶能者時出焉李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畆治田勤謹則畆益三斗不勤則損亦如之地方百里之増减輙為粟百八十萬石矣漢捜粟都尉趙過能為代田一畆三􅍒二夫三百􅍒而播種於􅍒中苖生葉以上稍耨隴草因隤其土以附苖根盛暑隴盡而根深能風與旱一嵗之収常過縵田一斛以上善者倍之此盡地力之效也孝景詔曰郡國或磽狭無所農桑或地饒廣薦草莽水泉利而不得徙其議民欲徙寛大地聽之此墾田之意也今者天下雖安矣生人雖庶矣而務本之法尚或寛弛何者貧民無立錐之地而富者田連阡陌富人雖有丁强而乗堅驅良食有粱肉其勢不能以力耕也専以其財役使貧民而已貧民之黠者則逐末矣冗食矣其不能者乃依人莊宅為浮客耳田廣而耕者寡其用功必粗天期地澤風雨之急又莫能相救故地力不可得而盡也山林藪澤原隰之地可墾闢者往往而是貧者則食不自足或地非已有雖欲用力末由也已富者則恃其財雄膏腴易致孰肯役慮於菑畬之事哉故田不可得而墾闢也地力不盡則榖米不多田不墾闢則租税不増理固然也今將救之則莫若先行抑末之術以敺㳺民㳺民既歸矣然後限人占田各有頃數不得過制㳺民既歸而兼并不行則土價必賤土價賤則田易可得田易可得而無逐末之路冗食之幸則一心於農一心於農則地力可盡矣其不能者又依富家為浮客則富家之役使者衆役使者衆則耕者多耕者多則地力可盡矣然後於占田之外有能墾闢者不限其數昔晁錯言於文帝募天下入粟縣官得以拜爵今宜逺取秦漢權設爵級有墾田及若干頃者以次賞之富人既不得廣占田而可墾闢因以拜爵則皆將以財役傭務墾闢矣如是而人有遺力地有遺利倉廪不實頌聲不作未之信也管子曰與之在君奪之在君貧之在君富之在君惟上所裁擇富國策第三貨莫貴乎金賄莫重乎帛所貴乎金者以其器成而可革革之而不耗也所重乎帛者以其用功甚省而有益於寒也今兹乗輿之器享燕之用内賞賜羣臣外交通四夷必不可毋用金銀百官在位六軍在籍夏有暑冬有寒必不可毋用絲帛何以使金多而足用帛賤而易致哉愚以為東南之郡山高者鮮不鑿土深者鮮不掘失職之民網漏之姦晝夜合作足蹈重泉而不憂於陷首戴川澤而不虞於壓鑛石雲涌鑪炭之熖未之有熄一泥一沙蔑遺利矣是金非不出也平原沃土桑柘甚盛蠶女勤苦罔畏饑渇急采疾食如避盗賊繭簿山立繰車之聲連甍相聞非貴非驕靡不務此是絲非不多也金盡出而用不足盖用之者衆也絲雖多而帛不賤盖不専以為帛也古者以金銀為幣與泉布並行既而稍用為器飾然亦未甚著也今也翕然用之亡有品制守閭閻者唯財是視自飲食頮沐之器玩好之具或飾或作必以白金連斤絫鈞以多為惬財愈雄者則無所不至矣舉天下皆然故金雖盡出而用益不足也古者錦文不粥於市不示民以奢也今也庶民之家必衣重錦厚綾羅縠之衣名狀百出弗可勝窮工女機杼交臂營作争為纎巧以漁倍息其為帛者盬工惡絲而已故絲雖多而帛不賤也金不足則價騰躍價騰躍則出邦布而市之費日増焉猶不能登其數則率民而買之彼農民未嘗蓄金銀一旦當具則必資於豪黨資於豪黨則或壊其産焉官増其費民壊其産此實弊之大也帛不賤則貧民弗可得貧民弗可得則紵絮不足以禦冬而凍者多矣官之税買其價弗損而唯行濫之得帛行濫則軍吏之衣莫能完固而貧者多矣官價弗損人民多凍軍吏多貧此亦弊之大也今將救之則莫如明立制度其用金銀上下有等多少有數匹庶賤類毋得僣擬則金不可勝用也君子小人服章有别民非布帛毋得輙衣工機之功將復其本則帛不可勝用也果能此道矣是宿弊之源可坐而塞也孔子曰為政先禮禮其政之本乎制度禮之實也善為政者得無留意哉富國策第四或曰前所謂敺㳺民而歸之謂逐末也冗食也末者何事冗者何名其所以敺之請言其術曰所謂末者工商也所謂冗者不在四民之列者也古者工不造琱琢商不通侈靡偽飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二故工之所作賈之所粥商之所資皆用物也用物有限則工商亦有數今也民間滛侈無度以竒相曜以新相夸工以用物為鄙而競作機巧商以用物為凡而競通珍異或旬月之功而朝夕敝焉或萬里之來而墜地毁焉物無益而利無筭故民優為之工商所以日多也古者祀天神祭地祗享人鬼他未聞也今也釋老用事率吾民而事之為緇焉為黄焉籍而未度者民之為役者無慮幾百萬廣占良田利宅媺衣飽食坐談空虚以誑曜愚俗此不在四民之列者也古者府史胥徒官有定數今也郡縣之治未免寛貸冐名待闕傭書雇納請嘱之流動以千計内滿官府外填街陌交相賛助招權為姦狗偷蠶食竭人膏血此又不在四民之列者也古者執左道以亂政殺假於鬼神時日卜筮以疑衆殺周禮有醫師掌疾醫瘍醫以治萬民之疾病疕瘍其員不過十數今也巫醫卜相之類肩相摩轂相擊也或托滛邪之鬼或用亡驗之方或輕言天地之數或自許人倫之鑒迂怪矯妄獵取財物人之信之若司命焉此又不在四民之列者也古者天子諸侯大夫士用樂庶人無用樂之文况新樂之發子夏所不語匹夫熒惑諸侯孔子誅之今也里巷之中皷吹無節歌舞相樂倡優擾雜角觝之戯木棊革鞠飬玩鳥獸其徒之數羣行類聚往来自恣仰給於人此又不在四民之列者也一夫不耕或受之饑一女不織或受之寒而不耕者凡幾夫不織者凡幾女奈何民不饑且寒也百姓不足君孰與足民饑寒而上不匱者未之有也欲敺工商則莫若復樸素而禁巧偽樸素復則物少價巧偽去則用有數利薄而不售則或罷歸矣如此則工商可敺也欲敺緇黄則莫若止度人而禁脩寺觀止度人則未度者無所待而皆罷歸矣禁脩寺觀則巳度者不安其居而或罷歸矣其不歸者後數十年物故盡矣如此則緇黄可敺也欲敺官府之姦則莫若申明憲令慎擇守宰法嚴而吏察則無所措手無所措手則不得不罷歸矣如此則官府之姦可敺也欲敺方術之濫則莫若立醫學以教生徒制其員數責以精深治人不愈書以為罪其餘妖妄託言禍福一切禁絶重以遘募論之如法為之既艱則不得不罷歸矣如此則方術之濫可敺也欲敺聲伎之賤則莫若令民家毋得用樂衣冠之㑹勿納俳戯申命闗防呵其過往用之既少則不得不罷歸矣如此則聲伎之賤可敺也敺之有術復之有業然而不力於農者未之信也富國策第五或曰釋老之弊酷排者多矣然以脩心飬真化人以善或有益於世故聖賢相因重其改作今欲敺緇黄而歸之無乃已甚乎曰夫所謂脩心化人者舍吾堯舜之道將安之乎彼脩心化人而不由於禮苟簡自恣而已矣昔孟子之闢楊墨曰楊氏為我是無君也墨氏兼愛是無父也今山澤之臞務為無求於世呼吸服食謂夀可長非為我乎浮屠之法棄家違親鳥獸魚鼈毋得殺伐非兼愛乎為我是無君兼愛是無父無父無君不忠不孝况其弗及者則罪可知矣故韓愈曰釋老之弊過於楊墨也然而曰人其人火其書廬其居則言之太暴敺之無漸何者飽食安居其習巳乆一旦歛數十百萬人而冠之則驚擾甚矣故前所謂止度人而禁脩寺觀者漸而敺之之術也緇黄存則其害有十緇黄去則其利有十男不知耕而農夫食之女不知蠺而織婦衣之其害一也男則曠女則怨上感隂陽下長滛濫其害二也㓜不為黄長不為丁坐逃繇役弗給公上其害三也俗不患貧而患不施不患惡而患不齋民財以殫國用以耗其害四也誘人子弟以披以削親老莫飬家貧莫救其害五也不易之田樹藝之圃大山澤藪跨據畧盡其害六也營繕之功嵗月弗已驅我貧民奪我農時其害七也材木瓦石兼収並采市價騰踊民無室廬其害八也門堂之飭器用之華刻畫丹漆末作以熾其害九也惰農之子避吏之猾以傭以役所至如歸其害十也果去之則男可使耕而農夫不輟食矣女可使蠺而織婦不輟衣矣其利一也男則有室女則有家和氣以臻風俗以正其利二也戸有増口籍有増丁繇役乃均民力不困其利三也財無所施食無所齋民有羡餘國以充實其利四也父保其子兄保其弟冠焉帶焉沒齒弗去其利五也土田之直有助經費山澤之富一歸衡虞其利六也營繕之勞悉已禁止不驅貧民不奪農時其利七也良材宻石亦既無用民得築盖官得繕完其利八也滛巧之工無所措手棄末反本盡縁南畮其利九也宫毁寺壊不傭不役惰者猾者靡所逋逃其利十也去十害而取十利民人樂業國家富强萬世之策也何憚而不為哉將以存而勿論乎則董仲舒以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣將以為民祈福乎則詩云豈弟君子求福不回此皆賢人之至論先聖之法言也少留神明孰禦焉富國策第六古人有言曰榖甚賤則傷農貴則傷末謂農常糶而末常糴也此一切之論也愚以為賤則傷農貴亦傷農賤則利末貴亦利末盖農不常糶有時而糴也末不常糴有時而糶也以一嵗之中論之大抵斂時多賤而種時多貴矣夫農勞於作劇於病也愛其榖甚於生也不得已而糶者則有由焉小則具服器大則營昬䘮公有賦役之令私有稱貸之責故一榖始熟腰鎌未觧而日輸於市焉糶者既多其價不得不賤賤則賈人乗勢而罔之輕其幣而大其量不然則不售矣故曰斂時多賤賤則傷農而利末也農人倉廪既不盈竇窖既不實多或數月少或旬時而用度竭矣土將生而或無種也耒將執而或無食也於是乎日取於市焉糴者既多其價不得不貴貴則賈人乗勢而閉之重其幣而小其量不然則不予矣故曰種時多貴貴亦傷農而利末也農之糶也或闔頃而収連車而出不能以足用及其糴也或倍稱賤賣毁室伐樹不能以足食而坐賈常規人之餘幸人之不足所為甚逸而所得甚饒此農所以困窮而末所以兼恣也易繫辭曰何以聚人曰財理財正辭禁民為非曰義財者君之所理也君不理則蓄賈専行而制民命矣上之澤於是不下流而人無聊矣此平糴之法有為而作也管仲行於齊李悝行於魏耿夀昌行於漢國不失實人獲其利自晋迄隋時或興廢厥聞未昭唐天寳中天下平糴殆五百萬斛兹全盛之事也大宋受命將百年矣榖入之藏所在山積平糴之法行之乆矣盖平糴之法行則農人秋糶不甚賤春糴不甚貴大賈蓄家不得豪奪之矣而官之出息常什一二民既不困國且有利兹古聖賢之用心也然其所未至則有三焉數少也道逺也吏姦也一郡之糴不過數千萬其餘畢入於賈人至春當糶寡出之則不足於饑也多出之則可計日而盡也於是賈人深藏而待其盡盡則權歸於賈人矣是數少之弊也倉儲之建皆在郡治縣之逺者或數百里其貧民多糴則無資少糴則非可朝行而暮歸也故終弗得而食之矣是道逺之弊也舉掌之人政或以賄槩量不均行濫時有及其出也或减焉或雜焉名曰裁價實則貴矣是吏姦之弊也今若廣置本泉増其糴數則蓄賈無所専利矣倉儲之建各於其縣則逺民可以得食矣申命州部必使亷能則姦吏無以侵刻矣如此利國便人事可經乆是謂通輕重之權不可不察富國策第七水旱之憂聖王所不免堯湯之事賢愚嘗共聞也故君人者務多蓄積以為之備王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通雖有㓙旱水溢民無菜色周禮遺人掌邦之委積以待施恵鄉里之委積以恤民之囏阨門闗之委積以飬老孤郊里之委積以待賔客野鄙之委積以待覉旅縣都之委積以待凶荒此皆計國用之餘随便蓄積以須乏困故時可灾物可夭苗可槁地可赤而人不可饑也自井田法壊軍國務煩政取一切或未猶逺兵有儲邊有備則國之幸矣吏之能矣元元之民自為之而已矣夫民之無知靡衣媮食豐嵗粒米狼戾有不愛也食之亡節用之亡度或委於糞土或腐於甑甗或以飫狗馬或以肥雞鶩計口論費幾何而不倍蓰也及其㓙年則家不素蓄人不豫備室如罄矣突不黔矣草木之根實不足以飽矣於是强者為盗賊弱者轉而死溝壑父母妻子不能相保此禍亂之階善為國者所宜留意也嚮者天地嘗有灾矣百姓嘗有饑矣使以安撫為號者擁節而宵征吏以勸誘為辭者弗絶於耳或出御府之金或下鬻爵之令君心勤止不翅慈母然而榖生有時不可以坐而待也儲峙有數不可以從天降也求之甚至得之幾希以此振民不亦難矣愚竊跡古制之宜於時者莫若義倉之為愈也盖豐年損其有餘儉年救其不足事至纎悉功垂無窮故隋開皇中始立社倉終於文皇得無饑饉唐太宗曰既為百姓先作儲貯官為舉掌以備㓙年非朕所須横生賦斂利人之事深足可嘉今宜於天下縣治各建倉廪踵唐之制以義為名然唐之用心固善矣斂散之法則未盡得宜彼計民稼種以畮税之及無田者亦各有差則能入粟之人非窮民也至㓙年則入粟之家或自有貯備不當賙救於是窮民享之矣出此而入彼有䘮而無得奚以異於厚斂乎今莫若以農末之民各分戸等每於秋成以次入粟謂之寄留至㓙年則下戸之乏食者凖數給還其上戸則轉以給窮民書其轉給之數積以嵗年數登若干者拜以爵級以寵異之則富人樂輸窮民受賜矣與夫臨事而鬻爵無粟而虚求不可同日而語也富國策第八昔在神農日中為市致民聚貨以有易無然輕重之數無所主宰故後世聖人造幣以權之其始以珠玉為上幣黄金為中幣白金為下幣但珠玉金銀其價重大不適小用惟泉布之作百王不易之道也根周苗漢蔓於隋唐或因或革模法無常獨開元之號最得中制相承遂至於今斯固先史商之乆矣大抵錢多則輕輕則物重錢少則重重則物輕物重則用或闕物輕則貨或滯一重一輕利病存乎民矣至以國計論之莫若多之為貴何者用有常數不可裁减故也朝家治平日乆泉府之積嘗朽貫矣而近嵗以來或以虚竭天下郡國亦罕餘財夫泉流布散通於上下不足於國則餘於民必然之勢也而今民間又鮮藏鏹之家且舊泉既不毁新鑄復日多宜増而却損其故何也錢非温也不可衣而弊之也非脆也不可食而盡之也然而安在哉是有姦人銷之也姦人所以得銷者以惡錢容於市銅像銅器容於寺觀也竊觀人間或銷法錢殽雜他巧以為惡錢其作必於重湖大江窮山深谷風濤所阻猛獸所在人不得見吏不得呵是法令無由而勝也銷一法錢或鑄四五市人易之猶以二三則常倍息矣民既蓄惡錢不可使勿用利之所在是法令亦無由而勝也國失法錢而民得惡錢惡錢終不可為國用此錢所以益少也又緇黄之家競禮銅像易模變巧動必滿堂鐃鉦鐘磬之噐所在雷震謂取於官則有害冶鑄其私則以錢為之耳新故渾殽公私莫辨是法令亦無由而勝也用之廣矣利數倍矣故槖焉而熖鍜焉而聲者徃徃而是披榛而行𠂻甲而商者不絶於道緩則恣所為急則鬭而死是法令亦無由而勝也像則日新器則日長其所銷者寜有紀極此錢所以益少也今欲絶盗鑄莫若去惡錢去惡錢非急誅之謂也欲辨銅像銅器莫若一取而銷之勿得復用也何謂絶盗鑄莫若去惡錢夫盗鑄之人散在幽逺卒以法繩之則吏必苛察獄必寃濫閭里之間將不安居焉苟有利矣雖死而必求苟無用矣雖縱之弗為惡錢去則盗鑄者無用無用則盗鑄自絶矣故曰絶盗鑄莫若去惡錢也何謂去惡錢非急誅之謂也今人間既多惡錢一旦急之則莫敢出莫敢出則是銷法錢之銅而積之無用之地國既失實民且傷財固莫若下令収惡錢而銷之除其殽雜償以銅價示之期日要之重典民既畏法而喜於得直將畢入於官官挾其銅因以資冶鑄則法錢益増惡錢盡去矣故曰去惡錢非急誅之謂也何謂欲辨銅像銅器莫若一取而銷之勿得復用也今寺觀櫛比像器之設遽數不終必詰之曰作之新乎因之故乎取之官乎得之私乎則是増吏員不足以按廣獄城不足以繫令愈急而姦愈生非術之善也若一取而銷之勿得復用則銅積足以資冶鑄工巧無所措其手銷錢之弊不禁而止故曰欲辨銅像銅器莫若一取而銷之勿得復用也至於蠻夷之國舟車所通竊我泉貨不可不察古之人曰錢者亡用器也而可以易富貴富貴者人主操柄也果慎斯術則操柄無失而羣下服從有國之急務也富國策第九縣官食租衣税古之道也自漢而下兵益興經費益不足日生他名猶罔克濟勢不可已非上失也山澤之富天地所以飬人者鬻鹽之利博矣故東郭咸陽致生累千金吳王濞富埒天子孝武因置鹽鐡官是時國用饒給而民不益賦未必不由此也朝家酌古鹽法有因有革或引之池或汲之井或熬之海一出公上人不能私此其因者也東南列郡官自斥賣舟運銜尾倉儲如坻商旅之行斂手無措此其革者也然先王之制未有始善而末不弊者盖作法之時上心切至吏皆圗功人皆畏法而姦謀未生始以是善也累世之後事同凡常吏或觧弛人或慣習而姦謀日生末以是弊也官初糶鹽時操其贏甚厚而郡國鹽積常不足於糶今之郡國昔之郡國也戸口蕃息則倍蓰矣而糶益少鹽益滯者何也是姦謀入焉耳彼鹽之來逺者逾江湖嵗於波月於風焉近者亦百數十里維堤堰宿葭菼焉軍之窮吏之狡者家於是食於是私賣其什之幾而足以他物固其常也既輦而倉則舉掌之人又私賣其什之幾而足以他物無慮公鹽常失其半而半他物焉民之食鹽既多私賣者矣而公鹽之出不可賒貫故坐肆占賣者郡纔數十以數萬家之食仰數十戸之鹽一銖一兩不可與官為市必取於斯人之徒其勢必小其權量増以糞土常不啻以倍價取半鹽矣公鹽貴而汙私鹽賤而潔山澤之甿城邑之豪競食之而竊販者亦交馳焉是則民雖衆多或食私鹽或食糞土利輸於姦而官之糶益少鹽益滯矣令非緩也法非輕也利之所誘雖日刑人號痛之聲動乎天地弗能禁也故今日之宜莫如通商商通則公利不減而鹽無滯也何謂商通則公利不减夫官自糶鹽利信厚矣然舟有壊倉有堕官有俸卒有糧費已多矣若官鬻鹽而糶與商人使自行之既權其息因取闗市之税而費省焉是公利不减也何謂商通則鹽無滯夫商人衆而務售則鹽不殽雜所至之地又以貫於市人則列肆多得斥賣賣者多而務售則鹽亦不殽雜昔啖糞土者今皆食鹽昔憙竊販者今皆公行鹽之用益廣是以無滯也公利不减而鹽無滯財用以足刑罰以清治世之懿也或曰官鬻鹽而糶與商人有息焉有税焉息寡而税薄則公利損息多而税厚則商不來何如曰不若寡薄之為愈也寡薄則何以使公利不損曰東南和糴幾二百萬轉漕之費不為不多矣今糴鹽與商以米㩁折則數百萬斛可坐致淮海是於公利豈少也哉易曰通其變使民不倦此通變之時不可忽也富國策第十或曰天下之貨茶最後出而國用頼焉今兹有説乎曰茶非古也源於江左流於天下浸滛於近代君子小人靡不嗜也富貴貧賤靡不用也有國者從而籠之利一孔矣而世之所貴家之所蓄則非有公茶者何公茶濫惡不味於口故也每嵗之春芽者既掇焙者既出則吏呼而買之民輓而輸之矣民之淳或以利而姦也吏之察或以賄而闇也於是乎行濫入焉草邪木邪唯恐器之不盈也塵邪煤邪唯恐行之不昻也商筭而行或不售也則販者鮮矣倉儲之乆或腐敗也則水火乗之矣是以邦之泉布竭於市估而積之亡用之地息未収而本或䘮矣若東南列郡則吏自斥賣課不甚多時或不登焉而民之自用常數倍矣來有甚逺價有甚貴而人争取之者味羙也塗有甚險法有甚重而人争販之者利厚也廵按之使逐捕之卒日馳於野黥額之吏鞭背之人日滿於庭愁怨愈多而姦不可禁督責愈重而財不可阜勢之所運末如之何也巳今日之宜亦莫如一切通商官勿賣買聽其自為而籍茶山之租科商人之稅以此較彼殊塗一致且商人自市則所擇必精所擇精則儥之必售儥之售則商人衆商人衆則入稅多矣又昔之所以披草莽懐兵刄務私販者禁嚴故也既已通商則當安行夷路自實官府亦入稅多矣况不滯本泉不煩威獄利國便人莫善於此或曰子謂通茶鹽之商其如逐末何曰昔之未通商也文峻而網宻富厚重慎之子罔㳺其間故蚩蚩細民以身易財者入焉若法通商則大賈蓄家射時而趨細民何利焉非逐末之路也於戯鹽始於漢茶始於唐取以濟時事非師古異日邦財饒衍王道寖昌棄之於民不勝大願旴江集巻十六欽定四庫全書旴江集巻十七宋李覯撰强兵策十首强兵策第一兵之作尚矣黄帝堯舜以來未之有改也故國之於兵猶鷹隼之於羽翼虎豹之於爪牙也羽翼不勁鷙鳥不能以死尺鷃爪牙不鋭猛獸不能以肉食兵不强聖人不能以制褐夫矣所謂强兵者非曰日尋干戈暴骨萬里逞一朝之忿以求横行天下也必有仁義存焉耳仁義之説何如曰歴觀世俗之論兵者多得其一體而未能具也儒生曰仁義而已矣何必詐力武夫曰詐力而已矣何必仁義是皆知其一未知其二也愚以為仁義者兵之本也詐力者兵之末也本末相權用之得所則無敵矣故君者純於本者也將者駮於末者也孫子曰主孰有道將孰有能道道徳也能智能也又曰將者智也信也仁也勇也嚴也乃知君則專用道徳將則智信仁勇嚴並用之矣昔大道之行與三代之英不敢逺引請以漢事明之韓信言於漢王曰項王所過無不殘滅者天下多怨百姓不親附名雖為霸實失天下心大王之入武闗秋毫無所害除秦苛法與秦約法三章秦人無不欲得大王王秦者今大王舉而東三秦可傳檄而定也此項王失仁義而漢王得之之謂也及信為將以木罌缶渡而虜魏王背水陣立赤幟而破成安君成安君不聽廣武君䇿以為義兵不用詐謀竒計故身死泜水上此成安君失詐力而韓信得之之驗也然為將者多知詐力而為君者或不通仁義故雖百戰百勝而國愈不安敵愈不服也所謂仁義者亦非朝肆赦暮行賞姑息於人之謂也賢者興愚者廢善者勸惡者懲賦斂有法繇役有時人各有業而無乏用樂其生而親其上此仁義之凡也彼貧其民而我富之彼勞其民而我逸之彼虐其民而我寛之則敵人望之若赤子之號父母將匍匐而至矣彼雖有石城湯池誰與守也雖有堅甲利兵誰與執也是謂不戰而屈人之兵矣若彼貧其民我亦貧之彼勞其民我亦勞之彼虐其民我亦虐之而望敵人之來是猶以鴆漿待渴者以附子呼飢人彼寧無聊必死而已孰為來哉敵無歸心而誓必死則我雖以太公為將孟賁為卒飛兎為騎太阿為兵未易可圖也而况吾民不附自生他變亦不可不慎也國家積徳累仁為之百年矣黎民懐惠且歌舞矣不幸戎心怙亂阻我王命師興三嵗未獲振凱雖天𠂻勤恤而軍事惟煩或以財賦或以力征元元無知頗或愁怨而西方尤甚矣伏惟發徳音為天下慮内以紓吾民外以誘來者則邊鄙可安大功可立有識之願也强兵䇿第二或曰天下之事宜何慮哉曰以天下為一身則諸夏腹心也邊徼手足也腹心安寧氣和而神旺則手足之疾非吾禍也若腹心不寧役其氣而疲其神以專治手足手足未愈而腹心殆矣故用兵之法必修諸内而後行諸外彼長于技擊風氣勁直强則犯上弱則離散執而誅之用力非少舎而弗問時復侵軼顧權制之何如耳故當今之慮若興屯田之利以積穀於邊外足兵食内免饋運民以息肩國以省費既安既飽以時訓練來則奮擊去則勿追以逸待勞以老其師此䇿之上也若宿兵於外仰給於内前不敢進後不敢退雖曰無功幸免於敗千里饋糧二十致一材木敝於車輦牛馬死於牽徬男女困餓室家空虚行之數年敵承其敝此䇿之中也若帥師深入贏糧而隨少人則攻戰不足多人則饋饟不繼道險而有伏勢孤而無援與無知之俗争一旦之命萬一蹉跌禍在不測此䇿之下也今將出上䇿則何如曰屯田之利建議者多矣而執事未之從者其以地少可耕之田乎軍無可耕之人乎今之郡國民既庶矣誠少曠土可以耕也今之禁衛卒素驕矣誠無勤者可以耕也然而可耕之田安取之哉曰邊郡之民有困者矣有不安其居者矣苟募其徙内地授以生業使之安堵乃以其故田宅𨽻於屯官則不患無田矣然而可耕之人安取之哉曰邊郡之兵自禁旅之外别置屯軍凡天下廂之冗役者法之流移者民之願從者合而籍之以𨽻於屯官則不患無人矣田既入人既聚然後辨其夫畮列之廬舎授之耒耜教之稼穡明立勸課時加督察勤則有賞惰則有刑然而農功集矣既又為之什伍立其長帥賦以兵器與其甲胄乗其閒暇習之戰鬭是謂因内政以寄軍令也然而武事興矣食既足兵既練禁旅未動而屯軍固已鋭矣以紅腐之積濟虎貔之師利則進戰否則堅守國不知耗民不知勞而邊將髙枕矣彼其不忠不孝愚弄其民於矢石間而我以餘力馭之亡有日矣或曰屯田固便矣徙民内地不亦擾乎抑其授以生業於國用何如哉曰民得去兵冦輕賦役而就善地若水之於下魚之於淵也今募其徙是順民之政也漢武帝徙闗東貧人於隴西北地西河上郡凡七十餘萬口後加徙猾吏於闗内當是之時弗聞其擾也且以輦運之費為徙民之生業不亦多乎輦運則連年不息民業則一與之而巳矣暫勞永逸其此之謂乎然則民樂内徙而邊郡虚如之何曰嚮者民多而兵少故鬭者寡而驚者衆如使民少而兵多則鬭者衆而民有賴矣以兵易民何虚之有哉在漢趙充國在唐婁師徳皆以屯田利盡西土威震羌胡兹薦紳}
