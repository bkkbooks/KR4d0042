  - {type: variant, offset: 0, length: 3017, content: 直講李先生文集卷之十刑禁第一刑罰之行尚矣積聖累賢未有䏻去者也非好殺人欲民之不相殺也非使畏已欲民之自相畏也然而憲令所加寛猛或異苟失權時之制則致逺恐泥矣故大司寇之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用䡖典新國者新辟地立君之國用䡖法者爲其民未習扵教二曰刑平國用中典平國承平守成之國用中典者常行之法三曰刑亂國用重典亂國簒弑叛逆之國用重典者以其化惡伐滅之盖四海之内千八百國國政或異人心豈同苟執一以御之是膠柱而鼓瑟欲盡五聲之變不可得也夫新辟地立君之國居䖏未安衣食未足君臣之義未固上下之情未接從而急之則魚淰鳥獝不復聚矣其可不用䡖法邪篡殺叛逆之國紀綱大壊風俗大惡強弱相勝衆寡相暴從而緩之則羊狠狼貪難以制矣其可不伐滅之邪承平守成之國人各有業事各有制緩之将恐縱急之将恐擾其可不用常行之法邪以大言之則天下之理亦然漢興髙祖初入關約法三章曰殺人者死傷人及盗抵罪蠲削煩苛兆民大說此非刑新國用輕典者邪周道既衰穆王眊荒命甫侯度時作刑以詰四方五刑之属三千盖多扵司刑所職五百章此非刑亂國用重典者邪洪範三徳一曰正直二曰剛克三曰柔克平康正直疆弗友剛克爕友柔克皆聖人所以適時之變也奈何以三尺之書齊萬邦之政俗雖殊而弗察事雖變而弗知治之不及古豈不有由也㢤刑禁第二小司寇以三刺斷庶民獄訟之中一曰訊群臣二曰訊群吏三曰訊萬民聴民之所刺宥以施上服下服之刑刺殺也宥寛也民言殺殺之言寛寛之上服劓墨下服宫刖是四刑亦三刺也群臣士以上群吏府史胥徒萬民民間有徳行不仕者朝士掌建邦外朝之法左九棘孤卿大夫位焉群士在其後右九棘公侯伯子男位焉群吏在其後靣三槐三公位焉州長衆庶在其後此則所訊之人也噫凡有血氣之類莫不愛其生君大夫士之扵牛羊犬豕猶無故不殺况扵人者萬物之靈父母生之拊畜長育顧復之恩至而後免扵其懐刑之大者伏鈇鑕其次亦斷支體刻肌膚終身不息何其痛㢤刑期無刑盖不獲巳苟得其情亦哀矜而勿喜矧可不慎以及于非辜者乎故聖人求之以五聴麗之以八議三宥以䘏其非意三赦以異扵全人猶恐聡有所不聞明有所不見下情有所不逹議法有所不平扵是有外朝之位以詢于衆焉必群臣群吏萬民之意同然後刑殺可不謂慎乎孟子曰左右皆曰可殺勿聴諸大夫皆曰可殺勿聴國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮古之王者扵有事且與下民共之後之效一官者往往自用同官為僚或疑其賣巳閉口不與論職事况他人乎斷獄弊訟一出其臆如是而刑不濫邪賢扵先王逺矣刑禁第三鄊士掌國中辨其獄訟異其死刑之罪而要之旬而職聴于朝司寇聴之斷其獄弊其訟于朝群士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺若欲免之則王㑹其期遂士掌四郊二旬而職聴于朝若欲免之則王令三公㑹其期縣士掌野三旬而職聴于朝若欲免之則王命六卿㑹其期期謂郷士遂士縣士職聴于朝司寇聴之日王欲赦之則用此時親往議或命三公六卿往議之也君之扵民猶親之扵子也親則不忍其子君焉得忍其民㢤推其不忍之心則人無有可􅓍罪無有可刑王欲赦之固其理也然而天討有罪王者奉之以作五刑刑者非王之意天之意也非天之意天下之人之意也殺人者死而民猶有相殺傷人者刑而民猶有相傷苟有以不忍而赦之則殺人者不死傷人者不刑殺傷之者無以懲其惡𬒳殺傷者無以伸其冤此不近扵帥賊而攻人者乎是故先王雖有不忍之心而不敢輒赦必扵外朝與掌事者議其可否焉赦者非王赦之情可赦也否者非王不赦情不可赦也如此民何有不服令何有不行王符述赦曰養稂莠者害禾稼恵姦宄者賊良民誠㢤不可不慎也刑禁第四掌囚掌守盗賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪及刑殺告刑于王奉而適朝士加明梏以適市而刑殺之凡有爵者與王之同族奉而適甸師氏以待刑殺由此觀之先王之制雖同族雖有爵其犯法當刑與庶民無以異也法者天子所與天下共也如使同族犯之而不刑殺是為君者私其親也有爵者犯之而不刑殺是為臣者私其身也君私其親臣私其身君臣皆自私則五刑之屬三千止謂民也賞慶則貴者先得刑罰則賤者獨當上不媿扵下下不平扵上豈適治之道邪故王者不辨親踈不異貴賤一致扵法其所以不肆諸市朝而適甸師氏者為其有耻母使人見之也文王世子曰公族其有死罪則磬于甸人其刑罪則纎剸亦吿于甸人公族無宮刑獄成有司讞于公其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟公曰宥之有司又曰在辟公又曰宥之有司又曰在辟及三宥不對走出致刑于甸人公又使人追之曰雖然必赦之有司對曰無及也反命于公公素服不舉為之變如其倫之喪無服親哭之公族之罪雖親不以犯有司正術也所以體百姓也刑于隱者不與國人慮兄弟也弗弔弗為服哭于異姓之廟為忝祖逺之也素服居外不聴樂私喪之也骨肉之親無絶也公族無宫刑不翦其類也古者諸侯之禮亦如是之懿㢤孟子謂舜為天子臯陶為士瞽瞍殺人則執之舜視棄天下猶棄敝蹝也竊負而逃遵海濵而䖏終身訢然樂而忘天下彼天子父猶不可曲法而况官之子孫乃用䕃乎刑禁第五司救掌萬民之衺惡過失而誅譲之以禮防禁而救之凡民之有衺惡者三讓而罰三罰而士加明刑耻諸嘉石役諸司空其有過失者三譲而罰三罰而歸于圜土袤惡謂侮慢長老語言無忌而未麗於罪者過失亦由衺惡酗醟好訟若抽㧞兵器誤以行傷害人麗扵罪者誅誅責也罰撻擊之也加明刑者去其冠飾而書其衺惡之状著之背也嘉石在外朝之門左使坐焉以耻辱之既而役諸司空也圜土獄城過失近罪晝日任之以事而收之夜蔵扵獄亦加明刑以耻之故大司寇以圜土聚教罷民凡害人者寘之圜土而施職事焉以明刑耻之其能改者反于中國不齒三年其不能改而出圜土者殺以嘉石平罷民凡萬民之有罪過而未麗扵法而害扵州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之司圜掌收教罷民凡害人者不使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒凡圜土之刑人也不虧體其罰人也不虧財善㢤爲國乎人之大惡豈一朝一夕必有漸也放僻邪侈之情動而無所畏忌則㳙㳙以成江河毫末以尋斧柯或伏尸市朝或流血刀鋸雖其悔之猶噬臍也是故先王之馭民必早爲之所過輕者則坐諸嘉石稍重者則歸于圜土皆未入于五刑也若因兹困辱遂能自新則復爲齊民何刑殺之及㢤此亦使民遷善逺罪之術也孔子曰小人不耻不仁不畏不義不見利不勸不威不懲小懲而大誡易曰屨校滅趾無咎此之謂也成康所以刑錯不用非一助邪刑禁第六萍氏幾酒謂苛察沽買過多及非時者謹酒謂使民節用酒也司虣掌憲市之禁令禁以屬逰飲食于市者若不可禁則搏而􅓍之以屬逰飲食謂群飲食者也夫酒之為禍乆矣君子以覆其邦家小人以不免刑􅓍可稱數㢤酒誥曰文王誥教小子有正有事無彛酒越庶國飲惟祀徳将無醉又曰妹土嗣尓股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒此言文王吿其民之小子與群吏無得常飲酒若庶國君臣民衆飲酒亦唯祭祀以徳自将無令至醉故戒康叔當以文王之法往使妹土之人為純一之行勤種黍稷奔走事其父兄農功既畢始牽車牛逺行賈賣用其所得珍異孝養其父母其父母善子之行子乃自潔厚致用酒養也文王之法民之置酒唯祭與養耳而小人用之䟽數無其時多少無其節群飲食扵市井以妨其業以費其財以興淫邪以起闘訟是以禁之也然則聖人之扵天下事為之制曲為之防果如何㢤昔曹參去齊属其後相以齊獄市為寄謂獄市者所以并容擾之姦人安所容乎盖是時天下初定故從民之欲而不擾亂豈常行之道邪獄市不可以不治姦人不可以不禁大司徒以荒政十有二聚萬民其三曰緩刑而十有二曰除盗賊是救饑之政雖則緩刑至扵盗賊不可不急其刑以除之也噫酒榷之官未罷則萍氏之禁司虣之令不復行矣然而緩刑仁也除盗賊義也凶年饑饉而仁義存焉亦不减扵先王矣直講李先生文集卷之十終, WYG: ''}
