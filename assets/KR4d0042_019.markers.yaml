  - {type: variant, offset: 2038, length: 0, content: '', WYG: 行尚矣積聖累賢未有能去者也非好殺人欲民之不相殺也非使畏已欲民之自相畏也然而憲令所加寛猛或異苟失權時之制則致逺恐泥矣故大司寇之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典新國者新辟地立君之國用輕法者為其民未習於教二曰刑平國用中典平國承平守成之國用中典者常行之法三曰刑亂國用重典亂國篡弑叛逆之國用重典者以其化惡伐滅之蓋四海之内千八百國國政或異人心豈同苟執一以御之是膠柱而鼓瑟欲盡五聲之變不可得也夫新辟地立君之國居處未安衣食未足君臣之義未固上下之情未接從而急之則魚淰鳥獝不復聚矣其可不用輕法邪篡殺叛逆之國紀綱大壊風俗大惡强弱相勝衆寡相暴從而緩之則羊很狼貪難以制矣其可不伐滅之邪承平守成之國人各有業事各有制緩之將恐縱急之將恐擾其可不用常行之法邪以大言之則天下之理亦然漢興高祖初入關約法三章曰殺人者死傷人及盜抵罪蠲削煩苛兆民大説此非刑新國用輕典者邪周道既衰穆王眊荒命甫侯度時作刑以詰四方五刑之屬三千蓋多於司刑所職五百章此非刑亂國用重典者邪洪範三徳一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克皆聖人所以適時之變也奈何以三尺之書齊萬邦之政俗雖殊而弗察事雖變而弗知治之不及古豈不有由也哉刑禁第二小司寇以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民聽民之所刺宥以施上服下服之刑刺殺也宥寛也民言殺殺之言寛寛之上服劓墨下服宫刖是四刑亦三刺也羣臣士以上羣吏府史胥徒萬民民間有徳行不仕者朝士掌建邦外朝之法左}
