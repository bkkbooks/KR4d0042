  - {type: variant, offset: 2039, length: 0, content: '', WYG: 棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後此則所訊之人也噫凡有血氣之類莫不愛其生君大夫士之於牛羊犬豕猶無故不殺况於人者萬物之靈父母生之拊畜長育顧復之恩至而後免於其懐刑之大者伏鈇鑕其次亦斷支體刻肌膚}
