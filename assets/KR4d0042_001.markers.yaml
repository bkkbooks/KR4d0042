  - {type: variant, offset: 0, length: 90, content: 建昌新建李泰伯祠堂記天下之羙恒興於賢明而廢於愚暗使賢明迭繼雖百世可也設不幸而值愚暗焉雖有鉅羙且廢于成况望其䏻興夫既廢也㢤又望其䏻崛然興起也㢤柰何賢明者之不常有宜乎天下之羙之難成也旴, WYG: ''}
