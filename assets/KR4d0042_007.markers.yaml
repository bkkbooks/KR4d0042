晞送黄介夫送山甫送沈郎中送江茂才贈端上人千福寺昧軒怡山長慶寺傅翼甘圃林屯田思軒廻明上人詩卷聽周太師琴送覺師西逰乞御書送分司呉太博還鄊送任大中送杜奉職送陽曲蔡尉送武陵令送酸棗鄧主簿送仙逰知縣許延評送杜寺丞知永城廻廖解元所業送張寺丞送何祕丞送劍州張掾送演教太師東逰寄贈福山長老五言六韻書樓夏晚小杉乾元節群臣祝夀小人無位以詩繼之悶書同徐殿丞逰麻姑山陳屯田聞之以詩見寄次韻第一首五言八韻送李著作知柳州五言十韻送知縣蘇祕丞移英州夏日雨中七言二韻鄊思少年自勉戯題玉䑓集讀皮襲羙病中書事詩有可憐真宰意偏解困吾曹之句偶代荅之雪中見梅花二首和慎使君出城見梅花雪中贈柳枝柳枝荅和天慶觀瑞香花烏鵲方平璧月睡起讀長恨辭二首羿妻梁帝鞦韆二首嘲漢武戚夫人有感三首自遣睡思逰寺醉㱕却寄同坐索酒憶錢塘江謝傳神平常人次韻荅提刑孫都官二首謝知縣徐殿丞示及新詩送流人送周山人遣興詠桃閏正月三日偶書二首論文二首送僧逰廬山李郭戯題荷花戯贈月葛陂懐古七夕二首宗人宅折桂堂麻源題壁馬嵬驛齊世家漢宮景陽宮井燕雀二首張禹孔光元紀二首聞鸎學北堂有海棠一株顔色至佳凋落稍速憶而為詩玉蝴蝶花次韻陳殿丞觀魚送傳野送杜萬儒行感義屈原宋玉贈日者鄒生送夏旦赴舉送春曉角送丁正臣惜才又一首五言登越山送古山人送毗師西逰送春寄呈祖袁州二首次韻陳屯田途中所寄正月二十俗號天穿日以煎餅置於屋上謂之𥙷天感而為詩送薛經僧志月碧雲軒改為景雲因書二首書景雲軒壁因逰華子崗題壁卷第三十七七言四韻苦雨初霽野人書麻姑廟客有話故丁祕監京師舊宅因而傷之五龍塘寄小兒季夏雨中宛有秋色四望之際百感生焉因題於紙秋懐書松陵唱和七夕早起有懐留題㱕安尉凝碧堂答張鬷嘏清明日作晚思暮春始逰城西寄傅代言丙子冬至夜酒醒南齋詠風小雨清暉亭題净居院往山舍道中作秋晚悲懐殘葉哭十姪秋隂寄介夫書懐寄介夫關徐送張宏下第南㱕葛陂逢何道士俞秀才山風亭小飲謝宋屯田見示永平録海南編閩中歲暮送侯殿直之官吉州偶題饒秀才谿光亭宗人宅仁知閣早夏偶作匈奴傳忠武侯次韻荅陳殿丞見寄贈韓侍禁送沈祕校寄題錢塘毛氏西湖園自觧不寐韓偓集有自撫州往南城縣舟行見拂水薔薇之詩南城吾鄊也因題八句代書答陳次公和君錫題壁送王都曹送危太博題虞侍禁山亭君錫宰夀春錢寺丞知白州次韻荅史太博蟬寄史屯田答丘寺丞示月蝕詩蓬屋堦基宜春臺東湖送趙拊太平州十詠亭送王尉野意亭靈源洞送陳司理送黄承伯謝蔡十八丈示詩卷淸話堂詩送郴縣呉主簿覽余堯輔詩因成七言四韻次韻酬屯田陳文見寄同徐殿丞遊麻姑山陳屯田聞之以詩見寄次韻第二首和陳屯田送知縣徐殿丞次韻和屯田陳丈寄唐休次韻和王刑部逰仙都觀和逰丹霞有懐㱕之意七言八韻送知軍曹比部移䖍外集卷第一告劄舉狀書詩序附告詞二劄子四薦章三首外集卷第二名公手書范文正公三書小簡孫觀文三書余侍郎三書歐陽内翰一書蔡宻學二書馬雜端三書蕭閣副一書小簡祖學士一書李侍郎一書孔宗旦一書外集卷第三序詩墓銘張學送李君南歸序葉内翰詩祖學士詩奉和泰伯送春絶句送春長句呈泰伯先生宜春臺東湖送春黄先生晞詩寄李先生黄寺丞通詩麻姑山一首贈陳仲父賢良兼泰伯先生門人陳次公撰先生墓誌銘并序直講李先生文集總目終, WYG: ''}
