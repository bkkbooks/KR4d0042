  - {type: line-break, offset: 0, content: '', id: KR4d0042_SBCK_000-1a01}
  - {type: variant, offset: 0, length: 6, content: 直講李先生文, WYG: ''}
  - {type: variant, offset: 7, length: 498, content: 序孔子没千有餘祀斯文衰敝其間作者孟軻荀卿賈誼董仲舒揚雄王通之徒異代相望而不能興衰捄敝者位不得而志不行也茍得位以行其志則三代之風吾知其必復嗟乎秦漢以来禮樂則不為而任刑以毆其民将納於治適所以亂之也歴世寖乆皆謂天下當如是可以致治而不治者時耳故有奮筆舌為章句卒不及於禮樂者末哉文也旴江李泰伯其有孟軻氏六君子之深心焉年少志大常憤疾斯文衰敝曰墜地巳甚誰其拯之扵是夙夜討論文武周公孔子之遺文舊制兼明乎當世之務悉著于篇且又歎曰生䖏僻遐不自進孰進哉因徒歩二千里入京師以文求通于天子乃舉茂材異等得召第一既而試于有司有司黜之嗚呼豈有司之過邪其泰伯之命邪或者天徒付泰伯以其文而命則否邪亦将位得志行後有時邪吾不得而知已泰伯退居之明年類其文藁第為十有二卷以寄南康祖無擇且屬為序無擇既受之讀之朞月不休善乎文武周公孔子之遺文舊制與夫當世之務言之備矣務學君子可不景行於斯慶暦三年冬至日序李覯泰伯以舉茂材罷歸其明年慶暦癸未秋因料所著文自冠迄兹十五年得草藁二百三十三首将恐亡散姑以類辯為十二卷寫之間或應用而為未能盡無媿閔其力之勞輒不棄去至於妖淫刻餙尤無用者雖傅在人口皆所弗取噫天将壽我乎所為固未足也不然斯十二卷庶可籍手見古人矣故自序云, WYG: ''}
