  - {type: variant, offset: 28389, length: 22161, content: 舍人執事洪惟天之清地之淳矞雲膏露所禀無㡬甘泉紫芝僅承其餘是故其正氣也升之則為神降之則為賢神所以造萬物賢所以治萬物其致一也賢人之業莫先乎文文者豈徒筆札章句而巳誠治物之器焉其大則核禮之序宣樂之和繕政典飾刑書上之為史則怙亂者懼下之為詩則失徳者戒發而為詺誥則國體明而官守俻列而為奏議則闕政修而民隱露周還委曲非文曷濟禹益稷臯陶之謨虺之誥尹之訓周公之制作咸曰興國家靖生民矣自周道消孔子無位而死而秦嬴以烈火刼之漢由武定晚知儒術至今越千載其間文教一盛一衰大抵天下治則文教盛而賢人逹天下亂則文教衰而賢人窮欲觀國者觀文而可矣吾君接三后之遺烈對皇天之駿命身居九清横制四海獷俗庭而兵革偃年榖豐而禮讓作太平盛事漸而無纇繇是下明詔戒文弊抑末世之流宕復先王之炳蔚方内豪傑翕然承風援毫者悉本三代㳺談者羞聞五覇始自薦紳逮于韋布盡雍雍如也雖然羽者必有鳯毛者必有麟文章之囿則宗主存焉伏惟執事以大臣子知聖人道策名天階從事冊府竒辭高識日新又新潤色之任拾取如芥誠将輔君政而主師教四三皇而七六經固蒸人之宗王而學者之指南也竊念覯家扵江表生而嗜學誦古書為古文不敢稍逗橈行年二十八未獲薦用于時謗讟益多窮困益甚怳然自疑其業之非是輙敢决正于左右未知蓍蔡之仁肯錫之一言㢤謂之是則區區姓名當由此而顯謂之非則齒少氣盛猶足以改習然則謂執事為文章宗主而指南扵學者良不虚矣生平為文謹采其二十四篇寫成一冊及所著明堂定制圖一道并序草具其副辱諸侍者演暢多暇一賜觀覽千萬幸甚千萬幸甚藪澤庸㣲干犯崇貴曷任畏罪不宣覯再拜上宋舍人書脩撰舎人執事覯不肖竊謂文之扵化人也深矣雖五聲八音或雅或鄭納諸聴聞而淪入心竅不是過也嘗試從事扵簡策間其讀虗無之書則心頽然而厭於世觀軍陣之法則心奮起而輕其生味縱横之說則思譎詭而忘忠信熟刑名之學則憙苛刻而泥㢘隅誦隱遁之篇則意先馳扵水石詠宫體之辭則志不出扵匳匣文見扵外心動乎内百變而百從之矣諒非淳氣素具通識旁照則為其所敗壊如覆手耳韓子有言曰儒以文亂徳豈謂是乎然則聖君賢輔将以使民遷善而逺罪得不謹扵文㢤有周而上去古未遠而濬哲時起以綱領之彬彬之盛如天地日月不可復譽其大而褒其明也至于漢初老師大儒未盡凋落嗣而興者皆知稱先聖本仁義數百年中其秉筆者多有可采魏晉之後涉于南北斯道積羸日劇一日髙冠立朝不恤治具而相高老佛無用之談世主儲王而争誇姦聲亂色以為才思虗荒巧偽㓕去義理俾元元之民雖有耳目弗能復視聴矣賴天相唐室生大賢以維持之李杜稱兵扵前韓柳主盟扵後誅邪賞正方内嚮服堯舜之道晦而復明周孔之教枯而復榮逮于朝家文章之懿高視前古者階於此也不意天宇之廣頽風未絶近年以來新進之士重為其所扇動不求經術而摭小說以為新不思理道而專雕鎪以為麗句千言萬莫辨首尾覽之若㳺扵都市但見其晨而合夜而散紛紛藉藉不知其何氏也逺近傳習四方一體有司以俻官之故姑用汎取瑣辭􅍝舉無如之何聖人之門将復榛蕪矣所幸明后在阼賢臣在位慨然興念思遏其波凡曰有識孰不抃慰然詢扵輿人則僉謂執事與禁掖數公謀救斯弊用心最切至覯僻逺之民也獲聞是語信之不疑誠以執事負大才業角馳英俊之埸疊為天下第一遭時結主坐致嚴近苟協咨同僚翊起正道鑿吾人之胸而㱕以中和之氣固其職矣雖然世俗之仕難以道諭易以名誘誘之之術不在辭費胡不扵廣衆之中擇其好古知道有出扵人者浴其塵垢被以羽翼使奮飛扵天衢庶夫聞見之者知所勸勉乎記曰以義度人則難為人以人望人則賢者可知矣若必求徳行如顔閔文學如㳺夏者而後取之則是待飛兔腰褭而乗車也伏惟稍卑其論而聴小人之請覯家扵南楚生二十有八年矣自総髪讀書羞以耿耿之心為流俗所昏醉開卷執筆輙欲闚見古作者之状貌為之浸乆非敢自謂有所得然其用意不為不專矣家貧親老弗獲禄仕或怒其介或笑其迂左排右擠溝壑是虞今兹旅食上國日聞高義不慙賤陋奉累閽守必欲招延雋傑激勸頑鄙顧可以隗為始乎昔牛竒章見稱扵韓吏部而名遂籍甚退之非僧孺所可跂及也然而所以稱之者急扵教道欲其行之者多庸兹奨勵而巳耳今覯雖不才抑猶未肯與僧孺等列執事不為退之之事則巳若其為之幸少留意焉嘗所著明堂定制圖一道并序其意在賛明經義以埤益一王之盛禮天門祕邃未敢通獻謹繕其副陳諸座隅并以雜文二十四篇録為一冊繼用塵瀆潤色多暇時賜財擇是所願也志切言直有犯威尊俯伏待罪不宣覯再拜上范待制書知府待制執事覯嘗聞之鶡冠子曰賤生扵無所用中流失船一壺千金始猶未信今乃知之嗟乎古之為士者何其顯榮㢤身弊緼而寵踰華衮腹藜糗而富埒千乗故有以南靣之王而擁篲扵匹夫公子國相而執轡扵羸老兹戰國之事尚未足法漢有天命四履之逺化戎為華而猶求賢如不及州郡察焉四府辟焉一介之善無敢漏畧縣郷小吏名汙賤者也翼之而仕角之而朝者往往有焉此無他盖有國者慮下情之壅遏得人以快耳目當塗者畏曠官之罪以舉賢為稱職習俗相尚氣熖薰灼而然也故于時能言以上多自琢飾閨門為仕進之階郷黨乃榮名之路奨助風教夫豈小歟厥後古道不逞辭科浸長為士者何其顯榮㢤身弊緼而寵踰華衮腹藜糗而富埒千乗故有以南靣之王而擁篲扵匹夫公子國相而執轡扵羸老兹戰國之事尚未足法漢有天命四履之逺化戎為華而猶求賢如不及州郡察焉四府辟焉一介之善無敢漏畧縣郷小吏名汙賤者也翼之而仕角之而朝者往往有焉此無他盖有國者慮下情之壅遏得人以快耳目當塗者畏曠官之罪以舉賢為稱職習俗相尚氣熖薰灼而然也故于時能言以上多自琢飾閨門為仕進之階郷黨乃榮名之路奨助風教夫豈小歟厥後古道不逞辭科浸長不由經濟一出聲病源而海之以至今日矧惟真帝在上皇天乃睠太平之根穏貫坤厚四鄙酣寝無雞鳴犬吠之警法令流暢罔或牴牾役夫賤類馳一乗之傳則足以呼舞諸侯矣三尺童子據案㺯筆則足以斬决強梗矣不待偉人深智而職事巳治故雖浮華淺陋之軰率為可用聲律取士孰不曰宜學小則易工利近則可欲貟位有數而求之者多國朝患其或私謁也扵是糊其名易其書混致扵考官之手固不知其立身之行幹蠱之才雖有仁如伯夷孝如曽參直如史魚㢘如扵陵一語不中則生平委地况執其柄者時或非人聲律之中又有遺焉薦扵鄕奏扵禮部第扵殿庭偶失偶得如奕棊耳名卿大臣以其無舉知之責也閉其口不復言天下士俛視同術䟽若秦越養威重崇愛惡管庫之隷洒掃之僕皆得以保任而惜一言以舉遺逸雖然好古㓗㢘之士寧忍饑而死耳安能仰靣以希其咳唾扵戯學道之無益也如此夫宜其腐儒小生去本逐末父詔其子曰何必讀書姑誦賦而巳矣兄教其弟曰何必有名姑程試而巳矣故有縑緗凝塵不記篇目而致甲科帷薄汙辱市井不齒而諧羙仕勸善懲惡將安在邪萬一史臣示書法於後世則赤墀之下當有任其責者矣噫非大賢君子其曷能矯之覯建昌南城人也生二十有九年矣齠齓憙事以進士自業摘花蕊寫雲煙為世俗辭語頗甚可取愚不惟道之隆替時之向背輙㳺心扵聖人之藴志将以堯吾君羲吾民晨夜精思頗為有得視闕政如已之疾視惡吏如已之讐恨無斗水以洗濯瑕穢四顧悲歌時或涕洟然而命薄計拙動成顛仆鄕書之不録况爵命乎孤貧無依載其空文走南北楫焉而川竭蹄焉而路窮嘗遊京邑凡時之所謂文宗儒師者多請謁焉但伏執事之名時最乆矣謀之扵儒林則又謂執事表知樂之士有自褐衣而得召者如覯等軰庶可依㱕不幸未及弛檐而執事以言左遷時異事變卒無所遇彷徨而㱕又黜鄕舉身病矣力窮矣仰喜朝車適留兹土故不逺五百里犯風雨寒苦來拜扵廡下古之君子居易以俟命不患人之不巳知今覯也踽踽而來若行賈之為者其故何㢤伏念家世貧乏幼孤無兄弟老母年近六十饑焉而無田寒焉而無桑喁喁科舉求不可望之祿以為養抑䟽闊矣毎朝夕進側則見髪斑體臞而食淡衣粗烏鳥之情痛劈骨髄王城百舍天門九關銖銅不畜何路自逹遐方小郡知已斷絶姦邪所怒哆冶所笑身無油脂日就乾腊往時多事勤苦成疾今兹憂愁益復發作長恐醫餌不繼忽沉溝壑内孤慈母上負明時所懐不伸抱恨泉壤以此計校不宜黙黙是以来也伏惟執事以文學名家以公忠許國封書言事及扵母子夫婦間無所隱諱庭辯宰相而辭不可屈此其心将大有為者也不日祗奉明詔㱕于帝右持衡制事當不因循然則仕籍未甚清俗化未甚修賦役未甚等兵守未甚完異方之法亂中國夷狄之君抗天子長驅大割用工非一肘腋諮議豈宜少人漸而收之盍自今日覯雖不才以備一人之數顧不可乎苟取其窮而通之取其賤而貴之補罅續斷粗當益國不徒矯世俗騰舉士之名而巳此在髙明熟慮之也弗復云云嘗所著明堂定制圖一道并序前日度支魏公以列于座隅兹不再獻潜書十五篇野記二篇禮論七篇共一冊謹用塵瀆常行所業五卷亦以資間暇一笑皆舊寫不精致恕而憐之可也不宣覯再拜上孫寺丞書寺丞執事當今天下職官孰䡖重㢤去扵民不逺事之一介必折諸其庭莫如縣大夫者吾邑之在江表亦繁鉅矣戸口櫛比賦米之以斛入者歳且數萬自政不得人二三年来尤為昏亂公庭攘攘塞耳不聞怨聲民錢獄理交手為市刺史弗之恤㢘使弗之問褁粮北走路宿一月然後至京師天門沈沈虎士交㦸朝無親黨䄂無金貝有能自逹其冤者乎是以窮夫細人拷棒且死噤不得言唯仰首拜天以願雪活嗟乎聖人在上此何罪也不意復有執事取而正之民之瘡痍洗刷鍼療吏之宿贓奪諸其懐書牒訟争者不持尺布斗粟喜捷而返里胥大徭随候衙喝無土工木材之責綰弊布衣食菜飲水晨而出暮不敢休勉勉哀矜與赤子為父母貪人侈婦之所竊笑守道君子嗟嘆之不暇嗚呼仕今之世處今之俗其心皎皎追古人為徒伏惟執事之事業其小大何如也但恐聴詳則事滯愛極則姦生髙明多見當自知矣小人無位請賛言之押劵書移畒稅者立判時遣無淹乆以匱其力則農不傷䑕竊狗偷得情則巳無姑息以枝其辭則捕逐之吏敢奉其職村氓僻陋逺者二百里負米為食十捐六七以足薪蒭房賃之費旦入郭門夜馳而出往返猶且數日若必求其根待其蔓或旬或月然後罷㱕則将顛躓乞假之無地耒耜不得深其田斧斤不得采其山矣賊徒狡獪心豈㢘耻昨鞭今戮猶或不悛若必撫而哀之則将㳂上官之語以誣捕巳者如此則雖白晝觧人之衣貝者掩目而過矣仰惟執事以明易慎以義奪仁情見則勿疑罪當則勿恤乃古君子佩弦之流也玉光無瑕綱目無漏完粹精宻可勝道㢤覯邑外草萊之民也落魄不肖生年二十三身不被一命之寵家不蔵擔石之榖雞鳴而起誦孔子孟軻群聖人之言纂成文章以康國濟民為意餘力讀孫吴書學耕戰法以備朝廷犬馬驅指膚寒熱腹饑渇顛倒而不變非獨人之云云坐而自歎且自笑者也今者進不敢祈執事尺書之薦退不敢受里閭啓齒之嘱以希幸扵左右觴酒臠炙非所懐也唯其公論末策思得自陳以增盛徳之分寸故為之一來執事以為何㢤不宣覯再拜上余監丞書監丞執事覯南城小草民也竊聞執事以文辭判是非取先天下豪俊馬首南嚮尹兹大邑盛名之下不獲愛坐臥越四百里奔走来見嘗所著文家貧弗及更寫謹獻舊藁一策凡九十五首約萬餘言以請命階闥伏念覯十嵗知聲律十二近文章思慮猖狂耳目病困者既十年矣而公不舉扵州郡私不信扵閭里梯天莫見明主窮海未遇知巳朝談仁義暮學計䇿云云雖多徒取笑恠老母坐堂親愛盈屋耒耜不供升斗之食桑麻不足一帶之衣塵埃四走乞丐無地此亦立節丈夫所宜歎惜者也今執事識量足以鑒臧否位望足以為升黜亦奚吝開卷一覽思其所以㢤夫驅馬而賣之者為市人所貴賤未足以為駑良遇伯樂而弗一顧則雖日馳千里皆驢材也伏惟少留念焉他日執事得位将相洗濯四表瑣瑣之力一獻門下以託名扵本傳之末顧不羙歟古之相遇者或以一言之善或目擊而道存意氣所合唇齒後也不復浮辭唯增媿畏而巳不宣覯再拜上蘇祠部書通判祠部執事覯毎習觀書傳見古人有先後相因貴賤相取刷浴塵穢挈而致之功名之境者未嘗不廢書太息巳或泣下何者兹道寂寥為日逺矣士之褐衣革帶顛倒風塵時無不扼肘歎望曰我無知已一旦成大聲享大任則復因循自守鮮䏻知人盖處賤而求人知也則利在乎已既貴而知人也則利㱕扵人為己而不為人是以然也繇此逹者自逹窮者自窮上下背馳不翅胡越見天球河圖委在溝瀆不肯一濡足振起之而安行自若者皆是也欲望張皇古道聳勸士類使碌碌者聞風而勇善不亦難㢤是皆假道義以自進其身身既進則忘之矣真有道者果不如是伏惟執事以佐王之才應期而出第進士一為能官中賢良受清秩治道二十五策霆轟風飛震伏天下非真有道者安能卓犖如此是則夷髙翦蕪為後進開路誠有望扵執事也覯南城賤民自以家世儒素生長好學由六七歳時調聲韻習字書勉勉不忘逮于今兹年二十七矣其間染采薰香附合時律外尤存心扵古學沉酣鼓舞其志不甚眇小然而進不得州郡舉退不得鄕曲譽饑寒病瘁日就顛仆抱其空文四顧而無所之今者竊嚮執事風采不辭道路暑濕之勤夙夜奔走求通扵門下以執事之明其亦為之動心㢤覯生平所著力弱貨殫不能盡寫今所摯者舊文五卷盖備舉子常禮禮論七篇潜書十五篇别寫為净本一冊政治餘間首乞觀覽其餘篋帙細碎苟蒙顧取續當具其藁以獻雖然猶未足以盡覯所懐也覯往者毎見邦國政敎有玷缺不完者下民疾害有酸楚未復者摭其條目雜然甚多因欲作狂夫策五卷既成其五篇矣自以意切言直懼為世俗所忿誚執筆瞻顧逗撓而止又以明堂者古先帝王之大事而去聖乆逺規模莫見周禮考工記大戴禮盛徳篇吕氏春秋十二記室个之說參差不齊繇漢迄唐老師大儒各執一經相為矛楯有國者不知所以裁定遂使布政之宮缺而不立雖有作者皆取臨時䖏置非復先王之法象覯謂周禮大戴禮呂氏春秋皆聖人賢人之所作述不宜輙有乖異反復䆒省則制度果同但立言質畧意義不顯鄭康成蔡伯喈軰泥文太過遂成派分故嘗挾而正之决而通之不以文害辭不以辭害意三家之說坦然大同堂室之度靡所回惑的的然如見成王周公享帝視朔朝諸侯扵其上因欲作明堂定制圖一道并序遇病中廢未克成之復謂易者三聖之所以教人因時動静而終之以徳義五經特是為深矣古今觧者唯王輔嗣尤得其㫖然亦未免缺誤况此經變動無常學者不能知所凖的覯常撮其爻卦各有部分仍辨輔嗣之失因欲作易論十篇然非汰思慮旬月間不可以措筆是三書者他日即成就跪致扵几席之側則夏時坤乾未必不爲仲尼所取也今之獻者聊可味其一臠耳仰惟執事思古人相因相取之道而念其所以来之意羽凡骨爲飛仙起涸魚爲雲龍藥石哺乳使其銜恩則他日執事入坐廟堂出擁旄鉞遂大勲扵時覯雖不才東西指顧必有可用今也不敢豫自道幸執事裁之不宣覯恐懼再拜寄上范叅政書慶暦四年六月四日應茂材異等科李覯謹西望再拜奉書叅政諫議明公閤下覯一二年來竄遯山谷竊聞明公㱕自塞垣叅預朝政無似之人辱知最厚延頸下風憂喜交戰喜者何謂兾明公立天下之功憂者何謂恐明公失天下之名夫以明哲之性樹剛中之徳裁量古今愍測衰敝昔者言之而不得行之誠無可奈何今在行之之位矣盖當築邦家之基天不足爲高地不足爲牢此所謂冀明公立天下之功也然塞孟津者非捧土可足治膏肓者非苦口不宜遺闕之原豈是眇小若曰患更張之難以因循爲便揚湯止沸日甚一日則士林稱頌不復得如司諫待制時矣此所謂恐明公失天下之名也嗟乎當今天下可試言之歟儒生之論但恨不及王道耳而不知覇也強國也豈易可及㢤管仲之相齊桓公是覇也外攘戎狄内尊京師較之於今何如商鞅之相秦孝公是強國也明法術耕戰國以富而兵以强較之扵今何如是天子有帝王之質而天下無强國之資為忠為賢可不深計洪範八政首以食貨天下之事未有若斯之急者也既至窮空豈無憂患而不聞節用以取足但見廣求以供用夫財物不自天降亦非神化雖太公復出扵齊桑羊更生扵漢不損扵下而䏻益上者未之信也况今言利之臣乎農不添田𧖟不加桑而聚歛之數嵗月增倍輟衣止食十室九空夲之既苦則去而逐末矣又從而籠其末不為盗賊将何適也况旱災荐至衆心悲愁亂患之來不可不戒明公何不從容為上言之國奢示儉抑有前聞動人以行不煩虚語必也省宮室之繕完徹服玩之淫靡放宫女以從伉儷罷樂人以歸農業後庭愛幸使衣無曵地群下賜予使賞必當賢戒逸樂之蕩心慕淳樸之為徳不唯惜費亦足移風至扵昭事神祗尊奉釋老務從中道無徇末流郊祀天地禮之大者先王立法實有明文謂天下之物無可以稱其徳故牲用繭栗器尚陶匏大路越席以昭其儉愚儒在野不覩大祀間之道路有異扵斯費鉅禮煩願留意也寺觀所湏未嘗盡見唯前年在京值修開寳寺耳觀其所用誠難定數然以意論之害亦大矣且時賣官雖大理評事無慮一萬緍耳假如此寺秪費十萬緍亦當十貟京官矣彼十貟京官以常例任使數年之後便當臨民以為萬戸縣尹則十萬家之禍又以為十萬戸郡守則百萬家之禍矣若輟一寺之費而不賣十貟京官是免百萬家之禍佛如有靈豈不歡喜一寺尚爾其他可知孔子曰禮與其奢也寧儉矯枉過正此其時也設謂復于質畧虧損國容無以觀示于下則未知瑶臺瓊室孰若茅茨土階之榮也若以逺古之道難爲比擬則近世豈無其事㢤隋之文皇既可爲吾君法矣唐之楊綰亦足作吾相師也此事尤淺近盖在明公術内乆矣然恐富貴娱樂有以移人故敢告于左右嗟乎人夀㡬何時不可失無嗜眼前之爵禄而忘身後之刺譏也覯才不適時體復多病非有望于仕進者也所願草茅之下復見太平瞑目黄泉蔑遺恨矣所著慶暦民言三十篇謹録上獻伏惟稍賜觀覽干犯鈞台寔増慙汗不宣覯再拜直講李先生文集卷之二十七終直講李先生文集卷之二十八書後學南城左賛編輯後學廣昌何喬新校正寄上富樞宻書慶暦四年六月四日應茂才異等科李覯謹西望再拜奉書樞宻諌議明公閤下伏以天時否結海内煩費力支王業属在賢人况樞宻擥軍國之權明公通古今之道才位相稱功徳可圗此有志之士所以願忠扵僕人也覯江南人請言南方事當今天下根本在扵江淮天下無江淮不能以足用江淮無天下自可以為國何者汴口之入嵗常數百萬斛金錢布帛百物之備不可勝計而度支經費尚聞有闕是天下無江淮不能以足用也吴楚之地方數千里耕有餘食織有餘衣工有餘材商有餘貨鑄山煑海財用何窮水行陸走饋運而去而不聞有一物由北来者是江淮無天下自可以為國也萬一有變得不為廟堂之憂而姦雄之幸乎議者多輕東南謂為怯弱而不知為官軍則怯為亂賊則勇矣今之卒伍例非勁徤必也少有材力自巳别營衣食安肯涅墨而就拘㢤唯無聊之人填􅊤是懼不得巳而為之耳謂之怯也不亦宜乎若夫驍悍之資狡猾之性因縁怨憤過有覬覦則安知其無勇也世俗但見藝祖取之之易而謂事勢常然殊不知以我宋應天之始乗李氏失政之餘殘殺忠臣熒惑群小兵叩城下猶未知之而今而後焉得此愚暗之賊又焉得此神武之師乎以治討亂尚難為計以亂攻治将如之何曹公用兵不謂不善而弗䏻以一矢加扵孫權者非特山川之險亦以馬超韓遂在關西故也今之輟耕壟上豈無鴻鵠之志者然且伏而未起有所待也不幸一旦邉鄙戒嚴而荆揚乗釁廟堂之上何以謀之長淮大江壍其前西戎北虜猾其後畏首畏尾力屈貨殫當是之時雖周公爲相太公爲将恐無及也幸今無事何不早爲之所三四年前閱人爲弓手鄊閭之内驚擾百端曽未㡬時已聞停廢而募諸宣毅繼以土軍聖朝用心小子何見然以意論之弓手雖無取而宣毅土軍又不如弓手逺矣豈唯無益且有害焉昔者之籍弓手也自成丁以上皆守令親擇之稍有強壮悉無逃匿彼宣毅土軍既曰募人須從所願當職之吏務登其數雖甚駑怯亦預收錄此一不如也夫弓手本乃良民徭扵公上或田園富厚或骨肉衆多自重其身不爲罪惡彼黥額之徒率多無賴階扵窮困旋置妻孥一動其心復何所顧此二不如也夫弓手訓練有時團結有䖏散㱕廬井無預廪給彼宣毅之名殆十餘萬一歲之費無慮三百萬矣加之土軍未知其籍是取無用之人爲匱財之本此三不如也觀其罷輭之容動皆取笑驕盈之氣巳欲陵人雖無武功自謂禁旅若主将無惠失扵撫循姦回矯詔卒令起發因其怨恨讋以訛言不出城闉自爲蝥賊未可知矣此所謂豈唯無益且有害也朝廷徒見名籍之夥且聞講習之勤謂為有備盖未之思矣夫用兵之道豈特武藝而巳㦲先在治其心次可用其力昔晋文公始入而教其民二年欲用之子犯曰民未知義扵是乎出定㐮王入務利民又曰民未知信扵是乎伐原以示之信又曰民未知禮扵是乎大蒐以示之禮民聴不惑而後用之故能一戦而覇後雖不及猶有吴起吮疽而戰不旋踵李廣與士卒共飲食而愛樂為用上下相得豈徒然㢤今之守郡監兵職為将帥奉行邦典豈敢他言恩意不通路人而巳立尸之地何以使之矧将帥之材在乎竒偉而今所謂良吏者小心畏忌之士耳彼欲笞人數十猶顧文法捉筆不敢断而望其一歩百變赴死如㱕何可得也嗟乎既往不咎来者可追宣毅土軍聚之巳乆誠不可去然宜扵不可去之中刪其尤無用者降隷于廂既减資粮且實役使其存者則析其部伍易地而居名之駐泊離其黨則無構扇之姦去其鄊則爲興發之漸仍使稍供差遣以代舊之屯駐屯駐者又還故郡則廂軍可省招收矣此亦防患之㣲意而節用之一端也其扵章示武威備禦他盗無勞益衆惟在選賢商周不敵自古然矣何不扵朝野之間舉守郡監兵之職勿拘資級務取英才至如荆潭楊夀昇洪杭福廣桂諸部宜命大臣爲之節制重其操柄許以便宜辟召豪傑咨詢計策淹之嵗月庶可鎮安若謂假以威權事當疑阻則小白重耳非無土地陳勝吴廣豈是侯王或以覇主而尊周室或以匹夫而亡秦族逆順之心豈皆形勢使然也况今賦歛之煩數倍常法旱灾之作絶異曩時民力罷羸衆心愁怨造形而悟其可忽諸明公受國厚恩爲世賢輔觧絃易調正在此時謀人之軍師邦邑苟有危敗是誰過歟覯自惟迂闊之流實無榮禄之望但恨養生之地僻在一方憧憧衆人無可與計事者常恐小才為累白刃相臨守死則無名脅從則有罪所以夙夜憂懼寢食弗皇不知我者謂我何也語有之可為智者道難與俗人言瀝血書辭敢告執事幸而帷幄之籌不舍庶人之議敺我元元躋扵仁夀則覯也得保首領以沒受賜多矣所著慶暦民言三十篇謹録上獻伏惟少賜觀覽仰犯鈞台豈勝慚懼不宣覯再拜寄上富相公書至和二年八月十七日将仕郎試太學助教李覯謹西望再拜奉書集賢相公閤下鄊者相公偃息于外十有一年天下之士憤懑者無所吐天下之民窮苦者無所愬宗廟有神社稷有靈佑啓聖心廓然日出擯䜛說扵九地之底登舊徳扵赤天之上含氣之類孰不相慶千萬幸甚千萬幸甚議者曰賢人當位矣恢儒復古此其時矣覯以為不然周公相成王必先有討扵管蔡商奄而後制禮作樂孔子為魯司宼亦且殺少正卯會夾谷以懼齊侯取汶陽田未聞區區以文字為先何㢤緩急之節然也今之大患患在夷狄士大夫之耳目属于相公乆矣謂排難觧紛不在他人才如斯位如斯籌深䇿逺盖非小子所難窺也若夫禍以忽而生勢以激而動亦不可不知朝廷憂西北而不憂東南無宼賊之備是所謂忽也用力扵西北則勢不救東南生姦雄之心是所謂激也竊恐燕趙有舉烽之變則荆揚無安堵之氓其曰無備者非兵非食官不得人之謂也今之取才既不盡善而南國卑薄隔以江湖朝士亦不欲来比扵四方最為少人近者儂智高之亂足以觀之矣智高之起扵邕也非若鬼神出自恍惚盖有萌漸可見人或言之而主者如不聞及其至扵廣也非有羽翼降自空虗盖巳旬月之行衆欲距之而主者閉門之不暇遂使百越之地千里無煙積尸成山流血成川非他也官不得人之弊也凡今任官貴在科名彼嶺南郡守不知㡬人非但無功又不能死唯趙師旦曹覲以節義自顯夫二人者皆無出身孔宗旦以負謗之故謪掾于邕事未起而言言不用而死夫人豈有科名㢤凡今用法小過不宥而大刑不行小過不宥故跅弛者廢大刑不行故首䑕者安嶺南之吏或不備不虞或偷生惜死而不聞有伏鈇鑕者以不忍之政馭無耻之人如乗駑駘而舍鞭䇿欲其致逺何可得㢤所幸智髙竪子本無逺畧如使匹馬尺䥫踰嶺而北則江表生靈巳魚肉矣當是時數百千里之中無一人可與計事者或云修城池或云教士卒秪以行破公文何曽得似兒戯令人見之不覺大笑賊若能来誰有今日相公非常之人固不為常人之事見㡬而作今也其時若謂才之難得道在馴致則凡守大藩如古方伯連帥者且宜慎柬毎十數郡得一俊傑以臨制之亦足以有為矣如此雖大駕登單于臺元帥勒燕然山無南顧之勞擾况當平世誰敢動㢤覯慶暦四年嘗以書言南方事必逹左右矣後二年作長江賦欲干衢室之聴而無路以通謹録一本塵玷台座草茅之愚行年四十有竒一事不成百病俱發未知餘年有㡬唯未死間不逢亂賊是所願也故復呫囁上瀆威尊伏惟哀其狂而寛其罪不宣覯恐懼再拜寄上孫安撫書皇祐四年十一月十三日丁憂人李覯謹再拜奉書安撫宻學諫議節下覯病卧草中聞朝廷委節下一方之事載驚載喜已而泣下嗟乎自嶺表有変數千里間火熱湯沸而未見有左右前後之臣負大名扵天下者一来鎮撫竊疑江湖之民獲罪上帝不復得為周家草木在行葦之詩矣今也傳言節下當来有如司命仙官将自天降荒陬士女罕識貴人賢人孰知所以来之㫖愚心耿耿實異扵衆輒縁漆室憂魯之義願有以控告不幸酷罰在身未經祥禫請見則非禮寄書則不恭日夜惟思罔知所措忽覩牓示令實封齎来何幸如之然而開設數路許以酬賞苟應募而言是傭徒鬻賣之道髙㓗之士得不唾其靣㢤退又念古之人有殺身以成仁安得避干賞之嫌沮願忠之意由此奮發節下試聴之嗟乎今之天下何其少人㢤人材髙下未敢䡖量若夫至公至忠圖國忘身者誠不易得凡居位者何異一曹司但行文書不責事實但求免罪不問成功前後相推上下相蔽事到今日猶不知非昔西戎叛時數年間天下之民破骨出髄而不能取元昊一塊土今南蠻又叛數月間江湖之人拆衣賣絮而智髙方擁羙女在珠玉堆中坐耳何者十羊九牧朝令夕改作無益以害有益故也彼智髙者豈英雄㢤打刼之尤者耳愚嘗謂彼失扵乆而我失扵速彼若能速廣東非我有也我若能乆彼焉得跳梁若是㢤何謂彼失扵乆當其自邕而来所過諸郡突如破竹若能因其倉庫撫其民人分留同惡合聚亡命以守之避實攻虗直趍英韶南雄以扼大庾使江南之兵不得過雖廣西兵来而東路之勢巳盛則五羊孤城仲子怯師囊橐中物耳舍此不為而為持乆之計豈有人作賊深入主國無饋粮無外援而可頓扵堅城之下連月不去以待王師之来㢤此所謂彼失扵乆地何謂我失扵速當賊在五羊城下時王師幸得到英州若能分兵屯守要害堅壁清野以待之彼将何如梁孝王天子母弟周亞夫尚不可救况廣州仲簡何足可惜彼求戰則不聴欲走則無路粮食當有限寳貨豈可餐越月踰時自當乾死况蕃漢烏合其心不一力盡勢窮寜無疑貳購賞在其前斧鉞在其後智髙之首何難可致不戰而屈人之兵古今一也豈有人爲将乗驛㑹師與士卒未嘗相識昏至晨戰挺身入賊如此雖豫讓爲軍貟要離作節級有何恩義能使之用命也以侯伯富貴之身落豺狼腥臭之手逺近聞之莫知所由皆以賊爲鬼将神兵非人可敵故鋒刃未交而心膽已碎後敗甚扵前敗今日甚扵昨日徒使狂童謂天無網此所謂我失扵速也自有事以来江湖之間誠宜設備然所以備之豈其道㢤豈作無益以害有益者㢤居是邦不非其大夫不得爲節下盡言也嗟乎疾在四支皆知護心腹矣恐風氣之内入也而不知用藥無節則心腹自生疾敵在嶺表皆知俻江湖矣恐蛮宼之内攻也而不知作事無術則江湖自生變四支之扵心腹嶺表之扵江湖其逺近緊慢以節下之明固不待人言也嗟乎彼智髙者終何為㢤歴觀自古豈有如彼等人䏻成事也彼之所至奪人財物燒人室宇食人老弱妻人婦女人之仇讎無甚扵彼者安能成事㢤但恐嶺表未定江湖日貧而群盗起耳夫群盗者初不足畏或數人或數十人或數火或數十火然後以小合大以近合逺遂成千人萬人耳雖然此等亦安能成事㢤賊殺既已甚天誅所未及扵是乎有長材大力假忠借義以討賊為功以要王爵以歸民望如孫堅父子漸不可制此愚心之憂也嗟乎江淮而南天府之國周世宗之威武我太祖之神聖非一朝一夕而得柰何因循不以賢才守之今日之事可謂急矣誠得左右前後之臣負大名如節下者數人使居潭洪荆昇楊杭福州兼節制一路属郡官吏得自廢置然後可以言利害官不得人雖言之誰為行㢤朝上千䟽暮降百勑付之曹司適煩擾耳如曰得人請試言其畧今之先務莫若使甲兵不闕盗賊不起民不至無告士不至失職如此者凡十事一曰諸州舊有宣毅百數雖云不武悉巳南征昨者調鄊弓手将以為衞縱今未罷復何可慿且勿論其人勇怯彼弓手之家固不在城安有盡室巳落賊中而肯一身更為官守鳥驚魚駭事灼然矣愚謂守城當須城中之人人生尚氣愚智皆同嘗觀角觝與競渡之類一坊一巷互爭勝負千百為群至相殺害何者耻居人下故也官之使民曽無激勸點簿呼召若牽牛羊彼何興味而為之㢤今若為廣埸扵邑居之中先取有勇力為衆服者寵異之使率其黨以閑暇習諸兵仗勿為名籍各任去来既不妨其業又得以自由扵是制為勸賞之法凡若干日一試其藝有地稅者常憂執役試中則與移下名有市利者唯患當行胡剛切試中則與免一次胥徒以此差補僧道以此披剃凡百施為必先武力至于有罪亦當原情苟非害人得以功贖如此則人可以日添藝可以日進比屋之民皆為甲士可也然後柬置帥長潜加部勒志定氣剛誰不可用况家貲在内血属滿眼倉卒之時必得死力二曰昨者鄊弓手萬家五百人大縣至一一千人不謂不多然而驅之来就郡邑廢其耕耘離其骨肉負米擔錢闔門在路是不便扵私也手執戎器心在閨門藉此虗名影其色役是有累扵公也今若扵村落之中每十數里為一教埸使其人員各以閑暇就便集之既不妨農且無所費當戸差役勿復與免或其有故則許兄弟子姪逓代乃是一人在籍數人習兵其餘戸口及寺觀童行願教者亦聴勸賞之法一如城中如此則保全鄊里扞禦疆界求之人情必可倚賴三曰古之治民唯欲富庶今之治民特惡豪右夫富豪者智力或有以出衆財用亦足以使人将濟艱難豈無其効今之浮客佃人之田居人之地者盖多扵主户矣若許富人置為部曲私自訓練凡㡬度試勝兵至若干人或擒盗至若干火者授以某官仍寢進納之令以一其志凡人既得以兵自防又得以官自進苟有餘財其誰不勉嵗年之後千夫長百夫長不難得矣周禮鄊為一軍未聞反叛秦人功賞相長何患豪强大有為者宜無猜忌四曰人之為賊亦有其漸始則黒靣夜行僅如狗䑕或掠小家子或刼獨行客鄊亭之吏知而諱之不告于公上故使長惡不悛積小成大蔓草難圖有自来矣鄊亭之吏諱之何也凡今賊發之地必責以賞錢縣尉未下馬耆壮已賣田破人之家前後不少為耆壮者懲其若此須求被劫之人願陪所䘮之物與其賞一二百千孰若陪一二十貫但知惜費豈復畏罪㢤賞所以得賊亦所以失賊諱之之謂也然非厚賞則賊不可得矣官不能備必出扵民顧當改制耳愚謂莫若鄊置賞社計戸等以歛之命富人以掌之用盡更歛以此為常今夫大鄊或二三千戸小者亦數百戸與其使耆壮三五人出泉孰若使一鄊千百戸同力其數則少其歛則緩既免破家誰肯縱賊五曰茶鹽之禁本非便人經費所須盖不獲巳江嶺之交最多鹽賊起而為大害者往往有之矣此本良民但為衣食與商賈何異㢤惟其犯禁耳俗吏不明事體武卒又貪賞錢不料形勢多方伺捕彼自以其罪重寧闘而死幸而不死豈得復為平人㢤求活草間固其宜矣愚謂當少緩之百姓日用不可使知姑以用度不足某事某事權住給賞如此則伺捕者宜其縮手犯禁者得以安心苟能加以仁恩亦可録為死士六曰大抵東南土田羙好雖其飢饉之嵗亦有豐熟之地比来諸郡各自為謀縱有餘粮不令出境昨見十程之内或一斗米糶五六十價或八九十或一百二三十或二百二三十價雞犬之聲相聞而舟楫不許上下是使賤䖏農不得錢貴䖏人不得食此非計也况扵境内又有禁焉止民糴以待官糴是也且賈人在市農人在野糴之則米聚州縣不糴則榖留鄊村徒為日日修城池而不筭其中蓄積亦可笑矣若曰官糴数足然後放民糴俟河之清耳官糴價一定民糴價漸高難易如何㢤愚謂當弛一切之禁聴民自便仍為著令以告後来七曰古之貴者舍征止其身耳今之品官及有䕃子孫當戸差役例皆免之何其優也承平滋乆仕宦寔繁况朝臣之先又在贈典一人通籍則旁及兄弟下至曾孫之子安坐而巳比屋多是衣冠素門方係繇役日衰月少朝替夕差為今之民盖亦難矣愚謂三丞以上官及正郎以上子孫若贈官兩省以上自可且從舊制其餘一例給使如此則農夫稍得息肩世胄亦無自惰八曰今之賦稅較古則輕唯諸攤配大為煩費夫攤配之物皆受直于官比之市價不甚相逺然而村民或去州縣一二百里既難褁足且畏後期故有市井之人代幹其事官未得銖兩民巳出斤鈞執耒者所以無聊㳺手者所以專利愚謂莫若使諸縣凡有求物則選邑中富而好善者一人委之集事仍須令佐躬行檢校事畢之日計其實所費錢使民償之如此財用可以無枉困窮可以更生九曰今之卒伍餼廪甚厚而人不願為者何也徒見其貧窮耳餼廪􅌋而貧窮者患在兼并卒伍而可兼并者亦勢之然大凡從軍多是單獨初采營壘未有妻孥居則無屋用則無器扵是兼并者得将養女召為贅婿今朝有室明日上綱在路日多住家時少故其一女可當數夫既以家口為名即是衣粮入已嘗見一家養十二三女請五十餘分而所養女日夜紡績與其家作婢耳餼廪歸扵他族貧窮切扵已身不死則逃非偶然也愚謂莫若使諸州凡招到人官為昏娶及置屋宇什物使得成家然後逺役如此則不唯存恤見兵亦足招延来者十曰今之發觧謄録封彌雖曰至公諒非逺慮識平側者昂昂哂笑談王覇者往往退蔵冤苦之聲逺近如一愚謂宜復祖宗之法以求郡里之譽凡諸征鎮亦計辟除如此則人望有歸學者知勸原夫之軰得之何補跅弛之士失之可惜飢寒不如兵死寧免生心英雄落我彀中乃為上策嗟乎弱甚矣憂至矣非立大竒不足以救愚言雖未竒節下亦無忽勿與儒生言儒生必罪我勿與俗士知俗士且笑人管仲復生商君不死天下乃安矣覯慶暦四年有上樞宻富諫議書一首俄聞富公出使河朔未知其書逹與不逹慶暦六年又有長江賦一首天險難升無路通進今各寫一本去願節下覽之足以知愚心之憂非一日也嗟乎行年四十四矣結髪脩學自謂非常人老大栖栖便是常人耳然昔應制科辱召第一今為試助教雖云冗散猶望朝廷以詞學進之必不扵風塵之際以㳺說徼幸節下明察知其無意扵酬賞也嘗著周禮致太平論十卷此乃愚心所自憙可以俻乙夜之觀者節下幸問焉當獻其藁忉忉之懐未盡扵此儻容白帶以見宜有靣言不宣覯再拜上蔡學士書日月應茂材異等科李覯謹再拜奉書諌院學士從者伏以王佐之資在言責之地有行下國将歸于朝志義之士靡不欲效肝膽扵車下矣覯不肖郡縣之得失軍民之利害非所能知然有事雖似小而患則甚大憤憤扵心弗能自巳者願一言焉同郡有鄒子房自前年㳺京師去年秋寄書扵其家自言因奏封事得恩為齋郎鄊人以其無行也初未甚信及見北来者且問諸邸吏皆曰無之扵是鄊人愈疑其詐矣今兹来歸果無禮部補牒獨執御藥院文書一𥿄以為符驗而㳂路郡府僉以衣冠待之本属轉運不疑其欺又給慿由使興置銀銅坑冶因縁形勢蒙蔽州閭萬目蚩蚩無敢明辨噫可怪也覯竊評之曰以御藥院文書可行耶不可行耶子房已受補牒而不以随身耶且三者皆可為之切齒也御藥院文書可行則國家之禍耳其不可行或已受𥙷牒而不以随身皆子房之罪也夫爵人扵朝與衆共之示天官之不敢私也况武祖文宗防萌杜漸上設中書樞宻院下分䑓省寺監所以夾輔聖政互相關防齋郎雖㣲然須勑下禮部而後給牒收補今秪欲憑御藥院文字不必朝省指揮則是宦者奪宰相之權王命出小臣之手禍亂之本莫斯爲大女主幼君尚不及此陛下明聖焉得有之此可爲切齒者也若以其書不可行用則安得執爲符驗藍衫木簡便称官人乗馬從徒平接有位國之常刑将焉用也且齪齪一夫飾以巧言自淮徂江若履無人之地設有大姦大賊造爲妖妄誘脅州縣則孰䏻辨之㢤太宗時李飛雄詐取驛馬騎之稱奉詔縳清水諸将入秦州将斬之以叛賴宗社之靈使自漏泄耳萬一復有此事其将柰何此又可為切齒者也若謂已受補牒而寄留在外或質當錢物則是輕我君命重乎貨財䡖君命則無為臣之禮重貨賄則非奉公之人以此入官未知安用此又可為切齒者也凡此三者干涉大體不可不言而西望帝閽邈數千里言可及乎誰能執熱逝不以濯學士其惜一勺水以快我心㢤覯與子房舊相往来别無嫌隙齋郎職位非佳覯誠不肯嫉妬子房名位未著覯又不與争能言之至此盖公議也况子房不慙妄冐惟務驕矜齎逺近書題假轉漕符牒以興置銅銀之號結太廟齋郎之銜當大路卓彩棚椎鉦鼓引百戯周㳺城市朝謁聖祖而後㱕呵止行人凌壓尊老意氣滿溢無復忌憚是可忍也孰不可忍伏惟學士有名扵時以道賛國如此等事寜不動心萬乗之貴尚當規正矧此蕞㣲豈難辨理昔者學士未作諫官時常刺諫官之不直今既作諌官矣無為他人所刺伏恐朝車到此迫扵人事無暇省覽謹遣人投書道左試財擇焉不宣覯再拜上王刑部書轉運刑部明公執事覯天生愚魯棄置藪澤鱗鬐坐枯風波不到伏承明公以䑓郎之貴領州伯之重才名所震曜賢徳所煦嫗姦回醉心良善吐氣如九鎮之柱天群山莫不仰四瀆之紀地衆流莫不赴士之歸者唯恐在後而覯貧煎其家病縲其身隔數百里無階請見自甘屏逺何所願望不意近日一二有位自北来者乃言明公過垂聴察深録姓名不唯寘之齒牙且欲引諸門下一聞髙義慙媿累日人之不遇者必曰時命若覯也獨命窮耳扵時豈有不遇㢤自古正身立行負抱才業而遭值昏亂不為人知辱在餓隷或老死岩石名字磨㓕銜冤厚夜者夫豈少歟小人無似幸生明時當路無朞功之戚舉家無拳握之貨馳鶩無力請託無縁而賢卿大夫雖未相識往往知其所爲何不遇之有㢤君子疾没世而名不稱苟由當代豪桀共相采色使得光顯于後則萬鍾不足校也䂊譲一家僕耳以衆人遇之則以衆人報國士遇之則以國士報吾黨之受知者宜何如㢤既未得謁扵閽人且欲窮極𥿄筆鋪張其言兾明公多見其藴積則又念今之進者假儒之言巳進而言不驗故真爲儒者羞自言明公徐而察之可也何遽言㢤聊寓書以謝左右伏惟照其心無責其禮千萬幸甚不宣覯再拜與胡先生書覯再拜先生胡君足下康定初錢塘相别後二年自京師歸中道曾寓書今又四年雖不有教誨而衣冠往来毎知動静俗衰禮壞用力者鮮先生發憤呌呼手提古道以陂障末流使東南之士有所模法其功用何如㢤覯扵先生齒卑徳薄然其所留心何嘗不在天下國家故聞先生之風驩虞詠舞唯恐其舉之不髙馳之不疾也苟有聞見敢不盡愚扵左右伏念曩者為㑹以覉旅迫促聴言觀行什不一二慕賢之心且醉飽矣至扵𥿄筆之間所以剴今而垂後者尚未得請近到弋陽乃有以先生所著文為恵者喜而讀讀而疑謂先生之辭或者年少時作漂流人間而不可追者乎不然幸察其區區竊觀原禮篇曰民之扵禮也如獸之扵囿也禽之扵紲也魚之扵沼也豈其所樂㢤勉强而制爾民之扵侈縱奔放也如獸之扵山藪也禽之扵飛翔也魚之扵江湖也豈有所使㢤情之自然爾云云覯不敏大懼此說之行則先王之道不得復用天下之人将以聖君賢師為讎敵寧肯俛首而從之㢤民之扵禮既非所樂則勉強而制者何歟君與師之教也去自然之情而就勉强人之所難也而君欲以為功師欲以為名命之曰讎敵不妄也且制作之意本不如此唯禮為能順人情豈嘗勉強之㢤人之生也莫不愛其親然後為父子之禮莫不畏其長然後為兄弟之禮少則欲色長則謀嗣然後為夫婦之禮争則思决患則待救然後為君臣之禮童子人所慢也求所以成人然後為之冠禮愚者人所賤也求所以多知然後為之學禮死者必哀之然後為之䘮禮哀而不可得見也然後為之祭禮推事父之恩而為養老之禮廣事兄之義而為鄊飲酒之禮凡此之類難以遽數皆因人之情而把持之使有所成就耳有是情而無是禮則過惡襲之情雖善末如之何故父子之禮廢則子将失其孝兄弟之禮廢則弟将失其悌夫婦之禮廢則夫将失其義君臣之禮廢則臣将失其忠一失之則為罪辜為離散嚮之所謂情者雖積扵中安得復施設㢤故曰因人之情而把持之使有所成就者也其大畧如此然則有禮者得遂其情以孝以悌以忠以義身尊名榮罔有後患是謂獸之扵山藪鳥之扵飛翔魚之扵江湖也無禮者不得遂其情為罪辜為離散窮苦怨悔弗可振起是謂獸之扵囿鳥之扵紲魚之扵沼也而先生倒之何謂也若以人之情皆不善須禮以變化之則先生之視天下不啻如蛇豕如蟲蛆何不恭之甚也幸深思之萬一愚言可取則願告于不知禮者曰無近扵囿汝有山藪無從扵紲汝有飛翔無入扵沼汝有江湖云爾則先王之道庶乎復用天下之人其仰聖君賢師若司命焉又觀送程令序斥言今之縣令不得其人而末一句乃曰與家君有代授之契如是則尊公亦今之縣令耳盖文之大病不可不察若尊公之治有異扵前之云云者願少稱述不然則削此一句以存有隠無犯之義甚善覯非好辯者顧先生之文學者所信一有玷缺爲患不細故敢陳之惟以情恕未相見千萬自愛覯再拜答宋屯田書屯田宋公執事覯近者刪定劉牧易圖繼之六論僅草具未甚行一来貴土日接髙誼乃知執事舊有王劉易辯其大畧不異故不敢自疑以塵于席次執事忘其陋寡遽貺以書謂聖人之道晦而復明劉氏猶大盗既逸而成禽豈復能爲梗然六經近爲狂妄人所椎埋如是者甚衆且使覯堅其壁主其盟執事當竒所謀鳴皷而陣焉主盟之命雖不可當若狂妄椎埋豈惟執事患之抑愚心未始釋然也孔子曰吾猶及史闕文盖喜其本末為世人所損益也至扵漢儒若鄭康成注禮記其字誤䖏但云某當為某玉藻全失次序亦止扵注下發明未甞便就經文改正扵周禮則俻舉先鄭杜子春觧此盖尊經重師不敢自謂巳見為得姑兩存之以俟後聖耳况夫一家之學必由君命而後可行以劉歆之才在哀帝之側甞欲以左氏春秋列扵學官尚為諸儒不肯置對光武之世議立左氏而公羊之徒上書訟之至和帝時始得立學其難而慎也如此未聞有不請扵帝不謀扵朝而能以一人之私鼓舞天下者也厯觀五經傳注及正義誠有未盡善志扵道者宜其致詰然但當著為私書或言於同志庶幾其說不泯絶後有知我者則先王之道明如是足矣彼官為博士居天子辟雍将造成多士以待官使者也初不奏立某氏易某氏春秋俾有司策試一用斯義而乃專肆巳欲棄傳違注敺學者從之其可乎㢤學者顧師資之禮不得不從有司執注䟽之義不得不黜無乃非長育人材之意邪矧博士之官靡常其人苟各用所見不為定凖今博士說如此後博士又如彼則更數十百年天下之士爲儒爲墨爲釋爲老未可知也此患甚大不可不救而覯也貧賤委頓無錙銖重雖學者稍稍聴信然悠悠之流衆寡何如㢤覯與人作一記一序猶未免在勢者或蚩蚩軰有所改易陳言褻語塗穢金石後人弗知将以我爲戯焉况能主盟聖域集第一之功乎誠尊命之不可當也執事文學豐富爵位進長既有其道且得用焉指撝人士将無不可苟鳴皷而陣則覯雖不勇請當一隊必有藉手以報不宣覯再拜答李觀書覯白宗人祕校足下八月初徐秀才至得所寓書甚大恵覯不肖且未識君子之容而屈辱厚意以道藝見咨顧無以當之雖然敢不薦其說来書謂孔子之後有孟荀楊王韓柳國朝柳如京王黄州孫丁張晦之及今范歐陽皆其繼者也而自謙譲以為畚土壤築太山欲登扵前賢之閫而問其何如足下年少初仕不汲汲扵進取而轉從寂寞之道此非今人之心古人之心也曽子曰尊其所聞則髙明矣行其所知則光大矣苟取之以明守之以誠尚可為聖人之徒矧曰前賢之閫㢤然謂之賢者豈非所論列十數公乎足下欲以為法當考其所為工拙不宜但徇其名也孟氏荀楊醇疵之說聞之舊矣不可復䡖重文中子之書已泯絶唯中說行然出扵門人所記觀其意義往往有竒奥䖏而䧟在虚夸腐脆之間隋書無本傳又不得案其行事退之之文如大饗祖廟天下之物苟可薦者莫不在焉佐平淮西觧深州圍功徳卓犖在聴聞者不一誠哉其命世也子厚得韓之竒扵正則劣矣以黨王叔文不得為善士扵朝近者如京先倡古道以志氣聞黄州學而未之得然其人諤諤有風標彼孫丁之文舉人之雄者耳其立朝不聞有所建明而胎天下之禍為吾徒羞誨之之辭不竒諸所著文未足可嘉至扵議論則識精才健無逺不到若洪範王覇篇籠絡天人捶鍜古今雖子厚好為論尚未及也先朝文士唯此人耳惜其踈俊得罪于世故立身不可不慎若子厚晦之皆非凡人被惡名雖欲自新而死期至矣范公歐陽盖為賈誼劉向之事業窮髙致逺未易量也足下以愚言為不妄則可法與否昭昭然矣路逺不獲相見勉之李覯白答黄著作書覯再拜漢傑著作兄足下前日辱書以覯所為景徳寺及邵武軍學記言浮屠事来討覯不肖然其為文有新意䖏恐學者疑唯欲人問因詳說之而譊譊之徒背憎是務莫肯告者吾心恨此久矣今漢傑乃惠然移書使之明辨不勝幸甚覯排浮屠固乆扵潜書扵富國策人皆見之矣豈期年近四十氣志益堅之時而輒渝㢤惟漢傑觀厥二記不甚熟耳吾扵此言乃責儒者之深非尊浮屠也民之欲善盖其天性古之儒者用扵世必有以教導之民之耳目鼻口心知百體皆有所主其扵異端何暇及㢤後之儒者用扵世則無以教導之民之耳目鼻口心知百體皆無所主将舍浮屠何適㢤漢傑兩執親䘮矣亦嘗禮佛飯僧矣如使周禮尚行朝夕朔月月半薦新啓祖遣有奠虞卒哭祔小祥大祥禫有祭日月時歳皆有禮以行之哀情有所洩則漢傑必不暇曰七七曰百日曰周年曰三年齋也吾故曰儒失其守教化墜扵地凡所以修身正心養生送死舉無其柄天下之人若饑渇之扵飲食苟得而巳當是時也釋之徒以其道鼓行之焉往而不利云云至扵叙其傳法始卒甚詳此誠文勢不得不然吾自無思無為之義晦而心法勝以下言儒不能明其道而釋以其說象之故嗣迦葉者師子逹摩以下言此衰致彼盛也非習聞其說樂其誕而自小如孔子吾師之弟子之類也若夫按白居易碑迹景雲大師之事盖取其與顔太師真卿等友善魯公之大節古今鮮儷而善扵一浮屠必若澄觀受知扵韓吏部之比其人材有足稱者也而景雲乃景徳之舊因使其徒有所矜式焉然則取信扵白居易何尤㢤又覯所謂及味其言有可愛者蓋不出吾易繫辭樂記中庸數句間漢傑以為仲尼子思群聖人之作述豈與此等說較論而爭衡邪是誠漢傑之不思也且吾謂儒者困于滛辟恤乎罪疾欲聞性命之趣不知吾儒自有至要反從釋氏而求之然後乃曰及味其言有可愛者盖不出吾易繫辭樂記中庸數句間苟不得巳猶有老子荘周書在何遽冕弁匍匐扵戎人前邪請詳此意豈謂仲尼子思與之較且爭乎盖以釋之言雖有可愛者亦吾聖人先巳言之矣何必去吾儒而師事戎狄㢤苟不得巳尚不如學老荘其意亦昭昭矣彼釋之書數千百卷而不出吾數句間其䡖重如何㢤漢傑責扵人無若是之暴也夫所賤鄭衞者非謂全無五聲十二律不與雅樂相似也唯其不中正耳毛嬙西施靣目亦與人同豈彼數千百卷書而無與吾聖人一句一字合者㢤九流百家同出扵聖人而有所偏耳聖人之備其扵用也交相濟故得中焉諸子之偏其扵用也執一而巳故有過有不及也亦非謂無一句一字與聖人合者也譬諸良醫之治疾實者則瀉之虚者則補之熱者使之服凉冷者使之服暖故天下之疾無不治也聖人之道如此諸子則不然見瀉而愈者則謂天下之疾皆可瀉見補而愈者則謂天下之疾皆可補扵熱扵冷亦然故用藥失宜而療病多死也非謂其方不與良醫相似也學者之視諸子若異類焉是亦過矣漢傑罪我不如李習之不為僧作鐘銘習之之論信羙矣然使唐来文士皆效習之所為則金園寳刹碑版若林果誰作也来書謂張景原道頗正漢傑何不視景集中所記浮屠事凡㡬篇其稱述何如又謂設不得巳猶可謹歲月誌工用亦不害扵正若但歳月工用而巳凡人皆能之何必吾文吾所是非灼見如彼豈甞害扵正㢤聖賢之言翕張取與無有定體其初殊塗歸則一焉猶李漢所謂千態萬貌卒澤扵道徳仁義炳如也何須開口便随古人漢傑使我效李習之膠柱矣今之學者誰不為文大抵摹勒孟子劫掠昌黎若爲文之道止此而巳則但誦得古文十數篇拆南補北染舊作新盡可爲名士矣何工拙之辨㢤覯之施爲異扵是矣既使明辨敢不盡言漢傑察之十二月十三日從表弟李覯再拜再答黃著作書覯再拜漢傑前書以言浮屠事求問覯不才不能多自引過輙求義理塵扵左右漢傑又以書稔吾之罪不勝大慙覯行扵天下日聞其羙不聞其惡於鄊黨惟仲容老文時賜教誨然其人慎宻雖終日請問猶未一言今漢傑不惜累𥿄之書以爲大惠而覯如頑石焉雖有雨澤毋所受入而今而後不得聞過矣覯何人㢤覯何人㢤尚賴君子之心愍其孤陋苟有聞見更掛齒牙則蕞爾之人猶有望也以多故未及請見答陳特書覯啓今日吴君坐中見僕夫捧三書以授我問克譲乃知其子姪以此為惠讀之皆今賢士大夫之文甚善甚善夫贈送之作惟師與友若老耽孔子顔淵子路言者受者皆非偶然今覯與足下兄弟無一日之雅鄊井不同年齒差倍又非當大位言得天之地弗問弗求獲此惠貺私自惟念莫知所来無乃足下負大術業潜扵山藪心之熖熖無所發泄假我以爲題目乎不然未敢當凡所教誨皆我心思慮之熟者然夫子之道如天如神變化不測恨行計速不得與足下論其萬一若皆如来示則指掌而巳何必從師而後知㢤有言扵覯者多矣如虚舟焉未嘗輙愠今足下兄弟言古而志髙扵愚心未忍舍焉故此奉告且以爲謝不宣覯白直講李先生文集卷之二十八終直講李先生文集卷之二十九雜文原文利可言乎曰人非利不生曷為不可言欲可言乎曰欲者人之情曷為不可言言而不以禮是貪與滛罪矣不貪不淫而曰不可言無乃賊人之生反人之情世俗之不憙儒以此孟子謂何必曰利激也焉有仁義而不利者乎其書數稱湯武将以七十里百里而王天下利豈小㢤孔子七十所欲不踰矩非無欲也扵詩則道男女之時容貌之美悲感念望以見一國之風其順人也至矣學者大抵雷同古之所是則謂之是古之所非則謂之非詰其所以是非之状或不能知古人之言豈一端而已矣夫子扵管仲三歸具官則小之合諸侯正天下則仁之不以過掩功也韓愈有取扵墨翟荘周而學者乃疑噫夫二子皆妄言耶今之所謂賢士大夫其超然異扵二子者邪抑有同扵二子而不自知者邪何訾彼之甚也原正祭非其鬼而求福焉人知其不正矣考之經則禱祠之禮煩設祝史巫覡其術近乎怪孰謂聖人而為不正㢤君親人所甚愛也死亡人所甚惡也以所甚愛而之所甚惡有告之曰禱可以免雖聖人其如何孔子曰丘之禱乆矣爲已故也周公冊祝請代武王臣子之心也今之學者自以爲正人視其親愛之疾則曰有命噫正可矣曰孝與慈則未也不孝不慈而得正焉吾不願也讀儒行儒行非孔子言也盖戰國時豪士所以髙世之節耳其條雖十有五然指意重複要其歸不過三數塗而已平居自重慎能䖏貧約一曰道塗不争險易之利冬夏不争隂陽之和愛其死以有待也養其身以有爲也二曰其居䖏不滛其飮食不溽三曰一畮之宫環堵之室蓽門圭竇建戸甕牖易衣而出并日而食四曰幽居不淫臨事有守奮發不顧忌一曰刼之以衆泹之以兵見死不更其守鷙蟲攫搏不程勇者引重鼎不程其力二曰可親而不可刼也可近而不可迫也可殺而不可辱也三曰雖有暴政而不更其所四曰䜛謟之民有比黨而危之者身可危也而志不可奪也五曰世亂不沮不苟合扵君視利禄如土芥一曰難得而易禄也易禄而難畜也二曰委之以貨財淹之以樂好見利不虧其義三曰上不荅不敢以謟四曰陳言而伏静而正之上弗知也麤而翹之又不急爲也五曰上不臣天子下不事諸侯雖分國如錙銖容人愛士以身徇朋友一曰慕賢而容衆毁方而瓦合二曰内称不辟親外舉不辟怨程功蹟事推賢而進逹之不望其報三曰爵位相先也患難相死也四曰並立則樂相下不厭乆不相見聞流言不信其餘亦常事如席上之珍以待聘衣冠中之類考一篇之内雖時與聖人合而稱說多過其施扵父子兄弟夫婦若家若國若天下粹羙之道則無見矣聖人之行如斯而已乎或曰哀公輕儒孔子有為而言也曰多自夸大以揺其君豈所謂孔子者㢤讀文中子文中子之言聖人之徒也傳之者非其人為之癰創而巳耳吾觀中說謂所傳者姦詐無禮之人也世誚房魏軰不稱師顧諸公如何人也竊人之財猶謂之盜學焉而不知所由来固小人矣然其佐唐命基太平行事灼見非小人也非小人而不稱師未嘗以為師也明矣隋書魏公所述常人或得一傳而無王通云者豈窮為弟子而忽忘若是乎或謂以長孫無忌怒故句夫魏公引義諫諍不為天子屈豈憚一無忌而削其師㢤盖文中子教授河汾間迹未甚顯沒後門人欲尊寵之故扳太宗時公卿以欺後世耳懼其語之泄乃溢辭以求媚若杜如晦扵萬民猶天百姓日用而不知之類其媚扵唐帝則下文曰尭舜者是也孔子之時周王魯公非有道也至脩春秋尊京師别内外戀戀不能已江都弑煬帝而文中子曰天其或者将啓尭舜之運吾不與焉命也其如君臣之禮何孔子扵孟懿子季康子稱對稱名孟孫問孝扵我我對曰云云康子饋藥拜而受之曰丘未逹云云楊素蘇䕫李徳林隋之大臣且非弟子而謂之請見又名之素與吾言夔與吾言德林與吾言云云其如上下之禮何吾故謂所傳者姦詐無禮之人也雖然不姦詐不無禮文中子之道不如是之光也流俗之視中說如視佛書夫焉知佛之道可尊而尊之㢤徒聞其未死時天地鬼神夷狄之君無不尊之者耳或曰文中子之道不如是之光則柰何曰不害為聖人之徒弔楊子歲隂在戌兮其月季春望前三日兮是惟壬辰面書林以齋慓兮敢行弔于子雲嗚呼哀㢤髙廟不神兮借人以權新都大盗兮舂國之咽㓙邪得志兮明哲偷安天爐熾炭兮璞玉不燃歛佐王之刀尺兮廻智巧乎簡篇何諸儒之䘮明兮復培塿乎泰山夫聖者通之謂兮可名而名之豈有常人昔成湯號伊尹曰元聖兮固商書之所不刪夷之清而恵之和兮孟氏亦以爲聖焉謂子雲之非聖兮何啻乎膠柱而操絃韓退之云大醇而小疵兮所論止于法言兹對問之細碎兮如入宫始見其堧垣伊太廟明堂之巨麗兮則盡在于太元兼三材而用五行兮取度數扵渾天日如蟻而右轉兮斗掲柄而左旋隂陽晝夜之會合兮非弄筆之所磨鐫其指在扵三綱兮尤切切扵君臣君道光而臣道㓕兮尊卑之分以陳消與息而相乗兮無盛滿之不疾顛言行禍福同出扵罔兮貴思慮乎未然必稱孝而稱忠兮異乎劇秦而羙新既廣且深兮浩浩東溟之瀦百川自哲人之萎扵魯兮獨子雲之書誰得而及肩惟視之八曰翡翠于飛離其翼狐鼦之毛躬之賊盖小才之足以殺其身兮俾愚心之愬愬奉新語以周旋兮庶全歸扵窀穸彼叔明之為注兮間或失而或得矧科指之不甚明兮匪後生之能識今之從事扵此書兮其說溺乎數術隱怪之士惜以為已有兮學者欲求而弗獲繄小子之不敏兮将大為之觧釋下以行諸講學兮上以及夫邦國計其業之勤勞兮豈一朝而一夕困于内者疾病兮迫于外者衣食念一家之言兮終成之扵何日天有意扵此書兮使我夀考而強力不然子雲之道兮或㡬乎息我思古人兮淚漣漣而霑臆復說孔子曰顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉噫顔氏之賢肖夫聖者也猶有不善乎曰衆人之不善不至乎善也賢人之不善善而過者也孔門髙弟師也過由也兼人有姊之䘮而弗除曾子執親之䘮水漿不入扵口者七日皆善而過者也而未聞其復也中庸曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣復而得中者顔氏而巳乎故曰用之則行舍之則蔵唯我與爾有是夫人之患不在乎不及而在乎過之不及則下扵人下扵人則憤憤則知進矣過之則出乎類出乎類則矜矜則不知其反矣伯夷與鄊人立其冠不正望望焉去之過扵正者也叔向三數叔魚之罪過扵直者也扵陵仲子不食兄之禄過扵㢘者也魯隱公攝位過扵譲者也徐偃王不忍闘其民過扵仁者也尾生期女子過扵信者也聖人則不然子見南子似不正昭公知禮似不直将之荆先之以子夏申之以冉有不欲速貧似不㢘文王既沒用我者其為東周似不讓誅少正卯似不仁諾陽貨曰将仕似不信應時遷徙各得其所禮所以制乎中義所以謂之宜也可與適道未可與立可與立未可與權聖人之情也義之不存而苟變焉然後為小人矣䕫教胄子臯陶陳九徳曰直而温寛而栗柔而立是亦復之一端也天台王㡬好學而多能将有所就焉者也幾之字曰復之故為之作復說命箴宜失而失斯謂之正宜得而失斯謂之命身之不脩責命可乎謹爾攸趍惟道之圖命之不諧躁乎則惑慎爾食息躁爾之賊得失不言吾道孰辨臧之否之繄我之願言不以道幸其哀己食而揺尾彼獸之耻非道而哀尚盍耻之矧其無益祗辱奚為三十曰壮聖人以立先迷無悔今是猶及蚤詩夜書以遨以娱戒之勿渝天其舎諸畫賛工有圖貴人之像者予哀其賢而無所遂也為之辭云道之可行君子乃出行而無成君子之疾位以名得名以位失古人丘壑豈徒自逸嗚呼弋陽縣學銘慶暦恢儒首自東都爰及郡縣築宫授徒地不患小權不在大繫乎其人乃勤乃懈葛陂之南縣廷之東令异尉宇經始其中居室以嚴用器以利曰藝曰儀一為品制事則有變衆則有散非志之確誰足之踐易羙知㡬孔戒巳甚太學三萬黨人以禁興雖有功廢或為福敝漏之下誦弦亦足朂㢤斯道無與乎世儒之全安宜億萬祀嘿堂銘黄介夫尉鄖鄊作嘿堂以居使人来告故為之銘曰衆人之嘿不材扵天賢人之嘿保身以權止則為澤行将為川雖欲勿言安得不言太學議覯伏以古今時異㳂革事殊凡有設施當求折衷若曰上法周室作為辟雍詢扵儒者諒無異議行之本朝或似不便何者雖作辟雍必不欲廢國子監未聞古者辟雍之上更有國子監也况辟雍之設非徙講授而巳便當行視學之禮養老之事國家大禮如籍田明堂鸞輿未動六軍之士巳希賞賜竊恐惜費未䏻盡行有其器而無其用天下之望寧不歉耶若欲太學不與國子監相妨又無行禮之責則宜近取唐制國子監太學四門律書筭廣文凡七館皆屬國子監太學則七館之一其扵國子監猶吏部兵部之扵尚書省也不相妨明矣萬一遭遇帝暉下臨乃吾道之光耳若猶未也亦不為朝廷之闕至扵棟宇之度在唐無聞如使講習有位生徒有次量事制宜誰曰不可然亦湏見地之廣狹而後計之若豫爲廣大之制而地或𥚹小則是空文無所施用或謂周人立四代之學今若以國子監爲唐學又立辟雍以法扵周有何害耶覯謂不然周之四學並立各有所用如養國老於東膠養庶老扵虞庠學干戈羽籥扵東序禮在瞽宗之類是也今教學之職盡在辟雍若不使國子監統之則祭酒司業當治何事如使辟雍屬扵國子監則古者辟雍之上更無官司故覯以爲不便果䏻廢國子監而興辟雍且脩視學養老之禮以飾之則非覯之所敢議也策問三首問孟子稱舜為天子臯陶為士瞽瞍殺人則執之舜竊負而逃海濵以有所受之也觀諸周禮則有議親之辟夫宗室有罪尚在八議彼為天子父而吏得執之是邪非邪抑異代之法不可同條邪二三子極言之問夏之有徳逺方圖物以鑄九鼎使民入山澤不逢不若其功大矣然所謂神姦者固為傀異之形而求近人邪抑能變化與人亂邪果其傀異則民之見者雖無有鼎亦知懼矣苟能變化與人亂則何形之可鑄邪當王孫滿之時鼎猶在周其所象物盖嘗目見非虚語也顧言之失其義耳然則禹之為是鼎其何意也問周官六屬其職三百六十而貟數則多如六鄊七萬五千家耳自比長以上卿大夫士萬八千餘人此大可怪學者毎非之而未見其說抑序官之妄邪則鄊州黨族閭比皆有職又不可闕然則守其官者何等人也策問六首問太史公叙術學崇黄老而薄六經其論以道家與時遷徙應物變化故曰聖人不巧時變是守以吾觀之盖不出夫易易非六經乎何其不察而遽薄之也二三子試言焉問韓退之有言老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其說樂其誕而自小也亦曰吾師亦嘗云爾佛之說吾不能詳曽子問老子列傳則有問禮之事史未足盡信禮記經之屬也亦有妄乎明辨之無牽舊說問韓退之謂楊墨之書尚有存者今之學者有學扵彼者乎有近扵彼者乎其巳無傳乎其無乃化而不自知乎吾考扵墨彊本節用誠其所長楊則無見矣然乃孟子所謂為我者也歴觀士大夫之所以髙人者儉陋為先儉非墨之流乎其施扵天下國家恨未及也至扵先己而後人持禄保位不以治亂累其心者亦楊氏為我之决矣及其論議尚囂囂然曰闢楊墨豈非化而不自知者㢤噫時有變事有宜則夫二者為是乎為非乎将盖而勿問乎将折以先王之制乎各言其畫問春秋書王所以見王者上奉時承天而下統正萬國吾習諸此未始不舍業而嘆深矣先王之法也然公羊子曰王者孰謂謂文王杜元凱曰所書之王即平王學者往往未知所傳今之儒生又有異意謂春秋以天下無王而作盖號令賞罰天子之事孔子不敢私之故書王以著號令賞罰之所由出若是則王非周也孔子藉之云爾吾心亦不安兹用商于二三子繹聖人之心懋君臣之義吾有望焉問周禮周公致太平之迹也而扵大司馬見師不功之文小司宼有詢國危之目諸如此類盖非周公所嘗行若春秋舊凡亦曰周公之制而弑君之例存焉豈成王時有是也㢤故學者疑周官凡例皆不出于周公二三子以為如何問孟子曰未有仁而遺其親者也未有義而後其君者也是時天子在上而孟氏游扵諸侯皆說以王道湯文武所以得天下之說未聞一言奨周室者庸非後其君乎賢人之言必不徒爾盍各求其意直講李先生文集卷之二十九終, WYG: ''}
