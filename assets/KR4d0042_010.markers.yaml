  - {type: variant, offset: 0, length: 28399, content: 直講李先生文集卷之二十潜書廣潜書野記後學南城左賛編輯後學廣昌何喬新校正潜書十五篇并序泰伯閑居有書十五篇憤弔世故警憲邦國遐探切喻辭不柔伏噫道未行速謗何也姑待知者而出之乎乃命曰潜書吾民之饑不耕乎曰天下無廢田吾民之寒不𧖟乎曰柔桑滿野女手盡之然則如之何其饑且寒也曰耕不免饑𧖟不得衣不耕不𧖟其利自至耕不免饑土非其有也𧖟不得衣口腹奪之也鉏耰未乾喉不甘矣新絲出益膚不縫矣鉅産宿財之家榖陳而帛腐傭饑之男婢寒之女所售弗過升斗尺寸嗚呼吾乃今知井地之法生民之權衡乎井地立則田均田均則耕者得食食足則𧖟者得衣不耕不𧖟不饑寒者希矣浮屠以不殺爲道水飲而𬞞食舉世稱其仁夫雞豚狗彘待人而後生者也食人之粟以滋其種類一日無人則饑而死然而天下之民所以不愛其資豢而耕不免饑𧖟不得衣不耕不𧖟其利自至耕不免饑土非其有也𧖟不得衣口腹奪之也鉏耰未乾喉不甘矣新絲出益膚不縫矣鉅産宿財之家榖陳而帛腐傭饑之男婢寒之女所售弗過升斗尺寸嗚呼吾乃今知井地之法生民之權衡乎井地立則田均田均則耕者得食食足則𧖟者得衣不耕不𧖟不饑寒者希矣浮屠以不殺爲道水飲而𬞞食舉世稱其仁夫雞豚狗彘待人而後生者也食人之粟以滋其種類一日無人則饑而死然而天下之民所以不愛其資豢而畜之者用扵其家故也神靈之祭賔客之奉扵是乎取之今且使民無揺手扵其間則何待而粒之㢤吾見其無遺種矣抑将不殺其身而務絶其類乎仁者不為也抑将奪人之食以飽無用之禽乎仁者不為也嗚呼浮屠之仁歟止扵是而巳矣善卜筮者能告人以禍福不能使禍福必至扵人喜福而怠脩則轉而之禍怛禍而思戒則易而為福若是則龜筴皆妄言故歌大寧者無驗扵昏主恤危亡者常失扵明后善言天下者言其有以治亂不言其必治亂夣者之在寝也居其傍者無異見耳目鼻口手足率故形也䰟之所逰則或羽而仙或冠而朝或宫室輿馬女婦奏舞興乎其前忽富驟榮樂無有極及其覺也撫其躬亡毛髪之得於是始知其妄而笑此無他獨其心之溺焉耳苟合以希聲盗勢以驕人齧利以封巳赼趄笑呵晨作暮巳從而視之犬言彘𥚑未始有變而其人且囂然自謂賢智顯大莫與爲對嗚呼将幸而覺邪抑将㝠㝠没没遂至扵死邪如其覺也當自笑之矣左右奉飬𬒳服教戒子非尊扵母也勉征繕聴誅殺民非貴扵君也母以有子而尊君以有民而貴無子無民母出君㓕人之於其配成之以厚禮無子而出之者不以宗廟之重私一女也天之扵立君命之以符瑞無民而㓕之者不以天下之大私一人也然則恃母之尊而不能養子家之逐妻也倚君之貴而不能愛民國之䘮王也苟得其心少康一旅為有民苟失其心商王億兆無民矣是故聖人簡役而輕賦喜徳而憚刑名位不立貴賤不分天下其何如曰亂而巳矣名位旣立貴賤既分天下其何如曰亂而巳矣敢問何謂也曰無名之亂統不一也有名之亂欲而争之也古人有言曰萬乗之國弑其君者必千乗之家千乗之國弑其君者必百乗之家貴令而驕賤承而辱能無覦心者㡬希矣是故君子位髙而徳脩外榮而中懼恭儉以下人恩澤以結物為是戒也夫天之制兵革其有意乎見其末者曰為一人威天下明其本者曰為天下威一人生民病傷四海冤呌湯武之為臣不得以其斧鉞私扵桀紂是以庸君中材抽手入袖不敢加禍扵無辜之草木噫後之人其可以放蕩之徳席其上㢤虎豹之性喜噬人者也去其爪牙則可使為羊豕擾而畜之無害矣貪暴不順小人之常心唯其逸才者可以逞其惡扵天下莾篡卓弑是皆有過人之才故䏻梏同列之手使之無動才乎才有徳以為功無徳以為亂官乎人者宜如何聞之曰無徳而才猶資盜以兵周之制其仁矣乎八家九頃以足其食五畒樹桑以為其衣媒氏以時其婚姻庠塾以賢其子弟疾瘍有醫賣儥有平管㣲司隱王心察察嗚呼秦漢之國亦嘗有意扵是乎乃知古之天下君養民也後之天下民自養也奈何以惡政惡吏困自養之民㦲事親以孝事君以禮聖人以是師天下也佛之法曰必絶而親去而君剔髪而胡衣捐生以事我其獲福不知所盡此獨何歟受親之體而不養扵其側食君之田而無一拜之謁家有叛子而族人愛之邦有傲民而吏不肯誅以佛之主其上也紂為諸侯逋逃主而諸侯伐之佛為天子逋逃主而天子未嘗怒哀㢤有吏扵人上者曰爾無為孽且伏大刑雖婦人幼子咸信而懼矣若曰多賄予罪大不問則天子必降誅時人将指而唾今浮屠之言曰人死則為鬼善有羙報惡有無極苦其扵訓愚盖少附扵理若繼之曰侈我字嚴我像衣食我徒雖弑君父亡所恤而王公大人反朋而和之何也犬之無事時叱則走遺骨則争及其噬人也臨之以箠而弗抑投之以食而弗顧愛其家不敢愛其身也受天子禄守天子土械姦民劾惰吏而致之法上官一言臣室一金則觧而出之不待旦晞勢而懼懐賂而喜妥首摇尾良犬之耻天之疾惡也常有以助之失徳之君民不若是之困也亡不若是之速也以有天爲之助焉政毀扵下氣變扵上君取其一天取其十賦人未空其帑而水旱之酷巳奪其稼矣刑人未潰其膚而癘疫之行巳殘其命矣是以夫婦愁痛宼賊竊發惡之一毫怨丘山矣此豈天之不仁歟疾其惡幸其死謂民不困則亡不速故也嗚呼爲人上者無爲天之所助戒㢤襁褓者智乎冠衣者智乎謂襁褓智而冠衣懵則臧獲必笑子之在母也違而出閫則啼呼不安指其父則嘻笑而歸之其心未始不在父與母也巋然而角泠然而語其智益多其孝益不足釋哺乳而逐醉飽背庭闈而謟妻妾則是智者孝之賊歟昔以見養而從親今以自養而忽之病尫聾瞽未嘗去膝下智者果孝之賊矣噫先王之任智也亦如是乎故壮齒慙於嬰兒賢母不願生才子孔子之言滿天地孔子之道未嘗行簠簋牲幣廟以王禮食祥吏其死不食其生師其言不師其道故得其言者為富貴得其道者為餓夫悲夫廣潛書十五篇并序嵗辛未泰伯以潜名書後七年覉栖山巖即而廣之復為十五篇心愈苦言愈多嗚呼其亦見險而不能止者乎聖人以道疆其兩人乎奚其言之峻也曰否人斯有之也人有之而不自憙跳而逐諸物放蕩以溺死聖人因其有而品節之使之堅守而弗去不然則聖人違天而病人其何徳之有焉舉天下之事無若聖人之道之易行也無若聖人之徒之安以榮也親我所愛也而孝存焉長我所畏也而悌著焉夫婦莫不欲和也而義生焉男女莫不欲别也而禮成焉敎子養孫飲觴食豆以善鄉黨僚友心平而體胖内明而外治憂患以除耻辱以逺推之國放之天下莫之能逆也巳孰若是蕩蕩者乎拾小而遺大瞭利而眊害神罷於詐筋絶扵争日之樂而月之憂慶未徹席而弔位焉吁我有之誠易行也而安榮繼之屈已以從物盖難能也而憂辱終之然猶世俗輕去此而適彼是不忍再精思而咻之者衆也受命扵天乎受命扵人乎受命於天性善是也受命扵人從俗是也背國而從偽者謂之叛其得罪死背天而從人者始雖得志天其不討乎人誰無過與孔門髙弟自宰我子貢冉有季路或不免扵譏今兹雖有罪庶可以辭乎曰大圭嘗玷不害其為寳也若碔砆甚粹宻焉猶為石也石而缺斯棄之矣賢者之責也俻故小過孔子譏之今兹之所謂是者折諸賢門猶有罪也今兹之所謂罪者刑戮而未施刀鋸焉奚竊議扵彼㢤易曰閑有家悔亡家之不閑未始能無悔也彼莫不惡其家之亂也而罔念所以啓之者妾婢寡則無怨女婚姻時則無曠夫怨女曠夫亂由是出也欲戕扵性女什扵士閨門之内不見徳而見色吁己則為之而謂人巳乎浮屠法其有功扵兹乎何也曰天生民而胙之畎畒其庳則手扵工足扵商為有益扵人而後食其報不然父母不得私其子放諸餓莩而巳矣今夫閒民童其首而衣之緇所之飽煗而安肆是有功扵惰也古之敎者曰天道福善禍滛今夫大猾隂賊恤其謫之及乃羙僧飯大佛屋謂之懴悔因施施無復色憂是有功扵惡也宮室之度非財不侈巨木丹碧庶人鮮或用滛巧無所彈其繩惟宅浮屠無藝不憚窮山裂石必致之滛巧日富焉是有功扵末作且寵竒貨也苟去浮屠氏是使惰者苦惡者懼末作窮竒貨賤是天下不可一日而無浮屠也宜乎其排之而不見聴也嘗學斷獄乎吾爲子舉其要坐獄而問之曰功爾言之罪爾言之從而詰之曰功信矣而罪如此其大也尺寸之功不足以贖也是其人雖欲不服何辭㢤若功不及齒牙而惟罪是詰雖滔天其人将曰我有功而弗問而專咎予欲其無辭難矣昔之排浮屠者盖猶有過徒非其非而弗及其是雖柳宗元尚不聴退之况其庳者乎胡不窮之曰爾之道以慈悲普濟率民講報應以威之使不敢放於惡其大者則曰見性也吁亦是矣雖然爾之慈悲普濟而不以禮節之六畜蠢動壹意是不知父子之可親而他人之可䟽也親䟽不别是夷狄也爾之報應而不以信守之一財媚佛則反禍為福是招權鬻獄汙吏事也爾之見性而不漸諸訓典左右如其真是赤子不得成人也見丹而丹見素而素不肯一御其心而之他率斯道則上不得正其下下不得忠其上絶其維而逸之野鹿焉疾子䘮心焉孰謂天下國家也以是窮之而弗聴者是偶人也與偶人語尚何取其聴㢤孟子有言曰男女居室人之大倫也雖聖人未之有異而浮屠何其介㢤彼此盡䏻泊然以循其法者也惟人之愚父母徒惑其富厚安閑捐孺子而奴之厥初未有知也既長而悔盍㱕乎無業以衣食也不得巳而終焉其心豈異人㢤是鍾梵不足以樂怨曠奈何其欲隂陽之和也為禮不為財先王以是鑿人耳目中下之世人不知禮而利之圖雖在埶或可以貨取故囂囂者舉疑其上浮屠氏睨其機也又使之疑天地夫古之事上下神祗也惟天子二王周公後諸侯雖大國弗敢及因吉土而壇牛必在滌三月然後用齊明盛服惴惴唯恐其不稱也今浮屠埽民家而召之且賛之謁佛畫坐誦累譯之言謂之加持吁孰謂天地之大而為一飲食若臣僕然乎盖疑之者漸也善賊者必搏人之親愛而質之攻之則并殺縱之則幸而生孰忍以其貨故而血所愛也善贓者必誘時之貴仕而質之飾情以為㢘借力以為勤一釣而得舉則負其埶而馳攻之則連坐縱之則幸而免孰敢以其民故而病貴臣也舉一人而刳剔億萬人其罪在此不在彼也戒之戒之無為賊子所質後之俗何其粲粲乎相高以富相矜以侈吾財之所可貿易雖國寳必用之財之不給帷帟粧櫛之不逮人則妻妾詬其無能女子羞泣不肯升車以嫁故民刑扵争吏禽扵貪豈曰不愛身耻其不若人也正其禮謹其禁拔其僣本而域之扵三代畜財千萬朽貫而無所施設或㡬乎其㢘且讓也婦人從人者也從之斯尊之矣卑其夫未有能從命也夫弱於外婦强扵内下上其心而莫之制何所弗及㢤舉天下而漸其風亂矣王化之存者㡬何是故婦人扵夫家不可不使之盡禮也必待其敵而後禮焉則周之女前嫁商而後嫁秦乎往者不可追來者不可期是無地而致婦道也然則何彼穠矣之詩斯妄言乎仁義曷居乎䘮禮仁義之盡也今也求諸篇盖彬彬焉而士大夫諱讀職敎化者不以是病也遇哀而哀哀忘則巳賢者無以節不肖者不勉焉吁㣲三尺法㡬何其不錦衣而舞柩也法禁怯而不禁豪禮則左右而勝焉知禮而違曰吾能不自愧乎知禁而犯曰誰敢言我雖然士大夫未見其尊親也夫燕雀必有啁噍之頃焉哀而不以禮是以燕雀送其親也周之季樂敗矣而夷音篡之流連遂至于今彼邪人者猶以為歉也又取而歌其淫辭音之動人也多矣而其言及牀第焉中材兒曹狂舞怨泣之弗暇人道扵是愈無别矣忍人㢤吾民何罪而以是蠱也吁仲尼弗復司宼矣是螻蟻不得飲血扵兩觀也法言曰大人之學為道也小人之學為利也吾甞策之矣為道乎實不待率也為利乎以利輔道斯嚮道矣誘之嚮道漢事然也察州郡辟公府句小吏賤人或勉為善也誘之違道近事然也不求其徳而試其言冠緌之下或屠販之器也吁今之立乎道義之門者間人足音盖欣欣矣善之夲在教敎之本在師師者所以制民命其可以非其人㢤古者家有塾黨有庠術有序國有學為民立師也學校廢師不命于上而學者自擇焉識不至擇不精是能言之類莫不可師也然則父儒而子墨朝華而暮戎不足恠矣嗚呼君子如欲化民成俗其照之末光乎野記二篇并序予居東郊外耳目所得有可以為世戒者作野記二篇里之氓有慕都邑之侈者以其畜牛易人之乗馬既數嵗矣土田之腴舎牛而不獲倉廪菽粟耗于馬腹饑餓且不救而馬之能卒無益扵甑釡噫今之絶故賤而友新勢忽講習而嚮奔走有不病其田而空其菽粟者乎春陽既作草之百名生扵穹陵扵絶澤扵不迹之地霧雨所盥風氣所弄苗堅蔓驕生理自若舎是而入田畒者則根與稻争潤葉與粟誇暖角長等碧疑過者之目農人之父病其為稼害也掘而去之不遺種火變水腐狼藉道側願為糞土蕪弗可得矣噫安爾類計爾材不自齒扵嘉榖則奚禍之來直講李先生文集卷之二十終直講李先生文集卷之二十一慶暦民言三十篇并序慶暦三年屏居里中自念生而宦學其秉心也勞其慮事也多既不克進且為編戸以死終無一言其何補扵世記曰上酌民言則下天上施故為慶暦民言凡三十篇開諱備亂審姦防蔽效實慮永謹聴辯儒廣意損欲本仁慎令考能止幸裁舉精課懋節崇衞省盗釋禁南畧敵患柬士儲将逺私正局厚農復教孝原天諭開諱身莫不惡死而未嘗有不死國莫不惡亡而未嘗有不亡等死耳殤不若彭之夀等亡耳秦不若周之世壽雖髙而㱕之死世雖永而㱕之亡然而以死亡為諱者是不智也聞死而愠則醫不敢斥其疾言亡而怒則臣不敢争其失疾不治則死或非命失不改則亡或非數是諱死而速死諱亡而速亡智者果如是㢤故古者天子即位卿授之策曰慶者在堂弔者在閭誡亳社忌子卯惴惴唯恐如桀紂也鄙諺有之厲人憐王謂絞纓射股擢筋餓死甚扵腫胞之疾嗚呼君人者得聞此言也則寝不瞑食不㫖尚何從欲之有乎備亂治之民思亂亂之民思治何也生無事之時身安而意侈刑弛矣急之則驚歛輕矣加之則怨力未嘗鬭自謂勇心未嘗謀自謂智知兵之利而未見兵之害小不得意則欲翼而飛矣故曰治之民思亂也處多難之世城者不肆野者不稼彊者僵扵戰弱者斃扵餓父母妻子刼束屠膾然後見兵之害而不獲兵之利幸而有主則将雨其槁矣故曰亂之民思治也思治矣雖中才可得其歡思亂矣非聖人不能弭其漸大禹之戒曰予臨兆民懔乎若朽索之馭六馬故智者慮亂扵治愚者謂治不復亂悲㢤審姦盗之未泄也日與之接而不知其盗姦之未露也日與之居而不知其姦衣纓言動與人同而盗姦在其心知之固未易也及夫贓出械見刑殺扵市而衆人皆知其盗謀行亂作國家敝敗而後世皆知其姦知其盗非衆之智由獄吏之讞也知其姦非後之賢由史臣之筆也觀書者睹曩時之禍皆笑其不知姦矣而不曰我之姦者亦待史筆而後知也漢元帝謂幽厲任巧佞自以石顯愈扵彼故京房曰臣恐後之視今如今之視前嗚呼安得敢言如房者乎防蔽人主不知亂作者左右蔽之也彼豈不愛扵君幸其㓕亡耶盖懼誅耳平居以佞邪席其身飬君之欲迎君之非君有問焉必曰安扵泰山也然而亂且起國且危是昔者欺吾君也君一怒焉則死不待頃扵是纊君之耳不使聞危亂姑緩吾死何暇慮長乆也陳後主之沈客卿隋煬帝之虞世基勢敺之然曷足恠也故邪臣非不愛其君不得其事君之道也昏主非不愛其國不得其守國之術也不得事君之道者始不正也不得守國之術者終不明也若曰臣之愛君而終用之不照之以明則雖欲孝宗廟其如宗廟何效實官名也事實也有名而無實天下之大患也上弛而下偷文書具口舌給而信其行事是見駑稱驥而不考之千里也國不一官官不一事何從而得其實盍責之主者乎縣焉何實責之郡郡焉何實責之諸道諸道外也群司内也内外之實責之宰相宰相之實上觀之天而下察之人乎上觀之天隂陽調乎下察之人國富乎兵强乎百姓康樂乎四夷協服乎此不待下席而灼見矣責有所在罪有所當故曰四郊多壘卿大夫之辱地廣大荒而不治亦士之辱如是人人莫敢不自盡昔唐徳宗不知盧𣏌姦邪盖不思其實矣去四海之廣而投諸奉天非姦非邪誰使然也彼誠有所合合則信信則惑惑則非是而是非矣嗚呼君人者其亦慎其合乎慮永亡國之君不皆惡非桀非紂則所由漸矣漸者何也基禍扵彼而受禍扵此也天下之勢一往而不反若决河堤使東流也基禍之主外乆安而内自賢道失扵心而弗思權移扵人而弗寤然祖徳或未沒民心或未觧故有幸而免也受禍之主乗亂得位名雖為帝治不在巳囚拘旒纊之下弗獲忠義之助故不幸而及也漢獻帝唐昭宗其何罪歟故明者舍近而謀逺無謂未足患将為子孫患彼具臣者寄位如邸舍幸當其時無事不暇念身後也人主為萬世計不可溺苟且之議禍不在身而在子孫既足動其心矣而况倉卒之可虞㢤謹聴䜛者沮善者也諌者抑惡者也名之諌者皆知好焉名之䜛者皆知惡焉然而人主不免扵信䜛者䜛似乎諌也愎諌者諌似乎䜛也君曰可用臣曰不可用不可之辭同而情則異矣用君子而小人沮之是為䜛用小人而君子抑之則為諌君子小人之心忽怳而不可見是䜛諌所以亂也好諫而不慎則姦臣進惡䜛而不察則正人退世有信䜛則衆非之矣愎諌則衆笑之矣彼非狂易病惑豈不知諫之利而䜛之害顧謂之諫者非諌謂之䜛者非䜛也太申曰有言逆于汝心必求諸道有言遜于汝志必求諸非道䜛與諌皆逆心之物姑以道求之而巳不如是則貝錦之文或起扵青蒲之上而刳肝瀝血未必不疑其間我也嗚呼艱㢤辨儒儒者關治亂乎曰然用則治不用則亂乎曰非也用儒而治者有之矣用儒而亂者有之矣故儒得其人則為福不得其人則為賊以小人之質而被聖賢之文如虎斯翼固攫人扵都市耳夫古之事多矣或同而異各有為去聲也小人用之則稱其一而隱其二以罔上而行私矣飾灾異則曰堯水湯旱而不曰宋景退熒惑觧多壘則曰獫狁至太原而不曰守在四夷欲擅其權則曰舜徳無為而不曰明目逹聡治不如古則曰帝王不相沿襲而不曰一變至道此類如物恠變化不可勝窮故助王鳯者數稱燕王盖主以疑上心避諱吕霍而弗肯稱也嗚呼用儒至此是秦之湯火有不妄也廣意人感隂陽氣以生陽主動隂主静動則為謀為慮為决斷為事業静則為懈惰為因仍為逸樂動勝静則昭静勝動則聾理必然也升髙居廣出外行逺明視逹聴博覽詳問親賢臨衆講禮播樂如是者宜扵陽陽得其宜則勝隂深宮重闈時坐數卧治容巧笑厚酒邪聲俳戯伎巧說媚譛愬如是者宜扵隂隂得其宜則勝陽是故君子朝聴政晝訪問夕脩令而夜乃安身非九女當御不得進鄭聲佞人舉放逺之懼隂之勝陽也五載一廵守至于四嶽毎嵗祀天九祭地二明堂聴朔十有二孟春耕藉四仲教戰皆在國之外廟則有四時十二月之享社則有春秋祈報學則有合樂飬老之禮皆天子躬親之外朝則有三詢三刺大廷則謀及庶人欲陽之勝隂也夫心官扵耳目耳目狹而心廣者未之有也耳目有得則感於心感則思思則無所不盡矣人臣飾其辨以誣上一降席則指爲過舉是背經違古而閉其君之思也損欲形同則性同性同則情同聖人之形與衆同而性情豈有異㢤然則衆多欲而聖寡欲非寡欲也知其欲之生禍也五覇莫盛扵齊桓公以内嬖亢夫人者六竪刁以自宫愛易牙以蒸子幸終扵五公子争立死六十七日而殯七雄莫大扵秦始皇以殿阿房塟驪山終扵項籍燔其宫室牧兒燒其蔵椁禍生扵欲誠足畏也如使欲而無禍尭舜固為之矣何自苦如是彼多欲之君莫不自謂無禍恃四海之力矜一人之智以天地未足為長乆而不知智力非禦禍之器也聖人寡欲故能得所欲衆人多欲以所欲奉他人耳孟子曰昔者太王好色愛厥妃文王以民力為臺為沼而民樂其有麋鹿魚鼈夫能損上益下與百姓偕樂其誰曰不可本仁術扵仁者皆知愛人矣而或不得愛之說彼仁者愛善不愛惡愛衆不愛寡不愛惡恐其害善也不愛寡恐其妨衆也如使愛惡而害善愛寡而妨衆則是仁者天下之賊也安得聖賢之號㢤舜去四㓙而謚以仁聖湯初征自葛放桀南巢而仲虺謂之寛仁武王梟紂白旗而孟子曰以至仁伐不仁仁者固嘗殺矣世俗之仁則諱刑而忌戮欲以全安罪人此釋之慈悲墨之兼愛非吾聖人所謂仁也夫守國在政行政在人人不忠而亂乎政政亂則國将從之而且以不誅為仁是䡖國而重仁也故明主持法以信馭臣以威信著則法行威克則臣懼法行臣懼而後治可圖也慎令君出令而臣洱之何如曰下制其上也民從令而君改之何如曰上欺其下也上欺下則民心惑下制上則君權䡖民既惑則不聴君既䡖則不威上不威而下不聴其漸亦足憂也夫為令之弊有四初不審終不斷言者矜聞者争也洪範有大疑則謀及卿士庶人卜筮彼作事不咨扵衆慮不待盡而輙行使人有以詬病是初不審也日月之行則有冬有夏月之從星則有風雨謂政治不可從民欲耳彼有沮之則不計利害大小而遽改是終不斷也君陳以謀猷入告而順之于外曰惟我后之徳彼議一事則夸以為功使其黨間而疾之是言者矜也秦誓曰人之彦聖其心好之不啻如自其口出彼聞人之功耻居其下雖善必沮是聞者争也人主䏻知弊之所在則可以行令矣考能言一也而所由生者異或生扵心或生扵耳生扵心者帥志而言言則必形扵事生扵耳者剽人之言施之事則悖矣故上不好言則利不在言言者皆志也上之好言則言可近利無志者亦言矣鈔古書畧今文變白為素析一為二以希世願用一易其褐則言且忘矣何有扵事而况偶句諧韻言非其言者豈足問㦲嗚呼天下皆以言進未能不以言取既取矣胡不試之以事事讎扵言然後命以其官可也王制曰論定然後官之試此職也任官然後爵之以能而命也如是則無曠官矣止幸亂始扵恩怨始扵幸亂始扵恩進非其人也怨始扵幸有望而弗獲也選舉所以籲賢䏻而曰必多取則不肖入之矣賢者寡用之可盡而不肖滿天下用一不肖舍一不肖尚有怨矧用一不肖舍百不肖乎夫萬物以類動彼能是我亦能是用彼而舍我宜其怨也器玉者純扵玉則碈知其賤不免扵用碈則山石皆待沽矣有國者啓人之幸而欲人不怨人之類盡官而後可也傳曰民之多幸國之不幸寵不肖以敗其官不幸大矣而况怨且怒㢤裁舉唯善能舉其類不善亦䏻舉其類以尭之聖而問諸朝驩兠共工尚相歎羙矧郡縣之逺聡明所不接邪賢人在下位不使賢人舉之而必曰長吏長吏皆賢邪彼不肖之相好亦若賢之扵賢不肖之惡賢固如賢之惡不肖好同而惡異也不肖位乎上而望其進賢難矣賢知賢不幸而非其屬又不得舉然則賢人不遇豈天命㢤故責所舉之賢不若責舉者之賢舉者賢則所舉賢舉者不肖則所舉不肖一不肖逹而舉十不肖十舉百百舉千如此則剥道成矣直講李先生文集卷之二十一終直講李先生文集卷之二十二精課虞書三載考績三考黜陟幽明此百代常行之制也有功者升有過者黜無功無過者職其舊如是可以勸功而懲過世之考績則異扵此無功無過者升是升不必功也有過者職其舊是過不至黜也功無益而過無損懲勸安在㢤故妄庸人一出選部雖梏其手雖鉗其口而尊爵自至此董生所謂累日以取貴積乆以致官㢘耻賢不䏍所以無辨也夫進人不問其功而問其乆彼草木乆則長大可用人之材不能日夜生息亦巳明矣三嵗而進一官是三嵗而材一變乎如此則牛馬走抑可以乆而用之矣懋節使人以賞罰衆人之使人也使人以禮義聖人之使人也賞罰外也可去可就禮義内也一中其心天地四方無所逃矣有賞罰而無禮義安則可非濟危之具也誘之以賞利有厚扵賞者脅之以罰禍有大扵罰者利厚於賞則去賞禍大於罰則就罰叛國之利或厚於賞死戰之禍或大於罰有以動小人之心矣學以禮行以義交㳺之讐尚復之况君乎杯酒失意尚死之况國乎名焉吾賞耻焉吾罰意氣感發非有令之者也世俗誠大壊矣學者為官不為道仕者為身不為君見得其虎聞䘮去声其䑕父子昆弟之詔告妻妾之耳語非富非貴如舉其諱上之人又從而啓之賞先於功而功不立罰䡖於過而過不改無事而禄有事而賞位孺稚輿貨財而後行則是禄為我有而事以賞傭也禮義既銷矣而賞罰且玩階之者其誰乎孔子曰君子學道則愛人小人學道則易使信矣嗚呼三代不可作安得六國之士而與歸乎崇衞圖國在忠用忠在力濟力在權力者兵也食也權者所以制兵食也忠而無力則忠非其忠力而無權則力非其力忠非其忠死無益也力非其力令不從也奨周室者豈特威文之忠齊晉之力也豈特齊晉之力覇王之權也無力無權則䂊譲一劍徒自快耳天下古之天下也而彊弱異謂秦曰彊者非也彼秦取以彊而守以弱罷侯置守是也秦亡積千載而天下之弱彌甚刺史郡守寄客于外兵非吾兵食非吾食以服人者三尺法耳一旦當事則刑罰鞭朴非亂賊所畏也授首且不暇孰為勤王㢤義苟在焉胙之以國何害苟為不義陳勝吴廣豈嘗據大權也省盗盗不能禍天下而召天下之禍彼殺人以求食人固讐之安能禍天下盗既多殺既極讎者弗䏻報而後姦雄起焉盗者人之讎也而姦雄以誅盗為名是孝子慈孫夫婦之相哭者望之不啻如濯熱因天下之心收天下之權如此乃能禍天下人主知盗而不憂者以其舉錯非姦雄之刑也而不知姦雄不為盜故防姦雄莫若除盗賊姦雄不得盜賊之資則不敢起嗚呼殺人者人之賊而巳矣惡殺人者誠國之賊也釋禁與衆同利則利良民不與衆同利則利㓙人㓙人嗜利盗之所由興也山海之貨職在商賈乆矣而曰屬之吏屬之吏則衆不得錯手足法重矣而利亦重法重則良民憚利重則㓙人入然而董之以法是敺其為盗也彼㐫人者豈曰死可欲而生可惡㢤過在歆諸利而謂不必死耳不幸而㡬扵死則莫若為盗為盗又不必死也夫能弛其禁逹其利則㐫得與良齒胡為苟免扵兵刃間㢤南畧南北離合繫天下盛衰漢之衰則離逮晉而合晉之衰又離逮隋而合近者唐之衰又離逮宋而合距長江之固因中原之擾擾則自救且不給胡治扵彼㢤後雖有明王興彼業巳成彼守巳完非數十百年不可取此前事之驗也北擾矣而南又離離則米帛金錢之漕弗復􅘳淮而上如疾将病而絶之食耳此後事之憂也俗人皆以吴楚之兵弗如北而不知姦雄謀事常伺天下之衰當其盛時尚可論彊弱及其衰也雖曹公用兵弗能與孫權争馬超韓遂在關西為後患故也然則如之何則可曰宿師樹賢以扼其咽然後可也敵患夷夏奚若曰所謂夷者豈被髪衣皮之謂㢤所謂夏者豈衣冠裳履之謂㢤以徳刑政事為差耳徳勉刑中政脩事舉雖夷曰夏可也反是則謂之夏可乎愚儒之咤則曰彼夷我夏而不曰内自脩内自脩則徳刑政事四者備當而後曰夏勝夷可矣是謂知彼知巳百戰不殆彼欲虚吾國困吾民應之以儉則國可富民可逸然猶不䏻是堕其術内也嗚呼夷夏非古之夷夏也先為不可勝以待彼可勝善矣不然禍且日至豈徒由余所笑柬士天下有攻守草昧之時攻天下者也繼體之君守天下者也攻之兵雖怯而勇乗勝也守之兵雖勇而怯未之試也不試巳然况敗歟夫戰在氣三皷而竭曹劌所以克齊然而人不見勝唯敗是聞怯則宜也為政者務兵多以彊國而不知其弱國兵多則不擇不擇則大抵怯耳勇者尚怯况真怯㢤敺十怯以嚮一勇敗不足疑言之者必曰某以若干敗於若干以為彼太公孫子勢不可校後雖勇士固心醉矣非弱國而何胡不芟其冗轉其資以厚敢死使以寡勝衆而後氣可復庶乎彊國矣儲将死生存亡在将将之難也百夫長猶不可虚矧其上者乎資舟扵旱資車扵水先事而求則詳以實驗也事至而求則粗以言擇也用人者皆曰以能不以行彼閭巷細謹誠不足問豈大節之可違㢤孫子語将能則曰智信仁勇嚴不信而任事則事反不仁而御衆則衆殃如是而曰能不必行可乎矧彼言者又非能也以言擇将天下皆欲言婢兒庸保亦知誦書傳學計策以自進進者多矣可盡用乎兵盖不祥之器學者未得其千一而志意巳壮壮則思用不用則聚而怨怨則無不為是有國者敎之叛也獨奈何逺私晉侯以勃鞮用趙衰趙王以繆賢得藺相如皆奄人也謂奄之賤而能進賢何也曰賤故能進賢貴則疾之而巳矣古之奄給房闥使令盖甚賤賤則雖賢人當國何害故進之後之奄為帝王耳目盖甚貴貴則有威福玉食之罪婞然唯恐賢者之繩巳故疾之豈古之奄才而後之奄不才勢不便耳使勃鞮􅓎賢復生且不免為譛人夫非晉趙之時而垂晉趙之聴是賢者弗可得而不肖售矣正局周官内宰大夫士十有四人九嬪世婦妾御屬焉彼天子后妃猶以大夫士治之矧羞服匪頒好用之式而有不在有司者乎外自省寺重之以殿中六局所以奉乗輿者俻矣顧奪而歸諸奄何㢤有司奉法而奄人阿意奉法則用節阿意則欲逞此利害甚明白然而弗思者夫其殘民乎厚農先王之馭民也節其所為後王之馭民也極其所為夫惰之志在逸先王節之則不得逸農之業在勞先王節之則不甚勞宅不毛者有里布田不耕者有屋粟間民無職事者出夫家之征誰謂其逸㢤什一而稅用其力嵗不過三日春耕則田畯饎焉秋歛則蜡祭息焉誰謂其勞㢤王道消政出苟簡賦乎曰農役乎曰農田有榖而桑有繭非敢愛也五兵之用百工之材皆農無有而必責之是行商蓄家籍農之産廩農之食矣彼惰㳺未始及扵政且開穴食之路以進之逸者極其逸勞者極其勞勞而不貳者戅而巳矣嗚呼使天下皆戅則可不幸而有心則群入扵惰欲望九年之蓄難矣復敎樂正以詩書禮樂造士王太子王子群后之太子卿大夫元士之適子皆造焉說者必曰為化民也為選賢也而不曰愛諸臣之子保諸臣之家也人不教不善不善則罪罪則烖其親墜其祀是身及家以不敎壊也故明主推恩群臣必先敎學與其寵扵今孰若無辱扵後不務敎而務官之以市井言未學而仕其幸大矣智者慮之則為禍亦大彼不善之資而假之位鮮不及也嗚呼官者上之所䡖雖曠何損家者下之所重可不自為謀㢤齠齓腰印組鼓篋齒庠序勞逸誠不同而禍福存焉耳孝原禮職扵儒儒㣲而禮不宗故釋老奪之孝子念親必歸于寺觀而宗廟不跡矣夫祭祀豈徒自盡其心以交神明而巳盖有君臣父子夫婦親䟽長幼貴賤上下爵賞政事之義是謂敎之本也彼寺觀何義㢤嗚呼釋老不存則寺觀不屋非宗廟何適儒之彊則禮可復雖釋老其若我何天諭畏天者昌習天者亡何謂畏天髙宗成王是也何謂習天元成是也人之情非所常見而見之必懼懼必思懼之情同而所思不同明主思之以爲在徳徳脩而灾異消然後愈知天之明而徳之益也闇主思之以爲在數故任數而不脩徳徳不脩而禍未至然後愈知天無心而數有定也惟天之仁又出灾異以申勑之彼必曰前既無害此奚爲㢤亦數而巳矣灾異愈多不懼愈甚耳習扵聞目習扵見心習扵思習之乆則不聞不見不思焉耳然而上帝之怒不足獨當下延衆庶上累廟社甚可痛也嗚呼人不可玩况天乎天而可玩君命何足道㢤此孤臣正士所以泣血於地下也直講李先生文集卷之二十二終直講李先生文集卷之二十三記後學南城左賛編輯後學廣昌何喬新校正袁州學記皇帝二十有三年制詔州縣立學惟時守令有哲有愚有屈力單慮秪順徳意有假宫借師苟具文書或連數城亡誦弦聲倡而不和教尼不行三十有二年范陽祖君無擇知袁州始至進諸生知學官闕状大懼人材放失儒效闊䟽亡以稱上㫖通判頴川陳君侁聞而是之議以克合相舊夫子廟陿隘不足改為廼謍治之東北隅厥土燥剛厥位靣陽厥材孔良瓦甓黝堊丹漆舉以法故殿堂室房廡門各得其度百爾器備並手偕作工善吏勤晨夜展力越明年成舍菜且有日旴江李覯諗于衆曰惟四代之學攷諸經可見巳秦以山西鏖六國欲帝萬世劉氏一呼而關門不守武夫徤将賣降恐後何邪詩書之道廢人唯見利而不聞義焉耳孝武乗豐富世祖出戎行昏孳孳學術俗化之厚延于靈獻草茅危言者折首而不悔功烈震主者聞命而釋兵群雄相視不敢去臣位尚數十年教道之結人心如此今代遭聖神爾袁得賢君俾爾由庠序踐古人之迹天下治則禪禮樂以陶吾民一有不幸猶當伏大節爲臣死忠爲子死孝使人有所法且有所賴是惟朝家教學之意若其㺯筆以徼利逹而巳豈徒二三子之羞抑爲國者之憂此年實至和甲午夏某月甲子記建昌知軍􅈦記人得擇官乆矣天下唯股肱郡簡于帝念其餘在所欲夫食飽居安人情所不免故分田之廣狹公膳之有亡官舍之􅍇惡凡仕者鮮不以爲言建昌軍距行在三千里浮汴淮江湖不㡬月不至吏巳禄縣官無古圭田之比厨無子錢以勞賔客屋數十个盖偽李氏時作其夀將百年度制卑陬尤不稱事是以當世髙足之人聞之憮然莫肯為来有不幸而至者什不一二過此則物故不容于它取自竄焉政以是尨民以是創秋陽炙天井底或凌噫匪夷匪蠻匪海山瘴蠱之地獨無富侈之資以奉俊良使永永来爲人父母誠可歎巳今虞部張公其不幸而至者乎公本扵質直而文無害嘗治四郡左官是邦惟思昔人必葺之義廼更浮橋遷集賔亭作迴車院而本􅈦及焉􅈦之築土方五丈架梁三十有五尺取材扵山因役扵軍蚩蚩斯人不費不勞自春徂夏厥功以濟民不有勞惟公之勞公不有利惟民之利有問焉者必告之曰官舍羙矣則其去就之心宜稍異于昔所謂民之父母或數來其為利豈少㢤草茅生請書以見意慶暦七年六月丁巳記建昌軍儀門記觀古君臣之間近則禮為之厭逺則尊得以伸故畿外諸侯門阿之制與天子凖宮隅城隅各下一等天子五門諸侯有三門臺而道屏扵中為宗廟朝廷大抵不甚異盖南靣之君分土而治不若是無以貴扵一國民知其君之貴然後知王室之尊堂陸之言亦此類也自罷侯置守于今㡬世弱權削威居無常人有地數百千里而宫室輿服靡所張顯唯中門立㦸非出入不開東西兩夾門趨走之士紳笏磬折于其外非召呼不敢前以此異于他官舎謂之儀者有意也㢤太常博士吴公使建昌既視事曰神人在上萬事有經萬民有業吾守臣布行詔書奉順徳意而吏職脩矣披牒治訟若人四支雖終日運動不為勞心廼行府署唯廳事葺其餘屋古老卑小或如翼覆地其中無光或如衣之敝随𥙷随破郡治所在而陋扵一邑不務改作俾民何觀謀扵僚属其心同聴扵輿人其言樂自儀門始以及内寝不日而俻君子謂吴公以文學進宜其知治道父兄皆大臣其耳目固不隘官為博士宜用心扵禮位當刺史在可行之地此一役也以儀門為始夫豈徒㢤盍書之以示後覯應曰唯慶暦八年冬十一月甲子記建昌軍集賔亭記康定二年夏六月太守慎公作新亭于軍門之南越孟秋工告成事郡人李覯請為記曰惟兹軍築扵閏唐額扵吾宋同之列郡數十年矣然規摹儉固未始斥大雖視事有􅈦罷休有堂而僚属之所㑹賔客之所交以宴以㳺舉無其地公臨郡數月政既巳成事既巳省因謀别館以爲賔榮詢諸耇老則僉以郡署之前昔甞有亭號三善者毀徹雖乆基兆可指公乃相其地而築之且取籍没之材以足其用不賦一錢不役一丁而厥功以成飛飛其櫩角角其楹逹以重關周以階櫺姑山右顧積翠在掌旴水前來鑑裏萬象乃位賔主乃列尊爼有緌有紳以笑以語心澄欲仙意逺還古噫誠太平君子好事之一端也然民隱之不恤主恩之不宣而汲汲扵厨傳則何以爲政室漏之不補庭草之不剪而區區於簿領則何以爲禮合是二者盖鮮能焉今公之所治多務大體明而不苛斷而不酷得政之和公之所居罔不必葺作而不費飾而不奢得禮之至兹亭之興率是道也慄慄其威如風之凄民之服之千里弗違煦煦其仁在物爲春民之戴之千載如新召伯聴訟勿伐其棠矧茲攸宇其誰敢忘君命不駕匪夙則夜敢圖兹石以告来者南城縣署記慶暦二年㑹稽錢得臣仲基以大理丞爲南城宰西安周夣臣旻臨川滕平叔夷甫佐之扵是改作主簿尉署及縣􅈦之兩翼既訖功得臣受命刺白州夣臣監雩都銀冶而平叔考且滿使覯記其事覯曰古者諸侯卿大夫士其宮室以命數為之等示民有尊也今之郡縣有社有民雖九品僚属皆命扵天子其勢固不得居陋室如閭閻氓然世以土木為難事者財民之財力民之力也是以㢘吏善人或憚而不為乃至隘不可容壊不可支卷席避雨露坐迎凉者有之矣吾邑三君子以居之所不安為人之所難為捃官之餘用假吏之餘力木材如涌而民不出一簮築作再朞而民未嘗舉趾非奢非儉可次可舍事成而去豈曰自爲盖将壮官府利來者是可記也若夫舞智恃巧陵民匱財巳欲佚而忘人之勞巳欲樂而遺人以憂則有識者當伐鼓扵其門豈吾之所得記㢤謹用斯言諗扵好事時則五年春正月也邵武軍學置荘田記慶暦七年春三月㡬望武陽假守宋公以治學宫成識之巳詳後三甲子有竒敎授龔君與其學子授使者以幣走三百里謁於余曰敝邑得天故吾公来昔昏以旦昔寒以燠視人如其身視學如有神言必扵是行必扵是雖牒訴盈庭簡墨在前而與士大夫講觧對問猶燕居時故自庠門開不㡬月慕焉而來者不絶将恐𥚹小弗䏻容又翼中門築兩齋矣鄉之善良喜公之爲子弟之有属也不愛其貲願易土田以備糧用凡出泉若干萬得田若干頃嵗食若干人既有成矣而公之記所未書吾惟子之望覯聞命竊商之曰儒者詬釋氏爲其籠扵世也而不觧其所以然釋之徒善自大其法内雖不韙而外彊焉童而老約而泰無日不在乎佛民用是信事用是立儒者則不然其未得之借儒以干上既得之則謂政事與文學異孳孳唯府史之師顧其舊如蟬蛻及其困于滛辟恤乎罪疾欲聞性命之趣不知吾儒自有至要反從釋氏而求之吾㳺江淮而南不一日有庠序者不一邦踵其地而問之棟宇脩歟或曰為去官之舍館矣委積完歟曰充郡府之庖廚矣刺史在歟曰某院叅禪某寺聴講矣噫釋之行固乆始吾聞之疑及味其言有可愛者盖不出吾易繫辭樂記中庸數句間苟不得巳猶有老子荘周書在何遽冕弁匍匐扵戎人前邪蚩蚩之氓尚克有夫婦父子不盡抜髪為寺奴則幸矣何暇彼之詬㢤今宋公之仕唯其本之培下應其誠優為之備教化之效也如此吾所謂學非若釋夸荘嚴吾所謂田非與釋埒供養誠以今兹學者或自逺來居處不寧則愁飲食外取則勞去愁與勞人雖下中得以自盡扵術况其卓者㢤厲文之津茁道之芽入可以正其家出可以表天下為民教子為國養材莫之尚巳龔君以道藝立其中又欲楊公之羙于無窮皆應扵義敢不書公之學問無不該而其是非一之聖人故文辭可法施扵吏道民大恱盖将揮之廟朝一郡一學乃其觕聞命後三日冬十月辛酉書云䖍州栢林温氏書樓記南川自豫章右上其大州曰吉又其大曰䖍二州之賦貢與其治訟世以為劇則其民甿衆夥可識巳雖然吉多君子執瑞玉登降帝所者接跡䖍無有也疑其偩南越襲瘴蠱餘氣去京師愈逺風化之及者愈䟽乗其豐富以放扵逸欲宜矣故人許某家石城䖍属邑也此年夏踵予門道其郷進士温某之為人曰温君少時求禄而莫之得慨然自謂不得諸外盍求諸内不在吾身宜在吾子孫乃圖山泉羙好處奠居栢林因作講學堂房數十其楹攻位之日獲五銖錢五萬于地士友珍之或以青錢名其館凡書在國子監者皆市取且為樓以蔵之性寛静用地利自足不與俗人争訟買直孳孳以教子弟禮賔客為巳任琴歌酒賦夜以繼日許君不妄人也今其所稱與嚮之疑者不類是䖍之福歟自古聖人之徳業舉在于書聖人者非其智造而巧為之也天之常道地之常理萬物之常情也天地萬物之常而聖人順之發乎言見乎行事君得之以為君臣得之以為臣父得之以為父子得之以為子兄得之以為兄弟得之以為弟夫得之以為夫婦得之以為婦長得之以為長幼得之以為㓜反是則争奪相殺未有能巳者也今温君聚書勤勤是有意于聖人有意于聖人則豈一家而巳鄰里鄕黨庶乎偃伏之矣然則䖍人之成大名至大官盖未易知尚何吉之媿㢤柳子厚扵楚越間山水如小丘小石潭袁家渇石渠石澗猶有記以啓好㳺者今有人為蔵書之楼非特山水之勝記之以啓好書者不亦可乎予欲一至欄邊四顧天外江山進前文史相對清風兮我扇白雲兮我盖召屈原扵湘魚之口呼李白扵海鯨之背漱寳玉之餘潤拭明珠使去纇酒酣興盡交揖而退其樂可言邪而未之得也皇祐五年秋七月庚子記麻姑山重脩三清殿記覯幼時讀顔魯公麻姑仙壇記觀其稱道瓖地之殊絶人物之瓌怪目想其處謂如鈞天帝庭非下土所髣髴也及長㳺山縱觀所有則歌吟雲烟饜飫水石而巳其餘古屋數百楹或腐或濕無足可居惟仙若神何以顧享噫物有愈衰而後復理之常也則所謂三清殿者今為復之先乎按是殿之作背山嚮陽得地之正由五代迄兹載祀逺矣雖其營繕頗甚盛壮而木窮扵蠧瓦困扵雨日壞月墮㡬将壓焉頴川陳公某郷之耆徳勇扵為善一見其事惻然于中乃發家財以葺之工之巧者必至材之良者必備或改以新或完其舊昔撓以隆昔卑以崇赭焉而霞烘堊焉而雲溶真儀之位得以如禮山英水靈若喜若慰雖大道之要本乎澹泊安在土木之華而後張顯然名山之景列在圖籍非有㳺覽之盛不足稱述故言神仙者必曰崑崙之墟海中洲島宫闕之侈視珠玉不啻如土芥世俗相承以為羙談若麻姑山著稱乆矣元和辭人白樂天軰咸有詠歌粲于屋壁自尔以來言者溢口書者滿牘天下靈境兹不後焉苟非崇飾棟宇嚴事上靈其何足觀之則頴川公之意豈徒然㢤覯之視公大父行也見命為記謹書其畧于時嵗在辛巳大宋康定二年重脩麻姑殿記三代之英既往禮教不競人欲大勝欲莫甚乎生惡莫甚乎死而道家流誦祕書稱不死法以啖之故秦漢之際神仙之學入于王公而方士甚尊寵然或云延年或云輕舉皆人耳目間事乆而未驗衆則非之矣佛之徒後出而言愈幽逺其稱天宫之樂地獄之苦鬼神之為非人可見雖明者猶或疑焉是故浮屠之居貨賄竭天下宮室僣王者而黄冠師窮智役辯終弗能及自非當世好事慕方外之㳺者孰克廻靣扵真靈之境㢤麻姑之名聞之扵葛稚川傳申之以顔魯公記峩峩兹山得道之所始也自唐而下祀禮不絶築宮度人以嚴其事而殿屋之設歲月積乆雨淫風虐撐拄弗暇将無以布几席陳香燭為鸞鶴戾止之地群目蚩蚩莫肯營救故頴川陳君策字嘉謀博識之士肥遯州里頃嘗㳺山周覽及是将命工徒一新其制言未果行而卒其子今山陽司宼諫弟詢不忘孝思盡禀先志乃出家貲以幹厥事斬木而山空伐石而雲愁役不逾時營繕以畢修廣有度奢儉有宜禮神之位兹亡所媿論者謂真帝在上庶方無虞嵗不㓙灾物不疵癘故其人得厚本節用爲富家者往往而是内和親戚外禮鄕黨餘力乃以奉釋老求善祥兹亦平時之盛觀也可無傳歟巖巖有堅請勒其志于時歲在辛巳大宋康定二年麻姑山仙都觀御書閣後記皇祐三年以御書明堂及明堂之門篆飛白二體蔵諸名山麻姑仙都與焉夏六月道士黄太和爲覯言今者聖人肆筆而山藪得之其奚翅金簡玉字盖猶嵎夷昧谷天象所出入撮土勺水罔不光華非復與塵俗等幸㢤願有志焉以示後何如覯伏思念王者制作史書樂歌幽則物鬽逺則夷貉耳者必聞口者必誦安在愚儒識之况禮不斥尊其可以犯巳而又念江南卑薄與上國人不日接異時故老既沒傳聞将失實史官記注祕莫得見則吾君之行禮彼山之受賜曷從而知之先正盛公亦嘗為御書閣記所以述太宗之事殆可繼也矧兹嚴父配天古之大事漢收秦燼失其根萌冉冉至唐名在實去五代魚肉誠所不暇祖武宗文志亦未集佑啓我王及此希闊如廢斯起如斷斯續合符天鬼匪自群議禮明樂備又申之以翰墨河圖大訓永以華國周公宗祀而文字無傳宣王蒐𡵨陽而石鼓非手書未有華實相副若是之彬彬者也昔漢武帝封泰山太史公留滯周南不得與從事曰命也夫廼者季秋大饗而知其說者有不在焉則謂之何尚從仙宇見是寳書抑天幸也故就敘其語俾刻之云真君殿記峩峩西屏神之山下根無地髙出天百靈有位有几筵樓殿靡迆紘紫烟真君之名世所傳來斯為賢去為仙玉京路險不可攀凡肉欲飛無羽翰崇堂設像鼎以新再拜怳若登天門借問經始其何人吾邑陳侯字仲温後十五嵗維甲申李覯泰伯為之文直講李先生文集卷之二十三終直講李先生文集卷之二十四太平興國禪院什方住持記佛敎初由梵僧至中國不知其道而務駕其說師徒相承積數百年日言天宮地獄善惡報應使人作塔廟禮佛飰僧而巳厥後菩提逹磨以化縁在此土始傳佛之道以来其道無怪譎無刓飾不離㝷常自有正覺思而未嘗思故心不滯於事動而未嘗動故形不礙於物物有萬類何物而非已性有萬品何性而非佛佛非度我而我自度經非明我而我自明無緇素才拙一言開釋皆得成道繇兹立大精舍聚徒說法以衣鉢相傳授居無彼我來者受之嗣無親踈能者當之諸祖既沒其大弟子各以所聞分化海内自源而瀆一本千支群居之儀率從其素故崇山廣野通都大城院稱禪者往往而是庸俾邪妄無識洗心從學王臣好事稽首承敎盖與夫老氏之無為荘周之自然義雖或近我其盛㢤然末俗多敝護其法者有非其人或以往時叢林私於院之子弟閑門治産誦經求利堂虚不登食以自飽則一方之民失所信嚮矣通人髙士疾之兹乆而未克以澄清逮宋有天下兵革既巳息禮樂刑政治世之器既巳完俻推愛民之心以佛法之有益也廣祠度衆不懈益勤聖上莅阼體聞釋部之缺因詔凡禪居為子弟前旅有者與終其身後當擇人以主之意将補鏬漏鉏榛蕪使宗門愈髙大則建昌軍太平興國禪院復什方住持者奉此制也院按舊記唐天祐丙子制置使陳暉所創號顯源永興始有可幽師杖錫來居推輪法事逮李氏僣江表其别子景逹以齊王守臨川乃命徳琳師以張大其業琳師道行峭㓗知觧雄俊圜廻千里瞻仰弗暇樹稼數十頃立屋累百楹至太宗時例以年號更賜今額衆安法行刹此邦者莫與為等琳既化去道䘮不傳而其徒以僥倖居之垂四紀矣凡鄊之學釋者雖知有真乗法印當迷而疑何所扣决今年夏主者元皓病物故時侍禁馮君徳宣光禄寺丞李君虞卿同權軍政深惟天聖詔書求可以長是院為人師者粤有桑門上首耆老識逹之士相與謀曰嘗聞建安崇儼師得法於石霜楚圎和尚廵禮所至學者圍繞師避而䖏行今在邇抑可以致之乎因列名以舉郡然其言乃就迎扵撫州景徳院讓不可得而後至升堂之日㑹者萬計師據牀安坐有問斯荅如鐘之鳴如谷之響重昏宿蒙氷觧雪釋歡喜讃歎洶動街陌論者謂國朝嚴佛事俾釋知識表于禪林太平郡之福地也而儼師以正真道臨之燈燈繼照曷有窮巳然非吾儒文之不足以謹事始而信後裔僉来謁予曰文子職也其可以辭重違父兄意故為之一說時則景祐三年秋九月也太平院浴室記釋氏東行乗風御霆山聞海驚言善言惡知死知生天人之好地獄之暴有作斯報刑淫癸辛力過羿奡維彼慈悲如童蒙師如膏肓醫還愚以智解囚於縲伊貴伊富或士或女承流蹈舞涵淹肌髄繫絡心膂何土敢皮何木敢枝以輦以歸繩者目亂斧者手胝彌國亘野川邪谷哆筆不可畫雲霓出中日月走下冬温夏凉為隂為光食甘寢香百事有備一物必良惟天之啓惟神之契人不得議孰為禮經肯顧文吏江之南城風和氣靈鐘鳴梵聲爰有禪居號稱太平太平之聚儼師是主以訓以撫疑者得明饑者得哺堂房以新器備以陳霞朝卉春唯是温室缺然将榛大冶陳宰儒兼佛觧法與心㑹斥其餘財成此勝㮣材羙石堅重雕複鐫圭方璧圎下不居濕旁無見賢遍天吾願釋子母意于水将意于理爾身以澡爾心以洗洗心謂何匪塵匪沙匪刮匪摩去尓羡欲任爾平和無可不可所遇皆我萬物一馬何者為因孰謂之果道不離人吾身佛身吾偽亦真門前舟梁自失要津慶暦之嵗是維戊子月云窮紀野夫言焉以振厥始建昌軍景徳寺重修大殿并造彌陀閣記儒失其守教化墜扵地凡所以脩身正心養生送死舉無其柄天下之人若飢渇之扵飲食苟得而巳當是時也釋之徒以其道鼓行之焉往而不利無思無為之義晦而心法勝積善積惡之誡泯而因縁作空假中則道器之云戒定慧則明誠之别至於虞祔練祥春秋祭𣏌之儀不競則七日三年地獄刼化之辯亦随而進蕃衍光大繄此之由故嗣迦葉者師子逹摩流為東山牛頭傳龍樹者惠文惠思熾于夫台灌頂二家之學並用于世若夫律戒之盛凡出家者當由此塗按白居易撫州景雲寺律和尚碑文如來十弟子中優波離善持律波離滅南嶽大師得之南嶽㓕景雲大師得之師南城人初隷景雲寺徙洪州龍興終廬山東林度娑婆男女萬五千人姜相國公輔顔太師真卿本道㢘使楊憑韋丹皆與友善樂天之敘如此南城於宋為建昌軍景雲為景徳寺律和尚之迹巳無見土木之堅乆者唯殿與門殿之制不靡而其材良乃今所無基髙而旁臝入風雨者四靣如一將恐腐折後難為功寺僧義明乃營屋若干柱以翼之且作彌陀閣于其前右兼壮與麗為永永計先共謀者文憲宗正既而憲住他院正亦遂輟克有終者唯明殿之財集于衆閣成扵孀何氏始卒凡八年明講經論頗憙事以雅扵予来乞文因論釋之所由興亦使其徒知此寺昔嘗有僧為律戒師扵江之南度人以萬數當世賢者與之㳺以為寺之榮而有所慕焉慶暦七年冬十月已末記景徳寺新院記院墟扵火力弗䏻復者數年矣壽安縣君黄氏以其夫故都官陳員外所服若器斥賣以濟之其所謂殿堂及諸棟宇之切扵用者罔不備具此誠念死者之不可見庶有益扵㝠㝠間也凡大精舎之焚相望扵天下浮屠人難去声言其灾乃以為宮室之􅍇天神所欲得故取以去且佛之說諸天之樂非人間所可髣髴是以其徒布因求果願生彼界今乃恱人之土木而奪之則是人間之羙物諸天亦無有尚何足慕邪而悠悠者或信之餘燼未寒新宫巳圖往往是矣兹院僧固不辯不䏻飾其說以驚俗殆廢不起非陳氏之喜事而壽安發之何以及此嘉祐三年九月庚午記迴向院記皇祐二年夏六月旴江大水龍安其東南鄉盖菑之所自始視其山破壊如擊甕盎泄所畜百源一道且怒且鬪斬大樹瀦大屋當之者父母妻子廻面相失不得其屍以歛扵是有去平而就髙以避其復來者迴向院其一也院之墟曰兵湖民寰而居甚卑以喧當水之來則數十百家悉聚殿閣坐甍騎桷将顛者數僧徒嗷嗷乞命魚鼈旣免院主海元即其儕為乆安計有徳文者願易之髙燥地謂其别墅曰昇平相距五六里盍經營之文守律戒知㳺藝士君子多與之語故列于官府而從諗扵里人而恱貧者輸其力而地以除富者效其貲而屋以徹歛故材就新基曽未踰年厥功備具足之泥塗今爲崇髙耳之喧囂今爲寂寥後山如懐前谿如蟠晨鐘夜梵夣寐天半松霜竹月繡畫秋色自危而安去苦得樂昔人未知勝事在我噫民之欲善盖天性然顧無以道之尔夫水潦之後田里傷創斗粟百錢上農蓄家且無餘食而文師以其情言非能取佛說以自照耀使人惑之而衆莫不竭盡以受事若夫豐富之世而豪僧辯口先焉雖圖天宮何足怪也為人上者常病扵敎化謂不可為亦過矣昔吾逰其地今聞有成喜之是以記時則三年秋某月也承天院記慶暦中歸自京師有僧來訪曰自堯是為承天上首乃言其院吾先君子嘗至焉今兹又新作往往有留題者因責吾為詩厥後多故不果應近者復來且介秦氏甥以院記為言覯伏念先人舊遊不勝燕雀啁噍之情其僧又憙事吾甥又貧而為之請義不可拒問其所由來則舊崇徳院為尼媪宅間籍没當太平興國中有徳琳師迹其事為盖古所謂豪僧者自閩來旴住太平院徹草廬成大禪居是時禁令䟽釋氏方騁與民交利琳致資甚髙得請公上以崇徳故名遷于雲山淳化三年斬山木營繕使其徒元立主之大中祥符元年先帝封禪例賜今額立死尭繼之扵時景祐三年瞻相闔門鞠為老屋木之腐者将折石之裂者将堕不有改作誰嗣前人願與有力者圖之誠意一發和者日至曰殿曰堂曰僧堂曰水陸堂曰羅漢閣曰厨曰庫曰廊曰門始終數年繪素畢備扵事勤矣而耻無聞故徼吾言以永之噫浮屠人坐新宫享備器者皆是然而知子墨翰林之為貴者幾何人邪或蹙扵威力而後貨俗子取陳言以辱金石者豈少邪堯師䏻不憚煩以来乞詩不獲又属以記傍吾親戚間求人為言唯謝絶之憂其指何邪安知百千萬年後吾文将不行邪彼蚩蚩者将有聞而堯師泯㓕耶皇祐三年冬十有一月乙丑記承天院羅漢閣記吾為承天院記巳二年丘文遂来言院之羅漢閣身所為也願復得一辭刻之始吾童子時與令佐著作陳㣲之讀書湖上丘君乃其鄰以乆㳺貫人事日與笑語無忤及此見之髪色則異而顔面益壮使之年實七十矣少爲賈人上下百越走兩川而歸克有貨財治土田築室敎子孫終之淑慎以從士大夫㳺又䏻精信扵釋損其􅑿以補之果若釋之云則雖老而死死且復生其得意何有窮耶噫漢代初傳佛道西域人得立寺都邑以奉其神漢人皆不出家魏亦循漢制石季龍僣位以其出自邉戎應從本俗百姓有樂事佛者特聴之當是時謂之何㢤外國之神而巳及東晉宋氏其法乃大盖慧逺居廬山名雖爲釋實挾儒術故宗少文就之考㝷文義周續之通五經五緯而事之雷次宗亦從而明三禮毛詩儒者嘗為弟子其人得不尊乎諸部佛經華藻爛爛豈西域之文宜有所助焉者也今之釋樂乞言於文士者亦将借助矣乎文士不必有古人之才足以埤釋就令有之而民耳目日異矣庸可行㦲丘君以舊故勉而為之言時則皇祐五年秋七月也新成院記出旴江門陸行數十里無善邸舍足容食息求之僧家唯章山其庳則新城院焉前此予歸自信時秋大熱夜發金谿日昃不到從者請息肩得兹院以宿下馬據牀汲井泉飲且盥清風在竹不待呼召紅塵在路不敢随入坐未安定意巳順適仰而視其梁則毛姓繢名者作焉有頃而繢至其禮甚卑立于堂下若吏民見官長之為予既辭因揖而進之與之語盖古力田敦樸之流及院之本末則對曰殿興扵開寳中則繢之王父母嘗有勞焉堂鐘樓廊門成扵景祐康定間則繢與婦徐實同力焉予嘆曰民財有餘不以備鬪訟買直于圄犴而能奉佛法徼福于窈㝠斯世俗以為難矣况扵卑已尊賢此道甚大誰宜知之凡人衣食足者或聞馬蹄聲在百歩外閉門唯恐不及今吾亦布衣姑弛檐扵此且無一介與尔相聞尔何取扵我而拳拳若是乎吾無乃克謹名節未始得罪扵鄊黨乎抑爾之聞見有異扵衆人乎既嘆而去五六年矣而不忘于心近者予有䘮繢又使其子來賻辭益遜意益勤顧無以荅遂録嚮所言者贈之使刻石為新成院記云時則皇祐三年冬十有二月也元祐辛未轉運副使張商英天覺過新成院題詩云昔讀旴川集嘗聞泰伯賢新成文刻在往事野僧傳氣格終驚俗光芒合貫天田翁不知價只得十千錢宣和庚子朱褒世徳自國門待次還郷道過新成院讀泰伯先生記張丞相詩欣歎乆之恐丞相未知泰伯之志也作絶句題于後云泰伯文章自昔傳虹霓白日貫靑天先生欲作酕醄醉㪷酒何妨受十千撫州菜園院記浮屠師曰可栖居建昌之交陽山善持其佛之法而言行不安且長扵醫故士大夫禮之慶暦三年秋八月來祗予曰栖臨川人母固無恙而異父弟亦學佛今住菜園院曰智賔者是也兹院之廢數十年矣寳元中其鄕人請扵邑大夫願得智賔居之賔之來則四顧梗莾無一瓦尺木之業栖告之曰吾常患吾佛之徒将逰吾州而未能進必休于近郊之逆旅乞錢炊食雜于博徒倡女間甚汙吾法今兹院與城相望果能興之以舍吾徒豈不滿志矧吾弟主之而吾母居其旁足以躬晨夕之飬外張吾教内便吾家是不資他人吾力可為由此盡散槖中凡醫之所得者給之說法者曰堂事佛者曰殿舘僧有位具饌有所大抵墻屋器用皆栖之為也工将畢矣幸為栖志之予曰浮屠人盡心扵塔廟固其職耳能不以禍福誘脅殫吾民之力者盖未之見今栖以醫售其得財乃自奉其法而不掠扵人且厚其弟以安乎母不離吾孝友之道言乎其黨抑可尚已故書以授之使掲諸石云修梓山寺殿記天下名山水域爲佛墜者什有八九其次一泉一石含清吐寒粗逺塵俗䖏靡不爲桑門所蹈藉盖佛之威靈赫赫扵世僧之辯慧有以得之故國不愛其土民不愛其財以割以裂奉事之弗暇建昌軍江表之上㳺也地靈源長筆不可譜由治城東走十餘里峯者如引岡者如頓渟者影毛髪噴者化雲霧其間據形勝起塔廟者往往而有梓山院乃其一焉道阻而僻㳺從之士罕至目不睹紛華耳不聞勢利惟松君竹侯鼓舞風韻猿悲鳥哀將送嵗月宅扵是者苟有以存諸心其安穏何如㢤然殿宇之作其來積乆築者以圯盖者以坼荘嚴不充瞻禮無地軍教練使吴臻家故饒財心且喜事由景祐中始謀營建凡立屋四楹塑像九軀所以奉經敎福祖考也噫佛以大智慧獨見情性之本将敺群迷納之正覺其道深至固非悠悠者可了若夫有為之法曰因與果謂可變苦而樂自人而天誠孝子慈孫所不能免也則斯殿之成與吴氏之用心亦可嘉巳見属為記其何以辭時則歳在辛巳康定二年秋九月也邵氏神祠記李覯曰天子之祀曰泰厲諸侯曰公厲大夫曰族厲謂古之有天下國家而㓕絶無後其鬼無歸故與人為厲耳江南地熱濕四時多癘疾其病者謝去醫藥閉門不與親戚通而歸死扵神神之號名則曰某王某王無乃所謂古之有天下國家而㓕絶無後者耶當其氣盛而病革禳祈不可觧則皆謂神曰五通者能有力扵其間故牲毛酒滓狼戾扵五通之室矣建昌治城北有民邵氏世奉五通禱祠之人日累什百景祐元年冬里中大疫而吾家與焉乃使人請命于五通神不能言决之以竹杯校時老母病不識人妻子暨予相継困甚唯五通諗以無害疾之觧去皆約日時雖寳龜泰筮弗是過已噫五通之爲神不名扵舊文不次扵典祀正人君子未之嘗言而有功扵予其可以廢巖巖者石可伐可磨惟徳之報焉知其他直講李先生文集卷之二十四終直講李先生文集卷之二十五序皇祐續藁序覯慶暦癸未秋録所著文曰退居類藁十二卷後三年復出百餘首不知阿誰盗去刻印既甚差􅍝且題外集尤不韙心常惡之而未能正于今又六年所得復百餘首暇日取之合二百三十八首以續所謂類藁者噫行年四十四疾疹日發作其扵文字間尚克有進也歟續藁凡八卷時又有周禮致太平論十卷孤行焉皇祐四年八月庚子序延平集序世俗見孔子不用而作經乃言聖賢得志則在行事不在書也噫孔子誠不用矣尭舜禹湯時聖賢有不得志者乎奚其為典謨訓誥㢤成王周公時有不得志者乎奚其為雅頌㢤心之志志之言言之文若凍餒然孰謂得志而不衣食㢤用之大其言者愈大虞書之歴象日月星辰夏后之賦貢九州周人之職三百六十官不巳大乎今之君子固多靳儒至於布衣閭巷尚曰賢者行而巳不必文也彼顔閔氏時夫子在盖無可復言非為有徳行不著書也㳺夏之徒不在徳行科亦不措一辭子思孟軻豈無徳行乎是皆不才子無功扵文而雷同此說以自慰耳建安宋貫之仕逾二十年用雖不大志亦未得然有君親之奉有政事之勤在他人投筆乆矣而貫之拳拳不翅褐博其學要諸仲尼餘鮮取焉多聞而敏所嚮靡不克故集而行之者四五去年秋以南劍監郡假守昭武既期又成十卷目以示覯曰延平集覯嘆今人之異乎古羙貫之之異乎今孰告吾君而大用之其言又有大扵此者因序以冠其首時則慶暦七年冬十有二月也送余疇若南豐掌學序工必以般者為其材巨木作寝廟也彼環堵則何工不可御必以良者為其策天驥逐光景也彼一駑則何御不可師必以孔子之徒者為其敺善性入訓典也彼曲藝則何師不可今天下號多士而南豐大邑也讀儒書者盖百數薦扵鄕第扵廷往往有之大理丞周君出宰之一年乃立學扵先聖之廟命吾友余尭輔掌其教夫周丞之明豈曰邑之人未甞學且師邪若是則服大袂之衣與令長抗賔主禮者何自出也是其有學有師乆矣然猶汲汲扵斯者其将以先王之道浴而薰之耳其将使其聞仁義忠信之說知夫古之所謂儒者如彼其大也然後進可以治乎國退可以齊乎家出乎已而加乎人罔不曰宜者是周丞上為天子育人材下為一邑减爭闘之獄也不然何地不可居何人不可法何必縣學之興而尭輔敎之耶尭輔好古博學慷慨有行義斯足以應周丞之指惟學者何如耳至之日以吾言告之謂之是耶請在下風以賀謂之非耶敢因是而弔焉故為序送嚴介序景祐中建陽嚴君以經術有名客授于兹邑予時多故未始與㳺而見之者數矣一别不相間今兹復来乃知其乆扵江淮間自楚徂宿所至爲人師以親老故歸養焉善㦲昔申生不行而死君子不以爲孝章子得罪扵父出妻屏子而孟軻禮貌之必不得巳以情恕可也嚴君在外二十餘年盖亦不得巳者矣舜號泣于旻天負罪引慝見瞽瞍瞽亦信順之唯聖人能以至誠感動其親嚴君嚮時既不能感動然而人情老且病則憶念子孫雖有忿怒宜自消釋嚴君之歸養此其時也若是則經術之名固不謬其爲人師益無愧矣至和元年秋八月丁未旴江李覯序叙陳公爕字陳公爕初字思道以避耆舊諱請改焉予命之曰中道夫道者通也無不通也孰䏻通之中之謂也居東焉則逺扵西南焉則逺扵北立乎中則四方均焉故易曰黄中通理凡卦以得中為貴兹聖人之意也有問身之安者必對以導飬也有問食之羙者必對以牲牢也言不可不先其大者也病偃扵牀而不肯納藥石曰人教我以導飬矣可乎餓踣扵地而不肯受糗糒曰人教我以牲牢矣可乎緩急之勢異也古之言王道者是亦先其大者也後之執王道者是以䡖藥石賤糗糒病餓且不救者也王莾亦嘗井田矣房琯亦嘗車戰矣豈不取笑孔子謂㣲管仲吾其被髪左衽而曰無道桓文之事者過也荀卿之非孟子畧法先王而不知其統太史公論儒者愽而寡要勞而無功亦有以也吾觀夫子之行如天焉其變化非凡可測於鄕黨恂恂居是邦不非其大夫對問陣以爼豆至為司宼㑹夾谷時則不同也謂賜也億則屢中由也不得其死至存父母之國則使子貢惡言不入扵耳則取子路使二子生乎今之世則暴人也詐人也掌教化者将不齒焉其何髙第之有㢤夫子多能鄙事以博奕爲賢乎巳辭人之作或因扵物或發乎情雖不有用幸愈乎博奕也而俗儒必非之五子之歌韻矣繫辭首章對矣使今世爲之将以聲律坐矣禮有本末用有先後本末副焉固醇矣有其本以慢其末古人或不免焉畧其本而詳其末今人豈少㢤雖然自治可也父兄之扵子弟師之扵徒亦可也欲以區區之有而齊天下之人汰㢤見人一動作一笑語衣冠裳履之間則斷夫賢不肖張目大言以不恤彊禦爲烈此今人之敝也道之不行盖儒者自取之秦燔書漢鈎黨使典章淪䧟人士闉厄到今恨之豈惟在上者之過有由然也夫知道者無古無今無王無覇無治無亂惟用與不用耳公爕自閩来學志厲而材羙庶乎其有成閩之後生多好學者或傳其文有可愛恱而未獲與之語因公爕請字而教焉且使之歸以告敘張延之字張君延之觧官鉛山遇我于葛陂神清氣和其言語可聴雖一面知其非俗子以立字未善責于我我應之曰所謂延者扵兒豈不欲延其年以及耄期邪扵家豈不欲延其寵禄世世無有窮邪如是無他力扵仁而巳矣孔子有仁壽積善餘慶之說夫仁天下之羙道殺身尚爲之矧夫嚮勸甚明歷觀前志多有效驗可不務㢤故字之曰伯仁酒困不能執筆姑告其畧叙陳司理字豫章陳君名世南南方之卦離離者明也字之曰公明明之義廣矣㢤其在天也爲日爲月爲星爲晝爲暘在水爲止在火爲燎在金爲鑑其在人也爲視爲思爲智爲文爲見善爲知過爲應變爲待時事親明則孝事君明則忠治事明則姦無所容聽言明則䜛無所入臨財明則貧不失㢘臨難明則死不失義凡天下之事未有不湏明以濟者也然而聖人約之以道曰蒙以飬正明夷以莅衆貴乎明於内而晦扵外也陳君公相子孫克守家法儒雅幹正乆次無悶斯有得扵明者矣故敘以告至和二年冬十二月戊子旴江李覯序直講李先生文集卷之二十五終直講李先生文集卷之二十六表謝授官表臣覯言今月十九日建昌軍進奏院逓到敕牒一道官告一道伏蒙聖恩特授臣将仕郎試大學助教者畎畒之中耕鑿殆忘扵帝力蓬茨之下絲綸遽捧扵王言身未識扵九重名巳叅扵一命閨門交慶鄕里知榮臣覯中謝伏念臣生長荒陬世家寒士徒際恢儒之運􅍝懐榮古之心四十無聞早畏仲尼之戒三千奏牘終慚曼倩之才嘗策足扵上都願刳肝扵詔舉過蒙嘉惠首命試言繄遼豕之自矜柰齊竽之有辨馮衍之孺人稚子皆笑歸田周顒之芰製荷衣遂成習隱自兹潜伏何可覬覦豈期天幸之来偶被藩臣之薦深虞累氣難用升聞快炙羙芹敢望獻尊之賞油雲霈雨俄瞻旱稿之苗雖釋褐之有光然事親而甚便不離鄊井巳脫民編斯盖伏遇尊號皇帝陛下道貫幾深仁兼煦嫗時文再郁将令三代同風多士巳寧猶恐一夫不獲故兹狂簡亦預采收敢不䖍奉訓辭益敦學行庭闈是戀幸申爲子之誠犬馬未衰庶有報君之日啓謝范資政啓右覯昨奉制命授前件官草茅之愚乆不謀扵仕進雨露之澤俄下及扵賤㣲俯伏承命銘感在心竊念覯門地孤寒智識遲鈍學問近三紀奔走徧四方昔者充賦報聞而罷數年退居閉關却掃老母日見皓首稚子未能應門苟非躬親難得衣食况思戴記啜菽盡歡之訓且畏魯經逺逰有方之誡出疆載質自知不諧脩身俟死亦何敢怨伏遇某官以周召左右之賢當申甫蕃宣之任棄席疲馬不忘舊物菅蒯顦顇必欲兼用特形慰薦備聞朝廷致此妄庸亦蒙齒録夫冗散一官品秩至下在他人視之則䡖然衰族得之巳幸稍殊編戸便可安居敢不秪承惠貺益進學藝大鈞播物非乆具瞻蟠木為器更當有望仰企牆仞下情無任感知荷恩激切之至寄周禮致太平論上諸公啓右覯啓伏以王者之法人必有業梓匠輪輿則當通功易事瘖聾跛躃亦以其器食之故終日無所用心孔子以為誡􅢟斯賊夫糧食楊雄之所惡覯也蚤以薄祐不能及時上乏騏驥千里之力下無鈆刀一割之效退蔵山野日就衰老雖然用農夫之榖分工女之帛既得以不死而無益扵人平生技能唯在筆硯矧可不勉竭其狂愚伏惟明公嘗以文知今也敢以文請十數年來篋帙所存瑣瑣著述不復有獻謹録周禮致太平論十卷塵于下風世之儒者以異扵注䟽為學以竒其詞句為文而覯此書於注䟽則不異何足謂之學於詞句則不竒何足謂之文惟大君子有心于天下國家者少停左右觀其意義所帰則文學也者筌蹄而巳日月光明固不待燈燭之助至於豐屋之下幽室之中照臨所不到處雖銖油寸蠟豈無頃刻之功邪聖人在阼賢人在庭而小子言焉庶有補於萬一也臨啓慚惶何所逃責直講李先生文集卷之二十六終直講李先生文集卷之二十七書上富舎人書舍人執事士之不見禮扵世乆矣古之君子以天下為務故思與天下之明共視與天下之聰共聴與天下之智共謀孳孳焉唯恐失一士以病吾元元也如是安得不急扵見賢㢤後之君子以一身為務故思以一身之貴窮天下之爵以一身之富盡天下之禄以一身之能擅天下之功名望望焉唯恐人之先己也如是誰暇扵求賢㢤嗟乎天下至公也一身至私也循公而㓕私是五尺竪子咸知之也然而鮮能者道不勝乎欲也今夫卜相下藝先民之所不齒者也而所居之室重冠累盖名卿大人引領而願見若饑之食焉以其能言己之禍福故也士之能言天下國家之禍福而未嘗有人欲見焉門未入而閽人拒之者有矣謁既上而辭以事者有矣或貌若恭而情不在焉或言雖交而意不通焉遇之以常人問之以常事一靣而去有如道路吁可怪也彼卜相之言禍福受之天而不可變者也雖其知之無益扵事士之言禍福在乎人而足以有為者也幸而聞之則禍可轉而爲福危可復安亂可復治兹有益之大也貴無益而賤有益爲一身而忘天下果其人之忠且賢邪有志之士果宜瑣瑣扵其間邪覯逺方之人弛擔都下再期月矣惟其山林之状而魚鳥之心懼取辱扵形勢之塗非舊相識曽未敢踵其門将求夫有古君子之道者而爲之依㱕尚未能也今者友人董士㢘自陳之秦相遇扵道既稱執事之徳髙出扵世且言誤聴嘗得區區之姓名有與進之意伏而思之以執事之負雄材得羙仕是扵其心靡有所不足矣而以草茅之㣲寘在齒牙豈非有古君子之道以天下爲務而急扵見賢者乎覯雖非賢焉敢自匿故兹浣濯衣冠請問左右竊念覯資朴不羙其生三十餘年所務唯學所好唯經扵當時之文誠未有以過人者至若周公之作孔子之述先儒之所未逹歴代之所不行者嘗用功焉其志将以昭聖人之法拯王道之綱製爲圗書以備施用明王有作舉而措之四海之内庶乎斯民之復有知也不幸寒餓之鋒刼而去之有懐未果中夜長歎今兹箱篋草具畧有存者旅窮無資弗及繕録執事若扵暇日賜之從容當挈其一二陳諸座隅必有可觀者矣吁古之所謂知己者信其道也非徒利其身也不然何山之深而不可廬何水之廣而不可魚著書傳道求聞扵後世不猶愈扵碌碌食衆人之食乎不宣覯慚汗再拜上劉舍人書舎人執事伏以今之學者露其才業日干於兩制之門者誠以輕重斯文進退多士遇其知則朽株為春華咈其意則夷路為太行故書不憚手之胝言不恤脣之腐拳拳俯伏于下風唯恐不得請也覯誠愚闇竊謂不然且吾君以兩制為賢使主天下之士士之得失天下之本繫焉得一士為天下利繄兩制之功失一士為天下害繄兩制之罪不得罪于君将得罪于民不見非于今将見非于後賢人君子有位有名其肯舍功而趍罪以自貽媿耻㢤如是果才邪雖未嘗識靣其必不棄矣果不才邪雖日拜乎前其必不取矣則有志之士何足屑屑扵其門㢤故自弛檐京師于今累月足迹罕及名卿之堂者為是故也然今日所以請見扵明公者盖亦有說伏念覯生江南去明公之居不數百里自成童巳知讀明公之文辭矣繼聞决髙第效羙官立朝廷正色直言磊磊有烈丈夫之氣小人不佞抑好義者也聞古人之風恨不得見况今人之得見而可不請見乎惄如扵心為日乆矣昨值明公銜命北方往来數月及節旄之至則抱病邸舍倦扵趍走幸今有間輙塵點賔次生平所著貧無𥿄筆弗及自陳明公試引之座隅徐觀其用心可也伏慮左右不察以覯為趍利而來者敢奉書以為先不宣覯恐懼再拜上吴舍人書舍人執事覯家江南結髪學問讀古人之書竊慕其所為而不可得見将求今人之似古者而宗之蚤瞻莫望唯恐弗獲天聖中聞執事以進士舉為太常第一詞章卓異風動逺迩腐儒老生骨醉心死時則見執事之才其後數年天子脩先帝故事親策賢良而執事褎然為舉首推考經術以戴翼世務疑亡闕補言到聖處時則見執事之識居山寥寥去上國三千里望風長懐無路請謁有如衰根病芽棄置幽谷雖知有陽春之和皎日之光不得與㝷常草木並受其賜歉然扵中積有年矣今兹竊幸詔舉茂才州郡不明以妄庸人充賦弛檐以来博聞髙誼心馳門闑若渇扵飲故擇令日塵點賔次重念覯性質無似不䏻與時世争利捐造化之術而甘扵寂寞之道行思坐誦垂二十年其志幸一試用就尺寸之效以章其身千載之後不與碌碌者同泯沒爲凡鬼扵地下聖人當天俊乂雲合有志如此豈敢自必執事當世儒首言重蓍蔡可稱邪爲天下稱之可進耶爲天下進之不敢求哀以犯公義所業策論五十首謹獻諸左右潤色之暇稍賜觀覽千萬幸甚不宣覯再拜上王内翰書内翰學士明公覯江湖凡人生得至愚之性天以六經群言煨燼之餘以成其愚而不與白雲淸泉衣食之奉以養之家貧事親漁釣樵斧不足以具甘㫖朅來人間學習世務續鳬之脛乆而無成今兹聞國家求賢良文學之士蒙不知今竊况扵古謂版築飯牛之㣲或不為時君所棄因出草廬從州郡之舉乞錢為食陸走三千里西嚮轂下京塵㝠㝠勢利相軋既貧且病財不能以俻簡墨力不䏻以事趍走弊衣徒行僮僕楚語誠難以候閽人之顔色以附名卿之熖也非夫烈丈夫抱義慷慨不好苛禮者安能為覯之地㢤伏惟明公盛徳大名震曜四海仕者學者以為依歸矧曩昔之幸嘗一拜扵門下今日之來不敢伏匿自絶髙義輒請見扵賔客之後明公亦留意乎所業策論五十道姑飾其藁以籍手應用之文未免蕪累觀其大畧可也生平著明堂定制圖一道并序平土書并圖三道皆繩先儒之誤以章聖人大法施諸儒林粗可稱述舊本漫㓕未敢自陳暇日一垂問焉當指畫扵座隅也質野之人言無遜避惟䡖其罪而巳不宣覯再拜與章秘校書秘校章君足下昨暮枉駕告以東南行徒歩不能送别豈任依依覯初未相識毎與丘思語頗得足下之為人及問歐陽校理益信之他日足下顧我扵邸舍氣和而言正其辨說駸駸到義理憤世疾惡有大丈夫之芒角此固不待觀文辭而後知其業也噫昔三代之人自非大頑頓盡可以為君子何者仁義禮樂之教浸淫扵下自鄕徂國則皆有學師必賢友必善所以養耳目鼻口百體之具莫非至正也足下生今世教化風俗既無可道况在公相貴富之家非愚且䛕孰肯辱扵門下是所與居者又可料矣而能自立如此非天資超然異扵衆人乎夫将有為之士常憙其類盖類同則志合志合則力并力并則事可行功可成禽邪人獵邪道或掎或角庶乎有俻也覯不肖承足下之風歡慰無極詩曰是薦是蓘必有豊年抑強勉而巳矣吴越羙山水出囂塵臭處而居之者飄飄若僊去然其人物愈衰少安定胡先生瑗往來扵其地思古人而不得見姑從之㳺可也逺道慎飲食以適親意幸甚幸甚六月五日旴江李覯白上江職方書知郡職方執事覯伏以新進俗儒樂㳺貴常之門者莫不有求也或崇飾𥿄筆以希稱譽或邀結勢援以干薦舉或丐禄粟之餘以免困餓或借成柄之末以欺愚弱奴言婢笑情状百出上之人以其求之私也作為關鍵唯恐拒之之弗絶耳其間雖為有道義而來者亦多以是疑之疑之不釋則所以待之之禮與衆無異故好古㓗㢘之士拂衣逺遁羞與薦紳相聞者可勝道㢤覯小人世宅田野上天哀憐以古人之性授之讀書属文務到聖䖏其言周公之作孔子之𫐠盖多得其根本漢以来諸儒曲見蕪說頗或擊去以此著書數萬言矣不幸少年繆計屢乞鄊舉求而不得祗自穢汙今兹行年三十餘固知非矣方将削迹塵路屏居林藪張皇本心洗滌外慮未明者明之未備者備之使三代之道珠連玉積盡在掌上所大願也若夫毁譽用舍計之巳熟譽邪惟天下自譽之覯不求譽也用邪惟天下自用之覯不求用也懐姦攫利所弗忍聞頭斷胷裂直氣不死故常望形勢之塗而不欲一舉趾以趍進扵其中誠恐以常人疑之以常人待之則㳺河蹈海不足洒耻近者訪舊吴越彷徉而㱕竊承明公以儒學吏術作鎮于此因念今二千石當古諸侯之位而覯幸得尺寸地在治下為居人苟復耿介自異不能一至門左以謝仁政則失所以事邦君之禮輙敢策羸馬襲弊衣以貽閽人羞伏惟明公聴其言察其意知其非有求而來者則覯也可無悔矣不宣覯再拜上慎殿丞書知郡殿丞執事覯伏以佩有青幨有彤生善殺惡為天之工斯士之甚通策無馬呼無僮衣麻食菽于山之中斯士之甚窮扵戯以勢言之則弗類以道言之則無間故吴公之治河南而賈誼薦陳蕃之守豫章而徐穉禮風流未逺學者稱之今兹請謁敢以藉口竊念覯郡之衣冠家也數十年来禄禀中絶天恤私門不惜中和一㸃氣造為蕞爾之㣲躬生年未幾不憙他習惟文惟學如哺如乳媚于耳目貫于心胷蚤夜專一其樂無筭勝冠以還盖有成矣其或刮簡含墨騁騖文苑金無鑛堅玉無璞頑㝷英取華所嚮皆得至扵仁義之淵禮樂之源顧嘗吞吐堯舜掲厲商周先代諸儒或有慚徳雖州郡齟齬莫肯聞薦而縉紳先生當名路者多賜賞激謂非凡人以此自信若當大任且貧且賤不怨不悔上事老母旁無昆弟乞錢為食來往江湖零丁孤苦積有年矣今者竊嚮明公以賢人之業仕聖王之時激昻朝著指取郡寄惟兹桑梓輒枉旌斾雖壷漿之迎曽未至止而愛民之譽樂善之称随風北来襲滿人耳此誠有志之士剖堙欝祈顧遇之秋林澤雖廣豈敢伏竄謹與諸生犇問羈靮前之所陳固失謙讓但以渦沈俗間幸遇明哲不䏻自言誰為言者郊次煩猥非敢願見視事之後惟賜接納乃問乃聴驗其所有苟復碌碌與常儒同則靣欺之罪委于吏議可也不宣覯再拜上楊屯田書知郡屯田執事竊以唐有天下垂二十世明皇文治之盛也而燕公佐之宋有天下今數十年真宗文治之盛也而文公佐之二公之才相似其遇時得君樹功立業亦復不異然燕公既沒而均垍從偽隕其家世文公既没而執事之名籍甚當代其故何㢤愚以為至忠大節抑姦與正王家所賴天鬼所信惟文公有焉傳曰君子善善也長惡惡也短善善及子孫惡惡止其身以文公之賢其後世固當得志矣况執事聰明多識剛中能斷為儒有學術歴官有政績盖如孔子之後而生伋文中之後而生勃宜夫士大夫服膺之弗暇也覯草野之人未得仕進頃因薄逰毎聴髙義前年冬龍圗髙平公在㑹稽嘗以尺書來召且言執事監郡留意講學促令見之屬以窮愁多故辦裝不早及其至彼則執事西行且數日矣高平公一見深以小人不得侍坐扵長者為歎覉旅之心悔恨多矣昨者還鄕竊聞車騎布惠兹土且以水陸之逺才數百里敢求寧居以咈所願謹正衣纓来伏賔位恭惟執事之明必有所以待之之道矣生平志業未敢自陳苟賜從容當稍布于左右䡖犯明哲伏深媿畏不宣覯再拜上聶學士書省判記注學士執事伏以哲人既没禮樂失其師而竒袤戦之雅正大潰遺音舊器殘破畧盡典經所志什不存一儒其服者莫肯蹔寄目於其間将何以格天神召和氣隂陽之錯行風俗之不脩職此故也吾王以一統之大再造聖法與民惟新爰募儒林俾言大樂詔下之日有識慰抃然古道廢乆能者誰何執事才兼萬人心照億載聲音之道蚤所詳明因與一二君子專制其事歷時未㡬改作大俻諒巳韻莖英之啞起韶夏之僵后䕫足蹈扵幽墟師曠耳傾扵鬼部朝之鴻碩疇敢措辭覯江南賤夫行年二十八矣唯學古憙事其志𦦨然竊聞朝家興復治世之作第恨其身不獲齒廷臣之末得以升太廟侍圎丘聴八音之發不徒破堙欝洗邪辟抑以觀先聖王所以應天感人其法度何如也所懐未果嗟憤何極雖然姑願一拜先生之容側聆至言以辨大方因以卜已道之臧否幸亦多矣昨始至都下盖曾候問僕人然卒未克吐其區區今兹是用有言扵左右執事其亦少留意乎覯嘗以明堂者古帝王之大事也而去聖乆逺規模莫見周禮考工記大戴禮盛徳篇禮記月令室个之說參差不齊繇漢迄唐老師大儒各執一經相爲矛楯有國者不知所以裁定遂使布政之宫缺而不立雖有作者皆取臨時處置非復先王之法象覯謂周禮大戴禮禮記皆聖人賢人之所作述不宜輒有乖異反復思念則三家所指制度果同但立言質略意義弗顯訓傳之士泥文太過遂成派分故嘗挾而正之决而通之不以文害辭不以辭害意三家之說坦然大同堂室之度靡所回惑的的然如見成王周公享帝視朔朝諸侯扵其上因作明堂定制圗一道并序約五千言非執事博古知變不牽扵世俗之論則不能以别此書然恐計府少暇重以煩暑未逮熟觀之謹先以所著潜書十五篇野記二篇禮論七篇塵穢几上試加一覽可粗見其存心苟不以菲薄而棄之時因休沐曲賜甄問則當奉法官之議鋪陳扵席次然後足以盡其才謂其善則薦之可也譽之可也其未至者則教而成之固儒師之職耳覉旅貧困無𥿄墨傭寫之資止扵具草本而巳伏惟仁賢畧其常禮而鑑其苦心幸甚幸甚不宣覯恐懼再拜上葉學士書省判學士執事覯生江楚間始數歲竊習其家書見眺董公孫之對問决科皆所以發天人之秘而彌縫國家之務漢往而唐聮㡬百祀雖治亂相變而異人時有其稱得士之盛者率由是道及稍長鄕先生教以速化之術則謂當今取人一出於辭賦曰策若論姑以備數因歷觀塲屋得雋者誠皆聲病靡靡之文而巳借有材之髙識之通以禄仕故不敢放其絶足越邪徑而趍大道腐儒愞筆喜幸多矣私心憤疾往往竊垂義士之涕将恐古道萎絶不能復萌芽至年十六時聞禮部奏貢士之可者賜第扵殿廷所得多當世豪俊而執事之五策實流行扵天下募其本而觀之則審刑政之㑹逹權利之變将以富國便人而納之扵禮義良今日之急務而衆賢之所未知者也其辭典而贍其意正而通洋洋乎古人之風復歸於筆下覯雖不肖用是感激竊喜囂譊流宕中亦有賢士大夫毅然執戈刜淫辭而遵理道者重遇主上之明有司之公擢致髙等足以風四表而移士心矣自時而後積十餘年㳺目扵書肆則熟執事之文采侍坐扵先進則飽執事之治聲窈然如望梧桐之宫聴鳯凰之鳴徒知其諧和中律噰噰盈耳而雲霧隔之終不克一見其容状不意今兹旅食都下而執事方在省局門牆伊迩有請見之路是用上問興居以適所願昔人有言曰唯賢知賢小人不敢自稱道顧可以當執事之知乎伏念覯草茅匹夫受性不甚魯唯其心志耿耿不忍自溺扵流俗為學必欲見根本為文必欲先義理晨夜探㔉力盡弗巳而州郡不肯薦鄕黨不見稱年近三十隕穫日甚昨者因謂京師忠賢所萃策試亡私奔走西嚮将覬覦其萬一未及弛檐而貢舉巳罷矣覉栖輦轂兩經晦朔親老食盡又當㱕寧踽踽而来恓恓而返士林不鑑其道有位不知其名背仕進之門而復入扵寒餓之水火此亦烈夫好義所宜惜之也生平為文謹擇其二十四篇寫成一冊及所著明堂定制圖一道并序草具其副塵諸左右莅事之暇時賜觀覽足知覯心之所存焉冒黷威重伏増慙怖不宣覯再拜上李舍人書脩, WYG: ''}
