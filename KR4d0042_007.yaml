body:
  text: 直講李先生文集總目卷第一賦長江賦麻姑山賦疑仙賦并序卷第二禮論七篇并序禮論後語附禮論第一禮論第二禮論第三禮論第四禮論第五禮論第六禮論第七禮論後語卷第三易論十三篇易論第一易論第二易論第三易論第四易論第五易論第六易論第七易論第八易論第九易論第十易論第十一易論第十二易論第十三卷第四刪定易圖序論論一論二論三論四論五論六卷第五周禮致太平論五十一篇并序內治第一內治第二內治第三內治第四內治第五內治第六內治第七卷第六國用第一國用第二國用第三國用第四國用第五卷第七國用第六國用第七國用第八國用第九國用第十卷第八國用第十一國用第十二國用第十三國用第十四國用第十五國用第十六卷第九軍衛第一軍衛第二軍衛第三軍衛第四卷第十刑禁第一刑禁第二刑禁第三刑禁第四刑禁第五刑禁第六卷第十一官人第一官人第二官人第三官人第四卷第十二官人第五官人第六官人第七官人第八卷第十三教道第一教道第二教道第三教道第四教道第五卷第十四教道第六教道第七教道第八教道第九卷第十五明堂定制圖序五宗圖序卷第十六富國策十首富國策第一富國策第二富國策第三富國策第四富國策第五富國策第六富國策第七富國策第八富國策第九富國策第十卷第十七強兵策十首強兵策第一強兵策第二強兵策第三強兵策第四強兵策第五強兵策第六強兵策第七強兵策第八強兵策第九強兵策第十卷第十八安民策十首安民策第一安民策第二安民策第三安民策第四安民策第五安民策第六安民策第七安民策第八安民策第九安民策第十卷第十九平土書二十條卷第二十潛書十五篇并序廣潛書十五篇并序野記二篇并序卷第二十一慶曆民言三十篇并序開諱備亂審姦防蔽效實慮永謹聽辨儒廣意損欲本仁慎令考能止幸裁舉卷第二十二精課懋節崇衛省盜釋禁南略敵患東士儲將逺私正局厚農復教孝原天諭卷第二十三記袁州學記建昌知軍􅈦記建昌軍儀門記建昌軍集賔亭記南城縣署記邵武軍學莊田記虔州柏林溫氏書樓記麻姑山重修三清殿記重修麻姑殿記麻姑山仙都觀記御書閣後記真君殿記卷第二十四太平興國禪院十方住持記太平院浴室記建昌軍景德寺重修大殿并造彌陀閣記景德寺新院記回向院記承天院記承天院羅漢閣記新城院記撫州菜園院記修梓山寺殿記邵氏神祠記卷第二十五序皇祐績稿序延平集送余疇若南豐掌學序送嚴介序敘陳公燮字序張延之字敘張司理字卷第二十六表謝授官表啓謝范資政啓寄周禮太平論上諸公啓卷第二十七書上富舍人書上劉舍人書上吳舍人書上王內翰書與章祕校書上江職方書上慎殿丞書上楊屯田書上聶學士書上葉學士書上李舍人書上宋舍人書上范待制書上孫寺丞書上余監丞書上蘇祠部書寄上范參政書卷第二十八寄上富樞密書寄上富相公書寄上孫安撫書上蔡學士書上王刑部書與胡先生書答宋屯田書答李觀書答黃著作書再答黃著作書答陳特書卷第二十九雜文原文原正讀儒行讀文中子吊楊子復説命針畫贊弋陽縣學銘默堂銘太學議策問三首策問六首卷第三十墓碑傷辭附進士陳君墓銘處士陳君墓銘祭文附廣文陳生墓銘進士傅君墓銘聶夫人墓銘鄒夫人墓銘鉛山縣尉陳君墓銘徐夫人墓銘鄭助教母陳氏墓銘處士陳君墓銘宋故贈都官張公墓碑銘宋故朝散大夫守尚書屯田郎中上輕車都尉賜緋魚袋江公墓碑銘并序宋故中舍宋公及夫人江氏墓碑銘宋故朝奉郎尚書都官員外郎上騎都尉賜緋魚袋陳公墓碣銘并序宋故朝奉郎尚書都官員外郎上騎都尉賜緋魚袋陳公墓志銘卷第三十一陳府君夫人聶氏墓志銘并序進士傳君墓表陳伯英墓表處士饒君墓表醫博士周君墓表前進士廖君墓表李子髙墓表先天人墓志亡室墓志亡女墓銘鄧公儀傷辭白石暹師塔銘并序卷第三十二常語三卷常語上卷第三十三常語中卷第三十四常語下卷第三十五古體三賢詠和蘇著作麻姑十詠魯公碑七星杉煉丹井玳瑁石秦人峯流杯池碧蓮池虎跑泉丹霞洞葛仙壇穫稻哀老婦寄懷三首避暑喜雨送上官直題昱師房三笑圖寄祖祕丞名男曰參魯以詩喻之女色無定美贈卿材江亭醉後寄章友直中春苦雨書懷弋陽縣學北堂見夾竹桃花有感而書孤懷讀韓文公駑驥篇因廣其説送陳次公茂材蝦蟆惜雞日出吟聞女子瘧疾偶書二十四韻寄示讀史和育王山十二題金沙池佛迹峯七佛石袈裟石明月臺石屏風靈鰻井供奉泉育王塔八角殿晉年松重臺蓮美女篇苦熱夜丐僧閔俗感歎二首寄鄰父竹齋題事贈黃秀才别雨中作獨居閔雨訪周道士甘露亭送丘寺丞答緣槩師見示草書千字文并名公所贈詩序春社詞并序聞訓狐聞喜鵲解湯延祖字卷第三十六近體五言二韻詠竹霜氷鵝鴨惜才又一首七言五言四韻山舍寓止東巖精舍間夜霧自詠睡思秋熱鑑湖夜泛池亭小酌回胡舜元賦稿回黃通詩篇送路拯北逰感事間居萍送張鬷嘏村行感懷寄擇之雞堂西夜坐寄題陳適追養亭送宜黃柳尉送君俞送黃祕丞寄題廖説蒙亭晏起養疾逺山送吳伯華次韻陳殿丞除夜感懷早歸晚聞角庭樹哭女二首贈端師寄題鄒氏延夀亭感秋次韻答陳殿丞讀趙氏淳化詩小女送吳著題靈陽宫龜峯精舍鳴蜩送張評事送春君錫以新詩相示因成四十字答之送李侍禁寄周寺丞次韻閻判官除夜送閻判官送彭昱應舉送黃銑應舉夏日郊園寄黃晞送黃介夫送山甫送沈郎中送江茂才贈端上人千福寺昧軒怡山長慶寺傅翼甘圃林屯田思軒回明上人詩卷聽周太師琴送覺師西逰乞御書送分司吳太博還鄊送任大中送杜奉職送陽曲蔡尉送武陵令送酸棗鄧主簿送仙逰知縣許延評送杜寺丞知永城回廖解元所業送張寺丞送何祕丞送劍州張掾送演教太師東逰寄贈福山長老五言六韻書樓夏晚小杉乾元節群臣祝夀小人無位以詩繼之悶書同徐殿丞逰麻姑山陳屯田聞之以詩見寄次韻第一首五言八韻送李著作知柳州五言十韻送知縣蘇祕丞移英州夏日雨中七言二韻鄊思少年自勉戲題玉臺集讀皮襲美病中書事詩有可憐真宰意偏解困吾曹之句偶代答之雪中見梅花二首和慎使君出城見梅花雪中贈柳枝柳枝答和天慶觀瑞香花烏鵲方平璧月睡起讀長恨辭二首羿妻梁帝鞦韆二首嘲漢武戚夫人有感三首自遣睡思逰寺醉歸却寄同坐索酒憶錢塘江謝傳神平常人次韻答提刑孫都官二首謝知縣徐殿丞示及新詩送流人送周山人遣興詠桃閏正月三日偶書二首論文二首送僧逰廬山李郭戲題荷花戲贈月葛陂懷古七夕二首宗人宅折桂堂麻源題壁馬嵬驛齊世家漢宮景陽宮井燕雀二首張禹孔光元紀二首聞鶯學北堂有海棠一株顔色至佳凋落稍速憶而為詩玉蝴蝶花次韻陳殿丞觀魚送傳野送杜萬儒行感義屈原宋玉贈日者鄒生送夏旦赴舉送春曉角送丁正臣惜才又一首五言登越山送古山人送毗師西逰送春寄呈祖袁州二首次韻陳屯田途中所寄正月二十俗號天穿日以煎餅置於屋上謂之輔天感而為詩送薛經僧志月碧雲軒改為景雲因書二首書景雲軒壁因逰華子岡題壁卷第三十七七言四韻苦雨初霽野人書麻姑廟客有話故丁祕監京師舊宅因而傷之五龍塘寄小兒季夏雨中宛有秋色四望之際百感生焉因題於紙秋懷書松陵唱和七夕早起有懷留題歸安尉凝碧堂答張鬷嘏清明日作晚思暮春始逰城西寄傅代言丙子冬至夜酒醒南齋詠風小雨清暉亭題淨居院往山舍道中作秋晚悲懷殘葉哭十姪秋隂寄介夫書懷寄介夫關徐送張宏下第南歸葛陂逢何道士俞秀才山風亭小飲謝宋屯田見示永平録海南編閩中歲暮送侯殿直之官吉州偶題饒秀才溪光亭宗人宅仁知閣早夏偶作胸奴傳忠武侯次韻答陳殿丞見寄贈韓侍禁送沈祕校寄題錢塘毛氏西湖園自解不寐韓偓集有自撫州往南城縣舟行見拂水薔薇之詩南城吾鄊也因題八句代書答陳次公和君錫題壁送王都曹送危太博題虞侍禁山亭君錫宰夀春錢寺丞知白州次韻答史太博蟬寄史屯田答丘寺丞示月蝕詩蓬屋階基宜春臺東湖送趙拊太平州十詠亭送王尉野意亭靈源洞送陳司理送黃承伯謝蔡十八丈示詩卷淸話堂詩送郴縣吳主簿覽余堯輔詩因成七言四韻次韻酬屯田陳文見寄同徐殿丞遊麻姑山陳屯田聞之以詩見寄次韻第二首和陳屯田送知縣徐殿丞次韻和屯田陳丈寄唐休次韻和王刑部逰仙都觀和逰丹霞有懷歸之意七言八韻送知軍曹比部移虔外集卷第一告劄舉狀書詩序附告詞二劄子四薦章三首外集卷第二名公手書范文正公三書小簡孫觀文三書余侍郎三書歐陽內翰一書蔡密學二書馬雜端三書蕭閣副一書小簡祖學士一書李侍郎一書孔宗旦一書外集卷第三序詩墓銘張學送李君南歸序葉內翰詩祖學士詩奉和泰伯送春絶句送春長句呈泰伯先生宜春臺東湖送春黃先生晞詩寄李先生黃寺丞通詩麻姑山一首贈陳仲父賢良兼泰伯先生門人陳次公撰先生墓志銘并序直講李先生文集總目終
