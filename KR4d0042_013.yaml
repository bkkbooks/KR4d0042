body:
  text: 易論十三篇易論第一或曰易之為書也其不可學邪何其㣲而不顯也曰學者之過也聖人作易本以教人而世之鄙儒忽其常道競習異端有曰我明其象則卜筮之書未為泥也有曰我通其意則釋老之學未為荒也晝讀夜思疲心於無用之說其以惑也不亦宜乎包犧畫八卦而重之文王周公孔子繫之辭輔嗣之賢從而為之注炳如秋陽坦如大逵君得之以為君臣得之以為臣萬事之理猶輻之於輪靡不在其中矣爾欲聞之乎曰然則請問為君之道曰夫用貴莫若㳟用富莫若儉㳟則衆㱕焉儉則財阜焉㳟儉者先王之所以保四海也損六五曰或益之十朋之龜弗克違元吉龜可决疑喻明智也以柔居尊而為損道明智之士皆樂為用矣非徒人助天且福之故象曰六五元吉自上祐也㳟之得衆也如此賁六五曰賁于丘園束帛戔戔吝終吉丘園謂質素之地也䖏得尊位為飾之主而毎事質素與丘園相似則費財物束帛乃戔戔衆多也儉之足用也如此非徒儉於身也祭祀鬼神尚可菲薄既濟九五曰東鄰殺牛不如西鄰之禴祭實受其福禴祭之薄者也謂修徳以祭雖薄而受福也夫上之利民以財則不足也百姓安堵而不敗其業利之大者也益九五曰有孚恵心勿問元吉有孚恵我徳謂因民所利而利之恵而不費則不湏疑問必獲大吉而物亦以信恵㱕扵我也夫溥愛無私君之徳也反是則非益之謂也屯九五曰屯其膏小正吉大正㓙膏謂恩恵也䖏屯難之時居尊位之上不能博施群小而繫應在二所恵偏狹扵有司之正則吉扵大人之正則㓙也比九五曰顯比王用三驅失前禽邑人不誡吉謂為比之主而有應在二顯比者也不能無私扵物唯賢是與愛扵来而惡扵去用三驅之道者也伐不加邑動必討叛雖得乎顯比之吉而可以為上之使非為上之道故象曰邑人不誡上使中也夫執剛莫如體柔責人莫如自脩尚力取勝亦巳勞矣同人九五曰同人先號咷而後笑大師克相遇謂不能使物自㱕而用其強直故必大師克之然後得志也困九五曰劓刖困于赤紱乃徐有說利用祭祀赤紱謂異方之物也五以剛猛物所不附忿物不附而行威刑則異方愈不懐矣而體在中直能不遂迷乃徐脩徳則得喜說履夫尊位過而能改以斯祭祀必受福也夫以至尊敵至賤勝之不足為武也夬九五曰莧陸夬夬中行無咎莧陸草之柔脆者謂上六也夬之時以君子决除小人而五䖏尊位躬自决之雖其克勝未足多也䖏中而行足以免咎而巳故象曰中行無咎中未光也夫安非福也危非禍也知危而懼安莫如之否九五曰休否大人吉其亡其亡繫于苞桑䖏君子道消之時已當尊位能施否於小人而自戒其将亡則得苞桑之固也夫救弊之術莫大乎通變然民可與樂成難與慮始非斷而行之不足以有爲矣巽𥘉六曰進退利武人之正謂䖏令之𥘉未能服令故進退也則宜用武威以整齊之乃能成命也革上六曰君子豹變小人革靣謂居變之終變道巳成則小人變靣以順上也夫治國始於齊家王化本乎夫婦百代不易之道也家人九五曰王假有家勿恤吉謂居於尊位而明家道則下莫不化矣父父子子兄兄弟弟夫夫婦婦六親和睦交相愛樂而家道正正家而天下定故勿恤而吉也凡此皆爲君之道也或曰子謂執剛莫如體柔責人莫如自脩而乃以威武成命何也曰同人九五敵剛也困九五來異方也其欲勝敵懐逺不可暴也舜於有苗文王於崇乃其迹也巽之𥘉六行令扵吾人也令善而衆疑不濟以威是終不可爲也周官凡出教令必徇以木鐸曰不用法者國有常刑乃其事也盖所施之異胡可結以一言哉易論第二或曰爲君之道任官其急也請言其要曰井九五曰井冽寒泉食謂五居中得正而體剛直不食汙穢必湏井㓗而寒泉然後乃食以言剛正之主不納非賢必湏行㓗才髙然後乃用也兊九五曰孚于剥有厲謂䖏尊正之位不說信乎君子而說信乎小人則小人道長而國有危也剥六五曰貫魚以宫人寵無不利謂施寵小人但同之扵宮人勿使害正則終無尤也然則人君所任宜得賢才不可說信小人雖未能不加以寵亦當䖏之散地無俾乗勢以消君子可也或曰人君有不自為國而委之大臣可乎曰茲禍福之機也事有不可不然亦不可必然在度宜而行之耳蒙六五曰童蒙吉謂委扵二也夫蒙之時隂昧而陽明五以隂質居扵尊位不敢以其蒙昧自任而委之剛陽付物以能故獲吉也師六五曰田有禽利執言無咎長子帥師弟子輿尸正凶謂柔非軍帥隂非剛武故不躬行必以授也授不得主衆猶不從故長子則可弟子則凶盖九二得中可以任也自閫以外将軍制之用兵之法亦其宜矣臨六五曰知臨大君之宜吉夫臨剛浸而長君子道盛之時也因而納之委以其事則不勞而成功矣任得君子庸非智乎大壮六五曰䘮羊于易無悔羊壮也君大壮之時以隂䖏陽以柔乗剛用壮之甚敵冦之来将失其居故不待險難而先舍其壮委任於二則得無悔也此皆事之宜不得不然也歷觀衆卦此類頗多率由隂居尊位未得剛正在上而廢其聰明委政於下也得其人則民受其賜非其人則職為亂階此不得不然也常六五曰常其徳正婦人吉夫子凶謂居得尊位不能制斷而係應於二專從其唱以此為常則婦人之吉非夫子之道也以言人君在位苟不能獨㫁而牽於臣下權時則可矣以之為常則非君之道也坤𥘉六曰履霜堅氷至戒其漸也上六曰龍戰于野辯之不早疑盛乃動故必戰也此任官之要先王其慎之也易論第三或人請問為臣之道曰君子之進也難哉苟進則謟謟則何有扵君唯利而已矣否𥘉六曰㧞茅茹以其彚正吉亨象曰㧞茅正吉志在君也謂居否之時動則入邪三隂同道皆不可進故茅茹以類正而不謟志在扵君故不苟進也夫執剛用直進不為利忠誠所志鬼神享之升九二曰孚乃利用禴無咎謂與五為應往必見任體夫剛徳進不求寵閑邪存誠志在大業故乃利用納約于神明也夫君臣之交𥘉未見親未信而諌人以為謗損𥘉九曰已事遄往無咎酌損之謂剛以奉柔當自酌損其剛乃得合志志既合則道可行也然剛徳之長不可全削志意既合當自守正九二曰利正征凶弗損益之謂𥘉已損剛以順柔二復損已以益柔則剥道成焉故不可遄徃而利正也夫道雖正矣宜得其中不可過也小畜上九曰既雨旣處尚徳載婦正厲月㡬望君子征凶謂體巽䖏上剛不敢犯尚徳者也為隂之長能畜剛徤徳積載者也婦制其夫臣制其君雖正近危故曰婦正厲也滿而又進必失其道隂疑扵陽必見戰伐雖復君子以征必凶故曰君子征凶也常𥘉六曰浚常正凶無攸利象曰浚常之凶始求深也謂求深窮底物無餘藴以此為常凶正害徳無施而利盖人不可以至察也節上六曰苦節正㓙悔亡謂過節之中以至亢極苦節者也以斯施正物所不勝正之㓙也以斯脩身行在無妄故得悔亡盖政不可以峻刻也雖不可過亦不可未至而止也晋𥘉六曰晋如摧如正吉罔孚𥙿無咎謂進明退順不失其正而處卦之始功業未著物未之信若以此爲足自䘮其長者也故必𥙿之然後無咎也夫爲君耳目所以司聰明也不能去邪人使至君側誰之罪也兊九四曰啇兊未寕介疾有喜謂三爲侫說將近至尊四以剛徳裁而隔之𥘉則未寧終則有喜也此之爲喜乃爲至尊所善天下所頼故象曰九四之喜有慶也夫事君盡禮致㳟存位古之道也履九四曰履虎尾愬愬終吉謂逼近至尊䖏多懼之地然以陽居隂以謙為本雖處危懼終獲其志也夫君唱臣和理之常也專而見疑鮮不及矣坤六三曰含章可正或從王事無成有終謂含羙於内待命而發不為事首順上而終可謂智矣故象曰含章可正以時發也或從王事知光大也無妄六二曰不耕穫不菑畬則利有攸往亦謂代終巳成而不造也不擅其羙乃盡臣道故利有攸往也雖不獲自專而時有未安不可不憂也渙六四曰渙其群元吉渙有丘匪夷所思謂與五合志内掌機宻外宣化命能為群物散其險害然䖏上體之下不可自專猶有丘墟未平之慮雖巳得大功所思不可忘也若時不我用不與扵政則宜卷而懐之母使動而之悔也坤六四曰括囊無咎無譽謂以隂居隂不與陽事隱其賢徳乃可免咎故象曰括囊無咎慎不害也或竭其忠信志在立功圖國忘身雖慎可也随九四曰随有獲正㓙有孚在道以明何咎謂居於臣地以擅其民失於臣道違正者也體剛居說而得民心能幹其事而成其功者也雖違常義志在濟物著信在道以明其功何咎之有哉夫權之所在衆之所附不守以正速禍而巳矣益六二曰或益之十朋之龜弗克違永正吉謂居中得位益自外来朋龜獻䇿同扵損卦六五之位位不當尊故永正乃吉也夫忠臣之分雖處險難義不忘君也蹇六二曰王臣蹇蹇匪躬之故謂居位應五不以五在難中私身逺害執心不回志救王室者也故象曰王臣蹇蹇終無尤也凡此皆爲臣之道也孔子曰爲臣不易豈虚言哉易論第四或曰大哉君臣之道既得而聞之矣請問凡所以治其身何如曰性不能自賢必有習也事不能自知必有見也習之是而見之廣君子所以有成也蒙六四曰困蒙吝謂獨逺扵陽䖏兩隂之中困於蒙昧不能比賢以發其志故曰吝也觀𥘉六曰童觀小人無咎君子吝謂䖏扵觀時而最逺朝羙體扵隂柔不能自進無所鑒見故曰童觀在小人則無咎君子處之吝道也夫道之於人不可斯湏去之也進則飾其行退則不勉焉是為利者也君子恥之履九二曰履道坦坦幽人正吉謂在内卦幽隱之地而履其中道不以居外為榮處内為屈隱顯皆同常行其正宜其吉也中孚九二曰鳴鶴在隂其子和之我有好爵吾與爾靡之謂處内而居重隂之下履不失中不徇扵外立誠篤至雖在闇昧物亦應之也晋六二曰晋如愁如正吉受兹介福于其王母謂進而無應其徳不昭不以無應而回其志處晦而能致其誠故得正之吉也其𥘉愁如履正不回則乃受兹大福于其母也井九三曰井渫不食為我心惻可用汲王明並受其福謂井渫而不見食猶人脩已全㓗而不見用故使我心惻也不下注而應止是可汲也井之可汲也猶人可用若逢明王則既嘉其行又欽其用故曰並受其福也夫欲不可逞強不可恃放其私心罔知戒懼㓙之道也震𥘉九曰震来􅊒􅊒後笑言啞啞吉謂體夫剛徳為卦之先能以恐懼而脩其徳乃致福也豫𥘉六曰鳴豫㓙謂處豫之𥘉而特得志扵上樂過則淫志窮則㓙也大壮九三曰小人用壮君子用罔正厲羝羊觸藩羸其角謂處徤之極以陽處陽用其壮者也故小人用之以為壮君子用之以為羅已者也雖復羝羊以之觸藩必拘羸其角矣益上九曰莫益之或擊之立心勿常㓙謂處益之極過盈者也求益無厭人弗之與怨者非一故或擊之也夫静以俟時則無悔躁而求利則有恥不可不慎也頥𥘉九曰舍爾靈龜觀我朶頥㓙謂居養賢之世不能正其所履而舍其靈龜之明徳羡我朶頥而躁求不足貴也咸六二曰咸其腓㓙居吉腓謂動躁者也感物以躁㓙之道也由躁故㓙居則吉矣夫遵道而行不牽於俗明哲之任也與衆雷同善柔之事也豫六二曰介于石不終日正吉謂順不苟從豫不違中不改其操是以吉也咸九三曰咸其股執其随往吝謂志在随人所執亦已賤矣用斯以往吝其宜也小過九三曰弗過防之從或戕之㓙謂居下體之上以陽當位而不能先過防之至令小者咸過而復應而從焉其從之也則戕之㓙至矣然而絶類離倫衆之所非毀方瓦合亦儒之權也萃六二曰引吉無咎謂處坤之中已獨處正與衆殊異民之多僻獨正者未能變體以逺於害故必見引然後乃吉而無咎也凡此皆治身之道也或曰脩身及家自天子逹庶人一也請問家道曰蠱𥘉曰幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也謂幹父之事不可大小損益一依父命當量事制宜以意承考而已九二曰幹母之蠱不可正象曰幹母蠱得中道也謂婦人之性難可全正宜屈巳剛旣幹且順故曰不可正也雖不宜全正亦不可納之扵邪故曰得中道也家人𥘉九曰閑有家悔亡謂治家之法及其志之未變而豫防之則悔亡也家瀆而後嚴之則無逮矣九三曰家人嗃嗃悔厲吉婦子嘻嘻終吝謂家人雖嗃嗃悔其酷厲猶保其吉婦子嘻嘻乃失其節也是威克厥愛家道之善者矣易論第五或曰脩身及家前聞之矣請問凡所以遇扵人何如曰夫上之遇下有道屯𥘉九曰盤桓利居正利建侯象曰雖盤桓志行正也以貴下賤大得民也貴謂陽賤謂隂也𥘉九之陽在三隂之下是以貴下賤故大得民心也無妄𥘉九曰無妄往吉象曰無妄之往得志也亦謂體剛處下以貴下賤行不犯妄故往得其志也困九二曰困于酒食朱紱方来利用享祀征㓙無咎謂以陽居隂尚謙者也體夫剛質而用中履謙應不在一心無所私雖以處因物莫不至不勝豐衍故曰困于酒食也能招異方故曰朱紱方来也然而不可以瀆也頥六四曰顛頥吉虎視耽耽其欲逐逐無咎謂居得其位以上養下得頥之義而下交不可以瀆故虎視眈眈威而不猛不惡而嚴也夫下之遇上有道大過𥘉六曰藉用白茅無咎謂以柔處下心能謹慎故得無咎也訟六三曰食舊徳正厲終吉或從王事無成謂體夫柔弱以順扵上不為九二自下訟上不見侵奪保全其有故得食其舊徳而不失也然而不可以謟也頥六三曰拂頥正㓙十年勿用無攸利謂履夫不正以養扵上納上以謟者也處頥而為此行十年見弃者也立行於斯無施而利也兊六三曰来兊㓙謂以不正而来求說邪佞之道故㓙也巽九二曰巽在牀下用史巫紛若吉無咎謂處巽之中既在下位而復以陽居隂卑巽之甚故曰巽在牀下也若惟施至卑於神祇而不用之於威勢則得吉而無咎也夫陽為君子隂為小人同於君子則吉附於小人則㓙臨九二曰咸臨吉無不利謂有應在五而五體柔若順於五則剛徳不長矣雖感應之時不可全與相違必未順其命乃得吉無不利也六四曰至臨無咎謂處順履正不忌剛長而乃應之故得無咎也剥六三曰剥之無咎謂與上為應群隂剥陽我獨恊焉雖處於剥可以無咎也夬九三曰壮于頄有㓙君子夬夬獨行遇雨若濡有愠無咎謂夬為剛長而三獨應上六助於小人是以㓙也君子䖏之必能棄夫情累决之不疑故曰君子夬夬也若不與衆陽為群而獨行殊志應於小人則受其困焉遇雨若濡有恨而無所咎也夫心貴乎公而量貴乎大公則視人如一大則無物不包視人如一則惟善是從也無物不包則雖愚有處也比𥘉六曰有孚比之無咎也有孚盈缶終来有它吉謂處比之首應不在一心無私吝則莫不比之故必有它吉也同人𥘉九曰同人于門無咎謂為同人之首而無應於上心無係吝通夫大同出門皆同誰與為咎也兊𥘉九曰和兊吉謂居兊之𥘉應不在一無所黨係和兊之謂也說不在謟履斯而行未見有疑之者吉其宜矣大過九四曰棟隆吉有他吝謂雖能拯其弱不為下所撓而應在𥘉用心不廣故有他吝也蒙九二曰包蒙吉納婦吉子克家謂以剛居中童蒙所㱕也包而不距則逺近咸至故包蒙吉也泰九二曰包荒用馮河不遐遺朋亡得尚于中行謂體徤居中而用乎泰能包含荒穢受納馮河者也用心廣大無所遐弃無所朋黨乃可以得配于五也凡此皆遇人之道也易論第六或曰吉㓙悔吝生乎動者也請問動而無悔則奚由曰時乎時智者弗能違矣先時而動者妄也後時而不進者怠也妄者過之媒怠者功之賊也蹇𥘉六曰往蹇来譽謂處難之始居止之𥘉獨見前識覩險而止以待其時故往則遇蹇来則譽也㱕妹六三曰㱕妹以湏反㱕以娣謂室主猶存而求進焉進未值時故有須也不可以進故反歸待時以娣乃行也凡此不可先時者也豐上六曰豐其屋蔀其家闚其户閴其無人三歲不覿㓙謂處於明動尚大之時而深自幽隱以髙其行大道既濟而猶不見隱不為賢更為反道㓙其室也三年豐道之成治道未濟隱猶可也既濟而隱以治為亂也節九二曰不出門庭㓙謂𥘉巳造之至二宜宣其制矣而故匿之失時之極則遂廢矣故不出門庭則㓙也凡此不可後時者也嗚呼進取之時易見退避之時難知盖利者人之所欲欲則存諸心存諸心則計之熟矣害者人之所惡惡則幸其無之而不知為謀矣或人請問退避之道曰君子見機而作愚者闇於成事禍至而避亦無及也渙𥘉六曰用拯馬壮吉謂處散之𥘉乖散未甚故可以逰行得其志而違於難也不在危劇而後乃逃竄故曰用拯馬壮吉也遯𥘉六曰遯尾厲勿用有攸往謂處遯之時而為遯尾禍所及也危至而後求行難可免乎故勿用有攸往也然而矯枉過正衆之所憎和而不同身乃無患明夷𥘉九曰明夷于飛垂其翼君子于行三日不食有攸往主人有言謂處卦之始最逺於難逺難過甚明夷逺遯絶跡匿形不由軌路殊類過甚以斯適人人必疑之故曰有攸徃主人有言也六二曰明夷夷于左股用拯馬壮吉夷于左股示不能行也以柔居中用夷其明進不殊類退不逃難故可用拯馬而壮吉也夫有所避者不可有所顧也以欲而忘患鱗属所以死扵餌也遯九三曰係遯有疾厲畜臣妾吉謂在内近二以陽附隂宜遯而繫故曰繫遯遯之為義宜逺小人以陽附隂繫於所在不能逺害亦巳憊矣宜其屈辱而危厲也繫於所在畜臣妾可也施於大事㓙之道也九四曰好遯君子吉小人否謂處於外而有應於内君子好遯故能舍之小人繫戀是以否也若夫分有所定義不可去則莫若守正之為利也泰九三曰無平不陂無往不復艱正無咎于食有福謂處天地之将閉平路之将陂時将大變世将大革而居不失其正動不失其應艱而能正不失其義故無咎也信義誠著故勿恤其孚于食有福也明夷六五曰箕子之明夷利正謂最近扵晦與難為比猶闇不能沒明不可息正不憂危故利正也凡此避禍之道也詩曰旣明且哲以保其身此之謂也易論第七或曰獨隂孰始獨陽孰生萬事云為未有不因人以成故大則有君臣之交小則有同志之㑹變故非一願聞其詳曰人事之變或逺而相應或近而相得逺而相應君臣之分定也近而相得以各無應同志者也然而應扵逺者或為近所困承扵上者或為下所逼臣欲應君而冦難阻之君欲應臣而䜛邪制之惟其明哲决所去就秉心不回終乃無過也屯六二曰屯如邅如乗馬班如匪寇婚媾女子正不字十年乃字謂志在乎五不從扵𥘉與𥘉相近而不相得困於侵害時方屯難正道未通渉逺而行難可以進屯難之世勢不過十年十年則反常反常則本志斯獲矣大有九四曰匪其彭無咎謂既失其位而上近至尊之威下比分權之臣其爲懼也可謂危矣唯夫有聖知者乃能免斯咎也三雖至盛五不可舍能辨斯數專心承五常匪其旁則無咎矣暌六三曰見輿曵其牛掣其人天且劓魚噐反無𥘉有終謂以隂居陽以柔乗剛志在扵上而不和扵四二應扵五則近而不相比故滯隔所在不獲進也四從上取二從下取而應在上九執志不回𥘉雖受困終獲剛助也漸九五曰鴻漸于陵婦三歲不孕終莫之勝吉謂進得中位而隔乎三四不得與其應合然各履正而居中三四不能久塞其塗不過三歲必得所願矣九三曰鴻漸于陸夫征不復婦孕不育㓙謂以陽爻為下卦之主而棄其群醜與四相得遂乃不反夫征不復樂扵邪配則婦亦不能執正矣然小人之心惡直醜正近不相得亦宜備之既濟六四曰繻有衣袽終日戒謂履得其正而近不與三五相得鄰扵不親而得全者終日戒也抑又交際之間理非一致或名雖為應而實不相接或義有可合而情不相同智者三思故往而必納愚者徑行則動而多悔也屯六四曰乗馬班如求婚媾往吉無不利謂二雖比𥘉執正不從不害已志者也求與合好往必見納矣故象曰求而往明也小畜𥘉九曰復自道何其咎吉謂處乾之始以升巽𥘉四為已應不距巳者也以陽升隂復自其道順而無違何所犯咎得義之吉也随六三曰係丈夫失小子随有求得利居正謂雖體下卦二已據𥘉将何所附故舍𥘉係四志在丈夫四俱無應亦欲扵已随之則得其所求也暌六五曰悔亡厥宗噬膚往何咎謂有應在二三雖比二二之所噬非妨已應者也以斯而往何咎之有往必合也凡此智者之慮能見彼情者也屯六三曰即鹿無虞惟入于林中君子㡬不如舍往吝謂三既近五而無冦難四雖比五其志在𥘉不妨巳路可以進而無屯邅也見路之易不揆其志五應在三徃必不納何異無虞以從禽其可獲乎故不如舍往吝窮也大畜九二曰輿說輹謂五處畜盛未可犯也遇斯而進故輿說輹也凡此愚者之動不知彼情者也故亦有非應比各亢一方而渙然合好罔有猜嫌者同患相恤勢使之然也暌九四曰暌孤遇元夫交孚厲無咎謂無應獨處而𥘉亦無應特立處暌之時俱在獨立同處體下故求其疇類而自託焉相得無疑故曰交孚雖在乖革志可得行雖危無咎也故曰苟識其情不憂乖逺苟明其趣不煩彊武䏻說諸心能研諸慮暌而知其類異而知其通其唯明爻者乎易論第八或曰天有常故四時行地有常故萬物生人有常故徳行成而事或有變勢或有異以常待之其可乎曰常者道之紀也道不以權弗䏻濟矣是故權者反常者也事變矣勢異矣而一本扵常猶膠柱而皷瑟也履九五曰夬履正厲謂履道尚謙不憙處盈而五以陽處陽正當其位是以危也豐六二曰豐其蔀日中見斗往得疑疾有孚發若吉謂處明動之時爻皆以居陽位又不應隂為羙而二以隂居隂常扵厥位故幽而無覩不能自發也若夫排患觧紛量時制宜事出一切愈不可常也益六三曰益之用㓙事無咎有孚中行告公用圭謂以隂居陽處下卦之上壮之甚也語以謙冲則罪可戮用救衰危則物所恃故以此告公國主所任也大過九二曰枯楊生稊老夫得其女妻無不利謂以陽處隂䏻過其本而救其弱者也上無其應心無係吝處過以此無衰不濟也九三曰棟橈㓙謂居大過之時處下體之極不䏻救危拯弱以隆其棟而以陽䖏陽自守所居又應扵上係心在一宜其淹溺而㓙衰也或曰甚哉幹蠱之難也才不勝任亦可勉乎哉曰駑駘疾走不如良馬之安行也小人飾智不能及君子之任真也天命之性有限乎中苟非其宜是以身釣禍也大有九二曰大車以載有攸往無咎謂徤不違中為五所任任重不危致逺不泥故可以往而無咎也鼎九四曰鼎折足覆公餗其形渥㓙謂處上體之下而又應𥘉既承且施非巳所勝故曰鼎折足覆公餗也既覆公餗體為渥沾智小謀大不勝其任受其至辱灾及其身故曰其形渥㓙也觧六三曰負且乗致冦至謂䖏非其位履非其正乗二負四以容其身小人而乗君子之噐盗思奪之矣凡此皆以身釣禍者也亦有才可適用徳可及物而勢不可為者必謹察之也井九二曰井谷射鮒甕敝漏謂處上宜下處下宜上而二無應於上反下與𥘉故莫之與也是卑者不可以有為也旅九三曰旅焚其次䘮其僮僕正厲謂居下體之上與二相得以寄旅之身而為施下之道與萌侵權主之所疑故次焚僕䘮而身危也是䟽者不可以有為也凡此亦所以釣禍也或有不量其力悖道逆理以圖非望兹又罪之至也履六三曰眇能視跛䏻履履虎尾咥人㓙武人為于大君謂以隂居陽以柔乗剛志在剛徤不脩所履欲以陵武扵人為于大君行未能免扵㓙而志存于王頑之甚也同人九三曰伏戎于莾升其髙陵三歲不興謂貪扵所比㨿上之應其敵剛徤非力所當故伏戎于莾不敢顯亢也升其髙陵望不敢進量斯勢也三歲不䏻興者也三歲不能興則五道亦巳成矣安所行焉随上六曰拘係之乃従維之王用亨于西山謂随之為體隂順陽者也最䖏上極不從者也随道已成而時不從故拘係之乃從也離九四曰突如其来如焚如死如弃如謂逼近至尊履非其位欲進其盛以炎其上命必不終也噫天不可違人不可欺忠孝之羙有生者所宜拳拳也易論第九或曰如此乎禍福之猶影響也何從而慎諸曰火之生也一勺之勝及其燎也川流莫競是故君子慎乎始也節𥘉九曰不出戸庭無咎謂爲節之𥘉将整離散而立制度者也故明扵通塞慮扵險偽不出户庭慎宻不失然後事濟而無咎也𥘉九曰壮于前趾往不勝爲咎謂居徤之𥘉爲决之始宜審其䇿以行其事壮其前趾往而不勝宜其咎也然則不慎而失之者尚可及乎曰亦在人之明與昧也明者則辯之扵早過而䏻改故可及也昧者則以智飾非至于貫盈雖悔無及矣復𥘉九曰不逺復無祇悔元吉謂最處復𥘉始復者也不逺而復㡬悔而反以此脩身患難逺矣錯之於事其殆庶㡬乎故元吉也需九三曰需于泥致冦至象曰需于泥灾在外也自我致冦㳟慎不敗也謂以剛逼難欲進其道所以招冦而致敵也猶有湏焉不䧟其剛冦之来也自我所招㳟慎防備可以不敗也訟九四曰不克訟復即命渝安正吉謂䖏上訟下可以改變者也故其咎不大若能反從本理變前之命安正不犯不失其道為仁由已故吉從之也噬嗑𥘉九曰履校滅趾無咎謂過䡖戮薄足懲而已小懲大誡乃得無咎也同人九四曰乗其墉弗克攻吉謂履非其位以與人争二自五應三非犯巳攻三求二尤而效之違義傷理衆所不與故雖乗墉而不克也不克則反自思過以從法則故得吉也臨六三曰丼臨無攸利既憂之無咎謂履非其位居剛長之世而以邪說臨物宜其無攸利也若能盡憂其危改脩其道剛不害正故咎不長也凡此辯之扵早可及者也復上六曰迷復㓙有灾眚用行師終有大敗以其國君㓙至于十年不克征謂最處復後是迷者也以迷求復故曰迷復也用之行師難用有克終必大敗用之扵國則反乎君道也大敗乃復量斯勢也雖復十年脩之猶未䏻征也噬嗑上九曰何校滅耳㓙謂處罰之極惡積不改者也罪非所懲故刑及其首至于滅耳及首非誡滅耳非懲㓙莫甚焉凡此至于貫盈雖悔無及者也亦有勢猶可救而弗用謀言遂及敗覆者茲又不明之甚也夬九四曰臀無膚其行次且牽羊悔亡聞言不信謂下剛而進非巳所據必見侵食失其所安而五為夬主非下所侵若牽扵五則可得悔亡而已剛亢不䏻納言自任所處聞言不信以斯而行㓙可知矣噫過而不能知是不智也知而不能改是不勇也持疑猶豫目以無害古之亡國敗家未嘗不以此也易論第十或曰文王之囚箕子之奴豈其所自取哉曰患自巳招斯可患也患非巳招斯不足患也其必免矣如其不免是有命焉非智之過也節六三曰不節若則嗟若無咎謂以隂䖏陽以柔乗剛違節之道以至哀嗟自巳所致故無所怨咎也此患自巳招者也漸𥘉六曰鴻漸于千小子厲有言無咎謂始進而未得其位則困扵小子窮扵謗言故曰小子厲有言也困扵小子䜛謬之言未傷君子之義故曰無咎也姤九三曰臀無膚其行次且厲無大咎謂處下體之極而二㨿扵𥘉不為已乗居不獲安行無其應不䏻牽據以固所䖏故曰臀無膚其行次且也扵履得其位非為妄處不遇其時故使危厲灾非巳招是以無大咎也此患非巳招必免者也蹇六四曰往蹇来連謂往則無應来則乗剛往来皆難故曰徃蹇来連然得位履正當其本實難遇扵難非妄所招也此患非巳招不可免者也是有命焉非智之過也亦有進不違私志在救難以危其身此又君子之大義非智者之羞也大過上六曰過渉滅頂㓙無咎謂處大過之極過之甚也渉難過甚故至于滅項㓙志在救時故不可咎也古之人曰貪夫徇財烈士徇名夸者死權有所欲者必得所惡也關龍逄死扵夏王子比干死扵商人臣之義不得不然也是故知㡬之賢少欲之士拂衣塵外髙蹈不還鴻飛冥㝠非弋人之所慕也蠱上九曰不事王侯髙尚其事謂最䖏事上而不累扵職位不承事王侯但自髙尚其事故志可則也漸上九曰鴻漸于陸其羽可用爲儀吉謂進䖏髙潔不累扵位無物可以屈其心而亂其志峨峨淸逺儀可貴也賁𥘉九曰賁其趾舍車而徒謂在賁之始以剛䖏下居扵無位棄扵不義安夫徒歩以從其志者也此二踈以免扵漢四皓以免扵秦特立獨行非凡所及也噫天道之變日星循環占之而不舛者以知其數也人事之動情偽交錯應之而不謬者以知其勢也持之以正用之以中百禄之来弗可辭也巳噫非天下之至變其孰䏻與扵此哉易論第十一或曰卦者時也爻者適時之變者也時旣不一事亦不同不可相假者也今子統而論之母乃咈扵時乎曰時雖異矣事雖殊矣然事以時變者其迹也統而論之者其心也迹或萬殊而心或一揆也若夫湯湯洪水禹以是時而濬川黎民阻饑稷以是時而播種百姓不親契以是時而敷五教蠻夷猾夏臯陶以是時而明五刑其迹殊其所以爲心一也統而論之謂之有功可也亦有因時立事事不局扵一時可爲百代常行之法者如仁義忠信之例是也故夫子扵上下繫所稱者十有九爻未有言其時者盖事不局扵一時也是故時有小大有以一世爲一時者此其大也有以一事爲一時者此其小也以一世爲一時者否泰之類是也天下之人共得之也以一事爲一時者訟師之類是也當事之人獨得之也借如今之世泰之時也天下所共矣而所遇之事人各不同若其倥侗之質求師辯惑蒙之時也立身嚮道非禮勿行履之時也居其徳義以待施恵井之時也自逺之近觀鑒朝羙觀之時也量䏻受任各當其分鼎之時也夙夜在公幹君之事蠱之時也用其剛正辯物之事訟之時也斷其刑罰無有不當噬嗑之時也出軍遣将以討不庭師之時也險難在前按兵觀釁需之時也民有困窮從而養之頥之時也事有所失知而改之復之時也禮有過差議而定之節之時也逸樂之情約之以正豫之時也文飾之盛反之扵素賁之時也人有觧慢示之以威震之時也夫此之類皆以一事為一時而諸卦之時君之所遇者多以事無不統也臣之所遇者寡以事有分職也或一人之身而兼數事或終食之久而移數時時既屡遷迹亦皆變苟不求其心之所㱕而專視其迹則散漫簡䇿百紐千結豈中材之所了邪子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮謂少則得多則惑也然則統而論之不亦可乎易論第十二或人請問乾坤何時也曰乾者聖人進取天位非承平之時也故𥘉則潜二則見三則乾乾四則或躍五則飛上則亢也坤者聖人防閑臣下非大通之時也故𥘉則履霜上則龍戰三則含章而不敢爲首四則括囊而後無咎五則黄裳而後元吉唯二居扵下卦履其中正乃可任其自然也又問大過之時則務在救危遯明夷之時則貴乎避難何其不同也曰大過之時本末雖弱而未見君之昏亂臣之䜛邪是國家之難何世無之君子之義不得不救也遯則小人得志明夷則闇主在上忠良之士徒見害而巳無足可為也君子之智不得不避也又問隂爻浸長皆小人道盛也剥之五隂否之三隂小人衆多矣而不見君子避之之意二隂始進而君子之遯猶恐為尾何也曰君子之道知㡬其神故云二隂用事小人将盛而亟避之則無患矣苟至于否塞至于剥落而後退焉不巳晚乎易之為遯所以示先見也然則剥與明夷孰為大禍曰小人雖盛制之在君故貫魚以宮人寵則無不利是禍之小也主之闇則末如之何故南狩得其大首是禍之大也又問屯也蹇也困也名相近也請言其别曰屯者動乎險中可為之世也然而足以有功矣蹇者見險而止不可為之世也然而足以無過矣困者剛見揜扵柔君子為小人所蔽窮厄委頓者也人之所患莫斯之甚也比也同人也随也義相類也請言其異曰比者剛得尊位上下應之天下之人皆親其君也同人者柔履中正而應乎乾同志相合物各有黨也随者剛来下柔動而之說謂能下扵人動則人說莫不從其所為也上之所務莫斯之大也謙也巽也奚若曰謙者内陽外隂屈其剛徳以下扵物者也巽者内外皆隂心貌如一情實卑順者也豫也兊也奚若曰豫者主扵逸樂兊者喜恱而已也晉也升也奚若曰升者升得位晉者進見扵君也泰也旣濟也奚若曰泰者君臣合好君子在位小人在野之世也然物既大通多失其節故不具利正之徳也若夫物皆得其所事皆得其宜未有如既濟之盛者也堯舜其猶病諸然安不忘危戒在終止故曰𥘉吉終亂也泰之極則城復于隍旣濟之極則濡其首禍福倚伏誠可畏也昔大禹之訓曰予臨兆民懔乎若朽索之馭六馬夫䏻保萬世無疆之休其唯知懼者乎易論第十三或曰八卦成列象在其中矣謂備天下之象也請言其畧曰天地萬物存乎說卦矣姑以人事明之八卦之道在人靡不有之也但賢者得其正不肖者䖏其偏矣夫剛而不暴乾之正也順而不邪坤之正也動而不妄震之正也卑而不辱巽之正也險而不可犯坎之正也明而不可欺離之正也静而不可誘以利艮之正也和而不可撓以怒兊之正也若剛而不容扵物乾之偏也順而不守其道坤之偏也動而為躁震之偏也卑而為佞巽之偏也險而為賊害坎之偏也明而為苛細離之偏也止而不及其時艮之偏也說而不由扵禮兊之偏也是故賢者以功不肖者以過賢者以福不肖者以禍由所用之道名同而實異也然賢者之道也或其數不備或所施者狹夫能具八者之用發之乎身充之乎天地之間者其唯聖人乎故用之扵國則邇人安用之扵軍則逺人服鼓之舞之無物不得其宜矣純精勁正造成庶事旴食忘倦終而復始用乾扵國也含藏廣大靡物不愛隤然和順無有煩擾用坤於國也甲兵斧鉞以重其威無敢奸宄無敢怠惰用震於國也適時之變權宜在已以貴下賤士争歸之用巽於國也封疆阻固山河分限貴在常尊無得䙝近用坎於國也善靡不照惡靡不見人文化成上下肅雍用離於國也脩其典禮止邪未形慢易之心無自而入用艮於國也行慶施恵洽于群心罔有小大翕然欣戴用兊於國也以剛决事以勇臨敵變動不息罔失其正用乾於軍也撫養士卒如母親子雖其罙仁不害方直用坤於軍也先聲後實威聞敵國動於九天物莫䏻亢用震於軍也隱其形勢示之不能始如䖏女後如脫免用巽於軍也深溝髙壘逺其斥候敵人不得襲刺客不得近用坎於軍也部曲分辯各有麗著號令明白衆罔疑惑用離於軍也退北佯為不追見利佯為不知持重有待嶷如山立用艮於軍也誅其渠魁弔其民人簞食壷漿以迎王師用兊於軍也故知八卦之道大矣有髙焉必乗其上有深焉必載其底有旁焉必環其外幽無不貫㣲無不徹惟所用之何如耳噫作易者既有憂患矣讀易者其無憂患乎苟安而不忘危存而不忘亡治而不忘亂以憂患之心思憂患之故通其變使民不倦神而化之使民宜之則自天祐之吉無不利矣直講李先生文集卷之三終
