front:
  text: 直講李先生年譜真宗皇帝大中祥符二年巳酉先生始生祥符三年庚戌二嵗祥符四年辛亥三歲祥符五年壬子四歲祥符六年癸丑五歲祥符七年甲寅六歲祥符八年乙卯七歲
  hash: sha256:b05ddcc7f66424ee48c544f6e2cd450c276a88be4a052b958a0d403e481179ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_008-1a}
body:
  text: 按先生見蘇祠部書云六七歲時調聲韻習字書勉勉不忘則知先生一二年間知向學矣蘇祠部舜欽祥符九年丙辰八歲天禧元年丁巳九歲天禧二年戊午十歲按先生見余監丞書云十歲知聲律則知先生扵是年知習舉業矣余監丞時為南城宰天禧三年己未十一歲按先生作疑仙賦序云吾母無子徧禱無不至祥符元年夢二道士奕棋於戸外往觀之其一取一子授焉遂娠又云生十餘歲從先父適田間宿東郊夢人以書標與之曰王狀元文集夢中以為沂公之文也既而就學果不甚魯或時開卷敞然憶念謂曽讀此書再思之未嘗見也詳此二夢則知天生賢哲以夀斯文之氣脉豈偶然㢤天禧四年庚申十二歲按先生見余監丞書云年十二近文章則知先生扵是年能文矣天禧五年辛酉十三歲乾興元年壬戌十四歲是年丁府君憂按鄭夫人墓誌云年十四而先君沒又云先君嘗學不應舉故其子作詩賦亦樂施恵尤直信則知先生家學有派委矣仁宗皇帝天聖元年癸亥十五歲天聖二年甲子十六歲天聖三年乙丑十七歲是年府君服除按鄭夫人墓誌云稍出㳺求師友則知先生出㳺必在府君服除之後天聖四年丙寅十八歲天聖五年丁卯十九歲天聖六年戊辰二十歲天聖七年巳巳二十一歲天聖八年庚午二十二歲是年娶夫人陳氏按慶暦七年先生作夫人墓誌云陳氏今為南城人生五年養于伯父又十一年而嫁嫁十一年而卒又云復還舊居娶婦盖先生前此出㳺至是年始還家歟又有見余監丞書云十歲知聲律十二近文章思慮猖狂耳目病困者既十年矣此書當作扵是年天聖九年辛未二十三歲是年著潜書十五篇又有見孫寺丞書云年二十三鷄鳴而起誦孔孟羣聖人之書纂成文章以康國濟民為意文章盖指潜書也孫寺丞時為南城宰明道元年壬申二十四歲是年著禮論七篇其後余襄公有書與先生曰所示禮論七篇推進禮經凖的世教派仁義贅刑政豈止獨歩江表校聲名扵後俊㢤先生之有功於禮經也如此又作陳仲温進士墓誌按陳仲温諱璆先生之伯丈也故墓誌序之末曰初君之弟與其婦偕死息女始絶乳君愛養之如己子長以嫁李氏明道二年癸酉二十五歲景祐元年甲戌二十六歲是年有邵氏神祠記其畧曰建昌城北有民邵氏世奉五通禱祀之人日累什百景祐元年里中大疫而吾家與焉唯五通諗以無害疾之觧去皆約日時有功於予其可廢而不載作記恐是此年景祐二年乙亥二十七歲按先生見蘇祠部書云由六七歲時調聲律習字書勉勉不忘逮于今兹年二十七矣此書當作於是年景祐三年丙子二十八歲是年修明堂定制圖并序平土書上聶記注書上李修撰書上宋修撰書太平院住持記冬至夜酒醒詩甘露亭詩按見聶記注書云行年二十八矣當在是年見李修撰書云生平爲文謹採二十四篇寫成一冊及明堂定制圖一道并序草具其副辱諸侍者見宋修撰書云嘗著明堂定制圖并序其意在賛明經義以禆益一王之盛禮謹繕其副陳諸座隅則明堂圖之作亦在是年也獨平土書不著所作歲月然先生明年見范公而范公他日薦先生必以禮論易論明堂定制圖平土書共獻必同作扵此一二年之間張宗古送先生南㱕序其畧曰自周室距今曠千餘載此禮廢絶所以學者各是已見競牽師習故復出泰伯以明其本盖指明堂圖也是年入京贄見宋修撰李修撰聶記注葉集賢諸公皆許可宋公庠李公淑聶公冠卿葉公清臣也㑹貢舉罷遂㱕景祐四年丁丑二十九歲是年徃鄱埸見范文正公其書云年二十九嘗逰京邑彷徨而㱕又黜鄊舉其後范公與先生書云在鄱陽勞惠訪尋以改郡不敢奉邀則知先生是年鄊舉不利而往鄱陽訪范公也寳元元年戊寅三十歲是年作廣潜書十五篇命箴野記鄧公儀傷辭縁槩師詩惜雞詩按廣潜書自序云歲辛未泰伯以潜名書後七年覊栖山巖即而廣之復為十五篇則此書當作於是年命箴云三十曰壮聖人以立則此箴亦當作於是年廣潜書云覊栖山巖則野記亦作於是年寳元二年巳卯三十一歲是年先生夢大雨震所居室有一人𬗋衣而冠謂之雷神呼先生使前授之題曰春社詞援筆得八句與之及覺記其首三句頗怪麗後七年以五句足之按此夢與疑仙序二夢而三一為誕彌厥月之祥二為神授斯文之印天生賢哲豈虚其證是三夢皆可書富國彊兵安民三十策按先生以康定二年試制科則此策必作於是年康定元年庚辰三十二歲是年得男參魯有上江職方書又往越州赴范髙平公招故有登越山詩按丁亥年先生作已室墓誌云一男參魯僅毀齒盖自庚辰至丁亥凡八年故曰僅毀齒也按先生上江職方書云行年三十餘近訪呉越而㱕曰三十餘則當在是年曰訪呉越而㱕則訪范公也江公鎬寳元元年以職方守旴康定二年十一月改慶暦元年辛巳三十三歲是年作建昌軍集賢亭記修麻姑殿記麻姑山仙都觀修三清殿記梓山院修佛殿記上呉舍人王内翰富舍人劉集賢慎殿丞書日出詩感事詩和慎史君出城見梅詩按集賢亭記序曰康定二年夏六月太守慎公作新亭于軍門之南孟秋告成郡人李覯為記三清殿及麻姑殿記皆是康定年號梓山佛殿記亦云康定二年秋九月則是數記皆作扵康定未改元之前也上慎殿丞書盖慎公釴其時以殿中丞守旴江此書當作扵未入京之先上呉舍人王内翰富舍人劉集賢書盖呉公肅王公堯臣富公弼劉公敞其時皆居朝此書當作扵入京之日然是年郡舉先生應茂材異等科有㫖召試故入京上諸公書又寄祖祕丞無擇詩歷序應科本末則云憂愁經歲是先生留京一年也慶暦二年壬午三十四歲是年先生試制科得召第一長沙蕭注與先生書云昨偕弟英求舉扵京師間足下應賢良預第一召試未有不心思目願欲識其面者秋七月試制科不第㱕過南康見郡守祖祕丞按皇祐類稿與祖祕丞詩云及過廬山南聞君初布治又曰髙㑹雖暫歡故園當速至是先生留康廬日淺而㱕興濃矣是年又有寄小兒詩送余疇若序與章望之祕校書與楊屯田書楊文公億之子麻姑山賦寄周寺丞詩惜才詩送侯殿直知吉州詩按寄小兒詩注云此兒纔三歲盖庚辰得男至壬午恰三歲送余疇若序寄周寺丞詩盖周爕以是年宰南豐請余疇若南豐主學故先生以序送其行楊屯田其時守筠州故有書與之麻姑山賦乃述髙䑓層瑶繚垣築粉之羙必是修麻姑殿後所作當在是年送侯殿直詩曽得滁州在故鄊按國史歐公以慶暦二年知滁州此詩之作亦當在是年也惜才詩恐亦是作扵下第之後慶暦三年癸未三十五歲是年集退居類稿十二卷慶暦民言三十篇作周禮致太平論三十篇撫州菜園院記雪中贈柳枝及柳枝荅詩寄周寺丞詩送錢寺丞知白州詩三賢詠上蔡學士詩寄祖祕丞詩按先生集所為文名退居類稿云自弱冠迨今十五歲得草稿二百三十五首類為十二卷是年冬至日南康守祖無擇爲先生作序則知先生是年下第退居既集退居類稿又有周禮致太平論焉其後陳次公述先生墓誌云及退居爲周禮致太平論并序則實作扵是年也上蔡學士書言鄒子房事盖蔡公以慶暦三年爲諌官此書亦作扵是年周寺丞燮時爲南豐宰錢寺丞得臣時以南城宰知白州故先生有詩送之勤又寄祖祕丞詩云郡守方仁賢學宮盛修理踵門致勤恪命我談經藝余襄公薦章云下第退居四方生徒從之講習鄧温伯云慶暦三年南城始詔立學先生爲之師四方来學嘗數百人則知先生以是年退居于家故郡守請主學事柳枝詩盖因是年二月入京遇雪而作也是年中女生按丁亥年先生作陳夫人墓誌云中女五歲其少未免懐盖中女之生在是年也先生作周禮致太平論三十篇而内治七篇居其首其畧曰内宰以隂禮教六宮六宮后也又以隂禮教九嬪九嬪掌婦學之法以教九御后尊也不得不受教女御卑也而教亦及之是在王宮者不可不知禮也余按此篇三歎成王周公致太平之書其精神心術盡在扵是使先生之志獲行如有用我執此以往豈特王河汾能言之惜夫其不果也先生作慶暦民言三十篇開諱而下言言藥石字字規戒先生斯時無官守言貴少露梗槩一二年間杜富韓范歐余王蔡君明臣忠三陽道泰公既不能為三諌之詩以効君謨又不能為濃墨之頌以効石介雖在畎畒惓惓忠赤不能自巳作為此篇天子聖明蒭蕘博採持此上聞言者無罪四十二年之治實嘉頼之故祖無擇曰真醫國之書爾慶暦四年甲申三十六歲是年上富公范公書作麻姑山真君殿記李子髙墓表陳伯英墓表寄祖祕丞書除衣感懐詩南塘觀魚詩二詩並次陳殿丞肅韻按上富范書盡獻慶暦民言及言國事故也李子髙墓表云卒扵慶暦四年則墓表想亦作扵是年陳伯英墓表云吾嘗銘陳仲温之葬其子漢公字伯英後十二年而死又従而表之仲温乃先生之伯文伯英乃郎舅也仲温之葬在壬申年伯英以甲申年死故曰後十二年則墓表亦當作扵是也寄祖祕丞書云教道亦難行徒以釣積毀篋書㱕敝廬庠門任蕪穢先生此言盖因上蔡學士書言鄒子房事鄒因誣織先生同入郡圄其事既白先生乃棄學事而復家居也慶暦五年乙酉三十七歲是年有與胡安定書寄祖祕丞詩南城縣㕔記䖏士陳君墓誌銘及祭文白石暹師塔銘按與安定書云康定初錢塘别後二年自京師㱕中途曽寫書今又四年則此書當作扵是年是年余㐮公薦先生于朝其章畧曰李覯愽學通識包括古今潜心著書研極治亂江南儒士共所師法閩中名士黄通以書與范文正公曰李覯生聖時三十七年也其徳行文學其智識材術疑三代英靈復生于今大江而南皆呼曰先生暨應詔来都下今副樞富公諌省歐陽公𬗋㣲余正言三班田𬗋㣲淮南祖提刑皆當世之名儒莫不競造其門而優禮之若吾公者知泰伯為㝡深惟其知之也深故嘗有論薦泰伯之心慶暦六年丙戌三十八歲是年作長江賦集皇祐續稿作序足成夢中春社詩上王刑部書次王刑部逰麻姑詩及唱和詩序傅代言墓表按先生乙未年再上富公書云慶暦四年以書言南方事後二年作長江賦則此賦當作扵是年王刑部乃漕使逵也是年㳺信州作弋陽縣學銘聞女子瘧寄詩弋陽縣堂北見夾竹桃海棠二詩題靈陽宮龜峯精舍葛陂懐古詩逄何道士詩按先生皇祐三年作新成院記云前此予㱕自信又云既去五六年自此年至皇祐三年約五六年則㳺信必在是年若銘若詩皆作扵在信之時也慶暦七年丁亥三十九歲是年作禮論後語刪定劉牧易圖序宋屯田延平集序亡室陳氏墓誌處士饒君墓表建昌知軍㕔記景徳寺重修大殿及造彌陀閣記邵武軍學荘田記小女詩海南編集題韓偓詩後荅黄漢傑書按禮論作扵明道元年而後語云吾為禮論後十五年有持章望之論一篇以吾為好怪則禮論後語當作扵是年刪定劉牧易圖序論見扵荅宋屯田書亦當作扵是年宋屯田延平集盖因入閩訪福帥蔡學士路經昭武而作也宋屯田咸字貫之時為延平倅假守昭武海南編詩因宋屯田見示海南編而作題韓偓詩後因㳺閩而作答黄漢傑書以漢傑貽書言景徳寺記及邵武軍學記言浮屠事故先生荅漢傑書云覯排浮屠固久扵潜書扵富國策人皆見之矣豈年近四十而輙渝㢤惟漢傑觀􅍏二記不甚熟爾吾扵此言乃責儒者之深非尊浮屠也先生言年近四十則此書當作扵是年是年夫人陳氏卒按陳次公述先生墓誌云再娶饒氏不知娶扵何年慶暦八年戊子四十歲是年中女子死有哭女詩云妻死女巳病踰年成二䘮曰踰年者盖去年陳夫人卒今年中女死也冬十一月作建昌軍儀門記太平寺浴室記寄祖祕丞詩皇祐元年巳丑四十一歲是年作宋中舍及江夫人墓碣銘送李山甫詩是年范文正公薦于朝其章畧曰李覯著書立言有孟軻楊雄之風義臣今取到本人所業禮論七篇明堂定制圖序一篇平土書三篇易論十三篇共二十四篇編為十卷繕寫上進乞賜御覽則知斯人之才之學非常儒也其人以母老不願仕乞就除一官許令便養皇祐二年庚寅四十二歲是年作周醫愽墓表廻向院記謝官表謝范咨政啓怡山長慶寺詩是年赴范文正公招于杭州范公再薦于朝其章曰臣去年録進李覯所業十卷其明堂圖序一卷今朝廷行此大禮千載一時斯人學古之心上契聖作再録上進乞加天奨以勸儒林㫖授将仕郎太學助教誥詞云學業優議論正有立言之體且履行修正誠如薦章特以一命及爾其益進于道勿患朝廷之不知也皇祐三年辛卯四十三歲是年作廣文陳生墓銘承天院記麻姑山仙都觀御書閣記新成院記送知軍曹比部移之䖍州詩按旴志曹公觀以皇祐三年守旴此詩當作扵是年是年丁母鄭夫人憂十二月葬于先府君墓東南隅實建昌鳳凰山之麓按墓誌云方謀扶親西逰夫人許之未及行而遭大故皇祐四年壬辰四十四歲是年集皇祐續稿八卷作序刋行周禮致太平論十卷上孫觀文書酬陳屯田詩按續稿序云行年四十四疾疹時發作其扵文字間尚克有進也歟又云慶暦癸未録退居稿後三年復出百餘篇當在是年上孫觀文書盖是年儂志髙寇廣西孫觀文沔持節討之先生寄書陳利害十事孫公荅書云示教民病非留心博愛何以及此酬陳屯田詩云封豕長蛇戰嶺南盖指儂寇也此詩亦當作扵是年皇祐五年癸巳四十五歲是年著常語上中下三卷承天院羅漢閣記栢林温氏書樓記傅進士墓銘皇祐六年甲午四月改至和元年四十六歲是年除鄭夫人服作常語後序袁州學記清話堂詩送嚴介序聶夫人徐夫人張都官墓誌袁州雜詩三首先生作袁州學記河東柳淇書京兆章友直篆天下號為三絶其學記畧曰惟四代之學攷諸經可見天下治則撢禮樂以陶吾民一有不幸猶當仗大節為臣死忠為子死孝詳味斯言此豈特為袁州學校重且将為天下國家重故曰君子化民成俗其必由學乎袁州雜詩郡守祖無擇皆𢋫其韻清話堂詩盖與周伯逹宿景徳寺而作其詩云無限中心不平事一宵清話又成空遂目其䖏為清話堂且題八句云至和二年乙未四十七歲是年寄富公書并長江賦一首皆論東南利害寄祖祕丞詩送春二絶送陳司理序江屯田墓誌陳都官墓碣銘鄒夫人墓誌銘鄭助教母陳氏墓銘陳府君夫人聶氏墓銘至和三年丙申九月改嘉祐元年四十八歲是年有鉛山縣尉陳君墓銘嘉祐二年丁酉四十九歲是年國子監奏乞差太學助教李覯充太學說書㫖令赴太學供職按奏劄云雖因名儒論薦命試一官未沾政禄而養道丘壑欲望朝廷差充太學說書冀有禆庠序風化嘉祐三年戊戌五十歲是年除通州海門主簿太學說書作太學議一篇景徳寺修院記按誥詞云尓醇明茂羙通于經術東南士人推以為冠自佐學政逾年于兹孜孜渠渠務恪厥守祭酒司業以為愽士之職莫宜扵尓可特授通州海門縣主簿太學說書如故㫖令詳究太學制度故有學議嘉祐四年己亥五十一歲是年權同管勾太學盖因胡瑗以病告假故有斯命尋以祖母未祔先塋請假㱕遷㫖給假一月先生遂㱕八月卒于家十二月祔塟于鳳凰山府君之塋按陳次公作先生墓誌云臨終無他言惟執次公手以明堂圖為託三禮未成為恨是先生又作三禮論未成而絶筆也直講李先生年譜終
