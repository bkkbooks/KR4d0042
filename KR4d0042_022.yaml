front:
  text: 直講李先生門人録
  hash: sha256:4fedafddc2d8feee2d50d18cccd7fa2fd7e46c7e331cfb3fbca6af81d64021d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0042_SBCK_022-1a}
body:
  text: 先生年譜所以載先生之行事今以門人録附庸者亦欲使來者知先生師友之淵源也按陳次公志先生之墓曰門人升録者千有餘人今姓名可考者僅三十八人兹而不書久則愈無可考故附録云陳次公字漢傑南城人父璆先生夫人之伯父也次公與兄漢公字伯英弟次山俱學於先生次公舉荗材異等不中歸隱谷口著書與先生往還者二十年先生臨終執其手託以遺文先生墓志銘乃次公所述也次山登皇祐五年第傅野字亨甫南城人學於先生其先上饒人父垂範先生為志其墓野學於先生蚤有立操與陳次公俱為門人稱首熙寧中郡以髙材淹滯聞㫖賜粟帛充軍學教授歷明州定海尉歸隱於沙溪之東巖有文集名通藁先生後集乃野所輯也鄧潤甫字溫伯避髙魯王韓以字行少與弟佑甫仲甫俱學於先生溫伯文章角出諸生上登皇祐元年第官至尚書左丞三入玉堂熙寧中上先生輯藁乞官先生之子參魯佑甫登熙寧二年第仲甫髙尚不仕元祐中舉遺逸賜號和靜先生李山甫字明叟避髙魯王諱以字行更字公晦先生之族子也少學於先生登皇祐元年第官至西京作坊使知澧州號龍溪釣叟陳光道字公亮南城人與兄光逺俱學於先生光道剛果廉辨多智數登嘉祐四年第仕至撫州通判號有為子先生之子參魯墓銘乃光道所作也光逺登元豐八年第廖平南劍人父夷清徙居南城平十二嵗而孤䏻自立學於先生登治平二年第常語後跋乃平所作也陳汝器字適用南城人學於先生䏻詩元祐中為廬陵宰山谷亟稱之黃曦字耀卿南城人學於先生文章典麗南豐先生亟稱之元符三年乙科傅翼字翼之南城人學於先生文行俱髙熙寧六年乙科終永豐令號甘圃有甘圃集余疇若字堯輔南城人學於先生慶曆二年大理寺丞周燮知南豐聞其賢請主學事先生以序送之傅代言南城人學於先生及卒先生為表其墓陳瓔字天貺南城人學於先生出諸生右晚自肆山水號谷口耕叟鄧立字公儀南城人學於先生志合道一年三十二而卒先生為辭傷之陳君平南城人都官肅之子也學於先生少䏻文甫冠舉進士入太學不第終於京年二十四先生志其墓廖廷玉南城人陳漢公之壻也學於先生饒景先南城人偕弟見先學於先生先生表其父昌齡之墓杜萬南城人居谷口先生有詩送之王幾字復之天台人學於先生字之為作復說陳世南豫章人學於先生以序送之陳公燮字思道閩人學於先生贈之以序改字中道張宏武夷人學於先生嘗以詩送之張延之字伯仁學於先生為作字序以後十二人鄉貫無傳湯延祖字子立學於先生字之以詩陳特兄弟二人俱學於先生答之以書彭昱學於先生嘗以詩送其赴舉夏旦學於先生以詩送其赴舉黃銑學於先生以詩送其赴舉廖說學於先生為詩其蒙亭周伯逹學於先生見清話堂詩題吳伯華學於先生以詩送之上官直學於先生以詩送之吳著學於先生以詩送之嘗讀旴江舊志云曽舍人鞏鄧左丞溫伯皆先生之髙弟竊有疑焉蓋溫伯他日為中丞進先生所為文奏乞官其一子溫伯逰先生之門明矣然不䏻排新法之非識者惜之今旴志以南豐並稱不知何據按李直講生於祥符之己酉曽南豐生於天禧之巳未以年數考之則直講多南豐十嵗也若以直講南豐為師友恐不其然謂其在鄉學師之歟則直講以慶曆三年主郡學而南豐以是年自洪州歸臨川上齊工部書云祖母樂居臨川其後為文多道臨川之事謂其在太學師之歟則直講以嘉祐二年為太學說書而南豐以是年登進士第明年調太平州法曹烏在其為師友哉舊志所載若不加訂正襲訛承舛惟恐後人復誤後人也直講李先生門人録卷終
