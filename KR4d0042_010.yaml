body:
  text: 潜書廣潜書野記後學南城左贊編輯後學廣昌何喬新校正潜書十五篇并序泰伯間居有書十五篇憤弔世故警憲邦國遐探切喻辭不柔伏噫道未行速謗何也姑待知者而出之乎乃命曰潜書吾民之饑不耕乎曰天下無廢田吾民之寒不𧖟乎曰柔桑滿野女手盡之然則如之何其饑且寒也曰耕不免饑𧖟不得衣不耕不𧖟其利自至耕不免饑土非其有也𧖟不得衣口腹奪之也鉏耰未乾喉不甘矣新絲出益膚不縫矣巨産宿財之家榖陳而帛腐傭饑之男婢寒之女所售弗過升斗尺寸嗚呼吾乃今知井地之法生民之權衡乎井地立則田均田均則耕者得食食足則𧖟者得衣不耕不𧖟不饑寒者希矣浮屠以不殺為道水飲而𬞞食舉世稱其仁夫雞豚狗彘待人而後生者也食人之粟以滋其種類一日無人則饑而死然而天下之民所以不愛其資豢而耕不免饑𧖟不得衣不耕不𧖟其利自至耕不免饑土非其有也𧖟不得衣口腹奪之也鉏耰未乾喉不甘矣新絲出益膚不縫矣巨産宿財之家榖陳而帛腐傭饑之男婢寒之女所售弗過升斗尺寸嗚呼吾乃今知井地之法生民之權衡乎井地立則田均田均則耕者得食食足則𧖟者得衣不耕不𧖟不饑寒者希矣浮屠以不殺為道水飲而𬞞食舉世稱其仁夫雞豚狗彘待人而後生者也食人之粟以滋其種類一日無人則饑而死然而天下之民所以不愛其資豢而畜之者用于其家故也神靈之祭賔客之奉于是乎取之今且使民無搖手于其間則何待而粒之哉吾見其無遺種矣抑將不殺其身而務絶其類乎仁者不為也抑將奪人之食以飽無用之禽乎仁者不為也嗚呼浮屠之仁歟止于是而巳矣善卜筮者能告人以禍福不能使禍福必至于人喜福而怠修則轉而之禍怛禍而思戒則易而為福若是則龜策皆妄言故歌大寧者無驗于昏主恤危亡者常失于明后善言天下者言其有以治亂不言其必治亂夢者之在寢也居其傍者無異見耳目鼻口手足率故形也魂之所逰則或羽而仙或冠而朝或宫室輿馬女婦奏舞興乎其前忽富驟榮樂無有極及其覺也撫其躬亡毛髮之得於是始知其妄而笑此無他獨其心之溺焉耳苟合以希聲盜勢以驕人齧利以封巳赼趄笑呵晨作暮巳從而視之犬言彘𥚑未始有變而其人且囂然自謂賢智顯大莫與為對嗚呼將幸而覺邪抑將冥冥沒沒遂至于死邪如其覺也當自笑之矣左右奉飬𬒳服教戒子非尊于母也勉征繕聽誅殺民非貴于君也母以有子而尊君以有民而貴無子無民母出君滅人之於其配成之以厚禮無子而出之者不以宗廟之重私一女也天之于立君命之以符瑞無民而滅之者不以天下之大私一人也然則恃母之尊而不能養子家之逐妻也倚君之貴而不能愛民國之喪王也苟得其心少康一旅為有民苟失其心商王億兆無民矣是故聖人簡役而輕賦喜德而憚刑名位不立貴賤不分天下其何如曰亂而巳矣名位既立貴賤既分天下其何如曰亂而巳矣敢問何謂也曰無名之亂統不一也有名之亂欲而爭之也古人有言曰萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家貴令而驕賤承而辱能無覦心者幾希矣是故君子位髙而德修外榮而中懼恭儉以下人恩澤以結物為是戒也夫天之制兵革其有意乎見其末者曰為一人威天下明其本者曰為天下威一人生民病傷四海冤呌湯武之為臣不得以其斧鉞私于桀紂是以庸君中材抽手入袖不敢加禍于無辜之草木噫後之人其可以放蕩之德席其上哉虎豹之性喜噬人者也去其爪牙則可使為羊豕擾而畜之無害矣貪暴不順小人之常心唯其逸才者可以逞其惡于天下莾篡卓弒是皆有過人之才故䏻梏同列之手使之無動才乎才有德以為功無德以為亂官乎人者宜如何聞之曰無德而才猶資盜以兵周之制其仁矣乎八家九頃以足其食五畒樹桑以為其衣媒氏以時其婚姻庠孰以賢其子弟疾瘍有醫賣儥有平管微司隱王心察察嗚呼秦漢之國亦嘗有意于是乎乃知古之天下君養民也後之天下民自養也奈何以惡政惡吏困自養之民㦲事親以孝事君以禮聖人以是師天下也佛之法曰必絶而親去而君剔髮而胡衣捐生以事我其獲福不知所盡此獨何歟受親之體而不養于其側食君之田而無一拜之謁家有叛子而族人愛之邦有傲民而吏不肯誅以佛之主其上也紂為諸侯逋逃主而諸侯伐之佛為天子逋逃主而天子未嘗怒哀哉有吏于人上者曰爾無為孽且伏大刑雖婦人幼子咸信而懼矣若曰多賄豫罪大不問則天子必降誅時人將指而唾今浮屠之言曰人死則為鬼善有美報惡有無極苦其于訓愚蓋少附于理若繼之曰侈我字嚴我像衣食我徒雖弒君父亡所恤而王公大人反朋而和之何也犬之無事時叱則走遺骨則爭及其噬人也臨之以箠而弗抑投之以食而弗顧愛其家不敢愛其身也受天子祿守天子土械姦民劾惰吏而致之法上官一言臣室一金則解而出之不待旦晞勢而懼懷賂而喜妥首搖尾良犬之耻天之疾惡也常有以助之失德之君民不若是之困也亡不若是之速也以有天為之助焉政毀于下氣變于上君取其一天取其十賦人未空其帑而水旱之酷巳奪其稼矣刑人未潰其膚而癘疫之行巳殘其命矣是以夫婦愁痛寇賊竊發惡之一毫怨丘山矣此豈天之不仁歟疾其惡幸其死謂民不困則亡不速故也嗚呼為人上者無為天之所助戒哉襁褓者智乎冠衣者智乎謂襁褓智而冠衣懵則臧獲必笑子之在母也違而出閫則啼呼不安指其父則嘻笑而歸之其心未始不在父與母也巋然而角泠然而語其智益多其孝益不足釋哺乳而逐醉飽背庭闈而諂妻妾則是智者孝之賊歟昔以見養而從親今以自養而忽之病尫聾瞽未嘗去膝下智者果孝之賊矣噫先王之任智也亦如是乎故壯齒慙於嬰兒賢母不願生才子孔子之言滿天地孔子之道未嘗行簠簋牲幣廟以王禮食祥吏其死不食其生師其言不師其道故得其言者為富貴得其道者為餓夫悲夫廣潛書十五篇并序嵗辛未泰伯以潜名書後七年羇栖山巖即而廣之復為十五篇心愈苦言愈多嗚呼其亦見險而不能止者乎聖人以道疆其兩人乎奚其言之峻也曰否人斯有之也人有之而不自喜跳而逐諸物放蕩以溺死聖人因其有而品節之使之堅守而弗去不然則聖人違天而病人其何德之有焉舉天下之事無若聖人之道之易行也無若聖人之徒之安以榮也親我所愛也而孝存焉長我所畏也而悌著焉夫婦莫不欲和也而義生焉男女莫不欲别也而禮成焉教子養孫飲觴食豆以善鄉黨僚友心平而體胖內明而外治憂患以除耻辱以逺推之國放之天下莫之能逆也巳孰若是蕩蕩者乎拾小而遺大瞭利而眊害神罷於詐筋絶于爭日之樂而月之憂慶未徹席而弔位焉吁我有之誠易行也而安榮繼之屈已以從物蓋難能也而憂辱終之然猶世俗輕去此而適彼是不忍再精思而咻之者衆也受命于天乎受命于人乎受命於天性善是也受命于人從俗是也背國而從僞者謂之叛其得罪死背天而從人者始雖得志天其不討乎人誰無過與孔門髙弟自宰我子貢冉有季路或不免于譏今兹雖有罪庶可以辭乎曰大圭嘗玷不害其為寶也若碔砆甚粹密焉猶為石也石而缺斯棄之矣賢者之責也備故小過孔子譏之今兹之所謂是者折諸賢門猶有罪也今兹之所謂罪者刑戮而未施刀鋸焉奚竊議于彼哉易曰間有家悔亡家之不間未始能無悔也彼莫不惡其家之亂也而罔念所以啓之者妾婢寡則無怨女婚姻時則無曠夫怨女曠夫亂由是出也欲戕于性女什于士閨門之內不見德而見色吁己則為之而謂人巳乎浮屠法其有功于兹乎何也曰天生民而胙之畎畒其庳則手于工足于商為有益于人而後食其報不然父母不得私其子放諸餓莩而巳矣今夫閒民童其首而衣之緇所之飽暖而安肆是有功于惰也古之教者曰天道福善禍淫今夫大猾隂賊恤其謫之及乃美僧飯大佛屋謂之懴悔因施施無復色憂是有功于惡也宮室之度非財不侈巨木丹碧庶人鮮或用淫巧無所彈其繩惟宅浮屠無藝不憚窮山裂石必致之淫巧日富焉是有功于末作且寵竒貨也苟去浮屠氏是使惰者苦惡者懼末作窮竒貨賤是天下不可一日而無浮屠也宜乎其排之而不見聽也嘗學斷獄乎吾為子舉其要坐獄而問之曰功爾言之罪爾言之從而詰之曰功信矣而罪如此其大也尺寸之功不足以贖也是其人雖欲不服何辭哉若功不及齒牙而惟罪是詰雖滔天其人將曰我有功而弗問而專咎豫欲其無辭難矣昔之排浮屠者蓋猶有過徒非其非而弗及其是雖柳宗元尚不聽退之况其庳者乎胡不窮之曰爾之道以慈悲普濟率民講報應以威之使不敢放於惡其大者則曰見性也吁亦是矣雖然爾之慈悲普濟而不以禮節之六畜蠢動一意是不知父子之可親而他人之可疏也親疏不别是夷狄也爾之報應而不以信守之一財媚佛則反禍為福是招權鬻獄汙吏事也爾之見性而不漸諸訓典左右如其真是赤子不得成人也見丹而丹見素而素不肯一御其心而之他率斯道則上不得正其下下不得忠其上絶其維而逸之野鹿焉疾子喪心焉孰謂天下國家也以是窮之而弗聽者是偶人也與偶人語尚何取其聽哉孟子有言曰男女居室人之大倫也雖聖人未之有異而浮屠何其介哉彼此盡䏻泊然以循其法者也惟人之愚父母徒惑其富厚安間捐孺子而奴之厥初未有知也既長而悔盍㱕乎無業以衣食也不得巳而終焉其心豈異人哉是鍾梵不足以樂怨曠奈何其欲隂陽之和也為禮不為財先王以是鑿人耳目中下之世人不知禮而利之圖雖在藝或可以貨取故囂囂者舉疑其上浮屠氏睨其機也又使之疑天地夫古之事上下神祗也惟天子二王周公後諸侯雖大國弗敢及因吉土而壇牛必在滌三月然後用齊明盛服惴惴唯恐其不稱也今浮屠掃民家而召之且贊之謁佛畫坐誦纍譯之言謂之加持吁孰謂天地之大而為一飲食若臣僕然乎蓋疑之者漸也善賊者必搏人之親愛而質之攻之則并殺縱之則幸而生孰忍以其貨故而血所愛也善贓者必誘時之貴仕而質之飾情以為廉借力以為勤一釣而得舉則負其藝而馳攻之則連坐縱之則幸而免孰敢以其民故而病貴臣也舉一人而刳剔億萬人其罪在此不在彼也戒之戒之無為賊子所質後之俗何其粲粲乎相高以富相矜以侈吾財之所可貿易雖國寶必用之財之不給帷帟粧櫛之不逮人則妻妾詬其無能女子羞泣不肯升車以嫁故民刑于爭吏禽于貪豈曰不愛身耻其不若人也正其禮謹其禁拔其僣本而域之于三代畜財千萬朽貫而無所施設或幾乎其廉且讓也婦人從人者也從之斯尊之矣卑其夫未有能從命也夫弱於外婦强于內下上其心而莫之制何所弗及哉舉天下而漸其風亂矣王化之存者幾何是故婦人于夫家不可不使之盡禮也必待其敵而後禮焉則周之女前嫁商而後嫁秦乎往者不可追來者不可期是無地而致婦道也然則何彼穠矣之詩斯妄言乎仁義曷居乎喪禮仁義之盡也今也求諸篇蓋彬彬焉而士大夫諱讀職教化者不以是病也遇哀而哀哀忘則巳賢者無以節不肖者不勉焉吁微三尺法幾何其不錦衣而舞柩也法禁怯而不禁豪禮則左右而勝焉知禮而違曰吾能不自愧乎知禁而犯曰誰敢言我雖然士大夫未見其尊親也夫燕雀必有啁噍之頃焉哀而不以禮是以燕雀送其親也周之季樂敗矣而夷音篡之流連遂至于今彼邪人者猶以為歉也又取而歌其淫辭音之動人也多矣而其言及牀第焉中材兒曹狂舞怨泣之弗暇人道于是愈無别矣忍人哉吾民何罪而以是蠱也吁仲尼弗復司寇矣是螻蟻不得飲血于兩觀也法言曰大人之學為道也小人之學為利也吾嘗策之矣為道乎實不待率也為利乎以利輔道斯嚮道矣誘之嚮道漢事然也察州郡辟公府句小吏賤人或勉為善也誘之違道近事然也不求其德而試其言冠緌之下或屠販之器也吁今之立乎道義之門者間人足音蓋欣欣矣善之夲在教教之本在師師者所以制民命其可以非其人哉古者家有孰黨有庠術有序國有學為民立師也學校廢師不命于上而學者自擇焉識不至擇不精是能言之類莫不可師也然則父儒而子墨朝華而暮戎不足怪矣嗚呼君子如欲化民成俗其照之末光乎野記二篇并序豫居東郊外耳目所得有可以為世戒者作野記二篇里之氓有慕都邑之侈者以其畜牛易人之乘馬既數嵗矣土田之腴舍牛而不獲倉廪菽粟耗于馬腹饑餓且不救而馬之能卒無益于甑釡噫今之絶故賤而友新勢忽講習而嚮奔走有不病其田而空其菽粟者乎春陽既作草之百名生于穹陵于絶澤于不迹之地霧雨所盥風氣所弄苗堅蔓驕生理自若舍是而入田畒者則根與稻爭潤葉與粟誇暖角長等碧疑過者之目農人之父病其為稼害也掘而去之不遺種火變水腐狼藉道側願為糞土蕪弗可得矣噫安爾類計爾材不自齒于嘉榖則奚禍之來直講李先生文集卷之二十終直講李先生文集卷之二十一慶曆民言三十篇并序慶曆三年屏居里中自念生而宦學其秉心也勞其慮事也多既不克進且為編戶以死終無一言其何補于世記曰上酌民言則下天上施故為慶曆民言凡三十篇開諱備亂審姦防蔽效實慮永謹聽辨儒廣意損欲本仁慎令考能止幸裁舉精課懋節崇衛省盜釋禁南略敵患柬士儲將逺私正局厚農復教孝原天諭開諱身莫不惡死而未嘗有不死國莫不惡亡而未嘗有不亡等死耳殤不若彭之夀等亡耳秦不若周之世壽雖髙而㱕之死世雖永而㱕之亡然而以死亡為諱者是不智也聞死而愠則醫不敢斥其疾言亡而怒則臣不敢爭其失疾不治則死或非命失不改則亡或非數是諱死而速死諱亡而速亡智者果如是哉故古者天子即位卿授之策曰慶者在堂弔者在閭誡亳社忌子卯惴惴唯恐如桀紂也鄙諺有之厲人憐王謂絞纓射股擢筋餓死甚于腫胞之疾嗚呼君人者得聞此言也則寢不瞑食不㫖尚何從欲之有乎備亂治之民思亂亂之民思治何也生無事之時身安而意侈刑弛矣急之則驚斂輕矣加之則怨力未嘗鬭自謂勇心未嘗謀自謂智知兵之利而未見兵之害小不得意則欲翼而飛矣故曰治之民思亂也處多難之世城者不肆野者不稼彊者僵于戰弱者斃于餓父母妻子劫束屠膾然後見兵之害而不獲兵之利幸而有主則將雨其槁矣故曰亂之民思治也思治矣雖中才可得其歡思亂矣非聖人不能弭其漸大禹之戒曰豫臨兆民凛乎若朽索之馭六馬故智者慮亂于治愚者謂治不復亂悲哉審姦盜之未泄也日與之接而不知其盜姦之未露也日與之居而不知其姦衣纓言動與人同而盜姦在其心知之固未易也及夫贓出械見刑殺于市而衆人皆知其盜謀行亂作國家敝敗而後世皆知其姦知其盜非衆之智由獄吏之讞也知其姦非後之賢由史臣之筆也觀書者睹曩時之禍皆笑其不知姦矣而不曰我之姦者亦待史筆而後知也漢元帝謂幽厲任巧佞自以石顯愈于彼故京房曰臣恐後之視今如今之視前嗚呼安得敢言如房者乎防蔽人主不知亂作者左右蔽之也彼豈不愛于君幸其滅亡耶蓋懼誅耳平居以佞邪席其身飬君之欲迎君之非君有問焉必曰安于泰山也然而亂且起國且危是昔者欺吾君也君一怒焉則死不待頃于是纊君之耳不使聞危亂姑緩吾死何暇慮長久也陳後主之沈客卿隋煬帝之虞世基勢驅之然曷足怪也故邪臣非不愛其君不得其事君之道也昏主非不愛其國不得其守國之術也不得事君之道者始不正也不得守國之術者終不明也若曰臣之愛君而終用之不照之以明則雖欲孝宗廟其如宗廟何效實官名也事實也有名而無實天下之大患也上弛而下偷文書具口舌給而信其行事是見駑稱驥而不考之千里也國不一官官不一事何從而得其實盍責之主者乎縣焉何實責之郡郡焉何實責之諸道諸道外也群司內也內外之實責之宰相宰相之實上觀之天而下察之人乎上觀之天隂陽調乎下察之人國富乎兵强乎百姓康樂乎四夷協服乎此不待下席而灼見矣責有所在罪有所當故曰四郊多壘卿大夫之辱地廣大荒而不治亦士之辱如是人人莫敢不自盡昔唐德宗不知盧𣏌姦邪蓋不思其實矣去四海之廣而投諸奉天非姦非邪誰使然也彼誠有所合合則信信則惑惑則非是而是非矣嗚呼君人者其亦慎其合乎慮永亡國之君不皆惡非桀非紂則所由漸矣漸者何也基禍于彼而受禍于此也天下之勢一往而不反若决河堤使東流也基禍之主外久安而內自賢道失于心而弗思權移于人而弗寤然祖德或未沒民心或未解故有幸而免也受禍之主乘亂得位名雖為帝治不在巳囚拘旒纊之下弗獲忠義之助故不幸而及也漢獻帝唐昭宗其何罪歟故明者舍近而謀逺無謂未足患將為子孫患彼具臣者寄位如邸舍幸當其時無事不暇念身後也人主為萬世計不可溺苟且之議禍不在身而在子孫既足動其心矣而况倉卒之可虞哉謹聽讒者沮善者也諌者抑惡者也名之諌者皆知好焉名之讒者皆知惡焉然而人主不免于信讒者讒似乎諌也愎諌者諌似乎讒也君曰可用臣曰不可用不可之辭同而情則異矣用君子而小人沮之是為讒用小人而君子抑之則為諌君子小人之心忽恍而不可見是讒諌所以亂也好諫而不慎則姦臣進惡讒而不察則正人退世有信讒則衆非之矣愎諌則衆笑之矣彼非狂易病惑豈不知諫之利而讒之害顧謂之諫者非諌謂之讒者非讒也太申曰有言逆于汝心必求諸道有言遜于汝志必求諸非道讒與諌皆逆心之物姑以道求之而巳不如是則貝錦之文或起于青蒲之上而刳肝瀝血未必不疑其間我也嗚呼艱哉辨儒儒者關治亂乎曰然用則治不用則亂乎曰非也用儒而治者有之矣用儒而亂者有之矣故儒得其人則為福不得其人則為賊以小人之質而被聖賢之文如虎斯翼固攫人于都市耳夫古之事多矣或同而異各有為去聲也小人用之則稱其一而隱其二以罔上而行私矣飾灾異則曰堯水湯旱而不曰宋景退熒惑解多壘則曰獫狁至太原而不曰守在四夷欲擅其權則曰舜德無為而不曰明目逹聰治不如古則曰帝王不相沿襲而不曰一變至道此類如物怪變化不可勝窮故助王鳯者數稱燕王蓋主以疑上心避諱吕霍而弗肯稱也嗚呼用儒至此是秦之湯火有不妄也廣意人感隂陽氣以生陽主動隂主靜動則為謀為慮為决斷為事業靜則為懈惰為因仍為逸樂動勝靜則昭靜勝動則聾理必然也升髙居廣出外行逺明視逹聽博覽詳問親賢臨衆講禮播樂如是者宜于陽陽得其宜則勝隂深宮重闈時坐數卧治容巧笑厚酒邪聲俳戲伎巧說媚譛訴如是者宜于隂隂得其宜則勝陽是故君子朝聽政晝訪問夕修令而夜乃安身非九女當御不得進鄭聲佞人舉放逺之懼隂之勝陽也五載一巡守至于四嶽每嵗祀天九祭地二明堂聽朔十有二孟春耕藉四仲教戰皆在國之外廟則有四時十二月之享社則有春秋祈報學則有合樂飬老之禮皆天子躬親之外朝則有三詢三刺大廷則謀及庶人欲陽之勝隂也夫心官于耳目耳目狹而心廣者未之有也耳目有得則感於心感則思思則無所不盡矣人臣飾其辨以誣上一降席則指為過舉是背經違古而閉其君之思也損欲形同則性同性同則情同聖人之形與衆同而性情豈有異哉然則衆多欲而聖寡欲非寡欲也知其欲之生禍也五霸莫盛于齊桓公以內嬖亢夫人者六竪刁以自宫愛易牙以蒸子幸終于五公子爭立死六十七日而殯七雄莫大于秦始皇以殿阿房葬驪山終于項籍燔其宫室牧兒燒其藏椁禍生于欲誠足畏也如使欲而無禍堯舜固為之矣何自苦如是彼多欲之君莫不自謂無禍恃四海之力矜一人之智以天地未足為長久而不知智力非禦禍之器也聖人寡欲故能得所欲衆人多欲以所欲奉他人耳孟子曰昔者太王好色愛厥妃文王以民力為臺為沼而民樂其有麋鹿魚鱉夫能損上益下與百姓偕樂其誰曰不可本仁術于仁者皆知愛人矣而或不得愛之說彼仁者愛善不愛惡愛衆不愛寡不愛惡恐其害善也不愛寡恐其妨衆也如使愛惡而害善愛寡而妨衆則是仁者天下之賊也安得聖賢之號哉舜去四凶而諡以仁聖湯初征自葛放桀南巢而仲虺謂之寬仁武王梟紂白旗而孟子曰以至仁伐不仁仁者固嘗殺矣世俗之仁則諱刑而忌戮欲以全安罪人此釋之慈悲墨之兼愛非吾聖人所謂仁也夫守國在政行政在人人不忠而亂乎政政亂則國將從之而且以不誅為仁是䡖國而重仁也故明主持法以信馭臣以威信著則法行威克則臣懼法行臣懼而後治可圖也慎令君出令而臣洱之何如曰下制其上也民從令而君改之何如曰上欺其下也上欺下則民心惑下制上則君權䡖民既惑則不聽君既䡖則不威上不威而下不聽其漸亦足憂也夫為令之弊有四初不審終不斷言者矜聞者爭也洪範有大疑則謀及卿士庶人卜筮彼作事不咨于衆慮不待盡而輒行使人有以詬病是初不審也日月之行則有冬有夏月之從星則有風雨謂政治不可從民欲耳彼有沮之則不計利害大小而遽改是終不斷也君陳以謀猷入告而順之于外曰惟我后之德彼議一事則夸以為功使其黨間而疾之是言者矜也秦誓曰人之彥聖其心好之不啻如自其口出彼聞人之功耻居其下雖善必沮是聞者爭也人主䏻知弊之所在則可以行令矣考能言一也而所由生者異或生于心或生于耳生于心者帥志而言言則必形于事生于耳者剽人之言施之事則悖矣故上不好言則利不在言言者皆志也上之好言則言可近利無志者亦言矣鈔古書略今文變白為素析一為二以希世願用一易其褐則言且忘矣何有于事而况偶句諧韻言非其言者豈足問㦲嗚呼天下皆以言進未能不以言取既取矣胡不試之以事事讎于言然後命以其官可也王制曰論定然後官之試此職也任官然後爵之以能而命也如是則無曠官矣止幸亂始于恩怨始于幸亂始于恩進非其人也怨始于幸有望而弗獲也選舉所以籲賢䏻而曰必多取則不肖入之矣賢者寡用之可盡而不肖滿天下用一不肖舍一不肖尚有怨矧用一不肖舍百不肖乎夫萬物以類動彼能是我亦能是用彼而舍我宜其怨也器玉者純于玉則碈知其賤不免于用碈則山石皆待沽矣有國者啓人之幸而欲人不怨人之類盡官而後可也傳曰民之多幸國之不幸寵不肖以敗其官不幸大矣而况怨且怒哉裁舉唯善能舉其類不善亦䏻舉其類以堯之聖而問諸朝歡兜共工尚相歎美矧郡縣之逺聰明所不接邪賢人在下位不使賢人舉之而必曰長吏長吏皆賢邪彼不肖之相好亦若賢之于賢不肖之惡賢固如賢之惡不肖好同而惡異也不肖位乎上而望其進賢難矣賢知賢不幸而非其屬又不得舉然則賢人不遇豈天命哉故責所舉之賢不若責舉者之賢舉者賢則所舉賢舉者不肖則所舉不肖一不肖逹而舉十不肖十舉百百舉千如此則剝道成矣直講李先生文集卷之二十一終直講李先生文集卷之二十二精課虞書三載考績三考黜陟幽明此百代常行之制也有功者升有過者黜無功無過者職其舊如是可以勸功而懲過世之考績則異于此無功無過者升是升不必功也有過者職其舊是過不至黜也功無益而過無損懲勸安在哉故妄庸人一出選部雖梏其手雖鉗其口而尊爵自至此董生所謂纍日以取貴積久以致官廉耻賢不䏍所以無辨也夫進人不問其功而問其久彼草木久則長大可用人之材不能日夜生息亦巳明矣三嵗而進一官是三嵗而材一變乎如此則牛馬走抑可以久而用之矣懋節使人以賞罰衆人之使人也使人以禮義聖人之使人也賞罰外也可去可就禮義內也一中其心天地四方無所逃矣有賞罰而無禮義安則可非濟危之具也誘之以賞利有厚于賞者脅之以罰禍有大于罰者利厚於賞則去賞禍大於罰則就罰叛國之利或厚於賞死戰之禍或大於罰有以動小人之心矣學以禮行以義交遊之讐尚復之况君乎杯酒失意尚死之况國乎名焉吾賞耻焉吾罰意氣感發非有令之者也世俗誠大壞矣學者為官不為道仕者為身不為君見得其虎聞喪去聲其鼠父子昆弟之詔告妻妾之耳語非富非貴如舉其諱上之人又從而啓之賞先於功而功不立罰䡖於過而過不改無事而祿有事而賞位孺稚輿貨財而後行則是祿為我有而事以賞傭也禮義既銷矣而賞罰且玩階之者其誰乎孔子曰君子學道則愛人小人學道則易使信矣嗚呼三代不可作安得六國之士而與歸乎崇衛圖國在忠用忠在力濟力在權力者兵也食也權者所以制兵食也忠而無力則忠非其忠力而無權則力非其力忠非其忠死無益也力非其力令不從也奬周室者豈特威文之忠齊晉之力也豈特齊晉之力霸王之權也無力無權則䂊讓一劍徒自快耳天下古之天下也而彊弱異謂秦曰彊者非也彼秦取以彊而守以弱罷侯置守是也秦亡積千載而天下之弱彌甚刺史郡守寄客于外兵非吾兵食非吾食以服人者三尺法耳一旦當事則刑罰鞭朴非亂賊所畏也授首且不暇孰為勤王哉義苟在焉胙之以國何害苟為不義陳勝吳廣豈嘗據大權也省盜盜不能禍天下而召天下之禍彼殺人以求食人固讐之安能禍天下盜既多殺既極讎者弗䏻報而後姦雄起焉盜者人之讎也而姦雄以誅盜為名是孝子慈孫夫婦之相哭者望之不啻如濯熱因天下之心收天下之權如此乃能禍天下人主知盜而不憂者以其舉錯非姦雄之刑也而不知姦雄不為盜故防姦雄莫若除盜賊姦雄不得盜賊之資則不敢起嗚呼殺人者人之賊而巳矣惡殺人者誠國之賊也釋禁與衆同利則利良民不與衆同利則利凶人凶人嗜利盜之所由興也山海之貨職在商賈久矣而曰屬之吏屬之吏則衆不得錯手足法重矣而利亦重法重則良民憚利重則凶人入然而董之以法是驅其為盜也彼凶人者豈曰死可欲而生可惡哉過在歆諸利而謂不必死耳不幸而幾于死則莫若為盜為盜又不必死也夫能弛其禁逹其利則凶得與良齒胡為苟免于兵刃間哉南略南北離合繫天下盛衰漢之衰則離逮晉而合晉之衰又離逮隋而合近者唐之衰又離逮宋而合距長江之固因中原之擾擾則自救且不給胡治于彼哉後雖有明王興彼業巳成彼守巳完非數十百年不可取此前事之驗也北擾矣而南又離離則米帛金錢之漕弗復􅘳淮而上如疾將病而絶之食耳此後事之憂也俗人皆以吳楚之兵弗如北而不知姦雄謀事常伺天下之衰當其盛時尚可論彊弱及其衰也雖曹公用兵弗能與孫權爭馬超韓遂在關西為後患故也然則如之何則可曰宿師樹賢以扼其咽然後可也敵患夷夏奚若曰所謂夷者豈被髮衣皮之謂哉所謂夏者豈衣冠裳履之謂哉以德刑政事為差耳德勉刑中政修事舉雖夷曰夏可也反是則謂之夏可乎愚儒之咤則曰彼夷我夏而不曰內自修內自修則德刑政事四者備當而後曰夏勝夷可矣是謂知彼知巳百戰不殆彼欲虛吾國困吾民應之以儉則國可富民可逸然猶不䏻是墮其術內也嗚呼夷夏非古之夷夏也先為不可勝以待彼可勝善矣不然禍且日至豈徒由余所笑柬士天下有攻守草昧之時攻天下者也繼體之君守天下者也攻之兵雖怯而勇乘勝也守之兵雖勇而怯未之試也不試巳然况敗歟夫戰在氣三鼓而竭曹劌所以克齊然而人不見勝唯敗是聞怯則宜也為政者務兵多以彊國而不知其弱國兵多則不擇不擇則大抵怯耳勇者尚怯况真怯哉驅十怯以嚮一勇敗不足疑言之者必曰某以若干敗於若干以為彼太公孫子勢不可校後雖勇士固心醉矣非弱國而何胡不芟其冗轉其資以厚敢死使以寡勝衆而後氣可復庶乎彊國矣儲將死生存亡在將將之難也百夫長猶不可虛矧其上者乎資舟于旱資車于水先事而求則詳以實驗也事至而求則粗以言擇也用人者皆曰以能不以行彼閭巷細謹誠不足問豈大節之可違哉孫子語將能則曰智信仁勇嚴不信而任事則事反不仁而御衆則衆殃如是而曰能不必行可乎矧彼言者又非能也以言擇將天下皆欲言婢兒庸保亦知誦書傳學計策以自進進者多矣可盡用乎兵蓋不祥之器學者未得其千一而志意巳壯壯則思用不用則聚而怨怨則無不為是有國者教之叛也獨奈何逺私晉侯以勃鞮用趙衰趙王以繆賢得藺相如皆奄人也謂奄之賤而能進賢何也曰賤故能進賢貴則疾之而巳矣古之奄給房闥使令蓋甚賤賤則雖賢人當國何害故進之後之奄為帝王耳目蓋甚貴貴則有威福玉食之罪婞然唯恐賢者之繩巳故疾之豈古之奄才而後之奄不才勢不便耳使勃鞮􅓎賢復生且不免為譛人夫非晉趙之時而垂晉趙之聽是賢者弗可得而不肖售矣正局周官內宰大夫士十有四人九嬪世婦妾御屬焉彼天子后妃猶以大夫士治之矧羞服匪頒好用之式而有不在有司者乎外自省寺重之以殿中六局所以奉乘輿者備矣顧奪而歸諸奄何哉有司奉法而奄人阿意奉法則用節阿意則欲逞此利害甚明白然而弗思者夫其殘民乎厚農先王之馭民也節其所為後王之馭民也極其所為夫惰之志在逸先王節之則不得逸農之業在勞先王節之則不甚勞宅不毛者有里布田不耕者有屋粟間民無職事者出夫家之征誰謂其逸哉什一而稅用其力嵗不過三日春耕則田畯饎焉秋斂則蠟祭息焉誰謂其勞哉王道消政出苟簡賦乎曰農役乎曰農田有榖而桑有繭非敢愛也五兵之用百工之材皆農無有而必責之是行商蓄家籍農之産廩農之食矣彼惰遊未始及于政且開穴食之路以進之逸者極其逸勞者極其勞勞而不二者戅而巳矣嗚呼使天下皆戅則可不幸而有心則群入于惰欲望九年之蓄難矣復教樂正以詩書禮樂造士王太子王子群后之太子卿大夫元士之適子皆造焉說者必曰為化民也為選賢也而不曰愛諸臣之子保諸臣之家也人不教不善不善則罪罪則烖其親墜其祀是身及家以不教壞也故明主推恩群臣必先教學與其寵于今孰若無辱于後不務教而務官之以市井言未學而仕其幸大矣智者慮之則為禍亦大彼不善之資而假之位鮮不及也嗚呼官者上之所䡖雖曠何損家者下之所重可不自為謀哉齠齓腰印組鼓篋齒庠序勞逸誠不同而禍福存焉耳孝原禮職于儒儒微而禮不宗故釋老奪之孝子念親必歸于寺觀而宗廟不跡矣夫祭祀豈徒自盡其心以交神明而巳蓋有君臣父子夫婦親疏長幼貴賤上下爵賞政事之義是謂教之本也彼寺觀何義哉嗚呼釋老不存則寺觀不屋非宗廟何適儒之彊則禮可復雖釋老其若我何天諭畏天者昌習天者亡何謂畏天髙宗成王是也何謂習天元成是也人之情非所常見而見之必懼懼必思懼之情同而所思不同明主思之以為在德德修而灾異消然後愈知天之明而德之益也暗主思之以為在數故任數而不修德德不修而禍未至然後愈知天無心而數有定也惟天之仁又出灾異以申勑之彼必曰前既無害此奚為哉亦數而巳矣灾異愈多不懼愈甚耳習于聞目習于見心習于思習之久則不聞不見不思焉耳然而上帝之怒不足獨當下延衆庶上纍廟社甚可痛也嗚呼人不可玩况天乎天而可玩君命何足道哉此孤臣正士所以泣血於地下也直講李先生文集卷之二十二終直講李先生文集卷之二十三記後學南城左贊編輯後學廣昌何喬新校正袁州學記皇帝二十有三年制詔州縣立學惟時守令有哲有愚有屈力單慮秪順德意有假宫借師苟具文書或連數城亡誦弦聲倡而不和教尼不行三十有二年范陽祖君無擇知袁州始至進諸生知學官闕狀大懼人材放失儒效闊疏亡以稱上㫖通判頴川陳君侁聞而是之議以克合相舊夫子廟狹隘不足改為乃謍治之東北隅厥土燥剛厥位靣陽厥材孔良瓦甓黝堊丹漆舉以法故殿堂室房廡門各得其度百爾器備並手偕作工善吏勤晨夜展力越明年成舍菜且有日旴江李覯諗于衆曰惟四代之學考諸經可見巳秦以山西鏖六國欲帝萬世劉氏一呼而關門不守武夫健將賣降恐後何邪詩書之道廢人唯見利而不聞義焉耳孝武乘豐富世祖出戎行昏孳孳學術俗化之厚延于靈獻草茅危言者折首而不悔功烈震主者聞命而釋兵群雄相視不敢去臣位尚數十年教道之結人心如此今代遭聖神爾袁得賢君俾爾由庠序踐古人之迹天下治則禪禮樂以陶吾民一有不幸猶當伏大節為臣死忠為子死孝使人有所法且有所賴是惟朝家教學之意若其㺯筆以徼利逹而巳豈徒二三子之羞抑為國者之憂此年實至和甲午夏某月甲子記建昌知軍􅈦記人得擇官久矣天下唯股肱郡簡于帝念其餘在所欲夫食飽居安人情所不免故分田之廣狹公膳之有亡官舍之􅍇惡凡仕者鮮不以為言建昌軍距行在三千里浮汴淮江湖不幾月不至吏巳祿縣官無古圭田之比厨無子錢以勞賔客屋數十個蓋僞李氏時作其夀將百年度制卑陬尤不稱事是以當世髙足之人聞之憮然莫肯為來有不幸而至者什不一二過此則物故不容于它取自竄焉政以是尨民以是創秋陽炙天井底或凌噫匪夷匪蠻匪海山瘴蠱之地獨無富侈之資以奉俊良使永永來為人父母誠可歎巳今虞部張公其不幸而至者乎公本于質直而文無害嘗治四郡左官是邦惟思昔人必葺之義乃更浮橋遷集賔亭作回車院而本􅈦及焉􅈦之築土方五丈架梁三十有五尺取材于山因役于軍蚩蚩斯人不費不勞自春徂夏厥功以濟民不有勞惟公之勞公不有利惟民之利有問焉者必告之曰官舍美矣則其去就之心宜稍異于昔所謂民之父母或數來其為利豈少哉草茅生請書以見意慶曆七年六月丁巳記建昌軍儀門記觀古君臣之間近則禮為之厭逺則尊得以伸故畿外諸侯門阿之制與天子凖宮隅城隅各下一等天子五門諸侯有三門臺而道屏于中為宗廟朝廷大抵不甚異蓋南靣之君分土而治不若是無以貴于一國民知其君之貴然後知王室之尊堂陸之言亦此類也自罷侯置守于今幾世弱權削威居無常人有地數百千里而宫室輿服靡所張顯唯中門立㦸非出入不開東西兩夾門趨走之士紳笏磬折于其外非召呼不敢前以此異于他官舍謂之儀者有意也哉太常博士吳公使建昌既視事曰神人在上萬事有經萬民有業吾守臣布行詔書奉順德意而吏職修矣披牒治訟若人四支雖終日運動不為勞心乃行府署唯廳事葺其餘屋古老卑小或如翼覆地其中無光或如衣之敝隨𥙷隨破郡治所在而陋于一邑不務改作俾民何觀謀于僚屬其心同聽于輿人其言樂自儀門始以及內寢不日而備君子謂吳公以文學進宜其知治道父兄皆大臣其耳目固不隘官為博士宜用心于禮位當刺史在可行之地此一役也以儀門為始夫豈徒哉盍書之以示後覯應曰唯慶曆八年冬十一月甲子記建昌軍集賔亭記康定二年夏六月太守慎公作新亭于軍門之南越孟秋工告成事郡人李覯請為記曰惟兹軍築于閏唐額于吾宋同之列郡數十年矣然規摹儉固未始斥大雖視事有􅈦罷休有堂而僚屬之所㑹賔客之所交以宴以遊舉無其地公臨郡數月政既巳成事既巳省因謀别館以為賔榮詢諸耇老則僉以郡署之前昔嘗有亭號三善者毀徹雖久基兆可指公乃相其地而築之且取籍沒之材以足其用不賦一錢不役一丁而厥功以成飛飛其櫩角角其楹逹以重關周以階櫺姑山右顧積翠在掌旴水前來鑑裏萬象乃位賔主乃列尊爼有緌有紳以笑以語心澄欲仙意逺還古噫誠太平君子好事之一端也然民隱之不恤主恩之不宣而汲汲于厨傳則何以為政室漏之不補庭草之不剪而區區於簿領則何以為禮合是二者蓋鮮能焉今公之所治多務大體明而不苛斷而不酷得政之和公之所居罔不必葺作而不費飾而不奢得禮之至兹亭之興率是道也栗栗其威如風之凄民之服之千里弗違煦煦其仁在物為春民之戴之千載如新召伯聽訟勿伐其棠矧茲攸宇其誰敢忘君命不駕匪夙則夜敢圖兹石以告來者南城縣署記慶曆二年㑹稽錢得臣仲基以大理丞為南城宰西安周夢臣旻臨川滕平叔夷甫佐之于是改作主簿尉署及縣􅈦之兩翼既訖功得臣受命刺白州夢臣監雩都銀冶而平叔考且滿使覯記其事覯曰古者諸侯卿大夫士其宮室以命數為之等示民有尊也今之郡縣有社有民雖九品僚屬皆命于天子其勢固不得居陋室如閭閻氓然世以土木為難事者財民之財力民之力也是以廉吏善人或憚而不為乃至隘不可容壞不可支卷席避雨露坐迎凉者有之矣吾邑三君子以居之所不安為人之所難為捃官之餘用假吏之餘力木材如涌而民不出一簮築作再朞而民未嘗舉趾非奢非儉可次可舍事成而去豈曰自為蓋將壯官府利來者是可記也若夫舞智恃巧陵民匱財巳欲佚而忘人之勞巳欲樂而遺人以憂則有識者當伐鼓于其門豈吾之所得記哉謹用斯言諗于好事時則五年春正月也邵武軍學置莊田記慶曆七年春三月幾望武陽假守宋公以治學宫成識之巳詳後三甲子有竒教授龔君與其學子授使者以幣走三百里謁於余曰敝邑得天故吾公來昔昏以旦昔寒以燠視人如其身視學如有神言必于是行必于是雖牒訴盈庭簡墨在前而與士大夫講解對問猶燕居時故自庠門開不幾月慕焉而來者不絶將恐𥚹小弗䏻容又翼中門築兩齊矣鄉之善良喜公之為子弟之有屬也不愛其資願易土田以備糧用凡出泉若干萬得田若干頃嵗食若干人既有成矣而公之記所未書吾惟子之望覯聞命竊商之曰儒者詬釋氏為其籠于世也而不解其所以然釋之徒善自大其法內雖不韙而外彊焉童而老約而泰無日不在乎佛民用是信事用是立儒者則不然其未得之借儒以干上既得之則謂政事與文學異孳孳唯府史之師顧其舊如蟬蛻及其困于淫辟恤乎罪疾欲聞性命之趣不知吾儒自有至要反從釋氏而求之吾遊江淮而南不一日有庠序者不一邦踵其地而問之棟宇修歟或曰為去官之舍館矣委積完歟曰充郡府之庖廚矣刺史在歟曰某院參禪某寺聽講矣噫釋之行固久始吾聞之疑及味其言有可愛者蓋不出吾易繫辭樂記中庸數句間苟不得巳猶有老子莊周書在何遽冕辨匍匐于戎人前邪蚩蚩之氓尚克有夫婦父子不盡拔髮為寺奴則幸矣何暇彼之詬哉今宋公之仕唯其本之培下應其誠優為之備教化之效也如此吾所謂學非若釋夸莊嚴吾所謂田非與釋埒供養誠以今兹學者或自逺來居處不寧則愁飲食外取則勞去愁與勞人雖下中得以自盡于術况其卓者哉厲文之津茁道之芽入可以正其家出可以表天下為民教子為國養材莫之尚巳龔君以道藝立其中又欲楊公之美于無窮皆應于義敢不書公之學問無不該而其是非一之聖人故文辭可法施于吏道民大恱蓋將揮之廟朝一郡一學乃其粗聞命後三日冬十月辛酉書云䖍州柏林溫氏書樓記南川自豫章右上其大州曰吉又其大曰䖍二州之賦貢與其治訟世以為劇則其民氓衆夥可識巳雖然吉多君子執瑞玉登降帝所者接跡䖍無有也疑其偩南越襲瘴蠱餘氣去京師愈逺風化之及者愈疏乘其豐富以放于逸欲宜矣故人許某家石城䖍屬邑也此年夏踵豫門道其鄉進士溫某之為人曰溫君少時求祿而莫之得慨然自謂不得諸外盍求諸內不在吾身宜在吾子孫乃圖山泉美好處奠居柏林因作講學堂房數十其楹攻位之日獲五銖錢五萬于地士友珍之或以青錢名其館凡書在國子監者皆市取且為樓以藏之性寬靜用地利自足不與俗人爭訟買直孳孳以教子弟禮賔客為巳任琴歌酒賦夜以繼日許君不妄人也今其所稱與嚮之疑者不類是䖍之福歟自古聖人之德業舉在于書聖人者非其智造而巧為之也天之常道地之常理萬物之常情也天地萬物之常而聖人順之發乎言見乎行事君得之以為君臣得之以為臣父得之以為父子得之以為子兄得之以為兄弟得之以為弟夫得之以為夫婦得之以為婦長得之以為長幼得之以為幼反是則爭奪相殺未有能巳者也今溫君聚書勤勤是有意于聖人有意于聖人則豈一家而巳鄰里鄉黨庶乎偃伏之矣然則䖍人之成大名至大官蓋未易知尚何吉之愧哉柳子厚于楚越間山水如小丘小石潭袁家渴石渠石澗猶有記以啓好遊者今有人為藏書之樓非特山水之勝記之以啓好書者不亦可乎豫欲一至欄邊四顧天外江山進前文史相對清風兮我扇白雲兮我蓋召屈原于湘魚之口呼李白于海鯨之背漱寶玉之餘潤拭明珠使去纇酒酣興盡交揖而退其樂可言邪而未之得也皇祐五年秋七月庚子記麻姑山重修三清殿記覯幼時讀顔魯公麻姑仙壇記觀其稱道瓖地之殊絶人物之瓌怪目想其處謂如鈞天帝庭非下土所髣佛也及長遊山縱觀所有則歌吟雲烟饜飫水石而巳其餘古屋數百楹或腐或濕無足可居惟仙若神何以顧享噫物有愈衰而後復理之常也則所謂三清殿者今為復之先乎按是殿之作背山嚮陽得地之正由五代迄兹載祀逺矣雖其營繕頗甚盛壯而木窮于蠧瓦困于雨日壞月墮幾將壓焉頴川陳公某鄉之耆德勇于為善一見其事惻然于中乃發家財以葺之工之巧者必至材之良者必備或改以新或完其舊昔撓以隆昔卑以崇赭焉而霞烘堊焉而雲溶真儀之位得以如禮山英水靈若喜若慰雖大道之要本乎淡泊安在土木之華而後張顯然名山之景列在圖籍非有遊覽之盛不足稱述故言神仙者必曰崑崙之墟海中洲島宫闕之侈視珠玉不啻如土芥世俗相承以為美談若麻姑山著稱久矣元和辭人白樂天輩咸有詠歌粲于屋壁自爾以來言者溢口書者滿牘天下靈境兹不後焉苟非崇飾棟宇嚴事上靈其何足觀之則頴川公之意豈徒然哉覯之視公大父行也見命為記謹書其略于時嵗在辛巳大宋康定二年重修麻姑殿記三代之英既往禮教不競人欲大勝欲莫甚乎生惡莫甚乎死而道家流誦祕書稱不死法以啖之故秦漢之際神仙之學入于王公而方士甚尊寵然或云延年或云輕舉皆人耳目間事久而未驗衆則非之矣佛之徒後出而言愈幽逺其稱天宫之樂地獄之苦鬼神之為非人可見雖明者猶或疑焉是故浮屠之居貨賄竭天下宮室僣王者而黃冠師窮智役辨終弗能及自非當世好事慕方外之遊者孰克回靣于真靈之境哉麻姑之名聞之于葛稚川傳申之以顔魯公記峩峩兹山得道之所始也自唐而下祀禮不絶築宮度人以嚴其事而殿屋之設歲月積久雨淫風虐撐拄弗暇將無以布几席陳香燭為鸞鶴戾止之地群目蚩蚩莫肯營救故頴川陳君策字嘉謀博識之士肥遁州里頃嘗遊山周覽及是將命工徒一新其制言未果行而卒其子今山陽司寇諫弟詢不忘孝思盡禀先志乃出家資以幹厥事斬木而山空伐石而雲愁役不逾時營繕以畢修廣有度奢儉有宜禮神之位兹亡所愧論者謂真帝在上庶方無虞嵗不凶灾物不疵癘故其人得厚本節用為富家者往往而是內和親戚外禮鄉黨餘力乃以奉釋老求善祥兹亦平時之盛觀也可無傳歟巖巖有堅請勒其志于時歲在辛巳大宋康定二年麻姑山仙都觀御書閣後記皇祐三年以御書明堂及明堂之門篆飛白二體藏諸名山麻姑仙都與焉夏六月道士黃太和為覯言今者聖人肆筆而山藪得之其奚翅金簡玉字蓋猶嵎夷昧谷天象所出入撮土勺水罔不光華非復與塵俗等幸哉願有志焉以示後何如覯伏思念王者制作史書樂歌幽則物魅逺則夷貉耳者必聞口者必誦安在愚儒識之况禮不斥尊其可以犯巳而又念江南卑薄與上國人不日接異時故老既沒傳聞將失實史官記注祕莫得見則吾君之行禮彼山之受賜曷從而知之先正盛公亦嘗為御書閣記所以述太宗之事殆可繼也矧兹嚴父配天古之大事漢收秦燼失其根萌冉冉至唐名在實去五代魚肉誠所不暇祖武宗文志亦未集佑啓我王及此希闊如廢斯起如斷斯續合符天鬼匪自群議禮明樂備又申之以翰墨河圖大訓永以華國周公宗祀而文字無傳宣王搜𡵨陽而石鼓非手書未有華實相副若是之彬彬者也昔漢武帝封泰山太史公留滯周南不得與從事曰命也夫乃者季秋大饗而知其說者有不在焉則謂之何尚從仙宇見是寶書抑天幸也故就敘其語俾刻之云真君殿記峩峩西屏神之山下根無地髙出天百靈有位有几筵樓殿靡迆紘紫烟真君之名世所傳來斯為賢去為仙玉京路險不可攀凡肉欲飛無羽翰崇堂設像鼎以新再拜恍若登天門借問經始其何人吾邑陳侯字仲溫後十五嵗維甲申李覯泰伯為之文直講李先生文集卷之二十三終直講李先生文集卷之二十四太平興國禪院什方住持記佛教初由梵僧至中國不知其道而務駕其說師徒相承積數百年日言天宮地獄善惡報應使人作塔廟禮佛飰僧而巳厥後菩提逹磨以化緣在此土始傳佛之道以來其道無怪譎無刓飾不離尋常自有正覺思而未嘗思故心不滯於事動而未嘗動故形不礙於物物有萬類何物而非已性有萬品何性而非佛佛非度我而我自度經非明我而我自明無緇素才拙一言開釋皆得成道繇兹立大精舍聚徒說法以衣鉢相傳授居無彼我來者受之嗣無親踈能者當之諸祖既沒其大弟子各以所聞分化海內自源而瀆一本千支群居之儀率從其素故崇山廣野通都大城院稱禪者往往而是庸俾邪妄無識洗心從學王臣好事稽首承教蓋與夫老氏之無為莊周之自然義雖或近我其盛哉然末俗多敝護其法者有非其人或以往時叢林私於院之子弟間門治産誦經求利堂虛不登食以自飽則一方之民失所信嚮矣通人髙士疾之兹久而未克以澄清逮宋有天下兵革既巳息禮樂刑政治世之器既巳完備推愛民之心以佛法之有益也廣祠度衆不懈益勤聖上蒞阼體聞釋部之缺因詔凡禪居為子弟前旅有者與終其身後當擇人以主之意將補鏬漏鉏榛蕪使宗門愈髙大則建昌軍太平興國禪院復什方住持者奉此制也院按舊記唐天祐丙子制置使陳暉所創號顯源永興始有可幽師杖錫來居推輪法事逮李氏僣江表其别子景逹以齊王守臨川乃命德琳師以張大其業琳師道行峭潔知解雄俊圜回千里瞻仰弗暇樹稼數十頃立屋纍百楹至太宗時例以年號更賜今額衆安法行剎此邦者莫與為等琳既化去道喪不傳而其徒以僥幸居之垂四紀矣凡鄊之學釋者雖知有真乘法印當迷而疑何所扣决今年夏主者元皓病物故時侍禁馮君德宣光祿寺丞李君虞卿同權軍政深惟天聖詔書求可以長是院為人師者粵有桑門上首耆老識逹之士相與謀曰嘗聞建安崇儼師得法於石霜楚圎和尚巡禮所至學者圍繞師避而處行今在邇抑可以致之乎因列名以舉郡然其言乃就迎于撫州景德院讓不可得而後至升堂之日㑹者萬計師據牀安坐有問斯答如鐘之鳴如谷之響重昏宿蒙氷解雪釋歡喜讃歎洶動街陌論者謂國朝嚴佛事俾釋知識表于禪林太平郡之福地也而儼師以正真道臨之燈燈繼照曷有窮巳然非吾儒文之不足以謹事始而信後裔僉來謁豫曰文子職也其可以辭重違父兄意故為之一說時則景祐三年秋九月也太平院浴室記釋氏東行乘風御霆山聞海驚言善言惡知死知生天人之好地獄之暴有作斯報刑淫癸辛力過羿奡維彼慈悲如童蒙師如膏肓醫還愚以智解囚於縲伊貴伊富或士或女承流蹈舞涵淹肌髓繫絡心膂何土敢皮何木敢枝以輦以歸繩者目亂斧者手胝彌國亘野川邪谷哆筆不可畫雲霓出中日月走下冬溫夏凉為隂為光食甘寢香百事有備一物必良惟天之啓惟神之契人不得議孰為禮經肯顧文吏江之南城風和氣靈鐘鳴梵聲爰有禪居號稱太平太平之聚儼師是主以訓以撫疑者得明饑者得哺堂房以新器備以陳霞朝卉春唯是溫室缺然將榛大冶陳宰儒兼佛解法與心㑹斥其餘財成此勝概材美石堅重雕復鐫圭方璧圎下不居濕旁無見賢遍天吾願釋子母意于水將意于理爾身以澡爾心以洗洗心謂何匪塵匪沙匪刮匪摩去尓羡欲任爾平和無可不可所遇皆我萬物一馬何者為因孰謂之果道不離人吾身佛身吾僞亦真門前舟梁自失要津慶曆之嵗是維戊子月云窮紀野夫言焉以振厥始建昌軍景德寺重修大殿并造彌陀閣記儒失其守教化墜于地凡所以修身正心養生送死舉無其柄天下之人若飢渴之于飲食苟得而巳當是時也釋之徒以其道鼓行之焉往而不利無思無為之義晦而心法勝積善積惡之誡泯而因緣作空假中則道器之云戒定慧則明誠之别至於虞祔練祥春秋祭𣏌之儀不競則七日三年地獄劫化之辨亦隨而進蕃衍光大繄此之由故嗣迦葉者師子逹摩流為東山牛頭傳龍樹者惠文惠思熾于夫台灌頂二家之學並用于世若夫律戒之盛凡出家者當由此塗按白居易撫州景雲寺律和尚碑文如來十弟子中優波離善持律波離滅南嶽大師得之南嶽滅景雲大師得之師南城人初隸景雲寺徙洪州龍興終廬山東林度娑婆男女萬五千人姜相國公輔顔太師真卿本道廉使楊憑韋丹皆與友善樂天之敘如此南城於宋為建昌軍景雲為景德寺律和尚之迹巳無見土木之堅久者唯殿與門殿之制不靡而其材良乃今所無基髙而旁裸入風雨者四靣如一將恐腐折後難為功寺僧義明乃營屋若干柱以翼之且作彌陀閣于其前右兼壯與麗為永永計先共謀者文憲宗正既而憲住他院正亦遂輟克有終者唯明殿之財集于衆閣成于孀何氏始卒凡八年明講經論頗喜事以雅于豫來乞文因論釋之所由興亦使其徒知此寺昔嘗有僧為律戒師于江之南度人以萬數當世賢者與之遊以為寺之榮而有所慕焉慶曆七年冬十月已末記景德寺新院記院墟于火力弗䏻復者數年矣壽安縣君黃氏以其夫故都官陳員外所服若器斥賣以濟之其所謂殿堂及諸棟宇之切于用者罔不備具此誠念死者之不可見庶有益于冥冥間也凡大精舍之焚相望于天下浮屠人難去聲言其灾乃以為宮室之􅍇天神所欲得故取以去且佛之說諸天之樂非人間所可髣佛是以其徒布因求果願生彼界今乃恱人之土木而奪之則是人間之美物諸天亦無有尚何足慕邪而悠悠者或信之餘燼未寒新宫巳圖往往是矣兹院僧固不辨不䏻飾其說以驚俗殆廢不起非陳氏之喜事而壽安發之何以及此嘉祐三年九月庚午記回向院記皇祐二年夏六月旴江大水龍安其東南鄉蓋菑之所自始視其山破壞如擊甕盎泄所畜百源一道且怒且鬪斬大樹瀦大屋當之者父母妻子回面相失不得其尸以斂于是有去平而就髙以避其復來者回向院其一也院之墟曰兵湖民寰而居甚卑以喧當水之來則數十百家悉聚殿閣坐甍騎桷將顛者數僧徒嗷嗷乞命魚鱉既免院主海元即其儕為久安計有德文者願易之髙燥地謂其别墅曰升平相距五六里盍經營之文守律戒知遊藝士君子多與之語故列于官府而從諗于里人而恱貧者輸其力而地以除富者效其資而屋以徹斂故材就新基曽未踰年厥功備具足之泥塗今為崇髙耳之喧囂今為寂寥後山如懷前溪如蟠晨鐘夜梵夢寐天半松霜竹月繡畫秋色自危而安去苦得樂昔人未知勝事在我噫民之欲善蓋天性然顧無以道之爾夫水潦之後田里傷創斗粟百錢上農蓄家且無餘食而文師以其情言非能取佛說以自照耀使人惑之而衆莫不竭盡以受事若夫豐富之世而豪僧辨口先焉雖圖天宮何足怪也為人上者常病于教化謂不可為亦過矣昔吾逰其地今聞有成喜之是以記時則三年秋某月也承天院記慶曆中歸自京師有僧來訪曰自堯是為承天上首乃言其院吾先君子嘗至焉今兹又新作往往有留題者因責吾為詩厥後多故不果應近者復來且介秦氏甥以院記為言覯伏念先人舊遊不勝燕雀啁噍之情其僧又喜事吾甥又貧而為之請義不可拒問其所由來則舊崇德院為尼媪宅間籍沒當太平興國中有德琳師迹其事為蓋古所謂豪僧者自閩來旴住太平院徹草廬成大禪居是時禁令疏釋氏方騁與民交利琳致資甚髙得請公上以崇德故名遷于雲山淳化三年斬山木營繕使其徒元立主之大中祥符元年先帝封禪例賜今額立死堯繼之于時景祐三年瞻相闔門鞠為老屋木之腐者將折石之裂者將墮不有改作誰嗣前人願與有力者圖之誠意一發和者日至曰殿曰堂曰僧堂曰水陸堂曰羅漢閣曰厨曰庫曰廊曰門始終數年繪素畢備于事勤矣而耻無聞故徼吾言以永之噫浮屠人坐新宫享備器者皆是然而知子墨翰林之為貴者幾何人邪或蹙于威力而後貨俗子取陳言以辱金石者豈少邪堯師䏻不憚煩以來乞詩不獲又屬以記傍吾親戚間求人為言唯謝絶之憂其指何邪安知百千萬年後吾文將不行邪彼蚩蚩者將有聞而堯師泯滅耶皇祐三年冬十有一月乙丑記承天院羅漢閣記吾為承天院記巳二年丘文遂來言院之羅漢閣身所為也願復得一辭刻之始吾童子時與令佐著作陳微之讀書湖上丘君乃其鄰以久遊貫人事日與笑語無忤及此見之髮色則異而顔面益壯使之年實七十矣少為賈人上下百越走兩川而歸克有貨財治土田築室教子孫終之淑慎以從士大夫遊又䏻精信于釋損其􅑿以補之果若釋之云則雖老而死死且復生其得意何有窮耶噫漢代初傳佛道西域人得立寺都邑以奉其神漢人皆不出家魏亦循漢制石季龍僣位以其出自邉戎應從本俗百姓有樂事佛者特聽之當是時謂之何哉外國之神而巳及東晉宋氏其法乃大蓋慧逺居廬山名雖為釋實挾儒術故宗少文就之考尋文義周續之通五經五緯而事之雷次宗亦從而明三禮毛詩儒者嘗為弟子其人得不尊乎諸部佛經華藻爛爛豈西域之文宜有所助焉者也今之釋樂乞言於文士者亦將借助矣乎文士不必有古人之才足以埤釋就令有之而民耳目日異矣庸可行㦲丘君以舊故勉而為之言時則皇祐五年秋七月也新成院記出旴江門陸行數十里無善邸舍足容食息求之僧家唯章山其庳則新城院焉前此豫歸自信時秋大熱夜發金溪日昃不到從者請息肩得兹院以宿下馬據牀汲井泉飲且盥清風在竹不待呼召紅塵在路不敢隨入坐未安定意巳順適仰而視其梁則毛姓繢名者作焉有頃而繢至其禮甚卑立于堂下若吏民見官長之為豫既辭因揖而進之與之語蓋古力田敦朴之流及院之本末則對曰殿興于開寶中則繢之王父母嘗有勞焉堂鐘樓廊門成于景祐康定間則繢與婦徐實同力焉豫嘆曰民財有餘不以備鬪訟買直于圄犴而能奉佛法徼福于窈冥斯世俗以為難矣况于卑已尊賢此道甚大誰宜知之凡人衣食足者或聞馬蹄聲在百步外閉門唯恐不及今吾亦布衣姑弛檐于此且無一介與爾相聞爾何取于我而拳拳若是乎吾無乃克謹名節未始得罪于鄊黨乎抑爾之聞見有異于衆人乎既嘆而去五六年矣而不忘于心近者豫有喪繢又使其子來賻辭益遜意益勤顧無以答遂録嚮所言者贈之使刻石為新成院記云時則皇祐三年冬十有二月也元祐辛未轉運副使張商英天覺過新成院題詩云昔讀旴川集嘗聞泰伯賢新成文刻在往事野僧傳氣格終驚俗光芒合貫天田翁不知價只得十千錢宣和庚子朱褒世德自國門待次還鄉道過新成院讀泰伯先生記張丞相詩欣歎久之恐丞相未知泰伯之志也作絶句題于後云泰伯文章自昔傳虹霓白日貫靑天先生欲作酕醄醉㪷酒何妨受十千撫州菜園院記浮屠師曰可栖居建昌之交陽山善持其佛之法而言行不安且長于醫故士大夫禮之慶曆三年秋八月來祗豫曰栖臨川人母固無恙而異父弟亦學佛今住菜園院曰智賔者是也兹院之廢數十年矣寶元中其鄉人請于邑大夫願得智賔居之賔之來則四顧梗莾無一瓦尺木之業栖告之曰吾常患吾佛之徒將逰吾州而未能進必休于近郊之逆旅乞錢炊食雜于博徒倡女間甚汙吾法今兹院與城相望果能興之以舍吾徒豈不滿志矧吾弟主之而吾母居其旁足以躬晨夕之飬外張吾教內便吾家是不資他人吾力可為由此盡散槖中凡醫之所得者給之說法者曰堂事佛者曰殿館僧有位具饌有所大抵墻屋器用皆栖之為也工將畢矣幸為栖志之豫曰浮屠人盡心于塔廟固其職耳能不以禍福誘脅殫吾民之力者蓋未之見今栖以醫售其得財乃自奉其法而不掠于人且厚其弟以安乎母不離吾孝友之道言乎其黨抑可尚已故書以授之使揭諸石云修梓山寺殿記天下名山水域為佛墜者什有八九其次一泉一石含清吐寒粗逺塵俗處靡不為桑門所蹈藉蓋佛之威靈赫赫于世僧之辨慧有以得之故國不愛其土民不愛其財以割以裂奉事之弗暇建昌軍江表之上遊也地靈源長筆不可譜由治城東走十餘里峯者如引岡者如頓渟者影毛髮噴者化雲霧其間據形勝起塔廟者往往而有梓山院乃其一焉道阻而僻遊從之士罕至目不睹紛華耳不聞勢利惟松君竹侯鼓舞風韻猿悲鳥哀將送嵗月宅于是者苟有以存諸心其安穩何如哉然殿宇之作其來積久築者以圯蓋者以坼莊嚴不充瞻禮無地軍教練使吳臻家故饒財心且喜事由景祐中始謀營建凡立屋四楹塑像九軀所以奉經教福祖考也噫佛以大智慧獨見情性之本將驅群迷納之正覺其道深至固非悠悠者可了若夫有為之法曰因與果謂可變苦而樂自人而天誠孝子慈孫所不能免也則斯殿之成與吳氏之用心亦可嘉巳見屬為記其何以辭時則歲在辛巳康定二年秋九月也邵氏神祠記李覯曰天子之祀曰泰厲諸侯曰公厲大夫曰族厲謂古之有天下國家而滅絶無後其鬼無歸故與人為厲耳江南地熱濕四時多癘疾其病者謝去醫藥閉門不與親戚通而歸死于神神之號名則曰某王某王無乃所謂古之有天下國家而滅絶無後者耶當其氣盛而病革禳祈不可解則皆謂神曰五通者能有力于其間故牲毛酒滓狼戾于五通之室矣建昌治城北有民邵氏世奉五通禱祠之人日纍什百景祐元年冬里中大疫而吾家與焉乃使人請命于五通神不能言决之以竹杯校時老母病不識人妻子暨豫相繼困甚唯五通諗以無害疾之解去皆約日時雖寶龜泰筮弗是過已噫五通之為神不名于舊文不次于典祀正人君子未之嘗言而有功于豫其可以廢巖巖者石可伐可磨惟德之報焉知其他直講李先生文集卷之二十四終直講李先生文集卷之二十五序皇祐續藁序覯慶曆癸未秋録所著文曰退居類藁十二卷後三年復出百餘首不知阿誰盜去刻印既甚差􅍝且題外集尤不韙心常惡之而未能正于今又六年所得復百餘首暇日取之合二百三十八首以續所謂類藁者噫行年四十四疾疹日發作其于文字間尚克有進也歟續藁凡八卷時又有周禮致太平論十卷孤行焉皇祐四年八月庚子序延平集序世俗見孔子不用而作經乃言聖賢得志則在行事不在書也噫孔子誠不用矣堯舜禹湯時聖賢有不得志者乎奚其為典謨訓誥哉成王周公時有不得志者乎奚其為雅頌哉心之志志之言言之文若凍餒然孰謂得志而不衣食哉用之大其言者愈大虞書之歷象日月星辰夏后之賦貢九州周人之職三百六十官不巳大乎今之君子固多靳儒至於布衣閭巷尚曰賢者行而巳不必文也彼顔閔氏時夫子在蓋無可復言非為有德行不著書也遊夏之徒不在德行科亦不措一辭子思孟軻豈無德行乎是皆不才子無功于文而雷同此說以自慰耳建安宋貫之仕逾二十年用雖不大志亦未得然有君親之奉有政事之勤在他人投筆久矣而貫之拳拳不翅褐博其學要諸仲尼餘鮮取焉多聞而敏所嚮靡不克故集而行之者四五去年秋以南劍監郡假守昭武既期又成十卷目以示覯曰延平集覯嘆今人之異乎古美貫之之異乎今孰告吾君而大用之其言又有大于此者因序以冠其首時則慶曆七年冬十有二月也送余疇若南豐掌學序工必以般者為其材巨木作寢廟也彼環堵則何工不可御必以良者為其策天驥逐光景也彼一駑則何御不可師必以孔子之徒者為其驅善性入訓典也彼曲藝則何師不可今天下號多士而南豐大邑也讀儒書者蓋百數薦于鄉第于廷往往有之大理丞周君出宰之一年乃立學于先聖之廟命吾友余堯輔掌其教夫周丞之明豈曰邑之人未嘗學且師邪若是則服大袂之衣與令長抗賔主禮者何自出也是其有學有師久矣然猶汲汲于斯者其將以先王之道浴而薰之耳其將使其聞仁義忠信之說知夫古之所謂儒者如彼其大也然後進可以治乎國退可以齊乎家出乎已而加乎人罔不曰宜者是周丞上為天子育人材下為一邑减爭鬪之獄也不然何地不可居何人不可法何必縣學之興而堯輔教之耶堯輔好古博學慷慨有行義斯足以應周丞之指惟學者何如耳至之日以吾言告之謂之是耶請在下風以賀謂之非耶敢因是而弔焉故為序送嚴介序景祐中建陽嚴君以經術有名客授于兹邑豫時多故未始與遊而見之者數矣一别不相間今兹復來乃知其久于江淮間自楚徂宿所至為人師以親老故歸養焉善㦲昔申生不行而死君子不以為孝章子得罪于父出妻屏子而孟軻禮貌之必不得巳以情恕可也嚴君在外二十餘年蓋亦不得巳者矣舜號泣于旻天負罪引慝見瞽瞍瞽亦信順之唯聖人能以至誠感動其親嚴君嚮時既不能感動然而人情老且病則憶念子孫雖有忿怒宜自消釋嚴君之歸養此其時也若是則經術之名固不謬其為人師益無愧矣至和元年秋八月丁未旴江李覯序叙陳公燮字陳公燮初字思道以避耆舊諱請改焉豫命之曰中道夫道者通也無不通也孰䏻通之中之謂也居東焉則逺于西南焉則逺于北立乎中則四方均焉故易曰黃中通理凡卦以得中為貴兹聖人之意也有問身之安者必對以導飬也有問食之美者必對以牲牢也言不可不先其大者也病偃于牀而不肯納藥石曰人教我以導飬矣可乎餓踣于地而不肯受糗糒曰人教我以牲牢矣可乎緩急之勢異也古之言王道者是亦先其大者也後之執王道者是以䡖藥石賤糗糒病餓且不救者也王莾亦嘗井田矣房琯亦嘗車戰矣豈不取笑孔子謂微管仲吾其被髮左衽而曰無道桓文之事者過也荀卿之非孟子略法先王而不知其統太史公論儒者博而寡要勞而無功亦有以也吾觀夫子之行如天焉其變化非凡可測於鄉黨恂恂居是邦不非其大夫對問陳以爼豆至為司寇㑹夾谷時則不同也謂賜也億則屢中由也不得其死至存父母之國則使子貢惡言不入于耳則取子路使二子生乎今之世則暴人也詐人也掌教化者將不齒焉其何髙第之有哉夫子多能鄙事以博奕為賢乎巳辭人之作或因于物或發乎情雖不有用幸愈乎博奕也而俗儒必非之五子之歌韻矣繫辭首章對矣使今世為之將以聲律坐矣禮有本末用有先後本末副焉固醇矣有其本以慢其末古人或不免焉略其本而詳其末今人豈少哉雖然自治可也父兄之于子弟師之于徒亦可也欲以區區之有而齊天下之人汰哉見人一動作一笑語衣冠裳履之間則斷夫賢不肖張目大言以不恤彊禦為烈此今人之敝也道之不行蓋儒者自取之秦燔書漢鈎黨使典章淪陷人士闉厄到今恨之豈惟在上者之過有由然也夫知道者無古無今無王無霸無治無亂惟用與不用耳公燮自閩來學志厲而材美庶乎其有成閩之後生多好學者或傳其文有可愛恱而未獲與之語因公燮請字而教焉且使之歸以告敘張延之字張君延之解官鉛山遇我于葛陂神清氣和其言語可聽雖一面知其非俗子以立字未善責于我我應之曰所謂延者于兒豈不欲延其年以及耄期邪于家豈不欲延其寵祿世世無有窮邪如是無他力于仁而巳矣孔子有仁壽積善餘慶之說夫仁天下之美道殺身尚為之矧夫嚮勸甚明歷觀前志多有效驗可不務哉故字之曰伯仁酒困不能執筆姑告其略叙陳司理字豫章陳君名世南南方之卦離離者明也字之曰公明明之義廣矣哉其在天也為日為月為星為晝為暘在水為止在火為燎在金為鑑其在人也為視為思為智為文為見善為知過為應變為待時事親明則孝事君明則忠治事明則姦無所容聽言明則讒無所入臨財明則貧不失廉臨難明則死不失義凡天下之事未有不須明以濟者也然而聖人約之以道曰蒙以飬正明夷以蒞衆貴乎明於內而晦于外也陳君公相子孫克守家法儒雅幹正久次無悶斯有得于明者矣故敘以告至和二年冬十二月戊子旴江李覯序直講李先生文集卷之二十五終直講李先生文集卷之二十六表謝授官表臣覯言今月十九日建昌軍進奏院遞到敕牒一道官告一道伏蒙聖恩特授臣將仕郎試大學助教者畎畒之中耕鑿殆忘于帝力蓬茨之下絲綸遽捧于王言身未識于九重名巳參于一命閨門交慶鄉里知榮臣覯中謝伏念臣生長荒陬世家寒士徒際恢儒之運􅍝懷榮古之心四十無聞早畏仲尼之戒三千奏牘終慚曼倩之才嘗策足于上都願刳肝于詔舉過蒙嘉惠首命試言繄遼豕之自矜奈齊竽之有辨馮衍之孺人稚子皆笑歸田周顒之芰製荷衣遂成習隱自兹潜伏何可覬覦豈期天幸之來偶被藩臣之薦深虞纍氣難用升聞快炙美芹敢望獻尊之賞油雲霈雨俄瞻旱稿之苗雖釋褐之有光然事親而甚便不離鄊井巳脫民編斯蓋伏遇尊號皇帝陛下道貫幾深仁兼煦嫗時文再郁將令三代同風多士巳寧猶恐一夫不獲故兹狂簡亦預采收敢不䖍奉訓辭益敦學行庭闈是戀幸申為子之誠犬馬未衰庶有報君之日啓謝范資政啓右覯昨奉制命授前件官草茅之愚久不謀于仕進雨露之澤俄下及于賤微俯伏承命銘感在心竊念覯門地孤寒智識遲鈍學問近三紀奔走遍四方昔者充賦報聞而罷數年退居閉關却掃老母日見皓首稚子未能應門苟非躬親難得衣食况思戴記啜菽盡歡之訓且畏魯經逺逰有方之誡出疆載質自知不諧修身俟死亦何敢怨伏遇某官以周召左右之賢當申甫蕃宣之任棄席疲馬不忘舊物菅蒯憔悴必欲兼用特形慰薦備聞朝廷致此妄庸亦蒙齒録夫冗散一官品秩至下在他人視之則䡖然衰族得之巳幸稍殊編戶便可安居敢不秪承惠貺益進學藝大鈞播物非久具瞻蟠木為器更當有望仰企牆仞下情無任感知荷恩激切之至寄周禮致太平論上諸公啓右覯啓伏以王者之法人必有業梓匠輪輿則當通功易事瘖聾跛躃亦以其器食之故終日無所用心孔子以為誡􅢟斯賊夫糧食楊雄之所惡覯也蚤以薄祐不能及時上乏騏驥千里之力下無鉛刀一割之效退藏山野日就衰老雖然用農夫之榖分工女之帛既得以不死而無益于人平生技能唯在筆硯矧可不勉竭其狂愚伏惟明公嘗以文知今也敢以文請十數年來篋帙所存瑣瑣著述不復有獻謹録周禮致太平論十卷塵于下風世之儒者以異于注疏為學以竒其詞句為文而覯此書於注疏則不異何足謂之學於詞句則不竒何足謂之文惟大君子有心于天下國家者少停左右觀其意義所歸則文學也者筌蹄而巳日月光明固不待燈燭之助至於豐屋之下幽室之中照臨所不到處雖銖油寸蠟豈無頃刻之功邪聖人在阼賢人在庭而小子言焉庶有補於萬一也臨啓慚惶何所逃責直講李先生文集卷之二十六終直講李先生文集卷之二十七書上富舍人書舍人執事士之不見禮于世久矣古之君子以天下為務故思與天下之明共視與天下之聰共聽與天下之智共謀孳孳焉唯恐失一士以病吾元元也如是安得不急于見賢哉後之君子以一身為務故思以一身之貴窮天下之爵以一身之富盡天下之祿以一身之能擅天下之功名望望焉唯恐人之先己也如是誰暇于求賢哉嗟乎天下至公也一身至私也循公而滅私是五尺竪子咸知之也然而鮮能者道不勝乎欲也今夫卜相下藝先民之所不齒者也而所居之室重冠纍蓋名卿大人引領而願見若饑之食焉以其能言己之禍福故也士之能言天下國家之禍福而未嘗有人欲見焉門未入而閽人拒之者有矣謁既上而辭以事者有矣或貌若恭而情不在焉或言雖交而意不通焉遇之以常人問之以常事一靣而去有如道路吁可怪也彼卜相之言禍福受之天而不可變者也雖其知之無益于事士之言禍福在乎人而足以有為者也幸而聞之則禍可轉而為福危可復安亂可復治兹有益之大也貴無益而賤有益為一身而忘天下果其人之忠且賢邪有志之士果宜瑣瑣于其間邪覯逺方之人弛擔都下再期月矣惟其山林之狀而魚鳥之心懼取辱于形勢之塗非舊相識曽未敢踵其門將求夫有古君子之道者而為之依㱕尚未能也今者友人董士廉自陳之秦相遇于道既稱執事之德髙出于世且言誤聽嘗得區區之姓名有與進之意伏而思之以執事之負雄材得美仕是于其心靡有所不足矣而以草茅之微置在齒牙豈非有古君子之道以天下為務而急于見賢者乎覯雖非賢焉敢自匿故兹浣濯衣冠請問左右竊念覯資朴不美其生三十餘年所務唯學所好唯經于當時之文誠未有以過人者至若周公之作孔子之述先儒之所未逹歷代之所不行者嘗用功焉其志將以昭聖人之法拯王道之綱製為圗書以備施用明王有作舉而措之四海之內庶乎斯民之復有知也不幸寒餓之鋒劫而去之有懷未果中夜長歎今兹箱篋草具略有存者旅窮無資弗及繕録執事若于暇日賜之從容當挈其一二陳諸座隅必有可觀者矣吁古之所謂知己者信其道也非徒利其身也不然何山之深而不可廬何水之廣而不可魚著書傳道求聞于後世不猶愈于碌碌食衆人之食乎不宣覯慚汗再拜上劉舍人書舍人執事伏以今之學者露其才業日干於兩制之門者誠以輕重斯文進退多士遇其知則朽株為春華咈其意則夷路為太行故書不憚手之胝言不恤脣之腐拳拳俯伏于下風唯恐不得請也覯誠愚暗竊謂不然且吾君以兩制為賢使主天下之士士之得失天下之本繫焉得一士為天下利繄兩制之功失一士為天下害繄兩制之罪不得罪于君將得罪于民不見非于今將見非于後賢人君子有位有名其肯舍功而趍罪以自貽愧耻哉如是果才邪雖未嘗識靣其必不棄矣果不才邪雖日拜乎前其必不取矣則有志之士何足屑屑于其門哉故自弛檐京師于今纍月足迹罕及名卿之堂者為是故也然今日所以請見于明公者蓋亦有說伏念覯生江南去明公之居不數百里自成童巳知讀明公之文辭矣繼聞决髙第效美官立朝廷正色直言磊磊有烈丈夫之氣小人不佞抑好義者也聞古人之風恨不得見况今人之得見而可不請見乎惄如于心為日久矣昨值明公銜命北方往來數月及節旄之至則抱病邸舍倦于趍走幸今有間輒塵點賔次生平所著貧無𥿄筆弗及自陳明公試引之座隅徐觀其用心可也伏慮左右不察以覯為趍利而來者敢奉書以為先不宣覯恐懼再拜上吳舍人書舍人執事覯家江南結髮學問讀古人之書竊慕其所為而不可得見將求今人之似古者而宗之蚤瞻莫望唯恐弗獲天聖中聞執事以進士舉為太常第一詞章卓異風動逺邇腐儒老生骨醉心死時則見執事之才其後數年天子修先帝故事親策賢良而執事褎然為舉首推考經術以戴翼世務疑亡闕補言到聖處時則見執事之識居山寥寥去上國三千里望風長懷無路請謁有如衰根病芽棄置幽谷雖知有陽春之和皎日之光不得與尋常草木並受其賜歉然于中積有年矣今兹竊幸詔舉茂才州郡不明以妄庸人充賦弛檐以來博聞髙誼心馳門闑若渴于飲故擇令日塵點賔次重念覯性質無似不䏻與時世爭利捐造化之術而甘于寂寞之道行思坐誦垂二十年其志幸一試用就尺寸之效以章其身千載之後不與碌碌者同泯沒為凡鬼于地下聖人當天俊乂雲合有志如此豈敢自必執事當世儒首言重蓍蔡可稱邪為天下稱之可進耶為天下進之不敢求哀以犯公義所業策論五十首謹獻諸左右潤色之暇稍賜觀覽千萬幸甚不宣覯再拜上王內翰書內翰學士明公覯江湖凡人生得至愚之性天以六經群言煨燼之餘以成其愚而不與白雲淸泉衣食之奉以養之家貧事親漁釣樵斧不足以具甘㫖朅來人間學習世務續鳬之脛久而無成今兹聞國家求賢良文學之士蒙不知今竊况于古謂版築飯牛之微或不為時君所棄因出草廬從州郡之舉乞錢為食陸走三千里西嚮轂下京塵冥冥勢利相軋既貧且病財不能以備簡墨力不䏻以事趍走弊衣徒行僮僕楚語誠難以候閽人之顔色以附名卿之熖也非夫烈丈夫抱義慷慨不好苛禮者安能為覯之地哉伏惟明公盛德大名震曜四海仕者學者以為依歸矧曩昔之幸嘗一拜于門下今日之來不敢伏匿自絶髙義輒請見于賔客之後明公亦留意乎所業策論五十道姑飾其藁以籍手應用之文未免蕪纍觀其大略可也生平著明堂定制圖一道并序平土書并圖三道皆繩先儒之誤以章聖人大法施諸儒林粗可稱述舊本漫滅未敢自陳暇日一垂問焉當指畫于座隅也質野之人言無遜避惟䡖其罪而巳不宣覯再拜與章祕校書祕校章君足下昨暮枉駕告以東南行徒步不能送别豈任依依覯初未相識每與丘思語頗得足下之為人及問歐陽校理益信之他日足下顧我于邸舍氣和而言正其辨說駸駸到義理憤世疾惡有大丈夫之芒角此固不待觀文辭而後知其業也噫昔三代之人自非大頑頓盡可以為君子何者仁義禮樂之教浸淫于下自鄉徂國則皆有學師必賢友必善所以養耳目鼻口百體之具莫非至正也足下生今世教化風俗既無可道况在公相貴富之家非愚且諛孰肯辱于門下是所與居者又可料矣而能自立如此非天資超然異于衆人乎夫將有為之士常喜其類蓋類同則志合志合則力并力并則事可行功可成禽邪人獵邪道或掎或角庶乎有備也覯不肖承足下之風歡慰無極詩曰是薦是蓘必有豐年抑強勉而巳矣吳越美山水出囂塵臭處而居之者飄飄若仙去然其人物愈衰少安定胡先生瑗往來于其地思古人而不得見姑從之遊可也逺道慎飲食以適親意幸甚幸甚六月五日旴江李覯白上江職方書知郡職方執事覯伏以新進俗儒樂遊貴常之門者莫不有求也或崇飾𥿄筆以希稱譽或邀結勢援以干薦舉或丐祿粟之餘以免困餓或借成柄之末以欺愚弱奴言婢笑情狀百出上之人以其求之私也作為關鍵唯恐拒之之弗絶耳其間雖為有道義而來者亦多以是疑之疑之不釋則所以待之之禮與衆無異故好古潔廉之士拂衣逺遁羞與薦紳相聞者可勝道哉覯小人世宅田野上天哀憐以古人之性授之讀書屬文務到聖處其言周公之作孔子之𫐠蓋多得其根本漢以來諸儒曲見蕪說頗或擊去以此著書數萬言矣不幸少年繆計屢乞鄊舉求而不得祗自穢汙今兹行年三十餘固知非矣方將削迹塵路屏居林藪張皇本心洗滌外慮未明者明之未備者備之使三代之道珠連玉積盡在掌上所大願也若夫毁譽用舍計之巳熟譽邪惟天下自譽之覯不求譽也用邪惟天下自用之覯不求用也懷姦攫利所弗忍聞頭斷胸裂直氣不死故常望形勢之塗而不欲一舉趾以趍進于其中誠恐以常人疑之以常人待之則遊河蹈海不足灑耻近者訪舊吳越倣徉而㱕竊承明公以儒學吏術作鎮于此因念今二千石當古諸侯之位而覯幸得尺寸地在治下為居人苟復耿介自異不能一至門左以謝仁政則失所以事邦君之禮輒敢策羸馬襲弊衣以貽閽人羞伏惟明公聽其言察其意知其非有求而來者則覯也可無悔矣不宣覯再拜上慎殿丞書知郡殿丞執事覯伏以佩有青幨有彤生善殺惡為天之工斯士之甚通策無馬呼無僮衣麻食菽于山之中斯士之甚窮于戲以勢言之則弗類以道言之則無間故吳公之治河南而賈誼薦陳蕃之守豫章而徐稚禮風流未逺學者稱之今兹請謁敢以藉口竊念覯郡之衣冠家也數十年來祿禀中絶天恤私門不惜中和一㸃氣造為蕞爾之微躬生年未幾不喜他習惟文惟學如哺如乳媚于耳目貫于心胸蚤夜專一其樂無算勝冠以還蓋有成矣其或刮簡含墨騁騖文苑金無礦堅玉無璞頑尋英取華所嚮皆得至于仁義之淵禮樂之源顧嘗吞吐堯舜揭厲商周先代諸儒或有慚德雖州郡齟齬莫肯聞薦而縉紳先生當名路者多賜賞激謂非凡人以此自信若當大任且貧且賤不怨不悔上事老母旁無昆弟乞錢為食來往江湖零丁孤苦積有年矣今者竊嚮明公以賢人之業仕聖王之時激昻朝著指取郡寄惟兹桑梓輒枉旌斾雖壷漿之迎曽未至止而愛民之譽樂善之稱隨風北來襲滿人耳此誠有志之士剖堙鬱祈顧遇之秋林澤雖廣豈敢伏竄謹與諸生奔問羈靮前之所陳固失謙讓但以渦沈俗間幸遇明哲不䏻自言誰為言者郊次煩猥非敢願見視事之後惟賜接納乃問乃聽驗其所有苟復碌碌與常儒同則靣欺之罪委于吏議可也不宣覯再拜上楊屯田書知郡屯田執事竊以唐有天下垂二十世明皇文治之盛也而燕公佐之宋有天下今數十年真宗文治之盛也而文公佐之二公之才相似其遇時得君樹功立業亦復不異然燕公既沒而均垍從僞隕其家世文公既沒而執事之名籍甚當代其故何哉愚以為至忠大節抑姦與正王家所賴天鬼所信惟文公有焉傳曰君子善善也長惡惡也短善善及子孫惡惡止其身以文公之賢其後世固當得志矣况執事聰明多識剛中能斷為儒有學術歷官有政績蓋如孔子之後而生伋文中之後而生勃宜夫士大夫服膺之弗暇也覯草野之人未得仕進頃因薄逰每聽髙義前年冬龍圗髙平公在㑹稽嘗以尺書來召且言執事監郡留意講學促令見之屬以窮愁多故辦裝不早及其至彼則執事西行且數日矣高平公一見深以小人不得侍坐于長者為歎羇旅之心悔恨多矣昨者還鄉竊聞車騎布惠兹土且以水陸之逺才數百里敢求寧居以咈所願謹正衣纓來伏賔位恭惟執事之明必有所以待之之道矣生平志業未敢自陳苟賜從容當稍布于左右䡖犯明哲伏深愧畏不宣覯再拜上聶學士書省判記注學士執事伏以哲人既沒禮樂失其師而竒袤戰之雅正大潰遺音舊器殘破略盡典經所志什不存一儒其服者莫肯暫寄目於其間將何以格天神召和氣隂陽之錯行風俗之不修職此故也吾王以一統之大再造聖法與民惟新爰募儒林俾言大樂詔下之日有識慰抃然古道廢久能者誰何執事才兼萬人心照億載聲音之道蚤所詳明因與一二君子專制其事歷時未幾改作大備諒巳韻莖英之啞起韶夏之僵后䕫足蹈于幽墟師曠耳傾于鬼部朝之鴻碩疇敢措辭覯江南賤夫行年二十八矣唯學古喜事其志𦦨然竊聞朝家興復治世之作第恨其身不獲齒廷臣之末得以升太廟侍圎丘聽八音之發不徒破堙鬱洗邪辟抑以觀先聖王所以應天感人其法度何如也所懷未果嗟憤何極雖然姑願一拜先生之容側聆至言以辨大方因以卜已道之臧否幸亦多矣昨始至都下蓋曾候問僕人然卒未克吐其區區今兹是用有言于左右執事其亦少留意乎覯嘗以明堂者古帝王之大事也而去聖久逺規模莫見周禮考工記大戴禮盛德篇禮記月令室個之說參差不齊繇漢迄唐老師大儒各執一經相為矛楯有國者不知所以裁定遂使布政之宫缺而不立雖有作者皆取臨時處置非復先王之法象覯謂周禮大戴禮禮記皆聖人賢人之所作述不宜輒有乖異反復思念則三家所指制度果同但立言質略意義弗顯訓傳之士泥文太過遂成派分故嘗挾而正之决而通之不以文害辭不以辭害意三家之說坦然大同堂室之度靡所回惑的的然如見成王周公享帝視朔朝諸侯于其上因作明堂定制圗一道并序約五千言非執事博古知變不牽于世俗之論則不能以别此書然恐計府少暇重以煩暑未逮熟觀之謹先以所著潜書十五篇野記二篇禮論七篇塵穢几上試加一覽可粗見其存心苟不以菲薄而棄之時因休沐曲賜甄問則當奉法官之議鋪陳于席次然後足以盡其才謂其善則薦之可也譽之可也其未至者則教而成之固儒師之職耳羇旅貧困無𥿄墨傭寫之資止于具草本而巳伏惟仁賢略其常禮而鑑其苦心幸甚幸甚不宣覯恐懼再拜上葉學士書省判學士執事覯生江楚間始數歲竊習其家書見眺董公孫之對問决科皆所以發天人之祕而彌縫國家之務漢往而唐聮幾百祀雖治亂相變而異人時有其稱得士之盛者率由是道及稍長鄉先生教以速化之術則謂當今取人一出於辭賦曰策若論姑以備數因歷觀場屋得雋者誠皆聲病靡靡之文而巳借有材之髙識之通以祿仕故不敢放其絶足越邪徑而趍大道腐儒愞筆喜幸多矣私心憤疾往往竊垂義士之涕將恐古道萎絶不能復萌芽至年十六時聞禮部奏貢士之可者賜第于殿廷所得多當世豪俊而執事之五策實流行于天下募其本而觀之則審刑政之㑹逹權利之變將以富國便人而納之于禮義良今日之急務而衆賢之所未知者也其辭典而贍其意正而通洋洋乎古人之風復歸於筆下覯雖不肖用是感激竊喜囂譊流宕中亦有賢士大夫毅然執戈刜淫辭而遵理道者重遇主上之明有司之公擢致髙等足以風四表而移士心矣自時而後積十餘年遊目于書肆則熟執事之文采侍坐于先進則飽執事之治聲窈然如望梧桐之宫聽鳯凰之鳴徒知其諧和中律噰噰盈耳而雲霧隔之終不克一見其容狀不意今兹旅食都下而執事方在省局門牆伊邇有請見之路是用上問興居以適所願昔人有言曰唯賢知賢小人不敢自稱道顧可以當執事之知乎伏念覯草茅匹夫受性不甚魯唯其心志耿耿不忍自溺于流俗為學必欲見根本為文必欲先義理晨夜探㔉力盡弗巳而州郡不肯薦鄉黨不見稱年近三十隕穫日甚昨者因謂京師忠賢所萃策試亡私奔走西嚮將覬覦其萬一未及弛檐而貢舉巳罷矣羇栖輦轂兩經晦朔親老食盡又當㱕寧踽踽而來恓恓而返士林不鑑其道有位不知其名背仕進之門而復入于寒餓之水火此亦烈夫好義所宜惜之也生平為文謹擇其二十四篇寫成一冊及所著明堂定制圖一道并序草具其副塵諸左右蒞事之暇時賜觀覽足知覯心之所存焉冒黷威重伏增慙怖不宣覯再拜上李舍人書修撰舍人執事洪惟天之清地之淳矞雲膏露所禀無幾甘泉紫芝僅承其餘是故其正氣也升之則為神降之則為賢神所以造萬物賢所以治萬物其致一也賢人之業莫先乎文文者豈徒筆札章句而巳誠治物之器焉其大則核禮之序宣樂之和繕政典飾刑書上之為史則怙亂者懼下之為詩則失德者戒發而為詺誥則國體明而官守備列而為奏議則闕政修而民隱露周還委曲非文曷濟禹益稷臯陶之謨虺之誥尹之訓周公之制作咸曰興國家靖生民矣自周道消孔子無位而死而秦嬴以烈火劫之漢由武定晚知儒術至今越千載其間文教一盛一衰大抵天下治則文教盛而賢人逹天下亂則文教衰而賢人窮欲觀國者觀文而可矣吾君接三后之遺烈對皇天之駿命身居九清橫制四海獷俗庭而兵革偃年榖豐而禮讓作太平盛事漸而無纇繇是下明詔戒文弊抑末世之流宕復先王之炳蔚方內豪傑翕然承風援毫者悉本三代遊談者羞聞五霸始自薦紳逮于韋布盡雍雍如也雖然羽者必有鳯毛者必有麟文章之囿則宗主存焉伏惟執事以大臣子知聖人道策名天階從事冊府竒辭高識日新又新潤色之任拾取如芥誠將輔君政而主師教四三皇而七六經固蒸人之宗王而學者之指南也竊念覯家于江表生而嗜學誦古書為古文不敢稍逗橈行年二十八未獲薦用于時謗讟益多窮困益甚恍然自疑其業之非是輒敢决正于左右未知蓍蔡之仁肯錫之一言哉謂之是則區區姓名當由此而顯謂之非則齒少氣盛猶足以改習然則謂執事為文章宗主而指南于學者良不虛矣生平為文謹采其二十四篇寫成一冊及所著明堂定制圖一道并序草具其副辱諸侍者演暢多暇一賜觀覽千萬幸甚千萬幸甚藪澤庸微干犯崇貴曷任畏罪不宣覯再拜上宋舍人書修撰舍人執事覯不肖竊謂文之于化人也深矣雖五聲八音或雅或鄭納諸聽聞而淪入心竅不是過也嘗試從事于簡策間其讀虗無之書則心頽然而厭於世觀軍陳之法則心奮起而輕其生味縱橫之說則思譎詭而忘忠信熟刑名之學則喜苛刻而泥廉隅誦隱遁之篇則意先馳于水石詠宫體之辭則志不出于奩匣文見于外心動乎內百變而百從之矣諒非淳氣素具通識旁照則為其所敗壞如覆手耳韓子有言曰儒以文亂德豈謂是乎然則聖君賢輔將以使民遷善而逺罪得不謹于文哉有周而上去古未遠而濬哲時起以綱領之彬彬之盛如天地日月不可復譽其大而褒其明也至于漢初老師大儒未盡凋落嗣而興者皆知稱先聖本仁義數百年中其秉筆者多有可采魏晉之後涉于南北斯道積羸日劇一日髙冠立朝不恤治具而相高老佛無用之談世主儲王而爭誇姦聲亂色以為才思虗荒巧僞滅去義理俾元元之民雖有耳目弗能復視聽矣賴天相唐室生大賢以維持之李杜稱兵于前韓柳主盟于後誅邪賞正方內嚮服堯舜之道晦而復明周孔之教枯而復榮逮于朝家文章之懿高視前古者階於此也不意天宇之廣頽風未絶近年以來新進之士重為其所扇動不求經術而托小說以為新不思理道而專雕鎪以為麗句千言萬莫辨首尾覽之若遊于都市但見其晨而合夜而散紛紛藉藉不知其何氏也逺近傳習四方一體有司以備官之故姑用泛取瑣辭􅍝舉無如之何聖人之門將復榛蕪矣所幸明后在阼賢臣在位慨然興念思遏其波凡曰有識孰不抃慰然詢于輿人則僉謂執事與禁掖數公謀救斯弊用心最切至覯僻逺之民也獲聞是語信之不疑誠以執事負大才業角馳英俊之埸疊為天下第一遭時結主坐致嚴近苟協咨同僚翊起正道鑿吾人之胸而㱕以中和之氣固其職矣雖然世俗之仕難以道諭易以名誘誘之之術不在辭費胡不于廣衆之中擇其好古知道有出于人者浴其塵垢被以羽翼使奮飛于天衢庶夫聞見之者知所勸勉乎記曰以義度人則難為人以人望人則賢者可知矣若必求德行如顔閔文學如遊夏者而後取之則是待飛兔腰裊而乘車也伏惟稍卑其論而聽小人之請覯家于南楚生二十有八年矣自總髮讀書羞以耿耿之心為流俗所昏醉開卷執筆輒欲窺見古作者之狀貌為之浸久非敢自謂有所得然其用意不為不專矣家貧親老弗獲祿仕或怒其介或笑其迂左排右擠溝壑是虞今兹旅食上國日聞高義不慙賤陋奉纍閽守必欲招延雋傑激勸頑鄙顧可以隗為始乎昔牛竒章見稱于韓吏部而名遂籍甚退之非僧孺所可跂及也然而所以稱之者急于教道欲其行之者多庸兹奬勵而巳耳今覯雖不才抑猶未肯與僧孺等列執事不為退之之事則巳若其為之幸少留意焉嘗所著明堂定制圖一道并序其意在贊明經義以埤益一王之盛禮天門祕邃未敢通獻謹繕其副陳諸座隅并以雜文二十四篇録為一冊繼用塵瀆潤色多暇時賜財擇是所願也志切言直有犯威尊俯伏待罪不宣覯再拜上范待制書知府待制執事覯嘗聞之鶡冠子曰賤生于無所用中流失船一壺千金始猶未信今乃知之嗟乎古之為士者何其顯榮哉身弊緼而寵踰華衮腹藜糗而富埒千乘故有以南靣之王而擁篲于匹夫公子國相而執轡于羸老兹戰國之事尚未足法漢有天命四履之逺化戎為華而猶求賢如不及州郡察焉四府辟焉一介之善無敢漏略縣鄉小吏名汙賤者也翼之而仕角之而朝者往往有焉此無他蓋有國者慮下情之壅遏得人以快耳目當塗者畏曠官之罪以舉賢為稱職習俗相尚氣熖薰灼而然也故于時能言以上多自琢飾閨門為仕進之階鄉黨乃榮名之路奬助風教夫豈小歟厥後古道不逞辭科浸長為士者何其顯榮哉身弊緼而寵踰華衮腹藜糗而富埒千乘故有以南靣之王而擁篲于匹夫公子國相而執轡于羸老兹戰國之事尚未足法漢有天命四履之逺化戎為華而猶求賢如不及州郡察焉四府辟焉一介之善無敢漏略縣鄉小吏名汙賤者也翼之而仕角之而朝者往往有焉此無他蓋有國者慮下情之壅遏得人以快耳目當塗者畏曠官之罪以舉賢為稱職習俗相尚氣熖薰灼而然也故于時能言以上多自琢飾閨門為仕進之階鄉黨乃榮名之路奬助風教夫豈小歟厥後古道不逞辭科浸長不由經濟一出聲病源而海之以至今日矧惟真帝在上皇天乃眷太平之根穩貫坤厚四鄙酣寢無雞鳴犬吠之警法令流暢罔或抵牾役夫賤類馳一乘之傳則足以呼舞諸侯矣三尺童子據案㺯筆則足以斬决強梗矣不待偉人深智而職事巳治故雖浮華淺陋之輩率為可用聲律取士孰不曰宜學小則易工利近則可欲貟位有數而求之者多國朝患其或私謁也于是糊其名易其書混致于考官之手固不知其立身之行幹蠱之才雖有仁如伯夷孝如曽參直如史魚廉如于陵一語不中則生平委地况執其柄者時或非人聲律之中又有遺焉薦于鄉奏于禮部第于殿庭偶失偶得如奕棊耳名卿大臣以其無舉知之責也閉其口不復言天下士俯視同術疏若秦越養威重崇愛惡管庫之隸灑掃之僕皆得以保任而惜一言以舉遺逸雖然好古潔廉之士寧忍饑而死耳安能仰靣以希其咳唾于戲學道之無益也如此夫宜其腐儒小生去本逐末父詔其子曰何必讀書姑誦賦而巳矣兄教其弟曰何必有名姑程試而巳矣故有縑緗凝塵不記篇目而致甲科帷薄汙辱市井不齒而諧美仕勸善懲惡將安在邪萬一史臣示書法於後世則赤墀之下當有任其責者矣噫非大賢君子其曷能矯之覯建昌南城人也生二十有九年矣齠齓喜事以進士自業摘花蕊寫雲煙為世俗辭語頗甚可取愚不惟道之隆替時之向背輒遊心于聖人之藴志將以堯吾君羲吾民晨夜精思頗為有得視闕政如已之疾視惡吏如已之讐恨無斗水以洗濯瑕穢四顧悲歌時或涕洟然而命薄計拙動成顛仆鄉書之不録况爵命乎孤貧無依載其空文走南北楫焉而川竭蹄焉而路窮嘗遊京邑凡時之所謂文宗儒師者多請謁焉但伏執事之名時最久矣謀之于儒林則又謂執事表知樂之士有自褐衣而得召者如覯等輩庶可依㱕不幸未及弛檐而執事以言左遷時異事變卒無所遇倣徨而㱕又黜鄉舉身病矣力窮矣仰喜朝車適留兹土故不逺五百里犯風雨寒苦來拜于廡下古之君子居易以俟命不患人之不巳知今覯也踽踽而來若行賈之為者其故何哉伏念家世貧乏幼孤無兄弟老母年近六十饑焉而無田寒焉而無桑喁喁科舉求不可望之祿以為養抑疏闊矣每朝夕進側則見髮斑體臞而食淡衣粗烏鳥之情痛劈骨髓王城百舍天門九關銖銅不畜何路自逹遐方小郡知已斷絶姦邪所怒哆冶所笑身無油脂日就乾臘往時多事勤苦成疾今兹憂愁益復發作長恐醫餌不繼忽沉溝壑內孤慈母上負明時所懷不伸抱恨泉壤以此計校不宜默默是以來也伏惟執事以文學名家以公忠許國封書言事及于母子夫婦間無所隱諱庭辨宰相而辭不可屈此其心將大有為者也不日祗奉明詔㱕于帝右持衡制事當不因循然則仕籍未甚清俗化未甚修賦役未甚等兵守未甚完異方之法亂中國夷狄之君抗天子長驅大割用工非一肘腋咨議豈宜少人漸而收之盍自今日覯雖不才以備一人之數顧不可乎苟取其窮而通之取其賤而貴之補罅續斷粗當益國不徒矯世俗騰舉士之名而巳此在髙明熟慮之也弗復云云嘗所著明堂定制圖一道并序前日度支魏公以列于座隅兹不再獻潜書十五篇野記二篇禮論七篇共一冊謹用塵瀆常行所業五卷亦以資間暇一笑皆舊寫不精致恕而憐之可也不宣覯再拜上孫寺丞書寺丞執事當今天下職官孰䡖重哉去于民不逺事之一介必折諸其庭莫如縣大夫者吾邑之在江表亦繁巨矣戶口櫛比賦米之以斛入者歲且數萬自政不得人二三年來尤為昏亂公庭攘攘塞耳不聞怨聲民錢獄理交手為市刺史弗之恤廉使弗之問褁糧北走路宿一月然後至京師天門沈沈虎士交㦸朝無親黨䄂無金貝有能自逹其冤者乎是以窮夫細人拷棒且死噤不得言唯仰首拜天以願雪活嗟乎聖人在上此何罪也不意復有執事取而正之民之瘡痍洗刷針療吏之宿贓奪諸其懷書牒訟爭者不持尺布斗粟喜捷而返里胥大徭隨候衙喝無土工木材之責綰弊布衣食菜飲水晨而出暮不敢休勉勉哀矜與赤子為父母貪人侈婦之所竊笑守道君子嗟嘆之不暇嗚呼仕今之世處今之俗其心皎皎追古人為徒伏惟執事之事業其小大何如也但恐聽詳則事滯愛極則姦生髙明多見當自知矣小人無位請贊言之押劵書移畒稅者立判時遣無淹久以匱其力則農不傷鼠竊狗偷得情則巳無姑息以枝其辭則捕逐之吏敢奉其職村氓僻陋逺者二百里負米為食十捐六七以足薪芻房賃之費旦入郭門夜馳而出往返猶且數日若必求其根待其蔓或旬或月然後罷㱕則將顛躓乞假之無地耒耜不得深其田斧斤不得采其山矣賊徒狡獪心豈廉耻昨鞭今戮猶或不悛若必撫而哀之則將㳂上官之語以誣捕巳者如此則雖白晝解人之衣貝者掩目而過矣仰惟執事以明易慎以義奪仁情見則勿疑罪當則勿恤乃古君子佩弦之流也玉光無瑕綱目無漏完粹精密可勝道哉覯邑外草萊之民也落魄不肖生年二十三身不被一命之寵家不藏擔石之榖雞鳴而起誦孔子孟軻群聖人之言纂成文章以康國濟民為意餘力讀孫吳書學耕戰法以備朝廷犬馬驅指膚寒熱腹饑渴顛倒而不變非獨人之云云坐而自歎且自笑者也今者進不敢祈執事尺書之薦退不敢受里閭啓齒之囑以希幸于左右觴酒臠炙非所懷也唯其公論末策思得自陳以增盛德之分寸故為之一來執事以為何哉不宣覯再拜上余監丞書監丞執事覯南城小草民也竊聞執事以文辭判是非取先天下豪俊馬首南嚮尹兹大邑盛名之下不獲愛坐臥越四百里奔走來見嘗所著文家貧弗及更寫謹獻舊藁一策凡九十五首約萬餘言以請命階闥伏念覯十嵗知聲律十二近文章思慮猖狂耳目病困者既十年矣而公不舉于州郡私不信于閭里梯天莫見明主窮海未遇知巳朝談仁義暮學計䇿云云雖多徒取笑怪老母坐堂親愛盈屋耒耜不供升斗之食桑麻不足一帶之衣塵埃四走乞丐無地此亦立節丈夫所宜歎惜者也今執事識量足以鑒臧否位望足以為升黜亦奚吝開卷一覽思其所以哉夫驅馬而賣之者為市人所貴賤未足以為駑良遇伯樂而弗一顧則雖日馳千里皆驢材也伏惟少留念焉他日執事得位將相洗濯四表瑣瑣之力一獻門下以託名于本傳之末顧不美歟古之相遇者或以一言之善或目擊而道存意氣所合唇齒後也不復浮辭唯增愧畏而巳不宣覯再拜上蘇祠部書通判祠部執事覯每習觀書傳見古人有先後相因貴賤相取刷浴塵穢挈而致之功名之境者未嘗不廢書太息巳或泣下何者兹道寂寥為日逺矣士之褐衣革帶顛倒風塵時無不扼肘歎望曰我無知已一旦成大聲享大任則復因循自守鮮䏻知人蓋處賤而求人知也則利在乎已既貴而知人也則利㱕于人為己而不為人是以然也繇此逹者自逹窮者自窮上下背馳不翅胡越見天球河圖委在溝瀆不肯一濡足振起之而安行自若者皆是也欲望張皇古道聳勸士類使碌碌者聞風而勇善不亦難哉是皆假道義以自進其身身既進則忘之矣真有道者果不如是伏惟執事以佐王之才應期而出第進士一為能官中賢良受清秩治道二十五策霆轟風飛震伏天下非真有道者安能卓犖如此是則夷髙翦蕪為後進開路誠有望于執事也覯南城賤民自以家世儒素生長好學由六七歲時調聲韻習字書勉勉不忘逮于今兹年二十七矣其間染采薰香附合時律外尤存心于古學沉酣鼓舞其志不甚眇小然而進不得州郡舉退不得鄉曲譽饑寒病瘁日就顛仆抱其空文四顧而無所之今者竊嚮執事風采不辭道路暑濕之勤夙夜奔走求通于門下以執事之明其亦為之動心哉覯生平所著力弱貨殫不能盡寫今所摯者舊文五卷蓋備舉子常禮禮論七篇潜書十五篇别寫為净本一冊政治餘間首乞觀覽其餘篋帙細碎苟蒙顧取續當具其藁以獻雖然猶未足以盡覯所懷也覯往者每見邦國政教有玷缺不完者下民疾害有酸楚未復者托其條目雜然甚多因欲作狂夫策五卷既成其五篇矣自以意切言直懼為世俗所忿誚執筆瞻顧逗撓而止又以明堂者古先帝王之大事而去聖久逺規模莫見周禮考工記大戴禮盛德篇吕氏春秋十二記室個之說參差不齊繇漢迄唐老師大儒各執一經相為矛楯有國者不知所以裁定遂使布政之宮缺而不立雖有作者皆取臨時處置非復先王之法象覯謂周禮大戴禮呂氏春秋皆聖人賢人之所作述不宜輒有乖異反復䆒省則制度果同但立言質略意義不顯鄭康成蔡伯喈輩泥文太過遂成派分故嘗挾而正之决而通之不以文害辭不以辭害意三家之說坦然大同堂室之度靡所回惑的的然如見成王周公享帝視朔朝諸侯于其上因欲作明堂定制圖一道并序遇病中廢未克成之復謂易者三聖之所以教人因時動靜而終之以德義五經特是為深矣古今解者唯王輔嗣尤得其㫖然亦未免缺誤况此經變動無常學者不能知所凖的覯常撮其爻卦各有部分仍辨輔嗣之失因欲作易論十篇然非汰思慮旬月間不可以措筆是三書者他日即成就跪致于几席之側則夏時坤乾未必不為仲尼所取也今之獻者聊可味其一臠耳仰惟執事思古人相因相取之道而念其所以來之意羽凡骨為飛仙起涸魚為雲龍藥石哺乳使其銜恩則他日執事入坐廟堂出擁旄鉞遂大勳于時覯雖不才東西指顧必有可用今也不敢豫自道幸執事裁之不宣覯恐懼再拜寄上范參政書慶曆四年六月四日應茂材異等科李覯謹西望再拜奉書參政諫議明公閣下覯一二年來竄遁山谷竊聞明公㱕自塞垣參預朝政無似之人辱知最厚延頸下風憂喜交戰喜者何謂兾明公立天下之功憂者何謂恐明公失天下之名夫以明哲之性樹剛中之德裁量古今愍測衰敝昔者言之而不得行之誠無可奈何今在行之之位矣蓋當築邦家之基天不足為高地不足為牢此所謂冀明公立天下之功也然塞孟津者非捧土可足治膏肓者非苦口不宜遺闕之原豈是眇小若曰患更張之難以因循為便揚湯止沸日甚一日則士林稱頌不復得如司諫待制時矣此所謂恐明公失天下之名也嗟乎當今天下可試言之歟儒生之論但恨不及王道耳而不知霸也強國也豈易可及哉管仲之相齊桓公是霸也外攘戎狄內尊京師較之於今何如商鞅之相秦孝公是強國也明法術耕戰國以富而兵以强較之于今何如是天子有帝王之質而天下無强國之資為忠為賢可不深計洪範八政首以食貨天下之事未有若斯之急者也既至窮空豈無憂患而不聞節用以取足但見廣求以供用夫財物不自天降亦非神化雖太公復出于齊桑羊更生于漢不損于下而䏻益上者未之信也况今言利之臣乎農不添田𧖟不加桑而聚斂之數嵗月增倍輟衣止食十室九空夲之既苦則去而逐末矣又從而籠其末不為盜賊將何適也况旱災荐至衆心悲愁亂患之來不可不戒明公何不從容為上言之國奢示儉抑有前聞動人以行不煩虛語必也省宮室之繕完徹服玩之淫靡放宫女以從伉儷罷樂人以歸農業後庭愛幸使衣無曵地群下賜豫使賞必當賢戒逸樂之蕩心慕淳朴之為德不唯惜費亦足移風至于昭事神祗尊奉釋老務從中道無徇末流郊祀天地禮之大者先王立法實有明文謂天下之物無可以稱其德故牲用繭栗器尚陶匏大路越席以昭其儉愚儒在野不覩大祀間之道路有異于斯費巨禮煩願留意也寺觀所須未嘗盡見唯前年在京值修開寶寺耳觀其所用誠難定數然以意論之害亦大矣且時賣官雖大理評事無慮一萬緍耳假如此寺秪費十萬緍亦當十貟京官矣彼十貟京官以常例任使數年之後便當臨民以為萬戶縣尹則十萬家之禍又以為十萬戶郡守則百萬家之禍矣若輟一寺之費而不賣十貟京官是免百萬家之禍佛如有靈豈不歡喜一寺尚爾其他可知孔子曰禮與其奢也寧儉矯枉過正此其時也設謂復于質略虧損國容無以觀示于下則未知瑶臺瓊室孰若茅茨土階之榮也若以逺古之道難為比擬則近世豈無其事哉隋之文皇既可為吾君法矣唐之楊綰亦足作吾相師也此事尤淺近蓋在明公術內久矣然恐富貴娛樂有以移人故敢告于左右嗟乎人夀幾何時不可失無嗜眼前之爵祿而忘身後之刺譏也覯才不適時體復多病非有望于仕進者也所願草茅之下復見太平瞑目黃泉蔑遺恨矣所著慶曆民言三十篇謹録上獻伏惟稍賜觀覽干犯鈞台實增慙汗不宣覯再拜直講李先生文集卷之二十七終直講李先生文集卷之二十八書後學南城左贊編輯後學廣昌何喬新校正寄上富樞密書慶曆四年六月四日應茂才異等科李覯謹西望再拜奉書樞密諌議明公閣下伏以天時否結海內煩費力支王業屬在賢人况樞密攬軍國之權明公通古今之道才位相稱功德可圗此有志之士所以願忠于僕人也覯江南人請言南方事當今天下根本在于江淮天下無江淮不能以足用江淮無天下自可以為國何者汴口之入嵗常數百萬斛金錢布帛百物之備不可勝計而度支經費尚聞有闕是天下無江淮不能以足用也吳楚之地方數千里耕有餘食織有餘衣工有餘材商有餘貨鑄山煮海財用何窮水行陸走饋運而去而不聞有一物由北來者是江淮無天下自可以為國也萬一有變得不為廟堂之憂而姦雄之幸乎議者多輕東南謂為怯弱而不知為官軍則怯為亂賊則勇矣今之卒伍例非徑健必也少有材力自巳别營衣食安肯涅墨而就拘哉唯無聊之人填􅊤是懼不得巳而為之耳謂之怯也不亦宜乎若夫驍悍之資狡猾之性因緣怨憤過有覬覦則安知其無勇也世俗但見藝祖取之之易而謂事勢常然殊不知以我宋應天之始乘李氏失政之餘殘殺忠臣熒惑群小兵叩城下猶未知之而今而後焉得此愚暗之賊又焉得此神武之師乎以治討亂尚難為計以亂攻治將如之何曹公用兵不謂不善而弗䏻以一矢加于孫權者非特山川之險亦以馬超韓遂在關西故也今之輟耕壟上豈無鴻鵠之志者然且伏而未起有所待也不幸一旦邉鄙戒嚴而荆揚乘釁廟堂之上何以謀之長淮大江塹其前西戎北虜猾其後畏首畏尾力屈貨殫當是之時雖周公為相太公為將恐無及也幸今無事何不早為之所三四年前閲人為弓手鄊閭之內驚擾百端曽未幾時已聞停廢而募諸宣毅繼以土軍聖朝用心小子何見然以意論之弓手雖無取而宣毅土軍又不如弓手逺矣豈唯無益且有害焉昔者之籍弓手也自成丁以上皆守令親擇之稍有強壯悉無逃匿彼宣毅土軍既曰募人須從所願當職之吏務登其數雖甚駑怯亦預收録此一不如也夫弓手本乃良民徭于公上或田園富厚或骨肉衆多自重其身不為罪惡彼黥額之徒率多無賴階于窮困旋置妻孥一動其心復何所顧此二不如也夫弓手訓練有時團結有處散㱕廬井無預廪給彼宣毅之名殆十餘萬一歲之費無慮三百萬矣加之土軍未知其籍是取無用之人為匱財之本此三不如也觀其罷軟之容動皆取笑驕盈之氣巳欲陵人雖無武功自謂禁旅若主將無惠失于撫循姦回矯詔卒令起發因其怨恨讋以訛言不出城闉自為蝥賊未可知矣此所謂豈唯無益且有害也朝廷徒見名籍之夥且聞講習之勤謂為有備蓋未之思矣夫用兵之道豈特武藝而巳㦲先在治其心次可用其力昔晋文公始入而教其民二年欲用之子犯曰民未知義于是乎出定襄王入務利民又曰民未知信于是乎伐原以示之信又曰民未知禮于是乎大搜以示之禮民聽不惑而後用之故能一戰而霸後雖不及猶有吳起吮疽而戰不旋踵李廣與士卒共飲食而愛樂為用上下相得豈徒然哉今之守郡監兵職為將帥奉行邦典豈敢他言恩意不通路人而巳立尸之地何以使之矧將帥之材在乎竒偉而今所謂良吏者小心畏忌之士耳彼欲笞人數十猶顧文法捉筆不敢斷而望其一步百變赴死如㱕何可得也嗟乎既往不咎來者可追宣毅土軍聚之巳久誠不可去然宜于不可去之中刪其尤無用者降隸于廂既减資糧且實役使其存者則析其部伍易地而居名之駐泊離其黨則無構扇之姦去其鄊則為興發之漸仍使稍供差遣以代舊之屯駐屯駐者又還故郡則廂軍可省招收矣此亦防患之微意而節用之一端也其于章示武威備禦他盜無勞益衆惟在選賢商周不敵自古然矣何不于朝野之間舉守郡監兵之職勿拘資級務取英才至如荆潭楊夀升洪杭福廣桂諸部宜命大臣為之節制重其操柄許以便宜辟召豪傑咨詢計策淹之嵗月庶可鎮安若謂假以威權事當疑阻則小白重耳非無土地陳勝吳廣豈是侯王或以霸主而尊周室或以匹夫而亡秦族逆順之心豈皆形勢使然也况今賦斂之煩數倍常法旱灾之作絶異曩時民力罷羸衆心愁怨造形而悟其可忽諸明公受國厚恩為世賢輔解絃易調正在此時謀人之軍師邦邑苟有危敗是誰過歟覯自惟迂闊之流實無榮祿之望但恨養生之地僻在一方憧憧衆人無可與計事者常恐小才為纍白刃相臨守死則無名脅從則有罪所以夙夜憂懼寢食弗皇不知我者謂我何也語有之可為智者道難與俗人言瀝血書辭敢告執事幸而帷幄之籌不舍庶人之議驅我元元躋于仁夀則覯也得保首領以沒受賜多矣所著慶曆民言三十篇謹録上獻伏惟少賜觀覽仰犯鈞台豈勝慚懼不宣覯再拜寄上富相公書至和二年八月十七日將仕郎試太學助教李覯謹西望再拜奉書集賢相公閣下鄊者相公偃息于外十有一年天下之士憤懣者無所吐天下之民窮苦者無所訴宗廟有神社稷有靈佑啓聖心廓然日出擯讒說于九地之底登舊德于赤天之上含氣之類孰不相慶千萬幸甚千萬幸甚議者曰賢人當位矣恢儒復古此其時矣覯以為不然周公相成王必先有討于管蔡商奄而後制禮作樂孔子為魯司寇亦且殺少正卯會夾谷以懼齊侯取汶陽田未聞區區以文字為先何哉緩急之節然也今之大患患在夷狄士大夫之耳目屬于相公久矣謂排難解紛不在他人才如斯位如斯籌深䇿逺蓋非小子所難窺也若夫禍以忽而生勢以激而動亦不可不知朝廷憂西北而不憂東南無寇賊之備是所謂忽也用力于西北則勢不救東南生姦雄之心是所謂激也竊恐燕趙有舉烽之變則荆揚無安堵之氓其曰無備者非兵非食官不得人之謂也今之取才既不盡善而南國卑薄隔以江湖朝士亦不欲來比于四方最為少人近者儂智高之亂足以觀之矣智高之起于雍也非若鬼神出自恍惚蓋有萌漸可見人或言之而主者如不聞及其至于廣也非有羽翼降自空虗蓋巳旬月之行衆欲距之而主者閉門之不暇遂使百越之地千里無煙積尸成山流血成川非他也官不得人之弊也凡今任官貴在科名彼嶺南郡守不知幾人非但無功又不能死唯趙師旦曹覲以節義自顯夫二人者皆無出身孔宗旦以負謗之故謪掾于雍事未起而言言不用而死夫人豈有科名哉凡今用法小過不宥而大刑不行小過不宥故跅弛者廢大刑不行故首鼠者安嶺南之吏或不備不虞或偷生惜死而不聞有伏鈇鑕者以不忍之政馭無耻之人如乘駑駘而舍鞭䇿欲其致逺何可得哉所幸智髙竪子本無逺略如使匹馬尺䥫踰嶺而北則江表生靈巳魚肉矣當是時數百千里之中無一人可與計事者或云修城池或云教士卒秪以行破公文何曽得似兒戲令人見之不覺大笑賊若能來誰有今日相公非常之人固不為常人之事見幾而作今也其時若謂才之難得道在馴致則凡守大藩如古方伯連帥者且宜慎柬每十數郡得一俊傑以臨制之亦足以有為矣如此雖大駕登單于臺元帥勒燕然山無南顧之勞擾况當平世誰敢動哉覯慶曆四年嘗以書言南方事必逹左右矣後二年作長江賦欲干衢室之聽而無路以通謹録一本塵玷台座草茅之愚行年四十有竒一事不成百病俱發未知餘年有幾唯未死間不逢亂賊是所願也故復呫囁上瀆威尊伏惟哀其狂而寬其罪不宣覯恐懼再拜寄上孫安撫書皇祐四年十一月十三日丁憂人李覯謹再拜奉書安撫密學諫議節下覯病卧草中聞朝廷委節下一方之事載驚載喜已而泣下嗟乎自嶺表有變數千里間火熱湯沸而未見有左右前後之臣負大名于天下者一來鎮撫竊疑江湖之民獲罪上帝不復得為周家草木在行葦之詩矣今也傳言節下當來有如司命仙官將自天降荒陬士女罕識貴人賢人孰知所以來之㫖愚心耿耿實異于衆輒緣漆室憂魯之義願有以控告不幸酷罰在身未經祥禫請見則非禮寄書則不恭日夜惟思罔知所措忽覩榜示令實封齎來何幸如之然而開設數路許以酬賞苟應募而言是傭徒鬻賣之道髙潔之士得不唾其靣哉退又念古之人有殺身以成仁安得避干賞之嫌沮願忠之意由此奮發節下試聽之嗟乎今之天下何其少人哉人材髙下未敢䡖量若夫至公至忠圖國忘身者誠不易得凡居位者何異一曹司但行文書不責事實但求免罪不問成功前後相推上下相蔽事到今日猶不知非昔西戎叛時數年間天下之民破骨出髓而不能取元昊一塊土今南蠻又叛數月間江湖之人拆衣賣絮而智髙方擁美女在珠玉堆中坐耳何者十羊九牧朝令夕改作無益以害有益故也彼智髙者豈英雄哉打劫之尤者耳愚嘗謂彼失于久而我失于速彼若能速廣東非我有也我若能久彼焉得跳梁若是哉何謂彼失于久當其自雍而來所過諸郡突如破竹若能因其倉庫撫其民人分留同惡合聚亡命以守之避實攻虗直趍英韶南雄以扼大庾使江南之兵不得過雖廣西兵來而東路之勢巳盛則五羊孤城仲子怯師囊橐中物耳舍此不為而為持久之計豈有人作賊深入主國無饋糧無外援而可頓于堅城之下連月不去以待王師之來哉此所謂彼失于久地何謂我失于速當賊在五羊城下時王師幸得到英州若能分兵屯守要害堅壁清野以待之彼將何如梁孝王天子母弟周亞夫尚不可救况廣州仲簡何足可惜彼求戰則不聽欲走則無路糧食當有限寶貨豈可餐越月踰時自當乾死况蕃漢烏合其心不一力盡勢窮寧無疑二購賞在其前斧鉞在其後智髙之首何難可致不戰而屈人之兵古今一也豈有人為將乘驛㑹師與士卒未嘗相識昏至晨戰挺身入賊如此雖豫讓為軍貟要離作節級有何恩義能使之用命也以侯伯富貴之身落豺狼腥臭之手逺近聞之莫知所由皆以賊為鬼將神兵非人可敵故鋒刃未交而心膽已碎後敗甚于前敗今日甚于昨日徒使狂童謂天無網此所謂我失于速也自有事以來江湖之間誠宜設備然所以備之豈其道哉豈作無益以害有益者哉居是邦不非其大夫不得為節下盡言也嗟乎疾在四支皆知護心腹矣恐風氣之內入也而不知用藥無節則心腹自生疾敵在嶺表皆知備江湖矣恐蠻寇之內攻也而不知作事無術則江湖自生變四支之于心腹嶺表之于江湖其逺近緊慢以節下之明固不待人言也嗟乎彼智髙者終何為哉歷觀自古豈有如彼等人䏻成事也彼之所至奪人財物燒人室宇食人老弱妻人婦女人之仇讎無甚于彼者安能成事哉但恐嶺表未定江湖日貧而群盜起耳夫群盜者初不足畏或數人或數十人或數火或數十火然後以小合大以近合逺遂成千人萬人耳雖然此等亦安能成事哉賊殺既已甚天誅所未及于是乎有長材大力假忠借義以討賊為功以要王爵以歸民望如孫堅父子漸不可制此愚心之憂也嗟乎江淮而南天府之國周世宗之威武我太祖之神聖非一朝一夕而得奈何因循不以賢才守之今日之事可謂急矣誠得左右前後之臣負大名如節下者數人使居潭洪荆升楊杭福州兼節制一路屬郡官吏得自廢置然後可以言利害官不得人雖言之誰為行哉朝上千疏暮降百勑付之曹司適煩擾耳如曰得人請試言其略今之先務莫若使甲兵不闕盜賊不起民不至無告士不至失職如此者凡十事一曰諸州舊有宣毅百數雖云不武悉巳南征昨者調鄊弓手將以為衛縱今未罷復何可慿且勿論其人勇怯彼弓手之家固不在城安有盡室巳落賊中而肯一身更為官守鳥驚魚駭事灼然矣愚謂守城當須城中之人人生尚氣愚智皆同嘗觀角抵與競渡之類一坊一巷互爭勝負千百為群至相殺害何者耻居人下故也官之使民曽無激勸點簿呼召若牽牛羊彼何興味而為之哉今若為廣埸于邑居之中先取有勇力為衆服者寵異之使率其黨以間暇習諸兵仗勿為名籍各任去來既不妨其業又得以自由于是制為勸賞之法凡若干日一試其藝有地稅者常憂執役試中則與移下名有市利者唯患當行胡剛切試中則與免一次胥徒以此差補僧道以此披剃凡百施為必先武力至于有罪亦當原情苟非害人得以功贖如此則人可以日添藝可以日進比屋之民皆為甲士可也然後柬置帥長潜加部勒志定氣剛誰不可用况家資在內血屬滿眼倉卒之時必得死力二曰昨者鄊弓手萬家五百人大縣至一一千人不謂不多然而驅之來就郡邑廢其耕耘離其骨肉負米擔錢闔門在路是不便于私也手執戎器心在閨門藉此虗名影其色役是有纍于公也今若于村落之中每十數里為一教埸使其人員各以間暇就便集之既不妨農且無所費當戶差役勿復與免或其有故則許兄弟子姪遞代乃是一人在籍數人習兵其餘戶口及寺觀童行願教者亦聽勸賞之法一如城中如此則保全鄊里扞禦疆界求之人情必可倚賴三曰古之治民唯欲富庶今之治民特惡豪右夫富豪者智力或有以出衆財用亦足以使人將濟艱難豈無其效今之浮客佃人之田居人之地者蓋多于主户矣若許富人置為部曲私自訓練凡幾度試勝兵至若干人或擒盜至若干火者授以某官仍寢進納之令以一其志凡人既得以兵自防又得以官自進苟有餘財其誰不勉嵗年之後千夫長百夫長不難得矣周禮鄊為一軍未聞反叛秦人功賞相長何患豪强大有為者宜無猜忌四曰人之為賊亦有其漸始則黑靣夜行僅如狗鼠或掠小家子或劫獨行客鄊亭之吏知而諱之不告于公上故使長惡不悛積小成大蔓草難圖有自來矣鄊亭之吏諱之何也凡今賊發之地必責以賞錢縣尉未下馬耆壯已賣田破人之家前後不少為耆壯者懲其若此須求被劫之人願陪所喪之物與其賞一二百千孰若陪一二十貫但知惜費豈復畏罪哉賞所以得賊亦所以失賊諱之之謂也然非厚賞則賊不可得矣官不能備必出于民顧當改制耳愚謂莫若鄊置賞社計戶等以斂之命富人以掌之用盡更斂以此為常今夫大鄊或二三千戶小者亦數百戶與其使耆壯三五人出泉孰若使一鄊千百戶同力其數則少其斂則緩既免破家誰肯縱賊五曰茶鹽之禁本非便人經費所須蓋不獲巳江嶺之交最多鹽賊起而為大害者往往有之矣此本良民但為衣食與商賈何異哉惟其犯禁耳俗吏不明事體武卒又貪賞錢不料形勢多方伺捕彼自以其罪重寧鬪而死幸而不死豈得復為平人哉求活草間固其宜矣愚謂當少緩之百姓日用不可使知姑以用度不足某事某事權住給賞如此則伺捕者宜其縮手犯禁者得以安心苟能加以仁恩亦可録為死士六曰大抵東南土田美好雖其飢饉之嵗亦有豐熟之地比來諸郡各自為謀縱有餘糧不令出境昨見十程之內或一斗米糶五六十價或八九十或一百二三十或二百二三十價雞犬之聲相聞而舟楫不許上下是使賤處農不得錢貴處人不得食此非計也况于境內又有禁焉止民糴以待官糴是也且賈人在市農人在野糴之則米聚州縣不糴則榖留鄊村徒為日日修城池而不算其中蓄積亦可笑矣若曰官糴數足然後放民糴俟河之清耳官糴價一定民糴價漸高難易如何哉愚謂當弛一切之禁聽民自便仍為著令以告後來七曰古之貴者舍征止其身耳今之品官及有䕃子孫當戶差役例皆免之何其優也承平滋久仕宦實繁况朝臣之先又在贈典一人通籍則旁及兄弟下至曾孫之子安坐而巳比屋多是衣冠素門方係繇役日衰月少朝替夕差為今之民蓋亦難矣愚謂三丞以上官及正郎以上子孫若贈官兩省以上自可且從舊制其餘一例給使如此則農夫稍得息肩世胄亦無自惰八曰今之賦稅較古則輕唯諸攤配大為煩費夫攤配之物皆受直于官比之市價不甚相逺然而村民或去州縣一二百里既難褁足且畏後期故有市井之人代幹其事官未得銖兩民巳出斤鈞執耒者所以無聊遊手者所以專利愚謂莫若使諸縣凡有求物則選邑中富而好善者一人委之集事仍須令佐躬行檢校事畢之日計其實所費錢使民償之如此財用可以無枉困窮可以更生九曰今之卒伍餼廪甚厚而人不願為者何也徒見其貧窮耳餼廪􅌋而貧窮者患在兼并卒伍而可兼并者亦勢之然大凡從軍多是單獨初采營壘未有妻孥居則無屋用則無器于是兼并者得將養女召為贅壻今朝有室明日上綱在路日多住家時少故其一女可當數夫既以家口為名即是衣糧入已嘗見一家養十二三女請五十餘分而所養女日夜紡績與其家作婢耳餼廪歸于他族貧窮切于已身不死則逃非偶然也愚謂莫若使諸州凡招到人官為昏娶及置屋宇什物使得成家然後逺役如此則不唯存恤見兵亦足招延來者十曰今之發解謄録封彌雖曰至公諒非逺慮識平側者昂昂哂笑談王霸者往往退藏冤苦之聲逺近如一愚謂宜復祖宗之法以求郡里之譽凡諸征鎮亦計辟除如此則人望有歸學者知勸原夫之輩得之何補跅弛之士失之可惜飢寒不如兵死寧免生心英雄落我彀中乃為上策嗟乎弱甚矣憂至矣非立大竒不足以救愚言雖未竒節下亦無忽勿與儒生言儒生必罪我勿與俗士知俗士且笑人管仲復生商君不死天下乃安矣覯慶曆四年有上樞密富諫議書一首俄聞富公出使河朔未知其書逹與不逹慶曆六年又有長江賦一首天險難升無路通進今各寫一本去願節下覽之足以知愚心之憂非一日也嗟乎行年四十四矣結髮修學自謂非常人老大栖栖便是常人耳然昔應制科辱召第一今為試助教雖云冗散猶望朝廷以詞學進之必不于風塵之際以遊說徼幸節下明察知其無意于酬賞也嘗著周禮致太平論十卷此乃愚心所自喜可以備乙夜之觀者節下幸問焉當獻其藁忉忉之懷未盡于此儻容白帶以見宜有靣言不宣覯再拜上蔡學士書日月應茂材異等科李覯謹再拜奉書諌院學士從者伏以王佐之資在言責之地有行下國將歸于朝志義之士靡不欲效肝膽于車下矣覯不肖郡縣之得失軍民之利害非所能知然有事雖似小而患則甚大憤憤于心弗能自巳者願一言焉同郡有鄒子房自前年遊京師去年秋寄書于其家自言因奏封事得恩為齊郎鄊人以其無行也初未甚信及見北來者且問諸邸吏皆曰無之于是鄊人愈疑其詐矣今兹來歸果無禮部補牒獨執御藥院文書一𥿄以為符驗而㳂路郡府僉以衣冠待之本屬轉運不疑其欺又給慿由使興置銀銅坑冶因緣形勢蒙蔽州閭萬目蚩蚩無敢明辨噫可怪也覯竊評之曰以御藥院文書可行耶不可行耶子房已受補牒而不以隨身耶且三者皆可為之切齒也御藥院文書可行則國家之禍耳其不可行或已受𥙷牒而不以隨身皆子房之罪也夫爵人于朝與衆共之示天官之不敢私也况武祖文宗防萌杜漸上設中書樞密院下分臺省寺監所以夾輔聖政互相關防齊郎雖微然須勑下禮部而後給牒收補今秪欲憑御藥院文字不必朝省指揮則是宦者奪宰相之權王命出小臣之手禍亂之本莫斯為大女主幼君尚不及此陛下明聖焉得有之此可為切齒者也若以其書不可行用則安得執為符驗藍衫木簡便稱官人乘馬從徒平接有位國之常刑將焉用也且齪齪一夫飾以巧言自淮徂江若履無人之地設有大姦大賊造為妖妄誘脅州縣則孰䏻辨之哉太宗時李飛雄詐取驛馬騎之稱奉詔縳清水諸將入秦州將斬之以叛賴宗社之靈使自漏泄耳萬一復有此事其將奈何此又可為切齒者也若謂已受補牒而寄留在外或質當錢物則是輕我君命重乎貨財䡖君命則無為臣之禮重貨賄則非奉公之人以此入官未知安用此又可為切齒者也凡此三者干涉大體不可不言而西望帝閽邈數千里言可及乎誰能執熱逝不以濯學士其惜一勺水以快我心哉覯與子房舊相往來别無嫌隙齊郎職位非佳覯誠不肯嫉妬子房名位未著覯又不與爭能言之至此蓋公議也况子房不慙妄冒惟務驕矜齎逺近書題假轉漕符牒以興置銅銀之號結太廟齊郎之銜當大路卓彩棚椎鉦鼓引百戲周遊城市朝謁聖祖而後㱕呵止行人凌壓尊老意氣滿溢無復忌憚是可忍也孰不可忍伏惟學士有名于時以道贊國如此等事寧不動心萬乘之貴尚當規正矧此蕞微豈難辨理昔者學士未作諫官時常刺諫官之不直今既作諌官矣無為他人所刺伏恐朝車到此迫于人事無暇省覽謹遣人投書道左試財擇焉不宣覯再拜上王刑部書轉運刑部明公執事覯天生愚魯棄置藪澤鱗鬐坐枯風波不到伏承明公以臺郎之貴領州伯之重才名所震曜賢德所煦嫗姦回醉心良善吐氣如九鎮之柱天群山莫不仰四瀆之紀地衆流莫不赴士之歸者唯恐在後而覯貧煎其家病縲其身隔數百里無階請見自甘屏逺何所願望不意近日一二有位自北來者乃言明公過垂聽察深録姓名不唯置之齒牙且欲引諸門下一聞髙義慙愧纍日人之不遇者必曰時命若覯也獨命窮耳于時豈有不遇哉自古正身立行負抱才業而遭值昏亂不為人知辱在餓隸或老死岩石名字磨滅銜冤厚夜者夫豈少歟小人無似幸生明時當路無朞功之戚舉家無拳握之貨馳鶩無力請託無緣而賢卿大夫雖未相識往往知其所為何不遇之有哉君子疾沒世而名不稱苟由當代豪桀共相采色使得光顯于後則萬鍾不足校也䂊讓一家僕耳以衆人遇之則以衆人報國士遇之則以國士報吾黨之受知者宜何如哉既未得謁于閽人且欲窮極𥿄筆鋪張其言兾明公多見其藴積則又念今之進者假儒之言巳進而言不驗故真為儒者羞自言明公徐而察之可也何遽言哉聊寓書以謝左右伏惟照其心無責其禮千萬幸甚不宣覯再拜與胡先生書覯再拜先生胡君足下康定初錢塘相别後二年自京師歸中道曾寓書今又四年雖不有教誨而衣冠往來每知動靜俗衰禮壞用力者鮮先生發憤呌呼手提古道以陂障末流使東南之士有所模法其功用何如哉覯于先生齒卑德薄然其所留心何嘗不在天下國家故聞先生之風歡虞詠舞唯恐其舉之不髙馳之不疾也苟有聞見敢不盡愚于左右伏念曩者為㑹以羇旅迫促聽言觀行什不一二慕賢之心且醉飽矣至于𥿄筆之間所以剴今而垂後者尚未得請近到弋陽乃有以先生所著文為惠者喜而讀讀而疑謂先生之辭或者年少時作漂流人間而不可追者乎不然幸察其區區竊觀原禮篇曰民之于禮也如獸之于囿也禽之于紲也魚之于沼也豈其所樂哉勉强而制爾民之于侈縱奔放也如獸之于山藪也禽之于飛翔也魚之于江湖也豈有所使哉情之自然爾云云覯不敏大懼此說之行則先王之道不得復用天下之人將以聖君賢師為讎敵寧肯俯首而從之哉民之于禮既非所樂則勉強而制者何歟君與師之教也去自然之情而就勉强人之所難也而君欲以為功師欲以為名命之曰讎敵不妄也且制作之意本不如此唯禮為能順人情豈嘗勉強之哉人之生也莫不愛其親然後為父子之禮莫不畏其長然後為兄弟之禮少則欲色長則謀嗣然後為夫婦之禮爭則思决患則待救然後為君臣之禮童子人所慢也求所以成人然後為之冠禮愚者人所賤也求所以多知然後為之學禮死者必哀之然後為之喪禮哀而不可得見也然後為之祭禮推事父之恩而為養老之禮廣事兄之義而為鄊飲酒之禮凡此之類難以遽數皆因人之情而把持之使有所成就耳有是情而無是禮則過惡襲之情雖善末如之何故父子之禮廢則子將失其孝兄弟之禮廢則弟將失其悌夫婦之禮廢則夫將失其義君臣之禮廢則臣將失其忠一失之則為罪辜為離散嚮之所謂情者雖積于中安得復施設哉故曰因人之情而把持之使有所成就者也其大略如此然則有禮者得遂其情以孝以悌以忠以義身尊名榮罔有後患是謂獸之于山藪鳥之于飛翔魚之于江湖也無禮者不得遂其情為罪辜為離散窮苦怨悔弗可振起是謂獸之于囿鳥之于紲魚之于沼也而先生倒之何謂也若以人之情皆不善須禮以變化之則先生之視天下不啻如蛇豕如蟲蛆何不恭之甚也幸深思之萬一愚言可取則願告于不知禮者曰無近于囿汝有山藪無從于紲汝有飛翔無入于沼汝有江湖云爾則先王之道庶乎復用天下之人其仰聖君賢師若司命焉又觀送程令序斥言今之縣令不得其人而末一句乃曰與家君有代授之契如是則尊公亦今之縣令耳蓋文之大病不可不察若尊公之治有異于前之云云者願少稱述不然則削此一句以存有隱無犯之義甚善覯非好辨者顧先生之文學者所信一有玷缺為患不細故敢陳之惟以情恕未相見千萬自愛覯再拜答宋屯田書屯田宋公執事覯近者刪定劉牧易圖繼之六論僅草具未甚行一來貴土日接髙誼乃知執事舊有王劉易辨其大略不異故不敢自疑以塵于席次執事忘其陋寡遽貺以書謂聖人之道晦而復明劉氏猶大盜既逸而成禽豈復能為梗然六經近為狂妄人所椎埋如是者甚衆且使覯堅其壁主其盟執事當竒所謀鳴鼓而陳焉主盟之命雖不可當若狂妄椎埋豈惟執事患之抑愚心未始釋然也孔子曰吾猶及史闕文蓋喜其本末為世人所損益也至于漢儒若鄭康成注禮記其字誤處但云某當為某玉藻全失次序亦止于注下發明未嘗便就經文改正于周禮則備舉先鄭杜子春解此蓋尊經重師不敢自謂巳見為得姑兩存之以俟後聖耳况夫一家之學必由君命而後可行以劉歆之才在哀帝之側嘗欲以左氏春秋列于學官尚為諸儒不肯置對光武之世議立左氏而公羊之徒上書訟之至和帝時始得立學其難而慎也如此未聞有不請于帝不謀于朝而能以一人之私鼓舞天下者也厯觀五經傳注及正義誠有未盡善志于道者宜其致詰然但當著為私書或言於同志庶幾其說不泯絶後有知我者則先王之道明如是足矣彼官為博士居天子辟雍將造成多士以待官使者也初不奏立某氏易某氏春秋俾有司策試一用斯義而乃專肆巳欲棄傳違注驅學者從之其可乎哉學者顧師資之禮不得不從有司執注疏之義不得不黜無乃非長育人材之意邪矧博士之官靡常其人苟各用所見不為定凖今博士說如此後博士又如彼則更數十百年天下之士為儒為墨為釋為老未可知也此患甚大不可不救而覯也貧賤委頓無錙銖重雖學者稍稍聽信然悠悠之流衆寡何如哉覯與人作一記一序猶未免在勢者或蚩蚩輩有所改易陳言褻語塗穢金石後人弗知將以我為戲焉况能主盟聖域集第一之功乎誠尊命之不可當也執事文學豐富爵位進長既有其道且得用焉指撝人士將無不可苟鳴鼓而陳則覯雖不勇請當一隊必有藉手以報不宣覯再拜答李觀書覯白宗人祕校足下八月初徐秀才至得所寓書甚大惠覯不肖且未識君子之容而屈辱厚意以道藝見咨顧無以當之雖然敢不薦其說來書謂孔子之後有孟荀楊王韓柳國朝柳如京王黃州孫丁張晦之及今范歐陽皆其繼者也而自謙讓以為畚土壤築太山欲登于前賢之閫而問其何如足下年少初仕不汲汲于進取而轉從寂寞之道此非今人之心古人之心也曽子曰尊其所聞則髙明矣行其所知則光大矣苟取之以明守之以誠尚可為聖人之徒矧曰前賢之閫哉然謂之賢者豈非所論列十數公乎足下欲以為法當考其所為工拙不宜但徇其名也孟氏荀楊醇疵之說聞之舊矣不可復䡖重文中子之書已泯絶唯中說行然出于門人所記觀其意義往往有竒奧處而陷在虛夸腐脆之間隋書無本傳又不得案其行事退之之文如大饗祖廟天下之物苟可薦者莫不在焉佐平淮西解深州圍功德卓犖在聽聞者不一誠哉其命世也子厚得韓之竒于正則劣矣以黨王叔文不得為善士于朝近者如京先倡古道以志氣聞黃州學而未之得然其人諤諤有風標彼孫丁之文舉人之雄者耳其立朝不聞有所建明而胎天下之禍為吾徒羞誨之之辭不竒諸所著文未足可嘉至于議論則識精才健無逺不到若洪範王霸篇籠絡天人捶煆古今雖子厚好為論尚未及也先朝文士唯此人耳惜其踈俊得罪于世故立身不可不慎若子厚晦之皆非凡人被惡名雖欲自新而死期至矣范公歐陽蓋為賈誼劉向之事業窮髙致逺未易量也足下以愚言為不妄則可法與否昭昭然矣路逺不獲相見勉之李覯白答黃著作書覯再拜漢傑著作兄足下前日辱書以覯所為景德寺及邵武軍學記言浮屠事來討覯不肖然其為文有新意處恐學者疑唯欲人問因詳說之而譊譊之徒背憎是務莫肯告者吾心恨此久矣今漢傑乃惠然移書使之明辨不勝幸甚覯排浮屠固久于潜書于富國策人皆見之矣豈期年近四十氣志益堅之時而輒渝哉惟漢傑觀厥二記不甚熟耳吾于此言乃責儒者之深非尊浮屠也民之欲善蓋其天性古之儒者用于世必有以教導之民之耳目鼻口心知百體皆有所主其于異端何暇及哉後之儒者用于世則無以教導之民之耳目鼻口心知百體皆無所主將舍浮屠何適哉漢傑兩執親喪矣亦嘗禮佛飯僧矣如使周禮尚行朝夕朔月月半薦新啓祖遣有奠虞卒哭祔小祥大祥禫有祭日月時歲皆有禮以行之哀情有所泄則漢傑必不暇曰七七曰百日曰周年曰三年齊也吾故曰儒失其守教化墜于地凡所以修身正心養生送死舉無其柄天下之人若饑渴之于飲食苟得而巳當是時也釋之徒以其道鼓行之焉往而不利云云至于叙其傳法始卒甚詳此誠文勢不得不然吾自無思無為之義晦而心法勝以下言儒不能明其道而釋以其說象之故嗣迦葉者師子逹摩以下言此衰致彼盛也非習聞其說樂其誕而自小如孔子吾師之弟子之類也若夫按白居易碑迹景雲大師之事蓋取其與顔太師真卿等友善魯公之大節古今鮮儷而善于一浮屠必若澄觀受知于韓吏部之比其人材有足稱者也而景雲乃景德之舊因使其徒有所矜式焉然則取信于白居易何尤哉又覯所謂及味其言有可愛者蓋不出吾易繫辭樂記中庸數句間漢傑以為仲尼子思群聖人之作述豈與此等說較論而爭衡邪是誠漢傑之不思也且吾謂儒者困于淫辟恤乎罪疾欲聞性命之趣不知吾儒自有至要反從釋氏而求之然後乃曰及味其言有可愛者蓋不出吾易繫辭樂記中庸數句間苟不得巳猶有老子莊周書在何遽冕辨匍匐于戎人前邪請詳此意豈謂仲尼子思與之較且爭乎蓋以釋之言雖有可愛者亦吾聖人先巳言之矣何必去吾儒而師事戎狄哉苟不得巳尚不如學老莊其意亦昭昭矣彼釋之書數千百卷而不出吾數句間其䡖重如何哉漢傑責于人無若是之暴也夫所賤鄭衛者非謂全無五聲十二律不與雅樂相似也唯其不中正耳毛嬙西施靣目亦與人同豈彼數千百卷書而無與吾聖人一句一字合者哉九流百家同出于聖人而有所偏耳聖人之備其于用也交相濟故得中焉諸子之偏其于用也執一而巳故有過有不及也亦非謂無一句一字與聖人合者也譬諸良醫之治疾實者則瀉之虛者則補之熱者使之服凉冷者使之服暖故天下之疾無不治也聖人之道如此諸子則不然見瀉而愈者則謂天下之疾皆可瀉見補而愈者則謂天下之疾皆可補于熱于冷亦然故用藥失宜而療病多死也非謂其方不與良醫相似也學者之視諸子若異類焉是亦過矣漢傑罪我不如李習之不為僧作鐘銘習之之論信美矣然使唐來文士皆效習之所為則金園寶剎碑版若林果誰作也來書謂張景原道頗正漢傑何不視景集中所記浮屠事凡幾篇其稱述何如又謂設不得巳猶可謹歲月志工用亦不害于正若但歲月工用而巳凡人皆能之何必吾文吾所是非灼見如彼豈嘗害于正哉聖賢之言翕張取與無有定體其初殊塗歸則一焉猶李漢所謂千態萬貌卒澤于道德仁義炳如也何須開口便隨古人漢傑使我效李習之膠柱矣今之學者誰不為文大抵摹勒孟子劫掠昌黎若為文之道止此而巳則但誦得古文十數篇拆南補北染舊作新盡可為名士矣何工拙之辨哉覯之施為異于是矣既使明辨敢不盡言漢傑察之十二月十三日從表弟李覯再拜再答黃著作書覯再拜漢傑前書以言浮屠事求問覯不才不能多自引過輒求義理塵于左右漢傑又以書稔吾之罪不勝大慙覯行于天下日聞其美不聞其惡於鄊黨惟仲容老文時賜教誨然其人慎密雖終日請問猶未一言今漢傑不惜纍𥿄之書以為大惠而覯如頑石焉雖有雨澤毋所受入而今而後不得聞過矣覯何人哉覯何人哉尚賴君子之心愍其孤陋苟有聞見更掛齒牙則蕞爾之人猶有望也以多故未及請見答陳特書覯啓今日吳君坐中見僕夫捧三書以授我問克讓乃知其子姪以此為惠讀之皆今賢士大夫之文甚善甚善夫贈送之作惟師與友若老耽孔子顔淵子路言者受者皆非偶然今覯與足下兄弟無一日之雅鄊井不同年齒差倍又非當大位言得天之地弗問弗求獲此惠貺私自惟念莫知所來無乃足下負大術業潜于山藪心之熖熖無所發泄假我以為題目乎不然未敢當凡所教誨皆我心思慮之熟者然夫子之道如天如神變化不測恨行計速不得與足下論其萬一若皆如來示則指掌而巳何必從師而後知哉有言于覯者多矣如虛舟焉未嘗輒愠今足下兄弟言古而志髙于愚心未忍舍焉故此奉告且以為謝不宣覯白直講李先生文集卷之二十八終直講李先生文集卷之二十九雜文原文利可言乎曰人非利不生曷為不可言欲可言乎曰欲者人之情曷為不可言言而不以禮是貪與淫罪矣不貪不淫而曰不可言無乃賊人之生反人之情世俗之不喜儒以此孟子謂何必曰利激也焉有仁義而不利者乎其書數稱湯武將以七十里百里而王天下利豈小哉孔子七十所欲不踰矩非無欲也于詩則道男女之時容貌之美悲感念望以見一國之風其順人也至矣學者大抵雷同古之所是則謂之是古之所非則謂之非詰其所以是非之狀或不能知古人之言豈一端而已矣夫子于管仲三歸具官則小之合諸侯正天下則仁之不以過掩功也韓愈有取于墨翟莊周而學者乃疑噫夫二子皆妄言耶今之所謂賢士大夫其超然異于二子者邪抑有同于二子而不自知者邪何訾彼之甚也原正祭非其鬼而求福焉人知其不正矣考之經則禱祠之禮煩設祝史巫覡其術近乎怪孰謂聖人而為不正哉君親人所甚愛也死亡人所甚惡也以所甚愛而之所甚惡有告之曰禱可以免雖聖人其如何孔子曰丘之禱久矣為已故也周公冊祝請代武王臣子之心也今之學者自以為正人視其親愛之疾則曰有命噫正可矣曰孝與慈則未也不孝不慈而得正焉吾不願也讀儒行儒行非孔子言也蓋戰國時豪士所以髙世之節耳其條雖十有五然指意重復要其歸不過三數塗而已平居自重慎能處貧約一曰道塗不爭險易之利冬夏不爭隂陽之和愛其死以有待也養其身以有為也二曰其居處不淫其飮食不溽三曰一畝之宫環堵之室蓽門圭竇建戶甕牖易衣而出并日而食四曰幽居不淫臨事有守奮發不顧忌一曰劫之以衆泹之以兵見死不更其守鷙蟲攫搏不程勇者引重鼎不程其力二曰可親而不可劫也可近而不可迫也可殺而不可辱也三曰雖有暴政而不更其所四曰讒諂之民有比黨而危之者身可危也而志不可奪也五曰世亂不沮不苟合于君視利祿如土芥一曰難得而易祿也易祿而難畜也二曰委之以貨財淹之以樂好見利不虧其義三曰上不答不敢以諂四曰陳言而伏靜而正之上弗知也粗而翹之又不急為也五曰上不臣天子下不事諸侯雖分國如錙銖容人愛士以身徇朋友一曰慕賢而容衆毁方而瓦合二曰內稱不辟親外舉不辟怨程功蹟事推賢而進逹之不望其報三曰爵位相先也患難相死也四曰並立則樂相下不厭久不相見聞流言不信其餘亦常事如席上之珍以待聘衣冠中之類考一篇之內雖時與聖人合而稱說多過其施于父子兄弟夫婦若家若國若天下粹美之道則無見矣聖人之行如斯而已乎或曰哀公輕儒孔子有為而言也曰多自夸大以搖其君豈所謂孔子者哉讀文中子文中子之言聖人之徒也傳之者非其人為之癰創而巳耳吾觀中說謂所傳者姦詐無禮之人也世誚房魏輩不稱師顧諸公如何人也竊人之財猶謂之盜學焉而不知所由來固小人矣然其佐唐命基太平行事灼見非小人也非小人而不稱師未嘗以為師也明矣隋書魏公所述常人或得一傳而無王通云者豈窮為弟子而忽忘若是乎或謂以長孫無忌怒故句夫魏公引義諫諍不為天子屈豈憚一無忌而削其師哉蓋文中子教授河汾間迹未甚顯沒後門人欲尊寵之故扳太宗時公卿以欺後世耳懼其語之泄乃溢辭以求媚若杜如晦于萬民猶天百姓日用而不知之類其媚于唐帝則下文曰堯舜者是也孔子之時周王魯公非有道也至修春秋尊京師别內外戀戀不能已江都弒煬帝而文中子曰天其或者將啓堯舜之運吾不與焉命也其如君臣之禮何孔子于孟懿子季康子稱對稱名孟孫問孝于我我對曰云云康子饋藥拜而受之曰丘未逹云云楊素蘇䕫李德林隋之大臣且非弟子而謂之請見又名之素與吾言夔與吾言德林與吾言云云其如上下之禮何吾故謂所傳者姦詐無禮之人也雖然不姦詐不無禮文中子之道不如是之光也流俗之視中說如視佛書夫焉知佛之道可尊而尊之哉徒聞其未死時天地鬼神夷狄之君無不尊之者耳或曰文中子之道不如是之光則奈何曰不害為聖人之徒弔楊子歲隂在戌兮其月季春望前三日兮是惟壬辰面書林以齊慓兮敢行弔于子雲嗚呼哀哉髙廟不神兮借人以權新都大盜兮舂國之咽凶邪得志兮明哲偷安天爐熾炭兮璞玉不燃斂佐王之刀尺兮回智巧乎簡篇何諸儒之喪明兮復培塿乎泰山夫聖者通之謂兮可名而名之豈有常人昔成湯號伊尹曰元聖兮固商書之所不刪夷之清而惠之和兮孟氏亦以為聖焉謂子雲之非聖兮何啻乎膠柱而操絃韓退之云大醇而小疵兮所論止于法言兹對問之細碎兮如入宫始見其堧垣伊太廟明堂之巨麗兮則盡在于太元兼三材而用五行兮取度數于渾天日如蟻而右轉兮斗揭柄而左旋隂陽晝夜之會合兮非弄筆之所磨鐫其指在于三綱兮尤切切于君臣君道光而臣道滅兮尊卑之分以陳消與息而相乘兮無盛滿之不疾顛言行禍福同出于罔兮貴思慮乎未然必稱孝而稱忠兮異乎劇秦而美新既廣且深兮浩浩東溟之瀦百川自哲人之萎于魯兮獨子雲之書誰得而及肩惟視之八曰翡翠于飛離其翼狐鼦之毛躬之賊蓋小才之足以殺其身兮俾愚心之訴訴奉新語以周旋兮庶全歸于窀穸彼叔明之為注兮間或失而或得矧科指之不甚明兮匪後生之能識今之從事于此書兮其說溺乎數術隱怪之士惜以為已有兮學者欲求而弗獲繄小子之不敏兮將大為之解釋下以行諸講學兮上以及夫邦國計其業之勤勞兮豈一朝而一夕困于內者疾病兮迫于外者衣食念一家之言兮終成之于何日天有意于此書兮使我夀考而強力不然子雲之道兮或幾乎息我思古人兮淚漣漣而霑臆復說孔子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉噫顔氏之賢肖夫聖者也猶有不善乎曰衆人之不善不至乎善也賢人之不善善而過者也孔門髙弟師也過由也兼人有姊之喪而弗除曾子執親之喪水漿不入于口者七日皆善而過者也而未聞其復也中庸曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣復而得中者顔氏而巳乎故曰用之則行舍之則藏唯我與爾有是夫人之患不在乎不及而在乎過之不及則下于人下于人則憤憤則知進矣過之則出乎類出乎類則矜矜則不知其反矣伯夷與鄊人立其冠不正望望焉去之過于正者也叔向三數叔魚之罪過于直者也于陵仲子不食兄之祿過于廉者也魯隱公攝位過于讓者也徐偃王不忍鬪其民過于仁者也尾生期女子過于信者也聖人則不然子見南子似不正昭公知禮似不直將之荆先之以子夏申之以冉有不欲速貧似不廉文王既沒用我者其為東周似不讓誅少正卯似不仁諾陽貨曰將仕似不信應時遷徙各得其所禮所以制乎中義所以謂之宜也可與適道未可與立可與立未可與權聖人之情也義之不存而苟變焉然後為小人矣䕫教胄子臯陶陳九德曰直而溫寬而栗柔而立是亦復之一端也天台王幾好學而多能將有所就焉者也幾之字曰復之故為之作復說命針宜失而失斯謂之正宜得而失斯謂之命身之不修責命可乎謹爾攸趍惟道之圖命之不諧躁乎則惑慎爾食息躁爾之賊得失不言吾道孰辨臧之否之繄我之願言不以道幸其哀己食而搖尾彼獸之耻非道而哀尚盍耻之矧其無益祗辱奚為三十曰壯聖人以立先迷無悔今是猶及蚤詩夜書以遨以娛戒之勿渝天其舍諸畫贊工有圖貴人之像者豫哀其賢而無所遂也為之辭云道之可行君子乃出行而無成君子之疾位以名得名以位失古人丘壑豈徒自逸嗚呼弋陽縣學銘慶曆恢儒首自東都爰及郡縣築宫授徒地不患小權不在大繫乎其人乃勤乃懈葛陂之南縣廷之東令异尉宇經始其中居室以嚴用器以利曰藝曰儀一為品制事則有變衆則有散非志之確誰足之踐易美知幾孔戒巳甚太學三萬黨人以禁興雖有功廢或為福敝漏之下誦弦亦足朂哉斯道無與乎世儒之全安宜億萬祀默堂銘黃介夫尉鄖鄊作默堂以居使人來告故為之銘曰衆人之默不材于天賢人之默保身以權止則為澤行將為川雖欲勿言安得不言太學議覯伏以古今時異㳂革事殊凡有設施當求折衷若曰上法周室作為辟雍詢于儒者諒無異議行之本朝或似不便何者雖作辟雍必不欲廢國子監未聞古者辟雍之上更有國子監也况辟雍之設非徙講授而巳便當行視學之禮養老之事國家大禮如籍田明堂鸞輿未動六軍之士巳希賞賜竊恐惜費未䏻盡行有其器而無其用天下之望寧不歉耶若欲太學不與國子監相妨又無行禮之責則宜近取唐制國子監太學四門律書算廣文凡七館皆屬國子監太學則七館之一其于國子監猶吏部兵部之于尚書省也不相妨明矣萬一遭遇帝暉下臨乃吾道之光耳若猶未也亦不為朝廷之闕至于棟宇之度在唐無聞如使講習有位生徒有次量事制宜誰曰不可然亦須見地之廣狹而後計之若豫為廣大之制而地或𥚹小則是空文無所施用或謂周人立四代之學今若以國子監為唐學又立辟雍以法于周有何害耶覯謂不然周之四學並立各有所用如養國老於東膠養庶老于虞庠學干戈羽籥于東序禮在瞽宗之類是也今教學之職盡在辟雍若不使國子監統之則祭酒司業當治何事如使辟雍屬于國子監則古者辟雍之上更無官司故覯以為不便果䏻廢國子監而興辟雍且修視學養老之禮以飾之則非覯之所敢議也策問三首問孟子稱舜為天子臯陶為士瞽瞍殺人則執之舜竊負而逃海濵以有所受之也觀諸周禮則有議親之辟夫宗室有罪尚在八議彼為天子父而吏得執之是邪非邪抑異代之法不可同條邪二三子極言之問夏之有德逺方圖物以鑄九鼎使民入山澤不逢不若其功大矣然所謂神姦者固為傀異之形而求近人邪抑能變化與人亂邪果其傀異則民之見者雖無有鼎亦知懼矣苟能變化與人亂則何形之可鑄邪當王孫滿之時鼎猶在周其所象物蓋嘗目見非虛語也顧言之失其義耳然則禹之為是鼎其何意也問周官六屬其職三百六十而貟數則多如六鄊七萬五千家耳自比長以上卿大夫士萬八千餘人此大可怪學者每非之而未見其說抑序官之妄邪則鄊州黨族閭比皆有職又不可闕然則守其官者何等人也策問六首問太史公叙術學崇黃老而薄六經其論以道家與時遷徙應物變化故曰聖人不巧時變是守以吾觀之蓋不出夫易易非六經乎何其不察而遽薄之也二三子試言焉問韓退之有言老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其說樂其誕而自小也亦曰吾師亦嘗云爾佛之說吾不能詳曽子問老子列傳則有問禮之事史未足盡信禮記經之屬也亦有妄乎明辨之無牽舊說問韓退之謂楊墨之書尚有存者今之學者有學于彼者乎有近于彼者乎其巳無傳乎其無乃化而不自知乎吾考于墨彊本節用誠其所長楊則無見矣然乃孟子所謂為我者也歷觀士大夫之所以髙人者儉陋為先儉非墨之流乎其施于天下國家恨未及也至于先己而後人持祿保位不以治亂纍其心者亦楊氏為我之决矣及其論議尚囂囂然曰闢楊墨豈非化而不自知者哉噫時有變事有宜則夫二者為是乎為非乎將蓋而勿問乎將折以先王之制乎各言其畫問春秋書王所以見王者上奉時承天而下統正萬國吾習諸此未始不舍業而嘆深矣先王之法也然公羊子曰王者孰謂謂文王杜元凱曰所書之王即平王學者往往未知所傳今之儒生又有異意謂春秋以天下無王而作蓋號令賞罰天子之事孔子不敢私之故書王以著號令賞罰之所由出若是則王非周也孔子藉之云爾吾心亦不安兹用商于二三子繹聖人之心懋君臣之義吾有望焉問周禮周公致太平之迹也而于大司馬見師不功之文小司寇有詢國危之目諸如此類蓋非周公所嘗行若春秋舊凡亦曰周公之制而弒君之例存焉豈成王時有是也哉故學者疑周官凡例皆不出于周公二三子以為如何問孟子曰未有仁而遺其親者也未有義而後其君者也是時天子在上而孟氏游于諸侯皆說以王道湯文武所以得天下之說未聞一言奬周室者庸非後其君乎賢人之言必不徒爾盍各求其意直講李先生文集卷之二十九終
