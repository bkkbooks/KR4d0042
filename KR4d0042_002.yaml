body:
  text: 建昌府重修李泰伯先生墓記生而必死聖賢無異于衆人也死而不亡與天地並久日月並明其惟聖賢乎泰伯先生其亦聖賢之徒乎先生姓李氏諱覯字泰伯學通五經尤長于禮以文辭自立其言大而正郡治北有鳯凰岡先生創書院其下學者餘千人南豐曽子固其髙弟也范公仲淹余襄公靖交薦之召為太學說書卒年五十一葬鳯凰岡之麓寶祐二年郡守楊鎮立興文堂以祀之開慶元年郡守曽野更其堂曰思賢右立旴江書院仍舊名也書院廢而先生之墓墟矣成化三年春長樂謝公士元來守郡夢先生對浮大白飲覺而異之翌曰有白于府曰盜發先生墓矣太守具棺衾將易葬焉啓壙視之二大白宛然夢中見者夢方解于是議請祠如故事㑹吏部主事左公贊以請命下立祠塋南名曰景賢賜以少牢春暮行禮歲如初又募閩石工大營冢壙壙以石為之壙中髙五尺廣視髙損一深視廣倍之中甃加堊外固以石前廣若堂繚以周垣湖西羅倫瓣香謁之太守述其夢曰先生之殁距今四百十三年矣而精神感通有如此者蘇子曰不依形而立不恃力而行不待生而存不隨死而亡者其此之謂乎回視煙草中冢纍纍然太守嘆曰是庸非人乎哉倫曰何獨此也桓山之石驪山之錮庸非人乎哉其圖身後者非不至也曽幾何時狐兔穴其傍樵兒牧竪躑躅其中草中纍纍者曽不若也方其生也柄一國之雄擅四海之富何求而不遂哉身死而遂不保焉何也先生以蔀屋寒夫初無一命之榮尺土之富而身後之榮終乎天地焉君子其知所擇矣太守曰夫子之言雍門周不如也請告邦人庶有聞先生之風者成化八年壬辰春三月朔旦立石賜進士及第翰林國史修撰永豐羅倫撰
